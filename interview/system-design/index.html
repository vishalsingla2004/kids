    }
    .sys-card:hover {
      border-color: var(--acc); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,212,170,0.12);
      text-decoration: none;
    }

<div class="step-badge">Step 1 — Scope the Problem</div>
<p><em>"Before diving into the design, let's clarify the requirements. In an interview, you should always ask the interviewer questions to narrow the scope."</em></p>

<h3>Candidate–Interviewer Dialogue</h3>

<div class="step-badge">Step 2 — High-Level Design</div>

<h3>API Design</h3>
<pre><code>POST /api/v1/urls
  Request:  { long_url: string, alias?: string, ttl_days?: int }
  Response: { short_url: string, short_key: string }

GET /{short_key}
  Response: HTTP 302  Location: &lt;long_url&gt;

DELETE /api/v1/urls/{short_key}
GET    /api/v1/urls/{short_key}/stats</code></pre>

<h3>Data Model</h3>
<pre><code>-- URL table (MySQL)
CREATE TABLE urls (
  id          BIGINT      PRIMARY KEY AUTO_INCREMENT,
  short_key   VARCHAR(8)  NOT NULL,
  long_url    TEXT        NOT NULL,
  user_id     BIGINT,
  created_at  DATETIME    NOT NULL DEFAULT NOW(),
  expires_at  DATETIME,
  UNIQUE INDEX idx_short_key (short_key),
  INDEX        idx_expires   (expires_at)
);</code></pre>

<h3>Architecture Diagram</h3>
<pre class="diagram">                    ┌─────────────────────────────────────────┐
 Users ─────────►  │          Load Balancer                  │
                    └─────────────┬───────────────────────────┘
                                  │
                    ┌─────────────▼───────────────────────────┐
                    │         API Servers (stateless)          │

                           │                  │

              │    Primary (writes) + Replicas (reads)     │

<h3>Request Flows</h3>

<p><strong>Read flow (hot path):</strong> Client → API → Check Redis → <strong>Cache hit</strong>: return long URL immediately (302 redirect). <strong>Cache miss</strong>: query MySQL → populate Redis → return long URL (302 redirect).</p>

<div class="callout insight">

<div class="step-badge">Step 3 — Design Deep Dive</div>

<h3>3a. Key Generation — The Core Challenge</h3>
<p>How do you generate a 7-character key that is unique, fast, and collision-free at 1,160 writes/sec? There are three approaches.</p>

<h4>Option A: Hash-based (MD5/SHA-256)</h4>
<p>Hash the long URL → take the first 7 characters of the hex output, encode to Base62.</p>
<ul>
  <li><strong>Problem 1 — Collisions:</strong> Two different long URLs can produce the same short key. Fix: if collision detected, append a counter and rehash. Each retry adds latency and a DB round-trip.</li>
  <li><strong>Problem 2 — Idempotence:</strong> The same long URL always maps to the same short key. Custom aliases and per-user short links become impossible to implement correctly.</li>
</ul>

<h4>Option B: Counter + Base62 Encoding (Recommended)</h4>
<p>Use an auto-incrementing integer counter. Encode the integer to Base62 to produce the short key.</p>
<ul>
  <li><strong>No collisions:</strong> each counter value is globally unique by definition</li>
  <li><strong>Deterministic length:</strong> counter up to 62^7 ≈ 3.5 trillion fits in 7 chars</li>
  <li><strong>Simple to reason about:</strong> no retry logic, no hash conflicts</li>
</ul>

<pre><code>ALPHABET = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"

def encode(n: int) -> str:
    result = []
    while n:
        result.append(ALPHABET[n % 62])
        n //= 62
    return ''.join(reversed(result)).zfill(7)

# encode(1)          → "aaaaaab"
# encode(57_000_000) → "BvpnX"  (padded to 7: "aaBvpnX")</code></pre>

<p><strong>The distributed counter problem:</strong> a single counter is a write bottleneck and a single point of failure. Solution: <em>pre-allocated range partitioning</em>.</p>
<ul>
  <li>A lightweight <strong>Range Service</strong> hands out blocks of IDs to API servers (Server A: 1–1,000,000; Server B: 1,000,001–2,000,000; etc.)</li>
  <li>Each server exhausts its local range without network round-trips per request</li>
  <li>Range Service itself backed by ZooKeeper or Redis INCR (atomic counter)</li>
  <li>On server crash: at most one range (~1M IDs) is lost — an acceptable gap</li>
</ul>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>Key Insight</strong><br>Counter + Base62 is preferred over hashing because it guarantees no collisions and requires zero retry logic. The distributed range allocation pattern is the same technique used by Twitter's Snowflake ID generator and LinkedIn's distributed ID service.</div>
</div>

<h3>3b. Redirection: 301 vs. 302</h3>
<div class="callout tradeoff">
  <div class="callout-icon">⚖️</div>
  <div class="callout-body"><strong>Trade-off: 301 vs. 302</strong><br><strong>301 Permanent Redirect:</strong> The browser caches the mapping. Every subsequent click goes directly to the destination — the short URL server never sees it again. Pros: zero server load after first hit. Cons: you lose all click analytics forever (browser never calls you again).<br><br><strong>302 Temporary Redirect:</strong> The browser always asks your server first. Every click hits your service. Pros: full analytics (who clicked, when, from where, on which device). Cons: higher server load — every click is a real request.<br><br><strong>Decision:</strong> Use 302 if analytics matter (they almost always do). Offer 301 as a premium option for enterprise customers who want maximum redirect speed and don't need analytics.</div>
</div>

<h3>3c. Cache Design</h3>
<ul>
  <li><strong>Technology:</strong> Redis, cache-aside pattern</li>

<h3>3d. Database Scaling</h3>
<p><strong>Phase 1 (0–1 TB):</strong> Single MySQL primary + 2 read replicas. Route all reads to replicas via a proxy (ProxySQL or HAProxy). Handles up to ~5,000 read QPS easily.</p>
<p><strong>Phase 2 (1 TB+):</strong> Shard by <code>short_key</code> using consistent hashing.</p>

<ul>

</ul>

<div class="step-badge">Step 3 — Design Deep Dive</div>

<h3>3a. The Fan-out Problem — Push vs. Pull vs. Hybrid</h3>
<p>This is the central architectural decision of the entire system. Every other design choice follows from this one.</p>

<h4>Fan-out on Write (Push Model)</h4>
<p>When a user posts a tweet, immediately write the <code>tweet_id</code> to every follower's feed cache in Redis. The read path is just a Redis lookup — O(1).</p>
<ul>
  <li><strong>Read path:</strong> O(1) — read a pre-computed Redis sorted set</li>
  <li><strong>Write path:</strong> O(N followers) — 200 followers = 200 Redis writes per tweet</li>
  <li><strong>Fatal flaw:</strong> Suppose a celebrity has 50M followers and posts a tweet. That's 50M Redis writes triggered simultaneously. At our write rate of 11,574 tweets/sec, if even 0.1% of accounts are celebrities, the fan-out load becomes catastrophic.</li>
  <li><strong>Memory:</strong> 500M users × 800 tweet_ids × 8 bytes = 3.2 TB across the Redis cluster — manageable</li>
</ul>

<h4>Fan-out on Read (Pull Model)</h4>
<p>When a user opens their feed, fetch the latest tweets from each account they follow and merge-sort in real time.</p>
<ul>
  <li><strong>Write path:</strong> O(1) — just store the tweet in the tweets table</li>
  <li><strong>Read path:</strong> O(N followees) — following 200 people = 200 DB queries + merge sort per feed load</li>
  <li><strong>Fatal flaw:</strong> 57,870 feed reads/sec × 200 DB queries each = 11.57M database queries per second. The database would be destroyed instantly.</li>
</ul>

<h4>Hybrid Model (Recommended)</h4>
<p>The key insight is that the problem only occurs at the extremes. The fix: treat regular users and celebrities differently.</p>
<ul>
  <li><strong>Regular users (&lt;10K followers):</strong> fan-out on write. Their tweets go to follower feed caches immediately after posting.</li>
  <li><strong>Celebrity/high-follower accounts (≥10K followers):</strong> NOT fanned out. Their tweets are <em>not</em> pushed to follower caches.</li>
  <li><strong>At read time:</strong> The Feed Service merges (a) the pre-computed Redis feed (regular users' tweets) + (b) fresh tweets from any celebrity accounts the user follows, fetched directly from the tweet database.</li>
</ul>

<div class="callout tradeoff">
  <div class="callout-icon">⚖️</div>
  <div class="callout-body"><strong>Trade-off</strong><br>Push (fan-out on write) optimizes reads at the cost of writes. Pull (fan-out on read) does the opposite. The hybrid model targets the actual distribution: the vast majority of accounts — regular users — have few followers and can safely use push. The small minority — celebrities — that would cause write explosion use pull. This is the same approach Twitter used in production, as documented in their 2013 architecture post.</div>
</div>

<h3>3b. Fan-out Service Implementation</h3>
<pre><code>Tweet created
  → Kafka event { tweet_id, user_id, created_at }
    → Fanout Service consumer
      → Lookup follower list from social graph DB (paginated, batch 1000)
      → Filter: skip inactive users (no login in 30 days) — saves ~40% of writes
      → For each active follower:
          celebrity_threshold = 10,000 followers
          if this user IS a celebrity: skip (handled at read time)
          if follower's feed key NOT in Redis: skip (populate fresh on next read)
          else:
              ZADD feed:{follower_id} {unix_ms_timestamp} {tweet_id}
      → Cap feed size: ZREMRANGEBYRANK feed:{user_id} 0 -801 (keep newest 800)</code></pre>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>Key Insight</strong><br>Skip inactive users during fan-out. Twitter found that approximately 40% of followers haven't logged in for 30 days. Writing to their feed cache wastes Redis memory and CPU for zero benefit. When they return, populate their feed fresh from the database. This single optimization cuts fan-out write load by nearly half.</div>
</div>

<h3>3c. Feed Cache Design (Redis Sorted Set)</h3>
<ul>
  <li><strong>Data structure:</strong> Sorted Set. Key: <code>feed:{user_id}</code>. Score: unix millisecond timestamp (enables range queries). Member: <code>tweet_id</code> (8 bytes).</li>
</ul>
<pre><code>-- Fan-out write (add tweet to follower's feed)
ZADD feed:{user_id} {timestamp_ms} {tweet_id}

-- Read latest 20 tweets
ZREVRANGEBYSCORE feed:{user_id} +inf -inf LIMIT 0 20

-- Cursor-based pagination (next page)
ZREVRANGEBYSCORE feed:{user_id} {cursor_score - 1} -inf LIMIT 0 20

-- Cap at 800 entries (drop oldest)
ZREMRANGEBYRANK feed:{user_id} 0 -801</code></pre>

<div class="capacity-block">
  <span class="cap-section-label">Redis Cluster Sizing</span>
  <div class="cap-row"><span class="cap-label">Active users with feed cache</span><span class="cap-val">500M</span></div>
  <div class="cap-row"><span class="cap-label">Avg tweet_ids per feed</span><span class="cap-val">400</span></div>
  <div class="cap-row"><span class="cap-label">Bytes per tweet_id (BIGINT)</span><span class="cap-val">8 bytes</span></div>
  <div class="cap-row cap-result"><span class="cap-label">Total Redis cluster size</span><span class="cap-val">≈ 1.6 TB → 6+ shards</span></div>
</div>

<p><strong>Expiry:</strong> Set a 7-day TTL on inactive user feed keys (lazy expiry on access). This reclaims memory without a complex cleanup job.</p>

<h3>3d. Content Hydration</h3>
<p>The feed cache stores only <code>tweet_id</code>s, not tweet content. On each feed read:</p>
<ol>
  <li>Fetch 20 <code>tweet_id</code>s from Redis sorted set (O(log N))</li>
  <li>Batch fetch tweet content from MySQL: <code>SELECT * FROM tweets WHERE id IN (...)</code></li>
  <li>Batch fetch author user profiles (cached separately in Redis with a 1-hour TTL)</li>
  <li>Merge and serialize response</li>
</ol>
<p><strong>Optimization:</strong> Maintain an in-process LRU cache on each Feed Service instance for the most popular tweets (top 0.1% of tweets by engagement account for ~30% of all reads). Eliminates DB round-trips for viral content entirely.</p>

<h3>3e. Pagination — Cursor vs. Offset</h3>
<div class="callout warn">
  <div class="callout-icon">⚠️</div>
  <div class="callout-body"><strong>Watch Out</strong><br>Never use offset-based pagination (<code>LIMIT 20 OFFSET 40</code>) for a live feed. If 5 new tweets arrive while the user scrolls to page 2, the offset shifts — they see duplicates or miss tweets entirely. Always use cursor-based pagination for any real-time content feed.</div>
</div>
<p>The cursor is the last seen <code>tweet_id</code>, which — when using Snowflake IDs — encodes the creation timestamp directly in the bits. This makes it both an ID and a time pointer.</p>
<p>Next page: <code>ZREVRANGEBYSCORE feed:{user_id} {cursor_score - 1} -inf LIMIT 0 20</code></p>

<h3>3f. Ranking (Extension)</h3>
<p>After establishing a working chronological feed, mention ranking as an architectural evolution:</p>
<ul>
  <li>Insert a <strong>Ranking Service</strong> between feed assembly and the API response</li>
  <li>Candidate set: fetch top 200 tweet_ids from Redis → score each one → return top 20</li>
  <li>Ranking signals: author relationship strength (DM frequency, mutual follows), tweet engagement velocity (likes per minute), recency decay (exponential), content type preference</li>
  <li>Validate with A/B test: 50% chronological vs. 50% ranked. Measure session length and scroll depth.</li>
</ul>
`

        id: 'step4',
        title: 'Step 4 — Wrap Up',
        content: `
<div class="step-badge">Step 4 — Wrap Up</div>
<p>The news feed problem is fundamentally about the fan-out bottleneck. Every other decision flows from how you solve that. The hybrid push/pull model is the industry answer, and Redis Sorted Sets are the ideal data structure for pre-computed, time-ordered feeds.</p>

<h3>Trade-offs Summary</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Decision</th><th>Made</th><th>Alternative</th><th>Reason</th></tr></thead>
  <tbody>
    <tr><td>Fan-out strategy</td><td>Hybrid (push + pull)</td><td>Pure push</td><td>Avoids 50M Redis writes per celebrity tweet</td></tr>
    <tr><td>Feed cache</td><td>Redis Sorted Set</td><td>DB query at read time</td><td>O(1) reads, pre-computed, supports cursor pagination</td></tr>
    <tr><td>Pagination</td><td>Cursor-based</td><td>Offset (LIMIT/OFFSET)</td><td>Stable across new inserts, no duplicate/missing tweets</td></tr>
    <tr><td>Inactive user skip</td><td>Yes (30-day threshold)</td><td>Fan-out to all followers</td><td>Saves ~40% of fan-out write volume</td></tr>
    <tr><td>Celebrity threshold</td><td>10K followers (dynamic)</td><td>Fixed whitelist</td><td>Automatically adjusts as accounts grow</td></tr>
  </tbody>
</table></div>

<h3>If You Have Extra Time</h3>
<ul>
  <li><strong>Follow backfill:</strong> when a user follows someone new, asynchronously populate their feed with that person's last N posts (don't leave the feed feeling empty)</li>
  <li><strong>Multi-region replication:</strong> replicate feed caches to a second region with asynchronous write propagation — acceptable for eventual consistency</li>
  <li><strong>Read-your-own-writes:</strong> after posting a tweet, route that user's feed reads to the primary for 1 minute (sticky routing) so they immediately see their own post</li>
</ul>
`

<div class="step-badge">Step 3 — Design Deep Dive</div>

<h3>3a. Chunked Resumable Upload</h3>
<p><strong>Naive approach:</strong> single HTTP PUT of a 10 GB file. If the network drops at 9.9 GB, you start from scratch. Completely unacceptable.</p>
<p><strong>Better:</strong> split the video into 5 MB chunks client-side. Upload each chunk independently. On failure, resume from the last successfully received chunk.</p>

<pre><code>-- Upload flow:

1. Client:  POST /api/v1/uploads/init
            Body: { filename, file_size, content_type }
   Server:  Response: { upload_id, total_chunks }

2. Client:  PUT /api/v1/uploads/{upload_id}/chunks/{n}
            Body: &lt;5MB binary chunk&gt;
   Server:  Response: { chunk: n, received: true }
   (Repeat for all n chunks. Failed chunks are retried individually.)

3. Client:  POST /api/v1/uploads/{upload_id}/complete
            Body: { chunk_checksums: [...] }
   Server:  Assembles chunks in S3 (multipart upload)
            → Publishes "upload_complete" event to SQS
            → Returns: { video_id, status: "processing" }</code></pre>

<p><strong>Pre-signed S3 URLs:</strong> rather than having chunks flow through your API servers, the API server issues a pre-signed S3 URL, and the client uploads the chunk directly to S3. This bypasses your application tier entirely, saving massive bandwidth costs and eliminating your app servers as a bottleneck.</p>

<h3>3b. Transcoding Pipeline — Segment-Parallel Processing</h3>
<p><strong>The naive problem:</strong> take a 2-hour movie, transcode to 5 resolutions sequentially. At 30 minutes CPU time per resolution, that's 2.5 hours per video. With 30,000 hours uploaded per day, the queue will never drain.</p>

<pre class="diagram">Naive approach:
  2-hour video → [1080p: 30min] → [720p: 30min] → [480p: 20min] → ...
  Total: ~2.5 hours per video, serial

Segment-parallel approach:
  2-hour video
    │
    ▼ Segment Splitter (GOP-aligned 2-min segments)
    │
    ├── Segment 01 → [Worker A: 1080p] [Worker B: 720p] [Worker C: 480p] ...
    ├── Segment 02 → [Worker D: 1080p] [Worker E: 720p] ...
    ├── ...
    └── Segment 60 → (distributed across worker pool)
                         │
                         ▼ All done → Assembler merges per-resolution
                         │
                         ▼ 5 complete HLS video files published to CDN storage</pre>

<p><strong>Why GOP-aligned:</strong> a Group of Pictures begins with an I-frame (a complete keyframe). Segment boundaries must align with I-frames, or playback will glitch at the seam between segments. The splitter detects I-frame positions before cutting.</p>
<p><strong>Worker fleet:</strong> EC2 Spot instances are 70% cheaper than on-demand. Transcoding is perfectly idempotent — re-transcoding a segment produces an identical output — so Spot preemption is safe. If a worker is killed mid-task, the SQS message becomes visible again after a visibility timeout, and another worker picks it up.</p>
<p><strong>Output formats:</strong></p>
<ul>
  <li><strong>H.264 (AVC):</strong> universal compatibility — all browsers, all devices, all years</li>
  <li><strong>H.265 (HEVC):</strong> 50% smaller at the same perceptual quality, for modern mobile devices</li>
  <li><strong>AV1:</strong> YouTube's primary format as of 2023. ~30% smaller than H.265. Open, royalty-free. Slower to encode but worth it at YouTube's storage scale.</li>
</ul>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>Key Insight</strong><br>Segment-parallel transcoding transforms a serial 2.5-hour job into a parallel ~30-minute job. This is the single most important optimization in the upload pipeline. It's only possible because video is naturally partitioned at GOP boundaries — and the output of each segment task is deterministic and independent of others.</div>
</div>

<h3>3c. Adaptive Bitrate Streaming (ABR)</h3>
<p><strong>Why not progressive download?</strong> Progressive download serves the video file from the beginning. The player buffers ahead — fine for reliable broadband. But on mobile with variable signal, the player needs 8 Mbps to buffer a 1080p stream and will hit a wall the moment you go under a bridge. The whole video stalls.</p>
<p><strong>ABR:</strong> video is split into 2–10 second segments, each available at multiple quality levels. The player continuously measures available bandwidth and switches quality levels on every segment boundary — invisibly to the user.</p>

<p>The transcoder produces a <strong>manifest file</strong> describing all available quality levels:</p>
<pre><code>#EXTM3U
#EXT-X-VERSION:3

#EXT-X-STREAM-INF:BANDWIDTH=800000,RESOLUTION=640x360
360p/playlist.m3u8

#EXT-X-STREAM-INF:BANDWIDTH=3000000,RESOLUTION=1280x720
720p/playlist.m3u8

#EXT-X-STREAM-INF:BANDWIDTH=8000000,RESOLUTION=1920x1080
1080p/playlist.m3u8</code></pre>

<p>Buffer-based switching logic:</p>
<ul>
  <li>Buffer &gt; 30s: try upgrading to higher quality</li>
  <li>Buffer &lt; 10s: immediately drop one quality level</li>
  <li>Buffer &lt; 3s: drop to lowest quality (360p) and show the buffering spinner</li>
</ul>

<div class="callout tradeoff">
  <div class="callout-icon">⚖️</div>
  <div class="callout-body"><strong>Trade-off</strong><br>ABR adds transcoding complexity (you're producing 5× as many files) and storage overhead. But it eliminates re-buffering events for users on variable connections — mobile, congested WiFi, international bandwidth-limited links. YouTube reported that adopting ABR cut re-buffering events by over 40%. The storage cost is worth the user experience improvement at this scale.</div>
</div>

<h3>3d. CDN Architecture</h3>
<pre class="diagram">Client (Tokyo) ──► Tokyo Edge PoP ──────────────────────► serve segment (cache hit)
                                └──► US Regional Cache ──► serve segment (cache hit)
                                              └──► Origin S3 ──► serve + cache segment</pre>

<p><strong>Tiered caching layers:</strong></p>
<ul>
  <li><strong>L1 — Edge PoPs (~200 global locations):</strong> 1–5ms from most users. Cache popular segments. Every user in Tokyo hits the Tokyo PoP first.</li>
  <li><strong>L2 — Regional (~20 locations):</strong> Cache mid-tier popularity segments. If the Tokyo PoP misses, it asks the Asia-Pacific regional cache before going to origin.</li>
  <li><strong>Origin (S3):</strong> Cold storage. Only long-tail, low-popularity content misses reach here.</li>
</ul>

<p><strong>Popularity-tiered caching strategy:</strong></p>
<ul>
  <li>Top 5% of videos: proactively cached at all edge PoPs (100% geographic pre-warming)</li>
  <li>Next 15%: cached at regional PoPs</li>
  <li>Bottom 80% (long tail): served from origin on first request, then cached at the requesting edge</li>
</ul>

<p><strong>Access control for paid/private content:</strong> CDN validates time-limited signed URLs. The API server issues a signed URL (valid for 1 hour) when the user starts playback. The CDN verifies the signature on each segment request and refuses expired tokens.</p>

<h3>3e. View Count — The Hot Row Problem</h3>
<p><strong>Naive approach:</strong></p>
<pre><code>UPDATE videos SET view_count = view_count + 1 WHERE id = ?</code></pre>
<p>When a video goes viral — say 1 million views per hour — this is 277 updates per second to the exact same database row. MySQL's row-level lock serializes these updates into a queue. The queue grows faster than it drains. Latency spikes. Connections pile up. The database server becomes a bottleneck for the entire service.</p>

<p><strong>Solution: Redis counter + async batch write</strong></p>
<pre><code>-- Each view event:
INCR view_count:{video_id}   ← atomic, O(1), no lock, handles millions/sec

-- Background job runs every 30 seconds:
for each video_id with pending Redis count:
    count = GETDEL view_count:{video_id}
    UPDATE videos SET view_count = view_count + count WHERE id = video_id</code></pre>

<p>The display can show the Redis value (real-time, may lag by up to 30s vs. final DB value) or the MySQL value (exact, up to 30s behind). Both are acceptable for this use case.</p>

<h3>3f. Content Safety</h3>
<p><strong>At upload time (synchronous, blocking — video won't be published until this passes):</strong></p>
<ul>
  <li><strong>CSAM detection:</strong> compute perceptual hash (PhotoDNA or equivalent) → check against NCMEC hash database. Legal requirement in most jurisdictions. Block upload immediately if matched.</li>
</ul>
<p><strong>Post-upload (asynchronous, doesn't block availability):</strong></p>
<ul>
  <li><strong>Copyright:</strong> extract video fingerprint → search Content ID database using approximate nearest-neighbor index (FAISS). On match: rights holder's policy applies (block, monetize, or track).</li>
  <li><strong>Violence/NSFW:</strong> ML classifier scoring 0–1. Score &gt;0.8: auto-reject. Score 0.5–0.8: human review queue. Score &lt;0.5: approved.</li>
  <li><strong>Re-upload detection:</strong> SimHash of transcript + visual fingerprint. Block known-bad content from being re-uploaded under a new account.</li>
</ul>
`

<div class="step-badge">Step 1 — Scope the Problem</div>
<p>Rate limiting is how you protect your services from being overloaded — whether by a buggy client, a well-meaning but overzealous integrator, or a malicious attacker. Real-world examples are everywhere: GitHub allows 5,000 API requests per hour per authenticated user. Stripe allows 100 requests per second per API key. Twitter's v2 API allows 180 requests per 15-minute window.</p>

<div class="step-badge">Step 3 — Design Deep Dive</div>

<h3>3a. The 5 Rate Limiting Algorithms</h3>

<h4>1. Fixed Window Counter</h4>
<p>Divide time into fixed 1-minute windows. Count requests per key per window. The window is encoded in the Redis key: <code>rl:user:123:2024-01-01T12:03</code>.</p>
<p><strong>Fatal flaw — boundary burst attack:</strong> suppose the limit is 100 requests/minute. A client sends 100 requests at 12:02:59 (end of window 1) and 100 more at 12:03:00 (start of window 2). In a 2-second span, they sent 200 requests — 2× the intended limit. The window boundary creates a gap in enforcement.</p>

<h4>2. Sliding Window Log</h4>
<p>Store the timestamp of every request. On each new request, count timestamps in the last 60 seconds. Evict old timestamps.</p>
<p>Completely accurate — no boundary issue. But memory-intensive: 1,000 requests/minute per user = 1,000 timestamps stored per user. At 1 million users: 1M × 1,000 × 8 bytes = 8 GB per rate limiter instance just for state.</p>

<h4>3. Token Bucket</h4>
<p>State per key: <code>(tokens, last_refill_time)</code>. Refill R tokens per second up to a max bucket size B. On each request: if tokens &gt; 0, consume 1 and allow. Else reject.</p>
<ul>
  <li><strong>Pros:</strong> allows bursting up to B (natural and user-friendly), smooth over time, O(1) state per key</li>
  <li><strong>Cons:</strong> the two-field state update (tokens, last_refill_time) must be atomic — requires a Redis Lua script or compare-and-swap to avoid race conditions</li>
</ul>

<h4>4. Leaky Bucket</h4>
<p>Incoming requests enter a fixed-capacity queue. The queue drains at a fixed rate (R requests/second). If the queue is full, the new request is rejected.</p>
<ul>
  <li><strong>Pros:</strong> produces a perfectly constant outbound rate — ideal for protecting a downstream service with a known fixed capacity</li>
  <li><strong>Cons:</strong> requests sit in the queue and get processed stale. Adds latency instead of rejecting immediately. Not appropriate for interactive APIs.</li>
</ul>

<h4>5. Sliding Window Counter (Recommended)</h4>
<p>A hybrid: divide time into 1-second sub-windows. Store request count per sub-window in a Redis sorted set or hash. On each request, compute a weighted approximation of the request count over the last full window.</p>

<pre><code>-- Example: limit 100 req/min. Current time = 12:01:45

overlap_ratio = (60 - 45) / 60 = 0.25   ← fraction of prev minute in window

approx_count = (prev_minute_count × overlap_ratio) + curr_minute_count

If approx_count >= 100: reject (return 429)
Else: increment curr_minute_count and allow</code></pre>

<p>The maximum error from this approximation is 0.003% — completely negligible for rate limiting. Memory: O(window_size_seconds) per key. For a 1-minute window: 60 entries per key.</p>

<h3>Comparison Table</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Algorithm</th><th>Memory</th><th>Accuracy</th><th>Burst OK?</th><th>Recommended For</th></tr></thead>
  <tbody>
    <tr><td>Fixed Window</td><td>O(1)</td><td>Low (boundary flaw)</td><td>Yes</td><td>Internal tools only</td></tr>
    <tr><td>Sliding Window Log</td><td>O(N requests)</td><td>Exact</td><td>Yes</td><td>Low-traffic, strict compliance</td></tr>
    <tr><td>Token Bucket</td><td>O(1)</td><td>Exact</td><td>Yes (up to bucket)</td><td>Smooth traffic shaping</td></tr>
    <tr><td>Leaky Bucket</td><td>O(queue size)</td><td>Exact</td><td>No (queues instead)</td><td>Fixed-rate downstream protection</td></tr>
    <tr><td><strong>Sliding Window Counter</strong></td><td>O(W seconds)</td><td>~99.997%</td><td>Yes</td><td><strong>Most production APIs</strong></td></tr>
  </tbody>
</table></div>

<h3>3b. Redis Implementation — Atomic Lua Script</h3>
<p>Why Lua? Redis executes Lua scripts atomically — no other Redis commands can run between lines of your script. This eliminates the race condition where two concurrent requests both read "49 remaining", both decide they're allowed, and both increment to 50, resulting in 51 total requests going through.</p>

<pre><code>-- Sliding window counter rate limiter
-- KEYS[1] = rate limit key (e.g. "rl:user:123:POST:/tweets")
-- ARGV[1] = window size in seconds
-- ARGV[2] = max requests allowed
-- ARGV[3] = current timestamp in seconds
-- Returns: {allowed (1/0), remaining, reset_timestamp}

local key          = KEYS[1]
local window       = tonumber(ARGV[1])
local limit        = tonumber(ARGV[2])
local now          = tonumber(ARGV[3])
local window_start = now - window

-- Remove sub-windows that have slid out of the current window
redis.call('ZREMRANGEBYSCORE', key, 0, window_start)

-- Count requests currently in the window
local count = redis.call('ZCARD', key)

if count &lt; limit then
    -- Allow: record this request as a scored member
    redis.call('ZADD', key, now, now .. '-' .. math.random(1000000))
    redis.call('EXPIRE', key, window + 1)
    return {1, limit - count - 1, now + window}
else
    return {0, 0, now + window}
end</code></pre>

<pre><code># Python usage
result = redis.evalsha(SCRIPT_SHA, 1,
    f"rl:{user_id}:{endpoint}",
    60,     # window_seconds
    100,    # max_requests
    int(time.time())
)
allowed, remaining, reset_at = result[0], result[1], result[2]</code></pre>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>Key Insight</strong><br>Use <code>EVALSHA</code> (not <code>EVAL</code>) in production. <code>EVALSHA</code> calls a pre-loaded script by its SHA-1 hash — no script body is transmitted on each call, saving bandwidth. Load the script once at startup via <code>SCRIPT LOAD</code>. This makes each rate limit check a single Redis round-trip carrying only the arguments.</div>
</div>

<h3>3c. Handling Distributed Rate Limiting</h3>
<p>Suppose you have 10 API servers, each maintaining its own in-memory counter. Each server independently allows 100 requests/minute — so the system as a whole allows 1,000 requests/minute. That's 10× your intended limit.</p>
<p><strong>Solution: centralized Redis counter.</strong> All API servers share one Redis instance (or cluster). Every check/increment call goes to the same counter.</p>
<ul>
  <li>Single Redis instance handles ~100K rate limit checks/sec comfortably</li>
  <li>Redis Cluster (sharded by rate limit key): scales to 1M+ checks/sec</li>
  <li>Use persistent connection pools per app server: 100–500 connections each, avoiding TCP handshake overhead on every request</li>
</ul>

<h3>3d. Fail-Open vs. Fail-Closed</h3>
<p>When Redis becomes unavailable (network partition, restart, overload), what should the rate limiter do?</p>
<div class="callout tradeoff">
  <div class="callout-icon">⚖️</div>
  <div class="callout-body"><strong>Trade-off: this is a business decision, not a technical one</strong><br><strong>Fail-closed (block all traffic):</strong> If you can't check the rate limit, reject the request. Zero risk of abuse during the Redis outage. But your entire API goes down whenever Redis has a hiccup. Your service availability is now capped by Redis availability.<br><br><strong>Fail-open (allow all traffic):</strong> If you can't check, allow the request. Your API stays up during Redis outages. Risk: an attacker can DDoS you during that window. For most public APIs, staying available is more important.<br><br><strong>Local fallback (recommended):</strong> Each server falls back to an in-memory counter with limit = global_limit / server_count. Less accurate (doesn't account for uneven load distribution) but functional. Graceful degradation rather than binary failure.</div>
</div>

<div class="callout warn">
  <div class="callout-icon">⚠️</div>
  <div class="callout-body"><strong>Watch Out</strong><br>Never implement fail-closed without explicit product sign-off. If you choose fail-closed, your API has <em>lower availability than your Redis cluster</em>. That means a Redis restart or network blip takes down your entire API. Most engineering orgs consider this unacceptable without a very deliberate decision.</div>
</div>

<h3>3e. Response Headers</h3>
<p>Always return rate limit headers on every response, not just 429s. This allows clients to implement graceful backoff without polling or guessing.</p>
<pre><code>HTTP/1.1 200 OK
X-RateLimit-Limit:     100
X-RateLimit-Remaining: 42
X-RateLimit-Reset:     1704067260
X-RateLimit-Policy:    100;w=60;burst=200</code></pre>

<pre><code>HTTP/1.1 429 Too Many Requests
Retry-After:           18
X-RateLimit-Limit:     100
X-RateLimit-Remaining: 0
X-RateLimit-Reset:     1704067260</code></pre>

<p><code>X-RateLimit-Reset</code> is a Unix timestamp (not seconds-until-reset). This matches the GitHub and Stripe conventions, which are the de facto standard for REST APIs.</p>

<h3>3f. Runtime Configuration Updates</h3>
<p>Rules are stored as a Redis hash, editable via admin API:</p>
<pre><code>HSET rate_limit_rules "POST:/api/v1/tweets:user"   "100:60"
HSET rate_limit_rules "GET:/api/v1/timeline:ip"    "500:60"
HSET rate_limit_rules "POST:/api/v1/users/*/follow:user" "50:3600"</code></pre>

<p><strong>Live propagation flow (rule change reaches all servers in &lt;1 second):</strong></p>
<ol>
  <li>Admin calls: <code>PUT /admin/rl-rules/{rule_id}</code> with new limit values</li>
  <li>Config Service writes updated rule to Redis hash</li>
  <li>Config Service publishes to Redis pub/sub channel: <code>rl_rules_updated</code></li>

  <li>Each server reloads the affected rule into its local in-memory cache</li>
  <li>Rule is active across the entire fleet within ~1 second, zero restarts</li>
</ol>

<div class="step-badge">Step 3a — URL Frontier (the hardest part)</div>
<p>Two requirements conflict: (1) crawl high-priority pages first; (2) max 1 req/sec per domain.</p>
<p><strong>Solution: two-tier queue system.</strong></p>
<ul>
  <li><strong>Front end — Priority queues:</strong> multiple queues ranked by page importance (PageRank estimate, freshness). A URL Prioritizer assigns each incoming URL to a priority queue (high/medium/low).</li>
  <li><strong>Back end — Politeness queues:</strong> one queue per domain. A Router maps domain → its dedicated queue. Each queue enforces a delay between pops (1 req/sec per domain).</li>
  <li>Workers always pull from back-end (politeness) queues, which are fed from front-end (priority) queues.</li>

<div class="callout insight"><div class="callout-icon">💡</div><div class="callout-body"><strong>Key Insight</strong><br>Separating priority from politeness is the core architectural insight. A single priority queue would send 1,000 req/sec to reddit.com because it has many high-priority pages. The two-tier design respects robots.txt rate limits while still processing high-value pages first.</div></div>

<div class="step-badge">Step 3b — Deduplication with Bloom Filters</div>
<p><strong>Problem:</strong> With 10B URLs, a hash table needs 10B × 200B = 2TB of memory — impractical.</p>
<p><strong>Bloom filter solution:</strong></p>
<ul>
  <li>Probabilistic data structure: tells you "definitely not seen" or "probably seen".</li>
  <li>False positive rate: ~1% with 10 bits/element. 10B URLs × 10 bits = <strong>12.5GB</strong> — fits in RAM.</li>
  <li>False positive cost: skip ~1% of genuinely new URLs (acceptable for a crawler).</li>
  <li>False negative: impossible. If it says "not seen," the URL is definitely new.</li>

<div class="step-badge">Step 3a — Chunked Upload and Delta Sync (the core optimization)</div>
<p>Split every file into <strong>4MB chunks</strong>. Each chunk has a SHA-256 hash.</p>
<p><strong>Upload protocol:</strong></p>
<ol>
  <li>Client chunks the file, computes SHA-256 of each chunk.</li>
  <li>Client sends list of chunk hashes to the server.</li>
  <li>Server responds: "which chunk hashes do I already have?" (returns set of missing hashes).</li>
  <li>Client uploads only the missing chunks (delta sync).</li>
  <li>Server assembles the file version record from (existing + new) chunk IDs.</li>
</ol>
<p><strong>Example savings:</strong> 100MB file (25 chunks of 4MB), user edits one paragraph:</p>
<ul>
  <li>Without chunking: upload 100MB</li>
  <li>With chunking: only 1 chunk changed → upload 4MB (96% bandwidth saving)</li>
</ul>

<div class="callout insight"><div class="callout-icon">💡</div><div class="callout-body"><strong>Key Insight</strong><br>Chunking enables two powerful optimizations simultaneously: delta sync (only upload changed chunks) and cross-user deduplication (two users storing identical files share the same chunk objects in S3). These together are why cloud storage services can offer terabytes affordably.</div></div>

<div class="step-badge">Step 3b — Block Storage Schema</div>
<pre><code>-- Blocks (content-addressed, immutable)
CREATE TABLE blocks (
  block_id    VARCHAR(64) PRIMARY KEY,   -- SHA-256 hash
  size_bytes  INT NOT NULL,
  s3_key      VARCHAR(256) NOT NULL,
  ref_count   INT DEFAULT 0              -- how many file versions reference this block
);

-- File versions (ordered list of blocks)
CREATE TABLE file_versions (
  file_id     BIGINT,
  version     INT,
  size_bytes  BIGINT,
  block_ids   JSON,                      -- ordered array of block_id strings
  created_at  DATETIME,
  created_by  BIGINT,
  PRIMARY KEY (file_id, version)
);</code></pre>
<p>Garbage collection: nightly job deletes S3 objects where <code>ref_count = 0</code> (no file version references them).</p>

<div class="step-badge">Step 3a — Snowflake Generation Algorithm</div>
<pre><code>class SnowflakeIDGenerator:
    EPOCH = 1609459200000  # 2021-01-01 00:00:00 UTC in milliseconds

    def __init__(self, datacenter_id: int, machine_id: int):
        self.datacenter_id = datacenter_id  # 0-31
        self.machine_id    = machine_id      # 0-31
        self.sequence      = 0
        self.last_ts       = -1

    def next_id(self) -> int:
        ts = self._current_ms()

        if ts == self.last_ts:
            self.sequence = (self.sequence + 1) & 0xFFF  # 12-bit mask (0-4095)
            if self.sequence == 0:
                ts = self._wait_next_ms(self.last_ts)    # sequence exhausted this ms
        else:
            self.sequence = 0

        self.last_ts = ts

        return ((ts - self.EPOCH) << 22) | \
               (self.datacenter_id << 17) | \
               (self.machine_id    << 12) | \
               self.sequence

    def _current_ms(self) -> int:
        return int(time.time() * 1000)

    def _wait_next_ms(self, last_ts: int) -> int:
        ts = self._current_ms()
        while ts <= last_ts:
            ts = self._current_ms()
        return ts</code></pre>
<p>Throughput: 4,096 IDs/ms = <strong>4.1M IDs/sec per machine</strong>. A single machine satisfies the 10K/sec requirement with 400× headroom.</p>

<div class="step-badge">Step 3b — The Clock Skew Problem</div>
<p>NTP can adjust the system clock backwards. If the clock moves back 5ms, the new timestamp will be less than <code>last_ts</code> → duplicate IDs.</p>
<ul>

  <li><strong>Solution B:</strong> if detected clock regression exceeds threshold (e.g., 1 second), throw an exception and refuse to generate IDs. Alert the operations team to fix NTP.</li>
  <li><strong>Solution C:</strong> use a monotonic clock (not wall clock) for the sequence component. The monotonic clock never goes backwards.</li>
</ul>

<div class="callout warn"><div class="callout-icon">⚠️</div><div class="callout-body"><strong>Watch Out</strong><br>Never use system wall time directly without handling backward movement. NTP clock corrections, VM live migrations, and DST transitions can all cause the clock to jump backwards. Even a 1ms regression generates duplicate IDs. Always compare <code>current_ts</code> to <code>last_ts</code> before using it.</div></div>

<p>A simpler approach for ultra-high throughput: each application server pre-allocates a range of IDs from a central ID server (e.g., "give me IDs 5,000,001 to 6,000,000"). The application then generates IDs locally from that range with no network calls.</p>

<div class="step-badge">Step 3a — Data Structure: Redis Sorted Set vs. Trie</div>
<p><strong>Trie approach:</strong> each node stores the top-K completions for that prefix. O(prefix_length) lookup.</p>
<ul>
  <li>Pros: space-efficient for shared prefixes.</li>
  <li>Cons: hard to update incrementally (a score change must bubble up the trie). Complex to shard across machines.</li>
</ul>
<p><strong>Redis Sorted Set approach (recommended):</strong></p>
<ul>
  <li>One sorted set per prefix: key = <code>ac:{prefix}</code>, members = query strings, score = popularity score.</li>
  <li>Lookup: <code>ZREVRANGEBYSCORE ac:sys +inf -inf LIMIT 0 5</code> → top 5 suggestions for "sys".</li>
  <li>Update: <code>ZADD ac:sys {new_score} "system design"</code> (O(log N)).</li>
  <li>Pros: simple to update, trivial to shard by key prefix, Redis handles persistence and expiry natively.</li>
  <li>Cons: storage = O(unique prefixes). For 20M queries × avg 5-char prefixes × ~10 prefix lengths each ≈ ~3B sorted set entries. At 50 bytes/entry: ~150GB. Use Redis Cluster.</li>
</ul>

<div class="callout insight"><div class="callout-icon">💡</div><div class="callout-body"><strong>Key Insight</strong><br>Don't build a custom trie. Redis Sorted Sets implement exactly the operation you need (top-K by score for a given prefix key) with a single built-in command. You get persistence, clustering, and atomic updates for free. Only build a custom trie if you need sub-millisecond latency at 10M+ QPS.</div></div>

<div class="step-badge">Step 3b — Score Calculation</div>
<ul>
  <li><strong>Base score:</strong> log₁₀(query_frequency) — logarithmic scale prevents "the" and "how" from dominating every suggestion.</li>
  <li><strong>Time decay:</strong> <code>score = frequency × e^(-λ × days_since_last_seen)</code>, λ = 0.01 (half-life ~70 days). Old queries naturally fade out.</li>
  <li><strong>Trending boost:</strong> if query appeared in top-10% growth this week, multiply score × 1.5.</li>
  <li><strong>Personalization extension:</strong> blend global score (70%) + user query history score (30%). Avoids cold-start problem for new users who get pure global scores.</li>
</ul>

<div class="step-badge">Step 3c — Data Pipeline (score updates)</div>
<pre><code>Every search: log { query, user_id, timestamp } to Kafka (non-blocking, fire-and-forget)

Every 5 minutes (Flink / Spark Streaming job):
  1. Aggregate: count(query) per 5-minute window from Kafka
  2. Update global rolling 7-day counts in Redis

Every night (full rebuild, prevents drift accumulation):
  1. Aggregate last 7 days of logs in Spark batch job
  2. Rebuild all Redis sorted sets from scratch (correct any score drift)
  3. Atomic swap: write to staging keys → rename to live keys (zero-downtime update)</code></pre>

<div class="step-badge">Step 3d — Client-Side Optimizations</div>
<p>The biggest latency wins are often client-side, not server-side:</p>
<ul>
  <li><strong>Debounce:</strong> wait 100ms after the last keystroke before firing a request. Typing "system" generates 1 request instead of 6. Eliminates ~83% of requests.</li>
  <li><strong>Cancel in-flight requests:</strong> if the user types another character before the response arrives, cancel the stale request (fetch AbortController in JS). Prevents out-of-order display of stale suggestions.</li>
  <li><strong>Browser cache:</strong> store the last 20 prefix responses in browser memory (Map with LRU eviction). Typing "sys", deleting back to "sy", then "sys" again = 0 server requests on the third keystroke.</li>
  <li><strong>Prefix sharing:</strong> if the "sys" response returns 5 suggestions and all of them start with "syste", the client can infer suggestions for "syste" without a new request.</li>
</ul>

<div class="callout tradeoff"><div class="callout-icon">⚖️</div><div class="callout-body"><strong>Trade-off</strong><br>Debounce 100ms vs. 200ms: 100ms is imperceptible to the user but cuts requests by ~70% (assuming 150ms average typing speed). 200ms cuts requests further but users may perceive a delay before suggestions appear. 100ms is the standard industry choice.</div></div>

<div class="step-badge">Step 3e — Filtering Unsafe and Spam Suggestions</div>
<ul>
  <li><strong>Blocklist:</strong> Bloom filter for ~1M known blocked queries (O(1) membership test, ~1.2MB memory). Any suggestion in the blocklist is removed from the response before returning.</li>

</ul>

<h3>Core Concepts</h3>
<ul>
  <li><strong>Topic:</strong> A logical channel (e.g., <em>user-clicks</em>). Producers write to a topic; consumers read from it.</li>
  <li><strong>Partition:</strong> A physical subdivision of a topic. Messages are append-only and strictly ordered within a partition. A topic can have many partitions for parallelism.</li>
  <li><strong>Producer:</strong> Writes messages to a topic. Chooses partition by key hash (same key always lands in same partition) or round-robin.</li>
  <li><strong>Consumer Group:</strong> A set of consumers that collectively read all partitions of a topic. Each partition is assigned to exactly one consumer in the group at any time, ensuring no message is processed twice within the group.</li>
  <li><strong>Offset:</strong> An integer identifying a message's position within a partition. Consumers track their own offset — they decide when they have "consumed" a message.</li>
</ul>

<pre class="diagram">
  Producers                Topics / Partitions                 Consumer Groups
  ─────────                ───────────────────                 ───────────────
  Producer A ──►  Topic: user-clicks                   Consumer Group A
  Producer B ──►  ├── Partition 0 [0,1,2,3,4]  ──►   Consumer A1 (reads P0, P1)
  Producer C ──►  ├── Partition 1 [0,1,2,3  ]  ──►   Consumer A2 (reads P2, P3)
                  ├── Partition 2 [0,1,2    ]  ──┘
                  └── Partition 3 [0,1      ]

                                                       Consumer Group B (independent)
                                                       Consumer B1 (reads P0–P3 alone)

  ZooKeeper / Controller Node
  └─ Partition leader election, consumer group coordination, broker health
</pre>

<h3>Message Data Model</h3>
<p>Each message stored in a partition contains:</p>
<pre><code>Message {
  offset     : Long      // position in this partition (monotonically increasing)
  timestamp  : Long      // producer-set or broker-set epoch millis
  key        : Bytes     // optional; used for partition routing and compaction
  value      : Bytes     // payload (schema-free; consumers interpret content)
  headers    : Map       // optional metadata (e.g., trace-id, content-type)
}</code></pre>
<p>The broker enforces no schema — it is a dumb pipe for bytes. Schema enforcement (Avro, Protobuf) is the producer/consumer's responsibility, typically via a separate Schema Registry service.</p>
`

<div class="step-badge">Step 3a — Log-Structured Storage (The Core Insight)</div>
<p>Each partition is physically stored as an <strong>append-only log file</strong> on disk:</p>
<ul>
  <li>Writes are always sequential — the OS writes to the end of the file, never seeks.</li>
  <li>Sequential disk writes on spinning HDDs reach ~500 MB/s. Random writes: ~50 MB/s. On NVMe SSDs: sequential ~3 GB/s vs. random ~500 MB/s. Sequential wins by 10–100×.</li>
  <li>No in-place updates, no B-tree rebalancing — the simplest possible write path.</li>
</ul>

<p><strong>Segment files:</strong> Rather than one enormous log file, each partition is split into 1 GB segment files. Old segments are deleted (or compacted) when they exceed the retention period. Active segment is the only one being written to.</p>

<pre><code>partition-0/
  00000000000000000000.log    ← segment 1 (offsets 0–99,999), read-only
  00000000000000000000.index  ← maps offset → byte position in .log
  00000000000000100000.log    ← segment 2 (offsets 100,000–199,999)
  00000000000000100000.index
  00000000000000200000.log    ← active segment (currently being written)</code></pre>

<p>The <strong>index file</strong> maps offset → byte position in the .log file, enabling O(1) seeks to any offset without scanning the entire log.</p>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>The Append-Only Log is Kafka's Most Important Decision</strong><br>
  Sequential disk writes are ~100× faster than random writes. This single design choice is why Kafka achieves 1M+ messages/sec on commodity hardware with spinning disks. It never seeks — it only appends. The OS page cache also works optimally with sequential access patterns, effectively making reads as fast as RAM for recently written data.</div>
</div>

<div class="step-badge">Step 3b — Replication for Durability</div>
<p>Each partition has <strong>1 leader + N−1 follower replicas</strong> on different broker nodes (configurable replication factor, default 3):</p>
<ul>
  <li>Producers always write to the <strong>leader</strong>. Followers pull from the leader asynchronously.</li>
  <li><strong>ISR (In-Sync Replicas):</strong> The set of replicas that are caught up to within <code>replica.lag.time.max.ms</code> (default 10s). Only ISR replicas are eligible for leader election.</li>
</ul>

<p><strong>Producer acknowledgment modes (<code>acks</code> setting):</strong></p>
<table>
  <thead><tr><th>acks value</th><th>Behavior</th><th>Risk</th></tr></thead>
  <tbody>
    <tr><td><code>0</code></td><td>Fire and forget — no acknowledgment</td><td>Message loss on any failure</td></tr>
    <tr><td><code>1</code></td><td>Leader acknowledges before replicating</td><td>Loss if leader crashes before followers catch up</td></tr>
    <tr><td><code>all</code></td><td>All ISR replicas acknowledge</td><td>No loss; highest latency (+20–50ms)</td></tr>
  </tbody>
</table>

<p>On leader failure: ZooKeeper (or KRaft in newer Kafka) detects the broker outage → the Controller elects a new leader from the ISR → producers and consumers reconnect to the new leader automatically.</p>

<div class="callout tradeoff">
  <div class="callout-icon">⚖️</div>
  <div class="callout-body"><strong>acks=all vs. acks=1</strong><br>
  <code>acks=all</code> gives zero-loss durability but adds 20–50ms per message (ISR round-trip). <code>acks=1</code> halves latency but risks losing the most recent message on broker crash. Financial systems and audit logs use <code>acks=all</code> with <code>min.insync.replicas=2</code>. High-throughput analytics pipelines often accept <code>acks=1</code>.</div>
</div>

<div class="step-badge">Step 3c — Consumer Groups &amp; Offset Management</div>
<p>Consumer offsets are stored in an internal Kafka topic <code>__consumer_offsets</code> — eliminating the ZooKeeper dependency for offset tracking (ZooKeeper was used for this in older Kafka versions).</p>

<ul>
  <li><strong>Auto-commit:</strong> Consumer commits its offset every 5 seconds. If the consumer crashes between commits, messages since the last commit are re-processed → <strong>at-least-once</strong> delivery.</li>
  <li><strong>Manual commit:</strong> Application commits offset only after successfully processing the message → stronger guarantee, but requires idempotent processing logic.</li>
  <li><strong>Rebalancing:</strong> When a consumer joins or leaves a group, Kafka triggers a rebalance — partitions are reassigned across remaining consumers. During rebalancing, consumption pauses. Kafka 2.4+ introduced incremental cooperative rebalancing to minimize pause duration.</li>
  <li><strong>Max parallelism:</strong> Partition count is the ceiling. With 10 partitions, at most 10 consumers in a group can work in parallel. The 11th consumer is idle (no partition to assign to it).</li>
</ul>

<div class="step-badge">Step 3d — Exactly-Once Delivery</div>
<p>This is the hardest part. Two mechanisms are required together:</p>

<p><strong>1. Idempotent Producer:</strong></p>
<ul>
  <li>Each producer is assigned a <code>producer_id</code> by the broker at startup.</li>
  <li>Each message is assigned a monotonically increasing <code>sequence_number</code> per partition.</li>
  <li>If the producer retries a failed send, the broker detects the duplicate (same producer_id + sequence_number) and silently discards it — no double write.</li>
</ul>

<p><strong>2. Transactions:</strong></p>
<pre><code>producer.initTransactions();
producer.beginTransaction();
producer.send("orders", orderMsg);
producer.send("inventory", inventoryMsg);
producer.commitTransaction();   // atomic across both topics</code></pre>
<ul>
  <li>Consumers set <code>isolation.level=read_committed</code> to skip messages from in-flight or aborted transactions.</li>
  <li>Cost: ~20% throughput reduction. Use exactly-once only where billing or correctness requires it.</li>
</ul>

<div class="step-badge">Step 3e — Consumer Lag &amp; Backpressure</div>
<p><strong>Consumer lag</strong> = (latest partition offset) − (consumer's last committed offset). A growing lag means the consumer is slower than the producer.</p>
<ul>
  <li><strong>Fix options:</strong> Add more consumers (up to partition count), scale consumer processing horizontally, batch-consume larger chunks, or optimize handler logic.</li>
  <li><strong>Kafka does not apply backpressure to producers</strong> when consumers fall behind — lag simply accumulates. Configure retention period long enough that slow consumers can catch up before messages expire.</li>
  <li><strong>Monitoring:</strong> Alert on lag &gt; 100K messages (tune per use case). Export consumer lag metrics to Prometheus/Datadog via JMX or Kafka consumer group API.</li>
</ul>
`
      },
      {
        id: 'step4',
        title: 'Step 4 — Wrap Up',
        content: `
<h3>Key Design Decisions</h3>
<table>
  <thead><tr><th>Decision</th><th>Choice Made</th><th>Alternative</th><th>Reason</th></tr></thead>
  <tbody>
    <tr><td>Storage engine</td><td>Append-only log files</td><td>B-tree / relational DB</td><td>100× sequential write speed; no seek overhead</td></tr>
    <tr><td>Ordering guarantee</td><td>Within partition only</td><td>Global ordering (one partition)</td><td>Global = single bottleneck = no parallelism or scalability</td></tr>
    <tr><td>Durability</td><td>acks=all + ISR replication</td><td>acks=1</td><td>Configurable per producer and per topic based on use case</td></tr>
    <tr><td>Offset storage</td><td>Internal Kafka topic</td><td>ZooKeeper</td><td>Removes ZooKeeper dependency; scales with Kafka itself</td></tr>
    <tr><td>Exactly-once</td><td>Idempotent producer + transactions</td><td>At-least-once + app-level dedup</td><td>Native guarantee; higher overhead — use only when required</td></tr>
  </tbody>
</table>

<h3>If You Have Extra Time</h3>
<ul>
  <li><strong>Log compaction:</strong> Instead of time-based retention, Kafka can retain only the latest value per key (useful for change-data-capture and event sourcing). The compaction thread runs in the background and merges old segments, keeping only the most recent message per key.</li>
  <li><strong>Tiered storage:</strong> Older segments offloaded to S3/GCS. Brokers serve hot recent data from local disk; cold data fetched from object store on demand. Reduces broker disk requirements dramatically.</li>
  <li><strong>KRaft mode:</strong> Kafka 3.x+ eliminates ZooKeeper entirely. Metadata (broker registry, topic configs, partition assignments) stored in a Kafka log managed by a quorum of Controller nodes — the same append-only log abstraction applied to metadata.</li>
</ul>
`

<div class="step-badge">Step 3a — Time-Series Database Design</div>
<p>A data point has the shape: <code>{ metric_name, tags: {host, region, service, ...}, timestamp, value }</code></p>

<p><strong>Tag cardinality problem:</strong> Each unique combination of tag values is a <em>series</em>. With 1,000 hosts × 100 endpoints × 10 status codes, a single metric has 1 billion series. Most TSDBs degrade badly above ~10 million series. Solutions: limit tag value cardinality, reject high-cardinality tags at ingestion, pre-aggregate them.</p>

<p><strong>Columnar storage:</strong> For each series, store timestamps and values in separate compressed arrays:</p>
<pre><code>Series: cpu.usage{host=web-01, region=us-east-1}
  timestamps: [1704067200, 1704067210, 1704067220, ...]   ← delta-encoded
  values:     [42.1, 42.3, 43.0, 42.8, ...]               ← XOR (Gorilla) encoded</code></pre>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>Gorilla Compression (Facebook, 2015)</strong><br>
  Time-series values change slowly: 42.1% → 42.3% → 43.0%. XOR-encoding adjacent float64 values exploits this: most high bits are identical, leaving only a small diff. Combined with delta-encoding timestamps (store only the difference), typical compression is 12 bytes/point down to 1.4 bytes/point — an 8× reduction. This paper is the foundation of modern TSDB storage engines.</div>
</div>

<div class="step-badge">Step 3b — Downsampling &amp; Tiered Retention</div>
<p>Raw data at 10-second resolution is only kept for 15 days. A background rollup job periodically aggregates into coarser buckets and deletes fine-grained data:</p>
<table>
  <thead><tr><th>Resolution</th><th>Retention</th><th>Aggregates stored</th></tr></thead>
  <tbody>
    <tr><td>10-second (raw)</td><td>15 days</td><td>raw values</td></tr>
    <tr><td>1-minute</td><td>30 days</td><td>min, max, avg, p99, count</td></tr>
    <tr><td>5-minute</td><td>6 months</td><td>min, max, avg, p99, count</td></tr>
    <tr><td>1-hour</td><td>15 months</td><td>min, max, avg, p99, count</td></tr>
  </tbody>
</table>
<p>The Query Engine automatically selects the appropriate resolution tier based on the requested time range and granularity. A query for "last 1 year, hourly" reads from the 1-hour tier; "last 2 hours, per-minute" reads from raw or 1-minute tier.</p>

<div class="step-badge">Step 3c — Alert Engine</div>
<p>Alert rule example: <em>"Alert if avg(cpu.usage{service='payments'}) &gt; 80% for 5 minutes"</em></p>

<p>Every 60 seconds, the Alert Engine evaluates all active rules:</p>
<ol>
  <li>Query TSDB for the metric over the last N minutes</li>
  <li>Evaluate the condition (threshold, anomaly, rate-of-change)</li>
  <li>If breached: check whether the condition has held for the full <code>for</code> duration (avoids alerting on transient 1-second spikes)</li>
  <li>If sustained: transition to FIRING → publish to notification queue</li>
</ol>

<p><strong>Alert state machine:</strong></p>
<pre class="diagram">
  OK ──► PENDING (breaching but &lt; 'for' duration)
            └──► FIRING (breach sustained)
                    └──► RESOLVED (condition no longer met)
          (also: OK if condition clears during PENDING)
</pre>

<p><strong>Deduplication &amp; grouping:</strong> When 500 hosts all breach the same CPU rule simultaneously, the alert engine groups them into a single alert with a "500 instances affected" summary — not 500 separate pages.</p>

<div class="step-badge">Step 3d — Metric Collection Agent Design</div>
<p><strong>Pull model (Prometheus-style):</strong> A central scraper calls <code>/metrics</code> on each host every 15s. Simple but creates a single scraping bottleneck; doesn't work for ephemeral containers.</p>
<p><strong>Push model (Datadog/StatsD):</strong> Agents push to a regional collector. Scales to millions of dynamic hosts; no scraper to coordinate.</p>
<p><strong>Hybrid (recommended at scale):</strong> Agents push to a local aggregator on each machine → aggregator batches and compresses → pushes to Kafka. Reduces connection count from N×servers to N×racks.</p>
<p><strong>Pre-aggregation:</strong> Agent computes local avg/p99 over a 10-second window before sending — transmits 1 point instead of 100 raw measurements. 100× write volume reduction before data even reaches Kafka.</p>

<div class="step-badge">Step 3a — Driver Location at 2.5M Updates/Sec</div>
<p>A relational database cannot absorb 2.5M writes/sec. Use <strong>Redis</strong> as the real-time location store:</p>

</div>

<div class="step-badge">Step 3b — Matching Algorithm</div>
<p>When a rider requests a ride:</p>
<ol>
  <li>Compute rider's geohash (precision 6 ≈ 1.2 km × 0.6 km cell)</li>
  <li>Query Redis GEO: <code>GEORADIUS active_drivers {lng} {lat} 3 km ASC COUNT 50</code></li>
  <li>Filter candidates: status = <em>available</em> (not on active trip), vehicle type match, heading plausibly toward pickup</li>
  <li>Score remaining candidates: distance to pickup × 0.6 + driver rating × 0.2 + acceptance rate × 0.2</li>
  <li>Offer trip to top-scored driver with a 10-second acceptance window</li>
  <li>If declined or timeout → offer to next driver in ranked list</li>
</ol>
<p><strong>Progressive radius expansion:</strong> If no available drivers within 3 km → expand to 5 km → 8 km → 15 km → return "no drivers available" to rider.</p>

<div class="step-badge">Step 3c — Trip State Machine</div>
<pre class="diagram">

      │

      ▼

      ▼
  EN_ROUTE_TO_PICKUP

      ▼
  ARRIVED_AT_PICKUP
      │
      ▼
  IN_TRIP

      ▼
  COMPLETED ──► (triggers billing, driver payout, rating prompt)
</pre>
<p>Active trip state lives in Redis (fast access during trip). All transitions are also written to Cassandra (permanent record). Each state transition publishes a Kafka event that downstream services (billing, notifications, driver payout, analytics) consume independently.</p>

<p>Every 60 seconds, the Pricing Service recomputes surge multiplier per geohash cell:</p>

  <li>Count available drivers in cell (<em>supply</em>)</li>
  <li>ratio = demand / max(supply, 1)</li>
  <li>surge = lookup table: ratio &lt;1.5 → 1.0×; 1.5–3.0 → 1.5×; 3.0–5.0 → 2.0×; &gt;5.0 → 2.5×</li>

<p><strong>Dampening:</strong> New multiplier = 0.7 × previous + 0.3 × calculated. Prevents rapid oscillation (the multiplier would otherwise spike and crash as drivers flood into the surge zone).</p>

  <li><strong>Versioning?</strong> → Yes — every PUT creates a new version; DELETE creates a delete marker.</li>
  <li><strong>Access pattern?</strong> → Write-once, read-many. Objects are rarely overwritten.</li>

<h3>Non-Functional Requirements</h3>
<ul>
  <li>11-nines durability</li>
  <li>99.99% availability</li>
  <li>Effectively infinite horizontal scalability</li>

<h3>Fundamental Separation: Metadata Plane vs. Data Plane</h3>
<p>The key architectural decision: <strong>never mix metadata with data</strong>. They have completely different access patterns, scaling needs, and consistency requirements.</p>
<ul>
  <li><strong>Metadata Plane:</strong> "Where is this object?" — small records, requires strong consistency, must be highly available for every read/write request. Backed by a distributed key-value store.</li>
  <li><strong>Data Plane:</strong> "Give me the actual bytes." — large blobs, can use eventual consistency for replication, optimized for throughput over latency. Backed by cheap commodity storage nodes.</li>
</ul>

<pre class="diagram">
  Client (S3-compatible REST API)
    │
    ▼
  API Service (routes requests, authenticates, enforces bucket policies)
    │
    ├─► Metadata Service ──► Metadata DB (Cassandra / custom KV)
    │   (object_key → {node_ids, checksum, size, version, ...})
    │
    └─► Data Service (cluster of storage nodes)
        ├── Storage Node 1: /data/chunks/...

        ├── Storage Node 3: /data/chunks/...
        └── Storage Node N: /data/chunks/...

                                              → Metadata Service (write locations)
  GET flow:  Client → API → Metadata Service (find chunk locations)

        id: 'step3',

        content: `
<div class="step-badge">Step 3a — Durability: Erasure Coding vs. Replication</div>

<p><strong>3× Replication:</strong> Store identical copies of each object on 3 different nodes. Survive up to 2 simultaneous node failures. Storage overhead: 3× (1 PB of data → 3 PB stored).</p>

<p><strong>Erasure Coding — 8+4 Reed-Solomon:</strong></p>
<ul>
  <li>Split each object into 8 equal <em>data chunks</em>.</li>
  <li>Compute 4 <em>parity chunks</em> using Reed-Solomon math (linear algebra over finite fields).</li>
  <li>Distribute all 12 chunks across 12 different nodes in different failure domains (racks, AZs).</li>
  <li>Any 8 of the 12 chunks are sufficient to reconstruct the full object — tolerate up to 4 simultaneous node failures.</li>
  <li>Storage overhead: 12/8 = 1.5× (vs. 3× for replication). <strong>50% storage savings.</strong></li>
</ul>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>Why S3 Uses Erasure Coding at Scale</strong><br>
  At 1 exabyte of customer data: 3× replication = 3 exabytes stored. Erasure coding at 1.5× = 1.5 exabytes stored. The CPU cost of encoding (typically &lt;2ms for objects under 10MB) is trivially cheap compared to the cost of 1.5 exabytes of additional disk capacity. At Amazon's scale, this difference is billions of dollars per year in hardware costs.</div>
</div>

<div class="step-badge">Step 3b — Object Placement via Consistent Hashing</div>
<ul>
  <li>Hash(bucket_name + "/" + object_key) → position on a consistent hash ring.</li>
  <li>The hash position maps to a storage node responsible for that object's primary chunk.</li>
  <li>Additional chunks distributed to nodes in different failure domains (enforce rack/AZ spread).</li>
  <li><strong>Adding a node:</strong> Only objects whose hash range falls on the new node need to move (~1/N of objects). Other objects unaffected.</li>
  <li><strong>Node failure:</strong> Detector marks node as failed → replication/erasure repair job fetches surviving chunks → reconstructs missing chunks on a replacement node.</li>
</ul>

<div class="step-badge">Step 3c — Multipart Upload</div>
<p>Objects up to 5 TB cannot be sent in a single HTTP request (connection failures would require restarting from zero). Multipart upload provides resumable, parallelizable transfers:</p>
<pre><code>// 1. Initiate
POST /bucket/large-video.mp4?uploads
Response: { upload_id: "VXBsb2FkIElEIGZvciA..." }

// 2. Upload parts (can be done in parallel)
PUT /bucket/large-video.mp4?partNumber=1&amp;uploadId=...  (5–5000 MB)
Response: { ETag: "\"abc123\"" }

PUT /bucket/large-video.mp4?partNumber=2&amp;uploadId=...
Response: { ETag: "\"def456\"" }

// 3. Complete (assembles parts into final object)
POST /bucket/large-video.mp4?uploadId=...
Body: [{ PartNumber: 1, ETag: "abc123" }, { PartNumber: 2, ETag: "def456" }]

// 4. Abort (cleans up orphaned parts on failure)
DELETE /bucket/large-video.mp4?uploadId=...</code></pre>
<p>Parts are stored as temporary objects. On <code>CompleteMultipartUpload</code>, the metadata record is created linking all part locations. Orphaned incomplete uploads are cleaned up by a lifecycle policy (default: delete after 7 days).</p>

<div class="step-badge">Step 3d — Metadata Design</div>
<pre><code>ObjectMetadata {
  bucket       : "my-photos",
  key          : "vacation/2024/beach.jpg",
  version_id   : "3HL4kqtJlcpXroDTDmJ+",  // random, lexicographically sortable
  size         : 4194304,                   // bytes
  checksum     : "sha256:abc123...",        // data integrity verification
  content_type : "image/jpeg",
  created_at   : 1704067200,               // epoch seconds
  chunk_ids    : ["c0","c1","c2","c3","c4","c5","c6","c7",  // 8 data chunks
                  "p0","p1","p2","p3"],                       // 4 parity chunks
  node_ids     : [42, 17, 91, 3, 77, 56, 28, 64,            // data nodes
                  5, 38, 19, 83],                              // parity nodes
  storage_class: "STANDARD",
  delete_marker: false
}</code></pre>
<p>Metadata store: Cassandra with <code>PRIMARY KEY (bucket, key, version_id)</code>. Latest version pointer maintained as a separate row. Fast O(1) lookup for all reads. Supports bucket listing via range scan on (bucket, key) prefix.</p>

<div class="step-badge">Step 3e — Versioning &amp; Storage Classes</div>
<p><strong>Versioning:</strong> Every PUT generates a new <code>version_id</code>. Metadata table retains all versions. <code>GET</code> returns latest by default; <code>GET?versionId=xyz</code> returns any historical version. DELETE creates a delete marker — the object is hidden from <code>GET</code> but recoverable. Lifecycle rules can automatically delete versions older than N days.</p>

<p><strong>Storage Classes (tiered cost model):</strong></p>
<table>
  <thead><tr><th>Class</th><th>Retrieval latency</th><th>Use case</th><th>Storage cost</th></tr></thead>
  <tbody>

<div class="step-badge">Step 3a — Exactly-Once Aggregation</div>
<p>Problem: Flink consumer crashes mid-window → on restart it re-reads Kafka events from last checkpoint → events already counted get counted again.</p>

<p><strong>Solution A — Bloom Filter Deduplication (for non-billing metrics):</strong></p>
<ul>
  <li>Each click event carries a unique <code>event_id</code> (generated by ad server at click time).</li>
  <li>Aggregator checks Redis bloom filter before counting: <code>BF.EXISTS dedup_filter {event_id}</code>.</li>
  <li>If not seen: count + add to bloom filter. If seen: skip.</li>
  <li>Bloom filter size: 864M events/day × 7 days × 10 bits/element ≈ 7.5 GB — fits in Redis memory.</li>
  <li>False positive rate: ~0.1% → ~864K missed events/day. Acceptable for impression counts; not for billing.</li>
</ul>

<p><strong>Solution B — Exact Deduplication (for billing-critical click counts):</strong></p>
<ul>
  <li><code>SADD dedup:exact:{date} {event_id}</code> — Redis set, exact membership test, zero false positives.</li>
  <li>Set expires after 7 days (TTL): <code>EXPIRE dedup:exact:{date} 604800</code>.</li>
  <li>Memory cost: 864M events × 16 bytes (UUID) × 7 days = ~96 GB. Use a Redis cluster.</li>
</ul>

<p><strong>Solution C — Flink Native Exactly-Once (cleanest):</strong></p>
<ul>
  <li>Flink's 2-phase commit (2PC) with Kafka source + ClickHouse sink.</li>
  <li>Flink checkpoints offset + in-flight aggregates atomically. On recovery, restores exactly the last committed state.</li>
  <li>Requires Kafka consumer + ClickHouse writer to both support the 2PC protocol. Flink's Kafka connector does this natively.</li>
</ul>

<div class="step-badge">Step 3b — Windowed Aggregation in Flink</div>
<pre><code>// Tumbling 1-minute window: count clicks per ad_id per minute
stream
  .keyBy(event -> event.adId)
  .window(TumblingEventTimeWindows.of(Time.minutes(1)))
  .aggregate(new ClickCountAggregator())
  .addSink(clickHouseSink);

// ClickCountAggregator produces:
// { ad_id, window_start, click_count, impression_count, total_spend }</code></pre>

<p><strong>Late data handling:</strong> Network delays cause events to arrive after their window closes. Flink uses a <em>watermark</em> — a timestamp threshold below which no more late data is expected. Configure a 2-minute watermark: accept events up to 2 minutes late; discard anything older. Late events within the watermark update the window result; a side output captures late discards for batch correction.</p>

<div class="step-badge">Step 3c — Aggregation Rollups</div>
<table>
  <thead><tr><th>Level</th><th>Retention</th><th>Computed by</th></tr></thead>

    <tr><td>1-hour</td><td>30 days</td><td>Spark (nightly rollup from 1-min)</td></tr>
    <tr><td>1-day</td><td>1 year</td><td>Spark (nightly rollup from 1-hour)</td></tr>
  </tbody>
</table>
<p>ClickHouse partitions data by date. Nightly Spark job reads yesterday's 1-minute rows → computes hourly and daily aggregates → inserts into ClickHouse. This overwrites the speed layer's results for finished days with accurate batch-computed values (the "lambda" correction).</p>

<div class="step-badge">Step 3d — Query API Design</div>
<pre><code>GET /api/v1/ads/{ad_id}/stats
  ?start=2024-01-15T00:00:00Z
  &amp;end=2024-01-15T23:59:59Z
  &amp;granularity=hour

Response:
{
  "ad_id": "12345",

    { "timestamp": "2024-01-15T00:00:00Z", "clicks": 1420, "impressions": 84300,
      "ctr": 0.0169, "spend": 213.00 },
    { "timestamp": "2024-01-15T01:00:00Z", "clicks": 893,  "impressions": 61200,
      "ctr": 0.0146, "spend": 133.95 },

  ]
}</code></pre>
<p>Query routing logic:</p>
<ul>
  <li>Time range ≤7 days AND minute granularity → real-time ClickHouse partition</li>

  cron_expr     VARCHAR(100),             -- NULL for one_time jobs
  next_run_at   DATETIME     NOT NULL,    -- when to next execute

  payload       JSON,                     -- arguments for the handler

  retry_count   TINYINT UNSIGNED DEFAULT 0,
  timeout_sec   INT UNSIGNED DEFAULT 300, -- kill job after 5 min default
  created_by    BIGINT,
  INDEX idx_scheduler (status, next_run_at)  -- the critical index for polling
);</code></pre>

<div class="step-badge">Step 3b — Distributed Claim with SELECT FOR UPDATE SKIP LOCKED</div>
<p>Multiple scheduler instances run concurrently for redundancy. Each runs this query every 10 seconds:</p>
<pre><code>-- MySQL 8+ / PostgreSQL 9.5+
BEGIN;
SELECT job_id, handler, payload, retry_count, timeout_sec
FROM jobs
WHERE status = 'PENDING'
  AND next_run_at &lt;= NOW()
ORDER BY next_run_at ASC
LIMIT 100
FOR UPDATE SKIP LOCKED;  -- skip rows locked by another scheduler instance

-- Mark claimed jobs as RUNNING
UPDATE jobs SET status = 'RUNNING', last_run_at = NOW()
WHERE job_id IN (...claimed ids...);
COMMIT;</code></pre>

<div class="callout insight">
  <div class="callout-icon">💡</div>
  <div class="callout-body"><strong>SKIP LOCKED: The Distributed Scheduler Trick</strong><br>
  <code>FOR UPDATE SKIP LOCKED</code> is available in MySQL 8+ and PostgreSQL 9.5+. When Scheduler A locks row 42, Scheduler B's query simply skips row 42 and claims the next available row — no waiting, no deadlock, no double-dispatch. Two scheduler instances can poll concurrently and each claims a disjoint set of jobs. No external coordination service (ZooKeeper, etcd) required.</div>
</div>

<div class="step-badge">Step 3c — Clock Skew &amp; Drift Handling</div>
<p>Scheduler instances on different machines may have clocks that differ by a few seconds:</p>
<ul>
  <li>A job scheduled for 12:00:00 may be picked up at 11:59:58 by a fast-clock scheduler (2 seconds early).</li>
  <li>Mitigation: NTP synchronization keeps drift under ±100ms in practice.</li>
  <li>For jobs requiring sub-second precision: use a single designated time source — one scheduler reads a Redis-stored timestamp updated by a time service, rather than local system clock.</li>
  <li>For most jobs (cron at 9am, batch at midnight): 60-second scheduling window makes clock skew irrelevant.</li>
</ul>

<div class="step-badge">Step 3d — Exactly-Once Execution via Idempotency</div>
<p>At-least-once execution is the default: if a worker crashes mid-job, the job retries and runs again. This is usually acceptable if job handlers are <strong>idempotent</strong>.</p>

<p><strong>Idempotency examples:</strong></p>
<ul>
  <li>✅ "Send welcome email to user 123" → Check <code>email_sent</code> flag in DB before sending. Safe to retry.</li>
  <li>✅ "Recompute daily report for 2024-01-15" → Overwrites same output. Safe to run multiple times.</li>
  <li>❌ "Charge $9.99 to card" → NOT idempotent by default. Requires idempotency key passed to payment processor.</li>
</ul>

<p><strong>Distributed lock for non-idempotent jobs (when truly needed):</strong></p>
<pre><code>-- Worker acquires lock before executing
acquired = SETNX job_lock:{job_id} {worker_id} EX 600   -- 10-min TTL

IF acquired:
  execute_job(job_id)
  DEL job_lock:{job_id}
ELSE:
  // Another worker is running this job — skip
  return SKIPPED</code></pre>
<p>If the worker crashes, the lock expires after 10 minutes → cleanup scheduler picks up the job and retries. The 10-minute TTL must exceed max expected job duration.</p>

<div class="step-badge">Step 3e — Retry Logic &amp; Dead-Letter Queue</div>
<p>On job failure, the Status Tracker updates the job for retry:</p>
<pre><code>backoff_seconds = [30, 300, 1800, 7200, 28800]  -- 30s, 5m, 30m, 2h, 8h

function on_failure(job):

    delay = backoff_seconds[job.retry_count]
    UPDATE jobs SET status='PENDING', retry_count=retry_count+1,
                    next_run_at=NOW() + delay
    WHERE job_id = job.job_id
  else:

    UPDATE jobs SET status='FAILED' WHERE job_id = job.job_id
    INSERT INTO dead_letter_jobs SELECT * FROM jobs WHERE job_id = job.job_id
    NOTIFY on_call_if_critical(job)</code></pre>
<p><strong>Dead-letter queue:</strong> Failed jobs accumulate here for manual inspection and replay. On-call alert when DLQ size grows beyond threshold. Operator can requeue individual jobs after fixing the underlying issue.</p>

</ul>

<div class="step-badge">Step 3a — Eviction Policies</div>
<p>When a node's memory is full, it must evict entries. Common policies:</p>
<ul>
  <li><strong>LRU (Least Recently Used):</strong> Evict the key that was accessed least recently. Best general-purpose policy. Redis implements an approximated LRU (samples 5 random keys, evicts the oldest) to avoid the overhead of a full sorted structure.</li>
  <li><strong>LFU (Least Frequently Used):</strong> Evict the key accessed fewest times. Better for skewed access patterns (protects hot keys).</li>
  <li><strong>TTL-first:</strong> Actively expire keys with the shortest remaining TTL. Redis runs a background thread that samples 20 random keys with TTLs every 100ms and deletes expired ones (lazy + active expiration combined).</li>
</ul>

<p>A single viral key (e.g., a celebrity's profile) can overwhelm one cache node with millions of QPS. Solutions:</p>
<ul>
  <li><strong>Local in-process cache:</strong> Client library keeps a small LRU cache (e.g., 1000 entries) in the application process itself. Hot keys are served from RAM without any network hop. Stale by up to a few hundred ms — acceptable for most use cases.</li>
  <li><strong>Key replication:</strong> Store hot keys as <code>key#0</code>, <code>key#1</code>, … <code>key#N</code> across N nodes. Client randomly picks one on read. Writes update all N replicas. Identifies hot keys via a frequency counter sampled by the client library.</li>

<p>Keeping cache consistent with the database is the hardest part of caching ("there are only two hard things in CS…"):</p>

  <li><strong>Write-through:</strong> Every DB write also writes to cache synchronously. Cache is always fresh, but adds write latency.</li>
  <li><strong>Write-behind (write-back):</strong> Writes go to cache first, async to DB. Lowest latency, but risk of data loss if the cache node crashes before flushing.</li>

<div class="step-badge">Step 3b — Double-Entry Ledger</div>
<p>All money movements are recorded as a pair of ledger entries that always sum to zero. This is standard accounting practice and mathematically guarantees consistency:</p>

  (txn_id, account='merchant_wallet', amount=+1900, currency='USD'),
