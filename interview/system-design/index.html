-- Invariant: SELECT SUM(amount) FROM ledger_entries = 0 (always)</code></pre>
<p>The ledger is <strong>append-only</strong>. Mistakes are corrected with reversals, never by updating rows. This creates a complete audit trail.</p>

  <li><strong>Query string normalization:</strong> <code>?v=1&lang=en</code> and <code>?lang=en&v=1</code> are the same content — sort query params before hashing the cache key.</li>

<p>The 2PB index is sharded across thousands of machines by term (term sharding) or by document range (document sharding). Document sharding is preferred — each shard answers a complete query for its document subset, then results are merged. This is how Google's index servers work.</p>

<div class="step-badge">Step 3b — Relevance Scoring: TF-IDF + PageRank</div>
<p>Two signals combined:</p>
<ul>
  <li><strong>TF-IDF (content relevance):</strong><br>

    <code>IDF(t)</code> = log(total_docs / docs_containing_t) — rare terms are more informative<br>
    <code>Score = TF × IDF</code> — high for documents where the query term is frequent but globally rare</li>
  <li><strong>PageRank (authority):</strong> Iterative graph algorithm. A page's rank = weighted sum of ranks of all pages linking to it. Pages with many high-authority inbound links (Wikipedia, BBC) get high PageRank. Computed offline with Spark over the link graph (10B nodes, ~100B edges). Takes days to converge — run weekly.</li>
  <li><strong>Final score</strong> = α × TF-IDF + β × PageRank + γ × (query-specific signals like click-through rate, freshness for news queries)</li>
</ul>

  <li><strong>URL Frontier:</strong> Priority queue of URLs to crawl (backed by a distributed queue like Kafka). Priority based on: PageRank (high-authority sites crawled more frequently), freshness signals (pages that change often), and recency since last crawl.</li>
  <li><strong>Politeness:</strong> Per-domain rate limiting — crawl each domain at most 1 request/second to avoid overloading websites. Per-domain queues stored in Redis with a scheduled release time.</li>
  <li><strong>robots.txt:</strong> Fetch and cache <code>robots.txt</code> for each domain. Respect Disallow rules — skip disallowed paths.</li>
  <li><strong>Deduplication:</strong> Before storing a crawled page, compute a SimHash of its content and check a distributed hash set (Redis Bloom Filter or HBase). If the content is near-duplicate of an already-indexed page, discard it — ~30% of the web is near-duplicate content.</li>
</ul>
`
      },
      {
        id: 'step4',
        title: 'Step 4 — Wrap Up',
        content: `
<p><strong>Key decisions summary:</strong></p>
<table>
  <thead><tr><th>Decision</th><th>Made</th><th>Alternative</th><th>Reason</th></tr></thead>
  <tbody>
    <tr><td>Index sharding</td><td>Document sharding</td><td>Term sharding</td><td>Each shard can answer a complete query; merge is simple top-K. Term sharding requires coordinating across N shards per term lookup</td></tr>
    <tr><td>Ranking</td><td>TF-IDF × PageRank (offline)</td><td>Pure ML ranking (BERT)</td><td>Offline pre-computed scores enable sub-ms per-doc scoring; ML re-ranking added on top-K candidates (100), not all candidates</td></tr>
    <tr><td>Deduplication</td><td>SimHash (near-duplicate detection)</td><td>Exact hash</td><td>Exact hash misses paraphrased content; SimHash catches near-duplicate pages that differ in boilerplate but share core content</td></tr>
    <tr><td>Crawl priority</td><td>Priority queue (PageRank + freshness)</td><td>BFS from seed URLs</td><td>BFS treats all pages equally; priority crawling ensures high-value pages are indexed first within the crawl budget</td></tr>
  </tbody>
</table>

<h3>If You Have Extra Time</h3>
<ul>
  <li><strong>Spell correction:</strong> "machien learning" → "machine learning". Use a noisy channel model (Bayesian): P(intended | typed) ∝ P(typed | intended) × P(intended). P(intended) comes from query frequency logs — common searches are likely to be correct spellings.</li>
  <li><strong>Personalization:</strong> Re-rank results based on the user's search history (searches in the past 30 days weighted by recency). Stored in a per-user profile. Controversial — many users now opt out.</li>
  <li><strong>Freshness for news:</strong> A separate "freshness index" stores pages crawled in the last 24 hours. When a query contains news signals (breaking, today, latest), merge results from the freshness index with the main index. The freshness index is smaller (few billion pages) and updated continuously via stream processing.</li>
</ul>
`
      }
    ]
  }
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let currentSystem = null;
let currentFilter = 'all';
let tocObserver   = null;
let scrollHandler = null;

// ─────────────────────────────────────────────────────────────────────────────
// HOME
// ─────────────────────────────────────────────────────────────────────────────
function renderHome() {
  const grid = document.getElementById('systemsGrid');
  grid.innerHTML = '';
  const filtered = SYSTEMS.filter(s => currentFilter === 'all' || s.difficulty === currentFilter);
  filtered.forEach(sys => {
    const card = document.createElement('a');
    card.className = 'sys-card';
    card.href = '#';
    card.setAttribute('data-id', sys.id);
    card.innerHTML = `
      <div class="card-icon">${sys.icon}</div>
      <div class="card-title">${sys.title}</div>
      <div class="card-meta">
        <span class="diff-badge diff-${sys.difficulty}">${sys.difficulty}</span>
        <span class="read-time">⏱ ${sys.readTime}</span>
      </div>
      <div class="card-teaser">${sys.teaser}</div>
    `;
    card.addEventListener('click', (e) => {
      e.preventDefault();
      showArticle(sys.id);
    });
    grid.appendChild(card);
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === f ||
      (f === 'all' && btn.textContent === 'All'));
  });
  renderHome();
}

function showHome() {
  document.getElementById('homeScreen').style.display  = '';
  document.getElementById('articleScreen').style.display = 'none';
  document.getElementById('progressBar').style.display  = 'none';
  document.getElementById('progressBar').style.width    = '0%';
  document.title = 'System Design Prep';
  window.scrollTo(0, 0);
  if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
  if (scrollHandler) { window.removeEventListener('scroll', scrollHandler); scrollHandler = null; }
  currentSystem = null;
}

// ─────────────────────────────────────────────────────────────────────────────
// ARTICLE
// ─────────────────────────────────────────────────────────────────────────────
function showArticle(systemId) {
  const sys = SYSTEMS.find(s => s.id === systemId);
  if (!sys) return;
  currentSystem = sys;

  document.getElementById('homeScreen').style.display    = 'none';
  document.getElementById('articleScreen').style.display = '';
  document.title = sys.title + ' — System Design';

  renderArticle(sys);
  window.scrollTo(0, 0);

  // Small delay to allow DOM paint before setting up observers
  requestAnimationFrame(() => {
    initTOC();
    initProgressBar();
  });
}

function renderArticle(sys) {
  // Meta
  const meta = document.getElementById('articleMeta');
  meta.innerHTML = `
    <div class="meta-icon">${sys.icon}</div>
    <div class="meta-info">
      <div class="meta-title">${sys.title}</div>
      <div class="meta-sub">
        <span class="diff-badge diff-${sys.difficulty}">${sys.difficulty}</span>
        <span class="read-time">⏱ ${sys.readTime}</span>
      </div>
    </div>
  `;

  // TOC
  const tocList  = document.getElementById('tocList');
  const tocTitle = document.getElementById('tocTitle');
  tocTitle.textContent = sys.title;
  tocList.innerHTML = '';
  sys.sections.forEach(sec => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="#${sec.id}" data-toc="${sec.id}">${sec.title}</a>`;
    li.querySelector('a').addEventListener('click', (e) => {
      e.preventDefault();
      const el = document.getElementById(sec.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    tocList.appendChild(li);
  });

  // Body
  const body = document.getElementById('articleBody');
  body.innerHTML = sys.sections.map(sec => `
    <h2 id="${sec.id}">${sec.title}</h2>
    ${sec.content}
  `).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// TOC — IntersectionObserver
// ─────────────────────────────────────────────────────────────────────────────
function initTOC() {
  if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }

  const headers = document.querySelectorAll('#articleBody h2');
  if (!headers.length) return;

  const tocLinks = document.querySelectorAll('#tocList a[data-toc]');

  // Track which section header is most visible in the viewport
  const sectionVisible = {};

  tocObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      sectionVisible[entry.target.id] = entry.isIntersecting;
    });
    // Find first visible section
    let activeId = null;
    headers.forEach(h => {
      if (sectionVisible[h.id] && !activeId) activeId = h.id;
    });
    // If none visible (scrolled past all), pick the last one
    if (!activeId && headers.length) {
      const scrollY = window.scrollY + window.innerHeight / 2;
      let best = headers[0];
      headers.forEach(h => {
        if (h.getBoundingClientRect().top + window.scrollY <= scrollY) best = h;
      });
      activeId = best.id;
    }
    tocLinks.forEach(a => {
      a.classList.toggle('active', a.getAttribute('data-toc') === activeId);
    });
  }, {
    rootMargin: '-10% 0px -70% 0px',
    threshold: 0
  });

  headers.forEach(h => tocObserver.observe(h));
}

// ─────────────────────────────────────────────────────────────────────────────
// PROGRESS BAR
// ─────────────────────────────────────────────────────────────────────────────
function initProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.style.display = 'block';
  bar.style.width   = '0%';

  if (scrollHandler) window.removeEventListener('scroll', scrollHandler);

  scrollHandler = () => {
    const docH    = document.documentElement.scrollHeight - window.innerHeight;
    const scrollY = window.scrollY;
    const pct     = docH > 0 ? Math.min(100, (scrollY / docH) * 100) : 0;
    bar.style.width = pct + '%';
  };

  window.addEventListener('scroll', scrollHandler, { passive: true });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
renderHome();
</script>
