<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: rgba(255,255,255,0.1);
  --acc: #00d4aa;
  --acc2: rgba(0,212,170,0.12);
  --acc3: rgba(0,212,170,0.22);
  --text: #e6edf3;
  --text2: rgba(230,237,243,0.65);
  --red: #f85149;
  --yellow: #e3b341;
  --green: #3fb950;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--acc); text-decoration: none; }
h1, h2, h3 { font-family: 'Fredoka One', sans-serif; letter-spacing: 0.3px; }

/* ── SHARED ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif;
  cursor: pointer; transition: all .15s;
}
.back-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--acc); }

/* ── HOME SCREEN ── */
#homeScreen { min-height: 100vh; }
.home { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
.home-header { text-align: center; margin: 28px 0 32px; }
.home-header h1 { font-size: clamp(28px, 5vw, 42px); color: var(--acc); margin-bottom: 8px; }
.home-header p { color: var(--text2); font-size: 15px; max-width: 500px; margin: 0 auto; }

.filter-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.filter-btn {
  padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg2); color: var(--text2); font-family: 'Nunito', sans-serif;
  font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s;
}
.filter-btn:hover { border-color: var(--acc); color: var(--text); }
.filter-btn.active { background: var(--acc); color: #000; border-color: var(--acc); }

.systems-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}
.sys-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; cursor: pointer; transition: all .2s; position: relative;
  display: flex; flex-direction: column; gap: 8px;
}
.sys-card:hover { border-color: var(--acc); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,170,0.15); }
.sys-card-top { display: flex; align-items: center; gap: 10px; }
.sys-icon { font-size: 28px; line-height: 1; }
.sys-meta { flex: 1; }
.sys-name { font-family: 'Fredoka One', sans-serif; font-size: 18px; color: var(--text); line-height: 1.2; }
.sys-badges { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.badge {
  font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-easy { background: rgba(63,185,80,0.18); color: var(--green); }
.badge-medium { background: rgba(227,179,65,0.18); color: var(--yellow); }
.badge-hard { background: rgba(248,81,73,0.18); color: var(--red); }
.badge-popular { background: var(--acc2); color: var(--acc); }
.sys-desc { color: var(--text2); font-size: 13px; line-height: 1.5; }
.sys-card-arrow { color: var(--acc); font-size: 18px; align-self: flex-end; margin-top: 4px; opacity: 0; transition: opacity .15s; }
.sys-card:hover .sys-card-arrow { opacity: 1; }

/* ── SESSION SCREEN ── */
#sessionScreen { min-height: 100vh; }
.session { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; }

.session-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap;
}
.session-back {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.session-back:hover { color: var(--text); border-color: var(--acc); }
.session-title {
  flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.session-title-icon { font-size: 24px; }
.session-title-name { font-family: 'Fredoka One', sans-serif; font-size: 22px; color: var(--text); }
.timer-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif;
  cursor: pointer; transition: all .15s; white-space: nowrap; letter-spacing: 0.5px;
}
.timer-btn:hover { border-color: var(--acc); color: var(--text); }
.timer-btn.running { border-color: var(--acc); color: var(--acc); background: var(--acc2); }

.problem-box {
  background: var(--bg2); border-left: 3px solid var(--acc);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 16px 18px; margin-bottom: 22px;
  color: var(--text2); font-size: 14px; line-height: 1.7;
  border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}

.phases-nav {
  display: flex; gap: 6px; margin-bottom: 20px;
  overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
  padding-bottom: 2px;
}
.phases-nav::-webkit-scrollbar { display: none; }
.phase-tab {
  flex-shrink: 0; padding: 8px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-family: 'Nunito', sans-serif;
  font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.phase-tab:hover { border-color: var(--acc); color: var(--text); }
.phase-tab.active { background: var(--acc); color: #000; border-color: var(--acc); }
.phase-tab.done { border-color: var(--green); color: var(--green); }
.phase-tab.done.active { background: var(--green); color: #000; border-color: var(--green); }

.phase-header { margin-bottom: 16px; }
.phase-title { font-family: 'Fredoka One', sans-serif; font-size: 20px; color: var(--text); }
.phase-subtitle { color: var(--text2); font-size: 13px; margin-top: 2px; }

.items-list { display: flex; flex-direction: column; gap: 12px; }
.item-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; transition: border-color .2s;
}
.item-card.checked { border-color: var(--green); background: rgba(63,185,80,0.05); }
.item-top {
  display: flex; align-items: flex-start; gap: 12px;
}
.item-checkbox {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
  flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; margin-top: 1px; background: transparent;
}
.item-card.checked .item-checkbox { background: var(--green); border-color: var(--green); }
.item-checkbox-mark { color: #000; font-size: 13px; font-weight: 900; display: none; }
.item-card.checked .item-checkbox-mark { display: block; }
.item-question { flex: 1; font-weight: 700; font-size: 14px; line-height: 1.5; color: var(--text); }
.item-reveal-btn {
  flex-shrink: 0; padding: 5px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text2); font-family: 'Nunito', sans-serif;
  font-weight: 700; font-size: 12px; cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.item-reveal-btn:hover { border-color: var(--acc); color: var(--acc); }

.item-reveal-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.item-reveal-body.visible { display: block; }
.item-why {
  font-style: italic; color: var(--text2); font-size: 13px;
  margin-bottom: 10px; padding-left: 10px; border-left: 2px solid var(--acc);
}
.item-model {
  background: var(--acc2); border: 1px solid var(--acc3);
  border-radius: 8px; padding: 12px 14px; font-size: 13px; line-height: 1.7; color: var(--text);
}

.phase-nav {
  display: flex; gap: 10px; margin-top: 24px; justify-content: space-between;
}
.nav-btn {
  padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg2); color: var(--text2); font-family: 'Nunito', sans-serif;
  font-weight: 700; font-size: 14px; cursor: pointer; transition: all .15s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--acc); color: var(--text); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-btn.primary { background: var(--acc); color: #000; border-color: var(--acc); }
.nav-btn.primary:hover:not(:disabled) { background: #00e8bc; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .systems-grid { grid-template-columns: 1fr; }
  .session-header { gap: 8px; }
  .session-title-name { font-size: 17px; }
  .phase-tab { padding: 7px 11px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen">
  <div class="home">
    <a class="back-btn" href="../../">&#8592; Home</a>
    <div class="home-header">
      <h1>&#127959; System Design Prep</h1>
      <p>Practice the real interview flow &mdash; clarify, estimate, design, dive deep</p>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('Easy')">Easy</button>
      <button class="filter-btn" onclick="setFilter('Medium')">Medium</button>
      <button class="filter-btn" onclick="setFilter('Hard')">Hard</button>
    </div>
    <div class="systems-grid" id="systemsGrid"></div>
  </div>
</div>

<!-- SESSION SCREEN -->
<div id="sessionScreen" style="display:none">
  <div class="session">
    <div class="session-header">
      <button class="session-back" onclick="showHome()">&#8592; Back</button>
      <div class="session-title" id="sessionTitle"></div>
      <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">&#9201; 00:00</button>
    </div>
    <div class="problem-box" id="problemBox"></div>
    <div class="phases-nav" id="phasesNav"></div>
    <div id="phaseContent"></div>
    <div class="phase-nav">
      <button class="nav-btn" id="prevPhaseBtn" onclick="changePhase(-1)">&#8592; Prev</button>
      <button class="nav-btn primary" id="nextPhaseBtn" onclick="changePhase(1)">Next &#8594;</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

var SYSTEMS = [
  {
    id: 'url-shortener',
    icon: '\u{1F517}',
    name: 'URL Shortener',
    difficulty: 'Easy',
    popular: true,
    desc: 'Design TinyURL \u2014 convert long URLs to short ones with redirect.',
    problem: 'Design a URL shortening service. Users paste a long URL and receive a short link (e.g. short.ly/abc123). Clicking the short link redirects to the original. The service must handle billions of URLs and millions of redirects per day.',
    phases: [
      {
        name: 'Requirements',
        items: [
          { q: 'What is the expected read:write ratio and daily scale?', why: 'Determines caching strategy \u2014 if reads dominate 10:1, aggressive caching is critical.', model: 'Assume 100M new URLs/day (writes) with 10:1 read ratio \u2192 ~1,160 writes/sec and ~11,600 reads/sec. Heavy read system \u2014 design a read-optimized cache layer.' },
          { q: 'Should shortened URLs expire, or are they permanent?', why: 'Affects schema (TTL column), storage sizing, and whether you need a background cleanup job.', model: 'Default permanent. Support optional TTL per URL. Background job sweeps expired rows using an index on expires_at.' },
          { q: 'Can users request custom aliases (e.g., bit.ly/my-promo)?', why: 'Adds collision detection complexity and may require auth to reserve named paths.', model: 'Yes. Check uniqueness before assignment. Conflict \u2192 409. No auth required for basic aliases but rate-limit creation per IP.' },
          { q: 'Do we need click analytics (count, geography, referrer)?', why: 'Dramatically increases write volume \u2014 must not block the redirect hot path.', model: 'Yes, but via async writes to a separate analytics store (ClickHouse or Cassandra). The redirect endpoint fires-and-forgets; never waits for analytics.' },
          { q: 'What are the latency and availability SLAs?', why: 'Forces concrete reliability discussion rather than vague "it should be fast."', model: 'Redirect latency <10ms P99. 99.9% availability. Eventual consistency OK for analytics; strong consistency for URL CRUD.' }
        ]
      },
      {
        name: 'Capacity',
        items: [
          { q: 'Calculate storage for 10 years.', why: 'Shows long-term growth thinking, not just today\'s numbers.', model: '100M/day \u00d7 365 \u00d7 10 = 365B rows. At ~500 bytes/row \u2192 ~182TB. Sharded relational DB or Cassandra handles this.' },
          { q: 'How long should the short key be?', why: 'Directly ties to algorithm choice \u2014 must support 365B unique IDs with room to spare.', model: '7 chars from [a-zA-Z0-9] = 62^7 \u2248 3.5 trillion. Handles 365B URLs with 10x headroom. Use Base62 encoding of a sequential counter.' },
          { q: 'What cache size covers the hot URLs?', why: 'Hot URLs follow 80/20 rule \u2014 caching 20% of daily URLs covers 80% of reads.', model: '20% of 100M = 20M URLs/day \u00d7 500 bytes = 10GB of hot data/day. A 20-30GB Redis node with LRU eviction handles this.' }
        ]
      },
      {
        name: 'Architecture',
        items: [
          { q: 'Describe the main components and data flow.', why: 'Tests ability to identify the minimal viable component set without over-engineering.', model: 'Client \u2192 LB \u2192 Stateless API servers \u2192 Redis cache \u2192 SQL DB. Write: generate ID \u2192 store URL \u2192 return key. Read: cache first, DB on miss, populate cache.' },
          { q: 'How do you generate the short key?', why: 'Core algorithm \u2014 multiple valid approaches, each with real trade-offs.', model: 'Option A (Counter + Base62): auto-increment ID encoded to Base62. No collisions. Use Snowflake-style distributed counter. Option B (Hash + truncate): MD5 first 7 chars. Risk of collision \u2192 retry loop. Prefer Option A.' },
          { q: 'HTTP 301 or 302 for redirection?', why: 'Browser caching behavior directly impacts analytics capability.', model: '301 (permanent): browser caches \u2192 lose analytics after first click. 302 (temporary): every click hits server \u2192 enables counting. Choose 302 when analytics matter.' }
        ]
      },
      {
        name: 'Deep Dive',
        items: [
          { q: 'How do you scale the DB to 182TB?', why: 'Shows you think beyond initial design to long-term growth.', model: 'Shard by short_key using consistent hashing. Read replicas per shard. Consider Cassandra which handles 182TB natively with tunable consistency.' },
          { q: 'How does the distributed counter work without a single bottleneck?', why: 'Naive single counter is a bottleneck \u2014 must be distributed.', model: 'Pre-allocate ranges to each server (server A: 1-1M, server B: 1M-2M). Server increments locally, requests new range from a range service (backed by ZooKeeper or Redis INCR) when exhausted.' },
          { q: 'How do you prevent spam and malware links?', why: 'Interviewers want to see you address the unhappy path.', model: 'Bloom filter for O(1) blocklist checks. Token bucket rate limiting by IP. Async scan via Google Safe Browsing API. User report \u2192 manual review queue.' }
        ]
      },
      {
        name: 'Wrap-up',
        items: [
          { q: 'What are the key failure modes?', why: 'Tests resilience thinking.', model: 'DB down: serve reads from cache in degraded mode. Cache down: reads hit DB \u2014 monitor for spike. Add circuit breaker on DB calls and rate limiting on cache-miss path to prevent cascading failures.' },
          { q: 'What metrics do you monitor?', why: 'Shows production-readiness thinking.', model: 'Redirect latency P50/P99/P999, cache hit rate (target >85%), DB replication lag, error rate per endpoint, top URLs by click volume for anomaly detection.' },
          { q: 'What improvements would you make with more time?', why: 'Shows awareness of trade-offs made.', model: 'Multi-region CDN for <5ms redirects globally. Link preview cards (OG metadata scraping). Custom branded domains. Real-time analytics dashboard.' }
        ]
      }
    ]
  },
  {
    id: 'rate-limiter',
    icon: '\u{1F6A6}',
    name: 'Rate Limiter',
    difficulty: 'Medium',
    popular: false,
    desc: 'Design a rate limiter to throttle API traffic by user, IP, or endpoint.',
    problem: 'Design a rate limiter middleware that can be used by any API service. It must reject requests that exceed a configurable threshold (e.g., 100 req/min per user) and work correctly across a distributed fleet of API servers.',
    phases: [
      {
        name: 'Requirements',
        items: [
          { q: 'Should rate limiting be based on user ID, IP, API key, or endpoint?', why: 'Different granularities require different key schemes in the storage layer.', model: 'All of the above, configured per rule. Key = prefix:identifier (e.g., "user:12345", "ip:1.2.3.4"). Rules specify limit and window per key type.' },
          { q: 'What algorithm \u2014 fixed window, sliding window, or token bucket?', why: 'Each algorithm has different memory usage and accuracy trade-offs.', model: 'Token bucket: smooth bursting, intuitive. Sliding window log: exact but memory-heavy. Sliding window counter: good accuracy at low memory. Fixed window: simple but burst problem at window boundary. Recommend sliding window counter for most cases.' },
          { q: 'Hard reject or soft throttle (queue requests)?', why: 'Queueing adds complexity and latency \u2014 usually hard reject with Retry-After header is better.', model: 'Hard reject with HTTP 429 and Retry-After header. Queueing is complex and shifts latency to client. Some APIs use "shed load" mode: accept then drop internally.' },
          { q: 'What consistency is required \u2014 is it OK to allow slightly more than the limit?', why: 'Strong consistency needs distributed locks; eventual consistency is much simpler.', model: 'Slight over-counting (5-10%) is usually acceptable. Use Redis atomic operations (INCR + EXPIRE) for eventual consistency. Avoids distributed locks entirely.' },
          { q: 'Should limits be configurable at runtime without restart?', why: 'Hardcoded limits require redeploy \u2014 operational burden.', model: 'Yes. Store rules in a config service (Redis or etcd). Servers poll every 30s or receive push updates. Zero-downtime rule changes.' }
        ]
      },
      {
        name: 'Capacity',
        items: [
          { q: 'How much memory does each rate limit counter use?', why: 'At millions of users, memory per counter matters.', model: 'Token bucket: 2 values (tokens, timestamp) per key. Sliding window counter: 2 integers per window. At 1M active users \u00d7 2 windows \u00d7 20 bytes \u2248 40MB. Trivial for Redis.' },
          { q: 'What is the latency budget for the rate limit check?', why: 'Rate limiting is on the hot path \u2014 every API request goes through it.', model: 'Budget <2ms per check. Redis EVALSHA (Lua script for atomic check+increment) typically <1ms on same-AZ Redis. Use connection pooling to avoid connection overhead.' }
        ]
      },
      {
        name: 'Architecture',
        items: [
          { q: 'Where does the rate limiter sit \u2014 client side, gateway, or application?', why: 'Placement determines what it can protect and the blast radius of failure.', model: 'API Gateway (recommended): single enforcement point, language-agnostic. Application middleware: more granular but duplicated logic. Client-side: trivially bypassed. Use gateway + application-level as defense in depth.' },
          { q: 'How does it work across multiple API servers?', why: 'Each server seeing only its own traffic would under-count by N servers.', model: 'Centralized Redis counter shared by all servers. Atomic Lua script: INCR key, set EXPIRE on first increment, check against limit. Returns allow/deny atomically.' },
          { q: 'What happens if Redis is down?', why: 'Rate limiter failure should not take down the API service.', model: 'Fail open (allow all requests) during Redis outage \u2014 better to let traffic through than to block everything. Alert on Redis unavailability. Consider local in-memory fallback with lower limits.' }
        ]
      },
      {
        name: 'Deep Dive',
        items: [
          { q: 'How do you implement the sliding window counter algorithm?', why: 'Core algorithm depth expected for this topic.', model: 'Divide time into fixed sub-windows (e.g., 1s sub-windows in a 60s window). Store count per sub-window in Redis hash. On request: sum counts in last 60s, compare to limit, increment current sub-window. Expire sub-windows older than window size.' },
          { q: 'How do you handle distributed rate limiting across data centers?', why: 'Multi-region setup means a user in EU and US could each get the full limit.', model: 'Local rate limiting per region (simple). Global rate limiting via cross-region Redis replication (added latency). Practical approach: regional limit \u00d7 num_regions with periodic global sync. Most products use per-region limits.' },
          { q: 'How do you prevent Redis from becoming a single point of failure?', why: 'Availability of rate limiter affects availability of entire API surface.', model: 'Redis Cluster with replication. Sentinel for automatic failover. Lua scripts ensure atomicity per shard. For ultra-high availability: Twemproxy or Envoy proxy in front of Redis cluster.' }
        ]
      },
      {
        name: 'Wrap-up',
        items: [
          { q: 'How do you handle sudden legitimate traffic spikes (e.g., viral event)?', why: 'Shows operational empathy \u2014 rigid limits can break good customers.', model: 'Burst allowance: token bucket naturally supports burst up to bucket size. Configurable "burst multiplier" per customer tier. Emergency override: ops can temporarily raise limits via config service.' },
          { q: 'What metrics do you monitor?', why: 'Proactive monitoring distinguishes good rate limiting from a black box.', model: 'Throttle rate per user/IP/endpoint, P99 Redis latency, Redis memory usage, rule evaluation errors, false positive reports (legitimate traffic blocked).' }
        ]
      }
    ]
  },
  {
    id: 'news-feed',
    icon: '\u{1F4F0}',
    name: 'News Feed',
    difficulty: 'Hard',
    popular: true,
    desc: 'Design Twitter/Instagram feed \u2014 generate and serve personalized timelines.',
    problem: 'Design the news feed system for a social platform. Users follow other users. When a user opens their app, they see a feed of posts from people they follow, sorted by recency (or ranked). The system must serve feeds to 500M daily active users with <200ms load time.',
    phases: [
      {
        name: 'Requirements',
        items: [
          { q: 'Is the feed chronological or ranked (ML-based)?', why: 'Ranking requires a feature store, model serving infrastructure \u2014 completely different complexity.', model: 'Start with chronological (simpler). Mention ranking as an extension: would need offline feature engineering, model training pipeline, and real-time scoring service.' },
          { q: 'What is the max fanout \u2014 how many followers can a user have?', why: 'High-follower accounts (celebrities) require fundamentally different write patterns.', model: 'Most users: <1,000 followers. Celebrities: millions. This necessitates a hybrid fanout strategy \u2014 different write paths for regular vs. high-follower accounts.' },
          { q: 'Should the feed be generated on write (push) or on read (pull)?', why: 'Core architectural decision with major performance trade-offs.', model: 'Push (fan-out on write): pre-compute feed on post creation. Fast reads, expensive writes for high-follower users. Pull (fan-out on read): compute feed on open. Cheap writes, expensive reads. Hybrid: push for most users, pull for celebrity posts.' },
          { q: 'What post types \u2014 text, images, videos, stories?', why: 'Media types require CDN integration and storage design beyond just text.', model: 'Start with text + images. Videos require transcoding pipeline and CDN. Stories have TTL (24h). Scope to text/image for initial design.' },
          { q: 'What are the read/write ratios and latency requirements?', why: 'Drives caching depth and acceptable consistency model.', model: 'Heavy read: 10B reads/day vs. 1B writes/day. Feed load <200ms P99. Posts: eventual consistency (minor lag acceptable). Feed: stale by seconds is fine.' }
        ]
      },
      {
        name: 'Capacity',
        items: [
          { q: 'Estimate storage for posts and feed cache.', why: 'Post storage and feed cache are separate \u2014 estimate both.', model: '500M users \u00d7 2 posts/day avg = 1B posts/day. At 1KB/post \u2192 1TB/day of post data, 365TB/year. Feed cache: store last 20 posts per user = 500M \u00d7 20 \u00d7 200 bytes \u2248 2TB. Distributed Redis cluster.' },
          { q: 'What is the fanout write amplification for a celebrity post?', why: 'A celebrity with 30M followers posting creates 30M cache writes \u2014 must be bounded.', model: '30M follower writes \u00d7 200 bytes = 6GB per celebrity post. At 10 celebrities posting simultaneously = 60GB write burst. Must throttle or batch-process celebrity fanouts asynchronously.' }
        ]

          { q: 'Walk through the video upload and processing pipeline.', why: 'Core system \u2014 needs to be detailed.', model: 'Client \u2192 upload to origin storage (S3 via presigned URL, chunked multipart) \u2192 upload complete event \u2192 Transcoding Job Queue (Kafka) \u2192 Transcoding Workers (EC2 fleet) pull jobs \u2192 produce N renditions \u2192 store in CDN-backed object store \u2192 update video metadata DB \u2192 notify client of processing completion.' },
          { q: 'How does adaptive bitrate streaming (ABR) work?', why: 'Core technical concept for smooth video playback.', model: 'Video chunked into 2-10s segments at each quality level. HLS or DASH manifest file lists all available segments and quality levels. Video player monitors download speed + buffer level \u2192 requests next segment at appropriate quality. Starts low, adapts up as bandwidth confirmed.' },
          { q: 'How is the CDN structured?', why: 'CDN architecture is what makes YouTube actually work at scale.', model: '3-tier: Origin (S3) \u2192 Edge Cache servers (PoPs globally) \u2192 Client. Video segments cached at edge near user. Cache key = video_id + resolution + segment_id. Popularity-weighted: top 20% of videos cached everywhere; long tail served from origin. Signed URLs for access control.' }
        ]
      },
      {
        name: 'Deep Dive',
        items: [
          { q: 'How does the transcoding pipeline scale to handle 30TB/day?', why: 'Transcoding is CPU-intensive \u2014 must parallelize effectively.', model: 'Each video split into segments (GOP-aligned, ~10s each). Each segment transcoded independently in parallel. Segment-level job queue \u2192 auto-scaling spot instance workers \u2192 results assembled into final video. 1-hour video = 360 segments processed in parallel in ~minutes.' },
          { q: 'How do you handle video deduplication and copyright detection?', why: 'Content ID (YouTube\'s system) is a core scaling challenge.', model: 'At upload: compute perceptual hash (fingerprint) of video \u2192 check against content ID database. On match: block + notify rights holder OR monetize for rights holder. Fingerprint DB is an ANN index (like FAISS) over video fingerprints. Near-duplicate detection for re-uploads.' },
          { q: 'How do you design the metadata storage?', why: 'Video metadata (title, description, likes, views) has different access patterns than video bytes.', model: 'Video metadata (immutable): MySQL with read replicas. View counts: Redis counter + async batch write to MySQL (avoid hot row problem). Comments: Cassandra (high write volume, time-ordered). Search index: Elasticsearch synced from MySQL via CDC.' }
        ]
      },
      {
        name: 'Wrap-up',
        items: [
          { q: 'What are the hardest operational challenges?', why: 'Shows real-world engineering empathy.', model: 'Transcoding failures: partial results from spot instance preemption. Fix: idempotent segment transcoding with checkpoint state. CDN cache poisoning: wrong video cached at wrong URL \u2192 immediate purge API. Storage costs: intelligent tiering \u2014 S3 Standard for hot videos, Glacier for long-tail.' },
          { q: 'How do you handle a viral video (10M views in 1 hour)?', why: 'Traffic spikes challenge CDN cache warming.', model: 'CDN handles most load once warmed. Problem: cache warming lag on first spike. Mitigation: predictive pre-warming for trending content (feed data from view velocity service). Origin protected by CDN but also needs rate limiting as last resort.' }
        ]
      }
    ]
  }
];

// ── STATE ──────────────────────────────────────────────────────────────────────

var currentSystem = null;
var currentPhase = 0;
var checkedItems = {};
var timerSeconds = 0;
var timerInterval = null;
var activeFilter = 'all';

// ── HOME ───────────────────────────────────────────────────────────────────────

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    var match = (f === 'all' && b.textContent === 'All') || b.textContent === f;
    b.classList.toggle('active', match);
  });
  renderSystemsGrid();
}

function renderSystemsGrid() {
  var grid = document.getElementById('systemsGrid');
  var filtered = activeFilter === 'all'
    ? SYSTEMS
    : SYSTEMS.filter(function(s) { return s.difficulty === activeFilter; });

  grid.innerHTML = filtered.map(function(sys) {
    var diffClass = 'badge-' + sys.difficulty.toLowerCase();
    var popularBadge = sys.popular ? '<span class="badge badge-popular">Popular</span>' : '';
    return '<div class="sys-card" onclick="showSession(\'' + sys.id + '\')">'
      + '<div class="sys-card-top">'
      + '<div class="sys-icon">' + sys.icon + '</div>'
      + '<div class="sys-meta">'
      + '<div class="sys-name">' + sys.name + '</div>'
      + '<div class="sys-badges"><span class="badge ' + diffClass + '">' + sys.difficulty + '</span>' + popularBadge + '</div>'
      + '</div></div>'
      + '<div class="sys-desc">' + sys.desc + '</div>'
      + '<div class="sys-card-arrow">\u2192</div>'
      + '</div>';
  }).join('');
}

// ── SESSION ────────────────────────────────────────────────────────────────────

function showHome() {
  stopTimer();
  currentSystem = null;
  currentPhase = 0;
  document.getElementById('homeScreen').style.display = '';
  document.getElementById('sessionScreen').style.display = 'none';
  window.scrollTo(0, 0);
}

function showSession(sysId) {
  var system = SYSTEMS.find(function(s) { return s.id === sysId; });
  if (!system) return;
  currentSystem = system;
  currentPhase = 0;
  timerSeconds = 0;
  stopTimer();

  if (!checkedItems[system.id]) {
    checkedItems[system.id] = {};
    system.phases.forEach(function(_, i) { checkedItems[system.id][i] = new Set(); });
  }

  var diffClass = 'badge-' + system.difficulty.toLowerCase();
  var popularBadge = system.popular ? '<span class="badge badge-popular">Popular</span>' : '';
  document.getElementById('sessionTitle').innerHTML =
    '<span class="session-title-icon">' + system.icon + '</span>'
    + '<span class="session-title-name">' + system.name + '</span>'
    + '<span class="badge ' + diffClass + '">' + system.difficulty + '</span>'
    + popularBadge;

  document.getElementById('problemBox').textContent = system.problem;
  document.getElementById('timerBtn').textContent = '\u23F1 00:00';
  document.getElementById('timerBtn').classList.remove('running');

  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('sessionScreen').style.display = '';

  renderPhaseTabs();
  renderPhase(0);
  window.scrollTo(0, 0);
}

function renderPhaseTabs() {
  var nav = document.getElementById('phasesNav');
  nav.innerHTML = currentSystem.phases.map(function(phase, i) {
    var done = isPhaseComplete(currentSystem.id, i);
    var active = i === currentPhase;
    var cls = 'phase-tab' + (active ? ' active' : '') + (done ? ' done' : '');
    var check = done ? ' \u2713' : '';
    return '<button class="' + cls + '" onclick="switchPhase(' + i + ')">' + phase.name + check + '</button>';
  }).join('');
}

function switchPhase(idx) {
  currentPhase = idx;
  renderPhaseTabs();
  renderPhase(idx);
  updateNavButtons();
}

var PHASE_SUBTITLES = [
  'Functional & non-functional requirements',
  'Storage, bandwidth & compute estimates',
  'High-level components & data flow',
  'Pick one component and go deep',
  'Trade-offs, failures & what you\'d improve'
];

function renderPhase(phaseIdx) {
  var phase = currentSystem.phases[phaseIdx];
  var sysId = currentSystem.id;
  var checked = checkedItems[sysId][phaseIdx];

  var itemsHtml = phase.items.map(function(item, itemIdx) {
    var isChecked = checked.has(itemIdx);
    var cardCls = 'item-card' + (isChecked ? ' checked' : '');
    return '<div class="' + cardCls + '" id="item-' + phaseIdx + '-' + itemIdx + '">'
      + '<div class="item-top">'
      + '<div class="item-checkbox" onclick="toggleItem(' + phaseIdx + ',' + itemIdx + ')">'
      + '<span class="item-checkbox-mark">\u2713</span></div>'
      + '<div class="item-question">' + esc(item.q) + '</div>'
      + '<button class="item-reveal-btn" onclick="toggleReveal(this,\'reveal-' + phaseIdx + '-' + itemIdx + '\')">Reveal \u25BC</button>'
      + '</div>'
      + '<div class="item-reveal-body" id="reveal-' + phaseIdx + '-' + itemIdx + '">'
      + '<div class="item-why">' + esc(item.why) + '</div>'
      + '<div class="item-model">' + esc(item.model) + '</div>'
      + '</div></div>';
  }).join('');

  document.getElementById('phaseContent').innerHTML =
    '<div class="phase-header">'
    + '<div class="phase-title">' + phase.name + '</div>'
    + '<div class="phase-subtitle">' + (PHASE_SUBTITLES[phaseIdx] || '') + '</div>'
    + '</div>'
    + '<div class="items-list">' + itemsHtml + '</div>';

  updateNavButtons();
}

function updateNavButtons() {
  var prev = document.getElementById('prevPhaseBtn');
  var next = document.getElementById('nextPhaseBtn');
  var total = currentSystem.phases.length;
  prev.disabled = (currentPhase === 0);
  next.textContent = (currentPhase === total - 1) ? 'Done \u2713' : 'Next \u2192';
  next.disabled = false;
}

function changePhase(delta) {
  var next = currentPhase + delta;
  if (next < 0) return;
  if (next >= currentSystem.phases.length) {
    showHome();
    return;
  }
  switchPhase(next);
  window.scrollTo(0, 0);
}

function toggleItem(phaseIdx, itemIdx) {
  var sysId = currentSystem.id;
  var s = checkedItems[sysId][phaseIdx];
  if (s.has(itemIdx)) { s.delete(itemIdx); } else { s.add(itemIdx); }
  var card = document.getElementById('item-' + phaseIdx + '-' + itemIdx);
  if (card) card.classList.toggle('checked', s.has(itemIdx));
  renderPhaseTabs();
}

function toggleReveal(btn, bodyId) {
  var bodyEl = document.getElementById(bodyId);
  if (!bodyEl) return;
  var visible = bodyEl.classList.toggle('visible');
  btn.textContent = visible ? 'Hide \u25B2' : 'Reveal \u25BC';
}

function isPhaseComplete(systemId, phaseIdx) {
  if (!checkedItems[systemId]) return false;
  var s = checkedItems[systemId][phaseIdx];
  var sys = SYSTEMS.find(function(x) { return x.id === systemId; });
  if (!sys) return false;
  var total = sys.phases[phaseIdx].items.length;
  return s && s.size === total;
}

// ── TIMER ──────────────────────────────────────────────────────────────────────

function toggleTimer() {
  if (timerInterval) { stopTimer(); } else { startTimer(); }
}

function startTimer() {
  var btn = document.getElementById('timerBtn');
  btn.classList.add('running');
  timerInterval = setInterval(function() {
    timerSeconds++;
    btn.textContent = '\u23F9 ' + formatTime(timerSeconds);
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  var btn = document.getElementById('timerBtn');
  if (btn) {
    btn.classList.remove('running');
    btn.textContent = (timerSeconds > 0 ? '\u23F1 ' + formatTime(timerSeconds) : '\u23F1 00:00');
  }
}

function formatTime(s) {
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

// ── UTIL ───────────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────────

renderSystemsGrid();
</script>
</body>
</html>
