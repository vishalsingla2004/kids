{ level:3, visual:'⚙️', question:'What is the Raft consensus algorithm used for?', options:['Achieving consensus by electing a leader who replicates log entries to followers in order','A conflict resolution algorithm for eventually consistent systems','A Byzantine fault-tolerant consensus protocol for untrusted nodes'], answer:'Achieving consensus by electing a leader who replicates log entries to followers in order', fact:'⚙️ Raft (Ongaro & Ousterhout, 2014) was designed to be more understandable than Paxos. Three roles: Leader, Follower, Candidate. Leader handles all writes, replicates to followers. On leader crash, random election timeouts prevent split votes. Used in etcd (Kubernetes), CockroachDB, TiKV.' },
{ level:3, visual:'🌍', question:'What is Google Spanner\'s key insight behind external consistency?', options:['Uses GPS/atomic clocks (TrueTime) to bound clock uncertainty to ~7ms, enabling globally consistent commits without locks','Routes all writes through a single global leader','Uses Paxos to agree on global commit order across all regions'], answer:'Uses GPS/atomic clocks (TrueTime) to bound clock uncertainty to ~7ms, enabling globally consistent commits without locks', fact:'🌍 TrueTime returns a confidence interval [earliest, latest]. Spanner commit-wait: wait until uncertainty passes before committing. This ensures timestamps are provably unique and monotonically increasing globally — linearizability across a planetary-scale database.' },
{ level:3, visual:'🧬', question:'What is a CRDT (Conflict-free Replicated Data Type)?', options:['A data structure with a merge operation that is commutative, associative, and idempotent — enabling automatic conflict resolution','A replicated database that resolves conflicts via last-writer-wins','A distributed locking mechanism that avoids write-write conflicts'], answer:'A data structure with a merge operation that is commutative, associative, and idempotent — enabling automatic conflict resolution', fact:'🧬 CRDTs enable collaborative apps without coordination. G-Counter: each node has its slot, total = sum of all slots. Two replicas with the same update set will always converge to identical state. Used in Figma, Apple Notes sync, Riak, Automerge.' },
{ level:3, visual:'🧠', question:'What is the split-brain problem in distributed systems?', options:['A network partition causes two node groups to each believe they are the only active cluster, risking divergent writes','A primary and replica hold conflicting row versions','Two microservices simultaneously update the same resource'], answer:'A network partition causes two node groups to each believe they are the only active cluster, risking divergent writes', fact:'🧠 Both partitions elect a leader → two "primaries" accept writes → data divergence. Prevention: require quorum (majority) to elect a leader. Fencing tokens prevent old leaders from writing after a new one is elected. ZooKeeper and etcd use quorum.' },
{ level:3, visual:'📐', question:'What is linearizability?', options:['Operations appear instantaneous and in real-time order, as if executing on a single machine','All nodes process operations in the same sequential order','Reads are allowed to return stale data within a bounded window'], answer:'Operations appear instantaneous and in real-time order, as if executing on a single machine', fact:'📐 Linearizability (Herlihy, 1990): if op A completes before op B starts, B sees A\'s effect. Stronger than serializability — which allows operations to appear in different real-time order. Linearizability + serializability = strict serializability (Google Spanner\'s guarantee).' },
{ level:3, visual:'🗺️', question:'What is the Paxos algorithm?', options:['Gets a majority of nodes to agree on a single value via two phases: prepare/promise then accept/accepted','A distributed locking protocol with monotonically increasing ballot numbers','A leader election algorithm tolerating up to f Byzantine faulty nodes'], answer:'Gets a majority of nodes to agree on a single value via two phases: prepare/promise then accept/accepted', fact:'🗺️ Phase 1a: Prepare (proposer sends ballot number). Phase 1b: Promise (acceptors promise to ignore lower ballots). Phase 2a: Accept (proposer sends value). Phase 2b: Accepted. Multi-Paxos elects a stable leader to skip Phase 1 for subsequent entries.' },
{ level:3, visual:'🦹', question:'What is Byzantine fault tolerance (BFT)?', options:['The system functions correctly even when some nodes send arbitrary/malicious incorrect messages','Tolerating crash failures where nodes go silent','Handling network partitions without data loss'], answer:'The system functions correctly even when some nodes send arbitrary/malicious incorrect messages', fact:'🦹 Crash fault tolerance (Raft/Paxos) assumes nodes fail silently (crash-only). BFT (PBFT, Castro & Liskov 1999) tolerates f malicious nodes with 3f+1 total nodes. Used in blockchains. Too expensive for trusted data centers — CFT suffices there.' },
{ level:3, visual:'🧩', question:'What is the key trade-off in the quorum formula W + R > N?', options:['Higher W+R ensures strong consistency but increases latency; lower W+R improves availability but risks stale reads','Higher N requires more nodes; lower N reduces fault tolerance','Increasing W improves read performance; increasing R improves write performance'], answer:'Higher W+R ensures strong consistency but increases latency; lower W+R improves availability but risks stale reads', fact:'🧩 N=3, W=3, R=1: every write goes to all 3 (slow writes, fast reads). N=3, W=1, R=3: fast writes, slow reads. N=3, W=2, R=2: balanced. Dynamo lets you tune per-operation. W+R > N guarantees overlap between write and read sets.' },
{ level:3, visual:'⏱️', question:'What problem does Lamport\'s logical clock solve?', options:['Provides a total ordering of events in a distributed system where physical clocks are not synchronized','Synchronizes physical clocks across nodes to nanosecond precision','Detects causality violations in distributed transactions'], answer:'Provides a total ordering of events in a distributed system where physical clocks are not synchronized', fact:'⏱️ Lamport clocks: on send, increment counter. On receive, take max(local, received)+1. If A happened-before B, L(A) < L(B). But not the converse! Vector clocks (extension) capture full causality. Foundation of distributed event ordering theory.' },
{ level:3, visual:'🆚', question:'What is the difference between serializability and linearizability?', options:['Serializability is an isolation property for transactions; linearizability is a consistency property for single operations','Serializability is stronger than linearizability','Serializability applies to distributed systems; linearizability applies to single machines'], answer:'Serializability is an isolation property for transactions; linearizability is a consistency property for single operations', fact:'🆚 Serializability: concurrent transactions produce results equivalent to some serial execution (ignores real-time order). Linearizability: single operations appear instantaneous at some point in real time. Postgres "serializable" isolation doesn\'t imply linearizability.' },
{ level:3, visual:'🪙', question:'What is a fencing token and why is it needed for distributed locks?', options:['A monotonically increasing number issued with a lock; storage layers reject requests from old lock holders carrying lower tokens','A cryptographic token authenticating service-to-service communication','A timeout value determining when a distributed lock expires'], answer:'A monotonically increasing number issued with a lock; storage layers reject requests from old lock holders carrying lower tokens', fact:'🪙 Lock holder crashes, lock expires (token=40), new leader gets token=42. Old leader wakes up and tries to write with token=40. Storage rejects it (40 < 42). Without fencing tokens, stale nodes corrupt data even with timeouts. Martin Kleppmann\'s critique of Redlock revolves around this.' },
{ level:3, visual:'📋', question:'What is the write skew anomaly in database transactions?', options:['Two concurrent transactions read overlapping data and each writes to different rows, violating a constraint together','A transaction writes data already committed by another (dirty write)','Reading a row shows data from a transaction that was later rolled back'], answer:'Two concurrent transactions read overlapping data and each writes to different rows, violating a constraint together', fact:'📋 Doctor on-call: two doctors read "2 doctors on call" → both decide they can go off call → both update their own row → 0 doctors on call. Not prevented by snapshot isolation. Requires serializable isolation (Postgres SSI) or explicit SELECT FOR UPDATE.' },
{ level:3, visual:'🗜️', question:'What is Kafka log compaction?', options:['Retaining only the latest value per key in a topic, discarding older values for the same key','Compressing message payloads using LZ4','Merging topic partitions to reduce storage'], answer:'Retaining only the latest value per key in a topic, discarding older values for the same key', fact:'🗜️ Normal Kafka topics delete after retention period. Compacted topics keep the last value per key forever. A null value = tombstone (deletes the key). Kafka Streams state stores use compaction. Safe to rebuild database snapshots from compacted topics.' },
{ level:3, visual:'🌐', question:'What is the Chord distributed hash table (DHT)?', options:['A P2P lookup protocol where each node knows O(log n) nodes and lookups take O(log n) hops','A consistent hashing ring with full membership on every node','A hash table using chaining to resolve collisions in a distributed cluster'], answer:'A P2P lookup protocol where each node knows O(log n) nodes and lookups take O(log n) hops', fact:'🌐 Chord assigns keys and nodes to a ring. Each node maintains a "finger table" pointing to exponentially distant successors. Foundation for Kademlia (used in BitTorrent DHT, Ethereum node discovery, IPFS).' },
{ level:3, visual:'🔮', question:'What is Serializable Snapshot Isolation (SSI) and how does it differ from standard snapshot isolation?', options:['SSI detects serialization anomalies at runtime and aborts conflicting transactions; standard SI allows write skew','SSI uses row-level locks; standard SI uses table-level locks','SSI is for distributed databases; standard SI is for single-node databases'], answer:'SSI detects serialization anomalies at runtime and aborts conflicting transactions; standard SI allows write skew', fact:'🔮 PostgreSQL 9.1+ implements SSI: tracks read-write dependencies between transactions to detect serialization cycles (write skew, phantom reads). Non-blocking and much faster than 2PL under moderate contention. Best isolation level for correctness + performance.' },
{ level:3, visual:'🌊', question:'What is Google\'s Bigtable data model?', options:['A sparse, distributed, multi-dimensional sorted map indexed by (row, column family, column qualifier, timestamp)','A relational table with strong ACID guarantees','A document store where each row is a JSON object'], answer:'A sparse, distributed, multi-dimensional sorted map indexed by (row, column family, column qualifier, timestamp)', fact:'🌊 Bigtable: (row_key, column_family:qualifier, timestamp) → value. Row key determines auto-sharding. Multiple timestamps per cell enable time-travel queries. HBase, Cassandra, and Accumulo are Bigtable-inspired. Cassandra adds Dynamo-style leaderless replication.' },
{ level:3, visual:'🧲', question:'What is the phantom read anomaly and which isolation levels prevent it?', options:['Re-executing a range query returns a different set of rows due to another transaction\'s inserts; prevented by serializable isolation','Reading uncommitted data from another transaction; prevented by read committed','Two transactions reading and updating the same row; prevented by repeatable read'], answer:'Re-executing a range query returns a different set of rows due to another transaction\'s inserts; prevented by serializable isolation', fact:'🧲 Repeatable read prevents reading a single row with different values but doesn\'t prevent new rows appearing in range queries. Phantom reads require serializable isolation (predicate locks or SSI). Can lead to write skew in business logic.' },
{ level:3, visual:'⚡', question:'What is Kafka\'s exactly-once semantics and how is it achieved?', options:['Idempotent producers (deduplication by sequence number) + transactional API (atomic read-process-write across partitions)','Committing consumer offsets atomically with the processed result','Synchronous replication to all replicas before acknowledging a write'], answer:'Idempotent producers (deduplication by sequence number) + transactional API (atomic read-process-write across partitions)', fact:'⚡ Idempotent producer: broker deduplicates by (producer_id, sequence_number). Transactional producer: atomically writes to multiple partitions + commits consumer offsets in one transaction. Kafka Streams uses this. Cost: ~20% throughput reduction vs. at-least-once.' },
{ level:3, visual:'📯', question:'What was the key insight of the Amazon Dynamo paper?', options:['Always-writable: Amazon chose to always accept writes during failures, resolving conflicts at read time via application logic','Amazon chose strong consistency because data inconsistency is unacceptable for e-commerce','Amazon solved consistency with 2PC and a distributed coordinator'], answer:'Always-writable: Amazon chose to always accept writes during failures, resolving conflicts at read time via application logic', fact:'📯 Adding an item to a cart should NEVER fail, even if 2 of 3 replicas are down. Result: occasional duplicate cart items, resolved by union merge at read time. Availability > Consistency for this use case. This shaped the entire NoSQL movement.' },
{ level:3, visual:'🌲', question:'What is a Merkle tree and how is it used in distributed systems?', options:['A hash tree where parent nodes are hashes of children, enabling O(log n) inconsistency detection between replicas','A B-tree variant used in LSM storage for efficient key lookups','A distributed consensus tree where each level represents a voting round'], answer:'A hash tree where parent nodes are hashes of children, enabling O(log n) inconsistency detection between replicas', fact:'🌲 Dynamo uses Merkle trees for anti-entropy sync. Compare root hashes; if different, recurse to find the divergent subtrees without transferring all data. Bitcoin uses Merkle trees for transaction integrity in blocks. Git object store is a Merkle DAG.' },
{ level:3, visual:'🎭', question:'What is operational transformation (OT) in collaborative editing?', options:['Automatically resolving conflicts by transforming operations against concurrent edits so all clients converge','A performance optimization transforming queries into more efficient execution plans','A pattern converting synchronous calls to async event-driven operations'], answer:'Automatically resolving conflicts by transforming operations against concurrent edits so all clients converge', fact:'🎭 Google Docs uses OT. User A inserts "X" at position 5, User B deletes char at position 3 simultaneously. Apply A to B\'s state: position must adjust from 5 to 4. OT transforms operations so both users converge. CRDTs are a simpler alternative.' },
{ level:3, visual:'🌊', question:'What is a watermark in Apache Flink stream processing?', options:['A timestamp telling the system that all events with earlier timestamps have likely arrived, enabling window completion','A rate limit controlling how fast events enter the pipeline','A checkpoint marker allowing a streaming job to resume after failure'], answer:'A timestamp telling the system that all events with earlier timestamps have likely arrived, enabling window completion', fact:'🌊 Events arrive late due to network delays. Watermark = max_event_time − late_tolerance. Flink closes time windows based on watermarks, not wall clock. Barriers (Chandy-Lamport style) flow through the data stream for exactly-once checkpointing.' },
{ level:3, visual:'🧮', question:'What is a Hybrid Logical Clock (HLC) used in CockroachDB?', options:['Combines physical time with a logical counter to provide unique, causally ordered timestamps close to wall clock time','A two-phase clock using NTP for coarse sync and PTP for fine-grained precision','A timestamp generated by hashing current time with a node ID'], answer:'Combines physical time with a logical counter to provide unique, causally ordered timestamps close to wall clock time', fact:'🧮 HLC (Kulkarni et al., 2014): maintains (physical_time, logical_counter). Advances physical time on each event; uses logical counter only when physical hasn\'t advanced. Close to wall clock (unlike pure Lamport). CockroachDB uses HLC for external consistency without TrueTime hardware.' },
{ level:3, visual:'🔗', question:'What is the difference between CFT and BFT in terms of nodes required?', options:['CFT needs 2f+1 nodes to tolerate f crash failures; BFT needs 3f+1 nodes to tolerate f Byzantine failures','CFT needs 3f+1; BFT needs 2f+1 nodes','CFT and BFT both need 2f+1 nodes but BFT requires cryptographic signatures'], answer:'CFT needs 2f+1 nodes to tolerate f crash failures; BFT needs 3f+1 nodes to tolerate f Byzantine failures', fact:'🔗 With f=1: CFT needs 3 nodes (Raft). BFT needs 4 nodes (PBFT). The extra node compensates for Byzantine nodes voting both ways. BFT is used in blockchains and aerospace. Data center environments trust nodes (crash-only), so CFT is sufficient.' },
{ level:3, visual:'🔄', question:'What is the read repair mechanism in eventually consistent databases?', options:['When a quorum read detects inconsistency between replicas, the coordinator writes the latest value to stale replicas','A background process that periodically checks all replicas for consistency','A mechanism routing reads to the most up-to-date replica'], answer:'When a quorum read detects inconsistency between replicas, the coordinator writes the latest value to stale replicas', fact:'🔄 Cassandra and Dynamo: read from W replicas, compare values. If inconsistent, write latest value back to stale replicas. This passively heals inconsistency over time without a dedicated background job. Configurable: eager (every read) vs. probabilistic.' },
{ level:3, visual:'🧱', question:'What is LSM tree compaction and what problem does it solve?', options:['Merging multiple SSTable files into fewer, larger files to improve read performance and reclaim deleted space','Cleaning expired entries in an in-memory cache','Rebuilding B-tree indexes after heavy write workloads'], answer:'Merging multiple SSTable files into fewer, larger files to improve read performance and reclaim deleted space', fact:'🧱 LSM writes land in a memtable (RAM), then flush to SSTables (disk). Without compaction, reads must check many SSTables (amplified reads). Compaction merges them, removing deleted/overwritten entries. RocksDB uses level compaction; Cassandra uses size-tiered.' },
{ level:3, visual:'⚔️', question:'What is the difference between active-passive and active-active database replication?', options:['Active-passive: one primary handles writes, standby takes over on failure; Active-active: multiple nodes handle writes simultaneously','Active-passive is synchronous; active-active is asynchronous','Active-passive is for reads; active-active is for writes'], answer:'Active-passive: one primary handles writes, standby takes over on failure; Active-active: multiple nodes handle writes simultaneously', fact:'⚔️ Active-passive (MySQL + one primary): simple, no conflict resolution needed. Active-active (Cassandra, CockroachDB, Spanner): all nodes accept writes. Spanner uses TrueTime to order commits. CockroachDB uses HLC. Higher write throughput, but conflicts require resolution.' },
{ level:3, visual:'🏗️', question:'What is the two-phase commit protocol\'s fundamental blocking problem?', options:['Participants hold locks indefinitely if the coordinator crashes between prepare and commit','It requires synchronous writes to all participants, causing high latency','It can only commit if all participants respond, requiring 100% uptime'], answer:'Participants hold locks indefinitely if the coordinator crashes between prepare and commit', fact:'🏗️ 2PC participants hold locks from prepare until commit/abort. If coordinator crashes, they wait forever (or heuristically abort, risking inconsistency). 3PC adds a pre-commit phase but doesn\'t handle partitions. Spanner uses Paxos groups as coordinators. Microservices use Saga.' },
{ level:3, visual:'📊', question:'What is the key trade-off when designing for idempotency at scale in payment systems?', options:['Idempotency records must be stored durably, and the entire payment flow must be atomic with the idempotency record to prevent double charges','Idempotency is achieved purely by deduplicating at the message queue level using message IDs','Idempotency requires synchronous 2PC between payment service and idempotency store'], answer:'Idempotency records must be stored durably, and the entire payment flow must be atomic with the idempotency record to prevent double charges', fact:'📊 The hard part: atomically writing (idempotency_key=X → completed) AND charging the user. If charge succeeds but writing the idempotency record fails → retry charges twice. Solution: write idempotency record in the same DB transaction as the payment record.' },
{ level:3, visual:'🌀', question:'What is strong eventual consistency (SEC) and how do CRDTs provide it?', options:['Replicas that have seen the same update set will always be in identical state regardless of delivery order, guaranteed by commutative/associative/idempotent merge','Replicas converge eventually via conflict resolution arbitration','SEC requires quorum reads; regular eventual consistency does not'], answer:'Replicas that have seen the same update set will always be in identical state regardless of delivery order, guaranteed by commutative/associative/idempotent merge', fact:'🌀 SEC (Shapiro et al., 2011) is the property CRDTs provide. Unlike regular eventual consistency (which might need conflict resolution), CRDTs always converge by design. Any two replicas that received the same updates will be identical — ordering doesn\'t matter.' },
{ level:3, visual:'🚨', question:'What is the Chandy-Lamport distributed snapshot algorithm?', options:['Captures a consistent global state of a distributed computation without stopping it by injecting markers into the message stream','Takes a point-in-time backup of a distributed database without downtime','Saves Kafka consumer offset states simultaneously across all partitions'], answer:'Captures a consistent global state of a distributed computation without stopping it by injecting markers into the message stream', fact:'🚨 Chandy-Lamport (1985): initiator sends "barrier" markers on all outgoing channels, records its local state. Apache Flink\'s exactly-once checkpointing is based on this: barriers flow through the data stream; operators checkpoint when all input barriers arrive.' },
{ level:3, visual:'🏛️', question:'What is the lost update problem and how is it prevented?', options:['Two concurrent transactions read the same value, both modify it, and one\'s update overwrites the other; prevented by atomic increments or SELECT FOR UPDATE','A write is lost because the WAL was truncated before applying; prevented by durable WAL commits','An update is lost because the cache is invalidated before being read; prevented by cache-aside'], answer:'Two concurrent transactions read the same value, both modify it, and one\'s update overwrites the other; prevented by atomic increments or SELECT FOR UPDATE', fact:'🏛️ User A reads $100, adds $50. User B reads $100, adds $30. B commits $130, overwriting A\'s $150. Fix: UPDATE balance = balance + 50 (atomic), SELECT FOR UPDATE (pessimistic), or version-checked OCC. MySQL serializable and Postgres repeatable read prevent this.' },
{ level:3, visual:'🎯', question:'What is Raft\'s safety guarantee for leader election?', options:['Only nodes with up-to-date logs can be elected leader — candidates must have a log at least as current as the voter\'s log','Any node can become leader and will catch up by downloading missing entries','The leader with the highest node ID always wins elections'], answer:'Only nodes with up-to-date logs can be elected leader — candidates must have a log at least as current as the voter\'s log', fact:'🎯 Raft\'s Leader Completeness: every committed entry appears in all future leaders\' logs. A candidate must have a log at least as up-to-date as the voter (higher term OR same term + longer). This prevents electing a leader missing committed entries — a key safety property.' },
{ level:3, visual:'💎', question:'What is the key difference between CockroachDB and Google Spanner?', options:['CockroachDB uses Hybrid Logical Clocks and is open-source; Spanner uses TrueTime hardware and is proprietary/GCP-only','CockroachDB is eventually consistent; Spanner provides strong consistency','CockroachDB uses Raft per-row; Spanner uses Paxos per-shard'], answer:'CockroachDB uses Hybrid Logical Clocks and is open-source; Spanner uses TrueTime hardware and is proprietary/GCP-only', fact:'💎 Both provide serializable distributed SQL. Spanner: TrueTime (GPS/atomic clocks, bounded uncertainty) + commit-wait → external consistency. CockroachDB: HLC (software-only) → serializability but not external consistency. CockroachDB is open-source and runs anywhere.' },
{ level:3, visual:'🔢', question:'What is consistent prefix reads consistency guarantee?', options:['If writes happened in order, any read will see either nothing or those writes in that order — never out of order','Reads never return stale data — only the latest committed write','Reads return monotonically newer data over time'], answer:'If writes happened in order, any read will see either nothing or those writes in that order — never out of order', fact:'🔢 Violation: User A writes "How are you?" then "Fine, thanks." User B reads "Fine, thanks" before "How are you?" due to replication lag on different shards. Consistent prefix reads prevent this. MongoDB and Spanner provide this guarantee.' },
{ level:3, visual:'🧠', question:'What is the probabilistic early expiry (XFetch) solution to cache stampede?', options:['Near expiry, randomly expire the cache entry earlier (proportional to time-to-expiry) to spread recomputation over time','Throttle requests to the cache to prevent overload when TTL approaches','Queue all requests to a cache key so only one request fetches from DB at a time'], answer:'Near expiry, randomly expire the cache entry earlier (proportional to time-to-expiry) to spread recomputation over time', fact:'🧠 XFetch algorithm (Vattani et al.): cache_miss_time − now > TTL_remaining × β × log(random()). With β=1, approximates optimal early expiration without distributed locks. Prevents synchronized expiry storms. Alternative: background async refresh (serve stale, refresh in background).' },
];

const QUIZ_KEY = 'kids_q_sysdesign';
const POINTS_KEY = 'kids_points';
function getPoints(){return parseInt(localStorage.getItem(POINTS_KEY)||'0');}
function addPoints(n){const today=new Date().toISOString().slice(0,10);const d=localStorage.getItem('kids_pts_date');let todayTotal=d===today?parseInt(localStorage.getItem('kids_pts_today')||'0'):0;const add=Math.min(n,100-todayTotal);if(add<=0)return;localStorage.setItem(POINTS_KEY,getPoints()+add);localStorage.setItem('kids_pts_date',today);localStorage.setItem('kids_pts_today',todayTotal+add);}
function updatePtsDisplay(){const el=document.getElementById('ptsDisplay');if(el)el.textContent='⭐ '+getPoints();}
let current = 0, score = 0, dotResults = [], sessionQ = [];
let sessionAnswers=[],sessionShuffled=[],viewingIdx=null;
let audioCtx = null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function note(ctx,type,freq,time,dur,vol){const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;gn.gain.setValueAtTime(0.001,time);gn.gain.linearRampToValueAtTime(vol,time+0.015);gn.gain.exponentialRampToValueAtTime(0.001,time+dur);osc.start(time);osc.stop(time+dur+0.06);}
function playCorrect(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[1047,1319,1568,2093,1568,1319].forEach((f,i)=>note(ctx,'triangle',f,t+i*0.07,0.14,0.5));[[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur])=>{note(ctx,'triangle',f,t+d,dur,0.55);note(ctx,'sine',f*2,t+d,dur*0.5,0.14);});});}
function playWrong(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay])=>{const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(f1,t+delay);osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);gn.gain.setValueAtTime(0.001,t+delay);gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02);gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);osc.start(t+delay);osc.stop(t+delay+0.3);});});}
function playLevelUp(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d])=>note(ctx,'triangle',f,t+d,0.25,0.45));note(ctx,'sine',1047,t+0.84,0.8,0.3);note(ctx,'sine',1319,t+0.90,0.7,0.25);note(ctx,'sine',1568,t+0.96,0.6,0.2);});}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function updateNavArrows(){const p=document.getElementById('navPrev'),n=document.getElementById('navNext');if(!p)return;const idx=viewingIdx!==null?viewingIdx:current;p.style.display=idx>0?'flex':'none';n.style.display=(viewingIdx!==null&&viewingIdx<current)?'flex':'none';}
function navBack(){const idx=viewingIdx!==null?viewingIdx:current;if(idx>0)showPastQuestion(idx-1);}
function navForward(){if(viewingIdx===null)return;if(viewingIdx<current-1)showPastQuestion(viewingIdx+1);else{viewingIdx=null;showQuestion();}}
function showPastQuestion(idx){viewingIdx=idx;const q=sessionQ[idx];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}document.getElementById('visualCard').innerHTML='<span class="visual-emoji">'+q.visual+'</span>';document.getElementById('questionText').textContent=q.question;const shuffled=sessionShuffled[idx]||[...q.options];const chosen=sessionAnswers[idx];const correct=q.answer;const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const opt=shuffled[i];const btn=document.createElement('button');btn.className='choice-btn';btn.disabled=true;btn.style.cursor='default';if(opt===correct)btn.classList.add('correct');if(opt===chosen&&opt!==correct)btn.classList.add('wrong');btn.innerHTML='<span class="choice-letter">'+letter+'</span>'+opt;choicesEl.appendChild(btn);});const rb=document.getElementById('reviewBanner');if(rb){rb.style.display='';rb.textContent=dotResults[idx]==='correct'?'✅ Q'+(idx+1)+' · Correct':'❌ Q'+(idx+1)+' · Incorrect';}document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();}
function init(){current=0;score=0;dotResults=Array(15).fill(null);sessionAnswers=Array(15).fill(null);sessionShuffled=Array(15).fill(null);viewingIdx=null;sessionQ=pickSession();buildDots();showQuestion();updatePtsDisplay();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDots(){const c=document.getElementById('progressDots');c.innerHTML='';sessionQ.forEach((q,i)=>{const cls=q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';const d=document.createElement('div');d.className='dot '+cls+(i===0?' current':'');d.id='dot-'+i;c.appendChild(d);});}
function updateDot(idx,result){const d=document.getElementById('dot-'+idx);if(!d)return;d.classList.remove('current');d.classList.add('answered',result==='correct'?'correct-dot':'wrong-dot');const next=document.getElementById('dot-'+(idx+1));if(next)next.classList.add('current');}
function showQuestion(){viewingIdx=null;const rb=document.getElementById('reviewBanner');if(rb)rb.style.display='none';const q=sessionQ[current];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}document.getElementById('progressFill').style.width=(current/15*100)+'%';document.getElementById('score').textContent=score;document.getElementById('visualCard').innerHTML='<span class="visual-emoji">'+q.visual+'</span>';document.getElementById('questionText').textContent=q.question;const shuffled=shuffle([...q.options]);sessionShuffled[current]=shuffled;const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const btn=document.createElement('button');btn.className='choice-btn';btn.dataset.value=shuffled[i];btn.innerHTML='<span class="choice-letter">'+letter+'</span>'+shuffled[i];btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx);choicesEl.appendChild(btn);});document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();}
function handleAnswer(chosen,correct,btn,fact,qIdx){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);const isCorrect=chosen===correct;sessionAnswers[current]=chosen;if(isCorrect){score++;markMastered(qIdx);btn.classList.add('correct');dotResults[current]='correct';updateDot(current,'correct');document.getElementById('score').textContent=score;playCorrect();spawnConfetti(30);}else{btn.classList.add('wrong');dotResults[current]='wrong';updateDot(current,'wrong');document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});document.getElementById('gameScreen').classList.add('shake');playWrong();}setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);}
let feedbackTimer=null,feedbackRafId=null;
function dismissFeedback(){cancelAnimationFrame(feedbackRafId);clearTimeout(feedbackTimer);const overlay=document.getElementById('feedbackOverlay');const b=document.getElementById('feedbackBox');b.style.animation='slideUp 0.35s ease forwards';overlay.classList.add('dismiss');overlay.classList.remove('clickable');setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);}
function showFeedback(isCorrect,fact,chosen,correct){clearTimeout(feedbackTimer);cancelAnimationFrame(feedbackRafId);const overlay=document.getElementById('feedbackOverlay'),box=document.getElementById('feedbackBox');const arc=document.getElementById('timerArc'),ring=document.getElementById('timerRing');const tapHint=document.getElementById('tapHint'),wrongDetail=document.getElementById('wrongDetail');const CIRC=100.5;if(isCorrect){const msgs=[['🎉✨','CORRECT!'],['🌟💡','NAILED IT!'],['🏆⭐','SHARP!'],['🔥💫','EXACTLY!'],['👑✅','SOLID!']];const[em,title]=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('feedbackEmoji').textContent=em;document.getElementById('feedbackTitle').textContent=title;document.getElementById('feedbackTitle').className='feedback-title correct-text';box.className='feedback-box correct-box';ring.className='timer-ring correct-ring';ring.style.display='';tapHint.style.display='none';wrongDetail.style.display='none';}else{const msgs=[['😬❌','Not quite...'],['🤔💭','Think again!'],['😅🔄','Close, but no!']];const[em,title]=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('feedbackEmoji').textContent=em;document.getElementById('feedbackTitle').textContent=title;document.getElementById('feedbackTitle').className='feedback-title wrong-text';box.className='feedback-box wrong-box';ring.className='timer-ring wrong-ring';ring.style.display='none';tapHint.style.display='';document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;document.getElementById('wdChosen').textContent=chosen;document.getElementById('wdCorrect').textContent=correct;wrongDetail.style.display='';}document.getElementById('feedbackFact').textContent=fact;arc.style.strokeDashoffset='0';overlay.classList.remove('dismiss');overlay.classList.add('show');if(isCorrect){const duration=1400,startTime=performance.now();function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}feedbackRafId=requestAnimationFrame(tickRing);feedbackTimer=setTimeout(dismissFeedback,duration);}else{overlay.classList.add('clickable');overlay.addEventListener('click',dismissFeedback,{once:true});}}
function advanceQuestion(){const prev=current;current++;if(prev===4){showLevelUp('medium');return;}if(prev===9){showLevelUp('hard');return;}if(current>=15){showEndScreen();return;}showQuestion();}
function showLevelUp(level){const overlay=document.getElementById('levelupOverlay');if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — distributed system patterns!';}else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT TIER!';document.getElementById('levelupSub').textContent='🧠 Hard — consensus, CRDT, Spanner-level questions!';}overlay.classList.add('show');playLevelUp();spawnConfetti(50);}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){const screen=document.getElementById('gameScreen');let rank,icon,msg,color;if(score>=13){rank='STAFF ENGINEER';icon='🏆🧠⚡';msg='Outstanding. You think in distributed systems.';color='#00d4aa';}else if(score>=10){rank='SENIOR ENGINEER';icon='🌟💡🎯';msg='Solid system design fundamentals!';color='#2ecc71';}else if(score>=7){rank='MID-LEVEL';icon='👍📚😊';msg='Good foundation — keep going!';color='#e67e22';}else{rank='JUNIOR';icon='💪📖🌱';msg='Great start! Review the explanations.';color='#e74c3c';}const e=dotResults.slice(0,5).filter(r=>r==='correct').length;const m=dotResults.slice(5,10).filter(r=>r==='correct').length;const h=dotResults.slice(10,15).filter(r=>r==='correct').length;if(e===5)addPoints(1);if(m===5)addPoints(3);if(h===5)addPoints(6);updatePtsDisplay();screen.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;"><div style="font-size:clamp(2.5rem,10vw,5rem);">${icon}</div><div style="font-size:clamp(1.6rem,6vw,2.8rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div><div style="font-size:clamp(0.9rem,3.2vw,1.2rem);color:rgba(255,255,255,0.82);max-width:360px;">${msg}</div><div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Fundamentals</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div><div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Patterns</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div><div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Advanced</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div></div><div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}</div><button class="action-btn" onclick="init()">🔄 Play Again!</button><a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a></div>`;spawnConfetti(score>=10?80:35);}
const CONFETTI_COLORS=['#00d4aa','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=30){for(let i=0;i<count;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.top='-20px';el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];el.style.width=(6+Math.random()*10)+'px';el.style.height=(6+Math.random()*10)+'px';el.style.borderRadius=Math.random()>0.5?'50%':'2px';const dur=1.5+Math.random()*2;el.style.animationDuration=dur+'s';el.style.animationDelay=Math.random()*0.4+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+0.6)*1000);},i*20);}}
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'||e.key==='<')navBack();if(e.key==='ArrowRight'||e.key==='>')navForward();});
init();
</script>
