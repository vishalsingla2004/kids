  { level:1, visual:'✏️', question:'What does "gradual" mean?', options:['Happening slowly over time','Happening all at once','Never happening'], answer:'Happening slowly over time', fact:'Gradual change is step by step. Glaciers move in a gradual, slow process — but they reshape entire landscapes over time!' },
  { level:1, visual:'📚', question:'What does "scarce" mean?', options:['Not enough of something available','More than enough','Very common'], answer:'Not enough of something available', fact:'Scarce resources are in short supply. During a drought, water becomes scarce. Scarcity drives up demand and value!' },
  { level:1, visual:'🗣️', question:'What does "abundant" mean?', options:['More than enough, plentiful','Very hard to find','Completely gone'], answer:'More than enough, plentiful', fact:'Abundant means existing in large amounts — an abundant harvest means the fields are overflowing! Abundant life means richly full!' },
  { level:1, visual:'🖊️', question:'What does "harsh" mean?', options:['Cruel, severe, or unpleasant','Very kind and gentle','Soft and smooth'], answer:'Cruel, severe, or unpleasant', fact:'Harsh winters are bitterly cold. Harsh words hurt feelings. Harsh can describe weather, treatment, sounds, or textures!' },
  { level:1, visual:'💬', question:'What does "gentle" mean?', options:['Mild and kind, not rough','Very loud and rough','Extremely heavy'], answer:'Mild and kind, not rough', fact:'A gentle breeze barely rustles the leaves. A gentle person treats others with care and softness. Gentle and gentle-hearted!' },
  { level:1, visual:'📜', question:'What does "ordinary" mean?', options:['Normal, not special','Very unusual','Extremely rare'], answer:'Normal, not special', fact:'Ordinary comes from Latin "ordinarius" meaning regular. An ordinary day follows the usual routine. Extraordinary means beyond ordinary!' },
  { level:1, visual:'🔤', question:'What does "pleasant" mean?', options:['Enjoyable and agreeable','Quite unpleasant','Very harsh'], answer:'Enjoyable and agreeable', fact:'A pleasant afternoon is relaxing and enjoyable. Pleasant people are easy and nice to be around. Synonyms: agreeable, delightful!' },
  { level:1, visual:'🎭', question:'The plural of "tooth" is', options:['Teeth','Tooths','Toothes'], answer:'Teeth', fact:'Irregular plural! Old English kept tooth→teeth. Also: goose→geese, foot→feet, mouse→mice. These exceptions are ancient!' },
  { level:1, visual:'📰', question:'The plural of "leaf" is', options:['Leaves','Leafs','Leifs'], answer:'Leaves', fact:'Many words ending in -f change to -ves in the plural: leaf→leaves, wolf→wolves, half→halves, knife→knives!' },
  { level:1, visual:'🗞️', question:'The plural of "ox" is', options:['Oxen','Oxes','Ox'], answer:'Oxen', fact:'Oxen is one of the oldest irregular plurals in English — from Old English! Also: child→children, brother→brethren (formal)!' },
  { level:1, visual:'🖋️', question:'The plural of "person" is', options:['People','Persons','Peoples'], answer:'People', fact:'People is the common plural of person in everyday speech. Persons is used in legal or formal contexts: "Three persons were arrested."' },
  { level:1, visual:'📓', question:'The past tense of "run" is', options:['Ran','Runned','Run'], answer:'Ran', fact:'Run is an irregular verb! Run→Ran (past)→Run (past participle). Irregular verbs are common English words we use every day!' },
  { level:1, visual:'📖', question:'The past tense of "write" is', options:['Wrote','Written','Writed'], answer:'Wrote', fact:'Write→Wrote (past tense)→Written (past participle). "She wrote a letter" vs "She has written three letters." Classic irregular verb!' },
  { level:1, visual:'📝', question:'The past tense of "sing" is', options:['Sang','Singed','Sung'], answer:'Sang', fact:'Sing→Sang→Sung. Many irregular verbs change the vowel sound: ring→rang→rung, swim→swam→swum, drink→drank→drunk!' },
  { level:1, visual:'✏️', question:'The future tense of "She reads" is', options:['She will read','She has read','She was reading'], answer:'She will read', fact:'Future tense uses will + base verb: will read, will run, will think. It describes things that haven\'t happened yet!' },
  { level:1, visual:'📚', question:'Which sentence is in past tense?', options:['The bird flew south.','The bird flies south.','The bird will fly south.'], answer:'The bird flew south.', fact:'Flew is the past tense of fly. Past tense describes things that already happened. Clue words: yesterday, last week, ago!' },
  { level:1, visual:'🗣️', question:'Which word correctly fills in the blank: "I saw ___ elephant at the zoo"?', options:['an','a','the'], answer:'an', fact:'Use "an" before words starting with a vowel sound: an elephant, an apple, an umbrella. Use "a" before consonant sounds!' },
  { level:1, visual:'🖊️', question:'"They\'re" is a contraction of', options:['They are','They were','Their is'], answer:'They are', fact:'They\'re (they are), their (belonging to them), there (a place) — three words that sound the same but have very different meanings!' },
  { level:1, visual:'💬', question:'"It\'s" is a contraction of', options:["It is","It was","Its is"], answer:'It is', fact:'"It\'s raining" = "It is raining." Never confuse it\'s (it is) with its (belonging to it). The apostrophe shows letters are missing!' },
  { level:1, visual:'📜', question:'Which word is an article?', options:['The','Run','Happy'], answer:'The', fact:'Articles are a, an, and the. They help identify nouns. "The" is the definite article (specific thing). "A/An" are indefinite articles!' },
  { level:1, visual:'🔤', question:'Which sentence has the correct plural verb?', options:['The dogs bark loudly.','The dogs barks loudly.','The dogs is barking loudly.'], answer:'The dogs bark loudly.', fact:'Plural subjects (dogs) take plural verbs (bark, not barks). Subject-verb agreement is a key grammar rule!' },
  { level:1, visual:'🎭', question:'Which is a common noun?', options:['Mountain','Mount Everest','Pacific Ocean'], answer:'Mountain', fact:'Common nouns name general categories: mountain, river, city. Proper nouns name specific ones: Mount Everest, Amazon River, Tokyo!' },
  { level:1, visual:'📰', question:'Which sentence uses the correct article?', options:['She ate an apple.','She ate a apple.','She ate the apple at home yesterday and it was delicious.'], answer:'She ate an apple.', fact:'"An apple" is correct because apple starts with a vowel sound. "A apple" is wrong. Article choice depends on the sound, not the letter!' },
  { level:1, visual:'🗞️', question:'The "predicate" of a sentence is', options:['The verb and what follows it','The subject noun','The describing word'], answer:'The verb and what follows it', fact:'In "The cat sat on the mat," the predicate is "sat on the mat." The predicate tells us what the subject does or is!' },
  { level:1, visual:'🖋️', question:'Which word is a verb?', options:['Whispered','Quiet','Softly'], answer:'Whispered', fact:'Whispered is a past-tense action verb. Quiet is an adjective and softly is an adverb — they describe, not act!' },
  { level:1, visual:'📓', question:'Which word is an adjective?', options:['Enormous','Happily','Sang'], answer:'Enormous', fact:'Enormous describes size — it modifies a noun. Happily is an adverb, sang is a verb. Adjectives answer "what kind?" or "how many?"' },
  { level:1, visual:'📖', question:'What does "fiction" mean?', options:['Stories that are made up','Stories that are true','Stories about real events'], answer:'Stories that are made up', fact:'Fiction is invented! Novels, short stories, and fairy tales are fiction. The characters and events spring from the author\'s imagination!' },
  { level:1, visual:'📝', question:'What does "nonfiction" mean?', options:['Writing about real facts and events','Stories that are made up','Poems and plays'], answer:'Writing about real facts and events', fact:'Nonfiction includes biographies, textbooks, news articles, and essays. The people, events, and facts are real!' },
  { level:1, visual:'✏️', question:'A "biography" is', options:['The story of a real person\'s life written by someone else','A made-up adventure story','A poem about nature'], answer:'The story of a real person\'s life written by someone else', fact:'Bio = life, graphy = writing. An autobiography is when you write your OWN life story. Biography = someone else writes it!' },
  { level:1, visual:'📚', question:'A "mystery" genre story usually involves', options:['Solving a crime or puzzle','Traveling to magical worlds','The life of a real person'], answer:'Solving a crime or puzzle', fact:'Mystery stories keep readers guessing! Clues, red herrings, and a clever detective are hallmarks of the mystery genre!' },
  { level:1, visual:'🗣️', question:'A "fantasy" story includes', options:['Magic, impossible events, or invented worlds','Only real places and people','Factual science topics'], answer:'Magic, impossible events, or invented worlds', fact:'Fantasy takes readers to places that can\'t exist: Middle-earth, Hogwarts, Narnia. Magic systems and imaginary creatures are key!' },
  { level:1, visual:'🖊️', question:'The "illustrator" of a book', options:['Creates the pictures','Writes the words','Prints and publishes the book'], answer:'Creates the pictures', fact:'The illustrator brings stories to life visually! Sometimes the author and illustrator are the same person, but often they\'re different!' },
  { level:1, visual:'💬', question:'A "table of contents" in a book shows', options:['The chapter titles and page numbers','Definitions of key words','An alphabetical list of topics'], answer:'The chapter titles and page numbers', fact:'The table of contents is at the front of a book and helps readers navigate. It\'s a map of the whole book\'s structure!' },
  { level:1, visual:'📜', question:'A "character" in a story is', options:['A person or animal in the story','The place where events happen','The main problem in the story'], answer:'A person or animal in the story', fact:'Characters can be human, animal, or even objects! Protagonists are main characters. Antagonists oppose the protagonist!' },
  { level:1, visual:'🔤', question:'The "plot" of a story is', options:['The sequence of events','The place where events happen','The lesson of the story'], answer:'The sequence of events', fact:'Plot = what happens! Introduction → Rising Action → Climax → Falling Action → Resolution. This story arc is called a plot diagram!' },
  { level:1, visual:'🎭', question:'What does "author\'s purpose" mean?', options:['Why the author wrote the piece','Who the author is','Where the author lives'], answer:'Why the author wrote the piece', fact:'Authors write to persuade, inform, or entertain (PIE). Understanding purpose helps you read more critically and actively!' },
  { level:1, visual:'📰', question:'What is an "exclamation"?', options:['A sentence that shows strong feeling','A sentence that asks something','A sentence that gives a command'], answer:'A sentence that shows strong feeling', fact:'Exclamations end with ! and show excitement, surprise, or strong emotion. "Watch out!" and "That\'s amazing!" are exclamations!' },
  { level:1, visual:'🗞️', question:'What punctuation ends a question?', options:['?','.',  '!'], answer:'?', fact:'Questions always end with a question mark. Questions often begin with who, what, where, when, why, or how!' },
  { level:1, visual:'🖋️', question:'Which is an example of a proper noun?', options:['Monday','Day','Week'], answer:'Monday', fact:'Days of the week and months are proper nouns — always capitalized! Monday, Tuesday, January, February — all proper nouns!' },
  { level:1, visual:'📓', question:'Which word is spelled correctly?', options:['Receive','Recieve','Receve'], answer:'Receive', fact:'Remember: "I before E, except after C." Receive has "ei" after C. Also: ceiling, deceive, perceive — all follow this rule!' },
  { level:1, visual:'📖', question:'What does the suffix "-ful" mean in "colorful"?', options:['Full of','Without','Before'], answer:'Full of', fact:'The suffix -ful means full of: colorful = full of color, joyful = full of joy, grateful = full of gratefulness. Expand your vocabulary!' },
  { level:1, visual:'📝', question:'What does the prefix "re-" mean in "rewrite"?', options:['Again','Before','Not'], answer:'Again', fact:'Re- means again or back: rewrite = write again, replay = play again, return = turn back. Prefixes change a word\'s meaning!' },
  { level:1, visual:'✏️', question:'What does the suffix "-less" mean in "hopeless"?', options:['Without','Full of','Having too much'], answer:'Without', fact:'"Less" means without: hopeless = without hope, speechless = without speech, harmless = without harm. Suffixes shape meaning!' },
  { level:1, visual:'📚', question:'Which sentence uses a comma correctly?', options:['I like apples, bananas, and oranges.','I like apples bananas and oranges.','I like apples, bananas and, oranges.'], answer:'I like apples, bananas, and oranges.', fact:'Use commas to separate items in a list (serial comma). It prevents confusion: "I love my parents, Batman and Robin" sounds odd without commas!' },
  { level:1, visual:'🗣️', question:'What is a "simile"?', options:['A comparison using "like" or "as"','A comparison without "like" or "as"','Giving human traits to objects'], answer:'A comparison using "like" or "as"', fact:'Similes compare using like or as: "fast as lightning," "like a bolt from the blue." The comparison is signaled by the connecting word!' },
  { level:1, visual:'🖊️', question:'What is a "metaphor"?', options:['A comparison without "like" or "as"','A comparison using "like" or "as"','A word that sounds like its meaning'], answer:'A comparison without "like" or "as"', fact:'"Life is a journey." No like or as — it directly says life IS a journey. Metaphors create powerful mental images!' },
  { level:1, visual:'💬', question:'What does the prefix "un-" mean in "unhappy"?', options:['Not','Again','Very'], answer:'Not', fact:'Un- means not: unhappy = not happy, unclear = not clear, unusual = not usual. One of the most common English prefixes!' },
  { level:1, visual:'📜', question:'A "synonym" is a word that', options:['Has a similar meaning to another word','Has the opposite meaning','Sounds like another word'], answer:'Has a similar meaning to another word', fact:'Synonyms are words with similar meanings: happy/joyful, big/large, talk/speak. They add variety to writing and prevent repetition!' },
  { level:1, visual:'🔤', question:'An "antonym" is a word that', options:['Has the opposite meaning','Has a similar meaning','Sounds the same but means something different'], answer:'Has the opposite meaning', fact:'Antonyms are opposite pairs: hot/cold, happy/sad, fast/slow. Knowing antonyms doubles your vocabulary power!' },
  { level:1, visual:'🎭', question:'A "homophone" is a word that', options:['Sounds the same as another but has a different meaning','Has the same meaning as another word','Has the opposite meaning'], answer:'Sounds the same as another but has a different meaning', fact:'Homophones: their/there/they\'re, to/too/two, hear/here. Same sound, different spelling and meaning — spell them carefully!' },
  { level:1, visual:'📰', question:'Which sentence uses "their" correctly?', options:['The students brought their books.','Their going to the park.','I put the book over their.'], answer:'The students brought their books.', fact:'Their = belonging to them. They\'re = they are. There = a place. Three homophones, three different meanings — context is key!' },
  { level:1, visual:'🗞️', question:'Which is an example of alliteration?', options:['Peter Piper picked a peck','The sun was hot','She ran quickly'], answer:'Peter Piper picked a peck', fact:'Alliteration repeats the same beginning consonant sound. Peter Piper — P, P, P, P! Tongue twisters use heavy alliteration!' },
  { level:1, visual:'🖋️', question:'What is the "theme" of a story?', options:['The central message or life lesson','The main character\'s name','Where the story takes place'], answer:'The central message or life lesson', fact:'Theme is the BIG idea beneath the story. "Kindness matters," "courage pays off," "friendship is powerful" — these are themes!' },
  { level:1, visual:'📓', question:'What does "infer" mean?', options:['To use clues to figure out something not stated','To copy text word for word','To create a summary'], answer:'To use clues to figure out something not stated', fact:'Good readers infer! Use text clues + what you already know to figure out what the author doesn\'t say directly. Read between the lines!' },
  { level:1, visual:'📖', question:'Which sentence is a command?', options:['Close the door, please.','Are you coming?','The sky is blue.'], answer:'Close the door, please.', fact:'Commands (imperative sentences) tell or ask someone to do something. They often leave out the subject "you": (You) close the door!' },
  { level:1, visual:'📝', question:'The word "slowly" is what type of word?', options:['Adverb','Adjective','Noun'], answer:'Adverb', fact:'Slowly describes how something is done — it modifies a verb. Most adverbs ending in -ly describe the manner of an action!' },
  { level:1, visual:'✏️', question:'Which is an irregular verb?', options:['Go (went in past tense)','Walk (walked in past tense)','Jump (jumped in past tense)'], answer:'Go (went in past tense)', fact:'Go→Went is completely irregular — the past tense is a different word! Other extreme irregulars: be→was/were, have→had!' },
  { level:1, visual:'📚', question:'What does "context clue" mean?', options:['Words around an unknown word that help explain its meaning','A word in the dictionary','A synonym in the glossary'], answer:'Words around an unknown word that help explain its meaning', fact:'Context clues are your first tool for vocabulary! Look at the sentences around an unknown word — they often explain its meaning!' },
  { level:1, visual:'🗣️', question:'What does "relevant" mean?', options:['Closely connected to the topic','Not related at all','Very confusing'], answer:'Closely connected to the topic', fact:'Relevant evidence connects directly to the argument. Irrelevant details distract readers. Stay relevant to strengthen your writing!' },
  { level:1, visual:'🖊️', question:'A "suffix" is added', options:['At the end of a word','At the beginning of a word','In the middle of a word'], answer:'At the end of a word', fact:'Suffixes change a word\'s meaning or part of speech: teach→teacher, happy→happiness, care→careful. They come at the END!' },
  { level:1, visual:'💬', question:'A "prefix" is added', options:['At the beginning of a word','At the end of a word','In the middle of a word'], answer:'At the beginning of a word', fact:'Prefixes come BEFORE the root word: un-happy, re-write, pre-school, dis-agree. They change or add to the base meaning!' },
  { level:1, visual:'📜', question:'Which of these is fiction?', options:['A dragon battles a wizard','The life of Abraham Lincoln','How earthquakes happen'], answer:'A dragon battles a wizard', fact:'Dragons and wizards are imaginary — that\'s fiction! Abraham Lincoln was real (biography/nonfiction), and earthquake science is informational nonfiction!' },
  { level:1, visual:'🔤', question:'What is the "main idea" of a paragraph?', options:['The most important point being made','A minor detail in the text','The title of the story'], answer:'The most important point being made', fact:'The main idea is what the paragraph is mostly about. Details support it. Ask: "What is the author\'s main point here?"' },
  { level:1, visual:'🎭', question:'What does "chapter" mean?', options:['A major section of a book','A list of definitions','The author\'s note'], answer:'A major section of a book', fact:'Chapters organize long books into manageable sections, each focused on a set of events or ideas. Most novels have 10–40 chapters!' },
  { level:1, visual:'📰', question:'What does "compare" mean?', options:['To find similarities (and differences) between things','To find only differences','To put things in order'], answer:'To find similarities (and differences) between things', fact:'Compare = look for what\'s alike AND different. Contrast = focus specifically on differences. "Compare and contrast" asks you to do both. Together they help us understand things more deeply!' },
  { level:1, visual:'🗞️', question:'What does "contrast" mean?', options:['To find differences between things','To find similarities','To describe something in detail'], answer:'To find differences between things', fact:'Contrast highlights what makes things different. High contrast in photography means very bright lights and very dark darks!' },
  { level:1, visual:'🖋️', question:'What does "evidence" mean in writing?', options:['Facts or details that support a point','An opinion or feeling','A character\'s action'], answer:'Facts or details that support a point', fact:'Evidence is proof! In writing, always support your claims with evidence: quotes, facts, statistics, examples from the text!' },
  { level:1, visual:'📓', question:'What is a "rhyme scheme"?', options:['The pattern of rhyming lines in a poem','The number of syllables in a line','The topic of a poem'], answer:'The pattern of rhyming lines in a poem', fact:'ABAB means the 1st and 3rd lines rhyme, and 2nd and 4th rhyme. AABB means pairs rhyme. Rhyme schemes give poems their musical pattern!' },
  { level:1, visual:'📖', question:'A "stanza" in a poem is like', options:['A paragraph in prose','A chapter title','A punctuation mark'], answer:'A paragraph in prose', fact:'A stanza is a group of lines in a poem, separated by blank lines — just as paragraphs group sentences in prose writing!' },
  { level:1, visual:'📝', question:'What is "dialogue"?', options:['Spoken conversation between characters','A description of setting','A list of events'], answer:'Spoken conversation between characters', fact:'Dialogue brings characters to life! Look for quotation marks — they signal that a character is speaking. He said/she said tags identify speakers!' },
  { level:1, visual:'✏️', question:'Which punctuation shows someone is speaking?', options:['"Quotation marks"','Parentheses ( )','Brackets [ ]'], answer:'"Quotation marks"', fact:'Quotation marks frame a speaker\'s exact words: He said, "I\'ll be right back." Single quotes are used inside double quotes!' },
  { level:1, visual:'📚', question:'What does "fact" mean?', options:['Something that can be proven true','Someone\'s personal belief','A made-up story'], answer:'Something that can be proven true', fact:'Facts can be verified! "The Nile is the longest river" is a fact. Opinions are personal views: "The Nile is the most beautiful river."' },
  { level:1, visual:'🗣️', question:'What does "opinion" mean?', options:['A personal belief or viewpoint','Something that is always true','A proven scientific finding'], answer:'A personal belief or viewpoint', fact:'Opinions are personal! "I think," "In my opinion," "The best..." signal opinions. Opinions cannot be proven right or wrong!' },
  { level:1, visual:'🖊️', question:'What does "paraphrase" mean?', options:['Restate an idea in your own words','Copy something word for word','Summarize in one sentence'], answer:'Restate an idea in your own words', fact:'Paraphrasing shows you truly understand — you can explain it in your own words! It\'s different from quoting (exact words) or summarizing (shorter)!' },
  { level:1, visual:'💬', question:'What is a "genre"?', options:['A category of literature with common features','The title of a specific book','The number of pages in a book'], answer:'A category of literature with common features', fact:'Genres help us find what we love to read! Mystery, fantasy, biography, historical fiction, science fiction — all genres with unique traits!' },
  // ── LEVEL 2 NEW (figurative language, text structure, comprehension, grammar) ──
  { level:2, visual:'📖', question:'"Her voice was music to his ears" is an example of', options:['Metaphor','Simile','Onomatopoeia'], answer:'Metaphor', fact:'No "like" or "as" — voice IS music. Metaphors create instant images by saying one thing IS another. The comparison is direct and vivid!' },
  { level:2, visual:'📝', question:'"Busy as a bee" is an example of', options:['Simile','Metaphor','Personification'], answer:'Simile', fact:'The word "as" signals this is a simile. Similes make comparisons concrete and easy to picture. "Busy as a bee" = extremely busy!' },
  { level:2, visual:'✏️', question:'Which is an example of personification?', options:['The wind whispered through the trees.','She ran like the wind.','The wind was very strong.'], answer:'The wind whispered through the trees.', fact:'Personification gives human traits to non-human things. Wind can\'t whisper — but the image makes us feel the gentle, mysterious breeze!' },
  { level:2, visual:'📚', question:'"I\'ve told you a million times" is an example of', options:['Hyperbole','Simile','Personification'], answer:'Hyperbole', fact:'Hyperbole is extreme exaggeration for emphasis. You haven\'t literally told someone a million times — but hyperbole makes the point powerfully!' },
  { level:2, visual:'🗣️', question:'"Break a leg" is an example of', options:['An idiom','Alliteration','Onomatopoeia'], answer:'An idiom', fact:'Break a leg means good luck! Idioms have meanings you can\'t figure out word by word. Every language has unique idioms that reflect culture!' },
  { level:2, visual:'🖊️', question:'"The early bird catches the worm" is', options:['A proverb','An idiom','A metaphor'], answer:'A proverb', fact:'Proverbs are traditional sayings with wisdom. This one means: act early and you\'ll succeed. Proverbs are passed down through generations!' },
  { level:2, visual:'💬', question:'"Peter Piper picked a peck of pickled peppers" uses', options:['Alliteration','Hyperbole','Personification'], answer:'Alliteration', fact:'The repeated P sound is alliteration. Poets and advertisers use alliteration because it creates rhythm and makes phrases memorable!' },
  { level:2, visual:'📜', question:'"The thunder clapped" is an example of', options:['Personification','Simile','Alliteration'], answer:'Personification', fact:'Thunder can\'t literally clap — that\'s a human action. Personification brings nature to life, making descriptions vivid and emotional!' },
  { level:2, visual:'🔤', question:'"The pot called the kettle black" means', options:['Criticizing others for a flaw you have yourself','A literal description of cooking','Giving someone a compliment'], answer:'Criticizing others for a flaw you have yourself', fact:'This proverb means hypocritical criticism — calling out someone else for a flaw you have yourself. Ancient wisdom in a short phrase!' },
  { level:2, visual:'🎭', question:'Signal words for sequence text structure are', options:['First, next, then, finally','However, on the other hand','Because, therefore, as a result'], answer:'First, next, then, finally', fact:'Signal words are clues to text structure! Sequence words show order. Contrast words show differences. Cause-effect words show connections!' },
  { level:2, visual:'📰', question:'Signal words for cause and effect include', options:['Because, therefore, as a result','Similarly, in contrast','First, second, third'], answer:'Because, therefore, as a result', fact:'"The ice melted BECAUSE the temperature rose." Because signals cause. "AS A RESULT, the roads flooded." As a result signals effect!' },
  { level:2, visual:'🗞️', question:'Signal words for compare and contrast include', options:['Similarly, however, on the other hand','First, then, finally','Because, therefore'], answer:'Similarly, however, on the other hand', fact:'Similarly shows comparison. However, on the other hand, and in contrast show differences. These signal words guide the reader!' },
  { level:2, visual:'🖋️', question:'The "climax" of a story is', options:['The most exciting or turning-point moment','The very beginning','The lesson learned'], answer:'The most exciting or turning-point moment', fact:'The climax is the mountain peak of the plot! Everything builds to this moment. After the climax, the tension begins to drop!' },
  { level:2, visual:'📓', question:'What is the "resolution" of a story?', options:['How the conflict is settled at the end','The main problem of the story','The most exciting moment'], answer:'How the conflict is settled at the end', fact:'Resolution wraps up the story — loose ends are tied, the conflict is resolved. The Latin root "resolvere" means to loosen or unbind!' },
  { level:2, visual:'📖', question:'To "summarize" means to', options:['Retell only the most important ideas briefly','Copy all details','Predict what happens next'], answer:'Retell only the most important ideas briefly', fact:'A good summary is short but complete — it captures the essential "who, what, and so what." Leave out minor details and examples!' },
  { level:2, visual:'📝', question:'Making an "inference" requires', options:['Text evidence plus background knowledge','Only rereading the exact text','Guessing without any clues'], answer:'Text evidence plus background knowledge', fact:'Inference = text clue + what you know. "She grabbed an umbrella" (text) + knowing umbrellas are for rain = you infer it might rain!' },
  { level:2, visual:'✏️', question:'First-person point of view uses', options:['I, me, my, we, our','He, she, they, them','You, your, yours'], answer:'I, me, my, we, our', fact:'First person puts us inside the narrator\'s head. We only know what they know and feel. It creates intimacy but limits perspective!' },
  { level:2, visual:'📚', question:'Third-person omniscient means the narrator', options:['Knows all characters\' thoughts and feelings','Only knows one character\'s thoughts','Is a character in the story'], answer:'Knows all characters\' thoughts and feelings', fact:'Omniscient = all-knowing (from Latin "omnis" = all, "sciens" = knowing). Like a god-like narrator who sees everything and everyone!' },
  { level:2, visual:'🗣️', question:'What is "author\'s perspective"?', options:['The author\'s attitude or viewpoint toward the topic','Where the author grew up','The author\'s favorite character'], answer:'The author\'s attitude or viewpoint toward the topic', fact:'An author\'s word choices reveal their perspective. Calling protesters "passionate" vs "rowdy" shows different attitudes to the same event!' },
  { level:2, visual:'🖊️', question:'What are "text features" in nonfiction?', options:['Titles, headings, photos, captions, charts','Made-up characters','Rhyming lines'], answer:'Titles, headings, photos, captions, charts', fact:'Text features help readers navigate nonfiction: bold words signal key vocabulary, sidebars add extra info, graphs show data visually!' },
  { level:2, visual:'💬', question:'A "fact" can be', options:['Proven true or false with evidence','Just an opinion','Never checked'], answer:'Proven true or false with evidence', fact:'Facts are verifiable statements. "The Earth orbits the Sun" can be proven. Facts form the backbone of informational and argumentative writing!' },
  { level:2, visual:'📜', question:'To "draw a conclusion" means to', options:['Make a logical judgment based on evidence','Copy from the text','Write a new paragraph'], answer:'Make a logical judgment based on evidence', fact:'Drawing conclusions is a thinking skill: gather evidence → reason carefully → reach a logical judgment. Detectives draw conclusions!' },
  { level:2, visual:'🔤', question:'Which sentence is a complex sentence?', options:['Because it rained, we stayed inside.','I like pizza.','Run and jump.'], answer:'Because it rained, we stayed inside.', fact:'A complex sentence has an independent clause ("we stayed inside") and a dependent clause ("Because it rained"). The dependent clause can\'t stand alone!' },
  { level:2, visual:'🎭', question:'Which is a coordinating conjunction (FANBOYS)?', options:['But','Because','Although'], answer:'But', fact:'FANBOYS: For, And, Nor, But, Or, Yet, So. These conjunctions join two independent clauses. Because and Although are subordinating conjunctions!' },
  { level:2, visual:'📰', question:'A "run-on sentence" is', options:['Two or more independent clauses joined incorrectly','A very long sentence with proper punctuation','A sentence fragment'], answer:'Two or more independent clauses joined incorrectly', fact:'"I ran home it was raining" is a run-on! Fix with a period, semicolon, or conjunction: "I ran home because it was raining."' },
  { level:2, visual:'🗞️', question:'A "sentence fragment" is', options:['A group of words that is not a complete sentence','A very short complete sentence','A run-on sentence'], answer:'A group of words that is not a complete sentence', fact:'"Running down the street." — who is running? Missing a subject! "The happy dog." — no verb! Both are fragments because they are incomplete!' },
  { level:2, visual:'🖋️', question:'Possessive nouns use', options:['An apostrophe to show ownership','A comma to show ownership','Quotation marks'], answer:'An apostrophe to show ownership', fact:'"The girl\'s book" means the book belongs to the girl. For plural possessives: "the girls\' books" (apostrophe after the s for multiple girls)!' },
  { level:2, visual:'📓', question:'What is subject-verb agreement?', options:['The subject and verb must match in number','The subject comes before the verb','The verb is always in the past tense'], answer:'The subject and verb must match in number', fact:'"She runs" (singular) vs "They run" (plural). Subject-verb agreement is one of grammar\'s most fundamental rules!' },
  { level:2, visual:'📖', question:'"She ran like the wind" is a', options:['Simile','Metaphor','Idiom'], answer:'Simile', fact:'"Like the wind" signals simile! Similes make abstract speeds concrete — we instantly picture the speed of wind and understand just how fast she ran!' },
  { level:2, visual:'📝', question:'Pronoun-antecedent agreement means', options:['A pronoun must match the noun it replaces in number','A pronoun must come before the noun','A pronoun must be capitalized'], answer:'A pronoun must match the noun it replaces in number', fact:'"Each student must bring their notebook" — student is singular, so use singular their (or his or her). Agreement keeps sentences clear!' },
  { level:2, visual:'✏️', question:'What is "direct characterization"?', options:['The author directly states a character\'s traits','The author shows character through actions','A character describes themselves'], answer:'The author directly states a character\'s traits', fact:'Direct: "Maria was kind." The author tells you flat out. Indirect: "Maria gave her lunch to a hungry classmate." You must figure it out!' },
  { level:2, visual:'📚', question:'"Show, don\'t tell" in writing means', options:['Use actions and details instead of just stating facts','Draw pictures instead of writing','Never use adjectives'], answer:'Use actions and details instead of just stating facts', fact:'"He was angry" is telling. "He slammed the door so hard the windows rattled" is showing. Details create a movie in the reader\'s mind!' },
  { level:2, visual:'🗣️', question:'What does "mood" in literature mean?', options:['The feeling or atmosphere created in the reader','What the author personally feels','The time period of the story'], answer:'The feeling or atmosphere created in the reader', fact:'Mood is how the story makes YOU feel: spooky, joyful, tense, melancholy. Authors create mood through word choice, setting, and pacing!' },
  { level:2, visual:'🖊️', question:'What is "tone" in writing?', options:['The author\'s attitude toward the subject','The feeling created in the reader','The setting of the story'], answer:'The author\'s attitude toward the subject', fact:'Tone is the author\'s attitude: sarcastic, reverent, playful, bitter. It\'s different from mood — tone is the author\'s feeling, mood is the reader\'s!' },
  { level:2, visual:'💬', question:'A "persuasive" text is written mainly to', options:['Change the reader\'s opinion or behavior','Tell an entertaining story','Teach facts about a topic'], answer:'Change the reader\'s opinion or behavior', fact:'Persuasive writing uses evidence, emotional appeals, and logic to convince readers. Advertisements, editorials, and speeches are persuasive!' },
  { level:2, visual:'📜', question:'What is "context" in reading?', options:['The information surrounding a word or idea that helps explain it','The title of the book','The author\'s biography'], answer:'The information surrounding a word or idea that helps explain it', fact:'Context clues surround unfamiliar words. "The famished lion, who hadn\'t eaten in days, hungrily eyed the herd." Famished = very hungry!' },
  { level:2, visual:'🔤', question:'A "direct quote" uses', options:['The speaker\'s exact words in quotation marks','A paraphrase of what was said','A summary of the main idea'], answer:'The speaker\'s exact words in quotation marks', fact:'"To be or not to be" — direct quote from Shakespeare. Direct quotes require quotation marks and credit to the original source!' },
  { level:2, visual:'🎭', question:'What is a "scene" in a play?', options:['A section of an act, set in one place or time','The entire play','An actor\'s costume description'], answer:'A section of an act, set in one place or time', fact:'Plays are divided into acts, and acts into scenes. A new scene often signals a change of location or time in the drama!' },
  { level:2, visual:'📰', question:'What is a "moral" in a fable?', options:['The lesson the story teaches','The main character\'s name','The problem in the story'], answer:'The lesson the story teaches', fact:'Fables end with a stated moral — the explicit lesson. Aesop\'s "Tortoise and the Hare" moral: slow and steady wins the race!' },
  { level:2, visual:'🗞️', question:'What is "conflict" in a story?', options:['The main problem or struggle','The setting','The theme'], answer:'The main problem or struggle', fact:'Conflict drives every story! Without a problem to solve, there\'s no story. Man vs Man, Man vs Nature, Man vs Self, Man vs Society!' },
  { level:2, visual:'🖋️', question:'An "allusion" in a text is', options:['A reference to a well-known person, place, or event','A description of the setting','A type of rhyme'], answer:'A reference to a well-known person, place, or event', fact:'"He met his Waterloo" alludes to Napoleon\'s famous defeat. Allusions create depth by connecting to shared cultural knowledge!' },
  { level:2, visual:'📓', question:'What does "explicit" mean in "explicit text evidence"?', options:['Clearly stated in the text','Hidden and implied','Only found in the title'], answer:'Clearly stated in the text', fact:'Explicit evidence is right there in the text — you can point to it. Implicit evidence is implied and requires inference. Both are valuable!' },
  { level:2, visual:'📖', question:'What is an "anecdote"?', options:['A short personal story used to make a point','A poem with strict rhyme','A type of idiom'], answer:'A short personal story used to make a point', fact:'Speakers and writers use anecdotes to connect with audiences. "When I was a child..." — a relatable story that humanizes an argument!' },
  { level:2, visual:'📝', question:'What is "bias" in a text?', options:['Unfair preference toward one side','A completely balanced view','A factual error'], answer:'Unfair preference toward one side', fact:'Biased writing slants information toward one viewpoint. Watch for loaded language, missing perspectives, and emotional exaggeration!' },
  { level:2, visual:'✏️', question:'What is a "central idea" in nonfiction?', options:['The most important point of the whole text','One minor supporting detail','The author\'s name'], answer:'The most important point of the whole text', fact:'Central idea = the "so what" of an entire nonfiction text. Supporting details all connect back to it. It\'s like the spine of the piece!' },
  { level:2, visual:'📚', question:'What does "cite" mean in writing?', options:['Give credit to the source of information','Make something up','Argue against a point'], answer:'Give credit to the source of information', fact:'Cite your sources! Citing shows you did research, strengthens your credibility, and gives readers a way to check your evidence themselves!' },
  { level:2, visual:'🗣️', question:'What is an "expository" essay?', options:['An essay that explains or informs','An essay that tells a personal story','An essay that argues a position'], answer:'An essay that explains or informs', fact:'Expository comes from "expose" — to make clear. Expository essays explain topics objectively without arguing a personal stance!' },
  { level:2, visual:'🖊️', question:'A "stanza break" in a poem signals', options:['A pause or shift in ideas','End of the poem','A new character speaking'], answer:'A pause or shift in ideas', fact:'Stanza breaks work like paragraph breaks — they signal a shift in time, speaker, idea, or mood. Pay attention to where poems breathe!' },
  { level:2, visual:'💬', question:'"Actions speak louder than words" is', options:['A proverb about behavior mattering more than promises','A metaphor about noise','An example of hyperbole'], answer:'A proverb about behavior mattering more than promises', fact:'This proverb means what you DO matters more than what you SAY. Proverbs pack big wisdom into short sentences — that\'s their power!' },
  { level:2, visual:'📜', question:'What does "elaborate" mean in writing?', options:['To add more details and explanation','To shorten a passage','To change the topic'], answer:'To add more details and explanation', fact:'When a teacher says "elaborate," they want more! Add examples, explanations, evidence. Elaboration transforms a sketch into a painting!' },
  { level:2, visual:'🔤', question:'A "complex sentence" has', options:['One independent clause and at least one dependent clause','Two independent clauses','Only a dependent clause'], answer:'One independent clause and at least one dependent clause', fact:'"Although it was cold, she went outside." The dependent clause ("Although it was cold") can\'t stand alone — it needs the main clause!' },
  { level:2, visual:'🎭', question:'What is "irony"?', options:['When what happens is different from what is expected','When a character is very brave','Repeating words for emphasis'], answer:'When what happens is different from what is expected', fact:'Irony creates surprise and makes readers think! A fire station burning down is ironic. Verbal irony says the opposite of what is meant!' },
  { level:2, visual:'📰', question:'What is "foreshadowing"?', options:['Hints about what will happen later in the story','Looking back at past events','The story\'s theme'], answer:'Hints about what will happen later in the story', fact:'Foreshadowing creates suspense! In Cinderella, the fairy godmother\'s midnight warning foreshadows trouble. Readers look for these clues!' },
  { level:2, visual:'🗞️', question:'"He had a heart of gold" is an example of', options:['Metaphor','Simile','Hyperbole'], answer:'Metaphor', fact:'No "like" or "as" — his heart IS gold, meaning he is extremely generous and kind. This common metaphor describes a wonderfully kind person!' },
  { level:2, visual:'🖋️', question:'What is "imagery" in writing?', options:['Vivid descriptive language that appeals to the senses','A type of punctuation','The story\'s main conflict'], answer:'Vivid descriptive language that appeals to the senses', fact:'Imagery paints with words! Sight, sound, smell, taste, touch — great writers engage all five senses to make readers experience the scene!' },
  { level:2, visual:'📓', question:'Which sentence contains a simile?', options:['Her smile was like sunshine breaking through clouds.','Her smile lit up the room.','She smiled widely.'], answer:'Her smile was like sunshine breaking through clouds.', fact:'"Like sunshine" — the word "like" signals a simile! Compare: "Her smile lit up the room" is a metaphor (no like/as), and "She smiled widely" is literal.' },
  { level:2, visual:'📖', question:'What is a "dynamic character"?', options:['A character who changes significantly during the story','A character who stays the same','A character who appears briefly'], answer:'A character who changes significantly during the story', fact:'Dynamic characters grow, learn, or change — like Ebenezer Scrooge going from miser to generous. Static characters remain the same throughout!' },
  { level:2, visual:'📝', question:'What is a "static character"?', options:['A character who does not change during the story','A character who changes dramatically','A character with many personality traits'], answer:'A character who does not change during the story', fact:'Static characters stay constant — their beliefs and behavior don\'t change. Many sidekicks and villains in stories are static characters!' },
  { level:2, visual:'✏️', question:'What is an "implied main idea"?', options:['A main idea that is suggested but not directly stated','A main idea written in the first sentence','A main idea found only in the title'], answer:'A main idea that is suggested but not directly stated', fact:'Sometimes the main idea is implied — you must infer it! Read all the details and ask: what point do they all add up to? That\'s the implied main idea!' },
  { level:2, visual:'📚', question:'In writing, "elaboration" is best achieved by', options:['Adding specific examples, facts, and explanations','Using longer words','Writing more sentences about different topics'], answer:'Adding specific examples, facts, and explanations', fact:'Elaboration = going deeper, not just wider. Don\'t just list points — explain them, give examples, show WHY they matter. Depth beats length!' },
  { level:2, visual:'🗣️', question:'"Although" introduces what type of clause?', options:['Dependent (subordinate) clause','Independent clause','A question'], answer:'Dependent (subordinate) clause', fact:'Although, because, since, when, while — these subordinating conjunctions introduce dependent clauses. Dependent clauses can\'t stand alone!' },
  { level:2, visual:'🖊️', question:'A "semicolon" is used to', options:['Join two closely related independent clauses','Start a list','Begin a quotation'], answer:'Join two closely related independent clauses', fact:'"She loves reading; she has 500 books." The semicolon joins two independent sentences that are closely linked in meaning. Stronger than a comma!' },
  // ── LEVEL 3 NEW (author\'s craft, advanced grammar, complex comprehension) ──
  { level:3, visual:'📖', question:'What is "situational irony"?', options:['When what happens is the opposite of what is expected','When a character says the opposite of what they mean','When the audience knows something a character doesn\'t'], answer:'When what happens is the opposite of what is expected', fact:'A police station being robbed is situational irony! The opposite of what seems fitting happens. It creates shock and often dark humor!' },
  { level:3, visual:'📝', question:'What is "verbal irony"?', options:['Saying the opposite of what you mean','When events are opposite to expectations','When the audience knows more than the character'], answer:'Saying the opposite of what you mean', fact:'"Oh great, another Monday." If you hate Mondays, that\'s verbal irony — saying "great" when you mean the opposite. Sarcasm is a form of verbal irony!' },
  { level:3, visual:'✏️', question:'What is "dramatic irony"?', options:['When the audience knows something the character doesn\'t','When events are opposite to expectations','When words mean the opposite of what is said'], answer:'When the audience knows something the character doesn\'t', fact:'In Romeo and Juliet, we know Juliet is asleep, not dead — but Romeo doesn\'t. This creates unbearable tension. Dramatic irony is the audience\'s curse!' },
  { level:3, visual:'📚', question:'What is "symbolism" in literature?', options:['When an object represents a larger idea or concept','When a character has many descriptions','When the setting is very detailed'], answer:'When an object represents a larger idea or concept', fact:'The green light in The Great Gatsby symbolizes Gatsby\'s unattainable dreams. Symbols add layers of meaning beyond the literal story!' },
  { level:3, visual:'🗣️', question:'What is the "theme" vs the "topic" of a story?', options:['Topic is the subject; theme is the message about that subject','Theme is the plot; topic is the setting','They mean the same thing'], answer:'Topic is the subject; theme is the message about that subject', fact:'Topic: friendship. Theme: true friendship requires sacrifice. The topic names the subject; the theme makes a statement about it. Themes are insights!' },
  { level:3, visual:'🖊️', question:'"Man vs. Society" conflict means', options:['A character struggles against social norms or institutions','A character fights another person','A character battles weather or nature'], answer:'A character struggles against social norms or institutions', fact:'Atticus Finch fighting racism, Winston Smith resisting Big Brother — Man vs. Society conflicts explore justice, freedom, and the individual versus the collective!' },
  { level:3, visual:'💬', question:'"Man vs. Self" conflict means', options:['A character struggles with internal doubts or choices','A character fights another person','A character battles nature'], answer:'A character struggles with internal doubts or choices', fact:'Hamlet\'s "To be or not to be" is the ultimate Man vs. Self conflict — internal struggle with doubt, guilt, and purpose. The most psychologically rich conflict type!' },
  { level:3, visual:'📜', question:'What is "indirect characterization"?', options:['Character is revealed through actions, speech, thoughts, and reactions','Author directly states character traits','A narrator describes the character physically'], answer:'Character is revealed through actions, speech, thoughts, and reactions', fact:'STEAL: Speech, Thoughts, Effects on others, Actions, Looks — five ways to reveal character indirectly. Show, don\'t tell at its finest!' },
  { level:3, visual:'🔤', question:'What is "parallel structure" in grammar?', options:['Using the same grammatical form for items in a series','Repeating the same word many times','Using very short sentences throughout'], answer:'Using the same grammatical form for items in a series', fact:'"She likes reading, writing, and to swim" lacks parallel structure. Correct: "reading, writing, and swimming." Parallelism makes lists elegant and clear!' },
  { level:3, visual:'🎭', question:'What is a "misplaced modifier"?', options:['A describing phrase placed too far from what it modifies','A misspelled word','A sentence without a verb'], answer:'A describing phrase placed too far from what it modifies', fact:'"I almost drove my kids to school every day" — did you almost drive, or drive almost every day? Misplaced modifiers create confusing or funny meanings!' },
  { level:3, visual:'📰', question:'Active voice means', options:['The subject performs the action','The subject receives the action','The sentence has no subject'], answer:'The subject performs the action', fact:'"The dog chased the cat" — dog (subject) actively does the chasing. Active voice is direct, clear, and energetic. Prefer it in most writing!' },
  { level:3, visual:'🗞️', question:'A "gerund phrase" functions as', options:['A noun in the sentence','An adjective in the sentence','A conjunction'], answer:'A noun in the sentence', fact:'"Running marathons is exhausting." Running marathons is a gerund phrase acting as the subject noun. Gerunds are verbs in noun clothing!' },
  { level:3, visual:'🖋️', question:'A "participial phrase" functions as', options:['An adjective modifying a noun','A noun in the sentence','The main verb of the sentence'], answer:'An adjective modifying a noun', fact:'"Exhausted from the race, she sat down." "Exhausted from the race" is a participial phrase describing "she." It\'s an -ing or -ed form used as adjective!' },
  { level:3, visual:'📓', question:'An "infinitive phrase" begins with', options:['To + a verb','The verb ending in -ing','A past tense verb'], answer:'To + a verb', fact:'"To win the championship was his dream." "To win the championship" is an infinitive phrase. Infinitives can function as nouns, adjectives, or adverbs!' },
  { level:3, visual:'📖', question:'What is a "subordinate clause"?', options:['A clause that cannot stand alone as a sentence','A clause that is the main sentence','A clause with no verb'], answer:'A clause that cannot stand alone as a sentence', fact:'"Because she studied hard" — subordinate! It needs a main clause: "Because she studied hard, she passed the exam." Subordinate means below in rank!' },
  { level:3, visual:'📝', question:'What is "synthesis" in reading?', options:['Combining ideas from multiple sources to form a new understanding','Summarizing one text','Copying key quotes'], answer:'Combining ideas from multiple sources to form a new understanding', fact:'Synthesis is the highest reading skill — you read multiple texts and weave their ideas together into something new. It\'s intellectual cooking!' },
  { level:3, visual:'✏️', question:'What is a "rhetorical appeal"?', options:['A strategy used to persuade an audience','A type of metaphor','A sentence structure technique'], answer:'A strategy used to persuade an audience', fact:'Aristotle identified three appeals: ethos (credibility), pathos (emotion), logos (logic). Great speeches and essays skillfully blend all three!' },
  { level:3, visual:'📚', question:'"Loaded language" in a text refers to', options:['Words chosen for their emotional impact','Technical vocabulary','Very long sentences'], answer:'Words chosen for their emotional impact', fact:'"Freedom fighters" vs "terrorists" describes the same group with opposite emotional loads. Loaded language reveals a writer\'s bias and purpose!' },
  { level:3, visual:'🗣️', question:'What is "evidence-based reasoning"?', options:['Drawing conclusions supported by specific facts or examples','Guessing at answers','Writing only opinions'], answer:'Drawing conclusions supported by specific facts or examples', fact:'Strong arguments = specific evidence + clear reasoning. The evidence answers "what?" The reasoning answers "so what?" — why this evidence matters!' },
  { level:3, visual:'🖊️', question:'What is a "counterclaim"?', options:['An argument that opposes the writer\'s main claim','The writer\'s main argument','A supporting detail'], answer:'An argument that opposes the writer\'s main claim', fact:'Acknowledging and refuting a counterclaim shows intellectual honesty and strengthens your argument. It shows you\'ve considered all sides!' },
  { level:3, visual:'💬', question:'What is "evaluating sources"?', options:['Judging the credibility and relevance of information','Reading all sources equally','Only using books as sources'], answer:'Judging the credibility and relevance of information', fact:'SIFT: Stop, Investigate the source, Find better coverage, Trace claims. Evaluating sources is critical thinking in action — don\'t believe everything you read!' },
  { level:3, visual:'📜', question:'What is "author\'s perspective" vs "narrator\'s perspective"?', options:['Author is the real writer; narrator is the voice in the story','They are the same thing','The narrator wrote the book; the author tells it'], answer:'Author is the real writer; narrator is the voice in the story', fact:'Fitzgerald wrote Gatsby, but Nick Carraway narrates it! The author\'s views may differ from the narrator\'s. Never assume they\'re the same!' },
  { level:3, visual:'🔤', question:'Which correctly uses a semicolon?', options:['She loved the ocean; she swam every morning.','She loved; the ocean.','She loved the ocean; because she swam.'], answer:'She loved the ocean; she swam every morning.', fact:'Semicolons join two INDEPENDENT clauses — two complete sentences closely related in meaning. Never use a semicolon before a dependent clause!' },
  { level:3, visual:'🎭', question:'What is "imagery" vs "sensory detail"?', options:['Imagery is figurative language engaging senses; sensory details are literal descriptions','They are identical in meaning','Imagery is only about sight'], answer:'Imagery is figurative language engaging senses; sensory details are literal descriptions', fact:'"The warm bread smelled like comfort" uses both — literal smell + figurative comfort. Strong writing layers literal and figurative sensory experiences!' },
  { level:3, visual:'📰', question:'What is "denotation"?', options:['The dictionary definition of a word','The emotional associations of a word','A word\'s origin and history'], answer:'The dictionary definition of a word', fact:'Denotation is the literal, dictionary meaning. Connotation is the emotional baggage a word carries. "Home" and "dwelling" have the same denotation but different connotations!' },
  { level:3, visual:'🗞️', question:'What is "connotation"?', options:['The emotional associations a word carries','The dictionary definition','A word\'s spelling'], answer:'The emotional associations a word carries', fact:'"Frugal" and "cheap" have similar denotations but very different connotations — frugal sounds wise, cheap sounds selfish. Word choice is powerful!' },
  { level:3, visual:'🖋️', question:'What is "textual analysis"?', options:['Closely examining a text to understand its meaning, structure, and technique','Reading a text one time','Writing a summary'], answer:'Closely examining a text to understand its meaning, structure, and technique', fact:'Textual analysis asks: What does this mean? Why did the author choose these words? How does structure affect meaning? It\'s literary detective work!' },
  { level:3, visual:'📓', question:'What is a "claim" in an argumentative essay?', options:['The debatable statement the writer will prove','A fact everyone agrees on','A supporting detail'], answer:'The debatable statement the writer will prove', fact:'Claims must be arguable! "The sky is blue" is a fact, not a claim. "Social media harms teenagers" is debatable — a proper argumentative claim!' },
  { level:3, visual:'📖', question:'What is "reasoning" in an argument?', options:['The explanation of why evidence supports the claim','The evidence itself','The writer\'s conclusion'], answer:'The explanation of why evidence supports the claim', fact:'The chain of argument: Claim → Evidence → Reasoning. Reasoning is the bridge — it explains HOW the evidence proves the claim. Never skip it!' },
  { level:3, visual:'📝', question:'What is "point of view bias"?', options:['When a narrator\'s perspective limits or slants the information given','A grammatical error in perspective use','When first and third person are mixed'], answer:'When a narrator\'s perspective limits or slants the information given', fact:'An unreliable or biased narrator colors how we see events. Recognizing point of view bias helps us read critically and seek multiple perspectives!' },
  { level:3, visual:'✏️', question:'What is "allusion" vs "reference"?', options:['Allusion implies without directly naming; reference directly names','They are the same thing','Reference is figurative; allusion is literal'], answer:'Allusion implies without directly naming; reference directly names', fact:'Allusion is the subtle art of implying cultural knowledge. A direct reference names the source; an allusion trusts the reader to make the connection!' },
  { level:3, visual:'📚', question:'What is "narrative perspective" vs "narrative distance"?', options:['Perspective is who tells it; distance is how close the narrator is to the story','They mean the same thing','Distance refers only to setting'], answer:'Perspective is who tells it; distance is how close the narrator is to the story', fact:'Close narrative distance feels intimate ("I felt my heart race"). Distant narration feels more objective ("He felt nervous"). Distance shapes emotional impact!' },
  { level:3, visual:'🗣️', question:'"The pen is mightier than the sword" is an example of', options:['Metaphor expressing an idea about the power of writing','Simile comparing writing and fighting','A literal historical fact'], answer:'Metaphor expressing an idea about the power of writing', fact:'This metaphor says writing (pen) has more power than violence (sword). Ideas outlast armies! Edward Bulwer-Lytton coined this in 1839!' },
  { level:3, visual:'🖊️', question:'What are "dashes" used for in writing?', options:['To add emphasis, interruption, or a dramatic pause','To end a sentence','To begin a list before a colon'], answer:'To add emphasis, interruption, or a dramatic pause', fact:'"She finally found what she was looking for — peace." The dash creates drama! Em dashes can replace commas, colons, or parentheses for extra punch!' },
  { level:3, visual:'💬', question:'Parentheses in writing are used to', options:['Add extra, non-essential information','Replace a period','Introduce a list'], answer:'Add extra, non-essential information', fact:'Parentheses whisper extra info: "The Amazon River (the longest in South America) flows east." Remove the parenthetical — the main sentence still works!' },
  { level:3, visual:'📜', question:'What is "argument structure"?', options:['Claim + evidence + reasoning + conclusion','Introduction + body + conclusion only','Evidence followed by a summary'], answer:'Claim + evidence + reasoning + conclusion', fact:'A well-built argument is like a bridge: the claim is the foundation, evidence and reasoning are the supports, the conclusion is the far bank!' },
  { level:3, visual:'🔤', question:'"Ethos" is established by', options:['Demonstrating expertise, honesty, and trustworthiness','Appealing to emotions','Using facts and statistics'], answer:'Demonstrating expertise, honesty, and trustworthiness', fact:'"As a scientist with 30 years of research..." — ethos at work! Credibility must be earned through knowledge, honesty, and track record!' },
  { level:3, visual:'🎭', question:'What is "dramatic structure"?', options:['The organization of a play into acts and scenes with rising and falling tension','Only how characters enter and exit','The rhyme scheme of a poem'], answer:'The organization of a play into acts and scenes with rising and falling tension', fact:'Freytag\'s Pyramid — exposition, rising action, climax, falling action, resolution — describes dramatic structure. It applies to plays, films, and novels!' },
  { level:3, visual:'📰', question:'What is "rhetorical structure"?', options:['How an argument is organized to persuade','The rhyme scheme of a poem','The plot structure of a story'], answer:'How an argument is organized to persuade', fact:'Skilled writers structure arguments strategically: anticipate objections, build emotional investment, then deliver the logical knockout. Structure IS persuasion!' },
  { level:3, visual:'🗞️', question:'What is "text complexity"?', options:['How difficult a text is based on vocabulary, structure, and ideas','How long a text is','How many pictures it contains'], answer:'How difficult a text is based on vocabulary, structure, and ideas', fact:'Text complexity includes quantitative factors (word frequency, sentence length) and qualitative factors (figurative language, theme complexity, purpose)!' },
  { level:3, visual:'🖋️', question:'What is "close reading"?', options:['Carefully analyzing a text multiple times for deep meaning','Reading quietly in a library','Reading only a short passage'], answer:'Carefully analyzing a text multiple times for deep meaning', fact:'Close reading: first for what (meaning), second for how (craft), third for why (purpose). Multiple reads reveal layers invisible on first pass!' },
  { level:3, visual:'📓', question:'What is "implicit evidence"?', options:['Evidence that must be inferred or read between the lines','Evidence directly stated in the text','Evidence from an outside source'], answer:'Evidence that must be inferred or read between the lines', fact:'Implicit = implied but not stated. When a character slams a door without saying they\'re angry, the emotion is implicit. Readers must infer it!' },
  { level:3, visual:'📖', question:'What is "narrative voice"?', options:['The distinctive style and personality of the narrator','The theme of the story','The setting of the narrative'], answer:'The distinctive style and personality of the narrator', fact:'Narrative voice includes word choice, sentence rhythm, tone, and attitude. Holden Caulfield\'s sarcastic, rebellious voice is unmistakable in Catcher in the Rye!' },
  { level:3, visual:'📝', question:'What is "perspective-taking" in reading?', options:['Understanding a viewpoint different from your own','Only agreeing with the author','Identifying the theme'], answer:'Understanding a viewpoint different from your own', fact:'Great readers inhabit different perspectives — characters unlike themselves, authors from other times and cultures. It builds empathy and critical thinking!' },
  { level:3, visual:'✏️', question:'What is "synthesis across texts"?', options:['Connecting ideas from multiple texts to form new insights','Summarizing one text very thoroughly','Finding one text that is better than another'], answer:'Connecting ideas from multiple texts to form new insights', fact:'When two texts about the same topic present different angles, synthesizing means: what does each add? Where do they agree or disagree? What\'s the bigger picture?' },
  { level:3, visual:'📚', question:'What is "structural analysis" of a text?', options:['Examining how the organization of a text creates meaning','Counting the number of paragraphs','Identifying all the nouns and verbs'], answer:'Examining how the organization of a text creates meaning', fact:'Structure is a choice! Why start in the middle? Why use flashbacks? Why alternate perspectives? Structure shapes meaning and reader experience!' },
  { level:3, visual:'🗣️', question:'What is "evaluating an argument"?', options:['Judging whether a claim is well-supported by logic and evidence','Agreeing with everything the author says','Finding grammar mistakes'], answer:'Judging whether a claim is well-supported by logic and evidence', fact:'Evaluate arguments: Is the evidence relevant and sufficient? Is the reasoning sound? Are there logical fallacies? Are other views fairly acknowledged?' },
  { level:3, visual:'🖊️', question:'What is a "logical fallacy"?', options:['An error in reasoning that makes an argument invalid','A fact that is proven wrong','A type of figurative language'], answer:'An error in reasoning that makes an argument invalid', fact:'"Everyone is doing it!" is the bandwagon fallacy. "Either you\'re with us or against us" is a false dilemma. Fallacies look like logic but aren\'t!' },
  { level:3, visual:'💬', question:'What is "characterization through dialogue"?', options:['Revealing character through what and how they speak','Describing a character\'s appearance','Stating directly what a character is like'], answer:'Revealing character through what and how they speak', fact:'"I never do anything wrong!" says a lot about a character without the author stating their flaws. Dialogue reveals personality, education, and values!' },
  { level:3, visual:'📜', question:'What is an "appositive phrase"?', options:['A noun phrase that renames the noun beside it','A verb phrase in past tense','A type of dependent clause'], answer:'A noun phrase that renames the noun beside it', fact:'"My dog, a golden retriever, loves to fetch." "A golden retriever" renames "my dog" — it\'s the appositive! Set it off with commas when non-essential!' },
  { level:3, visual:'🔤', question:'What is "voice" in argumentative writing?', options:['The writer\'s distinctive perspective and tone that comes through the words','How loudly the writer presents their case','The number of arguments made'], answer:'The writer\'s distinctive perspective and tone that comes through the words', fact:'Voice makes argument human and memorable. "I firmly believe" vs "One might consider" — same idea, very different voices. Voice builds connection with the reader!' },
  { level:3, visual:'🎭', question:'What is "dramatic tension"?', options:['The suspense and conflict that keeps an audience engaged','The stage directions of a play','The number of scenes in an act'], answer:'The suspense and conflict that keeps an audience engaged', fact:'Tension keeps audiences on the edge of their seats! Created through conflict, high stakes, ticking clocks, and dramatic irony. No tension = no drama!' },
  { level:3, visual:'📰', question:'What is "textual integrity"?', options:['The internal consistency of themes, characters, and ideas within a work','Perfect grammar throughout','The accuracy of historical facts'], answer:'The internal consistency of themes, characters, and ideas within a work', fact:'A text has integrity when all its parts work together — character choices fit their personalities, themes are woven consistently throughout. Everything connects!' },
  { level:3, visual:'🗞️', question:'What is "the significance of an ending"?', options:['How the ending reinforces or complicates the work\'s themes and ideas','Only what happens in the last chapter','Whether the hero survives'], answer:'How the ending reinforces or complicates the work\'s themes and ideas', fact:'Great endings resonate! They may resolve, subvert, or deepen the central question. The last line of a novel carries enormous thematic weight!' },
  { level:3, visual:'🖋️', question:'What does "evaluate the effectiveness of evidence" mean?', options:['Judging whether specific evidence actually supports the claim well','Counting how many pieces of evidence are used','Checking if evidence is from a book'], answer:'Judging whether specific evidence actually supports the claim well', fact:'Not all evidence is equal! Relevant, specific, credible evidence is strong. Vague, unrelated, or questionable evidence weakens even the best claims!' },
  { level:3, visual:'📓', question:'What is "authorial intent" vs "reader interpretation"?', options:['What the author meant vs what readers understand it to mean','The same thing viewed from different characters','The title vs the content'], answer:'What the author meant vs what readers understand it to mean', fact:'"Death of the Author" is a literary theory arguing a text\'s meaning isn\'t controlled by the author\'s intent — readers actively create meaning themselves!' },
  { level:3, visual:'📖', question:'What is "characterization of theme through repeated motifs"?', options:['When recurring symbols or patterns reinforce the central message','When a character repeats the same action','When a word is repeated for emphasis'], answer:'When recurring symbols or patterns reinforce the central message', fact:'In To Kill a Mockingbird, the mockingbird motif keeps returning to reinforce the theme of innocence destroyed. Motifs are the heartbeat of theme!' },
  { level:3, visual:'📝', question:'What is "hedging language" in academic writing?', options:['Words that qualify a claim to show uncertainty: might, could, suggests','Extremely confident definitive statements','Emotional language that appeals to the reader'], answer:'Words that qualify a claim to show uncertainty: might, could, suggests', fact:'"The data suggests..." is more academically honest than "The data proves..." Hedging language shows intellectual humility and awareness of complexity!' },
  { level:3, visual:'✏️', question:'What is "annotation" in reading?', options:['Marking up a text with notes, questions, and reactions while reading','Writing a book report after reading','Highlighting every sentence'], answer:'Marking up a text with notes, questions, and reactions while reading', fact:'Active readers annotate! Circle unfamiliar words, underline key ideas, note questions, mark figurative language. Annotation is thinking made visible on the page!' },
  { level:3, visual:'📚', question:'What is "bias in sources"?', options:['When a source consistently favors one perspective over others','When a source has spelling errors','When a source is very long'], answer:'When a source consistently favors one perspective over others', fact:'Even credible sources can have bias! Political bias, funding bias, cultural bias — always consider: who created this? What agenda might they have? Who benefits?' },
  { level:3, visual:'🗣️', question:'What is "paraphrasing vs. plagiarism"?', options:['Paraphrasing restates in your own words with credit; plagiarism copies without credit','They are both acceptable forms of research','Paraphrasing is only for poems'], answer:'Paraphrasing restates in your own words with credit; plagiarism copies without credit', fact:'Paraphrase + citation = academic honesty. Plagiarism = copying without credit. Even unintentional plagiarism is serious — always cite your sources!' },
  { level:3, visual:'🖊️', question:'What is "the effect of sentence variety" in writing?', options:['Using different sentence lengths and structures creates rhythm and holds reader interest','Using only short sentences is best','Long sentences are always more sophisticated'], answer:'Using different sentence lengths and structures creates rhythm and holds reader interest', fact:'Short sentences punch. Long, flowing sentences can carry the reader along in a current of ideas and images. Variety creates music in prose!' },
  { level:3, visual:'💬', question:'What is "intertextuality"?', options:['The relationship between texts that reference or respond to each other','A type of punctuation','The bibliography at the end of an essay'], answer:'The relationship between texts that reference or respond to each other', fact:'West Side Story responds to Romeo and Juliet; Paradise Lost responds to Genesis. All texts exist in conversation with other texts — nothing is created in a vacuum!' },
  // ── LEVEL 1 EXTRA ──
  { level:1, visual:'📖', question:'What does "mischievous" mean?', options:['Causing trouble in a playful way','Very helpful and kind','Extremely shy'], answer:'Causing trouble in a playful way', fact:'A mischievous child loves pranks! Mischievous has three syllables: MIS-chie-vous. Many people mispronounce it as "mis-CHEE-vee-us" — it has no extra syllable!' },
  { level:1, visual:'📝', question:'What does "curious" mean?', options:['Eager to know or learn','Completely bored','Very tired'], answer:'Eager to know or learn', fact:'Curious people ask great questions! Curiosity drove scientists like Darwin and Einstein to make world-changing discoveries. Curiosity is a superpower!' },
  { level:1, visual:'✏️', question:'Which word is an adverb in: "She sings beautifully"?', options:['Beautifully','She','Sings'], answer:'Beautifully', fact:'Beautifully describes HOW she sings — it modifies the verb "sings." Adverbs can modify verbs, adjectives, or other adverbs!' },
  { level:1, visual:'📚', question:'What is the "predicate" of: "The tall tree swayed in the wind"?', options:['Swayed in the wind','The tall tree','Tall tree'], answer:'Swayed in the wind', fact:'The predicate is everything after the subject — it includes the verb and all the words that follow it, telling us what the subject does or is!' },
  { level:1, visual:'🗣️', question:'The plural of "cactus" is', options:['Cacti','Cactuses','Cactis'], answer:'Cacti', fact:'Cacti is the Latin plural — English borrowed cactus from Latin and kept the Latin plural! Both "cacti" and "cactuses" are acceptable, but cacti is preferred!' },
  { level:1, visual:'🖊️', question:'Which word is a linking verb?', options:['Is','Run','Jump'], answer:'Is', fact:'Linking verbs connect the subject to a description: "She IS happy." Common linking verbs: is, are, was, were, seem, feel, look, become!' },
  { level:1, visual:'💬', question:'What does "resolve" mean?', options:['To find a solution to a problem','To create a new problem','To ignore a problem'], answer:'To find a solution to a problem', fact:'Stories end with the resolution — the conflict is resolved! Resolve also means strong determination: "She resolved to try harder."' },
  { level:1, visual:'📜', question:'What is a "preposition"?', options:['A word that shows the relationship between a noun and another word','An action word','A describing word'], answer:'A word that shows the relationship between a noun and another word', fact:'Prepositions show location and relationships: in, on, under, above, beside, through, between. "The cat is UNDER the table." Under is the preposition!' },
  { level:1, visual:'🔤', question:'Which sentence uses a period correctly?', options:['The library opens at nine.','The library opens at nine?','The library opens at nine!'], answer:'The library opens at nine.', fact:'Periods end declarative (statement) sentences. They create a full stop — the sentence is complete. Periods are the most common ending punctuation!' },
  { level:1, visual:'🎭', question:'What does "fable" mean?', options:['A short story with animal characters that teaches a moral','A very long adventure story','A story about real historical events'], answer:'A short story with animal characters that teaches a moral', fact:'Aesop\'s Fables are the most famous! The fox, the crow, the tortoise — animal characters teach us human lessons about pride, honesty, and persistence!' },
  { level:1, visual:'📰', question:'What does "repetition" mean in writing?', options:['Saying or writing the same thing more than once for emphasis','A mistake made while writing','Starting every sentence the same way'], answer:'Saying or writing the same thing more than once for emphasis', fact:'Repetition is a powerful rhetorical tool! Martin Luther King Jr. repeated "I Have a Dream" to drive his vision deep into hearts and minds!' },
  { level:1, visual:'🗞️', question:'Which sentence is in present tense?', options:['The flowers bloom every spring.','The flowers bloomed last spring.','The flowers will bloom next spring.'], answer:'The flowers bloom every spring.', fact:'Present tense describes what is happening now or habitually. "Bloom" is present. "Bloomed" is past. "Will bloom" is future!' },
  { level:1, visual:'🖋️', question:'What does "encyclopedia" provide?', options:['General information on many topics','A list of words and definitions','A step-by-step how-to guide'], answer:'General information on many topics', fact:'Encyclopedias cover vast amounts of general knowledge. Digital encyclopedias like Wikipedia have replaced most printed versions — but the concept is ancient!' },
  { level:1, visual:'📓', question:'What is a "synonym" for "angry"?', options:['Furious','Happy','Calm'], answer:'Furious', fact:'Furious is a stronger synonym for angry! Synonyms add variety and precision: annoyed → angry → furious → enraged. Each word has a different intensity!' },
  { level:1, visual:'📖', question:'What does "inquisitive" mean?', options:['Curious and asking many questions','Completely silent','Very lazy'], answer:'Curious and asking many questions', fact:'Inquisitive comes from Latin "inquisitus" meaning to inquire. An inquisitive scientist asks questions that unlock the secrets of the universe!' },
  { level:1, visual:'📝', question:'What is an "interjection"?', options:['A word expressing sudden emotion: Wow! Oh! Ouch!','A connecting word','A describing word'], answer:'A word expressing sudden emotion: Wow! Oh! Ouch!', fact:'Interjections burst out of sentences: Wow, that\'s amazing! They show sudden feeling and are usually followed by an exclamation mark or comma!' },
