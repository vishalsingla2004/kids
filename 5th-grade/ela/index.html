  { level:1, visual:'✏️', question:'Which is a past-tense irregular verb?', options:['Brought','Bringed','Brang'], answer:'Brought', fact:'Bring→Brought is irregular. Brought, thought, bought, caught, sought — all these words rhyme and are all irregular past-tense forms!' },
  { level:1, visual:'📚', question:'The "resolution" of a story comes', options:['At the very end, when the conflict is solved','At the very beginning','At the middle climax'], answer:'At the very end, when the conflict is solved', fact:'Resolution = conflict resolved = story complete. Stories need problems (conflict) AND solutions (resolution) to feel satisfying and complete!' },
  { level:1, visual:'🗣️', question:'A word that sounds like its meaning, like "sizzle," is called', options:['Onomatopoeia','Alliteration','Rhyme'], answer:'Onomatopoeia', fact:'Sizzle, buzz, crash, bang — the word IS the sound! Onomatopoeia is one of the most fun words in English and one of the most vivid poetic devices!' },
  { level:1, visual:'🖊️', question:'What does "vivid" mean in "vivid description"?', options:['Very clear and lifelike','Very brief','Completely confusing'], answer:'Very clear and lifelike', fact:'Vivid descriptions create a movie in the reader\'s mind! Vivid comes from Latin "vivere" meaning to live — vivid writing feels alive!' },
  { level:1, visual:'💬', question:'What is the "subject" of: "The energetic puppy chased its tail"?', options:['The energetic puppy','Chased its tail','Energetic'], answer:'The energetic puppy', fact:'The complete subject includes the noun AND all its modifiers. "The energetic puppy" is the complete subject — the simple subject is just "puppy"!' },
  { level:1, visual:'📜', question:'What does "define" mean?', options:['To explain the meaning of a word','To argue a point','To tell a story about something'], answer:'To explain the meaning of a word', fact:'Defining words is a core literacy skill. Dictionary definitions + context clues + word roots all help you define unfamiliar words in reading!' },
  { level:1, visual:'🔤', question:'A word with multiple meanings is called', options:['A homonym','A synonym','An antonym'], answer:'A homonym', fact:'"Bank" means riverbank AND financial institution! Homonyms are words that are spelled and sound the same but have different meanings. Context tells you which!' },
  { level:1, visual:'🎭', question:'What does the suffix "-tion" create in words like "nation"?', options:['A noun','A verb','An adjective'], answer:'A noun', fact:'-tion, -sion, -ation all create nouns: nation, action, imagination, celebration. Adding -tion to a verb often makes it a noun: act→action!' },
  { level:1, visual:'📰', question:'What is "rhyme" in poetry?', options:['Words that end with the same sound','Words that start with the same letter','Words that mean the same thing'], answer:'Words that end with the same sound', fact:'Cat/hat, tree/free, night/bright — rhyming words share the same ending sound. Rhyme creates musicality and makes poetry memorable and fun!' },
  { level:1, visual:'🗞️', question:'What does "evidence" do in a paragraph?', options:['Supports and proves the main idea','States the topic of the paragraph','Concludes the paragraph'], answer:'Supports and proves the main idea', fact:'The main idea makes a claim; evidence backs it up. Every main idea deserves specific evidence — examples, facts, quotes, or data!' },
  { level:1, visual:'🖋️', question:'Which of these is a sentence fragment?', options:['Running through the park at dawn.','She runs every morning.','The athlete trains hard.'], answer:'Running through the park at dawn.', fact:'Fragments are incomplete! "Running through the park at dawn" has no subject doing the running. Add one: "She was running through the park at dawn."' },
  { level:1, visual:'📓', question:'What does "communicate" mean?', options:['To share or exchange information','To keep information secret','To forget information'], answer:'To share or exchange information', fact:'Communication is a core human skill! Speaking, writing, gesturing, drawing — all are ways we communicate. Effective communication shapes relationships and careers!' },
  { level:1, visual:'📖', question:'What is "alliteration" used for in writing?', options:['To create rhythm and make phrases memorable','To explain a difficult idea','To provide evidence for a claim'], answer:'To create rhythm and make phrases memorable', fact:'Silly Sally sat by the seashore — the repeated S sound creates a musical effect! Alliteration is used in poetry, advertising, and tongue twisters!' },
  { level:1, visual:'📝', question:'What does "describe" mean?', options:['To paint a picture with words telling what something is like','To retell events in order','To explain a cause and effect'], answer:'To paint a picture with words telling what something is like', fact:'Good description uses specific details that engage the five senses. Instead of "nice weather," try "warm sun, soft breeze, blue sky with fluffy clouds!"' },
  { level:1, visual:'✏️', question:'What is "voice" in writing?', options:['The unique style and personality a writer expresses','How loud a character speaks','The number of sentences in a paragraph'], answer:'The unique style and personality a writer expresses', fact:'Your writing voice is like a fingerprint — uniquely yours! Word choice, sentence length, humor, and attitude all make up a writer\'s distinctive voice!' },
  { level:1, visual:'📚', question:'What does the prefix "pre-" mean in "preview"?', options:['Before','After','Again'], answer:'Before', fact:'Pre- means before: preview = see before, predict = say before, prepare = get ready before. Knowing prefixes unlocks hundreds of vocabulary words!' },
  { level:1, visual:'🗣️', question:'What is a "paragraph"?', options:['A group of sentences about one main idea','A single sentence','A section heading'], answer:'A group of sentences about one main idea', fact:'Paragraphs organize writing into chunks. Each paragraph has one main idea supported by details. Indent the first word to signal a new paragraph!' },
  { level:1, visual:'🖊️', question:'Which sentence correctly uses a capital letter?', options:['My birthday is in October.','My birthday is in october.','my Birthday is in October.'], answer:'My birthday is in October.', fact:'Months of the year are proper nouns — always capitalize them! January, February, March... all capitalized because they name specific months!' },
  { level:1, visual:'💬', question:'What is a "topic sentence"?', options:['The sentence that states the main idea of a paragraph','The last sentence of a paragraph','A sentence with many details'], answer:'The sentence that states the main idea of a paragraph', fact:'The topic sentence is the paragraph\'s boss — it announces the main idea. All other sentences in the paragraph support or explain the topic sentence!' },
  { level:1, visual:'📜', question:'What does "detail" mean in writing?', options:['A specific piece of information that supports a main idea','The overall point of a paragraph','The first sentence of an essay'], answer:'A specific piece of information that supports a main idea', fact:'Details are the bricks that build understanding. Specific details (exact numbers, names, examples) are stronger than vague ones ("a lot," "many things")!' },
  { level:1, visual:'🔤', question:'What is a "root word"?', options:['The base part of a word from which other words are made','A prefix added to the front','A suffix added to the end'], answer:'The base part of a word from which other words are made', fact:'Happy is the root of happiness, unhappy, and happily. The Latin root "port" (carry) gives us: transport, import, export, portable. Roots are word seeds!' },
  { level:1, visual:'🎭', question:'What does "conflict" mean in a story?', options:['The main problem or struggle the character faces','The setting of the story','The ending of the story'], answer:'The main problem or struggle the character faces', fact:'Without conflict, there is no story! Every story has a central problem to solve. Conflict creates tension and keeps readers turning the pages!' },
  { level:1, visual:'📰', question:'What is "rhythm" in poetry?', options:['The pattern of stressed and unstressed syllables','The rhyming words at line ends','The number of stanzas'], answer:'The pattern of stressed and unstressed syllables', fact:'Rhythm is the heartbeat of a poem! When you tap your foot to a poem, you feel its rhythm. Shakespeare\'s iambic pentameter has a da-DUM da-DUM beat!' },
  { level:1, visual:'🗞️', question:'What does "persuade" mean?', options:['To convince someone to think or act a certain way','To tell a story for entertainment','To explain how something works'], answer:'To convince someone to think or act a certain way', fact:'Advertisements, speeches, and editorials aim to persuade. Persuasive writers use evidence, logic, and emotional appeal to change minds and inspire action!' },
  // ── LEVEL 2 EXTRA ──
  { level:2, visual:'📖', question:'The phrase "time flies when you\'re having fun" is', options:['An idiom about time passing quickly','Literally about insects','A metaphor about clocks'], answer:'An idiom about time passing quickly', fact:'Time can\'t literally fly — this is an idiom! Idioms are culturally specific, which is why they can be tricky for people learning a new language!' },
  { level:2, visual:'📝', question:'"Don\'t count your chickens before they hatch" means', options:['Don\'t plan on results before they happen','Always count farm animals carefully','Chickens are unpredictable animals'], answer:'Don\'t plan on results before they happen', fact:'This proverb warns against overconfidence. Don\'t spend your bonus before you receive it! Ancient wisdom packaged in a homey, memorable image!' },
  { level:2, visual:'✏️', question:'An "analogy" compares two things to show', options:['How one thing is like another in some way','That two things are exactly the same','That two things are complete opposites'], answer:'How one thing is like another in some way', fact:'"Brain is to thinking as heart is to pumping." Analogies help explain unfamiliar ideas using familiar comparisons. Scientists use analogies constantly!' },
  { level:2, visual:'📚', question:'What is "characterization through setting"?', options:['Using the environment to reveal something about characters or events','Describing where a story takes place in detail','Naming all the places in a story'], answer:'Using the environment to reveal something about characters or events', fact:'A messy room reveals a character\'s personality; a stormy night creates tension. Setting isn\'t just background — it shapes and reveals everything!' },
  { level:2, visual:'🗣️', question:'"The description structure" in nonfiction', options:['Uses sensory details to describe a topic or subject','Lists events in time order','Shows cause and effect relationships'], answer:'Uses sensory details to describe a topic or subject', fact:'Descriptive text structure paints a picture: "The tarantula has eight eyes, hairy legs, and can grow as large as a dinner plate." It answers: what is it like?' },
  { level:2, visual:'🖊️', question:'A "thesis" in an essay must be', options:['Arguable and specific, not just a fact','A well-known fact everyone agrees with','The longest sentence in the essay'], answer:'Arguable and specific, not just a fact', fact:'"Dogs are animals" is a fact, not a thesis. "Dogs make better pets than cats because they\'re more loyal and trainable" is arguable — a real thesis!' },
  { level:2, visual:'💬', question:'What is "purpose" in reading a text?', options:['Why the author wrote the text and what they want readers to do or think','The topic of the text','The length of the text'], answer:'Why the author wrote the text and what they want readers to do or think', fact:'Every text has a purpose! News articles inform, advertisements persuade, novels entertain. Identifying purpose helps you read more strategically!' },
  { level:2, visual:'📜', question:'A "graphic organizer" is used to', options:['Visually organize ideas, information, or text structures','Decorate a page','Summarize a poem'], answer:'Visually organize ideas, information, or text structures', fact:'Venn diagrams, story maps, T-charts, and web organizers help thinking become visible! Graphic organizers are tools for both planning writing and understanding reading!' },
  { level:2, visual:'🔤', question:'"For example" and "such as" signal', options:['An example or illustration in writing','A cause and effect relationship','A contrast between ideas'], answer:'An example or illustration in writing', fact:'Signal words tell you what type of information is coming! "For example" = here\'s a specific case. "However" = contrast. "Therefore" = a conclusion follows!' },
  { level:2, visual:'🎭', question:'What is a "flat character"?', options:['A character with only one or two personality traits','A character with many complex traits','A character who changes a lot'], answer:'A character with only one or two personality traits', fact:'Flat characters are simple and predictable — they don\'t surprise you. Round characters have many layers, like real people. Most minor characters are flat!' },
  { level:2, visual:'📰', question:'What is a "round character"?', options:['A complex character with many personality traits','A character with only one trait','A character who is very friendly'], answer:'A complex character with many personality traits', fact:'Round characters feel real because they have contradictions, growth, and complexity — just like actual people. Protagonists are usually round characters!' },
  { level:2, visual:'🗞️', question:'What is a "hook" in writing?', options:['An attention-grabbing opening that pulls readers in','The concluding sentence','A list of supporting details'], answer:'An attention-grabbing opening that pulls readers in', fact:'Start with a bang! A surprising fact, a bold question, a vivid anecdote, or a striking quote — all can hook readers. The hook is your first impression!' },
  { level:2, visual:'🖋️', question:'What does "coherence" mean in writing?', options:['Ideas that flow logically and are clearly connected','Very long sentences','A large number of details'], answer:'Ideas that flow logically and are clearly connected', fact:'Coherent writing flows like a river — ideas connect smoothly. Transitions, pronoun references, and consistent topic help create coherence!' },
  { level:2, visual:'📓', question:'What is "pacing" in storytelling?', options:['How fast or slow the story moves','The length of each chapter','The setting of the story'], answer:'How fast or slow the story moves', fact:'Fast pacing (short sentences, action, dialogue) creates excitement. Slow pacing (description, reflection) creates depth. Good writers control pace like a director!' },
  { level:2, visual:'📖', question:'What is a "compound-complex sentence"?', options:['A sentence with at least two independent clauses and one dependent clause','A sentence with only two independent clauses','A sentence with only a dependent clause'], answer:'A sentence with at least two independent clauses and one dependent clause', fact:'"Because it rained, we stayed inside, and we played board games." One dependent + two independent clauses = compound-complex. The most sophisticated sentence type!' },
  { level:2, visual:'📝', question:'"Neither/nor" and "either/or" are examples of', options:['Correlative conjunctions','Coordinating conjunctions','Subordinating conjunctions'], answer:'Correlative conjunctions', fact:'Correlative conjunctions work in pairs: either/or, neither/nor, both/and, not only/but also. They connect parallel elements that belong together!' },
  { level:2, visual:'✏️', question:'What is "abstract" vocabulary?', options:['Words for concepts that can\'t be touched or seen, like freedom or justice','Words for physical objects','Words for colors and shapes'], answer:'Words for concepts that can\'t be touched or seen, like freedom or justice', fact:'Concrete words name things you can sense (tree, rain, thunder). Abstract words name ideas (freedom, justice, beauty). Both are essential in ELA!' },
  { level:2, visual:'📚', question:'What is "objective" writing?', options:['Writing based on facts without personal feelings','Writing that strongly expresses personal opinions','Writing that tells a personal story'], answer:'Writing based on facts without personal feelings', fact:'News articles aim to be objective. Scientific reports are objective. Objective writing reports the facts and lets readers draw their own conclusions!' },
  { level:2, visual:'🗣️', question:'What is "subjective" writing?', options:['Writing that includes personal feelings and opinions','Writing based only on facts','Writing with no descriptive words'], answer:'Writing that includes personal feelings and opinions', fact:'Reviews, personal essays, and editorials are subjective — they\'re colored by the writer\'s personal perspective and feelings. Knowing this helps readers evaluate them!' },
  { level:2, visual:'🖊️', question:'"In contrast" signals what text relationship?', options:['A difference between two things','A similarity between two things','A cause and effect relationship'], answer:'A difference between two things', fact:'"The north is cold; in contrast, the south is warm." "In contrast" is a signal word — it tells you the next idea will be different from the previous one!' },
  { level:2, visual:'💬', question:'What are "commas with introductory phrases" used for?', options:['To separate an introductory phrase from the main clause','To join two independent sentences','To set off a direct address'], answer:'To separate an introductory phrase from the main clause', fact:'"After the storm, the sky cleared." The comma after "storm" separates the introductory phrase from the main clause. This comma prevents confusion!' },
  { level:2, visual:'📜', question:'What is "textual evidence"?', options:['Specific words, phrases, or sentences from the text that support an answer','Your opinion about the text','Background knowledge you bring to the text'], answer:'Specific words, phrases, or sentences from the text that support an answer', fact:'In ELA, always back up your answers with textual evidence! Quote directly ("According to the text...") or paraphrase. Evidence = credibility!' },
  { level:2, visual:'🔤', question:'What does "cite" mean when answering reading questions?', options:['Use specific evidence from the text to support your answer','Simply write your opinion','Rewrite the question'], answer:'Use specific evidence from the text to support your answer', fact:'"Cite evidence" means point to the text! Quote a specific line or reference a specific detail. Citing makes answers credible and thorough!' },
  { level:2, visual:'🎭', question:'What is the "narrator" of a story?', options:['The voice that tells the story','The main character','The author\'s real identity'], answer:'The voice that tells the story', fact:'The narrator and the author are not always the same! A first-person narrator is a character in the story. Third-person narrators stand outside the story!' },
  { level:2, visual:'📰', question:'What does "relevant" mean for evidence in an essay?', options:['Directly connected to and supporting the claim','Being from a famous source','Being very recent or new'], answer:'Directly connected to and supporting the claim', fact:'Relevant evidence directly proves your point. Irrelevant evidence — even if interesting — weakens an argument by going off-topic. Stay focused!' },
  { level:2, visual:'🗞️', question:'"Furthermore" and "in addition" signal what relationship?', options:['Adding more information to support an idea','Showing contrast','Showing cause and effect'], answer:'Adding more information to support an idea', fact:'"Furthermore" means here\'s more evidence for the same point. "However" signals contrast. Signal words are a reader\'s GPS through an argument!' },
  { level:2, visual:'🖋️', question:'What is "plagiarism"?', options:['Using someone else\'s words or ideas without giving credit','Quoting a source with proper citation','Paraphrasing an idea in your own words'], answer:'Using someone else\'s words or ideas without giving credit', fact:'Plagiarism is intellectual theft. It can result in failing grades, expulsion, or even legal consequences. Always cite your sources — it\'s a simple but crucial habit!' },
  { level:2, visual:'📓', question:'What does "revise" mean in writing?', options:['To improve the content, organization, and clarity of a draft','To check spelling and punctuation only','To write the first draft'], answer:'To improve the content, organization, and clarity of a draft', fact:'Revision = re-vision = seeing again. Great writers revise! Add details, cut weak sections, reorder for clarity. Revision is where writing becomes excellent!' },
  { level:2, visual:'📖', question:'What does "edit" mean in writing?', options:['To correct grammar, spelling, and punctuation errors','To add new ideas and details','To reorganize the structure'], answer:'To correct grammar, spelling, and punctuation errors', fact:'Editing is the final polish! After revising (big picture), editing fixes the small stuff: comma errors, misspellings, run-ons. Both are essential steps!' },
  { level:2, visual:'📝', question:'What is a "thesis statement"?', options:['The main argument or point of an essay stated in the introduction','A supporting detail in the body','A restated fact from research'], answer:'The main argument or point of an essay stated in the introduction', fact:'Your thesis is your essay\'s promise: this is what I will argue and prove. Everything in the essay should connect back to and support the thesis!' },
  { level:2, visual:'✏️', question:'What is the "body" of an essay?', options:['The middle paragraphs that develop and support the thesis','The first paragraph introducing the topic','The final paragraph wrapping up'], answer:'The middle paragraphs that develop and support the thesis', fact:'Body paragraphs are the essay\'s engine — they do the heavy lifting of developing arguments with evidence and reasoning. Each body paragraph = one main point!' },
  // ── LEVEL 3 EXTRA ──
  { level:3, visual:'📖', question:'What is "free verse" poetry?', options:['Poetry without regular rhyme or meter','Poetry with a strict rhyme scheme','Poetry with exactly 14 lines'], answer:'Poetry without regular rhyme or meter', fact:'Free verse breaks all the old rules — no required rhyme, no fixed meter. But great free verse has its own internal music through line breaks, rhythm, and images!' },
  { level:3, visual:'📝', question:'What is a "sonnet"?', options:['A 14-line poem often about love, usually in iambic pentameter','A poem with no rhyme','A poem with three stanzas of four lines each'], answer:'A 14-line poem often about love, usually in iambic pentameter', fact:'Shakespeare wrote 154 sonnets! The Petrarchan and Shakespearean sonnets differ in rhyme scheme. Both turn on a "volta" — a twist or shift in thought!' },
  { level:3, visual:'✏️', question:'What is "iambic pentameter"?', options:['A line of poetry with 10 syllables alternating unstressed-stressed','A poem with exactly 10 lines','A rhyme scheme of ABAB'], answer:'A line of poetry with 10 syllables alternating unstressed-stressed', fact:'da-DUM da-DUM da-DUM da-DUM da-DUM — five iambs (da-DUM) per line. Shakespeare\'s plays and sonnets are written in iambic pentameter. It mimics natural speech!' },
  { level:3, visual:'📚', question:'What is a "Bildungsroman"?', options:['A coming-of-age novel following a character\'s growth to adulthood','A novel set during a war','A collection of short stories'], answer:'A coming-of-age novel following a character\'s growth to adulthood', fact:'German: Bildung (education/formation) + Roman (novel). Harry Potter, The Catcher in the Rye, and To Kill a Mockingbird are Bildungsromans — heroes grow up!' },
  { level:3, visual:'🗣️', question:'What is a "red herring" in literature?', options:['A misleading clue that distracts readers from the truth','A symbol representing danger','A type of irony'], answer:'A misleading clue that distracts readers from the truth', fact:'Mystery writers plant red herrings to keep you guessing! They lead you toward false suspects or conclusions. Agatha Christie was the queen of red herrings!' },
  { level:3, visual:'🖊️', question:'What is "tragic catharsis"?', options:['The emotional release audiences feel watching a tragic hero fall','A type of character flaw','A symbol for death in literature'], answer:'The emotional release audiences feel watching a tragic hero fall', fact:'Aristotle said watching tragedy allows us to safely experience fear and pity, then feel cleansed. Weeping at a play is psychologically healing!' },
  { level:3, visual:'💬', question:'What is an "archetypal character"?', options:['A character type that recurs across many stories and cultures','A character from Ancient Greece','The main villain of a story'], answer:'A character type that recurs across many stories and cultures', fact:'The Hero, the Mentor, the Trickster, the Shadow — Carl Jung identified these archetypes. Luke Skywalker, Gandalf, Loki, Darth Vader — all archetypal!' },
  { level:3, visual:'📜', question:'What is "magical realism"?', options:['A literary style where magical elements appear in an otherwise realistic world','Pure fantasy with no realistic elements','Science fiction set in the future'], answer:'A literary style where magical elements appear in an otherwise realistic world', fact:'Gabriel García Márquez\'s One Hundred Years of Solitude is magical realism — ghosts walk alongside real people, but the world is otherwise our own!' },
  { level:3, visual:'🔤', question:'What is "the subjunctive mood" used for?', options:['Expressing wishes, hypotheticals, and things contrary to fact','Describing past events','Commanding someone to do something'], answer:'Expressing wishes, hypotheticals, and things contrary to fact', fact:'"I wish I were taller." Were (not was) is subjunctive — it signals this is hypothetical. "If I were president..." uses subjunctive to express unreality!' },
  { level:3, visual:'🎭', question:'What is "Chekhov\'s Gun"?', options:['If a gun is shown in Act 1, it must be used before the story ends','A character with a gun in a play','A symbol of violence in drama'], answer:'If a gun is shown in Act 1, it must be used before the story ends', fact:'Anton Chekhov\'s principle: don\'t include details you won\'t use! Every significant element should serve a purpose. It\'s a rule of narrative economy and craft!' },
  { level:3, visual:'📰', question:'What is "the unreliable narrator" technique used to explore?', options:['The gap between a narrator\'s perception and reality, questioning truth and memory','Only stories about mental illness','Ways to make reading more confusing'], answer:'The gap between a narrator\'s perception and reality, questioning truth and memory', fact:'We Are All Unreliable! Our memories, perspectives, and biases filter reality. Unreliable narrators mirror this truth — they make us question what we "know."' },
  { level:3, visual:'🗞️', question:'What is "selective omission" as a bias technique?', options:['Leaving out information that contradicts the writer\'s viewpoint','Selecting only the best quotes','Using very specific statistics'], answer:'Leaving out information that contradicts the writer\'s viewpoint', fact:'What a writer DOESN\'T say can be just as revealing as what they do say! Selective omission creates a skewed picture while appearing objective. Read critically!' },
  { level:3, visual:'🖋️', question:'What is "the effect of structure on meaning"?', options:['How the way a text is organized shapes what it communicates','Only how long the text is','Which font is used in the text'], answer:'How the way a text is organized shapes what it communicates', fact:'A poem about chaos might have fragmented structure. A persuasive essay builds logically. A mystery withholds key info. Structure IS meaning — form serves function!' },
  { level:3, visual:'📓', question:'What is "historical context" in literary analysis?', options:['Understanding when and where a text was written to better interpret its meaning','The setting of the story','The author\'s childhood'], answer:'Understanding when and where a text was written to better interpret its meaning', fact:'1984 means more knowing it was written in 1948 — Orwell was living through Stalin\'s USSR and the start of the Cold War. Historical context deepens interpretation immeasurably!' },
  { level:3, visual:'📖', question:'What is a "foil" character used to reveal?', options:['The protagonist\'s traits by contrasting them with opposite qualities','Only the villain\'s weakness','The setting of the story'], answer:'The protagonist\'s traits by contrasting them with opposite qualities', fact:'Hermione\'s careful rule-following makes Harry\'s impulsive bravery stand out more. Foils work by contrast — the opposite highlights the original!' },
  { level:3, visual:'📝', question:'What is "assonance"?', options:['Repetition of vowel sounds in nearby words','Repetition of consonant sounds','Repetition of whole words'], answer:'Repetition of vowel sounds in nearby words', fact:'"The rain in Spain falls mainly on the plain." The long A sound (rain, Spain, plain) repeating is assonance. It creates internal rhyme and musicality!' },
  { level:3, visual:'✏️', question:'What is "consonance"?', options:['Repetition of consonant sounds within or at the ends of words','Repetition of vowel sounds','Repetition of whole lines'], answer:'Repetition of consonant sounds within or at the ends of words', fact:'"The lumpy, bumpy, grumpy old man" — the -mp and -mpy sounds repeat. Consonance creates texture and sonic richness in poetry and prose!' },
  { level:3, visual:'📚', question:'What is "the effect of diction on tone"?', options:['Word choices reveal the author\'s attitude toward the subject','Diction only affects how long sentences are','Word choice is irrelevant to tone'], answer:'Word choices reveal the author\'s attitude toward the subject', fact:'"The protesters marched" vs "the mob stormed" — same event, very different diction, completely different tone. Every word choice is a tonal decision!' },
  { level:3, visual:'🗣️', question:'What is "narrative arc"?', options:['The overall shape of a story from beginning through conflict to resolution','Only the climax of the story','The number of chapters in a novel'], answer:'The overall shape of a story from beginning through conflict to resolution', fact:'Every story has an arc — exposition rises to conflict, peaks at climax, falls to resolution. Understanding arc helps writers plan and readers predict structure!' },
  { level:3, visual:'🖊️', question:'What does "deconstruct a text" mean?', options:['Analyze how a text\'s language and structure create its meanings','Summarize the plot in order','Find all the nouns and verbs'], answer:'Analyze how a text\'s language and structure create its meanings', fact:'Deconstruction asks: how does language shape what we believe? What assumptions does this text make? What voices are absent? It\'s radical close reading!' },
  { level:3, visual:'💬', question:'What is "the author\'s craft"?', options:['The specific choices authors make about language, structure, and technique','The author\'s job or profession','Only figurative language use'], answer:'The specific choices authors make about language, structure, and technique', fact:'Craft is intentional artistry — every word, every line break, every structural choice is made for a reason. Great authors make craft invisible; great readers make it visible!' },
  { level:3, visual:'📜', question:'What is a "paradox" in literature?', options:['A statement that seems self-contradictory but reveals a deeper truth','A comparison using like or as','A repeated structural pattern'], answer:'A statement that seems self-contradictory but reveals a deeper truth', fact:'"Less is more." "I must be cruel to be kind." These seem contradictory but contain wisdom! Paradoxes make readers pause, think, and discover unexpected truth!' },
  { level:3, visual:'🔤', question:'What is "zeugma"?', options:['One word governing two or more words in a sentence in different ways','Repeating a word at the start of phrases','Omitting conjunctions between items'], answer:'One word governing two or more words in a sentence in different ways', fact:'"She broke his car and his heart." "Broke" applies to car (literally) and heart (metaphorically) — that\'s zeugma! It creates wit, surprise, and compression!' },
  { level:3, visual:'🎭', question:'What is "mise en scène" in drama?', options:['Everything visible on stage: setting, costumes, blocking, lighting','Only the dialogue of the play','The theme of the drama'], answer:'Everything visible on stage: setting, costumes, blocking, lighting', fact:'Mise en scène is French for "placing on stage." Every visual element communicates meaning. A stark white set says something very different from a cluttered dark one!' },
  { level:2, visual:'📖', question:'A "personal narrative" is written in', options:['First person using I, me, my','Third person using he, she, they','Second person using you, your'], answer:'First person using I, me, my', fact:'Personal narratives are YOUR story told in YOUR voice. First person (I, me, my) puts the reader directly inside your experience. It\'s the most intimate point of view!' },
  { level:2, visual:'📝', question:'What are "transition words" used for?', options:['To connect ideas smoothly between sentences and paragraphs','To begin every sentence the same way','To introduce the topic of an essay'], answer:'To connect ideas smoothly between sentences and paragraphs', fact:'Without transitions, writing is choppy! First, then, however, therefore, in conclusion — these words guide readers through your argument like a GPS!' },
  { level:2, visual:'✏️', question:'What is "word choice" (diction) and why does it matter?', options:['The specific words a writer selects, which shape tone and meaning','How many words are in a paragraph','Whether words are long or short'], answer:'The specific words a writer selects, which shape tone and meaning', fact:'"Said" vs "whispered" vs "shouted" — same action, wildly different pictures! Precise word choice is the mark of a skilled writer. Every word earns its place!' },
  { level:3, visual:'📚', question:'What is "the effect of point of view on reliability"?', options:['A narrator\'s perspective limits what they know and how objectively they report it','Point of view has no effect on reliability','Third person is always more reliable than first'], answer:'A narrator\'s perspective limits what they know and how objectively they report it', fact:'A first-person narrator can only report their own experience and is inevitably biased. Even omniscient narrators make choices about what to include and emphasize!' },
  { level:3, visual:'🗣️', question:'What is "the turn" (volta) in a sonnet?', options:['A shift in thought, argument, or mood, usually at line 9 or 13','The rhyming couplet at the end','The opening question of the poem'], answer:'A shift in thought, argument, or mood, usually at line 9 or 13', fact:'The volta is a sonnet\'s pivot point — where the poem\'s thinking turns. In Shakespeare, the final couplet often delivers the volta and the poem\'s key insight!' },
];

const QUIZ_KEY = 'kids_q_sba_ela';
const POINTS_KEY='kids_points';
function getPoints(){return parseInt(localStorage.getItem(POINTS_KEY)||'0');}
function addPoints(n){const today=new Date().toISOString().slice(0,10);const dayKey='kids_pts_date',todayKey='kids_pts_today';let todayPts=parseInt(localStorage.getItem(todayKey)||'0');if(localStorage.getItem(dayKey)!==today){todayPts=0;localStorage.setItem(dayKey,today);}const canAdd=Math.max(0,Math.min(n,100-todayPts));if(canAdd>0){localStorage.setItem(POINTS_KEY,getPoints()+canAdd);localStorage.setItem(todayKey,todayPts+canAdd);}}

let current = 0, score = 0, dotResults = [], sessionQ = [];
let sessionAnswers=[],sessionShuffled=[],viewingIdx=null;
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}
function playCorrect() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [1047,1319,1568,2093,1568,1319].forEach((f,i) => note(ctx,'triangle',f,t+i*0.07,0.14,0.5));
    [[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur]) => {
      note(ctx,'triangle',f,t+d,dur,0.55); note(ctx,'sine',f*2,t+d,dur*0.5,0.14);
    });
  });
}
function playWrong() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay]) => {
      const osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination); osc.type='sawtooth';
      osc.frequency.setValueAtTime(f1,t+delay); osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);
      gn.gain.setValueAtTime(0.001,t+delay); gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02); gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);
      osc.start(t+delay); osc.stop(t+delay+0.3);
    });
    const osc=ctx.createOscillator(), gn=ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination); osc.type='sine';
    osc.frequency.setValueAtTime(380,t+0.92); osc.frequency.exponentialRampToValueAtTime(55,t+1.4);
    gn.gain.setValueAtTime(0.001,t+0.92); gn.gain.linearRampToValueAtTime(0.55,t+0.93); gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);
    osc.start(t+0.92); osc.stop(t+1.5);
  });
}
function playLevelUp() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d]) => note(ctx,'triangle',f,t+d,0.25,0.45));
    note(ctx,'sine',1047,t+0.84,0.8,0.3); note(ctx,'sine',1319,t+0.90,0.7,0.25); note(ctx,'sine',1568,t+0.96,0.6,0.2);
  });
}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function updateNavArrows(){const p=document.getElementById('navPrev'),n=document.getElementById('navNext');if(!p)return;const idx=viewingIdx!==null?viewingIdx:current;p.style.display=idx>0?'flex':'none';n.style.display=(viewingIdx!==null&&viewingIdx<current)?'flex':'none';}
function navBack(){const idx=viewingIdx!==null?viewingIdx:current;if(idx>0)showPastQuestion(idx-1);}
function navForward(){if(viewingIdx===null)return;if(viewingIdx<current-1)showPastQuestion(viewingIdx+1);else{viewingIdx=null;showQuestion();}}
function showPastQuestion(idx){viewingIdx=idx;const q=sessionQ[idx];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}document.getElementById('visualCard').innerHTML='<span class="visual-emoji">'+q.visual+'</span>';document.getElementById('questionText').textContent=q.question;const shuffled=sessionShuffled[idx]||[...q.options];const chosen=sessionAnswers[idx];const correct=q.answer;const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const opt=shuffled[i];const btn=document.createElement('button');btn.className='choice-btn';btn.disabled=true;btn.style.cursor='default';if(opt===correct)btn.classList.add('correct');if(opt===chosen&&opt!==correct)btn.classList.add('wrong');btn.innerHTML='<span class="choice-letter">'+letter+'</span>'+opt;choicesEl.appendChild(btn);});const rb=document.getElementById('reviewBanner');if(rb){rb.style.display='';rb.textContent=dotResults[idx]==='correct'?'✅ Q'+(idx+1)+' · Correct':'❌ Q'+(idx+1)+' · Incorrect';}document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();}
function init() {
  current = 0; score = 0; dotResults = Array(15).fill(null);sessionAnswers=Array(15).fill(null);sessionShuffled=Array(15).fill(null);viewingIdx=null; sessionQ = pickSession();
  if (!document.getElementById('visualCard')) {
    document.getElementById('gameScreen').innerHTML = `
      <a class="back-btn" href="../../">← Home</a>
      <div class="top">
        <div class="title">📚 5th Grade SBA ELA</div>
        <div class="top-row"><div class="level-badge easy" id="levelBadge">⭐ Easy</div><div class="score-pill">🎯 <strong id="score">0</strong> / 15</div><div class="pts-pill" id="ptsDisplay">⭐ 0</div></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="middle" id="middle">
        <div class="visual-card" id="visualCard"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="bottom">
        <div class="choices" id="choices"></div>
        <div class="progress-dots" id="progressDots"></div>
      </div>`;
  }
  buildDots(); showQuestion(); updatePtsDisplay();
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildDots() {
  const c = document.getElementById('progressDots'); c.innerHTML = '';
  sessionQ.forEach((q,i) => {
    const cls = q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';
    const d = document.createElement('div');
    d.className = `dot ${cls}`+(i===0?' current':''); d.id=`dot-${i}`; c.appendChild(d);
  });
}
function updateDot(idx, result) {
  const d = document.getElementById(`dot-${idx}`); if(!d) return;
  d.classList.remove('current'); d.classList.add('answered', result==='correct'?'correct-dot':'wrong-dot');
  const next = document.getElementById(`dot-${idx+1}`); if(next) next.classList.add('current');
}
function showQuestion() {viewingIdx=null;const rb=document.getElementById('reviewBanner');if(rb)rb.style.display='none';
  const q = sessionQ[current];
  const badge = document.getElementById('levelBadge');
  if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}
  if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}
  if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}
  document.getElementById('progressFill').style.width=(current/15*100)+'%';
  document.getElementById('score').textContent=score;
  document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;
  document.getElementById('questionText').textContent=q.question;
  const shuffled=shuffle([...q.options]);sessionShuffled[current]=shuffled;
  const choicesEl=document.getElementById('choices'); choicesEl.innerHTML='';
  ['A','B','C'].forEach((letter,i) => {
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.dataset.value=shuffled[i];
    btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;
    btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx); choicesEl.appendChild(btn);
  });
  document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();
}
function handleAnswer(chosen,correct,btn,fact,qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;sessionAnswers[current]=chosen;
  if(isCorrect){
    score++; markMastered(qIdx); btn.classList.add('correct'); dotResults[current]='correct'; updateDot(current,'correct');
    document.getElementById('score').textContent=score; playCorrect(); spawnConfetti(35);
  } else {
    btn.classList.add('wrong'); dotResults[current]='wrong'; updateDot(current,'wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});
    document.getElementById('gameScreen').classList.add('shake'); playWrong();
  }
  setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);
}
let feedbackTimer=null, feedbackRafId=null;
function dismissFeedback(){
  cancelAnimationFrame(feedbackRafId); clearTimeout(feedbackTimer);
  const overlay=document.getElementById('feedbackOverlay');
  const b=document.getElementById('feedbackBox'); b.style.animation='slideUp 0.35s ease forwards';
  overlay.classList.add('dismiss'); overlay.classList.remove('clickable');
  setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);
}
function showFeedback(isCorrect, fact, chosen, correct) {
  clearTimeout(feedbackTimer); cancelAnimationFrame(feedbackRafId);
  const overlay=document.getElementById('feedbackOverlay'), box=document.getElementById('feedbackBox');
  const arc=document.getElementById('timerArc'), ring=document.getElementById('timerRing');
  const tapHint=document.getElementById('tapHint');
  const wrongDetail=document.getElementById('wrongDetail');
  const CIRC=100.5;
  if(isCorrect){
    const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title correct-text';
    box.className='feedback-box correct-box'; ring.className='timer-ring correct-ring';
    ring.style.display=''; tapHint.style.display='none'; wrongDetail.style.display='none';
  } else {
    const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title wrong-text';
    box.className='feedback-box wrong-box'; ring.className='timer-ring wrong-ring';
    ring.style.display='none'; tapHint.style.display='';
    document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;
    document.getElementById('wdChosen').textContent=chosen;
    document.getElementById('wdCorrect').textContent=correct;
    wrongDetail.style.display='';
  }
  document.getElementById('feedbackFact').textContent=fact;
  arc.style.strokeDashoffset='0'; overlay.classList.remove('dismiss'); overlay.classList.add('show');
  if(isCorrect){
    const duration=1200; const startTime=performance.now();
    function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}
    feedbackRafId=requestAnimationFrame(tickRing);
    feedbackTimer=setTimeout(dismissFeedback,duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click',dismissFeedback,{once:true});
  }
}
function advanceQuestion(){
  const prev=current; current++;
  if(prev===4){showLevelUp('medium');return;}
  if(prev===9){showLevelUp('hard');return;}
  if(current>=15){showEndScreen();return;}
  showQuestion();
}
function showLevelUp(level){
  const overlay=document.getElementById('levelupOverlay');
  if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — getting trickier!';}
  else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='🧠 Hard — only the best know these!';}
  overlay.classList.add('show'); playLevelUp(); spawnConfetti(60);
}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){
  const screen=document.getElementById('gameScreen');
  let rank,icon,msg,color;
  if(score>=13){rank='GENIUS';icon='🏆🧠⭐';msg='Outstanding! You\'re a true language scholar!';color='#f1c40f';}
  else if(score>=10){rank='EXPERT';icon='🌟💡🎯';msg='Excellent ELA knowledge!';color='#2ecc71';}
  else if(score>=7){rank='LEARNER';icon='👍📚😊';msg='Good effort! Keep reading!';color='#e67e22';}
  else{rank='BEGINNER';icon='💪📖🌱';msg='Great start! Keep practicing!';color='#e74c3c';}
  const e=dotResults.slice(0,5).filter(r=>r==='correct').length;
  const m=dotResults.slice(5,10).filter(r=>r==='correct').length;
  const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  let earned=0;
  if(e===5) earned+=1;
  if(m===5) earned+=3;
  if(h===5) earned+=6;
  if(earned>0) addPoints(earned);
  const tierRows=[
    e===5?'<span style="color:#4ade80">⭐ Easy +1✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐ Easy +1</span>',
    m===5?'<span style="color:#fbbf24">⭐⭐ Med +3✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐ Med +3</span>',
    h===5?'<span style="color:#f87171">⭐⭐⭐ Hard +6✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐⭐ Hard +6</span>',
  ].join('');
  let pointsHtml='';
  if(earned>0){
    pointsHtml=`<div style="background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.2));border:2px solid rgba(255,215,0,0.45);border-radius:16px;padding:10px 18px;text-align:center;">
      <div style="font-size:0.9rem;margin-bottom:5px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">${tierRows}</div>
      <div style="color:#ffd700;font-size:1.15rem;font-weight:700;">+${earned} point${earned===1?'':'s'} earned!</div>
      <div style="color:rgba(255,255,255,0.7);font-size:0.9rem;margin-top:3px;">Total: ⭐ ${getPoints()} points</div>
    </div>`;
  } else {
    pointsHtml=`<div style="text-align:center;">
      <div style="font-size:0.85rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:3px;">${tierRows}</div>
      <div style="color:rgba(255,215,0,0.5);font-size:0.85rem;">⭐ ${getPoints()} pts · Complete a full level to earn points</div>
    </div>`;
  }
  screen.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div>
      <div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div>
      <div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div>
      <div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>
      ${pointsHtml}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div>
        <div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div>
        <div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div>
      </div>
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">
        ${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}
      </div>
      <button class="action-btn" onclick="init()">🔄 Play Again!</button>
      <a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a>
    </div>`;
  spawnConfetti(score>=10?90:40);
}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){
  for(let i=0;i<count;i++){setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'||e.key==='<')navBack();if(e.key==='ArrowRight'||e.key==='>')navForward();});
init();
</script>
