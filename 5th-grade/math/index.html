  { level:1, visual:'🔢', question:'Order from least to greatest: 0.3, 1/4, 2/5', options:['1/4, 0.3, 2/5','0.3, 1/4, 2/5','2/5, 0.3, 1/4'], answer:'1/4, 0.3, 2/5', fact:'Convert to decimals: 1/4=0.25, 0.3, 2/5=0.4. Order: 0.25 < 0.30 < 0.40!' },
  { level:1, visual:'🕐', question:'School starts at 8:30 AM and ends at 3:15 PM. How long is the school day?', options:['6 h 45 min','7 h 15 min','6 h 15 min'], answer:'6 h 45 min', fact:'8:30 to 3:15: from 8:30 to 3:30 = 7 hours, then back 15 min = 6 h 45 min!' },
  { level:1, visual:'✖️', question:'4 × 4 × 4 = ?', options:['64','48','16'], answer:'64', fact:'4³ = 4×4×4 = 16×4 = 64. Four cubed! A 4×4×4 cube has 64 small unit cubes inside.' },

  // ── NEW LEVEL 2 questions ──────────────────────────────────────────────────
  { level:2, visual:'➕', question:'5/6 + 1/4 = ?', options:['13/12','6/10','5/24'], answer:'13/12', fact:'LCD of 6 and 4 is 12. 5/6=10/12, 1/4=3/12. Sum=13/12 = 1 1/12. Improper fraction is fine!' },
  { level:2, visual:'➖', question:'3 1/3 − 1 5/6 = ?', options:['1 1/2','1 1/3','2 1/6'], answer:'1 1/2', fact:'LCD=6: 3 2/6 − 1 5/6. Borrow: 2 8/6 − 1 5/6 = 1 3/6 = 1 1/2!' },
  { level:2, visual:'✖️', question:'1 2/3 × 2 1/2 = ?', options:['4 1/6','3 1/6','5'], answer:'4 1/6', fact:'Convert: 5/3 × 5/2 = 25/6 = 4 1/6. Always convert mixed numbers before multiplying!' },
  { level:2, visual:'➗', question:'2 1/4 ÷ 3/4 = ?', options:['3','4 1/2','2 2/3'], answer:'3', fact:'9/4 ÷ 3/4 = 9/4 × 4/3 = 36/12 = 3. Keep-Change-Flip, then simplify!' },
  { level:2, visual:'➗', question:'What is 5 ÷ 1/3?', options:['15','5/3','1 2/3'], answer:'15', fact:'5 ÷ 1/3 = 5 × 3 = 15. Dividing by a unit fraction multiplies by its denominator!' },
  { level:2, visual:'✖️', question:'0.7 × 0.7 = ?', options:['0.49','0.14','4.9'], answer:'0.49', fact:'7×7=49, two decimal places total → 0.49. Seven tenths squared!' },
  { level:2, visual:'✖️', question:'1.2 × 3 = ?', options:['3.6','36','0.36'], answer:'3.6', fact:'12×3=36, one decimal place → 3.6. Easy: just multiply then shift the decimal!' },
  { level:2, visual:'➗', question:'8.4 ÷ 7 = ?', options:['1.2','0.84','12'], answer:'1.2', fact:'84÷7=12, one decimal place → 1.2. Ignore the decimal, divide, then replace it!' },
  { level:2, visual:'➗', question:'6.3 ÷ 0.9 = ?', options:['7','0.7','63'], answer:'7', fact:'Multiply both by 10: 63÷9=7. Eliminating the decimal makes long division easier!' },
  { level:2, visual:'💯', question:'What is 30% of 120?', options:['36','30','40'], answer:'36', fact:'30% = 3/10. One tenth of 120=12. Three tenths = 12×3=36!' },
  { level:2, visual:'💯', question:'What is 15% of 80?', options:['12','8','16'], answer:'12', fact:'15% = 10%+5%. 10% of 80=8, 5% of 80=4. Total = 8+4=12!' },
  { level:2, visual:'💯', question:'Write 0.625 as a percent', options:['62.5%','6.25%','625%'], answer:'62.5%', fact:'Multiply by 100: 0.625×100=62.5%. Decimal to percent: always multiply by 100!' },
  { level:2, visual:'💯', question:'Write 3/5 as a percent', options:['60%','30%','15%'], answer:'60%', fact:'3/5=0.6, then ×100=60%. Or 3/5 × 100 = 300/5 = 60%!' },
  { level:2, visual:'💯', question:'A $60 jacket is 20% off. Sale price = ?', options:['$48','$12','$50'], answer:'$48', fact:'20% of $60=$12 off. $60−$12=$48. Or pay 80%: 0.80×60=$48!' },
  { level:2, visual:'💯', question:'Tax of 8% on a $25 item = ?', options:['$2.00','$1.25','$3.00'], answer:'$2.00', fact:'8% of 25 = 0.08×25 = $2.00. Tax is a percent of the purchase price!' },
  { level:2, visual:'🔷', question:'Area of a triangle with base 14 and height 9 = ?', options:['63','126','23'], answer:'63', fact:'A = ½×b×h = ½×14×9 = 7×9 = 63 sq units. Half the area of a 14×9 rectangle!' },
  { level:2, visual:'🔷', question:'Area of a parallelogram with base 8 and height 5 = ?', options:['40','20','13'], answer:'40', fact:'A = base × height = 8×5 = 40. A parallelogram has the same area formula as a rectangle!' },
  { level:2, visual:'🔷', question:'Area of a trapezoid with bases 6 and 10, height 4 = ?', options:['32','24','40'], answer:'32', fact:'A = ½×(b₁+b₂)×h = ½×(6+10)×4 = ½×16×4 = 32 sq units!' },
  { level:2, visual:'📐', question:'Volume of a rectangular prism: 4×6×3 = ?', options:['72 cubic units','48 cubic units','36 cubic units'], answer:'72 cubic units', fact:'V = l×w×h = 4×6×3 = 72. Volume fills 3D space — always in cubic units!' },
  { level:2, visual:'📐', question:'A box is 5 cm × 5 cm × 5 cm. Volume = ?', options:['125 cm³','75 cm³','25 cm³'], answer:'125 cm³', fact:'V = 5³ = 125 cm³. A cube with side 5! All sides equal in a cube.' },
  { level:2, visual:'📐', question:'Surface area of a rectangular prism 2×3×4 = ?', options:['52 cm²','24 cm²','28 cm²'], answer:'52 cm²', fact:'SA = 2(lw+lh+wh) = 2(6+8+12) = 2×26 = 52. Six faces, three pairs of rectangles!' },
  { level:2, visual:'🔢', question:'Unit rate: 240 miles in 4 hours. Miles per hour = ?', options:['60 mph','80 mph','48 mph'], answer:'60 mph', fact:'Rate = 240÷4 = 60 mph. Unit rate always means "per one"!' },
  { level:2, visual:'🔢', question:'Unit rate: 15 books in 3 weeks. Books per week = ?', options:['5','3','45'], answer:'5', fact:'15÷3=5 books per week. Divide total by the number of units to find the rate!' },
  { level:2, visual:'🔢', question:'If 3 notebooks cost $4.50, how much for 7 notebooks?', options:['$10.50','$7.50','$13.50'], answer:'$10.50', fact:'Unit price: $4.50÷3=$1.50 each. 7×$1.50=$10.50. Find the unit rate, then scale up!' },
  { level:2, visual:'🔢', question:'Ratio of 12 boys to 8 girls in simplest form = ?', options:['3:2','6:4','12:8'], answer:'3:2', fact:'GCF of 12 and 8 is 4. 12÷4=3, 8÷4=2. Ratio = 3:2. Simplify ratios like fractions!' },
  { level:2, visual:'🔢', question:'If the ratio of cats to dogs is 2:5 and there are 10 cats, how many dogs?', options:['25','20','50'], answer:'25', fact:'Scale factor: 10÷2=5. So dogs = 5×5 = 25. Multiply both parts of the ratio by the scale factor!' },
  { level:2, visual:'🔢', question:'Convert 7/4 to a mixed number', options:['1 3/4','2 1/4','3/4'], answer:'1 3/4', fact:'7÷4=1 remainder 3. So 7/4 = 1 3/4. The remainder becomes the new numerator!' },
  { level:2, visual:'🔢', question:'Convert 3 2/5 to an improper fraction', options:['17/5','32/5','11/5'], answer:'17/5', fact:'3×5+2=17, keep denominator 5: 17/5. Multiply whole by denominator, add numerator!' },
  { level:2, visual:'🔢', question:'What integer is the opposite of −7?', options:['7','−7','1/7'], answer:'7', fact:'Opposite integers are the same distance from 0 but on opposite sides. −7 and 7 are opposites!' },
  { level:2, visual:'🔢', question:'−4 + 9 = ?', options:['5','−5','13'], answer:'5', fact:'Moving right on the number line: start at −4, move 9 right → land on 5!' },
  { level:2, visual:'🔢', question:'−8 − (−3) = ?', options:['−5','−11','5'], answer:'−5', fact:'Subtracting a negative = adding a positive. −8 − (−3) = −8 + 3 = −5!' },
  { level:2, visual:'🔢', question:'3 × (−4) = ?', options:['−12','12','−7'], answer:'−12', fact:'Positive × negative = negative. 3 × 4 = 12, so 3 × (−4) = −12!' },
  { level:2, visual:'🔢', question:'−20 ÷ (−5) = ?', options:['4','−4','−15'], answer:'4', fact:'Negative ÷ negative = positive. 20÷5=4, and both signs are negative, so answer = +4!' },
  { level:2, visual:'📊', question:'Data: 5,8,8,9,10. What is the mean?', options:['8','8.5','9'], answer:'8', fact:'Sum = 5+8+8+9+10=40. Mean = 40÷5=8. Mean = sum divided by count!' },
  { level:2, visual:'📊', question:'Data: 3,5,7,9,11. What is the median?', options:['7','6','9'], answer:'7', fact:'Already sorted: 3,5,7,9,11. Middle value = 7. Median is the exact center value!' },
  { level:2, visual:'📊', question:'Data: 2,4,4,6,8,10. What is the mode?', options:['4','6','2'], answer:'4', fact:'4 appears twice; all others appear once. Mode = most frequent = 4!' },
  { level:2, visual:'📊', question:'Data: 4,9,15,2,8. What is the range?', options:['13','4','6'], answer:'13', fact:'Range = max − min = 15 − 2 = 13. Range measures how spread out the data is!' },
  { level:2, visual:'🔢', question:'Probability: a bag has 3 red and 7 blue marbles. P(red) = ?', options:['3/10','3/7','7/10'], answer:'3/10', fact:'P(red) = favorable outcomes ÷ total = 3 ÷ (3+7) = 3/10. Count total possible outcomes!' },
  { level:2, visual:'🔢', question:'If P(event) = 1/4, what is P(not event)?', options:['3/4','1/4','1'], answer:'3/4', fact:'Complementary events: P(not A) = 1 − P(A) = 1 − 1/4 = 3/4. All probabilities sum to 1!' },
  { level:2, visual:'🔢', question:'Solve for x: 3x = 36', options:['12','9','33'], answer:'12', fact:'Divide both sides by 3: x = 36÷3 = 12. Division undoes multiplication!' },
  { level:2, visual:'🔢', question:'Solve for n: n + 12 = 30', options:['18','42','12'], answer:'18', fact:'Subtract 12 from both sides: n = 30−12 = 18. Use the inverse operation!' },
  { level:2, visual:'🔢', question:'Solve for y: y − 9 = 14', options:['23','5','6'], answer:'23', fact:'Add 9 to both sides: y = 14+9 = 23. Check: 23−9=14 ✓!' },
  { level:2, visual:'🔢', question:'Evaluate 4n − 3 when n = 5', options:['17','23','12'], answer:'17', fact:'Substitute n=5: 4(5)−3 = 20−3 = 17. Replace the variable with the given value!' },
  { level:2, visual:'🔢', question:'What is the next term: 1, 4, 9, 16, 25, 36, ?', options:['49','40','64'], answer:'49', fact:'Perfect squares: 7²=49. The sequence is 1², 2², 3², 4², 5², 6², 7²...' },
  { level:2, visual:'📏', question:'A map scale is 1 inch = 20 miles. 4.5 inches = ? miles', options:['90','45','22.5'], answer:'90', fact:'4.5 inches × 20 miles/inch = 90 miles. Map scale multiplication!' },
  { level:2, visual:'📏', question:'Convert 1.25 hours to hours and minutes', options:['1 h 15 min','1 h 25 min','1 h 5 min'], answer:'1 h 15 min', fact:'0.25 hours × 60 min/hour = 15 minutes. So 1.25 h = 1 hour 15 minutes!' },
  { level:2, visual:'💯', question:'Convert 7/20 to a decimal and percent', options:['0.35 and 35%','0.7 and 7%','0.35 and 3.5%'], answer:'0.35 and 35%', fact:'7÷20=0.35. 0.35×100=35%. Three conversions: fraction → decimal → percent!' },
  { level:2, visual:'💯', question:'A class of 30 students: 18 passed. What percent passed?', options:['60%','18%','30%'], answer:'60%', fact:'18/30 = 0.6 = 60%. Divide part by total, then multiply by 100!' },
  { level:2, visual:'🔢', question:'Write 4.7 × 10³ in standard form', options:['4700','47000','470'], answer:'4700', fact:'10³=1000. 4.7×1000=4700. Move the decimal right by 3 places!' },
  { level:2, visual:'🔢', question:'Write 36,000 in scientific notation', options:['3.6×10⁴','36×10³','3.6×10³'], answer:'3.6×10⁴', fact:'Move decimal 4 places left: 36000 → 3.6. Exponent = number of places moved = 4!' },
  { level:2, visual:'🔷', question:'Circumference of circle with radius 5 (use π≈3.14) = ?', options:['31.4','15.7','78.5'], answer:'31.4', fact:'C = 2πr = 2×3.14×5 = 31.4. Circumference = pi times diameter = pi times 2r!' },
  { level:2, visual:'🔷', question:'Area of circle with radius 4 (use π≈3.14) = ?', options:['50.24','25.12','12.56'], answer:'50.24', fact:'A = π×r² = 3.14×16 = 50.24. Area uses radius squared!' },
  { level:2, visual:'🔢', question:'Equivalent ratio: 3:4 = ?:20', options:['15','12','16'], answer:'15', fact:'Scale factor: 20÷4=5. So 3×5=15. The ratio 3:4 = 15:20!' },
  { level:2, visual:'🔢', question:'Which proportion is correct for 2:5 = x:35?', options:['x=14','x=10','x=7'], answer:'x=14', fact:'Scale factor: 35÷5=7. So x=2×7=14. Or cross multiply: 5x=70, x=14!' },
  { level:2, visual:'📊', question:'Mean of 6,10,8,14,12 = ?', options:['10','8','12'], answer:'10', fact:'Sum = 6+10+8+14+12=50. Mean = 50÷5=10. Mean is the balancing point of the data!' },
  { level:2, visual:'📏', question:'A recipe needs 3/4 cup sugar for 12 cookies. For 36 cookies you need:', options:['2 1/4 cups','1 1/2 cups','3 cups'], answer:'2 1/4 cups', fact:'36÷12=3 times the recipe. 3/4 × 3 = 9/4 = 2 1/4 cups. Scale the recipe up!' },
  { level:2, visual:'🔢', question:'If 5 is 25% of a number, what is the number?', options:['20','25','15'], answer:'20', fact:'25% × n = 5. So n = 5 ÷ 0.25 = 20. Or: 25% = 1/4, so n = 4×5 = 20!' },
  { level:2, visual:'🔢', question:'A store sells 3 items for $7.50. Cost of 5 items = ?', options:['$12.50','$10.00','$15.00'], answer:'$12.50', fact:'Unit price: $7.50÷3=$2.50 each. 5×$2.50=$12.50. Find unit rate, multiply by new quantity!' },

  // ── MORE LEVEL 2 questions ────────────────────────────────────────────────
  { level:2, visual:'➕', question:'1/6 + 5/8 = ?', options:['19/24','6/14','2/3'], answer:'19/24', fact:'LCD of 6 and 8 is 24. 1/6=4/24, 5/8=15/24. Sum=19/24!' },
  { level:2, visual:'➖', question:'7/8 − 1/4 = ?', options:['5/8','6/4','3/8'], answer:'5/8', fact:'Convert 1/4 to 2/8. Then 7/8−2/8=5/8. Same denominator, subtract numerators!' },
  { level:2, visual:'✖️', question:'4/9 × 3/8 = ?', options:['1/6','12/72','7/17'], answer:'1/6', fact:'Multiply: 4×3=12, 9×8=72. 12/72 = 1/6 (divide by 12). Cross-cancel first: 4/8 × 3/9 = 1/2 × 1/3 = 1/6!' },
  { level:2, visual:'➗', question:'7/10 ÷ 7/5 = ?', options:['1/2','7/50','2'], answer:'1/2', fact:'7/10 × 5/7 = 35/70 = 1/2. The 7s cancel, leaving 5/10 = 1/2!' },
  { level:2, visual:'✖️', question:'2 3/4 × 2 = ?', options:['5 1/2','4 3/4','6'], answer:'5 1/2', fact:'2 3/4 = 11/4. 11/4 × 2 = 22/4 = 11/2 = 5 1/2. Convert, multiply, convert back!' },
  { level:2, visual:'➖', question:'6 1/5 − 2 3/5 = ?', options:['3 3/5','4 2/5','3 2/5'], answer:'3 3/5', fact:'Borrow: 5 6/5 − 2 3/5 = 3 3/5. Rename 6 1/5 as 5 + 5/5 + 1/5 = 5 6/5!' },
  { level:2, visual:'🔢', question:'Evaluate 2x² when x=3', options:['18','12','36'], answer:'18', fact:'Exponent first: 3²=9. Then multiply: 2×9=18. Exponents before multiplication!' },
  { level:2, visual:'🔢', question:'Evaluate 5 + 2n when n=7', options:['19','70','12'], answer:'19', fact:'Substitute: 5+2(7)=5+14=19. Multiply before adding (order of operations)!' },
  { level:2, visual:'🔢', question:'Solve: n/5 = 8', options:['40','3','13'], answer:'40', fact:'Multiply both sides by 5: n=8×5=40. Inverse of dividing is multiplying!' },
  { level:2, visual:'🔢', question:'Solve: 4n − 2 = 18', options:['5','4','8'], answer:'5', fact:'Add 2: 4n=20. Divide by 4: n=5. Check: 4(5)−2=18 ✓!' },
  { level:2, visual:'💯', question:'Write 5/8 as a decimal and percent', options:['0.625 and 62.5%','0.58 and 58%','0.625 and 6.25%'], answer:'0.625 and 62.5%', fact:'5÷8=0.625. 0.625×100=62.5%. Three-step conversion: fraction → divide → multiply by 100!' },
  { level:2, visual:'💯', question:'40% of what number equals 32?', options:['80','128','40'], answer:'80', fact:'40%×n=32. n=32÷0.4=80. Or: 40/100×n=32, n=32×100/40=80!' },
  { level:2, visual:'💯', question:'A number is decreased by 30% to get 56. Original number = ?', options:['80','86','70'], answer:'80', fact:'70% of n=56. n=56÷0.7=80. You kept 70%, so divide by 0.70!' },
  { level:2, visual:'📊', question:'Mean of 7, 14, 21, 28, 35 = ?', options:['21','20','25'], answer:'21', fact:'Sum=7+14+21+28+35=105. Mean=105÷5=21. The middle term of an arithmetic sequence is the mean!' },
  { level:2, visual:'📊', question:'Median of 6, 3, 9, 1, 7, 5 = ?', options:['5.5','6','5'], answer:'5.5', fact:'Sort: 1,3,5,6,7,9. Even count: average middle two (5+6)÷2=5.5!' },
  { level:2, visual:'📊', question:'A bag has 4 red, 3 blue, 3 green. P(blue or green) = ?', options:['3/5','3/10','6/10'], answer:'3/5', fact:'P(blue or green) = (3+3)/10 = 6/10 = 3/5. Add favorable outcomes, then simplify!' },
  { level:2, visual:'📐', question:'Perimeter of a triangle with sides 7.5, 8.5, and 9 cm = ?', options:['25 cm','24 cm','26 cm'], answer:'25 cm', fact:'Add all three sides: 7.5+8.5+9=25 cm. Perimeter = sum of all sides!' },
  { level:2, visual:'📐', question:'Area of a parallelogram with base 12 and height 7 = ?', options:['84','42','19'], answer:'84', fact:'A = base × height = 12×7=84 sq units. The height is perpendicular to the base!' },
  { level:2, visual:'📐', question:'A trapezoid has parallel bases 9 and 15, height 6. Area = ?', options:['72','54','90'], answer:'72', fact:'A = ½(b₁+b₂)h = ½(9+15)×6 = ½×24×6 = 72 sq units!' },
  { level:2, visual:'🔷', question:'How many faces does a rectangular prism have?', options:['6','8','4'], answer:'6', fact:'A rectangular prism (box) has 6 rectangular faces: top, bottom, front, back, left, right!' },
  { level:2, visual:'🔷', question:'How many edges does a cube have?', options:['12','8','6'], answer:'12', fact:'A cube has 12 edges: 4 on top, 4 on bottom, 4 vertical ones connecting them!' },
  { level:2, visual:'📏', question:'Convert 2.5 km to meters and centimeters', options:['2500 m / 250,000 cm','250 m / 25,000 cm','25 m / 2500 cm'], answer:'2500 m / 250,000 cm', fact:'2.5 km × 1000=2500 m. 2500 m × 100=250,000 cm. Each step multiplies by 1000 or 100!' },
  { level:2, visual:'📏', question:'A speed of 90 km/h for 30 minutes. Distance = ?', options:['45 km','90 km','30 km'], answer:'45 km', fact:'30 min = 0.5 h. D=S×T=90×0.5=45 km. Always convert time to hours when using km/h!' },
  { level:2, visual:'🔢', question:'A bag of 5 kg rice costs $7.50. Cost per kilogram = ?', options:['$1.50','$0.75','$2.50'], answer:'$1.50', fact:'$7.50÷5=$1.50 per kg. Unit rate = total cost ÷ number of units!' },
  { level:2, visual:'🔢', question:'In a scale drawing, 2 cm = 3 m. A wall 12 m long is ? cm on the drawing', options:['8 cm','18 cm','6 cm'], answer:'8 cm', fact:'Scale: 2 cm per 3 m. 12 m ÷ 3 = 4 groups. 4 × 2 cm = 8 cm on drawing!' },
  { level:2, visual:'🔢', question:'If 4 workers take 6 days, how long for 8 workers (same total work)?', options:['3 days','12 days','2 days'], answer:'3 days', fact:'Inverse proportion: 4×6=8×d. d=24÷8=3 days. Double workers, half the time!' },
  { level:2, visual:'🔢', question:'Evaluate: 3a − 2b when a=4 and b=3', options:['6','7','18'], answer:'6', fact:'Substitute: 3(4)−2(3)=12−6=6. Replace each variable with its value, then calculate!' },
  { level:2, visual:'🔢', question:'Write an expression: 5 more than twice a number x', options:['2x+5','5x+2','2+5x'], answer:'2x+5', fact:'"Twice a number" = 2x. "5 more than" = +5. So the expression is 2x+5!' },
  { level:2, visual:'🔢', question:'Which value of x makes 4x > 20 true?', options:['6','5','4'], answer:'6', fact:'4×6=24>20 ✓. 4×5=20 is NOT greater than 20. 4×4=16<20. Only x=6 works!' },
  { level:2, visual:'🔢', question:'Sequence: 3, 7, 15, 31, ... next term?', options:['63','47','51'], answer:'63', fact:'Differences: +4,+8,+16... (doubling). Next difference = +32. 31+32=63. The differences double!' },
  { level:2, visual:'🔢', question:'What is the LCM of 8, 12, and 6?', options:['24','48','12'], answer:'24', fact:'LCM(8,12)=24. Does 6 divide 24? 24÷6=4. Yes! LCM(8,12,6)=24!' },
  { level:2, visual:'🔢', question:'The GCF of 30, 45, and 60 = ?', options:['15','5','30'], answer:'15', fact:'30=2×3×5, 45=3²×5, 60=2²×3×5. Common prime factors: 3×5=15. GCF=15!' },
  { level:2, visual:'💰', question:'A worker earns $12.50/h for 8 hours and $18.75/h overtime for 3 hours. Total = ?', options:['$156.25','$100','$162.50'], answer:'$156.25', fact:'Regular: $12.50×8=$100. Overtime: $18.75×3=$56.25. Total: $100+$56.25=$156.25!' },
  { level:2, visual:'💰', question:'Best buy: 6 cans for $4.50 or 8 cans for $5.60?', options:['8 cans for $5.60','6 cans for $4.50','Same price'], answer:'8 cans for $5.60', fact:'6 cans: $4.50÷6=$0.75 each. 8 cans: $5.60÷8=$0.70 each. Lower unit price wins!' },
  { level:2, visual:'📏', question:'Convert 4 pounds 8 ounces to ounces (1 lb = 16 oz)', options:['72 oz','48 oz','80 oz'], answer:'72 oz', fact:'4 lbs × 16 = 64 oz. Plus 8 oz = 72 oz total. Multiply whole units, add remaining!' },
  { level:2, visual:'🔢', question:'Integers: place −3, −7, 2, 5, −1 in order from least to greatest', options:['−7,−3,−1,2,5','−1,−3,−7,2,5','5,2,−1,−3,−7'], answer:'−7,−3,−1,2,5', fact:'On the number line: negatives go left (more negative = further left = smaller). −7<−3<−1<2<5!' },
  { level:2, visual:'🔢', question:'|−6| − |−2| = ?', options:['4','8','−4'], answer:'4', fact:'|−6|=6 and |−2|=2. Then 6−2=4. Absolute value first, then subtract!' },
  { level:2, visual:'📊', question:'A spinner has 5 equal sections. P(landing on section 3) = ?', options:['1/5','3/5','5/3'], answer:'1/5', fact:'5 equal sections: each has probability 1/5. Equal likely outcomes divide 1 equally!' },

  // ── NEW LEVEL 3 questions ──────────────────────────────────────────────────
  { level:3, visual:'🔢', question:'Solve: 4x − 7 = 2x + 5', options:['6','3','12'], answer:'6', fact:'4x−2x=5+7 → 2x=12 → x=6. Move variables to one side, numbers to the other!' },
  { level:3, visual:'🔢', question:'Solve: 3(2x − 1) = 21', options:['4','7','3'], answer:'4', fact:'Divide by 3: 2x−1=7. Add 1: 2x=8. Divide by 2: x=4. Undo each operation!' },
  { level:3, visual:'🔢', question:'Solve: x/4 + 3 = 7', options:['16','4','28'], answer:'16', fact:'Subtract 3: x/4=4. Multiply by 4: x=16. Check: 16/4+3=4+3=7 ✓!' },
  { level:3, visual:'🔢', question:'Solve: 2x + 5 = 3x − 4', options:['9','1','5'], answer:'9', fact:'5+4=3x−2x → 9=x. Collect x terms: move 2x to the right side. x=9!' },
  { level:3, visual:'🔢', question:'Solve: 7 − 2x = 1', options:['3','4','6'], answer:'3', fact:'7−1=2x → 6=2x → x=3. Check: 7−2(3)=7−6=1 ✓!' },
  { level:3, visual:'💯', question:'A price increased from $50 to $65. Percent increase = ?', options:['30%','15%','13%'], answer:'30%', fact:'Increase = $15. %increase = 15/50 × 100 = 30%. Change ÷ original × 100!' },
  { level:3, visual:'💯', question:'A price dropped from $80 to $60. Percent decrease = ?', options:['25%','20%','33%'], answer:'25%', fact:'Decrease = $20. %decrease = 20/80 × 100 = 25%. Always use the original value as denominator!' },
  { level:3, visual:'💯', question:'Compound interest: $1000 at 5% annually for 2 years (compounded) = ?', options:['$1102.50','$1100','$1050'], answer:'$1102.50', fact:'Year 1: $1000×1.05=$1050. Year 2: $1050×1.05=$1102.50. Compounding earns interest on interest!' },
  { level:3, visual:'💰', question:'Simple interest: $800 at 3% for 5 years. Interest earned = ?', options:['$120','$80','$240'], answer:'$120', fact:'I = P×r×t = 800×0.03×5 = $120. Simple interest: multiply principal, rate, and time!' },
  { level:3, visual:'📐', question:'A right triangle has legs 8 and 15. Hypotenuse = ?', options:['17','18','23'], answer:'17', fact:'8²+15²=64+225=289=17². The 8-15-17 is a Pythagorean triple!' },
  { level:3, visual:'📐', question:'A right triangle has hypotenuse 10 and one leg 6. Other leg = ?', options:['8','7','9'], answer:'8', fact:'a²+b²=c². b²=10²−6²=100−36=64. b=8. The 6-8-10 triple (a scaled 3-4-5)!' },

  { level:3, visual:'📊', question:'Data: 10,12,14,16,18. Add 5 to each value. New mean = ?', options:['19','14','25'], answer:'19', fact:'Old mean=14. Adding 5 to every value shifts mean by 5: 14+5=19. New values: 15,17,19,21,23. Mean=95÷5=19!' },
  { level:3, visual:'🔢', question:'Solve the system: x+y=10 and x−y=2. What is x?', options:['6','4','8'], answer:'6', fact:'Add the equations: 2x=12, x=6. Then y=10−6=4. Adding equations eliminates y!' },

  { level:3, visual:'🔢', question:'In a 2:3 ratio of blue to red, and there are 30 total marbles, how many are blue?', options:['12','18','15'], answer:'12', fact:'Parts: 2+3=5 parts total. Each part = 30÷5=6. Blue = 2×6=12. Red = 3×6=18!' },
  { level:3, visual:'🔢', question:'Unit conversion: 3.5 miles to feet (1 mile = 5280 ft) = ?', options:['18,480 ft','15,840 ft','1848 ft'], answer:'18,480 ft', fact:'3.5 × 5280 = 18,480 ft. Multiply by the conversion factor!' },
  { level:3, visual:'🔢', question:'Unit rate: A car travels 390 miles on 13 gallons. Miles per gallon = ?', options:['30 mpg','26 mpg','40 mpg'], answer:'30 mpg', fact:'390÷13=30. Divide total distance by total fuel to find fuel efficiency!' },
  { level:3, visual:'🔢', question:'Proportional relationship: y/x = 4 for all values. If x=7, y = ?', options:['28','11','47'], answer:'28', fact:'y=4x. When x=7: y=4×7=28. Proportional relationships always pass through the origin!' },
  { level:3, visual:'🧩', question:'Which graph shows a proportional relationship?', options:['A line through (0,0)','A horizontal line','A line not through origin'], answer:'A line through (0,0)', fact:'Proportional: y=kx always passes through the origin (0,0). The y-intercept must be zero!' },
  { level:3, visual:'🔢', question:'What is 5! (5 factorial)?', options:['120','25','60'], answer:'120', fact:'5! = 5×4×3×2×1 = 120. Factorials count the ways to arrange items — used in probability!' },

  { level:3, visual:'🔢', question:'The GCF of 48 and 72 = ?', options:['24','12','8'], answer:'24', fact:'48=2⁴×3 and 72=2³×3². GCF = 2³×3=24. Greatest common factor uses minimum powers!' },

  { level:3, visual:'📐', question:'A ladder 13 m long leans against a wall. Base is 5 m from wall. Height on wall = ?', options:['12 m','8 m','10 m'], answer:'12 m', fact:'a²+b²=c². h²+5²=13². h²=169−25=144. h=12 m. Pythagorean theorem in real life!' },

const QUIZ_KEY = 'kids_q_sba_math';
const POINTS_KEY='kids_points';
function getPoints(){return parseInt(localStorage.getItem(POINTS_KEY)||'0');}
function addPoints(n){localStorage.setItem(POINTS_KEY,getPoints()+n);}
function updatePtsDisplay(){const el=document.getElementById('ptsDisplay');if(el)el.textContent='⭐ '+getPoints();}

let current = 0, score = 0, dotResults = [], sessionQ = [];
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}
function playCorrect() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [1047,1319,1568,2093,1568,1319].forEach((f,i) => note(ctx,'triangle',f,t+i*0.07,0.14,0.5));
    [[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur]) => {
      note(ctx,'triangle',f,t+d,dur,0.55); note(ctx,'sine',f*2,t+d,dur*0.5,0.14);
    });
  });
}
function playWrong() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay]) => {
      const osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination); osc.type='sawtooth';
      osc.frequency.setValueAtTime(f1,t+delay); osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);
      gn.gain.setValueAtTime(0.001,t+delay); gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02); gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);
      osc.start(t+delay); osc.stop(t+delay+0.3);
    });
    const osc=ctx.createOscillator(), gn=ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination); osc.type='sine';
    osc.frequency.setValueAtTime(380,t+0.92); osc.frequency.exponentialRampToValueAtTime(55,t+1.4);
    gn.gain.setValueAtTime(0.001,t+0.92); gn.gain.linearRampToValueAtTime(0.55,t+0.93); gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);
    osc.start(t+0.92); osc.stop(t+1.5);
  });
}
function playLevelUp() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d]) => note(ctx,'triangle',f,t+d,0.25,0.45));
    note(ctx,'sine',1047,t+0.84,0.8,0.3); note(ctx,'sine',1319,t+0.90,0.7,0.25); note(ctx,'sine',1568,t+0.96,0.6,0.2);
  });
}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function init() {
  current = 0; score = 0; dotResults = Array(15).fill(null); sessionQ = pickSession();
  if (!document.getElementById('visualCard')) {
    document.getElementById('gameScreen').innerHTML = `
      <a class="back-btn" href="../../">← Home</a>
      <div class="top">
        <div class="title">📐 5th Grade SBA Math</div>
        <div class="top-row"><div class="level-badge easy" id="levelBadge">⭐ Easy</div><div class="score-pill">🎯 <strong id="score">0</strong> / 15</div><div class="pts-pill" id="ptsDisplay">⭐ 0</div></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="middle" id="middle">
        <div class="visual-card" id="visualCard"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="bottom">
        <div class="choices" id="choices"></div>
        <div class="progress-dots" id="progressDots"></div>
      </div>`;
  }
  buildDots(); showQuestion(); updatePtsDisplay();
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildDots() {
  const c = document.getElementById('progressDots'); c.innerHTML = '';
  sessionQ.forEach((q,i) => {
    const cls = q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';
    const d = document.createElement('div');
    d.className = `dot ${cls}`+(i===0?' current':''); d.id=`dot-${i}`; c.appendChild(d);
  });
}
function updateDot(idx, result) {
  const d = document.getElementById(`dot-${idx}`); if(!d) return;
  d.classList.remove('current'); d.classList.add('answered', result==='correct'?'correct-dot':'wrong-dot');
  const next = document.getElementById(`dot-${idx+1}`); if(next) next.classList.add('current');
}
function showQuestion() {
  const q = sessionQ[current];
  const badge = document.getElementById('levelBadge');
  if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}
  if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}
  if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}
  document.getElementById('progressFill').style.width=(current/15*100)+'%';
  document.getElementById('score').textContent=score;
  document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;
  document.getElementById('questionText').textContent=q.question;
  const shuffled=shuffle([...q.options]);
  const choicesEl=document.getElementById('choices'); choicesEl.innerHTML='';
  ['A','B','C'].forEach((letter,i) => {
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.dataset.value=shuffled[i];
    btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;
    btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx); choicesEl.appendChild(btn);
  });
  document.getElementById('gameScreen').classList.remove('shake');
}
function handleAnswer(chosen,correct,btn,fact,qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;
  if(isCorrect){
    score++; markMastered(qIdx); btn.classList.add('correct'); dotResults[current]='correct'; updateDot(current,'correct');
    document.getElementById('score').textContent=score; playCorrect(); spawnConfetti(35);
  } else {
    btn.classList.add('wrong'); dotResults[current]='wrong'; updateDot(current,'wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});
    document.getElementById('gameScreen').classList.add('shake'); playWrong();
  }
  setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);
}
let feedbackTimer=null, feedbackRafId=null;
function dismissFeedback(){
  cancelAnimationFrame(feedbackRafId); clearTimeout(feedbackTimer);
  const overlay=document.getElementById('feedbackOverlay');
  const b=document.getElementById('feedbackBox'); b.style.animation='slideUp 0.35s ease forwards';
  overlay.classList.add('dismiss'); overlay.classList.remove('clickable');
  setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);
}
function showFeedback(isCorrect, fact, chosen, correct) {
  clearTimeout(feedbackTimer); cancelAnimationFrame(feedbackRafId);
  const overlay=document.getElementById('feedbackOverlay'), box=document.getElementById('feedbackBox');
  const arc=document.getElementById('timerArc'), ring=document.getElementById('timerRing');
  const tapHint=document.getElementById('tapHint');
  const wrongDetail=document.getElementById('wrongDetail');
  const CIRC=100.5;
  if(isCorrect){
    const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title correct-text';
    box.className='feedback-box correct-box'; ring.className='timer-ring correct-ring';
    ring.style.display=''; tapHint.style.display='none'; wrongDetail.style.display='none';
  } else {
    const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title wrong-text';
    box.className='feedback-box wrong-box'; ring.className='timer-ring wrong-ring';
    ring.style.display='none'; tapHint.style.display='';
    document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;
    document.getElementById('wdChosen').textContent=chosen;
    document.getElementById('wdCorrect').textContent=correct;
    wrongDetail.style.display='';
  }
  document.getElementById('feedbackFact').textContent=fact;
  arc.style.strokeDashoffset='0'; overlay.classList.remove('dismiss'); overlay.classList.add('show');
  if(isCorrect){
    const duration=1200; const startTime=performance.now();
    function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}
    feedbackRafId=requestAnimationFrame(tickRing);
    feedbackTimer=setTimeout(dismissFeedback,duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click',dismissFeedback,{once:true});
  }
}
function advanceQuestion(){
  const prev=current; current++;
  if(prev===4){showLevelUp('medium');return;}
  if(prev===9){showLevelUp('hard');return;}
  if(current>=15){showEndScreen();return;}
  showQuestion();
}
function showLevelUp(level){
  const overlay=document.getElementById('levelupOverlay');
  if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — getting trickier!';}
  else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='🧠 Hard — only the best know these!';}
  overlay.classList.add('show'); playLevelUp(); spawnConfetti(60);
}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){
  const screen=document.getElementById('gameScreen');
  let rank,icon,msg,color;
  if(score>=13){rank='GENIUS';icon='🏆🧠⭐';msg='Outstanding! You\'re a true math scholar!';color='#f1c40f';}
  else if(score>=10){rank='EXPERT';icon='🌟💡🎯';msg='Excellent math knowledge!';color='#2ecc71';}
  else if(score>=7){rank='LEARNER';icon='👍📚😊';msg='Good effort! Keep practicing!';color='#e67e22';}
  else{rank='BEGINNER';icon='💪📖🌱';msg='Great start! Practice makes perfect!';color='#e74c3c';}
  const e=dotResults.slice(0,5).filter(r=>r==='correct').length;
  const m=dotResults.slice(5,10).filter(r=>r==='correct').length;
  const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  let earned=0;
  if(e===5) earned+=1;
  if(m===5) earned+=3;
  if(h===5) earned+=6;
  if(earned>0) addPoints(earned);
  const tierRows=[
    e===5?'<span style="color:#4ade80">⭐ Easy +1✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐ Easy +1</span>',
    m===5?'<span style="color:#fbbf24">⭐⭐ Med +3✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐ Med +3</span>',
    h===5?'<span style="color:#f87171">⭐⭐⭐ Hard +6✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐⭐ Hard +6</span>',
  ].join('');
  let pointsHtml='';
  if(earned>0){
    pointsHtml=`<div style="background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.2));border:2px solid rgba(255,215,0,0.45);border-radius:16px;padding:10px 18px;text-align:center;">
      <div style="font-size:0.9rem;margin-bottom:5px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">${tierRows}</div>
      <div style="color:#ffd700;font-size:1.15rem;font-weight:700;">+${earned} point${earned===1?'':'s'} earned!</div>
      <div style="color:rgba(255,255,255,0.7);font-size:0.9rem;margin-top:3px;">Total: ⭐ ${getPoints()} points</div>
    </div>`;
  } else {
    pointsHtml=`<div style="text-align:center;">
      <div style="font-size:0.85rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:3px;">${tierRows}</div>
      <div style="color:rgba(255,215,0,0.5);font-size:0.85rem;">⭐ ${getPoints()} pts · Complete a full level to earn points</div>
    </div>`;
  }
  screen.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div>
      <div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div>
      <div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div>
      <div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>
      ${pointsHtml}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div>
        <div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div>
        <div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div>
      </div>
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">
        ${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}
      </div>
      <button class="action-btn" onclick="init()">🔄 Play Again!</button>
      <a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a>
    </div>`;
  spawnConfetti(score>=10?90:40);
}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){
  for(let i=0;i<count;i++){setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
init();
</script>
</body>
</html>
