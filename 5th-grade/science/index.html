  { level:3, visual:'🌍', question:'What is "convection" in Earth\'s mantle?', options:['Hot rock rising, cooling, and sinking in a cycle that drives plate movement','Rock melting into magma at the surface','Earthquakes shaking the mantle'], answer:'Hot rock rising, cooling, and sinking in a cycle that drives plate movement', fact:'Convection currents in the semi-molten mantle act like conveyor belts, dragging tectonic plates and causing them to collide, separate, or slide past each other — driving earthquakes and mountain building!' },
  { level:3, visual:'🌊', question:'What is the "nitrogen cycle"?', options:['The movement of nitrogen through atmosphere, soil, plants, animals, and back','The movement of water through the environment','The exchange of carbon between living things and the atmosphere'], answer:'The movement of nitrogen through atmosphere, soil, plants, animals, and back', fact:'Nitrogen is 78% of air but most organisms can\'t use it directly. Nitrogen-fixing bacteria convert N₂ to usable forms. Without the nitrogen cycle, proteins and DNA couldn\'t be built — no life!' },
  { level:3, visual:'⚡', question:'What is "electromagnetic induction"?', options:['Generating electricity by moving a conductor through a magnetic field','Storing electricity in a battery','Conducting electricity through a wire'], answer:'Generating electricity by moving a conductor through a magnetic field', fact:'Faraday discovered that moving a magnet near a wire generates current! This is how ALL power plants generate electricity — turbines spin coils of wire in magnetic fields. Wind, nuclear, hydro — all use this!' },
  { level:3, visual:'🌿', question:'What is the role of ATP in cells?', options:['It is the energy currency of the cell — it powers all cellular processes','It carries genetic information','It transports oxygen in the blood'], answer:'It is the energy currency of the cell — it powers all cellular processes', fact:'Adenosine triphosphate (ATP) stores and transfers energy within cells. Cellular respiration produces ATP from glucose. Your cells use and regenerate your body weight in ATP every day!' },
  { level:3, visual:'🌍', question:'What is "speciation"?', options:['The process by which new species evolve from existing species','Animals migrating to new locations','Changes in an individual organism during its lifetime'], answer:'The process by which new species evolve from existing species', fact:'When populations are geographically isolated, they evolve separately and eventually can no longer interbreed — they\'ve become different species! The Galapagos finches Darwin observed show this beautifully.' },
  { level:3, visual:'🌌', question:'What is a black hole?', options:['A region of space with gravity so strong that nothing — not even light — can escape','A burned-out star that has turned dark','An empty region of space with no matter'], answer:'A region of space with gravity so strong that nothing — not even light — can escape', fact:'Black holes form when massive stars collapse. Their gravity is so extreme that spacetime curves back on itself. Stephen Hawking showed they slowly evaporate via "Hawking radiation" over trillions of years!' },
  { level:3, visual:'⚛️', question:'In nuclear fission, energy is released when', options:['A heavy nucleus splits into smaller nuclei','Small nuclei fuse together','An electron gains energy'], answer:'A heavy nucleus splits into smaller nuclei', fact:'Uranium-235 splits when struck by a neutron, releasing more neutrons that split more atoms — a chain reaction. Nuclear power plants use controlled fission. Uncontrolled fission is an atomic bomb.' },
  { level:3, visual:'🧬', question:'What is a "mutation"?', options:['A permanent change in an organism\'s DNA sequence','An organism adapting behavior in its lifetime','A species going extinct'], answer:'A permanent change in an organism\'s DNA sequence', fact:'Mutations can be caused by radiation, chemicals, or copying errors during cell division. Most are neutral or harmful, but rare beneficial mutations are the raw material for evolution by natural selection!' },
  { level:3, visual:'🌍', question:'What is "desertification"?', options:['The process by which fertile land becomes desert, often due to drought and human activity','The formation of new deserts by natural volcanic activity','The growth of deserts into oceans'], answer:'The process by which fertile land becomes desert, often due to drought and human activity', fact:'Overgrazing, deforestation, and poor farming practices remove vegetation and topsoil. Without plant roots to hold soil, wind and rain erode it away. About 1/3 of Earth\'s land is threatened by desertification!' },
  { level:3, visual:'🌊', question:'What is the difference between a food chain and the 10% energy rule?', options:['Only about 10% of energy transfers to the next trophic level; the rest is lost as heat','100% of energy passes up the food chain','Energy doubles at each level of the food chain'], answer:'Only about 10% of energy transfers to the next trophic level; the rest is lost as heat', fact:'A field of grass might support 1,000 kg of rabbits, which support 100 kg of foxes, which support 10 kg of eagles. That\'s why food chains rarely exceed 4-5 levels — too little energy at the top!' },
  { level:3, visual:'🌡️', question:'What is the difference between heat and temperature?', options:['Temperature measures average kinetic energy of particles; heat is the total thermal energy transferred','They mean the same thing','Heat is measured in Celsius; temperature in Joules'], answer:'Temperature measures average kinetic energy of particles; heat is the total thermal energy transferred', fact:'A tiny spark has higher temperature than a warm bathtub, but the bath contains far more heat (thermal energy). Temperature is average particle speed; heat is the total. This matters in engineering!' },
  { level:3, visual:'🌿', question:'What is a "symbiotic relationship"?', options:['A long-term close interaction between two different species','Two animals competing for the same food','A predator hunting its prey'], answer:'A long-term close interaction between two different species', fact:'Types: mutualism (both benefit — clownfish and anemone), commensalism (one benefits, other unharmed — barnacles on whales), parasitism (one benefits at the other\'s expense — tapeworms). All are symbiosis!' },
  { level:3, visual:'⚛️', question:'What is the difference between ionic and covalent bonds?', options:['Ionic bonds transfer electrons; covalent bonds share electrons','Ionic bonds share electrons; covalent bonds transfer them','Both types share electrons equally'], answer:'Ionic bonds transfer electrons; covalent bonds share electrons', fact:'Salt (NaCl) is ionic — sodium gives its electron to chlorine. Water (H₂O) is covalent — oxygen and hydrogen share electrons. Bond type determines whether a substance conducts electricity when dissolved!' },
  { level:3, visual:'🌌', question:'What is the Doppler effect as it applies to light from distant galaxies?', options:['Light from galaxies moving away is red-shifted (longer wavelength), proving the universe expands','Light from nearby galaxies is blue; far ones are red because of distance','All galaxies emit red light naturally'], answer:'Light from galaxies moving away is red-shifted (longer wavelength), proving the universe expands', fact:'Just like a siren\'s pitch drops as it moves away, light waves stretch as a source moves away — shifting toward red. Hubble used redshift to prove galaxies are moving away, discovering the expanding universe!' },
  { level:3, visual:'🌿', question:'What is "eutrophication"?', options:['Excess nutrients (often from fertilizer runoff) causing algae blooms that deplete oxygen in water','Water becoming too salty for freshwater species','Rivers flooding and depositing rich sediment on farmland'], answer:'Excess nutrients (often from fertilizer runoff) causing algae blooms that deplete oxygen in water', fact:'Fertilizer runs off farms into lakes. Algae explode in growth, then die and decompose. Decomposition uses up all dissolved oxygen, suffocating fish and other aquatic life — called a "dead zone"!' },
  { level:3, visual:'🦠', question:'What is the role of mitochondria in a cell?', options:['Producing ATP (energy) through cellular respiration — the "powerhouse of the cell"','Storing genetic information','Synthesizing proteins'], answer:'Producing ATP (energy) through cellular respiration — the "powerhouse of the cell"', fact:'Mitochondria convert glucose and oxygen into ATP (energy). They have their own DNA — evidence they were once free-living bacteria absorbed by a larger cell about 2 billion years ago (endosymbiosis)!' },
  { level:3, visual:'🌍', question:'How do scientists determine the age of rocks and fossils?', options:['Radiometric dating — measuring decay of radioactive isotopes','Counting visible layers of sediment','Examining the color and texture of rock'], answer:'Radiometric dating — measuring decay of radioactive isotopes', fact:'Radioactive isotopes decay at known rates (half-lives). By measuring how much of a radioactive isotope remains vs. its decay product, scientists calculate when the rock or organic material formed. Accurate to millions of years!' },
  { level:3, visual:'🌊', question:'What is "plate subduction"?', options:['When one tectonic plate slides under another into the mantle','When two plates collide and form mountains','When plates move apart, creating new seafloor'], answer:'When one tectonic plate slides under another into the mantle', fact:'Where oceanic and continental plates meet, the denser oceanic plate sinks (subducts) under the lighter continental plate. This creates deep ocean trenches, volcanic arcs, and intense earthquakes. The Andes formed this way!' },
  { level:3, visual:'⚡', question:'What is Ohm\'s Law?', options:['Voltage = Current × Resistance (V = IR)','Current = Voltage × Resistance','Resistance = Voltage × Current'], answer:'Voltage = Current × Resistance (V = IR)', fact:'Ohm\'s Law is fundamental to all electronics. Double the voltage → double the current. Double the resistance → halve the current. Every circuit in every device you use follows this law!' },
  { level:3, visual:'🧬', question:'What is the function of ribosomes in a cell?', options:['Synthesizing proteins based on mRNA instructions','Producing ATP energy','Storing and replicating DNA'], answer:'Synthesizing proteins based on mRNA instructions', fact:'Ribosomes read messenger RNA (mRNA) sequences and assemble amino acids into proteins. This is the final step of gene expression: DNA → mRNA (transcription) → protein (translation). All life uses this process!' },
  { level:3, visual:'🌌', question:'What is "dark matter"?', options:['An invisible substance that makes up about 27% of the universe and is detected only through gravity','Matter that absorbs light instead of reflecting it','The space between stars and galaxies'], answer:'An invisible substance that makes up about 27% of the universe and is detected only through gravity', fact:'Galaxies spin too fast to be held together by visible matter alone — something unseen provides extra gravity. We call it dark matter. It can\'t be seen or detected directly, only inferred. Its nature remains one of science\'s greatest mysteries!' },
  { level:2, visual:'🌿', question:'What is the difference between a producer, consumer, and decomposer?', options:['Producers make food from sunlight; consumers eat other organisms; decomposers break down dead matter','Producers eat plants; consumers eat animals; decomposers eat soil','All three make their own food differently'], answer:'Producers make food from sunlight; consumers eat other organisms; decomposers break down dead matter', fact:'These three groups cycle energy and nutrients through every ecosystem. Remove any one and the system collapses. Decomposers are often overlooked but are absolutely essential to recycling nutrients!' },
  { level:2, visual:'🌡️', question:'What is the difference between conduction, convection, and radiation?', options:['Conduction is heat through touch; convection is heat through fluid movement; radiation is heat through waves','They are three words for the same process','Conduction is in liquids; convection is in solids; radiation is in gases'], answer:'Conduction is heat through touch; convection is heat through fluid movement; radiation is heat through waves', fact:'Touching a hot stove = conduction. Boiling water circulating = convection. Feeling the Sun\'s warmth = radiation. All three occur simultaneously in many situations!' },
  { level:2, visual:'🔬', question:'What does a microscope allow scientists to see?', options:['Objects too small to see with the naked eye','Objects too far away to see clearly','Objects that move too fast to observe'], answer:'Objects too small to see with the naked eye', fact:'Light microscopes can magnify up to about 1,000 times. Electron microscopes can magnify up to 10 million times, revealing individual atoms! Without microscopes, we wouldn\'t know cells, bacteria, or viruses exist.' },
  { level:2, visual:'💧', question:'Why does ice float on water?', options:['Ice is less dense than liquid water — water expands when it freezes','Ice is lighter because it contains less hydrogen','Cold things always float on warm things'], answer:'Ice is less dense than liquid water — water expands when it freezes', fact:'Almost all substances are denser as solids than as liquids. Water is unique — it becomes less dense when it freezes because its molecules form a hexagonal lattice with more space. This is why ice floats and life can survive under frozen lakes!' },
  { level:2, visual:'🌍', question:'What is a watershed?', options:['An area of land that drains water into a particular river or lake','A measurement of how much water falls as rain','A type of dam that stores water'], answer:'An area of land that drains water into a particular river or lake', fact:'All land is part of a watershed. Rain falling on a watershed flows downhill to the same body of water. That\'s why pollution anywhere in a watershed eventually reaches the lake or river — we all live downstream from someone!' },
  { level:2, visual:'🌿', question:'What is "camouflage" as an adaptation?', options:['Blending into the environment to avoid being seen by predators or prey','Changing behavior in response to temperature','Growing larger to intimidate predators'], answer:'Blending into the environment to avoid being seen by predators or prey', fact:'Arctic foxes turn white in winter, stick insects look like twigs, and flounder match the ocean floor. Camouflage is one of the most widespread and effective survival adaptations in nature!' },
  { level:2, visual:'⚗️', question:'What is a "solution" in chemistry?', options:['A mixture where one substance (solute) is uniformly dissolved in another (solvent)','A method for solving a scientific problem','A mixture where substances can be seen separately'], answer:'A mixture where one substance (solute) is uniformly dissolved in another (solvent)', fact:'Salt dissolved in water = solution. Salt is the solute; water is the solvent. Solutions are homogeneous (same throughout) unlike suspensions (milk, muddy water) where particles are visible!' },
  // ── LEVEL 1 NEW BATCH ──
  { level:1, visual:'🌡️', question:'A ruler is used to measure', options:['Length or distance','Temperature','Mass'], answer:'Length or distance', fact:'Rulers measure length in centimeters or inches. Scientists usually use metric units. A meter stick is 100 centimeters long — just over 3 feet!' },
  { level:1, visual:'⚖️', question:'A scale (balance) is used to measure', options:['Mass','Volume','Temperature'], answer:'Mass', fact:'A balance compares an unknown mass to known masses. Mass stays the same everywhere; weight changes with gravity. On the Moon you would weigh less but your mass would be the same!' },
  { level:1, visual:'💧', question:'A graduated cylinder is used to measure', options:['Volume of a liquid','Mass of an object','Temperature of a liquid'], answer:'Volume of a liquid', fact:'A graduated cylinder has markings (graduations) along the side. You read the bottom of the curved surface (meniscus) for an accurate measurement of liquid volume in milliliters!' },
  { level:1, visual:'🧊', question:'Which state of matter has no definite shape AND no definite volume?', options:['Gas','Liquid','Solid'], answer:'Gas', fact:'Gas particles move freely in all directions and spread to fill any container. That is why air fills a balloon of any shape and size!' },
  { level:1, visual:'🌿', question:'The stem of a plant mainly', options:['Carries water and nutrients between roots and leaves','Makes food through photosynthesis','Absorbs water from the soil'], answer:'Carries water and nutrients between roots and leaves', fact:'Stems contain vascular tissue: xylem carries water up and phloem carries sugar down. Cut a celery stalk and put it in colored water — watch the color travel up the stem!' },
  { level:1, visual:'🦁', question:'Mammals are warm-blooded animals that', options:['Have fur or hair and feed young with milk','Lay eggs and have scales','Breathe through gills'], answer:'Have fur or hair and feed young with milk', fact:'Defining traits of mammals: hair or fur, warm-blooded, give birth to live young (most), and nurse with milk. Humans, dogs, whales, and bats are all mammals!' },
  { level:1, visual:'🐍', question:'Reptiles are different from mammals because reptiles', options:['Are cold-blooded and have scaly skin','Are warm-blooded and have fur','Feed their young with milk'], answer:'Are cold-blooded and have scaly skin', fact:'Reptiles (snakes, lizards, turtles, crocodiles) are ectothermic — they rely on the environment to regulate body temperature. They bask in the sun to warm up and seek shade to cool down!' },
  { level:1, visual:'🐸', question:'Amphibians begin life in water breathing with', options:['Gills, then develop lungs as adults','Lungs from birth','Skin only'], answer:'Gills, then develop lungs as adults', fact:'Frogs, salamanders, and toads are amphibians. Tadpoles have gills and tails; adult frogs have lungs and legs. They also absorb oxygen through their moist skin!' },
  { level:1, visual:'🐝', question:'Insects have how many legs?', options:['6','8','4'], answer:'6', fact:'All insects have 6 legs, 3 body segments (head, thorax, abdomen), and usually wings. Spiders have 8 legs and are arachnids, not insects. There are over 1 million known insect species!' },
  { level:1, visual:'🌵', question:'A desert is a biome characterized by', options:['Very little precipitation (less than 25 cm per year)','Dense forests and high rainfall','Permanently frozen ground'], answer:'Very little precipitation (less than 25 cm per year)', fact:'Deserts cover about 33% of Earth\'s land surface! They can be hot (Sahara) or cold (Antarctica). Animals and plants there have amazing adaptations to conserve water!' },
  { level:1, visual:'🌲', question:'A forest biome has', options:['Many trees forming a canopy that shades the ground','Mostly grasses and few trees','Permanently frozen ground called permafrost'], answer:'Many trees forming a canopy that shades the ground', fact:'Forests cover about 30% of Earth\'s land. Tropical rainforests have the highest biodiversity. Temperate forests have seasonal changes. Boreal forests (taiga) are cold and dominated by conifers!' },
  { level:1, visual:'🌊', question:'A tundra biome has', options:['Very cold temperatures and permafrost (frozen ground)','Warm temperatures year-round','Dense tropical vegetation'], answer:'Very cold temperatures and permafrost (frozen ground)', fact:'The tundra is found near the poles and on high mountaintops. The ground (permafrost) stays frozen year-round. Only low plants like mosses and grasses can survive there!' },
  { level:1, visual:'🌿', question:'What is a habitat?', options:['The natural environment where an organism lives','The food an organism eats','The number of organisms in an area'], answer:'The natural environment where an organism lives', fact:'Every organism has a specific habitat that meets its needs for food, water, shelter, and space. Destroying habitats is the number one cause of species extinction worldwide!' },
  { level:1, visual:'🦋', question:'What is the life cycle of a butterfly in order?', options:['Egg → larva (caterpillar) → pupa (chrysalis) → adult','Egg → adult → pupa → larva','Larva → egg → adult → pupa'], answer:'Egg → larva (caterpillar) → pupa (chrysalis) → adult', fact:'Complete metamorphosis has four stages. Inside the chrysalis, the caterpillar\'s body completely breaks down and reorganizes into a butterfly. It is one of nature\'s most amazing transformations!' },
  { level:1, visual:'🐸', question:'The life cycle of a frog goes from', options:['Egg → tadpole → froglet → adult frog','Egg → frog → tadpole','Tadpole → egg → adult'], answer:'Egg → tadpole → froglet → adult frog', fact:'Frogs undergo incomplete metamorphosis. Tadpoles are fully aquatic with tails and gills. Froglets have legs but still have a tail. Adult frogs can live on land and return to water to reproduce!' },
  { level:1, visual:'🌱', question:'The life cycle of a flowering plant goes from', options:['Seed → seedling → plant → flower → fruit with new seeds','Seed → fruit → flower → plant','Flower → seed → fruit → plant'], answer:'Seed → seedling → plant → flower → fruit with new seeds', fact:'Flowers contain the reproductive organs of plants. Pollination leads to fertilization, which forms seeds inside fruit. Animals eat the fruit and disperse seeds in new locations!' },
  { level:1, visual:'☀️', question:'What are the four seasons in order?', options:['Spring, Summer, Autumn (Fall), Winter','Summer, Autumn, Spring, Winter','Winter, Summer, Spring, Autumn'], answer:'Spring, Summer, Autumn (Fall), Winter', fact:'Seasons are caused by Earth\'s 23.5° axial tilt as it orbits the Sun, not by distance from the Sun. The Northern and Southern Hemispheres have opposite seasons at the same time!' },
  { level:1, visual:'🌍', question:'A mountain is a landform that is', options:['A large mass of rock that rises steeply above the surrounding land','A flat elevated area of land','A low area of land between hills or mountains'], answer:'A large mass of rock that rises steeply above the surrounding land', fact:'Mountains form through volcanic activity or the collision of tectonic plates. The Himalayas are still growing as India slowly collides with Asia. Mount Everest is the world\'s tallest at 8,849 m!' },
  { level:1, visual:'🌊', question:'A valley is a landform that is', options:['A low area of land between hills or mountains, often with a river','A large flat elevated area','A mound of sand near water'], answer:'A low area of land between hills or mountains, often with a river', fact:'Valleys are carved by rivers (river valleys have a V shape) or glaciers (glacial valleys have a U shape). The Grand Canyon is an enormous valley carved by the Colorado River over millions of years!' },
  { level:1, visual:'🏝️', question:'An ocean is', options:['The largest body of salt water on Earth','A large body of fresh water','A small body of water surrounded by land'], answer:'The largest body of salt water on Earth', fact:'Earth has 5 oceans: Pacific (largest), Atlantic, Indian, Southern, and Arctic. Oceans cover 71% of Earth\'s surface and contain 97% of all water. They regulate Earth\'s climate and produce 50% of our oxygen!' },
  { level:1, visual:'💧', question:'A river is', options:['A large natural stream of fresh water flowing toward an ocean or lake','A small lake surrounded by land','Saltwater moving along a coast'], answer:'A large natural stream of fresh water flowing toward an ocean or lake', fact:'Rivers carry fresh water and sediment from mountains to oceans. They carve valleys, form deltas, and provide fresh water for billions of people. The Nile is the world\'s longest river!' },
  { level:1, visual:'🔥', question:'Which form of energy is released when you rub your hands together?', options:['Heat energy (thermal energy)','Light energy','Chemical energy'], answer:'Heat energy (thermal energy)', fact:'Friction converts kinetic energy (movement) into thermal energy (heat). The faster you rub, the more heat! This is how early humans made fire by rapidly rubbing sticks together.' },
  { level:1, visual:'💡', question:'The Sun is a source of which forms of energy?', options:['Light energy and heat energy','Sound energy and chemical energy','Electrical energy and magnetic energy'], answer:'Light energy and heat energy', fact:'The Sun produces energy through nuclear fusion. Plants capture its light energy through photosynthesis, and its heat drives the water cycle and weather. Almost all energy on Earth traces back to the Sun!' },
  { level:1, visual:'🔊', question:'Sound is a form of energy that travels as', options:['Vibrations (waves) through matter','Light waves through empty space','Electric current through wires'], answer:'Vibrations (waves) through matter', fact:'Sound is a mechanical wave that needs a medium (matter) to travel through. It cannot travel through a vacuum (empty space). Sound travels faster through water than air, and fastest through solids!' },
  { level:1, visual:'☀️', question:'A shadow forms when', options:['An object blocks light from reaching a surface','Light reflects off a shiny surface','Two light sources overlap'], answer:'An object blocks light from reaching a surface', fact:'Shadows form on the opposite side of an object from the light source. The size and direction of a shadow changes as the light source moves. Sundials use shadow direction to tell time!' },
  { level:1, visual:'🪞', question:'When light bounces off a surface, it is called', options:['Reflection','Refraction','Absorption'], answer:'Reflection', fact:'Smooth, shiny surfaces reflect light clearly (mirrors). Rough surfaces scatter light in many directions (diffuse reflection). That is why you can see your face in a mirror but not in a sidewalk!' },
  { level:1, visual:'🏋️', question:'A push or a pull on an object is called a', options:['Force','Energy','Matter'], answer:'Force', fact:'Forces can start, stop, speed up, slow down, or change the direction of motion. Gravity, friction, magnetism, and the normal force are all examples of forces!' },
  { level:1, visual:'🎢', question:'Friction is a force that', options:['Opposes motion between two surfaces in contact','Pulls objects toward Earth','Pushes objects apart'], answer:'Opposes motion between two surfaces in contact', fact:'Friction converts kinetic energy into heat. It is useful for braking cars and gripping shoes, but reduces efficiency in machines. Lubricants like oil reduce friction between moving parts!' },
  { level:1, visual:'🔧', question:'A ramp (inclined plane) is an example of a', options:['Simple machine','Compound machine','Natural force'], answer:'Simple machine', fact:'Simple machines make work easier by changing the direction or size of a force. The 6 simple machines are: lever, pulley, wheel and axle, inclined plane, wedge, and screw!' },
  { level:1, visual:'🌡️', question:'Which planet is the hottest in our solar system?', options:['Venus','Mercury','Mars'], answer:'Venus', fact:'Venus is hotter than Mercury despite being farther from the Sun! Its thick CO₂ atmosphere creates a runaway greenhouse effect, keeping the surface at about 465°C — hot enough to melt lead!' },
  { level:1, visual:'🪐', question:'Which planet is the largest in our solar system?', options:['Jupiter','Saturn','Neptune'], answer:'Jupiter', fact:'Jupiter is so large that all other planets in the solar system could fit inside it! It has at least 95 moons, including Ganymede — which is larger than the planet Mercury!' },
  { level:1, visual:'🌍', question:'The planets in order from the Sun are', options:['Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune','Mercury, Earth, Venus, Mars, Jupiter, Saturn, Uranus, Neptune','Venus, Mercury, Earth, Mars, Jupiter, Saturn, Uranus, Neptune'], answer:'Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune', fact:'My Very Eager Mother Just Served Us Nachos — a mnemonic for the planets! The first four are rocky; the last four are gas or ice giants. Pluto was reclassified as a dwarf planet in 2006!' },
  { level:1, visual:'🌊', question:'A lake is different from a river because a lake', options:['Is a body of water surrounded by land with no significant flow','Is always saltwater','Flows toward the ocean'], answer:'Is a body of water surrounded by land with no significant flow', fact:'Lakes can be freshwater or saltwater (like the Great Salt Lake). The Great Lakes in North America contain about 21% of the world\'s surface fresh water!' },
  { level:1, visual:'🌱', question:'Which plant part produces new plants through seeds?', options:['Flower','Root','Stem'], answer:'Flower', fact:'Flowers contain stamens (male, produce pollen) and pistils (female, contain ovules). After pollination and fertilization, the ovule becomes a seed and the ovary becomes a fruit!' },
  { level:1, visual:'🧊', question:'What happens to most substances when they cool down?', options:['They contract (get smaller)','They expand (get bigger)','They stay exactly the same size'], answer:'They contract (get smaller)', fact:'Most substances shrink when cooled because particles slow down and pack more tightly together. Water is the famous exception — it expands when it freezes, which is why ice floats and pipes burst in winter!' },
  { level:1, visual:'🌿', question:'A food chain shows', options:['How energy flows from one organism to the next','Where animals sleep','How plants grow toward light'], answer:'How energy flows from one organism to the next', fact:'Food chains always start with a producer. Arrows in a food chain show the direction of energy transfer: grass → rabbit → fox means the rabbit eats the grass and the fox eats the rabbit!' },
  { level:1, visual:'🦅', question:'Birds are the only animals that have', options:['Feathers','Wings','Hollow bones'], answer:'Feathers', fact:'Feathers are made of keratin (same as your fingernails and hair). They provide insulation, enable flight, and are used for display. Only birds have true feathers — bats have wings but no feathers!' },
  { level:1, visual:'🐠', question:'Which type of animal is cold-blooded, lives in water, and breathes with gills?', options:['Fish','Amphibian','Reptile'], answer:'Fish', fact:'Fish are vertebrates (have backbones) that are fully aquatic and breathe with gills throughout their lives. There are about 34,000 known fish species — more than all other vertebrates combined!' },
  { level:1, visual:'🌙', question:'The half-lit Moon we see at mid-cycle is called', options:['Quarter moon (half-moon)','Crescent moon','Gibbous moon'], answer:'Quarter moon (half-moon)', fact:'The "quarter moon" appears half-lit. We call it quarter because the Moon is one-quarter (or three-quarters) of the way through its cycle. The full sequence: new → crescent → quarter → gibbous → full!' },
  { level:1, visual:'🌧️', question:'What is precipitation?', options:['Water falling from clouds in any form (rain, snow, sleet, hail)','Water evaporating from oceans','Water vapor forming clouds'], answer:'Water falling from clouds in any form (rain, snow, sleet, hail)', fact:'Precipitation is the step in the water cycle when water returns to Earth\'s surface. The type depends on temperature. Snow forms when clouds are below freezing. Hail forms in strong thunderstorms!' },
  { level:1, visual:'🌬️', question:'A plain is a landform that is', options:['A large flat area of land','A steep rocky hillside','A deep crack in Earth\'s surface'], answer:'A large flat area of land', fact:'Plains are flat or gently rolling land. The Great Plains of North America were formed by wind-deposited sediment and glacial action. They are excellent for farming because of deep, rich soil!' },
  { level:1, visual:'🏔️', question:'A plateau is a landform that is', options:['A large flat elevated area of land','A deep valley between mountains','A low-lying flat coastal area'], answer:'A large flat elevated area of land', fact:'Plateaus are also called tablelands. The Tibetan Plateau is the world\'s largest and highest, averaging 4,500 meters above sea level. The Colorado Plateau was carved by rivers to form the Grand Canyon!' },
  { level:1, visual:'⭐', question:'Why do stars twinkle when viewed from Earth?', options:['Earth\'s moving atmosphere bends starlight, making it appear to flicker','Stars actually blink on and off','Stars spin very rapidly'], answer:'Earth\'s moving atmosphere bends starlight, making it appear to flicker', fact:'Turbulent layers of air in the atmosphere bend and redirect light. Planets twinkle less because they appear slightly larger as discs. From space (no atmosphere), stars don\'t twinkle at all!' },
  { level:1, visual:'🌍', question:'What is the name of the process when rock is worn away by water, wind, or ice?', options:['Weathering','Deposition','Erosion'], answer:'Weathering', fact:'Weathering breaks rock into smaller pieces in place. Mechanical weathering (freezing water in cracks) physically breaks rock. Chemical weathering (acid rain) dissolves minerals in rock!' },
  { level:1, visual:'🌊', question:'Which layer of Earth is the thickest?', options:['Mantle','Crust','Outer core'], answer:'Mantle', fact:'The mantle is about 2,900 km thick — making up 84% of Earth\'s volume! It is made of solid rock but flows very slowly over millions of years, like thick putty. This movement drives tectonic plates!' },
  { level:1, visual:'🔬', question:'What does a microscope do?', options:['Makes small objects appear larger for observation','Makes distant objects appear closer','Measures the mass of tiny objects'], answer:'Makes small objects appear larger for observation', fact:'The word microscope comes from Greek: mikros (small) + skopein (to look at). Robert Hooke used one to discover cells in 1665. Today\'s electron microscopes can show individual atoms!' },
  { level:1, visual:'💧', question:'What is condensation on a cold drink glass?', options:['Water vapor from the air cooling and turning to liquid on the glass','Ice melting from inside the glass','The glass sweating from the cold'], answer:'Water vapor from the air cooling and turning to liquid on the glass', fact:'The cold glass cools the air right next to it below the dew point. Water vapor in that air condenses into liquid droplets on the glass surface. It is the same process that forms clouds!' },
  { level:1, visual:'🌱', question:'Which part of a plant transports water from the roots to the leaves?', options:['Xylem (vessels in the stem)','Phloem','Stomata'], answer:'Xylem (vessels in the stem)', fact:'Xylem is a network of hollow tubes running from roots to leaves. Water is pulled up by transpiration — as water evaporates from leaves, more water is drawn up from below. Some trees pull water 100+ meters!' },
  { level:1, visual:'🐛', question:'Caterpillars, maggots, and grubs are all examples of', options:['Larvae (the juvenile stage of insects)','Adult insects','Insect eggs'], answer:'Larvae (the juvenile stage of insects)', fact:'Larvae look completely different from the adult form. They eat constantly to store energy for metamorphosis. A caterpillar may increase its mass by 100 times before forming a chrysalis!' },
  { level:1, visual:'🌞', question:'What is the name of the outermost visible layer of the Sun?', options:['Photosphere','Corona','Chromosphere'], answer:'Photosphere', fact:'The photosphere is the visible surface of the Sun at about 5,500°C. Above it is the chromosphere (10,000°C) and then the corona (millions of °C). Scientists are still puzzling over why the corona is so much hotter!' },
  { level:1, visual:'🌊', question:'A bay is', options:['A body of water partially enclosed by land','An underwater mountain range','A narrow passage of water connecting two seas'], answer:'A body of water partially enclosed by land', fact:'Bays are calmer than open ocean because they are sheltered from waves by surrounding land. Famous bays include the Bay of Bengal, Hudson Bay, and San Francisco Bay. They are excellent natural harbors!' },
  { level:1, visual:'🌡️', question:'What instrument measures air pressure?', options:['Barometer','Thermometer','Anemometer'], answer:'Barometer', fact:'Falling air pressure usually means a storm is coming; rising pressure means fair weather. Barometers are essential for weather forecasting. Torricelli invented the first mercury barometer in 1643!' },
  { level:1, visual:'💨', question:'What instrument measures wind speed?', options:['Anemometer','Barometer','Hygrometer'], answer:'Anemometer', fact:'An anemometer has spinning cups that catch the wind. The faster they spin, the higher the wind speed. Wind speed is measured in km/h, mph, or knots. The Beaufort scale describes wind from calm to hurricane!' },
  { level:1, visual:'☁️', question:'Cumulus clouds look like', options:['Puffy white heaps, like cotton balls','Thin wispy streaks high in the sky','Low flat gray sheets that bring drizzle'], answer:'Puffy white heaps, like cotton balls', fact:'Cumulus comes from Latin for "heap." Fair-weather cumulus clouds are fluffy and white. When they grow tall and dark, they become cumulonimbus thunderstorm clouds!' },
  { level:1, visual:'🌫️', question:'Stratus clouds are', options:['Low flat gray layers that often bring drizzle or fog','Puffy and white at medium altitude','High wispy streaks of ice crystals'], answer:'Low flat gray layers that often bring drizzle or fog', fact:'Stratus means "layer" in Latin. These clouds look like a gray blanket covering the sky. When they reach the ground, we call them fog. They rarely produce heavy rain — just drizzle!' },
  { level:1, visual:'⭐', question:'Cirrus clouds are', options:['High thin wispy clouds made of ice crystals','Low dark storm clouds','Medium puffy white clouds'], answer:'High thin wispy clouds made of ice crystals', fact:'Cirrus clouds form above 6,000 meters where temperatures are far below freezing. They are made of ice crystals and often look like streaks or curls. They sometimes signal an approaching weather system!' },
  // ── LEVEL 2 NEW BATCH ──
  { level:2, visual:'🧪', question:'Mixing oil and water is an example of', options:['A heterogeneous mixture (the two substances do not mix evenly)','A solution','A chemical change'], answer:'A heterogeneous mixture (the two substances do not mix evenly)', fact:'Oil is nonpolar and water is polar — they cannot mix. Oil floats because it is less dense than water. Salad dressing is an oil-and-water mixture that must be shaken before use!' },
  { level:2, visual:'⚗️', question:'What is a compound?', options:['A substance made of two or more elements chemically bonded together in a fixed ratio','A mixture of two substances','A single element in pure form'], answer:'A substance made of two or more elements chemically bonded together in a fixed ratio', fact:'Water (H₂O) is always 2 hydrogen atoms and 1 oxygen — never 3 or 1. Salt (NaCl) is always 1 sodium to 1 chlorine. Compounds have completely different properties from their component elements!' },
  { level:2, visual:'💧', question:'Which factors increase how fast a substance dissolves in water?', options:['Heating the water, stirring, and using smaller pieces','Cooling the water and using larger pieces','Only the type of substance matters'], answer:'Heating the water, stirring, and using smaller pieces', fact:'Heat gives water molecules more energy to surround solute particles. Stirring brings fresh solvent to the solute surface. Smaller pieces have more surface area for water to attack. All three speed dissolving!' },
  { level:2, visual:'🌿', question:'What is mutualism?', options:['A relationship where both species benefit','A relationship where one species benefits and the other is harmed','A relationship where one species benefits and the other is unaffected'], answer:'A relationship where both species benefit', fact:'Bees and flowers: bees get nectar (food) and flowers get pollinated (reproduction). Clownfish and sea anemones: fish get protection, anemone gets cleaning. Both win — that is mutualism!' },
  { level:2, visual:'🦠', question:'What is parasitism?', options:['One organism (parasite) benefits while harming the other (host)','Both organisms benefit from the relationship','One benefits and one is unharmed'], answer:'One organism (parasite) benefits while harming the other (host)', fact:'Tapeworms in intestines, ticks on dogs, mistletoe on trees — parasites take resources without immediately killing the host (killing the host would end their food source). Parasites are incredibly common!' },
  { level:2, visual:'🐦', question:'What is commensalism?', options:['One organism benefits while the other is neither helped nor harmed','Both organisms are harmed','One is helped and one is harmed'], answer:'One organism benefits while the other is neither helped nor harmed', fact:'Barnacles on whale skin get free transportation to food-rich waters; the whale is unaffected. Cattle egrets follow grazing cattle to catch insects stirred up by hooves — the cattle don\'t care!' },
  { level:2, visual:'🌿', question:'An "energy pyramid" shows that', options:['Energy decreases at each higher level of the food chain (only ~10% passes up)','Energy increases as you go up the food chain','All levels contain equal amounts of energy'], answer:'Energy decreases at each higher level of the food chain (only ~10% passes up)', fact:'Only about 10% of energy transfers to the next trophic level — the rest is lost as heat. That is why ecosystems can support far more plants than herbivores, and more herbivores than carnivores!' },
  { level:2, visual:'🏜️', question:'A desert biome is characterized by', options:['Low precipitation, extreme temperatures, and specially adapted sparse life','Dense vegetation and high humidity','Cold temperatures and permafrost'], answer:'Low precipitation, extreme temperatures, and specially adapted sparse life', fact:'Deserts aren\'t just hot — Antarctica is the world\'s largest desert! Desert animals reduce water loss with behaviors like being nocturnal, and plants like cacti store water in thick stems!' },
  { level:2, visual:'🌿', question:'A tropical rainforest biome has', options:['High rainfall, warm temperatures year-round, and extreme biodiversity','Cold winters and moderate rainfall','Short summers and long frozen winters'], answer:'High rainfall, warm temperatures year-round, and extreme biodiversity', fact:'Tropical rainforests cover about 6% of Earth\'s surface but contain over 50% of the world\'s plant and animal species! They are found near the equator in South America, Africa, and Southeast Asia!' },
  { level:2, visual:'🌊', question:'The ocean biome covers what portion of Earth\'s surface?', options:['About 71%','About 30%','About 50%'], answer:'About 71%', fact:'The ocean is Earth\'s largest biome and regulates climate, produces oxygen (50% of Earth\'s oxygen comes from ocean phytoplankton), and drives weather patterns. Yet only about 20% of the ocean has been explored!' },
  { level:2, visual:'🔥', question:'What is the difference between an exothermic and endothermic reaction?', options:['Exothermic releases heat; endothermic absorbs heat','Exothermic absorbs heat; endothermic releases heat','Both release the same amount of heat'], answer:'Exothermic releases heat; endothermic absorbs heat', fact:'Burning wood is exothermic — it releases heat and light. Melting ice is endothermic — it absorbs heat from the surroundings (that is why ice cools your drink). Most reactions are exothermic!' },
  { level:2, visual:'🌱', question:'What is the difference between a physical and chemical property?', options:['Physical properties can be observed without changing the substance; chemical properties describe how it reacts','Physical properties involve reactions; chemical properties are just appearances','They mean the same thing'], answer:'Physical properties can be observed without changing the substance; chemical properties describe how it reacts', fact:'Color, density, melting point = physical properties (no new substance formed). Flammability, reactivity with acid = chemical properties (a reaction is needed to test them). A chemist uses both to identify substances!' },
  { level:2, visual:'💧', question:'Why is water\'s high specific heat capacity important for life?', options:['It means water resists temperature changes, stabilizing climate and body temperature','It means water heats up very quickly','It means water cools down faster than other liquids'], answer:'It means water resists temperature changes, stabilizing climate and body temperature', fact:'Water absorbs a lot of heat before its temperature rises. This is why oceans warm and cool slowly, moderating coastal climates. Your body is ~60% water — it buffers against dangerous temperature swings!' },
  { level:2, visual:'🌊', question:'What is the water table?', options:['The upper level of underground water-saturated soil or rock (aquifer)','The surface of a lake or pond','The level where rainwater stops falling'], answer:'The upper level of underground water-saturated soil or rock (aquifer)', fact:'Below a certain depth, all pores in rock and soil are filled with water — that is the water table. Wells are drilled below the water table. Drought or overuse can lower the water table, drying up wells and springs!' },
  { level:2, visual:'⚡', question:'What is the difference between conductors and insulators?', options:['Conductors allow electricity to flow freely; insulators block it','Conductors block electricity; insulators allow it to flow','Both allow the same amount of electricity to flow'], answer:'Conductors allow electricity to flow freely; insulators block it', fact:'Metals (copper, silver, gold) are excellent conductors because electrons move freely. Rubber, plastic, and glass are insulators. Wire is copper (conductor) wrapped in plastic (insulator) — a safety design!' },
  { level:2, visual:'🔋', question:'A battery stores energy as', options:['Chemical energy that converts to electrical energy when connected','Electrical energy directly','Mechanical energy from spinning parts'], answer:'Chemical energy that converts to electrical energy when connected', fact:'Inside a battery, chemical reactions move electrons. When you connect a circuit, electrons flow from the negative terminal through the circuit to the positive terminal, creating electric current!' },
  { level:2, visual:'🧲', question:'What is the difference between permanent magnets and electromagnets?', options:['Permanent magnets always attract; electromagnets only magnetize when electric current flows','Electromagnets are permanent; regular magnets turn on and off','They work in exactly the same way'], answer:'Permanent magnets always attract; electromagnets only magnetize when electric current flows', fact:'Electromagnets can be switched on and off and their strength varied by changing the current. Scrapyard cranes use powerful electromagnets to pick up and release metal. MRI machines use strong electromagnets!' },
  { level:2, visual:'🔊', question:'Sound travels fastest through', options:['Solids (particles are closest together)','Liquids','Gases'], answer:'Solids (particles are closest together)', fact:'Sound travels at ~340 m/s in air, ~1,480 m/s in water, and ~5,000 m/s in steel. Particles in solids are close together, transmitting vibrations quickly. You can hear a train coming by putting your ear to the rail!' },
  { level:2, visual:'🌈', question:'A rainbow forms when', options:['Sunlight enters water droplets, refracts, reflects, and separates into colors','Sunlight reflects off clouds','Different colored gases rise into the atmosphere'], answer:'Sunlight enters water droplets, refracts, reflects, and separates into colors', fact:'Each color in sunlight bends (refracts) at a slightly different angle when entering water. Red bends the least (outer arc), violet the most (inner arc). You always see a rainbow when the Sun is behind you and rain is in front!' },
  { level:2, visual:'🌿', question:'What is the difference between a biome and an ecosystem?', options:['A biome is a large region with similar climate and life; an ecosystem includes the organisms AND their physical environment in any area','A biome is smaller than an ecosystem','They mean exactly the same thing'], answer:'A biome is a large region with similar climate and life; an ecosystem includes the organisms AND their physical environment in any area', fact:'The Amazon rainforest is a biome. A single pond in that rainforest (with all its organisms, water, sediment, and sunlight) is an ecosystem. Many ecosystems make up a biome!' },
  { level:2, visual:'🦁', question:'What is "carrying capacity"?', options:['The maximum population a habitat can support given its available resources','The total mass of all organisms in an ecosystem','The number of predator species in an ecosystem'], answer:'The maximum population a habitat can support given its available resources', fact:'When a population exceeds carrying capacity, resources run short and the population crashes. Limiting factors (food, water, disease, space) keep populations at or below carrying capacity!' },
  { level:2, visual:'🌱', question:'What is a "limiting factor" in an ecosystem?', options:['Any resource or condition that controls the size of a population','The total number of organisms in an area','The largest predator in a food chain'], answer:'Any resource or condition that controls the size of a population', fact:'Food, water, shelter, disease, predation — any of these can be limiting factors. Liebig\'s Law of the Minimum says a population is limited by the scarcest essential resource. For plants, it is often nitrogen or water!' },
  { level:2, visual:'🏭', question:'How does pollution affect ecosystems?', options:['It disrupts food chains, poisons organisms, and reduces biodiversity','It only affects individual organisms, not whole ecosystems','It always leads to new species developing quickly'], answer:'It disrupts food chains, poisons organisms, and reduces biodiversity', fact:'Oil spills suffocate birds and fish. Pesticides kill insects that birds rely on. Plastic in oceans is ingested by sea creatures. Pollution effects ripple through entire food webs — often for decades!' },
  { level:2, visual:'🌊', question:'How do ocean currents affect climate?', options:['They transport warm and cold water, moderating temperatures of coastal regions','They have no effect on climate','They only affect sea animals'], answer:'They transport warm and cold water, moderating temperatures of coastal regions', fact:'The Gulf Stream brings warm water from the Caribbean to Europe, keeping the UK much warmer than its latitude suggests. If it stopped (due to climate change), northern Europe could cool dramatically!' },
  { level:2, visual:'⚗️', question:'What is density and how is it calculated?', options:['Density = mass ÷ volume; it describes how much mass is packed into a space','Density = volume ÷ mass','Density = mass × volume'], answer:'Density = mass ÷ volume; it describes how much mass is packed into a space', fact:'A metal ball and a foam ball the same size have very different densities. Objects less dense than water float; denser ones sink. Ice (0.92 g/mL) is less dense than water (1.0 g/mL) — that is why it floats!' },
  { level:2, visual:'🌍', question:'What happens at a convergent plate boundary?', options:['Two plates collide, forming mountains or causing subduction','Two plates move apart, forming new seafloor','Two plates slide past each other'], answer:'Two plates collide, forming mountains or causing subduction', fact:'When two continental plates collide, crust crumples into mountains (the Himalayas). When an oceanic plate meets a continental plate, the denser oceanic plate sinks (subducts), forming deep trenches and volcanoes!' },
  { level:2, visual:'🌋', question:'What happens at a divergent plate boundary?', options:['Plates move apart and magma rises to form new rock (seafloor spreading)','Plates collide and crumple into mountains','Plates slide sideways past each other'], answer:'Plates move apart and magma rises to form new rock (seafloor spreading)', fact:'The Mid-Atlantic Ridge is a divergent boundary where North America and Europe move apart at about 2.5 cm per year. Iceland sits right on this boundary and is slowly growing larger!' },
  { level:2, visual:'⚡', question:'What happens at a transform plate boundary?', options:['Plates slide sideways past each other, causing earthquakes','Plates collide and form mountains','Plates pull apart and form new seafloor'], answer:'Plates slide sideways past each other, causing earthquakes', fact:'The San Andreas Fault in California is a transform boundary between the North American and Pacific plates. When the rocks suddenly slip past each other, the energy is released as an earthquake!' },
  { level:2, visual:'🌊', question:'What is the difference between weathering and deposition?', options:['Weathering breaks rock down; deposition drops sediment in a new place','They are opposite words for the same process','Deposition breaks rock; weathering deposits it'], answer:'Weathering breaks rock down; deposition drops sediment in a new place', fact:'The rock cycle: weathering breaks rock into sediment → erosion moves it → deposition drops it → layers compact into sedimentary rock. The Mississippi River deposits millions of tons of sediment into the Gulf of Mexico each year!' },
  { level:2, visual:'☁️', question:'What causes fog?', options:['Air near the ground cools to its dew point and water vapor condenses into tiny droplets','Smoke from factories hovering near the ground','Clouds descending from high altitude'], answer:'Air near the ground cools to its dew point and water vapor condenses into tiny droplets', fact:'Fog is essentially a cloud at ground level. Radiation fog forms on clear nights when the ground cools rapidly. Advection fog forms when warm moist air moves over cold water (famous in San Francisco)!' },
  { level:2, visual:'🌩️', question:'Lightning forms when', options:['Electric charge builds up in storm clouds and discharges to the ground or another cloud','Hot air from the Sun reaches Earth\'s surface','Static electricity builds up in dry air'], answer:'Electric charge builds up in storm clouds and discharges to the ground or another cloud', fact:'A lightning bolt is about 5 times hotter than the Sun\'s surface (28,000°C)! The rapid heating of air causes it to expand explosively — creating the sound wave we call thunder. Light reaches us before sound!' },
  { level:2, visual:'🔬', question:'What is the difference between an element and a compound?', options:['An element is a pure substance with one type of atom; a compound has two or more element types bonded together','An element is a mixture; a compound is a pure substance','They mean the same thing'], answer:'An element is a pure substance with one type of atom; a compound has two or more element types bonded together', fact:'Gold (Au), oxygen (O₂), and iron (Fe) are elements — only one type of atom. Water (H₂O) and salt (NaCl) are compounds — two different elements chemically combined. The periodic table lists all 118 known elements!' },
  { level:2, visual:'🌿', question:'What is transpiration and why does it matter for the water cycle?', options:['Plants releasing water vapor from leaves — it contributes significantly to atmospheric water vapor','Water evaporating from soil surfaces','Rain soaking into plant roots'], answer:'Plants releasing water vapor from leaves — it contributes significantly to atmospheric water vapor', fact:'Tropical rainforests transpire so much water that they create their own rainfall! A single large tree can release hundreds of liters of water vapor per day. Deforestation disrupts local and regional rainfall patterns!' },
  { level:2, visual:'🧪', question:'What is a suspension vs a colloid?', options:['Suspensions have large particles that settle; colloids have smaller particles that stay dispersed','Suspensions and colloids are the same thing','A colloid is a type of pure substance'], answer:'Suspensions have large particles that settle; colloids have smaller particles that stay dispersed', fact:'Muddy water is a suspension — let it sit and mud settles out. Milk is a colloid — fat droplets stay dispersed in water and don\'t settle. Fog and smoke are also colloids (gas-based)!' },
  { level:2, visual:'🌱', question:'What is succession in ecology?', options:['The gradual change in species composition of an ecosystem over time','One species suddenly replacing another','Animals migrating through a region seasonally'], answer:'The gradual change in species composition of an ecosystem over time', fact:'Primary succession: bare rock → lichens → mosses → plants → forest (takes centuries). Secondary succession: after a disturbance (fire, flood) a community regrows from remaining soil. Mt. St. Helens showed this after its 1980 eruption!' },
  { level:2, visual:'⚡', question:'What is the difference between series and parallel circuits?', options:['Series has one path for current; parallel has multiple paths','Series has multiple paths; parallel has one','They work exactly the same way'], answer:'Series has one path for current; parallel has multiple paths', fact:'In a series circuit, if one bulb burns out, all go dark. In a parallel circuit, each bulb has its own path — one burning out doesn\'t affect others. Home wiring uses parallel circuits for this reason!' },
  { level:2, visual:'🌿', question:'What is an "apex predator"?', options:['A predator at the top of the food chain with no natural predators','The most numerous animal in an ecosystem','The largest animal in any habitat'], answer:'A predator at the top of the food chain with no natural predators', fact:'Wolves, orcas, lions, and sharks are apex predators. They regulate prey populations, preventing overgrazing. When apex predators are removed (like wolves from Yellowstone), ecosystems can destabilize dramatically!' },
  { level:2, visual:'🦅', question:'What is the "10% rule" in ecology?', options:['About 10% of energy passes to the next trophic level; 90% is lost as heat','Animals eat only 10% of available prey','Populations never exceed 10% of the previous year\'s size'], answer:'About 10% of energy passes to the next trophic level; 90% is lost as heat', fact:'Of all the energy a plant captures, only ~10% becomes herbivore tissue. Of that, only ~10% becomes carnivore tissue. This is why you need roughly 10,000 kg of plants to support 100 kg of carnivores!' },
  { level:2, visual:'🌊', question:'What is the Coriolis effect\'s influence on weather?', options:['It deflects winds and ocean currents, causing storms to spiral in opposite directions in each hemisphere','It causes all storms to spin clockwise everywhere','It only affects ocean currents, not wind'], answer:'It deflects winds and ocean currents, causing storms to spiral in opposite directions in each hemisphere', fact:'Earth\'s rotation deflects moving air to the right in the Northern Hemisphere and left in the Southern. This causes hurricanes to spin counterclockwise in the north and clockwise in the south!' },
  { level:2, visual:'🌡️', question:'What is humidity?', options:['The amount of water vapor present in the air','The temperature of the air','The speed of the wind'], answer:'The amount of water vapor present in the air', fact:'Relative humidity (%) compares actual water vapor to the maximum possible at that temperature. At 100% humidity, air is saturated and water condenses (dew, fog, rain). A hygrometer measures humidity!' },
  // ── LEVEL 3 NEW BATCH ──
  { level:3, visual:'⚛️', question:'What are the three subatomic particles in an atom?', options:['Protons (positive), neutrons (neutral), electrons (negative)','Protons, molecules, and electrons','Protons, atoms, and neutrons'], answer:'Protons (positive), neutrons (neutral), electrons (negative)', fact:'Protons and neutrons are in the nucleus; electrons orbit in shells. The number of protons = atomic number = which element it is. Carbon always has 6 protons; oxygen always has 8!' },
  { level:3, visual:'⚛️', question:'What is the periodic table organized by?', options:['Increasing atomic number (number of protons), with elements grouped by similar properties','Alphabetical order of element names','Increasing atomic mass only'], answer:'Increasing atomic number (number of protons), with elements grouped by similar properties', fact:'Mendeleev arranged elements by properties in 1869 and predicted undiscovered elements! Elements in the same column (group) have similar chemical behavior because they have the same number of outer electrons!' },
  { level:3, visual:'⚗️', question:'What are the four types of chemical reactions?', options:['Synthesis, decomposition, single replacement, and double replacement','Combination, separation, mixing, and burning','Addition, subtraction, heating, and cooling'], answer:'Synthesis, decomposition, single replacement, and double replacement', fact:'Synthesis: A + B → AB. Decomposition: AB → A + B. Single replacement: A + BC → AC + B. Double replacement: AB + CD → AD + CB. Combustion is a special type of synthesis (fuel + O₂ → CO₂ + H₂O)!' },
  { level:3, visual:'🧪', question:'What is the law of conservation of mass?', options:['In a chemical reaction, the total mass of reactants equals the total mass of products','Mass can be created in certain chemical reactions','High-energy reactions destroy some mass'], answer:'In a chemical reaction, the total mass of reactants equals the total mass of products', fact:'Lavoisier proved this in the 1700s. Atoms rearrange but are never created or destroyed. If 100 g of reactants go into a reaction, exactly 100 g of products come out (including any gases produced)!' },
  { level:3, visual:'⚗️', question:'What is pH and what does it measure?', options:['pH measures the concentration of hydrogen ions — below 7 is acidic, above 7 is basic (alkaline), 7 is neutral','pH measures the density of a liquid','pH measures the boiling point of a solution'], answer:'pH measures the concentration of hydrogen ions — below 7 is acidic, above 7 is basic (alkaline), 7 is neutral', fact:'Each pH unit is 10× more acidic or basic than the next. Stomach acid is pH 2; bleach is pH 13. Blood must stay between pH 7.35-7.45 — even a small change causes serious health problems!' },
  { level:3, visual:'🧪', question:'What are acids and bases?', options:['Acids donate H⁺ ions and taste sour; bases accept H⁺ ions and feel slippery','Acids are always dangerous; bases are always safe','Acids are cold; bases are hot'], answer:'Acids donate H⁺ ions and taste sour; bases accept H⁺ ions and feel slippery', fact:'Vinegar and lemon juice are weak acids; battery acid is a strong acid. Soap and baking soda are bases. When acids and bases react, they neutralize each other, producing water and a salt!' },
  { level:3, visual:'⚗️', question:'What is a polymer?', options:['A large molecule made of many repeating smaller units (monomers) linked together','A single molecule with high energy','A mixture of two different chemicals'], answer:'A large molecule made of many repeating smaller units (monomers) linked together', fact:'DNA, proteins, starch, and cellulose are natural polymers. Plastics (nylon, polyester, Teflon) are synthetic polymers. The word polymer comes from Greek: poly = many, meros = part!' },
  { level:3, visual:'🔬', question:'What techniques are used to separate mixtures?', options:['Filtration, distillation, evaporation, chromatography, and magnetic separation','Only chemical reactions can separate mixtures','Mixtures cannot be separated once formed'], answer:'Filtration, distillation, evaporation, chromatography, and magnetic separation', fact:'Filtration separates by particle size. Distillation separates by boiling point. Chromatography separates by how substances travel through a medium. Each technique exploits a physical difference!' },
  { level:3, visual:'🌿', question:'What is the carbon cycle?', options:['The movement of carbon through atmosphere, oceans, living things, and rock via photosynthesis, respiration, decomposition, and combustion','The movement of carbon only between plants and animals','Carbon burning in stars then falling to Earth'], answer:'The movement of carbon through atmosphere, oceans, living things, and rock via photosynthesis, respiration, decomposition, and combustion', fact:'Plants absorb CO₂ (photosynthesis). Animals eat plants and breathe out CO₂ (respiration). Dead organisms are decomposed or become fossil fuels. Burning fossil fuels releases carbon stored for millions of years — disrupting the cycle!' },
  { level:3, visual:'🌱', question:'What is the nitrogen cycle and why is it essential?', options:['Nitrogen moves from air → soil (via bacteria) → plants → animals → back to air; essential for building proteins and DNA','Nitrogen only moves between plants and atmosphere','Nitrogen is not needed by living things'], answer:'Nitrogen moves from air → soil (via bacteria) → plants → animals → back to air; essential for building proteins and DNA', fact:'Nitrogen is 78% of air but useless to most organisms directly. Nitrogen-fixing bacteria (in legume roots and soil) convert N₂ to ammonia. Denitrifying bacteria return nitrogen to the air. Without this, life would lack proteins!' },
  { level:3, visual:'🌊', question:'What is the water cycle at a quantitative level?', options:['About 496,000 km³ of water cycle each year; oceans provide 86% of evaporation','Only rivers and lakes contribute to the water cycle','Exactly equal amounts evaporate and precipitate in every location'], answer:'About 496,000 km³ of water cycle each year; oceans provide 86% of evaporation', fact:'The ocean loses more water to evaporation than it receives as precipitation — the rest falls on land and returns via rivers. 14% of evaporation comes from land (transpiration). The cycle has been running for 4+ billion years!' },
  { level:3, visual:'🦠', question:'What are keystone species and give an example?', options:['Species that have disproportionately large effects on their ecosystem — e.g., sea otters controlling sea urchins that would destroy kelp forests','The most numerous species in any ecosystem','The largest predators in any food chain'], answer:'Species that have disproportionately large effects on their ecosystem — e.g., sea otters controlling sea urchins that would destroy kelp forests', fact:'Remove a keystone and the ecosystem collapses disproportionately. Beavers are keystone species — their dams create wetlands supporting hundreds of species. The term was coined by ecologist Robert Paine in 1969!' },
  { level:3, visual:'🌿', question:'What is biodiversity loss and why does it matter?', options:['The reduction in variety of species; it destabilizes ecosystems and threatens human food security and medicine','A natural process with no long-term effects','Only a concern for endangered charismatic animals like pandas'], answer:'The reduction in variety of species; it destabilizes ecosystems and threatens human food security and medicine', fact:'We are losing species 100-1,000 times faster than the natural background rate. 25% of known species face extinction. More diverse ecosystems are more resilient to disease and climate change. 25% of medicines come from rainforest plants!' },
  { level:3, visual:'🌱', question:'What are invasive species and how do they disrupt ecosystems?', options:['Non-native species introduced to a new area where they have no natural predators, often outcompeting native species','Species that hibernate during winter','Native species that suddenly increase in population'], answer:'Non-native species introduced to a new area where they have no natural predators, often outcompeting native species', fact:'Zebra mussels in Great Lakes filter-feed so heavily they starve native species. Kudzu vine covers forests in the US Southeast. Cane toads in Australia have no predators and poison native wildlife. Prevention is far cheaper than control!' },
  { level:3, visual:'🌊', question:'What is food web disruption analysis?', options:['Removing one species can cause a trophic cascade affecting the entire ecosystem','Food webs only change when all species in one level disappear','Ecosystems recover instantly when one species is removed'], answer:'Removing one species can cause a trophic cascade affecting the entire ecosystem', fact:'When wolves were reintroduced to Yellowstone, deer populations fell, riparian vegetation recovered, streams stabilized, beaver populations grew, and fish increased — all connected in unexpected ways. This is a trophic cascade!' },
  { level:3, visual:'🌍', question:'What are the layers of the atmosphere in order from Earth outward?', options:['Troposphere, stratosphere, mesosphere, thermosphere, exosphere','Troposphere, mesosphere, stratosphere, thermosphere, exosphere','Stratosphere, troposphere, mesosphere, exosphere, thermosphere'], answer:'Troposphere, stratosphere, mesosphere, thermosphere, exosphere', fact:'Troposphere (weather, 0-12 km), stratosphere (ozone layer, 12-50 km), mesosphere (meteors burn up, 50-80 km), thermosphere (auroras, ISS, 80-700 km), exosphere (fades into space, 700-10,000 km)!' },
  { level:3, visual:'🌋', question:'What is the rock cycle and what drives it?', options:['Heat, pressure, and erosion transform rocks between igneous, metamorphic, and sedimentary types — driven by Earth\'s internal heat and surface processes','Rocks form once and remain the same type forever','Only volcanic eruptions create new rock'], answer:'Heat, pressure, and erosion transform rocks between igneous, metamorphic, and sedimentary types — driven by Earth\'s internal heat and surface processes', fact:'Magma cools → igneous. Erosion deposits sediment → compresses into sedimentary. Heat and pressure transform either type → metamorphic. Any type can melt back to magma. No rock is permanent!' },
  { level:3, visual:'⭐', question:'What is stellar evolution — what happens to a star over its lifetime?', options:['Nebula → protostar → main sequence star → red giant → white dwarf (or supernova → neutron star/black hole for massive stars)','Stars form, burn for a few million years, then explode','Stars never change once formed'], answer:'Nebula → protostar → main sequence star → red giant → white dwarf (or supernova → neutron star/black hole for massive stars)', fact:'Our Sun is about halfway through its 10-billion-year main sequence life. In 5 billion years it will expand into a red giant (swallowing Earth!), then shed outer layers and become a white dwarf no larger than Earth!' },
  { level:3, visual:'🌍', question:'What is gravitational force and how does it affect orbital mechanics?', options:['Gravity pulls all masses together; a satellite orbits when its forward speed balances gravity\'s pull, keeping it in continuous free fall','Gravity only acts between Earth and the Moon','Orbits require constant thrust to maintain'], answer:'Gravity pulls all masses together; a satellite orbits when its forward speed balances gravity\'s pull, keeping it in continuous free fall', fact:'An orbit is perpetual free fall! The ISS falls toward Earth constantly, but Earth\'s surface curves away at the same rate. Too slow and it crashes; too fast and it escapes. Newton understood this by watching an apple fall!' },
  { level:3, visual:'☀️', question:'What is the evidence for human-caused climate change?', options:['Rising CO₂ (matching fossil fuel burning), global temperature records, melting ice, rising seas, ocean acidification, and shifting seasons','Only that temperatures have risen in the last decade','Scientists still debate whether climate change is happening'], answer:'Rising CO₂ (matching fossil fuel burning), global temperature records, melting ice, rising seas, ocean acidification, and shifting seasons', fact:'Ice core data shows CO₂ and temperature have been coupled for 800,000 years. Current CO₂ (420+ ppm) exceeds anything in that record. 97% of actively publishing climate scientists agree humans are the primary cause!' },
  { level:3, visual:'🌊', question:'What is plate tectonics and what drives it?', options:['Large sections of Earth\'s crust move slowly driven by convection currents in the mantle','The Moon\'s gravity pulling on the crust','Earth\'s rotation pushing the crust outward'], answer:'Large sections of Earth\'s crust move slowly driven by convection currents in the mantle', fact:'Earth has about 15 major tectonic plates. Where they diverge: new seafloor forms. Where they converge: mountains or trenches form. Where they slide: earthquakes. The theory unified geology in the 1960s!' },
  { level:3, visual:'🌈', question:'What is the electromagnetic spectrum?', options:['The full range of electromagnetic radiation from radio waves (longest) to gamma rays (shortest wavelength, highest energy)','The visible colors of light only','The range of temperatures from absolute zero to the Sun\'s core'], answer:'The full range of electromagnetic radiation from radio waves (longest) to gamma rays (shortest wavelength, highest energy)', fact:'Visible light is only a tiny slice of the EM spectrum! Radio, microwave, infrared, visible, ultraviolet, X-ray, and gamma ray — all are the same type of wave, just different wavelengths and energies!' },
  { level:3, visual:'⚡', question:'What is wave frequency and how does it relate to energy?', options:['Frequency is the number of wave cycles per second; higher frequency = higher energy','Frequency is the height of a wave; higher waves have less energy','Frequency and energy are unrelated'], answer:'Frequency is the number of wave cycles per second; higher frequency = higher energy', fact:'E = hf (Planck\'s equation). Gamma rays have the highest frequency and most energy (dangerous to cells). Radio waves have the lowest frequency and least energy (harmless). This is why X-rays penetrate tissue but radio waves don\'t!' },
  { level:3, visual:'⚡', question:'What is nuclear energy and how is it different from chemical energy?', options:['Nuclear energy comes from changes in the nucleus (fission or fusion); chemical energy comes from electron rearrangements (bonds)','Nuclear energy comes from burning nuclear fuel chemically','They are the same type of energy'], answer:'Nuclear energy comes from changes in the nucleus (fission or fusion); chemical energy comes from electron rearrangements (bonds)', fact:'Nuclear reactions release 1 million times more energy per atom than chemical reactions. One kg of uranium can produce as much energy as 3,000 tonnes of coal. The difference: nuclear changes the nucleus; chemical changes electrons only!' },
  { level:3, visual:'🔋', question:'What is energy transformation? Give the chain for a power plant.', options:['Chemical (fuel) → thermal (heat) → mechanical (spinning turbine) → electrical (generator) → light and heat (in homes)','Chemical energy converts directly to electricity','Mechanical energy directly powers all appliances'], answer:'Chemical (fuel) → thermal (heat) → mechanical (spinning turbine) → electrical (generator) → light and heat (in homes)', fact:'Every power plant is an energy transformation chain. Even renewable energy transforms: solar (light → electrical), wind (kinetic → electrical), hydro (gravitational potential → kinetic → electrical). Energy is never created — only transformed!' },
  { level:3, visual:'⚡', question:'What is Newton\'s First Law of Motion?', options:['An object at rest stays at rest, and an object in motion stays in motion, unless acted on by an unbalanced force (inertia)','For every action there is an equal and opposite reaction','Force equals mass times acceleration'], answer:'An object at rest stays at rest, and an object in motion stays in motion, unless acted on by an unbalanced force (inertia)', fact:'Inertia! Your coffee slides forward when you brake hard (it "wants" to keep moving). A tablecloth trick works because of inertia. In space with no friction, objects keep moving forever!' },
  { level:3, visual:'🏋️', question:'What is Newton\'s Second Law of Motion?', options:['Force = mass × acceleration (F = ma)','Every action has an equal and opposite reaction','Objects in motion stay in motion'], answer:'Force = mass × acceleration (F = ma)', fact:'F = ma: to accelerate a heavy object (large m) you need more force. A small force on a small mass produces big acceleration. This law explains why rockets must shed mass to accelerate — by burning fuel, they get lighter!' },
  { level:3, visual:'🚀', question:'What is Newton\'s Third Law of Motion?', options:['For every action, there is an equal and opposite reaction','Force equals mass times acceleration','Objects at rest stay at rest'], answer:'For every action, there is an equal and opposite reaction', fact:'Rockets work by Newton\'s 3rd Law — hot gases rush out backward (action) and the rocket moves forward (reaction). When you jump, you push Earth backward (you barely notice because Earth\'s mass is enormous)!' },
  { level:3, visual:'💧', question:'What is pressure and how does it work in fluids?', options:['Pressure = force ÷ area; in fluids, pressure increases with depth and acts equally in all directions','Pressure only acts downward','Pressure decreases as depth increases in water'], answer:'Pressure = force ÷ area; in fluids, pressure increases with depth and acts equally in all directions', fact:'At 10 m depth, water pressure equals one additional atmosphere. Deep-sea creatures at 10 km depth experience 1,000× atmospheric pressure. Pascal\'s principle: pressure applied to a fluid transmits equally in all directions (how hydraulics work)!' },
  { level:3, visual:'🚢', question:'What is buoyancy and Archimedes\' principle?', options:['An object in a fluid is buoyed up by a force equal to the weight of fluid displaced','Heavy objects always sink regardless of shape','Only wooden objects can float'], answer:'An object in a fluid is buoyed up by a force equal to the weight of fluid displaced', fact:'Archimedes shouted "Eureka!" when he realized this in his bath. A steel ship floats because its hull displaces water weighing more than the ship. A steel ball sinks because it displaces less water than its own weight!' },
  { level:3, visual:'🌡️', question:'What is absolute zero and what happens to matter there?', options:['Absolute zero is -273.15°C (0 Kelvin) — the lowest possible temperature where particle motion essentially stops','Absolute zero is 0°C (water\'s freezing point)','Absolute zero is the temperature at which all substances become gases'], answer:'Absolute zero is -273.15°C (0 Kelvin) — the lowest possible temperature where particle motion essentially stops', fact:'Temperature measures average particle kinetic energy. At absolute zero, particles have minimum possible energy. Scientists have reached within billionths of a degree of absolute zero — revealing strange quantum behaviors like superfluidity!' },
