  { level:3, visual:'🌍', question:'What is climate change\'s effect on the water cycle?', options:['Warming temperatures intensify the water cycle — more evaporation, more extreme precipitation, longer droughts in some regions','Climate change slows the water cycle','Only ocean evaporation is affected'], answer:'Warming temperatures intensify the water cycle — more evaporation, more extreme precipitation, longer droughts in some regions', fact:'For every 1°C of warming, the atmosphere holds about 7% more water vapor. This intensifies storms (more rain when it does rain) but also dries soils faster between rain events. Both floods and droughts become more extreme!' },
  { level:3, visual:'🧬', question:'What is genetic variation and why is it important for evolution?', options:['Differences in DNA between individuals; it provides the raw material for natural selection to act on','Variation that occurs only in one individual\'s lifetime','Variation caused only by environment, not genes'], answer:'Differences in DNA between individuals; it provides the raw material for natural selection to act on', fact:'Without genetic variation, a disease could wipe out an entire population with identical DNA. Sexual reproduction shuffles genes to create variation. Mutations introduce new variants. This is why inbreeding weakens populations!' },
  { level:3, visual:'🦠', question:'What is bioremediation?', options:['Using living organisms (bacteria, fungi, plants) to clean up pollution in soil or water','Burning polluted material to destroy contaminants','Using chemicals to neutralize pollution'], answer:'Using living organisms (bacteria, fungi, plants) to clean up pollution in soil or water', fact:'Certain bacteria eat oil spills. Hyperaccumulator plants absorb heavy metals from soil. Fungi can break down plastics. Bioremediation is often cheaper and more ecologically sound than chemical cleanup methods!' },
  { level:3, visual:'🌊', question:'What is ocean acidification and why is it concerning?', options:['Oceans absorb CO₂, forming carbonic acid, lowering pH — threatening shell-forming organisms','Ocean acidification is the same as water pollution','Oceans naturally cycle between acidic and basic every few years'], answer:'Oceans absorb CO₂, forming carbonic acid, lowering pH — threatening shell-forming organisms', fact:'Oceans have absorbed about 30% of human CO₂ emissions. Since industrialization, ocean pH has dropped from 8.2 to 8.1 — a 26% increase in acidity. Oysters, corals, and pteropods struggle to form shells in more acidic water!' },
  { level:3, visual:'⭐', question:'What are the different types of stars and how are they classified?', options:['By temperature and luminosity — from cool red dwarfs to hot blue supergiants, on a Hertzsprung-Russell diagram','By size only','By age only'], answer:'By temperature and luminosity — from cool red dwarfs to hot blue supergiants, on a Hertzsprung-Russell diagram', fact:'The HR diagram plots temperature vs. brightness. Most stars (including our Sun) fall on the "main sequence." Red dwarfs are smallest and most common. Blue supergiants are rare, massive, and burn out quickly. White dwarfs are stellar remnants!' },
  { level:3, visual:'🌌', question:'What is the difference between dark matter and dark energy?', options:['Dark matter is invisible matter that provides gravitational pull; dark energy is the force causing the universe to expand faster','They are different names for the same thing','Dark matter is energy from black holes; dark energy is energy from stars'], answer:'Dark matter is invisible matter that provides gravitational pull; dark energy is the force causing the universe to expand faster', fact:'Dark matter (27% of universe) provides the gravity holding galaxies together. Dark energy (68% of universe) is driving the universe\'s accelerating expansion. Together they make up 95% of the universe — which we cannot directly detect!' },
  { level:3, visual:'🧬', question:'What is CRISPR and why is it significant in science?', options:['A gene-editing tool that allows precise changes to DNA sequences — revolutionary for medicine and agriculture','A type of microscope for viewing DNA','A natural bacterial virus that attacks human cells'], answer:'A gene-editing tool that allows precise changes to DNA sequences — revolutionary for medicine and agriculture', fact:'CRISPR-Cas9 acts like molecular scissors, cutting DNA at precise locations. Scientists can delete, repair, or insert genes. It has already been used to treat sickle cell disease in patients and could revolutionize medicine!' },
  { level:3, visual:'🌍', question:'What is the difference between renewable and nonrenewable energy sources?', options:['Renewable sources (solar, wind, hydro) replenish naturally; nonrenewable (coal, oil, gas) took millions of years to form and will run out','Renewable energy is always more expensive','Nonrenewable sources never produce pollution'], answer:'Renewable sources (solar, wind, hydro) replenish naturally; nonrenewable (coal, oil, gas) took millions of years to form and will run out', fact:'Fossil fuels took 300-360 million years to form from ancient organisms. We are burning them in centuries. Solar and wind energy are "flows" — they keep coming whether we use them or not. The Sun provides 10,000× more energy than humanity uses!' },
  { level:3, visual:'🌊', question:'How do scientists use seismic waves to study Earth\'s interior?', options:['P-waves and S-waves travel through Earth and are deflected by different materials, revealing internal structure','Scientists drill to the center and measure temperature','Volcanic eruptions reveal what is underground'], answer:'P-waves and S-waves travel through Earth and are deflected by different materials, revealing internal structure', fact:'P-waves (compressional) pass through solids and liquids. S-waves (shear) only pass through solids. S-waves stop at the outer core, proving it is liquid. This "seismic shadow zone" revealed Earth\'s liquid outer core without drilling deeper than 12 km!' },
  { level:3, visual:'⚡', question:'What is electromagnetic induction and how does it power civilization?', options:['Moving a conductor through a magnetic field generates electric current — the principle behind every generator and power plant','Electricity can only be created by chemical reactions in batteries','Magnets generate electricity when placed near water'], answer:'Moving a conductor through a magnetic field generates electric current — the principle behind every generator and power plant', fact:'Faraday discovered this in 1831. Every power plant (coal, nuclear, wind, hydro) uses Faraday\'s discovery: spin a coil of wire in a magnetic field. The energy source (steam, water, wind) just determines what spins the coil!' },
  { level:3, visual:'🌿', question:'What is the relationship between photosynthesis and cellular respiration?', options:['They are opposite reactions: photosynthesis builds glucose from CO₂ using light energy; respiration breaks glucose back down releasing energy as ATP','They are the same process by different names','Only plants do both; animals only respire'], answer:'They are opposite reactions: photosynthesis builds glucose from CO₂ using light energy; respiration breaks glucose back down releasing energy as ATP', fact:'Photosynthesis: 6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂. Respiration: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP. Plants do both! They photosynthesize during the day and respire 24/7. The oxygen we breathe is photosynthesis\'s waste product!' },
  // ── LEVEL 1 NEW ── tools, adaptations, rocks, weather instruments, sky/tides, energy, food webs, classification, seed dispersal, plant nutrients ──
  { level:1, visual:'🔬', question:'What does a microscope do?', options:['Makes very tiny objects look larger so we can see them','Measures temperature','Tells us how far away stars are'], answer:'Makes very tiny objects look larger so we can see them', fact:'Light microscopes can magnify objects up to about 1,000 times. Scientists use them to see cells, bacteria, and tiny organisms invisible to the naked eye!' },
  { level:1, visual:'🔬', question:'A telescope is used to', options:['View distant objects in space','Magnify tiny objects on a slide','Measure rainfall'], answer:'View distant objects in space', fact:'Telescopes collect and focus light from distant stars and planets. The James Webb Space Telescope can see galaxies formed just 300 million years after the Big Bang!' },
  { level:1, visual:'🌡️', question:'A barometer measures', options:['Air pressure','Temperature','Wind speed'], answer:'Air pressure', fact:'Barometers track atmospheric pressure. Falling pressure often means a storm is coming; rising pressure usually means fair weather ahead. Invented by Torricelli in 1643!' },
  { level:1, visual:'💨', question:'An anemometer is used to measure', options:['Wind speed','Rainfall','Air pressure'], answer:'Wind speed', fact:'Anemometers have spinning cups that rotate faster as wind blows harder. Wind speed is measured in kilometers per hour or knots. Meteorologists use them daily!' },
  { level:1, visual:'💧', question:'A rain gauge is used to measure', options:['How much precipitation fell','Wind direction','Air temperature'], answer:'How much precipitation fell', fact:'A rain gauge is simply a tube that collects rain. Scientists measure rainfall in millimeters. The wettest place on Earth, Mawsynram in India, gets about 11,871 mm per year!' },
  { level:1, visual:'🦅', question:'Camouflage is an adaptation that helps animals', options:['Blend in with their surroundings to hide from predators or prey','Fly faster','Swim deeper'], answer:'Blend in with their surroundings to hide from predators or prey', fact:'Stick insects look like twigs, snow leopards have spotted coats matching rocks, and flounder fish match the seafloor. Camouflage is one of nature\'s most widespread survival tricks!' },
  { level:1, visual:'🐠', question:'Mimicry is when an animal', options:['Looks or acts like another species to gain an advantage','Sleeps through winter','Travels to warmer places'], answer:'Looks or acts like another species to gain an advantage', fact:'The harmless milk snake mimics the venomous coral snake\'s red-yellow-black pattern. Predators avoid it thinking it is dangerous. Mimicry is evolution\'s best disguise!' },
  { level:1, visual:'🐻', question:'Hibernation is an adaptation where animals', options:['Enter a deep sleep-like state through winter to save energy','Grow thicker fur in summer','Change color with seasons'], answer:'Enter a deep sleep-like state through winter to save energy', fact:'During hibernation a bear\'s heart rate drops from 50 to just 8 beats per minute and body temperature falls. They survive on fat stored before winter. True hibernators like groundhogs drop body temperature almost to freezing!' },
  { level:1, visual:'🦅', question:'Migration is when animals', options:['Travel long distances to find food or better climate seasonally','Grow thicker fur in winter','Sleep through cold months'], answer:'Travel long distances to find food or better climate seasonally', fact:'Arctic terns migrate the farthest of any animal — about 70,000 km round trip from the Arctic to Antarctica each year! Many birds, butterflies, whales, and fish migrate seasonally.' },
  { level:1, visual:'🌱', question:'Thorns on a rose bush are an adaptation that', options:['Protect the plant from being eaten by animals','Help the plant absorb more sunlight','Store water for dry periods'], answer:'Protect the plant from being eaten by animals', fact:'Thorns, spines, and prickles deter herbivores. Cacti are covered in spines that protect their water-storing tissue. Some plants even have toxic chemicals as chemical defenses!' },
  { level:1, visual:'🌵', question:'Waxy leaves on desert plants help them', options:['Reduce water loss by stopping evaporation','Absorb more sunlight','Attract pollinating insects'], answer:'Reduce water loss by stopping evaporation', fact:'Waxy coatings (called cuticles) seal moisture inside leaves. Many succulents and cacti have thick, waxy surfaces. Holly and pine needles also have waxy coatings to retain moisture!' },
  { level:1, visual:'🌿', question:'Some desert plants have very deep roots to', options:['Reach underground water sources far below the surface','Anchor against high winds only','Store sugar during droughts'], answer:'Reach underground water sources far below the surface', fact:'The mesquite tree\'s roots can reach 50 meters deep to find groundwater. Other desert plants spread shallow roots wide to capture any rain quickly before it evaporates!' },
  { level:1, visual:'🪨', question:'Sedimentary rocks are formed from', options:['Layers of sand, mud, and shells pressed together over time','Cooled lava','Rock changed by heat and pressure underground'], answer:'Layers of sand, mud, and shells pressed together over time', fact:'Sedimentary rocks often contain fossils because organisms can be trapped in layers. Limestone forms from ancient sea shells, and sandstone from compressed sand grains!' },
  { level:1, visual:'🪨', question:'Metamorphic rocks form when rocks are changed by', options:['Intense heat and pressure deep underground','Cooling lava','Erosion by wind and water'], answer:'Intense heat and pressure deep underground', fact:'Marble is metamorphic limestone, and slate is metamorphic shale. The word metamorphic comes from Greek meaning "to change form." These rocks can be very hard and beautiful!' },
  { level:1, visual:'🪨', question:'Which type of rock is most likely to contain fossils?', options:['Sedimentary rock','Igneous rock','Metamorphic rock'], answer:'Sedimentary rock', fact:'Fossils form when organisms are buried in sediment before they decay. As layers build up and compact, the organism becomes mineralized. Igneous and metamorphic rocks form under conditions too extreme for fossil preservation.' },
  { level:1, visual:'⭐', question:'A constellation is', options:['A pattern of stars in the night sky given a name','A single very bright star','A cluster of galaxies'], answer:'A pattern of stars in the night sky given a name', fact:'Ancient cultures named 88 official constellations. Orion, the Big Dipper, and Scorpius are among the most famous. The stars in a constellation are not actually close to each other — they just appear to be from Earth!' },
  { level:1, visual:'🌙', question:'What is the New Moon phase?', options:['When we cannot see the Moon because its lit side faces away from Earth','When the entire face of the Moon is lit up','When half of the Moon is visible'], answer:'When we cannot see the Moon because its lit side faces away from Earth', fact:'During a new moon the Moon is between Earth and the Sun — its lit hemisphere faces the Sun and away from us. The lunar cycle goes: New → Crescent → Quarter → Gibbous → Full → back again!' },
  { level:1, visual:'🌙', question:'A "full moon" occurs when', options:['The entire face of the Moon visible from Earth is lit by the Sun','The Moon is between Earth and the Sun','The Moon is at its farthest from Earth'], answer:'The entire face of the Moon visible from Earth is lit by the Sun', fact:'Full moons occur every 29.5 days. A full moon is bright enough to cast shadows at night. The phases of the Moon have been used to create calendars for thousands of years!' },
  { level:1, visual:'🌊', question:'High tide occurs when', options:['The Moon\'s gravity pulls ocean water toward it, bulging the ocean up','The Sun heats the ocean water','Storms push water onto shore'], answer:'The Moon\'s gravity pulls ocean water toward it, bulging the ocean up', fact:'The Moon\'s gravity creates two tidal bulges on opposite sides of Earth. As Earth rotates, most coastal areas experience two high tides and two low tides each day. The Bay of Fundy in Canada has the highest tides — over 16 meters!' },
  { level:1, visual:'🌊', question:'Low tide is when', options:['Ocean water has pulled away from the shore, leaving the seafloor exposed','A tsunami hits the coast','The Moon is on the opposite side of Earth from the Sun'], answer:'Ocean water has pulled away from the shore, leaving the seafloor exposed', fact:'During low tide, rocky shores and tidal pools are exposed, revealing starfish, crabs, and anemones. The difference between high and low tide can be just 30 cm or over 16 meters depending on location!' },
  { level:1, visual:'⚡', question:'When you turn on a light bulb, electrical energy is converted to', options:['Light energy and heat energy','Sound energy','Chemical energy'], answer:'Light energy and heat energy', fact:'Energy transformation is everywhere! A light bulb turns electrical energy into light (useful) and heat (wasted). LED bulbs waste far less energy as heat than old incandescent bulbs!' },
  { level:1, visual:'🔋', question:'A battery converts ___ energy into ___ energy', options:['Chemical energy into electrical energy','Electrical energy into chemical energy','Light energy into heat energy'], answer:'Chemical energy into electrical energy', fact:'Batteries store energy in chemical form. Chemical reactions between materials inside produce electrons that flow as electric current. Rechargeable batteries reverse the reaction to refill their chemical energy!' },
  { level:1, visual:'🌱', question:'In a simple food web: grass → grasshopper → frog → snake → hawk. The frog eats', options:['Grasshoppers','Grass','Snakes'], answer:'Grasshoppers', fact:'The frog is a secondary consumer (eats primary consumers that eat plants). Food webs show all feeding links in an ecosystem. Remove one species and the others above and below it are affected!' },
  { level:1, visual:'🌿', question:'In a food web, which organism receives energy from the most sources?', options:['An omnivore in the middle of the web','The top predator','The producer'], answer:'An omnivore in the middle of the web', fact:'Omnivores can eat both plants and animals, so they receive energy from multiple pathways in the food web. This flexibility helps them survive when one food source becomes scarce!' },
  { level:1, visual:'🦅', question:'A vertebrate is an animal that has', options:['A backbone (spine)','Six legs','An exoskeleton'], answer:'A backbone (spine)', fact:'Vertebrates include fish, amphibians, reptiles, birds, and mammals — all have a backbone. About 66,000 vertebrate species exist, but they are outnumbered by invertebrates by a ratio of roughly 20 to 1!' },
  { level:1, visual:'🐠', question:'An invertebrate is an animal', options:['Without a backbone','With more than four legs','That lives in water'], answer:'Without a backbone', fact:'Invertebrates include insects, worms, jellyfish, crabs, and snails. About 97% of all animal species are invertebrates! The giant squid is the largest invertebrate, reaching 13 meters long.' },
  { level:1, visual:'🌱', question:'Seeds spread by wind usually have', options:['Wings or fluffy fibers to catch air currents','Hooks to attach to animal fur','Fleshy fruit to be eaten by animals'], answer:'Wings or fluffy fibers to catch air currents', fact:'Maple seeds have papery wings that helicopter them far from the parent tree. Dandelion seeds have tiny parachutes. Seed dispersal prevents offspring from competing with the parent plant!' },
  { level:1, visual:'🌿', question:'Seeds spread by water usually have', options:['Air pockets or waterproof coats to float','Wings for wind','Hooks for animal fur'], answer:'Air pockets or waterproof coats to float', fact:'Coconuts are famous water-dispersed seeds — they can float thousands of miles across oceans and sprout on new islands! Water-lily seeds and mangrove propagules are also dispersed by water.' },
  { level:1, visual:'🦅', question:'Seeds spread by animals often have', options:['Hooks or sticky coatings that cling to fur or feathers, or tasty fruit that gets eaten','Wings to fly in the wind','Hollow air pockets to float'], answer:'Hooks or sticky coatings that cling to fur or feathers, or tasty fruit that gets eaten', fact:'Burrs grab onto animal fur. Berries get eaten and seeds pass through the digestive system unharmed, deposited far away. Squirrels bury acorns and forget some — those become oak trees!' },
  { level:1, visual:'🌱', question:'Nitrogen is a nutrient that helps plants', options:['Grow green leaves and stems','Develop strong roots','Produce flowers and fruit'], answer:'Grow green leaves and stems', fact:'Nitrogen is part of chlorophyll (the green pigment for photosynthesis) and proteins. Plants with too little nitrogen turn yellow. Fertilizers often contain nitrogen, phosphorus, and potassium (N-P-K)!' },
  { level:1, visual:'🌿', question:'Phosphorus helps plants mainly with', options:['Root development and flower/seed production','Making green leaves','Absorbing water'], answer:'Root development and flower/seed production', fact:'Phosphorus is essential for DNA, cell membranes, and energy transfer (ATP). It promotes strong roots and reproductive growth. Bone meal is a natural source of phosphorus fertilizer!' },
  { level:1, visual:'🌱', question:'Potassium is important to plants because it', options:['Helps plants resist disease and regulates water balance','Makes leaves green','Builds strong stems only'], answer:'Helps plants resist disease and regulates water balance', fact:'Potassium activates enzymes and helps plants open and close their pores (stomata) to regulate water loss. It also strengthens cell walls and improves a plant\'s ability to fight off disease!' },
  { level:1, visual:'🌍', question:'Scientists who study weather are called', options:['Meteorologists','Geologists','Ecologists'], answer:'Meteorologists', fact:'Meteorology comes from the Greek word for "high in the air." Meteorologists use satellites, weather balloons, radar, and ground stations to predict weather. Accurate forecasts save thousands of lives each year!' },
  { level:1, visual:'🌡️', question:'Which instrument measures how much moisture is in the air?', options:['Hygrometer','Thermometer','Barometer'], answer:'Hygrometer', fact:'Humidity is the amount of water vapor in air. A hygrometer measures it as relative humidity (%). High humidity makes hot days feel hotter because sweat cannot evaporate as easily!' },
  { level:1, visual:'⭐', question:'The Milky Way is', options:['The galaxy that contains our solar system','The brightest star in the night sky','A large asteroid belt'], answer:'The galaxy that contains our solar system', fact:'The Milky Way is a spiral galaxy containing over 200 billion stars. Our solar system sits about two-thirds of the way out from the center. The Milky Way is about 100,000 light-years across!' },
  { level:1, visual:'🌙', question:'The "waxing" phases of the Moon mean', options:['The Moon is getting more lit from our view, moving toward full moon','The Moon is shrinking in brightness','The Moon is moving away from Earth'], answer:'The Moon is getting more lit from our view, moving toward full moon', fact:'Waxing = growing. The Moon waxes from new to full, with waxing crescent, first quarter, and waxing gibbous phases. After full moon it wanes (shrinks) through waning gibbous, last quarter, and waning crescent!' },
  { level:1, visual:'☀️', question:'Spring tides (the strongest tides) occur when', options:['The Sun, Earth, and Moon are aligned during new and full moons','Only the Moon is near Earth','Winter storms happen at sea'], answer:'The Sun, Earth, and Moon are aligned during new and full moons', fact:'When the Sun and Moon pull in the same direction their gravitational forces add together, creating extra-high and extra-low spring tides. Neap tides (weakest) happen at quarter moon phases!' },
  { level:1, visual:'🔋', question:'A solar panel converts ___ energy into ___ energy', options:['Light energy into electrical energy','Chemical energy into light energy','Heat energy into sound energy'], answer:'Light energy into electrical energy', fact:'Solar cells (photovoltaic cells) use the photoelectric effect — sunlight knocks electrons loose in silicon, creating electric current. Solar panels produce no pollution and sunlight is free!' },
  // ── LEVEL 2 NEW ── carbon cycle, nitrogen fixation, plate tectonics, fossils, ocean zones, biomes, symbiosis, limiting factors, weathering, aquifers, transpiration, gas exchange ──
  { level:2, visual:'🌿', question:'In the carbon cycle, what process releases CO₂ back into the atmosphere when organisms break down dead material?', options:['Decomposition','Photosynthesis','Nitrogen fixation'], answer:'Decomposition', fact:'Decomposers like bacteria and fungi break down dead plants and animals, releasing stored carbon as CO₂ back into the atmosphere. Without decomposition, carbon would be locked away in dead matter permanently!' },
  { level:2, visual:'🔥', question:'Combustion (burning fossil fuels) releases carbon that was stored', options:['Millions of years ago in ancient organisms','Last year in living trees','In ocean water'], answer:'Millions of years ago in ancient organisms', fact:'Coal, oil, and natural gas are ancient organisms compressed over millions of years. Burning them releases carbon dioxide that was removed from the atmosphere long ago — rapidly increasing atmospheric CO₂ levels!' },
  { level:2, visual:'🌿', question:'During cellular respiration, organisms release carbon as', options:['Carbon dioxide (CO₂)','Carbon monoxide (CO)','Solid carbon (charcoal)'], answer:'Carbon dioxide (CO₂)', fact:'Every living thing — plants, animals, fungi — releases CO₂ through respiration. This is why breathing out adds CO₂ to the air. The carbon cycle continuously moves carbon between living things and the atmosphere!' },
  { level:2, visual:'🌱', question:'Nitrogen fixation is the process by which', options:['Certain bacteria convert nitrogen gas in the air into a form plants can use','Plants absorb nitrogen directly from the air','Animals convert food protein into soil nitrogen'], answer:'Certain bacteria convert nitrogen gas in the air into a form plants can use', fact:'78% of air is nitrogen, but plants cannot use it as a gas. Rhizobium bacteria live in root nodules of legumes (beans, clover) and convert N₂ into ammonia (NH₃) that plants can absorb. This is why farmers plant legumes to fertilize fields!' },
  { level:2, visual:'🌍', question:'Evidence for plate tectonics includes', options:['Matching fossil species and coastlines on separated continents','Volcanic eruptions only','The existence of mountains'], answer:'Matching fossil species and coastlines on separated continents', fact:'South America and Africa fit together like puzzle pieces. Identical fossils of Mesosaurus (a freshwater reptile) are found on both — it could not have crossed the Atlantic Ocean. The continents were once joined as Pangaea!' },
  { level:2, visual:'🌋', question:'Tectonic plates move because of', options:['Convection currents in the hot mantle below','The Moon\'s gravity','Ocean currents pushing the seafloor'], answer:'Convection currents in the hot mantle below', fact:'Hot rock deep in the mantle rises, spreads, cools, and sinks — giant convection cells. These currents drag tectonic plates. Plates move about 2-10 cm per year — roughly the rate your fingernails grow!' },
  { level:2, visual:'🪨', question:'Fossils most commonly form in which type of environment?', options:['Where organisms are rapidly buried by sediment, like riverbeds or ocean floors','On mountain tops','In forests with lots of decomposers'], answer:'Where organisms are rapidly buried by sediment, like riverbeds or ocean floors', fact:'Rapid burial prevents decomposition and allows minerals to slowly replace organic tissue. Most organisms that ever lived left no fossil record because they decomposed first. Fossils are remarkably rare!' },
  { level:2, visual:'🌊', question:'The sunlight zone of the ocean is', options:['The upper 200 meters where light penetrates and most marine life lives','Below 1,000 meters where it is completely dark','The deepest trenches over 6,000 meters down'], answer:'The upper 200 meters where light penetrates and most marine life lives', fact:'The sunlight (euphotic) zone supports photosynthesis by phytoplankton — tiny algae that produce half of Earth\'s oxygen! Coral reefs, schools of fish, and most familiar sea life live in this sunlit layer.' },
  { level:2, visual:'🌊', question:'The twilight zone of the ocean exists at depths of about', options:['200-1,000 meters — some light but not enough for photosynthesis','0-200 meters (upper ocean)','Below 4,000 meters (abyssal)'], answer:'200-1,000 meters — some light but not enough for photosynthesis', fact:'The twilight (mesopelagic) zone is dim but not dark. Many animals here migrate up to feed at night and sink by day. The hatchetfish and lanternfish live here and have light-producing organs (bioluminescence)!' },
  { level:2, visual:'🌊', question:'The midnight zone of the ocean (below 1,000 m) is characterized by', options:['Complete darkness, near-freezing temperatures, and crushing pressure','Warm temperatures and some sunlight','High photosynthesis rates'], answer:'Complete darkness, near-freezing temperatures, and crushing pressure', fact:'The midnight (bathypelagic) zone has no sunlight at all. Animals here are often bioluminescent and have adapted to extreme pressure. The anglerfish lures prey with a glowing appendage in the pitch-black depths!' },
  { level:2, visual:'🌍', question:'A tropical rainforest biome is characterized by', options:['High rainfall year-round and warm temperatures supporting enormous biodiversity','Dry seasons, warm summers, and cold winters','Very little rain and extreme temperature swings between day and night'], answer:'High rainfall year-round and warm temperatures supporting enormous biodiversity', fact:'Tropical rainforests cover only 6% of Earth\'s surface but contain over 50% of the world\'s plant and animal species! The Amazon rainforest produces 20% of the world\'s oxygen and absorbs enormous amounts of CO₂.' },
  { level:2, visual:'🌵', question:'A desert biome is defined by', options:['Very low precipitation (less than 250 mm per year)','High humidity and rainfall','Freezing temperatures year-round'], answer:'Very low precipitation (less than 250 mm per year)', fact:'Deserts are defined by dryness, not temperature. The Sahara is hot, but Antarctica is the world\'s largest cold desert! Desert organisms have remarkable water-conservation adaptations.' },
  { level:2, visual:'🌿', question:'Mutualism is a symbiotic relationship where', options:['Both organisms benefit','One organism benefits and the other is unaffected','One organism benefits while the other is harmed'], answer:'Both organisms benefit', fact:'Clownfish and sea anemones: the clownfish gets shelter and food scraps; the anemone gets cleaned and defended. Bees and flowers: bees get nectar; flowers get pollinated. Both win in mutualism!' },
  { level:2, visual:'🦠', question:'Commensalism is when', options:['One organism benefits while the other is neither helped nor harmed','Both organisms are harmed','One organism benefits and kills the other'], answer:'One organism benefits while the other is neither helped nor harmed', fact:'Barnacles on whale skin: barnacles get transport and food; whales are unaffected. Remora fish ride sharks eating scraps; sharks don\'t mind. One side gains without the other losing — that is commensalism!' },
  { level:2, visual:'🦠', question:'Parasitism is a symbiotic relationship where', options:['One organism (the parasite) benefits by harming another (the host)','Both organisms are harmed equally','One helps the other at no cost to itself'], answer:'One organism (the parasite) benefits by harming another (the host)', fact:'Fleas on dogs, tapeworms in intestines, and mistletoe on trees are all parasites. Parasites rarely kill their host immediately — a dead host means no more food! Many parasites have evolved to live quietly in hosts for years.' },
  { level:2, visual:'🌿', question:'A specific example of mutualism is', options:['Bees pollinating flowers while collecting nectar','Barnacles riding on whale skin','Fleas living on a dog'], answer:'Bees pollinating flowers while collecting nectar', fact:'Bees collect nectar for food and accidentally transfer pollen between flowers, enabling reproduction. This relationship is so important that one-third of all food crops depend on bee pollination!' },
  { level:2, visual:'🌱', question:'A limiting factor that controls a population could be', options:['Food supply, water availability, disease, or predation','Only temperature','Only the number of predators'], answer:'Food supply, water availability, disease, or predation', fact:'When deer populations grow too large, food becomes scarce — a limiting factor. Disease can also suddenly cut populations. Limiting factors prevent any species from growing without bound and maintain ecosystem balance!' },
  { level:2, visual:'🌍', question:'Chemical weathering occurs when', options:['Rock minerals react with water, oxygen, or acids and dissolve or change','Rock is physically broken by ice or pressure','Wind scrapes particles off rock surfaces'], answer:'Rock minerals react with water, oxygen, or acids and dissolve or change', fact:'Acid rain dissolves limestone. Iron in rocks oxidizes (rusts). Water molecules react with feldspar minerals. Chemical weathering changes the rock\'s mineral composition, not just its size or shape — creating new minerals like clay!' },
  { level:2, visual:'🪨', question:'Physical (mechanical) weathering occurs when', options:['Rock is broken into smaller pieces without changing its chemical composition','Rock minerals dissolve in water','Acids react with rock surfaces'], answer:'Rock is broken into smaller pieces without changing its chemical composition', fact:'Ice wedging is classic physical weathering: water enters cracks, freezes, expands 9%, and splits rock. Roots grow into cracks and split boulders. The rock type stays the same — just smaller pieces!' },
  { level:2, visual:'🌍', question:'A rock with high porosity has', options:['Many tiny pores (spaces) that can hold water or air','No spaces — it is very dense','Only microscopic crystals'], answer:'Many tiny pores (spaces) that can hold water or air', fact:'Sandstone and pumice are highly porous. Porosity measures how much empty space a rock has. High porosity does not always mean water flows through easily — that depends on permeability!' },
  { level:2, visual:'💧', question:'A permeable rock allows', options:['Water to flow through its connected pores','No water to pass through at all','Only gases to pass through'], answer:'Water to flow through its connected pores', fact:'Gravel and sandstone are permeable — water flows easily. Clay has high porosity but low permeability because its tiny pores are not well connected. Permeability is key to understanding groundwater movement!' },
  { level:2, visual:'💧', question:'An aquifer is', options:['An underground layer of permeable rock that holds and transmits groundwater','A large natural lake','A type of underground river in caves'], answer:'An underground layer of permeable rock that holds and transmits groundwater', fact:'Aquifers supply about half of all drinking water worldwide. The Ogallala Aquifer under the US Great Plains has stored water since the last ice age. Over-pumping is depleting it faster than it refills!' },
  { level:2, visual:'🌿', question:'Transpiration in plants is the process of', options:['Water vapor leaving through tiny pores (stomata) in leaves','Roots absorbing water from soil','Photosynthesis releasing oxygen'], answer:'Water vapor leaving through tiny pores (stomata) in leaves', fact:'A large tree can transpire 400 liters of water per day! Transpiration cools the leaf and pulls water up from roots — the transpiration stream. Forests transpire so much water they create their own rainfall patterns!' },
  { level:2, visual:'🐠', question:'Fish extract oxygen from water using', options:['Gills — water flows over them and oxygen passes directly into blood','Lungs like mammals do','Their skin only'], answer:'Gills — water flows over them and oxygen passes directly into blood', fact:'Fish pump water across gills in a countercurrent system, extracting up to 80% of dissolved oxygen. Mammals breathe air into lungs. Amphibians can do both — breathing through lungs and absorbing some oxygen through moist skin!' },
  { level:2, visual:'🧬', question:'Radioactive dating is used to', options:['Determine the age of rocks and fossils by measuring decay of radioactive elements','Measure the temperature of ancient rocks','Find radioactive materials underground'], answer:'Determine the age of rocks and fossils by measuring decay of radioactive elements', fact:'Radioactive elements decay at known rates (half-life). By comparing original to remaining amounts, scientists calculate age. Carbon-14 dates organic material up to ~50,000 years. Uranium-lead dating works for billions of years!' },
  { level:2, visual:'🌍', question:'The carbon cycle step where plants remove CO₂ from the atmosphere is called', options:['Photosynthesis','Respiration','Combustion'], answer:'Photosynthesis', fact:'Plants act as carbon sinks, absorbing CO₂ and storing carbon in their tissues. Forests store enormous amounts of carbon. When forests are cut or burned, that stored carbon returns to the atmosphere as CO₂!' },
  { level:2, visual:'🌊', question:'Ocean currents are driven mainly by', options:['Wind at the surface and density differences from temperature and salinity','The Moon\'s gravity only','Volcanic activity on the ocean floor'], answer:'Wind at the surface and density differences from temperature and salinity', fact:'Surface currents are driven by wind. Deep currents form when cold, salty water is denser and sinks (thermohaline circulation). The Gulf Stream carries warm water to Europe, keeping it warmer than it should be at that latitude!' },
  { level:2, visual:'🌿', question:'In the carbon cycle, what process converts atmospheric CO₂ directly into organic matter in plants?', options:['Photosynthesis','Decomposition','Transpiration'], answer:'Photosynthesis', fact:'Photosynthesis is the entry point for carbon into most food chains. Plants use CO₂ and sunlight to build sugars. Every carbon atom in your body was once atmospheric CO₂ absorbed by a plant!' },
  { level:2, visual:'🌱', question:'Nitrogen-fixing bacteria are often found in', options:['Root nodules of legume plants like beans, peas, and clover','The leaves of all green plants','Decomposing animal waste only'], answer:'Root nodules of legume plants like beans, peas, and clover', fact:'Rhizobium bacteria form a mutualistic relationship with legumes. The plant provides sugar; the bacteria provide usable nitrogen (ammonia). Farmers rotate crops with legumes to naturally restore soil nitrogen without synthetic fertilizers!' },
  { level:2, visual:'🌊', question:'The abyssal zone of the ocean is', options:['The deepest zone (4,000-6,000 m) with extreme pressure, cold, and no light','The surface layer with sunlight','The zone between surface and twilight layers'], answer:'The deepest zone (4,000-6,000 m) with extreme pressure, cold, and no light', fact:'The abyssal zone covers about 60% of Earth\'s surface — the largest habitat on the planet! Creatures here include sea cucumbers, brittle stars, and polychaete worms. Food arrives as "marine snow" — dead particles drifting down.' },
  { level:2, visual:'🌍', question:'A temperate deciduous forest biome is characterized by', options:['Four distinct seasons, moderate rainfall, and trees that lose leaves in autumn','No seasonal change and dense evergreen canopy','Year-round drought and sparse vegetation'], answer:'Four distinct seasons, moderate rainfall, and trees that lose leaves in autumn', fact:'Deciduous trees like oaks, maples, and beeches shed leaves to conserve water and energy in winter. Temperate forests cover much of eastern North America, Europe, and eastern Asia!' },
  { level:2, visual:'🌿', question:'What is the role of the Sun in the carbon cycle?', options:['Provides energy for photosynthesis, which draws CO₂ out of the atmosphere','Releases CO₂ through combustion','Breaks down organic matter like a decomposer'], answer:'Provides energy for photosynthesis, which draws CO₂ out of the atmosphere', fact:'The Sun powers the entire carbon cycle by enabling photosynthesis. Without solar energy, plants could not convert CO₂ into organic matter, and there would be no food chain!' },
  // ── LEVEL 3 NEW ── Hardy-Weinberg, speciation, convergent/divergent evolution, endosymbiotic theory, extremophiles, hydrothermal vents, abiogenesis, stellar lifecycle, exoplanets, dark matter, quantum biology, CRISPR conservation, synthetic biology, terraforming, Fermi paradox ──
  { level:3, visual:'🧬', question:'The Hardy-Weinberg principle states that allele frequencies in a population', options:['Remain constant unless acted on by mutation, migration, selection, drift, or non-random mating','Always change each generation','Only change due to natural selection'], answer:'Remain constant unless acted on by mutation, migration, selection, drift, or non-random mating', fact:'Hardy-Weinberg equilibrium is a "null hypothesis" for evolution — it describes a population NOT evolving. Any deviation from H-W equilibrium signals that evolutionary forces are at work. It is a powerful tool for studying how evolution changes populations over time!' },
  { level:3, visual:'🌍', question:'Allopatric speciation occurs when', options:['A geographic barrier separates a population and the two groups diverge into separate species over time','Two populations share the same habitat but stop interbreeding','A single mutation immediately creates a new species'], answer:'A geographic barrier separates a population and the two groups diverge into separate species over time', fact:'The Grand Canyon split squirrel populations — Kaibab squirrels on the north rim and Abert\'s squirrels on the south rim are diverging into separate species. Geographic isolation is the most common route to new species!' },
  { level:3, visual:'🧬', question:'Sympatric speciation occurs when', options:['New species arise within the same geographic area without physical separation, often via polyploidy or ecological divergence','A mountain range divides a population','An ocean separates two island populations'], answer:'New species arise within the same geographic area without physical separation, often via polyploidy or ecological divergence', fact:'Apple maggot flies shifted from hawthorn to apple trees in the same forest — now the two host-adapted populations rarely interbreed. Polyploidy (chromosome doubling) can instantly create new plant species without any geographic barrier!' },
  { level:3, visual:'🦅', question:'Convergent evolution produces', options:['Similar features in unrelated species due to similar environmental pressures','Identical DNA in all organisms','Features shared because of common ancestry'], answer:'Similar features in unrelated species due to similar environmental pressures', fact:'Dolphins (mammals) and sharks (fish) evolved similar streamlined body shapes independently. Bats and birds independently evolved wings. Similar environments create similar selection pressures — causing unrelated lineages to look alike!' },
  { level:3, visual:'🧬', question:'Divergent evolution is when', options:['Two related species evolve increasingly different features as they adapt to different environments','Two unrelated species become more similar over time','A species stays identical for millions of years'], answer:'Two related species evolve increasingly different features as they adapt to different environments', fact:'Darwin\'s finches on the Galapagos are a classic example — all descended from one ancestor but diverged into 15 species with different beak shapes for different foods. Divergent evolution is the driver of biodiversity!' },
  { level:3, visual:'🧬', question:'The endosymbiotic theory proposes that', options:['Mitochondria and chloroplasts were once free-living bacteria that were engulfed by early cells and became organelles','Cells spontaneously assembled all their organelles from raw chemicals','Viruses created complex eukaryotic cells'], answer:'Mitochondria and chloroplasts were once free-living bacteria that were engulfed by early cells and became organelles', fact:'Evidence is overwhelming: mitochondria have their own DNA, reproduce by division like bacteria, have double membranes, and their ribosomes are bacterial-type. Lynn Margulis championed this theory, which was initially rejected but is now established fact!' },
  { level:3, visual:'🦠', question:'Extremophiles are organisms that', options:['Thrive in conditions once thought hostile to life — extreme heat, acid, salt, or pressure','Only survive in moderate, comfortable environments','Are all found in the deep ocean exclusively'], answer:'Thrive in conditions once thought hostile to life — extreme heat, acid, salt, or pressure', fact:'Thermophiles survive in boiling hot springs; acidophiles thrive in pH 0 sulfuric acid; halophiles live in salt lakes 10× saltier than the ocean. Extremophiles expanded our understanding of where life can exist — and where to search for it in space!' },
  { level:3, visual:'🌊', question:'Deep-sea hydrothermal vents are significant because', options:['They host ecosystems that run entirely on chemical energy (chemosynthesis), not sunlight','They are too hostile for any life','They are where photosynthesis first evolved'], answer:'They host ecosystems that run entirely on chemical energy (chemosynthesis), not sunlight', fact:'Vent ecosystems are fueled by bacteria that convert hydrogen sulfide into energy — chemosynthesis. Giant tube worms (3 meters long), ghostly crabs, and eyeless shrimp thrive near vents. This showed life does not need sunlight, expanding the search for life on icy moons like Europa!' },
  { level:3, visual:'🧬', question:'Abiogenesis refers to', options:['The origin of life from non-living chemical processes','Life arriving on Earth from space (panspermia)','The evolution of simple organisms into complex ones'], answer:'The origin of life from non-living chemical processes', fact:'The Miller-Urey experiment (1953) showed that amino acids (building blocks of life) spontaneously form from simple gases and electricity. RNA World hypothesis suggests RNA-like molecules were the first self-replicating molecules. Life\'s origin remains one of science\'s great open questions!' },
  { level:3, visual:'⭐', question:'In the stellar lifecycle, a star like our Sun will eventually become', options:['A red giant and then a white dwarf, with its outer layers forming a planetary nebula','A neutron star after a supernova','A black hole when it runs out of hydrogen'], answer:'A red giant and then a white dwarf, with its outer layers forming a planetary nebula', fact:'In about 5 billion years, our Sun will swell into a red giant (swallowing Mercury and Venus), then shed its outer layers as a beautiful planetary nebula, leaving a dense white dwarf — an Earth-sized remnant cooling for billions of years.' },
  { level:3, visual:'⭐', question:'Massive stars (over 8 times the Sun\'s mass) end their lives as', options:['Supernovae, leaving behind neutron stars or black holes','White dwarfs like our Sun','Red dwarfs that slowly cool'], answer:'Supernovae, leaving behind neutron stars or black holes', fact:'When a massive star exhausts its fuel, gravity crushes the core in milliseconds — triggering a supernova explosion brighter than an entire galaxy. Elements heavier than iron (gold, uranium) are forged in supernova explosions and scattered into space to form new stars and planets!' },
  { level:3, visual:'⭐', question:'The heavy elements like iron, gold, and oxygen in your body were created by', options:['Nuclear fusion inside stars and supernova explosions','The Big Bang alone','Chemical reactions in Earth\'s mantle'], answer:'Nuclear fusion inside stars and supernova explosions', fact:'Hydrogen and helium formed in the Big Bang. Stars fuse these into heavier elements up to iron. Elements heavier than iron require supernovae or neutron star mergers. You are literally made of stardust — every atom heavier than hydrogen was forged inside a star!' },
  { level:3, visual:'🌍', question:'The transit method for detecting exoplanets works by', options:['Measuring the tiny dip in a star\'s brightness as a planet passes in front of it','Photographing planets directly next to their star','Listening for radio signals from the planet'], answer:'Measuring the tiny dip in a star\'s brightness as a planet passes in front of it', fact:'NASA\'s Kepler telescope discovered over 2,600 confirmed exoplanets using the transit method. Earth crossing our Sun would cause only a 0.0084% brightness dip — yet Kepler\'s instruments were sensitive enough to detect it!' },
  { level:3, visual:'⭐', question:'The radial velocity method of finding exoplanets detects', options:['The tiny wobble of a star caused by a planet\'s gravitational pull, seen as Doppler shifting of starlight','The shadow a planet casts on interstellar dust','Changes in a star\'s color due to planetary atmospheres'], answer:'The tiny wobble of a star caused by a planet\'s gravitational pull, seen as Doppler shifting of starlight', fact:'A planet does not just orbit a star — both orbit their common center of mass. Jupiter causes our Sun to wobble at 12 m/s. The first confirmed exoplanet (51 Pegasi b, 1995) was found using radial velocity by Michel Mayor and Didier Queloz, who won the 2019 Nobel Prize!' },
  { level:3, visual:'🌌', question:'Evidence for dark matter includes', options:['Galaxies rotating too fast to be held together by visible matter alone, and gravitational lensing bending more light than visible mass predicts','Directly observing it with infrared telescopes','Measuring its heat signature'], answer:'Galaxies rotating too fast to be held together by visible matter alone, and gravitational lensing bending more light than visible mass predicts', fact:'Vera Rubin discovered in the 1970s that stars at galaxy edges orbit just as fast as stars near the center — they should fly off without extra gravity. Dark matter (27% of universe) provides the missing mass. We know what it does but not what it is!' },
  { level:3, visual:'🌿', question:'Quantum coherence in photosynthesis refers to', options:['Quantum mechanical effects that may help energy travel to reaction centers with near-perfect efficiency','The chemical bonds in chlorophyll being very stable','Light particles entering the chloroplast in waves'], answer:'Quantum mechanical effects that may help energy travel to reaction centers with near-perfect efficiency', fact:'Photosynthesis achieves near-100% efficiency transferring absorbed light energy to reaction centers — far better than any human solar panel. Some scientists propose quantum coherence (multiple pathways tried simultaneously) helps. This field of quantum biology is on the frontier of science!' },
  { level:3, visual:'🦅', question:'Quantum effects may help migratory birds navigate by', options:['Allowing cryptochrome proteins in their eyes to sense Earth\'s magnetic field via quantum entanglement of electron pairs','Using star positions alone at night','Feeling temperature gradients in the air'], answer:'Allowing cryptochrome proteins in their eyes to sense Earth\'s magnetic field via quantum entanglement of electron pairs', fact:'European robins have cryptochrome proteins in their eyes where light creates entangled electron pairs whose quantum spin is affected by Earth\'s magnetic field — giving birds a built-in compass. This quantum biology research is helping explain one of nature\'s most remarkable navigation systems!' },
  { level:3, visual:'🧬', question:'CRISPR is being used in conservation to', options:['Edit genomes of endangered species to reduce disease susceptibility, or to suppress invasive pest populations','Clone any extinct animal from bone fragments','Replace natural selection entirely'], answer:'Edit genomes of endangered species to reduce disease susceptibility, or to suppress invasive pest populations', fact:'Scientists are editing American chestnut tree DNA to resist the blight that nearly wiped them out. Others aim to suppress invasive rodent populations on islands using gene drives that spread engineered traits through a population. CRISPR conservation is both promising and controversial!' },
  { level:3, visual:'🧬', question:'Synthetic biology involves', options:['Designing and building new biological parts, organisms, or systems that do not exist in nature','Only studying existing organisms in labs','Cloning animals from ancient DNA'], answer:'Designing and building new biological parts, organisms, or systems that do not exist in nature', fact:'Synthetic biologists have created bacteria that produce insulin, biofuels, and even spider silk. In 2010 Craig Venter\'s team created the first cell controlled entirely by a synthetic genome. The field raises profound questions about the boundaries of life and bioethics!' },
  { level:3, visual:'🌍', question:'Terraforming Mars would involve', options:['Warming the planet, thickening its atmosphere, and creating liquid water to make it habitable for Earth life','Moving Mars closer to the Sun','Importing all Earth\'s soil to Mars'], answer:'Warming the planet, thickening its atmosphere, and creating liquid water to make it habitable for Earth life', fact:'Proposals include releasing greenhouse gases to warm Mars, redirecting comets to deliver water ice, and using engineered organisms to generate oxygen. Scientists debate feasibility — Mars has only 38% of Earth\'s gravity and lacks a protective magnetic field, which lets solar wind strip atmosphere away!' },
  { level:3, visual:'🌌', question:'The Fermi Paradox asks', options:['If intelligent life is statistically likely given billions of stars and planets, why have we found no evidence of other civilizations?','Why the universe is expanding faster than expected','How the first stars formed from hydrogen gas'], answer:'If intelligent life is statistically likely given billions of stars and planets, why have we found no evidence of other civilizations?', fact:'Enrico Fermi asked: "Where is everybody?" With 400 billion stars in our galaxy and billions of potentially habitable planets, advanced civilizations should be everywhere — yet we detect nothing. Proposed solutions include the Great Filter (civilizations self-destruct), the Zoo hypothesis, or that interstellar travel is simply too hard!' },
  { level:3, visual:'🧬', question:'The "RNA World" hypothesis in abiogenesis suggests that', options:['RNA molecules were the first self-replicating molecules and both stored genetic info and catalyzed reactions before DNA or proteins evolved','DNA was the first molecule of life','Proteins spontaneously evolved before any nucleic acids'], answer:'RNA molecules were the first self-replicating molecules and both stored genetic info and catalyzed reactions before DNA or proteins evolved', fact:'RNA is unique — it can both store information (like DNA) and catalyze chemical reactions (like proteins). Ribozymes are RNA enzymes still functioning today in ribosomes. The discovery that ribosomes are fundamentally RNA machines strongly supports the RNA World hypothesis!' },
  { level:3, visual:'🦠', question:'Hydrothermal vent ecosystems use chemosynthesis, which converts', options:['Chemical energy from hydrogen sulfide or methane into organic compounds without sunlight','Sunlight into chemical energy like photosynthesis','Carbon dioxide into methane using heat alone'], answer:'Chemical energy from hydrogen sulfide or methane into organic compounds without sunlight', fact:'Chemosynthetic bacteria oxidize H₂S: CO₂ + 4H₂S + O₂ → CH₂O + 4S + 3H₂O. These bacteria are the base of vent food chains, supporting tube worms, mussels, and crabs 2,500 meters deep where no sunlight ever reaches. Life does not need a sun to exist!' },
  { level:3, visual:'⭐', question:'Neutron stars are so dense that', options:['A teaspoon of neutron star material would weigh about a billion tons','They are less dense than Earth\'s iron core','They slowly expand over time becoming regular stars again'], answer:'A teaspoon of neutron star material would weigh about a billion tons', fact:'Neutron stars pack more mass than our Sun into a sphere 20 km across — the size of a city. Their gravity is 200 billion times stronger than Earth\'s. Rapidly spinning neutron stars (pulsars) emit radio beams so regular they were initially nicknamed LGM (Little Green Men)!' },
  { level:3, visual:'🌌', question:'The concept of the "habitable zone" (Goldilocks zone) refers to', options:['The range of orbital distances from a star where liquid water could exist on a planet\'s surface','The region of the galaxy where stars form','The distance from a star where planets can form'], answer:'The range of orbital distances from a star where liquid water could exist on a planet\'s surface', fact:'Earth sits in the Sun\'s habitable zone. Mars is on the outer edge; Venus is too close and too hot. But habitable zones can also be internal — Europa (Jupiter\'s moon) may have a liquid ocean under its ice, heated by tidal forces rather than sunlight!' },
  { level:3, visual:'🧬', question:'Gene drives in conservation are controversial because', options:['They can spread engineered genes through an entire wild population quickly, with potentially irreversible ecological consequences','They are too slow to help endangered species','They can only be used in laboratory settings'], answer:'They can spread engineered genes through an entire wild population quickly, with potentially irreversible ecological consequences', fact:'A gene drive ensures nearly all offspring inherit a trait — a suppression drive could theoretically eliminate an invasive species from an island. But if the drive spreads beyond the target area, consequences could be catastrophic. Scientists call for strict containment and international governance before field release!' },
  { level:3, visual:'🌍', question:'The "Great Oxygenation Event" approximately 2.4 billion years ago was caused by', options:['Cyanobacteria beginning to produce oxygen via photosynthesis, fundamentally changing Earth\'s atmosphere','A massive volcanic eruption releasing oxygen','An asteroid impact releasing oxygen from rocks'], answer:'Cyanobacteria beginning to produce oxygen via photosynthesis, fundamentally changing Earth\'s atmosphere', fact:'Before cyanobacteria, Earth\'s atmosphere had almost no free oxygen. Their oxygen was initially toxic to most life — causing the greatest mass extinction in Earth\'s history for anaerobic organisms. But it set the stage for complex aerobic life, including us!' },
  { level:3, visual:'🌿', question:'Population growth in an ecosystem is limited when', options:['The population reaches its carrying capacity — the maximum size the environment can sustainably support','The population has too much genetic diversity','All predators migrate away from the area'], answer:'The population reaches its carrying capacity — the maximum size the environment can sustainably support', fact:'Carrying capacity (K) is set by food, water, space, and disease. As a population approaches K, growth slows (logistic growth, S-shaped curve). Overshoot K and the population crashes. Humans are currently debating Earth\'s carrying capacity for our own species!' },
  // ── LEVEL 1 EXTRA ──
  { level:1, visual:'🌱', question:'What is the name of the process where plants lose water as vapor through their leaves?', options:['Transpiration','Photosynthesis','Germination'], answer:'Transpiration', fact:'Plants release water vapor through tiny pores called stomata. On a hot day a corn plant can transpire over a liter of water. Transpiration cools the leaf and helps pull water up from the roots!' },
  { level:1, visual:'🌍', question:'Which layer of Earth is made of liquid iron and nickel?', options:['Outer core','Inner core','Mantle'], answer:'Outer core', fact:'Earth\'s outer core is liquid iron and nickel, about 2,260 km thick. The movement of this liquid metal generates Earth\'s magnetic field, which shields us from harmful solar radiation!' },
  { level:1, visual:'⭐', question:'Stars appear to twinkle because', options:['Their light passes through moving layers of Earth\'s atmosphere','They actually blink on and off','They orbit the Earth quickly'], answer:'Their light passes through moving layers of Earth\'s atmosphere', fact:'Twinkling (scintillation) happens because air pockets of different temperatures bend starlight. Planets twinkle less because they are discs, not points. From space, stars do not twinkle at all!' },
  { level:1, visual:'🌿', question:'A food chain: seaweed → sea urchin → sea otter → orca. The orca is a', options:['Top predator (tertiary consumer)','Primary consumer','Producer'], answer:'Top predator (tertiary consumer)', fact:'The orca eats the sea otter (secondary consumer), making the orca a tertiary consumer. Orcas are apex predators in the ocean — nothing regularly hunts them. They help regulate the populations of everything below them!' },
  { level:1, visual:'🪨', question:'Which rock type can be used to make concrete and is found in chalk cliffs?', options:['Limestone (a sedimentary rock)','Granite (an igneous rock)','Marble (a metamorphic rock)'], answer:'Limestone (a sedimentary rock)', fact:'Limestone is made from compressed shells and coral over millions of years. It is used in cement, concrete, and toothpaste. The White Cliffs of Dover in England are chalk — a type of limestone!' },
  { level:1, visual:'🌱', question:'A fruit is', options:['The ripened ovary of a flower containing seeds','Only sweet foods like apples and oranges','Any food that grows on trees'], answer:'The ripened ovary of a flower containing seeds', fact:'Botanically, tomatoes, cucumbers, peppers, and avocados are fruits — they contain seeds. Nuts like walnuts are also fruits! Vegetables are other edible plant parts: roots (carrot), stems (celery), leaves (spinach).' },
  { level:1, visual:'💧', question:'Groundwater is', options:['Fresh water stored underground in soil and rock pores','Water that has fallen on the ground as rain','Water in all rivers and streams'], answer:'Fresh water stored underground in soil and rock pores', fact:'About 30% of Earth\'s fresh water is stored as groundwater in aquifers. We pump it up through wells. In many areas groundwater is being used faster than it refills through rainfall — a global water security concern!' },
  { level:1, visual:'🌿', question:'Which part of the plant absorbs water and minerals from the soil?', options:['Roots','Leaves','Stem'], answer:'Roots', fact:'Root hairs dramatically increase surface area for water absorption. Roots also anchor the plant and can store food (like in carrots and beets). The root system of a rye plant can have 600 km of roots!' },
  { level:1, visual:'🦠', question:'Bacteria are classified as', options:['Prokaryotes — single-celled organisms without a nucleus','Eukaryotes — cells with a true nucleus','Viruses — non-living particles'], answer:'Prokaryotes — single-celled organisms without a nucleus', fact:'Bacteria are among the oldest life forms, existing for 3.5 billion years. They lack a nucleus — their DNA floats freely in the cell. They are incredibly diverse: some cause disease, but most are harmless or beneficial!' },
  { level:1, visual:'🔬', question:'What type of organism is a mushroom?', options:['A fungus','A plant','A bacterium'], answer:'A fungus', fact:'Fungi are neither plants nor animals. They decompose organic matter by releasing enzymes and absorbing nutrients. The largest organism on Earth is a honey fungus in Oregon — its underground network spans 10 square km!' },
  { level:1, visual:'🌊', question:'The water in Earth\'s oceans is salty because', options:['Rivers carry dissolved minerals and salts from rocks into the ocean over billions of years','Underground salt deposits melt into sea water','The Sun evaporates fresh water leaving only salt'], answer:'Rivers carry dissolved minerals and salts from rocks into the ocean over billions of years', fact:'Rain slightly dissolves minerals from rocks. Rivers carry these ions to the sea. Water evaporates (leaving salt behind) but salts accumulate over billions of years. The ocean has been getting saltier very slowly for most of Earth\'s history!' },
  { level:1, visual:'🌱', question:'What is the role of the stem in a plant?', options:['Transports water and nutrients between roots and leaves, and supports the plant','Absorbs sunlight for photosynthesis','Takes in carbon dioxide from the air'], answer:'Transports water and nutrients between roots and leaves, and supports the plant', fact:'The stem contains two transport systems: xylem carries water up from roots; phloem carries sugars made in leaves down to roots and growing parts. Some stems also store water (like a cactus) or food (like a potato tuber)!' },
  { level:1, visual:'🦁', question:'Which is an example of an invertebrate?', options:['Jellyfish','Eagle','Frog'], answer:'Jellyfish', fact:'Jellyfish have no backbone, brain, heart, or blood — yet they have been swimming in the oceans for over 500 million years! They are among the oldest animals on Earth. Some species are immortal, reverting to their juvenile form when stressed.' },
  { level:1, visual:'🌍', question:'The most abundant gas in Earth\'s atmosphere is', options:['Nitrogen (about 78%)','Oxygen (about 21%)','Carbon dioxide (about 0.04%)'], answer:'Nitrogen (about 78%)', fact:'Earth\'s atmosphere: 78% nitrogen, 21% oxygen, ~1% argon, 0.04% CO₂. Nitrogen is essential for life — it is part of all proteins and DNA — but we cannot breathe it directly. We rely on nitrogen-fixing bacteria to make it usable!' },
  { level:1, visual:'🌙', question:'A "waning gibbous" moon appears', options:['More than half lit but shrinking toward the last quarter phase','Exactly half lit and growing','As a thin crescent in the evening sky'], answer:'More than half lit but shrinking toward the last quarter phase', fact:'After full moon the moon wanes: waning gibbous → last quarter (half-lit, left side) → waning crescent → new moon. "Gibbous" means "hump-backed" — more than half illuminated. You see waning moons in the early morning sky!' },
  { level:1, visual:'☀️', question:'What is the energy transformation in a campfire?', options:['Chemical energy in wood → heat energy and light energy','Electrical energy → heat energy','Nuclear energy → light energy'], answer:'Chemical energy in wood → heat energy and light energy', fact:'Wood stores chemical energy in its carbon-hydrogen bonds. Combustion breaks these bonds releasing energy as heat and light. The warmth you feel from a campfire is thermal radiation — the same process (though different fuels) that powers all fossil fuel power plants!' },
  { level:1, visual:'🌱', question:'What makes a plant\'s leaves green?', options:['Chlorophyll — a pigment that absorbs red and blue light and reflects green','Green dye produced in the roots','The water stored in leaf cells'], answer:'Chlorophyll — a pigment that absorbs red and blue light and reflects green', fact:'Chlorophyll absorbs red and blue wavelengths of light for photosynthesis and reflects green — which is why we see it as green. In autumn, chlorophyll breaks down revealing yellow and orange pigments (carotenoids) that were there all along!' },
  { level:1, visual:'🌍', question:'A glacier is', options:['A large slow-moving mass of ice that forms from compacted snow over many years','A fast-moving river of ice','An iceberg floating in the ocean'], answer:'A large slow-moving mass of ice that forms from compacted snow over many years', fact:'Glaciers move under their own weight — just centimeters per day. They carve valleys, transport boulders, and store about 69% of Earth\'s fresh water. Glaciers are retreating worldwide due to climate warming!' },
  { level:1, visual:'⚡', question:'What energy transformation happens in a hydroelectric dam?', options:['Gravitational potential energy of water → kinetic energy → electrical energy','Chemical energy → electrical energy','Solar energy → electrical energy'], answer:'Gravitational potential energy of water → kinetic energy → electrical energy', fact:'Water held behind a dam has gravitational potential energy. When released it converts to kinetic energy (movement), spinning turbines that drive generators to produce electricity. Hydropower is one of the oldest and cleanest renewable energy sources!' },
  { level:1, visual:'🌿', question:'What happens to energy as it moves up a food chain?', options:['About 90% is lost at each level (as heat), so less energy reaches the top','Energy increases at each level','Energy stays exactly the same at each level'], answer:'About 90% is lost at each level (as heat), so less energy reaches the top', fact:'The 10% rule: only ~10% of energy passes from one trophic level to the next. The rest is used for life processes or lost as heat. This is why food chains rarely have more than 4-5 levels — not enough energy reaches the top!' },
  { level:1, visual:'🌱', question:'Which of these is an example of seed dispersal by animals?', options:['A deer eating berries and depositing seeds far away in its droppings','Dandelion seeds floating on the breeze','Coconuts floating across the ocean'], answer:'A deer eating berries and depositing seeds far away in its droppings', fact:'Many plants produce fleshy, nutritious fruit specifically to attract animals. The animal eats the fruit but cannot digest the hard seed, depositing it elsewhere in their droppings — often with a fertilizer delivery included! This benefits both the plant and the animal.' },
  // ── LEVEL 2 EXTRA ──
  { level:2, visual:'🌍', question:'Sea-floor spreading occurs at', options:['Divergent plate boundaries where new oceanic crust forms as magma rises','Convergent boundaries where plates collide','Transform boundaries where plates slide past each other'], answer:'Divergent plate boundaries where new oceanic crust forms as magma rises', fact:'The Mid-Atlantic Ridge is a 16,000 km long divergent boundary where North America and Europe move apart by about 2.5 cm per year. The ocean floor is essentially a giant conveyor belt — born at ridges, destroyed at subduction zones!' },
  { level:2, visual:'🌋', question:'A subduction zone is where', options:['A denser oceanic plate dives beneath a less dense continental plate, causing earthquakes and volcanoes','Two plates pull apart and lava fills the gap','Two continental plates push together forming mountains'], answer:'A denser oceanic plate dives beneath a less dense continental plate, causing earthquakes and volcanoes', fact:'The Pacific "Ring of Fire" is a horseshoe of subduction zones around the Pacific Ocean — home to 90% of the world\'s earthquakes and 75% of its volcanoes. Japan, Indonesia, Chile, and the US Pacific Northwest all sit on subduction zones!' },
  { level:2, visual:'⚗️', question:'What is the difference between an element and a compound?', options:['An element has only one type of atom; a compound has two or more types of atoms chemically bonded together','An element is liquid; a compound is solid','Elements can be decomposed; compounds cannot'], answer:'An element has only one type of atom; a compound has two or more types of atoms chemically bonded together', fact:'Gold (Au) and oxygen (O₂) are elements. Water (H₂O) and salt (NaCl) are compounds. There are 118 known elements on the periodic table. Compounds can have very different properties from their component elements — hydrogen and oxygen are gases, but water is a liquid!' },
  { level:2, visual:'🌿', question:'The process of water moving from soil through a plant and out through leaves is called', options:['The transpiration stream (or SPAC: Soil-Plant-Air Continuum)','The carbon cycle','Osmosis only'], answer:'The transpiration stream (or SPAC: Soil-Plant-Air Continuum)', fact:'Water enters root hairs by osmosis, travels up xylem vessels pulled by the evaporation of water from leaf stomata (transpiration pull), and exits as vapor. This passive process lifts water to the tops of 100-meter-tall trees without a pump!' },
  { level:2, visual:'🌱', question:'Denitrification in the nitrogen cycle is when', options:['Bacteria convert nitrates back into nitrogen gas, returning it to the atmosphere','Plants absorb nitrogen from soil','Nitrogen gas is converted into ammonia by bacteria'], answer:'Bacteria convert nitrates back into nitrogen gas, returning it to the atmosphere', fact:'Without denitrification, nitrogen would accumulate as nitrates in soil and water. Denitrifying bacteria complete the nitrogen cycle, returning N₂ to the atmosphere. The cycle: atmospheric N₂ → fixation → nitrification → plant uptake → decomposition → denitrification → back to N₂!' },
  { level:2, visual:'🌊', question:'A tsunami is caused by', options:['A sudden displacement of a large volume of ocean water, usually by an undersea earthquake or landslide','Strong winds blowing ocean waves inland','The Moon\'s gravitational pull getting suddenly stronger'], answer:'A sudden displacement of a large volume of ocean water, usually by an undersea earthquake or landslide', fact:'Tsunamis travel across entire ocean basins at 800 km/h (jet speed) but have a wave length of hundreds of km, so they appear as a slow rise in the open ocean. Near shore they slow down, steepen, and can reach 30+ meters. The 2004 Indian Ocean tsunami killed 230,000 people.' },
  { level:2, visual:'🌡️', question:'The greenhouse effect is strengthened when', options:['Concentrations of CO₂, methane, and water vapor in the atmosphere increase','The ozone layer gets thicker','More sunlight reaches the ground'], answer:'Concentrations of CO₂, methane, and water vapor in the atmosphere increase', fact:'These gases absorb outgoing infrared radiation and re-emit it back to Earth. CO₂ has increased from 280 ppm (pre-industrial) to over 420 ppm today — the highest in 3 million years. Methane is 80× more potent than CO₂ over 20 years!' },
  { level:2, visual:'🌿', question:'An ecological niche describes', options:['How a species interacts with its environment — its role, diet, habitat, behavior, and relationships','Only the physical location where a species lives','The total biomass of a species in an ecosystem'], answer:'How a species interacts with its environment — its role, diet, habitat, behavior, and relationships', fact:'Two species cannot occupy exactly the same niche in the same ecosystem (competitive exclusion principle). They will either compete until one disappears or evolve to use different resources — a process called niche partitioning. Warblers that eat insects at different heights in the same tree are a classic example!' },
  { level:2, visual:'🌍', question:'The rock cycle describes', options:['How igneous, sedimentary, and metamorphic rocks can each transform into the other types over geological time','How all rocks formed from cooling magma only','How rocks move around the globe by plate tectonics'], answer:'How igneous, sedimentary, and metamorphic rocks can each transform into the other types over geological time', fact:'Magma cools → igneous; igneous weathers → sediment → compacts → sedimentary; sedimentary heated/pressured → metamorphic; metamorphic melts → magma. All rock types are connected in a continuous cycle driven by Earth\'s internal heat and surface processes!' },
  { level:2, visual:'⚡', question:'What happens at a transform plate boundary?', options:['Two plates slide horizontally past each other, producing earthquakes but no volcanoes','Plates move apart forming new crust','One plate dives under another'], answer:'Two plates slide horizontally past each other, producing earthquakes but no volcanoes', fact:'The San Andreas Fault in California is a famous transform boundary. The Pacific Plate slides northwest relative to the North American Plate at about 5 cm per year. The stress builds up and releases as earthquakes — California\'s biggest earthquake risk!' },
  { level:2, visual:'🌊', question:'Salinity of ocean water is highest where', options:['Evaporation is high and rainfall is low (like subtropical gyres)','Polar ice caps melt adding fresh water','Rivers carry large amounts of fresh water into the sea'], answer:'Evaporation is high and rainfall is low (like subtropical gyres)', fact:'Evaporation removes fresh water but leaves salt behind, increasing salinity. The Mediterranean Sea is saltier than the Atlantic Ocean for this reason. Conversely, the Baltic Sea is nearly fresh because it receives large river input and little evaporation.' },
  { level:2, visual:'🧬', question:'DNA contains the genetic code using four bases whose sequence determines', options:['Which proteins are built — essentially all of an organism\'s traits and functions','Only eye color and height','The organism\'s age and lifespan'], answer:'Which proteins are built — essentially all of an organism\'s traits and functions', fact:'DNA\'s four bases (A, T, C, G) are read in triplets (codons) — each specifying an amino acid. The sequence of amino acids determines a protein\'s shape and function. Your 3 billion base pairs encode about 20,000-25,000 genes that make you, you!' },
  { level:2, visual:'🌿', question:'Biomagnification means that', options:['Toxins like mercury and DDT become MORE concentrated at higher levels in a food chain','Animals at the top of food chains eat more food so they grow bigger','Energy doubles at each level of a food chain'], answer:'Toxins like mercury and DDT become MORE concentrated at higher levels in a food chain', fact:'Since each level eats many organisms below, toxins accumulate and concentrate. Eagles and orcas (top predators) have the highest toxin loads. DDT caused eggshell thinning in eagles before being banned. Tuna carry more mercury than sardines for the same reason!' },
  { level:2, visual:'🌱', question:'Soil is important to ecosystems because', options:['It provides nutrients, water storage, and anchoring for plants and habitat for countless organisms','It only provides minerals and nothing else','It mainly reflects sunlight to regulate temperature'], answer:'It provides nutrients, water storage, and anchoring for plants and habitat for countless organisms', fact:'One teaspoon of healthy topsoil contains more bacteria than people on Earth, plus fungi, worms, and insects. Soil takes thousands of years to form from weathered rock. Topsoil loss from erosion and poor farming is a global food security threat!' },
  { level:2, visual:'🌿', question:'What is a biotic factor in an ecosystem?', options:['A living component — such as predators, competitors, parasites, and food plants','Non-living factors like temperature, rainfall, and soil type','Any chemical element in the soil'], answer:'A living component — such as predators, competitors, parasites, and food plants', fact:'Biotic (living) factors shape populations just as much as abiotic (non-living) factors. A wolf (biotic) suppresses deer populations; drought (abiotic) reduces food. Both work together to determine which organisms survive in any habitat!' },
