  { level:2, visual:'🌍', question:'What is the difference between weather and climate?', options:['Weather is daily atmospheric conditions; climate is the average pattern over 30+ years for a region','They mean exactly the same thing','Weather occurs globally; climate is local'], answer:'Weather is daily atmospheric conditions; climate is the average pattern over 30+ years for a region', fact:'"Climate is what you expect; weather is what you get." You expect London to be rainy (climate) but today might be sunny (weather). Climatologists average 30 years of data to describe a region\'s climate. Weather can vary wildly from day to day, but climate shifts slowly!' },
  { level:2, visual:'💧', question:'Infiltration in the water cycle is when', options:['Water soaks down through soil into groundwater or aquifers','Water evaporates from the soil surface','Water falls as rain or snow'], answer:'Water soaks down through soil into groundwater or aquifers', fact:'Infiltration replenishes groundwater and aquifers. Impermeable surfaces like roads and parking lots prevent infiltration, causing more runoff and flooding. Urban areas with lots of pavement contribute to flash flooding because water cannot soak in!' },
  { level:2, visual:'🌿', question:'Which type of symbiosis describes the relationship between a tapeworm living in an animal\'s intestines and its host?', options:['Parasitism — the tapeworm benefits; the host is harmed','Mutualism — both organisms benefit','Commensalism — one benefits while the other is unaffected'], answer:'Parasitism — the tapeworm benefits; the host is harmed', fact:'Tapeworms absorb nutrients directly from the host\'s digested food, potentially causing malnutrition and illness. The parasite needs to keep its host alive to survive — most parasites don\'t immediately kill the host, distinguishing parasitism from predation!' },
  { level:2, visual:'🌊', question:'Upwelling in the ocean occurs when', options:['Deep, cold, nutrient-rich water rises to the surface, supporting highly productive fisheries','Warm surface water sinks to the bottom','Tidal currents push water against a coastline'], answer:'Deep, cold, nutrient-rich water rises to the surface, supporting highly productive fisheries', fact:'Upwelling zones (off Peru, California, Namibia) are among the most productive marine ecosystems. Cold deep water carries nutrients — nitrates and phosphates — to the sunlit surface where phytoplankton bloom. These zones support massive anchovy, sardine, and tuna fisheries!' },
  // ── LEVEL 3 EXTRA ──
  { level:3, visual:'🧬', question:'What is the difference between genotype and phenotype?', options:['Genotype is the genetic code (alleles); phenotype is the observable trait that results from genotype and environment','They are the same — genes always produce identical traits','Phenotype is inherited; genotype is created by the environment'], answer:'Genotype is the genetic code (alleles); phenotype is the observable trait that results from genotype and environment', fact:'Two plants with the same genotype grown in different conditions may look very different (different phenotypes). Identical twins have the same genotype but can develop different phenotypes. The interaction between genes and environment is the frontier of epigenetics!' },
  { level:3, visual:'🌌', question:'A black hole forms when', options:['A massive star collapses under gravity so completely that nothing — not even light — can escape its event horizon','Two neutron stars slowly merge over millions of years','The Sun runs out of hydrogen fuel and collapses'], answer:'A massive star collapses under gravity so completely that nothing — not even light — can escape its event horizon', fact:'The event horizon is the point of no return. Stephen Hawking showed black holes slowly evaporate through quantum effects (Hawking radiation). In 2019 the Event Horizon Telescope captured the first image of a black hole — M87*, 6.5 billion times the Sun\'s mass!' },
  { level:3, visual:'⭐', question:'What is a light-year?', options:['The distance light travels in one year — about 9.46 trillion km','The time it takes light to travel from the Sun to Earth','A measure of a star\'s brightness'], answer:'The distance light travels in one year — about 9.46 trillion km', fact:'Light travels at 300,000 km/s, covering 9.46 trillion km in one year. Proxima Centauri (nearest star) is 4.24 light-years away — so we see it as it was 4.24 years ago. When we observe distant galaxies, we are literally looking back in time billions of years!' },
  { level:3, visual:'🧬', question:'Epigenetics refers to', options:['Changes in gene expression caused by chemical tags on DNA or histones — heritable but not changing the DNA sequence itself','Random mutations in DNA that alter the genetic code','The inheritance of acquired physical traits like muscle mass'], answer:'Changes in gene expression caused by chemical tags on DNA or histones — heritable but not changing the DNA sequence itself', fact:'Methyl groups can silence genes; acetyl groups can activate them. Diet, stress, and environment alter these tags — sometimes passed to offspring. Identical twins\' epigenomes diverge over time. Epigenetics blurs the line between nature and nurture!' },
  { level:3, visual:'🌍', question:'The Wilson Cycle describes', options:['The opening and closing of ocean basins as plates diverge and later converge over hundreds of millions of years','The water cycle on a global scale','The lifecycle of volcanoes from formation to extinction'], answer:'The opening and closing of ocean basins as plates diverge and later converge over hundreds of millions of years', fact:'The Atlantic Ocean is currently widening (opening). Eventually (in hundreds of millions of years) it will close again as plates converge, mountains will form, and continents may merge into a new supercontinent. Pangaea itself formed from an earlier ocean\'s closure!' },
  { level:3, visual:'🦠', question:'Antibiotic resistance evolves because', options:['Random mutations allow some bacteria to survive antibiotics; these survivors reproduce, spreading resistance genes','Bacteria intentionally change to resist antibiotics','Antibiotics weaken all bacteria equally but some recover faster'], answer:'Random mutations allow some bacteria to survive antibiotics; these survivors reproduce, spreading resistance genes', fact:'This is natural selection in real time. A course of antibiotics kills 99.99% of bacteria — but the 0.01% with resistance genes survive and reproduce. Overuse of antibiotics accelerates the evolution of "superbugs" like MRSA that resist nearly all known antibiotics.' },
  { level:3, visual:'⚗️', question:'Nuclear fusion (the Sun\'s energy source) differs from nuclear fission (nuclear power plants) in that', options:['Fusion joins small nuclei (hydrogen) releasing enormous energy; fission splits large nuclei (uranium) releasing energy','They release the same amount of energy per reaction','Fission is used in the Sun; fusion is used in reactors'], answer:'Fusion joins small nuclei (hydrogen) releasing enormous energy; fission splits large nuclei (uranium) releasing energy', fact:'Fusion produces far more energy per kg of fuel than fission and its hydrogen fuel is abundant. But containing plasma at 100 million degrees is enormously difficult. Scientists have achieved fusion (the ITER project) but achieving net energy gain commercially remains the holy grail of clean energy!' },
  { level:3, visual:'🌿', question:'A trophic cascade occurs when', options:['Removing or adding a top predator causes dramatic changes throughout the entire food web below it','Only the species immediately below the predator is affected','A flood or fire destroys the base of a food chain'], answer:'Removing or adding a top predator causes dramatic changes throughout the entire food web below it', fact:'When wolves were reintroduced to Yellowstone in 1995, elk changed grazing behavior, allowing riverside vegetation to recover, stabilizing riverbanks, changing water flow, and even affecting the physical landscape — called a "landscape of fear." Top predators can change rivers!' },
  { level:3, visual:'🌌', question:'The cosmic microwave background radiation is', options:['The afterglow of the Big Bang — electromagnetic radiation filling all of space, providing strong evidence for the Big Bang theory','Radiation emitted by the Milky Way\'s central black hole','Radio waves produced by pulsars throughout the galaxy'], answer:'The afterglow of the Big Bang — electromagnetic radiation filling all of space, providing strong evidence for the Big Bang theory', fact:'Discovered accidentally in 1965 by Penzias and Wilson, the CMB is photons released 380,000 years after the Big Bang when the universe cooled enough for atoms to form. Its nearly uniform temperature (2.7 K) across the entire sky strongly supports the Big Bang model!' },
  { level:3, visual:'🧬', question:'Horizontal gene transfer in bacteria differs from vertical inheritance because', options:['Genes are transferred between different species without reproduction — allowing bacteria to rapidly share antibiotic resistance','Genes are only passed from parent to offspring','It only occurs during bacterial reproduction by binary fission'], answer:'Genes are transferred between different species without reproduction — allowing bacteria to rapidly share antibiotic resistance', fact:'Bacteria can swap genes via plasmids (conjugation), viruses (transduction), or picking up naked DNA (transformation). A bacterium can acquire antibiotic resistance from a completely different species overnight. This horizontal gene transfer makes antibiotic resistance spread rapidly across bacterial populations!' },
  { level:3, visual:'🌍', question:'Mass extinctions in Earth\'s history are defined as', options:['Events where more than 75% of species go extinct in a geologically short time period','The extinction of any large charismatic species','Gradual extinction of species over millions of years'], answer:'Events where more than 75% of species go extinct in a geologically short time period', fact:'Earth has had five major mass extinctions. The worst (End-Permian, 252 Ma) killed 96% of marine species. The famous End-Cretaceous event (66 Ma) killed non-avian dinosaurs. Many scientists argue we are in the sixth mass extinction — the Holocene extinction — caused by human activity!' },
  { level:3, visual:'🌿', question:'Island biogeography theory predicts that', options:['Larger islands closer to the mainland have more species because they receive more colonists and lose fewer to extinction','All islands have the same number of species regardless of size','Remote islands always have the fewest species because they are isolated'], answer:'Larger islands closer to the mainland have more species because they receive more colonists and lose fewer to extinction', fact:'MacArthur and Wilson (1967) showed species number on islands balances between colonization (higher for large, close islands) and extinction (lower for large islands). This theory is critical for conservation — it explains why large, connected nature reserves protect more biodiversity than fragmented small ones!' },
  { level:3, visual:'⭐', question:'The habitable zone of a red dwarf star (like Proxima Centauri) is', options:['Much closer to the star than Earth is to the Sun, because red dwarfs are cooler and dimmer','The same distance as Earth\'s distance from the Sun','Farther than Earth is from the Sun, because red dwarfs emit more heat'], answer:'Much closer to the star than Earth is to the Sun, because red dwarfs are cooler and dimmer', fact:'Red dwarfs are the most common stars (70% of all stars). Their habitable zones are so close that orbiting planets are tidally locked (one side always faces the star). Despite this, red dwarf planets are prime targets for the search for life because their stars live for trillions of years!' },
  // ── FINAL TOP-UP ──
  { level:1, visual:'🌡️', question:'What does a thermometer measure?', options:['Temperature','Wind speed','Air pressure'], answer:'Temperature', fact:'Thermometers work because liquids expand when heated. Mercury and alcohol are traditional thermometer liquids. Modern digital thermometers measure electrical resistance changes with temperature. Doctors use ear and forehead thermometers for quick, accurate readings!' },
  { level:1, visual:'🌱', question:'Which of the following is a producer in an ocean ecosystem?', options:['Phytoplankton (microscopic algae)','Tuna','Crab'], answer:'Phytoplankton (microscopic algae)', fact:'Phytoplankton are tiny algae that drift in sunlit ocean waters and photosynthesize. They produce about 50% of Earth\'s oxygen and form the base of nearly all marine food chains. A single drop of ocean water can contain millions of phytoplankton!' },
  { level:1, visual:'🌿', question:'A biome is', options:['A large region of Earth defined by its climate, plants, and animals','A single pond or lake','A type of rock found worldwide'], answer:'A large region of Earth defined by its climate, plants, and animals', fact:'Earth has major biomes: tropical rainforest, desert, grassland, tundra, taiga (boreal forest), temperate forest, and marine. Climate — mainly temperature and precipitation — determines which biome exists in a region!' },
  { level:1, visual:'🦠', question:'Viruses are', options:['Non-living particles that invade cells and use them to reproduce','Living single-celled organisms like bacteria','Large multicellular organisms that cause disease'], answer:'Non-living particles that invade cells and use them to reproduce', fact:'Viruses are not cells — they have no metabolism on their own and cannot reproduce without a host cell. They are just DNA or RNA wrapped in a protein coat. Flu, COVID-19, and the common cold are all caused by viruses!' },
  { level:2, visual:'🌿', question:'The process by which ammonia in soil is converted to nitrates that plants can absorb is called', options:['Nitrification','Denitrification','Nitrogen fixation'], answer:'Nitrification', fact:'Nitrifying bacteria (like Nitrosomonas and Nitrobacter) convert ammonia → nitrite → nitrate in two steps. Nitrates are the main form of nitrogen absorbed by plant roots. This step in the nitrogen cycle is essential for plant growth!' },
  { level:2, visual:'⚗️', question:'What is the pH scale and what does it measure?', options:['It measures acidity and basicity on a scale of 0-14: below 7 is acidic, 7 is neutral, above 7 is basic','It measures temperature in a special chemical unit','It measures the concentration of oxygen dissolved in water'], answer:'It measures acidity and basicity on a scale of 0-14: below 7 is acidic, 7 is neutral, above 7 is basic', fact:'pH stands for "potential of hydrogen." Lemon juice is pH 2 (very acidic), pure water is pH 7 (neutral), and baking soda is pH 9 (basic). Each step is 10× more or less concentrated than the previous — it is a logarithmic scale!' },
  { level:2, visual:'💧', question:'The hydrological cycle is powered primarily by', options:['Solar energy causing evaporation, and gravity pulling water back down as precipitation','The Moon\'s gravity causing tides','Earth\'s rotation creating wind patterns'], answer:'Solar energy causing evaporation, and gravity pulling water back down as precipitation', fact:'The Sun heats water at the surface → evaporation → water vapor rises and cools → condensation into clouds → precipitation → gravity returns water to ocean. The water cycle redistributes energy and fresh water around the entire planet!' },
  { level:2, visual:'🌿', question:'Eutrophication in lakes and rivers occurs when', options:['Excess nutrients (nitrates and phosphates) cause algal blooms that deplete oxygen and kill aquatic life','Acid rain kills all algae and bacteria','Industrial cooling warms the water to lethal temperatures'], answer:'Excess nutrients (nitrates and phosphates) cause algal blooms that deplete oxygen and kill aquatic life', fact:'Farm fertilizer runoff carries nitrogen and phosphorus into waterways. Algae explode in growth (bloom), then die and decompose — decomposers consume all the dissolved oxygen, creating "dead zones" where fish cannot survive. The Gulf of Mexico has a massive dead zone from Mississippi River runoff!' },
  { level:3, visual:'🌍', question:'What is meant by "deep time" in geology?', options:['The concept that Earth is approximately 4.54 billion years old and geological processes occur over millions to billions of years','The idea that the deepest ocean trenches record all of Earth\'s history','The study of deep underground cave systems formed over time'], answer:'The concept that Earth is approximately 4.54 billion years old and geological processes occur over millions to billions of years', fact:'Geologist James Hutton introduced deep time in 1788 — the recognition that geological changes require vast spans of time. A million years is almost incomprehensible; Earth has had 4,540 of them. This insight was crucial for Darwin\'s theory of evolution, which also requires enormous spans of time!' },
  { level:3, visual:'🧬', question:'Convergent evolution and common ancestry can be distinguished using', options:['DNA comparisons — shared ancestry produces similar DNA; convergent evolution produces similar appearance but different DNA','Body shape alone','Fossil records only'], answer:'DNA comparisons — shared ancestry produces similar DNA; convergent evolution produces similar appearance but different DNA', fact:'Dolphins and sharks look similar but have very different DNA — convergent evolution. Bats and whales look different but their DNA shows they are closely related mammals — common ancestry. DNA is the ultimate tool for untangling evolutionary relationships!' },
  { level:3, visual:'🌿', question:'The precautionary principle in environmental science states that', options:['When an action risks harm to the environment or human health, precautionary measures should be taken even without complete scientific certainty','Environmental protection should wait until all possible impacts are fully known','Economic development always takes priority over environmental concerns'], answer:'When an action risks harm to the environment or human health, precautionary measures should be taken even without complete scientific certainty', fact:'The precautionary principle guides environmental policy: if there is substantial evidence of serious risk, act to prevent harm even before proof is certain. It underpinned the banning of DDT, CFCs, and leaded gasoline. Critics argue it can block beneficial innovation without clear evidence of harm!' },
  { level:3, visual:'⭐', question:'Gravitational waves, detected first by LIGO in 2015, are', options:['Ripples in spacetime caused by accelerating massive objects like merging black holes or neutron stars','Sound waves travelling through space between galaxies','Electromagnetic radiation emitted when stars explode as supernovae'], answer:'Ripples in spacetime caused by accelerating massive objects like merging black holes or neutron stars', fact:'Einstein predicted gravitational waves in 1916 but thought they could never be detected — they stretch and compress space by less than 1/1000 the diameter of a proton. LIGO\'s 4 km laser arms detected the first wave from two merging black holes 1.3 billion light-years away. A new window on the universe opened!' },
  { level:3, visual:'🌊', question:'Ocean acidification is caused by', options:['Oceans absorbing excess CO₂ from the atmosphere, forming carbonic acid that lowers ocean pH','Industrial acid waste dumped into the sea','Volcanic vents releasing sulfur dioxide into the ocean'], answer:'Oceans absorbing excess CO₂ from the atmosphere, forming carbonic acid that lowers ocean pH', fact:'Oceans have absorbed about 30% of human CO₂ emissions. CO₂ + H₂O → H₂CO₃ (carbonic acid). Ocean pH has dropped from 8.2 to 8.1 since industrialization — seemingly small but 10× more acidic! This dissolves coral skeletons and shellfish shells, threatening marine food webs!' },
  { level:3, visual:'🌍', question:'The Anthropocene is the proposed geological epoch defined by', options:['Human activity becoming the dominant force shaping Earth\'s geology, atmosphere, and ecosystems','A major asteroid impact 66 million years ago','The last ice age ending approximately 11,700 years ago'], answer:'Human activity becoming the dominant force shaping Earth\'s geology, atmosphere, and ecosystems', fact:'Geologists debate when it began — 1945 (nuclear tests leave radioactive markers worldwide), 1950 (the "Great Acceleration" of population/industry), or 8,000 years ago (agriculture). Plastic particles, concrete, altered nitrogen cycle, and mass extinction define the Anthropocene stratum in future rock layers!' },
];



const QUIZ_KEY = 'kids_q_sba_science';
const POINTS_KEY='kids_points';
function getPoints(){return parseInt(localStorage.getItem(POINTS_KEY)||'0');}
function addPoints(n){localStorage.setItem(POINTS_KEY,getPoints()+n);}
function updatePtsDisplay(){const el=document.getElementById('ptsDisplay');if(el)el.textContent='⭐ '+getPoints();}

let current = 0, score = 0, dotResults = [], sessionQ = [];
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}
function playCorrect() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [1047,1319,1568,2093,1568,1319].forEach((f,i) => note(ctx,'triangle',f,t+i*0.07,0.14,0.5));
    [[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur]) => {
      note(ctx,'triangle',f,t+d,dur,0.55); note(ctx,'sine',f*2,t+d,dur*0.5,0.14);
    });
  });
}
function playWrong() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay]) => {
      const osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination); osc.type='sawtooth';
      osc.frequency.setValueAtTime(f1,t+delay); osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);
      gn.gain.setValueAtTime(0.001,t+delay); gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02); gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);
      osc.start(t+delay); osc.stop(t+delay+0.3);
    });
    const osc=ctx.createOscillator(), gn=ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination); osc.type='sine';
    osc.frequency.setValueAtTime(380,t+0.92); osc.frequency.exponentialRampToValueAtTime(55,t+1.4);
    gn.gain.setValueAtTime(0.001,t+0.92); gn.gain.linearRampToValueAtTime(0.55,t+0.93); gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);
    osc.start(t+0.92); osc.stop(t+1.5);
  });
}
function playLevelUp() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d]) => note(ctx,'triangle',f,t+d,0.25,0.45));
    note(ctx,'sine',1047,t+0.84,0.8,0.3); note(ctx,'sine',1319,t+0.90,0.7,0.25); note(ctx,'sine',1568,t+0.96,0.6,0.2);
  });
}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function init() {
  current = 0; score = 0; dotResults = Array(15).fill(null); sessionQ = pickSession();
  if (!document.getElementById('visualCard')) {
    document.getElementById('gameScreen').innerHTML = `
      <a class="back-btn" href="../../">← Home</a>
      <div class="top">
        <div class="title">🔬 5th Grade SBA Science</div>
        <div class="top-row"><div class="level-badge easy" id="levelBadge">⭐ Easy</div><div class="score-pill">🎯 <strong id="score">0</strong> / 15</div><div class="pts-pill" id="ptsDisplay">⭐ 0</div></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="middle" id="middle">
        <div class="visual-card" id="visualCard"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="bottom">
        <div class="choices" id="choices"></div>
        <div class="progress-dots" id="progressDots"></div>
      </div>`;
  }
  buildDots(); showQuestion(); updatePtsDisplay();
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildDots() {
  const c = document.getElementById('progressDots'); c.innerHTML = '';
  sessionQ.forEach((q,i) => {
    const cls = q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';
    const d = document.createElement('div');
    d.className = `dot ${cls}`+(i===0?' current':''); d.id=`dot-${i}`; c.appendChild(d);
  });
}
function updateDot(idx, result) {
  const d = document.getElementById(`dot-${idx}`); if(!d) return;
  d.classList.remove('current'); d.classList.add('answered', result==='correct'?'correct-dot':'wrong-dot');
  const next = document.getElementById(`dot-${idx+1}`); if(next) next.classList.add('current');
}
function showQuestion() {
  const q = sessionQ[current];
  const badge = document.getElementById('levelBadge');
  if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}
  if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}
  if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}
  document.getElementById('progressFill').style.width=(current/15*100)+'%';
  document.getElementById('score').textContent=score;
  document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;
  document.getElementById('questionText').textContent=q.question;
  const shuffled=shuffle([...q.options]);
  const choicesEl=document.getElementById('choices'); choicesEl.innerHTML='';
  ['A','B','C'].forEach((letter,i) => {
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.dataset.value=shuffled[i];
    btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;
    btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx); choicesEl.appendChild(btn);
  });
  document.getElementById('gameScreen').classList.remove('shake');
}
function handleAnswer(chosen,correct,btn,fact,qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;
  if(isCorrect){
    score++; markMastered(qIdx); btn.classList.add('correct'); dotResults[current]='correct'; updateDot(current,'correct');
    document.getElementById('score').textContent=score; playCorrect(); spawnConfetti(35);
  } else {
    btn.classList.add('wrong'); dotResults[current]='wrong'; updateDot(current,'wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});
    document.getElementById('gameScreen').classList.add('shake'); playWrong();
  }
  setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);
}
let feedbackTimer=null, feedbackRafId=null;
function dismissFeedback(){
  cancelAnimationFrame(feedbackRafId); clearTimeout(feedbackTimer);
  const overlay=document.getElementById('feedbackOverlay');
  const b=document.getElementById('feedbackBox'); b.style.animation='slideUp 0.35s ease forwards';
  overlay.classList.add('dismiss'); overlay.classList.remove('clickable');
  setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);
}
function showFeedback(isCorrect, fact, chosen, correct) {
  clearTimeout(feedbackTimer); cancelAnimationFrame(feedbackRafId);
  const overlay=document.getElementById('feedbackOverlay'), box=document.getElementById('feedbackBox');
  const arc=document.getElementById('timerArc'), ring=document.getElementById('timerRing');
  const tapHint=document.getElementById('tapHint');
  const wrongDetail=document.getElementById('wrongDetail');
  const CIRC=100.5;
  if(isCorrect){
    const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title correct-text';
    box.className='feedback-box correct-box'; ring.className='timer-ring correct-ring';
    ring.style.display=''; tapHint.style.display='none'; wrongDetail.style.display='none';
  } else {
    const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title wrong-text';
    box.className='feedback-box wrong-box'; ring.className='timer-ring wrong-ring';
    ring.style.display='none'; tapHint.style.display='';
    document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;
    document.getElementById('wdChosen').textContent=chosen;
    document.getElementById('wdCorrect').textContent=correct;
    wrongDetail.style.display='';
  }
  document.getElementById('feedbackFact').textContent=fact;
  arc.style.strokeDashoffset='0'; overlay.classList.remove('dismiss'); overlay.classList.add('show');
  if(isCorrect){
    const duration=1200; const startTime=performance.now();
    function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}
    feedbackRafId=requestAnimationFrame(tickRing);
    feedbackTimer=setTimeout(dismissFeedback,duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click',dismissFeedback,{once:true});
  }
}
function advanceQuestion(){
  const prev=current; current++;
  if(prev===4){showLevelUp('medium');return;}
  if(prev===9){showLevelUp('hard');return;}
  if(current>=15){showEndScreen();return;}
  showQuestion();
}
function showLevelUp(level){
  const overlay=document.getElementById('levelupOverlay');
  if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — getting trickier!';}
  else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='🧠 Hard — only the best know these!';}
  overlay.classList.add('show'); playLevelUp(); spawnConfetti(60);
}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){
  const screen=document.getElementById('gameScreen');
  let rank,icon,msg,color;
  if(score>=13){rank='GENIUS';icon='🏆🧠⭐';msg='Outstanding! You\'re a true science scholar!';color='#f1c40f';}
  else if(score>=10){rank='EXPERT';icon='🌟💡🎯';msg='Excellent science knowledge!';color='#2ecc71';}
  else if(score>=7){rank='LEARNER';icon='👍📚😊';msg='Good effort! Keep exploring!';color='#e67e22';}
  else{rank='BEGINNER';icon='💪📖🌱';msg='Great start! Science is everywhere!';color='#e74c3c';}
  const e=dotResults.slice(0,5).filter(r=>r==='correct').length;
  const m=dotResults.slice(5,10).filter(r=>r==='correct').length;
  const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  let earned=0;
  if(e===5) earned+=1;
  if(m===5) earned+=3;
  if(h===5) earned+=6;
  if(earned>0) addPoints(earned);
  const tierRows=[
    e===5?'<span style="color:#4ade80">⭐ Easy +1✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐ Easy +1</span>',
    m===5?'<span style="color:#fbbf24">⭐⭐ Med +3✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐ Med +3</span>',
    h===5?'<span style="color:#f87171">⭐⭐⭐ Hard +6✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐⭐ Hard +6</span>',
  ].join('');
  let pointsHtml='';
  if(earned>0){
    pointsHtml=`<div style="background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.2));border:2px solid rgba(255,215,0,0.45);border-radius:16px;padding:10px 18px;text-align:center;">
      <div style="font-size:0.9rem;margin-bottom:5px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">${tierRows}</div>
      <div style="color:#ffd700;font-size:1.15rem;font-weight:700;">+${earned} point${earned===1?'':'s'} earned!</div>
      <div style="color:rgba(255,255,255,0.7);font-size:0.9rem;margin-top:3px;">Total: ⭐ ${getPoints()} points</div>
    </div>`;
  } else {
    pointsHtml=`<div style="text-align:center;">
      <div style="font-size:0.85rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:3px;">${tierRows}</div>
      <div style="color:rgba(255,215,0,0.5);font-size:0.85rem;">⭐ ${getPoints()} pts · Complete a full level to earn points</div>
    </div>`;
  }
  screen.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div>
      <div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div>
      <div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div>
      <div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>
      ${pointsHtml}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div>
        <div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div>
        <div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div>
      </div>
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">
        ${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}
      </div>
      <button class="action-btn" onclick="init()">🔄 Play Again!</button>
      <a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a>
    </div>`;
  spawnConfetti(score>=10?90:40);
}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){
  for(let i=0;i<count;i++){setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
init();
