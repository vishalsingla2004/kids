  { level:1, visual:'🧪', question:'What is the name for the orange-brown coating that forms on iron when it reacts with water and oxygen?', options:['Rust','Tarnish','Patina'], answer:'Rust', fact:'🧪 Rust is iron(III) oxide-hydroxide (FeOOH). It forms when iron, water, and oxygen react. Rust is flaky and falls off, exposing more iron — unlike the protective oxide on aluminium!' },
  { level:1, visual:'🌊', question:'What is the chemical formula for hydrogen peroxide?', options:['H₂O₂','H₂O','HO'], answer:'H₂O₂', fact:'🌊 Hydrogen peroxide (H₂O₂) is water with an extra oxygen atom. It decomposes into water and oxygen gas — that\'s the fizzing you see when it cleans a wound!' },
  { level:1, visual:'💎', question:'What are the two forms (allotropes) of pure carbon?', options:['Diamond and graphite','Coal and charcoal','Soot and oil'], answer:'Diamond and graphite', fact:'💎 Diamond is the hardest natural substance (used in cutting tools); graphite is soft and conducts electricity (used in pencils and lubricants). Same element, completely different structures and properties!' },
  { level:1, visual:'⚗️', question:'What is the symbol for the element with atomic number 1?', options:['H','He','Li'], answer:'H', fact:'⚗️ Atomic number 1 is hydrogen (H) — the simplest and lightest element, with just one proton and one electron. It is the building block from which all other elements were made in stars!' },
  { level:1, visual:'🔬', question:'What instrument is used to measure the mass of substances in a chemistry lab?', options:['Balance (scales)','Thermometer','Measuring cylinder'], answer:'Balance (scales)', fact:'🔬 An analytical balance can measure mass to 0.0001 g precision! Accurate mass measurements are essential in chemistry — a small error can ruin an entire experiment!' },
  { level:1, visual:'💧', question:'What instrument measures the volume of liquids in a lab?', options:['Measuring cylinder','Balance','Thermometer'], answer:'Measuring cylinder', fact:'💧 A measuring cylinder measures liquid volumes in millilitres (mL). You read it at eye level at the bottom of the meniscus (the curve of the liquid surface) for accuracy!' },
  { level:1, visual:'🧪', question:'In a chemical formula, what does the small subscript number mean? (e.g. H₂ in H₂O)', options:['The number of atoms of that element','The charge of the element','The mass of the element'], answer:'The number of atoms of that element', fact:'🧪 In H₂O, the "2" means there are 2 hydrogen atoms. CO₂ has 1 carbon and 2 oxygen atoms. Reading subscript numbers tells you exactly what is in a molecule!' },
  { level:1, visual:'⚛️', question:'Atoms of the same element with the same number of protons but DIFFERENT numbers of neutrons are called what?', options:['Isotopes','Ions','Allotropes'], answer:'Isotopes', fact:'⚛️ Carbon-12 and Carbon-14 are both carbon (6 protons) but have 6 and 8 neutrons respectively. Carbon-14 is radioactive and used in radiocarbon dating of ancient artefacts!' },
  { level:1, visual:'🌿', question:'What process do green plants use to make their own food using sunlight, water, and carbon dioxide?', options:['Photosynthesis','Respiration','Combustion'], answer:'Photosynthesis', fact:'🌿 Photosynthesis: 6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂. Plants are essentially solar-powered chemical factories that produce oxygen as a by-product!' },
  { level:1, visual:'🫁', question:'What chemical process in cells breaks down glucose to release energy?', options:['Respiration','Photosynthesis','Fermentation'], answer:'Respiration', fact:'🫁 Cellular respiration: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + energy. Every cell in your body does this continuously to power all life processes!' },
  { level:1, visual:'🔬', question:'What is the chemical symbol for the element Silicon?', options:['Si','Sc','Sl'], answer:'Si', fact:'🔬 Silicon (Si) is the second most abundant element in Earth\'s crust and the foundation of the semiconductor industry. Computer chips are made of ultra-pure silicon!' },
  { level:1, visual:'🌡️', question:'What is the Kelvin scale used for in chemistry?', options:['Measuring absolute temperature','Measuring mass','Measuring pH'], answer:'Measuring absolute temperature', fact:'🌡️ The Kelvin scale starts at absolute zero (-273.15°C), the coldest possible temperature. 0 K means no thermal energy at all. Scientists use Kelvin in gas law calculations!' },
  { level:1, visual:'⚗️', question:'What colour is a NEUTRAL solution on universal indicator?', options:['Green','Red','Purple'], answer:'Green', fact:'⚗️ Universal indicator turns green at pH 7 (neutral), red/orange for acids, and blue/purple for alkalis. It\'s a mixture of several indicators that change colour at different pH values!' },
  { level:1, visual:'🍋', question:'What colour does universal indicator turn in an ACIDIC solution?', options:['Red or orange','Blue or purple','Green'], answer:'Red or orange', fact:'🍋 Strong acids (pH 1-3) turn universal indicator red; weak acids (pH 4-6) turn it orange or yellow. The more acidic, the more red the colour becomes!' },
  { level:1, visual:'🧼', question:'What colour does universal indicator turn in an ALKALINE solution?', options:['Blue or purple','Red or orange','Green'], answer:'Blue or purple', fact:'🧼 Weak alkalis (pH 8-10) turn universal indicator blue; strong alkalis (pH 11-14) turn it purple/violet. Oven cleaner is about pH 13 — very strongly alkaline!' },
  { level:1, visual:'🌬️', question:'What percentage of Earth\'s atmosphere is oxygen?', options:['21%','78%','1%'], answer:'21%', fact:'🌬️ Oxygen makes up about 21% of the atmosphere — just the right amount. If it were much higher, fires would be uncontrollable; much lower and life would be impossible!' },
  { level:1, visual:'🌱', question:'What percentage of Earth\'s atmosphere is nitrogen?', options:['78%','21%','50%'], answer:'78%', fact:'🌱 Nitrogen makes up 78% of the air but most organisms cannot use it directly. Nitrogen-fixing bacteria in soil convert N₂ into forms plants can absorb!' },
  { level:1, visual:'🧪', question:'What is the chemical formula for ammonia?', options:['NH₃','NO₂','N₂H'], answer:'NH₃', fact:'🧪 Ammonia (NH₃) is made industrially by the Haber process (N₂ + H₂). It is used in fertilisers that feed about half the world\'s population — and it smells strongly!' },
  { level:1, visual:'💧', question:'What is the chemical formula for sulfuric acid?', options:['H₂SO₄','HCl','HNO₃'], answer:'H₂SO₄', fact:'💧 Sulfuric acid (H₂SO₄) is the most widely produced industrial chemical in the world. It is used in fertiliser production, car batteries, and many chemical manufacturing processes!' },
  { level:1, visual:'🔬', question:'What is the chemical formula for hydrochloric acid?', options:['HCl','H₂SO₄','HNO₃'], answer:'HCl', fact:'🔬 Hydrochloric acid (HCl) is the acid naturally found in your stomach (gastric acid). It helps digest food and kill harmful bacteria you swallow with food!' },
  { level:1, visual:'🌿', question:'What gas is produced when an acid reacts with a carbonate?', options:['Carbon dioxide','Oxygen','Hydrogen'], answer:'Carbon dioxide', fact:'🌿 Acid + carbonate → salt + water + CO₂. The CO₂ gas makes the mixture fizz. This is why limestone (calcium carbonate) fizzes when acid rain falls on it!' },
  { level:1, visual:'⚡', question:'What gas is produced when an acid reacts with a metal?', options:['Hydrogen','Oxygen','Carbon dioxide'], answer:'Hydrogen', fact:'⚡ Acid + metal → salt + hydrogen. Zinc in sulfuric acid produces zinc sulfate and H₂ gas. The "squeaky pop" test confirms hydrogen — a burning splint pops!' },
  { level:1, visual:'🧂', question:'What type of compound is always produced when an acid reacts with a base?', options:['A salt','A gas','A metal'], answer:'A salt', fact:'🧂 Acid + base → salt + water. NaCl (table salt) is just one example. Many salts have important uses: copper sulfate (fungicide), calcium carbonate (chalk), and more!' },
  { level:1, visual:'📋', question:'Who created the first periodic table?', options:['Dmitri Mendeleev','Antoine Lavoisier','John Dalton'], answer:'Dmitri Mendeleev', fact:'📋 Russian chemist Dmitri Mendeleev published his periodic table in 1869, arranging elements by atomic mass. He even left gaps for undiscovered elements and predicted their properties accurately!' },
  { level:1, visual:'⚗️', question:'What is the chemical symbol for Radon?', options:['Rn','Ra','Rd'], answer:'Rn', fact:'⚗️ Radon (Rn) is a radioactive noble gas that seeps naturally from the ground in some areas. It can build up in basements and is a significant cause of lung cancer!' },
  { level:1, visual:'🔋', question:'What is the chemical symbol for Uranium?', options:['U','Un','Ur'], answer:'U', fact:'🔋 Uranium (U) is a heavy radioactive metal used as nuclear fuel. Nuclear power stations split uranium atoms (fission) to produce enormous amounts of energy with no CO₂ emissions!' },
  { level:1, visual:'🌊', question:'Seawater is an example of what type of mixture?', options:['A solution','A suspension','A pure compound'], answer:'A solution', fact:'🌊 Seawater is a solution — salt and minerals dissolved in water. About 3.5% of seawater is dissolved salts. Desalination plants remove the salt to produce drinking water!' },
  { level:1, visual:'☕', question:'What happens to sugar when it is heated strongly (caramelised)? Is it a physical or chemical change?', options:['Chemical change','Physical change','No change'], answer:'Chemical change', fact:'☕ Caramelisation breaks down sugar molecules into hundreds of new compounds, creating the brown colour and complex flavour. New substances form — so it is definitely a chemical change!' },
  { level:1, visual:'🧲', question:'Is magnetism a physical or chemical property?', options:['Physical property','Chemical property','Nuclear property'], answer:'Physical property', fact:'🧲 Magnetism is a physical property — iron can be magnetised or demagnetised without changing its chemical identity. Chemical properties describe how a substance REACTS with other substances!' },
  { level:1, visual:'✏️', question:'What element makes up most of the "lead" in a pencil?', options:['Carbon (graphite)','Lead','Silver'], answer:'Carbon (graphite)', fact:'✏️ Pencil "leads" are actually a mixture of graphite (a form of carbon) and clay. Real lead was used historically but is toxic — graphite replaced it and the name just stuck!' },
  { level:1, visual:'💎', question:'What element is diamond made of?', options:['Carbon','Silicon','Aluminium'], answer:'Carbon', fact:'💎 Diamond is pure carbon atoms bonded in a rigid 3D network — the strongest natural material. Graphite is also pure carbon but with a layered structure, making it soft and slippery!' },
  { level:1, visual:'🌱', question:'What is the chemical formula for glucose?', options:['C₆H₁₂O₆','C₂H₅OH','CH₄'], answer:'C₆H₁₂O₆', fact:'🌱 Glucose is the simplest sugar and the primary energy source for all living cells. Plants make it during photosynthesis; your digestive system breaks down carbohydrates into glucose!' },
  { level:1, visual:'🔥', question:'What two products are always formed in the complete combustion of a hydrocarbon?', options:['Carbon dioxide and water','Oxygen and hydrogen','Carbon monoxide and ash'], answer:'Carbon dioxide and water', fact:'🔥 Complete combustion: fuel + plenty of O₂ → CO₂ + H₂O. Incomplete combustion (not enough oxygen) produces toxic carbon monoxide (CO) and black carbon soot!' },
  { level:1, visual:'🧴', question:'What is a polymer?', options:['A very long chain molecule made of repeating units','A type of acid','A noble gas'], answer:'A very long chain molecule made of repeating units', fact:'🧴 Polymers are giant molecules. Plastics like polyethylene, natural rubber, starch, and DNA are all polymers. The small repeating unit is called a monomer!' },
  { level:1, visual:'🌿', question:'What is fermentation?', options:['Yeast converting sugars into alcohol and CO₂','Metals reacting with oxygen','Salt dissolving in water'], answer:'Yeast converting sugars into alcohol and CO₂', fact:'🌿 Fermentation: C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂. Yeast does this without oxygen. Bread rises because of the CO₂ bubbles; beer and wine form because of the ethanol produced!' },
  { level:1, visual:'⚗️', question:'What do we call a reaction where a substance reacts with oxygen?', options:['Oxidation','Reduction','Neutralisation'], answer:'Oxidation', fact:'⚗️ Oxidation involves the gain of oxygen (or loss of electrons). Rusting, burning, and tarnishing are all oxidation reactions. Antioxidants in food prevent oxidation and spoilage!' },
  { level:1, visual:'🔋', question:'What does a catalyst do in a chemical reaction?', options:['Speeds up the reaction without being used up','Slows down the reaction','Provides energy for the reaction'], answer:'Speeds up the reaction without being used up', fact:'🔋 Catalysts lower the activation energy needed to start a reaction. Enzymes are biological catalysts — your body uses thousands of different enzymes to control every chemical reaction in your cells!' },
  { level:1, visual:'🌡️', question:'What is the name for the energy that must be supplied to start a chemical reaction?', options:['Activation energy','Potential energy','Kinetic energy'], answer:'Activation energy', fact:'🌡️ Even exothermic (heat-releasing) reactions need a spark of activation energy to get started. Striking a match provides enough activation energy to ignite the match head!' },
  { level:1, visual:'⚛️', question:'What is the relative charge of an electron?', options:['-1','0','+1'], answer:'-1', fact:'⚛️ Electrons have a charge of -1, protons have +1, and neutrons have 0. In a neutral atom, the number of electrons always equals the number of protons, balancing the charges!' },
  { level:1, visual:'🔬', question:'In a neutral atom, how does the number of protons compare to the number of electrons?', options:['They are equal','Protons outnumber electrons','Electrons outnumber protons'], answer:'They are equal', fact:'🔬 A neutral atom has equal numbers of protons (positive) and electrons (negative), so the charges cancel out. Gain an electron and it becomes a negative ion; lose one and it becomes positive!' },

  // ── NEW MEDIUM (level 2) ── questions 51–167 ────────────────────────────────
  { level:2, visual:'🔥', question:'What are the four main factors that can increase the RATE of a chemical reaction?', options:['Temperature, concentration, surface area, catalyst','Colour, smell, taste, texture','Mass, volume, density, pressure'], answer:'Temperature, concentration, surface area, catalyst', fact:'🔥 More heat = more energetic collisions. Higher concentration = more particles colliding. Greater surface area = more collisions. A catalyst lowers activation energy. All four speed reactions up!' },
  { level:2, visual:'🍞', question:'Why does bread dough rise when yeast is added?', options:['Yeast produces CO₂ gas through fermentation','Yeast adds oxygen to the dough','Yeast produces heat that expands the dough'], answer:'Yeast produces CO₂ gas through fermentation', fact:'🍞 Yeast ferments sugars in the dough, producing CO₂ bubbles that get trapped in the gluten network and make the dough rise. Baking then kills the yeast and sets the bread\'s structure!' },
  { level:2, visual:'🧪', question:'What is the name of the process of passing electricity through a solution or molten compound to cause a chemical reaction?', options:['Electrolysis','Distillation','Chromatography'], answer:'Electrolysis', fact:'🧪 Electrolysis is used to extract aluminium from bauxite ore, purify copper, and electroplate objects with thin metal coatings. It was one of the great discoveries of early chemistry!' },
  { level:2, visual:'⚡', question:'In electrolysis, towards which electrode do POSITIVE ions (cations) move?', options:['Cathode (negative electrode)','Anode (positive electrode)','Neither electrode'], answer:'Cathode (negative electrode)', fact:'⚡ Opposites attract! Positive cations migrate to the negative cathode where they gain electrons (are reduced). Negative anions move to the positive anode where they lose electrons (are oxidised)!' },
  { level:2, visual:'🔋', question:'In electrolysis, towards which electrode do NEGATIVE ions (anions) move?', options:['Anode (positive electrode)','Cathode (negative electrode)','The middle of the solution'], answer:'Anode (positive electrode)', fact:'🔋 Anions (negative ions) are attracted to the positive anode. In electrolysis of brine (salty water), chloride ions move to the anode and are discharged as chlorine gas!' },
  { level:2, visual:'🌡️', question:'How does INCREASING temperature affect the rate of a reaction?', options:['It increases the rate by giving particles more energy','It decreases the rate','It has no effect'], answer:'It increases the rate by giving particles more energy', fact:'🌡️ A 10°C rise roughly DOUBLES the reaction rate. More heat = faster particles = more frequent collisions AND more collisions with enough energy to overcome the activation energy barrier!' },
  { level:2, visual:'🔍', question:'How does INCREASING surface area affect the rate of a reaction?', options:['It increases the rate by exposing more particles to react','It decreases the rate','It has no effect'], answer:'It increases the rate by exposing more particles to react', fact:'🔍 Powdered chalk reacts much faster with acid than a whole piece because powder has a far greater surface area. Coal dust explosions in mines are deadly because of this effect!' },
  { level:2, visual:'🧪', question:'What technique uses the different solubility of substances to separate a mixture by passing it through a liquid along paper or gel?', options:['Chromatography','Distillation','Filtration'], answer:'Chromatography', fact:'🧪 Chromatography separates the dyes in inks and pigments in plants. Each component travels a different distance. Police use it to analyse drugs; food scientists use it to check food dyes!' },
  { level:2, visual:'💧', question:'What technique separates an INSOLUBLE solid from a liquid by passing the mixture through filter paper?', options:['Filtration','Distillation','Evaporation'], answer:'Filtration', fact:'💧 In filtration, the filter paper acts like a sieve — particles too large to pass through are trapped (the residue) while the liquid flows through (the filtrate). Water treatment plants use this!' },
  { level:2, visual:'♨️', question:'What technique separates a SOLUBLE solid from a solution by heating to remove the solvent?', options:['Evaporation','Filtration','Distillation'], answer:'Evaporation', fact:'♨️ Evaporation drives off the liquid solvent, leaving the dissolved solid behind. Salt pans use sunlight to evaporate seawater, leaving salt crystals. This technique is thousands of years old!' },
  { level:2, visual:'🌡️', question:'What technique separates two or more LIQUIDS with different boiling points?', options:['Distillation','Filtration','Chromatography'], answer:'Distillation', fact:'🌡️ In distillation, the liquid with the lowest boiling point evaporates first, travels through a condenser, and is collected separately. It\'s used to purify water and make spirits like whisky!' },
  { level:2, visual:'💎', question:'What technique grows large, pure crystals from a saturated solution by slow cooling?', options:['Crystallisation','Filtration','Distillation'], answer:'Crystallisation', fact:'💎 As a hot saturated solution cools, solubility decreases and pure crystals slowly grow. Beautiful crystals like copper sulfate (blue) and alum (clear) can be grown this way in the lab!' },
  { level:2, visual:'🔥', question:'What colour flame does sodium (Na) produce in a flame test?', options:['Bright yellow','Lilac/violet','Brick red'], answer:'Bright yellow', fact:'🔥 Sodium produces a characteristically vivid yellow-orange flame. Even tiny traces of sodium give a strong yellow colour — that\'s why many flames from cooking look yellow (sodium from food!)' },
  { level:2, visual:'🔥', question:'What colour flame does potassium (K) produce in a flame test?', options:['Lilac/violet','Bright yellow','Brick red'], answer:'Lilac/violet', fact:'🔥 Potassium burns with a distinctive lilac or violet flame. Flame tests are a quick qualitative way to identify which metal ions are present in a sample!' },
  { level:2, visual:'🔥', question:'What colour flame does copper (Cu) produce in a flame test?', options:['Blue-green','Bright yellow','Crimson red'], answer:'Blue-green', fact:'🔥 Copper compounds burn with a distinctive blue-green flame. Fireworks use copper salts for blue/green colours, barium for green, and strontium for red!' },
  { level:2, visual:'🔥', question:'What colour flame does calcium (Ca) produce in a flame test?', options:['Brick red/orange-red','Lilac','Yellow'], answer:'Brick red/orange-red', fact:'🔥 Calcium gives a brick-red or orange-red flame. The flame test works because metal ions absorb energy and emit it as light of a specific colour when electrons return to lower energy levels!' },
  { level:2, visual:'🔬', question:'What is the name for a reaction where one element takes the place of another in a compound, because it is more reactive?', options:['Displacement reaction','Synthesis reaction','Neutralisation'], answer:'Displacement reaction', fact:'🔬 Zinc displaces copper from copper sulfate solution: Zn + CuSO₄ → ZnSO₄ + Cu. The blue solution turns colourless as copper metal appears, because zinc is more reactive than copper!' },
  { level:2, visual:'📊', question:'What is the reactivity series in chemistry?', options:['A list of metals ranked from most to least reactive','A list of acids ranked by strength','A list of elements in order of atomic number'], answer:'A list of metals ranked from most to least reactive', fact:'📊 The reactivity series: K > Na > Ca > Mg > Al > Zn > Fe > Pb > Cu > Ag > Au. More reactive metals displace less reactive ones from solutions and react more vigorously with acid and water!' },
  { level:2, visual:'🧲', question:'Which metal is at the TOP of the reactivity series (most reactive)?', options:['Potassium (K)','Gold (Au)','Iron (Fe)'], answer:'Potassium (K)', fact:'🧲 Potassium reacts explosively with cold water, catching fire and skating across the surface! The most reactive metals are too dangerous to encounter in everyday life.' },
  { level:2, visual:'🏅', question:'Which metal is at the BOTTOM of the reactivity series (least reactive)?', options:['Gold (Au)','Iron (Fe)','Sodium (Na)'], answer:'Gold (Au)', fact:'🏅 Gold is so unreactive it never tarnishes or corrodes — that\'s why ancient gold artefacts still look perfect thousands of years later. Platinum is the only common metal less reactive than gold!' },
  { level:2, visual:'🦀', question:'What do we call the process where metals slowly corrode by reacting with water and oxygen?', options:['Oxidation/corrosion','Neutralisation','Reduction'], answer:'Oxidation/corrosion', fact:'🦀 Corrosion costs the global economy trillions of dollars each year. Iron rusts, copper turns green (verdigris), and silver tarnishes. Stainless steel resists corrosion because chromium forms a protective oxide layer!' },
  { level:2, visual:'🧪', question:'What is a reversible reaction?', options:['A reaction that can proceed in both forward and reverse directions','A reaction that can only go in one direction','A reaction that releases heat'], answer:'A reaction that can proceed in both forward and reverse directions', fact:'🧪 Reversible reactions use a ⇌ symbol. Many industrial processes involve reversible reactions. The Haber process (making ammonia) is reversible — chemists must balance conditions to maximise yield!' },
  { level:2, visual:'⚖️', question:'What symbol is used in a chemical equation to show a REVERSIBLE reaction?', options:['⇌ (double arrow)','→ (single arrow)','= (equals sign)'], answer:'⇌ (double arrow)', fact:'⚖️ The double arrow (⇌) shows that the reaction goes in both directions simultaneously. At equilibrium, the forward and reverse rates are equal — but the reaction has NOT stopped!' },
  { level:2, visual:'🌡️', question:'What is the approximate pH of stomach acid (hydrochloric acid)?', options:['1-2','7','11-12'], answer:'1-2', fact:'🌡️ Stomach acid has a pH of about 1-2 — highly acidic! This helps digest proteins and kill pathogens. The stomach lining produces mucus to protect itself from being dissolved by its own acid!' },
  { level:2, visual:'🧼', question:'What is the approximate pH of household bleach?', options:['11-13','7','1-2'], answer:'11-13', fact:'🧼 Bleach (sodium hypochlorite) is strongly alkaline with a pH of about 11-13. Its oxidising properties destroy the colour of stains and kill bacteria. NEVER mix bleach with acidic cleaners!' },
  { level:2, visual:'🍋', question:'What is the approximate pH of lemon juice?', options:['2-3','7','10'], answer:'2-3', fact:'🍋 Lemon juice has a pH of about 2-3 due to citric acid. Compare this to your stomach acid (pH 1-2) — your stomach is actually more acidic than pure lemon juice!' },
  { level:2, visual:'🧴', question:'What is the approximate pH of baking soda solution?', options:['8-9','7','2-3'], answer:'8-9', fact:'🧴 Baking soda (sodium bicarbonate) dissolves to give a mildly alkaline solution of about pH 8-9. It\'s used in indigestion remedies because it neutralises excess stomach acid (pH 1-2)!' },
  { level:2, visual:'💧', question:'What property makes water the "universal solvent"?', options:['Its polarity allows it to dissolve many ionic and polar substances','Its low boiling point','Its low density'], answer:'Its polarity allows it to dissolve many ionic and polar substances', fact:'💧 Water\'s polar O-H bonds create regions of slight positive and negative charge. These attract and surround ions and polar molecules, pulling them apart and dissolving them!' },
  { level:2, visual:'🧪', question:'What is the technique used to find the exact volume of acid needed to neutralise a base (or vice versa)?', options:['Titration','Distillation','Electrolysis'], answer:'Titration', fact:'🧪 In a titration, acid is carefully added from a burette into a flask of base containing an indicator. When the indicator changes colour (the endpoint), neutralisation is complete — the volumes tell you the concentrations!' },
  { level:2, visual:'🌈', question:'What colour does methyl orange indicator turn in an ACIDIC solution?', options:['Red/pink','Yellow','Blue'], answer:'Red/pink', fact:'🌈 Methyl orange is yellow in neutral/alkaline solutions and turns red/pink in acid. It changes colour between pH 3.1 and 4.4 — useful for titrations involving strong acids!' },
  { level:2, visual:'🌿', question:'What do we call the smallest particle of a covalently bonded substance?', options:['Molecule','Ion','Atom'], answer:'Molecule', fact:'🌿 Covalent substances form discrete molecules — H₂O, CO₂, CH₄. Each molecule is a discrete group of atoms sharing electrons. Ionic substances (like NaCl) form giant lattices, not molecules!' },
  { level:2, visual:'🧂', question:'What type of structure do ionic compounds form?', options:['Giant ionic lattice','Small molecules','Metallic lattice'], answer:'Giant ionic lattice', fact:'🧂 In NaCl, millions of Na⁺ and Cl⁻ ions are arranged in a regular 3D lattice. Strong electrostatic forces in all directions give ionic compounds high melting points and hardness!' },
  { level:2, visual:'⚡', question:'Why can ionic compounds conduct electricity when DISSOLVED or MELTED but not as a solid?', options:['In solution/melt, ions are free to move and carry charge','Solids contain no ions','Electricity decomposes ionic solids'], answer:'In solution/melt, ions are free to move and carry charge', fact:'⚡ In solid NaCl, ions are fixed in the lattice and cannot move. When melted or dissolved, ions become free to migrate towards electrodes, carrying electrical current!' },
  { level:2, visual:'🔗', question:'Why do covalent molecular compounds generally have LOW melting and boiling points?', options:['Weak intermolecular forces between molecules are easy to overcome','Their molecules are very small','They contain no electrons'], answer:'Weak intermolecular forces between molecules are easy to overcome', fact:'🔗 Covalent bonds within molecules are strong, but the forces BETWEEN separate molecules (van der Waals, hydrogen bonds) are much weaker. Little energy is needed to separate the molecules!' },
  { level:2, visual:'💎', question:'Why does diamond have such a VERY HIGH melting point?', options:['Each carbon atom is covalently bonded to 4 others in a giant 3D network','It is an ionic compound','It has many free electrons'], answer:'Each carbon atom is covalently bonded to 4 others in a giant 3D network', fact:'💎 Diamond is a giant covalent structure — breaking it requires breaking millions of very strong C-C covalent bonds. Its melting point exceeds 3,500°C. That\'s why it\'s used in cutting tools!' },
  { level:2, visual:'⚗️', question:'What is oxidation in terms of electrons?', options:['Loss of electrons','Gain of electrons','No change in electrons'], answer:'Loss of electrons', fact:'⚗️ OIL: Oxidation Is Loss (of electrons). When iron forms rust, each Fe atom loses electrons to become Fe²⁺ or Fe³⁺ ions. This electron loss is oxidation!' },
  { level:2, visual:'🔋', question:'What is reduction in terms of electrons?', options:['Gain of electrons','Loss of electrons','Transfer of protons'], answer:'Gain of electrons', fact:'🔋 RIG: Reduction Is Gain (of electrons). In a battery, the cathode material gains electrons from the circuit, reducing metal ions back to metal atoms. Reduction and oxidation always occur together (redox)!' },
  { level:2, visual:'🌡️', question:'What do we call a substance that speeds up a reaction but is not consumed and can be recovered unchanged?', options:['Catalyst','Reactant','Product'], answer:'Catalyst', fact:'🌡️ Catalysts provide an alternative reaction pathway with lower activation energy. Platinum catalyst in a catalytic converter speeds up the conversion of toxic car exhaust gases at lower temperatures!' },
  { level:2, visual:'🧬', question:'What is the name of the process used to produce ammonia from nitrogen and hydrogen on an industrial scale?', options:['Haber process','Contact process','Solvay process'], answer:'Haber process', fact:'🧬 The Haber process: N₂ + 3H₂ ⇌ 2NH₃ (450°C, 200 atm, iron catalyst). Fritz Haber and Carl Bosch developed it — the ammonia produced feeds roughly half of humanity through fertilisers!' },
  { level:2, visual:'⚗️', question:'What is the Contact process used to make?', options:['Sulfuric acid (H₂SO₄)','Ammonia (NH₃)','Chlorine (Cl₂)'], answer:'Sulfuric acid (H₂SO₄)', fact:'⚗️ The Contact process converts SO₂ to SO₃ using a vanadium pentoxide catalyst, then SO₃ reacts with water to make H₂SO₄. Sulfuric acid is the world\'s most produced industrial chemical!' },
  { level:2, visual:'🌊', question:'What products form when an acid reacts with a metal carbonate?', options:['Salt, water, and carbon dioxide','Salt and hydrogen','Salt and oxygen'], answer:'Salt, water, and carbon dioxide', fact:'🌊 Acid + carbonate → salt + water + CO₂. HCl + CaCO₃ → CaCl₂ + H₂O + CO₂. The fizzing you hear is carbon dioxide escaping. This reaction causes acid rain to dissolve limestone buildings!' },
  { level:2, visual:'🔥', question:'What type of reaction produces water and a salt from an acid and an alkali?', options:['Neutralisation','Combustion','Decomposition'], answer:'Neutralisation', fact:'🔥 Acid + Alkali → Salt + Water. HCl + NaOH → NaCl + H₂O. The H⁺ ions from the acid combine with the OH⁻ ions from the alkali to form water. The remaining ions form the salt!' },
  { level:2, visual:'📐', question:'In a chemical equation, what does it mean when you "balance" an equation?', options:['Ensure the number of each type of atom is the same on both sides','Make all the numbers equal','Write the equation twice'], answer:'Ensure the number of each type of atom is the same on both sides', fact:'📐 Balancing equations follows the Law of Conservation of Mass — atoms are rearranged but never created or destroyed. H₂ + O₂ → H₂O is unbalanced; 2H₂ + O₂ → 2H₂O is balanced!' },
  { level:2, visual:'🧪', question:'What is the term for the minimum amount of energy particles need for a collision to result in a reaction?', options:['Activation energy','Enthalpy','Reaction energy'], answer:'Activation energy', fact:'🧪 Only collisions with energy equal to or greater than the activation energy result in a reaction. Catalysts lower this threshold, allowing more particles to react at a given temperature!' },
  { level:2, visual:'⚖️', question:'What is meant by the "yield" of a chemical reaction?', options:['The amount of product actually obtained','The speed of the reaction','The energy released'], answer:'The amount of product actually obtained', fact:'⚖️ Yield is usually expressed as a percentage: (actual yield ÷ theoretical yield) × 100%. Industrial chemists work hard to maximise yield while minimising waste, energy, and cost!' },
  { level:2, visual:'🌱', question:'What do we call a reaction where the oxidation number of atoms increases?', options:['Oxidation','Reduction','Neutralisation'], answer:'Oxidation', fact:'🌱 When oxidation numbers increase, the substance has lost electron density — it\'s been oxidised. Carbon burning in oxygen: C (0) → CO₂ (carbon is +4). The carbon is oxidised!' },
  { level:2, visual:'🔬', question:'What instrument measures pH directly by detecting hydrogen ion concentration?', options:['pH meter','Thermometer','Burette'], answer:'pH meter', fact:'🔬 A pH meter uses a glass electrode sensitive to H⁺ concentration. Digital pH meters give readings to 0.01 pH units — far more precise than indicator paper or universal indicator solution!' },
  { level:2, visual:'💧', question:'What happens when a concentrated solution is DILUTED?', options:['The concentration decreases as more solvent is added','The amount of solute decreases','The solute evaporates'], answer:'The concentration decreases as more solvent is added', fact:'💧 Dilution adds more solvent, spreading the same amount of solute through a larger volume. The number of solute particles doesn\'t change — they are just further apart! Concentration = moles ÷ volume.' },
  { level:2, visual:'🌡️', question:'What is the unit for measuring the concentration of a solution in moles per litre?', options:['mol/L (or mol dm⁻³)','g/mL','kg/m³'], answer:'mol/L (or mol dm⁻³)', fact:'🌡️ Molar concentration (mol/L) tells you how many moles of solute are dissolved in each litre of solution. A 1 mol/L NaCl solution contains 58.5 g of NaCl per litre!' },
  { level:2, visual:'⚗️', question:'What is an INDICATOR in chemistry?', options:['A substance that changes colour according to pH','A type of electrode','A catalyst'], answer:'A substance that changes colour according to pH', fact:'⚗️ Indicators are weak acids or bases that have one colour in acidic conditions and another in alkaline conditions. Litmus, phenolphthalein, and methyl orange are all common lab indicators!' },
  { level:2, visual:'🔩', question:'Why is steel harder and stronger than pure iron?', options:['Carbon atoms in steel disrupt the regular iron lattice, preventing layers from sliding','Steel contains more protons','Steel is a different element from iron'], answer:'Carbon atoms in steel disrupt the regular iron lattice, preventing layers from sliding', fact:'🔩 Pure iron has layers of atoms that can slide over each other easily. Adding 0.1-2% carbon introduces atoms of different sizes, locking the layers together and making it much harder!' },
  { level:2, visual:'⚙️', question:'What is the name for a mixture of metals (or a metal with a non-metal) designed to have improved properties?', options:['Alloy','Compound','Solution'], answer:'Alloy', fact:'⚙️ Alloys are designed for specific jobs. Stainless steel (Fe+Cr+Ni) resists corrosion. Duralumin (Al+Cu) is light but strong for aircraft. Solder (Sn+Pb) melts easily for electronics!' },
  { level:2, visual:'🌊', question:'What is the process called where crude oil is separated into fractions based on boiling point?', options:['Fractional distillation','Simple distillation','Chromatography'], answer:'Fractional distillation', fact:'🌊 In a fractionating column, crude oil is heated; different fractions condense at different heights. Petrol, diesel, kerosene, and lubricating oil are all separated this way from crude oil!' },
  { level:2, visual:'🧴', question:'What are the main products of the fractional distillation of crude oil used for?', options:['Fuels and making plastics','Making food and medicine','Purifying water'], answer:'Fuels and making plastics', fact:'🧴 Crude oil fractions are the raw materials for petrol, diesel, jet fuel, heating oil, and petrochemicals used to make plastics, synthetic fibres, and medicines. Modern life depends on them!' },
  { level:2, visual:'🔬', question:'What is a chemical formula that shows the actual number of atoms of each element in a molecule?', options:['Molecular formula','Empirical formula','Structural formula'], answer:'Molecular formula', fact:'🔬 The molecular formula gives exact atom counts. Benzene\'s molecular formula is C₆H₆ but its empirical formula is just CH. Molecular formulas are needed for mole calculations!' },
  { level:2, visual:'⚖️', question:'What is the term for using a balanced equation to calculate the amounts of reactants or products?', options:['Stoichiometry','Titration','Chromatography'], answer:'Stoichiometry', fact:'⚖️ Stoichiometry lets chemists predict how much product a reaction will make. If 2 moles of H₂ react with 1 mole of O₂, exactly 2 moles of H₂O form. These ratios come directly from the balanced equation!' },
  { level:2, visual:'🧪', question:'What do we call the reagent that is completely consumed first in a reaction, limiting the amount of product formed?', options:['Limiting reagent','Excess reagent','Catalyst'], answer:'Limiting reagent', fact:'🧪 If you mix 2 moles of H₂ with 2 moles of O₂ (need a 2:1 ratio), the H₂ runs out first — it is the limiting reagent. The O₂ is in excess. The limiting reagent determines maximum yield!' },
  { level:2, visual:'🌡️', question:'What is the difference between HEAT and TEMPERATURE?', options:['Heat is total energy; temperature is the average kinetic energy of particles','They are the same thing','Temperature is total energy; heat is average energy'], answer:'Heat is total energy; temperature is the average kinetic energy of particles', fact:'🌡️ A bathtub of warm water has more total heat energy than a tiny flame, even though the flame has a higher temperature. Temperature measures how hot something is; heat measures total thermal energy!' },
  { level:2, visual:'💧', question:'What is the name for the attraction between UNLIKE molecules (e.g. water and glass)?', options:['Adhesion','Cohesion','Surface tension'], answer:'Adhesion', fact:'💧 Adhesion is attraction between different substances. Water climbs up a narrow glass tube (capillary action) because it adheres to glass more than it coheres to itself. Plants use capillary action to transport water!' },
  { level:2, visual:'🌊', question:'What is the name for the attraction between LIKE molecules (e.g. water to water)?', options:['Cohesion','Adhesion','Diffusion'], answer:'Cohesion', fact:'🌊 Water molecules attract each other through hydrogen bonds — this cohesion creates surface tension. Insects like pond skaters can walk on water because the surface tension supports their weight!' },
  { level:2, visual:'⚗️', question:'What is the process called when a gas changes directly into a solid (skipping the liquid phase)?', options:['Deposition (reverse sublimation)','Condensation','Freezing'], answer:'Deposition (reverse sublimation)', fact:'⚗️ Deposition is the reverse of sublimation. Frost forms when water vapour deposits directly as ice crystals on cold surfaces. Snowflakes form by deposition of water vapour in clouds!' },
  { level:2, visual:'🔬', question:'What is the scientific term for the spreading of particles from an area of HIGH concentration to LOW concentration?', options:['Diffusion','Osmosis','Filtration'], answer:'Diffusion', fact:'🔬 Diffusion explains how smells travel across a room and how oxygen moves from lungs into blood. Particles always move down a concentration gradient — no energy needed!' },
  { level:2, visual:'💧', question:'What is osmosis in chemistry/biology?', options:['Movement of water through a semi-permeable membrane from low to high solute concentration','Movement of all solutes from high to low concentration','Evaporation of water'], answer:'Movement of water through a semi-permeable membrane from low to high solute concentration', fact:'💧 Osmosis is critical for life — plants absorb water from soil through osmosis. If you put a plant in very salty water, osmosis reverses and the plant wilts as water leaves its cells!' },
  { level:2, visual:'🧬', question:'What type of formula shows how atoms are bonded together, including which atoms are connected?', options:['Structural formula','Molecular formula','Empirical formula'], answer:'Structural formula', fact:'🧬 A structural formula shows every bond (usually as lines) between atoms. Ethanol C₂H₅OH becomes CH₃-CH₂-OH. Structural formulas are vital in organic chemistry to distinguish isomers!' },
  { level:2, visual:'🌿', question:'What type of bonding holds metal atoms together in a metallic structure?', options:['Metallic bonding (sea of electrons)','Ionic bonding','Covalent bonding'], answer:'Metallic bonding (sea of electrons)', fact:'🌿 In metals, atoms release their outer electrons into a "sea" that flows freely through the structure. These delocalised electrons explain why metals conduct electricity and heat so well!' },
  { level:2, visual:'⚡', question:'Why are metals MALLEABLE (can be hammered into shape)?', options:['Metal layers can slide over each other without breaking because the electron sea re-bonds them','Metal atoms are loosely held','Metal contains no fixed bonds'], answer:'Metal layers can slide over each other without breaking because the electron sea re-bonds them', fact:'⚡ When metal layers shift, the "electron sea" instantly re-forms bonds with the new arrangement. This prevents the material from shattering, unlike ionic crystals which crack when layers misalign!' },
  { level:2, visual:'🔬', question:'What is the difference between an exothermic and an endothermic reaction in terms of energy?', options:['Exothermic releases energy; endothermic absorbs energy','Exothermic absorbs energy; endothermic releases energy','Both release the same amount of energy'], answer:'Exothermic releases energy; endothermic absorbs energy', fact:'🔬 Exothermic reactions give out heat (temperature rises): burning, respiration. Endothermic reactions take in heat (temperature falls): cooking, photosynthesis. The sign of ΔH tells you which is which!' },

  // ── NEW HARD (level 3) ── questions 51–167 ──────────────────────────────────
  { level:3, visual:'⚛️', question:'What is the electron configuration of a carbon atom (atomic number 6)?', options:['2, 4','2, 6','4, 2'], answer:'2, 4', fact:'⚛️ Carbon has 6 electrons: 2 fill the first shell, 4 go in the second. Those 4 valence electrons allow carbon to form 4 bonds — the basis of the staggering diversity of organic chemistry!' },
  { level:3, visual:'⚛️', question:'What is the electron configuration of a sodium atom (atomic number 11)?', options:['2, 8, 1','2, 9','2, 8, 3'], answer:'2, 8, 1', fact:'⚛️ Sodium\'s single outer electron (2, 8, 1) is easily lost to form Na⁺. With a full outer shell of 8, Na⁺ is very stable — that\'s why sodium always forms +1 ions!' },
  { level:3, visual:'⚛️', question:'How many electrons fit in the FIRST electron shell of an atom?', options:['2','8','18'], answer:'2', fact:'⚛️ The first shell (n=1) holds a maximum of 2 electrons. That\'s why helium (2 electrons) has a complete first shell and is a stable noble gas. Hydrogen has 1 electron in this shell!' },
  { level:3, visual:'⚛️', question:'How many electrons fit in the SECOND electron shell of an atom?', options:['8','2','18'], answer:'8', fact:'⚛️ The second shell holds up to 8 electrons. Neon (10 electrons: 2+8) fills both shells completely — giving it exceptional stability and zero reactivity as a noble gas!' },
  { level:3, visual:'⚛️', question:'What is an isotope?', options:['An atom with the same number of protons but a different number of neutrons','An atom with a charge','An atom bonded to another'], answer:'An atom with the same number of protons but a different number of neutrons', fact:'⚛️ Carbon-12 (6p, 6n) and Carbon-14 (6p, 8n) are isotopes. Both are carbon; both react chemically the same. But C-14 is radioactive — used for dating ancient artefacts!' },
  { level:3, visual:'🔋', question:'Carbon-14 has a half-life of about 5,730 years. If you start with 100g, how much remains after 11,460 years?', options:['25g','50g','12.5g'], answer:'25g', fact:'🔋 After one half-life (5,730 yr): 100→50g. After two half-lives (11,460 yr): 50→25g. Radiocarbon dating uses this predictable decay to calculate the age of organic materials up to ~50,000 years old!' },
  { level:3, visual:'⚡', question:'What type of radioactive emission is a helium nucleus (2 protons, 2 neutrons) ejected from a heavy nucleus?', options:['Alpha (α) particle','Beta (β) particle','Gamma (γ) ray'], answer:'Alpha (α) particle', fact:'⚡ Alpha particles (⁴₂He) are the most ionising but least penetrating radiation — stopped by a sheet of paper or a few centimetres of air. Smoke detectors use tiny amounts of Am-241 emitting alpha particles!' },
  { level:3, visual:'⚡', question:'What type of radioactive emission is a fast-moving electron emitted from the nucleus?', options:['Beta (β) particle','Alpha (α) particle','Gamma (γ) ray'], answer:'Beta (β) particle', fact:'⚡ Beta particles form when a neutron converts to a proton + electron. They penetrate paper but are stopped by a few mm of aluminium. They are used in medical tracers and industrial thickness gauges!' },
  { level:3, visual:'⚡', question:'What type of radioactive emission is high-energy electromagnetic radiation from the nucleus?', options:['Gamma (γ) ray','Alpha (α) particle','Beta (β) particle'], answer:'Gamma (γ) ray', fact:'⚡ Gamma rays travel at the speed of light and can penetrate through the body. Several centimetres of lead or metres of concrete are needed to stop them. They are used in cancer radiotherapy and sterilising medical equipment!' },
  { level:3, visual:'⚛️', question:'What is the MASS NUMBER of an atom?', options:['The total number of protons plus neutrons','The number of protons only','The number of electrons'], answer:'The total number of protons plus neutrons', fact:'⚛️ Mass number = protons + neutrons. Carbon-14 has mass number 14 (6 protons + 8 neutrons). The superscript in ¹⁴C is the mass number; the subscript is the atomic number (6).' },
  { level:3, visual:'⚛️', question:'What is a CATION?', options:['A positively charged ion formed by LOSING electrons','A negatively charged ion','A neutral atom'], answer:'A positively charged ion formed by LOSING electrons', fact:'⚛️ Na → Na⁺ + e⁻. Sodium loses 1 electron to form Na⁺ (a cation). Metals typically form cations. The name comes from the Greek "katienai" meaning "to go down" (towards the cathode in electrolysis)!' },
  { level:3, visual:'⚛️', question:'What is an ANION?', options:['A negatively charged ion formed by GAINING electrons','A positively charged ion','A neutral molecule'], answer:'A negatively charged ion formed by GAINING electrons', fact:'⚛️ Cl + e⁻ → Cl⁻. Chlorine gains 1 electron to form Cl⁻ (an anion). Non-metals typically form anions. In electrolysis, anions migrate toward the positive anode!' },
  { level:3, visual:'🔗', question:'What is ionic bonding?', options:['Electrostatic attraction between oppositely charged ions formed by electron transfer','Sharing of electron pairs between two non-metal atoms','A sea of delocalised electrons holding metal atoms together'], answer:'Electrostatic attraction between oppositely charged ions formed by electron transfer', fact:'🔗 In NaCl, sodium donates its outer electron to chlorine. The resulting Na⁺ and Cl⁻ attract strongly. Ionic bonds are strong — NaCl melts at 801°C!' },
  { level:3, visual:'🔗', question:'What is covalent bonding?', options:['Sharing of electron pairs between non-metal atoms','Transfer of electrons between metal and non-metal','Attraction between a proton and electron'], answer:'Sharing of electron pairs between non-metal atoms', fact:'🔗 In H₂O, each hydrogen shares one electron pair with oxygen. Both atoms achieve stable full outer shells. Covalent bonds can be single (one pair), double (two pairs), or triple (three pairs)!' },
  { level:3, visual:'⚗️', question:'What is the first organic compound in the alkane series (simplest hydrocarbon)?', options:['Methane (CH₄)','Ethane (C₂H₆)','Propane (C₃H₈)'], answer:'Methane (CH₄)', fact:'⚗️ Methane is the simplest hydrocarbon — 1 carbon, 4 hydrogens. It\'s the main component of natural gas used for cooking and heating, and it\'s also produced by cows (a significant greenhouse gas)!' },
  { level:3, visual:'⚗️', question:'What is the molecular formula of ethane?', options:['C₂H₆','C₂H₄','C₂H₂'], answer:'C₂H₆', fact:'⚗️ Ethane (C₂H₆) is the second alkane. Alkanes have the general formula CₙH₂ₙ₊₂. Each carbon forms 4 single bonds. Alkanes are called "saturated" because they contain no double bonds!' },
  { level:3, visual:'⚗️', question:'What is the molecular formula of propane?', options:['C₃H₈','C₃H₆','C₃H₄'], answer:'C₃H₈', fact:'⚗️ Propane (C₃H₈) is used in camping gas stoves and BBQ cylinders. It liquefies under moderate pressure, making it easy to store and transport. Butane (C₄H₁₀) is used in cigarette lighters!' },
  { level:3, visual:'🔗', question:'What makes alkenes different from alkanes?', options:['Alkenes contain at least one C=C double bond (unsaturated)','Alkenes contain more hydrogen atoms','Alkenes are more stable than alkanes'], answer:'Alkenes contain at least one C=C double bond (unsaturated)', fact:'🔗 Alkenes are unsaturated — they have at least one C=C double bond. Ethene (C₂H₄) is the simplest alkene. The double bond makes alkenes much more reactive than alkanes — they undergo addition reactions!' },
  { level:3, visual:'🧪', question:'What reagent decolourises (turns from brown/orange to colourless) when added to an alkene, confirming unsaturation?', options:['Bromine water','Universal indicator','Litmus paper'], answer:'Bromine water', fact:'🧪 Bromine water (orange-brown) reacts with alkene double bonds in an addition reaction, making a colourless dibromo compound. Alkanes do NOT decolourise bromine water — a key distinguishing test!' },
  { level:3, visual:'🧬', question:'What are the monomers that make up proteins?', options:['Amino acids','Fatty acids','Nucleotides'], answer:'Amino acids', fact:'🧬 There are 20 different amino acids that can combine in any sequence to make proteins. The order of amino acids (determined by DNA) gives each protein its unique shape and function!' },
  { level:3, visual:'🧬', question:'What type of bond joins amino acids together in a protein chain?', options:['Peptide bond','Ionic bond','Hydrogen bond'], answer:'Peptide bond', fact:'🧬 A peptide bond forms by condensation (loss of water) between the -COOH of one amino acid and the -NH₂ of the next. Ribosomes in cells make these bonds continuously to build proteins!' },
  { level:3, visual:'🌿', question:'What is the Haber process temperature and catalyst?', options:['~450°C, iron catalyst','~200°C, platinum catalyst','~800°C, no catalyst'], answer:'~450°C, iron catalyst', fact:'🌿 The Haber process uses 450°C (a compromise — higher temp favours speed but lower temp favours yield), 200 atm pressure, and an iron catalyst to make NH₃ from N₂ and H₂.' },
  { level:3, visual:'⚖️', question:'In the Haber process (N₂ + 3H₂ ⇌ 2NH₃), what happens if you INCREASE pressure?', options:['Equilibrium shifts right (towards NH₃) — yield increases','Equilibrium shifts left — yield decreases','No effect'], answer:'Equilibrium shifts right (towards NH₃) — yield increases', fact:'⚖️ There are 4 mol of gas on the left (1+3) but only 2 on the right. Higher pressure favours fewer gas molecules — the right side. This is why 200 atm pressure is used in the Haber process!' },
  { level:3, visual:'📈', question:'What is ionisation energy?', options:['Energy needed to remove one mole of electrons from one mole of gaseous atoms','Energy released when an atom gains an electron','Energy needed to break a covalent bond'], answer:'Energy needed to remove one mole of electrons from one mole of gaseous atoms', fact:'📈 First ionisation energy: X(g) → X⁺(g) + e⁻. It increases across a period (more protons attract electrons more strongly) and decreases down a group (electrons are further from the nucleus).' },
  { level:3, visual:'🌟', question:'What is electronegativity, and which element has the HIGHEST electronegativity?', options:['Ability to attract bonding electrons; fluorine (F) has the highest','Ability to lose electrons; caesium has the highest','A measure of reactivity; oxygen has the highest'], answer:'Ability to attract bonding electrons; fluorine (F) has the highest', fact:'🌟 Fluorine (4.0 on Pauling scale) is the most electronegative element. The large electronegativity difference between F and H makes HF very polar. Electronegativity generally increases across periods and up groups!' },
  { level:3, visual:'⚛️', question:'What is nuclear fission?', options:['Splitting a heavy nucleus into lighter nuclei, releasing enormous energy','Joining two light nuclei to form a heavier one','Radioactive decay of a nucleus'], answer:'Splitting a heavy nucleus into lighter nuclei, releasing enormous energy', fact:'⚛️ When uranium-235 absorbs a neutron, it splits into barium and krypton plus neutrons + energy. Those neutrons split more U-235 atoms (chain reaction). Nuclear power plants control this process to generate electricity!' },
  { level:3, visual:'⚛️', question:'What is nuclear fusion?', options:['Joining two light nuclei to form a heavier nucleus, releasing energy','Splitting a heavy nucleus into lighter ones','Radioactive decay'], answer:'Joining two light nuclei to form a heavier nucleus, releasing energy', fact:'⚛️ The Sun fuses hydrogen nuclei into helium, releasing huge energy. Fusion produces no long-lived radioactive waste and uses abundant fuel (hydrogen), but requires extreme temperatures (~100 million °C) — the holy grail of clean energy!' },
  { level:3, visual:'🔢', question:'What is the mole and why is it used?', options:['A unit containing 6.022×10²³ particles, used to count atoms by weighing','A unit of mass equal to 1 gram','A unit of volume equal to 1 litre'], answer:'A unit containing 6.022×10²³ particles, used to count atoms by weighing', fact:'🔢 Atoms are too small to count individually, but we can weigh them. One mole of any element = its relative atomic mass in grams = 6.022×10²³ atoms. This bridges the microscopic and macroscopic worlds!' },
  { level:3, visual:'📐', question:'How do you calculate the number of moles from mass and molar mass?', options:['moles = mass ÷ molar mass','moles = mass × molar mass','moles = molar mass ÷ mass'], answer:'moles = mass ÷ molar mass', fact:'📐 n = m/M. If you have 36g of water (M = 18 g/mol), then n = 36÷18 = 2 moles. This formula is the cornerstone of quantitative chemistry calculations!' },
  { level:3, visual:'⚖️', question:'What is the percentage composition by mass of oxygen in CO₂? (C=12, O=16)', options:['About 72.7%','About 27.3%','About 50%'], answer:'About 72.7%', fact:'⚖️ % O = (2×16 ÷ 44) × 100 = 72.7%. Molar mass of CO₂ = 12 + 32 = 44 g/mol. The two oxygen atoms account for nearly three-quarters of the mass of a CO₂ molecule!' },
  { level:3, visual:'🧪', question:'What is the difference between empirical and molecular formula?', options:['Empirical is simplest ratio; molecular is actual number of atoms','Molecular is simplest ratio; empirical is actual number','They are always the same'], answer:'Empirical is simplest ratio; molecular is actual number of atoms', fact:'🧪 Glucose molecular formula C₆H₁₂O₆ has empirical formula CH₂O (divide by 6). The empirical formula is found from % composition data; the molecular formula requires knowing the molar mass too!' },
  { level:3, visual:'🔬', question:'What is a limiting reagent and how does it affect yield?', options:['The reagent that runs out first, limiting the amount of product that can form','The reagent present in excess','The catalyst used in the reaction'], answer:'The reagent that runs out first, limiting the amount of product that can form', fact:'🔬 If you react 4g H₂ (2 mol) with 16g O₂ (0.5 mol) to make water, H₂O forms in a 2:1 ratio — you need 2 mol H₂ per mol O₂. O₂ is limiting! Only 1 mol H₂O can form before O₂ runs out.' },
  { level:3, visual:'🌡️', question:'What is enthalpy (H) and what does ΔH represent?', options:['Enthalpy is heat content; ΔH is the heat change at constant pressure','Enthalpy is temperature; ΔH is temperature change','Enthalpy is volume; ΔH is volume change'], answer:'Enthalpy is heat content; ΔH is the heat change at constant pressure', fact:'🌡️ ΔH < 0 = exothermic (energy released). ΔH > 0 = endothermic (energy absorbed). Combustion of methane: ΔH = -890 kJ/mol. The minus sign means energy leaves the system and heats the surroundings!' },
  { level:3, visual:'📊', question:'What is a reaction energy profile diagram?', options:['A graph showing energy of reactants, transition state, and products vs reaction progress','A graph of temperature vs time','A graph of concentration vs time'], answer:'A graph showing energy of reactants, transition state, and products vs reaction progress', fact:'📊 The energy profile shows a "hill" (the activation energy). The top is the transition state — the highest energy point. Catalysts lower this hill. Exothermic profiles show products lower than reactants!' },
  { level:3, visual:'⚗️', question:'What is Hess\'s Law used for?', options:['Calculating enthalpy changes for reactions that cannot be measured directly','Calculating pH changes','Predicting equilibrium positions'], answer:'Calculating enthalpy changes for reactions that cannot be measured directly', fact:'⚗️ Hess\'s Law: the total enthalpy change is path-independent. If you can\'t measure the direct route A→C, you can calculate it from A→B and B→C. It is based on conservation of energy (first law of thermodynamics)!' },
  { level:3, visual:'🔗', question:'What is bond energy (bond enthalpy)?', options:['The energy needed to break one mole of a specific bond in gaseous molecules','The energy released when a bond forms','The strength of an ionic bond'], answer:'The energy needed to break one mole of a specific bond in gaseous molecules', fact:'🔗 Breaking bonds requires energy (endothermic); forming bonds releases energy (exothermic). ΔH for a reaction ≈ sum of bonds broken minus sum of bonds formed. If more energy is released than absorbed, the reaction is exothermic!' },
  { level:3, visual:'⚖️', question:'What does a catalyst do to activation energy and ΔH?', options:['Lowers activation energy but does NOT change ΔH','Lowers both activation energy and ΔH','Increases activation energy'], answer:'Lowers activation energy but does NOT change ΔH', fact:'⚖️ A catalyst provides an alternative pathway with lower activation energy — the "hill" is smaller so reactions happen faster. But the energy difference between reactants and products (ΔH) is unchanged!' },
  { level:3, visual:'🔬', question:'What is the ideal gas law equation?', options:['PV = nRT','E = mc²','ΔH = ΣBE(broken) - ΣBE(formed)'], answer:'PV = nRT', fact:'🔬 PV = nRT links pressure (P), volume (V), moles (n), gas constant (R = 8.314 J/mol·K), and temperature (T in Kelvin). It describes the behaviour of an "ideal" gas — a simplified model that works well at low pressure and high temperature!' },
  { level:3, visual:'🌡️', question:'What happens to gas pressure if you DECREASE the volume at constant temperature?', options:['Pressure increases (Boyle\'s Law)','Pressure decreases','Pressure stays the same'], answer:'Pressure increases (Boyle\'s Law)', fact:'🌡️ Boyle\'s Law: P₁V₁ = P₂V₂ (at constant T). Halve the volume → double the pressure. Compressed-air tanks use this principle — vast amounts of air are squeezed into small cylinders at very high pressure!' },
  { level:3, visual:'💡', question:'What happens to gas volume if you INCREASE temperature at constant pressure?', options:['Volume increases (Charles\'s Law)','Volume decreases','Volume stays the same'], answer:'Volume increases (Charles\'s Law)', fact:'💡 Charles\'s Law: V/T = constant (at constant P). Hot air balloons work because hot air expands, making it less dense than cool air. The same number of molecules occupy more space at higher temperature!' },
  { level:3, visual:'🧬', question:'What is the structure of DNA in terms of chemistry?', options:['A double helix polymer of nucleotides joined by hydrogen bonds between complementary base pairs','A single chain protein','A lipid bilayer'], answer:'A double helix polymer of nucleotides joined by hydrogen bonds between complementary base pairs', fact:'🧬 Watson and Crick (1953) determined DNA\'s structure. Each nucleotide has a phosphate, deoxyribose sugar, and one of 4 bases (A, T, G, C). A pairs with T; G pairs with C via hydrogen bonds!' },
  { level:3, visual:'⚗️', question:'What is cracking in petroleum chemistry?', options:['Breaking long-chain hydrocarbons into shorter, more useful ones using heat/catalyst','Purifying crude oil by distillation','Removing sulfur from crude oil'], answer:'Breaking long-chain hydrocarbons into shorter, more useful ones using heat/catalyst', fact:'⚗️ Cracking converts heavy fuel oil into petrol and ethene. Ethene is vital for making polyethylene plastic. Without cracking, we would have too much heavy oil and not enough petrol and plastics!' },
  { level:3, visual:'🔋', question:'What is a fuel cell and how does it produce electricity?', options:['An electrochemical device that converts hydrogen and oxygen into water, producing electricity and heat','A device that burns fuel to spin a turbine','A type of nuclear reactor'], answer:'An electrochemical device that converts hydrogen and oxygen into water, producing electricity and heat', fact:'🔋 Hydrogen fuel cells: H₂ + ½O₂ → H₂O + electricity. The only emission is water! They are used in some cars and buses. The challenge is producing and storing hydrogen cleanly and safely.' },
  { level:3, visual:'🌊', question:'What is a buffer solution and give one important example?', options:['A solution that resists pH change; blood (pH 7.4) is buffered by the carbonate/bicarbonate system','A very concentrated acid solution','A neutral solution of pure water'], answer:'A solution that resists pH change; blood (pH 7.4) is buffered by the carbonate/bicarbonate system', fact:'🌊 Blood pH must stay at 7.35-7.45. The CO₂/HCO₃⁻ buffer system in blood absorbs excess acid or base: if pH drops, HCO₃⁻ neutralises the acid; if pH rises, H₂CO₃ neutralises the base.' },
  { level:3, visual:'⚛️', question:'What is the difference between nuclear fission and fusion in terms of nuclear change?', options:['Fission splits heavy nuclei; fusion joins light nuclei','Fission joins light nuclei; fusion splits heavy nuclei','Both split nuclei'], answer:'Fission splits heavy nuclei; fusion joins light nuclei', fact:'⚛️ Fission (uranium/plutonium splitting) powers today\'s nuclear plants but creates radioactive waste. Fusion (hydrogen combining) powers the Sun and would produce far more energy with little waste — if we can achieve it on Earth!' },
  { level:3, visual:'🔬', question:'What is Le Chatelier\'s principle, and how does it apply to temperature?', options:['System shifts to oppose change; increasing temperature shifts equilibrium towards the endothermic direction','System always shifts right; temperature has no effect','System stops reacting when temperature changes'], answer:'System shifts to oppose change; increasing temperature shifts equilibrium towards the endothermic direction', fact:'🔬 Increasing temperature gives the system more heat energy — it shifts to absorb this energy (endothermic direction). For the Haber process (exothermic forward reaction), higher T shifts left, reducing NH₃ yield!' },
  { level:3, visual:'📐', question:'In organic chemistry, what is a homologous series?', options:['A series of compounds with the same general formula, similar properties, and differing by CH₂ each time','A series of isotopes of the same element','A series of reactions with increasing temperature'], answer:'A series of compounds with the same general formula, similar properties, and differing by CH₂ each time', fact:'📐 Alkanes are a homologous series: methane (CH₄), ethane (C₂H₆), propane (C₃H₈)... Each member differs by one CH₂ unit. Properties change gradually — boiling points increase as chains get longer!' },
  { level:3, visual:'🌸', question:'What is esterification and what type of reaction is it?', options:['Acid + alcohol → ester + water; a condensation reaction','Alkene + bromine → dibromo compound; an addition reaction','Base + acid → salt + water; a neutralisation reaction'], answer:'Acid + alcohol → ester + water; a condensation reaction', fact:'🌸 Esterification: CH₃COOH + C₂H₅OH ⇌ CH₃COOC₂H₅ + H₂O. It is reversible and requires an acid catalyst. Esters give fruits and perfumes their scent — ethyl ethanoate smells of pear drops!' },
  { level:3, visual:'🧪', question:'What is saponification?', options:['The hydrolysis of esters by alkali to produce soap (fatty acid salts) and glycerol','The addition of water to an alkene','The fermentation of sugars'], answer:'The hydrolysis of esters by alkali to produce soap (fatty acid salts) and glycerol', fact:'🧪 Soap is made by boiling animal fats (triglyceride esters) with NaOH (lye). The ester bonds are broken: fat + NaOH → soap (sodium salt of fatty acid) + glycerol. This process has been used for thousands of years!' },
  { level:3, visual:'🔗', question:'What are addition polymers and give a common example?', options:['Polymers formed when alkene monomers join through their double bonds; polyethylene','Polymers formed with loss of water; nylon','Polymers made by living organisms; starch'], answer:'Polymers formed when alkene monomers join through their double bonds; polyethylene', fact:'🔗 In addition polymerisation, ethene monomers (CH₂=CH₂) open their double bonds and link together forming polyethylene (-CH₂-CH₂-)ₙ. No atoms are lost. PVC, polystyrene, and Teflon are all addition polymers!' },
  { level:3, visual:'🧬', question:'What are condensation polymers and give a common example?', options:['Polymers formed with loss of a small molecule (usually water) between monomers; nylon','Polymers formed from alkenes opening double bonds; polyethylene','Naturally occurring polymers; rubber'], answer:'Polymers formed with loss of a small molecule (usually water) between monomers; nylon', fact:'🧬 Nylon 6,6 forms when diamine and diacid monomers react, losing water at each junction. Polyester (PET), proteins, DNA, and cellulose are all condensation polymers. The water lost is the key difference from addition polymers!' },
  { level:3, visual:'🌡️', question:'What is entropy (S) in chemistry?', options:['A measure of the disorder or randomness of a system','A measure of heat content','A measure of reaction rate'], answer:'A measure of the disorder or randomness of a system', fact:'🌡️ The Second Law of Thermodynamics states that the total entropy of the universe always increases in spontaneous processes. Gases have much higher entropy than liquids; liquids higher than solids. Dissolving increases entropy!' },
  { level:3, visual:'⚖️', question:'What is Gibbs free energy (ΔG) and when does a reaction occur spontaneously?', options:['ΔG = ΔH - TΔS; a reaction is spontaneous when ΔG < 0','ΔG = ΔH + TΔS; spontaneous when ΔG > 0','ΔG measures reaction rate; spontaneous when ΔG = 0'], answer:'ΔG = ΔH - TΔS; a reaction is spontaneous when ΔG < 0', fact:'⚖️ ΔG combines enthalpy and entropy. If ΔG < 0, the reaction releases free energy and proceeds spontaneously. If ΔG > 0, you must supply energy. At ΔG = 0, the system is at equilibrium!' },
  { level:3, visual:'🔬', question:'What is the collision theory of chemical reactions?', options:['Reactions occur when particles collide with sufficient energy and correct orientation','Reactions occur whenever particles meet','Reactions occur only at high temperatures'], answer:'Reactions occur when particles collide with sufficient energy and correct orientation', fact:'🔬 Collision theory explains why rate depends on concentration, temperature, surface area, and catalysts — all factors affect how often successful collisions occur. Only a tiny fraction of all collisions actually result in reaction!' },
  { level:3, visual:'📈', question:'What is the Arrhenius equation used to explain?', options:['How reaction rate depends on temperature and activation energy','How equilibrium position depends on concentration','How pH depends on acid concentration'], answer:'How reaction rate depends on temperature and activation energy', fact:'📈 k = Ae^(-Ea/RT). The Arrhenius equation shows that even a small decrease in activation energy (Ea) causes a large increase in rate constant (k). This is why catalysts are so effective — they reduce Ea substantially!' },
  { level:3, visual:'⚛️', question:'What are allotropes and name two allotropes of carbon?', options:['Different structural forms of the same element; diamond and graphite','Different isotopes of the same element; carbon-12 and carbon-14','Different ions of the same element; C²⁺ and C⁴⁺'], answer:'Different structural forms of the same element; diamond and graphite', fact:'⚛️ Allotropes have the same element but different bonding arrangements. Diamond (3D network) is the hardest natural substance; graphite (layers) conducts electricity. Buckminsterfullerene (C₆₀, a "buckyball") is a third carbon allotrope!' },
  { level:3, visual:'🌊', question:'What is the significance of water\'s anomalous expansion on freezing?', options:['Ice is less dense than liquid water so it floats, insulating water below and enabling aquatic life to survive winter','Ice is denser than liquid water so it sinks','Water does not change density when freezing'], answer:'Ice is less dense than liquid water so it floats, insulating water below and enabling aquatic life to survive winter', fact:'🌊 Most liquids contract when freezing. Water expands (hydrogen bonds push molecules apart in a lattice), making ice about 9% less dense. If ice sank, lakes would freeze solid from the bottom up, killing all aquatic life!' },
  { level:3, visual:'💧', question:'What are van der Waals forces (London dispersion forces)?', options:['Weak temporary attractions between all molecules caused by instantaneous dipoles','Strong permanent bonds between polar molecules','Electrostatic forces between ions'], answer:'Weak temporary attractions between all molecules caused by instantaneous dipoles', fact:'💧 Even non-polar molecules like noble gases have van der Waals forces. Temporary uneven electron distribution creates instant dipoles that induce dipoles in neighbours. Larger molecules have more electrons and stronger van der Waals forces!' },
  { level:3, visual:'🔗', question:'What is a coordinate (dative covalent) bond?', options:['A covalent bond where BOTH electrons are provided by the same atom','A covalent bond where electrons are shared equally','An ionic bond involving only one ion'], answer:'A covalent bond where BOTH electrons are provided by the same atom', fact:'🔗 In NH₄⁺ (ammonium ion), nitrogen uses its lone pair to bond with H⁺. Both electrons in that bond come from nitrogen. Once formed, a coordinate bond is indistinguishable from a normal covalent bond!' },
  { level:3, visual:'📐', question:'What is the VSEPR theory used to predict?', options:['The shape of molecules based on repulsion between electron pairs','The colour of compounds','The reactivity of elements'], answer:'The shape of molecules based on repulsion between electron pairs', fact:'📐 VSEPR (Valence Shell Electron Pair Repulsion): electron pairs around a central atom repel each other and arrange to be as far apart as possible. H₂O has 2 bond pairs + 2 lone pairs → bent shape (104.5°)!' },
  { level:3, visual:'⚗️', question:'What makes a molecule polar?', options:['An asymmetric distribution of charge due to differences in electronegativity between bonded atoms','An equal distribution of electrons','Having more than 2 atoms'], answer:'An asymmetric distribution of charge due to differences in electronegativity between bonded atoms', fact:'⚗️ In HCl, chlorine (high electronegativity) pulls electron density toward itself, creating δ- on Cl and δ+ on H. CO₂ has polar bonds but is non-polar overall because the bond dipoles cancel (linear shape)!' },
  { level:3, visual:'🧪', question:'What is the principle behind nuclear magnetic resonance (NMR) spectroscopy?', options:['Atomic nuclei in a magnetic field absorb radio waves at frequencies that reveal molecular structure','Molecules absorb infrared light showing bond types','Electrons are knocked off atoms by X-rays'], answer:'Atomic nuclei in a magnetic field absorb radio waves at frequencies that reveal molecular structure', fact:'🧪 NMR reveals the number and arrangement of hydrogen (and carbon) atoms in a molecule. MRI scanners in hospitals use NMR principles to image soft tissue. Chemists use NMR to identify unknown organic compounds!' },
  { level:3, visual:'🌡️', question:'What is the Clausius-Clapeyron equation used to relate?', options:['Vapour pressure of a liquid to temperature','pH to hydrogen ion concentration','Reaction rate to concentration'], answer:'Vapour pressure of a liquid to temperature', fact:'🌡️ The Clausius-Clapeyron equation shows how vapour pressure (the tendency of a liquid to evaporate) changes with temperature. It explains why water boils at lower temperatures at altitude and helps meteorologists model atmospheric water!' },

  // ── ADDITIONAL EASY (level 1) ── to reach ~167 ──────────────────────────────
  { level:1, visual:'🧪', question:'What is the chemical formula for methane (natural gas)?', options:['CH₄','CO₂','C₂H₆'], answer:'CH₄', fact:'🧪 Methane is the simplest hydrocarbon: one carbon bonded to four hydrogens. It is the main component of natural gas used for cooking and heating, and is produced by decomposing organic matter in wetlands and by livestock!' },
  { level:1, visual:'⚗️', question:'What is the chemical formula for ethanol (drinking alcohol)?', options:['C₂H₅OH','CH₄','C₆H₁₂O₆'], answer:'C₂H₅OH', fact:'⚗️ Ethanol has the formula C₂H₅OH — a two-carbon chain with a hydroxyl (-OH) group. It is produced by fermentation of sugars and is found in alcoholic drinks, hand sanitisers, and fuel!' },
  { level:1, visual:'💎', question:'Which element has the chemical symbol C and is found in diamonds and graphite?', options:['Carbon','Cobalt','Calcium'], answer:'Carbon', fact:'💎 Carbon (C) exists in several forms: hard diamond (used in cutting tools), slippery graphite (used in pencils and lubricants), and fullerenes. It is the basis of all organic chemistry and all life!' },
  { level:1, visual:'🌊', question:'What is the chemical formula for calcium carbonate (chalk/limestone)?', options:['CaCO₃','CaCl₂','CaO'], answer:'CaCO₃', fact:'🌊 Calcium carbonate is the main component of chalk, limestone, and marble. It reacts with acids to produce CO₂ — that is why acid rain slowly dissolves limestone buildings and statues!' },
  { level:1, visual:'🔥', question:'In the complete combustion of methane, what are the two products?', options:['Carbon dioxide and water','Carbon monoxide and hydrogen','Oxygen and carbon'], answer:'Carbon dioxide and water', fact:'🔥 CH₄ + 2O₂ → CO₂ + 2H₂O. Complete combustion requires plenty of oxygen. Incomplete combustion (limited O₂) produces toxic carbon monoxide — a serious hazard in poorly ventilated rooms with gas appliances!' },
  { level:1, visual:'🌋', question:'What is the chemical symbol for Silicon?', options:['Si','Sl','Sc'], answer:'Si', fact:'🌋 Silicon (Si) is the second most abundant element in Earth\'s crust (after oxygen). Sand and most rocks contain silicon dioxide (SiO₂). Ultra-pure silicon is the foundation of all computer chips and solar cells!' },
  { level:1, visual:'🔬', question:'What is the name of the scale that measures hardness of minerals?', options:['Mohs scale','Richter scale','Kelvin scale'], answer:'Mohs scale', fact:'🔬 The Mohs scale runs from 1 (talc, softest) to 10 (diamond, hardest). A mineral scratches any mineral with a lower Mohs number. Geologists use it to identify unknown minerals in the field!' },
  { level:1, visual:'🧊', question:'What do we call the change of state from GAS directly to SOLID?', options:['Deposition','Condensation','Freezing'], answer:'Deposition', fact:'🧊 Deposition is the reverse of sublimation. Frost on a cold night forms by deposition — water vapour in the air goes straight to solid ice without passing through a liquid stage!' },
  { level:1, visual:'⚡', question:'What is the chemical formula for iron oxide (common rust)?', options:['Fe₂O₃','FeO','Fe₃O₄'], answer:'Fe₂O₃', fact:'⚡ Iron(III) oxide (Fe₂O₃) is the main component of rust. It forms when iron reacts with oxygen and water. Unlike aluminium oxide, rust is flaky and does not protect the iron beneath — so rusting continues!' },
  { level:1, visual:'🧂', question:'What are the products when sodium reacts with water?', options:['Sodium hydroxide and hydrogen gas','Sodium oxide and oxygen','Sodium chloride and water'], answer:'Sodium hydroxide and hydrogen gas', fact:'🧂 2Na + 2H₂O → 2NaOH + H₂. Sodium skates across the water surface, melts from the heat of the reaction, and the hydrogen gas may catch fire. The solution produced is strongly alkaline!' },
  { level:1, visual:'🔩', question:'What do we call the list that ranks metals from most to least reactive?', options:['The reactivity series','The periodic table','The Mohs scale'], answer:'The reactivity series', fact:'🔩 The reactivity series helps predict whether a metal will react with acids, water, or the oxides of other metals. More reactive metals higher on the list displace less reactive ones in reactions!' },
  { level:1, visual:'⚗️', question:'What is the symbol for the element with atomic number 8?', options:['O','N','F'], answer:'O', fact:'⚗️ Atomic number 8 is oxygen (O) — 8 protons, 8 electrons. It is the most abundant element in Earth\'s crust (46%) and makes up 21% of the atmosphere. Life as we know it depends on it!' },
  { level:1, visual:'🧪', question:'What type of chemical reaction is it when a metal oxide reacts with an acid?', options:['Neutralisation','Combustion','Decomposition'], answer:'Neutralisation', fact:'🧪 Metal oxide + acid → salt + water. Copper oxide + sulfuric acid → copper sulfate + water. This is a neutralisation because the oxide acts as a base, accepting H⁺ ions from the acid!' },
  { level:1, visual:'💧', question:'What is the approximate density of water?', options:['1 g/mL (1 g per cm³)','0.5 g/mL','2 g/mL'], answer:'1 g/mL (1 g per cm³)', fact:'💧 Water\'s density of 1 g/mL (at 4°C) is the reference standard. Objects with density < 1 g/mL float; > 1 g/mL sink. Ice density is ~0.917 g/mL — slightly less — which is why it floats!' },
