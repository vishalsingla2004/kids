  { level:1, visual:'🌿', question:'What gas is essential for combustion (burning)?', options:['Oxygen','Nitrogen','Carbon dioxide'], answer:'Oxygen', fact:'🌿 The fire triangle requires fuel, heat, and oxygen. Remove any one and fire cannot exist. CO₂ fire extinguishers work by displacing oxygen around the flame, starving it of the oxygen it needs to burn!' },
  { level:1, visual:'🎈', question:'Why does helium make balloons float?', options:['It is less dense than air','It is lighter than hydrogen','It reacts with air to create lift'], answer:'It is less dense than air', fact:'🎈 Helium gas has a density of 0.164 g/L, compared to air\'s 1.225 g/L. The upthrust (buoyancy) of the surrounding air supports the balloon. Hydrogen is even lighter but is dangerously flammable!' },
  { level:1, visual:'🔋', question:'What is the chemical formula for sodium hydroxide (caustic soda)?', options:['NaOH','NaCl','Na₂O'], answer:'NaOH', fact:'🔋 Sodium hydroxide (NaOH) is a strong base used in drain cleaners, soap making, and paper production. It dissolves fat and grease — that\'s how it unblocks drains!' },
  { level:1, visual:'⚗️', question:'What is the chemical formula for calcium oxide (quicklime)?', options:['CaO','CaCO₃','Ca(OH)₂'], answer:'CaO', fact:'⚗️ Calcium oxide (CaO) is made by heating limestone (CaCO₃). It reacts violently with water to form slaked lime Ca(OH)₂. Farmers use it to reduce soil acidity and it has been used in construction for thousands of years!' },
  { level:1, visual:'🌬️', question:'What do we call the type of chemical formula that shows only the ratio of atoms in a compound?', options:['Empirical formula','Molecular formula','Structural formula'], answer:'Empirical formula', fact:'🌬️ Hydrogen peroxide (H₂O₂) has molecular formula H₂O₂ but empirical formula HO (simplest 1:1 ratio). For ionic compounds, we always write the empirical formula — NaCl, not Na₂Cl₂!' },
  { level:1, visual:'🔬', question:'In the laboratory, what does a Bunsen burner use as fuel?', options:['Natural gas (methane)','Hydrogen','Ethanol'], answer:'Natural gas (methane)', fact:'🔬 Bunsen burners burn methane (CH₄) from the gas supply. With the air hole open, a hot blue flame burns completely. With the air hole closed, an orange/yellow safety flame produces soot — incomplete combustion!' },
  { level:1, visual:'🧪', question:'What is the test for hydrogen gas?', options:['A burning splint makes a squeaky pop','It relights a glowing splint','It turns limewater milky'], answer:'A burning splint makes a squeaky pop', fact:'🧪 Hydrogen burns with a distinctive "squeaky pop" when tested with a lit splint. This is because H₂ ignites and reacts rapidly with O₂ in the air: 2H₂ + O₂ → 2H₂O!' },
  { level:1, visual:'🌊', question:'What is the test for carbon dioxide gas?', options:['It turns limewater (calcium hydroxide solution) milky/cloudy','It makes a squeaky pop with a burning splint','It relights a glowing splint'], answer:'It turns limewater (calcium hydroxide solution) milky/cloudy', fact:'🌊 CO₂ + Ca(OH)₂ → CaCO₃ + H₂O. The calcium carbonate precipitate makes the clear limewater turn cloudy/milky white. This is the classic lab test for CO₂ — used in school labs worldwide!' },
  { level:1, visual:'⚗️', question:'What is the test for oxygen gas?', options:['It relights a glowing wooden splint','It turns limewater milky','It makes a squeaky pop with a burning splint'], answer:'It relights a glowing wooden splint', fact:'⚗️ A glowing splint is held in a tube of oxygen — if it relights, oxygen is confirmed. Pure oxygen vigorously supports combustion, relighting the barely-smouldering splint instantly!' },
  { level:1, visual:'🧴', question:'What is a chemical indicator?', options:['A substance that changes colour to show whether a solution is acidic or alkaline','A thermometer for measuring temperature','A type of catalyst'], answer:'A substance that changes colour to show whether a solution is acidic or alkaline', fact:'🧴 Indicators include litmus (red in acid, blue in alkali), phenolphthalein (colourless in acid, pink in alkali), and universal indicator (a rainbow of colours across the pH scale)!' },
  { level:1, visual:'🌡️', question:'What is absolute zero in Celsius?', options:['-273.15°C','0°C','-100°C'], answer:'-273.15°C', fact:'🌡️ Absolute zero (0 Kelvin = -273.15°C) is the coldest possible temperature — the point at which atoms have minimum possible thermal energy. Nothing in the universe has ever been cooled to exactly 0 K!' },
  { level:1, visual:'🔩', question:'What is the chemical formula for iron(II) sulfate?', options:['FeSO₄','Fe₂SO₄','FeSO₃'], answer:'FeSO₄', fact:'🔩 Iron(II) sulfate (FeSO₄) forms pale green crystals. The Roman numeral II indicates iron is in the +2 oxidation state. When iron rusts, it oxidises to the +3 state, forming reddish-brown Fe₂O₃!' },
  { level:1, visual:'💡', question:'Which gas is produced when a metal carbonate is heated?', options:['Carbon dioxide','Oxygen','Hydrogen'], answer:'Carbon dioxide', fact:'💡 Thermal decomposition of carbonates releases CO₂: CaCO₃ → CaO + CO₂. This is how quicklime (CaO) is made industrially. CO₂ is always the gaseous product of carbonate decomposition!' },
  { level:1, visual:'🧬', question:'What is the name for the energy stored in chemical bonds?', options:['Chemical potential energy','Kinetic energy','Nuclear energy'], answer:'Chemical potential energy', fact:'🧬 Food, fuels, and batteries all store energy as chemical potential energy in molecular bonds. When bonds break and re-form in reactions, this energy is released (exothermic) or absorbed (endothermic)!' },

  // ── ADDITIONAL MEDIUM (level 2) ── to reach ~167 ────────────────────────────
  { level:2, visual:'🌊', question:'What is the Haber process and what does it produce?', options:['Industrial synthesis of ammonia from nitrogen and hydrogen','Industrial production of sulfuric acid','Fractional distillation of crude oil'], answer:'Industrial synthesis of ammonia from nitrogen and hydrogen', fact:'🌊 N₂ + 3H₂ ⇌ 2NH₃ using iron catalyst at ~450°C and ~200 atm. About half the nitrogen in your body originally came from the Haber process via fertilisers — it truly feeds the world!' },
  { level:2, visual:'⚗️', question:'What is the test for a chloride ion (Cl⁻) in solution?', options:['Add silver nitrate solution — white precipitate of AgCl forms','Add limewater — turns milky','Add litmus — turns red'], answer:'Add silver nitrate solution — white precipitate of AgCl forms', fact:'⚗️ Ag⁺ + Cl⁻ → AgCl (white precipitate). This test identifies chloride, bromide (cream ppt), and iodide (yellow ppt). The precipitate is insoluble in dilute HNO₃, confirming a halide ion!' },
  { level:2, visual:'🔬', question:'What is the test for a sulfate ion (SO₄²⁻) in solution?', options:['Add barium chloride solution — white precipitate of BaSO₄ forms','Add silver nitrate — turns white','Add litmus — turns blue'], answer:'Add barium chloride solution — white precipitate of BaSO₄ forms', fact:'🔬 Ba²⁺ + SO₄²⁻ → BaSO₄ (white precipitate insoluble in dilute HCl). This is the definitive test for sulfate ions. Dilute HCl is added first to remove interfering carbonate or sulfite ions!' },
  { level:2, visual:'🧪', question:'What is the test for carbon dioxide in solution (carbonate ion)?', options:['Add dilute acid — CO₂ bubbles form, turning limewater milky','Add silver nitrate — white precipitate forms','Heat the solution — it turns blue'], answer:'Add dilute acid — CO₂ bubbles form, turning limewater milky', fact:'🧪 CO₃²⁻ + 2H⁺ → H₂O + CO₂. The CO₂ produced turns limewater milky. This confirms a carbonate. Marble chips + hydrochloric acid is a classic demonstration of this reaction!' },
  { level:2, visual:'🌿', question:'What is the test for an ammonium ion (NH₄⁺) in solution?', options:['Add NaOH and warm — ammonia gas produced turns damp red litmus blue','Add silver nitrate — yellow precipitate forms','Burn it — purple flame'], answer:'Add NaOH and warm — ammonia gas produced turns damp red litmus blue', fact:'🌿 NH₄⁺ + OH⁻ → NH₃ + H₂O. Ammonia gas has a characteristic pungent smell and is the only common alkaline gas — it turns damp red litmus blue. This is the standard test for ammonium compounds!' },
  { level:2, visual:'🔥', question:'What is the difference between a strong acid and a weak acid?', options:['Strong acids fully ionise in water; weak acids only partially ionise','Strong acids have lower pH than weak acids','Strong acids contain more hydrogen atoms'], answer:'Strong acids fully ionise in water; weak acids only partially ionise', fact:'🔥 HCl (strong): HCl → H⁺ + Cl⁻ (100% ionisation). Ethanoic acid (weak): CH₃COOH ⇌ CH₃COO⁻ + H⁺ (only ~1% ionised). Same concentration, but strong acid has far more H⁺ ions and lower pH!' },
  { level:2, visual:'🧴', question:'What is the difference between a strong base and a weak base?', options:['Strong bases fully dissociate in water; weak bases only partially ionise','Strong bases have higher pH than weak bases','Strong bases are more corrosive than weak bases'], answer:'Strong bases fully dissociate in water; weak bases only partially ionise', fact:'🧴 NaOH (strong): NaOH → Na⁺ + OH⁻ (100% dissociation). Ammonia (weak): NH₃ + H₂O ⇌ NH₄⁺ + OH⁻ (only partial). Strong bases produce many more OH⁻ ions and have higher pH at the same concentration!' },
  { level:2, visual:'⚖️', question:'What is the concentration of hydrogen ions [H⁺] in pure water at 25°C?', options:['1×10⁻⁷ mol/L','1 mol/L','0 mol/L'], answer:'1×10⁻⁷ mol/L', fact:'⚖️ Pure water self-ionises slightly: H₂O ⇌ H⁺ + OH⁻. At 25°C, [H⁺]=[OH⁻] = 10⁻⁷ mol/L, giving pH = 7. pH = -log[H⁺], so pH 7 = -log(10⁻⁷) = 7. Elegant!' },
  { level:2, visual:'📊', question:'What does pH = -log[H⁺] mean in practical terms?', options:['Each pH unit represents a 10-fold change in H⁺ concentration','pH is directly proportional to H⁺ concentration','pH measures concentration in grams per litre'], answer:'Each pH unit represents a 10-fold change in H⁺ concentration', fact:'📊 The pH scale is logarithmic! pH 3 has 10 times more H⁺ than pH 4, and 100 times more than pH 5. Cola (pH 3) is 1000 times more acidic than black coffee (pH 5). Small pH changes mean huge concentration shifts!' },
  { level:2, visual:'🌊', question:'What is the Kw (ionic product of water) at 25°C?', options:['1×10⁻¹⁴ mol²/L²','1×10⁻⁷ mol/L','7'], answer:'1×10⁻¹⁴ mol²/L²', fact:'🌊 Kw = [H⁺][OH⁻] = 10⁻¹⁴ at 25°C. In any aqueous solution, H⁺ and OH⁻ are always linked by this constant. If [H⁺] = 10⁻² (pH 2), then [OH⁻] = 10⁻¹² . Both multiply to give 10⁻¹⁴!' },
  { level:2, visual:'🔬', question:'What is a mole fraction?', options:['The ratio of moles of one component to total moles in a mixture','The number of moles per litre','The mass of one mole in grams'], answer:'The ratio of moles of one component to total moles in a mixture', fact:'🔬 Mole fraction of A = n(A) ÷ n(total). In air, O₂ has a mole fraction of ~0.21. Dalton\'s Law uses mole fractions to calculate the partial pressure each gas contributes to total pressure!' },
  { level:2, visual:'🧪', question:'What is Dalton\'s Law of Partial Pressures?', options:['Total pressure of a gas mixture equals the sum of partial pressures of each gas','Gas pressure depends only on temperature','Gas volume is proportional to mass'], answer:'Total pressure of a gas mixture equals the sum of partial pressures of each gas', fact:'🧪 P_total = P₁ + P₂ + P₃... Each gas in a mixture exerts its own partial pressure independently. A diver\'s breathing mix at depth has higher partial pressure of each gas — which is why nitrogen narcosis occurs!' },
  { level:2, visual:'🌡️', question:'What is the Graham\'s Law of Effusion?', options:['Lighter gases effuse (escape through a small hole) faster — rate is inversely proportional to √(molar mass)','Heavier gases move faster','All gases move at the same speed at the same temperature'], answer:'Lighter gases effuse (escape through a small hole) faster — rate is inversely proportional to √(molar mass)', fact:'🌡️ Graham\'s Law: rate ∝ 1/√M. Hydrogen (M=2) effuses 4 times faster than oxygen (M=32) because √(32/2)=4. This is why hydrogen-filled balloons deflate faster than helium balloons!' },
  { level:2, visual:'💎', question:'What is the difference between homogeneous and heterogeneous mixtures?', options:['Homogeneous has uniform composition throughout; heterogeneous has non-uniform composition','Homogeneous has more components','Heterogeneous mixtures can be separated chemically'], answer:'Homogeneous has uniform composition throughout; heterogeneous has non-uniform composition', fact:'💎 Saltwater is homogeneous — the same composition everywhere. Granite rock is heterogeneous — visible different minerals. Air is homogeneous; oil-and-water is heterogeneous. The prefix "homo" means "same"!' },
  { level:2, visual:'⚗️', question:'What is a colloidal suspension and give an example?', options:['A mixture where tiny particles (1-1000 nm) are dispersed but not dissolved; milk is an example','A solution where solute is fully dissolved','A pure compound'], answer:'A mixture where tiny particles (1-1000 nm) are dispersed but not dissolved; milk is an example', fact:'⚗️ Colloids include milk (fat droplets in water), fog (water droplets in air), and aerosol sprays (liquid droplets in gas). Colloids scatter light (Tyndall effect) — a beam shone through milk is visible, but not through salt solution!' },
  { level:2, visual:'🔋', question:'What is a half-cell and how does a galvanic cell work?', options:['A half-cell contains one electrode in electrolyte; two half-cells connected create voltage from spontaneous redox reaction','A half-cell is half a battery containing only acid','A galvanic cell uses electricity to split compounds'], answer:'A half-cell contains one electrode in electrolyte; two half-cells connected create voltage from spontaneous redox reaction', fact:'🔋 In a zinc-copper galvanic cell, zinc oxidises (anode: Zn → Zn²⁺ + 2e⁻) and copper ions are reduced (cathode: Cu²⁺ + 2e⁻ → Cu). Electrons flow through the external circuit — that\'s the current. Your phone battery works on the same principle!' },
  { level:2, visual:'⚡', question:'What is the standard hydrogen electrode (SHE) used for?', options:['Measuring electrode potentials by providing a reference of exactly 0.00 V','Measuring pH of solutions','Producing hydrogen by electrolysis'], answer:'Measuring electrode potentials by providing a reference of exactly 0.00 V', fact:'⚡ The SHE (H⁺/H₂, Pt, 1 atm, 25°C) is assigned E° = 0.00 V. All other electrode potentials are measured relative to it. A positive E° means the electrode is a better oxidising agent than H⁺!' },
  { level:2, visual:'🧬', question:'What is the difference between metallic and non-metallic oxides in terms of acid-base behaviour?', options:['Metallic oxides are generally basic; non-metallic oxides are generally acidic','Metallic oxides are always acidic; non-metallic oxides always basic','All oxides are neutral'], answer:'Metallic oxides are generally basic; non-metallic oxides are generally acidic', fact:'🧬 Na₂O (metallic) dissolves in water to give NaOH (alkaline). CO₂ (non-metallic) dissolves in water to give carbonic acid (acidic). Amphoteric oxides (like Al₂O₃) react with both acids AND bases!' },
  { level:2, visual:'🌿', question:'What is the difference between a physical and chemical change?', options:['Physical: no new substance forms, reversible; Chemical: new substances form, usually irreversible','Physical: requires heat; Chemical: does not','Physical: occurs in solids; Chemical: in liquids'], answer:'Physical: no new substance forms, reversible; Chemical: new substances form, usually irreversible', fact:'🌿 Cutting paper, melting ice = physical (same substance, different form). Burning paper, rusting iron = chemical (new substances with different properties). Some chemical changes are reversible, but they are still chemical!' },
  { level:2, visual:'⚗️', question:'What is meant by the "rate of reaction"?', options:['How quickly reactants are consumed or products are formed over time','The temperature at which a reaction occurs','The energy released by a reaction'], answer:'How quickly reactants are consumed or products are formed over time', fact:'⚗️ Rate of reaction = change in concentration ÷ time (mol/L/s). You can measure it by monitoring gas produced, colour change, mass loss, or pH change. Industrial chemists maximise rate to improve efficiency and output!' },
  { level:2, visual:'🧪', question:'What is a homogeneous catalyst?', options:['A catalyst in the same physical state (phase) as the reactants','A catalyst that is a pure metal','A catalyst that speeds up more than one type of reaction'], answer:'A catalyst in the same physical state (phase) as the reactants', fact:'🧪 Homogeneous catalysts (e.g. H⁺ ions in esterification) mix with reactants. Heterogeneous catalysts (e.g. iron in the Haber process) are in a different phase from reactants. Surface reactions occur at active sites on heterogeneous catalysts!' },
  { level:2, visual:'🌡️', question:'What is the Maxwell-Boltzmann distribution?', options:['A graph showing the spread of kinetic energies among particles in a gas at a given temperature','A graph of reaction rate vs concentration','A graph of boiling point vs molecular mass'], answer:'A graph showing the spread of kinetic energies among particles in a gas at a given temperature', fact:'🌡️ The Maxwell-Boltzmann curve shows most particles have moderate energy; very few have very high or very low energy. Raising temperature shifts the whole curve right — more particles exceed the activation energy and react!' },
  { level:2, visual:'🔬', question:'What is meant by the term "molar volume" of a gas?', options:['The volume occupied by 1 mole of any gas at standard conditions (~22.4 L at STP)','The volume of 1 gram of gas','The volume of gas dissolved in 1 L of water'], answer:'The volume occupied by 1 mole of any gas at standard conditions (~22.4 L at STP)', fact:'🔬 At STP (0°C, 1 atm), 1 mole of any ideal gas occupies 22.4 L. At room temperature and pressure (25°C, 1 atm) it is ~24.5 L. This is incredibly useful — you can use volume to count moles of gas without weighing!' },
  { level:2, visual:'💧', question:'What is Avogadro\'s law?', options:['Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules','The total pressure equals sum of partial pressures','Pressure and volume are inversely proportional'], answer:'Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules', fact:'💧 Avogadro\'s Law means 1 L of H₂ and 1 L of O₂ at the same T and P contain identical numbers of molecules. This is why molar volume is the same for all gases (22.4 L/mol at STP)!' },
  { level:2, visual:'⚡', question:'What is electrolytic refining (purification) of copper?', options:['Impure copper is the anode; pure copper is the cathode; copper ions transfer to cathode, leaving impurities behind','Copper is smelted in a furnace to remove impurities','Copper is distilled like crude oil'], answer:'Impure copper is the anode; pure copper is the cathode; copper ions transfer to cathode, leaving impurities behind', fact:'⚡ In copper refining electrolysis: anode (impure Cu) dissolves → Cu²⁺ ions in solution → cathode (pure Cu) grows. Impurities fall as "anode sludge" containing precious metals like gold and silver — a valuable by-product!' },
  { level:2, visual:'🧲', question:'What is the galvanisation of steel?', options:['Coating steel with a layer of zinc to prevent rusting','Coating steel with copper for decoration','Coating steel with chromium to make it stainless'], answer:'Coating steel with a layer of zinc to prevent rusting', fact:'🧲 Zinc protects steel in two ways: it acts as a physical barrier, and even if scratched, zinc (being more reactive than iron) corrodes sacrificially, protecting the iron beneath. Lamp posts and guardrails are often galvanised!' },
  { level:2, visual:'🔗', question:'What is a sacrificial anode and where is it used?', options:['A block of reactive metal (e.g. zinc or magnesium) attached to steel to prevent the steel from corroding','A platinum electrode used in electrolysis','A type of catalyst in industrial reactions'], answer:'A block of reactive metal (e.g. zinc or magnesium) attached to steel to prevent the steel from corroding', fact:'🔗 Because zinc and magnesium are more reactive than iron, they corrode preferentially (sacrificially), protecting the steel structure. Ship hulls and oil pipelines use blocks of zinc attached to the metal as sacrificial anodes!' },
  { level:2, visual:'⚗️', question:'What is the difference between oxidation number and ionic charge?', options:['Oxidation number is a bookkeeping tool for tracking electron transfers; ionic charge is the actual charge on an ion','They are identical','Oxidation number applies to covalent compounds; ionic charge to ionic compounds'], answer:'Oxidation number is a bookkeeping tool for tracking electron transfers; ionic charge is the actual charge on an ion', fact:'⚗️ In NaCl, Na has oxidation number +1 and Na⁺ has ionic charge +1 — same. But in covalent SO₂, S has oxidation number +4, even though no ions exist. Oxidation numbers are a powerful book-keeping tool for redox reactions!' },
  { level:2, visual:'🌡️', question:'What is activation energy and how does a catalyst affect it on an energy profile?', options:['Activation energy is the minimum energy for reaction; a catalyst lowers the peak (provides a lower-energy pathway)','Activation energy is the total energy released; a catalyst increases the energy released','Activation energy is the boiling point of reactants'], answer:'Activation energy is the minimum energy for reaction; a catalyst lowers the peak (provides a lower-energy pathway)', fact:'🌡️ On an energy profile, the activation energy is the height of the peak above the reactants. A catalyst lowers this peak, allowing more particle collisions to be successful. The energy of reactants and products (ΔH) stays the same!' },
  { level:2, visual:'🧪', question:'In fractional distillation of crude oil, which fraction has the LOWEST boiling point and is collected at the TOP?', options:['Refinery gas (LPG, boiling point < 25°C)','Bitumen (boiling point > 350°C)','Diesel (boiling point ~200-350°C)'], answer:'Refinery gas (LPG, boiling point < 25°C)', fact:'🧪 The fractionating column is hot at the bottom and cool at the top. Refinery gases (methane, propane, butane) have the smallest molecules, weakest van der Waals forces, lowest boiling points — they rise to the top and are piped off as gas!' },
  { level:2, visual:'⚖️', question:'Which crude oil fraction is collected at the BOTTOM of the fractionating column?', options:['Bitumen/fuel oil (boiling point > 350°C)','Refinery gas','Petrol/gasoline'], answer:'Bitumen/fuel oil (boiling point > 350°C)', fact:'⚖️ Bitumen contains the largest hydrocarbon molecules with the strongest van der Waals forces — they barely evaporate. Bitumen is used to surface roads and waterproof roofs. It is the last fraction to be collected, running off from the base of the column.' },
  { level:2, visual:'🌊', question:'What is cracking and why is it needed?', options:['Breaking long hydrocarbon chains into shorter useful ones; there is more demand for petrol and alkenes than for heavy oil','Cleaning crude oil to remove sulfur','Separating crude oil into fractions'], answer:'Breaking long hydrocarbon chains into shorter useful ones; there is more demand for petrol and alkenes than for heavy oil', fact:'🌊 Crude oil contains too much heavy oil and not enough petrol. Catalytic cracking breaks heavy fractions into petrol-range hydrocarbons and alkenes. Ethene from cracking is used to make polyethylene plastic!' },
  { level:2, visual:'🌿', question:'What are the environmental problems caused by burning fossil fuels?', options:['CO₂ causes climate change; SO₂ causes acid rain; NOₓ causes smog and acid rain','Only CO₂ is released','Fossil fuels release only water and nitrogen'], answer:'CO₂ causes climate change; SO₂ causes acid rain; NOₓ causes smog and acid rain', fact:'🌿 CO₂ is the main greenhouse gas driving climate change. Sulfur impurities in fuels form SO₂ → H₂SO₄ (acid rain) which damages ecosystems and stone buildings. Catalytic converters reduce NOₓ from car exhausts!' },
  { level:2, visual:'💧', question:'What are biofuels and how do they differ from fossil fuels in terms of carbon footprint?', options:['Biofuels are made from recent biomass and are considered carbon-neutral; fossil fuels add ancient carbon to the atmosphere','Biofuels produce more CO₂ than fossil fuels','Biofuels and fossil fuels have identical environmental impact'], answer:'Biofuels are made from recent biomass and are considered carbon-neutral; fossil fuels add ancient carbon to the atmosphere', fact:'💧 When corn ethanol burns, the CO₂ released was recently absorbed by the growing corn — a closed loop. Fossil fuels release CO₂ locked underground for millions of years, increasing net atmospheric CO₂. Biofuels also use land needed for food crops!' },
  { level:2, visual:'🔥', question:'What is the greenhouse effect and which gas is the main contributor from human activity?', options:['Greenhouse gases trap heat re-radiated from Earth\'s surface; CO₂ from burning fossil fuels is the main anthropogenic contributor','Ozone traps heat; it is the main greenhouse gas','Nitrogen causes global warming because it is 78% of the atmosphere'], answer:'Greenhouse gases trap heat re-radiated from Earth\'s surface; CO₂ from burning fossil fuels is the main anthropogenic contributor', fact:'🔥 Earth\'s surface absorbs sunlight and re-emits infrared radiation. CO₂, methane, and water vapour in the atmosphere absorb this IR and re-radiate it, keeping Earth warm — vital for life. But excess CO₂ from fossil fuels is intensifying this warming!' },
  { level:2, visual:'⚗️', question:'What is atom economy and why does it matter?', options:['% of reactant atoms converted to the desired product; high atom economy = less waste','The number of atoms in the formula','The molar mass of a compound'], answer:'% of reactant atoms converted to the desired product; high atom economy = less waste', fact:'⚗️ Atom economy = (molar mass of desired product ÷ total molar mass of all products) × 100%. Addition reactions have 100% atom economy — all atoms end up in the product. Pharmaceutical chemists aim for high atom economy to reduce chemical waste!' },
  { level:2, visual:'🔬', question:'What is percentage yield and how is it calculated?', options:['(actual yield ÷ theoretical yield) × 100%; measures efficiency of reaction','Ratio of product to reactant molar masses','The purity of the product'], answer:'(actual yield ÷ theoretical yield) × 100%; measures efficiency of reaction', fact:'🔬 If a reaction should produce 10g of product (theoretical) but only 7g are obtained (actual), the yield is 70%. Losses occur due to reversible reactions, side reactions, and imperfect separation. Industrial processes strive for high yield to reduce cost!' },
  { level:2, visual:'🧬', question:'What is a transesterification reaction (biodiesel production)?', options:['Reacting vegetable oil triglycerides with methanol (and NaOH catalyst) to produce fatty acid methyl esters (biodiesel) and glycerol','Reacting methane with steam to produce hydrogen','Cracking long-chain hydrocarbons'], answer:'Reacting vegetable oil triglycerides with methanol (and NaOH catalyst) to produce fatty acid methyl esters (biodiesel) and glycerol', fact:'🧬 Biodiesel is made by replacing the glycerol backbone of vegetable oil with methanol. The resulting fatty acid methyl esters burn cleanly in diesel engines. Glycerol (a by-product) is used in soap and cosmetics!' },
  { level:2, visual:'🔩', question:'What is the significance of shape (geometry) in organic molecules, particularly in pharmaceuticals?', options:['Mirror-image isomers (enantiomers) can have completely different biological effects — one may heal, the other harm','All isomers have identical biological activity','Shape only matters for inorganic compounds'], answer:'Mirror-image isomers (enantiomers) can have completely different biological effects — one may heal, the other harm', fact:'🔩 Thalidomide\'s R-isomer treated morning sickness while the S-isomer caused birth defects. Drug companies now carefully produce single enantiomers. Enzymes and receptor sites are also chiral — only the "right-handed" molecule fits!' },
  { level:2, visual:'⚡', question:'What is a buffer solution and how does it work?', options:['Contains a weak acid and its conjugate base (or weak base and conjugate acid) to resist pH change','A solution kept at constant temperature','A solution with pH exactly 7'], answer:'Contains a weak acid and its conjugate base (or weak base and conjugate acid) to resist pH change', fact:'⚡ In an ethanoic acid/sodium ethanoate buffer: add H⁺ → CH₃COO⁻ absorbs it; add OH⁻ → CH₃COOH neutralises it. The pH barely changes. Biological systems depend critically on buffers — blood pH must stay 7.35-7.45!' },
  { level:2, visual:'🌡️', question:'What is solubility product (Ksp)?', options:['The equilibrium constant for a sparingly soluble salt dissolving, equal to the product of ion concentrations','The maximum amount of solute that dissolves in 100g of solvent','The ratio of solute to solvent in a saturated solution'], answer:'The equilibrium constant for a sparingly soluble salt dissolving, equal to the product of ion concentrations', fact:'🌡️ AgCl(s) ⇌ Ag⁺ + Cl⁻; Ksp = [Ag⁺][Cl⁻] = 1.8×10⁻¹⁰. Very small Ksp means very insoluble. If you add Cl⁻ (common ion effect), equilibrium shifts left — even less AgCl dissolves. This underpins qualitative analysis!' },
  { level:2, visual:'⚖️', question:'What is the common ion effect?', options:['Adding an ion already present in a solution suppresses the dissociation of a weak electrolyte or solubility of a sparingly soluble salt','Adding a catalyst to increase ion concentration','Increasing temperature to change ion balance'], answer:'Adding an ion already present in a solution suppresses the dissociation of a weak electrolyte or solubility of a sparingly soluble salt', fact:'⚖️ Adding NaCl to a saturated AgCl solution increases [Cl⁻], so equilibrium shifts left — AgCl precipitates out. This is used in gravimetric analysis to ensure complete precipitation of an ion for accurate determination!' },
  { level:2, visual:'🔬', question:'What is thin-layer chromatography (TLC) used for?', options:['Separating and identifying compounds in small samples based on different affinities for the stationary and mobile phases','Measuring boiling points of liquids','Testing electrical conductivity of solutions'], answer:'Separating and identifying compounds in small samples based on different affinities for the stationary and mobile phases', fact:'🔬 TLC uses silica-coated plates (stationary phase) and a solvent (mobile phase). Compounds travel different distances, identified by Rf = distance moved by spot ÷ distance moved by solvent. Drug testing, food dye analysis, and forensics all use TLC!' },
  { level:2, visual:'🧪', question:'What is infrared (IR) spectroscopy used for in chemistry?', options:['Identifying functional groups in molecules by which IR frequencies they absorb','Measuring the mass of molecules','Determining the pH of solutions'], answer:'Identifying functional groups in molecules by which IR frequencies they absorb', fact:'🧪 Different bonds (C-H, O-H, C=O) absorb IR at characteristic frequencies (wavenumbers). A broad absorption around 3300 cm⁻¹ indicates O-H; a sharp one around 1700 cm⁻¹ indicates C=O. IR is a "molecular fingerprint" used to identify unknown compounds!' },
  { level:2, visual:'⚗️', question:'What is mass spectrometry used for?', options:['Determining the molecular mass and structural fragments of compounds by ionising and separating ions by mass-to-charge ratio','Measuring pH of solutions','Separating mixtures by boiling point'], answer:'Determining the molecular mass and structural fragments of compounds by ionising and separating ions by mass-to-charge ratio', fact:'⚗️ In mass spectrometry, molecules are vaporised and ionised, then accelerated and separated by mass/charge (m/z). The heaviest peak (molecular ion M⁺) gives the molecular mass. Fragment peaks reveal the structure. Used in drug testing, protein identification, and environmental analysis!' },

  // ── ADDITIONAL HARD (level 3) ── to reach ~167 ──────────────────────────────
  { level:3, visual:'⚛️', question:'What is the aufbau principle?', options:['Electrons fill atomic orbitals in order of increasing energy','Electrons always pair up before occupying empty orbitals','Electrons are shared equally between all orbitals'], answer:'Electrons fill atomic orbitals in order of increasing energy', fact:'⚛️ "Aufbau" means "building up" in German. Electrons fill the lowest-energy orbital first: 1s, 2s, 2p, 3s, 3p, 4s, 3d... The 4s is filled before 3d — that\'s why K has configuration [Ar]4s¹, not [Ar]3d¹!' },
  { level:3, visual:'⚛️', question:'What is Hund\'s rule of maximum multiplicity?', options:['Electrons occupy separate orbitals of the same energy (degenerate orbitals) before pairing up, all with parallel spins','Electrons always pair up first','Electrons fill orbitals in order of decreasing energy'], answer:'Electrons occupy separate orbitals of the same energy (degenerate orbitals) before pairing up, all with parallel spins', fact:'⚛️ In carbon (2p²), the two 2p electrons sit in separate 2p orbitals with parallel spins, not paired in one orbital. This minimises electron-electron repulsion. Hund\'s rule explains why some elements are paramagnetic (attracted to magnets)!' },
  { level:3, visual:'⚛️', question:'What is the Pauli exclusion principle?', options:['No two electrons in an atom can have the same set of four quantum numbers — each orbital holds maximum 2 electrons with opposite spins','All electrons in an atom have the same quantum numbers','An orbital can hold any number of electrons'], answer:'No two electrons in an atom can have the same set of four quantum numbers — each orbital holds maximum 2 electrons with opposite spins', fact:'⚛️ Wolfgang Pauli discovered this in 1925. Each electron has four quantum numbers (n, l, ml, ms). Two electrons can share an orbital only by having opposite spins (↑↓). Without this principle, all electrons would collapse into the lowest energy state — atoms would not have structure!' },
  { level:3, visual:'🌟', question:'What are the four quantum numbers and what does each describe?', options:['n=shell, l=subshell shape, ml=orbital orientation, ms=electron spin','n=neutrons, l=electrons, ml=mass, ms=spin','n=protons, l=shell, ml=neutrons, ms=charge'], answer:'n=shell, l=subshell shape, ml=orbital orientation, ms=electron spin', fact:'🌟 n (principal): 1,2,3... gives shell energy/size. l (azimuthal): 0=s, 1=p, 2=d, 3=f; gives shape. ml: specifies which orbital in a subshell. ms: +½ or -½ gives electron spin direction. Together they uniquely identify every electron!' },
  { level:3, visual:'⚗️', question:'What is aromaticity and why is benzene uniquely stable?', options:['Benzene is a cyclic ring of 6 carbons with delocalised π electrons satisfying Hückel\'s rule (4n+2 π electrons), giving exceptional stability','Benzene has 3 alternating double and single bonds and is very unstable','Benzene is aromatic because it contains oxygen atoms'], answer:'Benzene is a cyclic ring of 6 carbons with delocalised π electrons satisfying Hückel\'s rule (4n+2 π electrons), giving exceptional stability', fact:'⚗️ Benzene (C₆H₆) has 6 π electrons (n=1 in 4n+2=6) delocalised over the whole ring in a π cloud above and below the plane. This delocalisation stabilises benzene enormously — it prefers substitution reactions over addition to preserve the aromatic ring!' },
  { level:3, visual:'🧪', question:'What is electrophilic aromatic substitution (EAS)?', options:['An electrophile attacks the benzene ring, replacing a H atom while preserving aromaticity','An nucleophile attacks benzene adding across a double bond','Benzene undergoes combustion with oxygen'], answer:'An electrophile attacks the benzene ring, replacing a H atom while preserving aromaticity', fact:'🧪 EAS includes nitration (benzene + HNO₃/H₂SO₄ → nitrobenzene), halogenation (benzene + Br₂/AlBr₃ catalyst → bromobenzene), and Friedel-Crafts reactions. All preserve the aromatic ring — the driving force is restoration of the stable delocalised system!' },
  { level:3, visual:'🌸', question:'What are amino acids and what makes them chiral?', options:['Organic molecules with both -NH₂ and -COOH groups; they are chiral (except glycine) because the central carbon has 4 different substituents','Simple organic acids with only a -COOH group','Sugars with amino groups'], answer:'Organic molecules with both -NH₂ and -COOH groups; they are chiral (except glycine) because the central carbon has 4 different substituents', fact:'🌸 Every amino acid (except glycine) has a chiral carbon centre. Biological systems use only L-amino acids. The R-form might not fit enzyme active sites or receptor binding pockets. This chirality is fundamental to why life is "left-handed"!' },
  { level:3, visual:'🔬', question:'What is the Henderson-Hasselbalch equation?', options:['pH = pKa + log([A⁻]/[HA]); relates pH of a buffer to pKa and concentration ratio of conjugate base to weak acid','pH = -log[H⁺]','pH = pKw - pOH'], answer:'pH = pKa + log([A⁻]/[HA]); relates pH of a buffer to pKa and concentration ratio of conjugate base to weak acid', fact:'🔬 If [A⁻]=[HA], pH = pKa (log 1 = 0). Buffer is most effective at pH ≈ pKa ± 1. This equation is used by biochemists to design buffer solutions for laboratory experiments and to model blood chemistry!' },
  { level:3, visual:'⚖️', question:'What is the equilibrium constant (Kc) and what does its value indicate?', options:['Kc = [products]/[reactants] at equilibrium; large Kc means reaction strongly favours products','Kc is always greater than 1','Kc equals the rate of reaction'], answer:'Kc = [products]/[reactants] at equilibrium; large Kc means reaction strongly favours products', fact:'⚖️ For aA + bB ⇌ cC + dD: Kc = [C]ᶜ[D]ᵈ / [A]ᵃ[B]ᵇ. Kc > 1: products favoured. Kc < 1: reactants favoured. Kc for H₂O self-ionisation = 10⁻¹⁴ (very small — water barely ionises)!' },
  { level:3, visual:'📊', question:'What is the reaction quotient (Q) and how does it relate to Kc?', options:['Q uses current concentrations; if Q < Kc, reaction proceeds forward; if Q > Kc, reaction proceeds reverse','Q is always equal to Kc','Q is the activation energy divided by temperature'], answer:'Q uses current concentrations; if Q < Kc, reaction proceeds forward; if Q > Kc, reaction proceeds reverse', fact:'📊 Q is calculated like Kc but with non-equilibrium concentrations. If Q < Kc, the system needs more products — it shifts forward. If Q > Kc, too many products — shifts reverse. Q = Kc at equilibrium!' },
  { level:3, visual:'🔋', question:'What is the standard electrode potential (E°) and how is cell voltage calculated?', options:['E° is the voltage of a half-cell vs SHE at standard conditions; E°cell = E°cathode - E°anode','E° is the pH of an electrode solution','E°cell = E°cathode + E°anode'], answer:'E° is the voltage of a half-cell vs SHE at standard conditions; E°cell = E°cathode - E°anode', fact:'🔋 Standard conditions: 25°C, 1 mol/L, 1 atm. E°(Zn²⁺/Zn) = -0.76V; E°(Cu²⁺/Cu) = +0.34V. E°cell = 0.34-(-0.76) = 1.10V. This predicts the voltage of a Daniell cell before it is even built!' },
  { level:3, visual:'⚡', question:'What is the Nernst equation used for?', options:['Calculating electrode potential under non-standard conditions (non-1 mol/L concentrations)','Calculating moles from mass','Calculating activation energy from temperature dependence of rate'], answer:'Calculating electrode potential under non-standard conditions (non-1 mol/L concentrations)', fact:'⚡ E = E° - (RT/nF)lnQ. As concentrations change, cell voltage changes. Biological cells maintain ion gradients across membranes — the Nernst equation calculates the voltage across nerve cell membranes, explaining how nerve impulses work!' },
  { level:3, visual:'🧬', question:'What is retrosynthetic analysis in organic chemistry?', options:['Working backwards from target molecule to identify which starting materials and reactions are needed','Synthesising molecules in the reverse order','Analysing reaction products to identify reactants by spectroscopy'], answer:'Working backwards from target molecule to identify which starting materials and reactions are needed', fact:'🧬 Retrosynthesis (invented by E.J. Corey, Nobel Prize 1990) is the art of deconstructing a target molecule step by step into simpler precursors. Each disconnection (⇒) suggests a reaction. It is how chemists plan multi-step synthesis of complex drug molecules!' },
  { level:3, visual:'🌡️', question:'What is Gibbs free energy and how does temperature affect spontaneity?', options:['ΔG = ΔH - TΔS; if ΔH<0 and ΔS>0, spontaneous at all T; if ΔH>0 and ΔS<0, never spontaneous','ΔG = ΔH + ΔS','ΔG determines reaction rate not spontaneity'], answer:'ΔG = ΔH - TΔS; if ΔH<0 and ΔS>0, spontaneous at all T; if ΔH>0 and ΔS<0, never spontaneous', fact:'🌡️ Temperature is key: if ΔH > 0 and ΔS > 0 (e.g. dissolving NH₄NO₃), at high T the -TΔS term dominates, making ΔG negative — spontaneous at high T. Ice melting: ΔH>0, ΔS>0, spontaneous above 0°C where T×ΔS > ΔH!' },
  { level:3, visual:'🔗', question:'What are hydrogen bonds and what unusual properties do they give water?', options:['Attractions between H bonded to F/O/N and the lone pair of another F/O/N; give water high boiling point, surface tension, and ice that floats','Bonds between hydrogen nuclei in H₂','Covalent bonds between two water molecules'], answer:'Attractions between H bonded to F/O/N and the lone pair of another F/O/N; give water high boiling point, surface tension, and ice that floats', fact:'🔗 Hydrogen bonds are about 10× stronger than van der Waals forces but 10× weaker than covalent bonds. They give water its anomalously high boiling point (100°C vs -60°C predicted from just mass), surface tension, and the property that ice is less dense than liquid water!' },
  { level:3, visual:'💎', question:'What is lattice enthalpy and what does a large lattice enthalpy indicate?', options:['Energy needed to separate 1 mole of ionic compound into gaseous ions; large value means strong ionic bonding and high melting point','Energy released when 1 mole of ionic compound dissolves in water','Energy needed to boil 1 mole of a liquid'], answer:'Energy needed to separate 1 mole of ionic compound into gaseous ions; large value means strong ionic bonding and high melting point', fact:'💎 MgO has much higher lattice enthalpy than NaCl because Mg²⁺ and O²⁻ have double charges and are smaller ions — stronger, shorter bonds. Lattice enthalpy is calculated using the Born-Haber cycle and Hess\'s Law!' },
  { level:3, visual:'⚗️', question:'What is a Born-Haber cycle?', options:['A thermochemical cycle applying Hess\'s Law to calculate lattice enthalpy of ionic compounds using known enthalpy values','A cycle of reactions producing ammonia','A biological cycle producing ATP'], answer:'A thermochemical cycle applying Hess\'s Law to calculate lattice enthalpy of ionic compounds using known enthalpy values', fact:'⚗️ Lattice enthalpy cannot be measured directly, but the Born-Haber cycle links it to measurable quantities: formation enthalpy, atomisation enthalpies, ionisation energies, and electron affinities. It is Hess\'s Law applied to ionic bonding!' },
  { level:3, visual:'🌿', question:'What is enthalpy of solution and why can some ionic salts dissolve endothermically yet still spontaneously?', options:['Enthalpy of dissolving; even endothermic dissolving can be spontaneous if entropy increases enough (TΔS > ΔH) ','All salts dissolve exothermically','Only exothermic dissolving is spontaneous'], answer:'Enthalpy of dissolving; even endothermic dissolving can be spontaneous if entropy increases enough (TΔS > ΔH) ', fact:'🌿 NH₄NO₃ dissolves endothermically (+25 kJ/mol) yet dissolves spontaneously because the entropy increase of spreading ions through water is large. ΔG = ΔH - TΔS < 0 at room temperature. Cold packs use this endothermic dissolving!' },
  { level:3, visual:'⚛️', question:'What is the de Broglie wavelength and what does it mean for electrons?', options:['λ = h/mv; electrons have wave properties — wavelength depends on momentum, explaining electron diffraction and atomic orbital shapes','Electrons travel in circular orbits with fixed energy','Electrons do not have wave properties'], answer:'λ = h/mv; electrons have wave properties — wavelength depends on momentum, explaining electron diffraction and atomic orbital shapes', fact:'⚛️ Louis de Broglie (1924) proposed all matter has wave properties. Electrons in atoms have wavelengths comparable to atomic dimensions — this is why they form standing waves (orbitals) rather than definite paths. Electron microscopes use electron wavelengths shorter than light to image atoms!' },
  { level:3, visual:'🔬', question:'What is the Heisenberg uncertainty principle?', options:['It is impossible to simultaneously know both the exact position and exact momentum of a particle','The energy of a photon equals its frequency times Planck\'s constant','All isotopes are equally stable'], answer:'It is impossible to simultaneously know both the exact position and exact momentum of a particle', fact:'🔬 Δx × Δp ≥ ħ/2. The more precisely you measure an electron\'s position, the less certain its momentum — and vice versa. This is not a measurement limitation but a fundamental property of quantum systems. It is why we describe electron positions as probability clouds (orbitals), not definite paths!' },
  { level:3, visual:'⚡', question:'What is photoelectron spectroscopy (PES) and what can it reveal?', options:['Measures energy needed to remove electrons from each orbital, revealing shell/subshell energy levels and confirming electron configuration','Measures wavelength of light absorbed by atoms','Measures the mass of atoms'], answer:'Measures energy needed to remove electrons from each orbital, revealing shell/subshell energy levels and confirming electron configuration', fact:'⚡ PES fires high-energy photons at atoms and measures the kinetic energy of ejected electrons. Each peak corresponds to a different orbital. The peak heights show relative numbers of electrons in each subshell — direct experimental evidence for electron shell structure!' },
  { level:3, visual:'🧪', question:'What are transition metals and what four characteristic properties do they share?', options:['d-block elements with partially filled d orbitals; variable oxidation states, coloured compounds, catalytic activity, and complex ion formation','Elements in group 1 and 2; they are all very reactive metals','Radioactive elements only found in nuclear reactors'], answer:'d-block elements with partially filled d orbitals; variable oxidation states, coloured compounds, catalytic activity, and complex ion formation', fact:'🧪 Fe can be +2 (FeSO₄, pale green) or +3 (Fe₂O₃, red-brown). Cu is +1 (white CuCl) or +2 (blue CuSO₄). These variable states arise because 3d and 4s electrons have similar energies. Haemoglobin is a complex ion containing Fe²⁺!' },
  { level:3, visual:'🌊', question:'What is the chelate effect and why are chelating ligands used in medicine?', options:['Polydentate ligands (multiple donor atoms) form more stable complexes than monodentate ones due to entropy gain; EDTA and cisplatin are medical examples','Chelating agents are weaker than monodentate ligands','Chelation reduces solubility of metal ions'], answer:'Polydentate ligands (multiple donor atoms) form more stable complexes than monodentate ones due to entropy gain; EDTA and cisplatin are medical examples', fact:'🌊 EDTA (hexadentate ligand) displaces 6 water molecules when binding a metal — releasing 6 particles increases entropy enormously. EDTA is used to treat heavy metal poisoning (lead, mercury). Cisplatin (bidentate Pt complex) binds to cancer cell DNA and kills the cell!' },
  { level:3, visual:'⚗️', question:'What is the significance of conjugation in organic molecules?', options:['Alternating single and double bonds allow π electron delocalisation, lowering energy, deepening colour, and enabling light absorption','Conjugation makes molecules unstable','Conjugation only applies to benzene rings'], answer:'Alternating single and double bonds allow π electron delocalisation, lowering energy, deepening colour, and enabling light absorption', fact:'⚗️ Lycopene (red in tomatoes) and beta-carotene (orange in carrots) are highly conjugated molecules that absorb visible light. The more extended the conjugation, the longer the wavelength absorbed — from UV into visible light. This principle underlies solar cell dyes and drug design!' },
  { level:3, visual:'💡', question:'What is a nucleophile and give three examples?', options:['An electron-rich species that attacks positive centres; examples: OH⁻, NH₃, CN⁻','An electron-poor species that attacks negative centres','A species that attacks bonds with light energy'], answer:'An electron-rich species that attacks positive centres; examples: OH⁻, NH₃, CN⁻', fact:'💡 Nucleophiles ("nucleus-loving") have lone pairs or negative charge and attack the positive (δ+) carbon in polar bonds. Nucleophilic substitution is how ethanol is made from haloalkanes: CH₃Br + OH⁻ → CH₃OH + Br⁻!' },
  { level:3, visual:'🔩', question:'What is an electrophile and give three examples?', options:['An electron-poor species that attacks electron-rich centres; examples: NO₂⁺, Br⁺, H⁺','An electron-rich species that donates electrons','A free radical with an unpaired electron'], answer:'An electron-poor species that attacks electron-rich centres; examples: NO₂⁺, Br⁺, H⁺', fact:'🔩 Electrophiles ("electron-loving") have empty orbitals or partial positive charge. They attack the π electrons of double bonds or benzene rings. In nitration of benzene, the electrophile is the nitronium ion (NO₂⁺), formed from HNO₃ + H₂SO₄!' },
  { level:3, visual:'⚛️', question:'What is a free radical and how do chain reactions involving them work?', options:['A species with an unpaired electron; chain reactions have initiation, propagation, and termination steps','A charged ion with high energy','A catalyst for addition reactions'], answer:'A species with an unpaired electron; chain reactions have initiation, propagation, and termination steps', fact:'⚛️ Initiation: Cl₂ → 2Cl• (homolytic bond cleavage by UV light). Propagation: Cl• + CH₄ → HCl + CH₃•; CH₃• + Cl₂ → CH₃Cl + Cl•. Termination: two radicals combine. Ozone depletion and combustion both involve free radical chain reactions!' },
  { level:3, visual:'🌡️', question:'What is a pre-exponential factor (A) in the Arrhenius equation?', options:['A reflects collision frequency and orientation factor — not all collisions have the correct geometry for reaction','A is the activation energy itself','A is the temperature in Kelvin'], answer:'A reflects collision frequency and orientation factor — not all collisions have the correct geometry for reaction', fact:'🌡️ k = Ae^(-Ea/RT). Even two molecules with enough energy may not react if they collide from the wrong angle. A accounts for the frequency of correctly oriented collisions. Larger molecules with more directional bonds have smaller A values!' },
  { level:3, visual:'🧬', question:'What is the principle of microscopic reversibility?', options:['The mechanism of a reaction is the same in both forward and reverse directions; transition state is shared','Forward and reverse reactions have different mechanisms','Only irreversible reactions have mechanisms'], answer:'The mechanism of a reaction is the same in both forward and reverse directions; transition state is shared', fact:'🧬 If the forward reaction goes A → [TS] → B, then the reverse goes B → [TS] → A through the same transition state. This principle ensures that catalysts work equally in both directions — they cannot change the equilibrium position, only the speed of reaching it!' },
  { level:3, visual:'🔬', question:'What is gas chromatography-mass spectrometry (GC-MS) and what is it used for?', options:['Combines GC (separation of volatile compounds) with MS (identification by mass) — used in forensics, drug testing, and environmental analysis','A technique for measuring pH of gases','A method for measuring gas density'], answer:'Combines GC (separation of volatile compounds) with MS (identification by mass) — used in forensics, drug testing, and environmental analysis', fact:'🔬 GC-MS is the "gold standard" for identifying trace organic compounds. It can detect a single drop of petrol in an Olympic swimming pool worth of sample! Used to catch athletes doping, identify arson accelerants, and detect food fraud!' },
  { level:3, visual:'💧', question:'What is the Born-Haber cycle result for NaCl — is formation of NaCl from elements exothermic or endothermic overall?', options:['Exothermic (ΔHf° = -411 kJ/mol); the large lattice enthalpy releases more energy than all the endothermic steps cost','Endothermic because ionisation energy of Na is large','Exactly neutral because Na and Cl balance'], answer:'Exothermic (ΔHf° = -411 kJ/mol); the large lattice enthalpy releases more energy than all the endothermic steps cost', fact:'💧 The Born-Haber cycle for NaCl: atomising Na (+108), ionising Na (+496), dissociating Cl₂ (+121), adding electron to Cl (-349), and forming lattice (-787) sum to -411 kJ/mol. The massive lattice enthalpy overcomes all endothermic steps — NaCl is thermodynamically very stable!' },
  { level:3, visual:'⚗️', question:'What is the significance of Avogadro\'s number being so large (6.022×10²³)?', options:['Atoms are unimaginably tiny — you need ~10²³ of them to get a manageable mass (grams); this number bridges atomic and macroscopic scales','It is an arbitrary number chosen by convention','It equals the number of elements in the periodic table squared'], answer:'Atoms are unimaginably tiny — you need ~10²³ of them to get a manageable mass (grams); this number bridges atomic and macroscopic scales', fact:'⚗️ A carbon atom weighs 2×10⁻²³ g. You need 6×10²³ of them to get 12g — a weighable amount. If Avogadro\'s number were smaller, a "mole" would be an invisibly tiny sample; if larger, it would require impossibly huge masses!' },
  { level:3, visual:'🌿', question:'What are enantiomers and diastereomers?', options:['Enantiomers are non-superimposable mirror images; diastereomers are stereoisomers that are NOT mirror images','Enantiomers have different molecular formulas; diastereomers have the same formula','Enantiomers are constitutional isomers; diastereomers differ by one chiral centre'], answer:'Enantiomers are non-superimposable mirror images; diastereomers are stereoisomers that are NOT mirror images', fact:'🌿 Enantiomers have identical physical properties (melting point, boiling point) except they rotate plane-polarised light in opposite directions. Diastereomers have different physical properties — this difference is exploited in separating drug enantiomers for pharmaceutical use!' },
  { level:3, visual:'⚛️', question:'What is the photoelectric effect and how does it prove light is quantised?', options:['Light ejects electrons from metal surfaces only if photon energy exceeds work function regardless of intensity — proving light comes in discrete quanta (photons)','Light heats metal and electrons evaporate when hot enough','Electrons are ejected proportionally to light intensity'], answer:'Light ejects electrons from metal surfaces only if photon energy exceeds work function regardless of intensity — proving light comes in discrete quanta (photons)', fact:'⚛️ Einstein won the 1921 Nobel Prize for this explanation. E = hf: only if photon frequency f is high enough does E > work function, ejecting an electron. Increasing intensity (more photons of same energy) ejects more electrons but does not increase their speed — irrefutable proof of light quantisation!' },

  // ── FINAL TOP-UP MEDIUM (level 2) × 5 ──────────────────────────────────────
  { level:2, visual:'🌡️', question:'What is an exothermic dissolution reaction and give an example?', options:['A salt that releases heat when dissolving; calcium chloride dissolving in water is exothermic','A salt that absorbs heat when dissolving; ammonium nitrate is exothermic','All salts dissolve with no heat change'], answer:'A salt that releases heat when dissolving; calcium chloride dissolving in water is exothermic', fact:'🌡️ When CaCl₂ dissolves, the hydration enthalpy of Ca²⁺ and Cl⁻ ions exceeds the lattice enthalpy — energy is released and the solution heats up. CaCl₂ sachets are used in self-heating food packs and de-icing road salt!' },
  { level:2, visual:'⚗️', question:'What is a zwitterion?', options:['A molecule that carries both a positive and negative charge simultaneously, like amino acids at their isoelectric point','A molecule with no charge at all','A doubly charged anion'], answer:'A molecule that carries both a positive and negative charge simultaneously, like amino acids at their isoelectric point', fact:'⚗️ At neutral pH, amino acids exist as zwitterions: -NH₃⁺ and -COO⁻ groups are both ionised, giving an overall neutral charge. This affects their melting points, solubility, and how they behave in electric fields (electrophoresis)!' },
  { level:2, visual:'🔬', question:'What is recrystallisation and why is it used in the lab?', options:['Dissolving an impure solid in hot solvent and cooling slowly so pure crystals form, leaving impurities in solution','Heating a solid until it melts and solidifies in a purer form','Filtering a solution through fine-pore paper'], answer:'Dissolving an impure solid in hot solvent and cooling slowly so pure crystals form, leaving impurities in solution', fact:'🔬 Recrystallisation exploits the fact that solubility changes with temperature. The impure compound dissolves in minimum hot solvent; on cooling, the pure product crystallises out first because it is present in larger amount. Impurities stay dissolved at low concentration!' },
  { level:2, visual:'💧', question:'What is the difference between molarity and molality?', options:['Molarity is moles per litre of solution; molality is moles per kilogram of solvent — molality does not change with temperature','They are identical measurements','Molarity uses mass; molality uses volume'], answer:'Molarity is moles per litre of solution; molality is moles per kilogram of solvent — molality does not change with temperature', fact:'💧 Molarity (mol/L) changes with temperature because volume expands/contracts. Molality (mol/kg solvent) is independent of temperature — used in calculating boiling point elevation and freezing point depression, where temperature is the variable!' },
  { level:2, visual:'🧪', question:'What are colligative properties and give two examples?', options:['Properties that depend only on the number of solute particles, not their identity; boiling point elevation and freezing point depression','Properties that depend on the chemical identity of the solute','Properties that change with temperature only'], answer:'Properties that depend only on the number of solute particles, not their identity; boiling point elevation and freezing point depression', fact:'🧪 Dissolving any solute in water raises the boiling point and lowers the freezing point — proportional to the number of particles. Antifreeze (ethylene glycol) in a car radiator lowers the freezing point. Salt on icy roads lowers the melting point of ice!' },

  // ── FINAL TOP-UP HARD (level 3) × 20 ────────────────────────────────────────
  { level:3, visual:'⚗️', question:'What is the principle of detailed balance in chemical kinetics?', options:['At equilibrium, the rate of every elementary forward step equals the rate of its reverse step','At equilibrium all reactions stop','Only the slowest step (rate-determining step) operates at equilibrium'], answer:'At equilibrium, the rate of every elementary forward step equals the rate of its reverse step', fact:'⚗️ Detailed balance is a fundamental consequence of time-reversal symmetry. It means equilibrium constants can be calculated from rate constants: Kc = kforward / kreverse. This deep connection between thermodynamics and kinetics is foundational to physical chemistry!' },
  { level:3, visual:'🔬', question:'What is the rate-determining step in a reaction mechanism?', options:['The slowest elementary step in a multi-step mechanism that controls the overall reaction rate','The fastest step in a mechanism','The step that releases the most energy'], answer:'The slowest elementary step in a multi-step mechanism that controls the overall reaction rate', fact:'🔬 If a reaction occurs in three steps and step 2 is slow, steps 1 and 3 are fast — step 2 determines the overall rate. The rate law only involves species present up to and including the rate-determining step. Identifying it is key to understanding reaction mechanisms!' },
  { level:3, visual:'🧪', question:'What is molecularity of an elementary reaction step?', options:['The number of reactant molecules involved in that single elementary step (unimolecular, bimolecular, or termolecular)','The total number of moles of products','The number of steps in the complete mechanism'], answer:'The number of reactant molecules involved in that single elementary step (unimolecular, bimolecular, or termolecular)', fact:'🧪 Unimolecular: A → products (rate = k[A]). Bimolecular: A + B → products (rate = k[A][B]). Termolecular steps are rare because three molecules must collide simultaneously. Molecularity always equals the reaction order for elementary steps!' },
  { level:3, visual:'⚖️', question:'What is steady-state approximation in enzyme kinetics?', options:['The concentration of an intermediate (enzyme-substrate complex) is assumed constant because its formation rate equals its decomposition rate','The enzyme concentration is constant throughout','The substrate concentration never changes'], answer:'The concentration of an intermediate (enzyme-substrate complex) is assumed constant because its formation rate equals its decomposition rate', fact:'⚖️ The Michaelis-Menten equation derives from this: v = Vmax[S]/(Km + [S]). Km (Michaelis constant) equals [S] at half-maximum velocity. Understanding enzyme kinetics is essential for designing drugs that inhibit disease-causing enzymes!' },
  { level:3, visual:'💎', question:'What are the different types of crystal structures: ionic, metallic, covalent network, and molecular?', options:['Ionic: alternating +/- ions; metallic: atoms in electron sea; covalent network: giant covalent lattice; molecular: discrete molecules held by intermolecular forces','They are all the same type of structure','Only ionic and metallic structures exist in crystals'], answer:'Ionic: alternating +/- ions; metallic: atoms in electron sea; covalent network: giant covalent lattice; molecular: discrete molecules held by intermolecular forces', fact:'💎 NaCl = ionic (high mp, conducts when molten). Iron = metallic (conducts always, malleable). Diamond = covalent network (extremely high mp, very hard). Ice = molecular (low mp, does not conduct). The bonding type determines all physical properties!' },
  { level:3, visual:'🌊', question:'What is the solubility product principle and the common ion effect applied to tooth decay?', options:['Tooth enamel (Ca₅(PO₄)₃OH) dissolves in acid — adding fluoride as F⁻ replaces OH⁻, making fluorapatite which has a lower Ksp and is more acid-resistant','Fluoride dissolves enamel','Saliva increases the solubility of enamel'], answer:'Tooth enamel (Ca₅(PO₄)₃OH) dissolves in acid — adding fluoride as F⁻ replaces OH⁻, making fluorapatite which has a lower Ksp and is more acid-resistant', fact:'🌊 When you eat sugar, bacteria produce acid that dissolves enamel (hydroxyapatite). Fluoride replaces the hydroxide, forming fluorapatite — 10× less soluble and much more acid-resistant. This is the chemistry behind why fluoride toothpaste and fluoridated water prevent tooth decay!' },
  { level:3, visual:'🔋', question:'What is the Faraday constant and how is it used in electrolysis calculations?', options:['F = 96,485 C/mol; the charge of 1 mole of electrons — used with moles of electrons transferred to calculate mass deposited at an electrode','F is the molar mass of iron','F is Avogadro\'s number divided by 10'], answer:'F = 96,485 C/mol; the charge of 1 mole of electrons — used with moles of electrons transferred to calculate mass deposited at an electrode', fact:'🔋 Faraday\'s laws of electrolysis: mass deposited = (M × I × t)/(n × F), where n = electrons per ion. To deposit 64g of copper (Cu²⁺ + 2e⁻ → Cu, n=2): charge needed = 2 × 96,485 = 192,970 C. Used to design industrial electrolysis plants!' },
  { level:3, visual:'⚛️', question:'What is nuclear binding energy and the mass defect?', options:['Nuclear binding energy is the energy released when nucleons bind; mass defect is the mass lost — converted to energy by E=mc²','Nuclear binding energy is the ionisation energy of the nucleus','Mass defect is the number of neutrons minus protons'], answer:'Nuclear binding energy is the energy released when nucleons bind; mass defect is the mass lost — converted to energy by E=mc²', fact:'⚛️ An atom weighs LESS than the sum of its separated protons, neutrons, and electrons. This "missing" mass (Δm) was converted to binding energy: E = Δmc². Fe-56 has the highest binding energy per nucleon — the most stable nucleus. Elements lighter or heavier than iron release energy by fusion or fission!' },
  { level:3, visual:'🌡️', question:'What is the third law of thermodynamics?', options:['The entropy of a perfect crystal at absolute zero is exactly zero','Energy cannot be created or destroyed','Heat cannot flow from cold to hot spontaneously'], answer:'The entropy of a perfect crystal at absolute zero is exactly zero', fact:'🌡️ The Third Law (Nernst 1906) gives entropy an absolute reference point: S = 0 at 0 K for a perfect crystal. This allows chemists to calculate absolute entropies for substances, not just entropy changes. It also implies 0 K is physically unachievable!' },
  { level:3, visual:'🔗', question:'What are sigma (σ) and pi (π) bonds in covalent molecules?', options:['σ bonds form by end-on orbital overlap (always present in single bonds); π bonds form by side-on overlap (present in double/triple bonds and more reactive)','σ bonds are stronger than π bonds in all cases','π bonds form first; σ bonds form second'], answer:'σ bonds form by end-on orbital overlap (always present in single bonds); π bonds form by side-on overlap (present in double/triple bonds and more reactive)', fact:'🔗 Every single bond is a σ bond. A double bond = 1σ + 1π. A triple bond = 1σ + 2π. π bonds have electron density above and below the bond axis — exposed and reactive. Alkenes react via their π bond; alkanes (only σ) are much less reactive!' },
  { level:3, visual:'🧬', question:'What is genetic engineering in terms of chemistry, and what role do restriction enzymes play?', options:['Restriction enzymes cut DNA at specific sequences; ligases join fragments — allowing specific genes to be inserted into organisms to produce proteins like insulin','Restriction enzymes denature proteins','Genetic engineering changes electron configurations of DNA bases'], answer:'Restriction enzymes cut DNA at specific sequences; ligases join fragments — allowing specific genes to be inserted into organisms to produce proteins like insulin', fact:'🧬 Recombinant DNA technology: cut human insulin gene with restriction enzyme → insert into bacterial plasmid → bacteria produce human insulin. Before this (1982), diabetics needed insulin from pig/cow pancreases. Restriction enzymes recognise palindromic sequences — a beautiful example of molecular recognition!' },
  { level:3, visual:'🌿', question:'What is the electron transport chain (ETC) in terms of chemistry?', options:['A series of redox reactions in the mitochondrial membrane where electrons from NADH reduce O₂ to H₂O, driving ATP synthesis','Photosynthesis occurring in the mitochondria','Transport of electrons between atoms in metallic bonding'], answer:'A series of redox reactions in the mitochondrial membrane where electrons from NADH reduce O₂ to H₂O, driving ATP synthesis', fact:'🌿 The ETC is respiration\'s final stage. NADH donates electrons that pass through protein complexes (I, II, III, IV), losing energy at each step. This energy pumps H⁺ ions across the membrane, and their flow through ATP synthase generates ATP. O₂ is the final electron acceptor, forming water!' },
  { level:3, visual:'⚡', question:'What is a voltaic cell\'s EMF (electromotive force) and what happens to voltage as the cell discharges?', options:['EMF is the maximum voltage at zero current; as the cell discharges, ion concentrations change, Q shifts, and voltage decreases (Nernst equation)','EMF stays constant throughout discharge','Voltage increases as the cell discharges'], answer:'EMF is the maximum voltage at zero current; as the cell discharges, ion concentrations change, Q shifts, and voltage decreases (Nernst equation)', fact:'⚡ E = E° - (0.0592/n)log Q at 25°C. As cell discharges, reactant concentrations fall and product concentrations rise — Q increases. When Q = Kc, E = 0 — the cell is "flat". This is why torch batteries dim gradually rather than switching off suddenly!' },
  { level:3, visual:'🔬', question:'What is X-ray crystallography and what famous molecule\'s structure did it reveal?', options:['X-rays diffract off crystal planes to reveal 3D atomic structure; Rosalind Franklin\'s X-ray images revealed the double helix structure of DNA in 1952','X-rays measure molecular mass','X-ray crystallography measures pH at atomic scale'], answer:'X-rays diffract off crystal planes to reveal 3D atomic structure; Rosalind Franklin\'s X-ray images revealed the double helix structure of DNA in 1952', fact:'🔬 Bragg\'s Law: nλ = 2d sinθ. X-rays scattered by crystal planes interfere constructively at specific angles, giving a diffraction pattern. From this, atomic positions can be calculated. Franklin\'s Photo 51 (1952) provided critical data leading to Watson and Crick\'s DNA double helix model!' },
  { level:3, visual:'💧', question:'What is supercritical fluid and what is its practical use?', options:['A state above both critical temperature and pressure with properties of both liquid and gas; supercritical CO₂ is used as an industrial solvent and for decaffeinating coffee','A liquid above its boiling point','A gas compressed to liquid density'], answer:'A state above both critical temperature and pressure with properties of both liquid and gas; supercritical CO₂ is used as an industrial solvent and for decaffeinating coffee', fact:'💧 Above Tc (31°C) and Pc (74 atm) for CO₂, the liquid-gas boundary disappears — supercritical CO₂ exists. It diffuses like a gas but dissolves like a liquid. It extracts caffeine without leaving residue, then evaporates completely — leaving pure decaffeinated coffee with no toxic solvent!' },

function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}

    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
init();
</script>
</body>
</html>
