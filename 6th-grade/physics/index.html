  { level:1, visual:'⚙️', question:'Which of these is an example of elastic potential energy?', options:['A compressed spring','A moving car','A raised book'], answer:'A compressed spring', fact:'⚙️ Elastic PE is stored in deformed elastic materials: springs, rubber bands, a drawn bow. When released, it converts to kinetic energy. Pogo sticks and trampolines both use elastic PE!' },
  { level:1, visual:'🔋', question:'What is fossil fuel?', options:['Fuel formed over millions of years from the remains of ancient organisms (coal, oil, natural gas)','Fuel made from recently grown plants','Nuclear fuel extracted from rocks'], answer:'Fuel formed over millions of years from the remains of ancient organisms (coal, oil, natural gas)', fact:'🔋 Fossil fuels formed over 300+ million years. We are burning them millions of times faster than they form. This releases stored carbon as CO₂, driving climate change — the defining challenge of our era.' },
  { level:1, visual:'🌊', question:'What does it mean if a wave has a higher frequency?', options:['More waves pass a point per second — the wave is more "squeezed", with shorter wavelength','The wave is taller','The wave travels faster'], answer:'More waves pass a point per second — the wave is more "squeezed", with shorter wavelength', fact:'🌊 For a wave at constant speed, higher frequency = shorter wavelength (v = fλ). A bat\'s 50,000 Hz ultrasound has wavelength 0.68 cm — small enough to detect insects. Human speech (200-3,000 Hz) has much longer wavelengths!' },
  { level:1, visual:'💡', question:'What is sound waves in terms of what medium they need?', options:['Sound needs a physical medium (solid, liquid, or gas) to travel','Sound can travel through a vacuum at 340 m/s','Sound travels best through vacuum'], answer:'Sound needs a physical medium (solid, liquid, or gas) to travel', fact:'💡 Sound is a mechanical pressure wave — it needs particles to compress and expand. Astronauts on the Moon cannot hear each other without radio because the Moon has no atmosphere!' },
  { level:1, visual:'🌍', question:'What is weight measured in?', options:['Newtons (N)','Kilograms (kg)','Joules (J)'], answer:'Newtons (N)', fact:'🌍 Weight is a force (gravity pulling on mass), so it\'s measured in Newtons. Mass is measured in kg. On Earth, 1 kg of mass weighs about 10 N. Don\'t say "I weigh 70 kg" — you mean your mass is 70 kg; your weight is ~700 N!' },
  { level:1, visual:'⚡', question:'What does it mean for a circuit to be "open"?', options:['The circuit has a break so current cannot flow','Current flows freely through the circuit','The circuit has too many components'], answer:'The circuit has a break so current cannot flow', fact:'⚡ An open circuit (e.g., open switch, broken wire, burnt-out fuse) stops current. A closed circuit allows continuous current flow. Fuses protect circuits by intentionally breaking open if too much current flows!' },
  { level:1, visual:'🔥', question:'What is the main purpose of insulation in a house?', options:['To reduce the rate of heat transfer, keeping the house warm in winter and cool in summer','To increase the rate of heat transfer','To store heat energy inside the walls'], answer:'To reduce the rate of heat transfer, keeping the house warm in winter and cool in summer', fact:'🔥 Loft insulation, cavity wall insulation, double glazing, and draught excluders all reduce heat loss. About 25% of heat escapes through the roof, 35% through walls. Good insulation saves energy and money!' },
  { level:1, visual:'🧲', question:'What are the two poles of a magnet?', options:['North and south','Positive and negative','East and west'], answer:'North and south', fact:'🧲 Every magnet has a north and a south pole — you can never isolate a single pole (magnetic monopole). If you cut a magnet in half, you get two smaller magnets, each with its own north and south!' },
  { level:1, visual:'🌊', question:'What is ultrasound?', options:['Sound with a frequency above the upper limit of human hearing (above ~20,000 Hz)','Very loud sound','Sound that travels through solids only'], answer:'Sound with a frequency above the upper limit of human hearing (above ~20,000 Hz)', fact:'🌊 Ultrasound (>20 kHz) is used in medical imaging (prenatal scans), sonar in ships, and cleaning jewellery. Bats and dolphins use echolocation with ultrasound to navigate and hunt!' },
  { level:1, visual:'🔭', question:'Why do objects appear to change position when viewed from different angles?', options:['Parallax — the apparent shift of a nearby object against a distant background when observed from different positions','Because objects are always moving','Due to refraction of light from the objects'], answer:'Parallax — the apparent shift of a nearby object against a distant background when observed from different positions', fact:'🔭 Parallax is used to measure distances to nearby stars — Earth\'s position changes by 300 million km over 6 months, causing nearby stars to shift slightly against the background of distant stars!' },
  { level:1, visual:'💡', question:'What is the difference between renewable and non-renewable energy?', options:['Renewable energy sources replenish naturally on human timescales; non-renewable will run out','Renewable energy is always more powerful','Non-renewable energy sources are cleaner'], answer:'Renewable energy sources replenish naturally on human timescales; non-renewable will run out', fact:'💡 Renewables (solar, wind, hydro, tidal, geothermal) are sustainable but often intermittent. Non-renewables (coal, oil, gas, uranium) are energy-dense and reliable but finite and often polluting.' },
  { level:1, visual:'⚡', question:'What is voltage?', options:['The "push" (electrical potential difference) that drives current around a circuit, measured in Volts (V)','The flow of electric charge through a conductor','The opposition to current in a circuit'], answer:'The "push" (electrical potential difference) that drives current around a circuit, measured in Volts (V)', fact:'⚡ Voltage is like the pressure in a water pipe — more voltage means more "push" for the electrons. UK mains voltage is 230 V. A AA battery is 1.5 V. Lightning bolts can be hundreds of millions of Volts!' },
  { level:1, visual:'🌍', question:'What force keeps planets in orbit around the Sun?', options:['Gravity','Nuclear force','Electromagnetic force'], answer:'Gravity', fact:'🌍 The Sun\'s enormous gravity keeps all planets in elliptical orbits. The further a planet is from the Sun, the weaker the gravitational pull, and the slower it orbits. Neptune takes 165 years to complete one orbit!' },
  { level:1, visual:'🔋', question:'What is the unit of electric charge?', options:['Coulomb (C)','Ampere (A)','Volt (V)'], answer:'Coulomb (C)', fact:'🔋 Named after Charles-Augustin de Coulomb. 1 Coulomb = charge of about 6.24×10¹⁸ electrons. 1 Ampere = 1 Coulomb per second flowing past a point.' },
  { level:1, visual:'⚙️', question:'What is the principle behind hydroelectric power?', options:['Gravitational potential energy of stored water is converted to kinetic energy (flow) and then to electrical energy','Chemical energy in water is converted directly to electricity','Thermal energy of water is used to drive turbines'], answer:'Gravitational potential energy of stored water is converted to kinetic energy (flow) and then to electrical energy', fact:'⚙️ Water stored in a high reservoir has GPE. Released through turbines, it converts to KE, driving generators. Hydroelectric dams (like the Three Gorges in China) can produce enormous amounts of clean energy!' },
  { level:1, visual:'🔥', question:'Why does a dark-coloured road surface get hotter than a light-coloured one in sunlight?', options:['Dark surfaces absorb more radiation; light surfaces reflect more','Dark surfaces have higher specific heat capacity','Dark surfaces conduct heat from underground better'], answer:'Dark surfaces absorb more radiation; light surfaces reflect more', fact:'🔥 Dark/matt surfaces absorb more EM radiation (and also emit more). Light/shiny surfaces reflect more and absorb less. White roofs in hot climates reduce cooling costs significantly — a simple physics solution!' },
  { level:1, visual:'🌈', question:'What is the speed of sound in air at room temperature?', options:['About 340 m/s','About 3,000 m/s','About 34 m/s'], answer:'About 340 m/s', fact:'🌈 At 20°C, sound travels at ~343 m/s in air. It varies with temperature — warmer air is faster. In water, sound travels about 4× faster (~1,500 m/s); in steel, about 15× faster (~5,000 m/s)!' },
  { level:1, visual:'🏃', question:'What is the unit of force?', options:['Newton (N)','Kilogram (kg)','Joule (J)'], answer:'Newton (N)', fact:'🏃 The Newton is named after Isaac Newton. 1 N is the force needed to accelerate 1 kg by 1 m/s². The weight of a small apple (~100 g) is about 1 Newton — handy to remember!' },
  { level:1, visual:'💨', question:'What is the effect of streamlining on a moving vehicle?', options:['It reduces air resistance by allowing air to flow smoothly around the vehicle','It increases air resistance to improve braking','It has no effect on air resistance'], answer:'It reduces air resistance by allowing air to flow smoothly around the vehicle', fact:'💨 Sports cars, aeroplanes, and submarines are streamlined to minimise drag. Lorries use roof fairings and side skirts to improve aerodynamics, saving significant fuel on long journeys.' },
  { level:1, visual:'💡', question:'What type of energy is stored in a raised object?', options:['Gravitational potential energy','Kinetic energy','Elastic potential energy'], answer:'Gravitational potential energy', fact:'💡 GPE = mgh. The higher and heavier an object, the more GPE it stores. Clocks were historically driven by heavy weights descending slowly — GPE converted to the kinetic energy of the clock mechanism!' },
  { level:1, visual:'🌊', question:'Why is it cooler in the shade?', options:['Shade blocks direct sunlight (radiation), so less energy is transferred to you','Shade blocks all forms of heat transfer','Shade creates cold air that cools you down'], answer:'Shade blocks direct sunlight (radiation), so less energy is transferred to you', fact:'🌊 In the shade, you still receive heat by convection from warm air and some radiation from surroundings, but the intense direct solar radiation is blocked. That\'s why a shade temperature can still feel hot!' },
  { level:1, visual:'🔋', question:'What is nuclear energy used for in power stations?', options:['To heat water into steam, which drives turbines connected to generators','To directly power electrical devices','To create electricity through chemical reactions'], answer:'To heat water into steam, which drives turbines connected to generators', fact:'🔋 Nuclear fission heats water to steam (thermal energy) → turbines spin (kinetic energy) → generators produce electricity. The nuclear part just replaces the burning of fossil fuels — the rest of the power station works the same way!' },
  { level:1, visual:'🔥', question:'What is geothermal energy?', options:['Energy harnessed from the natural heat inside the Earth','Energy from the Sun stored in the ground','Energy stored in ocean currents'], answer:'Energy harnessed from the natural heat inside the Earth', fact:'🔥 Earth\'s interior is heated by radioactive decay and residual heat from planetary formation. Iceland generates over 25% of its electricity from geothermal power — and heats most of its buildings this way!' },
  { level:1, visual:'⚙️', question:'What does the term "specific" mean when referring to specific heat capacity?', options:['Per unit mass (i.e., per 1 kilogram of the substance)','The most precise measurement available','The capacity to hold a specific temperature'], answer:'Per unit mass (i.e., per 1 kilogram of the substance)', fact:'⚙️ "Specific" in physics usually means "per kilogram". Specific heat capacity = energy per kg per degree. Water\'s SHC (4,200 J/kg°C) is much higher than iron\'s (450 J/kg°C) — water stores much more heat per kg!' },
  { level:1, visual:'🌍', question:'What is the approximate weight of a 70 kg person on Earth? (g = 10 N/kg)', options:['700 N','70 N','7,000 N'], answer:'700 N', fact:'🌍 W = mg = 70 × 10 = 700 N. On the Moon (g = 1.6 N/kg), they would weigh only 112 N. In space far from any planet (g ≈ 0), they would be weightless — but still have 70 kg of mass!' },
  { level:1, visual:'⚡', question:'What is the main difference between a series and a parallel circuit?', options:['Series: one path for current; Parallel: multiple paths for current','Series: components share voltage; Parallel: components share current','Series: has switches; Parallel: does not'], answer:'Series: one path for current; Parallel: multiple paths for current', fact:'⚡ In series, all components share the same current. In parallel, current divides. House wiring is parallel so each room has full mains voltage and can be switched independently.' },

  // ── LEVEL 2 ADDITIONAL ───────────────────────────────────────────────────────
  { level:2, visual:'⚡', question:'What is the equation for gravitational potential energy?', options:['GPE = mgh','GPE = mv²','GPE = mgh²'], answer:'GPE = mgh', fact:'⚡ E_p = mgh where m is mass (kg), g is gravitational field strength (N/kg), h is height (m). A 10 kg mass raised 5 m gains 10×10×5 = 500 J of GPE (g≈10). This is converted to KE on the way down!' },
  { level:2, visual:'🔋', question:'What is the equation for kinetic energy?', options:['KE = ½mv²','KE = mv','KE = ½mv'], answer:'KE = ½mv²', fact:'🔋 The ½v² makes speed very important: doubling speed quadruples KE! A 1,000 kg car at 30 m/s has KE = ½×1,000×900 = 450,000 J. This is why speed limits save lives — stopping distance grows rapidly with speed.' },
  { level:2, visual:'🏃', question:'A force of 400 N acts on a 50 kg object. What is the acceleration?', options:['8 m/s²','20,000 m/s²','0.125 m/s²'], answer:'8 m/s²', fact:'🏃 a = F/m = 400/50 = 8 m/s². This is about 0.8 g — a moderate acceleration. A Formula 1 car can accelerate at around 15 m/s² (1.5 g) when launching from a standing start!' },
  { level:2, visual:'🌊', question:'What is the density formula?', options:['ρ = m/V (density = mass ÷ volume)','ρ = m×V','ρ = V/m'], answer:'ρ = m/V (density = mass ÷ volume)', fact:'🌊 Density (kg/m³) determines whether objects float or sink. Water: 1,000 kg/m³. Steel: 7,800 kg/m³. Ice: 917 kg/m³ (less dense than water — that\'s why icebergs float). A steel ship floats because its average density (including hollow interior) is less than water!' },
  { level:2, visual:'⚙️', question:'What is the relationship between frequency and period of a wave?', options:['f = 1/T (frequency = 1 ÷ period)','f = T','f = 2T'], answer:'f = 1/T (frequency = 1 ÷ period)', fact:'⚙️ Period T is the time for one complete oscillation (in seconds); frequency f is oscillations per second (Hz). A mains frequency of 50 Hz has period T = 1/50 = 0.02 s. Double the period → halve the frequency!' },
  { level:2, visual:'🔭', question:'What is the equation of moments (principle of moments)?', options:['Clockwise moment = Anticlockwise moment: F₁ × d₁ = F₂ × d₂','Moment = Force + Distance','Moment = Force/Distance'], answer:'Clockwise moment = Anticlockwise moment: F₁ × d₁ = F₂ × d₂', fact:'🔭 A 10 N force at 0.5 m from a pivot = 5 N·m. To balance it on the other side: 5 N at 1 m (or 2.5 N at 2 m). This is how balanced scales, seesaws, and crane design all work!' },
  { level:2, visual:'⚡', question:'What is the formula for the charge on a capacitor?', options:['Q = CV (charge = capacitance × voltage)','Q = C/V','Q = C + V'], answer:'Q = CV (charge = capacitance × voltage)', fact:'⚡ Capacitance (Farads) measures how much charge is stored per volt. 1 F = 1 C/V. A 100 μF capacitor charged to 12 V stores Q = 100×10⁻⁶ × 12 = 1.2×10⁻³ C of charge.' },
  { level:2, visual:'🔋', question:'What is the transformer equation?', options:['V_s/V_p = N_s/N_p (secondary/primary voltage ratio equals secondary/primary turns ratio)','V_s = V_p × (N_s + N_p)','V_s/V_p = I_s/I_p'], answer:'V_s/V_p = N_s/N_p (secondary/primary voltage ratio equals secondary/primary turns ratio)', fact:'🔋 A step-up transformer with 10× more turns in secondary gives 10× the voltage. Power = IV = constant for an ideal transformer: if voltage goes up 10×, current goes down 10×. UK mains is transmitted at 400,000 V to reduce current and cable heating losses!' },
  { level:2, visual:'💡', question:'What is the formula for work done?', options:['W = Fd cos θ (force × distance × cosine of angle between force and motion)','W = F/d','W = F + d'], answer:'W = Fd cos θ (force × distance × cosine of angle between force and motion)', fact:'💡 If the force and motion are in the same direction, cos 0° = 1 and W = Fd. Carrying a heavy bag horizontally: force is vertical (weight), motion is horizontal (90°), cos 90° = 0 — no work done against gravity!' },
  { level:2, visual:'🌊', question:'What is the gas pressure law (Gay-Lussac\'s Law) at constant volume?', options:['P/T = constant (pressure is proportional to absolute temperature at constant volume)','P × T = constant','P + T = constant'], answer:'P/T = constant (pressure is proportional to absolute temperature at constant volume)', fact:'🌊 Heat a sealed can → gas pressure increases proportionally (in Kelvin). Double the Kelvin temperature → double the pressure. Car tyres increase in pressure on a hot day. Always use Kelvin for gas law calculations!' },
  { level:2, visual:'🔥', question:'What is latent heat of fusion?', options:['The energy needed to change 1 kg of a substance from solid to liquid at its melting point','The energy needed to raise 1 kg by 1°C','The energy released when a gas condenses to liquid'], answer:'The energy needed to change 1 kg of a substance from solid to liquid at its melting point', fact:'🔥 Ice: latent heat of fusion = 334,000 J/kg. Melting 1 kg of ice requires as much energy as heating that water from 0°C to 80°C! Phase changes absorb/release large amounts of energy without any temperature change.' },
  { level:2, visual:'⚙️', question:'What does the gradient of a velocity-time graph represent?', options:['Acceleration','Distance','Speed'], answer:'Acceleration', fact:'⚙️ On a v-t graph: gradient = Δv/Δt = acceleration. Positive gradient = acceleration; negative gradient = deceleration. The area under a v-t graph = distance travelled. These graphs are fundamental to kinematics!' },
  { level:2, visual:'🏃', question:'What does the gradient of a distance-time graph represent?', options:['Speed','Acceleration','Force'], answer:'Speed', fact:'🏃 On a d-t graph: gradient = Δd/Δt = speed. A horizontal line = stationary (zero speed). A steeper slope = faster speed. A curve = changing speed. These are the standard graphs in kinematics.' },
  { level:2, visual:'💨', question:'What is the formula for electric field strength (E)?', options:['E = F/q (force per unit positive charge, N/C or V/m)','E = qV','E = Fq'], answer:'E = F/q (force per unit positive charge, N/C or V/m)', fact:'💨 Electric field strength E = F/q tells you the force a +1 C test charge would experience. Between parallel plates: E = V/d. Electric fields point from positive to negative. Used in cathode ray tubes and particle accelerators.' },
  { level:2, visual:'🔭', question:'What is refractive index (n)?', options:['n = speed of light in vacuum / speed of light in medium (n = c/v)','n = wavelength in medium / wavelength in vacuum','n = frequency change × wavelength'], answer:'n = speed of light in vacuum / speed of light in medium (n = c/v)', fact:'🔭 Glass has n ≈ 1.5 — light slows to 2/3 its vacuum speed. Diamond has n ≈ 2.4. Higher n means more bending (refraction). Snell\'s Law: n₁ sin θ₁ = n₂ sin θ₂. Critical angle: sin θ_c = 1/n.' },
  { level:2, visual:'⚡', question:'In a series circuit, two resistors are 3 Ω and 7 Ω. The supply voltage is 20 V. What current flows?', options:['2 A','0.5 A','10 A'], answer:'2 A', fact:'⚡ R_total = 3 + 7 = 10 Ω. I = V/R = 20/10 = 2 A. In series, the same 2 A flows through every component. The voltage splits: 6 V across the 3 Ω, 14 V across the 7 Ω (V = IR).' },
  { level:2, visual:'🔋', question:'What is electrical energy (in joules) in terms of power and time?', options:['E = Pt (energy = power × time)','E = P/t','E = P + t'], answer:'E = Pt (energy = power × time)', fact:'🔋 A 2,000 W kettle running for 3 minutes (180 s) uses 2,000 × 180 = 360,000 J = 360 kJ. Electricity bills use kWh: 1 kWh = 3,600,000 J. At 30p/kWh, that kettle costs 0.6p per boil — cheap!' },
  { level:2, visual:'🌊', question:'What is the relationship between stress and strain (Hooke\'s law for materials)?', options:['Stress is proportional to strain within the elastic limit: σ = Eε where E is Young\'s modulus','Stress is always equal to strain','Strain is always greater than stress'], answer:'Stress is proportional to strain within the elastic limit: σ = Eε where E is Young\'s modulus', fact:'🌊 Stress = force/area (Pa); strain = extension/original length (dimensionless). Young\'s modulus E (Pa) measures stiffness. Steel: E ≈ 200 GPa. Rubber: E ≈ 0.01 GPa. Engineers use this to design safe structures!' },
  { level:2, visual:'⚙️', question:'What is the Doppler formula for the observed frequency from a moving source?', options:["f' = f × v/(v ± v_s) where v is wave speed, v_s is source speed",'f\' = f × v_s/v','f\' = f + v_s'], answer:"f' = f × v/(v ± v_s) where v is wave speed, v_s is source speed", fact:"⚙️ Use minus when source approaches (higher pitch) and plus when receding (lower pitch). Police radar guns measure v_s of a car by comparing emitted and reflected microwave frequencies. Very practical physics!" },
  { level:2, visual:'💡', question:'What is the difference between elastic and inelastic collisions?', options:['Elastic: kinetic energy is conserved; Inelastic: some KE is lost (as heat/sound/deformation)','Elastic: momentum is not conserved; Inelastic: momentum is conserved','Elastic: objects stick together; Inelastic: objects bounce apart'], answer:'Elastic: kinetic energy is conserved; Inelastic: some KE is lost (as heat/sound/deformation)', fact:'💡 Momentum is conserved in ALL collisions (if no external forces). KE is only conserved in perfectly elastic collisions (billiard balls approximately; atomic collisions precisely). Real collisions are inelastic.' },
  { level:2, visual:'🔴', question:'What does a fuse do in an electrical circuit?', options:['It melts and breaks the circuit if the current exceeds a safe value, protecting the wiring','It increases the voltage','It measures the current'], answer:'It melts and breaks the circuit if the current exceeds a safe value, protecting the wiring', fact:'🔴 A fuse is a thin wire rated at a specific current (e.g., 3 A or 13 A). Excess current melts the wire, breaking the circuit. Replace the fuse once you have fixed the fault! Modern homes use circuit breakers instead.' },
  { level:2, visual:'🌍', question:'What is terminal velocity, and what determines it?', options:['The constant speed when drag force equals weight; determined by the balance of gravity and air resistance','The maximum speed possible for any object','The speed of a falling object after exactly 1 second'], answer:'The constant speed when drag force equals weight; determined by the balance of gravity and air resistance', fact:'🌍 A skydiver in belly-to-earth position reaches ~55 m/s terminal velocity. Opening a parachute increases drag greatly, setting a new (much lower) terminal velocity of ~5 m/s — safe landing speed!' },
  { level:2, visual:'🔥', question:'What is the combined gas law?', options:['P₁V₁/T₁ = P₂V₂/T₂ (combining Boyle\'s and Charles\'s laws, temperature in Kelvin)','PV = constant always','P + V + T = constant'], answer:'P₁V₁/T₁ = P₂V₂/T₂ (combining Boyle\'s and Charles\'s laws, temperature in Kelvin)', fact:'🔥 The combined gas law lets you solve problems where pressure, volume, and temperature all change. Always convert temperature to Kelvin (K = °C + 273). Used in engineering, weather balloon calculations, and scuba diving physics!' },
  { level:2, visual:'⚡', question:'What is the difference between EMF and terminal voltage of a battery?', options:['EMF is the total voltage; terminal voltage is EMF minus the voltage drop across internal resistance','They are the same thing','Terminal voltage is always greater than EMF'], answer:'EMF is the total voltage; terminal voltage is EMF minus the voltage drop across internal resistance', fact:'⚡ Every battery has internal resistance r. Terminal V = EMF − Ir. Under heavy load (large I), the terminal voltage drops significantly. A "flat" battery still has some EMF but high internal resistance makes it useless!' },
  { level:2, visual:'🌊', question:'What is the unit of frequency?', options:['Hertz (Hz), where 1 Hz = 1 cycle per second','Seconds (s)','Metres (m)'], answer:'Hertz (Hz), where 1 Hz = 1 cycle per second', fact:'🌊 Named after Heinrich Hertz who first demonstrated radio waves in 1887. Modern processors run at GHz (billions of cycles per second). Your WiFi router uses 2.4 GHz or 5 GHz radio waves.' },
  { level:2, visual:'🔋', question:'What is the photoelectric threshold frequency?', options:['The minimum frequency of light needed to eject electrons from a metal surface','The frequency at which a metal becomes magnetic','The frequency at which light is fully absorbed by a metal'], answer:'The minimum frequency of light needed to eject electrons from a metal surface', fact:'🔋 Below threshold frequency, no electrons are emitted even with intense light. Above it, electrons are emitted immediately even with dim light. This proved light comes in discrete quanta (photons) — each photon\'s energy E = hf.' },
  { level:2, visual:'💡', question:'What is the formula for the efficiency of an energy conversion?', options:['Efficiency (%) = (useful output energy / total input energy) × 100','Efficiency = output power + input power','Efficiency = work done / time'], answer:'Efficiency (%) = (useful output energy / total input energy) × 100', fact:'💡 An LED bulb converts ~90% of electrical energy to light (10% to heat). An incandescent bulb: ~5% to light, 95% wasted as heat. Efficiency improvements in motors, appliances, and vehicles are crucial for reducing energy use!' },
  { level:2, visual:'🌍', question:'What is Newton\'s Law of Universal Gravitation?', options:['F = GMm/r² — the gravitational force between two masses is proportional to both masses and inversely proportional to distance squared','F = GMm/r — force decreases linearly with distance','F = GMm × r² — force increases with distance'], answer:'F = GMm/r² — the gravitational force between two masses is proportional to both masses and inversely proportional to distance squared', fact:'🌍 G = 6.67×10⁻¹¹ N·m²/kg². Double the distance → force falls to ¼ (inverse square law). The same law governs apple falling, Moon\'s orbit, and tides. Newton unified earthly and heavenly physics with this single equation!' },
  { level:2, visual:'⚙️', question:'What is the formula for centripetal acceleration?', options:['a = v²/r (or a = ω²r)','a = v/r','a = vr'], answer:'a = v²/r (or a = ω²r)', fact:'⚙️ Centripetal acceleration always points towards the centre of the circle. For a car in a bend: a = v²/r. Double the speed → four times the centripetal acceleration needed — and four times the friction force required to stay on the road!' },
  { level:2, visual:'🔭', question:'What is the principle behind a sonar system?', options:['Emitting ultrasound pulses and measuring the time taken for the echo to return to find the distance to objects','Detecting the magnetic field of underwater objects','Measuring light reflection from the seabed'], answer:'Emitting ultrasound pulses and measuring the time taken for the echo to return to find the distance to objects', fact:'🔭 distance = speed × (time/2). Sonar is used by submarines and ships to detect the seabed and other vessels. Bats and dolphins use the same principle for echolocation — ultrasound bounces off prey and returns!' },
  { level:2, visual:'⚡', question:'What is the force on a charge q moving at speed v in a magnetic field B?', options:['F = qvB (when motion is perpendicular to the field)','F = qvB²','F = qv/B'], answer:'F = qvB (when motion is perpendicular to the field)', fact:'⚡ This magnetic force is always perpendicular to both v and B — so it causes circular motion, not acceleration along the path! Used in mass spectrometers and particle accelerators to bend charged particle beams.' },
  { level:2, visual:'🌊', question:'What is the ideal gas equation?', options:['PV = nRT where n is moles and R = 8.31 J/mol·K','PV = nRT where T is in Celsius','PV = RT/n'], answer:'PV = nRT where n is moles and R = 8.31 J/mol·K', fact:'🌊 The ideal gas equation combines all gas laws. At standard conditions (STP: 273 K, 101,325 Pa), 1 mole of ideal gas occupies exactly 22.4 litres. Real gases deviate slightly — especially at high pressure and low temperature.' },
  { level:2, visual:'💡', question:'What is radioactive half-life?', options:['The time for half the radioactive nuclei in a sample to decay','The time for a radioactive sample to completely decay','The half-period of radioactive emission'], answer:'The time for half the radioactive nuclei in a sample to decay', fact:'💡 Half-lives range enormously: Francium-223: 22 minutes; Carbon-14: 5,730 years; Uranium-238: 4.5 billion years. Shorter half-life = more radioactive. Medical tracers use short half-lives for safety!' },
  { level:2, visual:'⚙️', question:'What is a gravitational field line?', options:['A line showing the direction of the gravitational force on a test mass at each point','A line connecting planets of equal mass','A path followed by an orbiting satellite'], answer:'A line showing the direction of the gravitational force on a test mass at each point', fact:'⚙️ Gravitational field lines always point toward the massive body (inward). They are radial around a spherical mass. Where lines are closer together, the field is stronger (near the surface). Just like electric field lines!' },
  { level:2, visual:'🔋', question:'What is the formula relating power, voltage, and resistance?', options:['P = V²/R','P = VR','P = R/V²'], answer:'P = V²/R', fact:'🔋 P = V²/R comes from combining P = IV and V = IR. A 100 W, 240 V bulb has resistance R = V²/P = 240²/100 = 576 Ω. This formula is also useful for calculating heat dissipated in wires and resistors!' },

  // ── LEVEL 3 ADDITIONAL ───────────────────────────────────────────────────────
  { level:3, visual:'⚛️', question:'What is the de Broglie hypothesis, and what does it imply?', options:['All matter has an associated wavelength λ = h/p, so particles exhibit wave-like behaviour','Only photons have associated wavelengths','The wavelength of matter increases with momentum'], answer:'All matter has an associated wavelength λ = h/p, so particles exhibit wave-like behaviour', fact:'⚛️ de Broglie (1924) extended wave-particle duality to all matter. A baseball has a wavelength of ~10⁻³⁴ m — unmeasurably small. An electron\'s wavelength (nm scale) is why electron microscopes can image atoms!' },
  { level:3, visual:'🌌', question:'What is special about the Planck length (~1.6×10⁻³⁵ m)?', options:['It is the scale below which our concepts of space and time break down; quantum gravity is expected to dominate','It is the radius of a proton','It is the smallest wavelength of visible light'], answer:'It is the scale below which our concepts of space and time break down; quantum gravity is expected to dominate', fact:'🌌 The Planck length is derived from fundamental constants: G, ħ, c. At this scale, General Relativity and quantum mechanics both apply — and conflict. A quantum theory of gravity (like string theory) is needed!' },
  { level:3, visual:'⚡', question:'What is the spin of a particle in quantum mechanics?', options:['An intrinsic quantum property like angular momentum with fixed values; fermions have half-integer spin (½), bosons have integer spin (0,1,2,...)','The physical rotation speed of a particle around its axis','The orbital angular momentum of an electron around the nucleus'], answer:'An intrinsic quantum property like angular momentum with fixed values; fermions have half-integer spin (½), bosons have integer spin (0,1,2,...)', fact:'⚡ Spin-½ particles (electrons, protons, quarks) must rotate 720° to return to original state — bizarre but confirmed. Spin determines whether a particle obeys Fermi-Dirac (fermions) or Bose-Einstein (bosons) statistics!' },
  { level:3, visual:'🔬', question:'What is the principle of superposition in quantum mechanics?', options:['A quantum system can exist in a combination (superposition) of multiple states simultaneously until measured','Particles always have definite properties','Two particles in the same location cannot interact'], answer:'A quantum system can exist in a combination (superposition) of multiple states simultaneously until measured', fact:'🔬 Schrödinger\'s Cat is the famous thought experiment: a cat is "both alive and dead" until observed. Superposition is real — quantum computers exploit it to process information in parallel, potentially solving problems impossibly hard for classical computers!' },
  { level:3, visual:'🌊', question:'What is quantum entanglement?', options:['Two particles are correlated so that measuring one instantly determines the state of the other, regardless of separation','Two particles physically linked by a force','Particles that share the same position in space'], answer:'Two particles are correlated so that measuring one instantly determines the state of the other, regardless of separation', fact:'🌊 Einstein called it "spooky action at a distance". Bell\'s theorem (1964) and subsequent experiments proved entanglement is real. It doesn\'t transmit information faster than light — but enables quantum cryptography and quantum teleportation of states!' },
  { level:3, visual:'⚙️', question:'What is the virial theorem in astrophysics?', options:['For a stable gravitational system, the time-averaged kinetic energy = −½ × time-averaged potential energy (2⟨KE⟩ = −⟨PE⟩)','All stars orbit at the same speed','Gravitational potential energy is always zero at infinity'], answer:'For a stable gravitational system, the time-averaged kinetic energy = −½ × time-averaged potential energy (2⟨KE⟩ = −⟨PE⟩)', fact:'⚙️ The virial theorem explains why gas clouds collapse to form stars (half the released gravitational PE heats the gas; the other half is radiated). It\'s also used to estimate dark matter in galaxy clusters from the motions of stars!' },
  { level:3, visual:'🔭', question:'What is the Lorentz factor γ (gamma) in Special Relativity?', options:['γ = 1/√(1−v²/c²) — it appears in time dilation, length contraction, and relativistic mass','γ = v/c','γ = 1 − v²/c²'], answer:'γ = 1/√(1−v²/c²) — it appears in time dilation, length contraction, and relativistic mass', fact:'🔭 At v = 0.6c: γ ≈ 1.25. At v = 0.99c: γ ≈ 7. At v → c: γ → ∞, requiring infinite energy! Muons created in the upper atmosphere (v ≈ 0.99c) survive to Earth\'s surface because time dilation (γ ≈ 7) extends their lifetime!' },
  { level:3, visual:'⚛️', question:'What is beta decay (β⁻ decay) in terms of the Standard Model?', options:['A neutron converts to a proton by a down quark changing to an up quark, emitting an electron and an antineutrino via the weak force','An electron is emitted from the electron shell','A proton absorbs an electron and becomes a neutron'], answer:'A neutron converts to a proton by a down quark changing to an up quark, emitting an electron and an antineutrino via the weak force', fact:'⚛️ β⁻ decay: n → p + e⁻ + v̄_e. At the quark level: d → u + W⁻ → u + e⁻ + v̄_e. The weak force (W and Z bosons) mediates this. Neutrinos were first postulated by Pauli in 1930 to conserve energy in beta decay!' },
  { level:3, visual:'🌟', question:'What is the CNO cycle in stellar physics?', options:['A series of nuclear reactions in massive stars where carbon, nitrogen, and oxygen act as catalysts to fuse hydrogen into helium','The process by which carbon is formed in stellar cores','The sequence of reactions that creates carbon-12 in helium burning'], answer:'A series of nuclear reactions in massive stars where carbon, nitrogen, and oxygen act as catalysts to fuse hydrogen into helium', fact:'🌟 The CNO cycle dominates in stars hotter than the Sun (above ~15 million K). It produces the same net result as the proton-proton chain (4H → He) but is more efficient at high temperatures. Most of the Sun\'s energy comes from the pp chain!' },
  { level:3, visual:'💡', question:'What is the quantum Hall effect?', options:['At low temperatures in a strong magnetic field, the Hall resistance of a 2D conductor is quantised in exact multiples of h/e²','The Hall voltage is proportional to magnetic field strength','Electrical resistance becomes zero at low temperatures'], answer:'At low temperatures in a strong magnetic field, the Hall resistance of a 2D conductor is quantised in exact multiples of h/e²', fact:'💡 Discovered by Klaus von Klitzing (Nobel 1985). The quantisation is so precise it now defines the SI unit of resistance. The quantum Hall effect is a macroscopic manifestation of quantum mechanics!' },
  { level:3, visual:'🔋', question:'What is superconductivity?', options:['The complete absence of electrical resistance in certain materials below a critical temperature','Extremely low (but non-zero) resistance at cold temperatures','Perfect electrical insulation at low temperatures'], answer:'The complete absence of electrical resistance in certain materials below a critical temperature', fact:'🔋 Superconductors also expel magnetic fields (Meissner effect) — causing levitation. Used in MRI magnet coils and particle accelerators (LHC magnets). Room-temperature superconductors remain one of physics\' great unsolved challenges!' },
  { level:3, visual:'🌍', question:'What is general relativity\'s description of gravity?', options:['Gravity is the curvature of space-time caused by mass and energy — objects follow geodesics (shortest paths) through curved space-time','Gravity is a force transmitted instantaneously between masses','Gravity results from the exchange of gravitons between masses'], answer:'Gravity is the curvature of space-time caused by mass and energy — objects follow geodesics (shortest paths) through curved space-time', fact:'🌍 Einstein (1915) replaced Newton\'s force of gravity with geometry. Mass curves space-time; objects follow curves (geodesics). This explains gravitational lensing, black holes, gravitational waves, and GPS corrections!' },
  { level:3, visual:'🌌', question:'What are gravitational waves?', options:['Ripples in space-time caused by accelerating masses, predicted by General Relativity and first detected by LIGO in 2015','Electromagnetic waves emitted by black holes','Sound waves traveling through space near massive objects'], answer:'Ripples in space-time caused by accelerating masses, predicted by General Relativity and first detected by LIGO in 2015', fact:'🌌 LIGO detected gravitational waves from two merging black holes 1.3 billion light-years away. The distortion of space-time was smaller than a thousandth of a proton\'s diameter — an astounding measurement feat!' },
  { level:3, visual:'⚡', question:'What is the Bohr magneton?', options:['The natural unit of electron magnetic moment: μ_B = eħ/2m_e ≈ 9.27×10⁻²⁴ J/T','The charge of an electron','The magnetic moment of the proton'], answer:'The natural unit of electron magnetic moment: μ_B = eħ/2m_e ≈ 9.27×10⁻²⁴ J/T', fact:'⚡ The electron\'s magnetic moment arises from its spin and orbital motion. The Bohr magneton is the fundamental quantum of magnetic moment. Electron spin resonance (ESR) and MRI use transitions between spin states in magnetic fields!' },
  { level:3, visual:'🔬', question:'What is Bremsstrahlung radiation?', options:['X-ray radiation emitted when a charged particle (usually electron) is decelerated by an atomic nucleus','Radiation from radioactive decay','Light emitted by excited atoms returning to ground state'], answer:'X-ray radiation emitted when a charged particle (usually electron) is decelerated by an atomic nucleus', fact:'🔬 Brems = "braking" in German. When fast electrons hit a tungsten target, they decelerate and emit X-rays spanning a continuous spectrum. This is how medical X-ray tubes work — plus characteristic X-rays from the target material!' },
  { level:3, visual:'🌊', question:'What is the fine structure constant (α ≈ 1/137)?', options:['A dimensionless fundamental constant describing the strength of electromagnetic interactions between charged particles','The ratio of the speed of light to the speed of sound','The probability of radioactive decay per unit time'], answer:'A dimensionless fundamental constant describing the strength of electromagnetic interactions between charged particles', fact:'🌊 α = e²/(4πε₀ħc) ≈ 1/137. Its dimensionless nature makes it universal — any intelligent civilisation would derive the same value. Richard Feynman called it "one of the greatest mysteries of physics" that it has this particular value.' },
  { level:3, visual:'🔭', question:'What is the Chandrasekhar-Eddington debate about stellar structure?', options:['Eddington rejected Chandrasekhar\'s calculation showing white dwarfs above ~1.4 M☉ must collapse, dismissing the idea of black holes','They disagreed about the temperature of stellar cores','They disputed the chemical composition of stars'], answer:'Eddington rejected Chandrasekhar\'s calculation showing white dwarfs above ~1.4 M☉ must collapse, dismissing the idea of black holes', fact:'🔭 Chandrasekhar showed in 1930 (aged 19, on a ship!) that electron degeneracy pressure has a maximum. Eddington publicly ridiculed this — delaying acceptance for decades. Chandrasekhar won the Nobel Prize in 1983. Science eventually self-corrects!' },
  { level:3, visual:'💥', question:'What is confinement in quantum chromodynamics (QCD)?', options:['Quarks cannot exist as free particles — they are permanently confined within hadrons by the colour force which grows stronger with separation','Electrons cannot escape the atomic nucleus','Protons are confined to the nucleus by the strong force'], answer:'Quarks cannot exist as free particles — they are permanently confined within hadrons by the colour force which grows stronger with separation', fact:'💥 Unlike gravity and electromagnetism, the strong (colour) force increases with distance! Try to pull quarks apart and you pump energy into the field until enough exists to create a new quark-antiquark pair — "string breaking". Quarks are never seen alone!' },
  { level:3, visual:'🌟', question:'What is the Stefan-Boltzmann law for stellar luminosity?', options:['L = 4πR²σT⁴ — luminosity is proportional to surface area and the fourth power of temperature','L = σT⁴ — luminosity depends only on temperature','L = 4πR²/T⁴ — luminosity decreases with temperature'], answer:'L = 4πR²σT⁴ — luminosity is proportional to surface area and the fourth power of temperature', fact:'🌟 σ = 5.67×10⁻⁸ W/m²K⁴. The T⁴ dependence makes temperature crucial: a star twice as hot (same size) is 16× more luminous. Giant stars with large R can be luminous despite cooler surfaces. Used to classify stars on the HR diagram!' },
  { level:3, visual:'⚛️', question:'What is the Pauli exclusion principle\'s consequence for white dwarf structure?', options:['Electron degeneracy pressure — no two electrons can share the same quantum state, creating a quantum pressure that resists gravitational collapse','Protons repel each other electrostatically','Neutrons expand to fill available space'], answer:'Electron degeneracy pressure — no two electrons can share the same quantum state, creating a quantum pressure that resists gravitational collapse', fact:'⚛️ In a white dwarf, electrons are squeezed into all available quantum states. Adding more mass increases the pressure — but this only works up to 1.4 M☉ (Chandrasekhar limit). Above this, electrons are forced to combine with protons, creating a neutron star!' },
  { level:3, visual:'🌌', question:'What is the anthropic principle?', options:['The observation that the universe\'s physical constants must be compatible with the existence of observers, since we are here to observe them','The principle that humans are the most important beings in the universe','The theory that the universe was designed for life'], answer:'The observation that the universe\'s physical constants must be compatible with the existence of observers, since we are here to observe them', fact:'🌌 If fundamental constants (fine structure constant, proton/electron mass ratio etc.) were slightly different, stars, atoms, chemistry, and life couldn\'t exist. This is the fine-tuning problem — the anthropic principle is one (controversial) response to it!' },
  { level:3, visual:'⚡', question:'What is pair annihilation?', options:['A particle and its antiparticle collide and convert their mass into energy (typically two gamma photons)','Two photons combining to form a particle','A neutron decaying into a proton and electron'], answer:'A particle and its antiparticle collide and convert their mass into energy (typically two gamma photons)', fact:'⚡ Electron + positron → two γ photons each of 0.511 MeV (= m_ec²). This is used in PET (Positron Emission Tomography) scans — the simultaneous gamma photons are detected to pinpoint a cancer marker in the body!' },
  { level:3, visual:'🔋', question:'What is the Fermi energy in a metal?', options:['The highest occupied electron energy level at absolute zero temperature — determined by the Pauli exclusion principle','The energy of electrons at room temperature','The energy needed to remove all electrons from a metal'], answer:'The highest occupied electron energy level at absolute zero temperature — determined by the Pauli exclusion principle', fact:'🔋 Fermi energy (typically 1-10 eV for metals) is much larger than thermal energy kT at room temperature. This means metals have a nearly full "sea" of electrons up to the Fermi level — explaining their conductivity, specific heat, and other properties!' },
  { level:3, visual:'🌊', question:'What is renormalisation in quantum field theory?', options:['A mathematical technique to remove infinities from perturbative calculations by absorbing them into redefined physical parameters','The process by which particles acquire mass','The re-scaling of particle energies in an accelerator'], answer:'A mathematical technique to remove infinities from perturbative calculations by absorbing them into redefined physical parameters', fact:'🌊 Early QED calculations gave infinite answers for electron mass and charge. Renormalisation systematically cancels these infinities, giving extraordinarily accurate predictions (e.g., electron magnetic moment correct to 12 significant figures). Feynman and Schwinger won the Nobel Prize in 1965 for this!' },
  { level:3, visual:'🔭', question:'What is cosmic inflation?', options:['An extremely rapid exponential expansion of the universe that occurred in the first ~10⁻³² seconds after the Big Bang','The current accelerating expansion of the universe driven by dark energy','The gradual increase in the cosmic microwave background temperature over time'], answer:'An extremely rapid exponential expansion of the universe that occurred in the first ~10⁻³² seconds after the Big Bang', fact:'🔭 Inflation (proposed by Alan Guth, 1980) explains why the CMB is so uniform (horizon problem) and why space is flat (flatness problem). The universe expanded by a factor of ~10²⁶ in a tiny fraction of a second!' },
  { level:3, visual:'⚙️', question:'What is the equivalence principle in General Relativity?', options:['Locally, being in a gravitational field is physically equivalent to being in an accelerating reference frame','The speed of light is constant in all frames','Mass and energy are equivalent via E=mc²'], answer:'Locally, being in a gravitational field is physically equivalent to being in an accelerating reference frame', fact:'⚙️ Einstein\'s happiest thought: a person in a sealed box cannot distinguish free fall from weightlessness, or standing still from uniform gravity. This leads to gravitational light bending, time dilation, and the whole of General Relativity!' },
  { level:3, visual:'💡', question:'What is vacuum energy (zero-point energy)?', options:['The minimum energy that a quantum system retains at absolute zero, due to the Heisenberg uncertainty principle','Energy that can be harvested from a perfect vacuum','The energy of photons at absolute zero temperature'], answer:'The minimum energy that a quantum system retains at absolute zero, due to the Heisenberg uncertainty principle', fact:'💡 Even at 0 K, quantum systems have zero-point energy (½ħω per mode). The Casimir effect — a measurable attractive force between uncharged parallel plates in vacuum — is evidence for vacuum fluctuations. Vacuum energy may be related to dark energy!' },
  { level:3, visual:'🌌', question:'What is the holographic principle in theoretical physics?', options:['The information content of a volume of space may be fully described by information on its boundary surface (with 1 bit per Planck area)','Light can be projected to create 3D images in space','The universe is a simulation running on a higher-dimensional computer'], answer:'The information content of a volume of space may be fully described by information on its boundary surface (with 1 bit per Planck area)', fact:'🌌 Inspired by black hole thermodynamics (Bekenstein-Hawking entropy is proportional to event horizon area, not volume). The AdS/CFT correspondence (Maldacena, 1997) is a concrete realisation — a string theory in 5D is equivalent to a quantum field theory on the 4D boundary!' },

  // ── LEVEL 1 FINAL BATCH ──────────────────────────────────────────────────────
  { level:1, visual:'🔴', question:'What is displacement?', options:['The distance moved in a particular direction (a vector quantity)','The total distance covered regardless of direction','The speed of an object times its mass'], answer:'The distance moved in a particular direction (a vector quantity)', fact:'🔴 If you walk 5 m north then 5 m south, your displacement is 0 m but your total distance is 10 m. Displacement is a vector; distance is a scalar. Navigation systems use displacement!' },
  { level:1, visual:'💡', question:'Why does a bimetallic strip bend when heated?', options:['The two metals expand by different amounts, bending the strip toward the metal that expands less','Both metals expand equally in opposite directions','Only one metal expands; the other stays the same'], answer:'The two metals expand by different amounts, bending the strip toward the metal that expands less', fact:'💡 Bimetallic strips are used in thermostats! As temperature rises, the strip bends and eventually breaks a circuit, turning off a heater. Simple, reliable, and no electronics needed.' },
  { level:1, visual:'⚡', question:'What is the difference between AC (alternating current) and DC (direct current)?', options:['AC periodically reverses direction; DC flows in one direction only','AC is safer than DC','DC is used in power lines; AC is used in batteries'], answer:'AC periodically reverses direction; DC flows in one direction only', fact:'⚡ Batteries produce DC (one direction). UK mains supply is AC at 50 Hz (reverses 50 times per second). AC can be stepped up/down by transformers for efficient power transmission — that\'s why the grid uses AC!' },
  { level:1, visual:'🌊', question:'What is the period of a wave?', options:['The time for one complete oscillation, measured in seconds','The height from trough to crest','The number of waves per second'], answer:'The time for one complete oscillation, measured in seconds', fact:'🌊 Period T (seconds) = 1/frequency. A wave at 50 Hz has period = 1/50 = 0.02 s. A guitar string vibrating at 440 Hz (note A) has period ≈ 0.0023 s. Period and frequency are reciprocals!' },
  { level:1, visual:'🔥', question:'What is specific heat capacity?', options:['The energy needed to raise the temperature of 1 kg of a material by 1°C','The energy needed to melt 1 kg of a solid','The maximum temperature a material can reach'], answer:'The energy needed to raise the temperature of 1 kg of a material by 1°C', fact:'🔥 Water\'s SHC = 4,200 J/kg°C — one of the highest of any common substance. This makes the oceans huge heat stores, moderating Earth\'s climate. Metal (SHC ~450 J/kg°C) heats up much more quickly!' },
  { level:1, visual:'🧲', question:'What is induced magnetism?', options:['When a magnetic material temporarily becomes a magnet due to the presence of a nearby magnet','When a permanent magnet is created by heating','When electricity creates a magnetic field'], answer:'When a magnetic material temporarily becomes a magnet due to the presence of a nearby magnet', fact:'🧲 A steel paperclip near a magnet becomes temporarily magnetised (induced). It loses this magnetism when the magnet is removed (if made of soft iron) or keeps it (if hard steel). Permanent magnets are made by aligning magnetic domains!' },

  // ── LEVEL 2 FINAL BATCH ──────────────────────────────────────────────────────
  { level:2, visual:'🏃', question:'What is the suvat equation v = u + at used for?', options:['Finding final velocity given initial velocity, acceleration, and time','Finding distance given speed and time','Finding force given mass and velocity'], answer:'Finding final velocity given initial velocity, acceleration, and time', fact:'🏃 The suvat equations apply to uniform (constant) acceleration. v = u + at: if a car starts at 0 m/s and accelerates at 4 m/s² for 6 s, final velocity = 0 + 4×6 = 24 m/s. Fundamental to kinematics problems!' },
  { level:2, visual:'⚡', question:'The suvat equation s = ut + ½at². What does s represent?', options:['Displacement (metres)','Speed (m/s)','Seconds elapsed'], answer:'Displacement (metres)', fact:'⚡ s = ut + ½at². A ball dropped from rest (u=0) after 3 s: s = 0 + ½×10×9 = 45 m. All five suvat equations relate the five variables (s, u, v, a, t) for uniform acceleration.' },
  { level:2, visual:'💡', question:'What is an isotope?', options:['Atoms of the same element with the same proton number but different neutron numbers','Atoms of different elements with the same mass number','Atoms with the same number of neutrons but different numbers of protons'], answer:'Atoms of the same element with the same proton number but different neutron numbers', fact:'💡 Carbon-12 (6p, 6n) and Carbon-14 (6p, 8n) are isotopes — same chemistry, different mass. C-14 is radioactive; C-12 is stable. Isotopes are used in medicine (Tc-99m scans), power (U-235), and dating (C-14).' },
  { level:2, visual:'🔋', question:'What is the nuclear equation for alpha decay of Uranium-238?', options:['²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He','²³⁸₉₂U → ²³⁵₉₁Pa + ³₁H','²³⁸₉₂U → ²³⁹₉₂U + ⁴₂He'], answer:'²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He', fact:'🔋 Alpha decay: mass number decreases by 4, atomic number decreases by 2. The alpha particle is a helium-4 nucleus (⁴₂He). U-238 has a half-life of 4.5 billion years — about the age of the Solar System!' },
  { level:2, visual:'⚙️', question:'What is the gravitational potential at the Earth\'s surface?', options:['V = −GM/R (negative because work must be done to move a mass away from Earth)','V = GM/R (positive)','V = −GMR'], answer:'V = −GM/R (negative because work must be done to move a mass away from Earth)', fact:'⚙️ Gravitational potential V = −GM/r is always negative — it\'s zero at infinity and becomes more negative closer to Earth. To escape, an object needs enough KE to raise GPE from −GM/R to 0: ½mv² = GMm/R gives escape velocity v = √(2GM/R).' },
  { level:2, visual:'🌊', question:'What is simple harmonic motion (SHM)?', options:['Oscillatory motion where acceleration is proportional to displacement and directed towards the equilibrium position','Motion in a circle at constant speed','Vibration with constant amplitude and increasing frequency'], answer:'Oscillatory motion where acceleration is proportional to displacement and directed towards the equilibrium position', fact:'🌊 a = −ω²x. Pendulums (for small angles) and mass-spring systems exhibit SHM. The period of a simple pendulum: T = 2π√(L/g) — independent of amplitude and mass! Used in clockmaking for centuries.' },
  { level:2, visual:'🔭', question:'What is the relationship between orbital speed and radius for a satellite?', options:['v = √(GM/r) — lower orbit = higher speed','v = √(GMr) — lower orbit = lower speed','v = GM/r — speed is inversely proportional to radius'], answer:'v = √(GM/r) — lower orbit = higher speed', fact:'🔭 The ISS (r ≈ 6,770 km from Earth\'s centre) orbits at ~7,700 m/s, completing one orbit in 90 minutes! Geostationary satellites (r = 42,164 km) orbit at ~3,070 m/s with a 24-hour period — appearing stationary above the equator.' },
  { level:2, visual:'⚡', question:'What is the formula for the energy stored in a capacitor?', options:['E = ½CV² = ½QV = Q²/(2C)','E = CV','E = QV'], answer:'E = ½CV² = ½QV = Q²/(2C)', fact:'⚡ A 100 μF capacitor charged to 12 V stores ½ × 100×10⁻⁶ × 144 = 7.2×10⁻³ J. A camera flash capacitor stores ~10 J, released in milliseconds for a bright burst. The ½ factor appears because voltage builds gradually during charging.' },
  { level:2, visual:'🔋', question:'What is the Hall effect?', options:['When a current-carrying conductor is in a magnetic field, a voltage (Hall voltage) develops perpendicular to both current and field','When a conductor heats up due to current flow','When a moving magnet induces a voltage in a coil'], answer:'When a current-carrying conductor is in a magnetic field, a voltage (Hall voltage) develops perpendicular to both current and field', fact:'🔋 V_H = BI/(nqt) where n is charge carrier density. Hall probes measure magnetic field strength. The Hall effect also reveals the sign of charge carriers — confirming electrons carry current in metals!' },
  { level:2, visual:'🌍', question:'What is the Coriolis force?', options:['A fictitious force in rotating reference frames causing deflection of moving objects relative to the rotating frame','The centripetal force in circular orbits','The force due to Earth\'s magnetic field on charges'], answer:'A fictitious force in rotating reference frames causing deflection of moving objects relative to the rotating frame', fact:'🌍 On Earth, Coriolis deflects winds right (NH) and left (SH), producing cyclones and anticyclones. It\'s not the cause of water draining direction in sinks (that\'s too slow and small for Coriolis to dominate at household scales).' },
  { level:2, visual:'💡', question:'What is the equation for the period of a mass-spring system?', options:['T = 2π√(m/k) where m is mass and k is spring constant','T = 2π√(k/m)','T = 2π√(L/g)'], answer:'T = 2π√(m/k) where m is mass and k is spring constant', fact:'💡 More mass → longer period (slower oscillation). Stiffer spring (larger k) → shorter period (faster). Seismometers use heavy masses on soft springs (large m/k) for very long periods, detecting slow ground movements.' },
  { level:2, visual:'⚙️', question:'What is Faraday\'s law of electromagnetic induction?', options:['The induced EMF is proportional to the rate of change of magnetic flux: EMF = −N(dΦ/dt)','The force on a current in a magnetic field is F = BIL','A changing electric field creates a magnetic field'], answer:'The induced EMF is proportional to the rate of change of magnetic flux: EMF = −N(dΦ/dt)', fact:'⚙️ The minus sign (Lenz\'s law) means induced current opposes the change that caused it. Faster field change → larger EMF. More turns (N) → larger EMF. This underpins every transformer and generator on Earth!' },
  { level:2, visual:'🌊', question:'What is Lenz\'s law?', options:['The induced current flows in a direction that opposes the change in flux that caused it (conservation of energy)','The EMF is proportional to the flux','An increasing field induces current in the same direction as the field'], answer:'The induced current flows in a direction that opposes the change in flux that caused it (conservation of energy)', fact:'🌊 Lenz\'s law is the electromagnetic version of Newton\'s third law. If you push a magnet into a coil, the induced current creates a field that repels the magnet — you have to do work against this, which is where the electrical energy comes from!' },
  { level:2, visual:'🔴', question:'What is the work-energy theorem?', options:['The net work done on an object equals its change in kinetic energy: W_net = ΔKE','Work done equals potential energy gained','Power equals work done times time'], answer:'The net work done on an object equals its change in kinetic energy: W_net = ΔKE', fact:'🔴 W_net = ½mv² − ½mu². Braking a 1,000 kg car from 30 m/s to 0: KE to remove = ½×1,000×900 = 450,000 J. This work is done by friction (and converted to heat). Longer stopping distance = less force needed!' },
  { level:2, visual:'🔋', question:'What is the formula for gravitational field strength g in terms of orbital parameters?', options:['g = (4π²r)/T² for circular orbit','g = v²r','g = r/T²'], answer:'g = (4π²r)/T² for circular orbit', fact:'🔋 Equating gravitational force to centripetal force: GMm/r² = mv²/r. Using v = 2πr/T gives GM = 4π²r³/T². This is Kepler\'s third law in disguise — and lets us calculate planetary masses from their moons\' orbits!' },
  { level:2, visual:'🌈', question:'What does the photoelectric equation E = hf − φ mean?', options:['Kinetic energy of emitted electron = photon energy − work function (minimum energy needed to escape the metal)','Total energy of photon = hf + φ','Frequency of emitted electron = (E + φ)/h'], answer:'Kinetic energy of emitted electron = photon energy − work function (minimum energy needed to escape the metal)', fact:'🌈 Einstein\'s 1905 equation. φ (work function) is the minimum energy to eject an electron. KE = hf − φ: above threshold, increasing frequency increases electron KE; increasing intensity increases number of electrons but not their KE.' },
  { level:2, visual:'⚡', question:'What is the uncertainty principle expressed as ΔEΔt ≥ ħ/2?', options:['Energy and time are conjugate variables — a short-lived state has inherently uncertain energy, giving spectral line widths','Measuring energy disturbs the time of measurement','Energy and time are never measurable simultaneously'], answer:'Energy and time are conjugate variables — a short-lived state has inherently uncertain energy, giving spectral line widths', fact:'⚡ Short-lived excited states (small Δt) have large energy uncertainty (ΔE) — causing natural linewidth broadening of spectral lines. Virtual particles in quantum field theory exploit this: they briefly "borrow" energy if the time is short enough!' },
  { level:2, visual:'🔭', question:'What is the formula for the speed of an orbiting satellite at height h above Earth\'s surface?', options:['v = √(GM/(R+h))','v = √(GMh)','v = GM/(R+h)'], answer:'v = √(GM/(R+h))', fact:'🔭 At low Earth orbit (h ≈ 400 km, R = 6,371 km): v = √(6.67×10⁻¹¹ × 6×10²⁴ / 6.77×10⁶) ≈ 7,700 m/s. Higher orbit = slower speed. A geostationary satellite at 35,786 km has v ≈ 3,070 m/s.' },
  { level:2, visual:'💡', question:'What is the relationship between wavelength and refractive index?', options:['λ in medium = λ in vacuum / n (wavelength decreases in a denser medium, but frequency stays constant)','λ in medium = λ in vacuum × n','Wavelength increases in a denser medium'], answer:'λ in medium = λ in vacuum / n (wavelength decreases in a denser medium, but frequency stays constant)', fact:'💡 When light enters glass (n=1.5), its speed drops to c/1.5 and wavelength drops to λ/1.5, but frequency stays constant (frequency is set by the source, not the medium). This is why refraction occurs — the wavefronts bend as they slow.' },
  { level:2, visual:'⚙️', question:'What is the difference between heat and temperature?', options:['Heat is total internal energy transferred; temperature is the average kinetic energy per particle (a measure of "hotness")','Heat is measured in Kelvin; temperature is in Joules','They are the same quantity with different units'], answer:'Heat is total internal energy transferred; temperature is the average kinetic energy per particle (a measure of "hotness")', fact:'⚙️ A bathtub of warm water has more heat energy than a cup of boiling water (more particles) even though the cup is hotter. Heat (Q) is measured in Joules; temperature (T) in Kelvin or Celsius.' },
  { level:2, visual:'🌊', question:'What is the formula for gravitational potential energy in terms of orbit?', options:['U = −GMm/r (negative, with zero at infinity)','U = GMm/r','U = mgh (valid at all distances)'], answer:'U = −GMm/r (negative, with zero at infinity)', fact:'🌊 The negative sign means bound orbits have negative total energy. To escape: total energy must reach ≥ 0. At Earth\'s surface: U = −6.67×10⁻¹¹ × 6×10²⁴ × 1 / 6.37×10⁶ ≈ −6.3×10⁷ J per kg of the satellite.' },
  { level:2, visual:'🔋', question:'What is the magnetic flux Φ through a coil?', options:['Φ = BA cos θ where B is field strength, A is coil area, and θ is the angle between B and the normal to the coil','Φ = BAθ','Φ = B/A'], answer:'Φ = BA cos θ where B is field strength, A is coil area, and θ is the angle between B and the normal to the coil', fact:'🔋 Flux (Webers) measures how much magnetic field passes through a surface. Maximum when B is perpendicular to the coil (θ=0°, cos=1); zero when B is parallel to the coil (θ=90°, cos=0). Faraday\'s law: EMF = −NdΦ/dt.' },
  { level:2, visual:'⚡', question:'What is the de Broglie wavelength formula for a particle?', options:['λ = h/p = h/(mv) where h is Planck\'s constant and p is momentum','λ = hp','λ = h/(ma)'], answer:'λ = h/p = h/(mv) where h is Planck\'s constant and p is momentum', fact:'⚡ λ = h/mv. For an electron accelerated through 1 V: λ ≈ 1.2 nm — comparable to atomic spacings. This explains electron diffraction (LEED, TEM). For a 1 kg ball at 1 m/s: λ ≈ 10⁻³⁴ m — unmeasurably tiny!' },
  { level:2, visual:'💡', question:'What is the formula for the time constant of an RC circuit?', options:['τ = RC (resistance × capacitance, in seconds)','τ = R/C','τ = √(RC)'], answer:'τ = RC (resistance × capacitance, in seconds)', fact:'💡 The RC time constant determines how quickly a capacitor charges/discharges. After time τ, voltage reaches (1 − 1/e) ≈ 63% of its final value. Camera flash circuits use large RC constants for slow charge and fast discharge!' },
  { level:2, visual:'🌍', question:'What is the Hubble constant H₀ used for?', options:['H₀ ≈ 70 km/s/Mpc — it relates galaxy recession speed to distance, giving the expansion rate of the universe','H₀ measures the rotational speed of galaxies','H₀ is the rate of star formation in the universe'], answer:'H₀ ≈ 70 km/s/Mpc — it relates galaxy recession speed to distance, giving the expansion rate of the universe', fact:'🌍 v = H₀d. A galaxy 1 Mpc (3.26 million light-years) away recedes at ~70 km/s. 1/H₀ gives the approximate age of the universe: ~14 billion years. Measuring H₀ precisely is a major goal — there is currently a tension between different methods!' },

  // ── LEVEL 3 FINAL BATCH ──────────────────────────────────────────────────────
  { level:3, visual:'⚛️', question:'What is the WKB (Wentzel-Kramers-Brillouin) approximation in quantum mechanics?', options:['A semiclassical approximation valid when the wavelength changes slowly — useful for tunnelling rates and bound state energies','An exact solution of the Schrödinger equation for all potentials','A perturbative expansion in powers of Planck\'s constant only valid for free particles'], answer:'A semiclassical approximation valid when the wavelength changes slowly — useful for tunnelling rates and bound state energies', fact:'⚛️ The WKB approximation gives tunnelling probability T ≈ exp(−2∫|κ|dx) where κ is the imaginary wave vector in the forbidden region. It\'s used to estimate alpha decay rates — explaining why alpha emitters with higher energy have shorter half-lives (Geiger-Nuttall law)!' },
  { level:3, visual:'🌊', question:'What is the path integral formulation of quantum mechanics (Feynman)?', options:['A particle takes all possible paths between two points simultaneously; the probability amplitude is the sum over all paths weighted by exp(iS/ħ) where S is the classical action','A particle follows the single path of minimum action','The particle\'s wavefunction propagates along straight-line paths only'], answer:'A particle takes all possible paths between two points simultaneously; the probability amplitude is the sum over all paths weighted by exp(iS/ħ) where S is the classical action', fact:'🌊 Feynman\'s 1948 reformulation is mathematically equivalent to the Schrödinger equation but gives deep insight. In the classical limit ħ→0, destructive interference of paths far from the classical path leaves only the path of stationary action — recovering Hamilton\'s principle!' },
  { level:3, visual:'🔬', question:'What is spontaneous symmetry breaking in particle physics?', options:['The ground state of a system does not share the full symmetry of the underlying laws — e.g., the Higgs field acquiring a non-zero vacuum expectation value','A particle decaying into asymmetric fragments','A symmetry that only exists at high energies'], answer:'The ground state of a system does not share the full symmetry of the underlying laws — e.g., the Higgs field acquiring a non-zero vacuum expectation value', fact:'🔬 The electroweak symmetry is broken by the Higgs field at low energies, giving W and Z bosons their mass while keeping the photon massless. Spontaneous symmetry breaking also explains magnetisation, superconductivity, and Goldstone bosons!' },
  { level:3, visual:'💥', question:'What is the Higgs mechanism?', options:['How the W and Z bosons (and fermions) acquire mass by interacting with the non-zero Higgs field permeating space','A mechanism for producing Higgs bosons in colliders','The decay of the Higgs boson into two photons'], answer:'How the W and Z bosons (and fermions) acquire mass by interacting with the non-zero Higgs field permeating space', fact:'💥 The Higgs field has a non-zero vacuum expectation value (~246 GeV). W and Z bosons interact with it, gaining mass. Particles that couple strongly to the field (like the top quark) are very heavy; photons don\'t couple — they stay massless. The Higgs boson was discovered at the LHC in 2012!' },
  { level:3, visual:'🌌', question:'What is the cosmological constant Λ?', options:['A term Einstein added to General Relativity representing a form of energy density inherent to empty space — now associated with dark energy causing accelerating expansion','A constant describing the rate of structure formation in the universe','The ratio of matter to radiation in the universe'], answer:'A term Einstein added to General Relativity representing a form of energy density inherent to empty space — now associated with dark energy causing accelerating expansion', fact:'🌌 Einstein introduced Λ to create a static universe (1917), then called it his "greatest blunder" after Hubble\'s expansion discovery (1929). In 1998, supernova data showed the expansion is accelerating — Λ is back, now as dark energy!' },
  { level:3, visual:'🔭', question:'What is the Penrose process?', options:['Extracting energy from a rotating black hole (Kerr black hole) by exploiting the ergosphere — a region outside the event horizon where space-time is dragged','The process by which Hawking radiation evaporates a black hole','Gravitational lensing of light around a spinning black hole'], answer:'Extracting energy from a rotating black hole (Kerr black hole) by exploiting the ergosphere — a region outside the event horizon where space-time is dragged', fact:'🔭 In the ergosphere, objects cannot remain stationary — they are dragged by frame-dragging. Sending in a particle that splits and ejects one piece into the ergosphere can, in principle, extract rotational energy from the black hole. Spinning black holes can power relativistic jets!' },
  { level:3, visual:'⚡', question:'What is the anomalous magnetic moment of the electron, and why is it significant?', options:['g ≈ 2.00231930436... — it deviates from 2 due to quantum loop corrections in QED, and matches theory to 12 significant figures','The electron has no magnetic moment','The magnetic moment is exactly 1 Bohr magneton with no corrections'], answer:'g ≈ 2.00231930436... — it deviates from 2 due to quantum loop corrections in QED, and matches theory to 12 significant figures', fact:'⚡ The anomalous magnetic moment (g−2)/2 is one of the most precisely measured and calculated quantities in physics — theory and experiment agree to 12 significant figures. Any discrepancy would signal new physics beyond the Standard Model!' },
  { level:3, visual:'🌊', question:'What is the Navier-Stokes equation?', options:['The fundamental equation of fluid dynamics describing the motion of viscous fluids, relating forces (pressure, viscosity, external) to acceleration of fluid elements','The equation for wave propagation in elastic media','The equation for heat conduction in a fluid'], answer:'The fundamental equation of fluid dynamics describing the motion of viscous fluids, relating forces (pressure, viscosity, external) to acceleration of fluid elements', fact:'🌊 ρ(∂v/∂t + v·∇v) = −∇P + μ∇²v + f. Solutions exist for simple flows (laminar), but turbulent solutions remain unsolved in general — proving smooth solutions exist is one of the Millennium Prize Problems worth $1 million!' },
  { level:3, visual:'⚙️', question:'What is Noether\'s theorem?', options:['Every continuous symmetry of a physical law corresponds to a conserved quantity','The laws of physics are the same in all inertial frames','Quantum states evolve unitarily over time'], answer:'Every continuous symmetry of a physical law corresponds to a conserved quantity', fact:'⚙️ Time translation symmetry → conservation of energy. Spatial translation symmetry → conservation of momentum. Rotational symmetry → conservation of angular momentum. Emmy Noether\'s 1915 theorem is arguably the most profound result in all of theoretical physics!' },
  { level:3, visual:'🌟', question:'What is the TOV (Tolman-Oppenheimer-Volkoff) equation?', options:['The general relativistic equation of hydrostatic equilibrium for neutron stars, determining their maximum mass','The equation describing neutron decay rates inside dense matter','The Newtonian equation for stellar structure'], answer:'The general relativistic equation of hydrostatic equilibrium for neutron stars, determining their maximum mass', fact:'🌟 The TOV equation replaces the Newtonian hydrostatic equation for neutron stars (where GR effects are crucial). The maximum neutron star mass (TOV limit) is ~2–3 M☉, depending on the nuclear equation of state. Above this, a black hole forms!' },
  { level:3, visual:'🔋', question:'What is the Josephson effect?', options:['Quantum tunnelling of Cooper pairs through a thin insulating barrier between two superconductors, producing a supercurrent without any voltage','Electrical resistance dropping to zero below the critical temperature','The expulsion of magnetic fields from a superconductor (Meissner effect)'], answer:'Quantum tunnelling of Cooper pairs through a thin insulating barrier between two superconductors, producing a supercurrent without any voltage', fact:'🔋 The AC Josephson effect: applying a voltage V across a Josephson junction produces oscillations at frequency f = 2eV/h — a perfect frequency-voltage converter used in defining the volt! SQUIDs (superconducting quantum interference devices) based on Josephson junctions are the most sensitive magnetometers known.' },
  { level:3, visual:'💡', question:'What is the BCS theory of superconductivity?', options:['Electrons form Cooper pairs due to phonon-mediated attraction; these bosonic pairs condense into a macroscopic quantum state with zero resistance','Superconductivity arises when electron-electron repulsion is overcome by magnetic fields','Resistance vanishes because electrons tunnel through the lattice without scattering'], answer:'Electrons form Cooper pairs due to phonon-mediated attraction; these bosonic pairs condense into a macroscopic quantum state with zero resistance', fact:'💡 Named after Bardeen, Cooper, and Schrieffer (Nobel 1972). An electron deforms the ionic lattice, attracting a second electron — forming a Cooper pair. These pairs condense into a single quantum state described by a macroscopic wavefunction. BCS explains conventional superconductors but not high-temperature superconductors!' },
  { level:3, visual:'🌌', question:'What is the flatness problem in cosmology?', options:['The universe is observed to be spatially flat (Ω ≈ 1) to high precision, which requires extraordinary fine-tuning of initial conditions unless cosmic inflation occurred','The universe has no curvature because it contains no matter','General relativity predicts that empty space must be flat'], answer:'The universe is observed to be spatially flat (Ω ≈ 1) to high precision, which requires extraordinary fine-tuning of initial conditions unless cosmic inflation occurred', fact:'🌌 Without inflation, to be flat today, Ω must have been 1 to 1 part in 10⁵⁵ at the Planck epoch! Inflation naturally drives Ω → 1 by expanding a small, flat patch to enormous size. CMB measurements confirm Ω_total = 1.000 ± 0.004.' },
  { level:3, visual:'🔭', question:'What is quantum chromodynamics (QCD), and what are the three colour charges?', options:['The theory of the strong force mediated by gluons; colour charges are red, green, and blue (quarks) and their antocolours (antiquarks)','The theory of the electromagnetic force where photons carry colour charges','A model describing the colour of light emitted by hot objects'], answer:'The theory of the strong force mediated by gluons; colour charges are red, green, and blue (quarks) and their antocolours (antiquarks)', fact:'🔭 QCD is a non-Abelian gauge theory with SU(3) symmetry. Gluons themselves carry colour charge (unlike photons in QED), leading to gluon self-interaction, confinement, and asymptotic freedom. Gross, Politzer, and Wilczek won the 2004 Nobel Prize for asymptotic freedom.' },
  { level:3, visual:'⚛️', question:'What is the CPT theorem in quantum field theory?', options:['Any Lorentz-invariant quantum field theory is invariant under the combined transformation of Charge conjugation (C), Parity (P), and Time reversal (T)','CP and T symmetries are each separately conserved in all interactions','The weak force violates CPT symmetry'], answer:'Any Lorentz-invariant quantum field theory is invariant under the combined transformation of Charge conjugation (C), Parity (P), and Time reversal (T)', fact:'⚛️ CPT symmetry is extremely fundamental — it follows from basic requirements of QFT. Individual symmetries can be violated (P violated by weak force, CP violated in kaon/B meson systems), but CPT appears exact. CPT violation would shake the foundations of physics!' },
