  { level:3, visual:'🌊', question:'What is the spin-statistics theorem?', options:['Particles with integer spin (bosons) obey Bose-Einstein statistics; particles with half-integer spin (fermions) obey Fermi-Dirac statistics','All particles obey the same quantum statistics regardless of spin','Spin is not related to the statistical behaviour of particles'], answer:'Particles with integer spin (bosons) obey Bose-Einstein statistics; particles with half-integer spin (fermions) obey Fermi-Dirac statistics', fact:'🌊 Fermions (electrons, quarks) obey Pauli exclusion — no two can share a state (explains atomic structure, stellar stability). Bosons (photons, Higgs) can all crowd into the same state (enabling lasers and Bose-Einstein condensates). The spin-statistics connection is a deep result of relativistic QFT.' },
  { level:3, visual:'⚡', question:'What is asymptotic freedom in QCD?', options:['At very short distances (high energies), the strong force becomes weaker — quarks inside a proton behave almost as free particles at high energies','The strong force becomes weaker at large distances','Quarks are free particles that can be isolated at high enough energies'], answer:'At very short distances (high energies), the strong force becomes weaker — quarks inside a proton behave almost as free particles at high energies', fact:'⚡ Asymptotic freedom (Gross, Politzer, Wilczek, Nobel 2004) explains why deep inelastic scattering experiments (SLAC, 1968) revealed quarks behaving as free particles inside protons at high energies. It\'s the opposite of QED, where the coupling grows at short range.' },
  { level:3, visual:'🔬', question:'What is the Unruh effect?', options:['An accelerating observer detects thermal radiation (a bath of particles) in what an inertial observer considers empty space','The redshift of light emitted by a gravitational field','The detection of Hawking radiation by a distant observer'], answer:'An accelerating observer detects thermal radiation (a bath of particles) in what an inertial observer considers empty space', fact:'🔬 The Unruh temperature T = ħa/(2πckB) — for a = 10²⁰ m/s², T ≈ 1 K. Conceptually related to Hawking radiation (acceleration near horizon ↔ gravity). Confirming the Unruh effect directly is extremely challenging due to the tiny temperatures involved!' },
  { level:3, visual:'🌌', question:'What is inflation\'s solution to the horizon problem?', options:['Regions of the CMB that appear causally disconnected were in causal contact before inflation rapidly expanded them apart','Inflation prevented any causal connection between different regions','The horizon problem is solved by the speed of light being different in the early universe'], answer:'Regions of the CMB that appear causally disconnected were in causal contact before inflation rapidly expanded them apart', fact:'🌌 The CMB is uniform to 1 part in 100,000 across the whole sky — even regions that are now too far apart to have ever communicated. Inflation solves this: a tiny causally-connected region was inflated to encompass our entire observable universe!' },
  { level:3, visual:'💥', question:'What is baryogenesis?', options:['The process that produced a slight excess of matter over antimatter in the early universe, resulting in the matter-dominated universe we observe today','The production of baryons (protons and neutrons) from lighter quarks in the early universe','The annihilation of baryons with antibaryons in the Big Bang'], answer:'The process that produced a slight excess of matter over antimatter in the early universe, resulting in the matter-dominated universe we observe today', fact:'💥 The baryon asymmetry (about 1 extra matter particle per billion matter-antimatter pairs) is one of cosmology\'s great puzzles. Sakharov conditions (1967): baryon number violation, C and CP violation, and departure from thermal equilibrium are all required — not yet fully understood!' },
  { level:3, visual:'🔭', question:'What is the integrated Sachs-Wolfe (ISW) effect?', options:['Photons gain or lose energy travelling through time-evolving gravitational potential wells — a signature of dark energy in CMB temperature fluctuations','The Doppler shift of CMB photons due to bulk matter flows','The effect of reionisation on CMB polarisation'], answer:'Photons gain or lose energy travelling through time-evolving gravitational potential wells — a signature of dark energy in CMB temperature fluctuations', fact:'🔭 In a matter-dominated universe, gravitational potentials are static — photons gain and lose the same energy entering/exiting wells. Dark energy causes potentials to evolve: photons crossing a decaying well gain a net energy boost. This correlation between CMB and large-scale structure probes dark energy!' },
  { level:3, visual:'⚙️', question:'What are Goldstone bosons?', options:['Massless spin-0 bosons that appear when a continuous global symmetry is spontaneously broken','Particles emitted during spontaneous fission','The gauge bosons of the Standard Model'], answer:'Massless spin-0 bosons that appear when a continuous global symmetry is spontaneously broken', fact:'⚙️ Goldstone\'s theorem (1961): every spontaneously broken continuous symmetry produces a massless boson. Pions are (approximate) Goldstone bosons of spontaneously broken chiral symmetry. In the Higgs mechanism for gauge symmetries, Goldstone bosons are "eaten" by gauge bosons to give them mass.' },
  { level:3, visual:'🌊', question:'What is the effective field theory (EFT) approach in modern physics?', options:['At energies well below some cutoff scale, a theory can be described by the most general Lagrangian consistent with its symmetries — higher-energy details are hidden in coefficients','An approximate theory valid only at extremely high energies','A field theory with only a finite number of fields and interaction terms'], answer:'At energies well below some cutoff scale, a theory can be described by the most general Lagrangian consistent with its symmetries — higher-energy details are hidden in coefficients', fact:'🌊 EFT is how modern physics is organised: the Standard Model is an EFT valid below ~1 TeV. General Relativity is an EFT below the Planck scale. Chiral perturbation theory describes low-energy QCD. EFTs let us make precise predictions without knowing the ultimate theory!' },
  { level:3, visual:'⚛️', question:'What is the nuclear shell model?', options:['Nucleons occupy quantised energy shells (like electrons in atoms) due to a mean field plus a spin-orbit interaction — magic numbers correspond to filled shells','Nucleons are in random orbits within the nucleus','The nuclear force is modelled as a series of nested spherical shells'], answer:'Nucleons occupy quantised energy shells (like electrons in atoms) due to a mean field plus a spin-orbit interaction — magic numbers correspond to filled shells', fact:'⚛️ Magic numbers (2, 8, 20, 28, 50, 82, 126) correspond to filled nuclear shells — extra stable nuclei (doubly magic: ²⁰⁸Pb, ⁵⁶Ni). Goeppert-Mayer and Jensen won the 1963 Nobel Prize. The spin-orbit term was crucial to correctly predict magic numbers!' },
  { level:3, visual:'🌟', question:'What is the solar neutrino problem, and how was it resolved?', options:['Fewer neutrinos than expected were detected from the Sun — resolved by discovering neutrino oscillation: solar electron neutrinos change to other flavours en route','The Sun produces too many neutrinos for its luminosity — error in solar models','Solar neutrinos are too energetic to match fusion calculations'], answer:'Fewer neutrinos than expected were detected from the Sun — resolved by discovering neutrino oscillation: solar electron neutrinos change to other flavours en route', fact:'🌟 Davis\'s Homestake experiment (1967) detected ~1/3 expected solar neutrinos. SNO experiment (Canada, 2002) showed the deficit was due to flavour oscillation — proving neutrinos have non-zero mass! McDonald and Kajita shared the 2015 Nobel Prize for this discovery.' },
  { level:3, visual:'💡', question:'What is the concept of renormalization group (RG) flow?', options:['How the effective coupling constants of a theory change with energy scale — UV (high energy) and IR (low energy) fixed points describe limiting behaviours','How particles gain and lose energy in a scattering event','The running of particle masses with temperature'], answer:'How the effective coupling constants of a theory change with energy scale — UV (high energy) and IR (low energy) fixed points describe limiting behaviours', fact:'💡 In QED, the electromagnetic coupling α ≈ 1/137 at low energies grows to ~1/128 at 90 GeV. In QCD, coupling grows at low energies (confinement) and shrinks at high energies (asymptotic freedom). RG flow unifies statistical mechanics and quantum field theory — Wilson won the Nobel Prize in 1982!' },
  { level:3, visual:'⚡', question:'What is the Lamb shift?', options:['A small energy difference between the 2S₁/₂ and 2P₁/₂ states of hydrogen, caused by quantum vacuum fluctuations (QED radiative corrections)','The shift in spectral lines due to the Doppler effect','The energy difference between spin-up and spin-down states in a magnetic field'], answer:'A small energy difference between the 2S₁/₂ and 2P₁/₂ states of hydrogen, caused by quantum vacuum fluctuations (QED radiative corrections)', fact:'⚡ The Lamb shift (Willis Lamb, Nobel 1955) cannot be explained by the Dirac equation alone — it requires QED and its virtual particles. Its precise measurement and calculation (matching to 12 significant figures) was a milestone confirming QED as the most accurate theory in physics!' },
  { level:3, visual:'🔬', question:'What is the density matrix formalism in quantum mechanics?', options:['A generalisation of the state vector to describe mixed states (statistical ensembles of quantum states) — essential for open quantum systems and decoherence','An alternative to the Schrödinger equation for isolated pure states only','A classical probability distribution over energy levels'], answer:'A generalisation of the state vector to describe mixed states (statistical ensembles of quantum states) — essential for open quantum systems and decoherence', fact:'🔬 The density matrix ρ satisfies ρ² = ρ for pure states but ρ² ≠ ρ for mixed states. Decoherence — quantum systems losing coherence through interaction with the environment — is described by off-diagonal elements of ρ decaying to zero. It explains the quantum-to-classical transition!' },
  { level:3, visual:'🌌', question:'What is eternal inflation and the multiverse?', options:['In the inflationary model, quantum fluctuations in the inflaton field cause inflation to end at different times in different regions, potentially creating a vast ensemble of bubble universes with different physical constants','Inflation continues forever in a single universe','The universe repeatedly inflates and deflates in an eternal cycle'], answer:'In the inflationary model, quantum fluctuations in the inflaton field cause inflation to end at different times in different regions, potentially creating a vast ensemble of bubble universes with different physical constants', fact:'🌌 Eternal inflation (Vilenkin, Linde) suggests our observable universe is a bubble in an eternally inflating spacetime. Different bubbles may have different vacuum states and physical constants. This multiverse scenario is controversial — it may be untestable, raising deep questions about what it means to be scientific.' },
  { level:3, visual:'🔭', question:'What is the spectral energy distribution (SED) of a galaxy, and what does it reveal?', options:['The distribution of emitted energy across all wavelengths — revealing stellar populations, star formation rates, dust content, and AGN activity','The distribution of stars by luminosity within a galaxy','The redshift distribution of galaxies in a given volume'], answer:'The distribution of emitted energy across all wavelengths — revealing stellar populations, star formation rates, dust content, and AGN activity', fact:'🔭 UV emission traces young hot stars (recent star formation). Optical shows older stars. Infrared reveals dust-reprocessed light. Radio can indicate AGN jets. Multi-wavelength SED fitting with spectral models allows astronomers to infer a galaxy\'s star formation history across billions of years!' },

  // ── LEVEL 3 LAST BATCH ───────────────────────────────────────────────────────
  { level:3, visual:'⚛️', question:'What is the Dirac equation, and why was it revolutionary?', options:['A relativistic wave equation for spin-½ particles that predicted the existence of antimatter (positron) before its discovery','A classical equation for the motion of charged particles in electromagnetic fields','An equation describing the ground state energy of the hydrogen atom'], answer:'A relativistic wave equation for spin-½ particles that predicted the existence of antimatter (positron) before its discovery', fact:'⚛️ Dirac (1928) combined special relativity and quantum mechanics. His equation had two solutions: one for electrons, one for "holes" — which turned out to be positrons, discovered by Anderson in 1932. The first theoretical prediction of antimatter!' },
  { level:3, visual:'🌊', question:'What is spontaneous parametric down-conversion (SPDC)?', options:['A nonlinear optical process where one photon is converted into two lower-energy entangled photons — a primary source of entangled photon pairs','The splitting of a laser beam by a diffraction grating','A process where microwave photons are converted to optical photons in a crystal'], answer:'A nonlinear optical process where one photon is converted into two lower-energy entangled photons — a primary source of entangled photon pairs', fact:'🌊 SPDC is used in quantum optics experiments to produce entangled photon pairs. Aspect\'s 1982 experiment used SPDC to definitively test Bell\'s inequalities, confirming quantum entanglement. It\'s a key resource for quantum cryptography and quantum computing!' },
  { level:3, visual:'🌌', question:'What is the weak mixing angle (Weinberg angle) θ_W?', options:['A fundamental parameter of the electroweak theory relating the masses of the W and Z bosons: cos θ_W = M_W/M_Z','The angle at which W bosons are emitted in beta decay','The mixing angle between neutrino mass and flavour eigenstates'], answer:'A fundamental parameter of the electroweak theory relating the masses of the W and Z bosons: cos θ_W = M_W/M_Z', fact:'🌌 θ_W ≈ 28.7°. It determines the relative strengths of electromagnetic and weak interactions. Measurements of θ_W from Z boson production at LEP and other experiments confirmed the electroweak standard model to extraordinary precision!' },
  { level:3, visual:'🔬', question:'What is the CKM matrix?', options:['A 3×3 unitary matrix describing the mixing between quark mass and flavour eigenstates in the weak interaction — explains CP violation in the quark sector','A matrix describing neutrino mixing','The rotation matrix converting between different coordinate systems in special relativity'], answer:'A 3×3 unitary matrix describing the mixing between quark mass and flavour eigenstates in the weak interaction — explains CP violation in the quark sector', fact:'🔬 The CKM (Cabibbo-Kobayashi-Maskawa) matrix has one CP-violating phase, which produces the matter-antimatter asymmetry observed in kaon and B meson decays. Kobayashi and Maskawa won the 2008 Nobel Prize. The CKM is constrained by many precision measurements forming the "unitarity triangle".' },
  { level:3, visual:'⚡', question:'What is the Aharonov-Bohm effect?', options:['A quantum effect where a charged particle is affected by an electromagnetic potential even in a region of zero electric and magnetic field — demonstrating the physical reality of potentials','The deflection of electrons by a magnetic field','The phase shift of light passing near a massive object'], answer:'A quantum effect where a charged particle is affected by an electromagnetic potential even in a region of zero electric and magnetic field — demonstrating the physical reality of potentials', fact:'⚡ In the Aharonov-Bohm effect, electrons passing on either side of a solenoid (B=0 outside) acquire different quantum phases due to the vector potential A, producing an interference pattern. This shows that A, not just E and B, is the fundamental quantity in quantum electrodynamics!' },
  { level:3, visual:'💥', question:'What is colour confinement, and what evidence supports it?', options:['Quarks and gluons are permanently bound inside colourless (white) hadrons; evidence: no free quarks or gluons have ever been detected despite extensive searches','Quarks are confined to the nucleus by the nuclear strong force','Colour charge cannot be removed from a quark by any known process'], answer:'Quarks and gluons are permanently bound inside colourless (white) hadrons; evidence: no free quarks or gluons have ever been detected despite extensive searches', fact:'💥 Hadrons are colour-neutral: baryons (quark triplets: R+G+B = white) and mesons (quark-antiquark: colour + anticolour = white). The energy needed to separate quarks grows linearly with distance (string tension ~1 GeV/fm), so it\'s energetically cheaper to create new quark pairs than to free one!' },
  { level:3, visual:'🔭', question:'What is the concept of a Penrose diagram?', options:['A conformal diagram representing the global causal structure of space-time, compressing infinite regions to finite size while preserving light-cone structure','A diagram showing all possible particle interactions in quantum field theory','A plot of stellar evolution on a Hertzsprung-Russell diagram'], answer:'A conformal diagram representing the global causal structure of space-time, compressing infinite regions to finite size while preserving light-cone structure', fact:'🔭 Penrose diagrams reveal the causal structure of black holes, cosmologies, and other space-times at a glance. The eternal black hole Penrose diagram shows two exterior regions connected by a non-traversable wormhole (Einstein-Rosen bridge). Light always travels at 45° on these diagrams!' },
  { level:3, visual:'🌊', question:'What is the concept of spontaneous emission in the context of quantum field theory?', options:['An excited atom decays by emitting a photon due to interaction with vacuum fluctuations of the quantum electromagnetic field — even in an empty cavity','Emission triggered by an external photon','Emission from atomic collisions only'], answer:'An excited atom decays by emitting a photon due to interaction with vacuum fluctuations of the quantum electromagnetic field — even in an empty cavity', fact:'🌊 In free space, the EM field has vacuum fluctuations at all frequencies. These fluctuations trigger atomic decay. In a cavity tuned to suppress these modes (cavity QED), spontaneous emission can be dramatically suppressed — allowing precise quantum state control. This is exploited in quantum computing with trapped ions and superconducting qubits!' },
  { level:3, visual:'⚙️', question:'What are topological insulators?', options:['Materials that are insulating in the bulk but have protected conducting surface states due to non-trivial topology of their electronic band structure','Insulators at all temperatures and pressures','Materials that become conducting when their surface is polished'], answer:'Materials that are insulating in the bulk but have protected conducting surface states due to non-trivial topology of their electronic band structure', fact:'⚙️ Topological insulators (predicted ~2005, confirmed 2007-2009) host metallic surface states protected by time-reversal symmetry — they cannot be destroyed by impurities (as long as the symmetry is preserved). They are promising for quantum computing and spintronics applications!' },
  { level:3, visual:'🌟', question:'What is the first law of black hole thermodynamics?', options:['dM = (κ/8π)dA + ΩdJ + ΦdQ — mass (energy) changes are related to changes in surface gravity, area, angular momentum, and charge','The area of a black hole\'s event horizon always increases','Black holes have no temperature'], answer:'dM = (κ/8π)dA + ΩdJ + ΦdQ — mass (energy) changes are related to changes in surface gravity, area, angular momentum, and charge', fact:'🌟 The four laws of black hole mechanics mirror thermodynamics: 0th (surface gravity κ is constant on horizon ↔ temperature), 1st (energy conservation), 2nd (area never decreases ↔ entropy never decreases), 3rd (cannot reach κ=0 ↔ cannot reach T=0). After Hawking radiation, these are literal laws!' },
  { level:3, visual:'🔋', question:'What is the Bekenstein-Hawking entropy formula for a black hole?', options:['S = kA/(4l_P²) — entropy proportional to event horizon area in Planck area units','S = kM² — entropy proportional to mass squared','S = kV — entropy proportional to the volume enclosed by the horizon'], answer:'S = kA/(4l_P²) — entropy proportional to event horizon area in Planck area units', fact:'🔋 Bekenstein (1972) proposed S ∝ A. Hawking confirmed the coefficient: S = kc³A/(4Għ). For a solar-mass black hole, S ≈ 10⁵⁴ k — enormously larger than a star\'s entropy! This area-entropy relationship (holography) tells us space has a maximum information density of one bit per Planck area.' },
  { level:3, visual:'💡', question:'What is the quantum Zeno effect?', options:['Frequent measurement of an unstable quantum system suppresses its decay — "a watched pot never decays"','Quantum tunnelling rate increases with observation','Measurement accelerates quantum decay'], answer:'Frequent measurement of an unstable quantum system suppresses its decay — "a watched pot never decays"', fact:'💡 The quantum Zeno effect (named for Zeno\'s paradoxes) was confirmed experimentally with beryllium ions in 1989. Frequent collapse of the wavefunction resets the decay probability. The inverse (quantum anti-Zeno effect) — measurement accelerating decay — also exists!' },
  { level:3, visual:'🌌', question:'What is the concept of a naked singularity, and what is Penrose\'s cosmic censorship conjecture?', options:['A naked singularity is a space-time singularity not hidden behind an event horizon; cosmic censorship conjectures that Nature forbids them — singularities are always clothed by horizons','Naked singularities are the remnants of supernovae','All singularities in general relativity are necessarily naked'], answer:'A naked singularity is a space-time singularity not hidden behind an event horizon; cosmic censorship conjectures that Nature forbids them — singularities are always clothed by horizons', fact:'🌌 Roger Penrose (1969) conjectured that all physically realistic singularities (formed by gravitational collapse) are hidden behind event horizons. Naked singularities would allow violations of causality — visible regions of infinite density. The conjecture remains unproven but holds in all studied cases!' },
  { level:3, visual:'⚛️', question:'What is the nuclear liquid drop model?', options:['Models the nucleus as an incompressible charged liquid drop — predicts binding energy via volume, surface, Coulomb, asymmetry, and pairing terms (Bethe-Weizsäcker formula)','Models nucleons as point particles in a rigid sphere','An exact quantum model of the nucleus based on the shell model'], answer:'Models the nucleus as an incompressible charged liquid drop — predicts binding energy via volume, surface, Coulomb, asymmetry, and pairing terms (Bethe-Weizsäcker formula)', fact:'⚛️ B = a_V·A − a_S·A^(2/3) − a_C·Z²/A^(1/3) − a_A(A−2Z)²/A ± δ. The model correctly predicts fission (a heavy nucleus can lower energy by splitting) and the valley of stability. Combined with the shell model → unified nuclear model by Bohr and Mottelson (Nobel 1975).' },
  { level:3, visual:'🔬', question:'What is the concept of gauge invariance in physics?', options:['The laws of physics are unchanged (invariant) under a local phase transformation of the fields — and requiring local gauge invariance forces the existence of the gauge boson interactions','Physics is unchanged under global (not local) transformations only','Gauge invariance only applies to electromagnetic fields'], answer:'The laws of physics are unchanged (invariant) under a local phase transformation of the fields — and requiring local gauge invariance forces the existence of the gauge boson interactions', fact:'🔬 Local U(1) invariance → photon and electromagnetism (QED). Local SU(2) → W bosons and weak force. Local SU(3) → gluons and strong force (QCD). Gauge invariance is the deepest organising principle of the Standard Model — the forces literally arise from demanding local symmetry!' },
  { level:3, visual:'🔭', question:'What is the difference between Type Ia and Type II supernovae?', options:['Type Ia: thermonuclear explosion of a white dwarf exceeding the Chandrasekhar limit (standard candles); Type II: core collapse of a massive star (>8 M☉)','Type Ia: more luminous than Type II; Type II: older stars','Type II occurs in elliptical galaxies; Type Ia in spiral galaxies only'], answer:'Type Ia: thermonuclear explosion of a white dwarf exceeding the Chandrasekhar limit (standard candles); Type II: core collapse of a massive star (>8 M☉)', fact:'🔭 Type Ia supernovae are crucial cosmological tools: they always have the same peak luminosity (Chandrasekhar limit → same trigger), making them standard candles. Observations of high-z Type Ia SNe in 1998 revealed the accelerating expansion of the universe — confirming dark energy!' },
];

let current = 0, score = 0, dotResults = [], sessionQ = [];

function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}

    [1047,1319,1568,2093,1568,1319].forEach((f,i) => note(ctx,'triangle',f,t+i*0.07,0.14,0.5));
    [[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur]) => {

function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function updateNavArrows(){const p=document.getElementById('navPrev'),n=document.getElementById('navNext');if(!p)return;const idx=viewingIdx!==null?viewingIdx:current;p.style.display=idx>0?'flex':'none';n.style.display=(viewingIdx!==null&&viewingIdx<current)?'flex':'none';}
function navBack(){const idx=viewingIdx!==null?viewingIdx:current;if(idx>0)showPastQuestion(idx-1);}
function navForward(){if(viewingIdx===null)return;if(viewingIdx<current-1)showPastQuestion(viewingIdx+1);else{viewingIdx=null;showQuestion();}}
function showPastQuestion(idx){viewingIdx=idx;const q=sessionQ[idx];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}document.getElementById('visualCard').innerHTML='<span class="visual-emoji">'+q.visual+'</span>';document.getElementById('questionText').textContent=q.question;const shuffled=sessionShuffled[idx]||[...q.options];const chosen=sessionAnswers[idx];const correct=q.answer;const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const opt=shuffled[i];const btn=document.createElement('button');btn.className='choice-btn';btn.disabled=true;btn.style.cursor='default';if(opt===correct)btn.classList.add('correct');if(opt===chosen&&opt!==correct)btn.classList.add('wrong');btn.innerHTML='<span class="choice-letter">'+letter+'</span>'+opt;choicesEl.appendChild(btn);});const rb=document.getElementById('reviewBanner');if(rb){rb.style.display='';rb.textContent=dotResults[idx]==='correct'?'✅ Q'+(idx+1)+' · Correct':'❌ Q'+(idx+1)+' · Incorrect';}document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();}

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildDots() {
  const c = document.getElementById('progressDots'); c.innerHTML = '';
  sessionQ.forEach((q,i) => {
    const cls = q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';
    const d = document.createElement('div');
    d.className = `dot ${cls}`+(i===0?' current':''); d.id=`dot-${i}`; c.appendChild(d);
  });
}
function updateDot(idx, result) {
  const d = document.getElementById(`dot-${idx}`); if(!d) return;
  d.classList.remove('current'); d.classList.add('answered', result==='correct'?'correct-dot':'wrong-dot');
  const next = document.getElementById(`dot-${idx+1}`); if(next) next.classList.add('current');
}
function showQuestion() {viewingIdx=null;const rb=document.getElementById('reviewBanner');if(rb)rb.style.display='none';
  const q = sessionQ[current];
  const badge = document.getElementById('levelBadge');
  if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}
  if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}
  if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}
  document.getElementById('progressFill').style.width=(current/15*100)+'%';
  document.getElementById('score').textContent=score;
  document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;
  document.getElementById('questionText').textContent=q.question;
  const shuffled=shuffle([...q.options]);sessionShuffled[current]=shuffled;
  const choicesEl=document.getElementById('choices'); choicesEl.innerHTML='';
  ['A','B','C'].forEach((letter,i) => {
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.dataset.value=shuffled[i];
    btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;
    btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx); choicesEl.appendChild(btn);
  });
  document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();
}
function handleAnswer(chosen, correct, btn, fact, qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;sessionAnswers[current]=chosen;
  if(isCorrect){
    score++; markMastered(qIdx); btn.classList.add('correct'); dotResults[current]='correct'; updateDot(current,'correct');
    document.getElementById('score').textContent=score; playCorrect(); spawnConfetti(35);
  } else {
    btn.classList.add('wrong'); dotResults[current]='wrong'; updateDot(current,'wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});
    document.getElementById('gameScreen').classList.add('shake'); playWrong();
  }
  setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);
}
let feedbackTimer=null, feedbackRafId=null;
function dismissFeedback(){
  cancelAnimationFrame(feedbackRafId); clearTimeout(feedbackTimer);
  const overlay=document.getElementById('feedbackOverlay');
  const b=document.getElementById('feedbackBox'); b.style.animation='slideUp 0.35s ease forwards';
  overlay.classList.add('dismiss'); overlay.classList.remove('clickable');
  setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);
}
function showFeedback(isCorrect, fact, chosen, correct) {
  clearTimeout(feedbackTimer); cancelAnimationFrame(feedbackRafId);
  const overlay=document.getElementById('feedbackOverlay'), box=document.getElementById('feedbackBox');
  const arc=document.getElementById('timerArc'), ring=document.getElementById('timerRing');
  const tapHint=document.getElementById('tapHint');
  const wrongDetail=document.getElementById('wrongDetail');
  const CIRC=100.5;
  if(isCorrect){
    const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title correct-text';
    box.className='feedback-box correct-box'; ring.className='timer-ring correct-ring';
    ring.style.display=''; tapHint.style.display='none'; wrongDetail.style.display='none';
  } else {
    const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title wrong-text';
    box.className='feedback-box wrong-box'; ring.className='timer-ring wrong-ring';
    ring.style.display='none'; tapHint.style.display='';
    document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;
    document.getElementById('wdChosen').textContent=chosen;
    document.getElementById('wdCorrect').textContent=correct;
    wrongDetail.style.display='';
  }
  document.getElementById('feedbackFact').textContent=fact;
  arc.style.strokeDashoffset='0'; overlay.classList.remove('dismiss'); overlay.classList.add('show');
  if(isCorrect){
    const duration=1200; const startTime=performance.now();
    function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}
    feedbackRafId=requestAnimationFrame(tickRing);
    feedbackTimer=setTimeout(dismissFeedback,duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click',dismissFeedback,{once:true});
  }
}
function advanceQuestion(){
  const prev=current; current++;
  if(prev===4){showLevelUp('medium');return;}
  if(prev===9){showLevelUp('hard');return;}
  if(current>=15){showEndScreen();return;}
  showQuestion();
}
function showLevelUp(level){
  const overlay=document.getElementById('levelupOverlay');
  if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — getting trickier!';}
  else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='🧠 Hard — only the best know these!';}
  overlay.classList.add('show'); playLevelUp(); spawnConfetti(60);
}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){
  const screen=document.getElementById('gameScreen');
  let rank,icon,msg,color;
  if(score>=13){rank='GENIUS';icon='🏆🧠⭐';msg='Outstanding! You\'re a true scholar!';color='#f1c40f';}
  else if(score>=10){rank='EXPERT';icon='🌟💡🎯';msg='Excellent knowledge!';color='#2ecc71';}
  else if(score>=7){rank='LEARNER';icon='👍📚😊';msg='Good effort! Keep studying!';color='#e67e22';}
  else{rank='BEGINNER';icon='💪📖🌱';msg='Great start! Practice makes perfect!';color='#e74c3c';}
  const e=dotResults.slice(0,5).filter(r=>r==='correct').length;
  const m=dotResults.slice(5,10).filter(r=>r==='correct').length;
  const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  let earned=0;
  if(e===5) earned+=1;
  if(m===5) earned+=3;
  if(h===5) earned+=6;
  if(earned>0) addPoints(earned);
  const tierRows=[
    e===5?'<span style="color:#4ade80">⭐ Easy +1✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐ Easy +1</span>',
    m===5?'<span style="color:#fbbf24">⭐⭐ Med +3✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐ Med +3</span>',
    h===5?'<span style="color:#f87171">⭐⭐⭐ Hard +6✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐⭐ Hard +6</span>',
  ].join('');
  let pointsHtml='';
  if(earned>0){
    pointsHtml=`<div style="background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.2));border:2px solid rgba(255,215,0,0.45);border-radius:16px;padding:10px 18px;text-align:center;">
      <div style="font-size:0.9rem;margin-bottom:5px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">${tierRows}</div>
      <div style="color:#ffd700;font-size:1.15rem;font-weight:700;">+${earned} point${earned===1?'':'s'} earned!</div>
      <div style="color:rgba(255,255,255,0.7);font-size:0.9rem;margin-top:3px;">Total: ⭐ ${getPoints()} points</div>
    </div>`;
  } else {
    pointsHtml=`<div style="text-align:center;">
      <div style="font-size:0.85rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:3px;">${tierRows}</div>
      <div style="color:rgba(255,215,0,0.5);font-size:0.85rem;">⭐ ${getPoints()} pts · Complete a full level to earn points</div>
    </div>`;
  }
  screen.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div>
      <div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div>
      <div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div>
      <div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>
      ${pointsHtml}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div>
        <div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div>
        <div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div>
      </div>
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">
        ${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}
      </div>
      <button class="action-btn" onclick="init()">🔄 Play Again!</button>
      <a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a>
    </div>`;
  spawnConfetti(score>=10?90:40);
}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){
  for(let i=0;i<count;i++){setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
init();
</script>
</body>
</html>
