  { level:1, visual:'🌈', question:'What colours make up the visible light spectrum in order?', options:['Red, orange, yellow, green, blue, indigo, violet','Blue, green, yellow, orange, red, indigo, violet','Violet, blue, green, yellow, red, orange, indigo'], answer:'Red, orange, yellow, green, blue, indigo, violet', fact:'🌈 Remember ROYGBIV! Red has the longest wavelength and lowest frequency; violet has the shortest wavelength and highest frequency in visible light.' },
  { level:1, visual:'💡', question:'What happens when light hits a mirror?', options:['It is reflected — the angle of reflection equals the angle of incidence','It is absorbed by the mirror','It passes straight through'], answer:'It is reflected — the angle of reflection equals the angle of incidence', fact:'💡 The law of reflection: angle in = angle out, both measured from the normal (perpendicular to surface). Smooth surfaces give specular (clear) reflection; rough surfaces give diffuse reflection.' },
  { level:1, visual:'🌊', question:'What is refraction?', options:['The bending of light as it passes from one material to another','The bouncing of light off a surface','The absorption of light by a material'], answer:'The bending of light as it passes from one material to another', fact:'🌊 Light bends because it changes speed at the boundary. It slows down entering glass or water and speeds up leaving. A straw in water looks bent because of refraction!' },
  { level:1, visual:'🔭', question:'What is a transparent material?', options:['A material that allows light to pass through clearly','A material that absorbs all light','A material that scatters light so you cannot see through it clearly'], answer:'A material that allows light to pass through clearly', fact:'🔭 Glass and clear water are transparent — light passes through with minimal scattering. Translucent materials (like frosted glass) let light through but scatter it; opaque materials block it entirely.' },
  { level:1, visual:'⚡', question:'What is the approximate speed of light in a vacuum?', options:['300,000 km/s','3,000 km/s','3,000,000 km/s'], answer:'300,000 km/s', fact:'⚡ Light travels at about 3×10⁸ m/s — fast enough to circle Earth 7.5 times per second! This is the ultimate speed limit of the universe.' },
  { level:1, visual:'🔊', question:'What is an echo?', options:['A reflected sound wave heard after a delay','A very loud sound','A sound that travels underwater'], answer:'A reflected sound wave heard after a delay', fact:'🔊 Echoes occur when sound reflects off a hard surface. You need to be at least 17 m away from the surface to hear a separate echo (sound travels ~340 m/s, and you need 0.1 s gap).' },
  { level:1, visual:'🎵', question:'What is pitch?', options:['How high or low a sound is, related to frequency','How loud a sound is','How long a sound lasts'], answer:'How high or low a sound is, related to frequency', fact:'🎵 High-frequency sounds have high pitch (like a whistle); low-frequency sounds have low pitch (like a bass drum). Human hearing ranges from about 20 Hz to 20,000 Hz.' },
  { level:1, visual:'💨', question:'What is amplitude of a wave?', options:['The maximum displacement from the rest position','The distance between two wave peaks','The number of waves per second'], answer:'The maximum displacement from the rest position', fact:'💨 Amplitude determines loudness for sound waves. Double the amplitude — four times the energy! A loud concert has much larger pressure amplitude than a quiet conversation.' },
  { level:1, visual:'🌈', question:'Which colour of light has the longest wavelength?', options:['Red','Violet','Green'], answer:'Red', fact:'🌈 Red light has a wavelength of about 700 nm — the longest in visible light. Violet is shortest at ~400 nm. Beyond red is infrared; beyond violet is ultraviolet!' },
  { level:1, visual:'🌍', question:'Can sound travel through a vacuum?', options:['No — sound needs a medium (solid, liquid, or gas) to travel','Yes — sound travels through space just like light','Yes, but much more slowly than in air'], answer:'No — sound needs a medium (solid, liquid, or gas) to travel', fact:'🌍 Sound is a mechanical wave — it needs particles to vibrate and pass energy along. Space is nearly a vacuum, so there is no sound in space. "In space, no one can hear you scream!"' },
  // Electricity and Magnetism
  { level:1, visual:'⚡', question:'What is an electrical conductor?', options:['A material that allows electric current to flow through it easily','A material that blocks electric current','A material that stores electrical energy'], answer:'A material that allows electric current to flow through it easily', fact:'⚡ Most metals are good conductors because they have free electrons that can move. Copper is one of the best conductors — that\'s why electrical wires are made of copper!' },
  { level:1, visual:'🔋', question:'What is an electrical insulator?', options:['A material that does not allow electric current to flow through it','A material that generates electricity','A material that increases voltage'], answer:'A material that does not allow electric current to flow through it', fact:'🔋 Rubber, plastic, and glass are insulators. Wires are coated in plastic insulation to prevent electric shocks and short circuits!' },
  { level:1, visual:'💡', question:'In a series circuit, what happens if one bulb breaks?', options:['All bulbs go out because the circuit is broken','Only that bulb goes out','The other bulbs get brighter'], answer:'All bulbs go out because the circuit is broken', fact:'💡 Series circuits have only one path for current. If any component breaks, the circuit is open and current stops everywhere. Old Christmas tree lights were wired in series — one failure and all went dark!' },
  { level:1, visual:'⚙️', question:'In a parallel circuit, what happens if one bulb breaks?', options:['The other bulbs stay on because each has its own path','All bulbs go out','The other bulbs dim significantly'], answer:'The other bulbs stay on because each has its own path', fact:'⚙️ Parallel circuits have multiple paths for current. Break one branch and current still flows through the others. Home wiring is parallel — that\'s why turning off one light doesn\'t turn off all of them!' },
  { level:1, visual:'🔋', question:'What does a switch do in an electric circuit?', options:['Opens or closes the circuit to control current flow','Increases the voltage','Stores electrical energy'], answer:'Opens or closes the circuit to control current flow', fact:'🔋 A switch creates a break (open) or connection (closed) in a circuit. When open, no current flows; when closed, current can flow. Every light switch in your home works this way!' },
  { level:1, visual:'🧲', question:'What happens when you bring two north poles of magnets together?', options:['They repel each other','They attract each other','Nothing happens'], answer:'They repel each other', fact:'🧲 Like poles repel; unlike poles attract. North repels North, South repels South, but North attracts South. This is a fundamental property of magnetic fields!' },
  { level:1, visual:'🧲', question:'Which pole of a compass needle points towards geographic north?', options:['The north-seeking pole (marked N)','The south-seeking pole (marked S)','Compasses do not point north'], answer:'The north-seeking pole (marked N)', fact:'🧲 Confusingly, Earth\'s geographic North Pole is actually a magnetic south pole — that\'s why compass north poles are attracted to it. The magnetic poles also slowly wander over time!' },
  { level:1, visual:'⚡', question:'What causes static electricity?', options:['A build-up of electric charge on a surface, usually from friction','Current flowing through a circuit','Magnets near a conductor'], answer:'A build-up of electric charge on a surface, usually from friction', fact:'⚡ Rubbing a balloon on hair transfers electrons, giving the balloon a negative charge. The charged balloon then attracts small pieces of paper or sticks to walls — static electricity in action!' },
  { level:1, visual:'🔋', question:'What is the function of a battery in a circuit?', options:['It provides the electrical energy (voltage) to push current around the circuit','It stores mechanical energy','It measures the current'], answer:'It provides the electrical energy (voltage) to push current around the circuit', fact:'🔋 A battery converts chemical energy to electrical energy. The voltage (e.g., 1.5 V for AA battery) is the "push" that drives current around the circuit.' },
  { level:1, visual:'💡', question:'Can a magnetic force act through non-magnetic materials?', options:['Yes — magnetic fields pass through most non-magnetic materials','No — magnetic fields are blocked by all materials','Only through metals'], answer:'Yes — magnetic fields pass through most non-magnetic materials', fact:'💡 Magnets attract iron nails through paper, cardboard, and even your hand! Magnetic fields only get blocked by ferromagnetic materials like iron and nickel.' },
  { level:1, visual:'🧲', question:'Which of these materials is magnetic?', options:['Iron','Copper','Wood'], answer:'Iron', fact:'🧲 Only ferromagnetic materials (iron, nickel, cobalt, and some alloys like steel) are attracted to magnets. Copper, aluminium, and gold are non-magnetic!' },
  { level:1, visual:'🔥', question:'What form of energy does a car engine mainly convert chemical energy into?', options:['Kinetic energy (movement) and heat','Sound and light','Electrical energy only'], answer:'Kinetic energy (movement) and heat', fact:'🔥 A petrol engine is only about 25-30% efficient — most of the fuel\'s chemical energy is wasted as heat! Electric motors are about 90% efficient at converting energy to motion.' },
  { level:1, visual:'🌊', question:'Which of these best describes how sound travels?', options:['As longitudinal waves — particles vibrate back and forth in the direction of travel','As transverse waves — particles vibrate up and down','Sound does not travel as a wave'], answer:'As longitudinal waves — particles vibrate back and forth in the direction of travel', fact:'🌊 Sound waves are longitudinal: compressions and rarefactions travel through the medium. Light waves are transverse — their vibrations are perpendicular to their travel direction.' },
  { level:1, visual:'💨', question:'Through which medium does sound travel fastest?', options:['Solid (e.g., steel)','Liquid (e.g., water)','Gas (e.g., air)'], answer:'Solid (e.g., steel)', fact:'💨 Sound travels at ~340 m/s in air, ~1,500 m/s in water, and ~5,000 m/s in steel. Closer-packed particles in solids pass vibrations more efficiently!' },
  { level:1, visual:'🔭', question:'What is a translucent material?', options:['One that lets some light through but scatters it, so you cannot see clearly through it','One that lets all light through clearly','One that blocks all light'], answer:'One that lets some light through but scatters it, so you cannot see clearly through it', fact:'🔭 Frosted glass, tracing paper, and thin fabric are translucent. They let light in (so the room isn\'t dark) but blur the view (for privacy). Between transparent and opaque!' },
  { level:1, visual:'⚡', question:'What is current electricity?', options:['The flow of electric charge (electrons) through a conductor','A stationary build-up of charge','The voltage across a component'], answer:'The flow of electric charge (electrons) through a conductor', fact:'⚡ Electric current is measured in Amperes (amps). In metal wires, electrons flow from negative to positive — though by convention we say current flows from positive to negative!' },
  { level:1, visual:'🌈', question:'What is the primary colour of light that mixes with red and blue to make white light?', options:['Green','Yellow','Orange'], answer:'Green', fact:'🌈 The three primary colours of light are Red, Green, and Blue (RGB). Add them all together and you get white light. This is additive colour mixing — how your phone screen works!' },
  { level:1, visual:'🔋', question:'What is gravitational potential energy?', options:['Energy stored in an object due to its height above the ground','Energy stored in a moving object','Energy stored in chemical bonds'], answer:'Energy stored in an object due to its height above the ground', fact:'🔋 The higher an object, the more gravitational potential energy it has. A roller coaster stores GPE at the top of a hill, then converts it to kinetic energy as it races down!' },
  { level:1, visual:'🌍', question:'Which of these is an example of friction being helpful?', options:['Brakes slowing a bicycle','Friction wearing down a machine part','Air resistance slowing a runner'], answer:'Brakes slowing a bicycle', fact:'🌍 Friction is helpful in brakes, walking, writing, and gripping. Without friction between shoe and ground, you couldn\'t walk! But friction also causes heat and wear — a costly downside.' },
  { level:1, visual:'🏃', question:'What is the direction of the friction force on a sliding box?', options:['Opposite to the direction of motion','In the same direction as motion','Perpendicular to the direction of motion'], answer:'Opposite to the direction of motion', fact:'🏃 Friction always opposes relative motion or attempted motion. Push a box right, and friction pushes left. This is why it takes effort to keep things sliding!' },
  { level:1, visual:'🔥', question:'What is nuclear energy?', options:['Energy released from reactions in the nucleus of an atom','Energy stored in chemical bonds','Energy from moving electrons'], answer:'Energy released from reactions in the nucleus of an atom', fact:'🔥 Nuclear power plants split uranium atoms (fission) to release enormous amounts of energy. A single kilogram of uranium contains as much energy as about 3 million kg of coal!' },
  { level:1, visual:'💡', question:'What is sound energy?', options:['Energy carried by vibrating particles as longitudinal waves','Energy stored in stretched materials','Energy of electrons flowing through a wire'], answer:'Energy carried by vibrating particles as longitudinal waves', fact:'💡 Sound energy travels as pressure waves through a medium. Loud sounds (large amplitude) carry more energy — that\'s why prolonged exposure to loud music can damage hearing!' },
  { level:1, visual:'🌊', question:'What is frequency of a wave?', options:['The number of complete waves that pass a point per second, measured in Hertz (Hz)','The height of the wave','The distance between two crests'], answer:'The number of complete waves that pass a point per second, measured in Hertz (Hz)', fact:'🌊 1 Hz = 1 wave per second. Middle C on a piano is 262 Hz. Bats can hear up to 100,000 Hz — far beyond the 20,000 Hz human limit!' },
  { level:1, visual:'🧲', question:'What shape are magnetic field lines around a bar magnet?', options:['They loop from the north pole, around the outside, and into the south pole','They are straight parallel lines','They form concentric circles around the magnet'], answer:'They loop from the north pole, around the outside, and into the south pole', fact:'🧲 Field lines show the direction a north pole would move. They are closest (densest) at the poles where the field is strongest, and spread out in the middle.' },
  { level:1, visual:'⚙️', question:'What energy transformation happens in a wind turbine?', options:['Kinetic energy of wind → electrical energy','Chemical energy → electrical energy','Thermal energy → kinetic energy'], answer:'Kinetic energy of wind → electrical energy', fact:'⚙️ Wind spins turbine blades (kinetic energy) → drives a generator → produces electricity. Wind is renewable, but turbines only work when it\'s windy — we need energy storage solutions!' },
  { level:1, visual:'🌈', question:'Why does a prism split white light into a rainbow of colours?', options:['Different colours refract by different amounts because they have different speeds in glass','All colours reflect off the prism surfaces differently','The prism absorbs some colours and lets others through'], answer:'Different colours refract by different amounts because they have different speeds in glass', fact:'🌈 Violet light travels slowest in glass and bends most; red travels fastest and bends least. This separates the colours — the same process creates rainbows with water droplets!' },
  { level:1, visual:'🔭', question:'What is an opaque material?', options:['A material that does not let any light pass through','A material that lets all light through','A material that lets some light through but scatters it'], answer:'A material that does not let any light pass through', fact:'🔭 Opaque materials (wood, metal, brick) absorb or reflect all light. They cast shadows because no light passes through. Most solid everyday objects are opaque!' },
  { level:1, visual:'🏃', question:'What is a push or pull called in physics?', options:['A force','Energy','Power'], answer:'A force', fact:'🏃 Forces are pushes or pulls that can change an object\'s speed, direction, or shape. Forces are measured in Newtons (N), named after Isaac Newton!' },
  { level:1, visual:'💨', question:'What does a thermometer measure?', options:['Temperature','Heat energy','Power'], answer:'Temperature', fact:'💨 Temperature (in °C or K) measures how hot or cold something is — technically the average kinetic energy of its particles. Heat energy is the total energy; temperature is the intensity.' },
  { level:1, visual:'🔥', question:'What is the unit of energy?', options:['Joule (J)','Watt (W)','Newton (N)'], answer:'Joule (J)', fact:'🔥 The Joule is named after James Prescott Joule who demonstrated the equivalence of heat and work. 1 J is the energy needed to lift a 100 g apple by about 1 metre.' },
  { level:1, visual:'⚡', question:'Which material is the best conductor of electricity?', options:['Copper metal','Rubber','Glass'], answer:'Copper metal', fact:'⚡ Copper has free electrons that move easily through its lattice. It\'s the most common material for electrical wiring because it combines excellent conductivity with flexibility and reasonable cost.' },
  { level:1, visual:'🌍', question:'What is gravity on Earth approximately equal to?', options:['10 N/kg (or 9.8 N/kg)','100 N/kg','1 N/kg'], answer:'10 N/kg (or 9.8 N/kg)', fact:'🌍 On Earth, g ≈ 9.8 N/kg (often rounded to 10 in calculations). On the Moon it\'s about 1.6 N/kg — astronauts weigh about 1/6 their Earth weight on the Moon!' },

  // ── LEVEL 2 NEW QUESTIONS ────────────────────────────────────────────────────
  // Newton's Laws
  { level:2, visual:'🏃', question:"Newton's First Law states that an object will remain at rest or in uniform motion unless acted upon by what?", options:['A resultant (net) force','Friction only','Gravity only'], answer:'A resultant (net) force', fact:'🏃 Newton\'s First Law is the law of inertia. A hockey puck on frictionless ice would slide forever! Inertia is resistance to change in motion — bigger mass means bigger inertia.' },
  { level:2, visual:'🎯', question:"Newton's Second Law: what is the formula linking force, mass, and acceleration?", options:['F = ma','F = mv','F = m/a'], answer:'F = ma', fact:'🎯 F = ma is one of the most useful equations in physics. Double the force → double the acceleration; double the mass → halve the acceleration. Used everywhere from car design to rocket engineering!' },
  { level:2, visual:'⚙️', question:"Newton's Third Law states that for every action force there is a reaction force that is equal in ______ and opposite in ______.", options:['magnitude; direction','direction; magnitude','speed; force'], answer:'magnitude; direction', fact:'⚙️ Action-reaction pairs act on DIFFERENT objects. A rocket expels gas downward (action); the gas pushes the rocket upward (reaction). You push Earth when you walk — but Earth barely moves!' },
  { level:2, visual:'🏃', question:'A car of mass 1,000 kg accelerates at 3 m/s². What is the net force?', options:['3,000 N','300 N','30,000 N'], answer:'3,000 N', fact:'🏃 F = ma = 1,000 × 3 = 3,000 N. This is the net (resultant) force after accounting for friction and air resistance. The engine must produce even more force to overcome these!' },
  { level:2, visual:'💨', question:'What is the difference between speed and velocity?', options:['Speed is a scalar (magnitude only); velocity is a vector (magnitude and direction)','Velocity is always greater than speed','Speed includes direction; velocity does not'], answer:'Speed is a scalar (magnitude only); velocity is a vector (magnitude and direction)', fact:'💨 A car going 60 km/h is its speed. Going 60 km/h north is its velocity. Velocity can change even at constant speed if direction changes — like going round a circular track!' },
  { level:2, visual:'⚡', question:'A cyclist travels 120 m in 15 s. What is their average speed?', options:['8 m/s','8 km/h','15 m/s'], answer:'8 m/s', fact:'⚡ speed = distance ÷ time = 120 ÷ 15 = 8 m/s. That\'s about 29 km/h — fast enough to comfortably cycle along a road. Tour de France riders average over 40 km/h!' },
  { level:2, visual:'🎯', question:'What is acceleration?', options:['The rate of change of velocity (change in velocity ÷ time)','The speed of an object','The distance travelled per second'], answer:'The rate of change of velocity (change in velocity ÷ time)', fact:'🎯 a = Δv/t. Acceleration can mean speeding up, slowing down (deceleration), or changing direction. A car going from 0 to 100 km/h in 5 s has an average acceleration of 5.56 m/s².' },
  { level:2, visual:'🔴', question:'What is momentum?', options:['Mass × velocity (p = mv)', 'Mass × acceleration','Force × time'], answer:'Mass × velocity (p = mv)', fact:'🔴 Momentum (kg·m/s) is conserved in collisions if no external forces act. A heavy truck at low speed can have the same momentum as a light sports car at high speed!' },
  { level:2, visual:'⚙️', question:'What is the work done by a force of 50 N moving an object 6 m in the direction of the force?', options:['300 J','56 J','8.3 J'], answer:'300 J', fact:'⚙️ W = F × d = 50 × 6 = 300 J. Work is only done when the force has a component in the direction of motion. Carrying a bag horizontally does no work against gravity!' },
  { level:2, visual:'⚡', question:'What is power?', options:['Work done ÷ time taken (P = W/t), measured in Watts','Force × distance','Energy × time'], answer:'Work done ÷ time taken (P = W/t), measured in Watts', fact:'⚡ 1 Watt = 1 Joule per second. A 100 W bulb uses 100 J every second. James Watt defined horsepower: 1 hp ≈ 746 W. Your muscles can produce about 100 W sustained.' },
  { level:2, visual:'🌊', question:'What is pressure, and what is its formula?', options:['Force ÷ area (P = F/A), measured in Pascals (Pa)','Force × area','Mass × acceleration'], answer:'Force ÷ area (P = F/A), measured in Pascals (Pa)', fact:'🌊 High heels exert more pressure than elephant feet because the force is concentrated on a tiny area. Pressure explains why sharp knives cut easily and snowshoes stop you sinking in snow!' },
  { level:2, visual:'🌊', question:"What is Archimedes' principle?", options:["An object in a fluid experiences an upward buoyant force equal to the weight of fluid displaced","Objects always float in water","Pressure increases with depth in a fluid"], answer:"An object in a fluid experiences an upward buoyant force equal to the weight of fluid displaced", fact:'🌊 Archimedes shouted "Eureka!" discovering this in his bath. A ship floats because it displaces water equal to its weight. The buoyant force equals weight of displaced water!' },
  { level:2, visual:'⚙️', question:'In a lever, what is the mechanical advantage?', options:['Load ÷ effort (how much the lever multiplies the force)','Effort × distance','Load × fulcrum distance'], answer:'Load ÷ effort (how much the lever multiplies the force)', fact:'⚙️ A long effort arm and short load arm give large mechanical advantage. A 1 m crowbar can lift a boulder you could never budge by hand! Levers are one of the six classical simple machines.' },
  // Ohm's Law and Circuits
  { level:2, visual:'⚡', question:"What does Ohm's Law state?", options:['Voltage = Current × Resistance (V = IR)','Current = Voltage × Resistance','Resistance = Voltage × Current'], answer:'Voltage = Current × Resistance (V = IR)', fact:'⚡ Ohm\'s Law (V=IR) is fundamental to circuit analysis. Double the resistance → halve the current (for same voltage). Georg Ohm published this in 1827 and was initially ridiculed!' },
  { level:2, visual:'🔋', question:"In a circuit, a 12 V battery drives a current through a 4 Ω resistor. What is the current?", options:['3 A','48 A','0.33 A'], answer:'3 A', fact:'🔋 I = V/R = 12/4 = 3 A. Ohm\'s Law rearranged: I = V/R. This is the basis of all circuit calculations — from phone chargers to power stations!' },
  { level:2, visual:'💡', question:'What is electrical power in terms of current and voltage?', options:['P = IV (power = current × voltage)','P = I/V','P = I + V'], answer:'P = IV (power = current × voltage)', fact:'💡 P = IV = I²R = V²/R — three ways to calculate power! A 240 V, 1,200 W kettle draws I = P/V = 5 A of current. High current causes heating in cables!' },
  { level:2, visual:'⚙️', question:'In a series circuit with two resistors (4 Ω and 6 Ω), what is the total resistance?', options:['10 Ω','2.4 Ω','24 Ω'], answer:'10 Ω', fact:'⚙️ Series resistances simply add: R_total = R₁ + R₂ = 4 + 6 = 10 Ω. In parallel the total is less than either individual resistor. This is why adding bulbs in series makes each one dimmer!' },
  { level:2, visual:'🔋', question:'In a parallel circuit, what is the same across all branches?', options:['The voltage','The current','The resistance'], answer:'The voltage', fact:'🔋 In parallel circuits, each branch has the same voltage across it (equal to the supply voltage). Current divides — more flows through lower resistance paths. Home circuits are parallel!' },
  { level:2, visual:'⚡', question:'What is resistance measured in?', options:['Ohms (Ω)','Amperes (A)','Volts (V)'], answer:'Ohms (Ω)', fact:'⚡ Resistance is the opposition to current flow. A long, thin wire has more resistance than a short, thick one. Temperature affects resistance too — tungsten filament resistance increases when hot.' },
  { level:2, visual:'🔋', question:'What is electric charge measured in?', options:['Coulombs (C)','Amperes (A)','Joules (J)'], answer:'Coulombs (C)', fact:'🔋 Q = It (charge = current × time). One coulomb passes a point when 1 amp flows for 1 second. An electron carries a charge of 1.6×10⁻¹⁹ C — so 1 C contains about 6.24×10¹⁸ electrons!' },
  { level:2, visual:'🧲', question:'What is electromagnetic induction?', options:['Generating a voltage (and current) by moving a conductor in a magnetic field','The force on a current-carrying conductor in a magnetic field','The alignment of magnetic domains in a material'], answer:'Generating a voltage (and current) by moving a conductor in a magnetic field', fact:'🧲 Faraday discovered induction in 1831 — moving a magnet into a coil generates electricity! This is how all generators and alternators work, powering almost everything we use.' },
  { level:2, visual:'⚡', question:'What does a current-carrying wire create around itself?', options:['A magnetic field','An electric field only','A gravitational field'], answer:'A magnetic field', fact:'⚡ Oersted discovered in 1820 that electric currents create magnetic fields. The field forms circular loops around the wire. Coiling the wire into a solenoid greatly strengthens the field!' },
  // Waves
  { level:2, visual:'🌊', question:'What is the wave speed equation?', options:['v = fλ (speed = frequency × wavelength)','v = f/λ','v = λ/f'], answer:'v = fλ (speed = frequency × wavelength)', fact:'🌊 v = fλ links the three key wave properties. For light in air: 3×10⁸ = f × λ. A red photon (λ=700 nm) has f ≈ 4.3×10¹⁴ Hz. Used for everything from mobile networks to medical imaging!' },
  { level:2, visual:'💨', question:'What is the difference between transverse and longitudinal waves?', options:['Transverse: vibrations perpendicular to direction of travel; Longitudinal: vibrations parallel to direction of travel','Transverse: travel in straight lines; Longitudinal: travel in curves','Transverse: need a medium; Longitudinal: do not'], answer:'Transverse: vibrations perpendicular to direction of travel; Longitudinal: vibrations parallel to direction of travel', fact:'💨 Light is transverse (EM waves vibrate perpendicular). Sound is longitudinal (air compressions travel parallel to motion). Seismic P-waves are longitudinal; S-waves are transverse!' },
  { level:2, visual:'🌈', question:'Which part of the electromagnetic spectrum has the shortest wavelength?', options:['Gamma rays','Radio waves','X-rays'], answer:'Gamma rays', fact:'🌈 The EM spectrum from longest to shortest wavelength: Radio → Microwave → Infrared → Visible → UV → X-ray → Gamma. Gamma rays (λ < 10⁻¹² m) carry the most energy per photon!' },
  { level:2, visual:'🔭', question:'What is the Doppler effect?', options:['The change in observed frequency when a source and observer are moving relative to each other','The bending of waves around obstacles','The superposition of two waves'], answer:'The change in observed frequency when a source and observer are moving relative to each other', fact:'🔭 A siren approaching sounds higher pitched; receding sounds lower. The Doppler effect is used in speed cameras, weather radar, and measuring the recession of galaxies!' },
  { level:2, visual:'🌊', question:'What is diffraction?', options:['The spreading of waves as they pass through a gap or around an obstacle','The bouncing of waves off a surface','The bending of waves at a boundary'], answer:'The spreading of waves as they pass through a gap or around an obstacle', fact:'🌊 Diffraction is most noticeable when the gap size is similar to the wavelength. Radio waves diffract around hills; light barely diffracts through doors because its wavelength is so tiny!' },
  { level:2, visual:'💡', question:'What is total internal reflection?', options:['When light hits a boundary at an angle greater than the critical angle and is completely reflected back into the denser medium','When all light is absorbed by a surface','When light passes straight through without bending'], answer:'When light hits a boundary at an angle greater than the critical angle and is completely reflected back into the denser medium', fact:'💡 Total internal reflection enables optical fibres to carry light (and internet data) thousands of kilometres with minimal loss. Diamond\'s high refractive index makes it sparkle brilliantly!' },
  { level:2, visual:'🔭', question:'What is a converging (convex) lens used for?', options:['Focusing light to a point — used in cameras, magnifying glasses, and the human eye','Spreading light out — used in car headlights','Reflecting light — used in telescopes'], answer:'Focusing light to a point — used in cameras, magnifying glasses, and the human eye', fact:'🔭 Converging lenses bring parallel rays to a focal point. They can form real inverted images (camera) or virtual magnified images (magnifying glass). Spectacles correct long-sightedness with convex lenses!' },
  { level:2, visual:'🌊', question:'What is resonance?', options:['When a system is driven at its natural frequency and oscillates with maximum amplitude','When two waves cancel each other out','When a wave reflects off a surface'], answer:'When a system is driven at its natural frequency and oscillates with maximum amplitude', fact:'🌊 A singer can shatter a wine glass by singing at its resonant frequency. The Tacoma Narrows Bridge (1940) collapsed due to resonance with wind vortices. Resonance is exploited in MRI scanners!' },
  // Thermal Physics
  { level:2, visual:'🔥', question:'What is the Kelvin scale, and how does it relate to Celsius?', options:['An absolute temperature scale: T(K) = T(°C) + 273','A scale where water freezes at 0 K','The same as Celsius but starts at 100'], answer:'An absolute temperature scale: T(K) = T(°C) + 273', fact:'🔥 0 K (absolute zero ≈ −273°C) is the theoretical lowest temperature — no thermal energy at all. The Kelvin scale is essential in gas law calculations and thermodynamics!' },
  { level:2, visual:'💨', question:'What does specific heat capacity tell us?', options:['The energy needed to raise 1 kg of a substance by 1°C (or 1 K)','The temperature at which a substance melts','The rate at which a substance loses heat'], answer:'The energy needed to raise 1 kg of a substance by 1°C (or 1 K)', fact:'💨 Water has a very high specific heat capacity (4,200 J/kg°C) — it takes a lot of energy to heat up and cools slowly. This makes it ideal for central heating and moderating Earth\'s climate!' },
  { level:2, visual:'🌊', question:'What is latent heat?', options:['The energy absorbed or released during a change of state with no temperature change','The heat lost to the surroundings during cooling','The maximum temperature a substance can reach'], answer:'The energy absorbed or released during a change of state with no temperature change', fact:'🌊 Latent means "hidden" — no thermometer change! Boiling water stays at 100°C while absorbing latent heat of vaporisation. This is why steam burns are so severe: extra energy is released on contact!' },
  { level:2, visual:'🔋', question:"According to Boyle's Law, if pressure on a gas doubles (at constant temperature), what happens to its volume?", options:['It halves','It doubles','It stays the same'], answer:'It halves', fact:'🔋 Boyle\'s Law: P₁V₁ = P₂V₂ (constant T). Squash a gas into half the volume → double the pressure. This is why bicycle tyres get harder to pump as they fill up!' },
  { level:2, visual:'🔥', question:"Charles' Law states that at constant pressure, the volume of a gas is proportional to its ______ temperature.", options:['Absolute (Kelvin)','Celsius','Fahrenheit'], answer:'Absolute (Kelvin)', fact:'🔥 V ∝ T (Kelvin). Double the Kelvin temperature → double the volume. This is why a balloon expands when heated and shrinks in cold weather — you must use Kelvin, not Celsius!' },
  { level:2, visual:'💡', question:'What is thermal expansion?', options:['The increase in volume of a material when heated','The loss of heat through radiation','The change in state from solid to liquid'], answer:'The increase in volume of a material when heated', fact:'💡 Most materials expand when heated. Railway tracks have gaps to allow expansion. The Eiffel Tower is about 15 cm taller in summer than winter due to thermal expansion of its iron structure!' },
  // Magnetism and EM
  { level:2, visual:'🧲', question:'What is an electromagnet?', options:['A coil of wire carrying electric current that acts as a magnet — can be switched on and off','A permanent magnet made of steel','A magnet used only in electric motors'], answer:'A coil of wire carrying electric current that acts as a magnet — can be switched on and off', fact:'🧲 Electromagnets are hugely useful: MRI scanners, electric motors, loudspeakers, and scrapyard cranes all use them. Increasing current or adding a soft iron core makes them stronger!' },
  { level:2, visual:'⚡', question:'What is the motor effect?', options:['A force on a current-carrying conductor placed in a magnetic field','The generation of electricity by a moving magnet','The conversion of kinetic energy to electrical energy'], answer:'A force on a current-carrying conductor placed in a magnetic field', fact:'⚡ F = BIL (force = field × current × length). The left-hand rule (FBI rule) gives the force direction for conventional current. This is the principle behind all electric motors!' },
  { level:2, visual:'🌊', question:'Which part of the EM spectrum is used in microwave ovens?', options:['Microwaves','Infrared','Radio waves'], answer:'Microwaves', fact:'🌊 Microwave ovens use 2.45 GHz radiation — a frequency absorbed efficiently by water molecules. The water in food absorbs microwaves and heats up, cooking the food from within. No ionisation — it\'s safe!' },
  { level:2, visual:'🔭', question:'What type of EM radiation is used in medical X-ray imaging?', options:['X-rays','Gamma rays','Ultraviolet'], answer:'X-rays', fact:'🔭 X-rays pass through soft tissue but are absorbed by denser bone. Wilhelm Röntgen discovered them in 1895 and won the first Nobel Prize in Physics in 1901. High doses are harmful — lead aprons protect!' },
  { level:2, visual:'🌈', question:'What is infrared radiation commonly used for?', options:['Remote controls, thermal imaging cameras, and heat lamps','Wi-Fi communication','Sterilising medical equipment'], answer:'Remote controls, thermal imaging cameras, and heat lamps', fact:'🌈 All warm objects emit infrared radiation. Your TV remote sends IR pulses to your TV. Thermal cameras detect body heat — used in search and rescue, security, and medicine.' },
  // Additional Level 2
  { level:2, visual:'🏃', question:'A force of 200 N acts on a surface of area 0.05 m². What is the pressure?', options:['4,000 Pa','10 Pa','40 Pa'], answer:'4,000 Pa', fact:'🏃 P = F/A = 200 ÷ 0.05 = 4,000 Pa. 1 Pascal = 1 N/m². Atmospheric pressure is about 101,325 Pa — the weight of all the air above you per square metre!' },
  { level:2, visual:'⚡', question:'What is the wavelength of a wave with speed 340 m/s and frequency 170 Hz?', options:['2 m','57,800 m','0.5 m'], answer:'2 m', fact:'⚡ λ = v/f = 340/170 = 2 m. This is a sound wave with a 2 m wavelength — a fairly low-pitched sound. Audible sound wavelengths range from about 17 mm (20 kHz) to 17 m (20 Hz).' },
  { level:2, visual:'💡', question:'A resistor dissipates 6 W when 2 A flows through it. What is its resistance?', options:['1.5 Ω','12 Ω','3 Ω'], answer:'1.5 Ω', fact:'💡 P = I²R → R = P/I² = 6/4 = 1.5 Ω. Or using V=IR after finding V=P/I=3V: R=3/2=1.5 Ω. Multiple routes to the same answer — a good way to check!' },
  { level:2, visual:'🔋', question:'What is the kinetic energy of a 2 kg ball moving at 10 m/s?', options:['100 J','20 J','200 J'], answer:'100 J', fact:'🔋 KE = ½mv² = ½ × 2 × 10² = ½ × 2 × 100 = 100 J. Notice the v² term — doubling speed quadruples kinetic energy! That\'s why speed is so dangerous in car crashes.' },
  { level:2, visual:'🌍', question:'An object of mass 5 kg is raised 3 m. How much gravitational PE does it gain? (g = 10 N/kg)', options:['150 J','50 J','15 J'], answer:'150 J', fact:'🌍 GPE = mgh = 5 × 10 × 3 = 150 J. This energy came from the muscles doing work lifting the object. Release it and it converts back to kinetic energy as it falls!' },
  { level:2, visual:'🔥', question:'How much energy is needed to heat 2 kg of water from 20°C to 100°C? (SHC of water = 4,200 J/kg°C)', options:['672,000 J','168,000 J','33,600 J'], answer:'672,000 J', fact:'🔥 E = mcΔT = 2 × 4,200 × 80 = 672,000 J = 672 kJ. Heating water takes a lot of energy — that\'s why kettles consume about 2,000-3,000 W and take a minute or more to boil!' },
  { level:2, visual:'⚙️', question:'What is the principle of moments?', options:['For equilibrium, the total clockwise moment equals the total anticlockwise moment about any pivot','The moment of a force equals force divided by distance','A longer arm always produces a larger moment regardless of force'], answer:'For equilibrium, the total clockwise moment equals the total anticlockwise moment about any pivot', fact:'⚙️ Moment = Force × perpendicular distance from pivot. A seesaw balances when the clockwise and anticlockwise moments are equal. Engineers use this to design bridges and cranes!' },
  { level:2, visual:'🌊', question:'What causes interference in waves?', options:['Two waves overlapping and adding (constructive) or cancelling (destructive)','Waves reflecting off multiple surfaces','Waves slowing down in a medium'], answer:'Two waves overlapping and adding (constructive) or cancelling (destructive)', fact:'🌊 When two wave crests meet → bigger crest (constructive). Crest meets trough → cancellation (destructive). Noise-cancelling headphones use destructive interference to cancel ambient sound!' },
  { level:2, visual:'💡', question:'What is the critical angle in optics?', options:['The angle of incidence at which the refracted ray travels along the boundary (refraction angle = 90°)','The angle at which maximum refraction occurs','The angle between the normal and the incident ray'], answer:'The angle of incidence at which the refracted ray travels along the boundary (refraction angle = 90°)', fact:'💡 For glass (n≈1.5), the critical angle is about 42°. Above this angle, total internal reflection occurs. This principle allows optical fibres to carry light signals with almost no loss!' },
  { level:2, visual:'🌈', question:'What type of EM radiation causes sunburn?', options:['Ultraviolet (UV)','Infrared','Visible light'], answer:'Ultraviolet (UV)', fact:'🌈 UV radiation has enough energy to damage DNA in skin cells — causing sunburn and increasing skin cancer risk. Sunscreen absorbs UV. The ozone layer absorbs most UV from the Sun!' },
  { level:2, visual:'⚡', question:'In an AC circuit, what does frequency of 50 Hz mean in the UK mains?', options:['The current completes 50 full cycles per second (reversing direction 100 times per second)','The voltage is 50 V','The power alternates at 50 W'], answer:'The current completes 50 full cycles per second (reversing direction 100 times per second)', fact:'⚡ UK mains is 230 V AC at 50 Hz — 50 complete cycles per second. In each cycle the current reverses twice, so it changes direction 100 times per second. The USA uses 120 V at 60 Hz. AC is preferred for distribution because transformers can step voltage up/down easily!' },
  { level:2, visual:'🔋', question:'What is the function of a transformer?', options:['To change (step up or step down) AC voltage using electromagnetic induction','To convert AC to DC','To store electrical energy'], answer:'To change (step up or step down) AC voltage using electromagnetic induction', fact:'🔋 Transformers use Faraday\'s law: changing current in primary coil induces voltage in secondary. V_s/V_p = N_s/N_p. Power is transmitted at high voltage (low current) to reduce I²R losses!' },
  { level:2, visual:'🏃', question:'What is impulse, and what is its formula?', options:['Impulse = Force × time = change in momentum','Impulse = mass × velocity','Impulse = work done ÷ time'], answer:'Impulse = Force × time = change in momentum', fact:'🏃 Impulse (N·s) equals the change in momentum. Extending the time of impact reduces the peak force — crumple zones in cars, airbags, and springy sports shoes all use this principle!' },
  { level:2, visual:'⚙️', question:'What is efficiency in a machine?', options:['Useful output energy ÷ total input energy × 100%','Input power ÷ output power','Force out ÷ force in'], answer:'Useful output energy ÷ total input energy × 100%', fact:'⚙️ No machine is 100% efficient — some energy is always wasted, usually as heat due to friction. A modern electric car drivetrain is ~85% efficient vs ~25% for a petrol engine!' },

  // ── LEVEL 3 NEW QUESTIONS ────────────────────────────────────────────────────
  // Quantum and Modern Physics
  { level:3, visual:'💡', question:'What is the photoelectric effect?', options:['Emission of electrons from a metal surface when light of sufficient frequency shines on it','The emission of light when electrons flow through a gas','The conversion of photons to protons inside a nucleus'], answer:'Emission of electrons from a metal surface when light of sufficient frequency shines on it', fact:'💡 Einstein won the 1921 Nobel Prize for explaining the photoelectric effect using photons (quanta of light). Below the threshold frequency, no electrons are emitted regardless of brightness — proving light is quantised!' },
  { level:3, visual:'🌊', question:'What is wave-particle duality?', options:['All particles exhibit both wave-like and particle-like properties depending on how they are observed','Particles always behave as waves','Waves always consist of discrete particles'], answer:'All particles exhibit both wave-like and particle-like properties depending on how they are observed', fact:'🌊 Electrons show diffraction (wave property) in the double-slit experiment but land as discrete points (particle property). Light does too. This fundamental duality is at the heart of quantum mechanics!' },
  { level:3, visual:'⚛️', question:'What does the Heisenberg Uncertainty Principle state?', options:['It is impossible to simultaneously know the exact position and exact momentum of a particle','Electrons always have uncertain energy levels','Quantum particles have no defined properties'], answer:'It is impossible to simultaneously know the exact position and exact momentum of a particle', fact:'⚛️ Δx·Δp ≥ ħ/2. The more precisely you know a particle\'s position, the less precisely you can know its momentum — this is a fundamental feature of nature, not a limitation of our instruments!' },
  { level:3, visual:'🔬', question:'What is quantum tunnelling?', options:['A quantum particle passing through a potential energy barrier that classical physics says it cannot surmount','An electron jumping between energy levels','A particle accelerating through a tunnel-shaped electric field'], answer:'A quantum particle passing through a potential energy barrier that classical physics says it cannot surmount', fact:'🔬 Quantum tunnelling powers nuclear fusion in the Sun (particles too slow classically to fuse still do so). It\'s exploited in tunnel diodes, flash memory chips, and the scanning tunnelling microscope!' },
  { level:3, visual:'⚡', question:'What does E = mc² mean?', options:['Mass and energy are equivalent and interchangeable; a small mass corresponds to a huge amount of energy','Energy equals the speed of light squared','The speed of light depends on the mass of the observer'], answer:'Mass and energy are equivalent and interchangeable; a small mass corresponds to a huge amount of energy', fact:'⚡ c² ≈ 9×10¹⁶ m²/s² — so 1 kg of mass is equivalent to 9×10¹⁶ J of energy (enough to power a city for years). This is the basis of nuclear power and why stars shine!' },
  { level:3, visual:'🔋', question:'What is nuclear fission?', options:['Splitting a heavy nucleus into smaller ones, releasing energy','Combining two light nuclei to release energy','The emission of an alpha particle from an unstable nucleus'], answer:'Splitting a heavy nucleus into smaller ones, releasing energy', fact:'🔋 Uranium-235 splits into smaller nuclei + 2-3 neutrons + energy. The neutrons trigger more fissions — a chain reaction. Controlled in nuclear reactors; uncontrolled in bombs. 1 kg U-235 ≈ 20,000 tonnes of TNT!' },
  { level:3, visual:'🌟', question:'What is nuclear fusion?', options:['Combining two light nuclei (e.g., hydrogen isotopes) to form a heavier nucleus, releasing vast energy','Splitting a heavy nucleus into lighter ones','The decay of a radioactive isotope over time'], answer:'Combining two light nuclei (e.g., hydrogen isotopes) to form a heavier nucleus, releasing vast energy', fact:'🌟 The Sun fuses 600 million tonnes of hydrogen into helium every second. Fusion releases ~4x more energy per kg than fission. ITER in France aims to achieve net energy gain from controlled fusion!' },
  { level:3, visual:'⚛️', question:'What is binding energy of a nucleus?', options:['The energy required to completely separate all nucleons — or equivalently the energy released when nucleons bind together','The energy of the electrons orbiting the nucleus','The kinetic energy of the nucleus'], answer:'The energy required to completely separate all nucleons — or equivalently the energy released when nucleons bind together', fact:'⚛️ Binding energy per nucleon peaks at iron-56 — the most stable nucleus. Lighter nuclei release energy by fusion toward iron; heavier nuclei release energy by fission toward iron. Both paths release energy!' },
  { level:3, visual:'🔭', question:'What is time dilation in Special Relativity?', options:['A moving clock runs slower than a stationary clock as observed by a stationary observer','Time passes faster for moving objects','Clocks only slow down at speeds close to light near massive objects'], answer:'A moving clock runs slower than a stationary clock as observed by a stationary observer', fact:'🔭 Confirmed by comparing atomic clocks flown on jets with stationary ones. GPS satellites must correct for time dilation (both special and general relativistic) — without corrections, GPS would drift by ~10 km/day!' },
  { level:3, visual:'🌍', question:'What is length contraction in Special Relativity?', options:['An object moving at high speed appears shorter in the direction of motion to a stationary observer','Objects expand when moving near the speed of light','Distances in space expand as the universe grows'], answer:'An object moving at high speed appears shorter in the direction of motion to a stationary observer', fact:'🌍 L = L₀/γ where γ = 1/√(1−v²/c²). At 87% the speed of light, an object appears half its rest length. These are real measured effects, not illusions!' },
  { level:3, visual:'⚡', question:'Why is the speed of light a fundamental constant?', options:['It is the same in all inertial reference frames regardless of the motion of the source or observer','It varies depending on the medium','Einstein postulated it as constant and it has not been confirmed'], answer:'It is the same in all inertial reference frames regardless of the motion of the source or observer', fact:'⚡ Einstein\'s second postulate (1905): c ≈ 3×10⁸ m/s is constant for all observers. This leads to time dilation, length contraction, and mass-energy equivalence. Confirmed by countless experiments!' },
  { level:3, visual:'🌌', question:'What is gravitational time dilation?', options:['Clocks run slower in stronger gravitational fields (closer to massive objects)','Gravity causes time to speed up near massive objects','Time dilation only occurs due to velocity, not gravity'], answer:'Clocks run slower in stronger gravitational fields (closer to massive objects)', fact:'🌌 Predicted by General Relativity and confirmed experimentally. A clock at sea level runs slower than one on a mountain. GPS satellites must account for this (clocks run faster in weaker gravity at altitude)!' },
  // Rotational and Orbital Mechanics
  { level:3, visual:'🌍', question:'What is centripetal force?', options:['The net force directed towards the centre of a circular path that keeps an object moving in a circle','A force pushing objects outward from a circle','The reaction force to gravity in circular motion'], answer:'The net force directed towards the centre of a circular path that keeps an object moving in a circle', fact:'🌍 Centripetal means "centre-seeking". For a car on a circular road, friction provides centripetal force. For the Moon orbiting Earth, gravity provides it. F = mv²/r.' },
  { level:3, visual:'⚙️', question:'What is angular momentum?', options:['The rotational equivalent of linear momentum: L = Iω, conserved when no external torque acts','The momentum of a particle moving in a straight line','The product of mass and speed'], answer:'The rotational equivalent of linear momentum: L = Iω, conserved when no external torque acts', fact:'⚙️ A spinning ice skater pulls in arms → smaller moment of inertia I → spins faster (ω increases) to conserve L = Iω. The same principle explains why a collapsing star becomes a fast-spinning pulsar!' },
  { level:3, visual:'🔭', question:"What does Kepler's Third Law state?", options:["The square of a planet's orbital period is proportional to the cube of its semi-major axis (T² ∝ a³)",'Planets move in circular orbits around the Sun','Planets sweep equal areas in equal times'], answer:"The square of a planet's orbital period is proportional to the cube of its semi-major axis (T² ∝ a³)", fact:'🔭 T² ∝ a³ means planets farther from the Sun have much longer years. Neptune (30× Earth\'s orbital radius) takes 165 Earth years to orbit! Kepler derived this from Tycho Brahe\'s observations in 1619.' },
  { level:3, visual:'🌍', question:'What is escape velocity?', options:['The minimum speed needed to escape a body\'s gravitational pull without further propulsion','The maximum speed a rocket can reach','The orbital speed of a satellite at Earth\'s surface'], answer:"The minimum speed needed to escape a body's gravitational pull without further propulsion", fact:'🌍 v_esc = √(2GM/r). Earth\'s escape velocity ≈ 11.2 km/s. A black hole\'s escape velocity exceeds c (speed of light) — nothing, not even light, can escape! That\'s why they\'re black.' },
  { level:3, visual:'🌌', question:'What are tidal forces?', options:['Differential gravitational forces across an extended body, causing stretching and compression','The force of ocean tides on coastal structures','A special type of centripetal force in space'], answer:'Differential gravitational forces across an extended body, causing stretching and compression', fact:'🌌 Tidal forces arise because gravity varies across an object\'s diameter. They cause the Moon to always show the same face to Earth (tidal locking), elongate comets near the Sun, and were crucial in stellar formation!' },
  { level:3, visual:'⚙️', question:'What is the gravitational field strength at the surface of a planet of mass M and radius R?', options:['g = GM/R²','g = GMR','g = G/MR²'], answer:'g = GM/R²', fact:'⚙️ G = 6.67×10⁻¹¹ N·m²/kg². This formula comes directly from Newton\'s law of gravitation. On Earth\'s surface, it gives g ≈ 9.8 N/kg. On a neutron star (huge M, tiny R), g is ~10¹² N/kg!' },
  { level:3, visual:'🔭', question:"What is Kepler's Second Law?", options:["A planet sweeps out equal areas in equal times as it orbits the Sun",'All planets move in elliptical orbits','Planets closer to the Sun move more slowly'], answer:"A planet sweeps out equal areas in equal times as it orbits the Sun", fact:'🔭 This is a consequence of conservation of angular momentum. Planets move fastest at perihelion (closest to Sun) and slowest at aphelion (farthest). Earth moves ~3% faster in January than July!' },
  // Advanced Electromagnetism
  { level:3, visual:'⚡', question:'What do Maxwell\'s equations describe in principle?', options:['All classical electromagnetic phenomena including how electric and magnetic fields are generated and interact','Only static electric fields','The quantum behaviour of photons'], answer:'All classical electromagnetic phenomena including how electric and magnetic fields are generated and interact', fact:'⚡ Maxwell\'s four equations (1865) unified electricity, magnetism, and optics. They predicted electromagnetic waves travelling at the speed of light — leading Maxwell to conclude light IS an EM wave!' },
  { level:3, visual:'🔋', question:'What is a capacitor?', options:['A device that stores electric charge (and energy) in an electric field between two conducting plates','A device that converts AC to DC','A device that opposes changes in current flow'], answer:'A device that stores electric charge (and energy) in an electric field between two conducting plates', fact:'🔋 C = Q/V (capacitance in Farads). Energy stored = ½CV². Capacitors charge and discharge rapidly — used in camera flashes, smoothing circuits, and storing energy in defibrillators!' },
  { level:3, visual:'⚙️', question:'What is an inductor, and what does it oppose?', options:['A coil that stores energy in a magnetic field and opposes changes in current','A component that stores charge and opposes changes in voltage','A device that rectifies AC to DC'], answer:'A coil that stores energy in a magnetic field and opposes changes in current', fact:'⚙️ L = Nφ/I (inductance in Henries). Energy = ½LI². Inductors resist rapid current changes — used in filters, transformers, and motors. A large inductor can generate dangerous voltage spikes!' },
  { level:3, visual:'💡', question:'What is the function of a diode in a circuit?', options:['It allows current to flow in only one direction','It amplifies the current','It stores charge between two plates'], answer:'It allows current to flow in only one direction', fact:'💡 A diode is a semiconductor p-n junction. Forward biased → current flows; reverse biased → blocks current. Used in power supplies (rectification), LEDs emit light, and photodiodes detect light!' },
  { level:3, visual:'⚡', question:'What does a transistor do?', options:['Acts as a switch or amplifier — a small base current controls a large collector current','Converts AC to DC','Stores energy in a magnetic field'], answer:'Acts as a switch or amplifier — a small base current controls a large collector current', fact:'⚡ Transistors (invented 1947) revolutionised electronics. Modern CPUs contain billions of transistors smaller than 5 nm. They switch billions of times per second, enabling all digital technology!' },
  { level:3, visual:'🔋', question:'What is the difference between AC and DC electricity?', options:['DC flows in one direction; AC periodically reverses direction','AC has higher voltage than DC','DC is used for long-distance transmission; AC for local use'], answer:'DC flows in one direction; AC periodically reverses direction', fact:'🔋 Batteries produce DC. Generators produce AC (easier to transform and transmit). Edison championed DC; Tesla/Westinghouse championed AC — the "War of Currents" (1880s). AC won for the grid; DC for electronics.' },
  { level:3, visual:'⚙️', question:'How does an electric generator work?', options:['A rotating coil in a magnetic field induces an AC voltage via electromagnetic induction','Current in a coil creates a rotating magnetic field','A permanent magnet is charged by an external voltage'], answer:'A rotating coil in a magnetic field induces an AC voltage via electromagnetic induction', fact:'⚙️ Faraday\'s law: changing flux induces EMF = −NdΦ/dt. All power stations work this way — whether the coil is spun by steam (coal/nuclear), water (hydro), or wind turbines. Mechanical → electrical!' },
  { level:3, visual:'🌊', question:'What is the electromagnetic spectrum, and what do all EM waves have in common?', options:['A family of transverse waves all travelling at c = 3×10⁸ m/s in a vacuum, differing only in frequency/wavelength','Waves that all require a medium to travel through','Waves ranging from sound to gamma rays'], answer:'A family of transverse waves all travelling at c = 3×10⁸ m/s in a vacuum, differing only in frequency/wavelength', fact:'🌊 Radio (km wavelength) to gamma rays (sub-picometer) — all travel at c, all are transverse, all are oscillating electric and magnetic fields. Maxwell predicted them; Hertz confirmed them in 1887!' },
  // Additional Level 3
  { level:3, visual:'🌟', question:'What is nuclear decay (radioactivity)?', options:['The spontaneous emission of particles or energy from an unstable nucleus to become more stable','A chemical reaction between nuclear materials','The absorption of neutrons by a nucleus'], answer:'The spontaneous emission of particles or energy from an unstable nucleus to become more stable', fact:'🌟 Alpha (α), beta (β), and gamma (γ) decay all reduce nuclear instability. Radioactivity is random and spontaneous — no chemical change can affect the rate. Used in medicine, dating, and power!' },
  { level:3, visual:'⚛️', question:'What is the difference between alpha, beta, and gamma radiation in terms of penetrating power?', options:['Alpha: stopped by paper; Beta: stopped by a few mm of aluminium; Gamma: requires thick lead or concrete','Alpha: most penetrating; Gamma: least penetrating','All three have the same penetrating power'], answer:'Alpha: stopped by paper; Beta: stopped by a few mm of aluminium; Gamma: requires thick lead or concrete', fact:'⚛️ Alpha particles (helium nuclei) are heavily ionising but barely penetrating. Beta (electrons) penetrate more. Gamma (EM radiation) is very penetrating but less ionising. For medical treatment, we choose the right type!' },
  { level:3, visual:'🔬', question:'What is the Standard Model of particle physics?', options:['The theoretical framework describing fundamental particles (quarks, leptons) and the forces that act between them (except gravity)','Einstein\'s theory of relativity','The model of the atomic nucleus containing protons and neutrons'], answer:'The theoretical framework describing fundamental particles (quarks, leptons) and the forces that act between them (except gravity)', fact:'🔬 The Standard Model describes 17 fundamental particles — 6 quarks, 6 leptons, 4 force carriers (bosons), and the Higgs boson. It is the most precisely tested theory in physics, but does not include gravity!' },
  { level:3, visual:'💥', question:'What are quarks, and how do they make up protons and neutrons?', options:['Fundamental particles bound by the strong force: protons = uud, neutrons = udd (u=up, d=down)','Particles that orbit the nucleus like electrons','The constituents of electrons'], answer:'Fundamental particles bound by the strong force: protons = uud, neutrons = udd (u=up, d=down)', fact:'💥 Quarks carry fractional charge: up (u) = +2/3e, down (d) = −1/3e. Proton (uud): 2/3+2/3−1/3 = +1. Neutron (udd): 2/3−1/3−1/3 = 0. Quarks can never exist in isolation — confinement!' },
  { level:3, visual:'🌌', question:'What is dark energy?', options:['The unknown form of energy causing the accelerating expansion of the universe, comprising ~68% of its total energy','The energy stored in black holes','The kinetic energy of dark matter particles'], answer:'The unknown form of energy causing the accelerating expansion of the universe, comprising ~68% of its total energy', fact:'🌌 Dark energy was discovered in 1998 when supernova observations showed the universe\'s expansion is accelerating. Its nature is completely unknown. The universe: ~68% dark energy, ~27% dark matter, ~5% ordinary matter.' },
  { level:3, visual:'🔭', question:'What is the Chandrasekhar limit?', options:['The maximum mass (~1.4 solar masses) of a white dwarf supported by electron degeneracy pressure','The maximum luminosity of a star','The minimum mass for a star to undergo nuclear fusion'], answer:'The maximum mass (~1.4 solar masses) of a white dwarf supported by electron degeneracy pressure', fact:'🔭 Above ~1.4 M☉, electron degeneracy pressure cannot support a white dwarf — it collapses further into a neutron star or, if massive enough, a black hole. Type Ia supernovae (at this limit) are used as standard candles!' },
  { level:3, visual:'⚡', question:'What is the Compton effect?', options:['The increase in wavelength of X-rays scattered by electrons, confirming the particle nature of light','The emission of electrons from a metal surface due to incident light','The diffraction of X-rays by crystal lattices'], answer:'The increase in wavelength of X-rays scattered by electrons, confirming the particle nature of light', fact:'⚡ Compton (1923) showed X-ray photons transfer momentum to electrons in collisions. The scattered photon has lower energy (longer wavelength). This confirmed Einstein\'s photon model: p = h/λ.' },
  { level:3, visual:'🌊', question:'What is the Schrödinger equation used for in quantum mechanics?', options:['Describing how the quantum state (wave function) of a system evolves over time','Calculating the trajectory of a particle in a field','Predicting the energy levels of classical oscillators'], answer:'Describing how the quantum state (wave function) of a system evolves over time', fact:'🌊 The wave function ψ(x,t) contains all information about a quantum system. |ψ|² gives the probability density of finding the particle at position x. It\'s the quantum equivalent of Newton\'s second law!' },
  { level:3, visual:'🔬', question:'What is pair production in particle physics?', options:['A high-energy photon spontaneously producing a particle-antiparticle pair near a nucleus','Two protons colliding to produce new particles','A neutron decaying into a proton and electron'], answer:'A high-energy photon spontaneously producing a particle-antiparticle pair near a nucleus', fact:'🔬 A gamma photon with energy ≥ 2m_ec² = 1.022 MeV can create an electron-positron pair. This is E=mc² in action — pure energy (photon) becoming mass (two particles)! The reverse (annihilation) also occurs.' },
  { level:3, visual:'⚛️', question:'What is the Zeeman effect?', options:['The splitting of spectral lines in the presence of an external magnetic field','The broadening of spectral lines due to temperature','The shift of spectral lines due to the Doppler effect'], answer:'The splitting of spectral lines in the presence of an external magnetic field', fact:'⚛️ The Zeeman effect reveals the magnetic quantum number m_l — electrons in different magnetic sub-states split in energy in a magnetic field. Used in astrophysics to measure magnetic fields in stars!' },
  { level:3, visual:'💡', question:'What is spontaneous emission vs stimulated emission of light?', options:['Spontaneous: an excited atom randomly emits a photon; Stimulated: an incoming photon triggers emission of an identical photon','Spontaneous: occurs at room temperature only; Stimulated: occurs only at very low temperatures','Stimulated emission produces photons with random phase; spontaneous produces coherent photons'], answer:'Spontaneous: an excited atom randomly emits a photon; Stimulated: an incoming photon triggers emission of an identical photon', fact:'💡 Stimulated emission produces a second photon identical to the first (same phase, frequency, direction) — the basis of LASER action (Light Amplification by Stimulated Emission of Radiation). Used in CD/DVD players, surgery, and fibre optics!' },
  { level:3, visual:'🌍', question:'What is the Schwarzschild radius of a black hole?', options:['r_s = 2GM/c² — the radius within which escape velocity exceeds c','r_s = GM/c² — the radius of the event horizon for a spinning black hole','r_s = 4GM/c² — the radius at which tidal forces destroy objects'], answer:'r_s = 2GM/c² — the radius within which escape velocity exceeds c', fact:'🌍 For Earth (M ≈ 6×10²⁴ kg), r_s ≈ 9 mm! If Earth were compressed to 9 mm radius, it would become a black hole. For the Sun, r_s ≈ 3 km. For a stellar black hole (~10 M☉), r_s ≈ 30 km.' },
  { level:3, visual:'🔋', question:'What is the significance of Planck\'s constant h?', options:["The fundamental quantum of action: energy of a photon = hf, linking a photon's energy to its frequency",'The speed of light in all media','The charge of the electron'], answer:"The fundamental quantum of action: energy of a photon = hf, linking a photon's energy to its frequency", fact:'🔋 h = 6.63×10⁻³⁴ J·s. E = hf underpins all quantum mechanics. A visible light photon (f ≈ 5×10¹⁴ Hz) has energy ≈ 3.3×10⁻¹⁹ J — tiny, but trillions of photons per second hit your eye!' },
  { level:3, visual:'🌊', question:'What is a standing wave?', options:['A wave pattern formed by two identical waves travelling in opposite directions, producing nodes and antinodes','A wave that does not move through a medium','A transverse wave confined to the surface of water'], answer:'A wave pattern formed by two identical waves travelling in opposite directions, producing nodes and antinodes', fact:'🌊 Standing waves form in guitar strings, organ pipes, and microwave ovens. Nodes are points of zero displacement; antinodes are maximum displacement. The natural frequencies (harmonics) of instruments come from standing waves!' },
  { level:3, visual:'⚙️', question:'What is the Coriolis effect?', options:['The deflection of moving objects (including air masses) due to Earth\'s rotation — to the right in the Northern Hemisphere','The centripetal force on objects at Earth\'s equator','The effect of Earth\'s gravity on satellite trajectories'], answer:"The deflection of moving objects (including air masses) due to Earth's rotation — to the right in the Northern Hemisphere", fact:'⚙️ The Coriolis effect causes large-scale wind patterns to rotate counterclockwise in the Northern Hemisphere (cyclones) and clockwise in the Southern Hemisphere. It\'s important for weather, ocean currents, and ballistic missile trajectories!' },
  { level:3, visual:'🔭', question:'What is the event horizon of a black hole?', options:['The boundary beyond which nothing, not even light, can escape the black hole\'s gravity','The region where tidal forces destroy approaching objects','The surface of the black hole where matter accumulates'], answer:"The boundary beyond which nothing, not even light, can escape the black hole's gravity", fact:'🔭 The event horizon is a one-way surface — you could cross it without feeling anything special, but you\'d never come back. For a non-rotating black hole, it\'s a sphere of radius equal to the Schwarzschild radius.' },
  { level:3, visual:'🌟', question:'What is Hawking radiation?', options:['Theoretical thermal radiation emitted by black holes due to quantum effects near the event horizon','Radiation emitted by stars of the mass of our Sun','Gamma radiation from supernovae'], answer:'Theoretical thermal radiation emitted by black holes due to quantum effects near the event horizon', fact:'🌟 Stephen Hawking predicted (1974) that quantum pair production near the event horizon causes black holes to slowly lose mass and eventually evaporate. For stellar black holes, this process takes far longer than the age of the universe!' },

  // ── LEVEL 1 ADDITIONAL ───────────────────────────────────────────────────────
  { level:1, visual:'🌍', question:'What is the name of the force that keeps the Moon in orbit around Earth?', options:['Gravity','Magnetism','Friction'], answer:'Gravity', fact:'🌍 Gravity acts between all objects with mass. The Moon is kept in orbit by Earth\'s gravity pulling it constantly towards Earth. Without gravity, the Moon would fly off in a straight line!' },
  { level:1, visual:'🏃', question:'What happens to your weight if you travel to a planet with weaker gravity?', options:['Your weight decreases but your mass stays the same','Both your weight and mass decrease','Your weight stays the same but your mass decreases'], answer:'Your weight decreases but your mass stays the same', fact:'🏃 Weight = mass × gravitational field strength (W = mg). On Mars (g ≈ 3.7 N/kg), a 70 kg person weighs only 259 N instead of 700 N on Earth. Mass (amount of matter) never changes!' },
  { level:1, visual:'🔴', question:'A car moving at steady speed on a flat road — what can you say about the forces?', options:['The driving force equals the resistive forces (balanced forces)','There are no forces acting on the car','The driving force is greater than the resistive forces'], answer:'The driving force equals the resistive forces (balanced forces)', fact:'🔴 Steady speed means zero acceleration, which means balanced forces. The engine force equals air resistance + friction. To accelerate, the driver must increase the engine force to create an unbalanced force!' },
  { level:1, visual:'💨', question:'Which falls faster in a vacuum — a feather or a bowling ball?', options:['They fall at the same rate','The bowling ball falls faster','The feather falls faster'], answer:'They fall at the same rate', fact:'💨 Without air resistance, all objects fall at the same rate regardless of mass! Galileo demonstrated this (allegedly from the Leaning Tower of Pisa). NASA replicated the feather-hammer drop on the Moon in 1971!' },
  { level:1, visual:'⚙️', question:'What is a resultant force?', options:['The single force that has the same effect as all the forces acting on an object combined','The largest force acting on an object','The force of gravity only'], answer:'The single force that has the same effect as all the forces acting on an object combined', fact:'⚙️ Two 5 N forces acting in the same direction → 10 N resultant. Two 5 N forces in opposite directions → 0 N resultant (balanced). Finding resultants is fundamental to structural engineering!' },
  { level:1, visual:'🔥', question:'What is the main energy store in food?', options:['Chemical energy','Kinetic energy','Electrical energy'], answer:'Chemical energy', fact:'🔥 Food contains chemical energy in molecular bonds (carbohydrates, fats, proteins). Your body releases this energy in respiration. A chocolate bar contains about 2 million joules — enough to power a 60 W bulb for 9 hours!' },
  { level:1, visual:'⚡', question:'What energy transformation happens in a battery-powered torch?', options:['Chemical energy → electrical energy → light energy (and heat)','Electrical energy → chemical energy → light','Kinetic energy → electrical energy → light'], answer:'Chemical energy → electrical energy → light energy (and heat)', fact:'⚡ Batteries store chemical energy. When connected in a circuit, this becomes electrical energy. The bulb then converts electrical to light (and some heat). Each conversion is shown by an arrow in an energy transfer diagram!' },
  { level:1, visual:'🌊', question:'Why does a metal spoon feel colder than a wooden spoon at the same room temperature?', options:['Metal conducts heat away from your hand faster than wood','Metal is always at a lower temperature than wood','Wood stores more heat than metal'], answer:'Metal conducts heat away from your hand faster than wood', fact:'🌊 Both spoons are at the same room temperature, but metal is a better conductor. It rapidly conducts heat away from your hand, making it feel cold. Wood is a good insulator and conducts heat slowly.' },
  { level:1, visual:'🔭', question:'What is a shadow?', options:['A dark region formed when an opaque object blocks light','A region of extra bright light','A reflection of an object on a surface'], answer:'A dark region formed when an opaque object blocks light', fact:'🔭 Shadows form because light travels in straight lines. The umbra is the darkest part (total shadow); the penumbra is partial shadow. During a solar eclipse, the Moon\'s shadow falls on Earth!' },
  { level:1, visual:'💡', question:'Which of these is a source of light?', options:['The Sun','The Moon','A mirror'], answer:'The Sun', fact:'💡 The Sun is a luminous source — it produces its own light via nuclear fusion. The Moon only reflects sunlight — it\'s not luminous. We see most objects by reflected light, not emitted light!' },
  { level:1, visual:'🌈', question:'What colour does a red apple appear in white light? Why?', options:['Red — it reflects red light and absorbs all other colours','Red — it emits red light','White — it reflects all light'], answer:'Red — it reflects red light and absorbs all other colours', fact:'🌈 Objects appear coloured because they reflect some wavelengths and absorb others. A red apple absorbs green and blue but reflects red. Under green light, the apple would appear black (no red to reflect)!' },
  { level:1, visual:'🌊', question:'What is wavelength?', options:['The distance between two consecutive crests (or troughs) of a wave','The height of a wave','The number of waves per second'], answer:'The distance between two consecutive crests (or troughs) of a wave', fact:'🌊 Wavelength is measured in metres (or nm for light). Visible light: ~400–700 nm. Radio waves: metres to kilometres! Wavelength determines many wave properties including colour (for light) and pitch (for sound).' },
  { level:1, visual:'🔊', question:'Why do we see lightning before we hear thunder?', options:['Light travels much faster than sound (300,000 km/s vs 340 m/s)','Lightning always happens before thunder','Sound takes longer to form than light'], answer:'Light travels much faster than sound (300,000 km/s vs 340 m/s)', fact:'🔊 Light reaches you almost instantly; sound at 340 m/s takes about 3 seconds per kilometre. Count the seconds between lightning and thunder, divide by 3 to find the storm\'s distance in km!' },
  { level:1, visual:'⚡', question:'What does a voltmeter measure?', options:['The voltage (potential difference) across a component, connected in parallel','The current through a component, connected in series','The resistance of a component'], answer:'The voltage (potential difference) across a component, connected in parallel', fact:'⚡ Voltmeters have very high resistance and are always connected across (in parallel with) a component. Ammeters have low resistance and go in series. Getting these backwards can damage the meters!' },
  { level:1, visual:'🔋', question:'What does an ammeter measure?', options:['Current through a component, connected in series in the circuit','Voltage across a component','Resistance of a component'], answer:'Current through a component, connected in series in the circuit', fact:'🔋 Current (in Amps) is measured by an ammeter placed in series so all the current flows through it. In a series circuit, the current is the same everywhere — ammeters confirm this!' },
  { level:1, visual:'💡', question:'What is the unit of electrical power?', options:['Watt (W)','Volt (V)','Ampere (A)'], answer:'Watt (W)', fact:'💡 Power = energy per second. A 60 W bulb uses 60 J per second. Named after James Watt. Your home electricity bill is measured in kilowatt-hours (kWh) — 1 kWh = 3,600,000 J!' },
  { level:1, visual:'🧲', question:'What is a permanent magnet?', options:['A material that retains its magnetism without needing an external magnetic field or current','A magnet that only works when current flows through it','A magnet that can only attract iron'], answer:'A material that retains its magnetism without needing an external magnetic field or current', fact:'🧲 Permanent magnets (like those on your fridge) are usually made of steel or special alloys. Their magnetic domains are permanently aligned. Hitting or heating them can cause the domains to randomise, destroying the magnetism!' },
  { level:1, visual:'🔥', question:'In which direction do convection currents flow?', options:['Hot fluid rises, cold fluid sinks, creating a circular current','Hot fluid sinks, cold fluid rises','Hot and cold fluids mix randomly'], answer:'Hot fluid rises, cold fluid sinks, creating a circular current', fact:'🔥 Hot fluid is less dense (particles spread out more) so it rises. As it cools, it becomes denser and sinks again. Convection currents in the mantle drive tectonic plate movement over millions of years!' },
  { level:1, visual:'🌍', question:'What colour is the best emitter and absorber of thermal radiation?', options:['Dull, black surfaces emit and absorb best; shiny, white surfaces are worst','Shiny surfaces emit and absorb best','Colour has no effect on radiation'], answer:'Dull, black surfaces emit and absorb best; shiny, white surfaces are worst', fact:'🌍 Black bodies absorb and emit all radiation. This is why solar panels are dark-coloured and why wearing white in summer keeps you cooler! Silver "space blankets" reflect radiation to keep injured people warm.' },
  { level:1, visual:'🏃', question:'What is the difference between a scalar and a vector quantity?', options:['Scalar: magnitude only (e.g., speed, mass); Vector: magnitude and direction (e.g., velocity, force)','Scalar: includes direction; Vector: does not','Scalar: measured in SI units; Vector: in other units'], answer:'Scalar: magnitude only (e.g., speed, mass); Vector: magnitude and direction (e.g., velocity, force)', fact:'🏃 Examples of scalars: speed, distance, mass, energy, time, temperature. Vectors: velocity, displacement, force, acceleration, momentum. Vectors can be added using diagrams or components!' },
  { level:1, visual:'💨', question:'What is pressure in a liquid like?', options:['It increases with depth and acts in all directions','It is the same at all depths','It only acts downward'], answer:'It increases with depth and acts in all directions', fact:'💨 Pressure in a fluid = ρgh (density × g × depth). Deeper water has more pressure because there is more water above pushing down. Submarines have thick hulls to withstand enormous pressures at depth!' },
