  { level:3, visual:'🌌', question:'What is the cosmological redshift and what does it tell us about the universe?', options:['Light from distant galaxies is shifted to longer (redder) wavelengths because space itself is expanding','Galaxies absorb blue light and emit red light due to their stellar populations','Hot intergalactic gas scatters blue light more than red'], answer:'Light from distant galaxies is shifted to longer (redder) wavelengths because space itself is expanding', fact:'🌌 Unlike the Doppler effect (motion through space), cosmological redshift occurs because the space between galaxies expands, stretching the wavelength of light. Redshift (z) = Δλ/λ. The most distant observed galaxy (z ≈ 13) emitted light only 300 million years after the Big Bang. The cosmic microwave background (CMB) has z ≈ 1100.' },
  { level:3, visual:'🧬', question:'What is population genetics and how do the forces of evolution change allele frequencies?', options:['Study of genetic variation in populations; evolution occurs via mutation, genetic drift, gene flow, and natural selection','Study of individual genomes; evolution occurs only through natural selection','Study of chromosome number changes; evolution occurs only through mutation'], answer:'Study of genetic variation in populations; evolution occurs via mutation, genetic drift, gene flow, and natural selection', fact:'🧬 The four main evolutionary forces: (1) Natural selection — differential reproductive success. (2) Genetic drift — random chance changes allele frequencies, strongest in small populations (bottleneck and founder effects). (3) Mutation — introduces new alleles. (4) Gene flow — migration introduces alleles from other populations. All four act simultaneously in real populations!' },
  { level:3, visual:'⚗️', question:'What is the Schrödinger equation used for in quantum mechanics?', options:['Describes the wavefunction of a quantum particle and how it evolves over time','Calculates the trajectory of particles using classical mechanics','Determines the energy levels of atomic nuclei from nuclear forces'], answer:'Describes the wavefunction of a quantum particle and how it evolves over time', fact:'⚛️ Erwin Schrödinger (1926): iħ∂Ψ/∂t = ĤΨ. The wavefunction Ψ encodes all information about a quantum system. |Ψ|² gives the probability density of finding the particle at a position. Solving the Schrödinger equation for hydrogen gives exact energy levels and orbital shapes — a triumph of quantum mechanics!' },
  { level:3, visual:'🌍', question:'What evidence supports the Big Bang theory?', options:['Cosmic microwave background radiation, Hubble\'s expanding universe, and the cosmic abundance of light elements','The existence of black holes and neutron stars','The perfectly circular orbits of planets around the Sun'], answer:'Cosmic microwave background radiation, Hubble\'s expanding universe, and the cosmic abundance of light elements', fact:'🌌 Three pillars of Big Bang evidence: (1) CMB — the afterglow of the Big Bang, first detected in 1965 by Penzias & Wilson. (2) Expansion — Hubble\'s Law shows galaxies recede proportionally to distance. (3) Big Bang nucleosynthesis — the universe is ~75% H, 25% He by mass, exactly as predicted for conditions in the first 3 minutes after the Big Bang.' },
  { level:3, visual:'🧬', question:'What is the function of telomeres and telomerase?', options:['Telomeres are protective caps on chromosome ends; telomerase rebuilds them, preventing shortening','Telomeres initiate DNA replication; telomerase seals nicks in the phosphodiester backbone','Telomeres mark genes for transcription; telomerase is a transcription factor'], answer:'Telomeres are protective caps on chromosome ends; telomerase rebuilds them, preventing shortening', fact:'🧬 Each cell division shortens telomeres slightly (the "end replication problem"). When telomeres become critically short, cells stop dividing (cellular senescence). Cancer cells reactivate telomerase — gaining immortality. Telomere length is linked to aging. Elizabeth Blackburn, Carol Greider, and Jack Szostak won the 2009 Nobel Prize for this discovery!' },
  { level:3, visual:'⚛️', question:'What is Rutherford\'s gold foil experiment and what did it reveal about atomic structure?', options:['Alpha particles aimed at gold foil showed most pass through but some scatter at large angles, revealing a tiny, dense, positively charged nucleus','X-rays passing through gold foil scattered evenly, revealing electrons in a uniform cloud','Beta particles scattered from gold foil, revealing the electron cloud surrounding an atom'], answer:'Alpha particles aimed at gold foil showed most pass through but some scatter at large angles, revealing a tiny, dense, positively charged nucleus', fact:'⚛️ In 1909, Geiger and Marsden (directed by Rutherford) fired alpha particles at thin gold foil. Most passed through (atom is mostly empty space) but ~1 in 20,000 bounced back. Rutherford said it was "as if you fired a 15-inch shell at tissue paper and it came back and hit you." This disproved Thomson\'s "plum pudding" model!' },
  { level:3, visual:'🌊', question:'What is the Pauli Exclusion Principle and what does it explain?', options:['No two identical fermions can occupy the same quantum state; explains why matter is solid and electron shells fill up','All bosons must occupy the same quantum state; explains superfluidity','Electrons orbit in fixed circular paths; explains atomic spectra'], answer:'No two identical fermions can occupy the same quantum state; explains why matter is solid and electron shells fill up', fact:'⚛️ Wolfgang Pauli (1925): applies to all fermions (half-integer spin particles: electrons, protons, neutrons). It explains the electron shell structure of atoms, the periodic table, why white dwarf stars resist collapse (electron degeneracy pressure), and ultimately why solid matter cannot pass through other solid matter!' },
  { level:3, visual:'🧪', question:'What is the difference between homolytic and heterolytic bond cleavage in organic chemistry?', options:['Homolytic: each atom gets one electron (produces radicals); Heterolytic: one atom gets both electrons (produces ions)','Homolytic: produces anions; Heterolytic: produces radicals','Homolytic occurs in ionic compounds; Heterolytic occurs in covalent compounds'], answer:'Homolytic: each atom gets one electron (produces radicals); Heterolytic: one atom gets both electrons (produces ions)', fact:'⚗️ In homolytic cleavage (radical reactions), bond electrons split evenly → free radicals. UV light initiates halogenation of alkanes this way. In heterolytic cleavage (ionic/polar reactions), one atom takes both electrons → carbocations or carbanions. SN2, SN1, E1, E2 reactions all involve heterolytic cleavage!' },
  { level:3, visual:'🌍', question:'What is the difference between the moment magnitude scale (Mw) and the original Richter scale (ML)?', options:['Mw is based on seismic moment (fault area × displacement × rigidity); ML is based on maximum wave amplitude on a seismogram','They measure identical quantities but use different units','ML measures shaking intensity; Mw measures the total energy of all aftershocks'], answer:'Mw is based on seismic moment (fault area × displacement × rigidity); ML is based on maximum wave amplitude on a seismogram', fact:'🌍 The Richter scale (1935) works well for local earthquakes but saturates above M7. Moment magnitude (1979) accurately measures very large earthquakes. The 2011 Tōhoku earthquake was Mw 9.1 — the largest in Japan\'s recorded history. Each whole number increase in Mw represents ~32 times more energy released!' },
  { level:3, visual:'🧬', question:'What is coevolution, and give a classic example?', options:['Two species evolve in response to each other; e.g., flowers and their pollinators or predators and prey','One species evolves to colonise a new habitat','Two isolated populations of the same species diverge into separate species'], answer:'Two species evolve in response to each other; e.g., flowers and their pollinators or predators and prey', fact:'🌿 Classic coevolution examples: (1) Darwin\'s orchid (Angraecum sesquipedale) with a 30-cm nectar spur — Darwin predicted a moth with a 30-cm proboscis existed; it was found in 1903! (2) Cheetahs and gazelles in an evolutionary "arms race." (3) Mycorrhizal fungi and plant roots — mutualistic coevolution for 400 million years.' },
  { level:3, visual:'🔭', question:'What is dark energy and how was it discovered?', options:['A mysterious energy causing the accelerating expansion of the universe; discovered via Type Ia supernova distance measurements in 1998','Anti-gravity generated by dark matter clusters in cosmic voids','Vacuum energy from the quantum fluctuations of the interstellar medium'], answer:'A mysterious energy causing the accelerating expansion of the universe; discovered via Type Ia supernova distance measurements in 1998', fact:'🌌 In 1998, two independent teams (Perlmutter; Schmidt and Riess) found that distant Type Ia supernovae were dimmer than expected — the universe\'s expansion is accelerating, not slowing down. This implied a repulsive "dark energy" comprising ~68% of the universe\'s total energy content. The 2011 Nobel Prize in Physics was awarded for this discovery!' },
  { level:3, visual:'⚗️', question:'What does the Heisenberg uncertainty principle state quantitatively?', options:['ΔxΔp ≥ ħ/2 — the product of uncertainties in position and momentum cannot be less than ħ/2','ΔEΔt ≥ h — energy and time can both be known precisely','Δx = 0 when Δp is large — knowing momentum exactly means position is undefined'], answer:'ΔxΔp ≥ ħ/2 — the product of uncertainties in position and momentum cannot be less than ħ/2', fact:'⚛️ ħ = h/2π ≈ 1.055 × 10⁻³⁴ J·s. For macroscopic objects this is negligible, but for electrons it is fundamental. The zero-point energy of a particle in a box is a direct consequence — particles always have some irreducible kinetic energy even at absolute zero. This is why electrons don\'t spiral into the nucleus!' },
  { level:3, visual:'🌿', question:'What is phylogenetics and what do molecular clock analyses provide?', options:['Phylogenetics reconstructs evolutionary relationships; molecular clocks use mutation rates to estimate when lineages diverged','Phylogenetics describes species distributions; molecular clocks measure adaptation rates','Phylogenetics classifies organisms by morphology only; molecular clocks measure generation times'], answer:'Phylogenetics reconstructs evolutionary relationships; molecular clocks use mutation rates to estimate when lineages diverged', fact:'🧬 Phylogenetic trees (cladograms) are built from DNA/protein sequence comparisons. Molecular clocks assume mutations accumulate at roughly constant rates — allowing divergence times to be estimated from sequence differences. This revealed that humans and chimpanzees diverged about 5–7 million years ago, and all eukaryotic life shares a common ancestor ~2 billion years ago.' },
  { level:3, visual:'🌊', question:'What is Faraday\'s law of electromagnetic induction?', options:['The induced EMF equals the negative rate of change of magnetic flux: EMF = -dΦ/dt','The force on a current-carrying conductor equals BIL','Moving charges create magnetic fields proportional to their velocity'], answer:'The induced EMF equals the negative rate of change of magnetic flux: EMF = -dΦ/dt', fact:'⚡ Faraday\'s law is why generators work — spinning a coil in a magnetic field changes the flux through it, inducing an EMF. The negative sign (Lenz\'s Law) means the induced current always opposes the change that caused it. This is the principle behind regenerative braking in electric vehicles — the motor acts as a generator, recapturing kinetic energy as electricity!' },
  { level:3, visual:'🌌', question:'What is the cosmic microwave background (CMB)?', options:['Thermal radiation filling the universe uniformly, the afterglow of the Big Bang released ~380,000 years after the Big Bang','Microwave radiation emitted by distant quasars and galaxies','Background electromagnetic noise from the first-generation stars (Population III)'], answer:'Thermal radiation filling the universe uniformly, the afterglow of the Big Bang released ~380,000 years after the Big Bang', fact:'🌌 The CMB was accidentally discovered by Penzias and Wilson in 1965 (Nobel Prize 1978). It has a blackbody spectrum corresponding to 2.725 K. Tiny temperature fluctuations (1 part in 100,000) in the CMB are the seeds of all large-scale structure in the universe — galaxies, clusters, and superclusters formed from these density variations.' },
  { level:3, visual:'🧪', question:'What is the mechanism of enzyme inhibition by competitive inhibitors?', options:['A competitive inhibitor has a shape similar to the substrate and blocks the active site, reducing reaction rate — increasing substrate concentration overcomes inhibition','A competitive inhibitor permanently modifies the enzyme active site, irreversibly stopping activity','A competitive inhibitor binds an allosteric site, changing the active site shape'], answer:'A competitive inhibitor has a shape similar to the substrate and blocks the active site, reducing reaction rate — increasing substrate concentration overcomes inhibition', fact:'🔬 Many drugs are competitive enzyme inhibitors: statins (cholesterol-lowering drugs) competitively inhibit HMG-CoA reductase; methotrexate inhibits dihydrofolate reductase (cancer treatment). Non-competitive inhibitors bind elsewhere and permanently reduce Vmax regardless of substrate concentration. Irreversible inhibitors form covalent bonds — like aspirin inactivating COX enzymes!' },
  { level:3, visual:'🌍', question:'What is the significance of the Cambrian Explosion (~541 million years ago)?', options:['A rapid diversification of animal body plans, producing most major animal phyla in a geologically short period (~20 million years)','The first appearance of photosynthetic life on Earth','The mass extinction that cleared the path for dinosaur evolution'], answer:'A rapid diversification of animal body plans, producing most major animal phyla in a geologically short period (~20 million years)', fact:'🌍 Before the Cambrian, most life was microbial or soft-bodied (Ediacaran fauna). In the Cambrian, hard shells and skeletons appeared, and most major animal body plans emerged. Proposed causes include increased oxygen levels, ecological "arms races" once predation began, and environmental changes. The Burgess Shale (Canada) preserves exquisite Cambrian animal fossils!' },
  { level:3, visual:'⚛️', question:'What is Compton scattering?', options:['X-ray photons scatter off electrons with reduced energy (increased wavelength), confirming photons have momentum','Visible light scatters off atmospheric molecules, creating the blue sky','Electrons scatter off atomic nuclei, confirming nuclear size'], answer:'X-ray photons scatter off electrons with reduced energy (increased wavelength), confirming photons have momentum', fact:'⚛️ Arthur Compton (1923) fired X-rays at electrons and found the scattered photons had longer wavelengths (lower energy) than expected. Using E = hf and p = h/λ for photons, he could calculate the energy transferred to the recoiling electron exactly — confirming photons carry momentum (p = h/λ). This Nobel Prize-winning experiment clinched the particle nature of light.' },
  { level:3, visual:'🌊', question:'What is the principle of superposition in wave physics?', options:['When two or more waves meet, the resultant displacement at any point is the sum of the individual displacements','The wave with the largest amplitude always dominates the others','Two waves cannot occupy the same point in space simultaneously'], answer:'When two or more waves meet, the resultant displacement at any point is the sum of the individual displacements', fact:'🌊 Superposition explains both constructive interference (waves add — producing double amplitude in phase) and destructive interference (waves cancel — producing zero amplitude out of phase). Noise-cancelling headphones create sound waves that destructively interfere with ambient noise. Double-slit experiments use superposition to create interference patterns, revealing the wave nature of light and matter.' },
  { level:3, visual:'🧬', question:'What is the significance of cytochrome c in evolutionary biology and biochemistry?', options:['It is a conserved electron-carrier protein whose sequence differences between species can be used to map evolutionary relationships','It is the main enzyme responsible for DNA repair in all eukaryotes','It is a regulatory protein that controls cell cycle progression'], answer:'It is a conserved electron-carrier protein whose sequence differences between species can be used to map evolutionary relationships', fact:'🧬 Cytochrome c is a small electron carrier in the mitochondrial electron transport chain. Its sequence is highly conserved because mutations are mostly lethal. Humans and chimpanzees differ in 0 residues; humans and horses differ in 12; humans and yeast differ in 38 — perfectly correlated with evolutionary distance. Linus Pauling and Emile Zuckerkandl pioneered molecular evolutionary analysis using cytochrome c in 1965!' },
  { level:3, visual:'📐', question:'What does Bayes\' theorem state?', options:['P(A|B) = P(B|A)P(A)/P(B); the probability of A given B depends on the likelihood of B given A and the prior probability of A','P(A∩B) = P(A) + P(B) for all events A and B','P(A|B) = P(A) only when A and B are independent'], answer:'P(A|B) = P(B|A)P(A)/P(B); the probability of A given B depends on the likelihood of B given A and the prior probability of A', fact:'📐 Bayes\' theorem is foundational in statistics, machine learning, and scientific inference. Medical tests: if a disease has 1% prevalence and a test is 99% accurate, a positive result is still only ~50% likely to be true (base rate neglect). Bayesian reasoning is used in spam filters, medical diagnosis, navigation systems, and gravitational wave detection.' },
  { level:3, visual:'🌍', question:'What is the difference between convergent, divergent, and transform plate boundaries and the geological features they form?', options:['Convergent: collision → mountains/trenches; Divergent: separation → rift valleys/mid-ocean ridges; Transform: sideways sliding → strike-slip faults','Convergent: rifting; Divergent: subduction; Transform: mountain building','Convergent: volcanism only; Divergent: earthquakes only; Transform: tsunamis only'], answer:'Convergent: collision → mountains/trenches; Divergent: separation → rift valleys/mid-ocean ridges; Transform: sideways sliding → strike-slip faults', fact:'🌍 Himalayas: India-Eurasia convergent (continental-continental). Marianas Trench: Pacific-Philippine convergent (ocean-ocean, subduction). Mid-Atlantic Ridge: divergent. San Andreas Fault (CA): transform, slipping ~5 cm/year — Los Angeles will be north of San Francisco in ~10 million years. The 1906 San Francisco earthquake (M7.9) resulted from 6 meters of sudden slip along the San Andreas!' },
  { level:3, visual:'🧪', question:'What is the van\'t Hoff factor (i) in colligative properties?', options:['The number of solute particles produced per formula unit dissolved; i>1 for electrolytes, i=1 for non-electrolytes','The ratio of solute moles to total solution moles','The activity coefficient correcting for non-ideal solution behaviour'], answer:'The number of solute particles produced per formula unit dissolved; i>1 for electrolytes, i=1 for non-electrolytes', fact:'⚗️ NaCl: i = 2 (Na⁺ + Cl⁻). CaCl₂: i = 3 (Ca²⁺ + 2Cl⁻). Glucose: i = 1 (non-electrolyte, does not dissociate). Colligative property equations (ΔTb, ΔTf, osmotic pressure Π = iMRT) must include i for accurate calculations. Actual i values are slightly less than theoretical due to ion pairing in concentrated solutions.' },
  { level:3, visual:'🌌', question:'How are exoplanets detected using the radial velocity (Doppler wobble) method?', options:['A planet\'s gravity causes its star to wobble; the Doppler shift of the star\'s spectral lines reveals the wobble speed, allowing planet mass estimation','The planet directly emits radiation that modulates the star\'s brightness','A planet occults the star, causing a precise periodical brightness drop'], answer:'A planet\'s gravity causes its star to wobble; the Doppler shift of the star\'s spectral lines reveals the wobble speed, allowing planet mass estimation', fact:'🔭 The star and planet orbit their common centre of mass. A massive Jupiter-like planet causes a wobble of ~10–50 m/s in its star — detectable via Doppler shifts in spectral lines. The first confirmed exoplanet around a main-sequence star (51 Pegasi b) was discovered this way in 1995 by Mayor and Queloz, earning the 2019 Nobel Prize in Physics!' },

  // ── HARD (level 3) batch 3 ────────────────────────────────────────────────────
  { level:3, visual:'⚛️', question:'What is the concept of wave-particle duality?', options:['All matter and radiation exhibit both wave-like and particle-like properties depending on the experimental context','Only light has wave properties; all other particles are purely particles','Only large objects behave like waves; quantum particles behave purely as particles'], answer:'All matter and radiation exhibit both wave-like and particle-like properties depending on the experimental context', fact:'⚛️ Young\'s double-slit experiment: electrons fired one at a time still produce an interference pattern (wave behaviour). But electrons interact with detectors as discrete particles. de Broglie (1924): λ = h/p for all matter. The wave-particle duality is a fundamental feature of quantum reality — it resolves the apparent contradiction between particle and wave experiments.' },
  { level:3, visual:'🧬', question:'What is the mechanism of CRISPR-Cas9 gene editing at the molecular level?', options:['Guide RNA (gRNA) directs Cas9 nuclease to a complementary DNA sequence; Cas9 creates a double-strand break; cellular repair machinery introduces the desired change','Cas9 is a reverse transcriptase that inserts new DNA sequences randomly into the genome','CRISPR works by methylating specific DNA sequences to silence gene expression permanently'], answer:'Guide RNA (gRNA) directs Cas9 nuclease to a complementary DNA sequence; Cas9 creates a double-strand break; cellular repair machinery introduces the desired change', fact:'✂️ CRISPR-Cas9 was adapted from a bacterial immune system (bacteria store viral DNA sequences as "memory"). The double-strand break is repaired by either NHEJ (non-homologous end joining — introduces mutations) or HDR (homology-directed repair — inserts precise new sequence if a template is provided). First therapeutic CRISPR treatment for sickle cell disease was approved in 2023!' },
  { level:3, visual:'🌊', question:'What is the Bernoulli effect in fluid dynamics and how does it explain lift on aircraft wings?', options:['Faster-moving fluid has lower pressure; the curved upper wing surface causes air to move faster above, creating lower pressure and net upward lift','Air pushes down on the flat lower wing surface, creating lift by Newton\'s Third Law only','Wings work by creating turbulence above that sucks the aircraft upward'], answer:'Faster-moving fluid has lower pressure; the curved upper wing surface causes air to move faster above, creating lower pressure and net upward lift', fact:'✈️ Bernoulli\'s principle (1738) combined with the Kutta-Joukowski theorem fully explains lift. Modern jet wings use airfoil shapes (cambered cross-sections) and angle of attack. At takeoff, a Boeing 747 needs about 2.8 million N of lift to get airborne. Stall occurs when the angle of attack is too high, causing turbulent flow separation and sudden lift loss.' },
  { level:3, visual:'🌍', question:'What is the concept of cladistics (cladistic analysis)?', options:['A method of classifying organisms based on shared derived characteristics (synapomorphies) to reconstruct evolutionary relationships','Classification of organisms by overall similarity (phenetics) regardless of evolutionary history','Classification strictly by morphological (physical) appearance and anatomy'], answer:'A method of classifying organisms based on shared derived characteristics (synapomorphies) to reconstruct evolutionary relationships', fact:'🌿 Cladistics groups organisms into clades — groups that include an ancestor and all its descendants. A clade is monophyletic. Traditional "Reptilia" was paraphyletic (excluded birds, which are dinosaur descendants) — modern systematics places birds within Reptilia or reclassifies the group entirely. Molecular phylogenetics has revolutionised the tree of life, moving many organisms to unexpected positions.' },
  { level:3, visual:'⚗️', question:'What is the concept of formal charge and how is it calculated?', options:['Formal charge = (valence electrons) − (lone pair electrons) − ½(bonding electrons); used to determine the best Lewis structure','Formal charge is the charge on an ion after complete electron transfer','Formal charge equals oxidation state in all covalent compounds'], answer:'Formal charge = (valence electrons) − (lone pair electrons) − ½(bonding electrons); used to determine the best Lewis structure', fact:'⚗️ The best Lewis structure minimises formal charges and places negative charges on more electronegative atoms. For CO₂: carbon formal charge = 4 − 0 − ½(8) = 0. For ozone (O₃), resonance structures are needed because no single Lewis structure with zero formal charges on all atoms is possible. Formal charge helps predict which resonance structure dominates.' },
  { level:3, visual:'🌌', question:'What is Hubble\'s law and what is the Hubble constant?', options:['v = H₀d; recession velocity of galaxies is proportional to distance; H₀ ≈ 70 km/s/Mpc (current value ~67–73 km/s/Mpc)','H₀ is the age of the universe in years divided by a constant','Hubble\'s Law relates star brightness to its distance only for nearby galaxies'], answer:'v = H₀d; recession velocity of galaxies is proportional to distance; H₀ ≈ 70 km/s/Mpc (current value ~67–73 km/s/Mpc)', fact:'🌌 Edwin Hubble (1929) measured galaxy velocities via spectral redshift and distances via Cepheid variable stars. H₀ ≈ 70 km/s/Mpc means a galaxy 1 Megaparsec away recedes at ~70 km/s; at 2 Mpc, ~140 km/s. The age of the universe ≈ 1/H₀ ≈ 13.8 billion years. The "Hubble tension" — two different methods give slightly different H₀ values — is a current mystery in cosmology!' },
  { level:3, visual:'🧬', question:'What are the key differences between aerobic and anaerobic respiration?', options:['Aerobic uses O₂, produces up to 38 ATP from glucose via ETC; Anaerobic lacks O₂, produces only 2 ATP via glycolysis + fermentation','Aerobic is more primitive and found in bacteria; Anaerobic evolved later in complex organisms','Aerobic only occurs in animals; Anaerobic only occurs in plants and fungi'], answer:'Aerobic uses O₂, produces up to 38 ATP from glucose via ETC; Anaerobic lacks O₂, produces only 2 ATP via glycolysis + fermentation', fact:'⚡ Anaerobic fermentation: in animals, pyruvate → lactate (lactic acid fermentation — burning muscles during intense exercise). In yeast: pyruvate → ethanol + CO₂ (alcoholic fermentation — used in bread, beer, wine). The 36-38 ATP yield from aerobic respiration vs. 2 ATP from anaerobic explains why aerobic organisms can sustain more activity!' },
  { level:3, visual:'🌊', question:'What is the concept of entropy in terms of microstates (statistical mechanics)?', options:['S = k ln W, where W is the number of possible microstates; more microstates = higher entropy = more disorder','Entropy is purely a measure of heat divided by temperature','Entropy decreases in all biological systems because life creates order'], answer:'S = k ln W, where W is the number of possible microstates; more microstates = higher entropy = more disorder', fact:'♨️ Ludwig Boltzmann (1877) connected thermodynamic entropy to probability: more ways to arrange a system = higher entropy. A broken glass has more microstates than an intact one — it is overwhelmingly more probable. Life creates local order by increasing entropy elsewhere (metabolising food, releasing heat). Boltzmann\'s equation S = k ln W is carved on his gravestone in Vienna!' },
  { level:3, visual:'🧪', question:'What is the concept of electrochemical series and how does it predict spontaneous redox reactions?', options:['Species with higher reduction potential (E°) will spontaneously oxidise species with lower E°; spontaneous when E°cell = E°cathode − E°anode > 0','Reactions are spontaneous when temperature is above 25°C','Reactions are spontaneous when both half-reactions have negative standard potentials'], answer:'Species with higher reduction potential (E°) will spontaneously oxidise species with lower E°; spontaneous when E°cell = E°cathode − E°anode > 0', fact:'⚗️ Cu²⁺ (E° = +0.34V) + Zn (E° = −0.76V): E°cell = 0.34 − (−0.76) = +1.10 V > 0 → spontaneous (Daniell cell). The relation ΔG° = −nFE°cell connects electrochemistry to thermodynamics. Positive E°cell means negative ΔG° means spontaneous. This is why iron rusts in the presence of water (Fe and O₂ react spontaneously) but gold does not.' },
  { level:3, visual:'🌍', question:'What is the concept of allometric scaling in biology?', options:['The relationship between an organism\'s body size and its metabolic rate/organ proportions follows power law scaling (e.g., metabolic rate ∝ M^(3/4))','All organisms maintain exactly the same metabolic rate per unit mass regardless of size','Larger organisms always have proportionally larger organs than smaller ones'], answer:'The relationship between an organism\'s body size and its metabolic rate/organ proportions follows power law scaling (e.g., metabolic rate ∝ M^(3/4))', fact:'🌿 Kleiber\'s Law (1932): metabolic rate ∝ M^0.75 (M = body mass). An elephant weighs 10,000× more than a cat but has only ~1,000× the metabolic rate. A shrew\'s heart beats ~1,000 times/min; an elephant\'s ~30 times/min. Larger animals live longer per heartbeat. The ¾ scaling exponent emerges from fractal geometry of circulatory networks (West-Brown-Enquist model).' },
  { level:3, visual:'🔭', question:'What is the structure and composition of a comet?', options:['A nucleus of ice, dust, and rock; develops a coma and two tails (ion tail and dust tail) when near the Sun','A purely rocky body with no volatile materials; tails form from material blasted off by solar wind','A diffuse cloud of gas and dust with no solid nucleus'], answer:'A nucleus of ice, dust, and rock; develops a coma and two tails (ion tail and dust tail) when near the Sun', fact:'☄️ The nucleus (typically 1–50 km) is a "dirty snowball" of water ice, CO₂, methane, and silicate dust. Solar heating sublimes the ice, forming a coma (atmosphere). The ion tail (plasma) always points directly away from the Sun; the dust tail curves along the orbit. Halley\'s Comet returns every ~75 years. Short-period comets come from the Kuiper Belt; long-period comets from the Oort Cloud.' },
  { level:3, visual:'⚛️', question:'What are bosons and fermions, and how do they differ in quantum statistics?', options:['Fermions (half-integer spin) obey Pauli exclusion; bosons (integer spin) can share quantum states (Bose-Einstein statistics)','Bosons carry forces; fermions are all heavier than bosons','Fermions are found in atomic nuclei; bosons are found in electron shells'], answer:'Fermions (half-integer spin) obey Pauli exclusion; bosons (integer spin) can share quantum states (Bose-Einstein statistics)', fact:'⚛️ Fermions: electrons, protons, neutrons, quarks (spin ½). Bosons: photons (spin 1), Higgs boson (spin 0), W and Z bosons (spin 1), gluons (spin 1). Bose-Einstein condensation: at near absolute zero, bosons all occupy the same ground state, forming a superfluid/supersolid. This phenomenon was first created in lab in 1995 (Nobel Prize 2001). The Higgs boson (discovered 2012) gives other particles mass.' },
  { level:3, visual:'🌍', question:'What is the difference between habitat fragmentation and habitat destruction in conservation biology?', options:['Destruction completely removes habitat; fragmentation divides continuous habitat into smaller isolated patches, creating edge effects and preventing gene flow','They are synonymous — both result in complete loss of habitat','Fragmentation is always reversible; destruction is always permanent'], answer:'Destruction completely removes habitat; fragmentation divides continuous habitat into smaller isolated patches, creating edge effects and preventing gene flow', fact:'🌿 Fragmentation is often more insidious than total destruction. Edge effects (different microclimates and species at patch borders), inability of non-dispersing species to move between patches, and inbreeding depression in isolated populations are major threats. Wildlife corridors (strips of habitat connecting patches) are a key conservation strategy. The Brazilian Atlantic Forest is one of the world\'s most fragmented biomes.' },
  { level:3, visual:'🧬', question:'What is the significance of the lac operon as a model of prokaryotic gene regulation?', options:['It demonstrates negative gene regulation: a repressor protein normally blocks transcription; an inducer molecule prevents repressor binding, allowing transcription when lactose is available','It demonstrates positive regulation only: an activator is always required for transcription','It is an example of eukaryotic gene regulation involving histones and chromatin remodelling'], answer:'It demonstrates negative gene regulation: a repressor protein normally blocks transcription; an inducer molecule prevents repressor binding, allowing transcription when lactose is available', fact:'🧬 The lac operon also shows catabolite repression (positive regulation): when glucose is present, cAMP levels are low and the catabolite activator protein (CAP) cannot bind to activate transcription. Only when glucose is absent AND lactose is present are the lac genes fully expressed. This "double check" ensures cells preferentially use glucose — the more efficient energy source.' },
  { level:3, visual:'⚗️', question:'What is the quantum mechanical explanation for the periodic table\'s structure?', options:['Electron configurations filling quantum shells (n), subshells (l: s,p,d,f), and orbitals (mₗ) according to Aufbau principle, Pauli exclusion, and Hund\'s rule explain group and period patterns','Atomic mass alone determines the periodic arrangement of elements','Periods correspond to electron pairs; groups correspond to number of neutrons'], answer:'Electron configurations filling quantum shells (n), subshells (l: s,p,d,f), and orbitals (mₗ) according to Aufbau principle, Pauli exclusion, and Hund\'s rule explain group and period patterns', fact:'⚛️ Aufbau: fill lowest energy orbitals first. Pauli exclusion: max 2 electrons per orbital. Hund\'s rule: half-fill degenerate orbitals before pairing. Period 1: 1s block (2 elements). Periods 2-3: s + p blocks (8 each). Periods 4-5: s + d + p (18 each). The s, p, d, f block structure directly reflects the quantum numbers n and l — the periodic table is a map of quantum mechanics!' },
  { level:3, visual:'🌊', question:'What is Fick\'s law of diffusion?', options:['The rate of diffusion is proportional to the concentration gradient and surface area, and inversely proportional to the diffusion distance: J = -D(ΔC/Δx)','Diffusion rate depends only on molecular mass, not concentration','Molecules always diffuse from low to high concentration'], answer:'The rate of diffusion is proportional to the concentration gradient and surface area, and inversely proportional to the diffusion distance: J = -D(ΔC/Δx)', fact:'🔬 Fick\'s Law explains why gas exchange surfaces (alveoli, fish gills, root hairs) have enormous surface area, very thin membranes, and maintain steep concentration gradients (via blood flow/ventilation). The alveoli have a total surface area of ~70 m² — bigger than a tennis court — in a 6 L volume. This maximises O₂/CO₂ diffusion rate.' },
  { level:3, visual:'🌌', question:'What is the theory of General Relativity and how does it differ from Special Relativity?', options:['GR extends SR to accelerating reference frames and describes gravity as curvature of spacetime by mass-energy; SR only covers inertial (non-accelerating) frames','GR applies to large scales; SR applies to small quantum scales','GR describes gravity as a force; SR describes gravity as curvature'], answer:'GR extends SR to accelerating reference frames and describes gravity as curvature of spacetime by mass-energy; SR only covers inertial (non-accelerating) frames', fact:'🌌 Einstein (1915): mass-energy curves spacetime; objects follow geodesics (straight lines in curved spacetime) — what we call gravity. GR predicted: light bending near massive objects (confirmed by Eddington 1919), gravitational redshift, black holes, gravitational waves, and the expanding universe. GPS systems require corrections for both SR (velocity time dilation) and GR (gravitational time dilation)!' },
  { level:3, visual:'🧪', question:'What are resonance structures in organic chemistry and why is benzene (C₆H₆) a classic example?', options:['Resonance structures are multiple valid Lewis structures for the same molecule; benzene\'s actual structure is a hybrid with equal bond lengths, not alternating single/double bonds','Resonance structures represent different molecules that interconvert rapidly','Benzene has three alternating double bonds fixed in one configuration'], answer:'Resonance structures are multiple valid Lewis structures for the same molecule; benzene\'s actual structure is a hybrid with equal bond lengths, not alternating single/double bonds', fact:'⚗️ Benzene has 6 pi electrons delocalised over the ring (aromatic system) — all C-C bonds are equal (1.40 Å, between single 1.54 Å and double 1.34 Å). Resonance energy of ~150 kJ/mol makes benzene extra stable. Aromaticity (Hückel\'s rule: 4n+2 pi electrons in a cyclic, planar, conjugated system) is a key concept in organic chemistry.' },
  { level:3, visual:'🌍', question:'What is the Wilson cycle in plate tectonics?', options:['The complete cycle of ocean basin formation (rifting) → growth → subduction → closure, over ~500 million years','The cycle of rocks through the rock cycle over geological time','The Milankovitch cycle driving ice ages and interglacials'], answer:'The complete cycle of ocean basin formation (rifting) → growth → subduction → closure, over ~500 million years', fact:'🌍 The Atlantic Ocean is currently in the "mature" widening phase. The Mediterranean is a remnant of the ancient Tethys Ocean (now closing). The Wilson cycle (named for J. Tuzo Wilson) explains why the Atlantic has passive margins (no subduction) while the Pacific has active margins (ring of fire). Pangaea itself formed from a previous Wilson cycle closing the Iapetus Ocean.' },
  { level:3, visual:'⚛️', question:'What is the strong nuclear force and what particles mediate it?', options:['The force that binds quarks into protons/neutrons and holds the nucleus together against electrostatic repulsion; mediated by gluons (and residual force by pions)','The force responsible for radioactive beta decay; mediated by W and Z bosons','The electromagnetic force that binds electrons to nuclei; mediated by virtual photons'], answer:'The force that binds quarks into protons/neutrons and holds the nucleus together against electrostatic repulsion; mediated by gluons (and residual force by pions)', fact:'⚛️ The strong force is the strongest fundamental force — about 100× stronger than electromagnetism — but operates only at nuclear scales (<10⁻¹⁵ m). Quarks are held together by gluons (which themselves carry colour charge). The residual strong force (pion exchange) binds protons and neutrons in the nucleus. Quantum chromodynamics (QCD) is the theory describing the strong force.' },
  { level:3, visual:'🌿', question:'What is the concept of ecological succession and distinguish between primary and secondary succession?', options:['Primary: begins on bare substrate with no soil (e.g., lava, glacial retreat); Secondary: occurs in disturbed areas retaining soil (e.g., after fire or logging)','Primary: occurs in water; Secondary: occurs on land','Primary: is faster because pioneer species are already present; Secondary: takes longer because soil must form first'], answer:'Primary: begins on bare substrate with no soil (e.g., lava, glacial retreat); Secondary: occurs in disturbed areas retaining soil (e.g., after fire or logging)', fact:'🌱 Primary succession: bare rock → pioneer lichens/mosses → soil formation → grasses → shrubs → forest climax. Can take thousands of years. Secondary succession: after a forest fire, existing soil and seed bank allow faster recovery — pioneer plants (fireweed) → shrubs → young forest → mature forest, taking decades to centuries. Krakatoa\'s barren volcanic ash was recolonised entirely by primary succession after the 1883 eruption.' },
  { level:3, visual:'🔬', question:'What is the significance of the Krebs cycle (citric acid cycle) in cellular metabolism?', options:['It oxidises acetyl-CoA, generating CO₂ and high-energy electron carriers (NADH, FADH₂) that feed the electron transport chain for ATP synthesis','It is the main site of glucose breakdown, producing 36 ATP per cycle','It occurs in the cytoplasm and is independent of oxygen availability'], answer:'It oxidises acetyl-CoA, generating CO₂ and high-energy electron carriers (NADH, FADH₂) that feed the electron transport chain for ATP synthesis', fact:'🔬 Each turn of the Krebs cycle (named for Hans Krebs, Nobel Prize 1953) produces: 3 NADH, 1 FADH₂, 1 GTP/ATP, and 2 CO₂. Glucose produces 2 acetyl-CoA → 2 turns per glucose. The cycle also provides carbon skeletons for amino acid and fatty acid biosynthesis — it is both a catabolic and anabolic hub. Occurs in the mitochondrial matrix.' },
  { level:3, visual:'🌊', question:'What is the concept of nuclear magnetic resonance (NMR) and its medical application as MRI?', options:['NMR: nuclei with spin absorb radio waves at characteristic frequencies in a magnetic field, revealing molecular structure; MRI uses this to image hydrogen nuclei in body water','NMR: measures electron density around atoms to determine compound purity','MRI: uses X-ray absorption by tissue to create cross-sectional images'], answer:'NMR: nuclei with spin absorb radio waves at characteristic frequencies in a magnetic field, revealing molecular structure; MRI uses this to image hydrogen nuclei in body water', fact:'🔬 In a strong magnetic field, hydrogen nuclei (protons) align. Radio pulses flip them; their relaxation back releases characteristic RF signals. Different tissues have different water content and relaxation times → contrast in images. MRI avoids harmful ionising radiation (unlike X-rays/CT scans) and provides superior soft tissue contrast. Paul Lauterbur and Peter Mansfield won the 2003 Nobel Prize in Medicine for MRI development.' },
  { level:3, visual:'🧬', question:'What is genomic imprinting?', options:['A form of epigenetic regulation where the expression of certain genes depends on which parent they were inherited from','Random inactivation of one X chromosome in female mammals to equalise gene dosage','Silencing of repeated DNA sequences to prevent mobile elements from jumping'], answer:'A form of epigenetic regulation where the expression of certain genes depends on which parent they were inherited from', fact:'🧬 About 100 human genes are imprinted. Prader-Willi syndrome (maternal copy expressed, paternal deleted/silenced) and Angelman syndrome (paternal expressed, maternal deleted/silenced) are caused by mutations affecting the same chromosomal region — same genetics, different disease depending on parent of origin. Imprinting is established by DNA methylation and histone modification in the gametes.' },
  { level:3, visual:'📐', question:'What is the divergence theorem (Gauss\'s theorem) in vector calculus?', options:['The flux of a vector field through a closed surface equals the volume integral of the divergence of the field inside','The line integral of a vector field around a closed loop equals the surface integral of its curl','The gradient of a scalar field gives the direction of steepest ascent'], answer:'The flux of a vector field through a closed surface equals the volume integral of the divergence of the field inside', fact:'📐 ∮∮F·dA = ∭(∇·F)dV. Gauss\'s Law in electromagnetism (one of Maxwell\'s equations) is an application: the electric flux through a closed surface equals the enclosed charge divided by ε₀. This allows calculation of electric fields for symmetric charge distributions (spheres, cylinders, planes) without integrating over each charge individually.' },
  { level:3, visual:'🌍', question:'What is the significance of the oxygen isotope record in deep-sea sediment cores?', options:['δ¹⁸O ratios in foraminifera shells record past ocean temperature and ice volume, providing a 65-million-year climate history','Oxygen isotope ratios measure ocean salinity directly over time','The ¹⁶O/¹⁸O ratio measures past atmospheric CO₂ concentrations'], answer:'δ¹⁸O ratios in foraminifera shells record past ocean temperature and ice volume, providing a 65-million-year climate history', fact:'🌍 ¹⁶O evaporates preferentially from the ocean. During glacials, ¹⁶O is locked in ice caps, enriching the ocean in ¹⁸O → higher δ¹⁸O in foraminifera shells. Willi Dansgaard and Nicholas Shackleton pioneered this paleoclimate proxy. Combined with ice cores, these records show Milankovitch cycle pacing of glacials and provide key evidence for human-induced warming against the natural background.' },
  { level:3, visual:'⚗️', question:'What are the differences between E1, E2, SN1, and SN2 reactions in organic chemistry?', options:['E1: elimination, unimolecular (forms alkene via carbocation); E2: elimination, bimolecular (concerted); SN1: substitution, unimolecular (via carbocation); SN2: substitution, bimolecular (backside attack, Walden inversion)','E reactions form ketones; SN reactions form alcohols','E1 and SN1 require strong nucleophiles; E2 and SN2 proceed without catalysts'], answer:'E1: elimination, unimolecular (forms alkene via carbocation); E2: elimination, bimolecular (concerted); SN1: substitution, unimolecular (via carbocation); SN2: substitution, bimolecular (backside attack, Walden inversion)', fact:'⚗️ Competition: primary substrates → SN2 dominates. Tertiary substrates → SN1/E1 dominate (carbocation stable). Strong bulky bases favour E2 regardless of substrate. Solvent polarity also matters — polar protic solvents stabilise carbocations, favouring SN1/E1. Temperature favours elimination (entropy increases). Understanding these competing pathways is essential for designing organic synthesis routes.' },
  { level:3, visual:'🌌', question:'What is inflation theory in cosmology?', options:['A period of exponentially accelerating expansion in the first ~10⁻³⁶ to 10⁻³² seconds after the Big Bang that explains the CMB uniformity and flatness of the universe','The current accelerating expansion driven by dark energy','The initial explosion of the Big Bang itself'], answer:'A period of exponentially accelerating expansion in the first ~10⁻³⁶ to 10⁻³² seconds after the Big Bang that explains the CMB uniformity and flatness of the universe', fact:'🌌 Alan Guth proposed cosmic inflation in 1980. Without inflation: why is the CMB so uniform (the horizon problem)? Why is the universe so geometrically flat (the flatness problem)? Inflation grew a quantum-scale region to macroscopic size, erasing pre-existing irregularities. Quantum fluctuations during inflation became the density variations that seeded galaxy formation. Inflation predicts a specific pattern of gravitational waves in the CMB — not yet confirmed.' },
  { level:3, visual:'🧬', question:'What is the difference between the two main types of stem cells: totipotent, pluripotent, multipotent?', options:['Totipotent (can become any cell + placenta); Pluripotent (any cell type of organism, not placenta); Multipotent (limited to specific lineage)','Totipotent: can only divide a fixed number of times; Pluripotent: can divide indefinitely; Multipotent: can become any cell type','Totipotent cells come from adults; pluripotent from embryos; multipotent from tumours'], answer:'Totipotent (can become any cell + placenta); Pluripotent (any cell type of organism, not placenta); Multipotent (limited to specific lineage)', fact:'🔬 The fertilised egg is totipotent (days 1–4). Inner cell mass cells are pluripotent — source of embryonic stem cells. Bone marrow haematopoietic stem cells are multipotent (can become any blood cell type). Yamanaka (Nobel Prize 2012) showed that adding just 4 transcription factors (Oct4, Sox2, Klf4, c-Myc) reprograms adult cells back to induced pluripotent stem cells (iPSCs) — a breakthrough for regenerative medicine!' },
  { level:3, visual:'📐', question:'What does the root-mean-square (RMS) speed equation for ideal gas molecules tell us?', options:['v_rms = √(3RT/M) relates molecular speed to temperature and molar mass; heavier molecules move slower at the same temperature','All gas molecules move at the same speed at a given temperature','Molecular speed is independent of temperature at constant pressure'], answer:'v_rms = √(3RT/M) relates molecular speed to temperature and molar mass; heavier molecules move slower at the same temperature', fact:'⚗️ At 25°C: H₂ (M = 2 g/mol) has v_rms ≈ 1,930 m/s; O₂ (M = 32 g/mol) ≈ 484 m/s. This is the Maxwell-Boltzmann distribution. Graham\'s Law of effusion: rate ∝ 1/√M — lighter gases effuse faster. This principle is used for isotope separation (U-235 vs U-238 hexafluoride diffusion) in nuclear fuel processing.' },
  { level:3, visual:'🌊', question:'What is the Doppler effect applied to light and how does it reveal information about stars and galaxies?', options:['Light from objects moving toward us is blueshifted (shorter wavelength); moving away is redshifted (longer wavelength); used to measure radial velocity of stars and the universe\'s expansion','Light from hot stars is blueshifted by thermal emission; cool stars emit redshifted light','The Doppler effect only applies to sound; light is always measured at c regardless of source motion'], answer:'Light from objects moving toward us is blueshifted (shorter wavelength); moving away is redshifted (longer wavelength); used to measure radial velocity of stars and the universe\'s expansion', fact:'🌌 Spectral lines have precisely known rest wavelengths. If a star\'s Hα line (normally 656.3 nm) appears at 660 nm, it is moving away at v = (Δλ/λ)c ≈ 1,700 km/s. This technique discovered binary star systems, exoplanets (radial velocity method), and that all distant galaxies are receding — Hubble\'s expansion of the universe. It also measures stellar rotation and pulsation.' },
  { level:3, visual:'🌿', question:'What is the concept of trophic cascades and give an example?', options:['Changes at one trophic level cause cascading effects through multiple levels; e.g., wolf reintroduction to Yellowstone changed vegetation by suppressing elk overgrazing','Any increase in a predator population automatically decreases prey population only','Trophic cascades only occur in aquatic ecosystems, not terrestrial ones'], answer:'Changes at one trophic level cause cascading effects through multiple levels; e.g., wolf reintroduction to Yellowstone changed vegetation by suppressing elk overgrazing', fact:'🌿 When wolves were extirpated from Yellowstone (1926) elk overgrazed riverbanks. Reintroduction (1995–96): wolves suppressed elk numbers AND behavior (elk avoided valleys). Willows, aspens, and cottonwoods recovered → songbirds returned → beavers returned → beaver dams raised water tables → riparian vegetation expanded further. This is a "trophic cascade" changing even the physical landscape — sometimes called "how wolves change rivers"!' },
  { level:3, visual:'⚛️', question:'What is superposition in quantum mechanics (as distinct from wave superposition)?', options:['A quantum system can exist in multiple states simultaneously until measured; measurement forces it into one definite state','Quantum particles always have definite positions; superposition just means we don\'t know which state','Superposition applies only to photons, not to matter particles like electrons'], answer:'A quantum system can exist in multiple states simultaneously until measured; measurement forces it into one definite state', fact:'⚛️ Schrödinger\'s cat is a thought experiment illustrating quantum superposition taken to macroscopic scale. An electron can be spin-up AND spin-down simultaneously. Superposition underlies quantum computing — qubits exist in superpositions of 0 and 1, enabling massive parallelism. The famous "Copenhagen interpretation" holds that the wavefunction collapses upon measurement, but the "many-worlds interpretation" says all outcomes happen in parallel branches of the universe!' },
  { level:3, visual:'🌍', question:'What is the mechanism and significance of the Chicxulub impact event 66 million years ago?', options:['A ~10-km asteroid struck the Yucatan Peninsula, triggering fires, a dust/soot winter blocking sunlight, acid rain, and the K-Pg mass extinction killing ~75% of species including non-avian dinosaurs','A supervolcano eruption in Mexico caused the extinction by emitting toxic gases only','A nearby supernova irradiated Earth with gamma rays, causing the extinction without an impact'], answer:'A ~10-km asteroid struck the Yucatan Peninsula, triggering fires, a dust/soot winter blocking sunlight, acid rain, and the K-Pg mass extinction killing ~75% of species including non-avian dinosaurs', fact:'🌍 The impactor released ~100 teratonnes of TNT equivalent — 1 billion times the Hiroshima bomb. The impact vaporised sulfur-bearing rock, producing SO₂ → sulfuric acid rain. Ejected debris and soot blocked sunlight globally for months-years → photosynthesis collapse → food web collapse. The iridium layer found worldwide at the K-Pg boundary (rare on Earth, common in asteroids) provided the key evidence. Discovered by Luis and Walter Alvarez in 1980!' },
