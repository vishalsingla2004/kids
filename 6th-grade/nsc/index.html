  { level:3, visual:'⚗️', question:'What is the mechanism of addition polymerisation?', options:['Monomers with C=C double bonds open their double bonds and add to each other in a chain reaction, forming long polymer chains with no byproducts','Monomers react together releasing small molecules (H₂O or HCl) as byproducts in each step','Monomers form rings that spontaneously open and link together'], answer:'Monomers with C=C double bonds open their double bonds and add to each other in a chain reaction, forming long polymer chains with no byproducts', fact:'⚗️ Addition polymerisation (chain-growth): n(CH₂=CH₂) → -(CH₂-CH₂)ₙ- (polyethylene). Initiated by radicals, cations, or anions. PVC, polypropylene, polystyrene, and Teflon (PTFE) are all addition polymers. Condensation polymerisation (step-growth) releases H₂O or similar — used for nylon, polyester, and Kevlar. About 400 million tonnes of plastic are produced globally per year.' },
  { level:3, visual:'🌌', question:'What is a neutron star, and what are its extreme properties?', options:['The collapsed remnant of a massive star\'s core after a Type II supernova; ~1.4 solar masses in ~10 km radius; densities ~10¹⁷ kg/m³; supported by neutron degeneracy pressure','A black hole that has cooled and is no longer emitting radiation','A white dwarf composed entirely of neutron-rich heavy elements'], answer:'The collapsed remnant of a massive star\'s core after a Type II supernova; ~1.4 solar masses in ~10 km radius; densities ~10¹⁷ kg/m³; supported by neutron degeneracy pressure', fact:'🌌 Neutron stars contain more mass than the Sun compressed to the size of a city (London). A teaspoon of neutron star material would weigh about 10 million tonnes. Surface gravity is ~2×10¹¹ g (200 billion times Earth\'s). The fastest pulsars spin 700 times/second. If a neutron star exceeds ~3 solar masses (Tolman–Oppenheimer–Volkoff limit), neutron degeneracy pressure fails and it collapses into a black hole.' },
  { level:3, visual:'🧬', question:'What is the significance of horizontal gene transfer (HGT) in bacterial evolution?', options:['Bacteria can acquire DNA from other organisms (even different species) via transformation, transduction, or conjugation, enabling rapid spread of antibiotic resistance genes','Bacteria can only inherit genes vertically from parent to offspring, never horizontally','HGT is a rare exception limited to laboratory settings; natural populations evolve only by mutation'], answer:'Bacteria can acquire DNA from other organisms (even different species) via transformation, transduction, or conjugation, enabling rapid spread of antibiotic resistance genes', fact:'🧬 HGT mechanisms: (1) Transformation: uptake of free DNA from environment (how Griffith\'s experiment worked, 1928). (2) Transduction: bacteriophage viruses accidentally carry bacterial DNA. (3) Conjugation: DNA transferred through direct cell-to-cell contact via pilus. Antibiotic resistance genes (on plasmids) spread by HGT — a pathogen can become multi-drug resistant overnight by acquiring a resistance plasmid from a non-pathogenic bacterium in the same environment!' },
  { level:3, visual:'⚛️', question:'What is the Zeeman effect?', options:['Spectral lines split into multiple components when atoms are placed in a magnetic field, due to the interaction of electron orbital magnetic moments with the field','Spectral lines split in strong electric fields, revealing electron orbital shapes','Spectral lines shift to longer wavelengths as stars move away from Earth'], answer:'Spectral lines split into multiple components when atoms are placed in a magnetic field, due to the interaction of electron orbital magnetic moments with the field', fact:'⚛️ Discovered by Pieter Zeeman in 1896 (Nobel Prize 1902). The normal Zeeman effect (spin ignored) splits a line into 3; the anomalous Zeeman effect (electron spin included) produces more complex patterns. The Zeeman effect is used to measure magnetic fields in sunspots and other stars. It provided key early evidence for quantised electron orbits and later for electron spin.' },
  { level:3, visual:'🌍', question:'What is the concept of plate subduction and how does it create the "Ring of Fire"?', options:['Oceanic plates subduct (dive) under less dense continental or oceanic plates at convergent boundaries; water released from subducted plate lowers mantle melting point → volcanism','Subduction is the stretching and thinning of plates at transform boundaries, forming volcanic rifts','The Ring of Fire is caused by hot spots distributed around the Pacific plate margins'], answer:'Oceanic plates subduct (dive) under less dense continental or oceanic plates at convergent boundaries; water released from subducted plate lowers mantle melting point → volcanism', fact:'🌋 The Pacific Ring of Fire traces the Pacific plate boundaries — about 90% of world\'s earthquakes and 75% of active/dormant volcanoes are there. Subducted oceanic crust carries water (in hydrated minerals); this water release at depth (~100 km) lowers mantle peridotite\'s melting point, generating magma that rises to form andesitic stratovolcanoes like Mt. Fuji, Mt. St. Helens, and the Andes.' },
  { level:3, visual:'🧪', question:'What is the concept of free energy of activation (transition state theory)?', options:['Reactions proceed via a high-energy transition state at the energy maximum between reactants and products; the activation energy (Ea) is the energy needed to reach this state','Free energy of activation equals the total energy difference between reactants and products (ΔG)','All reactions proceed at the same rate regardless of Ea, provided T is above absolute zero'], answer:'Reactions proceed via a high-energy transition state at the energy maximum between reactants and products; the activation energy (Ea) is the energy needed to reach this state', fact:'⚗️ Transition state theory (Eyring, 1935): the transition state is the highest-energy, most unstable structure along the reaction coordinate. Catalysts stabilise the transition state, lowering Ea. Hammond\'s postulate: for exothermic reactions, the transition state resembles the reactants (early); for endothermic reactions, it resembles the products (late). This guides organic synthesis in choosing which reactions will be fastest.' },
  { level:3, visual:'🌿', question:'What is the concept of indicator species in environmental monitoring?', options:['Species whose presence, absence, or health indicates the quality of an ecosystem (e.g., lichens indicate clean air; mayfly larvae indicate clean water)','Species that indicate the presence of other species by competing with them','Species used as indicators of soil composition by accumulating heavy metals'], answer:'Species whose presence, absence, or health indicates the quality of an ecosystem (e.g., lichens indicate clean air; mayfly larvae indicate clean water)', fact:'🌿 Mayfly, stonefly, and caddisfly larvae are bioindicators of freshwater quality — they are sensitive to pollution and absent in degraded streams. Lichens are sensitive to SO₂ air pollution — their reappearance in cities measures air quality improvement after clean air legislation. Coral bleaching indicates ocean warming. Bioindicators provide integrated signals about ecosystem health over time, complementing chemical measurements.' },
  { level:3, visual:'🔭', question:'What is the Chandrasekhar-Eddington controversy and its scientific significance?', options:['Chandrasekhar calculated that white dwarfs above ~1.4 solar masses must collapse further; Eddington rejected this; eventually confirmed with discovery of neutron stars and black holes','Eddington proved stellar nuclear fusion while Chandrasekhar claimed chemical energy powered stars','They disagreed about the distance to the Andromeda Galaxy; Eddington was later proved wrong'], answer:'Chandrasekhar calculated that white dwarfs above ~1.4 solar masses must collapse further; Eddington rejected this; eventually confirmed with discovery of neutron stars and black holes', fact:'⭐ In 1930, 19-year-old Subrahmanyan Chandrasekhar showed relativistic electrons in massive white dwarfs cannot support the star — it must collapse. Eddington publicly ridiculed this in 1935, saying "there should be a natural law preventing stars from behaving in this absurd way." Chandrasekhar was correct; the Chandrasekhar limit of ~1.4 M☉ explains neutron stars, Type Ia supernovae, and ultimately black holes. He won the Nobel Prize in 1983.' },
  { level:3, visual:'⚛️', question:'What is a quantum tunnelling and give an example of where it occurs in nature?', options:['Particles can pass through energy barriers they classically could not surmount; occurs in nuclear fusion in stars, radioactive alpha decay, and scanning tunnelling microscope operation','Tunnelling refers to quantum particles travelling faster than light through solid matter','Quantum tunnelling is a purely theoretical concept with no observable real-world consequences'], answer:'Particles can pass through energy barriers they classically could not surmount; occurs in nuclear fusion in stars, radioactive alpha decay, and scanning tunnelling microscope operation', fact:'⚛️ The probability of tunnelling decreases exponentially with barrier width and height. In the Sun, protons tunnel through the Coulomb barrier to fuse — classically they lack sufficient energy! Alpha decay: an alpha particle tunnels out of the nucleus. The scanning tunnelling microscope (Nobel Prize 1986) images individual atoms by measuring the tunnelling current across a ~0.1 nm gap. Enzymes may use proton tunnelling to accelerate reactions.' },
  { level:3, visual:'🌊', question:'What is the Stefan-Boltzmann Law and what does it describe?', options:['Total power radiated per unit surface area of a black body is proportional to T⁴: P/A = σT⁴ (σ = 5.67×10⁻⁸ W/m²/K⁴)','The frequency of maximum emission is inversely proportional to temperature','All objects emit radiation only at a single frequency determined by their temperature'], answer:'Total power radiated per unit surface area of a black body is proportional to T⁴: P/A = σT⁴ (σ = 5.67×10⁻⁸ W/m²/K⁴)', fact:'⭐ The T⁴ dependence is dramatic: double the temperature → 16× the radiated power. The Sun (T = 5,778 K) radiates 6.3×10⁷ W/m². Earth\'s energy balance: incoming solar radiation = outgoing thermal radiation determines Earth\'s equilibrium temperature. Greenhouse gases reduce outgoing radiation, raising equilibrium temperature. Wien\'s displacement law (λ_max = b/T) gives the peak wavelength of emission.' },
  { level:3, visual:'🧬', question:'What is the concept of gene therapy and what are its main delivery methods?', options:['Introducing functional DNA into a patient\'s cells to correct or compensate for a genetic defect; main vectors: viral (AAV, lentivirus, adenovirus) or non-viral (lipid nanoparticles, CRISPR delivery)','Giving patients copies of a protein to replace deficient production by their cells','Editing the protein structure directly using catalytic antibodies'], answer:'Introducing functional DNA into a patient\'s cells to correct or compensate for a genetic defect; main vectors: viral (AAV, lentivirus, adenovirus) or non-viral (lipid nanoparticles, CRISPR delivery)', fact:'🧬 First approved gene therapy: Luxturna (2017) for inherited retinal dystrophy (AAV vector delivering RPE65 gene). Zolgensma (2019, ~$2.1M) treats spinal muscular atrophy. CRISPR-based therapy (Casgevy, 2023) treats sickle cell disease. Key challenges: delivery efficiency, immune responses, off-target effects, and ensuring only targeted cells are modified. Germline gene editing (editing embryos) remains deeply controversial.' },
  { level:3, visual:'🌍', question:'What is the significance of the snow-albedo feedback in climate science?', options:['Snow and ice reflect ~80-90% of sunlight (high albedo); as they melt, darker ocean/land absorbs more heat (~5-10% reflected), amplifying warming — a positive feedback','Snow and ice absorb sunlight efficiently, directly warming the oceans','Snow albedo is a negative feedback that stabilises Arctic temperatures as temperatures rise'], answer:'Snow and ice reflect ~80-90% of sunlight (high albedo); as they melt, darker ocean/land absorbs more heat (~5-10% reflected), amplifying warming — a positive feedback', fact:'🌍 Arctic sea ice extent has declined ~13% per decade since satellite measurements began. The ice-albedo feedback is one reason the Arctic is warming ~4× faster than the global average (Arctic amplification). This feedback contributed to past rapid climate transitions. The Antarctic ice sheet, if fully melted, would raise sea levels ~58 meters — another reason ice stability matters enormously.' },
  { level:3, visual:'📐', question:'What is Euler\'s formula e^(iπ) + 1 = 0 and why is it considered remarkable?', options:['It connects the five most important mathematical constants (e, i, π, 1, 0) in one elegant equation, linking analysis, complex numbers, and geometry','It is used to calculate compound interest over imaginary time periods','It describes the relationship between kinetic energy and circular motion'], answer:'It connects the five most important mathematical constants (e, i, π, 1, 0) in one elegant equation, linking analysis, complex numbers, and geometry', fact:'📐 Euler\'s identity arises from e^(ix) = cos(x) + i·sin(x) (Euler\'s formula). Setting x = π: e^(iπ) = cos(π) + i·sin(π) = -1 + 0i = -1, so e^(iπ) + 1 = 0. It unites number theory, complex analysis, and trigonometry. Physicist Richard Feynman called it "the most remarkable formula in mathematics." Euler (1707–1783) published more mathematics than any other person in history.' },
  { level:3, visual:'🧪', question:'What are the mechanisms and types of intermolecular forces?', options:['London dispersion (all molecules, from temporary dipoles), dipole-dipole (polar molecules), and hydrogen bonding (N-H, O-H, F-H donors); stronger forces → higher boiling point','Only ionic and covalent bonds determine physical properties; intermolecular forces are negligible','All intermolecular forces have equal strength regardless of molecular size or polarity'], answer:'London dispersion (all molecules, from temporary dipoles), dipole-dipole (polar molecules), and hydrogen bonding (N-H, O-H, F-H donors); stronger forces → higher boiling point', fact:'⚗️ London dispersion (van der Waals): larger molecules have more electrons → stronger temporary dipoles. Iodine (I₂) is solid at room temperature despite being nonpolar — large electron cloud. Hydrogen bonding: water\'s unusually high boiling point (100°C vs H₂S: -60°C) and surface tension. DNA base pairing relies on H-bonds. Gecko feet stick by van der Waals forces between setae and surfaces — up to ~100 N adhesion!' },
  { level:3, visual:'🌊', question:'What is the concept of symmetry breaking in physics, and how does it relate to the Higgs mechanism?', options:['The universe\'s fundamental laws have symmetries that are "broken" at low energies, giving particles mass via interaction with the Higgs field that permeates space','Symmetry breaking describes how crystalline solids form regular patterns from disordered liquids','Symmetry breaking only occurs in quantum systems, not in classical mechanics'], answer:'The universe\'s fundamental laws have symmetries that are "broken" at low energies, giving particles mass via interaction with the Higgs field that permeates space', fact:'⚛️ The Higgs field has a non-zero value everywhere in the universe. Particles that interact with it acquire mass (like moving through a thick medium). W and Z bosons acquired mass via electroweak symmetry breaking at ~10⁻¹² seconds after the Big Bang. The Higgs boson (discovered at CERN\'s LHC in 2012 at 125 GeV) is the excitation of this field. Peter Higgs and François Englert won the 2013 Nobel Prize in Physics.' },
  { level:3, visual:'🌿', question:'What is the difference between r-selected and K-selected species?', options:['r-selected: fast reproduction, many small offspring, short life span, unstable environments (insects, annual plants); K-selected: slow reproduction, few large offspring, long life, stable environments (elephants, humans)','r-selected species live in tropical regions; K-selected species live in polar regions','r-selected species always win in competition against K-selected species'], answer:'r-selected: fast reproduction, many small offspring, short life span, unstable environments (insects, annual plants); K-selected: slow reproduction, few large offspring, long life, stable environments (elephants, humans)', fact:'🌿 r = intrinsic rate of natural increase; K = carrying capacity. r-strategists (mosquitoes, dandelions) maximise reproductive rate — "r" in the logistic growth equation. K-strategists maximise efficiency of resource use near carrying capacity. Most species fall on a continuum. r-strategists recover quickly after disturbance; K-strategists are more vulnerable to extinction from habitat loss or over-harvesting.' },
  { level:3, visual:'🔭', question:'What is the concept of spectroscopic binary stars and what can be determined from their spectra?', options:['Binary stars too close to resolve visually, identified by Doppler shifts of spectral lines as stars orbit each other; yields orbital periods, radial velocities, and minimum masses','Binary stars identified by one eclipsing the other, causing periodic brightness dips','Binary stars that appear as double when viewed through a large telescope'], answer:'Binary stars too close to resolve visually, identified by Doppler shifts of spectral lines as stars orbit each other; yields orbital periods, radial velocities, and minimum masses', fact:'🌌 Binary stars make up ~50% of all star systems in the Milky Way. From spectroscopic binaries: Doppler shifts give radial velocities; Kepler\'s laws + velocities give mass ratios and minimum individual masses. Over 50% of all stellar mass determinations rely on binary star analysis — critical for calibrating stellar evolution models. Close binaries can transfer mass between stars, creating novae and Type Ia supernovae.' },
  { level:3, visual:'🧬', question:'What is the significance of the Human Genome Project (HGP) and its findings?', options:['Completed in 2003, it sequenced all 3 billion base pairs of human DNA and found ~20,000-25,000 protein-coding genes, far fewer than expected, with only ~2% of DNA coding for proteins','The HGP found that each chromosome carries exactly 1,000 genes and confirmed that all humans are genetically identical except for a few hundred mutations','The HGP sequenced only the protein-coding regions, ignoring the 98% "junk DNA" which has no known function'], answer:'Completed in 2003, it sequenced all 3 billion base pairs of human DNA and found ~20,000-25,000 protein-coding genes, far fewer than expected, with only ~2% of DNA coding for proteins', fact:'🧬 The surprising finding: humans have ~20,000 protein-coding genes — barely more than a fruit fly (~17,000) or nematode worm (~20,000). The 98% non-coding DNA ("dark genome") was initially dismissed as "junk" but includes regulatory sequences, non-coding RNAs, retroviral remnants, and still-uncharacterised functional elements. The ENCODE project (2012) found ~80% of DNA has some biochemical activity. Understanding the non-coding genome is the next frontier.' },
  { level:3, visual:'⚗️', question:'What is the concept of chemical potential and its role in determining spontaneous processes?', options:['Chemical potential (μ) is the partial molar Gibbs energy; species spontaneously move from high to low chemical potential until equilibrium (equal μ everywhere)','Chemical potential is the total energy stored in all chemical bonds of a substance','Chemical potential equals the activation energy; reactions are spontaneous when chemical potential exceeds a threshold'], answer:'Chemical potential (μ) is the partial molar Gibbs energy; species spontaneously move from high to low chemical potential until equilibrium (equal μ everywhere)', fact:'⚗️ μ = μ° + RT ln(a) where a is activity (concentration for ideal solutions). Diffusion, membrane transport, phase changes, and chemical reactions all occur in the direction of decreasing chemical potential. Osmosis: water moves to equalize water chemical potential across the membrane. The Nernst equation for cell potential uses chemical potential: E = E° − (RT/nF)ln(Q). Chemical potential unifies all aspects of physical and chemical equilibrium.' },
  { level:3, visual:'🌌', question:'What are the main proposed solutions to the Fermi paradox?', options:['The Great Filter (civilisations rarely survive to become interstellar), the Rare Earth hypothesis, communication barriers, and the possibility that advanced civilisations destroy themselves','The universe is too young for other intelligent life to have evolved','Radio signals from aliens have been received but governments keep this secret'], answer:'The Great Filter (civilisations rarely survive to become interstellar), the Rare Earth hypothesis, communication barriers, and the possibility that advanced civilisations destroy themselves', fact:'🌌 Fermi\'s paradox: given the age and size of the universe, technologically advanced civilisations should be common, so "where is everybody?" The Great Filter may be behind us (rare emergence of complex life) or ahead of us (civilisations typically destroy themselves before becoming interstellar). The discovery of life elsewhere — or continued silence — would have profound implications for this question. The SETI Institute has searched for radio signals since 1984.' },
  { level:3, visual:'🌍', question:'What is the significance of stromatolites in Earth\'s early biological history?', options:['Layered structures built by cyanobacterial mats; the oldest evidence of life (~3.5 Ga) and responsible for the Great Oxidation Event that transformed Earth\'s atmosphere','Ancient crystalline rock structures formed by purely geological processes with no biological input','Fossilised multicellular organisms representing the first animals, appearing ~600 Ma'], answer:'Layered structures built by cyanobacterial mats; the oldest evidence of life (~3.5 Ga) and responsible for the Great Oxidation Event that transformed Earth\'s atmosphere', fact:'🌍 Stromatolites are found in the fossil record going back ~3.5 billion years. Living stromatolites still exist in Shark Bay, Western Australia. Cyanobacteria in stromatolites performed oxygenic photosynthesis — producing the O₂ that gradually accumulated from ~2.4 Ga onward (Great Oxidation Event). This "poisoned" the anaerobic life that had existed before, but enabled the evolution of aerobic organisms and eventually complex animal life.' },
  { level:3, visual:'⚛️', question:'What is the concept of resonance energy and aromaticity in organic chemistry?', options:['Aromatic compounds (4n+2 π electrons, cyclic, planar, conjugated) are extra stable due to delocalisation; resonance energy is the stabilisation beyond a hypothetical non-delocalised structure','Aromaticity only applies to benzene; no other molecule is aromatic','Resonance destabilises molecules by creating electron density inequalities'], answer:'Aromatic compounds (4n+2 π electrons, cyclic, planar, conjugated) are extra stable due to delocalisation; resonance energy is the stabilisation beyond a hypothetical non-delocalised structure', fact:'⚗️ Hückel\'s rule (1931): 4n+2 π electrons (n = 0,1,2...) in a cyclic, planar, fully conjugated system → aromatic (n=1: 6 for benzene; n=2: 10 for naphthalene). Anti-aromatic (4n π electrons) compounds are highly reactive. Aromaticity explains why benzene undergoes electrophilic substitution rather than addition — it preserves the stable aromatic system. Pyridine, pyrrole, furan, and thiophene are heterocyclic aromatic compounds critical in biology and pharmaceuticals.' },
  { level:3, visual:'📐', question:'What is the concept of dimensional analysis (unit analysis) in physics?', options:['Checking that the units (dimensions) of both sides of an equation are consistent, and converting between unit systems — helps verify equations and convert quantities','A method for measuring the dimensions of geometric objects','The analysis of how dimensions (size) affect the properties of physical systems'], answer:'Checking that the units (dimensions) of both sides of an equation are consistent, and converting between unit systems — helps verify equations and convert quantities', fact:'📐 F = ma: [N] = [kg][m/s²] ✓. If you get mismatched dimensions, the equation is wrong. Example: speed = distance/time has units [m/s]; if you calculated [m·s], you made an error. Dimensional analysis predicted that G has units [m³/kg·s²] before it was measured. NASA\'s Mars Climate Orbiter crashed in 1999 because one team used metric units and another used imperial — a dimensional analysis failure worth $327 million!' },
  { level:3, visual:'⚛️', question:'What is nuclear binding energy per nucleon and why is iron-56 at the peak?', options:['Energy holding each nucleon in the nucleus; peaks at iron-56 (~8.8 MeV/nucleon) — lighter nuclei release energy by fusion; heavier nuclei release energy by fission','Binding energy per nucleon is constant for all elements heavier than helium','Binding energy per nucleon is highest for hydrogen, decreasing with atomic number'], answer:'Energy holding each nucleon in the nucleus; peaks at iron-56 (~8.8 MeV/nucleon) — lighter nuclei release energy by fusion; heavier nuclei release energy by fission', fact:'☢️ The binding energy curve explains stellar nucleosynthesis: stars fuse light elements up to iron, releasing energy. Beyond iron, fusion requires energy input. Supernovae provide the energy to create heavy elements. Fission of uranium releases energy because splitting a heavy nucleus moves toward the iron peak from the heavy side. This is why neither fusion nor fission can use iron as fuel!' },
  { level:3, visual:'🌊', question:'What is the concept of chaos theory and the butterfly effect?', options:['Deterministic nonlinear systems show extreme sensitivity to initial conditions — tiny differences amplify exponentially; weather beyond ~2 weeks is practically unpredictable','Chaos theory states that all complex systems are fundamentally random and cannot be modelled mathematically','The butterfly effect means that actual butterfly wing movements cause hurricanes through direct air pressure changes'], answer:'Deterministic nonlinear systems show extreme sensitivity to initial conditions — tiny differences amplify exponentially; weather beyond ~2 weeks is practically unpredictable', fact:'🌊 Edward Lorenz (1963) discovered chaos by accident: rounding an initial weather variable from 0.506127 to 0.506 produced wildly different predictions after a few cycles. The "butterfly effect" metaphor: a butterfly flapping wings in Brazil could (in principle) trigger a tornado in Texas weeks later, through cascading atmospheric dynamics. Chaos is found in fluid turbulence, population dynamics, chemical oscillators, and heart arrhythmias. The Lorenz attractor is the iconic fractal "butterfly" shape.' },
  { level:3, visual:'🧬', question:'What is the significance of alternative splicing in gene expression?', options:['One gene can produce multiple different protein isoforms by including or excluding different exons during mRNA processing, dramatically expanding the proteome beyond the number of genes','Alternative splicing is an error-correction mechanism that removes damaged exons from mRNA','All mRNA transcripts from a gene contain all exons and are identical in sequence'], answer:'One gene can produce multiple different protein isoforms by including or excluding different exons during mRNA processing, dramatically expanding the proteome beyond the number of genes', fact:'🧬 ~95% of human multi-exon genes are alternatively spliced. The DSCAM gene in Drosophila can theoretically produce 38,016 different protein isoforms from one gene — crucial for neural wiring. Humans have ~20,000 genes but perhaps 100,000+ different proteins, partly due to alternative splicing. Splicing is regulated by splicing factors; many genetic diseases arise from splicing mutations that change which exons are included.' },
];
const QUIZ_KEY = 'kids_q_nsc';

let current = 0, score = 0, dotResults = [], sessionQ = [];
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}
function playCorrect() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [1047,1319,1568,2093,1568,1319].forEach((f,i) => note(ctx,'triangle',f,t+i*0.07,0.14,0.5));
    [[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur]) => {
      note(ctx,'triangle',f,t+d,dur,0.55); note(ctx,'sine',f*2,t+d,dur*0.5,0.14);
    });
  });
}
function playWrong() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay]) => {
      const osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination); osc.type='sawtooth';
      osc.frequency.setValueAtTime(f1,t+delay); osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);
      gn.gain.setValueAtTime(0.001,t+delay); gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02); gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);
      osc.start(t+delay); osc.stop(t+delay+0.3);
    });
    const osc=ctx.createOscillator(), gn=ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination); osc.type='sine';
    osc.frequency.setValueAtTime(380,t+0.92); osc.frequency.exponentialRampToValueAtTime(55,t+1.4);
    gn.gain.setValueAtTime(0.001,t+0.92); gn.gain.linearRampToValueAtTime(0.55,t+0.93); gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);
    osc.start(t+0.92); osc.stop(t+1.5);
  });
}
function playLevelUp() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d]) => note(ctx,'triangle',f,t+d,0.25,0.45));
    note(ctx,'sine',1047,t+0.84,0.8,0.3); note(ctx,'sine',1319,t+0.90,0.7,0.25); note(ctx,'sine',1568,t+0.96,0.6,0.2);
  });
}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function init() {
  current = 0; score = 0; dotResults = Array(15).fill(null);
  sessionQ = pickSession();
  if (!document.getElementById('visualCard')) {
    document.getElementById('gameScreen').innerHTML = `
      <a class="back-btn" href="../../">← Home</a>
      <div class="top">
        <div class="title">🏆 NSC Science Bowl</div>
        <div class="top-row"><div class="level-badge easy" id="levelBadge">⭐ Easy</div><div class="score-pill">🎯 <strong id="score">0</strong> / 15</div></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="middle" id="middle">
        <div class="visual-card" id="visualCard"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="bottom">
        <div class="choices" id="choices"></div>
        <div class="progress-dots" id="progressDots"></div>
      </div>`;
  }
  buildDots(); showQuestion();
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildDots() {
  const c = document.getElementById('progressDots'); c.innerHTML = '';
  sessionQ.forEach((q,i) => {
    const cls = q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';
    const d = document.createElement('div');
    d.className = `dot ${cls}`+(i===0?' current':''); d.id=`dot-${i}`; c.appendChild(d);
  });
}
function updateDot(idx, result) {
  const d = document.getElementById(`dot-${idx}`); if(!d) return;
  d.classList.remove('current'); d.classList.add('answered', result==='correct'?'correct-dot':'wrong-dot');
  const next = document.getElementById(`dot-${idx+1}`); if(next) next.classList.add('current');
}
function showQuestion() {
  const q = sessionQ[current];
  const badge = document.getElementById('levelBadge');
  if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}
  if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}
  if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}
  document.getElementById('progressFill').style.width=(current/15*100)+'%';
  document.getElementById('score').textContent=score;
  document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;
  document.getElementById('questionText').textContent=q.question;
  const shuffled=shuffle([...q.options]);
  const choicesEl=document.getElementById('choices'); choicesEl.innerHTML='';
  ['A','B','C'].forEach((letter,i) => {
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.dataset.value=shuffled[i];
    btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;
    btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx); choicesEl.appendChild(btn);
  });
  document.getElementById('gameScreen').classList.remove('shake');
}
function handleAnswer(chosen, correct, btn, fact, qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;
  if(isCorrect){
    score++; markMastered(qIdx); btn.classList.add('correct'); dotResults[current]='correct'; updateDot(current,'correct');
    document.getElementById('score').textContent=score; playCorrect(); spawnConfetti(35);
  } else {
    btn.classList.add('wrong'); dotResults[current]='wrong'; updateDot(current,'wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});
    document.getElementById('gameScreen').classList.add('shake'); playWrong();
  }
  setTimeout(()=>showFeedback(isCorrect,fact),300);
}
let feedbackTimer=null, feedbackRafId=null;
function dismissFeedback(){
  cancelAnimationFrame(feedbackRafId); clearTimeout(feedbackTimer);
  const overlay=document.getElementById('feedbackOverlay');
  const b=document.getElementById('feedbackBox'); b.style.animation='slideUp 0.35s ease forwards';
  overlay.classList.add('dismiss'); overlay.classList.remove('clickable');
  setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);
}
function showFeedback(isCorrect, fact) {
  clearTimeout(feedbackTimer); cancelAnimationFrame(feedbackRafId);
  const overlay=document.getElementById('feedbackOverlay'), box=document.getElementById('feedbackBox');
  const arc=document.getElementById('timerArc'), ring=document.getElementById('timerRing');
  const tapHint=document.getElementById('tapHint');
  const CIRC=100.5;
  if(isCorrect){
    const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title correct-text';
    box.className='feedback-box correct-box'; ring.className='timer-ring correct-ring';
    ring.style.display=''; tapHint.style.display='none';
  } else {
    const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title wrong-text';
    box.className='feedback-box wrong-box'; ring.className='timer-ring wrong-ring';
    ring.style.display='none'; tapHint.style.display='';
  }
  document.getElementById('feedbackFact').textContent=fact;
  arc.style.strokeDashoffset='0'; overlay.classList.remove('dismiss'); overlay.classList.add('show');
  if(isCorrect){
    const duration=1200; const startTime=performance.now();
    function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}
    feedbackRafId=requestAnimationFrame(tickRing);
    feedbackTimer=setTimeout(dismissFeedback,duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click',dismissFeedback,{once:true});
  }
}
function advanceQuestion(){
  const prev=current; current++;
  if(prev===4){showLevelUp('medium');return;}
  if(prev===9){showLevelUp('hard');return;}

  else{rank='ROOKIE';icon='💪📖🌱';msg='Great start! Practice makes perfect!';color:'#e74c3c';}
  const e=dotResults.slice(0,5).filter(r=>r==='correct').length;
  const m=dotResults.slice(5,10).filter(r=>r==='correct').length;
  const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  screen.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div>

      <div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div>
      <div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div>
        <div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div>
        <div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div>
      </div>
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">
        ${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}
      </div>
      <button class="action-btn" onclick="init()">🔄 Play Again!</button>
      <a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a>
    </div>`;
  spawnConfetti(score>=10?90:40);
}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#38bdf8','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){
  for(let i=0;i<count;i++){setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
init();
</script>
</body>
</html>
