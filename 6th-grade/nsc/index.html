  { level:2, visual:'🌊', question:'What is the formula for gravitational potential energy and kinetic energy?', options:['GPE = mgh; KE = ½mv²','GPE = mv; KE = mgh','GPE = ½mv²; KE = mgh'], answer:'GPE = mgh; KE = ½mv²', fact:'⚙️ Both are measured in joules. A 1 kg ball at 10 m height: GPE = 1×9.8×10 = 98 J. If dropped to the ground: all GPE converts to KE, so ½×1×v² = 98 J → v = 14 m/s at impact. This energy conservation principle is used in roller coasters, pendulums, projectiles, and hydroelectric dams.' },
  { level:2, visual:'⚗️', question:'What is the law of conservation of mass in chemical reactions?', options:['The total mass of reactants equals the total mass of products; matter is neither created nor destroyed','Mass is converted to energy during exothermic reactions','Products always have greater mass than reactants in synthesis reactions'], answer:'The total mass of reactants equals the total mass of products; matter is neither created nor destroyed', fact:'⚗️ Antoine Lavoisier (1789) established conservation of mass. A balanced chemical equation must have equal numbers of each atom on both sides. In nuclear reactions, tiny amounts of mass convert to energy (E = Δmc²) — but in chemical reactions this is negligible. Lavoisier is called the "Father of Modern Chemistry" for this and other contributions.' },
  { level:2, visual:'🌿', question:'What is an ecological niche?', options:['The role and position of a species in its ecosystem, including how it gets resources and interacts with other species','The physical location (habitat) where an organism lives','The total biomass a species contributes to an ecosystem'], answer:'The role and position of a species in its ecosystem, including how it gets resources and interacts with other species', fact:'🌍 Gause\'s competitive exclusion principle: two species cannot indefinitely occupy the same niche in the same location — one will outcompete the other. Species that seem to compete coexist by partitioning niches (e.g., different warbler species foraging at different heights in the same tree). Niche breadth ranges from generalists (wide) to specialists (narrow).' },
  { level:2, visual:'📐', question:'In kinematics, a ball is dropped from rest and falls freely for 3 seconds. What is its speed at the end (g = 10 m/s²)?', options:['30 m/s','15 m/s','90 m/s'], answer:'30 m/s', fact:'⚙️ v = u + at = 0 + 10×3 = 30 m/s. Distance fallen: s = ½at² = ½×10×9 = 45 m. Galileo showed (contrary to Aristotle) that all objects fall at the same rate regardless of mass — famously demonstrated (legendarily) by dropping two spheres from the Leaning Tower of Pisa!' },
  { level:2, visual:'🧪', question:'What is the concept of electronegativity and which element has the highest electronegativity?', options:['Electronegativity is the tendency of an atom to attract electrons in a bond; fluorine (F) has the highest','Electronegativity is the energy released when an electron is added; cesium has the highest','Electronegativity equals atomic radius; larger atoms have more electronegativity'], answer:'Electronegativity is the tendency of an atom to attract electrons in a bond; fluorine (F) has the highest', fact:'⚛️ Linus Pauling developed the electronegativity scale. Fluorine (4.0) is highest; francium and cesium (~0.7) are lowest. Electronegativity increases up and to the right on the periodic table. Large differences in electronegativity between bonded atoms → ionic bond; small differences → nonpolar covalent bond; moderate differences → polar covalent bond.' },
  { level:2, visual:'🌊', question:'What is the difference between longitudinal and transverse waves?', options:['Longitudinal: particles vibrate parallel to wave direction (sound); Transverse: particles vibrate perpendicular to wave direction (light, string)','Longitudinal: travels faster; Transverse: travels slower','Longitudinal waves require a medium; Transverse can travel in vacuum or medium'], answer:'Longitudinal: particles vibrate parallel to wave direction (sound); Transverse: particles vibrate perpendicular to wave direction (light, string)', fact:'🌊 Sound is a longitudinal wave — compressions and rarefactions move in the same direction as the sound. Light is transverse — electromagnetic field oscillates perpendicular to travel direction. Seismic P-waves are longitudinal; S-waves are transverse (which is why S-waves cannot travel through liquid outer core — liquids cannot support shear stress).' },
  { level:2, visual:'🌿', question:'What is the function of the pancreas in digestion and blood sugar regulation?', options:['Produces digestive enzymes (amylase, lipase, proteases) and hormones (insulin, glucagon) for blood sugar control','Only regulates blood sugar through insulin; has no digestive role','Stores and concentrates bile produced by the liver'], answer:'Produces digestive enzymes (amylase, lipase, proteases) and hormones (insulin, glucagon) for blood sugar control', fact:'🩺 The pancreas is both exocrine (secretes enzymes into the small intestine) and endocrine (secretes hormones into the blood). Insulin lowers blood glucose (promotes uptake into cells); glucagon raises it (stimulates glycogen breakdown in liver). Type 1 diabetes: immune system destroys insulin-producing beta cells. Type 2: cells become insulin-resistant.' },
  { level:2, visual:'🌍', question:'What is the difference between rotation and revolution of Earth?', options:['Rotation: Earth spinning on its axis (24 hours → day/night); Revolution: Earth orbiting the Sun (365.25 days → year)','Rotation: Earth orbiting the Sun; Revolution: Earth spinning on its axis','They are synonymous terms for the same motion'], answer:'Rotation: Earth spinning on its axis (24 hours → day/night); Revolution: Earth orbiting the Sun (365.25 days → year)', fact:'🌍 Earth\'s axial tilt (23.5°) causes seasons — not distance from the Sun. Summer occurs when your hemisphere is tilted toward the Sun (more direct sunlight, longer days). Earth\'s axis points toward Polaris (North Star) now, but wobbles over ~26,000 years (precession) — in 13,000 years, Vega will be the North Star!' },
  { level:2, visual:'⚗️', question:'What is the difference between organic and inorganic chemistry?', options:['Organic chemistry studies carbon-containing compounds (mainly); Inorganic studies all other elements','Organic chemistry studies naturally occurring substances; Inorganic studies synthetic compounds','Organic compounds always contain oxygen; Inorganic compounds never contain oxygen'], answer:'Organic chemistry studies carbon-containing compounds (mainly); Inorganic studies all other elements', fact:'⚗️ Carbon\'s ability to form 4 stable bonds with itself and other atoms creates millions of possible organic molecules — the chemistry of life. Organic compounds include hydrocarbons, alcohols, carbohydrates, proteins, lipids, and nucleic acids. Exceptions: CO₂, CO, carbonates, and cyanides are carbon compounds considered inorganic by convention.' },
  { level:2, visual:'🌡️', question:'What is the significance of the triple point of a substance?', options:['The unique temperature and pressure at which all three phases (solid, liquid, gas) coexist in equilibrium','The temperature at which a substance melts at any pressure','The pressure below which a substance sublimes rather than melts'], answer:'The unique temperature and pressure at which all three phases (solid, liquid, gas) coexist in equilibrium', fact:'🌡️ Water\'s triple point is at 273.16 K (0.01°C) and 611.7 Pa. It was used as a fundamental reference point for the Kelvin temperature scale before 2019. Above the critical point (374°C, 218 atm for water), no phase boundary exists — water becomes a supercritical fluid. Dry ice (CO₂) has a triple point at -56.6°C, 5.1 atm — meaning CO₂ cannot be a liquid at ordinary atmospheric pressure.' },
  { level:2, visual:'🧬', question:'What are the main differences between B cells and T cells in the adaptive immune system?', options:['B cells produce antibodies; T cells include cytotoxic cells (kill infected cells) and helper cells (coordinate immune response)','B cells kill viruses directly; T cells produce antibodies','B cells mature in the thymus; T cells mature in bone marrow'], answer:'B cells produce antibodies; T cells include cytotoxic cells (kill infected cells) and helper cells (coordinate immune response)', fact:'🛡️ Both develop from bone marrow stem cells. B cells mature in bone marrow; T cells mature in the Thymus (hence "T" cell). Helper T cells (CD4+) are the cells targeted by HIV — their depletion leads to AIDS and collapse of the entire adaptive immune response. Cytotoxic T cells (CD8+) recognise and kill body cells displaying foreign antigens (virus-infected or cancerous cells).' },
  { level:2, visual:'📐', question:'What is the period of a simple pendulum of length L in terms of g?', options:['T = 2π√(L/g)','T = 2π√(g/L)','T = L/(2πg)'], answer:'T = 2π√(L/g)', fact:'⚙️ Period depends only on length and gravity — NOT on the mass of the bob or the amplitude (for small swings). This is why pendulum clocks work! Double the length → period increases by √2 ≈ 1.41×. On the Moon (g = 1.62 m/s²), a 1-m pendulum would swing about 2.5× slower than on Earth. Galileo discovered isochronism of pendulums around 1602 from watching a swinging lamp in Pisa Cathedral.' },
  { level:2, visual:'🌍', question:'What is ocean acidification, and what causes it?', options:['Increasing CO₂ dissolves in seawater forming carbonic acid, lowering ocean pH; threatens marine organisms with calcium carbonate shells','Acid rain from industrial SO₂ emissions directly acidifying ocean surfaces','Volcanic CO₂ from submarine volcanic activity acidifying deep ocean water'], answer:'Increasing CO₂ dissolves in seawater forming carbonic acid, lowering ocean pH; threatens marine organisms with calcium carbonate shells', fact:'🌊 CO₂ + H₂O → H₂CO₃ → H⁺ + HCO₃⁻. Since the Industrial Revolution, ocean pH has dropped from ~8.2 to ~8.1 — a 30% increase in [H⁺]! More acidic water dissolves the calcium carbonate (CaCO₃) shells of corals, oysters, and plankton. This disrupts marine food webs and threatens the reef ecosystems that protect coastlines.' },
  { level:2, visual:'🔬', question:'What is a control variable (controlled variable) in a scientific experiment?', options:['A variable kept constant to ensure that only the independent variable affects the dependent variable','The variable being measured as the outcome','The variable deliberately changed by the experimenter'], answer:'A variable kept constant to ensure that only the independent variable affects the outcome dependent variable', fact:'🔬 In a drug trial: independent variable (IV) = drug dose; dependent variable (DV) = patient recovery; control variables = age, sex, diet, exercise, other medications. Control groups receive a placebo. Without controls, you cannot determine whether an observed effect was truly caused by the IV. This is the foundation of valid experimental design!' },
  { level:2, visual:'🧪', question:'What is a galvanic (voltaic) cell?', options:['An electrochemical cell that converts chemical energy to electrical energy via spontaneous redox reactions','An electrolytic cell that uses electricity to drive a non-spontaneous redox reaction','A fuel cell that combines hydrogen and oxygen to produce electricity and water'], answer:'An electrochemical cell that converts chemical energy to electrical energy via spontaneous redox reactions', fact:'⚡ The classic Daniell cell: zinc anode (Zn → Zn²⁺ + 2e⁻; oxidation) and copper cathode (Cu²⁺ + 2e⁻ → Cu; reduction). E°cell = +1.10 V. Electrons flow through the external wire from anode to cathode. All batteries are galvanic cells. An electrolytic cell (used for electroplating) is the opposite — it requires an external voltage to force non-spontaneous reactions.' },
  { level:2, visual:'🌿', question:'What is eutrophication?', options:['Excessive nutrient (especially nitrogen and phosphorus) enrichment of a water body, causing algal blooms and oxygen depletion','The natural aging process of a lake as it fills with sediment over thousands of years','The introduction of invasive species that consume all aquatic vegetation'], answer:'Excessive nutrient (especially nitrogen and phosphorus) enrichment of a water body, causing algal blooms and oxygen depletion', fact:'🌊 Fertiliser runoff and sewage add excess N and P to waterways. Algae bloom massively, die, and decompose — bacteria consume so much O₂ that fish and other aerobic organisms suffocate (hypoxic "dead zones"). The Gulf of Mexico hypoxic zone (from Mississippi River nutrient runoff) can reach the size of New Jersey every summer.' },
  { level:2, visual:'⚛️', question:'What is atomic radius, and how does it trend across and down the periodic table?', options:['Atomic radius decreases across a period (more protons pull electrons in) and increases down a group (more electron shells)','Atomic radius increases across a period and decreases down a group','Atomic radius is constant within a period but varies between periods'], answer:'Atomic radius decreases across a period (more protons pull electrons in) and increases down a group (more electron shells)', fact:'⚛️ Moving right across a period, nuclear charge increases (more protons) but electrons are added to the same shell — greater attraction shrinks the atom. Moving down a group, electrons occupy higher shells that are further from the nucleus. Cesium (Cs) is the largest naturally occurring element; helium is the smallest. These trends explain chemical reactivity!' },
  { level:2, visual:'🌊', question:'What is the principle of simple harmonic motion (SHM)?', options:['A restoring force proportional to displacement from equilibrium, producing oscillatory motion (F = -kx)','Any periodic motion with constant amplitude','Circular motion at constant speed'], answer:'A restoring force proportional to displacement from equilibrium, producing oscillatory motion (F = -kx)', fact:'⚙️ SHM occurs in springs (Hooke\'s Law: F = -kx), pendulums (for small angles), and LC circuits. Key features: the period is independent of amplitude (for small oscillations); maximum velocity occurs at equilibrium; maximum acceleration occurs at maximum displacement. Sound waves, light waves, and molecular vibrations all involve SHM.' },
  { level:2, visual:'🧬', question:'What are the organelles unique to plant cells (not found in animal cells)?', options:['Cell wall, chloroplasts, and large central vacuole','Mitochondria, ribosomes, and cell membrane','Nucleus, ER, and Golgi apparatus'], answer:'Cell wall, chloroplasts, and large central vacuole', fact:'🌿 Plant cells: rigid cell wall (cellulose) for support, chloroplasts for photosynthesis, large central vacuole (up to 90% of cell volume) for storage and turgor pressure. Animal cells have centrioles (for cell division) — most plant cells do not. Both have mitochondria, nucleus, ER, Golgi, and ribosomes.' },
  { level:2, visual:'📐', question:'What is the relationship between pressure, force, and area?', options:['Pressure = Force ÷ Area (P = F/A); measured in pascals (Pa = N/m²)','Pressure = Force × Area','Pressure = Area ÷ Force'], answer:'Pressure = Force ÷ Area (P = F/A); measured in pascals (Pa = N/m²)', fact:'⚙️ A stiletto heel exerts enormous pressure (small area) despite low force. A snowshoe spreads weight over large area (low pressure). Atmospheric pressure at sea level ≈ 101,325 Pa = 1 atm. Blood pressure (120/80 mmHg) is also a pressure measurement. Blaise Pascal (1623–1662) formulated key principles of fluid pressure.' },
  { level:2, visual:'🌍', question:'What is biodegradation and why is plastic pollution a major environmental problem?', options:['Biodegradation is breakdown by microorganisms; most plastics resist it, persisting for hundreds of years as microplastics','Plastics biodegrade quickly in sunlight but very slowly underwater','Plastics are harmful primarily because they are made from petroleum, not because of their persistence'], answer:'Biodegradation is breakdown by microorganisms; most plastics resist it, persisting for hundreds of years as microplastics', fact:'🌊 Over 8 million tonnes of plastic enter the oceans annually. UV light and mechanical abrasion break plastics into microplastics (<5 mm) that enter food webs — found in fish, seabirds, and even human blood. Some bacteria (Ideonella sakaiensis, discovered 2016) can break down PET plastic, raising hopes for bioremediation.' },
  { level:2, visual:'🌡️', question:'What is Boyle\'s Law, and state it mathematically?', options:['For a fixed amount of gas at constant temperature, pressure and volume are inversely proportional: P₁V₁ = P₂V₂','At constant pressure, volume is proportional to temperature: V₁/T₁ = V₂/T₂','Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules'], answer:'For a fixed amount of gas at constant temperature, pressure and volume are inversely proportional: P₁V₁ = P₂V₂', fact:'⚗️ Robert Boyle (1662): compress a gas at constant T — pressure doubles. Scuba diving uses Boyle\'s Law: as a diver descends, water pressure increases, compressing the air in their lungs. Breathing with a regulator maintains constant pressure. Ascending too fast lets dissolved nitrogen expand in the blood, causing the dangerous "bends" (decompression sickness).' },

  // ── MEDIUM (level 2) batch 4 ──────────────────────────────────────────────────
  { level:2, visual:'🌍', question:'What is the geologic time scale, and which eon represents the last 541 million years?', options:['Phanerozoic Eon (Paleozoic → Mesozoic → Cenozoic eras); preceding eons are Proterozoic, Archean, Hadean','Holocene Eon spanning the last billion years','Cenozoic Eon spanning all of visible life\'s history'], answer:'Phanerozoic Eon (Paleozoic → Mesozoic → Cenozoic eras); preceding eons are Proterozoic, Archean, Hadean', fact:'🌍 Hadean (4.6–4.0 Ga): formation, heavy bombardment. Archean (4.0–2.5 Ga): first life, stromatolites. Proterozoic (2.5–0.54 Ga): Great Oxidation Event, multicellular life. Phanerozoic (0.54 Ga–present): explosion of animal life. We live in the Cenozoic ("age of mammals") → Quaternary period → Holocene epoch (last 11,700 years).' },
  { level:2, visual:'⚡', question:'What is Charles\'s Law, and state it mathematically?', options:['At constant pressure, the volume of a gas is directly proportional to its absolute temperature: V₁/T₁ = V₂/T₂','At constant temperature, pressure and volume are inversely proportional: PV = constant','Volume increases with pressure at constant temperature'], answer:'At constant pressure, the volume of a gas is directly proportional to its absolute temperature: V₁/T₁ = V₂/T₂', fact:'⚗️ Jacques Charles (1787) found that gas volume increases linearly with temperature. This is why hot air balloons rise — heating air at constant pressure increases volume and decreases density. Temperature must be in Kelvin! At 0 K (absolute zero), volume theoretically reaches zero — the extrapolated x-intercept of the V vs. T graph.' },
  { level:2, visual:'🧬', question:'What is gene expression regulation in eukaryotes, and what are transcription factors?', options:['Transcription factors are proteins that bind specific DNA sequences near genes (promoters/enhancers) to activate or repress transcription of that gene','Transcription factors are RNA molecules that bind mRNA to control translation','All genes are transcribed at the same constant rate regardless of environmental signals'], answer:'Transcription factors are proteins that bind specific DNA sequences near genes (promoters/enhancers) to activate or repress transcription of that gene', fact:'🧬 Eukaryotic gene regulation is far more complex than prokaryotic. Enhancers can be thousands of base pairs from the gene they regulate — DNA looping brings them close. The human genome has ~2,000 transcription factor genes. Cell differentiation (a skin cell vs. a neuron from the same genome) is achieved by different transcription factors activating different gene subsets.' },
  { level:2, visual:'🔬', question:'What is a covalent network solid and why does diamond have such a high melting point?', options:['A solid where atoms are connected by covalent bonds throughout a 3D network; diamond\'s strong C-C bonds throughout require enormous energy to break','A solid with metallic bonding throughout; the free electrons give high melting points','A molecular solid where very strong intermolecular forces resist melting'], answer:'A solid where atoms are connected by covalent bonds throughout a 3D network; diamond\'s strong C-C bonds throughout require enormous energy to break', fact:'💎 Diamond (mp > 3,500°C) and silicon dioxide (quartz, mp 1,710°C) are covalent networks. Every carbon in diamond forms 4 equivalent C-C bonds in a tetrahedral arrangement — there are no distinct molecules, just one giant macromolecule. Graphite is another carbon allotrope: layered sheets with delocalized electrons (soft, conductive). Both are pure carbon, illustrating how structure determines properties!' },
  { level:2, visual:'🌊', question:'What is the concept of impulse and its relationship to momentum?', options:['Impulse (J = FΔt) equals the change in momentum (Δp = mΔv); a large force for a short time or small force for long time gives the same impulse','Impulse is the same as work (force × distance)','Impulse is always greater than momentum in real-world situations'], answer:'Impulse (J = FΔt) equals the change in momentum (Δp = mΔv); a large force for a short time or small force for long time gives the same impulse', fact:'⚙️ The impulse-momentum theorem: J = Δp. This is why airbags save lives — they increase the collision time (Δt), reducing peak force for the same impulse. A cricket batsman follows through to increase contact time, transferring more impulse to the ball. Eggs in padding vs. bare: same impulse, but padding spreads it over longer time → smaller force → egg doesn\'t break.' },
  { level:2, visual:'🌿', question:'What is the difference between a food chain and an energy pyramid?', options:['Food chains show who eats whom; energy pyramids show quantitatively how much energy (or biomass/individuals) is present at each trophic level','They are different names for the same concept','Energy pyramids show chemical reactions; food chains show physical eating relationships'], answer:'Food chains show who eats whom; energy pyramids show quantitatively how much energy (or biomass/individuals) is present at each trophic level', fact:'🌱 Pyramids of energy always have the classic pyramidal shape (producers at base with most energy). Pyramids of numbers can be inverted (one oak tree supports many caterpillars). Pyramids of biomass can also be inverted in aquatic systems where fast-reproducing phytoplankton are eaten faster than they accumulate. Only energy pyramids are always pyramid-shaped!' },
  { level:2, visual:'🧪', question:'What is activation energy and how do catalysts affect it?', options:['The minimum energy required for reactants to form products; catalysts provide an alternative reaction pathway with lower activation energy','Activation energy is the total energy released during an exothermic reaction','Catalysts provide extra energy to reactants, raising the activation energy needed'], answer:'The minimum energy required for reactants to form products; catalysts provide an alternative reaction pathway with lower activation energy', fact:'⚗️ Arrhenius equation: k = Ae^(-Ea/RT). Lower activation energy → faster reaction rate exponentially. Enzymes (biological catalysts) lower Ea dramatically — an uncatalysed biochemical reaction might take centuries; with enzyme, milliseconds! A catalyst is NOT consumed. This is why enzymes are present in tiny amounts yet catalyse reactions in huge quantities continuously.' },
  { level:2, visual:'🌍', question:'What causes tidal forces and what are spring tides vs. neap tides?', options:['Gravity gradient from Moon (and Sun) stretches Earth; spring tides (Sun+Moon aligned, larger tides) occur at new/full moon; neap tides (Sun-Moon at 90°, smaller) at quarter moons','Tides are caused only by the Sun\'s gravity; the Moon\'s effect is negligible','Spring tides occur in spring and neap tides occur in autumn, regardless of Moon phase'], answer:'Gravity gradient from Moon (and Sun) stretches Earth; spring tides (Sun+Moon aligned, larger tides) occur at new/full moon; neap tides (Sun-Moon at 90°, smaller) at quarter moons', fact:'🌊 The Moon creates the larger tidal effect despite being less massive than the Sun, because tidal force depends on gravity gradient (∝ 1/d³) and the Moon is much closer. Spring tides (from Old English "springen" — to leap) can be 20% higher than average. Bay of Fundy, Nova Scotia has the world\'s largest tides: up to 16 metres from tidal resonance!' },
  { level:2, visual:'⚡', question:'What is the concept of electric field, and how does it relate to force on a charge?', options:['Electric field E (in N/C or V/m) represents the force per unit positive charge; F = qE acts on charge q in field E','Electric field is the total charge stored in a capacitor','Electric field measures the speed of electrons in a conductor'], answer:'Electric field E (in N/C or V/m) represents the force per unit positive charge; F = qE acts on charge q in field E', fact:'⚡ Electric fields are created by charges and radiate outward from positive charges, toward negative charges. The field exists even without a test charge there. Uniform fields exist between parallel plate capacitors (E = V/d). Electric field lines never cross. Coulomb\'s law gives the field from a point charge: E = kq/r². Lightning forms when electric fields become strong enough to ionise air!' },
  { level:2, visual:'🌿', question:'What is the difference between the sympathetic and parasympathetic nervous systems?', options:['Sympathetic: "fight or flight" — increases heart rate, dilates pupils, slows digestion; Parasympathetic: "rest and digest" — slows heart rate, stimulates digestion','Sympathetic controls voluntary muscle movement; Parasympathetic controls involuntary organs','Sympathetic is part of the CNS; Parasympathetic is part of the PNS'], answer:'Sympathetic: "fight or flight" — increases heart rate, dilates pupils, slows digestion; Parasympathetic: "rest and digest" — slows heart rate, stimulates digestion', fact:'🧠 Both are divisions of the autonomic (involuntary) nervous system. Sympathetic releases noradrenaline (norepinephrine); parasympathetic releases acetylcholine. Most organs receive dual innervation — the two systems balance each other. Chronic sympathetic activation (stress) has major health consequences: elevated cortisol, hypertension, immune suppression, and increased cardiovascular risk.' },
  { level:2, visual:'🌡️', question:'What are the differences between nuclear power generation and fossil fuel power generation?', options:['Nuclear uses fission heat to produce steam; fossil fuels combust to produce steam; both drive turbines — but nuclear emits no CO₂ while operating, produces radioactive waste; fossil fuels emit CO₂, SO₂, NO_x','Nuclear produces electricity directly without steam; fossil fuels always use turbines','Nuclear is inherently less efficient than fossil fuels but is used for its lower cost'], answer:'Nuclear uses fission heat to produce steam; fossil fuels combust to produce steam; both drive turbines — but nuclear emits no CO₂ while operating, produces radioactive waste; fossil fuels emit CO₂, SO₂, NO_x', fact:'⚡ Nuclear power provides about 10% of global electricity with very low lifecycle CO₂ emissions (~12 g CO₂/kWh vs ~820 for coal). High-level nuclear waste requires secure storage for >10,000 years — a serious long-term challenge. Modern reactor designs (Gen IV) aim for passive safety, reduced waste, and can even burn existing waste as fuel.' },
  { level:2, visual:'🧬', question:'What are restriction enzymes and how are they used in genetic engineering?', options:['Bacterial enzymes that cut DNA at specific palindromic sequences; used to cut and paste DNA fragments in recombinant DNA technology','Enzymes that restrict viral DNA replication inside host bacterial cells only','Repair enzymes that detect and fix mismatched base pairs in DNA replication'], answer:'Bacterial enzymes that cut DNA at specific palindromic sequences; used to cut and paste DNA fragments in recombinant DNA technology', fact:'🧬 EcoRI cuts at GAATTC, leaving sticky ends. Two DNA fragments cut with the same restriction enzyme have complementary sticky ends that can be joined by DNA ligase. This recombinant DNA technology is used to make insulin (human insulin gene in bacteria), vaccines, gene therapy, and is the foundation of the entire biotechnology industry. First used in 1972 by Paul Berg (Nobel Prize 1980).' },
  { level:2, visual:'🌊', question:'What is the concept of mechanical resonance?', options:['When an external force is applied at a system\'s natural frequency, amplitude of oscillation increases dramatically — can cause structural failure','Resonance occurs when two waves with identical frequencies cancel each other','Mechanical resonance is the transfer of heat between objects at the same temperature'], answer:'When an external force is applied at a system\'s natural frequency, amplitude of oscillation increases dramatically — can cause structural failure', fact:'⚙️ Every object has a natural frequency at which it vibrates. The Tacoma Narrows Bridge collapsed in 1940 when wind-induced oscillations matched the bridge\'s natural frequency. Opera singers can shatter wine glasses by singing at the glass\'s resonant frequency. MRI machines use nuclear magnetic resonance. Engineers must design structures to avoid resonance with expected driving frequencies (seismic, wind, traffic).' },
  { level:2, visual:'⚗️', question:'What is the enthalpy of combustion and what makes it useful in energy comparisons?', options:['The heat released when one mole of a substance completely combusts in excess oxygen at standard conditions; used to compare fuel energy densities','The temperature at which a substance spontaneously ignites in air','The activation energy required to initiate combustion in air'], answer:'The heat released when one mole of a substance completely combusts in excess oxygen at standard conditions; used to compare fuel energy densities', fact:'🔥 Standard enthalpy of combustion (ΔH°c): methane −890 kJ/mol; octane (gasoline) −5,471 kJ/mol; hydrogen −286 kJ/mol. Per gram: hydrogen (−143 kJ/g) has the highest energy density of any fuel — 3× gasoline. But hydrogen gas has very low volumetric density. This is why hydrogen storage (liquid H₂ at −253°C or high-pressure tanks) is a challenge for fuel cell vehicles.' },
  { level:2, visual:'🌿', question:'What is the role of mycorrhizal fungi in plant nutrition?', options:['Fungi colonise plant roots, extending hyphae into soil to absorb water and minerals (especially phosphorus); plant provides fungi with photosynthate (sugars) in exchange','Fungi parasitise plant roots, extracting sugars and providing nothing in return','Fungi decompose dead plant material in the soil, indirectly releasing nutrients that plants absorb'], answer:'Fungi colonise plant roots, extending hyphae into soil to absorb water and minerals (especially phosphorus); plant provides fungi with photosynthate (sugars) in exchange', fact:'🍄 Over 90% of land plants have mycorrhizal partnerships. Fungal hyphae can extend metres from roots, accessing far more soil volume than roots alone. The "wood wide web" — the mycorrhizal network connecting trees in forests — allows carbon, water, and nutrients to flow between trees, including from large "mother trees" to seedlings. First described rigorously by Suzanne Simard in 1997.' },
  { level:2, visual:'🌍', question:'What are metamorphic rock textures and what causes foliation?', options:['Foliation: parallel alignment of platy minerals (mica, chlorite) due to directed pressure during metamorphism; creates banding in schist and slate','Foliation: random mineral orientation; caused by heating without pressure','Non-foliated rocks form only from chemical metamorphism; foliated rocks form only from high temperature'], answer:'Foliation: parallel alignment of platy minerals (mica, chlorite) due to directed pressure during metamorphism; creates banding in schist and slate', fact:'🪨 Regional metamorphism (large-scale, from mountain building) produces foliated rocks: slate (low grade, from shale) → phyllite → schist (visible mica flakes) → gneiss (high grade, banded). Contact metamorphism (from igneous intrusions) produces non-foliated rocks: limestone → marble; sandstone → quartzite. The Appalachians and Himalayas contain extensive metamorphic terranes from ancient mountain-building events.' },
  { level:2, visual:'📐', question:'What is the formula for the sum of angles in a polygon with n sides?', options:['(n − 2) × 180°','n × 180°','(n + 2) × 180°'], answer:'(n − 2) × 180°', fact:'📐 Triangle (n=3): (3-2)×180 = 180°. Quadrilateral (n=4): 360°. Pentagon (n=5): 540°. This works because any polygon can be divided into (n-2) triangles. Regular polygons have all sides and angles equal — a regular hexagon (n=6) has interior angles of (6-2)×180/6 = 120°, which is why hexagons tile a plane perfectly (beehive honeycomb structure!).' },
  { level:2, visual:'🌡️', question:'What is osmotic pressure and how is it related to solute concentration?', options:['Osmotic pressure π = iMRT; the pressure required to stop net osmosis across a semi-permeable membrane into a solution','The mechanical pressure exerted by a solution due to its weight','The boiling point elevation caused by dissolved solutes'], answer:'Osmotic pressure π = iMRT; the pressure required to stop net osmosis across a semi-permeable membrane into a solution', fact:'⚗️ π = iMRT (van\'t Hoff equation). Human blood has an osmotic pressure of about 7.7 atm at 37°C — equivalent to being under 80 metres of water! Intravenous fluids must be isotonic (0.9% NaCl "normal saline" or 5% glucose) to avoid lysing red blood cells. Reverse osmosis (applying pressure > π) forces water through membranes, purifying seawater for drinking.' },

  // ── HARD (level 3) ── 50 questions ───────────────────────────────────────────
  { level:3, visual:'🪨', question:'Which is the BEST example of chemical weathering of rock?', options:['Rain percolating through limestone','Cracking of rock by plant roots','Frost action'], answer:'Rain percolating through limestone', fact:'🧪 Rainwater is slightly acidic and dissolves limestone chemically — this is how caves and stalactites form!' },
  { level:3, visual:'🎨', question:'Which statement is TRUE about mixing pigments?', options:['More pigments mixed = darker result','Violet is a primary pigment color','Magenta & cyan are complementary'], answer:'More pigments mixed = darker result', fact:'🎨 Mixing pigments is subtractive — each pigment absorbs more light. Mix all colours and you get near-black!' },
  { level:3, visual:'⚙️', question:'What most directly causes actual mechanical advantage to be less than ideal mechanical advantage?', options:['Friction','Basic machine design','How machines are combined'], answer:'Friction', fact:'🔧 No machine is 100% efficient because friction always converts some energy to heat. That\'s why machines need lubrication!' },
  { level:3, visual:'💎', question:'Which property of a mineral is often the LEAST reliable for identification?', options:['Color','Specific gravity','Cleavage'], answer:'Color', fact:'🌈 Many minerals come in dozens of colours due to trace impurities. Hardness and cleavage are far more reliable!' },
  { level:3, visual:'🦠', question:'What term do microbiologists use for a bacterium with a rod shape?', options:['Bacillus','Tubular','Trichome'], answer:'Bacillus', fact:'🔬 Bacteria have three basic shapes: coccus (round), bacillus (rod), and spirillum (spiral). E. coli is a bacillus!' },
  { level:3, visual:'🧲', question:'If you randomly picked an element from the Periodic Table, what state of matter would it most likely be at room temperature?', options:['Solid','Gas','Liquid'], answer:'Solid', fact:'🧲 About 84 of the 118 elements are solid at room temperature! Only 11 are gases and just 2 (mercury and bromine) are liquids!' },
  { level:3, visual:'⚖️', question:'Which of these has the most inertia: 1 kg iron, 2 kg flour, 4 kg iron?', options:['4 kg iron','2 kg flour','1 kg iron'], answer:'4 kg iron', fact:'⚖️ Inertia depends ONLY on mass, not what the material is. 4 kg > 2 kg > 1 kg, so 4 kg iron wins. F = ma — more mass means more force needed to accelerate!' },
  { level:3, visual:'🌬️', question:'What is the Polar Jet Stream?', options:['High-altitude wind marking the boundary between polar and warm air','Ocean current in the North Atlantic','Trade wind in the tropics'], answer:'High-altitude wind marking the boundary between polar and warm air', fact:'🌬️ The jet stream flows 9–12 km up at speeds up to 400 km/h! It steers weather systems across North America and Europe!' },
  { level:3, visual:'🐾', question:'In the taxonomic name Homo sapiens, what rank does "sapiens" represent?', options:['Species','Genus','Family'], answer:'Species', fact:'🐾 "Homo" is the genus, "sapiens" is the species. Full classification: Kingdom Animalia → Phylum Chordata → Class Mammalia → Order Primates → Family Hominidae → Genus Homo → Species sapiens!' },
  { level:3, visual:'🗺️', question:'Jeff walks 100 metres west, then 150 metres east. What is the magnitude of his displacement in metres?', options:['50','250','100'], answer:'50', fact:'🗺️ Displacement is the straight-line distance from start to finish. He ends 50 m east of his start. Distance travelled = 250 m, but displacement = 50 m!' },
  // 40 NEW HARD questions
  { level:3, visual:'⚛️', question:'In quantum mechanics, what principle states that you cannot simultaneously know the exact position and exact momentum of a particle?', options:['Heisenberg Uncertainty Principle','Pauli Exclusion Principle','de Broglie relation'], answer:'Heisenberg Uncertainty Principle', fact:'⚛️ Heisenberg\'s Uncertainty Principle (ΔxΔp ≥ ħ/2) is not about measurement errors — it reflects the fundamental wave-like nature of matter. The more precisely you know position, the less precisely you can know momentum!' },
  { level:3, visual:'☢️', question:'In nuclear fission of uranium-235, a neutron is absorbed and the nucleus splits into smaller nuclei. What else is released that sustains a chain reaction?', options:['More neutrons','Alpha particles','Gamma rays only'], answer:'More neutrons', fact:'☢️ Each fission event releases 2–3 neutrons which can trigger further fissions — a chain reaction. The critical mass of U-235 needed for an uncontrolled chain reaction is about 52 kg in a sphere!' },
  { level:3, visual:'🌌', question:'According to Einstein\'s Special Relativity, what happens to time for an observer moving at very high speed relative to a stationary observer?', options:['Time passes more slowly for the moving observer','Time passes more quickly for the moving observer','Time is not affected by speed'], answer:'Time passes more slowly for the moving observer', fact:'⏱️ Time dilation: moving clocks run slow! GPS satellites travel fast enough that their onboard clocks lose about 7 microseconds per day due to velocity — this is corrected for so your GPS stays accurate!' },
  { level:3, visual:'🧬', question:'During DNA replication, which enzyme synthesises new DNA strands by adding complementary nucleotides?', options:['DNA polymerase','Helicase','Ligase'], answer:'DNA polymerase', fact:'🧬 Helicase unzips the double helix, DNA polymerase builds new strands (always 5\'→3\'), and ligase seals gaps. DNA polymerase also proofreads its work, reducing errors to about 1 in a billion base pairs!' },
  { level:3, visual:'🌟', question:'What is the sequence of stellar evolution for a star like our Sun after it exhausts its core hydrogen?', options:['Red giant → planetary nebula → white dwarf','Red giant → supernova → neutron star','Main sequence → black hole → white dwarf'], answer:'Red giant → planetary nebula → white dwarf', fact:'⭐ When the Sun\'s core hydrogen is exhausted in ~5 billion years, it will swell into a red giant (engulfing Earth), then shed its outer layers as a planetary nebula, leaving a hot white dwarf — a city-sized cinder!' },
  { level:3, visual:'🧪', question:'What is the oxidation state of sulfur in sulfuric acid (H₂SO₄)?', options:['+6','+4','-2'], answer:'+6', fact:'⚗️ In H₂SO₄: H is +1 (×2 = +2), O is -2 (×4 = -8), so S must be +6 for the molecule to be neutral (+2 + S + (-8) = 0 → S = +6). Sulfur can range from -2 to +6 in its compounds!' },
  { level:3, visual:'🌊', question:'Bernoulli\'s principle states that in a fluid, as speed increases, pressure does what?', options:['Decreases','Increases','Stays the same'], answer:'Decreases', fact:'✈️ Bernoulli\'s principle explains lift on aircraft wings — air moves faster over the curved upper surface, creating lower pressure above the wing and higher pressure below, generating lift!' },
  { level:3, visual:'🌍', question:'What term describes the current geologic eon, which began about 541 million years ago and is characterised by abundant animal life?', options:['Phanerozoic','Proterozoic','Hadean'], answer:'Phanerozoic', fact:'🌍 Phanerozoic means "visible life" in Greek. It is divided into three eras: Paleozoic (ancient life), Mesozoic (middle life — dinosaurs), and Cenozoic (recent life — mammals). We live in the Cenozoic!' },
  { level:3, visual:'🧬', question:'In transcription, DNA is used as a template to produce what molecule?', options:['mRNA','tRNA','Protein'], answer:'mRNA', fact:'🧬 Transcription happens in the nucleus: RNA polymerase reads the DNA template and synthesises messenger RNA. The mRNA then travels to the ribosome for translation into protein — the central dogma of molecular biology!' },
  { level:3, visual:'🌡️', question:'The Second Law of Thermodynamics states that in any spontaneous process, the total entropy of the universe does what?', options:['Increases','Decreases','Stays the same'], answer:'Increases', fact:'♨️ Entropy is a measure of disorder. The Second Law means heat never spontaneously flows from cold to hot, and no heat engine is perfectly efficient. It is sometimes said: "You can\'t win, you can\'t break even, and you can\'t quit!"' },
  { level:3, visual:'⚗️', question:'What is the half-life of a radioactive isotope?', options:['The time for half of a sample to decay','The time for all atoms to decay','The energy released per decay event'], answer:'The time for half of a sample to decay', fact:'☢️ After one half-life, 50% remains. After two, 25%. After ten half-lives, only 0.1% remains. Carbon-14 (half-life 5,730 years) is used to date organic material up to about 50,000 years old!' },
  { level:3, visual:'🔭', question:'Hubble\'s Law states that galaxies are receding from us at speeds proportional to their distance. What does this imply about the universe?', options:['The universe is expanding','The universe is static','The universe is contracting'], answer:'The universe is expanding', fact:'🌌 Hubble found that distant galaxies show redshifted light — their light is stretched to longer wavelengths as space expands. Running the expansion backwards leads to the Big Bang, about 13.8 billion years ago!' },
  { level:3, visual:'🧪', question:'In electrochemistry, oxidation occurs at the anode. What occurs at the cathode?', options:['Reduction','Oxidation','Neutralisation'], answer:'Reduction', fact:'⚗️ Remember OIL RIG: Oxidation Is Loss (of electrons), Reduction Is Gain. In a battery, at the cathode (positive terminal), metal ions gain electrons and are deposited. This is how copper is electroplated!' },
  { level:3, visual:'🌊', question:'According to Pascal\'s Law, pressure applied to an enclosed fluid is transmitted equally in all directions. This principle is used in which device?', options:['Hydraulic press','Centrifuge','Venturi meter'], answer:'Hydraulic press', fact:'🔧 Pascal\'s Law means a small force on a small piston creates the same pressure transmitted to a large piston — multiplying force. Hydraulic brakes, car lifts, and digger arms all use this principle!' },
  { level:3, visual:'🌌', question:'What type of galaxy has a flat disk with spiral arms containing young blue stars, gas, and dust?', options:['Spiral galaxy','Elliptical galaxy','Irregular galaxy'], answer:'Spiral galaxy', fact:'🌌 Our Milky Way is a barred spiral galaxy about 100,000 light-years across containing 200–400 billion stars. Elliptical galaxies are older, rounder, and contain mostly old red stars with little gas for new star formation!' },
  { level:3, visual:'🧬', question:'What does CRISPR-Cas9 do at the molecular level?', options:['Cuts DNA at a specific sequence guided by RNA','Inserts new genes randomly into chromosomes','Transcribes DNA into RNA using protein guides'], answer:'Cuts DNA at a specific sequence guided by RNA', fact:'✂️ CRISPR-Cas9 uses a guide RNA to direct the Cas9 protein to a precise DNA sequence, where it acts as molecular scissors. The 2020 Nobel Prize in Chemistry was awarded to Doudna and Charpentier for developing this tool!' },
  { level:3, visual:'🌊', question:'Archimedes\' principle states that a submerged object experiences a buoyant force equal to what?', options:['The weight of fluid it displaces','Its own weight','The product of its volume and density'], answer:'The weight of fluid it displaces', fact:'🛁 Archimedes allegedly shouted "Eureka!" when he realised this in his bath. A steel ship floats because its hull displaces a weight of water greater than the ship\'s own weight — the average density of the whole ship is less than water!' },
  { level:3, visual:'⚛️', question:'What is the de Broglie wavelength concept?', options:['All matter has wave-like properties with wavelength inversely proportional to momentum','Light can only travel as discrete particles called photons','Electrons orbit the nucleus in fixed energy levels'], answer:'All matter has wave-like properties with wavelength inversely proportional to momentum', fact:'⚛️ λ = h/p (de Broglie, 1924). A baseball has a wavelength of ~10⁻³⁴ m — immeasurably small. But electrons have measurable wavelengths, enabling electron microscopy to image individual atoms!' },
  { level:3, visual:'🌍', question:'What drives the thermohaline circulation (global ocean conveyor belt)?', options:['Differences in water temperature and salinity','Tidal forces from the Moon','Wind patterns at the ocean surface only'], answer:'Differences in water temperature and salinity', fact:'🌊 Cold, salty water is denser and sinks — warm, fresh water rises. This global conveyor belt redistributes heat worldwide and takes about 1,000 years to complete a circuit. Its weakening could drastically alter Europe\'s climate!' },
  { level:3, visual:'🌿', question:'In ecological succession, what is the term for the stable, long-term community that develops at the end of succession in a given environment?', options:['Climax community','Pioneer species','Secondary succession'], answer:'Climax community', fact:'🌿 Primary succession begins on bare rock (no soil); secondary succession follows disturbance where soil remains. Lichens are classic pioneer species in primary succession — they slowly break down rock to form soil!' },
  { level:3, visual:'🧪', question:'What is the functional group that characterises all carboxylic acids?', options:['-COOH (carboxyl group)','-OH (hydroxyl group)','-NH₂ (amino group)'], answer:'-COOH (carboxyl group)', fact:'⚗️ The -COOH group makes carboxylic acids acidic — the hydrogen can be donated as H⁺. Acetic acid (vinegar), citric acid (lemons), and amino acids all contain this group. Amino acids have both -COOH and -NH₂!' },
  { level:3, visual:'☢️', question:'What is the difference between nuclear fission and nuclear fusion?', options:['Fission splits heavy nuclei; fusion joins light nuclei','Fission joins nuclei; fusion splits nuclei','Fission uses hydrogen; fusion uses uranium'], answer:'Fission splits heavy nuclei; fusion joins light nuclei', fact:'☀️ The Sun runs on fusion — hydrogen nuclei fuse into helium, releasing enormous energy. Fission powers nuclear reactors. Fusion releases ~4× more energy per kilogram than fission and produces no long-lived radioactive waste!' },
  { level:3, visual:'🔭', question:'What is the Chandrasekhar limit, approximately 1.4 solar masses?', options:['Maximum mass a white dwarf star can have before collapsing','Minimum mass a star needs to form','Maximum mass of a neutron star'], answer:'Maximum mass a white dwarf star can have before collapsing', fact:'⭐ If a white dwarf exceeds ~1.4 solar masses (by accreting matter from a companion star), electron degeneracy pressure can no longer support it and it explodes as a Type Ia supernova — a standard candle used to measure cosmic distances!' },
  { level:3, visual:'🧬', question:'During meiosis, what event in prophase I increases genetic diversity by exchanging segments between homologous chromosomes?', options:['Crossing over (recombination)','Independent assortment','Synapsis only'], answer:'Crossing over (recombination)', fact:'🧬 Crossing over shuffles alleles between maternal and paternal chromosomes, creating new combinations of genes. Combined with independent assortment, meiosis can theoretically generate over 8 million genetically unique gametes from one human!' },
  { level:3, visual:'🌡️', question:'What does the First Law of Thermodynamics state?', options:['Energy cannot be created or destroyed, only converted between forms','Entropy of the universe always increases','Heat flows from hot to cold spontaneously'], answer:'Energy cannot be created or destroyed, only converted between forms', fact:'⚡ The First Law is conservation of energy: ΔU = Q − W (change in internal energy = heat added minus work done by the system). Every joule of chemical energy in your food eventually becomes heat!' },
  { level:3, visual:'🌍', question:'What is the approximate age of Earth, based on radiometric dating of the oldest meteorites?', options:['4.54 billion years','13.8 billion years','540 million years'], answer:'4.54 billion years', fact:'🌍 Earth and the rest of the solar system formed from a collapsing cloud of gas and dust about 4.54 billion years ago. The oldest known Earth rocks are ~4.0 billion years old; the universe itself is about 13.8 billion years old!' },
  { level:3, visual:'📐', question:'Using the quadratic formula, what are the solutions to x² - 5x + 6 = 0?', options:['x = 2 and x = 3','x = -2 and x = -3','x = 1 and x = 6'], answer:'x = 2 and x = 3', fact:'📐 x = [-b ± √(b²-4ac)] / 2a. With a=1, b=-5, c=6: discriminant = 25-24 = 1, so x = (5±1)/2 → x=3 or x=2. You can also factor: (x-2)(x-3)=0!' },
  { level:3, visual:'🌊', question:'In the carbon cycle, what process by which ocean water absorbs CO₂ directly from the atmosphere is enhanced at lower temperatures?', options:['Gas solubility (Henry\'s Law)','Photosynthesis','Calcification'], answer:'Gas solubility (Henry\'s Law)', fact:'🌊 Cold polar oceans absorb far more CO₂ than warm tropical oceans because gas solubility increases as temperature decreases (Henry\'s Law). As oceans warm, they absorb less CO₂ — a dangerous positive feedback for climate change!' },
  { level:3, visual:'🧪', question:'What is the pH of a solution with a hydrogen ion concentration of 1 × 10⁻⁴ mol/L?', options:['4','10','-4'], answer:'4', fact:'⚗️ pH = -log[H⁺] = -log(10⁻⁴) = 4. The negative logarithm makes the pH scale practical: a [H⁺] of 0.0001 M becomes simply pH 4. Black coffee has a pH of about 5, and battery acid about 1!' },
  { level:3, visual:'⚛️', question:'The photoelectric effect, explained by Einstein in 1905, showed that light behaves as particles called what?', options:['Photons','Electrons','Neutrinos'], answer:'Photons', fact:'⚛️ Einstein showed that light energy comes in discrete packets (quanta) — photons. This won him the Nobel Prize in 1921 (not relativity!). The photoelectric effect is used in solar cells, digital cameras, and LED lights.' },
  { level:3, visual:'🌿', question:'What is the approximate efficiency of energy transfer between trophic levels in a food chain (the "10% rule")?', options:['10%','50%','1%'], answer:'10%', fact:'🌿 Only about 10% of energy stored in one trophic level transfers to the next — the rest is lost as heat through metabolism. This is why a food chain rarely has more than 4–5 levels and why feeding more people requires fewer trophic levels (eating plants is more efficient than eating meat)!' },
  { level:3, visual:'🧬', question:'What is the name for a mutation where one or two base pairs are inserted or deleted, shifting the entire reading frame of a gene?', options:['Frameshift mutation','Point mutation','Silent mutation'], answer:'Frameshift mutation', fact:'🧬 Because codons are read in groups of 3, inserting or deleting a single base shifts every subsequent codon, usually producing a completely nonfunctional protein. Adding or deleting multiples of 3 avoids a frameshift!' },
  { level:3, visual:'🌍', question:'What is the name for the proposed geological epoch defined by significant human impact on Earth\'s systems, beginning roughly in the mid-20th century?', options:['Anthropocene','Holocene','Pleistocene'], answer:'Anthropocene', fact:'🌍 The Holocene (our current epoch) began ~11,700 years ago after the last ice age. Many scientists argue we have entered the Anthropocene, marked by radioactive fallout from nuclear tests, plastic pollution, and accelerating species extinction.' },
  { level:3, visual:'📐', question:'What is log₂(64)?', options:['6','32','8'], answer:'6', fact:'📐 log₂(64) asks: "2 to what power equals 64?" 2⁶ = 64, so the answer is 6. Logarithms are used in the Richter scale for earthquakes, the decibel scale for sound, and the pH scale — all are logarithmic!' },
  { level:3, visual:'⚛️', question:'What is E=mc² used to calculate in nuclear reactions?', options:['Energy released when mass is converted','Speed of light from energy','Mass of a photon'], answer:'Energy released when mass is converted', fact:'⭐ Einstein\'s mass-energy equivalence: even tiny amounts of mass hold enormous energy. Fission of 1 kg of uranium releases about 80 terajoules — equivalent to 20,000 tonnes of TNT. The c² (9×10¹⁶ m²/s²) is an enormous multiplier!' },
  { level:3, visual:'🌊', question:'In fluid mechanics, what is the continuity equation for an incompressible fluid flowing through a pipe of varying cross-section?', options:['A₁v₁ = A₂v₂ (flow rate is constant)','P₁ + ½ρv₁² = P₂ + ½ρv₂²','F = ρVg'], answer:'A₁v₁ = A₂v₂ (flow rate is constant)', fact:'💧 The continuity equation expresses conservation of mass for flowing fluids. Where a pipe narrows, fluid speeds up — like water speeding up at a hose nozzle. This is also why blood moves fastest through narrow capillaries!' },
  { level:3, visual:'🌡️', question:'What property of a material describes its resistance to temperature change — the amount of heat needed to raise 1 kg by 1°C?', options:['Specific heat capacity','Thermal conductivity','Latent heat'], answer:'Specific heat capacity', fact:'🌡️ Water has an exceptionally high specific heat capacity (4,186 J/kg·°C) — it takes a lot of energy to heat it. This stabilises Earth\'s climate: coastal regions have milder temperatures than inland areas because the ocean resists temperature change!' },
  { level:3, visual:'🧬', question:'In the lac operon model of gene regulation in bacteria, what molecule acts as an inducer that deactivates the repressor protein?', options:['Allolactose','Lactose','Glucose'], answer:'Allolactose', fact:'🧬 When lactose is present, it is converted to allolactose, which binds the lac repressor and prevents it from blocking transcription — the genes for lactose digestion are switched on. Jacob and Monod won the 1965 Nobel Prize for this discovery!' },
  { level:3, visual:'📐', question:'In a right triangle, if one acute angle is 30°, what is the ratio of the side opposite that angle to the hypotenuse (sin 30°)?', options:['0.5 (1/2)','0.866 (√3/2)','1.0'], answer:'0.5 (1/2)', fact:'📐 sin 30° = 1/2 is one of the exact trigonometric values worth memorising. In a 30-60-90 triangle, the sides are in ratio 1:√3:2. Trigonometry was first developed by Greek astronomers to measure celestial distances!' },
  { level:3, visual:'🌌', question:'What is the Schwarzschild radius, related to black holes?', options:['The radius at which escape velocity equals the speed of light','The radius of a neutron star\'s core','The distance at which gravity follows an inverse-square law'], answer:'The radius at which escape velocity equals the speed of light', fact:'🌑 If you compressed the Sun to a sphere with radius ~3 km (its Schwarzschild radius), it would become a black hole. Earth\'s Schwarzschild radius is about 9 mm — about the size of a marble! Nothing, not even light, can escape once inside.' },

  // ── HARD (level 3) additional questions ──────────────────────────────────────
  { level:3, visual:'🧬', question:'What are the four stages of cellular respiration in the correct order?', options:['Glycolysis → Pyruvate oxidation → Krebs cycle → Electron transport chain','Krebs cycle → Glycolysis → Electron transport chain → Pyruvate oxidation','Glycolysis → Krebs cycle → Pyruvate oxidation → Electron transport chain'], answer:'Glycolysis → Pyruvate oxidation → Krebs cycle → Electron transport chain', fact:'⚡ Glycolysis (cytoplasm, 2 ATP net) → Pyruvate decarboxylation (mitochondrial matrix) → Krebs/citric acid cycle (4 ATP + many NADH/FADH₂) → ETC/oxidative phosphorylation (~32 ATP). The ETC uses the NADH and FADH₂ as electron carriers to drive ATP synthase via a proton gradient — chemiosmosis!' },
  { level:3, visual:'⚛️', question:'What are the four quantum numbers and what does each describe?', options:['n (principal/energy level), l (orbital shape), mₗ (orbital orientation), mₛ (electron spin)','n (mass number), l (angular momentum), mₗ (magnetic moment), mₛ (charge)','p (principal), s (spin), d (orbital), f (energy)'], answer:'n (principal/energy level), l (orbital shape), mₗ (orbital orientation), mₛ (electron spin)', fact:'⚛️ n = 1,2,3... (shell); l = 0 to n-1 (s,p,d,f subshells); mₗ = -l to +l (which orbital); mₛ = +½ or -½ (spin up or down). The Pauli Exclusion Principle states no two electrons in an atom can have the same set of four quantum numbers!' },
  { level:3, visual:'🌍', question:'What is stellar nucleosynthesis?', options:['The process by which nuclear reactions inside stars create heavier elements from hydrogen and helium','The process by which stars form from nebulae','The mechanism by which black holes emit Hawking radiation'], answer:'The process by which nuclear reactions inside stars create heavier elements from hydrogen and helium', fact:'⭐ Fred Hoyle (1954) showed that all elements heavier than hydrogen and helium were forged inside stars. Carbon, oxygen, and nitrogen form in main-sequence stars; elements up to iron form in massive stars. Elements heavier than iron require the violent conditions of supernovae. We are literally made of stardust!' },
  { level:3, visual:'🧪', question:'What is the VSEPR theory used for?', options:['Predicting the 3D shape of molecules based on electron pair repulsion','Calculating the bond energy of covalent compounds','Determining the oxidation state of elements in compounds'], answer:'Predicting the 3D shape of molecules based on electron pair repulsion', fact:'🔬 VSEPR (Valence Shell Electron Pair Repulsion): electron pairs around a central atom repel each other and arrange to maximise separation. Methane (CH₄) is tetrahedral (109.5°). Water (H₂O) has 2 bonding + 2 lone pairs → bent (104.5°). Ammonia (NH₃) is trigonal pyramidal (107°). Lone pairs repel more than bonding pairs!' },
  { level:3, visual:'🌌', question:'What is dark matter?', options:['Undetected matter that does not emit or absorb light but exerts gravitational effects','The matter found in the darkest regions of space far from stars','Matter inside black holes beyond the event horizon'], answer:'Undetected matter that does not emit or absorb light but exerts gravitational effects', fact:'🌌 About 27% of the universe\'s energy-mass content is dark matter. Evidence includes galaxy rotation curves (stars orbit too fast for visible matter alone), gravitational lensing anomalies, and structure formation. Despite decades of searching, dark matter\'s nature remains unknown — it is not any known particle!' },
  { level:3, visual:'⚗️', question:'What is the standard reduction potential (E°) used to determine in electrochemistry?', options:['The tendency of a species to be reduced (gain electrons), measured relative to the standard hydrogen electrode','The total energy released in a redox reaction','The pH at which a metal will dissolve in acid'], answer:'The tendency of a species to be reduced (gain electrons), measured relative to the standard hydrogen electrode', fact:'⚗️ Species with higher (more positive) E° are stronger oxidising agents. Cell voltage E°cell = E°cathode − E°anode. F₂ (E° = +2.87V) is the strongest oxidising agent; Li (E° = -3.05V) is the strongest reducing agent. Positive E°cell means the reaction is spontaneous!' },
  { level:3, visual:'🧬', question:'What is apoptosis?', options:['Programmed cell death — an ordered process of cell self-destruction essential for development and homeostasis','Cell death caused by external injury or toxins','Rapid uncontrolled cell division (cancer)'], answer:'Programmed cell death — an ordered process of cell self-destruction essential for development and homeostasis', fact:'🔬 Apoptosis eliminates damaged cells, shapes developing organs (e.g., finger separation — webbing is removed between digits), and kills cells infected by viruses. Caspase enzymes execute the program. Cancer cells often evade apoptosis, and excessive apoptosis occurs in neurodegenerative diseases like Alzheimer\'s.' },
  { level:3, visual:'🌊', question:'What is the Navier-Stokes equation used to describe?', options:['The motion of viscous fluid substances','The propagation of electromagnetic waves in media','The quantum state of a particle in a potential well'], answer:'The motion of viscous fluid substances', fact:'🌊 The Navier-Stokes equations (1822–1845) describe how fluids (liquids and gases) move under pressure, viscosity, and external forces. They are used to model weather, aircraft aerodynamics, blood flow, and ocean currents. Whether general smooth solutions always exist is one of the unsolved "Millennium Prize Problems" in mathematics!' },
  { level:3, visual:'⚛️', question:'In the photoelectric effect, what determines whether electrons are emitted from a metal surface?', options:['The frequency (not intensity) of light must exceed a threshold value','The intensity (not frequency) of light determines emission','Both frequency and intensity must exceed minimum values'], answer:'The frequency (not intensity) of light must exceed a threshold value', fact:'⚛️ Einstein (1905) explained: light comes in quanta (photons) with energy E = hf. If hf < work function (binding energy of electron), no electrons are emitted regardless of brightness. This proved light has particle nature and earned Einstein the 1921 Nobel Prize. It is the basis of solar cells and digital cameras!' },
  { level:3, visual:'🌍', question:'What are the five major mass extinction events in Earth\'s history?', options:['Ordovician-Silurian, Late Devonian, Permian-Triassic (biggest), Triassic-Jurassic, Cretaceous-Paleogene','Cambrian, Devonian, Carboniferous, Triassic, Cretaceous','Precambrian, Cambrian, Jurassic, Cretaceous, Holocene'], answer:'Ordovician-Silurian, Late Devonian, Permian-Triassic (biggest), Triassic-Jurassic, Cretaceous-Paleogene', fact:'🌍 The Permian-Triassic extinction (~252 Ma) wiped out ~96% of marine species — the largest mass extinction ever. The K-Pg extinction (~66 Ma) killed the non-avian dinosaurs, likely triggered by a 10-km asteroid impact at Chicxulub, Mexico, combined with massive Deccan Traps volcanism.' },
  { level:3, visual:'🧪', question:'What is the relationship described by the Gibbs free energy equation ΔG = ΔH - TΔS?', options:['ΔG predicts spontaneity: negative ΔG means spontaneous; positive means non-spontaneous','ΔG measures the activation energy of a reaction','ΔG equals the total heat released in a reaction at constant pressure'], answer:'ΔG predicts spontaneity: negative ΔG means spontaneous; positive means non-spontaneous', fact:'⚗️ Josiah Willard Gibbs (1870s): ΔG = ΔH − TΔS. Spontaneous processes minimise G. If ΔH < 0 (exothermic) and ΔS > 0 (entropy increases), always spontaneous. If ΔH > 0 and ΔS < 0, never spontaneous. Temperature determines spontaneity for mixed cases. ΔG° also relates to equilibrium constant: ΔG° = −RT ln K.' },
  { level:3, visual:'🧬', question:'What is the central dogma of molecular biology?', options:['DNA → RNA → Protein (information flows from DNA to RNA to protein)','Protein → RNA → DNA (reverse translation)','DNA → Protein directly without RNA intermediate'], answer:'DNA → RNA → Protein (information flows from DNA to RNA to protein)', fact:'🧬 Francis Crick coined "central dogma" in 1958: genetic information flows from DNA (replication and transcription) to RNA to protein (translation). Retroviruses (like HIV) use reverse transcriptase to convert RNA back to DNA — a "violation" of the dogma in special cases!' },
  { level:3, visual:'🌊', question:'What is the concept of gravitational waves?', options:['Ripples in the curvature of spacetime produced by accelerating masses','Electromagnetic radiation produced by orbiting binary stars','Acoustic waves transmitted through planetary cores'], answer:'Ripples in the curvature of spacetime produced by accelerating masses', fact:'🌌 Einstein predicted gravitational waves in 1916 as part of General Relativity. They were first directly detected by LIGO on September 14, 2015 — from two merging black holes 1.3 billion light-years away. The waves caused LIGO\'s 4-km arms to stretch and compress by less than 1/1000 the width of a proton!' },
  { level:3, visual:'⚛️', question:'What is meant by the binding energy of an atomic nucleus?', options:['The energy required to completely separate all nucleons; the mass defect times c²','The energy of the outermost electrons','The energy released when an atom forms chemical bonds'], answer:'The energy required to completely separate all nucleons; the mass defect times c²', fact:'☢️ A nucleus weighs less than the sum of its separated protons and neutrons — this "mass defect" is converted to binding energy (E = Δmc²). Iron-56 has the highest binding energy per nucleon — the most stable nucleus. Fission of uranium and fusion of hydrogen both release energy because they move nuclei toward this peak!' },
  { level:3, visual:'🌍', question:'What is the concept of exoplanet detection via the transit method?', options:['Measuring the slight dimming of a star as a planet passes in front of it','Measuring the wobble of a star caused by a planet\'s gravity','Directly imaging the planet with a large telescope'], answer:'Measuring the slight dimming of a star as a planet passes in front of it', fact:'🔭 The Kepler Space Telescope discovered thousands of exoplanets using transits. When a planet crosses its star, it blocks a tiny fraction of light (0.01%–1%). From the depth and duration of the dip, astronomers can calculate the planet\'s size and orbital period. Over 5,500 exoplanets have now been confirmed!' },
  { level:3, visual:'🧪', question:'What is the colligative property of boiling point elevation?', options:['Dissolving a solute in a solvent raises the boiling point in proportion to the number of solute particles','The boiling point increases only for ionic solutes, not molecular ones','The boiling point increases with the mass of solute regardless of number of particles'], answer:'Dissolving a solute in a solvent raises the boiling point in proportion to the number of solute particles', fact:'⚗️ ΔTb = Kb × m × i, where Kb is the ebullioscopic constant, m is molality, and i is the van\'t Hoff factor (number of particles per formula unit). Salt (NaCl, i=2) raises boiling point twice as much per mole as sugar (i=1). This is why salting pasta water raises the boiling point — though only slightly!' },
  { level:3, visual:'🧬', question:'What is epigenetics?', options:['Heritable changes in gene expression that do not involve changes to the DNA sequence itself','Mutations in DNA caused by environmental factors','The study of gene regulation by transcription factors only'], answer:'Heritable changes in gene expression that do not involve changes to the DNA sequence itself', fact:'🧬 Epigenetic mechanisms include DNA methylation (silencing genes by adding methyl groups to cytosines) and histone modification (controlling how tightly DNA is wrapped, affecting access for transcription). Identical twins can develop different epigenetic patterns over time, explaining why they can differ in disease susceptibility. Some epigenetic changes are heritable across generations!' },
  { level:3, visual:'🌌', question:'What are pulsars?', options:['Rapidly rotating neutron stars emitting beams of electromagnetic radiation like a cosmic lighthouse','Pulsating variable stars that expand and contract regularly','White dwarfs that periodically flare in X-ray emission'], answer:'Rapidly rotating neutron stars emitting beams of electromagnetic radiation like a cosmic lighthouse', fact:'🌌 Pulsars were discovered by Jocelyn Bell Burnell in 1967. They rotate up to 700 times per second (millisecond pulsars) with extraordinary regularity — some are more accurate than atomic clocks! The first discovered pulsar was initially nicknamed "LGM-1" (Little Green Men) because the signal seemed too regular to be natural.' },
  { level:3, visual:'⚗️', question:'What is molecular orbital (MO) theory?', options:['Atomic orbitals combine to form molecular orbitals (bonding and antibonding) spread over the whole molecule','Electrons in molecules stay in atomic orbitals but shared between atoms','Molecular shape is determined by electron pair repulsion alone'], answer:'Atomic orbitals combine to form molecular orbitals (bonding and antibonding) spread over the whole molecule', fact:'⚛️ MO theory explains properties valence bond theory cannot. When two H 1s orbitals combine, they form a σ (bonding) and σ* (antibonding) MO. Filling bonding MOs stabilises the molecule; filling antibonding MOs destabilises. MO theory correctly predicts that O₂ is paramagnetic (has unpaired electrons) — something Lewis structures get wrong!' },
  { level:3, visual:'🌍', question:'What are the climate forcings that drive long-term ice age cycles (Milankovitch cycles)?', options:['Variations in Earth\'s orbital eccentricity, axial tilt, and precession','Changes in solar luminosity only','Volcanic eruptions and asteroid impacts'], answer:'Variations in Earth\'s orbital eccentricity, axial tilt, and precession', fact:'🌍 Milutin Milanković (1920s) proposed three orbital cycles: eccentricity (~100,000 yr period), obliquity/tilt (~41,000 yr), and precession (~26,000 yr). Their interaction drives glacial-interglacial cycles. The last glacial maximum was ~20,000 years ago; ice sheets covered much of North America and Europe.' },
  { level:3, visual:'🧬', question:'What is the Hardy-Weinberg equation and what does it predict?', options:['p² + 2pq + q² = 1; predicts genotype frequencies in a non-evolving population','p + q = 1; predicts allele frequencies in an evolving population','p² × q² = 0; predicts when evolution stops'], answer:'p² + 2pq + q² = 1; predicts genotype frequencies in a non-evolving population', fact:'🧬 If p = frequency of allele A and q = frequency of allele a (p + q = 1), then: p² = AA frequency, 2pq = Aa frequency, q² = aa frequency. If q² (recessive homozygotes) = 1/10,000, then q = 1/100 and p = 99/100. The carrier frequency (2pq) ≈ 2/100 = 1 in 50 — far more common than affected individuals!' },
  { level:3, visual:'🌊', question:'What is the concept of length contraction in Special Relativity?', options:['Objects moving at relativistic speeds appear shorter in the direction of motion to a stationary observer','Moving objects appear longer due to relativistic effects','Length is invariant regardless of relative motion'], answer:'Objects moving at relativistic speeds appear shorter in the direction of motion to a stationary observer', fact:'⏱️ L = L₀√(1 - v²/c²). At 86.6% the speed of light, an object appears half its rest length. At v = c, length contracts to zero — which is why nothing with mass can reach the speed of light. Length contraction and time dilation are two sides of the same relativistic coin, both consequences of the constancy of c.' },
  { level:3, visual:'🧪', question:'In coordination chemistry, what is a ligand?', options:['An ion or molecule that donates electron pairs to a central metal ion to form a complex','A metal ion that accepts electrons from surrounding molecules','A bridging atom that connects two metal centers in a polymer'], answer:'An ion or molecule that donates electron pairs to a central metal ion to form a complex', fact:'⚗️ Ligands are Lewis bases; the metal ion is a Lewis acid. Examples: Cl⁻, NH₃, H₂O, CN⁻, CO. The number of ligand attachment points is the coordination number (typically 2, 4, or 6). Haemoglobin is a coordination complex — Fe²⁺ with a porphyrin ligand — and oxygen (O₂) is an additional ligand that reversibly binds to carry oxygen in blood!' },
  { level:3, visual:'🌍', question:'What is the interstellar medium (ISM)?', options:['The gas and dust that fills the space between stars within a galaxy','The dark matter halos surrounding galaxies','The intergalactic space between galaxies'], answer:'The gas and dust that fills the space between stars within a galaxy', fact:'🌌 The ISM is about 99% gas (mostly hydrogen and helium) and 1% dust. It is extremely tenuous — the average density is about 1 atom per cubic centimeter. Dense molecular clouds in the ISM are the birthplaces of new stars. The ISM is enriched with heavy elements (metals) from supernova explosions!' },
  { level:3, visual:'🔭', question:'What are Type Ia and Type II supernovae, and how do they differ?', options:['Type Ia: thermonuclear explosion of a white dwarf; Type II: core collapse of a massive star','Type Ia: core collapse of neutron star; Type II: explosion of main sequence star','Type Ia is more energetic; Type II is less energetic — they differ only in brightness'], answer:'Type Ia: thermonuclear explosion of a white dwarf; Type II: core collapse of a massive star', fact:'⭐ Type Ia supernovae occur when a white dwarf accretes material to the Chandrasekhar limit and undergoes runaway thermonuclear fusion. Because they all have similar intrinsic brightness, they are "standard candles" used to measure cosmic distances — how Type Ia supernovae discovered the accelerating expansion of the universe and dark energy in 1998!' },
  { level:3, visual:'🧬', question:'What is the process of translation in protein synthesis?', options:['Ribosomes read mRNA codons (3-nucleotide sequences) and tRNA anticodons deliver matching amino acids to build a polypeptide','RNA polymerase reads DNA to produce mRNA','DNA polymerase copies the DNA template strand to create a complementary strand'], answer:'Ribosomes read mRNA codons (3-nucleotide sequences) and tRNA anticodons deliver matching amino acids to build a polypeptide', fact:'🧬 Translation: ribosome moves along mRNA 5\'→3\'. Each codon (64 possible) specifies one of 20 amino acids or a stop signal. Initiation begins at AUG (start codon, methionine). The genetic code is degenerate (multiple codons per amino acid) but nearly universal across all life — evidence of common ancestry!' },
  { level:3, visual:'⚛️', question:'What is pair production in particle physics?', options:['A photon with sufficient energy creates an electron-positron pair near an atomic nucleus','Two protons fuse to create a neutron and a positron','An electron and proton annihilate to produce two photons'], answer:'A photon with sufficient energy creates an electron-positron pair near an atomic nucleus', fact:'⚛️ Pair production (γ → e⁻ + e⁺) requires photon energy ≥ 2mₑc² = 1.022 MeV. It demonstrates mass-energy equivalence directly — energy converts to matter. The reverse process, pair annihilation, produces two 0.511-MeV gamma rays. PET (positron emission tomography) scans detect these annihilation photons to image the brain and tumours!' },
  { level:3, visual:'🌍', question:'What is the concept of isostasy in geology?', options:['The balance between the buoyancy of Earth\'s crust and the gravitational force of the mantle, allowing crust to "float"','The equal distribution of rock types across all continents','The process by which erosion removes material and deposition adds it in equal amounts'], answer:'The balance between the buoyancy of Earth\'s crust and the gravitational force of the mantle, allowing crust to "float"', fact:'🌍 Thick continental crust (less dense, ~2.7 g/cm³) floats higher on the denser mantle (3.3 g/cm³), like icebergs in water. Mountains have deep "roots" extending down into the mantle. When glaciers melt, the crust slowly rises (post-glacial rebound) — Scandinavia is still rising at ~1 cm/year from the last ice age!' },
  { level:3, visual:'🧪', question:'What is the mechanism of an SN2 reaction in organic chemistry?', options:['A nucleophile attacks the back of the carbon bearing the leaving group in one simultaneous step, inverting configuration','A carbocation intermediate forms first, then the nucleophile attacks','A radical intermediate attacks the substrate in two separate steps'], answer:'A nucleophile attacks the back of the carbon bearing the leaving group in one simultaneous step, inverting configuration', fact:'⚗️ SN2 = Substitution, Nucleophilic, bimolecular. The Walden inversion — the spatial arrangement at the carbon inverts like an umbrella turning inside-out. Rate depends on both nucleophile and substrate concentration. SN2 favours primary (unhindered) substrates; bulky tertiary substrates prefer SN1 (stepwise, via carbocation).' },
  { level:3, visual:'🌊', question:'What does the second law of thermodynamics imply about the efficiency of a heat engine?', options:['No heat engine can be 100% efficient because some energy must be transferred to a cold reservoir','Heat engines can be 100% efficient if no friction is present','The second law only applies to engines using fossil fuels'], answer:'No heat engine can be 100% efficient because some energy must be transferred to a cold reservoir', fact:'♨️ The Carnot efficiency η = 1 − Tc/Th (where Tc and Th are cold and hot reservoir temperatures in kelvin) is the maximum possible efficiency. A steam turbine at 600 K exhausting to 300 K can be at most 50% efficient. Real engines are less efficient due to friction and irreversibility. This is why perpetual motion machines of the second kind are impossible!' },
