  { level:1, visual:'🌊', question:'What is the difference between a physical property and a chemical property of a substance?', options:['Physical: can be observed without changing composition; Chemical: describes how the substance reacts to form new substances','Physical: measured with instruments; Chemical: observed with the naked eye','Physical: applies only to solids; Chemical: applies only to liquids and gases'], answer:'Physical: can be observed without changing composition; Chemical: describes how the substance reacts to form new substances', fact:'⚗️ Physical properties: density, colour, melting point, hardness, conductivity. Chemical properties: flammability, reactivity with acids, tendency to oxidise, corrosiveness. Iron\'s melting point (1,538°C) is physical; iron\'s tendency to rust is chemical. You can observe physical properties without creating a new substance!' },
  { level:1, visual:'🌍', question:'What type of volcano produces gentle eruptions of low-viscosity lava that spreads over large areas?', options:['Shield volcano','Stratovolcano (composite)','Cinder cone'], answer:'Shield volcano', fact:'🌋 Shield volcanoes (like those in Hawaii) have broad, gently sloping profiles resembling a warrior\'s shield. Low-viscosity basaltic lava flows easily. Stratovolcanoes (like Mt. St. Helens, Vesuvius) have steep sides, are built from alternating lava and ash layers, and erupt explosively because their high-viscosity magma traps gas.' },
  { level:1, visual:'🧬', question:'What is the approximate percentage of DNA shared between humans and chimpanzees?', options:['About 98-99%','About 85%','About 60%'], answer:'About 98-99%', fact:'🦍 Humans and chimps share ~98.8% DNA sequence identity — explaining our many similarities in anatomy, behavior, and disease. Even humans and mice share about 85% of their genes. Humans share 50% of their genes with a banana — reflecting shared ancient ancestry of all eukaryotic life!' },
  { level:1, visual:'🌡️', question:'What is the name for a graph showing the altitude vs. temperature profile of the atmosphere?', options:['Temperature lapse rate profile','Isotherm chart','Thermocline diagram'], answer:'Temperature lapse rate profile', fact:'🌬️ In the troposphere, temperature decreases with altitude at about 6.5°C/km (environmental lapse rate). In the stratosphere, temperature increases (ozone absorbs UV). The mesosphere cools again. The thermosphere and exosphere get very hot (but low density = little heat felt). This complex profile is why balloons and aircraft fly at specific altitudes!' },
  { level:1, visual:'🌊', question:'What is capillary action?', options:['The tendency of liquid to rise in narrow tubes against gravity due to adhesion and surface tension','The upward flow of water driven by root pressure in plants','The circular motion of water in ocean gyres'], answer:'The tendency of liquid to rise in narrow tubes against gravity due to adhesion and surface tension', fact:'💧 In narrow tubes (capillaries), adhesion (water sticking to tube walls) and cohesion (water molecules pulling on each other via hydrogen bonds) allow water to rise. Capillary action helps water travel from roots to leaves in plants. It also causes water to soak into cloth and paper towels!' },
  { level:1, visual:'🌿', question:'What is the role of decomposers in nutrient cycling?', options:['Break down dead organic matter, releasing nutrients back into the soil and atmosphere','Convert sunlight into chemical energy at the base of food webs','Consume primary producers, controlling plant population'], answer:'Break down dead organic matter, releasing nutrients back into the soil and atmosphere', fact:'🍄 Decomposers (bacteria and fungi) are essential recyclers. Without them, nutrients would stay locked in dead organisms and ecosystems would collapse. A single gram of forest soil contains millions of bacteria and metres of fungal hyphae. Decomposers also produce CO₂ and methane through their metabolism.' },
  { level:1, visual:'🔭', question:'What is the difference between a meteor, meteorite, and meteoroid?', options:['Meteoroid: space rock; Meteor: streak of light as it burns in atmosphere; Meteorite: rock that lands on Earth','Meteor: space rock; Meteoroid: streak of light; Meteorite: burns up completely','Meteorite: space rock; Meteor: rock that hits Earth; Meteoroid: streak of light'], answer:'Meteoroid: space rock; Meteor: streak of light as it burns in atmosphere; Meteorite: rock that lands on Earth', fact:'🌠 Meteoroids range from dust to boulders. When they enter Earth\'s atmosphere at 11–72 km/s, friction heats and vaporises them, creating the "shooting star" meteor. About 500 meteorites land on Earth per year, most in the ocean. The largest known meteorite is the Hoba (60 tonnes), found in Namibia in 1920!' },
  { level:1, visual:'⚛️', question:'What is an ion?', options:['An atom or molecule that has gained or lost electrons, giving it a net electric charge','An atom with a different number of neutrons than the most common isotope','A subatomic particle with no charge found in the nucleus'], answer:'An atom or molecule that has gained or lost electrons, giving it a net electric charge', fact:'⚗️ Positive ions (cations) form when atoms lose electrons (Na → Na⁺). Negative ions (anions) form when atoms gain electrons (Cl + e⁻ → Cl⁻). Ions are found in salts, plasma, electrolyte solutions, and are essential for nerve impulses, muscle contractions, and enzyme function in your body!' },
  { level:1, visual:'🌱', question:'What is photosynthesis at its most basic?', options:['Plants use light energy + CO₂ + H₂O to produce glucose + O₂','Plants use glucose + O₂ to produce CO₂ + H₂O + energy','Plants absorb nutrients from soil to build glucose without sunlight'], answer:'Plants use light energy + CO₂ + H₂O to produce glucose + O₂', fact:'🌿 6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂. Photosynthesis is the foundation of almost all food webs. The oxygen in Earth\'s early atmosphere was produced by ancient photosynthetic cyanobacteria about 2.4 billion years ago — the Great Oxidation Event that killed off most anaerobic life but paved the way for complex aerobic organisms!' },
  { level:1, visual:'🌍', question:'What is an aquifer?', options:['An underground layer of rock or sediment that holds and transmits groundwater','A surface lake formed in a volcanic crater','The zone just below the soil surface where moisture is retained'], answer:'An underground layer of rock or sediment that holds and transmits groundwater', fact:'💧 Aquifers are the world\'s major freshwater reserves — about 30% of Earth\'s freshwater is groundwater. Sandstone and limestone are good aquifer materials. The Ogallala Aquifer under the US Great Plains irrigates 30% of US groundwater-irrigated cropland. Many aquifers are being depleted faster than they recharge — a serious global challenge.' },
  { level:1, visual:'📐', question:'What is scientific notation, and how would you write 0.000045 in scientific notation?', options:['4.5 × 10⁻⁵','4.5 × 10⁻⁴','0.45 × 10⁻⁴'], answer:'4.5 × 10⁻⁵', fact:'📐 Scientific notation: one non-zero digit before the decimal, times a power of 10. 0.000045 = 4.5 × 10⁻⁵. Large numbers: 6.022 × 10²³ (Avogadro\'s number) is far easier to write than 602,200,000,000,000,000,000,000. Scientists use it to handle the enormous range of scales in the universe — from 10⁻³⁵ m (Planck length) to 10²⁶ m (observable universe).' },
  { level:1, visual:'🌡️', question:'What is specific heat capacity?', options:['The energy required to raise the temperature of 1 kg of a substance by 1°C','The heat released when a substance combusts completely','The temperature at which a substance changes state'], answer:'The energy required to raise the temperature of 1 kg of a substance by 1°C', fact:'🌡️ Q = mcΔT (heat = mass × specific heat × temperature change). Water\'s high specific heat (4,186 J/kg·°C) means it takes a lot of energy to change its temperature. This makes oceans great climate stabilisers. Metals have low specific heats — iron (450 J/kg·°C) heats up much faster than water!' },
  { level:1, visual:'🦴', question:'What is the function of the lymphatic system?', options:['Return excess tissue fluid to the bloodstream and help fight infection','Regulate blood glucose levels through insulin secretion','Filter toxins from the blood through specialised liver cells'], answer:'Return excess tissue fluid to the bloodstream and help fight infection', fact:'🛡️ The lymphatic system collects fluid that leaks from capillaries into tissues and returns it to the bloodstream via lymph vessels. Lymph nodes filter lymph fluid and are packed with immune cells. The spleen, thymus, and bone marrow are also part of the lymphatic/immune system.' },
  { level:1, visual:'🔬', question:'What happens to a cell placed in a hypertonic solution (higher solute concentration outside)?', options:['Water leaves the cell by osmosis, causing it to shrink (crenation in animal cells; plasmolysis in plant cells)','Water enters the cell by osmosis, causing it to swell','No net movement of water occurs because equilibrium already exists'], answer:'Water leaves the cell by osmosis, causing it to shrink (crenation in animal cells; plasmolysis in plant cells)', fact:'💧 Osmosis always moves water toward higher solute concentration. Hypertonic solution: cell loses water and shrinks. Hypotonic solution: cell gains water and may burst (lysis). Isotonic: no net movement. This is why drinking seawater dehydrates you — it draws water out of cells!' },
  { level:1, visual:'🌍', question:'What is a biome?', options:['A large geographic area defined by its characteristic climate and dominant organisms','A single ecosystem within a forest or grassland','An area with exceptionally high biodiversity'], answer:'A large geographic area defined by its characteristic climate and dominant organisms', fact:'🌍 Major biomes include: tropical rainforest, savanna, desert, temperate forest, boreal forest (taiga), tundra, grassland, and various aquatic biomes. Biomes are primarily determined by temperature and precipitation. The same biome type can appear on different continents — deserts in Africa, Asia, and North America share similar plant and animal adaptations.' },
  { level:1, visual:'⚗️', question:'What is the difference between an exothermic and an endothermic reaction?', options:['Exothermic releases heat to surroundings (ΔH < 0); Endothermic absorbs heat from surroundings (ΔH > 0)','Exothermic absorbs heat; Endothermic releases heat','Exothermic produces light; Endothermic produces electricity'], answer:'Exothermic releases heat to surroundings (ΔH < 0); Endothermic absorbs heat from surroundings (ΔH > 0)', fact:'🔥 Combustion, neutralisation, and respiration are exothermic. Photosynthesis and dissolving ammonium nitrate in water are endothermic (cold packs use this!). Hand warmers use the exothermic oxidation of iron powder. Most spontaneous chemical reactions are exothermic, though not all — some endothermic processes are entropically driven.' },
  { level:1, visual:'🌊', question:'What is the name for the point at which a straight line crosses the y-axis in a graph?', options:['y-intercept','x-intercept','Slope'], answer:'y-intercept', fact:'📐 In the equation y = mx + b, m is the slope (rise/run) and b is the y-intercept (where x = 0). Slope-intercept form is used to analyse experimental data. A positive slope means as x increases, y increases. A zero slope is a horizontal line — no relationship between x and y.' },
  { level:1, visual:'🧬', question:'What is the function of the cell membrane?', options:['Controls what enters and exits the cell (selective permeability); separates cell interior from environment','Provides rigid support to maintain cell shape','Stores genetic information and controls gene expression'], answer:'Controls what enters and exits the cell (selective permeability); separates cell interior from environment', fact:'🔬 The cell membrane is a phospholipid bilayer — two layers of phospholipid molecules with their hydrophobic tails facing inward and hydrophilic heads facing outward. Proteins embedded in the membrane act as channels, pumps, and receptors. The fluid mosaic model (Singer & Nicolson, 1972) describes its structure.' },

  // ── MEDIUM (level 2) ── 50 questions ─────────────────────────────────────────
  { level:2, visual:'⚙️', question:'Mary pushes her 2,000-newton couch with 500 newtons of force but it doesn\'t move. How much work did she do?', options:['0 joules','500 joules','2,000 joules'], answer:'0 joules', fact:'💡 Work = Force × Distance. If the object doesn\'t move, distance = 0, so work = 0 — even if you push hard!' },
  { level:2, visual:'🦕', question:'Which of the following fossils is the oldest?', options:['Trilobite','Snake','Megalodon tooth'], answer:'Trilobite', fact:'🦕 Trilobites lived over 250 million years ago, long before dinosaurs! They went extinct in the Permian mass extinction.' },
  { level:2, visual:'💎', question:'Which of the following is NOT a mineral?', options:['Basalt','Quartz','Diamond'], answer:'Basalt', fact:'🌋 Basalt is a rock made of many minerals — quartz and diamond are single minerals. Rocks ≠ minerals!' },
  { level:2, visual:'🌋', question:'Which region of planet Earth is the hottest?', options:['Inner core','Outer core','The mantle'], answer:'Inner core', fact:'🔥 Earth\'s inner core reaches about 5,400°C — as hot as the surface of the Sun! It stays solid due to enormous pressure.' },
  { level:2, visual:'🧠', question:'Which substance is the most common source of energy for human brain cells?', options:['Glucose','Proteins','Nucleic acids'], answer:'Glucose', fact:'🍬 Your brain runs on glucose (sugar) and uses about 20% of your body\'s energy even though it\'s only 2% of your weight!' },
  { level:2, visual:'❤️', question:'Most of the human heart is composed of which type of tissue?', options:['Muscle','Connective','Epithelial'], answer:'Muscle', fact:'❤️ The heart muscle (myocardium) beats 100,000 times a day without stopping — pumping about 5 litres of blood per minute!' },
  { level:2, visual:'☁️', question:'Which type of cloud has the LEAST vertical development?', options:['Cirrus','Cumulonimbus','Nimbostratus'], answer:'Cirrus', fact:'☁️ Cirrus clouds are thin, wispy, and form high up (above 6 km). They\'re made of ice crystals and often signal changing weather ahead!' },
  { level:2, visual:'⚛️', question:'What atomic particle neutralises the positive charge of protons in a neutral atom?', options:['Electrons','Neutrons','Positrons'], answer:'Electrons', fact:'⚛️ A neutral atom has equal protons (+) and electrons (-). Lose electrons → positive ion. Gain electrons → negative ion!' },
  { level:2, visual:'🌬️', question:'What is the scientific name for the human windpipe?', options:['Trachea','Oesophagus','Bronchus'], answer:'Trachea', fact:'🌬️ The trachea is reinforced by C-shaped cartilage rings to keep it open. It splits into two bronchi — one leading to each lung!' },
  { level:2, visual:'👂', question:'The organ of Corti is directly involved in which human sense?', options:['Hearing','Vision','Balance'], answer:'Hearing', fact:'👂 The organ of Corti sits inside the cochlea (inner ear). Its hair cells detect sound vibrations and send signals to the brain!' },
  // 40 NEW MEDIUM questions
  { level:2, visual:'🍃', question:'What is the overall equation for photosynthesis? (word equation)', options:['Carbon dioxide + water → glucose + oxygen','Glucose + oxygen → carbon dioxide + water','Oxygen + water → carbon dioxide + glucose'], answer:'Carbon dioxide + water → glucose + oxygen', fact:'🌿 Photosynthesis uses light energy to drive this reaction. Every glucose molecule stores the energy from about 48 photons of red light — an impressive feat of chemistry!' },
  { level:2, visual:'🏃', question:'According to Newton\'s Second Law, if a net force of 20 N acts on a 4 kg object, what is the acceleration?', options:['5 m/s²','80 m/s²','0.2 m/s²'], answer:'5 m/s²', fact:'⚡ F = ma, so a = F/m = 20/4 = 5 m/s². Newton\'s Second Law is the most used equation in all of classical mechanics!' },
  { level:2, visual:'🧬', question:'In genetics, if T (tall) is dominant over t (short), what phenotype does a Tt plant show?', options:['Tall','Short','Medium height'], answer:'Tall', fact:'🧬 Mendel discovered dominance using pea plants in the 1860s. A dominant allele masks the recessive one — so even one T allele produces a tall plant!' },
  { level:2, visual:'🌊', question:'The speed of a wave equals the product of its frequency and its what?', options:['Wavelength','Amplitude','Period'], answer:'Wavelength', fact:'🌊 v = fλ is the universal wave equation. If frequency doubles and speed stays the same, wavelength must halve. Sound travels at about 343 m/s in air at 20°C!' },
  { level:2, visual:'⚗️', question:'On the pH scale, what pH value indicates a perfectly neutral solution at 25°C?', options:['7','0','14'], answer:'7', fact:'⚗️ The pH scale runs from 0 (most acidic) to 14 (most basic). Pure water at 25°C has a pH of exactly 7. Each unit represents a 10-fold change in hydrogen ion concentration!' },
  { level:2, visual:'🔌', question:'According to Ohm\'s Law, if a resistor has a resistance of 10 ohms and a current of 2 amps flows through it, what is the voltage across it?', options:['20 volts','5 volts','12 volts'], answer:'20 volts', fact:'⚡ V = IR. Georg Ohm published this law in 1827 but was initially ridiculed by his peers! It is the cornerstone of circuit analysis.' },
  { level:2, visual:'🌍', question:'The theory of plate tectonics explains that Earth\'s lithosphere is broken into large pieces called what?', options:['Tectonic plates','Fault blocks','Cratons'], answer:'Tectonic plates', fact:'🌍 There are about 15 major tectonic plates. They move about 2–10 cm per year — roughly the rate your fingernails grow. The Atlantic Ocean gets about 2.5 cm wider each year!' },
  { level:2, visual:'🌟', question:'Stars on the main sequence of the Hertzsprung-Russell diagram are powered by the fusion of which element?', options:['Hydrogen','Helium','Carbon'], answer:'Hydrogen', fact:'⭐ Our Sun fuses about 600 million tonnes of hydrogen into helium every second! It has enough hydrogen to continue for another 5 billion years.' },
  { level:2, visual:'🔥', question:'Which type of heat transfer occurs through direct contact between objects?', options:['Conduction','Convection','Radiation'], answer:'Conduction', fact:'🔥 Conduction transfers heat by particle-to-particle collisions. Metals conduct heat well because their free electrons can transfer kinetic energy rapidly — that\'s why a metal spoon feels colder than a wooden one!' },
  { level:2, visual:'🧬', question:'A cross between two heterozygous tall pea plants (Tt × Tt) produces offspring in what approximate ratio of tall to short?', options:['3 tall : 1 short','1 tall : 1 short','All tall'], answer:'3 tall : 1 short', fact:'🧬 The Punnett square gives TT, Tt, Tt, tt — three tall for every short. Mendel actually counted thousands of peas to discover this 3:1 ratio in 1865!' },
  { level:2, visual:'🌋', question:'At a divergent plate boundary, what primarily happens?', options:['New crust is created as plates move apart','Plates collide and one subducts','Plates slide horizontally past each other'], answer:'New crust is created as plates move apart', fact:'🌋 At mid-ocean ridges, magma wells up to form new seafloor. The Mid-Atlantic Ridge is a divergent boundary — Iceland sits right on top of it and is actually growing wider each year!' },
  { level:2, visual:'🧪', question:'What type of chemical reaction releases energy to the surroundings, often producing heat?', options:['Exothermic','Endothermic','Synthesis'], answer:'Exothermic', fact:'🔥 Combustion, respiration, and neutralisation are all exothermic. Endothermic reactions absorb energy — like photosynthesis or dissolving ammonium nitrate in water (used in instant cold packs)!' },
  { level:2, visual:'🌊', question:'What term describes a wave\'s maximum displacement from its rest position?', options:['Amplitude','Wavelength','Frequency'], answer:'Amplitude', fact:'🌊 Amplitude relates to the energy a wave carries — double the amplitude and you quadruple the energy. That\'s why loud sounds (large amplitude) can damage hearing!' },
  { level:2, visual:'📊', question:'A data set is: 4, 7, 7, 9, 13. What is the mean (average)?', options:['8','7','9'], answer:'8', fact:'📊 Mean = sum ÷ count = (4+7+7+9+13) ÷ 5 = 40 ÷ 5 = 8. The median (middle value) is 7, and the mode (most frequent) is also 7. All three are measures of central tendency!' },
  { level:2, visual:'🫁', question:'During cellular respiration, what molecule is the primary fuel burned to produce ATP energy?', options:['Glucose','Oxygen','ATP'], answer:'Glucose', fact:'⚡ C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP. A single glucose molecule can produce up to 38 ATP molecules — the cell\'s energy currency!' },
  { level:2, visual:'🌡️', question:'What is the process by which water molecules at a liquid surface gain enough energy to escape as gas?', options:['Evaporation','Condensation','Sublimation'], answer:'Evaporation', fact:'💨 Evaporation is a cooling process — the molecules that escape carry away the most energy, lowering the temperature of what remains. That\'s why sweating cools you down!' },
  { level:2, visual:'🔭', question:'What force keeps planets in orbit around the Sun?', options:['Gravity','Electromagnetism','Nuclear force'], answer:'Gravity', fact:'🌍 Newton showed that the same force pulling apples down also keeps the Moon in orbit. Einstein later showed gravity is actually a curvature in spacetime caused by mass!' },
  { level:2, visual:'🧲', question:'What happens to the resistance of a conductor as its temperature increases, for most metals?', options:['Resistance increases','Resistance decreases','Resistance stays the same'], answer:'Resistance increases', fact:'⚡ As temperature rises, atoms vibrate more, creating more collisions for electrons and slowing them down. That\'s why incandescent bulb filaments have much higher resistance when glowing than when cold!' },
  { level:2, visual:'🌿', question:'Which process in the nitrogen cycle converts nitrogen gas from the atmosphere into ammonia?', options:['Nitrogen fixation','Denitrification','Nitrification'], answer:'Nitrogen fixation', fact:'🌱 Lightning and certain bacteria (like those in legume root nodules) fix nitrogen. Without nitrogen fixation, plants couldn\'t get the nitrogen needed to build proteins and DNA!' },
  { level:2, visual:'🩺', question:'The small intestine\'s inner surface has tiny finger-like projections called what, which increase the surface area for absorption?', options:['Villi','Alveoli','Cilia'], answer:'Villi', fact:'🔬 The villi (singular: villus) increase the absorptive surface area of the small intestine to about 250 m² — the size of a tennis court! Each villus also has microvilli for even more area!' },
  { level:2, visual:'🔬', question:'A student observes cells under a microscope and finds no nucleus, no mitochondria, and no membrane-bound organelles. What domain do these cells likely belong to?', options:['Bacteria','Eukarya','Archaea'], answer:'Bacteria', fact:'🔬 Prokaryotic cells (Bacteria and Archaea) lack a true nucleus and membrane-bound organelles. They are the most abundant organisms on Earth — your gut alone contains trillions!' },
  { level:2, visual:'🌍', question:'What is the term for the boundary between the crust and the mantle, where seismic wave speed increases sharply?', options:['Mohorovičić discontinuity','Gutenberg discontinuity','Conrad discontinuity'], answer:'Mohorovičić discontinuity', fact:'🌍 Called the "Moho" for short, it was discovered by Croatian seismologist Andrija Mohorovičić in 1909. It sits about 30–50 km deep under continents and only 5–10 km under oceans!' },
  { level:2, visual:'📐', question:'What is the probability of rolling a sum of 7 with two standard six-sided dice?', options:['6/36 (1/6)','5/36','7/36'], answer:'6/36 (1/6)', fact:'🎲 There are 6 ways to get a sum of 7 (1+6, 2+5, 3+4, 4+3, 5+2, 6+1) out of 36 total outcomes. 7 is the most probable sum when rolling two dice!' },
  { level:2, visual:'🌊', question:'What type of seismic wave compresses and expands rock in the same direction the wave travels (like a slinky)?', options:['P-wave (primary)','S-wave (secondary)','Surface wave'], answer:'P-wave (primary)', fact:'🌊 P-waves are compressional and travel through solids, liquids, and gases. S-waves are shear waves that only travel through solids — the fact that S-waves don\'t pass through Earth\'s outer core proves it is liquid!' },
  { level:2, visual:'🧪', question:'When magnesium burns in oxygen, it forms magnesium oxide. What type of chemical reaction is this?', options:['Synthesis (combination)','Decomposition','Single replacement'], answer:'Synthesis (combination)', fact:'⚗️ Synthesis: A + B → AB. Magnesium burns with a brilliant white flame so bright it can permanently damage your vision — it was used in old camera flashbulbs!' },
  { level:2, visual:'🌡️', question:'What is the primary difference between heat and temperature?', options:['Heat is energy transfer; temperature measures average kinetic energy of particles','Heat is measured in Celsius; temperature in Joules','They are the same thing'], answer:'Heat is energy transfer; temperature measures average kinetic energy of particles', fact:'🌡️ A cup of boiling water and a swimming pool at 20°C — the pool has more total thermal energy (heat) even though the water is cooler, simply because it has far more molecules!' },
  { level:2, visual:'🏊', question:'What property of water allows water striders (insects) to walk on the surface?', options:['Surface tension','Viscosity','Buoyancy'], answer:'Surface tension', fact:'💧 Surface tension occurs because water molecules at the surface are pulled inward by hydrogen bonds, creating a "skin." Water has one of the highest surface tensions of any common liquid!' },
  { level:2, visual:'🦎', question:'Which process allows organisms to change over many generations through natural selection acting on heritable variation?', options:['Evolution','Adaptation','Speciation'], answer:'Evolution', fact:'🦎 Darwin proposed natural selection: individuals with traits better suited to their environment survive and reproduce more. Over millions of generations this can produce entirely new species!' },
  { level:2, visual:'⚡', question:'In a series circuit with two resistors of 4 ohms and 6 ohms, what is the total resistance?', options:['10 ohms','2.4 ohms','24 ohms'], answer:'10 ohms', fact:'⚡ In series, resistances add: R_total = R₁ + R₂ = 4 + 6 = 10 Ω. In parallel, the total resistance is less than the smallest resistor. Christmas lights used to be wired in series — one burned-out bulb killed the whole string!' },
  { level:2, visual:'🌿', question:'During which phase of the cell cycle does DNA replication occur?', options:['S phase (synthesis)','M phase (mitosis)','G1 phase'], answer:'S phase (synthesis)', fact:'🧬 In S phase, each chromosome is duplicated so the cell will have two complete sets of DNA to share. The entire 3-billion-base-pair human genome is copied with astonishing accuracy — about 1 error per billion bases!' },
  { level:2, visual:'🌍', question:'What is the term for the gradual movement of continents over geologic time, originally proposed by Alfred Wegener?', options:['Continental drift','Seafloor spreading','Plate subduction'], answer:'Continental drift', fact:'🌍 Wegener noticed the coastlines of Africa and South America fit together like puzzle pieces, and found matching fossils on both continents. He proposed continental drift in 1912 but was mocked until the 1960s!' },
  { level:2, visual:'🔭', question:'What is the Doppler effect in terms of sound?', options:['Apparent frequency change when source and observer move relative to each other','Increase in wave speed near a moving source','Interference of two sound waves'], answer:'Apparent frequency change when source and observer move relative to each other', fact:'🚑 When an ambulance approaches, sound waves bunch up (higher pitch); as it moves away, waves spread out (lower pitch). The same effect with light tells us the universe is expanding!' },
  { level:2, visual:'🧪', question:'A solution with a pH of 3 is how many times more acidic than a solution with a pH of 5?', options:['100 times','10 times','2 times'], answer:'100 times', fact:'⚗️ Each pH unit represents a 10-fold change in [H⁺]. A difference of 2 units = 10² = 100-fold difference. Stomach acid (pH ~2) is 1,000 times more acidic than black coffee (pH ~5)!' },
  { level:2, visual:'🩺', question:'What is the primary function of the kidney?', options:['Filter blood and regulate water balance','Produce insulin to regulate blood sugar','Break down red blood cells'], answer:'Filter blood and regulate water balance', fact:'🫘 Each kidney contains about 1 million tiny filtering units called nephrons. Together your kidneys filter about 180 litres of blood per day and produce about 1–2 litres of urine!' },
  { level:2, visual:'🌊', question:'What term describes the transfer of heat through the movement of fluids (liquids or gases)?', options:['Convection','Conduction','Radiation'], answer:'Convection', fact:'🌡️ Convection drives both ocean currents and atmospheric circulation. Hot air rises and cool air sinks, creating convection cells. This is also what moves tectonic plates!' },
  { level:2, visual:'📊', question:'What is the median of the data set: 3, 8, 5, 12, 7?', options:['7','7','8'], answer:'7', fact:'📊 First arrange in order: 3, 5, 7, 8, 12. The median is the middle value = 7. The median is more robust than the mean when there are extreme values (outliers)!' },
  { level:2, visual:'🧬', question:'Which organelle is often called the "powerhouse of the cell" because it produces most of the cell\'s ATP?', options:['Mitochondria','Ribosome','Golgi apparatus'], answer:'Mitochondria', fact:'⚡ Mitochondria have their own DNA and ribosomes — evidence they were once free-living bacteria engulfed by larger cells about 1.5 billion years ago. They reproduce by splitting in two, just like bacteria!' },
  { level:2, visual:'🔬', question:'What is the term for an organism\'s ability to maintain a stable internal environment despite external changes?', options:['Homeostasis','Metabolism','Osmoregulation'], answer:'Homeostasis', fact:'🌡️ Your body maintains a core temperature of about 37°C, blood pH of 7.35–7.45, and blood glucose within tight ranges — all examples of homeostasis involving intricate feedback loops!' },
  { level:2, visual:'🌿', question:'What is the name of the process by which plants lose water vapour through pores in their leaves?', options:['Transpiration','Respiration','Diffusion'], answer:'Transpiration', fact:'💧 A large tree can transpire hundreds of litres of water per day! This cools the tree, pulls water up from the roots, and contributes to local rainfall — forests are sometimes called "rain machines"!' },
  { level:2, visual:'⚙️', question:'An object accelerates at 3 m/s². If the mass is doubled and the force stays the same, what is the new acceleration?', options:['1.5 m/s²','6 m/s²','3 m/s²'], answer:'1.5 m/s²', fact:'⚙️ From F = ma, if F is constant and m doubles, a must halve. Newton\'s Second Law is a direct relationship between force and acceleration, and an inverse one between mass and acceleration!' },

  // ── MEDIUM (level 2) additional questions ────────────────────────────────────
  { level:2, visual:'🧬', question:'What are the four nitrogenous bases found in DNA?', options:['Adenine, Thymine, Guanine, Cytosine','Adenine, Uracil, Guanine, Cytosine','Adenine, Thymine, Guanine, Uridine'], answer:'Adenine, Thymine, Guanine, Cytosine', fact:'🧬 In DNA base pairing: A pairs with T (2 hydrogen bonds) and G pairs with C (3 hydrogen bonds). In RNA, Uracil (U) replaces Thymine. Chargaff\'s rule: in any DNA molecule, %A = %T and %G = %C.' },
  { level:2, visual:'⚗️', question:'In the reaction: 2H₂ + O₂ → 2H₂O, how many total atoms are on the left side?', options:['6','4','5'], answer:'6', fact:'⚗️ Left side: 2H₂ = 4 hydrogen atoms, O₂ = 2 oxygen atoms → 4 + 2 = 6 total atoms. Right side: 2H₂O = 4 H + 2 O = 6 atoms. Balanced equations obey conservation of mass — the same number of atoms on each side!' },
  { level:2, visual:'🌊', question:'What is the relationship between kinetic energy and the speed of an object?', options:['KE = ½mv² — KE is proportional to speed squared','KE = mv — KE is proportional to speed','KE = m/v — KE is inversely proportional to speed'], answer:'KE = ½mv² — KE is proportional to speed squared', fact:'⚡ Because KE depends on v², doubling speed quadruples kinetic energy. This is why car crashes at 60 mph are four times more energetic than at 30 mph! The ½ comes from the derivation using the work-energy theorem.' },
  { level:2, visual:'🌡️', question:'What is Avogadro\'s number?', options:['6.022 × 10²³','6.022 × 10²⁶','3.014 × 10²³'], answer:'6.022 × 10²³', fact:'⚗️ Avogadro\'s number (6.022 × 10²³) is the number of entities in one mole. If you counted one atom per second, it would take about 19 quadrillion years to count one mole — roughly 1.4 million times the age of the universe!' },
  { level:2, visual:'🦴', question:'During which phase of mitosis do chromosomes line up along the cell\'s equator?', options:['Metaphase','Prophase','Anaphase'], answer:'Metaphase', fact:'🔬 PMAT: Prophase (chromosomes condense), Metaphase (chromosomes align at the middle), Anaphase (sister chromatids pulled apart), Telophase (nuclei re-form). Metaphase is when chromosomes are most clearly visible under a microscope!' },
  { level:2, visual:'🌍', question:'What term describes a rock\'s resistance to being scratched, expressed on a scale from 1 to 10?', options:['Mohs hardness','Specific gravity','Luster'], answer:'Mohs hardness', fact:'💎 Friedrich Mohs devised the scale in 1812: Talc (1) is softest, Diamond (10) hardest. A fingernail is ~2.5, a copper coin ~3.5, a steel knife ~5.5, quartz 7. The scale is not linear — diamond (10) is actually about 4× harder than corundum (9)!' },
  { level:2, visual:'⚡', question:'What is the formula for electrical power in terms of voltage and current?', options:['P = VI','P = V/I','P = I/V'], answer:'P = VI', fact:'⚡ P = VI (Power = Voltage × Current). Combined with V = IR: P = I²R = V²/R. A typical household appliance running at 120V drawing 10A uses 1,200 watts = 1.2 kilowatts of power.' },
  { level:2, visual:'🧪', question:'What is the molarity of a solution made by dissolving 2 moles of NaCl in 500 mL of water?', options:['4 M','1 M','0.5 M'], answer:'4 M', fact:'⚗️ Molarity (M) = moles of solute / liters of solution. 500 mL = 0.5 L. So M = 2 mol / 0.5 L = 4 mol/L = 4 M. Molarity is the most common concentration unit in chemistry — it lets you calculate exactly how many molecules are in a given volume.' },
  { level:2, visual:'🌊', question:'What is the law of conservation of momentum?', options:['Total momentum of a closed system remains constant unless acted on by an external force','Momentum equals mass times acceleration','Objects at rest have zero momentum always'], answer:'Total momentum of a closed system remains constant unless acted on by an external force', fact:'⚙️ p = mv. In a collision, momentum lost by one object is gained by another. This explains why guns recoil, rockets propel themselves by expelling exhaust, and billiard balls transfer motion. Momentum is conserved even in inelastic collisions where kinetic energy is not!' },
  { level:2, visual:'🌿', question:'In Mendelian genetics, what is the phenotypic ratio expected from a dihybrid cross (AaBb × AaBb) for two independently assorting traits?', options:['9:3:3:1','3:1','1:2:1'], answer:'9:3:3:1', fact:'🧬 For two independent genes, each with one dominant and one recessive allele, crossing two dihybrids gives 9 (A_B_) : 3 (A_bb) : 3 (aaB_) : 1 (aabb). Mendel discovered the Law of Independent Assortment from observing this ratio with seed shape and seed color in peas!' },
  { level:2, visual:'🌋', question:'What type of seismic wave travels along Earth\'s surface and causes the most destructive shaking?', options:['Surface waves (Love and Rayleigh)','P-waves','S-waves'], answer:'Surface waves (Love and Rayleigh)', fact:'🌍 Though slower than body waves, surface waves carry more energy and cause the rolling, swaying motion felt during earthquakes. Love waves move side to side; Rayleigh waves move in an elliptical rolling motion — like ocean waves in rock!' },
  { level:2, visual:'🔬', question:'What is the approximate mass of a proton in atomic mass units (amu)?', options:['1 amu','1/1836 amu','4 amu'], answer:'1 amu', fact:'⚛️ Protons and neutrons each have a mass of approximately 1 amu (atomic mass unit). Electrons are about 1/1836 the mass of a proton — so light they contribute negligible mass to atoms. The atomic mass of an element is roughly the number of protons plus neutrons!' },
  { level:2, visual:'🧠', question:'What is the name for the junction between two neurons where a nerve signal is transmitted chemically?', options:['Synapse','Axon','Dendrite'], answer:'Synapse', fact:'🧠 At a synapse, electrical signals cause neurotransmitters (like dopamine, serotonin, acetylcholine) to be released from the presynaptic neuron and bind receptors on the postsynaptic neuron. Many drugs, poisons, and medicines work by interfering with neurotransmission!' },
  { level:2, visual:'🌟', question:'What colour is a star that has a surface temperature of about 30,000 K?', options:['Blue-white','Yellow','Red'], answer:'Blue-white', fact:'⭐ Stars follow the Wien displacement law: hotter stars are bluer, cooler stars are redder. Blue-white stars (O and B type) are the most massive and short-lived. Our Sun is a yellow-white G-type star at about 5,778 K. Red dwarfs (M-type) at ~3,000 K are the most common stars in the galaxy!' },
  { level:2, visual:'🧪', question:'What is Le Chatelier\'s principle?', options:['If a system at equilibrium is disturbed, it will shift to oppose the disturbance and restore a new equilibrium','Chemical equilibrium means the reaction has stopped','Equal concentrations of reactants and products at equilibrium'], answer:'If a system at equilibrium is disturbed, it will shift to oppose the disturbance and restore a new equilibrium', fact:'⚗️ Le Chatelier\'s principle (1884) is enormously useful. Increasing pressure in the Haber process (N₂ + 3H₂ ⇌ 2NH₃) shifts equilibrium toward ammonia (fewer moles of gas). Removing a product also drives a reaction forward. Industrial chemists use this to maximise yields!' },
  { level:2, visual:'🌿', question:'What is the role of the ribosome in a cell?', options:['Synthesise proteins by translating mRNA','Produce energy as ATP','Replicate DNA before cell division'], answer:'Synthesise proteins by translating mRNA', fact:'🧬 Ribosomes are molecular machines made of rRNA and proteins. They read mRNA codons (3-base words) and bring matching tRNA molecules carrying amino acids. A ribosome can add about 15 amino acids per second! They are found in all living cells — even the smallest bacteria.' },
  { level:2, visual:'⚗️', question:'What is enthalpy change (ΔH) in a chemical reaction?', options:['Heat absorbed or released at constant pressure','Change in internal energy only','The activation energy of the reaction'], answer:'Heat absorbed or released at constant pressure', fact:'🔥 Exothermic reactions have negative ΔH (heat released to surroundings). Endothermic reactions have positive ΔH (heat absorbed from surroundings). Standard enthalpy of formation values let chemists calculate ΔH for any reaction using Hess\'s Law!' },
  { level:2, visual:'🌊', question:'In optics, what law states that the angle of incidence equals the angle of reflection?', options:['Law of reflection','Snell\'s Law','Diffraction law'], answer:'Law of reflection', fact:'🔭 The angle of incidence and angle of reflection are both measured from the normal (perpendicular to the surface). Snell\'s Law (n₁sinθ₁ = n₂sinθ₂) describes refraction — the bending of light when it passes between media of different densities. This is why a straw looks bent in water!' },
  { level:2, visual:'🦠', question:'What is the difference between gram-positive and gram-negative bacteria?', options:['Gram-positive has a thick peptidoglycan cell wall; gram-negative has a thin wall and outer membrane','Gram-positive stains red; gram-negative stains purple','Gram-positive is harmful; gram-negative is harmless'], answer:'Gram-positive has a thick peptidoglycan cell wall; gram-negative has a thin wall and outer membrane', fact:'🔬 The Gram stain (developed in 1884) uses crystal violet dye. Gram-positive bacteria retain the purple stain; gram-negative bacteria lose it. This difference in cell wall structure affects which antibiotics work — gram-negative bacteria are generally harder to treat!' },
  { level:2, visual:'🌍', question:'What is the process by which dissolved minerals precipitate to fill in the spaces of sediment, eventually forming sedimentary rock?', options:['Cementation','Compaction','Lithification'], answer:'Cementation', fact:'🪨 Lithification (rock formation) involves two steps: compaction (pressure squeezes out water and reduces pore space) and cementation (minerals like calcite, silica, or iron oxide crystallise between particles, gluing them together). Both are needed to create solid rock!' },
  { level:2, visual:'📐', question:'What is the distance formula between two points (x₁,y₁) and (x₂,y₂)?', options:['d = √[(x₂-x₁)² + (y₂-y₁)²]','d = |x₂-x₁| + |y₂-y₁|','d = (x₂-x₁) × (y₂-y₁)'], answer:'d = √[(x₂-x₁)² + (y₂-y₁)²]', fact:'📐 The distance formula is derived directly from the Pythagorean theorem — the horizontal and vertical separations form the legs of a right triangle, and the distance is the hypotenuse. It extends to 3D as d = √[(Δx)² + (Δy)² + (Δz)²]!' },
  { level:2, visual:'⚡', question:'What is electromagnetic induction?', options:['A changing magnetic field induces an electric current in a conductor','Moving charges create a magnetic field','Electric fields accelerate charged particles'], answer:'A changing magnetic field induces an electric current in a conductor', fact:'⚡ Discovered by Michael Faraday in 1831, electromagnetic induction is the basis of all electrical generators and transformers. Every time you use electricity, you benefit from Faraday\'s discovery — generators at power plants spin coils in magnetic fields to induce current!' },
  { level:2, visual:'🌡️', question:'What is the specific heat capacity of water in joules per gram per Celsius degree?', options:['4.18 J/g·°C','1.00 J/g·°C','2.09 J/g·°C'], answer:'4.18 J/g·°C', fact:'💧 Water\'s exceptionally high specific heat (4.18 J/g·°C) is due to hydrogen bonding. It takes a lot of energy to raise water\'s temperature. This moderates Earth\'s climate and makes water the ideal coolant in car engines and the human body!' },
  { level:2, visual:'🧬', question:'What is the Hardy-Weinberg equilibrium principle?', options:['In a large, random-mating population with no selection/mutation/migration, allele frequencies remain constant','Natural selection always drives allele frequencies to fixation','Dominant alleles always increase in frequency over generations'], answer:'In a large, random-mating population with no selection/mutation/migration, allele frequencies remain constant', fact:'🧬 The Hardy-Weinberg equation: p² + 2pq + q² = 1 (where p and q are allele frequencies). It provides a null model for evolution — deviations from H-W equilibrium indicate that evolution is occurring. It was independently derived in 1908 by mathematician Hardy and physician Weinberg!' },
  { level:2, visual:'🌊', question:'What are P-waves, S-waves, and surface waves in the context of seismology?', options:['Types of seismic waves produced by earthquakes','Types of ocean waves','Types of atmospheric pressure waves'], answer:'Types of seismic waves produced by earthquakes', fact:'🌍 P-waves (compressional) travel fastest and through all materials. S-waves (shear) travel only through solids. Surface waves travel along Earth\'s surface and cause the most damage. The detection of S-waves stopping at Earth\'s outer core proved it is liquid!' },
  { level:2, visual:'🧪', question:'In acid-base chemistry, what happens when a strong acid (like HCl) reacts with a strong base (like NaOH)?', options:['They neutralise each other to produce salt and water','They react explosively to produce hydrogen gas','Nothing happens because they cancel out'], answer:'They neutralise each other to produce salt and water', fact:'⚗️ HCl + NaOH → NaCl + H₂O. Neutralisation reactions are exothermic — they release heat. This is why mixing strong acid and base in a lab must be done carefully. The resulting solution has pH 7 only if exact equal moles of acid and base are used!' },
  { level:2, visual:'🌿', question:'What is the term for the total dry mass of all organisms in a given area, used to measure energy at each trophic level?', options:['Biomass','Bioenergy','Biocapacity'], answer:'Biomass', fact:'🌱 Biomass decreases dramatically at each trophic level due to the 10% energy transfer rule. A pyramid of biomass illustrates this — producers have the most biomass, top predators the least. Some aquatic ecosystems have "inverted biomass pyramids" because fast-reproducing phytoplankton support larger fish!' },
  { level:2, visual:'🔭', question:'What is the apparent visual magnitude scale used to measure star brightness?', options:['Lower (more negative) numbers are brighter','Higher numbers are brighter','The scale only applies to stars, not planets'], answer:'Lower (more negative) numbers are brighter', fact:'⭐ Hipparchus devised magnitude in ~130 BC; the modern scale makes each step a factor of 2.512 in brightness (5 steps = 100×). The Sun is magnitude -26.7, the full Moon -12.7, the naked eye limit +6, and the Hubble Space Telescope can see to about +31!' },
  { level:2, visual:'🌊', question:'What is the period of a wave if its frequency is 50 Hz?', options:['0.02 seconds','50 seconds','2 seconds'], answer:'0.02 seconds', fact:'🌊 Period (T) = 1/frequency. T = 1/50 = 0.02 s. Period and frequency are reciprocals: if a wave completes 50 full cycles per second, each cycle takes 1/50 of a second. Your household electricity in the US runs at 60 Hz (period = 0.0167 s)!' },
  { level:2, visual:'🌍', question:'What is the greenhouse effect?', options:['Atmospheric gases absorb and re-emit infrared radiation, warming Earth\'s surface','Solar radiation warms Earth directly through the atmosphere','The stratospheric ozone layer reflects heat back to Earth'], answer:'Atmospheric gases absorb and re-emit infrared radiation, warming Earth\'s surface', fact:'🌍 Without any greenhouse effect, Earth\'s average temperature would be about -18°C instead of +15°C. CO₂, water vapour, and methane are the major greenhouse gases. Human emissions are enhancing the greenhouse effect, causing global warming.' },
  { level:2, visual:'🔬', question:'What is the cell cycle\'s G1 phase?', options:['Cell grows and prepares for DNA replication','DNA is replicated','The cell divides into two daughters'], answer:'Cell grows and prepares for DNA replication', fact:'🔬 The cell cycle: G1 (growth) → S (DNA synthesis) → G2 (growth and preparation) → M (mitosis and cytokinesis). The G1/S checkpoint is critical — if DNA is damaged, the cycle is paused for repair. Failure of these checkpoints can lead to cancer!' },
  { level:2, visual:'🧪', question:'What is the relationship between temperature and the solubility of most solid solutes in water?', options:['Solubility increases with increasing temperature','Solubility decreases with increasing temperature','Temperature has no effect on solubility'], answer:'Solubility increases with increasing temperature', fact:'⚗️ Heating water disrupts intermolecular forces and allows more solute to dissolve — this is why sugar dissolves faster in hot tea. For gases dissolved in water, the opposite is true: gases become less soluble as temperature increases (why warm soda goes flat faster)!' },
  { level:2, visual:'🌿', question:'What is meant by the term "keystone species" in ecology?', options:['A species with a disproportionately large effect on its ecosystem relative to its abundance','The most numerous species in an ecosystem','The top predator in a food chain'], answer:'A species with a disproportionately large effect on its ecosystem relative to its abundance', fact:'🦦 Sea otters are a classic keystone species — they eat sea urchins, preventing urchins from overgrazing kelp forests. When sea otters were hunted to near-extinction, urchin populations exploded and kelp forests collapsed. Removing a keystone species causes ecosystem collapse.' },
  { level:2, visual:'⚙️', question:'What is Hooke\'s Law for a spring?', options:['F = -kx, where F is the restoring force and x is the displacement','F = kv, where v is velocity','F = k/x, where k is the spring constant'], answer:'F = -kx, where F is the restoring force and x is the displacement', fact:'⚙️ Robert Hooke (1676): the restoring force is proportional and opposite to displacement. The negative sign means it always pulls back toward equilibrium. Hooke\'s Law applies until the elastic limit — stretch a spring too far and it permanently deforms!' },
  { level:2, visual:'🌍', question:'What is the approximate composition of dry air by percentage of nitrogen and oxygen?', options:['78% N₂, 21% O₂, 1% Ar and other gases','50% N₂, 50% O₂','65% N₂, 25% O₂, 10% CO₂'], answer:'78% N₂, 21% O₂, 1% Ar and other gases', fact:'🌬️ The atmosphere is mostly nitrogen (78%) which is relatively inert. Oxygen (21%) is what we breathe. Argon (0.93%) is the third most abundant. CO₂ is only ~0.042% — yet even this tiny amount drives the greenhouse effect!' },
  { level:2, visual:'🧬', question:'What is the difference between dominant and recessive alleles?', options:['A dominant allele is expressed even when only one copy is present; recessive requires two copies','Dominant alleles are always beneficial; recessive alleles are harmful','Dominant alleles are more common in the population'], answer:'A dominant allele is expressed even when only one copy is present; recessive requires two copies', fact:'🧬 Dominant alleles mask recessive ones. An organism with one dominant allele (Aa) shows the dominant phenotype. Sickle cell anemia (HbS) is recessive — you need two copies to show the disease. Huntington\'s disease is dominant — one copy is enough to cause it.' },
  { level:2, visual:'🔋', question:'In a parallel circuit with two 12-ohm resistors, what is the total resistance?', options:['6 ohms','24 ohms','12 ohms'], answer:'6 ohms', fact:'⚡ For two equal resistors in parallel: R_total = R/n = 12/2 = 6 Ω. General formula: 1/R_total = 1/R₁ + 1/R₂. Parallel circuits are used in household wiring so each device gets full voltage and operates independently — one device failing doesn\'t break the whole circuit!' },
  { level:2, visual:'🌊', question:'What is the difference between speed and velocity?', options:['Speed is scalar (magnitude only); velocity is vector (magnitude and direction)','Speed accounts for direction; velocity does not','They are identical in all applications'], answer:'Speed is scalar (magnitude only); velocity is vector (magnitude and direction)', fact:'⚙️ A car driving in a circle at constant 60 km/h has constant speed but constantly changing velocity (because direction changes). Acceleration means any change in velocity — including turning at constant speed. This is why centripetal acceleration exists!' },
  { level:2, visual:'🌿', question:'What is the ecological term for when two different species interact such that both benefit?', options:['Mutualism','Commensalism','Parasitism'], answer:'Mutualism', fact:'🌿 Classic mutualism: clownfish and sea anemones (clownfish get protection; anemone gets cleaned), or bees and flowers (bees get nectar; plants get pollinated). Commensalism benefits one species without affecting the other. Parasitism benefits one at the other\'s expense.' },
  { level:2, visual:'🧪', question:'What is the term for a reaction where an acid donates a proton (H⁺) to a base?', options:['Brønsted-Lowry acid-base reaction','Arrhenius acid-base reaction','Lewis acid-base reaction'], answer:'Brønsted-Lowry acid-base reaction', fact:'⚗️ Brønsted-Lowry (1923) defines acids as proton donors and bases as proton acceptors. This is broader than Arrhenius (acids produce H⁺ in water). Lewis theory is even broader: acids accept electron pairs. HCl is an acid in all three definitions — it donates H⁺, produces H⁺ in water, and accepts electrons!' },
  { level:2, visual:'🌊', question:'What is the law of reflection? (angles measured from the normal)', options:['Angle of incidence = Angle of reflection','Angle of incidence + Angle of reflection = 90°','The reflected ray is always horizontal'], answer:'Angle of incidence = Angle of reflection', fact:'🔦 Both angles are measured from the normal (perpendicular) to the surface. A flat (plane) mirror forms a virtual image that is the same size as the object, the same distance behind the mirror as the object is in front, and is laterally reversed (left-right flipped).' },
  { level:2, visual:'🌍', question:'What is the term for the amount of energy required to raise 1 gram of a substance by 1°C?', options:['Specific heat capacity','Heat of fusion','Heat of vaporisation'], answer:'Specific heat capacity', fact:'🌡️ Water\'s specific heat (4.18 J/g·°C) is unusually high. The heat of fusion (melting) for water is 334 J/g — energy needed to change ice to water with no temperature change. The heat of vaporisation (boiling) is 2,260 J/g — even more energy to convert water to steam!' },
  { level:2, visual:'⚛️', question:'What is an isotope?', options:['Atoms of the same element with different numbers of neutrons','Atoms with the same mass but different elements','Atoms that have gained or lost electrons'], answer:'Atoms of the same element with different numbers of neutrons', fact:'⚛️ Carbon-12 (⁶C) and Carbon-14 (⁶C) are isotopes — both have 6 protons (defining them as carbon) but C-12 has 6 neutrons and C-14 has 8. Isotopes have nearly identical chemical properties but different masses and nuclear stability. Radioactive isotopes (radioisotopes) are used in medicine, archaeology, and power generation.' },
  { level:2, visual:'🌿', question:'What is phototropism in plants?', options:['Growth of plant parts toward light','Growth of roots toward gravity','Growth of stems away from water'], answer:'Growth of plant parts toward light', fact:'🌱 Phototropism is caused by the plant hormone auxin accumulating on the shaded side of a stem, causing those cells to elongate more than the lit side — bending the plant toward light. Darwin and his son noticed this in oat coleoptiles in 1880. It maximises photosynthesis efficiency!' },
  { level:2, visual:'🌊', question:'What is the difference between a lunar eclipse and a solar eclipse?', options:['Lunar: Earth\'s shadow falls on Moon; Solar: Moon\'s shadow falls on Earth','Lunar: Moon blocks the Sun; Solar: Sun blocks the Moon','They are the same event seen from different locations'], answer:'Lunar: Earth\'s shadow falls on Moon; Solar: Moon\'s shadow falls on Earth', fact:'🌑 A lunar eclipse occurs at full moon when Earth blocks sunlight from reaching the Moon. A solar eclipse occurs at new moon when the Moon blocks the Sun from Earth\'s view. Total solar eclipses are rare at any specific location — the Moon\'s shadow is only about 150 km wide!' },
  { level:2, visual:'🧬', question:'What is the function of the Golgi apparatus in a eukaryotic cell?', options:['Processes and packages proteins for secretion or delivery','Produces proteins on its surface','Generates ATP through cellular respiration'], answer:'Processes and packages proteins for secretion or delivery', fact:'🔬 The Golgi apparatus is the cell\'s "post office." Proteins from the endoplasmic reticulum arrive, get modified (glycosylation, sorting), and are packaged into vesicles for delivery — either secreted outside the cell or sent to lysosomes. Camillo Golgi discovered it in 1898!' },
  { level:2, visual:'📐', question:'A train travels 180 km in 2 hours. What is its average speed in km/h?', options:['90 km/h','360 km/h','45 km/h'], answer:'90 km/h', fact:'⚙️ Average speed = distance ÷ time = 180 ÷ 2 = 90 km/h. This is the average — the train may have been faster or slower at different points. Average velocity would also need the direction of travel (it is a vector quantity)!' },
  { level:2, visual:'🌍', question:'What is soil horizon O (O horizon)?', options:['The uppermost layer composed of organic material (leaf litter, humus)','The layer of bedrock at the bottom','The zone of mineral accumulation (subsoil)'], answer:'The uppermost layer composed of organic material (leaf litter, humus)', fact:'🌱 Soil profiles from top to bottom: O horizon (organic matter) → A horizon (topsoil, minerals + humus) → B horizon (subsoil, mineral accumulation) → C horizon (parent material/weathered rock) → R horizon (bedrock). The O and A horizons are critical for agriculture.' },
  { level:2, visual:'⚗️', question:'What is the relationship between the number of protons in an atom\'s nucleus and its identity as an element?', options:['The number of protons (atomic number) uniquely defines the element','The number of neutrons defines the element','The total mass (protons + neutrons) defines the element'], answer:'The number of protons (atomic number) uniquely defines the element', fact:'⚛️ The atomic number (Z) is the number of protons. Change one proton and you change the element. This happens in nuclear reactions — alpha decay reduces Z by 2, beta decay changes Z by ±1. Transmutation of elements was the alchemists\' dream, finally achieved in nuclear physics!' },
  { level:2, visual:'🌊', question:'What is the Coriolis effect?', options:['The deflection of moving objects due to Earth\'s rotation (right in N hemisphere, left in S hemisphere)','The increase in wave speed near coastlines','The warming of ocean water by the Sun'], answer:'The deflection of moving objects due to Earth\'s rotation (right in N hemisphere, left in S hemisphere)', fact:'🌍 The Coriolis effect causes large-scale winds and ocean currents to curve. It creates cyclonic (counterclockwise in N. hemisphere) and anticyclonic (clockwise) circulation patterns. Despite popular myth, it does NOT determine which way water drains in a sink — that depends on the basin shape and initial conditions!' },
  { level:2, visual:'🧪', question:'What is a buffer solution in chemistry?', options:['A solution that resists changes in pH when small amounts of acid or base are added','A solution at exactly pH 7','A solution that turns litmus paper blue'], answer:'A solution that resists changes in pH when small amounts of acid or base are added', fact:'⚗️ Buffers contain a weak acid and its conjugate base (or vice versa). Your blood is buffered at pH 7.35–7.45 by the carbonic acid/bicarbonate system. A drop in blood pH below 7.2 (acidosis) or rise above 7.6 (alkalosis) is life-threatening!' },
  { level:2, visual:'🌿', question:'What is the term for organisms that have the same two alleles for a given gene (e.g., TT or tt)?', options:['Homozygous','Heterozygous','Hemizygous'], answer:'Homozygous', fact:'🧬 Homozygous individuals (TT or tt) always pass the same allele to offspring. Heterozygous individuals (Tt) can pass either allele. Hemizygous refers to genes present in only one copy (like X-linked genes in males who have only one X chromosome).' },
  { level:2, visual:'🔭', question:'What is the term for the apparent shift in the position of a nearby star against background stars as Earth orbits the Sun?', options:['Stellar parallax','Proper motion','Stellar aberration'], answer:'Stellar parallax', fact:'🔭 Parallax is the basis of the parsec unit (parallax second): a star at 1 parsec shows a parallax angle of 1 arcsecond. 1 parsec ≈ 3.26 light-years. This method works for stars up to about 1,000 light-years away — beyond that, the angles are too small to measure even from space!' },
  { level:2, visual:'🌊', question:'What is terminal velocity?', options:['The constant speed reached when air resistance equals the gravitational force on a falling object','The maximum speed of sound','The speed at which a rocket escapes Earth\'s gravity'], answer:'The constant speed reached when air resistance equals the gravitational force on a falling object', fact:'⚙️ A skydiver reaches terminal velocity of about 55 m/s (~200 km/h) in the spread-eagle position. Opening the parachute increases drag dramatically, setting a new (much slower) terminal velocity. Without air resistance, falling objects would accelerate continuously at g = 9.8 m/s².' },
  { level:2, visual:'🌍', question:'What is the rock cycle?', options:['The continuous transformation of rocks among igneous, sedimentary, and metamorphic types','The lifecycle of a single mineral from formation to erosion','The circulation of minerals through the water cycle'], answer:'The continuous transformation of rocks among igneous, sedimentary, and metamorphic types', fact:'🪨 No rock type is permanent. Igneous rock can be weathered and eroded into sediments → compressed into sedimentary rock → metamorphosed by heat/pressure → melted back to magma → erupted as igneous rock again. This cycle takes millions of years!' },
  { level:2, visual:'🧬', question:'What is an enzyme\'s active site?', options:['The specific region where substrate molecules bind and the reaction takes place','The part of the enzyme that binds to DNA','The region that attaches the enzyme to the cell membrane'], answer:'The specific region where substrate molecules bind and the reaction takes place', fact:'🔬 The "lock and key" model (Fischer, 1894): enzymes are specific — only certain substrates fit the active site. The "induced fit" model (Koshland, 1958) is more accurate: the enzyme changes shape slightly when the substrate binds, like a flexible glove fitting a hand. Temperature and pH affect enzyme shape (denaturation)!' },

  // ── MEDIUM (level 2) batch 3 ──────────────────────────────────────────────────
  { level:2, visual:'🔬', question:'In meiosis, what is the significance of independent assortment?', options:['Chromosome pairs align randomly at metaphase I, so each gamete can receive either homolog independently','All chromosomes always go to the same pole at meiosis I','Chromosomes only assort independently when no crossing over occurs'], answer:'Chromosome pairs align randomly at metaphase I, so each gamete can receive either homolog independently', fact:'🧬 Mendel\'s Law of Independent Assortment. With 23 chromosome pairs in humans, there are 2²³ ≈ 8.4 million possible chromosome combinations per gamete from independent assortment alone — before considering crossing over!' },
  { level:2, visual:'🌡️', question:'What is the difference between heat capacity and specific heat capacity?', options:['Heat capacity applies to an entire object; specific heat capacity applies to 1 kg of the substance','They are identical terms used interchangeably','Heat capacity is measured in J/°C; specific heat is measured in calories'], answer:'Heat capacity applies to an entire object; specific heat capacity applies to 1 kg of the substance', fact:'🌡️ Heat capacity C = mc (mass × specific heat). A 2 kg block of iron has twice the heat capacity of a 1 kg iron block — even though both are made of the same material with the same specific heat. Specific heat is an intrinsic property; heat capacity depends on the amount of material.' },
  { level:2, visual:'⚗️', question:'What is a redox reaction?', options:['A reaction involving simultaneous oxidation (electron loss) and reduction (electron gain)','A reaction that proceeds in both forward and reverse directions','A reaction between an acid and a metal producing hydrogen gas'], answer:'A reaction involving simultaneous oxidation (electron loss) and reduction (electron gain)', fact:'⚗️ OIL RIG: Oxidation Is Loss, Reduction Is Gain (of electrons). In 2Mg + O₂ → 2MgO: Mg is oxidised (loses e⁻, goes from 0 to +2); O is reduced (gains e⁻, goes from 0 to -2). Redox reactions power batteries, fuel cells, biological respiration, and corrosion. Every combustion reaction is also a redox reaction.' },
  { level:2, visual:'🌍', question:'What is the difference between igneous intrusive (plutonic) and extrusive (volcanic) rocks?', options:['Intrusive: cools slowly underground → large crystals; Extrusive: cools fast at surface → small crystals or glassy texture','Intrusive: erupts from volcanoes; Extrusive: solidifies deep underground','Intrusive: always light coloured; Extrusive: always dark coloured'], answer:'Intrusive: cools slowly underground → large crystals; Extrusive: cools fast at surface → small crystals or glassy texture', fact:'🪨 Granite is intrusive — slow cooling allows large, visible crystals to form. Basalt is extrusive — fast cooling produces tiny crystals. Obsidian (volcanic glass) cooled so fast that crystals had no time to form at all. You can estimate cooling rate of an igneous rock just by looking at crystal size!' },
  { level:2, visual:'🧬', question:'What is the polymerase chain reaction (PCR) used for?', options:['Amplify specific DNA sequences exponentially in vitro using repeated heating and cooling cycles','Determine the sequence of nucleotides in a DNA strand','Splice new genes into bacterial chromosomes'], answer:'Amplify specific DNA sequences exponentially in vitro using repeated heating and cooling cycles', fact:'🧬 Kary Mullis invented PCR in 1983 (Nobel Prize 1993). Each PCR cycle doubles the target DNA: after 30 cycles, you have 2³⁰ ≈ 1 billion copies from a single molecule. PCR is used in COVID-19 tests, forensic DNA analysis, archaeological DNA analysis, and cancer mutation detection.' },
  { level:2, visual:'⚡', question:'What is the difference between nuclear fission and radioactive decay?', options:['Fission is induced by neutron bombardment splitting heavy nuclei; decay is spontaneous emission from unstable nuclei','They are the same process viewed at different scales','Fission produces radiation; decay produces only heat'], answer:'Fission is induced by neutron bombardment splitting heavy nuclei; decay is spontaneous emission from unstable nuclei', fact:'☢️ Radioactive decay: unstable nuclei spontaneously emit alpha particles, beta particles, or gamma rays to become more stable. Fission: a neutron strikes a heavy nucleus (U-235, Pu-239) and splits it into two medium-sized nuclei + more neutrons. Fission can create chain reactions; decay cannot. Nuclear power plants use fission; natural radioactivity in rocks and your body is decay.' },
  { level:2, visual:'🌊', question:'What is Snell\'s Law of refraction?', options:['n₁sinθ₁ = n₂sinθ₂; light bends toward the normal when entering a denser medium','The angle of incidence equals the angle of refraction','Light always bends away from the normal when passing between media'], answer:'n₁sinθ₁ = n₂sinθ₂; light bends toward the normal when entering a denser medium', fact:'🔭 Willebrord Snell (1621): the ratio of sines of angles equals the inverse ratio of refractive indices. Glass has n ≈ 1.5, so light bends toward the normal when entering glass. Total internal reflection occurs when light tries to leave a denser medium at too steep an angle — the principle behind fibre optics and diamond brilliance!' },
  { level:2, visual:'🧪', question:'What is a saturated solution?', options:['A solution containing the maximum amount of dissolved solute at a given temperature','A solution with solvent molecules completely replaced by solute','A solution that cannot participate in any further chemical reactions'], answer:'A solution containing the maximum amount of dissolved solute at a given temperature', fact:'⚗️ At the saturation point, the rate of dissolving equals the rate of crystallisation — a dynamic equilibrium. A supersaturated solution contains more than the equilibrium amount (unstable). Instant hand warmers use supersaturated sodium acetate — clicking the metal disc triggers rapid crystallisation, releasing heat!' },
  { level:2, visual:'🌍', question:'What is the difference between weathering and erosion?', options:['Weathering breaks down rock in place; erosion transports the broken material elsewhere','Weathering is caused only by water; erosion is caused only by wind','Weathering is a chemical process; erosion is a physical process'], answer:'Weathering breaks down rock in place; erosion transports the broken material elsewhere', fact:'🪨 Chemical weathering (acid rain dissolves limestone), physical/mechanical weathering (frost cracking, abrasion), and biological weathering (roots splitting rock, lichen secreting acids) all break rock in place. Erosion then moves those particles via water, wind, ice, or gravity. The Grand Canyon was carved mainly by erosion from the Colorado River over ~5–6 million years.' },
  { level:2, visual:'🌿', question:'What is the role of ATP (adenosine triphosphate) in cellular metabolism?', options:['The primary energy currency of cells — releases energy when hydrolysed to ADP + phosphate','The molecule that stores genetic information in the chromosome','A structural protein that provides mechanical support to the cell'], answer:'The primary energy currency of cells — releases energy when hydrolysed to ADP + phosphate', fact:'⚡ ATP → ADP + Pᵢ releases about 30.5 kJ/mol of free energy. This powers muscle contraction, active transport, biosynthesis, and cell signalling. Your body cycles through roughly its own weight in ATP every day! ATP was discovered in 1929 by Karl Lohmann — recognised as one of the most important molecules in biology.' },
  { level:2, visual:'📐', question:'What is the ideal gas law?', options:['PV = nRT, relating pressure, volume, moles, and temperature of an ideal gas','PV = constant (Boyle\'s Law) for all conditions','P/T = constant (Gay-Lussac\'s Law) for all conditions'], answer:'PV = nRT, relating pressure, volume, moles, and temperature of an ideal gas', fact:'⚗️ R = 8.314 J/mol·K (universal gas constant). The ideal gas law combines Boyle\'s (P ∝ 1/V), Charles\'s (V ∝ T), and Avogadro\'s (V ∝ n) laws. Real gases deviate from ideal behaviour at high pressure and low temperature. At standard conditions (0°C, 1 atm), 1 mole of ideal gas occupies 22.4 L.' },
  { level:2, visual:'🧬', question:'What is the function of tRNA in protein synthesis?', options:['Carries specific amino acids to the ribosome and matches anticodons to mRNA codons','Provides the template sequence for amino acid assembly','Catalyses the formation of peptide bonds between amino acids'], answer:'Carries specific amino acids to the ribosome and matches anticodons to mRNA codons', fact:'🧬 Each tRNA has an anticodon loop (3 nucleotides complementary to an mRNA codon) and an amino acid attachment site at its 3\' end. Aminoacyl-tRNA synthetase enzymes "charge" each tRNA with the correct amino acid. There are 64 possible codons but only 61 sense codons for 20 amino acids (the code is degenerate) — multiple tRNAs can carry the same amino acid.' },
  { level:2, visual:'🌊', question:'What is work in physics, and what is its SI unit?', options:['Work = Force × distance in the direction of force; measured in joules (J)','Work = Power × time; measured in watts','Work = mass × acceleration; measured in newtons'], answer:'Work = Force × distance in the direction of force; measured in joules (J)', fact:'⚙️ W = Fd cosθ where θ is the angle between force and displacement. If you push perpendicular to motion (like a normal force), you do zero work. 1 joule = 1 newton × 1 meter. The work-energy theorem: net work done on an object equals its change in kinetic energy (W = ΔKE).' },
  { level:2, visual:'🌍', question:'What is the Moho and how was it discovered?', options:['The boundary between Earth\'s crust and mantle where seismic wave speeds increase; discovered by seismic wave analysis in 1909','The boundary between the outer and inner core where S-waves stop; found by shadow zone analysis','The boundary between the mantle and outer core where convection begins'], answer:'The boundary between Earth\'s crust and mantle where seismic wave speeds increase; discovered by seismic wave analysis in 1909', fact:'🌍 Andrija Mohorovičić noticed that seismic waves from a 1909 Croatian earthquake arrived earlier than expected at distant stations — they had refracted at a discontinuity where rock density increases. Continental crust is 30–70 km thick; oceanic crust only 5–10 km. The unrealised Project Mohole (1960s) aimed to drill through the crust to sample the mantle.' },
  { level:2, visual:'🔬', question:'What is the function of the endoplasmic reticulum (ER) in eukaryotic cells?', options:['Rough ER: synthesises and processes proteins; Smooth ER: synthesises lipids and detoxifies substances','Both types of ER primarily produce ATP for the cell','The ER is the site of photosynthesis in plant cells'], answer:'Rough ER: synthesises and processes proteins; Smooth ER: synthesises lipids and detoxifies substances', fact:'🔬 Rough ER is studded with ribosomes — proteins made here are folded and modified. Smooth ER has no ribosomes — it makes phospholipids, steroid hormones, and breaks down drugs/toxins (important in liver cells). The ER is continuous with the nuclear envelope, forming an interconnected membrane network throughout the cell.' },
  { level:2, visual:'🌊', question:'What is the first law of thermodynamics in terms of internal energy, heat, and work?', options:['ΔU = Q − W; the change in internal energy equals heat added minus work done by the system','Q = ΔU + W; heat equals internal energy change plus work input','W = Q + ΔU; work done equals heat plus internal energy'], answer:'ΔU = Q − W; the change in internal energy equals heat added minus work done by the system', fact:'⚡ This is conservation of energy for thermodynamic systems. A positive Q means heat flows into the system; positive W means the system does work on its surroundings. In a gas expanding in a cylinder: it does work (W > 0) and if no heat is added (Q = 0), its internal energy and temperature drop. This is how refrigerators work!' },
  { level:2, visual:'🧪', question:'What are the products of the reaction between zinc and hydrochloric acid?', options:['Zinc chloride (ZnCl₂) and hydrogen gas (H₂)','Zinc oxide (ZnO) and water (H₂O)','Zinc hydroxide Zn(OH)₂ and hydrogen chloride gas'], answer:'Zinc chloride (ZnCl₂) and hydrogen gas (H₂)', fact:'⚗️ Zn + 2HCl → ZnCl₂ + H₂↑. This is a single replacement reaction — zinc displaces hydrogen from the acid. Metals above hydrogen in the activity series (reactivity series) displace H₂ from acids. The hydrogen gas can be tested with a lit splint — it produces a characteristic "squeaky pop".' },
  { level:2, visual:'🌿', question:'What is the difference between type I (simple) and type II (complex) immune responses, or more correctly between innate and adaptive immunity?', options:['Innate immunity: fast, non-specific first defense; Adaptive immunity: slower, specific response with memory cells','Innate immunity: involves antibodies; Adaptive immunity: involves phagocytosis','Innate is active from birth only; Adaptive must be vaccinated into existence'], answer:'Innate immunity: fast, non-specific first defense; Adaptive immunity: slower, specific response with memory cells', fact:'🛡️ Innate immunity (skin, macrophages, natural killer cells, inflammation) responds in minutes to hours. Adaptive immunity (B cells → antibodies; T cells → cytotoxic killing) takes days but creates memory cells for faster future responses. Vaccines work by triggering adaptive immunity safely, without disease. All vertebrates have adaptive immunity; invertebrates only have innate.' },
  { level:2, visual:'📡', question:'What is the electromagnetic spectrum\'s role in astronomy?', options:['Different wavelengths reveal different aspects of celestial objects — radio shows cold gas, infrared shows dust, X-ray shows hot plasma','Only visible light is useful for astronomy because our atmosphere blocks other wavelengths','Radio and visible light are used; all other wavelengths are blocked by telescopes\' mirrors'], answer:'Different wavelengths reveal different aspects of celestial objects — radio shows cold gas, infrared shows dust, X-ray shows hot plasma', fact:'🔭 Earth\'s atmosphere blocks most non-visible wavelengths, requiring space telescopes. Radio: Jansky (1932) — galaxies, pulsars, CMB. Infrared: dust, star formation. UV and X-ray: hot gas, black holes, neutron stars. Gamma ray: most energetic events. Multi-wavelength astronomy reveals the complete picture of the cosmos!' },
  { level:2, visual:'🌍', question:'What is the difference between potential energy and kinetic energy, and state the conservation of mechanical energy?', options:['PE is stored energy (position/chemical/elastic); KE is energy of motion; in a closed system PE+KE = constant','PE is always larger than KE in nature','KE is stored in bonds; PE is the energy of moving particles'], answer:'PE is stored energy (position/chemical/elastic); KE is energy of motion; in a closed system PE+KE = constant', fact:'⚙️ Conservation of mechanical energy: in the absence of friction, PE + KE = constant. A swinging pendulum: maximum PE at the top, maximum KE at the bottom. A roller coaster converts GPE to KE on the way down. In reality, friction converts some mechanical energy to thermal energy — total energy is still conserved!' },
  { level:2, visual:'🧬', question:'What is the difference between genotype and phenotype?', options:['Genotype is the genetic makeup; phenotype is the observable physical/biochemical trait','Genotype is the visible trait; phenotype is the underlying gene sequence','They are synonymous — both describe the visible appearance of an organism'], answer:'Genotype is the genetic makeup; phenotype is the observable physical/biochemical trait', fact:'🧬 Phenotype = genotype + environment. Two organisms with the same genotype can have different phenotypes if raised in different environments (e.g., identical twins). The same phenotype can arise from different genotypes (e.g., tall plants can be TT or Tt). Environmental factors like diet, temperature, and stress influence gene expression and thus phenotype.' },
  { level:2, visual:'🔋', question:'What is the efficiency of an energy conversion and how is it calculated?', options:['Efficiency (%) = (useful energy output / total energy input) × 100','Efficiency (%) = (energy input / energy output) × 100','Efficiency = power output × time'], answer:'Efficiency (%) = (useful energy output / total energy input) × 100', fact:'⚡ No real machine is 100% efficient — the Second Law of Thermodynamics guarantees some energy is wasted as heat. A car engine is ~25% efficient; an LED light bulb ~80%; a human muscle ~25%. Understanding efficiency is crucial for engineering and energy policy — improving efficiency is the fastest way to reduce energy consumption and emissions.' },
