  { level:3, visual:'📉', question:'What is the "net energy cliff"?', options:['The point at which falling EROEI of energy sources requires so much energy investment that less and less is available for the rest of the economy','The rapid decline in fossil fuel production when reserves are nearly depleted','The point at which renewable energy becomes cheaper than fossil fuels in all market segments'], answer:'The point at which falling EROEI of energy sources requires so much energy investment that less and less is available for the rest of the economy', fact:'📉 At EROEI of 10:1, only 10% of gross energy is needed to run the energy system, leaving 90% for society. At 3:1, one third goes just to maintaining energy supply. The cliff effect makes low-EROEI sources less valuable than headline costs suggest!' },
  { level:3, visual:'🏭', question:'What is Carbon Capture and Storage (CCS) and what are its main limitations?', options:['Capturing CO₂ at emission sources and storing it underground; limited by high cost ($100–300/tonne), energy penalty, storage leakage risk, and slow deployment','A technology that captures CO₂ from the air using chemical solvents and converts it to fuel','The process of injecting CO₂ into geological formations where it reacts with rock to form permanent minerals'], answer:'Capturing CO₂ at emission sources and storing it underground; limited by high cost ($100–300/tonne), energy penalty, storage leakage risk, and slow deployment', fact:'🏭 CCS was meant to be scaling up by the 2010s but barely 0.1% of global CO₂ is currently captured. The 20–30% energy penalty makes power plants significantly less efficient. Many experts argue it has served as a delay tactic for the fossil fuel industry!' },
  { level:3, visual:'🌬️', question:'What is Direct Air Capture (DAC) and what limits its scalability?', options:['Technology that pulls CO₂ directly from ambient air using chemical processes; limited by extremely high energy use and costs of $400–1000+ per tonne','A reforestation strategy that directly captures carbon using fast-growing tree plantations','Large fans that concentrate atmospheric CO₂ for use in industrial processes'], answer:'Technology that pulls CO₂ directly from ambient air using chemical processes; limited by extremely high energy use and costs of $400–1000+ per tonne', fact:'🌬️ Currently only ~0.01 million tonnes of CO₂ are captured by DAC globally per year — vs 37 billion tonnes emitted. To matter at scale, we would need thousands of plants powered by clean electricity. Costs are falling but are still 20× more expensive than natural solutions!' },
  { level:3, visual:'🌾', question:'What is enhanced weathering as a carbon removal strategy?', options:['Spreading crushed silicate rocks on farmland where natural weathering reactions absorb CO₂ from the air while potentially improving soil fertility','Accelerating natural glacier retreat to expose fresh rock that absorbs atmospheric CO₂','Pumping CO₂ into deep ocean sediments where it reacts with minerals to form stable carbonates'], answer:'Spreading crushed silicate rocks on farmland where natural weathering reactions absorb CO₂ from the air while potentially improving soil fertility', fact:'🌾 Enhanced weathering could sequester 0.5–4 billion tonnes of CO₂ per year globally. Basalt rock applications also supply calcium and magnesium to soils, reducing fertiliser needs. Early field trials show promising results, but costs and monitoring remain challenges!' },
  { level:3, visual:'🌊', question:'What are the pros and cons of ocean iron fertilization as a carbon removal strategy?', options:['Iron adds nutrients for phytoplankton blooms that absorb CO₂; but risks include ocean dead zones, disrupting fisheries, and uncertain permanence of carbon storage','It is the only scalable ocean-based carbon removal with no significant ecological risks','Ocean iron fertilization permanently sequesters carbon in deep ocean sediments, making it the most cost-effective climate solution'], answer:'Iron adds nutrients for phytoplankton blooms that absorb CO₂; but risks include ocean dead zones, disrupting fisheries, and uncertain permanence of carbon storage', fact:'🌊 Iron is the limiting nutrient in 30% of the ocean. Adding iron causes phytoplankton explosions that absorb CO₂. But when they die, much carbon is re-released. Large-scale experiments have been banned as rogue geoengineering under the London Protocol!' },
  { level:3, visual:'🌋', question:'What are the risks of stratospheric aerosol injection (SAI) as a geoengineering approach?', options:['Regional precipitation disruption, ozone depletion, termination shock if suddenly stopped, and shifting geopolitical control over global temperature','It would cause uniform global cooling with minimal regional variation','The only risk is a small reduction in solar panel efficiency due to reduced direct sunlight'], answer:'Regional precipitation disruption, ozone depletion, termination shock if suddenly stopped, and shifting geopolitical control over global temperature', fact:'🌋 SAI mimics volcanic eruptions — Mount Pinatubo (1991) cooled Earth by 0.5°C for 2 years. But if injections stopped suddenly (e.g., in conflict), rapid warming could occur in years, not decades — "termination shock" potentially more destructive than gradual warming!' },
  { level:3, visual:'🐺', question:'What is the Rewilding Europe initiative and what has it achieved?', options:['A programme to restore wild nature across 1 million hectares of Europe by reintroducing lost species and reducing human management','A European Union directive requiring all member states to restore 30% of degraded ecosystems by 2030','A conservation scheme paying European farmers to leave farmland fallow for wildlife'], answer:'A programme to restore wild nature across 1 million hectares of Europe by reintroducing lost species and reducing human management', fact:'🐺 Rewilding Europe works with communities across 10 landscapes from the Danube Delta to the Scottish Highlands. Wolves have naturally returned to Germany, France, and Belgium. Bison have been reintroduced to Romania. Nature is proving remarkably resilient when given space!' },
  { level:3, visual:'🌍', question:'What is the 30×30 biodiversity target and which agreement established it?', options:['The goal of protecting 30% of land and 30% of oceans by 2030, established by the Kunming-Montreal Global Biodiversity Framework in 2022','The target of restoring 30% of degraded ecosystems by 2030 in the EU Nature Restoration Law','The CBD\'s goal of reducing extinction rates by 30 times compared to the 2010 baseline'], answer:'The goal of protecting 30% of land and 30% of oceans by 2030, established by the Kunming-Montreal Global Biodiversity Framework in 2022', fact:'🌍 Currently about 17% of land and 8% of oceans are protected. To reach 30×30, an area larger than Africa would need new protection. Critically, "protected" must mean effectively managed, not just on paper — many existing protected areas are "paper parks"!' },
  { level:3, visual:'🌿', question:'What are the Convention on Biological Diversity\'s (CBD) four main goals under the Kunming-Montreal Framework?', options:['Protect 30% of land and seas, restore 30% of degraded ecosystems, reduce harmful subsidies by $500bn, and share benefits from genetic resources equitably','Ban all wildlife trade, restore all extinct species, eliminate all invasive species, and create a global biodiversity fund','Reduce extinction rates by 90%, protect all remaining old-growth forests, clean up all ocean plastic, and ban single-use products globally'], answer:'Protect 30% of land and seas, restore 30% of degraded ecosystems, reduce harmful subsidies by $500bn, and share benefits from genetic resources equitably', fact:'🌿 The 2022 Kunming-Montreal Framework has 23 targets. A key breakthrough: committing to eliminate or reform the $500bn+ in annual government subsidies that harm biodiversity (like agricultural subsidies driving habitat loss and overfishing subsidies). Truly transformative if implemented!' },
  { level:3, visual:'💰', question:'What is the "doughnut economics" critique of GDP as a policy target?', options:['GDP measures economic activity not welfare — it rises when pollution is cleaned up, when people get sick, and when disasters are rebuilt, while ignoring inequality and environmental destruction','GDP is an accurate measure of national wealth but fails to capture wealth distribution','GDP growth is always necessary for funding environmental protection through government revenues'], answer:'GDP measures economic activity not welfare — it rises when pollution is cleaned up, when people get sick, and when disasters are rebuilt, while ignoring inequality and environmental destruction', fact:'💰 Robert Kennedy noted in 1968 that GDP "measures everything except that which makes life worthwhile." Beyond GDP metrics like the Genuine Progress Indicator, Gross National Happiness (Bhutan), and OECD Better Life Index try to capture what actually matters for human flourishing!' },
  { level:3, visual:'🌱', question:'What is the concept of "planetary boundaries" and who developed it?', options:['Nine Earth system processes that define a safe operating space for humanity, developed by Johan Rockström and colleagues in 2009','The physical limits to the amount of waste the planet can absorb, calculated by the UN Environment Programme','The maximum population that Earth can support, modelled by the Club of Rome in 1972'], answer:'Nine Earth system processes that define a safe operating space for humanity, developed by Johan Rockström and colleagues in 2009', fact:'🌱 The nine boundaries include climate change, biosphere integrity, land-system change, freshwater use, and biogeochemical flows. As of 2023, six of nine boundaries have been transgressed. We are operating outside the "safe zone" for unprecedented ecosystem risks!' },
  { level:3, visual:'⚖️', question:'What is the "polluter pays" principle in environmental law?', options:['Those who cause pollution should bear the costs of managing it and compensating those harmed, rather than the cost falling on society or the environment','Developing countries that have historically polluted least should receive compensation from industrialised nations','Industries should pay for pollution permits proportional to their emission levels'], answer:'Those who cause pollution should bear the costs of managing it and compensating those harmed, rather than the cost falling on society or the environment', fact:'⚖️ The polluter pays principle is enshrined in EU and OECD environmental law. When BP caused the Deepwater Horizon spill, it paid $65 billion in fines — though many argue the full environmental costs were never truly priced in. Externalities must be internalised!' },
  { level:3, visual:'🔬', question:'What is the IPCC and how does it produce its reports?', options:['The Intergovernmental Panel on Climate Change — a UN body that synthesises thousands of peer-reviewed scientific papers and produces consensus reports on climate science every 6–7 years','The International Policy Coordination Committee, which drafts climate policy for all UN member states','An independent scientific organisation that conducts its own climate research and models future scenarios'], answer:'The Intergovernmental Panel on Climate Change — a UN body that synthesises thousands of peer-reviewed scientific papers and produces consensus reports on climate science every 6–7 years', fact:'🔬 The IPCC doesn\'t do original research — it synthesises existing peer-reviewed science. Its Sixth Assessment Report (2021–2023) was written by 234 authors from 65 countries, reviewing 14,000 scientific papers. Its conclusions represent genuine scientific consensus!' },
  { level:3, visual:'🌊', question:'What is the thermohaline circulation (AMOC) and why is its potential slowdown concerning?', options:['The Atlantic Ocean circulation driven by temperature and salinity differences that distributes heat globally; its slowdown could plunge NW Europe into colder winters and disrupt monsoons globally','The circulation of warm air currents in the upper troposphere that drive weather patterns in temperate zones','The movement of cold Antarctic water to the surface in tropical oceans that moderates equatorial temperatures'], answer:'The Atlantic Ocean circulation driven by temperature and salinity differences that distributes heat globally; its slowdown could plunge NW Europe into colder winters and disrupt monsoons globally', fact:'🌊 AMOC is already 15% weaker than in the mid-20th century. A collapse could cool UK temperatures by 3–5°C, shift the ITCZ southwards (devastating Sahel rainfall), and accelerate sea level rise on the US East Coast — a tipping point with global consequences!' },
  { level:3, visual:'🌍', question:'What is the concept of "safe and just Earth system boundaries" (2023)?', options:['An updated planetary boundaries framework that adds social justice dimensions, showing Earth has already exceeded safe limits for six out of eight boundaries','A UN resolution establishing legally binding limits on global greenhouse gas concentrations','A framework for determining which countries have used more than their fair share of global commons'], answer:'An updated planetary boundaries framework that adds social justice dimensions, showing Earth has already exceeded safe limits for six out of eight boundaries', fact:'🌍 The 2023 Earth Commission study found Earth has crossed safe boundaries for climate change, biosphere integrity, freshwater, land-system change, and pollution. It adds justice boundaries (ensuring minimum well-being for all), showing current overshoot harms the poorest first!' },
  { level:3, visual:'🌿', question:'What is "agroecology" and how does it differ from conventional agriculture?', options:['Applying ecological science to food systems to design regenerative farms that work with natural processes rather than against them, reducing inputs and building resilience','A scientific discipline that studies the ecological impacts of existing industrial farming practices','A type of precision agriculture that uses sensors and AI to optimise conventional crop production'], answer:'Applying ecological science to food systems to design regenerative farms that work with natural processes rather than against them, reducing inputs and building resilience', fact:'🌿 Agroecology combines traditional knowledge with modern science. Studies show agroecological farms can match conventional yields in many contexts while improving biodiversity, soil health, and farmer incomes. The UN\'s FAO now actively promotes agroecology as key to food system transformation!' },
  { level:3, visual:'🌊', question:'What are the main challenges in valuing biodiversity for economic decision-making?', options:['Biodiversity provides non-substitutable, often unknown services; many species and their interactions are undiscovered; and extinction is irreversible — standard economic tools poorly capture these features','Biodiversity has no direct economic value — its value is entirely ethical and aesthetic','Economic value of biodiversity is straightforward to calculate using market prices for ecosystem products like timber and fish'], answer:'Biodiversity provides non-substitutable, often unknown services; many species and their interactions are undiscovered; and extinction is irreversible — standard economic tools poorly capture these features', fact:'🌊 The rosy periwinkle provided vincristine, a drug that raises childhood leukaemia survival from 20% to 80%. We don\'t know which currently unknown species could provide the next medical breakthrough. Extinction permanently forecloses these options — a cost economic models struggle to quantify!' },
  { level:3, visual:'⚗️', question:'What is the "circular bioeconomy" concept?', options:['An economic system that uses biological resources sustainably and regeneratively, keeping materials in use through renewable cycles rather than linear extraction and disposal','A financial market for trading biological assets like forests, fisheries, and agricultural land','A system in which all industrial processes are powered by biomass instead of fossil fuels'], answer:'An economic system that uses biological resources sustainably and regeneratively, keeping materials in use through renewable cycles rather than linear extraction and disposal', fact:'⚗️ The circular bioeconomy aims to replace fossil-based materials with bio-based alternatives: bioplastics from crop residues, packaging from seaweed, materials from mycelium (fungal roots). The EU\'s Bioeconomy Strategy targets a €2 trillion circular bioeconomy by 2030!' },
  { level:3, visual:'🌡️', question:'What is "climate overshoot" and what are the risks of relying on it?', options:['Temporarily exceeding 1.5°C warming before using carbon removal to return below it; risks include irreversible tipping points being triggered during the overshoot period','The inevitable warming above pre-industrial temperatures that is now locked in regardless of action','The difference between current emission trajectories and the pathway needed to meet Paris targets'], answer:'Temporarily exceeding 1.5°C warming before using carbon removal to return below it; risks include irreversible tipping points being triggered during the overshoot period', fact:'🌡️ Most IPCC scenarios now rely on overshoot — reaching 1.6–1.8°C then "drawing down" with speculative negative emission technologies. Critics warn this is a moral hazard: tipping points triggered at 1.7°C cannot be reversed once the temperature comes back down!' },
  { level:3, visual:'🌿', question:'What is the concept of "nature-based solutions" (NbS)?', options:['Actions that protect, restore, or sustainably manage natural ecosystems to address societal challenges like climate change, disaster risk, food security, and health','A technological approach that mimics biological processes to solve industrial efficiency problems','Government subsidies for the agricultural sector conditional on meeting biodiversity targets'], answer:'Actions that protect, restore, or sustainably manage natural ecosystems to address societal challenges like climate change, disaster risk, food security, and health', fact:'🌿 Nature-based solutions — restoring forests, wetlands, and mangroves — could provide 30% of the mitigation needed to limit warming to 1.5°C. They are often cheaper than engineered alternatives: a mangrove provides coastal protection that costs $1,000 vs $10,000/m for a sea wall!' },
  { level:3, visual:'🌊', question:'What is "blue economy" and how does it relate to ocean sustainability?', options:['Economic activities in the ocean and coastal areas developed sustainably — balancing growth in fisheries, tourism, and shipping with marine ecosystem health','The global market for blue carbon credits from mangroves, seagrasses, and salt marshes','A financial model replacing GDP with ocean health metrics for coastal nations'], answer:'Economic activities in the ocean and coastal areas developed sustainably — balancing growth in fisheries, tourism, and shipping with marine ecosystem health', fact:'🌊 The ocean economy is worth $2.5 trillion/year and supports 3 billion people\'s livelihoods. But fishing subsidies ($35 billion/year) drive overfishing; shipping emits 2.5% of global CO₂. A true blue economy requires internalising these costs rather than externalising them onto future generations!' },
  { level:3, visual:'🌱', question:'What is "regenerative agriculture" and how does it differ from sustainable agriculture?', options:['Regenerative agriculture actively improves ecosystem health (builds soil, increases biodiversity); sustainable agriculture aims only to maintain current conditions without further degradation','Regenerative agriculture uses only organic methods; sustainable agriculture can use synthetic chemicals if carefully managed','Regenerative agriculture is a marketing term with no scientific definition; sustainable agriculture has legally binding standards'], answer:'Regenerative agriculture actively improves ecosystem health (builds soil, increases biodiversity); sustainable agriculture aims only to maintain current conditions without further degradation', fact:'🌱 "Sustaining" a degraded system is not enough — regenerative agriculture goes further. Cover crops, no-till, diverse rotations, and integrated livestock can sequester 0.9–1.85 billion tonnes of CO₂ per year globally while reversing soil degradation!' },
  { level:3, visual:'📋', question:'What is the Intergovernmental Science-Policy Panel on Chemicals, Waste and Pollution Prevention (IPCP)?', options:['A new UN body (est. 2022) that synthesises scientific knowledge on chemical pollution to inform global policy, analogous to the IPCC for climate','The committee that manages the Basel, Rotterdam, and Stockholm Convention secretariats','A WHO body that sets maximum residue limits for pesticides in food internationally'], answer:'A new UN body (est. 2022) that synthesises scientific knowledge on chemical pollution to inform global policy, analogous to the IPCC for climate', fact:'📋 With over 350,000 chemicals registered for use globally, and pollution boundary already transgressed, the IPCP fills a critical gap. Chemical pollution causes an estimated 9 million deaths per year — more than AIDS, tuberculosis, and malaria combined!' },
  { level:3, visual:'🌍', question:'What is the concept of "common but differentiated responsibilities" (CBDR) in international environmental law?', options:['All nations share responsibility for global environmental problems but their obligations differ based on historical contribution and current capacity','All nations have equal legal obligations under international environmental treaties','Developing countries bear greater responsibility for biodiversity loss; developed countries for climate change'], answer:'All nations share responsibility for global environmental problems but their obligations differ based on historical contribution and current capacity', fact:'🌍 CBDR underpins climate negotiations: the US has emitted more cumulative CO₂ than any other nation; the EU is responsible for 22% of historical emissions. Developing nations argue they have the right to develop and that rich nations must lead on cuts and fund adaptation!' },
  { level:3, visual:'🌿', question:'What is the "half Earth" proposal by E.O. Wilson?', options:['A proposal to protect half the planet\'s land and sea area from extractive human use to safeguard the majority of biodiversity','A target to halve the rate of species extinction by 2030 through targeted conservation in biodiversity hotspots','A scientific model showing that 50% habitat protection is the minimum needed to maintain stable ecosystem function'], answer:'A proposal to protect half the planet\'s land and sea area from extractive human use to safeguard the majority of biodiversity', fact:'🌿 E.O. Wilson argued that protecting half the Earth could safeguard 80–85% of species. Critics worry about the impact on 300 million people living in or depending on proposed protected areas. The 30×30 target is seen as a first step toward this vision!' },
  { level:3, visual:'🔬', question:'What is the "exposome" concept in environmental health research?', options:['The total lifetime exposure of an individual to environmental factors — chemicals, diet, lifestyle, and stress — that shapes health outcomes beyond genetics','The full genome of an organism used to assess its vulnerability to environmental pollutants','The range of environmental conditions across a habitat studied to understand ecosystem health'], answer:'The total lifetime exposure of an individual to environmental factors — chemicals, diet, lifestyle, and stress — that shapes health outcomes beyond genetics', fact:'🔬 Research suggests genes account for only about 30% of disease risk; the exposome accounts for the rest. Air pollution, drinking water quality, chemical exposure, and diet are all exposome factors. Understanding the exposome is transforming how we think about environmental health policy!' },
  { level:3, visual:'⚖️', question:'What is "environmental personhood" and which legal systems have granted it?', options:['The legal concept of granting rivers, forests, or other natural entities the same rights as persons to be represented in court; New Zealand (Whanganui River), Ecuador, and India have explored this','A legal principle requiring environmental impact assessments before all major developments','The right of future generations to a clean environment, enshrined in the constitutions of several European countries'], answer:'The legal concept of granting rivers, forests, or other natural entities the same rights as persons to be represented in court; New Zealand (Whanganui River), Ecuador, and India have explored this', fact:'⚖️ New Zealand\'s Whanganui River was granted legal personhood in 2017 — the first river in the world. Ecuador\'s constitution grants Rights of Nature. The concept is growing: if a corporation can be a legal person, why not a river whose health supports millions?' },
  { level:3, visual:'🌊', question:'What is the concept of "ocean governance" and why is the high seas particularly challenging?', options:['Managing ocean use sustainably; the high seas (64% of the ocean) lie outside national jurisdiction and have historically had minimal binding environmental protection','Ocean governance refers only to international fishing agreements and the UNCLOS treaty','The challenge of co-ordinating the 195 nations that border the ocean to share fishery catches equitably'], answer:'Managing ocean use sustainably; the high seas (64% of the ocean) lie outside national jurisdiction and have historically had minimal binding environmental protection', fact:'🌊 The 2023 High Seas Treaty (BBNJ Agreement) was a historic breakthrough — the first international framework for protecting the 64% of the ocean beyond national borders. It enables marine protected areas on the high seas and requires environmental impact assessments for deep-sea mining!' },
  { level:3, visual:'🌱', question:'What does "additionality" mean in carbon offset markets?', options:['The requirement that offset projects represent genuine emissions reductions beyond what would have happened anyway without the carbon finance','The requirement for carbon offset projects to add co-benefits like biodiversity or community development alongside carbon savings','The principle that each tonne of offset must be verified by at least two independent auditing bodies'], answer:'The requirement that offset projects represent genuine emissions reductions beyond what would have happened anyway without the carbon finance', fact:'🌱 Additionality is the most disputed concept in carbon markets. A study of voluntary REDD+ forest credits found over 90% had no additionality — forests were "protected" that faced no real threat of deforestation. Poor additionality means companies buy "zero carbon" products while emissions continue unchecked!' },
  { level:3, visual:'🌍', question:'What is "loss and damage" in climate negotiations?', options:['Compensation and assistance for climate-vulnerable nations suffering unavoidable impacts that cannot be adapted to — such as sea level rise submerging small islands','Financial penalties imposed on high-emitting nations under the Paris Agreement','The economic losses caused by natural disasters in developing countries, regardless of climate attribution'], answer:'Compensation and assistance for climate-vulnerable nations suffering unavoidable impacts that cannot be adapted to — such as sea level rise submerging small islands', fact:'🌍 A Loss and Damage Fund was established at COP27 (2022) — a landmark moment after 30 years of developing country advocacy. Countries like Kiribati, Tuvalu, and Bangladesh face existential threats from sea level rise they did almost nothing to cause. Fairness demands rich nations pay!' },
  { level:3, visual:'🌿', question:'What is the "Kunming-Montreal Global Biodiversity Framework" and what makes it historic?', options:['The 2022 global agreement to halt and reverse biodiversity loss by 2030, including the 30×30 target and $200bn in annual biodiversity finance — the first with specific financial commitments','A 2010 CBD agreement that set 20 Aichi Targets, of which 6 were partially met by 2020','The first international treaty making biodiversity loss a legally enforceable crime under international law'], answer:'The 2022 global agreement to halt and reverse biodiversity loss by 2030, including the 30×30 target and $200bn in annual biodiversity finance — the first with specific financial commitments', fact:'🌿 The Kunming-Montreal Framework was agreed by 196 nations in December 2022. Its Target 19 commits $200 billion annually for biodiversity by 2030 — including $20bn in international flows to developing nations. Implementation monitoring is the critical next challenge!' },
  // ── NEW BATCH: 35 questions to reach 500 ──────────────────────────────────
  { level:1, visual:'🌿', question:'What does "carbon neutral" mean?', options:['Balancing the CO₂ emitted with an equal amount absorbed or offset, resulting in zero net emissions','Using only green materials in construction','Paying a tax on every tonne of carbon you burn'], answer:'Balancing the CO₂ emitted with an equal amount absorbed or offset, resulting in zero net emissions', fact:'🌿 A carbon-neutral organisation adds no net CO₂ to the atmosphere. They cut emissions as much as possible, then offset the rest — for example by funding tree-planting or renewable energy projects.' },
  { level:1, visual:'🐼', question:'What do the letters WWF stand for?', options:['World Wildlife Fund','World Weather Foundation','World Water Forum'], answer:'World Wildlife Fund', fact:'🐼 The WWF (now officially "World Wide Fund for Nature" in most countries) was founded in 1961. Its iconic giant panda logo was chosen because the animal was already endangered and its black-and-white colouring kept printing costs low!' },
  { level:1, visual:'🦁', question:'What is eco-tourism?', options:['Responsible travel to natural areas that conserves the environment and benefits local communities','Camping using only recycled equipment','Travelling by electric vehicle to reduce emissions'], answer:'Responsible travel to natural areas that conserves the environment and benefits local communities', fact:'🦁 Eco-tourism brings income to local communities that gives them a financial reason to protect wildlife instead of hunting it. Kenya\'s safari industry earns over $1 billion a year, funding conservation of lions, elephants, and rhinos!' },
  { level:1, visual:'🌊', question:'What is the main source of microplastics in the ocean?', options:['Breakdown of larger plastic litter','Chemical spills from factories','Volcanic eruptions underwater'], answer:'Breakdown of larger plastic litter', fact:'🌊 Sunlight and wave action break large plastic items into tiny fragments under 5 mm — microplastics. They are now found in the deepest ocean trenches, Arctic ice, and even in human blood!' },
  { level:1, visual:'🌬️', question:'What is wind energy?', options:['Electricity generated by turbines that spin when the wind blows','Energy stored in compressed air tanks','Heat produced by fast-moving air currents'], answer:'Electricity generated by turbines that spin when the wind blows', fact:'🌬️ Wind turbines convert kinetic energy from the wind into electricity. A single large offshore turbine can power more than 1,000 homes. Wind is now one of the cheapest sources of new electricity in the world!' },
  { level:1, visual:'🌱', question:'What does "reduce" mean in the context of the three Rs (Reduce, Reuse, Recycle)?', options:['Using less of a resource in the first place to create less waste','Sorting waste into separate bins','Turning old items into new ones in a factory'], answer:'Using less of a resource in the first place to create less waste', fact:'🌱 Reduce is the most powerful of the three Rs because waste that is never created causes no environmental harm. Buying only what you need, choosing products with less packaging, and repairing items instead of replacing them all help!' },
  { level:1, visual:'☀️', question:'What is a solar panel made of that converts sunlight into electricity?', options:['Photovoltaic (PV) cells made of silicon','Glass lenses that focus sunlight onto a boiler','Mirrors that reflect heat into a turbine'], answer:'Photovoltaic (PV) cells made of silicon', fact:'☀️ When photons from sunlight hit a silicon PV cell, they knock electrons loose, creating an electric current. Solar panel prices have dropped 90% since 2010, making solar the cheapest electricity source in history!' },
  { level:1, visual:'🌍', question:'What does the term "greenhouse effect" describe?', options:['How certain gases in the atmosphere trap heat and warm the Earth','The growing of plants in glass greenhouses','The way sunlight is reflected off ice caps'], answer:'How certain gases in the atmosphere trap heat and warm the Earth', fact:'🌍 The natural greenhouse effect keeps Earth about 33°C warmer than it would otherwise be — making life possible. Human activity is enhancing this effect by adding extra CO₂ and methane, causing dangerous additional warming!' },
  { level:1, visual:'🌿', question:'What is a carbon footprint calculator used for?', options:['Estimating the total greenhouse gas emissions from a person\'s lifestyle choices','Measuring the amount of carbon stored in a forest','Tracking carbon tax payments made by companies'], answer:'Estimating the total greenhouse gas emissions from a person\'s lifestyle choices', fact:'🌿 Carbon footprint calculators ask about your diet, travel, home energy, and shopping habits. The average global footprint is about 4 tonnes CO₂ per year — but wealthy nations average 10–16 tonnes. Big reductions come from flying less and eating less beef!' },
  { level:1, visual:'🐝', question:'What is pollination and why is it important for the environment?', options:['Transfer of pollen between flowers enabling plants to reproduce and produce fruit and seeds','The process by which bees make honey from flower nectar','The way bees communicate the location of flowers to each other'], answer:'Transfer of pollen between flowers enabling plants to reproduce and produce fruit and seeds', fact:'🐝 About 75% of the world\'s flowering plants and 35% of global food crops depend on pollinators like bees, butterflies, and birds. Pollinator decline threatens both wild ecosystems and our food supply!' },
  { level:1, visual:'🏭', question:'What is air pollution?', options:['Harmful substances released into the atmosphere by vehicles, factories, and other sources','Noise from aircraft affecting wildlife','Water vapour released by power stations'], answer:'Harmful substances released into the atmosphere by vehicles, factories, and other sources', fact:'🏭 Air pollution kills about 7 million people per year — more than HIV and malaria combined. Nitrogen dioxide, ozone, and fine particles (PM2.5) are the most dangerous. Switching to clean energy and electric vehicles dramatically cuts air pollution!' },
  { level:1, visual:'🌊', question:'What is ocean acidification?', options:['The ocean becoming more acidic as it absorbs CO₂ from the atmosphere','Acid rain falling directly into the sea','Industrial chemicals lowering the pH of coastal waters'], answer:'The ocean becoming more acidic as it absorbs CO₂ from the atmosphere', fact:'🌊 The ocean has absorbed about 30% of the CO₂ humans have emitted, turning more acidic. Since the Industrial Revolution, ocean pH has dropped by 0.1 units. This dissolves the shells and skeletons of corals, oysters, and sea urchins!' },
  { level:2, visual:'🌾', question:'What is "food sovereignty"?', options:['The right of peoples to define their own food and agriculture systems rather than having them dictated by global markets','A country\'s ability to produce enough food to feed its own population','The principle that all food production must be certified organic'], answer:'The right of peoples to define their own food and agriculture systems rather than having them dictated by global markets', fact:'🌾 The concept was introduced by La Via Campesina (a global peasant movement) in 1996. It argues that local communities and farmers — not corporations or the WTO — should control what is grown, how it is traded, and what people eat!' },
  { level:2, visual:'🏗️', question:'What is the "circular economy"?', options:['An economic model that keeps materials in use for as long as possible through reuse, repair, and recycling, eliminating waste','An economy where money circulates equally between all citizens','A system where companies must buy back their products at end of life'], answer:'An economic model that keeps materials in use for as long as possible through reuse, repair, and recycling, eliminating waste', fact:'🏗️ The linear economy (take–make–dispose) wastes huge resources. A circular economy designs waste out entirely — products become raw materials for the next cycle. The Ellen MacArthur Foundation estimates the circular economy could cut global CO₂ emissions by 45%!' },
  { level:2, visual:'🌿', question:'What is "sustainable agriculture"?', options:['Farming methods that meet current food needs without compromising the ability of future generations to grow food','Only farming on land that has never been cultivated before','Agriculture that uses no machinery or synthetic inputs of any kind'], answer:'Farming methods that meet current food needs without compromising the ability of future generations to grow food', fact:'🌿 Sustainable agriculture uses practices like crop rotation, cover crops, integrated pest management, and reduced tillage. It aims to maintain soil health, protect water quality, and support biodiversity while still producing enough food!' },
  { level:2, visual:'🔬', question:'What is "biomimicry"?', options:['Designing products and systems inspired by solutions found in nature','Breeding genetically modified organisms that mimic wild species','Creating synthetic biology to replace natural ecosystems'], answer:'Designing products and systems inspired by solutions found in nature', fact:'🔬 Velcro was inspired by burrs, wind turbine blades by whale fins, and high-speed trains by the kingfisher\'s beak. Nature has spent 3.8 billion years solving design problems — biomimicry borrows those solutions!' },
  { level:2, visual:'🌍', question:'What does "environmental justice" mean?', options:['The fair treatment of all people regardless of race or income regarding environmental laws, benefits, and burdens','A legal system for prosecuting companies that pollute the environment','The principle that nature has legal rights equal to those of humans'], answer:'The fair treatment of all people regardless of race or income regarding environmental laws, benefits, and burdens', fact:'🌍 Studies show polluting facilities are disproportionately located near low-income and minority communities. Environmental justice movements fight to ensure clean air, safe water, and access to green space are rights for everyone — not just the wealthy!' },
  { level:2, visual:'💧', question:'What is a "watershed"?', options:['All the land that drains into a particular river, lake, or other body of water','A protected area around a reservoir supplying drinking water','A barrier built to prevent flooding in coastal areas'], answer:'All the land that drains into a particular river, lake, or other body of water', fact:'💧 Everything that happens in a watershed affects the water body it drains into. Pollution, deforestation, and urban development upstream all impact water quality downstream. Managing whole watersheds — not just rivers — is key to clean water!' },
  { level:2, visual:'🌲', question:'What is "deforestation" and what are its main environmental impacts?', options:['Permanently clearing forests, causing loss of biodiversity, increased CO₂ emissions, soil erosion, and disruption of the water cycle','Thinning forests to allow more light to reach the forest floor and promote regrowth','Removing diseased trees from forests to protect healthy trees nearby'], answer:'Permanently clearing forests, causing loss of biodiversity, increased CO₂ emissions, soil erosion, and disruption of the water cycle', fact:'🌲 About 10 million hectares of forest are lost each year — roughly the size of Iceland. The Amazon alone stores an estimated 150–200 billion tonnes of carbon. Protecting forests is one of the fastest and cheapest ways to tackle climate change!' },
  { level:2, visual:'🐠', question:'What is a "marine protected area" (MPA)?', options:['A defined area of sea where human activities are restricted to allow marine ecosystems to recover and thrive','A shipping exclusion zone around an oil rig to prevent collisions','A coastal area designated for sustainable aquaculture only'], answer:'A defined area of sea where human activities are restricted to allow marine ecosystems to recover and thrive', fact:'🐠 MPAs can dramatically boost fish populations — studies show fish biomass inside MPAs is on average 670% higher than in unprotected areas. The 30×30 target agreed at COP15 (2022) aims to protect 30% of the ocean by 2030!' },
  { level:2, visual:'🌡️', question:'What is "climate sensitivity" in climate science?', options:['How much global average temperature rises for a doubling of atmospheric CO₂','The speed at which different regions warm relative to the global average','The threshold temperature at which ecosystems switch from carbon sinks to carbon sources'], answer:'How much global average temperature rises for a doubling of atmospheric CO₂', fact:'🌡️ The IPCC estimates climate sensitivity at 2.5–4°C per CO₂ doubling (most likely around 3°C). Even the low end has profound consequences. Higher sensitivity means reaching dangerous tipping points sooner than our current models predict!' },
  { level:2, visual:'🌿', question:'What are "nature-based solutions" (NbS) in climate policy?', options:['Actions that protect or restore ecosystems to address societal challenges including climate change, biodiversity loss, and food security simultaneously','Only tree-planting schemes used to offset industrial carbon emissions','Government policies that require businesses to replace destroyed habitats with new ones'], answer:'Actions that protect or restore ecosystems to address societal challenges including climate change, biodiversity loss, and food security simultaneously', fact:'🌿 Protecting mangroves, restoring peatlands, and improving soil carbon are all NbS. They can provide up to 30% of the mitigation needed to limit warming to 1.5°C at a fraction of the cost of engineered solutions — while also boosting biodiversity and water security!' },
  { level:2, visual:'🔋', question:'What is "energy storage" and why is it crucial for renewable energy?', options:['Technologies that store electricity for use when supply and demand do not match — essential because solar and wind generate power only when the sun shines or wind blows','The capacity of fossil fuel reserves in the ground','The process of storing chemical energy in biomass for later burning'], answer:'Technologies that store electricity for use when supply and demand do not match — essential because solar and wind generate power only when the sun shines or wind blows', fact:'🔋 Without storage, excess solar and wind power is wasted. Lithium-ion batteries, pumped hydro, and green hydrogen are all storage solutions. Battery costs have fallen 97% since 1990 — making grids powered entirely by renewables increasingly feasible!' },
  { level:3, visual:'💰', question:'What is the "social cost of carbon"?', options:['The estimated economic cost to society of emitting one additional tonne of CO₂, including health damage, agricultural losses, and climate impacts','The total tax revenue collected by governments from carbon pricing schemes','The cost of removing one tonne of CO₂ from the atmosphere using direct air capture technology'], answer:'The estimated economic cost to society of emitting one additional tonne of CO₂, including health damage, agricultural losses, and climate impacts', fact:'💰 The US government revised its social cost of carbon estimate from $51 per tonne to over $190 per tonne in 2022. This figure is used to set carbon taxes and evaluate climate policies. A higher figure justifies stronger action — making it intensely political!' },
  { level:3, visual:'📉', question:'What is a "carbon budget" in climate science?', options:['The total amount of CO₂ the world can emit while still limiting warming to a given temperature target such as 1.5°C','The annual carbon reduction target set by a national government under climate legislation','The financial budget allocated by a country to purchase carbon offsets and credits'], answer:'The total amount of CO₂ the world can emit while still limiting warming to a given temperature target such as 1.5°C', fact:'📉 The remaining 1.5°C carbon budget (from 2024) is roughly 200–300 GtCO₂ — at current rates, used up in under a decade. This makes immediate, deep cuts essential. Every tonne emitted now makes the remaining budget smaller and the required pace of cuts steeper!' },
  { level:3, visual:'🏭', question:'What is "net zero" and how does it differ from "carbon neutral"?', options:['Net zero covers all greenhouse gases across an entire economy or supply chain and requires residual emissions be removed by verified carbon drawdown; carbon neutral typically applies to CO₂ only and may rely more heavily on offsets','Net zero and carbon neutral are legally equivalent terms defined identically in the Paris Agreement','Net zero means zero emissions with no offsets allowed; carbon neutral allows unlimited offsetting'], answer:'Net zero covers all greenhouse gases across an entire economy or supply chain and requires residual emissions be removed by verified carbon drawdown; carbon neutral typically applies to CO₂ only and may rely more heavily on offsets', fact:'🏭 The Science Based Targets initiative (SBTi) found that most corporate "net zero" pledges lacked credible plans. True net zero requires 90–95% actual emission cuts before any offsetting — not accounting tricks. The Race to Zero campaign promotes credible standards!' },
  { level:3, visual:'🌾', question:'What is "regenerative agriculture" and how does it go beyond sustainable farming?', options:['Farming practices that actively rebuild soil health, sequester carbon, and restore biodiversity — going beyond merely sustaining current conditions to actively improving them','Agriculture that cycles all nutrients within the farm system using no external inputs whatsoever','Farming that regenerates degraded land using only native wild plant species'], answer:'Farming practices that actively rebuild soil health, sequester carbon, and restore biodiversity — going beyond merely sustaining current conditions to actively improving them', fact:'🌾 Regenerative practices include no-till farming, cover cropping, rotational grazing, and composting. Healthy soils can store more carbon than all the world\'s forests. Some farms have reversed decades of soil degradation in under ten years!' },
  { level:3, visual:'🌊', question:'What is "blue carbon" and why is it significant for climate mitigation?', options:['Carbon stored in coastal and marine ecosystems such as mangroves, seagrasses, and salt marshes — which store carbon far faster per hectare than tropical forests','CO₂ dissolved in the deep ocean where it is sequestered for millennia','Carbon captured from seawater by direct ocean extraction technologies'], answer:'Carbon stored in coastal and marine ecosystems such as mangroves, seagrasses, and salt marshes — which store carbon far faster per hectare than tropical forests', fact:'🌊 Mangroves store up to 10× more carbon per hectare than tropical forests — mostly in waterlogged soils. Yet we have destroyed 35% of global mangroves since the 1980s. Restoring blue carbon ecosystems is cheap, fast, and benefits fisheries and coastal protection too!' },
  { level:3, visual:'🌍', question:'What is the "IPCC" and what role does it play in international climate policy?', options:['The Intergovernmental Panel on Climate Change — a UN body that synthesises scientific research to inform governments, but does not conduct original research itself','The International Panel on Climate Control — a body that sets binding emissions targets for member states','The Intergovernmental Programme on Climate Collaboration — which funds climate research in developing nations'], answer:'The Intergovernmental Panel on Climate Change — a UN body that synthesises scientific research to inform governments, but does not conduct original research itself', fact:'🌍 The IPCC publishes major Assessment Reports every 6–7 years. AR6 (2021–22) concluded it is "unequivocal that human influence has warmed the atmosphere." Its reports are approved line-by-line by government representatives — making them both authoritative and diplomatically negotiated!' },
  { level:3, visual:'🔬', question:'What is "direct air capture" (DAC) and what are its limitations?', options:['Technology that chemically extracts CO₂ directly from ambient air and compresses it for storage or use; currently extremely energy-intensive and expensive at over $300 per tonne','A natural process whereby forests and soils remove CO₂ from the atmosphere through photosynthesis','Filtering system fitted to power station chimneys to capture CO₂ before it enters the atmosphere'], answer:'Technology that chemically extracts CO₂ directly from ambient air and compresses it for storage or use; currently extremely energy-intensive and expensive at over $300 per tonne', fact:'🔬 The world\'s largest DAC plant (Mammoth, Iceland, 2024) captures 36,000 tonnes of CO₂ per year — humanity emits 37 billion tonnes annually. DAC needs to scale by a million times while costs fall dramatically. Most scientists say it cannot substitute for cutting emissions!' },
  { level:3, visual:'🌿', question:'What is the difference between a carbon tax and an emissions trading scheme (ETS)?', options:['A carbon tax sets a fixed price per tonne of CO₂; an ETS sets a cap on total emissions and lets companies trade permits — fixing the quantity but letting the price fluctuate','A carbon tax applies only to individuals; an ETS applies only to industry and aviation','A carbon tax is used in developing countries; an ETS is used only by the European Union'], answer:'A carbon tax sets a fixed price per tonne of CO₂; an ETS sets a cap on total emissions and lets companies trade permits — fixing the quantity but letting the price fluctuate', fact:'🌿 The EU Emissions Trading System is the world\'s largest carbon market. Carbon taxes are simpler and more predictable. Most economists say a carbon price is the most cost-effective climate policy — but price levels in most countries remain far too low to drive the needed transformation!' },
  { level:3, visual:'🐟', question:'What is "ocean stratification" and how does climate change affect it?', options:['The layering of the ocean into distinct density layers; warming increases stratification, reducing the mixing that brings nutrients to the surface and oxygen to the deep','The seasonal separation of the ocean into warm surface water and cold deep water that reverses each year','The process by which the ocean absorbs CO₂ and distributes it to the deep ocean through mixing'], answer:'The layering of the ocean into distinct density layers; warming increases stratification, reducing the mixing that brings nutrients to the surface and oxygen to the deep', fact:'🐟 Ocean stratification has increased 5% globally since the 1960s. Reduced mixing means less nutrient upwelling — so fewer phytoplankton, less fish food, and less CO₂ absorption. The ocean\'s ability to buffer climate change is weakening as it warms!' },
  { level:3, visual:'🌱', question:'What is the "biodiversity-ecosystem function" relationship?', options:['Higher biodiversity makes ecosystems more productive, resilient, and stable — a diverse ecosystem performs more functions and recovers better from disturbance','Biodiversity is aesthetically valuable but does not significantly affect how ecosystems function','Only keystone species matter for ecosystem function; the rest of biodiversity is redundant'], answer:'Higher biodiversity makes ecosystems more productive, resilient, and stable — a diverse ecosystem performs more functions and recovers better from disturbance', fact:'🌱 Meta-analyses show that high-diversity plots produce more biomass, resist invasion better, and recover faster from drought. Losing species is not just a moral issue — it undermines the functioning of the natural systems humanity depends on for food, water, and clean air!' },
  { level:3, visual:'⚡', question:'What is "green hydrogen" and what role might it play in decarbonising the economy?', options:['Hydrogen produced using renewable electricity to split water (electrolysis) — producing zero carbon emissions and usable as fuel for shipping, steel, and other hard-to-electrify sectors','Natural gas converted to hydrogen with CO₂ stored underground (blue hydrogen)','Hydrogen extracted from agricultural waste through anaerobic digestion'], answer:'Hydrogen produced using renewable electricity to split water (electrolysis) — producing zero carbon emissions and usable as fuel for shipping, steel, and other hard-to-electrify sectors', fact:'⚡ Today over 95% of hydrogen is made from fossil fuels. Green hydrogen is currently expensive, but costs are falling fast. It is most valuable for uses that cannot easily be electrified directly — such as making steel, cement, and long-distance shipping fuel. Scale-up is critical!' },
  { level:3, visual:'🌍', question:'What is "common but differentiated responsibilities" (CBDR) in international climate law?', options:['The principle that all nations share responsibility for addressing climate change, but wealthier, higher-emitting nations bear a greater obligation to act and provide finance to developing nations','A legal clause allowing developing nations to opt out of emissions reduction commitments indefinitely','The requirement that all nations reduce emissions by the same percentage regardless of their level of development'], answer:'The principle that all nations share responsibility for addressing climate change, but wealthier, higher-emitting nations bear a greater obligation to act and provide finance to developing nations', fact:'🌍 CBDR is a cornerstone of the UNFCCC and Paris Agreement. The USA emitted 25% of all historical CO₂; the 100 most vulnerable nations emitted under 3%. Rich nations committed $100bn per year to developing nations at COP15 (2009) — a target not fully met until 2023!' },
];

const QUIZ_KEY = 'kids_q_env';
const POINTS_KEY='kids_points';
function getPoints(){return parseInt(localStorage.getItem(POINTS_KEY)||'0');}
function addPoints(n){localStorage.setItem(POINTS_KEY,getPoints()+n);}
function updatePtsDisplay(){const el=document.getElementById('ptsDisplay');if(el)el.textContent='⭐ '+getPoints();}

let current=0,score=0,dotResults=[],sessionQ=[];
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function note(ctx,type,freq,time,dur,vol){const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;gn.gain.setValueAtTime(0.001,time);gn.gain.linearRampToValueAtTime(vol,time+0.015);gn.gain.exponentialRampToValueAtTime(0.001,time+dur);osc.start(time);osc.stop(time+dur+0.06);}
function playCorrect(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[1047,1319,1568,2093,1568,1319].forEach((f,i)=>note(ctx,'triangle',f,t+i*0.07,0.14,0.5));[[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur])=>{note(ctx,'triangle',f,t+d,dur,0.55);note(ctx,'sine',f*2,t+d,dur*0.5,0.14);});});}
function playWrong(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay])=>{const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(f1,t+delay);osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);gn.gain.setValueAtTime(0.001,t+delay);gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02);gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);osc.start(t+delay);osc.stop(t+delay+0.3);});const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type='sine';osc.frequency.setValueAtTime(380,t+0.92);osc.frequency.exponentialRampToValueAtTime(55,t+1.4);gn.gain.setValueAtTime(0.001,t+0.92);gn.gain.linearRampToValueAtTime(0.55,t+0.93);gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);osc.start(t+0.92);osc.stop(t+1.5);});}
function playLevelUp(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d])=>note(ctx,'triangle',f,t+d,0.25,0.45));note(ctx,'sine',1047,t+0.84,0.8,0.3);note(ctx,'sine',1319,t+0.90,0.7,0.25);note(ctx,'sine',1568,t+0.96,0.6,0.2);});}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function init(){current=0;score=0;dotResults=Array(15).fill(null);sessionQ=pickSession();if(!document.getElementById('visualCard')){document.getElementById('gameScreen').innerHTML=`<a class="back-btn" href="../../">← Home</a><div class="top"><div class="title">🌍 Environmental Science Quiz</div><div class="top-row"><div class="level-badge easy" id="levelBadge">⭐ Easy</div><div class="score-pill">🎯 <strong id="score">0</strong> / 15</div><div class="pts-pill" id="ptsDisplay">⭐ 0</div></div><div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div></div><div class="middle" id="middle"><div class="visual-card" id="visualCard"></div><div class="question-text" id="questionText"></div></div><div class="bottom"><div class="choices" id="choices"></div><div class="progress-dots" id="progressDots"></div></div>`;}buildDots(); showQuestion(); updatePtsDisplay();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDots(){const c=document.getElementById('progressDots');c.innerHTML='';sessionQ.forEach((q,i)=>{const cls=q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';const d=document.createElement('div');d.className=`dot ${cls}`+(i===0?' current':'');d.id=`dot-${i}`;c.appendChild(d);});}
function updateDot(idx,result){const d=document.getElementById(`dot-${idx}`);if(!d)return;d.classList.remove('current');d.classList.add('answered',result==='correct'?'correct-dot':'wrong-dot');const next=document.getElementById(`dot-${idx+1}`);if(next)next.classList.add('current');}
function showQuestion(){const q=sessionQ[current];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}document.getElementById('progressFill').style.width=(current/15*100)+'%';document.getElementById('score').textContent=score;document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;document.getElementById('questionText').textContent=q.question;const shuffled=shuffle([...q.options]);const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const btn=document.createElement('button');btn.className='choice-btn';btn.dataset.value=shuffled[i];btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx);choicesEl.appendChild(btn);});document.getElementById('gameScreen').classList.remove('shake');}
function handleAnswer(chosen,correct,btn,fact,qIdx){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);const isCorrect=chosen===correct;if(isCorrect){score++;markMastered(qIdx);btn.classList.add('correct');dotResults[current]='correct';updateDot(current,'correct');document.getElementById('score').textContent=score;playCorrect();spawnConfetti(35);}else{btn.classList.add('wrong');dotResults[current]='wrong';updateDot(current,'wrong');document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});document.getElementById('gameScreen').classList.add('shake');playWrong();}setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);}
let feedbackTimer=null,feedbackRafId=null;
function dismissFeedback(){cancelAnimationFrame(feedbackRafId);clearTimeout(feedbackTimer);const overlay=document.getElementById('feedbackOverlay');const b=document.getElementById('feedbackBox');b.style.animation='slideUp 0.35s ease forwards';overlay.classList.add('dismiss');overlay.classList.remove('clickable');setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);}
function showFeedback(isCorrect,fact,chosen,correct){clearTimeout(feedbackTimer);cancelAnimationFrame(feedbackRafId);const overlay=document.getElementById('feedbackOverlay'),box=document.getElementById('feedbackBox');const arc=document.getElementById('timerArc'),ring=document.getElementById('timerRing');const tapHint=document.getElementById('tapHint');const wrongDetail=document.getElementById('wrongDetail');const CIRC=100.5;if(isCorrect){const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];const[em,title]=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('feedbackEmoji').textContent=em;document.getElementById('feedbackTitle').textContent=title;document.getElementById('feedbackTitle').className='feedback-title correct-text';box.className='feedback-box correct-box';ring.className='timer-ring correct-ring';ring.style.display='';tapHint.style.display='none';wrongDetail.style.display='none';}else{const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];const[em,title]=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('feedbackEmoji').textContent=em;document.getElementById('feedbackTitle').textContent=title;document.getElementById('feedbackTitle').className='feedback-title wrong-text';box.className='feedback-box wrong-box';ring.className='timer-ring wrong-ring';ring.style.display='none';tapHint.style.display='';document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;document.getElementById('wdChosen').textContent=chosen;document.getElementById('wdCorrect').textContent=correct;wrongDetail.style.display='';}document.getElementById('feedbackFact').textContent=fact;arc.style.strokeDashoffset='0';overlay.classList.remove('dismiss');overlay.classList.add('show');if(isCorrect){const duration=1200;const startTime=performance.now();function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}feedbackRafId=requestAnimationFrame(tickRing);feedbackTimer=setTimeout(dismissFeedback,duration);}else{overlay.classList.add('clickable');overlay.addEventListener('click',dismissFeedback,{once:true});}}
function advanceQuestion(){const prev=current;current++;if(prev===4){showLevelUp('medium');return;}if(prev===9){showLevelUp('hard');return;}if(current>=15){showEndScreen();return;}showQuestion();}
function showLevelUp(level){const overlay=document.getElementById('levelupOverlay');if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — getting trickier!';}else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='🧠 Hard — only the best know these!';}overlay.classList.add('show');playLevelUp();spawnConfetti(60);}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){const screen=document.getElementById('gameScreen');let rank,icon,msg,color;if(score>=13){rank='GENIUS';icon='🏆🧠⭐';msg='Outstanding! You\'re a true scholar!';color='#f1c40f';}else if(score>=10){rank='EXPERT';icon='🌟💡🎯';msg='Excellent knowledge!';color='#2ecc71';}else if(score>=7){rank='LEARNER';icon='👍📚😊';msg='Good effort! Keep studying!';color='#e67e22';}else{rank='BEGINNER';icon='💪📖🌱';msg='Great start! Practice makes perfect!';color='#e74c3c';}const e=dotResults.slice(0,5).filter(r=>r==='correct').length;const m=dotResults.slice(5,10).filter(r=>r==='correct').length;const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  let pointsHtml='';
  if(score===15){
    addPoints(10);
    pointsHtml=`<div style="background:linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,165,0,0.25));border:2px solid #ffd700;border-radius:16px;padding:12px 24px;animation:correctPop 0.5s ease;">
      <div style="font-size:1.6rem;">🎉⭐🎉</div>
      <div style="color:#ffd700;font-size:1.15rem;font-weight:700;margin-top:2px;">PERFECT! +10 Points!</div>
      <div style="color:rgba(255,255,255,0.85);font-size:0.95rem;margin-top:3px;">Total: ⭐ ${getPoints()} points</div>
    </div>`;
  } else {
    pointsHtml=`<div style="color:rgba(255,215,0,0.7);font-size:0.95rem;">⭐ ${getPoints()} points total</div>`;
  }
screen.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;"><div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div><div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div><div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div><div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>${pointsHtml}<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div><div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div><div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div></div><div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}</div><button class="action-btn" onclick="init()">🔄 Play Again!</button><a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a></div>`; spawnConfetti(score>=10?90:40);}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){for(let i=0;i<count;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.top='-20px';el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];el.style.width=(6+Math.random()*10)+'px';el.style.height=(6+Math.random()*10)+'px';el.style.borderRadius=Math.random()>0.5?'50%':'2px';const dur=1.5+Math.random()*2;el.style.animationDuration=dur+'s';el.style.animationDelay=Math.random()*0.4+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+0.6)*1000);},i*20);}}
init();
</script>
</body>
</html>
