  { level:3, visual:'🌊', question:'What is biochar and how does it contribute to carbon sequestration?', options:['A charcoal-like material produced from biomass pyrolysis that can be added to soil, locking carbon for centuries while improving soil fertility','A synthetic carbon fibre used in industrial carbon capture systems','A form of organic compost that releases carbon slowly over decades'], answer:'A charcoal-like material produced from biomass pyrolysis that can be added to soil, locking carbon for centuries while improving soil fertility', fact:'🌊 Unlike composting, which returns carbon to the atmosphere, biochar locks it in soil for thousands of years. It also improves water retention and nutrient availability. Some models show it could sequester 0.7–1.8 Gt CO₂/year globally!' },
  { level:3, visual:'🔬', question:'What is the "safe" level of atmospheric CO₂ according to leading climate scientists like James Hansen?', options:['350 ppm — we are currently above 420 ppm and have exceeded the safe level','450 ppm — the target under the Paris Agreement','550 ppm — the threshold before irreversible tipping points are triggered'], answer:'350 ppm — we are currently above 420 ppm and have exceeded the safe level', fact:'🔬 Hansen et al. (2008) argued 350 ppm is the safe limit based on paleoclimate evidence. Current CO₂ is ~425 ppm and rising ~2.5 ppm/year. The organisation 350.org takes its name from this threshold!' },
  { level:3, visual:'🌍', question:'What is degrowth economics?', options:['An economic theory arguing wealthy nations must reduce production and consumption to achieve ecological sustainability','Economic recession caused by environmental collapse','A policy of removing economic incentives for high-carbon industries'], answer:'An economic theory arguing wealthy nations must reduce production and consumption to achieve ecological sustainability', fact:'🌍 Degrowth argues that perpetual GDP growth on a finite planet is impossible and that well-being can be maintained with less material throughput. Critics argue it is politically unfeasible; proponents say it\'s physically necessary!' },
  { level:3, visual:'🌿', question:'What is the Aichi Biodiversity Target and how did it perform?', options:['A set of 20 biodiversity goals for 2010–2020 under the CBD; none were fully achieved','A Japanese national forest conservation programme achieving 90% of targets','A 2010 global agreement to protect 50% of the world\'s oceans by 2020'], answer:'A set of 20 biodiversity goals for 2010–2020 under the CBD; none were fully achieved', fact:'🌿 Despite global commitments, none of the 20 Aichi Targets were fully achieved by 2020. This failure led to the Kunming-Montreal Biodiversity Framework in 2022, with its "30×30" target for protected areas!' },
  { level:3, visual:'⚗️', question:'What is environmental DNA (eDNA) and how is it used in conservation?', options:['Genetic material shed by organisms into the environment, used to detect species presence without capturing them','DNA extracted from ancient environmental samples to reconstruct past ecosystems','A database of all known species\' genomes used for conservation breeding'], answer:'Genetic material shed by organisms into the environment, used to detect species presence without capturing them', fact:'⚗️ A water sample from a lake or stream contains DNA shed by all organisms that have recently been there. eDNA surveys have detected rare great crested newts, invasive species, and even uncontacted whale sharks — transforming biodiversity monitoring!' },

  // ── NEW LEVEL 1 QUESTIONS (recycling, renewables, food, materials, careers) ──
  { level:1, visual:'♻️', question:'What do the numbers inside recycling triangles (1–7) on plastic bottles tell you?', options:['The type of plastic and whether it can be recycled','How many times the bottle has been recycled','The percentage of recycled material inside'], answer:'The type of plastic and whether it can be recycled', fact:'♻️ Number 1 (PET) and 2 (HDPE) are widely recycled. Numbers 3–7 are harder to recycle and are refused by many councils. Always check your local rules!' },
  { level:1, visual:'🌱', question:'What happens to food scraps and garden waste when they are composted?', options:['Microbes break them down into nutrient-rich material that can feed plants','They are burned to make electricity','They are compressed into bricks for building'], answer:'Microbes break them down into nutrient-rich material that can feed plants', fact:'🌱 Composting turns kitchen waste into "black gold" for gardens. It keeps organic material out of landfill, where it would produce methane — a powerful greenhouse gas!' },
  { level:1, visual:'🥩', question:'Which food has a much larger water footprint — the amount of water needed to produce it?', options:['Beef','Lettuce','Tomatoes'], answer:'Beef', fact:'🥩 Producing 1 kg of beef uses around 15,000 litres of water. Producing 1 kg of tomatoes uses only 180 litres. Eating less meat is one of the biggest ways to reduce your water footprint!' },
  { level:1, visual:'☀️', question:'What do solar panels convert into electricity?', options:['Sunlight','Heat from the ground','Wind'], answer:'Sunlight', fact:'☀️ Solar panels use the photovoltaic effect — discovered in 1839! Modern panels convert about 20% of sunlight into electricity. Enough solar energy hits Earth in one hour to power the world for a year!' },
  { level:1, visual:'🌬️', question:'Which part of a wind turbine spins to capture wind energy?', options:['The blades (rotor)','The tower','The nacelle'], answer:'The blades (rotor)', fact:'🌬️ The blades spin the rotor, which turns a shaft connected to a generator inside the nacelle. Larger blades capture more wind — the longest blades are over 100 metres each!' },
  { level:1, visual:'🌊', question:'How does a hydroelectric dam generate electricity?', options:['Falling water spins turbines which drive generators','Sunlight heats the water to create steam','Ocean waves push paddles connected to motors'], answer:'Falling water spins turbines which drive generators', fact:'🌊 Hydroelectric power is the world\'s largest source of renewable electricity. Water stored behind a dam is released, falls, and spins turbines. The Three Gorges Dam powers millions of homes!' },
  { level:1, visual:'🌋', question:'Where does geothermal energy come from?', options:['Heat from inside the Earth','The energy stored in hot rocks on the surface','Sunlight concentrated through lenses'], answer:'Heat from inside the Earth', fact:'🌋 The Earth\'s core reaches 5,000°C! Geothermal plants pump steam from underground to spin turbines. Iceland uses geothermal energy for 90% of its home heating!' },
  { level:1, visual:'🌊', question:'What is tidal energy?', options:['Electricity made from the rise and fall of ocean tides','Power from ocean surface waves','Energy from warm and cold ocean currents'], answer:'Electricity made from the rise and fall of ocean tides', fact:'🌊 Tidal barrages and underwater turbines capture energy from tidal flows. Tides are predictable for thousands of years, making tidal power very reliable — unlike solar or wind!' },
  { level:1, visual:'🌾', question:'What is biomass energy made from?', options:['Organic materials like wood, crops, and animal waste','Underground fossil fuels','The movement of rivers and streams'], answer:'Organic materials like wood, crops, and animal waste', fact:'🌾 Burning wood, biogas from animal manure, and energy crops like miscanthus are all biomass energy. It can be carbon-neutral if the plants grown absorb as much CO₂ as is released when burned!' },
  { level:1, visual:'💡', question:'Why are LED bulbs better for the environment than old incandescent bulbs?', options:['They use up to 80% less electricity for the same amount of light','They last exactly the same time but cost less','They produce more heat, keeping rooms warm in winter'], answer:'They use up to 80% less electricity for the same amount of light', fact:'💡 Incandescent bulbs waste 90% of their energy as heat! LEDs last 25 times longer and save about £60 per household per year on electricity bills.' },
  { level:1, visual:'🥦', question:'What does "organic farming" mean?', options:['Farming without synthetic pesticides or fertilisers','Farming that uses the latest technology','Farming inside large greenhouses'], answer:'Farming without synthetic pesticides or fertilisers', fact:'🥦 Organic farms work with nature — using crop rotation, compost, and natural predators to manage pests. Organic soil contains more worms and microbes, which keeps it healthy!' },
  { level:1, visual:'🚚', question:'What are "food miles"?', options:['The distance food travels from where it is grown to where it is eaten','The number of kilometres people walk to buy groceries','The amount of fuel used by farm machinery'], answer:'The distance food travels from where it is grown to where it is eaten', fact:'🚚 A strawberry flown from California to the UK has much higher food miles and carbon emissions than one grown locally. Buying local and seasonal food cuts transport emissions!' },
  { level:1, visual:'🛒', question:'What is a key environmental benefit of buying locally grown food?', options:['Less transport is needed, so fewer emissions are produced','Local food always costs less','Local food never contains pesticides'], answer:'Less transport is needed, so fewer emissions are produced', fact:'🛒 Local food also supports local farmers and ecosystems. Farmers\' markets and box schemes can cut the carbon footprint of your shopping basket significantly!' },
  { level:1, visual:'🏞️', question:'Why do governments create national parks?', options:['To protect natural landscapes, wildlife, and ecosystems from damaging development','To give people places to build holiday homes','To store fossil fuels underground safely'], answer:'To protect natural landscapes, wildlife, and ecosystems from damaging development', fact:'🏞️ The world\'s first national park was Yellowstone in the USA in 1872. Today, over 6,500 national parks cover about 15% of Earth\'s land, protecting millions of species!' },
  { level:1, visual:'🦆', question:'What is a wildlife refuge?', options:['A protected area specifically managed to provide safe habitat for wildlife','A zoo where wild animals are bred for release','A nature reserve only open to scientists'], answer:'A protected area specifically managed to provide safe habitat for wildlife', fact:'🦆 Wildlife refuges provide safe nesting, feeding, and migration stopovers for birds and other animals. The USA alone has over 560 national wildlife refuges — a network bigger than California!' },
  { level:1, visual:'🌿', question:'What is a nature reserve?', options:['A protected area set aside to conserve wildlife and habitats from human disturbance','A private garden open to the public','A forest managed for timber production'], answer:'A protected area set aside to conserve wildlife and habitats from human disturbance', fact:'🌿 Nature reserves can be run by governments, charities, or landowners. They protect everything from ancient woodland to coastal dunes. The UK has over 8,000 nature reserves!' },
  { level:1, visual:'🌍', question:'Which career involves studying how living things interact with their environment?', options:['Ecologist','Geologist','Meteorologist'], answer:'Ecologist', fact:'🌍 Ecologists study food webs, population dynamics, and ecosystem health. They work in rainforests, oceans, and cities to understand how nature functions and how to protect it!' },
  { level:1, visual:'🌿', question:'What are eco-friendly materials made from?', options:['Renewable, natural, or recycled resources that have a low environmental impact','Only materials found in rainforests','Synthetic chemicals that break down quickly'], answer:'Renewable, natural, or recycled resources that have a low environmental impact', fact:'🌿 Bamboo, cork, hemp, recycled paper, and reclaimed wood are all eco-friendly materials. They reduce deforestation, use less energy to produce, and are often biodegradable!' },
  { level:1, visual:'📱', question:'Why is e-waste (discarded electronics) dangerous to the environment?', options:['It contains toxic metals like lead, mercury, and cadmium that can leach into soil and water','It releases carbon dioxide when thrown in the bin','It blocks drains and causes flooding'], answer:'It contains toxic metals like lead, mercury, and cadmium that can leach into soil and water', fact:'📱 Only 17% of the world\'s e-waste is officially recycled. The rest is often burned in developing countries, releasing toxic fumes. A single phone contains over 60 different elements!' },
  { level:1, visual:'♻️', question:'Which type of plastic — marked with recycling number 1 — is found in most water bottles and is widely recycled?', options:['PET (polyethylene terephthalate)','PVC (polyvinyl chloride)','Polystyrene'], answer:'PET (polyethylene terephthalate)', fact:'♻️ PET (number 1) is one of the most recyclable plastics and is used to make new bottles, carpet fibres, and fleece clothing. Always rinse and recycle your plastic bottles!' },
  { level:1, visual:'🚗', question:'What type of vehicle produces zero exhaust emissions while driving?', options:['Electric vehicle (EV)','Hybrid vehicle','Diesel vehicle'], answer:'Electric vehicle (EV)', fact:'🚗 Electric vehicles produce no tailpipe emissions, improving city air quality. Their lifetime carbon footprint depends on how the electricity is generated — clean electricity means clean transport!' },
  { level:1, visual:'🌧️', question:'What is rainwater harvesting?', options:['Collecting and storing rainwater for later use, such as watering gardens','Measuring how much rain falls each month','Filtering rainwater into rivers to prevent flooding'], answer:'Collecting and storing rainwater for later use, such as watering gardens', fact:'🌧️ Rainwater harvesting has been used for thousands of years. A water butt collecting roof runoff can save up to 24,000 litres of mains water per household per year!' },
  { level:1, visual:'🐝', question:'Why are bees important for the environment?', options:['They pollinate plants, helping fruits, vegetables, and flowers to reproduce','They produce honey that animals rely on for food','They aerate soil like earthworms do'], answer:'They pollinate plants, helping fruits, vegetables, and flowers to reproduce', fact:'🐝 Bees pollinate about one third of all the food we eat. Without them, crops like apples, almonds, and blueberries would fail. Planting wildflowers in gardens helps save bees!' },
  { level:1, visual:'🌊', question:'What is ocean acidification?', options:['Oceans becoming more acidic as they absorb CO₂ from the atmosphere','Acid rain falling directly into the sea','Industrial chemicals making coastal waters more acidic'], answer:'Oceans becoming more acidic as they absorb CO₂ from the atmosphere', fact:'🌊 Since the Industrial Revolution, ocean pH has dropped by 0.1 units — 30% more acidic. This dissolves the shells of oysters, mussels, and corals, threatening marine food chains!' },
  { level:1, visual:'🌳', question:'What environmental service do urban trees provide?', options:['They cool cities, absorb air pollution, and reduce flooding','They block wind and increase heating bills','They only provide shade in summer'], answer:'They cool cities, absorb air pollution, and reduce flooding', fact:'🌳 A single urban tree can absorb up to 150 kg of CO₂ per year and reduce nearby temperatures by up to 8°C on hot days through shade and transpiration. Green cities are healthier cities!' },
  { level:1, visual:'🧴', question:'What does "biodegradable" mean for a product or material?', options:['It can be broken down naturally by microorganisms in the environment','It can be recycled at a special facility','It was made without using any chemicals'], answer:'It can be broken down naturally by microorganisms in the environment', fact:'🧴 Biodegradable materials like paper, cotton, and food scraps break down within weeks or months. Plastic bags take hundreds of years. Choosing biodegradable products reduces landfill waste!' },
  { level:1, visual:'🚿', question:'How much water does a person in a developed country typically use per day?', options:['Around 150 litres','Around 10 litres','Around 500 litres'], answer:'Around 150 litres', fact:'🚿 The average person in the UK uses about 150 litres per day through drinking, washing, cooking, and flushing. People in water-scarce regions may have less than 20 litres per day!' },
  { level:1, visual:'🌍', question:'What is the "greenhouse effect"?', options:['The warming of Earth as greenhouse gases trap heat from the Sun','The process of growing food in glass greenhouses','The reflection of sunlight by clouds back into space'], answer:'The warming of Earth as greenhouse gases trap heat from the Sun', fact:'🌍 Without any greenhouse effect, Earth\'s average temperature would be -18°C instead of +15°C — too cold for life! The problem is that human emissions are making this natural effect too strong.' },
  { level:1, visual:'🏗️', question:'What does "sustainable development" mean?', options:['Meeting the needs of today without preventing future generations from meeting their needs','Building houses using only recycled materials','Developing countries by using only local resources'], answer:'Meeting the needs of today without preventing future generations from meeting their needs', fact:'🏗️ This definition comes from the 1987 Brundtland Report. Sustainable development balances economic growth, social justice, and environmental protection — the three pillars of sustainability!' },
  { level:1, visual:'🐢', question:'What is the main cause of sea turtle deaths from plastic pollution?', options:['Turtles mistake plastic bags for jellyfish and eat them','Plastic pollution poisons the water turtles drink','Plastic bags block sunlight on beaches where turtles nest'], answer:'Turtles mistake plastic bags for jellyfish and eat them', fact:'🐢 Sea turtles have been eating jellyfish for millions of years. Floating plastic bags look identical to them underwater. Over 50% of sea turtles have eaten plastic, causing internal injuries!' },
  { level:1, visual:'🌱', question:'What is permaculture gardening based on?', options:['Designing gardens to work like natural ecosystems, minimising waste and effort','Using only traditional heritage seeds in the garden','Replacing all grass with vegetable beds'], answer:'Designing gardens to work like natural ecosystems, minimising waste and effort', fact:'🌱 Permaculture mimics natural patterns — perennial plants, companion planting, and closed nutrient loops reduce work and inputs. A well-designed permaculture garden needs almost no fertiliser or watering!' },
  { level:1, visual:'💧', question:'What is greywater?', options:['Wastewater from sinks, showers, and washing machines that can be reused for flushing toilets or watering gardens','Drinking water that has been softened by removing minerals','Rainwater collected from roofs before it reaches the ground'], answer:'Wastewater from sinks, showers, and washing machines that can be reused for flushing toilets or watering gardens', fact:'💧 Greywater reuse can cut household water use by up to 30%. It is not safe to drink without treatment, but is fine for toilet flushing and garden irrigation when managed properly!' },
  { level:1, visual:'🌞', question:'Which renewable energy source produces the most electricity globally?', options:['Hydroelectric power','Solar power','Wind power'], answer:'Hydroelectric power', fact:'🌞 Hydroelectric power still generates more electricity than any other renewable source — about 16% of the world\'s electricity. But solar and wind are growing fastest and may overtake it by 2030!' },
  { level:1, visual:'🌿', question:'What is a carbon footprint?', options:['The total greenhouse gas emissions caused by an individual, organisation, or product','The physical footprint of a power station on the landscape','The amount of carbon stored in a forest'], answer:'The total greenhouse gas emissions caused by an individual, organisation, or product', fact:'🌿 The average UK person\'s carbon footprint is about 10 tonnes of CO₂ equivalent per year. Diet, travel, and home heating are the biggest contributors. Small changes across millions of people add up!' },
  { level:1, visual:'🦋', question:'What is habitat fragmentation?', options:['When large natural habitats are broken into smaller, isolated patches by roads, farms, or buildings','When animals migrate between two separate habitats','The division of the ocean into different climate zones'], answer:'When large natural habitats are broken into smaller, isolated patches by roads, farms, or buildings', fact:'🦋 Fragmented habitats isolate wildlife populations, preventing them from finding mates or food. Wildlife corridors — strips of habitat connecting patches — help animals move between fragments!' },
  { level:1, visual:'🏭', question:'What is air pollution?', options:['Harmful gases and particles released into the atmosphere by industry, vehicles, and agriculture','Natural dust and pollen blown by the wind','Water vapour released by power stations'], answer:'Harmful gases and particles released into the atmosphere by industry, vehicles, and agriculture', fact:'🏭 Air pollution causes 7 million premature deaths per year worldwide. Tiny particles called PM2.5 can enter the bloodstream and damage the heart and brain!' },
  { level:1, visual:'🌾', question:'Why is soil health important for the environment?', options:['Healthy soil supports plant growth, stores carbon, and filters water','Soil is only important as a surface for buildings and roads','Soil health only matters on farms, not in natural ecosystems'], answer:'Healthy soil supports plant growth, stores carbon, and filters water', fact:'🌾 Just one teaspoon of healthy soil contains more living organisms than there are people on Earth! Soil stores more carbon than all the world\'s forests combined. Healthy soil = healthy planet!' },
  { level:1, visual:'🌊', question:'What is the Great Pacific Garbage Patch?', options:['A massive area of ocean where plastic debris accumulates due to ocean currents','A region of the Pacific where natural oil seeps to the surface','An area of dead coral where algae has taken over'], answer:'A massive area of ocean where plastic debris accumulates due to ocean currents', fact:'🌊 The Great Pacific Garbage Patch is about 1.6 million km² — twice the size of Texas! Most of it is microplastics that cannot easily be removed. Prevention is far better than clean-up!' },
  { level:1, visual:'🌍', question:'What is meant by "environmental sustainability"?', options:['Using natural resources at a rate that allows them to be replenished naturally','Banning all use of natural resources','Only using resources from your own country'], answer:'Using natural resources at a rate that allows them to be replenished naturally', fact:'🌍 If we cut trees at the same rate as forests grow, timber use is sustainable. If we catch fish faster than they reproduce, stocks collapse. Sustainability means living within nature\'s limits!' },
  { level:1, visual:'🏡', question:'What is an eco-home?', options:['A home designed to use minimal energy and resources, with low environmental impact','A house built in a nature reserve','A home powered only by wood-burning stoves'], answer:'A home designed to use minimal energy and resources, with low environmental impact', fact:'🏡 Eco-homes use insulation, solar panels, heat pumps, and rainwater harvesting to reduce energy and water use. The Passivhaus standard produces homes that need almost no heating!' },
  { level:1, visual:'🌿', question:'What does "biodiversity hotspot" mean?', options:['A region with unusually high numbers of unique species AND high levels of habitat loss','A place where many animals compete for the same food','A region of the ocean with unusually warm water'], answer:'A region with unusually high numbers of unique species AND high levels of habitat loss', fact:'🌿 There are 36 biodiversity hotspots covering just 2.4% of land, but holding more than half of all plant species found nowhere else on Earth. Madagascar, the Amazon, and the Mediterranean Basin are hotspots!' },
  { level:1, visual:'💡', question:'What is energy efficiency?', options:['Getting the same useful output (like light or heat) using less energy','Making devices that use more energy to work better','Only using electricity at off-peak times'], answer:'Getting the same useful output (like light or heat) using less energy', fact:'💡 The most sustainable energy is the energy you never use! Insulating your home, using efficient appliances, and turning off standby devices are all forms of energy efficiency.' },
  { level:1, visual:'🐟', question:'What is overfishing?', options:['Catching fish faster than they can reproduce, causing fish populations to collapse','Feeding fish too much in fish farms','Allowing too many fish to enter a river during spawning season'], answer:'Catching fish faster than they can reproduce, causing fish populations to collapse', fact:'🐟 Over 33% of fish stocks are now harvested at unsustainable levels. Atlantic cod stocks collapsed in the 1990s and have never fully recovered — transforming ecosystems and fishing communities forever!' },
  { level:1, visual:'🌡️', question:'What is the purpose of the Paris Agreement?', options:['To limit global warming to below 2°C (ideally 1.5°C) above pre-industrial levels','To ban the use of coal by all countries','To create an international carbon tax'], answer:'To limit global warming to below 2°C (ideally 1.5°C) above pre-industrial levels', fact:'🌡️ The Paris Agreement (2015) was signed by 196 countries. Each nation submits its own climate plan. Current pledges put us on track for about 2.5–3°C of warming — still far above the 1.5°C target!' },
  { level:1, visual:'🌱', question:'What is reforestation?', options:['Planting trees on land that was previously forested but has been cleared','Growing crops inside existing forests','Protecting forests from fire by removing undergrowth'], answer:'Planting trees on land that was previously forested but has been cleared', fact:'🌱 Reforestation restores habitats, stores carbon, and prevents soil erosion. Ethiopia planted 350 million trees in one day in 2019. But the right trees in the right places matter — monocultures are much less valuable than native woodland!' },
  { level:1, visual:'🌾', question:'What do we call farming that grows one single crop across a very large area?', options:['Monoculture','Crop rotation','Polyculture'], answer:'Monoculture', fact:'🌾 Monocultures are efficient but risky — a single disease or pest can devastate an entire harvest (like the Irish Potato Famine in the 1840s). They also reduce biodiversity and deplete soil.' },
  { level:1, visual:'🛤️', question:'What is meant by "green infrastructure" in cities?', options:['Networks of parks, street trees, green roofs, and wetlands that provide environmental benefits in urban areas','Roads built from recycled materials','Buildings with energy-efficient heating systems'], answer:'Networks of parks, street trees, green roofs, and wetlands that provide environmental benefits in urban areas', fact:'🛤️ Green infrastructure cools cities, absorbs flood water, improves mental health, and supports urban wildlife. A city with 20% green cover can be 2–8°C cooler than one with almost none!' },
  { level:1, visual:'♻️', question:'What does "upcycling" mean?', options:['Turning waste materials into something of higher value or quality','Sending recyclable materials to be processed at a recycling plant','Reducing the amount of packaging on products'], answer:'Turning waste materials into something of higher value or quality', fact:'♻️ Upcycling old wooden pallets into furniture, or turning glass bottles into lamps, keeps materials in use longer and is often more creative and carbon-saving than recycling!' },
  { level:1, visual:'🚌', question:'Why is public transport better for the environment than travelling by car?', options:['It moves many people using less energy per person, reducing emissions per journey','Public transport is always powered by electricity','Public transport produces zero emissions at all times'], answer:'It moves many people using less energy per person, reducing emissions per journey', fact:'🚌 A full bus produces 80% fewer CO₂ emissions per passenger than a single-occupancy car. Cycling and walking produce almost zero emissions. Active and shared transport are the greenest choices!' },
  { level:1, visual:'🌊', question:'What is coastal erosion and how does climate change affect it?', options:['The wearing away of coastlines by waves and sea; sea level rise and stronger storms are accelerating it','The deposit of sand and sediment on beaches by ocean currents','Flooding of coastal farmland by saltwater intrusion'], answer:'The wearing away of coastlines by waves and sea; sea level rise and stronger storms are accelerating it', fact:'🌊 Some UK coastlines are eroding at 1–2 metres per year. Sea level rise from melting ice and warming oceans means low-lying islands and coastal cities like Miami and Jakarta face serious flooding risks!' },
  { level:1, visual:'🦁', question:'What is the IUCN Red List?', options:['A global database that assesses the conservation status of species from "Least Concern" to "Extinct"','A list of countries with the worst environmental records','A database of all plants and animals that can be legally hunted'], answer:'A global database that assesses the conservation status of species from "Least Concern" to "Extinct"', fact:'🦁 The IUCN Red List has assessed over 150,000 species. More than 42,000 are threatened with extinction. It is the world\'s most comprehensive information source on the conservation status of species!' },
  { level:1, visual:'🌿', question:'What is "greenwashing"?', options:['When companies falsely claim their products or practices are environmentally friendly to attract customers','When governments paint road signs green to promote eco-tourism','When industries plant trees to offset the pollution they create'], answer:'When companies falsely claim their products or practices are environmentally friendly to attract customers', fact:'🌿 Greenwashing misleads consumers. Examples include claiming a product is "natural" (without defining it) or "carbon neutral" using low-quality offsets. Look for verified certifications like B Corp or Fairtrade!' },
  { level:1, visual:'🌍', question:'What does it mean when a species is "endemic" to a region?', options:['It is found only in that specific region and nowhere else on Earth','It is a species that has recently gone extinct in that region','It is a species introduced from another part of the world'], answer:'It is found only in that specific region and nowhere else on Earth', fact:'🌍 Madagascar has over 90% endemic species — meaning most of its wildlife exists nowhere else on Earth. Destroying its habitats means permanent global losses. Endemism makes islands biodiversity treasure troves!' },
  { level:1, visual:'🌱', question:'What is crop rotation and why is it good for the environment?', options:['Growing different crops in sequence on the same land to maintain soil health and reduce pests','Rotating the irrigation schedule to use less water','Changing which fields are used for grazing each year'], answer:'Growing different crops in sequence on the same land to maintain soil health and reduce pests', fact:'🌱 Different crops take different nutrients from soil and return others. Legumes like peas fix nitrogen, reducing the need for synthetic fertiliser. Crop rotation is an ancient practice that still works brilliantly!' },
  { level:1, visual:'🏜️', question:'What is desertification?', options:['The process by which fertile land becomes desert due to drought, deforestation, or poor farming practices','A natural process where sand dunes gradually move and cover farmland','The flooding of low-lying land by rising sea levels'], answer:'The process by which fertile land becomes desert due to drought, deforestation, or poor farming practices', fact:'🏜️ About 24 billion tonnes of fertile soil are lost every year to desertification. The Sahel region of Africa has lost huge areas of farmland in recent decades, driving food insecurity and migration!' },
  { level:1, visual:'🌍', question:'Which region contains the world\'s largest tropical rainforest?', options:['The Amazon basin in South America','The Congo Basin in Africa','Borneo in Southeast Asia'], answer:'The Amazon basin in South America', fact:'🌍 The Amazon rainforest covers 5.5 million km² — bigger than Western Europe. It produces 20% of the world\'s oxygen and stores about 86 billion tonnes of carbon in its trees and soil!' },
  { level:1, visual:'🦅', question:'What is the bald eagle a symbol of in terms of conservation success?', options:['Recovery from near-extinction after banning the pesticide DDT which thinned its eggshells','Successful captive breeding after all wild individuals were taken into captivity','Protection of its habitat through the creation of the USA\'s first national park'], answer:'Recovery from near-extinction after banning the pesticide DDT which thinned its eggshells', fact:'🦅 By 1963 only 417 bald eagle nesting pairs remained in the US. DDT was banned in 1972 and the eagle was protected. By 2006 it was removed from the Endangered Species List — a conservation triumph!' },
  { level:1, visual:'🌿', question:'What is the difference between renewable and non-renewable energy?', options:['Renewable energy comes from naturally replenishing sources like sun and wind; non-renewable sources like coal take millions of years to form','Renewable energy is only available in certain countries','Non-renewable energy is always cleaner than renewable energy'], answer:'Renewable energy comes from naturally replenishing sources like sun and wind; non-renewable sources like coal take millions of years to form', fact:'🌿 Coal, oil, and gas are finite — once used, they\'re gone and take millions of years to replace. Solar, wind, and hydroelectric are constantly replenished by natural processes!' },
  { level:1, visual:'🐋', question:'Why are whales important for ocean health?', options:['Their nutrient-rich waste fertilises phytoplankton, supporting the ocean food chain and carbon storage','They keep the ocean clean by filtering large volumes of seawater','They regulate ocean temperature by diving to the deep ocean and bringing up cold water'], answer:'Their nutrient-rich waste fertilises phytoplankton, supporting the ocean food chain and carbon storage', fact:'🐋 Whales are "ecosystem engineers." Their iron-rich waste fertilises phytoplankton blooms that absorb CO₂. A single whale may sequester 33 tonnes of CO₂ during its lifetime — far more than a tree!' },

  // ── NEW LEVEL 2 QUESTIONS ─────────────────────────────────────────────────────
  { level:2, visual:'💧', question:'What statistic describes global access to clean water?', options:['About 1 in 3 people lack safe drinking water at home','Over 90% of people worldwide have reliable access to safe water','Only people in sub-Saharan Africa lack access to clean water'], answer:'About 1 in 3 people lack safe drinking water at home', fact:'💧 According to WHO and UNICEF, 2.2 billion people lack safely managed drinking water. Waterborne diseases kill more children than malaria and AIDS combined. Safe water is a fundamental human right!' },
  { level:2, visual:'🌾', question:'What is the "virtual water" concept?', options:['The hidden water used to produce food and goods — for example, 1 kg of beef uses ~15,000 litres','Water that evaporates from rivers before it can be used by people','Underground water reserves that cannot be reached with current technology'], answer:'The hidden water used to produce food and goods — for example, 1 kg of beef uses ~15,000 litres', fact:'🌾 Countries import virtual water by buying water-intensive goods from elsewhere. The UK imports about 70% of its virtual water. Understanding virtual water helps explain why diet affects global water stress!' },
  { level:2, visual:'🏜️', question:'What is the Ogallala Aquifer and why is it at risk?', options:['A vast underground water reservoir under the US Great Plains being depleted by irrigation far faster than it recharges','A river system in the midwest being diverted for industrial use','A network of canals in the western US that distributes water to desert cities'], answer:'A vast underground water reservoir under the US Great Plains being depleted by irrigation far faster than it recharges', fact:'🏜️ The Ogallala Aquifer irrigates 30% of US groundwater-fed agriculture. It took 10,000 years to fill; current depletion rates would exhaust it in 25–100 years in some areas. When it\'s gone, farming the Great Plains will be impossible!' },
  { level:2, visual:'🌿', question:'What makes peatlands uniquely important carbon stores?', options:['They store twice as much carbon as all the world\'s forests combined in their waterlogged, partially decomposed plant matter','They absorb carbon from the atmosphere faster than any other ecosystem','They are the only ecosystem that can store carbon in soil permanently'], answer:'They store twice as much carbon as all the world\'s forests combined in their waterlogged, partially decomposed plant matter', fact:'🌿 Peatlands cover only 3% of land but store 550 billion tonnes of carbon — built up over thousands of years. Draining them for farming or burning them releases this carbon catastrophically. Northern Ireland has 800,000 ha of peat!' },
  { level:2, visual:'🌊', question:'How do mangroves differ from coral reefs in their environmental services?', options:['Mangroves protect coasts from storms and store carbon in soil; coral reefs shelter 25% of marine species and protect coasts from wave erosion','Mangroves produce oxygen; coral reefs filter the water','Mangroves only grow in freshwater; coral reefs are always in saltwater'], answer:'Mangroves protect coasts from storms and store carbon in soil; coral reefs shelter 25% of marine species and protect coasts from wave erosion', fact:'🌊 Mangroves and coral reefs are both threatened: 50% of mangroves and 50% of coral reefs have been lost since 1950. Together they support coastal fisheries worth billions and protect 200 million coastal people from storms!' },
  { level:2, visual:'🌱', question:'What is the soil microbiome?', options:['The community of billions of bacteria, fungi, and other microorganisms in soil that drive nutrient cycling and plant health','The layer of organic matter on the soil surface from decomposing leaves','The network of plant roots that holds soil together'], answer:'The community of billions of bacteria, fungi, and other microorganisms in soil that drive nutrient cycling and plant health', fact:'🌱 One teaspoon of healthy soil contains more microorganisms than humans who have ever lived. These microbes break down organic matter, fix nitrogen, suppress disease, and form mycorrhizal networks that link trees in forests!' },
  { level:2, visual:'🌿', question:'What are the core principles of permaculture design?', options:['Observe and interact with nature, care for the Earth, care for people, and produce no waste','Use only native plants, never import resources, and avoid all chemicals','Design the most productive farm using the minimum area of land'], answer:'Observe and interact with nature, care for the Earth, care for people, and produce no waste', fact:'🌿 Permaculture (permanent agriculture + culture) was developed by Australians Bill Mollison and David Holmgren in the 1970s. It applies ecological principles to human settlement design to create sustainable, self-sufficient systems!' },
  { level:2, visual:'🐄', question:'What is silvopasture?', options:['Integrating trees with livestock grazing on the same land to improve animal welfare, carbon storage, and biodiversity','Cutting trees to create open grassland for grazing cattle','Using forest land for beekeeping and honey production'], answer:'Integrating trees with livestock grazing on the same land to improve animal welfare, carbon storage, and biodiversity', fact:'🐄 Silvopasture is one of the top solutions for reducing agricultural emissions. Trees provide shade, shelter, and fodder for animals while sequestering carbon. It can store 3–10 tonnes of CO₂ per hectare per year!' },
  { level:2, visual:'🐝', question:'What are the main causes of pollinator decline?', options:['Pesticide use (especially neonicotinoids), habitat loss, disease, and climate change','Competition from honeybees imported for agriculture','Cold winters and lack of flowering plants in summer'], answer:'Pesticide use (especially neonicotinoids), habitat loss, disease, and climate change', fact:'🐝 Wild bee populations have declined by 35% since the 1990s in some regions. Neonicotinoid pesticides disorient bees even at tiny doses. The EU banned their outdoor use in 2018, but threats remain worldwide!' },
  { level:2, visual:'🌃', question:'How does light pollution affect wildlife?', options:['It disorients nocturnal animals, disrupts migration, confuses sea turtle hatchlings, and reduces insect populations','It only affects humans by disrupting sleep cycles','It mainly harms plants by extending their "daylight" hours artificially'], answer:'It disorients nocturnal animals, disrupts migration, confuses sea turtle hatchlings, and reduces insect populations', fact:'🌃 Sea turtle hatchlings follow the moon to the ocean — artificial lights draw them inland to die. Migratory birds collide with lit buildings. Insects are drawn to and killed by street lights. Over a third of the world has severe light pollution!' },
  { level:2, visual:'🚢', question:'How does noise pollution affect ocean wildlife?', options:['Ship engines and sonar disrupt whale and dolphin communication, navigation, and feeding','Only loud underwater explosions cause significant harm to marine mammals','Ocean noise pollution only affects fish near busy shipping lanes'], answer:'Ship engines and sonar disrupt whale and dolphin communication, navigation, and feeding', fact:'🚢 The ocean is now 10–100 times louder than 50 years ago due to shipping. Whales communicate over thousands of kilometres — noise pollution can shrink their effective communication range by up to 95%! Military sonar has caused mass strandings!' },
  { level:2, visual:'🍣', question:'How do microplastics enter the human food chain?', options:['Marine animals eat microplastics which accumulate up the food chain to fish and shellfish consumed by humans','Only people who drink unfiltered tap water are exposed to microplastics','Microplastics only enter seafood in heavily polluted coastal areas'], answer:'Marine animals eat microplastics which accumulate up the food chain to fish and shellfish consumed by humans', fact:'🍣 Microplastics have been found in human blood, lungs, placentas, and breast milk. The average person ingests about 5 grams of plastic per week — the weight of a credit card. Health effects are still being researched!' },
  { level:2, visual:'💊', question:'What is pharmaceutical pollution in waterways and why is it harmful?', options:['Medicines excreted by humans and animals — or flushed unused — contaminate rivers and disrupt wildlife endocrine systems','Chemical factories illegally dumping drugs into rivers','Rainfall washing agricultural antibiotics directly into streams'], answer:'Medicines excreted by humans and animals — or flushed unused — contaminate rivers and disrupt wildlife endocrine systems', fact:'💊 Synthetic oestrogen from contraceptive pills feminises male fish in rivers worldwide — reducing their sperm count and causing population crashes. Antidepressants alter fish behaviour. Conventional water treatment does not remove many pharmaceuticals!' },
  { level:2, visual:'🌾', question:'What are nitrogen runoff and agricultural dead zones?', options:['Excess fertiliser nitrogen washing into rivers and seas, fuelling algae blooms that deplete oxygen and kill marine life','Nitrogen gas released by decomposing organic matter forming toxic bubbles in water','Industrial nitrogen oxide emissions dissolving in rainwater and acidifying rivers'], answer:'Excess fertiliser nitrogen washing into rivers and seas, fuelling algae blooms that deplete oxygen and kill marine life', fact:'🌾 The Gulf of Mexico dead zone — fed by Mississippi River fertiliser runoff — can reach the size of New Jersey. There are over 400 dead zones globally. Reducing synthetic fertiliser use and creating buffer strips by waterways can help!' },
  { level:2, visual:'⛏️', question:'Why is phosphorus scarcity a global food security concern?', options:['Phosphorus is a non-renewable resource mined from rock; reserves are being depleted and supply is concentrated in just a few countries','Phosphorus leaches out of soil too quickly for plants to absorb under modern farming conditions','Nitrogen fertiliser is replacing phosphorus fertiliser, causing crop yields to decline'], answer:'Phosphorus is a non-renewable resource mined from rock; reserves are being depleted and supply is concentrated in just a few countries', fact:'⛏️ Unlike nitrogen (which can be synthesised from air), phosphorus can only come from mined rock. Morocco controls over 70% of global reserves. "Peak phosphorus" could arrive this century — threatening global food production without recycling efforts!' },
  { level:2, visual:'📱', question:'What environmental problems are caused by rare earth mining?', options:['Toxic wastewater, radioactive tailings, habitat destruction, and high energy use in regions with little environmental regulation','Only small amounts of radioactive waste, easily contained by modern mining methods','Rare earth mining only takes place in protected areas, so impacts are limited by regulations'], answer:'Toxic wastewater, radioactive tailings, habitat destruction, and high energy use in regions with little environmental regulation', fact:'📱 Rare earth metals (neodymium, dysprosium, etc.) are essential in wind turbines, EV motors, and phones. Most are mined in China under conditions generating huge toxic waste ponds. The green transition has a dirty mining problem!' },
  { level:2, visual:'🔋', question:'What are the environmental concerns with lithium mining for batteries?', options:['It requires vast amounts of water in already water-scarce regions and destroys habitats in ecologically sensitive salt flats','Lithium mining produces large amounts of CO₂, making EVs worse than petrol cars','Lithium is so abundant that mining has no significant environmental impact'], answer:'It requires vast amounts of water in already water-scarce regions and destroys habitats in ecologically sensitive salt flats', fact:'🔋 Most lithium comes from the "Lithium Triangle" (Chile, Argentina, Bolivia) where brine is pumped from below salt flats. Each tonne of lithium needs ~2 million litres of water, threatening flamingo habitats and indigenous water rights!' },
  { level:2, visual:'🌊', question:'What are wetlands and why are they ecologically valuable?', options:['Areas saturated with water that provide flood control, water filtration, carbon storage, and habitat for 40% of the world\'s species','Only marine coastal areas like estuaries and mangrove swamps','Any area that floods seasonally, including temporary grasslands after heavy rain'], answer:'Areas saturated with water that provide flood control, water filtration, carbon storage, and habitat for 40% of the world\'s species', fact:'🌊 Wetlands are the most productive ecosystems on Earth. They have been called "kidneys of the landscape" for their water-filtering role. We have destroyed over 35% of wetlands since 1970 — faster than forests!' },
  { level:2, visual:'🌡️', question:'What is the urban heat island effect?', options:['Cities are significantly warmer than surrounding rural areas due to dark surfaces, waste heat, and lack of vegetation','Cities generate their own weather systems due to heat from millions of people','Industrial zones cause surrounding areas to heat up due to factory emissions'], answer:'Cities are significantly warmer than surrounding rural areas due to dark surfaces, waste heat, and lack of vegetation', fact:'🌡️ Cities can be 1–7°C warmer than surrounding countryside. Dark tarmac absorbs sunlight; concrete and glass radiate heat. Green roofs, parks, and light-coloured surfaces reduce the urban heat island effect significantly!' },
  { level:2, visual:'🌿', question:'What is bioremediation?', options:['Using living organisms — bacteria, fungi, or plants — to break down or neutralise pollutants in contaminated soil or water','Growing plants specifically to produce biofuels in contaminated areas','Restoring biodiversity to habitats damaged by chemical spills'], answer:'Using living organisms — bacteria, fungi, or plants — to break down or neutralise pollutants in contaminated soil or water', fact:'🌿 After the Deepwater Horizon oil spill, naturally occurring oil-eating bacteria were stimulated with nutrients to clean up the Gulf of Mexico. Some fungi can break down plastics. Bioremediation is cheaper and less disruptive than excavation!' },
  { level:2, visual:'🌊', question:'What is ocean thermal energy conversion (OTEC)?', options:['Generating electricity from the temperature difference between warm surface water and cold deep ocean water','Capturing wave energy from ocean thermal currents','Using the heat stored in tropical surface waters to power coastal desalination'], answer:'Generating electricity from the temperature difference between warm surface water and cold deep ocean water', fact:'🌊 OTEC exploits temperature differences of 20°C+ between the surface and depths of 1,000m. It is a consistent 24/7 renewable energy source. Hawaii and small Pacific islands are developing OTEC for energy independence!' },
  { level:2, visual:'🌍', question:'What is the "ecological footprint" and how is it measured?', options:['The amount of biologically productive land and sea needed to support a person\'s lifestyle and absorb their waste, measured in global hectares','The physical area of land damaged by a person\'s activities over a lifetime','The carbon emissions per person, measured in tonnes of CO₂'], answer:'The amount of biologically productive land and sea needed to support a person\'s lifestyle and absorb their waste, measured in global hectares', fact:'🌍 Humanity currently uses 1.75 Earths — meaning we are using resources 75% faster than the planet can regenerate. The average American needs 8 global hectares; the average Bangladeshi needs 0.7. Enormous inequality in resource use!' },
  { level:2, visual:'🌱', question:'What is a keystone species?', options:['A species that has a disproportionately large effect on its ecosystem relative to its abundance','The most numerous species in an ecosystem','A species that forms the physical structure of a habitat, like a coral'], answer:'A species that has a disproportionately large effect on its ecosystem relative to its abundance', fact:'🌱 Sea otters eat sea urchins; without otters, urchins overgraze kelp forests, collapsing the entire ecosystem. Wolves change river courses by altering elk behaviour. Keystone species hold ecosystems together!' },
  { level:2, visual:'🌿', question:'What is the difference between primary and secondary ecological succession?', options:['Primary succession starts on bare rock with no soil; secondary succession starts on disturbed land that already has soil','Primary succession occurs in water; secondary succession occurs on land','Primary succession creates a climax community in under a decade; secondary succession takes centuries'], answer:'Primary succession starts on bare rock with no soil; secondary succession starts on disturbed land that already has soil', fact:'🌿 After a volcanic eruption, bare lava is colonised by lichens that slowly create soil (primary succession). After a forest fire, pioneer species like fireweed rapidly colonise the burned area (secondary succession) — recovery is much faster!' },
  { level:2, visual:'🐠', question:'What is coral bleaching and what causes it?', options:['Corals expelling their symbiotic algae (zooxanthellae) when stressed by warm temperatures, leaving them white and prone to death','Pollution from sunscreen chemicals turning coral reefs white','Excess UV radiation from ozone depletion bleaching coral pigments'], answer:'Corals expelling their symbiotic algae (zooxanthellae) when stressed by warm temperatures, leaving them white and prone to death', fact:'🐠 Corals get 90% of their energy from zooxanthellae algae. When ocean temperatures rise just 1–2°C above normal for weeks, corals expel them. The Great Barrier Reef has experienced 5 mass bleaching events since 1998!' },
  { level:2, visual:'🌧️', question:'What is the difference between weather and climate?', options:['Weather is short-term atmospheric conditions in a specific place; climate is the long-term average pattern of weather in a region','Weather refers to temperature only; climate includes all atmospheric phenomena','Weather is measured locally; climate refers to global temperature averages only'], answer:'Weather is short-term atmospheric conditions in a specific place; climate is the long-term average pattern of weather in a region', fact:'🌧️ "Climate is what you expect; weather is what you get." Climate change is about shifts in long-term averages and extremes — not any individual hot day. A cold winter does not disprove climate change!' },
  { level:2, visual:'🦟', question:'What is biological control in pest management?', options:['Using natural predators, parasites, or pathogens to control pest populations instead of chemicals','Breeding pest-resistant crop varieties using genetic engineering','Applying natural plant extracts as pesticides'], answer:'Using natural predators, parasites, or pathogens to control pest populations instead of chemicals', fact:'🦟 Ladybirds eat aphids; parasitic wasps control greenhouse whitefly; Bt bacteria kill caterpillars. Biological control avoids chemical residues and resistance. The classic example: introducing myxomatosis to control rabbit populations in Australia!' },
  { level:2, visual:'🌊', question:'What is desalination and what are its environmental downsides?', options:['Removing salt from seawater to create drinking water; it uses large amounts of energy and produces concentrated brine that harms marine ecosystems','Filtering river water to remove agricultural pollutants using sand and UV light','Collecting water from fog and morning dew in coastal deserts'], answer:'Removing salt from seawater to create drinking water; it uses large amounts of energy and produces concentrated brine that harms marine ecosystems', fact:'🌊 Over 170 million people rely on desalinated water. But reverse osmosis uses 3–10 kWh per cubic metre. The concentrated brine returned to the sea can kill marine life. Powering desalination with renewables is the greener path!' },
  { level:2, visual:'🌿', question:'What is the concept of "tipping points" in Earth\'s climate system?', options:['Thresholds at which a small change can trigger a self-reinforcing, irreversible transformation of a major Earth system','Moments when greenhouse gas concentrations suddenly increase dramatically','Points in time when climate change becomes too severe to adapt to'], answer:'Thresholds at which a small change can trigger a self-reinforcing, irreversible transformation of a major Earth system', fact:'🌿 Potential tipping points include: West Antarctic Ice Sheet collapse, Amazon dieback, permafrost thaw, and Atlantic circulation slowdown. These can trigger each other in a "tipping cascade" — making 1.5°C targets even more critical!' },
  { level:2, visual:'🌲', question:'What is the role of mycorrhizal fungi in forest ecosystems?', options:['They form symbiotic networks connecting tree roots, sharing nutrients and water across the "wood wide web"','They decompose dead wood and recycle nutrients in the forest floor','They protect tree roots from bacterial infection by forming a physical barrier'], answer:'They form symbiotic networks connecting tree roots, sharing nutrients and water across the "wood wide web"', fact:'🌲 Up to 90% of land plants form mycorrhizal partnerships. Mother trees share carbon with seedlings through fungal networks. Suzanne Simard\'s research revealed forests as interconnected social networks, not just collections of individual trees!' },
  { level:2, visual:'🌍', question:'What is the "resource curse" and how does it relate to environmental damage?', options:['Countries rich in natural resources often experience poor governance, conflict, and environmental degradation due to wealth concentrated in extractive industries','Natural resources are so valuable that countries with them develop faster than resource-poor nations','Rich countries exploit the resources of developing nations, causing both poverty and environmental harm'], answer:'Countries rich in natural resources often experience poor governance, conflict, and environmental degradation due to wealth concentrated in extractive industries', fact:'🌍 Oil-rich Nigeria has been devastated by pipeline spills in the Niger Delta — 13 million barrels spilled in 50 years. Congo\'s mineral wealth funds armed groups. Transparency and benefit-sharing are key to avoiding the resource curse!' },
  { level:2, visual:'🌾', question:'What is food waste and how much food is wasted globally?', options:['About one third of all food produced globally is wasted, generating 8–10% of global greenhouse gas emissions','Only around 5% of food is wasted in wealthy countries due to strict quality controls','Food waste is mainly a problem in developing countries due to inadequate storage technology'], answer:'About one third of all food produced globally is wasted, generating 8–10% of global greenhouse gas emissions', fact:'🌾 If food waste were a country, it would be the third largest greenhouse gas emitter after China and the USA! About 40% is wasted at the consumer end in rich countries. Reducing food waste is one of the most powerful climate solutions!' },
  { level:2, visual:'🌱', question:'What is the "green revolution" and what were its environmental downsides?', options:['The 1960s–80s agricultural transformation that boosted crop yields using high-yield varieties, fertilisers, and irrigation — but caused soil degradation and water depletion','The global shift to renewable energy that began in the 2000s','The 1990s movement to promote organic farming as an alternative to industrial agriculture'], answer:'The 1960s–80s agricultural transformation that boosted crop yields using high-yield varieties, fertilisers, and irrigation — but caused soil degradation and water depletion', fact:'🌱 The Green Revolution saved billions from starvation but created dependency on synthetic inputs, depleted aquifers, and reduced crop diversity. Punjab\'s wheat yields have plateaued and water tables are falling — warning signs for the next food crisis!' },
  { level:2, visual:'🌊', question:'What is a marine protected area (MPA)?', options:['A legally protected zone of ocean where fishing, mining, or other activities are restricted to allow ecosystems to recover','Any area of ocean outside national territorial waters','A zone around a nuclear submarine base where civilian vessels are excluded'], answer:'A legally protected zone of ocean where fishing, mining, or other activities are restricted to allow ecosystems to recover', fact:'🌊 Only 8% of the ocean is in MPAs, and only 2.7% is fully protected ("no take" zones). Evidence shows fish populations inside fully protected MPAs are up to 670% more abundant than in unprotected waters nearby!' },
  { level:2, visual:'🌡️', question:'What are positive and negative feedback loops in the climate system?', options:['Positive feedbacks amplify warming (e.g., melting ice reduces reflectivity); negative feedbacks dampen it (e.g., more clouds may increase reflection)','Positive feedbacks are beneficial effects of warming; negative feedbacks are harmful consequences','Positive feedbacks increase CO₂ directly; negative feedbacks reduce it directly'], answer:'Positive feedbacks amplify warming (e.g., melting ice reduces reflectivity); negative feedbacks dampen it (e.g., more clouds may increase reflection)', fact:'🌡️ The albedo (ice-reflectivity) feedback: as ice melts, dark ocean absorbs more heat, melting more ice. The permafrost feedback: warming thaws permafrost, releasing methane, causing more warming. These are why 2°C risks triggering 4°C!' },
  { level:2, visual:'🌍', question:'What is environmental justice?', options:['The fair treatment of all people regardless of race or income in environmental policy — ensuring polluting industries are not disproportionately located near disadvantaged communities','Equal enforcement of environmental laws across all countries','The principle that environmental costs should be paid for by those who cause them'], answer:'The fair treatment of all people regardless of race or income in environmental policy — ensuring polluting industries are not disproportionately located near disadvantaged communities', fact:'🌍 Studies in the US consistently show that hazardous waste sites, power plants, and polluting factories are disproportionately located in communities of colour and low-income areas — a form of structural inequality!' },
  { level:2, visual:'🌿', question:'What is the difference between mitigation and adaptation in climate policy?', options:['Mitigation reduces emissions to slow climate change; adaptation adjusts to the changes that are already inevitable','Mitigation refers to reforestation; adaptation refers to coastal flood defences only','Mitigation is done by governments; adaptation is done by individuals and communities'], answer:'Mitigation reduces emissions to slow climate change; adaptation adjusts to the changes that are already inevitable', fact:'🌿 The world needs both. Even with aggressive mitigation, 1.1°C of warming is already locked in. Adaptation includes sea walls, drought-resistant crops, early warning systems, and relocating coastal communities. But adaptation alone is not enough!' },
  { level:2, visual:'🐘', question:'What is trophy hunting and is it beneficial or harmful for conservation?', options:['Hunting large animals for sport; its conservation value is controversial — some argue fees fund conservation, others argue it harms populations and normalises killing wildlife','It is universally accepted as beneficial because all revenue goes directly to anti-poaching patrol funding','It has been proven to decrease elephant and lion populations wherever it is permitted'], answer:'Hunting large animals for sport; its conservation value is controversial — some argue fees fund conservation, others argue it harms populations and normalises killing wildlife', fact:'🐘 The debate is complex: trophy hunting generates hundreds of millions of dollars, some of which funds conservation in Africa. But studies show only 3% of fees reach local communities. Photography-based ecotourism can generate more money without kills!' },
  { level:2, visual:'🌊', question:'What are the main effects of sea level rise?', options:['Coastal flooding, saltwater intrusion into freshwater supplies, displacement of coastal communities, and loss of beaches and wetlands','Only minor increases in tidal flooding in the most low-lying areas','Sea level rise will primarily affect uninhabited areas with little impact on human populations'], answer:'Coastal flooding, saltwater intrusion into freshwater supplies, displacement of coastal communities, and loss of beaches and wetlands', fact:'🌊 Sea levels have risen 20 cm since 1900 and are rising at 3.6 mm/year. If the West Antarctic Ice Sheet collapses, sea levels could rise 3–5 metres — flooding cities like Miami, Shanghai, Mumbai, and London!' },
  { level:2, visual:'🌾', question:'What is soil erosion and why is it a critical global problem?', options:['The removal of topsoil by wind and water faster than it can form; it reduces agricultural productivity and threatens food security','The loss of soil nutrients through intensive farming over many growing seasons','The natural movement of soil downhill in mountainous regions'], answer:'The removal of topsoil by wind and water faster than it can form; it reduces agricultural productivity and threatens food security', fact:'🌾 It takes about 1,000 years to form 1 cm of topsoil. We are losing topsoil 10–40 times faster than it forms. Some projections suggest only 60 years of fertile topsoil remain at current rates. No soil = no food!' },
  { level:2, visual:'🌍', question:'What is the concept of "ecosystem services"?', options:['The benefits that healthy ecosystems provide to humans — from clean air and water to food, pollination, climate regulation, and recreation','Services provided by environmental consultants to industries managing their environmental impact','Government programmes to maintain national parks and protected areas'], answer:'The benefits that healthy ecosystems provide to humans — from clean air and water to food, pollination, climate regulation, and recreation', fact:'🌍 The total value of ecosystem services has been estimated at $125–145 trillion per year — nearly twice global GDP. Yet most are provided for free and ignored in economic decisions. Putting a value on nature helps make the case for conservation!' },
  { level:2, visual:'🌊', question:'What is the "tragedy of the commons"?', options:['When a shared resource is overused because individual users act in their own interest, degrading or destroying it for everyone','The loss of common land when it is enclosed by private landowners','The difficulty of convincing the public to pay for public goods like clean air'], answer:'When a shared resource is overused because individual users act in their own interest, degrading or destroying it for everyone', fact:'🌊 Garrett Hardin\'s famous 1968 concept explains overfishing, overgrazing, and air pollution. However, economist Elinor Ostrom showed communities can manage commons sustainably with shared rules — challenging Hardin\'s pessimistic view!' },
  { level:2, visual:'🌿', question:'What is phenological mismatch and how does it affect wildlife?', options:['When climate change shifts species\' seasonal timings (e.g., insects hatching before migratory birds arrive), disrupting food webs','When two species with similar lifestyles compete for the same seasonal resources','The failure of plant and pollinator seasons to align due to invasive species disruption'], answer:'When climate change shifts species\' seasonal timings (e.g., insects hatching before migratory birds arrive), disrupting food webs', fact:'🌿 Pied flycatchers in the Netherlands arrive from Africa on a fixed schedule. Oak caterpillars now peak 2 weeks earlier due to warming springs. Chick deaths have surged — a stark example of climate disrupting millions of years of evolved synchrony!' },
  { level:2, visual:'🌲', question:'What is the role of fire in many natural ecosystems?', options:['Periodic fires are natural and necessary — they clear dead material, release nutrients, trigger seed germination, and maintain habitat diversity','Fire is always destructive and damages ecosystems regardless of frequency or intensity','Fire is only natural in tropical grasslands; all other fires are human-caused'], answer:'Periodic fires are natural and necessary — they clear dead material, release nutrients, trigger seed germination, and maintain habitat diversity', fact:'🌲 Many species are fire-adapted: banksia cones only open after fire, kirtland\'s warblers need young jack pine stands created by fire, and giant sequoias need fire heat to release seeds. Decades of fire suppression have created more catastrophic fires by building up fuel!' },
  { level:2, visual:'🐧', question:'What is the "shifting baselines" problem in conservation?', options:['Each generation accepts the degraded nature they grew up with as "normal," failing to recognise how much has been lost over generations','Conservation targets change with each new government, making long-term progress impossible','Protected areas shift their boundaries as land use changes, undermining long-term conservation goals'], answer:'Each generation accepts the degraded nature they grew up with as "normal," failing to recognise how much has been lost over generations', fact:'🐧 Fishers in the 1900s reported enormous fish. Today\'s fishers think today\'s depleted oceans are "normal." Daniel Pauly coined the term: we are comparing today\'s damage to a recent baseline, not to historical abundance — masking catastrophic decline!' },
  { level:2, visual:'🌍', question:'What is the "land-sparing vs land-sharing" debate in conservation?', options:['Should we farm intensively to spare more land for nature (land-sparing), or farm extensively with nature mixed in (land-sharing)?','Whether national parks should allow farming within their boundaries','The debate about whether urban growth should expand into greenfield or brownfield sites'], answer:'Should we farm intensively to spare more land for nature (land-sparing), or farm extensively with nature mixed in (land-sharing)?', fact:'🌍 Evidence suggests high-yield farming with large nature reserves nearby (land-sparing) often supports more species overall than low-yield nature-friendly farming (land-sharing). But the answer depends on species, region, and what drives biodiversity loss locally!' },
  { level:2, visual:'🌿', question:'What is a "carbon sink"?', options:['A natural or artificial system that absorbs more carbon from the atmosphere than it releases — such as forests, oceans, and soil','An underground geological formation where CO₂ is permanently stored','A type of industrial carbon capture device used in power stations'], answer:'A natural or artificial system that absorbs more carbon from the atmosphere than it releases — such as forests, oceans, and soil', fact:'🌿 Forests absorb about 2.6 billion tonnes of CO₂ per year. Oceans absorb another 2.5 billion tonnes. But both sinks are weakening as warming and deforestation turn some forests into sources. We need sinks to remain effective to meet climate targets!' },
  { level:2, visual:'🏙️', question:'What is sustainable urban drainage (SuDS)?', options:['Systems that slow and store rainwater naturally — using ponds, green roofs, and permeable paving — to reduce urban flooding','Underground stormwater reservoirs that store excess rainfall during heavy events','Pipelines that transfer floodwater from cities to the sea more rapidly'], answer:'Systems that slow and store rainwater naturally — using ponds, green roofs, and permeable paving — to reduce urban flooding', fact:'🏙️ Traditional drains rush water to rivers, causing flash floods. SuDS slow this down, letting water soak into the ground. Cities like Copenhagen have invested billions in SuDS after major floods. They also improve biodiversity and air quality!' },
  { level:2, visual:'🌊', question:'What is "ocean deoxygenation" and what causes it?', options:['The reduction of dissolved oxygen in the ocean due to warming temperatures and nutrient pollution, stressing marine life','The depletion of oxygen in the upper ocean due to a reduction in phytoplankton after ozone depletion','The replacement of oxygen in deep water by CO₂ absorbed from the atmosphere'], answer:'The reduction of dissolved oxygen in the ocean due to warming temperatures and nutrient pollution, stressing marine life', fact:'🌊 The ocean has lost 2% of its oxygen since 1960. Warmer water holds less oxygen. Oxygen minimum zones have expanded by millions of km². Many species are being pushed into smaller, shallower habitats — compressing the marine living space!' },

  // ── NEW LEVEL 3 QUESTIONS ─────────────────────────────────────────────────────
  { level:3, visual:'📅', question:'What is Earth Overshoot Day?', options:['The date in the year when humanity has used more resources than Earth can regenerate in a full year','The day global CO₂ emissions exceed the safe annual budget','The date when renewable energy overtakes fossil fuels in global electricity production'], answer:'The date in the year when humanity has used more resources than Earth can regenerate in a full year', fact:'📅 In 2023, Earth Overshoot Day fell on 2 August — meaning we used 1.75 Earths worth of resources in one year. In the 1970s it was in December. Moving it back just 5 days per year would restore balance by 2050!' },
  { level:3, visual:'🍩', question:'What is "doughnut economics" as proposed by Kate Raworth?', options:['A model defining a safe and just space between a social foundation (minimum human needs) and an ecological ceiling (planetary boundaries)','An economic theory proposing circular flows of money to replace linear growth models','A framework for measuring economic growth that excludes financial sector activity'], answer:'A model defining a safe and just space between a social foundation (minimum human needs) and an ecological ceiling (planetary boundaries)', fact:'🍩 The doughnut\'s inner ring represents social shortfalls (hunger, poverty, health); the outer ring marks ecological overshoots (climate change, biodiversity loss). A thriving society lives in the "dough" between them. Amsterdam has officially adopted doughnut economics!' },
  { level:3, visual:'💰', question:'What is "natural capital accounting" and why does it matter?', options:['Incorporating the value of nature\'s assets into national economic accounts to make environmental degradation visible in economic decision-making','Calculating the financial cost of replacing natural ecosystems with artificial systems','A method of measuring corporate environmental performance for sustainability reporting'], answer:'Incorporating the value of nature\'s assets into national economic accounts to make environmental degradation visible in economic decision-making', fact:'💰 Traditional GDP ignores the destruction of forests, fisheries, and clean water. Natural capital accounts — now being piloted in the UK, Netherlands, and Australia — show when apparent economic growth is actually liquidating natural assets!' },
  { level:3, visual:'📊', question:'What is "green GDP" and how does it differ from conventional GDP?', options:['GDP adjusted to subtract the cost of environmental degradation and resource depletion — giving a truer picture of economic well-being','GDP that only counts industries using renewable energy in their production processes','A measure of the size of the green economy — renewable energy, organic farming, and eco-tourism'], answer:'GDP adjusted to subtract the cost of environmental degradation and resource depletion — giving a truer picture of economic well-being', fact:'📊 China attempted a green GDP calculation in 2006, finding that environmental costs wiped out 3% of economic growth — but the politically uncomfortable results led to the programme being abandoned. True accounting is politically challenging!' },
  { level:3, visual:'🔍', question:'What is "true cost accounting" in food systems?', options:['Revealing the hidden environmental, health, and social costs of food production not reflected in market prices — like water pollution, greenhouse gas emissions, and diet-related disease','The full cost of agricultural subsidies passed to consumers in food prices','Calculating the real cost of food after subtracting government support payments to farmers'], answer:'Revealing the hidden environmental, health, and social costs of food production not reflected in market prices — like water pollution, greenhouse gas emissions, and diet-related disease', fact:'🔍 A 2023 study found that global food system hidden costs total $15 trillion per year — almost 12% of global GDP. A cheap burger might cost $2 at the checkout but generates $12 of hidden environmental and health costs paid by society!' },
  { level:3, visual:'🌿', question:'What is a "debt-for-nature swap"?', options:['An agreement where a developing country\'s foreign debt is reduced in exchange for investing in conservation of its natural resources','A financial mechanism where banks trade environmental credits to offset their carbon footprint','A deal where wealthy nations fund biodiversity programmes in developing nations in exchange for access to genetic resources'], answer:'An agreement where a developing country\'s foreign debt is reduced in exchange for investing in conservation of its natural resources', fact:'🌿 In 2023, Ecuador and Gabon completed major debt-for-nature swaps, freeing up hundreds of millions for marine conservation. The concept was pioneered in the 1980s as a win-win: debt relief for indebted nations plus nature protection for all!' },
  { level:3, visual:'📈', question:'What is the Environmental Kuznets Curve and what does evidence say about it?', options:['The hypothesis that pollution first rises then falls as incomes grow; evidence is mixed — it holds for some pollutants but not greenhouse gases','The observed historical relationship between economic growth and global temperature rise','A model showing that biodiversity loss accelerates at a predictable rate as countries industrialise'], answer:'The hypothesis that pollution first rises then falls as incomes grow; evidence is mixed — it holds for some pollutants but not greenhouse gases', fact:'📈 The EKC suggests rich countries eventually clean up local pollution (like air quality) as they can afford technology and demand it. But CO₂ emissions haven\'t followed this pattern — they mostly follow income globally. Decarbonisation requires explicit policy, not just wealth!' },
  { level:3, visual:'📉', question:'What does "decoupling economic growth from emissions" mean and has it been achieved?', options:['Growing GDP while reducing greenhouse gas emissions; some countries have achieved relative decoupling, but absolute decoupling globally remains elusive','The replacement of fossil fuel jobs with clean energy jobs at equal pay','Achieving economic growth using less material energy but proportionally more service sector activity'], answer:'Growing GDP while reducing greenhouse gas emissions; some countries have achieved relative decoupling, but absolute decoupling globally remains elusive', fact:'📉 The UK, Germany, and Sweden have reduced emissions while growing GDP — but partly by offshoring manufacturing. When imported goods\' emissions are counted (consumption-based accounting), the picture is less impressive. True global decoupling requires systemic change!' },
  { level:3, visual:'⚡', question:'What is Energy Return on Energy Invested (EROEI)?', options:['The ratio of energy produced by a fuel or technology to the energy required to produce it — a measure of net energy value','The efficiency of converting primary energy into useful mechanical or electrical energy','The carbon intensity of producing one unit of electricity from a given energy source'], answer:'The ratio of energy produced by a fuel or technology to the energy required to produce it — a measure of net energy value', fact:'⚡ Early oil fields had EROEIs of 100:1 — extract 100 barrels for every 1 spent. Tar sands have EROEIs of 3–5:1. Solar panels are around 20–30:1. Society needs EROEI above about 7:1 to maintain complex civilisation!' },
