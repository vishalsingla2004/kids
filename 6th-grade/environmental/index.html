  { level:1, visual:'🌊', question:'What do we call the zone where a river meets the sea?', options:['Estuary','Delta','Tributary'], answer:'Estuary', fact:'🌊 Estuaries are among the most productive ecosystems on Earth. They act as nurseries for many fish species and filter pollutants from water!' },
  { level:1, visual:'💧', question:'What do we call areas of land that are permanently or seasonally flooded with water?', options:['Wetlands','Deserts','Tundra'], answer:'Wetlands', fact:'💧 Wetlands filter water, store floodwater, sequester carbon, and support incredible biodiversity. They are called the "kidneys of the landscape"!' },
  { level:1, visual:'🌳', question:'Which biome has the greatest total biomass of trees on Earth?', options:['Tropical rainforest','Temperate forest','Boreal forest'], answer:'Tropical rainforest', fact:'🌳 Tropical rainforests store about 250 billion tonnes of carbon in their trees and soil — a vital buffer against climate change!' },
  { level:1, visual:'🐠', question:'What is the name of the underwater ecosystem built by tiny coral animals?', options:['Coral reef','Kelp forest','Estuary'], answer:'Coral reef', fact:'🐠 Coral reefs cover less than 1% of the ocean floor but support 25% of all marine species. They are the rainforests of the sea!' },
  { level:1, visual:'🌿', question:'What do we call a plant that lives on another plant but does not harm it?', options:['Epiphyte','Parasite','Saprophyte'], answer:'Epiphyte', fact:'🌿 Orchids and bromeliads are epiphytes. They grow on tree branches to reach sunlight, using the tree as a platform — not a food source!' },
  // Water Cycle & Water Resources
  { level:1, visual:'☁️', question:'What process turns water vapour into liquid water droplets to form clouds?', options:['Condensation','Evaporation','Precipitation'], answer:'Condensation', fact:'☁️ When warm, moist air rises and cools, water vapour condenses around tiny dust particles to form cloud droplets — billions of them per cloud!' },
  { level:1, visual:'🏞️', question:'What do we call the area of land that drains into a particular river or lake?', options:['Watershed (catchment area)','Floodplain','Delta'], answer:'Watershed (catchment area)', fact:'🏞️ Everything that falls as rain in a watershed flows into the same river system. Pollution anywhere in the watershed can affect the whole waterway!' },
  { level:1, visual:'💧', question:'What is the name for water stored underground in rocks and soil?', options:['Groundwater','Surface water','Precipitation'], answer:'Groundwater', fact:'💧 Groundwater makes up about 30% of all freshwater on Earth. Millions of people depend on wells tapping into underground aquifers!' },
  { level:1, visual:'🌊', question:'Which ocean holds the most water on Earth?', options:['Pacific Ocean','Atlantic Ocean','Indian Ocean'], answer:'Pacific Ocean', fact:'🌊 The Pacific is larger than all of Earth\'s land combined! It holds about 46% of the world\'s ocean water and reaches depths of over 11 km!' },
  { level:1, visual:'🏔️', question:'What are the two largest stores of freshwater on Earth?', options:['Glaciers and ice caps','Rivers and lakes','Groundwater and soil'], answer:'Glaciers and ice caps', fact:'🏔️ About 69% of all freshwater is locked in glaciers and ice caps! As they melt due to climate change, sea levels rise.' },
  { level:1, visual:'💧', question:'What simple action saves the most water at home?', options:['Fixing leaking taps','Buying bottled water','Watering plants daily'], answer:'Fixing leaking taps', fact:'💧 A dripping tap can waste over 20,000 litres of water per year! A dripping toilet can waste 200 litres per day. Small leaks, big waste!' },
  // Atmosphere & Air
  { level:1, visual:'🌍', question:'What is the lowest layer of the atmosphere where weather occurs?', options:['Troposphere','Stratosphere','Mesosphere'], answer:'Troposphere', fact:'🌍 The troposphere extends from the surface to about 12 km up. It contains 75% of all atmospheric mass and is where all our weather happens!' },
  { level:1, visual:'☀️', question:'What layer of the atmosphere contains the ozone layer?', options:['Stratosphere','Troposphere','Thermosphere'], answer:'Stratosphere', fact:'☀️ The ozone layer in the stratosphere (15–35 km up) absorbs 97–99% of harmful UV-B radiation from the Sun — protecting all life on Earth!' },
  { level:1, visual:'🌬️', question:'What is the most abundant gas in Earth\'s atmosphere?', options:['Nitrogen','Oxygen','Carbon dioxide'], answer:'Nitrogen', fact:'🌬️ Nitrogen makes up 78% of the atmosphere. It is mostly unreactive, but nitrogen-fixing bacteria convert it into forms that plants can use!' },
  { level:1, visual:'☁️', question:'What gas makes up about 21% of Earth\'s atmosphere?', options:['Oxygen','Nitrogen','Carbon dioxide'], answer:'Oxygen', fact:'☁️ Oxygen was only added to the atmosphere by early photosynthetic bacteria about 2.4 billion years ago — the Great Oxygenation Event that made complex life possible!' },
  { level:1, visual:'🌡️', question:'What are the main greenhouse gases naturally present in the atmosphere?', options:['Water vapour and CO₂','Nitrogen and oxygen','Ozone and helium'], answer:'Water vapour and CO₂', fact:'🌡️ Water vapour is actually the most powerful greenhouse gas by quantity. CO₂ is less abundant but persists for centuries — making it the key driver of long-term warming!' },
  { level:1, visual:'🏭', question:'What is smog?', options:['A mixture of smoke and fog caused by air pollution','Pure water vapour clouds','Steam from geothermal vents'], answer:'A mixture of smoke and fog caused by air pollution', fact:'🏭 London\'s Great Smog of 1952 killed over 12,000 people in four days. It led to the world\'s first Clean Air Act in 1956!' },
  { level:1, visual:'🌧️', question:'What chemical makes acid rain acidic?', options:['Sulfuric acid and nitric acid','Carbonic acid only','Hydrochloric acid'], answer:'Sulfuric acid and nitric acid', fact:'🌧️ Acid rain (pH as low as 4) damages forests, kills fish in lakes, and erodes stone buildings. It forms when SO₂ and NOx dissolve in rainwater!' },
  // Energy
  { level:1, visual:'💨', question:'What type of energy harnesses the kinetic energy of moving air?', options:['Wind energy','Geothermal energy','Tidal energy'], answer:'Wind energy', fact:'💨 Wind turbines convert wind into electricity with no emissions. The world\'s largest offshore wind turbines are over 260 metres tall — taller than the Eiffel Tower!' },
  { level:1, visual:'🌊', question:'What type of renewable energy uses the flow of water to generate electricity?', options:['Hydroelectric power','Geothermal power','Solar power'], answer:'Hydroelectric power', fact:'🌊 Hydroelectric power generates about 16% of global electricity. The Three Gorges Dam in China is the world\'s largest power station!' },
  { level:1, visual:'🌍', question:'What renewable energy source uses heat from inside the Earth?', options:['Geothermal energy','Solar energy','Wind energy'], answer:'Geothermal energy', fact:'🌍 Iceland gets nearly 100% of its heating from geothermal energy! The Earth\'s core is about 5,500°C — as hot as the Sun\'s surface!' },
  { level:1, visual:'🌾', question:'What do we call energy produced from living or recently dead organic material?', options:['Biomass energy','Nuclear energy','Geothermal energy'], answer:'Biomass energy', fact:'🌾 Burning wood, crop waste, or biogas from animal manure are all biomass energy sources. They release CO₂ but can be carbon-neutral if replanted!' },
  { level:1, visual:'⚛️', question:'What type of energy is produced by splitting atoms in a nuclear reactor?', options:['Nuclear energy','Geothermal energy','Fossil fuel energy'], answer:'Nuclear energy', fact:'⚛️ Nuclear fission releases millions of times more energy than burning coal. One uranium pellet the size of a fingertip equals the energy in 3 barrels of oil!' },
  { level:1, visual:'💡', question:'What simple energy-saving action can households take to reduce electricity use?', options:['Switching to LED light bulbs','Buying bigger appliances','Leaving devices on standby'], answer:'Switching to LED light bulbs', fact:'💡 LED bulbs use 75–80% less energy than old incandescent bulbs and last 25 times longer. Swapping all bulbs in a home saves £60 per year!' },
  { level:1, visual:'☀️', question:'What do we call the energy stored in chemical bonds of organic molecules like coal and oil?', options:['Chemical energy','Nuclear energy','Kinetic energy'], answer:'Chemical energy', fact:'☀️ Fossil fuels are essentially stored ancient sunlight. The chemical energy in coal was captured by plants 300 million years ago through photosynthesis!' },
  // Endangered species & conservation
  { level:1, visual:'🐋', question:'What international agreement bans commercial whaling to protect whale populations?', options:['International Whaling Commission moratorium','Paris Agreement','CITES'], answer:'International Whaling Commission moratorium', fact:'🐋 Commercial whaling was banned in 1986 by the IWC. Some whale populations have recovered, but blue whales are still endangered with only ~15,000 remaining!' },
  { level:1, visual:'🌺', question:'What do we call the variety of genetic information within a single species?', options:['Genetic diversity','Species diversity','Ecosystem diversity'], answer:'Genetic diversity', fact:'🌺 Genetic diversity is the raw material for evolution. Low genetic diversity (like in cheetahs) makes a species more vulnerable to disease and environmental change!' },
  { level:1, visual:'🐼', question:'What organisation maintains the "Red List" of threatened species?', options:['IUCN (International Union for Conservation of Nature)','WWF','UNEP'], answer:'IUCN (International Union for Conservation of Nature)', fact:'🐼 The IUCN Red List has assessed over 150,000 species. Critically Endangered is one step from Extinct in the Wild — the most dire category for surviving wild species!' },
  { level:1, visual:'🌲', question:'What is the main threat to biodiversity globally?', options:['Habitat destruction','Climate change','Invasive species'], answer:'Habitat destruction', fact:'🌲 Habitat loss from farming, logging, and urbanisation is the number one cause of species extinction. When the habitat goes, the species go with it!' },
  { level:1, visual:'🦋', question:'What do we call species that have been introduced to a new area where they cause ecological harm?', options:['Invasive species','Endemic species','Keystone species'], answer:'Invasive species', fact:'🦋 Invasive species cost the global economy over $400 billion per year. Grey squirrels, cane toads, and water hyacinth are notorious examples!' },
  { level:1, visual:'🐝', question:'Why are bees considered so important to ecosystems?', options:['They pollinate flowers, enabling plant reproduction','They produce honey for other animals','They decompose dead matter'], answer:'They pollinate flowers, enabling plant reproduction', fact:'🐝 Bees pollinate about 75% of flowering plant species, including one-third of all food crops. Without bees, supermarkets would lose half their produce!' },
  // General environmental literacy
  { level:1, visual:'🌍', question:'What does the term "carbon footprint" mean?', options:['The total amount of CO₂ and other greenhouse gases emitted by an activity or person','The amount of land covered by carbon-rich soils','The size of a coal mine\'s surface area'], answer:'The total amount of CO₂ and other greenhouse gases emitted by an activity or person', fact:'🌍 The average UK person\'s carbon footprint is about 10 tonnes CO₂ per year. Flying long-haul is one of the highest-impact individual activities!' },
  { level:1, visual:'♻️', question:'What is composting?', options:['Breaking down organic waste into nutrient-rich soil conditioner','Burning waste to generate energy','Sorting plastic by type for recycling'], answer:'Breaking down organic waste into nutrient-rich soil conditioner', fact:'♻️ Composting diverts food and garden waste from landfill and returns nutrients to soil. A third of household waste can be composted!' },
  { level:1, visual:'🌱', question:'What does "organic farming" mean?', options:['Farming without synthetic pesticides or fertilisers','Farming using only mechanical machines','Growing crops in water without soil'], answer:'Farming without synthetic pesticides or fertilisers', fact:'🌱 Organic farms support higher biodiversity — 30% more wild plants, insects, and birds than conventional farms — by avoiding chemical inputs!' },
  { level:1, visual:'🚶', question:'What is the most environmentally friendly way to travel short distances?', options:['Walking or cycling','Taking the bus','Driving an electric car'], answer:'Walking or cycling', fact:'🚶 Walking and cycling produce zero emissions, reduce congestion, and improve health. Cycling emits 33 times less CO₂ per km than driving alone!' },
  { level:1, visual:'🥩', question:'Which diet has the highest carbon footprint per person?', options:['Meat-heavy diet','Vegetarian diet','Vegan diet'], answer:'Meat-heavy diet', fact:'🥩 Beef production emits ~60 kg CO₂ per kg of food — 50 times more than lentils. Reducing meat consumption is one of the highest-impact individual climate actions!' },
  { level:1, visual:'🌿', question:'What is the name for the zone between the high and low tide marks on a coastline?', options:['Intertidal zone','Littoral zone','Pelagic zone'], answer:'Intertidal zone', fact:'🌿 The intertidal zone is exposed to air twice a day and underwater twice a day. Organisms here must tolerate extreme conditions — drying, heat, pounding waves!' },
  { level:1, visual:'🌍', question:'What percentage of the world\'s population lacks access to safe drinking water?', options:['About 1 in 10 people','About 1 in 2 people','Almost none'], answer:'About 1 in 10 people', fact:'🌍 Around 785 million people — 1 in 10 — lack access to clean water. Waterborne diseases kill more children each year than malaria, AIDS, and measles combined!' },
  { level:1, visual:'🌲', question:'What do we call it when a forest is cleared and the land is used permanently for something else?', options:['Deforestation','Afforestation','Succession'], answer:'Deforestation', fact:'🌲 We lose about 15 billion trees per year to deforestation — that\'s 46% fewer trees than before human civilisation. The Amazon has lost 17% of its cover in 50 years!' },
  { level:1, visual:'🐟', question:'What is overfishing?', options:['Catching fish faster than populations can reproduce','Fishing in protected marine areas','Using large nets in the ocean'], answer:'Catching fish faster than populations can reproduce', fact:'🐟 Over 90% of the world\'s fish stocks are fully fished or overfished. Without action, major commercial fish species could collapse by 2048!' },
  { level:1, visual:'🌡️', question:'By how many degrees Celsius has the Earth\'s average temperature risen since pre-industrial times (as of 2023)?', options:['About 1.2°C','About 0.1°C','About 5°C'], answer:'About 1.2°C', fact:'🌡️ 1.2°C sounds small, but it has already caused more frequent heatwaves, stronger storms, and rising seas. The Paris Agreement aims to limit warming to 1.5°C!' },
  { level:1, visual:'🌊', question:'What causes sea levels to rise?', options:['Melting ice on land and thermal expansion of seawater','Increased rainfall over the oceans','Rising tides from the Moon\'s gravity'], answer:'Melting ice on land and thermal expansion of seawater', fact:'🌊 Sea levels have risen about 20 cm since 1900. As water warms, it expands; as glaciers melt, extra water flows to the sea — a double threat!' },
  { level:1, visual:'☀️', question:'What is solar energy used for in homes beyond generating electricity?', options:['Heating water using solar thermal panels','Making synthetic fuels','Powering nuclear reactors'], answer:'Heating water using solar thermal panels', fact:'☀️ Solar thermal panels can provide 50–70% of a household\'s hot water needs. They are one of the most cost-effective renewable energy technologies!' },
  { level:1, visual:'🌬️', question:'What is the "wind belt" near the equator where trade winds from both hemispheres meet?', options:['Intertropical Convergence Zone (ITCZ)','Jet stream','Hadley cell'], answer:'Intertropical Convergence Zone (ITCZ)', fact:'🌬️ The ITCZ is a band of heavy rainfall and towering thunderstorms near the equator. Sailors once called it the "doldrums" because of its unreliable winds!' },
  { level:1, visual:'🌿', question:'What is the name for the uppermost canopy layer of a tropical rainforest that receives the most sunlight?', options:['Emergent layer','Canopy layer','Understory'], answer:'Emergent layer', fact:'🌿 Giant trees like Brazil nut and kapok trees poke above the main canopy as emergents, reaching 40–70 m. Eagles and monkeys live at this sunny, windy height!' },
  { level:1, visual:'🐋', question:'What is the world\'s largest animal?', options:['Blue whale','African elephant','Giant squid'], answer:'Blue whale', fact:'🐋 Blue whales can reach 30 m long and weigh 200 tonnes — the largest animals ever known to have lived on Earth. Their hearts are the size of a small car!' },
  { level:1, visual:'🌍', question:'What does the ozone hole refer to?', options:['A region of severely depleted ozone above Antarctica','A literal hole in the sky above the poles','An area with no atmosphere'], answer:'A region of severely depleted ozone above Antarctica', fact:'🌍 CFCs from aerosols and fridges destroyed ozone above Antarctica. The Montreal Protocol (1987) banned CFCs — the ozone hole is now slowly recovering!' },
  { level:1, visual:'🌱', question:'What is the term for energy that is replenished naturally on a human timescale?', options:['Renewable energy','Fossil fuel energy','Nuclear energy'], answer:'Renewable energy', fact:'🌱 Solar, wind, hydro, and geothermal energy are all renewable because natural processes replenish them continuously. They will not run out in human timescales!' },
  { level:1, visual:'💧', question:'What is the name of the process used to remove salt from seawater to make it drinkable?', options:['Desalination','Filtration','Distillation'], answer:'Desalination', fact:'💧 Desalination plants supply drinking water for millions in water-scarce regions like the Middle East. However, the process is energy-intensive and creates a salty brine byproduct!' },
  { level:1, visual:'🌿', question:'What is a food web?', options:['A complex network of interconnected food chains in an ecosystem','A single straight food chain','The web of roots in forest soil'], answer:'A complex network of interconnected food chains in an ecosystem', fact:'🌿 Food webs show the real complexity of feeding relationships. Remove one species and the whole web can unravel — demonstrating why every species matters!' },
  { level:1, visual:'🌊', question:'What percentage of Earth\'s species live in the ocean?', options:['About 50–80%','About 10%','About 99%'], answer:'About 50–80%', fact:'🌊 The ocean is the largest habitat on Earth. Scientists estimate 50–80% of all species live there, yet over 80% of the ocean remains unexplored!' },
  { level:1, visual:'🌾', question:'What is monoculture farming?', options:['Growing a single crop over a large area','Growing crops alongside livestock','Farming without any pesticides'], answer:'Growing a single crop over a large area', fact:'🌾 Monocultures are efficient but vulnerable — a single disease or pest can devastate the entire crop. They also reduce biodiversity in farmland habitats!' },
  { level:1, visual:'🌡️', question:'What is the difference between climate change and global warming?', options:['Global warming refers to rising temperatures; climate change includes all related changes (storms, rainfall, ice)','They mean exactly the same thing','Climate change is natural; global warming is human-caused'], answer:'Global warming refers to rising temperatures; climate change includes all related changes (storms, rainfall, ice)', fact:'🌡️ Global warming is one aspect of climate change. Higher temperatures also drive more intense storms, shifted rainfall patterns, rising seas, and ecosystem disruption!' },

  // ── NEW LEVEL 2 (MEDIUM) ──────────────────────────────────────────────────
  // Climate change
  { level:2, visual:'🌡️', question:'What is the greenhouse effect?', options:['Atmospheric gases trapping heat radiating from Earth\'s surface','The ozone layer blocking UV radiation','Forests releasing heat during photosynthesis'], answer:'Atmospheric gases trapping heat radiating from Earth\'s surface', fact:'🌡️ Without any greenhouse effect, Earth would be -18°C. The ENHANCED greenhouse effect from human emissions is pushing temperatures above the range life evolved in!' },
  { level:2, visual:'🧊', question:'What is permafrost?', options:['Ground that remains frozen for at least two consecutive years','Ice sheets on mountain summits','Frozen ocean water around the poles'], answer:'Ground that remains frozen for at least two consecutive years', fact:'🧊 Permafrost stores twice as much carbon as the atmosphere. As it thaws, it releases CO₂ and methane — potentially triggering runaway warming!' },
  { level:2, visual:'🌊', question:'What is ocean acidification?', options:['Oceans becoming more acidic as they absorb CO₂','Rising ocean temperatures killing coral','Saltwater intruding into freshwater systems'], answer:'Oceans becoming more acidic as they absorb CO₂', fact:'🌊 Oceans absorb about 30% of human CO₂ emissions. This forms carbonic acid, lowering pH and dissolving the calcium carbonate shells of corals, oysters, and plankton!' },
  { level:2, visual:'🌍', question:'What is the albedo effect?', options:['The reflection of sunlight by surfaces like ice and snow back into space','The absorption of heat by dark surfaces','The bending of light through the atmosphere'], answer:'The reflection of sunlight by surfaces like ice and snow back into space', fact:'🌍 Ice reflects ~80% of sunlight; open ocean absorbs ~94%. As Arctic ice melts, it is replaced by dark ocean — absorbing more heat and accelerating warming!' },
  { level:2, visual:'🌡️', question:'Which of the following is an extreme weather event made MORE likely by climate change?', options:['Intense heatwaves','Volcanic eruptions','Earthquakes'], answer:'Intense heatwaves', fact:'🌡️ Climate change doesn\'t cause all extreme weather, but it loads the dice. The 2003 European heatwave that killed 70,000 people was made 10 times more likely by warming!' },
  { level:2, visual:'🌊', question:'What is the main consequence of melting ice caps and glaciers?', options:['Rising sea levels threatening coastal cities','Decreased ocean salinity','More freshwater for agriculture'], answer:'Rising sea levels threatening coastal cities', fact:'🌊 If all land ice melted, sea levels would rise ~65 m. Even a 1 m rise would displace hundreds of millions of people in low-lying coastal regions!' },
  { level:2, visual:'🌿', question:'What is a carbon sink?', options:['Anything that absorbs more CO₂ than it releases, like forests and oceans','A container for storing captured carbon','A type of industrial carbon filter'], answer:'Anything that absorbs more CO₂ than it releases, like forests and oceans', fact:'🌿 The Amazon, boreal forests, and oceans are major carbon sinks. But deforestation and ocean warming are reducing their capacity to absorb our emissions!' },
  { level:2, visual:'🏙️', question:'What is the "urban heat island" effect?', options:['Cities being warmer than surrounding rural areas due to human activity and lack of vegetation','Cities receiving more rainfall than the countryside','Coastal cities being cooled by sea breezes'], answer:'Cities being warmer than surrounding rural areas due to human activity and lack of vegetation', fact:'🏙️ Cities can be 1–3°C hotter than surrounding countryside. Dark surfaces absorb heat, waste heat from vehicles and buildings, and lack of trees reduces cooling!' },
  { level:2, visual:'🌾', question:'What is desertification?', options:['The process by which fertile land becomes desert due to drought, deforestation, or overfarming','The natural expansion of deserts over millions of years','The salting of coastal soils by rising sea levels'], answer:'The process by which fertile land becomes desert due to drought, deforestation, or overfarming', fact:'🌾 About 12 million hectares of productive land become desert every year. It threatens food security for over 1 billion people living in dryland areas!' },
  { level:2, visual:'💧', question:'What is eutrophication?', options:['Excess nutrients causing algae blooms that deplete oxygen in water bodies','Acidification of lakes by acid rain','The increase in salinity of freshwater bodies'], answer:'Excess nutrients causing algae blooms that deplete oxygen in water bodies', fact:'💧 Agricultural fertilisers wash into rivers and lakes. Algae explode in growth, die, and decompose — bacteria consume all the oxygen, creating dead zones!' },
  // Ecology & species interactions
  { level:2, visual:'🐺', question:'What is a trophic cascade?', options:['Indirect effects that ripple through a food web when a key species is added or removed','The flow of energy from producers to apex predators','Seasonal changes in food availability'], answer:'Indirect effects that ripple through a food web when a key species is added or removed', fact:'🐺 When wolves were reintroduced to Yellowstone in 1995, elk behaviour changed, rivers recovered, and biodiversity increased — a famous trophic cascade!' },
  { level:2, visual:'🌿', question:'What is ecological succession?', options:['The gradual change in species composition of an ecosystem over time','The seasonal migration of species to new habitats','The extinction of species as ecosystems age'], answer:'The gradual change in species composition of an ecosystem over time', fact:'🌿 Primary succession starts on bare rock; secondary succession follows a disturbance like fire. Both lead to a stable climax community over decades to centuries!' },
  { level:2, visual:'🌱', question:'What are pioneer species?', options:['The first species to colonise bare, harsh environments during primary succession','Species that migrate the furthest distances','Species that are the last to survive a mass extinction'], answer:'The first species to colonise bare, harsh environments during primary succession', fact:'🌱 Lichens and mosses are classic pioneer species. They break down rock, build soil, and create conditions for more demanding plants to eventually take root!' },
  { level:2, visual:'🌳', question:'What is the climax community in ecological succession?', options:['The final, stable community of species that develops at the end of succession','The first community to establish after a disturbance','The community with the fewest species in an ecosystem'], answer:'The final, stable community of species that develops at the end of succession', fact:'🌳 In temperate climates, climax communities are often oak or beech woodland. They are self-sustaining unless a major disturbance resets the succession clock!' },
  { level:2, visual:'🐟', question:'What is bioaccumulation?', options:['Build-up of toxic substances in an organism over its lifetime','The accumulation of nutrients in soil','Carbon being stored in living organisms'], answer:'Build-up of toxic substances in an organism over its lifetime', fact:'🐟 Mercury in water is absorbed by plankton, then concentrated at each trophic level. Large predatory fish like tuna can carry 10 million times the mercury of the surrounding water!' },
  { level:2, visual:'🦈', question:'What is biomagnification?', options:['The increasing concentration of toxins at each higher level of a food chain','The biological amplification of population size','The magnification of biodiversity in complex ecosystems'], answer:'The increasing concentration of toxins at each higher level of a food chain', fact:'🦈 DDT biomagnified to 10 million times its water concentration in eagles, causing eggshell thinning and near-extinction. It\'s why DDT was banned in the 1970s!' },
  { level:2, visual:'🌾', question:'What is carrying capacity?', options:['The maximum population size an environment can sustainably support','The amount of food a species needs per year','The speed at which a population grows under ideal conditions'], answer:'The maximum population size an environment can sustainably support', fact:'🌾 When a population exceeds carrying capacity, food and resources run short, causing it to crash. Human populations that overshoot face famines and resource wars!' },
  { level:2, visual:'🐍', question:'What is competitive exclusion?', options:['When two species compete for the same niche and one is driven out or goes extinct','When predators exclude prey from certain habitats','When invasive species exclude native species through predation'], answer:'When two species compete for the same niche and one is driven out or goes extinct', fact:'🐍 Two species cannot occupy exactly the same niche in the same place. One will always be slightly better — over time, the loser shifts niche or disappears!' },
  { level:2, visual:'🌊', question:'What is the phosphorus cycle?', options:['The movement of phosphorus through rocks, soil, water, and living organisms','The conversion of phosphorus compounds into atmospheric gas','The role of phosphorus in the greenhouse effect'], answer:'The movement of phosphorus through rocks, soil, water, and living organisms', fact:'🌊 Phosphorus has no atmospheric phase — it cycles through rocks, soil, and water. It is a key limiting nutrient in aquatic systems and crucial for DNA and ATP!' },
  { level:2, visual:'🌿', question:'What is the sulfur cycle?', options:['The movement of sulfur through the atmosphere, land, and water, including via volcanic eruptions and decomposition','The process by which plants absorb sulfur from soil','The role of sulfur dioxide in acid rain only'], answer:'The movement of sulfur through the atmosphere, land, and water, including via volcanic eruptions and decomposition', fact:'🌿 Volcanic eruptions, sea spray, and decomposition release sulfur. Industrial SO₂ disrupts the cycle by creating acid rain — 10 times more sulfur is released by humans than volcanoes!' },
  // Human impacts
  { level:2, visual:'🌲', question:'What is the primary cause of tropical deforestation in the Amazon?', options:['Cattle ranching and soy farming','Logging for timber only','Urbanisation and road building'], answer:'Cattle ranching and soy farming', fact:'🌲 About 80% of Amazon deforestation is for cattle pasture, with much of the rest for soy (mostly to feed livestock). The burger on your plate may have a forest footprint!' },
  { level:2, visual:'🐟', question:'What is bycatch?', options:['Non-target species accidentally caught and killed in fishing operations','Fish caught illegally without permits','The waste left after fish are processed'], answer:'Non-target species accidentally caught and killed in fishing operations', fact:'🐟 Bycatch kills about 38 million tonnes of non-target sea life per year — including sea turtles, dolphins, and seabirds. It\'s one of the biggest threats to marine biodiversity!' },
  { level:2, visual:'🌍', question:'What is habitat fragmentation?', options:['Breaking large, continuous habitats into smaller, isolated patches','The natural breaking apart of rocks into soil','Dividing an ecosystem into different zones for conservation'], answer:'Breaking large, continuous habitats into smaller, isolated patches', fact:'🌍 Roads, farms, and cities cut habitats into islands. Small isolated populations lose genetic diversity, cannot migrate, and are more vulnerable to local extinction!' },
  { level:2, visual:'🏭', question:'What are dead zones in the ocean?', options:['Areas with too little oxygen to support most marine life, caused by nutrient pollution','Regions of the deep ocean where no sunlight reaches','Areas permanently covered by floating plastic garbage'], answer:'Areas with too little oxygen to support most marine life, caused by nutrient pollution', fact:'🏭 There are over 400 ocean dead zones worldwide. The Gulf of Mexico dead zone — fed by Mississippi River fertiliser runoff — can reach the size of New Jersey!' },
  { level:2, visual:'🌾', question:'What is soil erosion?', options:['The removal of topsoil by wind or water, often worsened by poor farming practices','The natural breakdown of rock into soil','The compaction of soil by heavy machinery'], answer:'The removal of topsoil by wind or water, often worsened by poor farming practices', fact:'🌾 About 24 billion tonnes of fertile soil are lost per year — more than a tonne for every person on Earth. It takes 500–1,000 years to form 1 cm of topsoil naturally!' },
  { level:2, visual:'🐋', question:'What are persistent organic pollutants (POPs)?', options:['Toxic chemicals that remain in the environment and accumulate in living tissues for years or decades','Organic waste that breaks down slowly in compost heaps','Carbon compounds released by decomposing organisms'], answer:'Toxic chemicals that remain in the environment and accumulate in living tissues for years or decades', fact:'🐋 POPs like PCBs and DDT are found in the fat of polar bears and whales thousands of miles from industrial sources. The Stockholm Convention now bans or restricts the worst ones!' },
  { level:2, visual:'🌊', question:'What is plastic pollution microplastics?', options:['Plastic fragments smaller than 5 mm formed by breakdown of larger plastics or shed from products','A type of industrial chemical in cleaning products','Nanoscale particles used in sunscreen that harm coral'], answer:'Plastic fragments smaller than 5 mm formed by breakdown of larger plastics or shed from products', fact:'🌊 Microplastics have been found in Antarctic ice, Mariana Trench sediment, human placentas, and Arctic sea ice. They absorb toxic chemicals and enter food chains!' },
  // Conservation strategies
  { level:2, visual:'🌿', question:'What is ex-situ conservation?', options:['Protecting species outside their natural habitat, e.g. in zoos and seed banks','Protecting species within their natural habitat','Removing invasive species from an ecosystem'], answer:'Protecting species outside their natural habitat, e.g. in zoos and seed banks', fact:'🌿 The Frozen Zoo in San Diego stores genetic material from 10,000 species. The Svalbard Global Seed Vault holds seeds of over 1.3 million crop varieties as an insurance policy!' },
  { level:2, visual:'🦋', question:'What is in-situ conservation?', options:['Protecting species within their natural habitats, e.g. national parks and nature reserves','Breeding endangered species in captivity','Storing genetic material in seed banks'], answer:'Protecting species within their natural habitats, e.g. national parks and nature reserves', fact:'🦋 In-situ conservation is generally preferred because species can continue to evolve in their natural environment. However, for critically endangered species, ex-situ is a vital safety net!' },
  { level:2, visual:'🐾', question:'What are wildlife corridors?', options:['Strips of natural habitat connecting isolated patches, allowing animals to move safely','Protected zones at national borders to prevent illegal wildlife trade','Underground tunnels used by badgers and foxes under roads'], answer:'Strips of natural habitat connecting isolated patches, allowing animals to move safely', fact:'🐾 Wildlife corridors allow gene flow, migration, and range shifts in response to climate change. Banff National Park in Canada has wildlife bridges over the Trans-Canada Highway!' },
  { level:2, visual:'🌊', question:'What are Marine Protected Areas (MPAs)?', options:['Regions of sea where human activity is restricted to protect marine ecosystems','Areas of ocean monitored for pollution levels','Shipping lanes protected from storms by international treaty'], answer:'Regions of sea where human activity is restricted to protect marine ecosystems', fact:'🌊 Inside MPAs, fish populations can recover to 600% of outside levels, then "spill over" into fished areas. Only about 2.7% of the ocean is strongly protected!' },
  { level:2, visual:'🌿', question:'What is sustainable fisheries management?', options:['Catching fish at rates that allow populations to reproduce and maintain their size','Banning all fishing worldwide to allow recovery','Farming all fish in land-based aquaculture tanks'], answer:'Catching fish at rates that allow populations to reproduce and maintain their size', fact:'🌿 Sustainable fisheries set catch limits based on population science. The Marine Stewardship Council (MSC) certifies fisheries that meet sustainability standards!' },
  { level:2, visual:'🌱', question:'What is agroforestry?', options:['Growing trees alongside crops or livestock to improve yield and environmental benefits','Clearing forests to create farmland','Using forest land for logging before converting to agriculture'], answer:'Growing trees alongside crops or livestock to improve yield and environmental benefits', fact:'🌱 Agroforestry systems can sequester carbon, reduce soil erosion, improve water quality, and increase crop yields by up to 50% compared to monocultures. Win-win-win!' },
  { level:2, visual:'♻️', question:'What is the circular economy?', options:['An economic system designed to eliminate waste by keeping materials in use as long as possible','An economy based entirely on recycling plastics','A global trade system connecting all countries in a circle'], answer:'An economic system designed to eliminate waste by keeping materials in use as long as possible', fact:'♻️ In a circular economy, products are designed for repair, reuse, and recycling. Moving from a linear "take-make-dispose" to circular could cut global CO₂ emissions by 39%!' },
  { level:2, visual:'🌍', question:'What is rewilding?', options:['Restoring degraded ecosystems and reintroducing lost species to allow natural processes to resume','Releasing farmed animals into the wild','Training wild animals to live alongside humans'], answer:'Restoring degraded ecosystems and reintroducing lost species to allow natural processes to resume', fact:'🌍 Rewilding projects across Europe are reintroducing wolves, lynx, and beavers. Beavers, once extinct in England, now reduce flood risk by building dams in key river catchments!' },
  { level:2, visual:'🌾', question:'What is bioremediation?', options:['Using living organisms like bacteria or plants to remove pollutants from contaminated environments','The natural decomposition of waste over thousands of years','Using fire to clear contaminated land'], answer:'Using living organisms like bacteria or plants to remove pollutants from contaminated environments', fact:'🌾 Sunflowers were planted at Chernobyl to absorb radioactive cesium from soil! Bacteria have been engineered to break down oil spills — nature does the cleanup!' },
  { level:2, visual:'🌊', question:'What is blue carbon?', options:['Carbon stored in coastal and marine ecosystems like mangroves, seagrasses, and salt marshes','Carbon dioxide dissolved in ocean water','Methane hydrates trapped under the seafloor'], answer:'Carbon stored in coastal and marine ecosystems like mangroves, seagrasses, and salt marshes', fact:'🌊 Mangroves store up to 5 times more carbon per hectare than tropical forests. They also protect coasts from storms and provide nursery habitat for fish — yet we\'ve lost 50% of them!' },
  { level:2, visual:'🌿', question:'What is integrated pest management (IPM)?', options:['Controlling pests using a combination of biological, cultural, and chemical methods to minimise environmental harm','Eliminating all pesticides from farming','Using genetic engineering to make crops pest-resistant only'], answer:'Controlling pests using a combination of biological, cultural, and chemical methods to minimise environmental harm', fact:'🌿 IPM starts with the least toxic methods — crop rotation, natural predators, pheromone traps — before resorting to chemicals. It can cut pesticide use by 50% or more!' },
  // Additional medium topics
  { level:2, visual:'🌡️', question:'What is the Paris Agreement target for limiting global temperature rise?', options:['Well below 2°C, with efforts to limit to 1.5°C above pre-industrial levels','Exactly 2°C above pre-industrial levels','3°C to allow economic development'],  answer:'Well below 2°C, with efforts to limit to 1.5°C above pre-industrial levels', fact:'🌡️ The Paris Agreement (2015) was the first universal climate deal. At 1.5°C, coral reefs mostly survive; at 2°C, 99% are projected to bleach regularly and die!' },
  { level:2, visual:'🌍', question:'What is the tragedy of the commons?', options:['The overuse of shared resources when individuals act in their own short-term interest','The difficulty of reaching international environmental agreements','The inevitable loss of natural habitats to urban development'], answer:'The overuse of shared resources when individuals act in their own short-term interest', fact:'🌍 Fisheries, groundwater, and the atmosphere are commons. Each user benefits from overuse while sharing the cost — leading to collapse unless managed collectively!' },
  { level:2, visual:'💨', question:'What is renewable energy storage and why is it important?', options:['Storing energy when supply exceeds demand to use when production is low','Building larger wind turbines to generate more power','Transmitting renewable energy over longer distances'], answer:'Storing energy when supply exceeds demand to use when production is low', fact:'💨 Solar and wind are intermittent — the sun doesn\'t always shine, the wind doesn\'t always blow. Batteries, pumped hydro, and hydrogen storage allow renewable energy 24/7!' },
  { level:2, visual:'🌿', question:'What is keystone species removal called?', options:['Defaunation','Deforestation','Depredation'], answer:'Defaunation', fact:'🌿 Defaunation — the loss of animal life from ecosystems — is the silent crisis alongside habitat loss. Losing large mammals cascades through entire food webs!' },
  { level:2, visual:'🐝', question:'What is colony collapse disorder (CCD)?', options:['The mysterious disappearance of worker bees from hives, threatening pollination services','The natural swarming of bee colonies in spring','A viral disease causing bee larvae to die before hatching'], answer:'The mysterious disappearance of worker bees from hives, threatening pollination services', fact:'🐝 CCD has caused some US beekeepers to lose 30–90% of their hives. Causes include pesticides (especially neonicotinoids), Varroa mites, habitat loss, and stress — the bee crisis has multiple drivers!' },
  { level:2, visual:'🌊', question:'What is the thermohaline circulation?', options:['The global ocean conveyor belt driven by differences in water temperature and salinity','The seasonal warming and cooling of surface ocean water','Tidal currents driven by the Moon\'s gravitational pull'], answer:'The global ocean conveyor belt driven by differences in water temperature and salinity', fact:'🌊 The thermohaline circulation (THC) distributes heat around the globe. The Atlantic part (AMOC) keeps Northern Europe warm — its slowdown from ice melt could trigger regional cooling!' },
  { level:2, visual:'🌱', question:'What is nitrogen deposition?', options:['Excess reactive nitrogen compounds falling from the atmosphere onto ecosystems, often from agriculture and combustion','The natural addition of nitrogen to soil by legumes','Nitrogen gas dissolving in ocean water'], answer:'Excess reactive nitrogen compounds falling from the atmosphere onto ecosystems, often from agriculture and combustion', fact:'🌱 Reactive nitrogen from fertilisers and exhaust causes biodiversity loss in nitrogen-sensitive habitats like heathlands and bogs, where nutrient-poor conditions support specialist species!' },
  { level:2, visual:'🐋', question:'What are ecosystem services?', options:['The benefits that humans obtain from ecosystems, such as clean water, food, climate regulation, and cultural value','Services provided by environmental charities','Products manufactured from natural materials'], answer:'The benefits that humans obtain from ecosystems, such as clean water, food, climate regulation, and cultural value', fact:'🐋 Ecosystem services are worth an estimated $125–145 trillion per year — more than twice global GDP. Yet they are largely unpriced in markets, leading to their overexploitation!' },
  { level:2, visual:'🌿', question:'What is ecological footprint?', options:['The area of land and sea needed to produce all the resources a person or country uses and absorb their waste','The physical area damaged by industrial pollution','The total land area of a country\'s protected nature reserves'], answer:'The area of land and sea needed to produce all the resources a person or country uses and absorb their waste', fact:'🌿 If everyone lived like the average American, we would need about 5 Earths. The global average is 1.7 Earths — we are already overshooting what our planet can sustainably provide!' },
  { level:2, visual:'💧', question:'What is water stress?', options:['When water demand approaches or exceeds available supply in a region','Pollution of water sources by chemical spills','Flooding caused by extreme rainfall events'], answer:'When water demand approaches or exceeds available supply in a region', fact:'💧 Over 40% of the world\'s population experiences severe water stress for at least part of the year. Climate change is intensifying droughts while demand grows with population!' },
  { level:2, visual:'🏭', question:'What is environmental justice?', options:['The fair treatment of all people with regard to environmental laws and the fair sharing of environmental benefits and burdens','The legal process of prosecuting companies for environmental crimes','The principle that polluters should pay for environmental damage'], answer:'The fair treatment of all people with regard to environmental laws and the fair sharing of environmental benefits and burdens', fact:'🏭 Low-income and minority communities are disproportionately exposed to pollution and bear more climate impacts while having contributed least to the problem. Environmental justice demands this imbalance be corrected!' },
  { level:2, visual:'🌍', question:'What is green infrastructure?', options:['A network of natural and semi-natural areas providing ecosystem services in and around cities','All renewable energy installations in a region','Buildings constructed from sustainable materials'], answer:'A network of natural and semi-natural areas providing ecosystem services in and around cities', fact:'🌍 Green roofs, urban parks, street trees, and sustainable drainage form green infrastructure. They cool cities, manage floods, improve mental health, and support urban biodiversity!' },
  { level:2, visual:'🌿', question:'What is the convention on biological diversity (CBD)?', options:['The international treaty for the conservation of biodiversity, sustainable use of components, and fair sharing of benefits','A national law protecting endangered species only','An agreement to reduce deforestation rates globally'], answer:'The international treaty for the conservation of biodiversity, sustainable use of components, and fair sharing of benefits', fact:'🌿 Signed at the 1992 Rio Earth Summit, the CBD has 196 parties. The 2022 Kunming-Montreal Global Biodiversity Framework set a target of protecting 30% of land and ocean by 2030!' },

  // ── NEW LEVEL 3 (HARD) ────────────────────────────────────────────────────
  // Advanced climate science
  { level:3, visual:'🌍', question:'What are Milankovitch cycles?', options:['Periodic changes in Earth\'s orbit and axial tilt that cause ice ages on timescales of 20,000–100,000 years','Short-term weather cycles driven by solar activity','Ocean circulation cycles affecting decadal climate variability'], answer:'Periodic changes in Earth\'s orbit and axial tilt that cause ice ages on timescales of 20,000–100,000 years', fact:'🌍 Three orbital variations drive Milankovitch cycles: eccentricity (~100,000 yr), obliquity (~41,000 yr), and precession (~26,000 yr). They explain past ice ages but work too slowly to explain current rapid warming!' },
  { level:3, visual:'🌡️', question:'What is a positive climate feedback loop?', options:['A process where initial warming causes changes that amplify further warming','A beneficial effect of climate change on ecosystems','A government policy that rewards carbon reductions'], answer:'A process where initial warming causes changes that amplify further warming', fact:'🌡️ Ice-albedo feedback, water vapour feedback, and permafrost methane release are all positive feedbacks. They amplify initial warming, potentially pushing Earth past tipping points!' },
  { level:3, visual:'🧊', question:'What is a climate tipping point?', options:['A threshold beyond which a climate subsystem undergoes a self-sustaining, often irreversible change','The point at which global temperatures stabilise','An agreement where countries commit to cutting emissions'], answer:'A threshold beyond which a climate subsystem undergoes a self-sustaining, often irreversible change', fact:'🧊 Scientists have identified 16 potential tipping points including Greenland ice sheet collapse, Amazon dieback, and West Antarctic Ice Sheet destabilisation — some triggered below 1.5°C of warming!' },
  { level:3, visual:'🌿', question:'What are ice cores used for in climate science?', options:['Reconstructing past atmospheric composition and temperature over hundreds of thousands of years','Measuring current sea level rise rates','Testing properties of polar ice for construction purposes'], answer:'Reconstructing past atmospheric composition and temperature over hundreds of thousands of years', fact:'🌿 Antarctic ice cores extend 800,000 years back. Trapped air bubbles contain ancient atmospheres — we can measure CO₂ levels from 800,000 years ago and correlate them perfectly with temperature!' },
  { level:3, visual:'🌳', question:'What are tree rings used for in climate research?', options:['Reconstructing past temperature and precipitation patterns (dendroclimatology)','Estimating the age of fossil fuels','Measuring soil carbon content over time'], answer:'Reconstructing past temperature and precipitation patterns (dendroclimatology)', fact:'🌳 Wide rings = warm, wet years; narrow rings = cold, dry years. Tree ring records extend back over 10,000 years — a detailed archive of regional climate variation!' },
  { level:3, visual:'🌊', question:'What are methane hydrates?', options:['Ice-like structures of water and methane trapped in seafloor and permafrost sediments','Methane produced by ocean bacteria in shallow water','Bubbles of methane rising from volcanic vents'], answer:'Ice-like structures of water and methane trapped in seafloor and permafrost sediments', fact:'🌊 Methane hydrates hold more carbon than all conventional fossil fuels combined. Warming could destabilise them, releasing huge methane pulses — a potential catastrophic feedback!' },
  { level:3, visual:'☀️', question:'How do aerosols affect climate?', options:['They can cool the climate by reflecting sunlight and influencing cloud formation, masking some warming','They warm the climate by trapping long-wave radiation like CO₂','They have no net effect on global temperature'], answer:'They can cool the climate by reflecting sunlight and influencing cloud formation, masking some warming', fact:'☀️ Industrial aerosols (sulfate particles) currently mask ~0.5°C of warming. If we cleaned up air pollution without cutting CO₂, we would see a rapid temperature surge — the "aerosol forcing paradox"!' },
  { level:3, visual:'🌍', question:'What is the IPCC?', options:['The Intergovernmental Panel on Climate Change — the UN body that assesses climate science to inform policy','The International Pollution Control Commission','The Institute for Planetary Climate Cooling'], answer:'The Intergovernmental Panel on Climate Change — the UN body that assesses climate science to inform policy', fact:'🌍 The IPCC does not conduct original research — it synthesises thousands of scientific papers. Its Assessment Reports (AR6 in 2021–22) are the world\'s most authoritative summary of climate science!' },
  { level:3, visual:'🌡️', question:'What is representative concentration pathway (RCP) 8.5?', options:['A high-emission scenario where CO₂ reaches ~940 ppm by 2100, projecting ~4.3°C of warming','A scenario where emissions are cut to zero by 2050','The current atmospheric CO₂ concentration'], answer:'A high-emission scenario where CO₂ reaches ~940 ppm by 2100, projecting ~4.3°C of warming', fact:'🌡️ RCP 8.5 was once called "business as usual" but is now considered a high-end scenario. RCP 2.6 limits warming to ~1.5°C but requires immediate steep emissions cuts globally!' },
  { level:3, visual:'🌿', question:'What is the difference between mitigation and adaptation in climate policy?', options:['Mitigation reduces greenhouse gas emissions; adaptation adjusts to the impacts that cannot be avoided','Mitigation is only for rich countries; adaptation is for developing nations','Mitigation uses technology; adaptation uses nature-based solutions'], answer:'Mitigation reduces greenhouse gas emissions; adaptation adjusts to the impacts that cannot be avoided', fact:'🌿 We need BOTH. Mitigation (renewables, efficiency, reforestation) slows future warming. Adaptation (flood barriers, drought-resistant crops, heat-resilient cities) handles impacts already locked in!' },
  // Advanced ecology
  { level:3, visual:'🏝️', question:'What is island biogeography theory?', options:['Species richness on islands is determined by island size and distance from the mainland — larger, closer islands have more species','Islands always have fewer species than equivalent mainland areas due to isolation','Species on islands evolve faster than mainland species due to reduced competition'], answer:'Species richness on islands is determined by island size and distance from the mainland — larger, closer islands have more species', fact:'🏝️ MacArthur and Wilson\'s 1967 theory applies to any isolated habitat "island" — forest patches, lakes, mountaintops. It underpins the design of nature reserves and minimum viable patch sizes!' },
  { level:3, visual:'🌍', question:'What is metapopulation theory?', options:['A network of subpopulations connected by occasional migration, where local extinctions can be recolonised from other patches','A single large population fragmented by human activity','The global population dynamics of migratory species'], answer:'A network of subpopulations connected by occasional migration, where local extinctions can be recolonised from other patches', fact:'🌍 Metapopulation theory explains how species persist in fragmented habitats. If patches are too isolated, recolonisation fails and the whole metapopulation goes extinct — justifying wildlife corridors!' },
  { level:3, visual:'🌿', question:'What are ecosystem provisioning services?', options:['Direct products obtained from ecosystems, such as food, timber, fresh water, and genetic resources','The regulation of climate and water purification by ecosystems','The spiritual and cultural value of ecosystems to human societies'], answer:'Direct products obtained from ecosystems, such as food, timber, fresh water, and genetic resources', fact:'🌿 The Millennium Ecosystem Assessment (2005) categorised ecosystem services into provisioning, regulating, cultural, and supporting. They underpin ALL human economic activity!' },
  { level:3, visual:'🌳', question:'What are regulating ecosystem services?', options:['Benefits from the regulation of ecosystem processes, e.g. climate regulation, water purification, flood control, pollination','Direct products like food and timber from ecosystems','The aesthetic and spiritual value humans derive from ecosystems'], answer:'Benefits from the regulation of ecosystem processes, e.g. climate regulation, water purification, flood control, pollination', fact:'🌳 Wetlands regulate floods, forests regulate climate, predators regulate prey populations. These "free" services are worth trillions annually — yet invisible in GDP statistics!' },
  { level:3, visual:'🌊', question:'What is landscape ecology?', options:['The study of how spatial patterns of habitats influence ecological processes and biodiversity across large areas','The architecture of parks and gardens using ecological principles','The ecology of coastal and marine landscapes only'], answer:'The study of how spatial patterns of habitats influence ecological processes and biodiversity across large areas', fact:'🌊 Landscape ecologists study patch size, shape, and connectivity. Their findings guide conservation planning — how big reserves should be, how to connect them, and which matrix habitats matter most!' },
  { level:3, visual:'🌿', question:'What is niche partitioning?', options:['When competing species divide available resources to reduce competition and coexist','When a species expands its niche by eliminating a competitor','The process by which specialist species evolve from generalists'], answer:'When competing species divide available resources to reduce competition and coexist', fact:'🌿 Darwin\'s finches in the Galápagos partitioned food resources by beak shape. Warblers in the same tree forage at different heights. Partitioning is a major driver of biodiversity!' },
  { level:3, visual:'🐟', question:'What is a "dead zone" in oceanography and what causes it?', options:['A hypoxic (low-oxygen) area caused by nutrient pollution triggering algal blooms, whose decomposition depletes oxygen','An area of ocean permanently covered by anoxic deep water','A region of ocean above a mid-ocean ridge where hydrothermal vents release toxic gases'], answer:'A hypoxic (low-oxygen) area caused by nutrient pollution triggering algal blooms, whose decomposition depletes oxygen', fact:'🐟 Dead zones have doubled every decade since the 1960s. There are now over 400 globally. The Black Sea dead zone partly recovered after the Soviet collapse reduced fertiliser use — showing recovery is possible!' },
  { level:3, visual:'🌍', question:'What are planetary boundaries?', options:['Nine Earth-system processes whose boundaries define a safe operating space for humanity','The political borders between countries affecting environmental policy','The maximum altitude at which the atmosphere supports life'], answer:'Nine Earth-system processes whose boundaries define a safe operating space for humanity', fact:'🌍 Rockström et al. (2009) identified 9 planetary boundaries including climate change, biodiversity, nitrogen cycle, and land use. As of 2023, six have already been transgressed!' },
  { level:3, visual:'🌱', question:'What is natural capital?', options:['The stock of natural assets (soil, air, water, biodiversity) that yields a flow of ecosystem services to people and economies','The economic value of products made from natural resources','Government funding for conservation programmes'], answer:'The stock of natural assets (soil, air, water, biodiversity) that yields a flow of ecosystem services to people and economies', fact:'🌱 Natural capital accounting is now being adopted by some governments. When natural capital is factored into economic decisions, conservation becomes "cost-effective" rather than a luxury!' },
  // Environmental policy & economics
  { level:3, visual:'🌍', question:'What is cap-and-trade in environmental policy?', options:['Setting a maximum total emission limit (cap) and allowing companies to trade emission permits within that cap','Capping the price of carbon credits at a fixed rate','A system where companies pay a fixed tax per tonne of CO₂ emitted'], answer:'Setting a maximum total emission limit (cap) and allowing companies to trade emission permits within that cap', fact:'🌍 The EU Emissions Trading System (ETS) is the world\'s largest cap-and-trade scheme. It covers ~40% of EU emissions. The carbon price has risen from under €5 to over €80/tonne, driving investment in clean energy!' },
  { level:3, visual:'📋', question:'What is the Kyoto Protocol?', options:['The 1997 international agreement that set binding emission reduction targets for developed countries for 2008–2012','The 2015 agreement to limit warming to 1.5–2°C','The 1992 international framework that was the precursor to all climate treaties'], answer:'The 1997 international agreement that set binding emission reduction targets for developed countries for 2008–2012', fact:'📋 Kyoto was the first binding climate treaty. However, the US never ratified it and Canada withdrew, highlighting the difficulty of international enforcement. It was succeeded by the Paris Agreement in 2015!' },
  { level:3, visual:'⚖️', question:'What is the precautionary principle in environmental law?', options:['When an activity raises threats of harm to the environment or health, precautionary measures should be taken even without full scientific certainty','All environmental actions require 100% scientific proof before implementation','The principle that economic growth takes precedence over environmental protection'], answer:'When an activity raises threats of harm to the environment or health, precautionary measures should be taken even without full scientific certainty', fact:'⚖️ The precautionary principle underpins EU environmental law. It means the burden of proof is on developers to show their activity is safe — not on the public to prove it is harmful!' },
  { level:3, visual:'🌿', question:'What is the "polluter pays" principle?', options:['Those who cause pollution should bear the full cost of managing it and any damage caused','Developing nations should pay for global pollution costs','Pollution taxes should be used to fund environmental charities'], answer:'Those who cause pollution should bear the full cost of managing it and any damage caused', fact:'🌿 Enshrined in EU law since 1975, the polluter pays principle helps internalise environmental externalities. Without it, pollution costs are socialised while profits are privatised!' },
  { level:3, visual:'🌍', question:'What is an environmental externality?', options:['A cost or benefit of an economic activity not reflected in the market price, born by third parties or society','An unexpected side effect of an environmental policy','A cost paid by foreign countries for a domestic company\'s pollution'], answer:'A cost or benefit of an economic activity not reflected in the market price, born by third parties or society', fact:'🌍 The global cost of carbon emissions (~$40–200/tonne) is not included in the price of petrol. This market failure means fossil fuels are effectively subsidised by future generations!' },
  { level:3, visual:'🌿', question:'What is CITES?', options:['The Convention on International Trade in Endangered Species — regulating wildlife trade to prevent species extinction','The Convention on International Toxic and Environmental Substances','The Council for International Tropical Ecosystem Science'], answer:'The Convention on International Trade in Endangered Species — regulating wildlife trade to prevent species extinction', fact:'🌿 CITES (1973) regulates trade in 37,000+ species. Appendix I bans commercial trade; Appendix II allows regulated trade. It helped recover elephant populations after ivory trade bans!' },
  { level:3, visual:'📋', question:'What is the Montreal Protocol and why is it considered a success?', options:['The 1987 treaty banning ozone-depleting CFCs, which has allowed the ozone layer to begin recovering','The treaty that created the first carbon market','The 2015 agreement extending Kyoto Protocol targets to developing nations'], answer:'The 1987 treaty banning ozone-depleting CFCs, which has allowed the ozone layer to begin recovering', fact:'📋 The Montreal Protocol is the only UN treaty ratified by every country. It has phased out 99% of ozone-depleting substances. The ozone layer is expected to fully recover by 2050–2060!' },
  { level:3, visual:'🌍', question:'What is the green economy?', options:['An economy that results in improved human well-being while significantly reducing environmental risks and ecological scarcities','An economy based entirely on green (plant-based) products','A financial system where all investments fund renewable energy'], answer:'An economy that results in improved human well-being while significantly reducing environmental risks and ecological scarcities', fact:'🌍 UNEP defines the green economy as low-carbon, resource-efficient, and socially inclusive. The global green economy is estimated to be worth $4.2 trillion and growing rapidly!' },
  { level:3, visual:'⚗️', question:'What is carbon pricing?', options:['Putting a financial cost on greenhouse gas emissions to incentivise reductions','The cost of carbon capture and storage technology','The market price of carbon credits in voluntary offset markets'], answer:'Putting a financial cost on greenhouse gas emissions to incentivise reductions', fact:'⚗️ Two main approaches: carbon taxes (set price, let market decide volume) and cap-and-trade (set volume, let market decide price). Both are effective — over 70 jurisdictions now have some form of carbon pricing!' },
  { level:3, visual:'🌿', question:'What is Agenda 21?', options:['A comprehensive action plan adopted at the 1992 Rio Earth Summit to achieve sustainable development globally','A target to plant 21 billion trees by 2021','The 21-point plan for the Paris Agreement implementation'], answer:'A comprehensive action plan adopted at the 1992 Rio Earth Summit to achieve sustainable development globally', fact:'🌿 Agenda 21 covered poverty, health, biodiversity, toxic chemicals, and governance. It was non-binding but influential, creating the framework for the UN Sustainable Development Goals (SDGs) adopted in 2015!' },
  // Toxicology
  { level:3, visual:'🔬', question:'What is the LD50 in toxicology?', options:['The dose of a substance that kills 50% of a test population — a standard measure of acute toxicity','The lethal concentration in air that kills 50% of people exposed for 50 minutes','The maximum dose that a human can tolerate without any symptoms'], answer:'The dose of a substance that kills 50% of a test population — a standard measure of acute toxicity', fact:'🔬 LD50 is measured in mg per kg of body weight. Botulinum toxin has an LD50 of ~1–2 ng/kg — the most toxic natural substance known. Table salt has an LD50 of 3,000 mg/kg in rats!' },
  { level:3, visual:'⚗️', question:'What is a dose-response relationship?', options:['The relationship between the amount of a toxic substance and the magnitude of the effect on the organism','The time between exposure and onset of disease symptoms','The relationship between pollution dose and ecosystem recovery time'], answer:'The relationship between the amount of a toxic substance and the magnitude of the effect on the organism', fact:'⚗️ "The dose makes the poison" (Paracelsus, 1538). Even water is toxic in large enough doses! Dose-response curves are fundamental to risk assessment for all environmental contaminants!' },
  { level:3, visual:'🌿', question:'What are endocrine disruptors?', options:['Chemicals that interfere with the hormone (endocrine) system, causing reproductive, developmental, and neurological effects','Substances that disrupt gut bacteria populations','Chemicals that increase cortisol (stress hormone) production'], answer:'Chemicals that interfere with the hormone (endocrine) system, causing reproductive, developmental, and neurological effects', fact:'🌿 BPA in plastics, phthalates, and DDT are endocrine disruptors. They can have effects at extremely low concentrations — below what traditional toxicology considered safe. The EU is phasing out hundreds of them!' },
  { level:3, visual:'🏭', question:'What makes mercury particularly dangerous as an environmental pollutant?', options:['It biomagnifies through food chains and converts to methylmercury — a potent neurotoxin — in aquatic environments','It persists in air for centuries and spreads globally','It is radioactive and causes cancer at any level of exposure'], answer:'It biomagnifies through food chains and converts to methylmercury — a potent neurotoxin — in aquatic environments', fact:'🏭 Minamata disease in Japan (1950s–60s) killed and disabled thousands after industrial mercury contaminated fish. Methylmercury causes severe neurological damage, especially in developing foetuses!' },
  { level:3, visual:'🔬', question:'What are polychlorinated biphenyls (PCBs)?', options:['Persistent organic pollutants used as electrical insulators, now banned but still found globally in wildlife and sediments','A type of greenhouse gas emitted by industrial processes','Radioactive compounds produced in nuclear reactors'], answer:'Persistent organic pollutants used as electrical insulators, now banned but still found globally in wildlife and sediments', fact:'🔬 PCBs were banned in the 1970s–80s but their half-lives in the environment are decades. Orcas in UK waters have PCB levels 100 times above the threshold for reproductive effects — dooming the population!' },
  { level:3, visual:'🌿', question:'What is environmental risk assessment?', options:['A systematic process evaluating the probability and severity of harm to ecosystems or human health from a chemical or activity','A legal requirement for all new buildings near nature reserves','An insurance scheme for industries operating in sensitive environments'], answer:'A systematic process evaluating the probability and severity of harm to ecosystems or human health from a chemical or activity', fact:'🌿 Risk assessment combines hazard identification (is it toxic?), exposure assessment (how much are people exposed?), dose-response (how harmful is that dose?), and risk characterisation (overall risk level)!' },
  { level:3, visual:'🏭', question:'What is phytoremediation?', options:['Using plants to absorb, contain, or break down pollutants from contaminated soil or water','Growing plants in greenhouses to reduce indoor air pollution','Using plant extracts to neutralise chemical spills'], answer:'Using plants to absorb, contain, or break down pollutants from contaminated soil or water', fact:'🏭 Hyperaccumulator plants can absorb metals up to 1% of their dry weight. Alpine pennycress absorbs zinc; sunflowers absorb cesium. Phytoremediation can clean contaminated sites for a fraction of excavation costs!' },
  { level:3, visual:'🌊', question:'What is the Minamata Convention?', options:['The 2013 global treaty to reduce mercury pollution from mining, power plants, and industrial processes','The 1956 convention that first recognised the health impacts of ocean pollution','A regional treaty to clean up mercury contamination in Japanese waterways'], answer:'The 2013 global treaty to reduce mercury pollution from mining, power plants, and industrial processes', fact:'🌊 Named after the Japanese city where industrial mercury poisoning killed thousands, the Minamata Convention (2017, in force) bans new mercury mines and phases out mercury use in dozens of industrial processes!' },
  { level:3, visual:'⚗️', question:'What are persistent organic pollutants (POPs) and what international agreement controls them?', options:['Toxic chemicals resistant to environmental degradation, controlled by the Stockholm Convention (2001)','Organic waste that decomposes slowly, regulated by the Basel Convention','Greenhouse gases from industrial sources, controlled by the Kyoto Protocol'], answer:'Toxic chemicals resistant to environmental degradation, controlled by the Stockholm Convention (2001)', fact:'⚗️ The Stockholm Convention targets the "dirty dozen" — including dioxins, furans, DDT, and PCBs. POPs travel globally in air and ocean currents, meaning they are found in Arctic wildlife far from any source!' },
  { level:3, visual:'🌍', question:'What is the difference between acute and chronic toxicity?', options:['Acute toxicity involves severe effects from a single large exposure; chronic toxicity involves long-term effects from repeated small exposures','Acute toxicity only affects humans; chronic toxicity affects ecosystems','Acute toxicity is reversible; chronic toxicity is always fatal'], answer:'Acute toxicity involves severe effects from a single large exposure; chronic toxicity involves long-term effects from repeated small exposures', fact:'🌍 Chronic low-level exposure to lead causes irreversible IQ loss in children. Acute high-dose exposure can be fatal. Chronic toxicity is often more insidious because effects develop slowly and are hard to attribute!' },
  // Additional hard questions covering gaps
  { level:3, visual:'🌿', question:'What is the concept of safe minimum standards in environmental economics?', options:['Protecting natural assets unless the cost of doing so is intolerably high, even under uncertainty','Setting pollution limits based on median exposure levels','Requiring insurance bonds from industries operating near protected areas'], answer:'Protecting natural assets unless the cost of doing so is intolerably high, even under uncertainty', fact:'🌿 Safe minimum standards approach avoids irreversible outcomes (like extinction) by erring on the side of caution. The economic argument: the cost of extinction is unknowable and potentially infinite!' },
  { level:3, visual:'🌡️', question:'What is transient climate response (TCR)?', options:['The warming at the time CO₂ doubles in idealised scenarios with CO₂ rising 1% per year — a measure of near-term climate sensitivity','The average temperature over the past 30 years compared to the pre-industrial baseline','The maximum warming that can occur before reaching a tipping point'], answer:'The warming at the time CO₂ doubles in idealised scenarios with CO₂ rising 1% per year — a measure of near-term climate sensitivity', fact:'🌡️ TCR is estimated at 1.4–2.2°C and determines 21st-century warming under most emissions scenarios. Equilibrium climate sensitivity (ECS) — the eventual warming — is higher, at 2.5–4.0°C per CO₂ doubling!' },
  { level:3, visual:'🌊', question:'What is the biological pump in oceans?', options:['The process by which marine organisms convert CO₂ into organic carbon and transport it to the deep ocean through sinking particles and fecal pellets','The mechanism by which tides circulate nutrients in coastal waters','The movement of dissolved oxygen from surface to deep ocean by physical mixing'], answer:'The process by which marine organisms convert CO₂ into organic carbon and transport it to the deep ocean through sinking particles and fecal pellets', fact:'🌊 The biological pump sequesters ~10 billion tonnes of carbon per year to the deep ocean. It is a major climate regulator — weakening it through ocean warming and acidification could accelerate atmospheric CO₂ rise!' },
  { level:3, visual:'🌱', question:'What is the nitrogen use efficiency (NUE) challenge in agriculture?', options:['Only about 50% of nitrogen fertiliser applied to crops is actually taken up — the rest pollutes waterways and the atmosphere','Organic nitrogen in soil is unavailable to plants without synthetic fertiliser','Nitrogen fixation by bacteria is too slow to support modern crop yields'], answer:'Only about 50% of nitrogen fertiliser applied to crops is actually taken up — the rest pollutes waterways and the atmosphere', fact:'🌱 The 50% of fertiliser not absorbed leaches into waterways (causing dead zones) or is denitrified to N₂O (a greenhouse gas 273x more powerful than CO₂). Precision agriculture and better timing can dramatically improve NUE!' },
  { level:3, visual:'🐟', question:'What is trophic downgrading?', options:['The global loss of apex predators leading to the ecological release of their prey and cascading ecosystem disruption','The shift of consumers to lower trophic levels when preferred prey are depleted','The reduction in energy transfer efficiency between trophic levels due to pollution'], answer:'The global loss of apex predators leading to the ecological release of their prey and cascading ecosystem disruption', fact:'🐟 Scientists estimate 91% of large marine predators and many terrestrial apex predators have been lost. Trophic downgrading changes vegetation, fire regimes, disease dynamics, and climate feedbacks globally!' },
  { level:3, visual:'🌿', question:'What is the REDD+ mechanism?', options:['A UN programme that pays developing nations to reduce emissions from deforestation and forest degradation','A set of rules requiring developed nations to plant trees equal to those lost in developing countries','An international fund for clean energy transition in tropical countries'], answer:'A UN programme that pays developing nations to reduce emissions from deforestation and forest degradation', fact:'🌿 REDD+ (Reducing Emissions from Deforestation and Forest Degradation) attaches economic value to standing forests. Critics note challenges with "additionality," permanence, and indigenous peoples\' rights!' },
  { level:3, visual:'🏔️', question:'What is the concept of "peak oil"?', options:['The point at which global oil production reaches its maximum rate and then enters terminal decline','The highest price that oil has ever reached on global markets','The concentration of oil deposits at high altitudes in mountain regions'], answer:'The point at which global oil production reaches its maximum rate and then enters terminal decline', fact:'🏔️ M. King Hubbert predicted peak US oil in 1970 — which proved accurate. Global conventional oil may have peaked around 2008. However, tight oil (fracking) has extended production, complicating the picture!' },
  { level:3, visual:'🌍', question:'What is the Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services (IPBES)?', options:['The UN body that assesses the state of biodiversity and ecosystem services globally, equivalent to the IPCC for nature','The international panel that certifies sustainable fisheries and timber','The scientific committee advising on the Convention on Biological Diversity'], answer:'The UN body that assesses the state of biodiversity and ecosystem services globally, equivalent to the IPCC for nature', fact:'🌍 IPBES 2019 Global Assessment found 1 million species threatened with extinction — the highest in human history. It concluded the current rate of extinction is 10–100 times higher than the average over the past 10 million years!' },
  { level:3, visual:'🌿', question:'What is biogeochemical cycling and what makes human alteration of it environmentally significant?', options:['The movement of chemical elements through living and non-living parts of the Earth; humans have accelerated cycles beyond natural rates, disrupting ecosystems globally','The natural seasonal variation in soil chemistry driven by temperature and rainfall','The process by which bacteria convert inorganic minerals into organic molecules for plant uptake'], answer:'The movement of chemical elements through living and non-living parts of the Earth; humans have accelerated cycles beyond natural rates, disrupting ecosystems globally', fact:'🌿 Humans have doubled the natural nitrogen cycle, tripled the phosphorus cycle, and increased the carbon cycle\'s atmospheric flux by ~50%. These perturbations are driving eutrophication, biodiversity loss, and climate change simultaneously!' },
