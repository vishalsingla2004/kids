  { level:3, visual:'âœڈï¸ڈ', question:'Solve the inequality: xآ² â€“ 5x + 6 < 0', options:['2 < x < 3','x < 2 or x > 3','x > 3'], answer:'2 < x < 3', fact:'âœڈï¸ڈ Factorise: (xâ€“2)(xâ€“3)<0. Roots are x=2 and x=3. The parabola opens upward, so the curve is below zero BETWEEN the roots: 2<x<3. Sketch the parabola to see this!' },
  { level:3, visual:'ًں”¢', question:'Express log 8 in terms of log 2.', options:['3 log 2','2 log 2','8 log 2'], answer:'3 log 2', fact:'ًں”¢ 8 = 2آ³, so log 8 = log(2آ³) = 3 log 2. Log rules: log(aâپ؟) = n log a. This power rule is essential for solving exponential equations using logarithms!' },
  { level:3, visual:'ًں”¢', question:'Solve: 3ث£ = 12 (give answer to 2 d.p.)', options:['2.26','2.00','1.79'], answer:'2.26', fact:'ًں”¢ Take log of both sides: x log 3 = log 12. x = log 12 / log 3 = 1.079/0.477 â‰ˆ 2.26. This change-of-base technique solves any exponential equation!' },
  { level:3, visual:'ًں”¢', question:'Rationalise the denominator of 3/(2 + âˆڑ5).', options:['3(2â€“âˆڑ5)/â€“1','â€“3(2â€“âˆڑ5)','3(âˆڑ5â€“2)'], answer:'â€“3(2â€“âˆڑ5)', fact:'ًں”¢ Multiply by (2â€“âˆڑ5)/(2â€“âˆڑ5): numerator = 3(2â€“âˆڑ5), denominator = 4â€“5=â€“1. Result = 3(2â€“âˆڑ5)/(â€“1) = â€“3(2â€“âˆڑ5). Rationalise conjugate surds by multiplying by the conjugate!' },
  { level:3, visual:'ًں“ˆ', question:'The function f(x) = xآ³ â€“ 3x has turning points at x = آ±1. What are the y-values there?', options:['f(1)=â€“2 and f(â€“1)=2','f(1)=2 and f(â€“1)=â€“2','f(1)=1 and f(â€“1)=â€“1'], answer:'f(1)=â€“2 and f(â€“1)=2', fact:'ًں“ˆ f(1) = 1â€“3 = â€“2 (local minimum). f(â€“1) = â€“1+3 = 2 (local maximum). Cubic functions have one local max and one local min when the derivative has two real roots!' },
  { level:3, visual:'ًں“گ', question:'What is the surface area of a sphere with radius 5 cm? (د€ â‰ˆ 3.14)', options:['314 cmآ²','78.5 cmآ²','523.3 cmآ²'], answer:'314 cmآ²', fact:'ًں“گ SA = 4د€rآ² = 4 أ— 3.14 أ— 25 = 314 cmآ². Remarkably, the surface area of a sphere equals 4 times the area of its great circle. Archimedes proved this beautifully!' },
  { level:3, visual:'ًں”¢', question:'Prove algebraically that the sum of three consecutive integers is always divisible by 3.', options:['Let integers be n, n+1, n+2; sum = 3n+3 = 3(n+1)','Sum = n+n+n = 3n','Use n, 2n, 3n; sum = 6n'], answer:'Let integers be n, n+1, n+2; sum = 3n+3 = 3(n+1)', fact:'ًں”¢ n + (n+1) + (n+2) = 3n+3 = 3(n+1). Since it factors as 3 أ— integer, it is always divisible by 3. Algebraic proof works for ALL cases, unlike numerical examples!' },
  { level:3, visual:'ًں“گ', question:'Two circles have radii 4 cm and 9 cm. What is the ratio of their areas?', options:['16:81','4:9','2:3'], answer:'16:81', fact:'ًں“گ Area ratio = د€râ‚پآ² : د€râ‚‚آ² = 4آ² : 9آ² = 16 : 81. Areas scale as the square of lengths. Length ratio 4:9 â†’ area ratio 16:81. Volume would be 64:729 (cubed)!' },
  { level:3, visual:'ًں”¢', question:'What are the values of sin 30آ°, cos 60آ°, and tan 45آ°?', options:['0.5, 0.5, 1','0.5, 0.866, 1','0.866, 0.5, 1'], answer:'0.5, 0.5, 1', fact:'ًں”¢ Exact values: sin30آ°=1/2, cos60آ°=1/2, tan45آ°=1. Also: sin60آ°=cos30آ°=âˆڑ3/2â‰ˆ0.866. These exact trig values appear in every exam â€” memorise the 30-60-90 and 45-45-90 triangles!' },
  { level:3, visual:'ًں“گ', question:'A rhombus has diagonals of length 10 cm and 24 cm. What is its area?', options:['120 cmآ²','60 cmآ²','240 cmآ²'], answer:'120 cmآ²', fact:'ًں“گ Area of rhombus = (dâ‚پ أ— dâ‚‚) / 2 = (10 أ— 24) / 2 = 120 cmآ². This works because the diagonals bisect each other at right angles, splitting the rhombus into 4 equal right triangles!' },
  { level:3, visual:'ًں“گ', question:'What condition makes two triangles congruent by the RHS rule?', options:['Right angle, hypotenuse, and one other side are equal','Right angle, hypotenuse, sum are equal','Two right angles and one side'], answer:'Right angle, hypotenuse, and one other side are equal', fact:'ًں“گ RHS (Right-Hypotenuse-Side): if two right-angled triangles share the same hypotenuse and one other side, they are congruent. Only applies to right-angled triangles!' },
  { level:3, visual:'ًں“ٹ', question:'What is the equation of the normal to y = xآ² at x = 3?', options:['y = â€“1/6 x + 9.5','y = 6x â€“ 12','y = â€“6x + 27'], answer:'y = â€“1/6 x + 9.5', fact:'ًں“گ At x=3: y=9 (point). Gradient of tangent = dy/dx = 2x = 6. Normal gradient = â€“1/6. Equation: yâ€“9 = â€“1/6(xâ€“3) â†’ y = â€“x/6 + 0.5 + 9 = â€“x/6 + 9.5. The normal is perpendicular to the tangent!' },
  { level:3, visual:'ًں“ٹ', question:'In a Venn diagram with universal set خ¾, A = {2,4,6,8}, B = {6,8,10,12}. What is Aâ€²âˆ©B?', options:['{10, 12}','{2, 4}','{6, 8}'], answer:'{10, 12}', fact:'ًں“ٹ Aâ€² (complement of A) = all elements not in A. Aâ€²âˆ©B = elements in B but not in A = {10, 12}. Set notation: âˆھ=union, âˆ©=intersection, â€²=complement!' },
  { level:3, visual:'ًں“ٹ', question:'A dataset has mean 50 and standard deviation 5. What is the z-score for a value of 60?', options:['2','10','â€“2'], answer:'2', fact:'ًں“ٹ z = (xâ€“خ¼)/دƒ = (60â€“50)/5 = 2. A z-score of 2 means the value is 2 standard deviations above the mean. Z-scores standardise data to compare across different distributions!' },
  { level:3, visual:'ًں”¢', question:'The nth term of a sequence is nآ² + n. What type of sequence is this?', options:['Quadratic','Arithmetic','Geometric'], answer:'Quadratic', fact:'ًں”¢ nآ²+n produces terms: 2, 6, 12, 20, 30... The second differences are constant (=2), which is the hallmark of a quadratic sequence. The leading term nآ² confirms it!' },
  { level:3, visual:'ًں”¢', question:'Solve: 4ث£ = 8. Express x as a fraction.', options:['3/2','2/3','4/3'], answer:'3/2', fact:'ًں”¢ 4ث£ = 8 â†’ (2آ²)ث£ = 2آ³ â†’ 2^(2x) = 2آ³ â†’ 2x=3 â†’ x=3/2. Converting to the same base (base 2) lets you equate exponents directly. Always look for a common base!' },
  { level:3, visual:'ًں“گ', question:'A circle passes through three vertices of a triangle. This circle is called the...?', options:['Circumscribed circle (circumcircle)','Inscribed circle (incircle)','Unit circle'], answer:'Circumscribed circle (circumcircle)', fact:'ًں“گ The circumcircle passes through all three vertices. Its centre (circumcentre) is equidistant from all three vertices. The incircle is tangent to all three sides!' },
  { level:3, visual:'ًں”¢', question:'If z = 2 + 3i is a complex number, what is its modulus |z|?', options:['âˆڑ13','5','âˆڑ5'], answer:'âˆڑ13', fact:'ًں”¢ |z| = âˆڑ(aآ²+bآ²) = âˆڑ(4+9) = âˆڑ13. Complex numbers have a real part (a) and imaginary part (b). The modulus is the distance from the origin in the complex plane!' },
  { level:3, visual:'ًں“ٹ', question:'For y = sin(2x), what is the period?', options:['180آ°','360آ°','90آ°'], answer:'180آ°', fact:'ًں“ٹ y=sin(nx) has period 360آ°/n. For n=2: period = 180آ°. The graph completes two full cycles in 360آ°. Stretching a function horizontally halves the period when the coefficient doubles!' },
  { level:3, visual:'ًں“گ', question:'Find the area of triangle with vertices at (0,0), (4,0), and (1,3).', options:['6 cmآ²','12 cmآ²','3 cmآ²'], answer:'6 cmآ²', fact:'ًں“گ Area = آ½|xâ‚پ(yâ‚‚â€“yâ‚ƒ)+xâ‚‚(yâ‚ƒâ€“yâ‚پ)+xâ‚ƒ(yâ‚پâ€“yâ‚‚)| = آ½|0(0â€“3)+4(3â€“0)+1(0â€“0)| = آ½|12| = 6. Or: base=4, height=3, area=آ½أ—4أ—3=6. The coordinate formula works for any triangle!' },
  { level:3, visual:'ًں“ٹ', question:'In a hypothesis test, what does a p-value of 0.03 mean at the 5% significance level?', options:['Reject the null hypothesis â€” result is statistically significant','Accept the null hypothesis','The effect is 3% likely'], answer:'Reject the null hypothesis â€” result is statistically significant', fact:'ًں“ٹ If p-value < significance level (0.03 < 0.05), reject Hâ‚€. The result is unlikely to have occurred by chance alone. Hypothesis testing quantifies evidence against the null hypothesis!' },
  { level:3, visual:'ًں”¢', question:'What is the coefficient of xآ³ in the expansion of (1 + x)âپµ?', options:['10','5','15'], answer:'10', fact:'ًں”¢ Pascal\'s triangle row 5: 1, 5, 10, 10, 5, 1. The coefficient of xآ³ is the 4th entry = 10. Or use C(5,3) = 5!/(3!2!) = 10. Binomial expansion gives every coefficient!' },
  { level:3, visual:'ًں“گ', question:'A plane flies on bearing 050آ° for 200 km, then turns to bearing 140آ° for 150 km. How far is it from the start?', options:['250 km','350 km','âˆڑ61250 km'], answer:'250 km', fact:'ًں“گ The angle between the two legs = 140آ°â€“50آ° = 90آ° (the bearings are perpendicular!). Distance = âˆڑ(200آ²+150آ²) = âˆڑ(40000+22500) = âˆڑ62500 = 250 km. A 3-4-5 triple scaled by 50!' },
  { level:3, visual:'ًں“ٹ', question:'What is the formula for the nth term of a geometric sequence?', options:['ar^(nâ€“1)','a + (nâ€“1)d','nآ²'], answer:'ar^(nâ€“1)', fact:'ًں“ٹ In a geometric sequence with first term a and common ratio r: nth term = ar^(nâ€“1). For n=1: aأ—râپ° = a âœ“. Arithmetic nth term = a+(nâ€“1)d â€” note the different structures!' },
  { level:3, visual:'ًں”¢', question:'Simplify: log(100) + log(1000) using the addition log rule.', options:['log(100000) = 5','log(1100) â‰ˆ 3.04','log(3) + log(200)'], answer:'log(100000) = 5', fact:'ًں”¢ log rule: log(a)+log(b) = log(ab). log(100)+log(1000) = log(100أ—1000) = log(100000) = log(10âپµ) = 5. Logarithm rules convert multiplication into addition!' },
  { level:3, visual:'ًں“گ', question:'Using vectors, show that M is the midpoint of AB where A=(2,4) and B=(6,0). What is M?', options:['(4, 2)','(8, 4)','(2, 2)'], answer:'(4, 2)', fact:'ًں“گ Midpoint M = A + آ½(Bâ€“A) = (2,4) + آ½(4,â€“4) = (2,4)+(2,â€“2) = (4,2). Vector proof: M = آ½(A+B) = آ½(2+6, 4+0) = (4,2). Vectors elegantly express geometric relationships!' },

function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}

function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}

function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildDots() {

    const cls = q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';

  });
}
function updateDot(idx, result) {

function handleAnswer(chosen, correct, btn, fact, qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;sessionAnswers[current]=chosen;

  const arc=document.getElementById('timerArc'), ring=document.getElementById('timerRing');

  const CIRC=100.5;
  if(isCorrect){
    const msgs=[['ًںژ‰âœ¨','CORRECT!'],['ًںŒںًں’،','BRILLIANT!'],['ًںڈ†â­گ','GENIUS!'],['ًں”¥ًں’«','AMAZING!'],['ًں‘‘âœ…','PERFECT!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title correct-text';
    box.className='feedback-box correct-box'; ring.className='timer-ring correct-ring';
    ring.style.display=''; tapHint.style.display='none'; wrongDetail.style.display='none';
  } else {
    const msgs=[['ًںک¬â‌Œ','Not quite...'],['ًں¤”ًں’­','Wrong one!'],['ًںک…ًں”„','Keep going!']];
    const [em,title]=msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('feedbackEmoji').textContent=em;
    document.getElementById('feedbackTitle').textContent=title;
    document.getElementById('feedbackTitle').className='feedback-title wrong-text';
    box.className='feedback-box wrong-box'; ring.className='timer-ring wrong-ring';
    ring.style.display='none'; tapHint.style.display='';
    document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;
    document.getElementById('wdChosen').textContent=chosen;
    document.getElementById('wdCorrect').textContent=correct;
    wrongDetail.style.display='';
  }
  document.getElementById('feedbackFact').textContent=fact;
  arc.style.strokeDashoffset='0'; overlay.classList.remove('dismiss'); overlay.classList.add('show');
  if(isCorrect){
    const duration=1200; const startTime=performance.now();
    function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}
    feedbackRafId=requestAnimationFrame(tickRing);
    feedbackTimer=setTimeout(dismissFeedback,duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click',dismissFeedback,{once:true});
  }
}
function advanceQuestion(){
  const prev=current; current++;
  if(prev===4){showLevelUp('medium');return;}
  if(prev===9){showLevelUp('hard');return;}
  if(current>=15){showEndScreen();return;}
  showQuestion();
}

  if(level==='medium'){document.getElementById('levelupIcon').textContent='â­گâ­گ';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='ًں”¥ Medium â€” getting trickier!';}
  else{document.getElementById('levelupIcon').textContent='â­گâ­گâ­گ';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='ًں§  Hard â€” only the best know these!';}
  overlay.classList.add('show'); playLevelUp(); spawnConfetti(60);
}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}

  ].join('');

const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){
  for(let i=0;i<count;i++){setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=1.5+Math.random()*2; el.style.animationDuration=dur+'s'; el.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+0.6)*1000);
  },i*20);}
}
