  { level:1, visual:'ًں“گ', question:'What is a reflex angle?', options:['An angle greater than 180آ°','An angle greater than 90آ°','An angle equal to 180آ°'], answer:'An angle greater than 180آ°', fact:'ًں“گ Reflex angles are between 180آ° and 360آ°. They look like more than a straight line. Every angle has a reflex partner: angle + reflex angle = 360آ°!' },
  { level:1, visual:'ًں”¢', question:'What is 2/3 أ— 3/4?', options:['1/2','6/7','5/12'], answer:'1/2', fact:'ًں”¢ Multiply numerators: 2أ—3=6. Multiply denominators: 3أ—4=12. 6/12 = 1/2. You can also cancel first: 2/3 أ— 3/4 = 2/4 = 1/2 (the 3s cancel)!' },
  { level:1, visual:'ًں”¢', question:'What is 5/6 أ· 1/3?', options:['5/2','5/18','5/3'], answer:'5/2', fact:'ًں”¢ Keep, Change, Flip: 5/6 أ· 1/3 = 5/6 أ— 3/1 = 15/6 = 5/2. Dividing by a fraction is the same as multiplying by its reciprocal!' },
  { level:1, visual:'ًں”¢', question:'A number line goes from â€“10 to 10. What number is exactly halfway between â€“6 and 2?', options:['â€“2','â€“4','0'], answer:'â€“2', fact:'ًں”¢ Halfway = (â€“6 + 2) أ· 2 = â€“4 أ· 2 = â€“2. The midpoint formula works with negative numbers too â€” just add them and divide by 2!' },
  { level:1, visual:'ًں“ڈ', question:'Write 9 أ— 9 أ— 9 أ— 9 using index notation.', options:['9âپ´','9 أ— 4','4âپ¹'], answer:'9âپ´', fact:'ًں“ڈ Index notation: the base is 9 and the exponent (power) is 4 because 9 is multiplied 4 times. 9âپ´ = 6561. This compact notation is essential in maths!' },
  { level:1, visual:'ًں”¢', question:'What is the value of 10آ³?', options:['1000','300','100'], answer:'1000', fact:'ًں”¢ 10آ³ = 10 أ— 10 أ— 10 = 1000. Powers of 10 are the foundation of our number system: 10آ¹=10, 10آ²=100, 10آ³=1000, 10âپ¶=1,000,000!' },
  { level:1, visual:'ًں”¢', question:'What is â€“12 أ· (â€“3)?', options:['4','â€“4','36'], answer:'4', fact:'ًں”¢ Negative أ· Negative = Positive. â€“12 أ· â€“3 = 4. Same signs give a positive result â€” whether multiplying or dividing! Different signs always give negative.' },
  { level:1, visual:'ًں“گ', question:'A shape is translated 3 right and 2 down. A point at (1, 5) moves to...?', options:['(4, 3)','(â€“2, 7)','(3, 7)'], answer:'(4, 3)', fact:'ًں“گ Translation adds the movement to coordinates: (1+3, 5â€“2) = (4, 3). Translations slide shapes without rotating or reflecting them â€” the shape is congruent!' },
  { level:1, visual:'ًں”¢', question:'Which fraction is the largest: 2/3, 3/5, or 5/8?', options:['2/3','5/8','3/5'], answer:'2/3', fact:'ًں”¢ Convert to decimals: 2/3â‰ˆ0.667, 3/5=0.6, 5/8=0.625. So 2/3 is largest. When comparing fractions, converting to decimals (or finding a common denominator) is key!' },
  { level:1, visual:'ًں“ٹ', question:'A bar chart shows: Apples 12, Bananas 8, Oranges 15. How many fruits in total?', options:['35','20','40'], answer:'35', fact:'ًں“ٹ 12 + 8 + 15 = 35. Reading charts accurately is essential for data interpretation in science, geography, and everyday life!' },
  { level:1, visual:'ًں”¢', question:'What is 8 أ— 125?', options:['1000','800','960'], answer:'1000', fact:'ًں”¢ 8 أ— 125 = 8 أ— 125 = 1000. Shortcut: 8 أ— 125 = 8 أ— (1000 أ· 8) = 1000. Or: 8 أ— 100 = 800, 8 أ— 25 = 200. 800 + 200 = 1000!' },
  { level:1, visual:'ًں”¢', question:'What is 7/10 as a percentage?', options:['70%','7%','0.7%'], answer:'70%', fact:'ًں”¢ Tenths convert easily to percentages: just multiply by 10. 7/10 أ— 100 = 70%. Or simply: 7/10 = 0.7 = 70%!' },
  { level:1, visual:'ًں“ڈ', question:'What is 15% of 80?', options:['12','15','10'], answer:'12', fact:'ًں“ڈ 10% of 80 = 8. 5% of 80 = 4. 15% = 10% + 5% = 8 + 4 = 12. This mental-maths approach breaks any percentage into easy multiples of 10% and 5%!' },

  // â”€â”€ EXTRA LEVEL 2 (questions 51â€“167) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  { level:2, visual:'âœڈï¸ڈ', question:'Solve: 5x + 3 = 28. What is x?', options:['5','6','4'], answer:'5', fact:'âœڈï¸ڈ Subtract 3: 5x = 25. Divide by 5: x = 5. Two-step equations â€” always undo addition/subtraction before multiplication/division!' },
  { level:2, visual:'ًں§®', question:'Evaluate 3aآ² when a = 4.', options:['48','144','24'], answer:'48', fact:'ًں§® Substitute: 3 أ— 4آ² = 3 أ— 16 = 48. Note: 3aآ² means 3 أ— (aآ²), not (3a)آ². The exponent applies to a only â€” BODMAS applies!' },
  { level:2, visual:'âœڈï¸ڈ', question:'Solve: 2(x â€“ 3) = 10. What is x?', options:['8','5','7'], answer:'8', fact:'âœڈï¸ڈ Expand: 2x â€“ 6 = 10. Add 6: 2x = 16. Divide by 2: x = 8. Always expand brackets first before isolating the variable!' },
  { level:2, visual:'ًں”¢', question:'Write the inequality for "x is at least 5".', options:['x â‰¥ 5','x > 5','x â‰¤ 5'], answer:'x â‰¥ 5', fact:'ًں”¢ "At least 5" includes 5 itself, so use â‰¥ (greater than or equal to). "More than 5" would be x > 5 (strict inequality, excludes 5)!' },
  { level:2, visual:'ًں“ˆ', question:'A function table: input 1â†’4, 2â†’7, 3â†’10. What is the output for input 5?', options:['16','13','15'], answer:'16', fact:'ًں“ˆ The rule is أ—3 + 1: 1أ—3+1=4 âœ“, 2أ—3+1=7 âœ“. For input 5: 5أ—3+1=16. Function tables follow a rule â€” find the pattern by looking at how output changes with input!' },
  { level:2, visual:'ًں“ˆ', question:'What is the gradient of the line y = 4x â€“ 3?', options:['4','â€“3','3'], answer:'4', fact:'ًں“ˆ In y = mx + c, m is the gradient and c is the y-intercept. For y = 4x â€“ 3: gradient = 4, y-intercept = â€“3. Gradient measures steepness!' },
  { level:2, visual:'ًں“ˆ', question:'Where does the line y = 2x + 5 cross the y-axis?', options:['(0, 5)','(0, 2)','(5, 0)'], answer:'(0, 5)', fact:'ًں“ˆ The y-intercept is where x = 0. Substitute: y = 2(0) + 5 = 5. So the line crosses the y-axis at (0, 5). In y = mx + c, c is always the y-intercept!' },
  { level:2, visual:'ًں“ˆ', question:'Plot the point (â€“3, 2) on a coordinate grid. Which quadrant is it in?', options:['Second quadrant (top left)','First quadrant (top right)','Third quadrant (bottom left)'], answer:'Second quadrant (top left)', fact:'ًں“ˆ Quadrant 1: (+,+), Quadrant 2: (â€“,+), Quadrant 3: (â€“,â€“), Quadrant 4: (+,â€“). The x-coordinate is negative and y is positive â†’ second quadrant!' },
  { level:2, visual:'ًں”¢', question:'What is the ratio 3:4 expressed as a fraction of the total?', options:['3/7 and 4/7','3/4 and 1','1/3 and 1/4'], answer:'3/7 and 4/7', fact:'ًں”¢ Total parts = 3+4 = 7. The shares are 3/7 and 4/7 of the total. Fractions from ratios: each part أ· total parts. Always check the fractions sum to 1!' },
  { level:2, visual:'âڑ–ï¸ڈ', question:'A recipe for 4 servings needs 300 g flour. How much for 10 servings?', options:['750 g','600 g','900 g'], answer:'750 g', fact:'âڑ–ï¸ڈ 300 g أ· 4 = 75 g per serving. 75 أ— 10 = 750 g. This is direct proportion â€” scale up the same way you scaled down!' },
  { level:2, visual:'ًں’¯', question:'A price rises from آ£50 to آ£65. What is the percentage increase?', options:['30%','15%','25%'], answer:'30%', fact:'ًں’¯ Change = آ£15. Percentage change = (15/50) أ— 100 = 30%. Always divide by the ORIGINAL value when calculating percentage change!' },
  { level:2, visual:'ًں’¯', question:'A value of آ£200 decreases by 15%. What is the new value?', options:['آ£170','آ£185','آ£165'], answer:'آ£170', fact:'ًں’¯ 15% of 200 = 30. 200 â€“ 30 = 170. Or use multiplier: 200 أ— 0.85 = 170. Multiplier method is quicker for calculations!' },
  { level:2, visual:'ًں”¢', question:'A TV originally costs آ£400. VAT of 20% is added. What is the total price?', options:['آ£480','آ£440','آ£420'], answer:'آ£480', fact:'ًں”¢ 20% of آ£400 = آ£80. Total = آ£400 + آ£80 = آ£480. Or multiply by 1.20: 400 أ— 1.20 = آ£480. The 1.20 multiplier includes the original plus the increase!' },
  { level:2, visual:'ًں”¢', question:'What is 3/4 أ· 1/2?', options:['3/2','3/8','6/4'], answer:'3/2', fact:'ًں”¢ Keep, Change, Flip: 3/4 أ· 1/2 = 3/4 أ— 2/1 = 6/4 = 3/2. Dividing by آ½ is the same as multiplying by 2 â€” you always get a bigger answer!' },
  { level:2, visual:'ًں”¢', question:'What is 2/5 أ— 3/7?', options:['6/35','5/12','6/12'], answer:'6/35', fact:'ًں”¢ Multiply top أ— top and bottom أ— bottom: (2أ—3)/(5أ—7) = 6/35. Check if it simplifies â€” 6 and 35 share no common factors, so 6/35 is already in lowest terms!' },
  { level:2, visual:'ًں”¢', question:'Calculate: 4آ² أ— 3 â€“ 6 أ· 2', options:['45','48','42'], answer:'45', fact:'ًں”¢ BODMAS: indices first: 4آ²=16. Then أ—أ·: 16أ—3=48 and 6أ·2=3. Then آ±: 48â€“3=45. Strict order of operations prevents ambiguity in mathematics!' },
  { level:2, visual:'ًں”¢', question:'Calculate: 5 + 3 أ— (8 â€“ 2)آ²', options:['113','109','115'], answer:'113', fact:'ًں”¢ Brackets first: (8â€“2)=6. Then indices: 6آ²=36. Then أ—: 3أ—36=108. Then +: 5+108=113. BODMAS â€” Brackets, Orders, Division, Multiplication, Addition, Subtraction!' },
  { level:2, visual:'ًں”¬', question:'Multiply 2.5 أ— 10آ³ by 4 أ— 10آ².', options:['1 أ— 10âپ¶','10 أ— 10âپµ','2 أ— 10âپ¶'], answer:'1 أ— 10âپ¶', fact:'ًں”¬ Multiply coefficients: 2.5 أ— 4 = 10. Add powers: 10آ³ أ— 10آ² = 10âپµ. So 10 أ— 10âپµ = 1 أ— 10âپ¶. In standard form, the coefficient must be between 1 and 10!' },
  { level:2, visual:'ًں”¢', question:'Round 6.7845 to 3 significant figures.', options:['6.78','6.79','6.785'], answer:'6.78', fact:'ًں”¢ 3 s.f. means keep 3 non-zero significant digits: 6, 7, 8. The next digit is 4 < 5, so round down: 6.78. Significant figures show the precision of a measurement!' },
  { level:2, visual:'âڑ–ï¸ڈ', question:'If y is directly proportional to x, and y = 12 when x = 4, what is y when x = 7?', options:['21','28','16'], answer:'21', fact:'âڑ–ï¸ڈ Constant of proportionality k = y/x = 12/4 = 3. So y = 3x. When x=7: y = 3أ—7 = 21. Direct proportion: double x â†’ double y!' },
  { level:2, visual:'âڑ–ï¸ڈ', question:'If y is inversely proportional to x, and y = 6 when x = 4, find y when x = 3.', options:['8','12','6'], answer:'8', fact:'âڑ–ï¸ڈ Inverse proportion: xy = constant. 6 أ— 4 = 24. So xy = 24. When x=3: y = 24/3 = 8. Inverse proportion: double x â†’ halve y!' },
  { level:2, visual:'â­•', question:'What is the area of a circle with diameter 10 cm? (د€ â‰ˆ 3.14)', options:['78.5 cmآ²','31.4 cmآ²','314 cmآ²'], answer:'78.5 cmآ²', fact:'â­• Radius = 10أ·2 = 5 cm. Area = د€rآ² = 3.14 أ— 25 = 78.5 cmآ². Always halve the diameter to get the radius before applying the area formula!' },
  { level:2, visual:'â­•', question:'What is the arc length of a sector with radius 6 cm and angle 60آ°? (د€ â‰ˆ 3.14)', options:['6.28 cm','12.56 cm','3.14 cm'], answer:'6.28 cm', fact:'â­• Arc length = (angle/360) أ— 2د€r = (60/360) أ— 2 أ— 3.14 أ— 6 = (1/6) أ— 37.68 = 6.28 cm. A sector is a "pizza slice" of a circle!' },
  { level:2, visual:'â­•', question:'What is the area of a sector with radius 9 cm and angle 40آ°? (د€ â‰ˆ 3.14)', options:['28.26 cmآ²','14.13 cmآ²','56.52 cmآ²'], answer:'28.26 cmآ²', fact:'â­• Sector area = (angle/360) أ— د€rآ² = (40/360) أ— 3.14 أ— 81 = (1/9) أ— 254.34 = 28.26 cmآ². The fraction of the circle times the full area!' },
  { level:2, visual:'ًں“¦', question:'A cylinder has radius 3 cm and height 10 cm. What is its volume? (د€ â‰ˆ 3.14)', options:['282.6 cmآ³','94.2 cmآ³','565.2 cmآ³'], answer:'282.6 cmآ³', fact:'ًں“¦ Volume = د€rآ²h = 3.14 أ— 9 أ— 10 = 282.6 cmآ³. A cylinder is just a circular prism â€” area of circle أ— height!' },
  { level:2, visual:'ًں“گ', question:'A right-angled triangle has legs 5 cm and 12 cm. What is the hypotenuse?', options:['13 cm','7 cm','17 cm'], answer:'13 cm', fact:'ًں“گ 5آ² + 12آ² = 25 + 144 = 169 = 13آ². The 5-12-13 Pythagorean triple! Memorise 3-4-5, 5-12-13, and 8-15-17 for common right triangles!' },
  { level:2, visual:'ًں“گ', question:'A ladder 10 m long leans against a wall, its base 6 m from the wall. How high does it reach?', options:['8 m','4 m','âˆڑ136 m'], answer:'8 m', fact:'ًں“گ Height = âˆڑ(10آ² â€“ 6آ²) = âˆڑ(100 â€“ 36) = âˆڑ64 = 8 m. The wall, ground, and ladder form a 6-8-10 right triangle (a 3-4-5 triangle doubled)!' },
  { level:2, visual:'ًں“گ', question:'What do co-interior angles (on the same side of a transversal) add up to?', options:['180آ°','90آ°','360آ°'], answer:'180آ°', fact:'ًں“گ Co-interior angles (also called allied or C-angles) between parallel lines are supplementary â€” they add to 180آ°. They sit on the same side of the transversal!' },
  { level:2, visual:'ًں“گ', question:'What is the interior angle of a regular hexagon?', options:['120آ°','60آ°','135آ°'], answer:'120آ°', fact:'ًں“گ Sum of interior angles = (6â€“2)أ—180آ° = 720آ°. Each angle = 720آ°أ·6 = 120آ°. Honeycomb cells are regular hexagons because 120آ° angles tile perfectly!' },
  { level:2, visual:'ًں“گ', question:'A shape is reflected in the x-axis. The point (3, â€“2) maps to...?', options:['(3, 2)','(â€“3, â€“2)','(â€“3, 2)'], answer:'(3, 2)', fact:'ًں“گ Reflecting in the x-axis changes the sign of the y-coordinate: (x, y) â†’ (x, â€“y). (3, â€“2) â†’ (3, 2). The x-coordinate stays the same!' },
  { level:2, visual:'ًں“گ', question:'A shape is rotated 90آ° clockwise about the origin. (2, 3) maps to...?', options:['(3, â€“2)','(â€“3, 2)','(2, â€“3)'], answer:'(3, â€“2)', fact:'ًں“گ 90آ° clockwise rotation rule: (x, y) â†’ (y, â€“x). So (2, 3) â†’ (3, â€“2). Rotations preserve shape and size â€” the image is congruent to the original!' },
  { level:2, visual:'ًں“گ', question:'A shape is enlarged by scale factor 3 with centre at the origin. Point (2, 4) maps to...?', options:['(6, 12)','(5, 7)','(2/3, 4/3)'], answer:'(6, 12)', fact:'ًں“گ Enlargement with centre origin: multiply each coordinate by the scale factor. (2, 4) أ— 3 = (6, 12). Scale factor > 1 makes the shape bigger!' },
  { level:2, visual:'ًں“ٹ', question:'Find the mean from this frequency table: score 1 (freq 3), score 2 (freq 5), score 3 (freq 2).', options:['1.9','2.0','1.7'], answer:'1.9', fact:'ًں“ٹ Total = 1أ—3 + 2أ—5 + 3أ—2 = 3+10+6 = 19. Number of values = 3+5+2 = 10. Mean = 19أ·10 = 1.9. Frequency tables pack data efficiently!' },
  { level:2, visual:'ًں“ٹ', question:'In a grouped frequency table, the modal class has scores 20â€“29 with frequency 12. What does this mean?', options:['Most common scores are in the 20â€“29 range','The mean is between 20 and 29','The median is 20'], answer:'Most common scores are in the 20â€“29 range', fact:'ًں“ٹ The modal class is the class interval with the highest frequency. We can\'t find an exact mode from grouped data, just the most common class!' },
  { level:2, visual:'ًں“ٹ', question:'In a box plot, the "whiskers" extend to...?', options:['The minimum and maximum values','The quartiles','آ±2 standard deviations'], answer:'The minimum and maximum values', fact:'ًں“ٹ A box plot shows: minimum, Q1, median, Q3, maximum. The box spans the IQR (Q1 to Q3). Whiskers reach out to the extremes (ignoring outliers)!' },
  { level:2, visual:'ًںژ²', question:'P(A) = 0.5, P(B) = 0.4, and A and B are mutually exclusive. What is P(A or B)?', options:['0.9','0.2','0.1'], answer:'0.9', fact:'ًںژ² Mutually exclusive means they cannot both happen. P(A or B) = P(A) + P(B) = 0.5 + 0.4 = 0.9. If they could overlap, you\'d subtract P(A and B)!' },
  { level:2, visual:'ًںژ²', question:'A two-way table shows 60 students: 30 like maths, 20 like science, 10 like both. How many like neither?', options:['20','10','40'], answer:'20', fact:'ًںژ² Using inclusion-exclusion: like maths OR science = 30+20â€“10 = 40. Neither = 60â€“40 = 20. Venn diagrams and two-way tables both organise this type of data!' },
  { level:2, visual:'ًں”¢', question:'What is the nth term of the sequence: 1, 4, 9, 16, 25, ...?', options:['nآ²','2nâ€“1','n+3'], answer:'nآ²', fact:'ًں”¢ These are square numbers! nth term = nآ². n=1: 1آ², n=2: 4, n=3: 9 âœ“. Spotting that a sequence is quadratic (nآ²) is an important skill!' },
  { level:2, visual:'ًں”¢', question:'The 10th term of an arithmetic sequence is 34 and the common difference is 3. What is the first term?', options:['7','10','4'], answer:'7', fact:'ًں”¢ nth term = a + (nâ€“1)d. 34 = a + 9أ—3 = a + 27. So a = 34â€“27 = 7. Working backwards from a known term is a powerful technique!' },
  { level:2, visual:'âœڈï¸ڈ', question:'Solve: 4x + 1 > 13. What is the solution?', options:['x > 3','x > 4','x â‰¥ 3'], answer:'x > 3', fact:'âœڈï¸ڈ Subtract 1: 4x > 12. Divide by 4: x > 3. The inequality sign stays the same when dividing by a positive number. Only flip the sign for negative divisors!' },
  { level:2, visual:'ًں”¢', question:'A geometric sequence starts 2, 6, 18, 54, ... What is the common ratio?', options:['3','4','2'], answer:'3', fact:'ًں”¢ Common ratio = each term أ· previous term = 6أ·2 = 3. Geometric sequences multiply by a fixed ratio. With r>1 the sequence grows exponentially fast!' },
  { level:2, visual:'ًں“گ', question:'What is the area of a triangle with base 14 cm and height 9 cm?', options:['63 cmآ²','126 cmآ²','46 cmآ²'], answer:'63 cmآ²', fact:'ًں“گ Area = آ½ أ— base أ— height = آ½ أ— 14 أ— 9 = 63 cmآ². The height must be perpendicular to the base. A triangle is always half of a parallelogram!' },
  { level:2, visual:'â¬،', question:'What is the interior angle sum of an octagon?', options:['1080آ°','720آ°','900آ°'], answer:'1080آ°', fact:'â¬، Formula: (nâ€“2) أ— 180آ°. For octagon: (8â€“2)أ—180آ° = 6أ—180آ° = 1080آ°. Each interior angle of a regular octagon = 1080آ°أ·8 = 135آ°!' },
  { level:2, visual:'ًں“¦', question:'A triangular prism has cross-section area 20 cmآ² and length 12 cm. What is its volume?', options:['240 cmآ³','120 cmآ³','32 cmآ³'], answer:'240 cmآ³', fact:'ًں“¦ Volume of prism = area of cross-section أ— length = 20 أ— 12 = 240 cmآ³. Any prism\'s volume = cross-sectional area أ— length, regardless of the shape!' },
  { level:2, visual:'ًں“ٹ', question:'A scatter graph has a line of best fit y = 2x + 3. Estimate y when x = 7.', options:['17','14','21'], answer:'17', fact:'ًں“ٹ Substitute x=7: y = 2(7)+3 = 14+3 = 17. Lines of best fit let us interpolate (estimate within the data range) or extrapolate (beyond the data range)!' },
  { level:2, visual:'ًں”¢', question:'What is 2.4 أ— 10âپ»آ² as an ordinary number?', options:['0.024','240','0.0024'], answer:'0.024', fact:'ًں”¢ Negative power of 10 means move decimal left: 10âپ»آ² = 0.01. So 2.4 أ— 0.01 = 0.024. Negative powers give small numbers below 1!' },
  { level:2, visual:'ًں“ٹ', question:'Which type of average is least affected by extreme outliers?', options:['Median','Mean','Mode'], answer:'Median', fact:'ًں“ٹ The mean uses every value, so a very large outlier pulls it up dramatically. The median only uses the middle value(s), so extreme values have little effect!' },
  { level:2, visual:'ًں”¢', question:'Simplify: 3xآ² أ— 4xآ³', options:['12xâپµ','12xâپ¶','7xâپµ'], answer:'12xâپµ', fact:'ًں”¢ Multiply coefficients: 3أ—4=12. Add indices: xآ²أ—xآ³=xâپµ. Result: 12xâپµ. Index law: xلµƒ أ— xلµ‡ = xلµƒâپ؛لµ‡. Always multiply numbers and add powers!' },
  { level:2, visual:'ًں”¢', question:'Simplify: 15xâپ¶ أ· 3xآ²', options:['5xâپ´','5xآ³','12xâپ´'], answer:'5xâپ´', fact:'ًں”¢ Divide coefficients: 15أ·3=5. Subtract indices: xâپ¶أ·xآ²=xâپ´. Result: 5xâپ´. Index law: xلµƒ أ· xلµ‡ = xلµƒâپ»لµ‡. Dividing powers means subtracting the exponents!' },
  { level:2, visual:'ًں”¢', question:'What is (xآ³)آ²?', options:['xâپ¶','xâپµ','2xآ³'], answer:'xâپ¶', fact:'ًں”¢ Power of a power: (xلµƒ)لµ‡ = xلµƒلµ‡. (xآ³)آ² = x^(3أ—2) = xâپ¶. Multiply the exponents. This law combines with the other index laws!' },
  { level:2, visual:'ًں’±', question:'آ£1 = â‚¬1.20. Convert آ£85 to euros.', options:['â‚¬102','â‚¬70.83','â‚¬85.20'], answer:'â‚¬102', fact:'ًں’± Multiply by the exchange rate: آ£85 أ— 1.20 = â‚¬102. To convert back: divide by 1.20. Exchange rates change daily â€” always check current rates!' },
  { level:2, visual:'ًں“ٹ', question:'From a frequency table, how do you find the median class for 30 data values?', options:['Find the 15th and 16th values (15.5th)','Find the 15th value only','Add all frequencies and halve'], answer:'Find the 15th and 16th values (15.5th)', fact:'ًں“ٹ With n=30 data values, the median position is between the 15th and 16th values. Use cumulative frequency to find which class contains that position!' },
  { level:2, visual:'ًں”¢', question:'The equation of a line is 3y = 6x + 9. What is the gradient?', options:['2','3','6'], answer:'2', fact:'ًں”¢ Rearrange to y=mx+c form: y = 2x + 3. So gradient m = 2. Always rearrange to y=mx+c before reading off gradient and y-intercept!' },
  { level:2, visual:'ًں“گ', question:'Two similar triangles have sides in ratio 1:3. What is the ratio of their areas?', options:['1:9','1:3','1:6'], answer:'1:9', fact:'ًں“گ For similar shapes, if the length ratio is 1:3, the area ratio is 1آ²:3آ² = 1:9. Areas scale as the square of the length scale factor!' },
  { level:2, visual:'ًں”¢', question:'If p = 2q â€“ 3, make q the subject.', options:['q = (p+3)/2','q = 2p+3','q = p/2 â€“ 3'], answer:'q = (p+3)/2', fact:'ًں”¢ Add 3: p+3 = 2q. Divide by 2: q = (p+3)/2. Rearranging formulae is essentially solving an equation â€” same operations, just with letters!' },
  { level:2, visual:'ًں“ٹ', question:'A histogram has bars of width 10. A bar reaches height 4 (frequency density). What is the frequency for that class?', options:['40','14','4'], answer:'40', fact:'ًں“ٹ Frequency = frequency density أ— class width = 4 أ— 10 = 40. Frequency density is used when class widths differ â€” it makes areas represent frequency!' },
  { level:2, visual:'ًںژ²', question:'You roll two dice. What is the probability of getting a total of 7?', options:['1/6','5/36','7/36'], answer:'1/6', fact:'ًںژ² Pairs summing to 7: (1,6),(2,5),(3,4),(4,3),(5,2),(6,1) = 6 outcomes. Total outcomes = 36. P = 6/36 = 1/6. The most likely total on two dice is 7!' },
  { level:2, visual:'ًں”¢', question:'Solve: x/3 + 4 = 9. What is x?', options:['15','21','5'], answer:'15', fact:'ًں”¢ Subtract 4: x/3 = 5. Multiply by 3: x = 15. To undo division, multiply â€” the inverse of أ·3 is أ—3. Always use inverse operations!' },
  { level:2, visual:'ًں”¢', question:'Calculate the percentage error: estimated 50, actual 45.', options:['11.1%','10%','5%'], answer:'11.1%', fact:'ًں”¢ % error = |estimate â€“ actual| / actual أ— 100 = |50â€“45|/45 أ— 100 = 5/45 أ— 100 â‰ˆ 11.1%. Always divide by the ACTUAL (true) value!' },
  { level:2, visual:'ًں“گ', question:'What is the surface area of a cuboid 5 cm أ— 3 cm أ— 2 cm?', options:['62 cmآ²','30 cmآ²','31 cmآ²'], answer:'62 cmآ²', fact:'ًں“گ Pairs of faces: 2(5أ—3) + 2(5أ—2) + 2(3أ—2) = 30 + 20 + 12 = 62 cmآ². A cuboid has 3 pairs of identical faces â€” calculate each pair and add!' },
  { level:2, visual:'ًں”¢', question:'An item depreciates from آ£800 to آ£560. What is the percentage decrease?', options:['30%','24%','28%'], answer:'30%', fact:'ًں”¢ Decrease = آ£240. % decrease = (240/800)أ—100 = 30%. Percentage decrease: always divide by the ORIGINAL (larger) value, not the final one!' },
  { level:2, visual:'ًں”¢', question:'The circumference of a circle is 62.8 cm. What is the radius? (د€ â‰ˆ 3.14)', options:['10 cm','5 cm','20 cm'], answer:'10 cm', fact:'ًں”¢ C = 2د€r â†’ r = C/(2د€) = 62.8/(2أ—3.14) = 62.8/6.28 = 10 cm. Rearranging circle formulae: always make the unknown the subject first!' },

  // â”€â”€ EXTRA LEVEL 3 (questions 51â€“167) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  { level:3, visual:'âœڈï¸ڈ', question:'Expand and simplify: (x + 4)(x + 5)', options:['xآ² + 9x + 20','xآ² + 20x + 9','xآ² + 4x + 20'], answer:'xآ² + 9x + 20', fact:'âœڈï¸ڈ FOIL: xآ²+5x+4x+20 = xآ²+9x+20. The middle term is the sum of the two numbers (4+5=9); the last term is their product (4أ—5=20). Always check by substituting!' },
  { level:3, visual:'âœڈï¸ڈ', question:'Expand and simplify: (2x â€“ 3)(x + 4)', options:['2xآ² + 5x â€“ 12','2xآ² â€“ 12x + 5','2xآ² + 8x â€“ 3'], answer:'2xآ² + 5x â€“ 12', fact:'âœڈï¸ڈ FOIL: 2xآ²+8xâ€“3xâ€“12 = 2xآ²+5xâ€“12. When expanding brackets with two terms on each side, you get four products â€” combine the middle two!' },
  { level:3, visual:'ًں§®', question:'Factorise: xآ² â€“ 9', options:['(x+3)(xâ€“3)','(xâ€“3)آ²','(x+9)(xâ€“1)'], answer:'(x+3)(xâ€“3)', fact:'ًں§® This is the difference of two squares: aآ²â€“bآ² = (a+b)(aâ€“b). xآ²â€“9 = xآ²â€“3آ² = (x+3)(xâ€“3). Recognise this pattern â€” it appears everywhere in maths!' },
  { level:3, visual:'ًں§®', question:'Factorise completely: 2xآ² + 6x', options:['2x(x + 3)','x(2x + 6)','2(xآ² + 3x)'], answer:'2x(x + 3)', fact:'ًں§® Take out the highest common factor: HCF of 2xآ² and 6x is 2x. So 2xآ²+6x = 2x(x+3). "Completely" means you must take out ALL common factors!' },
  { level:3, visual:'âœڈï¸ڈ', question:'Solve: 5x + 3 = 3x + 11. What is x?', options:['4','2','8'], answer:'4', fact:'âœڈï¸ڈ Collect x terms: 5xâ€“3x = 11â€“3 â†’ 2x = 8 â†’ x = 4. When unknowns appear on both sides, move them to one side by adding or subtracting!' },
  { level:3, visual:'âœڈï¸ڈ', question:'Solve the simultaneous equations: 2x + y = 7 and x â€“ y = 2. What is y?', options:['1','3','5'], answer:'1', fact:'âœڈï¸ڈ Add: 3x = 9 â†’ x = 3. Substitute: 2(3)+y=7 â†’ y=1. Adding/subtracting simultaneous equations eliminates one variable â€” the key technique!' },
  { level:3, visual:'âœڈï¸ڈ', question:'Solve by substitution: y = 2x and x + y = 9. What is x?', options:['3','4.5','2'], answer:'3', fact:'âœڈï¸ڈ Substitute y=2x into x+y=9: x+2x=9 â†’ 3x=9 â†’ x=3. Then y=6. Substitution works when one equation already gives one variable in terms of the other!' },
  { level:3, visual:'ًں”¢', question:'Find the nth term of the quadratic sequence: 3, 8, 15, 24, 35, ...', options:['nآ² + 2n','nآ² + n + 1','2nآ² â€“ 1'], answer:'nآ² + 2n', fact:'ًں”¢ Second differences = 2, so the leading term is nآ². Subtract nآ²: 3â€“1=2, 8â€“4=4, 15â€“9=6 â†’ arithmetic sequence with nth term 2n. Total: nآ²+2n!' },
  { level:3, visual:'ًں“ٹ', question:'Solve: 2x â€“ 1 < 5 and x + 3 > 4. What is the combined solution?', options:['1 < x < 3','x > 1 and x < 3','x < 3'], answer:'1 < x < 3', fact:'ًں“ٹ First: 2x<6 â†’ x<3. Second: x>1. Combined: 1<x<3. This is a double inequality â€” both conditions must hold simultaneously!' },
  { level:3, visual:'ًں”¢', question:'Solve xآ² = 50 and give the answer in surd form.', options:['5âˆڑ2','âˆڑ50','25âˆڑ2'], answer:'5âˆڑ2', fact:'ًں”¢ x = âˆڑ50 = âˆڑ(25أ—2) = 5âˆڑ2. Simplifying surds: find the largest perfect square factor. âˆڑ50 = âˆڑ25 أ— âˆڑ2 = 5âˆڑ2 â‰ˆ 7.07. Surds give exact answers!' },
  { level:3, visual:'ًں”¢', question:'Simplify: âˆڑ72', options:['6âˆڑ2','9âˆڑ2','4âˆڑ3'], answer:'6âˆڑ2', fact:'ًں”¢ âˆڑ72 = âˆڑ(36أ—2) = âˆڑ36 أ— âˆڑ2 = 6âˆڑ2. Always find the largest perfect square factor of the number under the root sign. 36 is the largest perfect square factor of 72!' },
  { level:3, visual:'ًں”¢', question:'Expand (âˆڑ3 + 1)(âˆڑ3 â€“ 1).', options:['2','3 â€“ 1','âˆڑ3 â€“ 1'], answer:'2', fact:'ًں”¢ Difference of squares: (a+b)(aâ€“b) = aآ²â€“bآ². (âˆڑ3+1)(âˆڑ3â€“1) = (âˆڑ3)آ²â€“1آ² = 3â€“1 = 2. Multiplying conjugate surds always eliminates the surd â€” this is "rationalising"!' },
  { level:3, visual:'ًں”¢', question:'What are the upper and lower bounds of 4.7 cm (measured to 1 d.p.)?', options:['4.65 and 4.75','4.6 and 4.8','4.69 and 4.71'], answer:'4.65 and 4.75', fact:'ًں”¢ Rounded to 1 d.p., the true value lies in [4.65, 4.75). Lower bound: 4.65, upper bound: 4.75. Bounds express measurement uncertainty in exact terms!' },
  { level:3, visual:'ًں’°', question:'آ£5000 is invested at 3% compound interest per year. What is the value after 4 years? (to nearest آ£)', options:['آ£5628','آ£5600','آ£5612'], answer:'آ£5628', fact:'ًں’° Compound interest: A = P(1+r)âپ؟ = 5000 أ— 1.03âپ´ = 5000 أ— 1.12551 â‰ˆ آ£5628. Unlike simple interest, compound interest earns interest on the interest itself!' },
  { level:3, visual:'ًں’°', question:'A car\'s value of آ£12000 depreciates at 15% per year. What is it worth after 3 years?', options:['آ£7,369.50','آ£6561','آ£7225'], answer:'آ£7,369.50', fact:'ًں’° Value = 12000 أ— 0.85آ³ = 12000 أ— 0.614125 = آ£7,369.50. Each year: أ—0.85 keeps 85%. After 3 years the car has lost nearly 39% of its value!' },
  { level:3, visual:'ًں’°', question:'An item costs آ£45 in the UK. The exchange rate is آ£1 = $1.30. What is the price in dollars?', options:['$58.50','$34.62','$46.30'], answer:'$58.50', fact:'ًں’° Multiply by the exchange rate: آ£45 أ— 1.30 = $58.50. To convert from dollars back to pounds, divide by 1.30. Always be clear which direction you are converting!' },
  { level:3, visual:'ًں“ٹ', question:'What is the best buy: 400g for آ£1.60 or 650g for آ£2.47?', options:['400g for آ£1.60','650g for آ£2.47','Same value'], answer:'650g for آ£2.47', fact:'ًں“ٹ Price per gram: آ£1.60أ·400 = آ£0.0040/g vs آ£2.47أ·650 = آ£0.0038/g. The 650g pack is cheaper per gram â€” always divide price by quantity to find unit rate!' },
  { level:3, visual:'ًں“گ', question:'Two triangles are similar. The smaller has sides 3, 4, 5 cm. The larger has longest side 15 cm. What is the scale factor?', options:['3','5','4'], answer:'3', fact:'ًں“گ Scale factor = 15 أ· 5 = 3. All sides of the larger triangle are 3أ— the smaller: 9, 12, 15 cm. Similar triangles have the same angles and proportional sides!' },
  { level:3, visual:'ًں“گ', question:'Triangle ABC: AB=6, BC=8, AC=10. Triangle DEF is similar with DE=3. What is EF?', options:['4','5','6'], answer:'4', fact:'ًں“گ Scale factor = DE/AB = 3/6 = 0.5. So EF = BC أ— 0.5 = 8 أ— 0.5 = 4. All sides scale by the same factor in similar triangles!' },
  { level:3, visual:'ًں“گ', question:'In a right triangle, the angle is 30آ°, hypotenuse is 20 cm. Find the opposite side.', options:['10 cm','17.3 cm','14.1 cm'], answer:'10 cm', fact:'ًں“گ sin(30آ°) = 0.5. SOH: opposite = sin(30آ°) أ— hypotenuse = 0.5 أ— 20 = 10 cm. sin(30آ°) = 0.5 is a key exact value to memorise!' },
  { level:3, visual:'ًں“گ', question:'In a right triangle, adjacent = 12 cm, hypotenuse = 15 cm. Find the angle خ¸.', options:['36.9آ°','53.1آ°','30آ°'], answer:'36.9آ°', fact:'ًں“گ cos(خ¸) = adj/hyp = 12/15 = 0.8. خ¸ = cosâپ»آ¹(0.8) â‰ˆ 36.9آ°. Use inverse trig (cosâپ»آ¹, sinâپ»آ¹, tanâپ»آ¹) to find an angle from a ratio!' },
  { level:3, visual:'ًں“گ', question:'A vertical pole casts a shadow 7 m long. The angle of elevation of the sun is 40آ°. How tall is the pole?', options:['5.88 m','9.33 m','4.50 m'], answer:'5.88 m', fact:'ًں“گ tan(40آ°) = opposite/adjacent = height/7. Height = 7 أ— tan(40آ°) â‰ˆ 7 أ— 0.839 â‰ˆ 5.88 m. Trigonometry solves real-world measurement problems!' },
  { level:3, visual:'â­•', question:'A tangent to a circle meets the radius at the point of tangency at what angle?', options:['90آ°','45آ°','180آ°'], answer:'90آ°', fact:'â­• Circle theorem: a tangent to a circle is always perpendicular (90آ°) to the radius at the point of contact. This is the tangent-radius theorem!' },
  { level:3, visual:'â­•', question:'Two tangent lines are drawn from an external point. They are...?', options:['Equal in length','Parallel','Perpendicular to each other'], answer:'Equal in length', fact:'â­• Circle theorem: tangents from an external point to a circle are equal in length. This creates an isosceles triangle with the two radii as the equal sides!' },
  { level:3, visual:'â­•', question:'A chord subtends an angle of 70آ° at the circumference. What angle does it subtend at the centre?', options:['140آ°','35آ°','70آ°'], answer:'140آ°', fact:'â­• The angle at the centre is twice the angle at the circumference when both subtend the same arc. 70آ° أ— 2 = 140آ°. This is the central angle theorem!' },
  { level:3, visual:'â­•', question:'Angles in the same segment of a circle subtending the same chord are...?', options:['Equal','Supplementary','Complementary'], answer:'Equal', fact:'â­• Angles in the same segment (same arc, same side) are equal. This is a direct consequence of the central angle theorem â€” both equal half the central angle!' },
  { level:3, visual:'ًں“گ', question:'A ship travels 5 km north, then 12 km east. How far is it from its starting point?', options:['13 km','17 km','7 km'], answer:'13 km', fact:'ًں“گ 3D (here 2D) Pythagoras: distance = âˆڑ(5آ² + 12آ²) = âˆڑ(25+144) = âˆڑ169 = 13 km. The 5-12-13 Pythagorean triple saves calculation time!' },
  { level:3, visual:'ًں“گ', question:'A cuboid has dimensions 6, 2, 3. What is the length of its longest diagonal?', options:['7','âˆڑ49','âˆڑ13'], answer:'7', fact:'ًں“گ d = âˆڑ(6آ²+2آ²+3آ²) = âˆڑ(36+4+9) = âˆڑ49 = 7. Three-dimensional Pythagoras: square all three dimensions, add, then take the square root!' },
  { level:3, visual:'ًں“گ', question:'A bearing of 135آ° is the same as which compass direction?', options:['South-East','South-West','North-East'], answer:'South-East', fact:'ًں“گ Bearings are measured clockwise from North. 090آ°=East, 135آ°=SE, 180آ°=South, 270آ°=West. Bearings always have 3 digits and are measured from North!' },
  { level:3, visual:'ًں“گ', question:'Point A is at bearing 060آ° from B, 10 km away. What is the bearing of B from A?', options:['240آ°','120آ°','060آ°'], answer:'240آ°', fact:'ًں“گ The back bearing = original bearing + 180آ°. 060آ° + 180آ° = 240آ°. If the bearing is â‰¥ 180آ°, subtract 180آ° instead of adding. Back bearings are always 180آ° apart!' },
  { level:3, visual:'â‍،ï¸ڈ', question:'Given a = 3i + 2j and b = i â€“ 4j, what is 2a â€“ b?', options:['5i + 8j','7i + 8j','6i â€“ 2j'], answer:'5i + 8j', fact:'â‍،ï¸ڈ 2a = 6i+4j. 2aâ€“b = (6â€“1)i + (4â€“(â€“4))j = 5i+8j. Vector arithmetic: operate on i and j components separately. i and j are unit vectors along x and y axes!' },
  { level:3, visual:'â‍،ï¸ڈ', question:'What is the magnitude of vector (5, â€“12)?', options:['13','7','17'], answer:'13', fact:'â‍،ï¸ڈ |v| = âˆڑ(5آ² + (â€“12)آ²) = âˆڑ(25+144) = âˆڑ169 = 13. The magnitude is always positive. (5, â€“12, 13) is a scaled Pythagorean triple: 5-12-13!' },
  { level:3, visual:'ًں“ٹ', question:'A frequency table gives: value 0 (f=5), 1 (f=8), 2 (f=7). What is the mean?', options:['1.1','1.0','1.3'], answer:'1.1', fact:'ًں“ٹ خ£fx = 0أ—5+1أ—8+2أ—7 = 0+8+14 = 22. خ£f = 5+8+7 = 20. Mean = 22/20 = 1.1. The mean from a frequency table: sum of (value أ— frequency) أ· total frequency!' },
  { level:3, visual:'ًں“ٹ', question:'A cumulative frequency curve has n=80 values. Where do you read off the median?', options:['At cumulative frequency 40','At value 40','At frequency 80'], answer:'At cumulative frequency 40', fact:'ًں“ٹ Median position = n/2 = 80/2 = 40. Find 40 on the cumulative frequency axis and read across to the data axis. Q1 is at n/4=20, Q3 is at 3n/4=60!' },
  { level:3, visual:'ًں“ٹ', question:'A box plot has: min=10, Q1=20, median=30, Q3=45, max=60. What is the IQR?', options:['25','20','50'], answer:'25', fact:'ًں“ٹ IQR = Q3 â€“ Q1 = 45 â€“ 20 = 25. The IQR represents the spread of the middle 50% of data. Outliers are often defined as more than 1.5أ—IQR beyond Q1 or Q3!' },
  { level:3, visual:'ًں“ٹ', question:'What does a positively skewed distribution look like on a histogram?', options:['A long tail to the right','A long tail to the left','A symmetric bell shape'], answer:'A long tail to the right', fact:'ًں“ٹ Positive skew: most data is at the low end with a few very high values pulling the tail right. Negative skew is the opposite. The mean is pulled towards the tail!' },
  { level:3, visual:'ًںژ²', question:'A bag has 5 red and 3 blue balls. Two are drawn WITHOUT replacement. What is P(both blue)?', options:['3/28','9/64','6/24'], answer:'3/28', fact:'ًںژ² P(1st blue) = 3/8. P(2nd blue | 1st blue) = 2/7. P(both) = 3/8 أ— 2/7 = 6/56 = 3/28. Without replacement: reduce numerator AND denominator by 1 for the second draw!' },
  { level:3, visual:'ًںŒ³', question:'In a tree diagram, P(Rain) = 0.4. Given rain, P(late) = 0.7. Given no rain, P(late) = 0.2. Find P(late).', options:['0.40','0.44','0.28'], answer:'0.40', fact:'ًںŒ³ P(late) = P(rain)أ—P(late|rain) + P(no rain)أ—P(late|no rain) = 0.4أ—0.7 + 0.6أ—0.2 = 0.28+0.12 = 0.40. This is the law of total probability!' },
  { level:3, visual:'ًںژ²', question:'In a Venn diagram, P(A) = 0.6, P(B) = 0.5, P(AâˆھB) = 0.8. Find P(Aâˆ©B).', options:['0.3','0.1','0.5'], answer:'0.3', fact:'ًںژ² Addition rule: P(AâˆھB) = P(A)+P(B)â€“P(Aâˆ©B). So 0.8 = 0.6+0.5â€“P(Aâˆ©B). P(Aâˆ©B) = 1.1â€“0.8 = 0.3. The overlap is "double-counted" so must be subtracted!' },
  { level:3, visual:'ًں“ˆ', question:'Differentiate y = xآ³. What is dy/dx?', options:['3xآ²','xآ²','3xآ³'], answer:'3xآ²', fact:'ًں“ˆ Power rule: d/dx(xâپ؟) = nxâپ؟âپ»آ¹. Bring the power down, reduce the power by 1. dy/dx = 3xآ². At x=2, the gradient of y=xآ³ is 3(4)=12!' },
  { level:3, visual:'ًں“ˆ', question:'Find the gradient of y = 5xآ² â€“ 3x at x = 2.', options:['17','10','14'], answer:'17', fact:'ًں“ˆ dy/dx = 10x â€“ 3. At x=2: gradient = 10(2)â€“3 = 20â€“3 = 17. Differentiation gives the exact gradient at any point on a curve!' },
  { level:3, visual:'ًں“ˆ', question:'What is the minimum point of y = (x â€“ 3)آ² + 2?', options:['(3, 2)','(â€“3, 2)','(3, â€“2)'], answer:'(3, 2)', fact:'ًں“ˆ Completed square form y = (xâ€“a)آ²+b has minimum at (a, b). Here: minimum at (3, 2). The vertex form immediately reveals turning points of a parabola!' },
  { level:3, visual:'ًں”¢', question:'Use trial and improvement to find âˆڑ17 to 1 d.p. Starting: try x=4.', options:['4.1','4.2','4.0'], answer:'4.1', fact:'ًں”¢ 4آ²=16 (too low), 5آ²=25 (too high). Try 4.1: 4.1آ²=16.81 (still low). Try 4.2: 4.2آ²=17.64 (too high). So âˆڑ17 â‰ˆ 4.1 to 1 d.p.!' },
  { level:3, visual:'ًں”¢', question:'Rationalise the denominator of 1/âˆڑ5.', options:['âˆڑ5/5','âˆڑ5','5/âˆڑ5'], answer:'âˆڑ5/5', fact:'ًں”¢ Multiply top and bottom by âˆڑ5: 1/âˆڑ5 أ— âˆڑ5/âˆڑ5 = âˆڑ5/5. Rationalising removes surds from denominators â€” standard form for exact answers in maths!' },
  { level:3, visual:'ًں”¢', question:'What is the discriminant of xآ² â€“ 4x + 3?', options:['4','3','â€“4'], answer:'4', fact:'ًں”¢ Discriminant = bآ²â€“4ac = (â€“4)آ²â€“4(1)(3) = 16â€“12 = 4. Since bآ²â€“4ac>0 there are 2 real roots. =0 means 1 repeated root; <0 means no real roots!' },
  { level:3, visual:'ًں”¢', question:'Use the quadratic formula on 2xآ² + 5x â€“ 3 = 0. What are the solutions?', options:['x=0.5 and x=â€“3','x=1 and x=â€“3/2','x=3 and x=â€“0.5'], answer:'x=0.5 and x=â€“3', fact:'ًں”¢ x = (â€“5 آ± âˆڑ(25+24))/4 = (â€“5 آ± âˆڑ49)/4 = (â€“5 آ± 7)/4. So x = 2/4 = 0.5 or x = â€“12/4 = â€“3. The quadratic formula always works!' },
  { level:3, visual:'ًں“ٹ', question:'Spearman\'s rank correlation coefficient rs = â€“0.9. What does this indicate?', options:['Strong negative correlation','Weak positive correlation','No correlation'], answer:'Strong negative correlation', fact:'ًں“ٹ Spearman\'s rs ranges from â€“1 to +1. rs = â€“0.9 indicates a strong negative (monotonic) correlation. rs = +1 means perfect positive ranking agreement!' },
  { level:3, visual:'ًں“ˆ', question:'For f(x) = xآ² â€“ 4, for what values of x is f(x) > 0?', options:['x < â€“2 or x > 2','x > 2','â€“2 < x < 2'], answer:'x < â€“2 or x > 2', fact:'ًں“ˆ f(x)=0 at x=آ±2. The parabola opens upward, so f(x)>0 outside the roots: x<â€“2 or x>2. Quadratic inequalities require identifying which regions satisfy the condition!' },
  { level:3, visual:'ًں”¢', question:'Evaluate: 27^(2/3)', options:['9','3','18'], answer:'9', fact:'ًں”¢ 27^(2/3) = (âˆ›27)آ² = 3آ² = 9. Fractional exponents: the denominator is the root and the numerator is the power. Always take the root first to keep numbers small!' },
  { level:3, visual:'ًں”¢', question:'Simplify: (8xâپ¶)^(1/3)', options:['2xآ²','2xآ³','8xآ²'], answer:'2xآ²', fact:'ًں”¢ (8)^(1/3) = 2 and (xâپ¶)^(1/3) = xآ². So (8xâپ¶)^(1/3) = 2xآ². Apply the fractional power to both the coefficient and the variable separately!' },
  { level:3, visual:'ًں“ˆ', question:'The graph of y = 2x passes through (0,1) and (1,2). What type of graph is it?', options:['Exponential','Linear','Quadratic'], answer:'Exponential', fact:'ًں“ˆ y = aث£ (where a>1) is an exponential growth curve. It passes through (0,1) because aâپ°=1 for all a. Exponential graphs have a horizontal asymptote at y=0!' },
  { level:3, visual:'ًں“گ', question:'In â–³ABC, AB=7, BC=10, angle B=45آ°. Use the cosine rule to find ACآ².', options:['149 âˆ’ 70âˆڑ2 â‰ˆ 50','49','100'], answer:'149 âˆ’ 70âˆڑ2 â‰ˆ 50', fact:'ًں“گ ACآ² = ABآ²+BCآ²âˆ’2آ·ABآ·BCآ·cos(B) = 49+100âˆ’140cos(45آ°) = 149âˆ’140أ—(âˆڑ2/2) = 149âˆ’70âˆڑ2 â‰ˆ 149âˆ’98.99 â‰ˆ 50. The cosine rule generalises Pythagoras to any triangle!' },
  { level:3, visual:'ًں“گ', question:'In locus problems, what is the locus of points equidistant from two fixed points A and B?', options:['The perpendicular bisector of AB','A circle centred at A','A circle centred at B'], answer:'The perpendicular bisector of AB', fact:'ًں“گ The set of all points equidistant from A and B forms a straight line â€” the perpendicular bisector of segment AB. Loci describe paths satisfying geometric conditions!' },
  { level:3, visual:'ًں“گ', question:'Which congruence condition states: two sides and the included angle are equal?', options:['SAS','SSS','ASA'], answer:'SAS', fact:'ًں“گ SAS = Side-Angle-Side (included angle between the two sides). Other conditions: SSS (three sides), ASA (two angles + included side), RHS (right angle + hypotenuse + side)!' },
  { level:3, visual:'ًں”¢', question:'Write 0.7ج„ (0.777...) as a fraction.', options:['7/9','7/10','77/100'], answer:'7/9', fact:'ًں”¢ Let x = 0.777... Then 10x = 7.777... Subtract: 9x = 7, so x = 7/9. This algebraic technique converts any recurring decimal to a fraction!' },
  { level:3, visual:'ًں”¢', question:'Write 0.1ج„8ج„ (0.181818...) as a fraction.', options:['2/11','18/99','1/8'], answer:'2/11', fact:'ًں”¢ Let x=0.181818... Then 100x=18.1818... Subtract: 99x=18, x=18/99=2/11. For a 2-digit recurring block, multiply by 100 (not 10) before subtracting!' },
  { level:3, visual:'ًں’°', question:'The population of a town decreases by 5% each year. If it is 20,000 now, what is it in 3 years?', options:['17,147','17,000','18,500'], answer:'17,147', fact:'ًں’° P = 20000 أ— 0.95آ³ = 20000 أ— 0.857375 â‰ˆ 17,147. Exponential decay â€” like compound interest but for decreasing quantities. The multiplier (0.95) is used repeatedly!' },
  { level:3, visual:'ًں”¢', question:'A geometric sequence has first term 5 and common ratio 1/2. What is the sum to infinity?', options:['10','5','15'], answer:'10', fact:'ًں”¢ Sum to infinity Sâˆ‍ = a/(1â€“r) = 5/(1â€“0.5) = 5/0.5 = 10. This formula only works when |r|<1, meaning terms get smaller. The series converges to a finite total!' },
  { level:3, visual:'ًں”¢', question:'How many ways can the letters MATHS be arranged?', options:['120','60','24'], answer:'120', fact:'ًں”¢ 5 distinct letters: 5! = 5أ—4أ—3أ—2أ—1 = 120 arrangements. If letters repeated, we\'d divide by the factorials of the repetitions. Permutations count ordered arrangements!' },
  { level:3, visual:'ًں“ٹ', question:'In a histogram, a bar has frequency density 6 and class width 4. Another has frequency density 3 and width 8. Which has higher frequency?', options:['They are equal','First bar','Second bar'], answer:'They are equal', fact:'ًں“ٹ Frequency = frequency density أ— class width. Bar 1: 6أ—4=24. Bar 2: 3أ—8=24. Equal frequencies! This shows why area (not height) represents frequency in histograms with unequal widths!' },
  { level:3, visual:'ًں“ˆ', question:'The inverse of f(x) = 5x â€“ 2 is fâپ»آ¹(x) = ?', options:['(x+2)/5','(xâ€“2)/5','5x+2'], answer:'(x+2)/5', fact:'ًں“ˆ To find inverse: let y=5xâ€“2. Swap x and y: x=5yâ€“2. Solve for y: x+2=5y â†’ y=(x+2)/5. Check: f(fâپ»آ¹(x)) = 5أ—(x+2)/5 â€“ 2 = x+2â€“2 = x âœ“' },
  { level:3, visual:'ًں“ˆ', question:'What is the period of the function y = sin(x)?', options:['360آ°','180آ°','720آ°'], answer:'360آ°', fact:'ًں“ˆ sin(x) completes one full cycle every 360آ°. The period of y=sin(nx) is 360آ°/n. Sine and cosine are periodic functions â€” they repeat endlessly, like waves!' },
  { level:3, visual:'ًں“گ', question:'What is the angle between a tangent and a chord equal to (tangent-chord angle)?', options:['The angle in the alternate segment','Half the arc','90آ°'], answer:'The angle in the alternate segment', fact:'ًں“گ The tangent-chord angle equals the inscribed angle in the alternate segment. This is the Alternate Segment Theorem â€” one of the most elegant circle theorems!' },

  // â”€â”€ EXTRA LEVEL 1 top-up (to reach ~167) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  { level:1, visual:'ًں”¢', question:'What is 9 أ— 7?', options:['63','56','72'], answer:'63', fact:'ًں”¢ 9أ—7=63. A trick for the 9 times table: the digits of the answer always sum to 9. 6+3=9 âœ“. Also: 9أ—7 = 10أ—7 â€“ 7 = 70 â€“ 7 = 63!' },
  { level:1, visual:'ًں”¢', question:'What is 144 أ· 12?', options:['12','11','13'], answer:'12', fact:'ًں”¢ 144 أ· 12 = 12. This comes from 12آ² = 144. Knowing your multiplication tables makes division straightforward â€” they are inverse operations!' },
  { level:1, visual:'ًں”¢', question:'Which of 2, 3, 4, 5, 6, 8, 9, 10 are factors of 120?', options:['All of them','All except 9','All except 8'], answer:'All except 9', fact:'ًں”¢ 120 = 2آ³أ—3أ—5. Check divisibility by 9: digit sum of 120 = 1+2+0 = 3, not divisible by 9. All others divide 120 exactly!' },
  { level:1, visual:'ًں“گ', question:'What is the perimeter of an equilateral triangle with side 11 cm?', options:['33 cm','22 cm','44 cm'], answer:'33 cm', fact:'ًں“گ Equilateral triangle: all 3 sides equal. Perimeter = 3 أ— 11 = 33 cm. For any regular polygon: perimeter = number of sides أ— side length!' },
  { level:1, visual:'ًں”¢', question:'What is 0.1 + 0.02 + 0.003?', options:['0.123','0.6','0.105'], answer:'0.123', fact:'ًں”¢ Line up decimal points: 0.100 + 0.020 + 0.003 = 0.123. Each digit position is worth 10أ— less than the one to its left â€” the key to decimal arithmetic!' },
  { level:1, visual:'ًں’¯', question:'Increase 60 by 35%.', options:['81','96','75'], answer:'81', fact:'ًں’¯ 35% of 60 = 21. 60 + 21 = 81. Multiplier: 60 أ— 1.35 = 81. Percentage increase multiplier = 1 + (percentage/100)!' },
  { level:1, visual:'ًں”¢', question:'What is the value of 10âپ´?', options:['10,000','1,000','100,000'], answer:'10,000', fact:'ًں”¢ 10âپ´ = 10 أ— 10 أ— 10 أ— 10 = 10,000. Powers of 10 create each new place value column. 10âپ´ is the ten-thousands column!' },
  { level:1, visual:'ًں“گ', question:'A cylinder has a radius of 5 cm. What is the area of its circular base? (د€ â‰ˆ 3.14)', options:['78.5 cmآ²','31.4 cmآ²','25 cmآ²'], answer:'78.5 cmآ²', fact:'ًں“گ Area of circle = د€rآ² = 3.14 أ— 5آ² = 3.14 أ— 25 = 78.5 cmآ². The base of every cylinder and cone is a circle â€” you need this to find volume!' },
  { level:1, visual:'ًں”¢', question:'What is 7/10 + 3/100?', options:['0.73','1.0','7.3'], answer:'0.73', fact:'ًں”¢ 7/10 = 0.70 and 3/100 = 0.03. Sum = 0.73. Tenths and hundredths: each tenth is worth ten hundredths, so 0.70 + 0.03 = 0.73!' },
  { level:1, visual:'ًں§®', question:'Estimate: 497 أ— 3', options:['1500','2000','1200'], answer:'1500', fact:'ًں§® Round 497 to 500: 500 أ— 3 = 1500. The exact answer is 1491, close to our estimate. Rounding to the nearest 100 or 10 makes estimation much quicker!' },
  { level:1, visual:'ًں”¢', question:'What is 1000 â€“ 347?', options:['653','647','663'], answer:'653', fact:'ًں”¢ Counting up: 347 â†’ 353 (+6) â†’ 400 (+47) â†’ 1000 (+600). Total: 6+47+600=653. The "counting up" method avoids tricky column borrowing!' },
  { level:1, visual:'ًں“ٹ', question:'A pie chart is divided into 5 equal sections. What is the angle of each section?', options:['72آ°','90آ°','60آ°'], answer:'72آ°', fact:'ًں“ٹ 360آ° أ· 5 = 72آ°. Each equal section of a pie chart = 360آ° أ· number of sections. If sections are unequal, use (frequency أ· total) أ— 360آ°!' },
  { level:1, visual:'ًں”¢', question:'What is the next prime after 23?', options:['29','25','27'], answer:'29', fact:'ًں”¢ 24=2آ³أ—3, 25=5آ², 26=2أ—13, 27=3آ³, 28=2آ²أ—7, 29 has no factors other than 1 and 29 â€” so 29 is prime! The gap between consecutive primes can vary greatly.' },
  { level:1, visual:'ًں“گ', question:'What is the area of a square with perimeter 28 cm?', options:['49 cmآ²','196 cmآ²','28 cmآ²'], answer:'49 cmآ²', fact:'ًں“گ Side = 28 أ· 4 = 7 cm. Area = 7آ² = 49 cmآ². Perimeter and area are different measures â€” perimeter is length around the outside, area is the space inside!' },
  { level:1, visual:'ًں”¢', question:'Write forty-two million, five hundred thousand in digits.', options:['42,500,000','4,250,000','425,000,000'], answer:'42,500,000', fact:'ًں”¢ 42,500,000: 4 in the ten-millions place, 2 in millions, 5 in hundred-thousands. Commas are placed every three digits from the right to help reading!' },

  // â”€â”€ EXTRA LEVEL 2 top-up (to reach ~167) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  { level:2, visual:'âœڈï¸ڈ', question:'Solve: 3(2x â€“ 1) = 4x + 7. What is x?', options:['5','4','3'], answer:'5', fact:'âœڈï¸ڈ Expand: 6xâ€“3=4x+7. Collect: 2x=10. So x=5. Check: 3(10â€“1)=27 and 4(5)+7=27 âœ“. Always substitute your answer back to verify!' },
  { level:2, visual:'ًں”¢', question:'List the first four terms of the sequence with nth term 2nآ² â€“ 1.', options:['1, 7, 17, 31','1, 5, 11, 19','3, 7, 13, 21'], answer:'1, 7, 17, 31', fact:'ًں”¢ n=1: 2(1)â€“1=1. n=2: 2(4)â€“1=7. n=3: 2(9)â€“1=17. n=4: 2(16)â€“1=31. Quadratic sequences have a second difference that is constant!' },
  { level:2, visual:'ًں“ˆ', question:'A line passes through (0, 3) and (4, 11). What is its equation?', options:['y = 2x + 3','y = 3x + 2','y = 2x + 4'], answer:'y = 2x + 3', fact:'ًں“ˆ Gradient = (11â€“3)/(4â€“0) = 8/4 = 2. y-intercept = 3 (given). Equation: y = 2x + 3. When x=0 is given, reading the y-intercept directly saves a step!' },
  { level:2, visual:'ًں“ˆ', question:'Do the lines y = 3x + 1 and y = 3x â€“ 4 intersect?', options:['No â€” they are parallel','Yes â€” at (0, 1)','Yes â€” at (5, 16)'], answer:'No â€” they are parallel', fact:'ًں“ˆ Parallel lines have the same gradient. Both have gradient 3, so they never intersect. They are the same distance apart (the y-intercepts differ by 5) everywhere!' },
  { level:2, visual:'âڑ–ï¸ڈ', question:'Divide آ£180 in the ratio 1:2:3.', options:['آ£30, آ£60, آ£90','آ£60, آ£60, آ£60','آ£30, آ£50, آ£100'], answer:'آ£30, آ£60, آ£90', fact:'âڑ–ï¸ڈ Total parts = 1+2+3 = 6. Each part = آ£180أ·6 = آ£30. Shares: 1أ—آ£30=آ£30, 2أ—آ£30=آ£60, 3أ—آ£30=آ£90. Check: آ£30+آ£60+آ£90 = آ£180 âœ“' },
  { level:2, visual:'ًں’¯', question:'A population of 4000 increases by 10% then decreases by 10%. What is the final population?', options:['3960','4000','4400'], answer:'3960', fact:'ًں’¯ After 10% increase: 4000أ—1.1=4400. After 10% decrease: 4400أ—0.9=3960. The result is NOT 4000 â€” percentage changes compound! 4000أ—1.1أ—0.9=3960.' },
  { level:2, visual:'ًں”¢', question:'What is 3âپ»آ² (3 to the power â€“2)?', options:['1/9','â€“9','â€“6'], answer:'1/9', fact:'ًں”¢ Negative powers: xâپ»âپ؟ = 1/xâپ؟. So 3âپ»آ² = 1/3آ² = 1/9. Negative exponents give fractions less than 1. Pattern: 3آ²=9, 3آ¹=3, 3âپ°=1, 3âپ»آ¹=1/3, 3âپ»آ²=1/9!' },
  { level:2, visual:'ًں”¢', question:'What is 64^(1/2)?', options:['8','32','16'], answer:'8', fact:'ًں”¢ 64^(1/2) = âˆڑ64 = 8. A power of 1/2 means square root. Power of 1/3 means cube root. x^(1/n) = âپ؟âˆڑx. Check: 8آ² = 64 âœ“' },
  { level:2, visual:'ًں“گ', question:'What is the total surface area of a cylinder with radius 4 cm and height 6 cm? (د€ â‰ˆ 3.14)', options:['251.2 cmآ²','150.72 cmآ²','100.48 cmآ²'], answer:'251.2 cmآ²', fact:'ًں“گ Surface area = 2د€rآ² + 2د€rh = 2(3.14)(16) + 2(3.14)(4)(6) = 100.48 + 150.72 = 251.2 cmآ². A cylinder has 2 circular ends and 1 rectangle wrapped around!' },
  { level:2, visual:'ًں“گ', question:'A sector has radius 10 cm and angle 90آ°. What is its area? (د€ â‰ˆ 3.14)', options:['78.5 cmآ²','31.4 cmآ²','157 cmآ²'], answer:'78.5 cmآ²', fact:'ًں“گ Sector area = (90/360) أ— د€rآ² = (1/4) أ— 3.14 أ— 100 = 78.5 cmآ². A 90آ° sector is a quarter circle! The fraction of 360آ° tells you what fraction of the full circle it is.' },
  { level:2, visual:'ًں”¢', question:'Express 2/7 as a recurring decimal (to 3 decimal places).', options:['0.286','0.285','0.250'], answer:'0.286', fact:'ًں”¢ 2أ·7 = 0.285714285714... (repeating). To 3 d.p.: 0.286 (4th digit is 7â‰¥5, round up). Sevenths always produce 6-digit recurring blocks!' },
  { level:2, visual:'ًں“گ', question:'Two similar shapes have areas 16 cmآ² and 36 cmآ². What is the ratio of their corresponding sides?', options:['2:3','4:6','4:9'], answer:'2:3', fact:'ًں“گ Area ratio = 16:36 = 4:9. Length ratio = âˆڑ4:âˆڑ9 = 2:3. For similar shapes: area scales as length squared. To go from area ratio to length ratio, take square roots!' },
  { level:2, visual:'ًں”¢', question:'Solve: |x â€“ 3| = 5. What are the solutions?', options:['x=8 or x=â€“2','x=8 or x=2','x=8'], answer:'x=8 or x=â€“2', fact:'ًں”¢ |xâ€“3|=5 means xâ€“3=5 or xâ€“3=â€“5. So x=8 or x=â€“2. Absolute value equations always give two solutions (unless the result is 0)!' },
  { level:2, visual:'ًں“ٹ', question:'From 10 items, a sample of 3 is chosen randomly. How many ways can this be done?', options:['120','30','720'], answer:'120', fact:'ًں“ٹ C(10,3) = 10!/(3!أ—7!) = (10أ—9أ—8)/(3أ—2أ—1) = 720/6 = 120. Combinations count selections where order doesn\'t matter â€” useful in statistics and probability!' },
  { level:2, visual:'ًں”¢', question:'What is the value of 5آ² أ— 5آ³?', options:['5âپµ','25âپµ','5âپ¶'], answer:'5âپµ', fact:'ًں”¢ When multiplying powers with the same base, add the exponents: 5آ² أ— 5آ³ = 5^(2+3) = 5âپµ = 3125. Index laws only apply when the bases are identical!' },
  { level:2, visual:'ًں“ˆ', question:'For the graph y = xآ² â€“ 4, where does it cross the x-axis?', options:['x = 2 and x = â€“2','x = 4 and x = 0','x = 2 only'], answer:'x = 2 and x = â€“2', fact:'ًں“ˆ Set y=0: xآ²â€“4=0 â†’ xآ²=4 â†’ x=آ±2. The x-intercepts (roots) are at آ±2. The graph is a upward parabola with vertex at (0, â€“4)!' },
  { level:2, visual:'ًں“گ', question:'What is the name for a transformation that changes the size of a shape but not its shape?', options:['Enlargement','Rotation','Shear'], answer:'Enlargement', fact:'ًں“گ Enlargement changes size using a scale factor and centre of enlargement. The resulting shape is similar (same angles, proportional sides) to the original!' },
  { level:2, visual:'ًں”¢', question:'Expand: (x + 3)آ²', options:['xآ² + 6x + 9','xآ² + 9','xآ² + 3x + 9'], answer:'xآ² + 6x + 9', fact:'ًں”¢ (x+3)آ² = (x+3)(x+3) = xآ²+3x+3x+9 = xآ²+6x+9. Special identity: (a+b)آ² = aآ²+2ab+bآ². Note: (x+3)آ² â‰  xآ²+9 â€” a very common mistake!' },
  { level:2, visual:'ًں”¢', question:'Simplify: (2aآ³)آ²', options:['4aâپ¶','2aâپ¶','4aâپµ'], answer:'4aâپ¶', fact:'ًں”¢ Apply the power to everything inside: 2آ²=4 and (aآ³)آ²=aâپ¶. Result: 4aâپ¶. The power outside the bracket applies to BOTH the coefficient and the variable!' },
  { level:2, visual:'ًں“ٹ', question:'A two-way table: 40 pupils total, 18 boys. 12 girls study French. 8 boys study French. How many pupils study French?', options:['20','26','12'], answer:'20', fact:'ًں“ٹ French students = boys in French + girls in French = 8 + 12 = 20. Two-way tables organise data by two categories â€” read row and column headings carefully!' },
  { level:2, visual:'ًں“ٹ', question:'A set of 7 data values has median 15. A new value of 20 is added. What can be said about the new median?', options:['It is â‰¥ 15','It is exactly 15','It is 20'], answer:'It is â‰¥ 15', fact:'ًں“ٹ Adding a value above the old median can keep or raise the median. With 8 values, median = mean of 4th and 5th when sorted. It cannot drop below 15 if 20 is added!' },
  { level:2, visual:'ًںژ²', question:'A die is rolled 120 times. How many times would you expect to roll a 5?', options:['20','30','15'], answer:'20', fact:'ًںژ² P(5) = 1/6. Expected frequency = 1/6 أ— 120 = 20. Expected frequency = probability أ— number of trials. This doesn\'t mean you\'ll get exactly 20 â€” it\'s the long-run average!' },
  { level:2, visual:'ًں”¢', question:'Rearrange A = آ½bh to make b the subject.', options:['b = 2A/h','b = A/2h','b = Ah/2'], answer:'b = 2A/h', fact:'ًں”¢ Multiply both sides by 2: 2A = bh. Divide by h: b = 2A/h. Rearranging area formulae is common in geometry â€” always reverse the operations in reverse order!' },
  { level:2, visual:'ًں”¢', question:'What is the sum of the first 10 positive integers?', options:['55','45','50'], answer:'55', fact:'ًں”¢ 1+2+3+...+10 = n(n+1)/2 = 10أ—11/2 = 55. Gauss discovered this formula as a child. The triangular number formula S = n(n+1)/2 works for any number of terms!' },
  { level:2, visual:'ًں“گ', question:'A right prism has cross-section area 35 cmآ² and length 8 cm. What is its volume?', options:['280 cmآ³','43 cmآ³','140 cmآ³'], answer:'280 cmآ³', fact:'ًں“گ Volume = cross-section area أ— length = 35 أ— 8 = 280 cmآ³. This formula works for ANY prism â€” triangular, hexagonal, L-shaped â€” as long as the cross-section is uniform!' },
  { level:2, visual:'ًں“ٹ', question:'In a stem-and-leaf diagram back-to-back, what is shown on both sides?', options:['Two sets of data sharing the same stem','One set of data in reverse','Cumulative frequencies'], answer:'Two sets of data sharing the same stem', fact:'ًں“ٹ Back-to-back stem-and-leaf diagrams compare two datasets â€” one goes left of the stem, the other goes right. Ideal for comparing distributions of two groups!' },
  { level:2, visual:'ًں”¢', question:'What is the gradient of a line perpendicular to y = 3x + 1?', options:['â€“1/3','3','1/3'], answer:'â€“1/3', fact:'ًں”¢ Perpendicular gradients multiply to â€“1. If m = 3, the perpendicular gradient = â€“1/3. Rule: perpendicular gradient = â€“1/m (the negative reciprocal). Always flip and negate!' },
  { level:2, visual:'ًں”¢', question:'What is the midpoint of the line segment joining (2, 6) and (8, 4)?', options:['(5, 5)','(6, 2)','(3, 5)'], answer:'(5, 5)', fact:'ًں”¢ Midpoint = ((xâ‚پ+xâ‚‚)/2, (yâ‚پ+yâ‚‚)/2) = ((2+8)/2, (6+4)/2) = (5, 5). The midpoint formula finds the exact centre of any line segment!' },
  { level:2, visual:'ًں”¢', question:'What is the length of the line segment joining (1, 2) and (4, 6)?', options:['5','3','7'], answer:'5', fact:'ًں”¢ Length = âˆڑ((4â€“1)آ²+(6â€“2)آ²) = âˆڑ(9+16) = âˆڑ25 = 5. This is the distance formula â€” Pythagoras applied to coordinate geometry! The horizontal and vertical differences form the legs.' },
  { level:2, visual:'ًں’±', question:'An income tax rate is 20% on earnings above آ£12,500. If someone earns آ£20,000, how much tax do they pay?', options:['آ£1,500','آ£4,000','آ£2,500'], answer:'آ£1,500', fact:'ًں’± Taxable income = آ£20,000 â€“ آ£12,500 = آ£7,500. Tax = 20% أ— آ£7,500 = آ£1,500. The threshold means you only pay tax on income ABOVE the allowance!' },
  { level:2, visual:'ًں“گ', question:'Which transformation maps (x, y) to (â€“x, y)?', options:['Reflection in the y-axis','Reflection in the x-axis','Rotation 90آ° clockwise'], answer:'Reflection in the y-axis', fact:'ًں“گ Reflecting in the y-axis negates the x-coordinate: (x,y)â†’(â€“x,y). Reflecting in x-axis: (x,y)â†’(x,â€“y). Rotating 180آ° about origin: (x,y)â†’(â€“x,â€“y)!' },
  { level:2, visual:'ًں”¢', question:'If 4 workers complete a job in 6 days, how many days do 8 workers take (same pace)?', options:['3 days','12 days','8 days'], answer:'3 days', fact:'ًں”¢ Inverse proportion: workers أ— days = constant. 4أ—6=24. So 8 workers: 24أ·8=3 days. More workers â†’ fewer days. This is a classic inverse proportion problem!' },
  { level:2, visual:'ًں“ٹ', question:'A correlation coefficient of r = 0.05 indicates...?', options:['Negligible correlation','Weak positive correlation','Strong positive correlation'], answer:'Negligible correlation', fact:'ًں“ٹ r ranges from â€“1 to +1. |r|>0.8 = strong, 0.5â€“0.8 = moderate, 0.2â€“0.5 = weak, <0.2 = negligible. r=0.05 is essentially no linear relationship!' },
  { level:2, visual:'ًں”¢', question:'Simplify: (aآ²bآ³)/(ab)', options:['abآ²','aآ²bآ²','abآ³'], answer:'abآ²', fact:'ًں”¢ aآ²/a = aآ¹ = a. bآ³/b = bآ². Result: abآ². Simplify algebraic fractions by cancelling common factors â€” same as simplifying numerical fractions!' },
  { level:2, visual:'ًں“ˆ', question:'Where do y = x + 2 and y = 2x â€“ 1 intersect?', options:['(3, 5)','(1, 3)','(2, 4)'], answer:'(3, 5)', fact:'ًں“ˆ Set equal: x+2=2xâ€“1 â†’ 3=x. Then y=3+2=5. Intersection point: (3,5). Simultaneous equations find where two lines cross â€” vital in algebra and real-world modelling!' },
  { level:2, visual:'ًں”¢', question:'What is 5% of 360آ°?', options:['18آ°','36آ°','5آ°'], answer:'18آ°', fact:'ًں”¢ 5% of 360 = 0.05 أ— 360 = 18. In a pie chart, 5% of data corresponds to an 18آ° sector. Useful when constructing or reading pie charts accurately!' },
  { level:2, visual:'ًں“گ', question:'A cone has radius 6 cm and height 8 cm. What is its volume? (د€ â‰ˆ 3.14)', options:['301.44 cmآ³','150.72 cmآ³','904.32 cmآ³'], answer:'301.44 cmآ³', fact:'ًں“گ Volume of cone = (1/3)د€rآ²h = (1/3) أ— 3.14 أ— 36 أ— 8 = (1/3) أ— 904.32 = 301.44 cmآ³. A cone holds exactly 1/3 the volume of a cylinder with the same base and height!' },
  { level:2, visual:'ًں“گ', question:'What is the volume of a sphere with radius 3 cm? (د€ â‰ˆ 3.14)', options:['113.04 cmآ³','37.68 cmآ³','56.52 cmآ³'], answer:'113.04 cmآ³', fact:'ًں“گ Volume = (4/3)د€rآ³ = (4/3) أ— 3.14 أ— 27 = (4/3) أ— 84.78 = 113.04 cmآ³. The sphere formula is often written as V = 4د€rآ³/3. Archimedes discovered this and was overjoyed!' },
  { level:2, visual:'ًں”¢', question:'What is the value of 4! (4 factorial)?', options:['24','12','48'], answer:'24', fact:'ًں”¢ 4! = 4 أ— 3 أ— 2 أ— 1 = 24. Factorials count arrangements. 4 different books can be placed on a shelf in 24 different orders. 0! = 1 by convention!' },
  { level:2, visual:'ًں“ٹ', question:'What percentage of 150 is 45?', options:['30%','25%','45%'], answer:'30%', fact:'ًں“ٹ (45/150) أ— 100 = 30%. To find what percentage A is of B: divide A by B, then multiply by 100. This skill appears in data interpretation, finance, and science!' },
  { level:2, visual:'ًں”¢', question:'A sequence has first term 100 and common ratio 0.5. What is the 5th term?', options:['6.25','12.5','3.125'], answer:'6.25', fact:'ًں”¢ nth term = 100 أ— 0.5^(nâ€“1). 5th term = 100 أ— 0.5âپ´ = 100 أ— 0.0625 = 6.25. Geometric sequences with 0<r<1 decrease towards zero â€” each term is half the previous!' },
  { level:2, visual:'ًں”¢', question:'Solve: xآ² = 49. What are the solutions?', options:['x = 7 or x = â€“7','x = 7 only','x = 49'], answer:'x = 7 or x = â€“7', fact:'ًں”¢ Taking the square root of both sides: x = آ±âˆڑ49 = آ±7. Always remember the آ± when solving xآ²=k â€” there are TWO square roots for every positive number!' },
  { level:2, visual:'ًں“گ', question:'A rectangle has area 60 cmآ² and length 12 cm. What is its width?', options:['5 cm','6 cm','8 cm'], answer:'5 cm', fact:'ًں“گ Width = area أ· length = 60 أ· 12 = 5 cm. Area formulas work in both directions â€” if you know the area and one dimension, divide to find the other!' },
  { level:2, visual:'ًں“ٹ', question:'The probability that it rains on any day is 0.3. What is the probability that it rains on exactly 2 out of 3 independent days?', options:['0.189','0.063','0.216'], answer:'0.189', fact:'ًں“ٹ P(rain on exactly 2 days) = C(3,2)أ—0.3آ²أ—0.7 = 3أ—0.09أ—0.7 = 0.189. This is the binomial formula: C(n,r)أ—pت³أ—(1â€“p)^(nâ€“r)!' },
  { level:2, visual:'ًں”¢', question:'Simplify: âˆڑ(xâپ´)', options:['xآ²','xâپ´','2xآ²'], answer:'xآ²', fact:'ًں”¢ âˆڑ(xâپ´) = x^(4/2) = xآ². The square root of xâپ´ is xآ² (assuming xâ‰¥0). Fractional indices: x^(1/2) = âˆڑx, so âˆڑ(xâپ´) = (xâپ´)^(1/2) = x^(4أ—1/2) = xآ²!' },

  // â”€â”€ EXTRA LEVEL 3 top-up (to reach ~167) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  { level:3, visual:'âœڈï¸ڈ', question:'Solve: xآ²â€“ 2x â€“ 15 = 0 by factorising.', options:['x = 5 or x = â€“3','x = â€“5 or x = 3','x = 5 or x = 3'], answer:'x = 5 or x = â€“3', fact:'âœڈï¸ڈ Find factors of â€“15 summing to â€“2: â€“5 and +3 don\'t work; +5 and â€“3 do: 5أ—(â€“3)=â€“15 and 5+(â€“3)=2. So (xâ€“5)(x+3)=0, giving x=5 or x=â€“3!' },
  { level:3, visual:'ًں§®', question:'Factorise: 6xآ² + 7x â€“ 3', options:['(3x â€“ 1)(2x + 3)','(6x â€“ 1)(x + 3)','(3x + 1)(2x â€“ 3)'], answer:'(3x â€“ 1)(2x + 3)', fact:'ًں§® Product of outer coefficients: 6أ—(â€“3)=â€“18. Find factors of â€“18 summing to 7: â€“2 and +9. Split middle: 6xآ²â€“2x+9xâ€“3 = 2x(3xâ€“1)+3(3xâ€“1) = (2x+3)(3xâ€“1)!' },
  { level:3, visual:'âœڈï¸ڈ', question:'Solve by completing the square: xآ² + 4x â€“ 5 = 0.', options:['x = 1 or x = â€“5','x = â€“1 or x = 5','x = 2 or x = â€“5'], answer:'x = 1 or x = â€“5', fact:'âœڈï¸ڈ (x+2)آ²â€“4â€“5=0 â†’ (x+2)آ²=9 â†’ x+2=آ±3. So x=1 or x=â€“5. Completing the square also finds the vertex and is used in deriving the quadratic formula!' },
  { level:3, visual:'ًں”¢', question:'For what value of k does kxآ² + 3x + 1 = 0 have exactly one real root?', options:['9/4','3/2','9'], answer:'9/4', fact:'ًں”¢ For one root, discriminant = 0: bآ²â€“4ac=0 â†’ 9â€“4k=0 â†’ k=9/4. When the discriminant is exactly zero, the parabola just touches the x-axis at one point (tangent)!' },
  { level:3, visual:'ًں“ˆ', question:'The graph of y = 1/x is called what type of curve?', options:['Rectangular hyperbola','Parabola','Exponential'], answer:'Rectangular hyperbola', fact:'ًں“ˆ y=1/x (or xy=1) is a rectangular hyperbola â€” two branches, one in the first quadrant and one in the third. It has asymptotes along both axes!' },
  { level:3, visual:'ًں“ˆ', question:'What is the y-intercept of y = 3 أ— 2ث£?', options:['3','6','1'], answer:'3', fact:'ًں“ˆ When x=0: y = 3 أ— 2âپ° = 3 أ— 1 = 3. The y-intercept of y=aث£ is always 1, but y=kأ—aث£ shifts it to k. The base a controls the rate of growth!' },
  { level:3, visual:'ًں“ˆ', question:'A curve has equation y = xآ³ â€“ 6x. At what values of x are there stationary points?', options:['x = âˆڑ2 and x = â€“âˆڑ2','x = 6 and x = â€“6','x = 2 and x = â€“2'], answer:'x = âˆڑ2 and x = â€“âˆڑ2', fact:'ًں“ˆ dy/dx = 3xآ²â€“6 = 0 â†’ xآ² = 2 â†’ x = آ±âˆڑ2. Stationary points occur where the gradient is zero. Check dآ²y/dxآ² to distinguish maxima from minima!' },
  { level:3, visual:'ًں”¢', question:'Calculate 8^(2/3).', options:['4','16','2'], answer:'4', fact:'ًں”¢ 8^(2/3) = (8^(1/3))آ² = 2آ² = 4. Always take the root first (denominator) then apply the power (numerator) â€” this keeps numbers manageable. âˆ›8=2, then 2آ²=4!' },
  { level:3, visual:'ًں”¢', question:'Simplify: (âˆڑ5 + âˆڑ3)(âˆڑ5 â€“ âˆڑ3)', options:['2','8','âˆڑ15'], answer:'2', fact:'ًں”¢ Difference of squares: (âˆڑ5)آ²â€“(âˆڑ3)آ² = 5â€“3 = 2. Conjugate pairs eliminate surds completely â€” this technique is used to rationalise denominators with surd expressions!' },
  { level:3, visual:'ًں“گ', question:'In triangle ABC, a=8, b=6, c=7. Using the cosine rule, find angle C.', options:['57.9آ°','75.5آ°','44.4آ°'], answer:'57.9آ°', fact:'ًں“گ cos(C) = (aآ²+bآ²âˆ’cآ²)/(2ab) = (64+36âˆ’49)/(2أ—8أ—6) = 51/96 â‰ˆ 0.5313. C = cosâپ»آ¹(0.5313) â‰ˆ 57.9آ°. Note: 75.5آ° is angle A (opposite a=8), not angle C!' },
  { level:3, visual:'ًں“گ', question:'In a right triangle with angle 45آ°, the two legs are equal. If the hypotenuse is 10 cm, how long is each leg?', options:['5âˆڑ2 cm','5 cm','10/âˆڑ2 cm'], answer:'5âˆڑ2 cm', fact:'ًں“گ sin(45آ°) = 1/âˆڑ2. Leg = 10 أ— sin(45آ°) = 10/âˆڑ2 = 5âˆڑ2 â‰ˆ 7.07 cm. The 45-45-90 triangle has sides in ratio 1:1:âˆڑ2. Rationalise: 10/âˆڑ2 = 10âˆڑ2/2 = 5âˆڑ2!' },
  { level:3, visual:'ًں“گ', question:'What is the angle of elevation of a 30 m building from a point 40 m from its base?', options:['36.9آ°','53.1آ°','30آ°'], answer:'36.9آ°', fact:'ًں“گ tan(خ¸) = opposite/adjacent = 30/40 = 0.75. خ¸ = tanâپ»آ¹(0.75) â‰ˆ 36.9آ°. Elevation and depression angles are always measured from the horizontal!' },
  { level:3, visual:'ًں“گ', question:'Two similar solids have volumes 27 cmآ³ and 125 cmآ³. What is the ratio of their surface areas?', options:['9:25','3:5','27:125'], answer:'9:25', fact:'ًں“گ Volume ratio = 27:125 = 3آ³:5آ³, so length ratio = 3:5. Area ratio = 3آ²:5آ² = 9:25. For similar 3D shapes: lengths scale as k, areas as kآ², volumes as kآ³!' },
  { level:3, visual:'ًں”¢', question:'Simplify: (xآ² â€“ 4)/(x â€“ 2)', options:['x + 2','x â€“ 2','xآ² + 2'], answer:'x + 2', fact:'ًں”¢ Factor the numerator: xآ²â€“4 = (x+2)(xâ€“2). Cancel (xâ€“2): result = x+2 (valid when xâ‰ 2). Algebraic fractions simplify by factorising top and bottom first!' },
  { level:3, visual:'ًں”¢', question:'Solve: 2/(x+1) = 3/(x+2). What is x?', options:['1','â€“1','4'], answer:'1', fact:'ًں”¢ Cross multiply: 2(x+2)=3(x+1) â†’ 2x+4=3x+3 â†’ x=1. Check: 2/2 = 1 and 3/3 = 1 âœ“. Solving fractional equations: cross-multiply to clear the fractions!' },
  { level:3, visual:'ًں“ٹ', question:'A class of 30 takes a test. Mean = 65, standard deviation = 10. About what % of students scored between 55 and 75?', options:['68%','95%','50%'], answer:'68%', fact:'ًں“ٹ The 68-95-99.7 rule for normal distributions: ~68% of data lies within 1 standard deviation of the mean (55 to 75 here). 95% within 2 SD, 99.7% within 3 SD!' },
  { level:3, visual:'ًں“ٹ', question:'A biased coin has P(heads) = 0.6. In 5 flips, what is P(exactly 3 heads)?', options:['0.3456','0.2160','0.1296'], answer:'0.3456', fact:'ًں“ٹ Binomial: C(5,3)أ—0.6آ³أ—0.4آ² = 10أ—0.216أ—0.16 = 10أ—0.03456 = 0.3456. C(5,3)=10, 0.6آ³=0.216, 0.4آ²=0.16. The binomial distribution models repeated independent trials!' },
  { level:3, visual:'ًںŒ³', question:'P(A) = 0.3, P(B|A) = 0.7, P(B|not A) = 0.4. Find P(A|B) using Bayes\' theorem.', options:['0.429','0.300','0.700'], answer:'0.429', fact:'ًںŒ³ P(B) = 0.3أ—0.7 + 0.7أ—0.4 = 0.21+0.28 = 0.49. P(A|B) = P(Aâˆ©B)/P(B) = 0.21/0.49 â‰ˆ 0.429. Bayes\' theorem updates probabilities given new information!' },
  { level:3, visual:'ًں“ˆ', question:'âˆ«(3xآ²)dx = ?', options:['xآ³ + c','6x + c','xآ³/3 + c'], answer:'xآ³ + c', fact:'ًں“ˆ Integration rule: âˆ«xâپ؟dx = xâپ؟âپ؛آ¹/(n+1) + c. For 3xآ²: 3 أ— xآ³/3 = xآ³. So âˆ«3xآ²dx = xآ³ + c. Always add the constant of integration c for indefinite integrals!' },
  { level:3, visual:'ًں“ˆ', question:'What is âˆ«â‚پâپ´ (2x) dx?', options:['15','8','12'], answer:'15', fact:'ًں“ˆ âˆ«2x dx = xآ². Evaluate [xآ²]â‚پâپ´ = 4آ²â€“1آ² = 16â€“1 = 15. Definite integration finds the exact area under a curve between two x-values!' },
  { level:3, visual:'ًں”¢', question:'If logâ‚پâ‚€(x) = 3, what is x?', options:['1000','30','100'], answer:'1000', fact:'ًں”¢ logâ‚پâ‚€(x) = 3 means 10آ³ = x = 1000. Logarithms are the inverse of exponentials: logâ‚گ(b) = c means aل¶œ = b. Logs turn multiplication into addition â€” great for science!' },
  { level:3, visual:'ًں”¢', question:'Solve: 2ث£ = 32', options:['5','4','6'], answer:'5', fact:'ًں”¢ 32 = 2âپµ, so x = 5. When the bases are the same, just equate the exponents. If the bases differ, use logarithms: x = logâ‚‚(32) = log(32)/log(2) = 5!' },
  { level:3, visual:'ًں“گ', question:'A sector has perimeter 30 cm. Radius = 8 cm. What is the arc length?', options:['14 cm','22 cm','8 cm'], answer:'14 cm', fact:'ًں“گ Perimeter of sector = arc length + 2 radii. 30 = arc + 2أ—8 = arc + 16. Arc = 14 cm. The sector perimeter consists of the curved arc AND the two straight radii!' },
  { level:3, visual:'ًں“گ', question:'Points on a locus are all 5 cm from a fixed point P. What shape is the locus?', options:['A circle of radius 5 cm centred at P','A line 5 cm from P','A square around P'], answer:'A circle of radius 5 cm centred at P', fact:'ًں“گ The definition of a circle: all points equidistant from a fixed centre. A locus of points at fixed distance from a point is always a circle. Loci describe paths of points!' },
  { level:3, visual:'ًں”¢', question:'Prove that the product of two odd numbers is always odd. What is the key step?', options:['Write odd numbers as 2m+1 and 2n+1, multiply to get 4mn+2m+2n+1 = even+1 = odd','Odd أ— Odd = Even','Use trial with 3أ—5=15'], answer:'Write odd numbers as 2m+1 and 2n+1, multiply to get 4mn+2m+2n+1 = even+1 = odd', fact:'ًں”¢ Algebraic proof: any odd number = 2k+1. (2m+1)(2n+1) = 4mn+2m+2n+1 = 2(2mn+m+n)+1, which is odd. This is a proof by general case â€” stronger than examples alone!' },
  { level:3, visual:'ًں“ٹ', question:'What is the difference between a histogram and a bar chart?', options:['Histograms show continuous data with no gaps; bar charts show discrete/categorical data with gaps','Histograms have labels on bars; bar charts do not','Bar charts always use frequency density'], answer:'Histograms show continuous data with no gaps; bar charts show discrete/categorical data with gaps', fact:'ًں“ٹ Histograms: continuous data, bars touch, y-axis is frequency density (for unequal widths). Bar charts: discrete or categorical data, gaps between bars, y-axis is frequency!' },
  { level:3, visual:'ًں“ˆ', question:'A curve y = xآ² + 2x â€“ 3 intersects the x-axis where?', options:['x = 1 and x = â€“3','x = 3 and x = â€“1','x = â€“1 and x = 3'], answer:'x = 1 and x = â€“3', fact:'ًں“ˆ Set y=0: xآ²+2xâ€“3=0 â†’ (x+3)(xâ€“1)=0 â†’ x=1 or x=â€“3. The x-intercepts (zeros/roots) are where the quadratic equals zero. The vertex is at x=â€“1, y=â€“4!' },

  // â”€â”€ LEVEL 2 final top-up â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  { level:2, visual:'ًں”¢', question:'What is the sum of the interior angles of a decagon (10 sides)?', options:['1440آ°','1800آ°','1080آ°'], answer:'1440آ°', fact:'ًں”¢ (nâ€“2)أ—180آ° = (10â€“2)أ—180آ° = 8أ—180آ° = 1440آ°. Each interior angle of a regular decagon = 1440آ°أ·10 = 144آ°. Exterior angle = 360آ°أ·10 = 36آ°!' },
  { level:2, visual:'ًں“ٹ', question:'A set of 6 numbers has a mean of 8. What is their total sum?', options:['48','14','56'], answer:'48', fact:'ًں“ٹ Sum = mean أ— count = 8 أ— 6 = 48. If you need to find the total from a mean, simply multiply. This is the reverse of the mean formula!' },
  { level:2, visual:'ًں”¢', question:'Expand and simplify: (x + 5)(x â€“ 5)', options:['xآ² â€“ 25','xآ² + 25','xآ² â€“ 10x + 25'], answer:'xآ² â€“ 25', fact:'ًں”¢ Difference of two squares: (a+b)(aâ€“b) = aآ²â€“bآ². (x+5)(xâ€“5) = xآ²â€“25. This pattern comes up constantly â€” recognise it to save working time!' },
  { level:2, visual:'âڑ–ï¸ڈ', question:'The cost of 7 pens is آ£3.85. What is the cost of 12 pens?', options:['آ£6.60','آ£5.50','آ£7.70'], answer:'آ£6.60', fact:'âڑ–ï¸ڈ Cost per pen = آ£3.85أ·7 = آ£0.55. 12 pens = 12 أ— آ£0.55 = آ£6.60. Unitary method: find the cost of 1 first, then scale up. Great for all proportion problems!' },
  { level:2, visual:'ًں”¢', question:'A car worth آ£15,000 loses 12% of its value each year. What is it worth after 1 year?', options:['آ£13,200','آ£12,000','آ£13,800'], answer:'آ£13,200', fact:'ًں”¢ آ£15,000 أ— (1â€“0.12) = آ£15,000 أ— 0.88 = آ£13,200. Using the multiplier 0.88 is more efficient than finding 12% and subtracting. This method also extends to compound depreciation!' },
  { level:2, visual:'ًں“گ', question:'A shape has rotational symmetry of order 4. What does this mean?', options:['It maps onto itself 4 times in a full rotation','It has 4 lines of symmetry','It has 4 vertices'], answer:'It maps onto itself 4 times in a full rotation', fact:'ًں“گ Order of rotational symmetry = number of times a shape fits onto itself in a 360آ° rotation. A square has order 4: at 90آ°, 180آ°, 270آ°, 360آ°. A circle has infinite order!' },
  { level:2, visual:'ًں”¢', question:'Simplify: (xâپ´)^(1/2)', options:['xآ²','xâپ´','2xآ²'], answer:'xآ²', fact:'ًں”¢ (xâپ´)^(1/2) = x^(4أ—1/2) = xآ². Power of a power: multiply the exponents. Fractional exponents are roots: ^(1/2)=square root, ^(1/3)=cube root!' },
  { level:2, visual:'ًں“ٹ', question:'In a normal distribution, the mean, median, and mode are...?', options:['All equal','Mean > median > mode','Mean < median < mode'], answer:'All equal', fact:'ًں“ٹ In a perfectly symmetric normal (bell-shaped) distribution, the mean, median, and mode coincide at the centre. Skewed distributions pull the mean towards the tail!' },
  { level:2, visual:'ًں”¢', question:'What is 0.1% of 50,000?', options:['50','5','500'], answer:'50', fact:'ًں”¢ 0.1% = 1/1000. 50,000 أ· 1000 = 50. Small percentages of large numbers can be surprising! 0.1% of the world population â‰ˆ 8 million people!' },
  { level:2, visual:'ًں“گ', question:'The scale factor of an enlargement is â€“2. What does the negative sign mean?', options:['The image is on the opposite side of the centre and 2أ— larger','The image is 2أ— smaller','The image is reflected'], answer:'The image is on the opposite side of the centre and 2أ— larger', fact:'ًں“گ A negative scale factor means the image is enlarged AND flipped through the centre of enlargement â€” it appears on the opposite side. The size is |scale factor| times the original!' },
