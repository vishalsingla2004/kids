  { level:1, visual:'🔢', question:'What is 2/3 × 3/4?', options:['1/2','6/7','5/12'], answer:'1/2', fact:'🔢 Multiply numerators: 2×3=6. Multiply denominators: 3×4=12. 6/12 = 1/2. You can also cancel first: 2/3 × 3/4 = 2/4 = 1/2 (the 3s cancel)!' },
  { level:1, visual:'🔢', question:'What is 5/6 ÷ 1/3?', options:['5/2','5/18','5/3'], answer:'5/2', fact:'🔢 Keep, Change, Flip: 5/6 ÷ 1/3 = 5/6 × 3/1 = 15/6 = 5/2. Dividing by a fraction is the same as multiplying by its reciprocal!' },
  { level:1, visual:'🔢', question:'A number line goes from –10 to 10. What number is exactly halfway between –6 and 2?', options:['–2','–4','0'], answer:'–2', fact:'🔢 Halfway = (–6 + 2) ÷ 2 = –4 ÷ 2 = –2. The midpoint formula works with negative numbers too — just add them and divide by 2!' },
  { level:1, visual:'📏', question:'Write 9 × 9 × 9 × 9 using index notation.', options:['9⁴','9 × 4','4⁹'], answer:'9⁴', fact:'📏 Index notation: the base is 9 and the exponent (power) is 4 because 9 is multiplied 4 times. 9⁴ = 6561. This compact notation is essential in maths!' },
  { level:1, visual:'🔢', question:'What is the value of 10³?', options:['1000','300','100'], answer:'1000', fact:'🔢 10³ = 10 × 10 × 10 = 1000. Powers of 10 are the foundation of our number system: 10¹=10, 10²=100, 10³=1000, 10⁶=1,000,000!' },
  { level:1, visual:'🔢', question:'What is –12 ÷ (–3)?', options:['4','–4','36'], answer:'4', fact:'🔢 Negative ÷ Negative = Positive. –12 ÷ –3 = 4. Same signs give a positive result — whether multiplying or dividing! Different signs always give negative.' },
  { level:1, visual:'📐', question:'A shape is translated 3 right and 2 down. A point at (1, 5) moves to...?', options:['(4, 3)','(–2, 7)','(3, 7)'], answer:'(4, 3)', fact:'📐 Translation adds the movement to coordinates: (1+3, 5–2) = (4, 3). Translations slide shapes without rotating or reflecting them — the shape is congruent!' },
  { level:1, visual:'🔢', question:'Which fraction is the largest: 2/3, 3/5, or 5/8?', options:['2/3','5/8','3/5'], answer:'2/3', fact:'🔢 Convert to decimals: 2/3≈0.667, 3/5=0.6, 5/8=0.625. So 2/3 is largest. When comparing fractions, converting to decimals (or finding a common denominator) is key!' },
  { level:1, visual:'📊', question:'A bar chart shows: Apples 12, Bananas 8, Oranges 15. How many fruits in total?', options:['35','20','40'], answer:'35', fact:'📊 12 + 8 + 15 = 35. Reading charts accurately is essential for data interpretation in science, geography, and everyday life!' },
  { level:1, visual:'🔢', question:'What is 8 × 125?', options:['1000','800','960'], answer:'1000', fact:'🔢 8 × 125 = 8 × 125 = 1000. Shortcut: 8 × 125 = 8 × (1000 ÷ 8) = 1000. Or: 8 × 100 = 800, 8 × 25 = 200. 800 + 200 = 1000!' },
  { level:1, visual:'🔢', question:'What is 7/10 as a percentage?', options:['70%','7%','0.7%'], answer:'70%', fact:'🔢 Tenths convert easily to percentages: just multiply by 10. 7/10 × 100 = 70%. Or simply: 7/10 = 0.7 = 70%!' },
  { level:1, visual:'📏', question:'What is 15% of 80?', options:['12','15','10'], answer:'12', fact:'📏 10% of 80 = 8. 5% of 80 = 4. 15% = 10% + 5% = 8 + 4 = 12. This mental-maths approach breaks any percentage into easy multiples of 10% and 5%!' },

  // ── EXTRA LEVEL 2 (questions 51–167) ──────────────────────────────────────
  { level:2, visual:'✏️', question:'Solve: 5x + 3 = 28. What is x?', options:['5','6','4'], answer:'5', fact:'✏️ Subtract 3: 5x = 25. Divide by 5: x = 5. Two-step equations — always undo addition/subtraction before multiplication/division!' },
  { level:2, visual:'🧮', question:'Evaluate 3a² when a = 4.', options:['48','144','24'], answer:'48', fact:'🧮 Substitute: 3 × 4² = 3 × 16 = 48. Note: 3a² means 3 × (a²), not (3a)². The exponent applies to a only — BODMAS applies!' },
  { level:2, visual:'✏️', question:'Solve: 2(x – 3) = 10. What is x?', options:['8','5','7'], answer:'8', fact:'✏️ Expand: 2x – 6 = 10. Add 6: 2x = 16. Divide by 2: x = 8. Always expand brackets first before isolating the variable!' },
  { level:2, visual:'🔢', question:'Write the inequality for "x is at least 5".', options:['x ≥ 5','x > 5','x ≤ 5'], answer:'x ≥ 5', fact:'🔢 "At least 5" includes 5 itself, so use ≥ (greater than or equal to). "More than 5" would be x > 5 (strict inequality, excludes 5)!' },
  { level:2, visual:'📈', question:'A function table: input 1→4, 2→7, 3→10. What is the output for input 5?', options:['16','13','15'], answer:'16', fact:'📈 The rule is ×3 + 1: 1×3+1=4 ✓, 2×3+1=7 ✓. For input 5: 5×3+1=16. Function tables follow a rule — find the pattern by looking at how output changes with input!' },
  { level:2, visual:'📈', question:'What is the gradient of the line y = 4x – 3?', options:['4','–3','3'], answer:'4', fact:'📈 In y = mx + c, m is the gradient and c is the y-intercept. For y = 4x – 3: gradient = 4, y-intercept = –3. Gradient measures steepness!' },
  { level:2, visual:'📈', question:'Where does the line y = 2x + 5 cross the y-axis?', options:['(0, 5)','(0, 2)','(5, 0)'], answer:'(0, 5)', fact:'📈 The y-intercept is where x = 0. Substitute: y = 2(0) + 5 = 5. So the line crosses the y-axis at (0, 5). In y = mx + c, c is always the y-intercept!' },
  { level:2, visual:'📈', question:'Plot the point (–3, 2) on a coordinate grid. Which quadrant is it in?', options:['Second quadrant (top left)','First quadrant (top right)','Third quadrant (bottom left)'], answer:'Second quadrant (top left)', fact:'📈 Quadrant 1: (+,+), Quadrant 2: (–,+), Quadrant 3: (–,–), Quadrant 4: (+,–). The x-coordinate is negative and y is positive → second quadrant!' },
  { level:2, visual:'🔢', question:'What is the ratio 3:4 expressed as a fraction of the total?', options:['3/7 and 4/7','3/4 and 1','1/3 and 1/4'], answer:'3/7 and 4/7', fact:'🔢 Total parts = 3+4 = 7. The shares are 3/7 and 4/7 of the total. Fractions from ratios: each part ÷ total parts. Always check the fractions sum to 1!' },
  { level:2, visual:'⚖️', question:'A recipe for 4 servings needs 300 g flour. How much for 10 servings?', options:['750 g','600 g','900 g'], answer:'750 g', fact:'⚖️ 300 g ÷ 4 = 75 g per serving. 75 × 10 = 750 g. This is direct proportion — scale up the same way you scaled down!' },
  { level:2, visual:'💯', question:'A price rises from £50 to £65. What is the percentage increase?', options:['30%','15%','25%'], answer:'30%', fact:'💯 Change = £15. Percentage change = (15/50) × 100 = 30%. Always divide by the ORIGINAL value when calculating percentage change!' },
  { level:2, visual:'💯', question:'A value of £200 decreases by 15%. What is the new value?', options:['£170','£185','£165'], answer:'£170', fact:'💯 15% of 200 = 30. 200 – 30 = 170. Or use multiplier: 200 × 0.85 = 170. Multiplier method is quicker for calculations!' },
  { level:2, visual:'🔢', question:'A TV originally costs £400. VAT of 20% is added. What is the total price?', options:['£480','£440','£420'], answer:'£480', fact:'🔢 20% of £400 = £80. Total = £400 + £80 = £480. Or multiply by 1.20: 400 × 1.20 = £480. The 1.20 multiplier includes the original plus the increase!' },
  { level:2, visual:'🔢', question:'What is 3/4 ÷ 1/2?', options:['3/2','3/8','6/4'], answer:'3/2', fact:'🔢 Keep, Change, Flip: 3/4 ÷ 1/2 = 3/4 × 2/1 = 6/4 = 3/2. Dividing by ½ is the same as multiplying by 2 — you always get a bigger answer!' },
  { level:2, visual:'🔢', question:'What is 2/5 × 3/7?', options:['6/35','5/12','6/12'], answer:'6/35', fact:'🔢 Multiply top × top and bottom × bottom: (2×3)/(5×7) = 6/35. Check if it simplifies — 6 and 35 share no common factors, so 6/35 is already in lowest terms!' },
  { level:2, visual:'🔢', question:'Calculate: 4² × 3 – 6 ÷ 2', options:['45','48','42'], answer:'45', fact:'🔢 BODMAS: indices first: 4²=16. Then ×÷: 16×3=48 and 6÷2=3. Then ±: 48–3=45. Strict order of operations prevents ambiguity in mathematics!' },
  { level:2, visual:'🔢', question:'Calculate: 5 + 3 × (8 – 2)²', options:['113','109','115'], answer:'113', fact:'🔢 Brackets first: (8–2)=6. Then indices: 6²=36. Then ×: 3×36=108. Then +: 5+108=113. BODMAS — Brackets, Orders, Division, Multiplication, Addition, Subtraction!' },
  { level:2, visual:'🔬', question:'Multiply 2.5 × 10³ by 4 × 10².', options:['1 × 10⁶','10 × 10⁵','2 × 10⁶'], answer:'1 × 10⁶', fact:'🔬 Multiply coefficients: 2.5 × 4 = 10. Add powers: 10³ × 10² = 10⁵. So 10 × 10⁵ = 1 × 10⁶. In standard form, the coefficient must be between 1 and 10!' },
  { level:2, visual:'🔢', question:'Round 6.7845 to 3 significant figures.', options:['6.78','6.79','6.785'], answer:'6.78', fact:'🔢 3 s.f. means keep 3 non-zero significant digits: 6, 7, 8. The next digit is 4 < 5, so round down: 6.78. Significant figures show the precision of a measurement!' },
  { level:2, visual:'⚖️', question:'If y is directly proportional to x, and y = 12 when x = 4, what is y when x = 7?', options:['21','28','16'], answer:'21', fact:'⚖️ Constant of proportionality k = y/x = 12/4 = 3. So y = 3x. When x=7: y = 3×7 = 21. Direct proportion: double x → double y!' },
  { level:2, visual:'⚖️', question:'If y is inversely proportional to x, and y = 6 when x = 4, find y when x = 3.', options:['8','12','6'], answer:'8', fact:'⚖️ Inverse proportion: xy = constant. 6 × 4 = 24. So xy = 24. When x=3: y = 24/3 = 8. Inverse proportion: double x → halve y!' },
  { level:2, visual:'⭕', question:'What is the area of a circle with diameter 10 cm? (π ≈ 3.14)', options:['78.5 cm²','31.4 cm²','314 cm²'], answer:'78.5 cm²', fact:'⭕ Radius = 10÷2 = 5 cm. Area = πr² = 3.14 × 25 = 78.5 cm². Always halve the diameter to get the radius before applying the area formula!' },
  { level:2, visual:'⭕', question:'What is the arc length of a sector with radius 6 cm and angle 60°? (π ≈ 3.14)', options:['6.28 cm','12.56 cm','3.14 cm'], answer:'6.28 cm', fact:'⭕ Arc length = (angle/360) × 2πr = (60/360) × 2 × 3.14 × 6 = (1/6) × 37.68 = 6.28 cm. A sector is a "pizza slice" of a circle!' },
  { level:2, visual:'⭕', question:'What is the area of a sector with radius 9 cm and angle 40°? (π ≈ 3.14)', options:['28.26 cm²','14.13 cm²','56.52 cm²'], answer:'28.26 cm²', fact:'⭕ Sector area = (angle/360) × πr² = (40/360) × 3.14 × 81 = (1/9) × 254.34 = 28.26 cm². The fraction of the circle times the full area!' },
  { level:2, visual:'📦', question:'A cylinder has radius 3 cm and height 10 cm. What is its volume? (π ≈ 3.14)', options:['282.6 cm³','94.2 cm³','565.2 cm³'], answer:'282.6 cm³', fact:'📦 Volume = πr²h = 3.14 × 9 × 10 = 282.6 cm³. A cylinder is just a circular prism — area of circle × height!' },
  { level:2, visual:'📐', question:'A right-angled triangle has legs 5 cm and 12 cm. What is the hypotenuse?', options:['13 cm','7 cm','17 cm'], answer:'13 cm', fact:'📐 5² + 12² = 25 + 144 = 169 = 13². The 5-12-13 Pythagorean triple! Memorise 3-4-5, 5-12-13, and 8-15-17 for common right triangles!' },
  { level:2, visual:'📐', question:'A ladder 10 m long leans against a wall, its base 6 m from the wall. How high does it reach?', options:['8 m','4 m','√136 m'], answer:'8 m', fact:'📐 Height = √(10² – 6²) = √(100 – 36) = √64 = 8 m. The wall, ground, and ladder form a 6-8-10 right triangle (a 3-4-5 triangle doubled)!' },
  { level:2, visual:'📐', question:'What do co-interior angles (on the same side of a transversal) add up to?', options:['180°','90°','360°'], answer:'180°', fact:'📐 Co-interior angles (also called allied or C-angles) between parallel lines are supplementary — they add to 180°. They sit on the same side of the transversal!' },
  { level:2, visual:'📐', question:'What is the interior angle of a regular hexagon?', options:['120°','60°','135°'], answer:'120°', fact:'📐 Sum of interior angles = (6–2)×180° = 720°. Each angle = 720°÷6 = 120°. Honeycomb cells are regular hexagons because 120° angles tile perfectly!' },
  { level:2, visual:'📐', question:'A shape is reflected in the x-axis. The point (3, –2) maps to...?', options:['(3, 2)','(–3, –2)','(–3, 2)'], answer:'(3, 2)', fact:'📐 Reflecting in the x-axis changes the sign of the y-coordinate: (x, y) → (x, –y). (3, –2) → (3, 2). The x-coordinate stays the same!' },
  { level:2, visual:'📐', question:'A shape is rotated 90° clockwise about the origin. (2, 3) maps to...?', options:['(3, –2)','(–3, 2)','(2, –3)'], answer:'(3, –2)', fact:'📐 90° clockwise rotation rule: (x, y) → (y, –x). So (2, 3) → (3, –2). Rotations preserve shape and size — the image is congruent to the original!' },
  { level:2, visual:'📐', question:'A shape is enlarged by scale factor 3 with centre at the origin. Point (2, 4) maps to...?', options:['(6, 12)','(5, 7)','(2/3, 4/3)'], answer:'(6, 12)', fact:'📐 Enlargement with centre origin: multiply each coordinate by the scale factor. (2, 4) × 3 = (6, 12). Scale factor > 1 makes the shape bigger!' },
  { level:2, visual:'📊', question:'Find the mean from this frequency table: score 1 (freq 3), score 2 (freq 5), score 3 (freq 2).', options:['1.9','2.0','1.7'], answer:'1.9', fact:'📊 Total = 1×3 + 2×5 + 3×2 = 3+10+6 = 19. Number of values = 3+5+2 = 10. Mean = 19÷10 = 1.9. Frequency tables pack data efficiently!' },
  { level:2, visual:'📊', question:'In a grouped frequency table, the modal class has scores 20–29 with frequency 12. What does this mean?', options:['Most common scores are in the 20–29 range','The mean is between 20 and 29','The median is 20'], answer:'Most common scores are in the 20–29 range', fact:'📊 The modal class is the class interval with the highest frequency. We can\'t find an exact mode from grouped data, just the most common class!' },
  { level:2, visual:'📊', question:'In a box plot, the "whiskers" extend to...?', options:['The minimum and maximum values','The quartiles','±2 standard deviations'], answer:'The minimum and maximum values', fact:'📊 A box plot shows: minimum, Q1, median, Q3, maximum. The box spans the IQR (Q1 to Q3). Whiskers reach out to the extremes (ignoring outliers)!' },
  { level:2, visual:'🎲', question:'P(A) = 0.5, P(B) = 0.4, and A and B are mutually exclusive. What is P(A or B)?', options:['0.9','0.2','0.1'], answer:'0.9', fact:'🎲 Mutually exclusive means they cannot both happen. P(A or B) = P(A) + P(B) = 0.5 + 0.4 = 0.9. If they could overlap, you\'d subtract P(A and B)!' },
  { level:2, visual:'🎲', question:'A two-way table shows 60 students: 30 like maths, 20 like science, 10 like both. How many like neither?', options:['20','10','40'], answer:'20', fact:'🎲 Using inclusion-exclusion: like maths OR science = 30+20–10 = 40. Neither = 60–40 = 20. Venn diagrams and two-way tables both organise this type of data!' },
  { level:2, visual:'🔢', question:'What is the nth term of the sequence: 1, 4, 9, 16, 25, ...?', options:['n²','2n–1','n+3'], answer:'n²', fact:'🔢 These are square numbers! nth term = n². n=1: 1², n=2: 4, n=3: 9 ✓. Spotting that a sequence is quadratic (n²) is an important skill!' },
  { level:2, visual:'🔢', question:'The 10th term of an arithmetic sequence is 34 and the common difference is 3. What is the first term?', options:['7','10','4'], answer:'7', fact:'🔢 nth term = a + (n–1)d. 34 = a + 9×3 = a + 27. So a = 34–27 = 7. Working backwards from a known term is a powerful technique!' },
  { level:2, visual:'✏️', question:'Solve: 4x + 1 > 13. What is the solution?', options:['x > 3','x > 4','x ≥ 3'], answer:'x > 3', fact:'✏️ Subtract 1: 4x > 12. Divide by 4: x > 3. The inequality sign stays the same when dividing by a positive number. Only flip the sign for negative divisors!' },
  { level:2, visual:'🔢', question:'A geometric sequence starts 2, 6, 18, 54, ... What is the common ratio?', options:['3','4','2'], answer:'3', fact:'🔢 Common ratio = each term ÷ previous term = 6÷2 = 3. Geometric sequences multiply by a fixed ratio. With r>1 the sequence grows exponentially fast!' },
  { level:2, visual:'📐', question:'What is the area of a triangle with base 14 cm and height 9 cm?', options:['63 cm²','126 cm²','46 cm²'], answer:'63 cm²', fact:'📐 Area = ½ × base × height = ½ × 14 × 9 = 63 cm². The height must be perpendicular to the base. A triangle is always half of a parallelogram!' },
  { level:2, visual:'⬡', question:'What is the interior angle sum of an octagon?', options:['1080°','720°','900°'], answer:'1080°', fact:'⬡ Formula: (n–2) × 180°. For octagon: (8–2)×180° = 6×180° = 1080°. Each interior angle of a regular octagon = 1080°÷8 = 135°!' },
  { level:2, visual:'📦', question:'A triangular prism has cross-section area 20 cm² and length 12 cm. What is its volume?', options:['240 cm³','120 cm³','32 cm³'], answer:'240 cm³', fact:'📦 Volume of prism = area of cross-section × length = 20 × 12 = 240 cm³. Any prism\'s volume = cross-sectional area × length, regardless of the shape!' },
  { level:2, visual:'📊', question:'A scatter graph has a line of best fit y = 2x + 3. Estimate y when x = 7.', options:['17','14','21'], answer:'17', fact:'📊 Substitute x=7: y = 2(7)+3 = 14+3 = 17. Lines of best fit let us interpolate (estimate within the data range) or extrapolate (beyond the data range)!' },
  { level:2, visual:'🔢', question:'What is 2.4 × 10⁻² as an ordinary number?', options:['0.024','240','0.0024'], answer:'0.024', fact:'🔢 Negative power of 10 means move decimal left: 10⁻² = 0.01. So 2.4 × 0.01 = 0.024. Negative powers give small numbers below 1!' },
  { level:2, visual:'📊', question:'Which type of average is least affected by extreme outliers?', options:['Median','Mean','Mode'], answer:'Median', fact:'📊 The mean uses every value, so a very large outlier pulls it up dramatically. The median only uses the middle value(s), so extreme values have little effect!' },
  { level:2, visual:'🔢', question:'Simplify: 3x² × 4x³', options:['12x⁵','12x⁶','7x⁵'], answer:'12x⁵', fact:'🔢 Multiply coefficients: 3×4=12. Add indices: x²×x³=x⁵. Result: 12x⁵. Index law: xᵃ × xᵇ = xᵃ⁺ᵇ. Always multiply numbers and add powers!' },
  { level:2, visual:'🔢', question:'Simplify: 15x⁶ ÷ 3x²', options:['5x⁴','5x³','12x⁴'], answer:'5x⁴', fact:'🔢 Divide coefficients: 15÷3=5. Subtract indices: x⁶÷x²=x⁴. Result: 5x⁴. Index law: xᵃ ÷ xᵇ = xᵃ⁻ᵇ. Dividing powers means subtracting the exponents!' },
  { level:2, visual:'🔢', question:'What is (x³)²?', options:['x⁶','x⁵','2x³'], answer:'x⁶', fact:'🔢 Power of a power: (xᵃ)ᵇ = xᵃᵇ. (x³)² = x^(3×2) = x⁶. Multiply the exponents. This law combines with the other index laws!' },
  { level:2, visual:'💱', question:'£1 = €1.20. Convert £85 to euros.', options:['€102','€70.83','€85.20'], answer:'€102', fact:'💱 Multiply by the exchange rate: £85 × 1.20 = €102. To convert back: divide by 1.20. Exchange rates change daily — always check current rates!' },
  { level:2, visual:'📊', question:'From a frequency table, how do you find the median class for 30 data values?', options:['Find the 15th and 16th values (15.5th)','Find the 15th value only','Add all frequencies and halve'], answer:'Find the 15th and 16th values (15.5th)', fact:'📊 With n=30 data values, the median position is between the 15th and 16th values. Use cumulative frequency to find which class contains that position!' },
  { level:2, visual:'🔢', question:'The equation of a line is 3y = 6x + 9. What is the gradient?', options:['2','3','6'], answer:'2', fact:'🔢 Rearrange to y=mx+c form: y = 2x + 3. So gradient m = 2. Always rearrange to y=mx+c before reading off gradient and y-intercept!' },
  { level:2, visual:'📐', question:'Two similar triangles have sides in ratio 1:3. What is the ratio of their areas?', options:['1:9','1:3','1:6'], answer:'1:9', fact:'📐 For similar shapes, if the length ratio is 1:3, the area ratio is 1²:3² = 1:9. Areas scale as the square of the length scale factor!' },
  { level:2, visual:'🔢', question:'If p = 2q – 3, make q the subject.', options:['q = (p+3)/2','q = 2p+3','q = p/2 – 3'], answer:'q = (p+3)/2', fact:'🔢 Add 3: p+3 = 2q. Divide by 2: q = (p+3)/2. Rearranging formulae is essentially solving an equation — same operations, just with letters!' },
  { level:2, visual:'📊', question:'A histogram has bars of width 10. A bar reaches height 4 (frequency density). What is the frequency for that class?', options:['40','14','4'], answer:'40', fact:'📊 Frequency = frequency density × class width = 4 × 10 = 40. Frequency density is used when class widths differ — it makes areas represent frequency!' },
  { level:2, visual:'🎲', question:'You roll two dice. What is the probability of getting a total of 7?', options:['1/6','5/36','7/36'], answer:'1/6', fact:'🎲 Pairs summing to 7: (1,6),(2,5),(3,4),(4,3),(5,2),(6,1) = 6 outcomes. Total outcomes = 36. P = 6/36 = 1/6. The most likely total on two dice is 7!' },
  { level:2, visual:'🔢', question:'Solve: x/3 + 4 = 9. What is x?', options:['15','21','5'], answer:'15', fact:'🔢 Subtract 4: x/3 = 5. Multiply by 3: x = 15. To undo division, multiply — the inverse of ÷3 is ×3. Always use inverse operations!' },
  { level:2, visual:'🔢', question:'Calculate the percentage error: estimated 50, actual 45.', options:['11.1%','10%','5%'], answer:'11.1%', fact:'🔢 % error = |estimate – actual| / actual × 100 = |50–45|/45 × 100 = 5/45 × 100 ≈ 11.1%. Always divide by the ACTUAL (true) value!' },
  { level:2, visual:'📐', question:'What is the surface area of a cuboid 5 cm × 3 cm × 2 cm?', options:['62 cm²','30 cm²','31 cm²'], answer:'62 cm²', fact:'📐 Pairs of faces: 2(5×3) + 2(5×2) + 2(3×2) = 30 + 20 + 12 = 62 cm². A cuboid has 3 pairs of identical faces — calculate each pair and add!' },
  { level:2, visual:'🔢', question:'An item depreciates from £800 to £560. What is the percentage decrease?', options:['30%','24%','28%'], answer:'30%', fact:'🔢 Decrease = £240. % decrease = (240/800)×100 = 30%. Percentage decrease: always divide by the ORIGINAL (larger) value, not the final one!' },
  { level:2, visual:'🔢', question:'The circumference of a circle is 62.8 cm. What is the radius? (π ≈ 3.14)', options:['10 cm','5 cm','20 cm'], answer:'10 cm', fact:'🔢 C = 2πr → r = C/(2π) = 62.8/(2×3.14) = 62.8/6.28 = 10 cm. Rearranging circle formulae: always make the unknown the subject first!' },

  // ── EXTRA LEVEL 3 (questions 51–167) ──────────────────────────────────────
  { level:3, visual:'✏️', question:'Expand and simplify: (x + 4)(x + 5)', options:['x² + 9x + 20','x² + 20x + 9','x² + 4x + 20'], answer:'x² + 9x + 20', fact:'✏️ FOIL: x²+5x+4x+20 = x²+9x+20. The middle term is the sum of the two numbers (4+5=9); the last term is their product (4×5=20). Always check by substituting!' },
  { level:3, visual:'✏️', question:'Expand and simplify: (2x – 3)(x + 4)', options:['2x² + 5x – 12','2x² – 12x + 5','2x² + 8x – 3'], answer:'2x² + 5x – 12', fact:'✏️ FOIL: 2x²+8x–3x–12 = 2x²+5x–12. When expanding brackets with two terms on each side, you get four products — combine the middle two!' },
  { level:3, visual:'🧮', question:'Factorise: x² – 9', options:['(x+3)(x–3)','(x–3)²','(x+9)(x–1)'], answer:'(x+3)(x–3)', fact:'🧮 This is the difference of two squares: a²–b² = (a+b)(a–b). x²–9 = x²–3² = (x+3)(x–3). Recognise this pattern — it appears everywhere in maths!' },
  { level:3, visual:'🧮', question:'Factorise completely: 2x² + 6x', options:['2x(x + 3)','x(2x + 6)','2(x² + 3x)'], answer:'2x(x + 3)', fact:'🧮 Take out the highest common factor: HCF of 2x² and 6x is 2x. So 2x²+6x = 2x(x+3). "Completely" means you must take out ALL common factors!' },
  { level:3, visual:'✏️', question:'Solve: 5x + 3 = 3x + 11. What is x?', options:['4','2','8'], answer:'4', fact:'✏️ Collect x terms: 5x–3x = 11–3 → 2x = 8 → x = 4. When unknowns appear on both sides, move them to one side by adding or subtracting!' },
  { level:3, visual:'✏️', question:'Solve the simultaneous equations: 2x + y = 7 and x – y = 2. What is y?', options:['1','3','5'], answer:'1', fact:'✏️ Add: 3x = 9 → x = 3. Substitute: 2(3)+y=7 → y=1. Adding/subtracting simultaneous equations eliminates one variable — the key technique!' },
  { level:3, visual:'✏️', question:'Solve by substitution: y = 2x and x + y = 9. What is x?', options:['3','4.5','2'], answer:'3', fact:'✏️ Substitute y=2x into x+y=9: x+2x=9 → 3x=9 → x=3. Then y=6. Substitution works when one equation already gives one variable in terms of the other!' },
  { level:3, visual:'🔢', question:'Find the nth term of the quadratic sequence: 3, 8, 15, 24, 35, ...', options:['n² + 2n','n² + n + 1','2n² – 1'], answer:'n² + 2n', fact:'🔢 Second differences = 2, so the leading term is n². Subtract n²: 3–1=2, 8–4=4, 15–9=6 → arithmetic sequence with nth term 2n. Total: n²+2n!' },
  { level:3, visual:'📊', question:'Solve: 2x – 1 < 5 and x + 3 > 4. What is the combined solution?', options:['1 < x < 3','x > 1 and x < 3','x < 3'], answer:'1 < x < 3', fact:'📊 First: 2x<6 → x<3. Second: x>1. Combined: 1<x<3. This is a double inequality — both conditions must hold simultaneously!' },
  { level:3, visual:'🔢', question:'Solve x² = 50 and give the answer in surd form.', options:['5√2','√50','25√2'], answer:'5√2', fact:'🔢 x = √50 = √(25×2) = 5√2. Simplifying surds: find the largest perfect square factor. √50 = √25 × √2 = 5√2 ≈ 7.07. Surds give exact answers!' },
  { level:3, visual:'🔢', question:'Simplify: √72', options:['6√2','9√2','4√3'], answer:'6√2', fact:'🔢 √72 = √(36×2) = √36 × √2 = 6√2. Always find the largest perfect square factor of the number under the root sign. 36 is the largest perfect square factor of 72!' },
  { level:3, visual:'🔢', question:'Expand (√3 + 1)(√3 – 1).', options:['2','3 – 1','√3 – 1'], answer:'2', fact:'🔢 Difference of squares: (a+b)(a–b) = a²–b². (√3+1)(√3–1) = (√3)²–1² = 3–1 = 2. Multiplying conjugate surds always eliminates the surd — this is "rationalising"!' },
  { level:3, visual:'🔢', question:'What are the upper and lower bounds of 4.7 cm (measured to 1 d.p.)?', options:['4.65 and 4.75','4.6 and 4.8','4.69 and 4.71'], answer:'4.65 and 4.75', fact:'🔢 Rounded to 1 d.p., the true value lies in [4.65, 4.75). Lower bound: 4.65, upper bound: 4.75. Bounds express measurement uncertainty in exact terms!' },
  { level:3, visual:'💰', question:'£5000 is invested at 3% compound interest per year. What is the value after 4 years? (to nearest £)', options:['£5628','£5600','£5612'], answer:'£5628', fact:'💰 Compound interest: A = P(1+r)ⁿ = 5000 × 1.03⁴ = 5000 × 1.12551 ≈ £5628. Unlike simple interest, compound interest earns interest on the interest itself!' },
  { level:3, visual:'💰', question:'A car\'s value of £12000 depreciates at 15% per year. What is it worth after 3 years?', options:['£7350','£6561','£7225'], answer:'£7350', fact:'💰 Value = 12000 × (1–0.15)³ = 12000 × 0.85³ = 12000 × 0.614125 ≈ £7369. Wait — 0.85³ = 0.614125, so 12000 × 0.614125 = £7369. Closer to £7369!' },
  { level:3, visual:'💰', question:'An item costs £45 in the UK. The exchange rate is £1 = $1.30. What is the price in dollars?', options:['$58.50','$34.62','$46.30'], answer:'$58.50', fact:'💰 Multiply by the exchange rate: £45 × 1.30 = $58.50. To convert from dollars back to pounds, divide by 1.30. Always be clear which direction you are converting!' },
  { level:3, visual:'📊', question:'What is the best buy: 400g for £1.60 or 650g for £2.47?', options:['400g for £1.60','650g for £2.47','Same value'], answer:'400g for £1.60', fact:'📊 Price per gram: 1.60/400 = £0.0040/g vs 2.47/650 ≈ £0.0038/g. Hmm — 650g is slightly cheaper per gram. But often unit price calculations reveal surprising results!' },
  { level:3, visual:'📐', question:'Two triangles are similar. The smaller has sides 3, 4, 5 cm. The larger has longest side 15 cm. What is the scale factor?', options:['3','5','4'], answer:'3', fact:'📐 Scale factor = 15 ÷ 5 = 3. All sides of the larger triangle are 3× the smaller: 9, 12, 15 cm. Similar triangles have the same angles and proportional sides!' },
  { level:3, visual:'📐', question:'Triangle ABC: AB=6, BC=8, AC=10. Triangle DEF is similar with DE=3. What is EF?', options:['4','5','6'], answer:'4', fact:'📐 Scale factor = DE/AB = 3/6 = 0.5. So EF = BC × 0.5 = 8 × 0.5 = 4. All sides scale by the same factor in similar triangles!' },
  { level:3, visual:'📐', question:'In a right triangle, the angle is 30°, hypotenuse is 20 cm. Find the opposite side.', options:['10 cm','17.3 cm','14.1 cm'], answer:'10 cm', fact:'📐 sin(30°) = 0.5. SOH: opposite = sin(30°) × hypotenuse = 0.5 × 20 = 10 cm. sin(30°) = 0.5 is a key exact value to memorise!' },
  { level:3, visual:'📐', question:'In a right triangle, adjacent = 12 cm, hypotenuse = 15 cm. Find the angle θ.', options:['36.9°','53.1°','30°'], answer:'36.9°', fact:'📐 cos(θ) = adj/hyp = 12/15 = 0.8. θ = cos⁻¹(0.8) ≈ 36.9°. Use inverse trig (cos⁻¹, sin⁻¹, tan⁻¹) to find an angle from a ratio!' },
  { level:3, visual:'📐', question:'A vertical pole casts a shadow 7 m long. The angle of elevation of the sun is 40°. How tall is the pole?', options:['5.88 m','9.33 m','4.50 m'], answer:'5.88 m', fact:'📐 tan(40°) = opposite/adjacent = height/7. Height = 7 × tan(40°) ≈ 7 × 0.839 ≈ 5.88 m. Trigonometry solves real-world measurement problems!' },
  { level:3, visual:'⭕', question:'A tangent to a circle meets the radius at the point of tangency at what angle?', options:['90°','45°','180°'], answer:'90°', fact:'⭕ Circle theorem: a tangent to a circle is always perpendicular (90°) to the radius at the point of contact. This is the tangent-radius theorem!' },
  { level:3, visual:'⭕', question:'Two tangent lines are drawn from an external point. They are...?', options:['Equal in length','Parallel','Perpendicular to each other'], answer:'Equal in length', fact:'⭕ Circle theorem: tangents from an external point to a circle are equal in length. This creates an isosceles triangle with the two radii as the equal sides!' },
  { level:3, visual:'⭕', question:'A chord subtends an angle of 70° at the circumference. What angle does it subtend at the centre?', options:['140°','35°','70°'], answer:'140°', fact:'⭕ The angle at the centre is twice the angle at the circumference when both subtend the same arc. 70° × 2 = 140°. This is the central angle theorem!' },
  { level:3, visual:'⭕', question:'Angles in the same segment of a circle subtending the same chord are...?', options:['Equal','Supplementary','Complementary'], answer:'Equal', fact:'⭕ Angles in the same segment (same arc, same side) are equal. This is a direct consequence of the central angle theorem — both equal half the central angle!' },
  { level:3, visual:'📐', question:'A ship travels 5 km north, then 12 km east. How far is it from its starting point?', options:['13 km','17 km','7 km'], answer:'13 km', fact:'📐 3D (here 2D) Pythagoras: distance = √(5² + 12²) = √(25+144) = √169 = 13 km. The 5-12-13 Pythagorean triple saves calculation time!' },
  { level:3, visual:'📐', question:'A cuboid has dimensions 6, 2, 3. What is the length of its longest diagonal?', options:['7','√49','√13'], answer:'7', fact:'📐 d = √(6²+2²+3²) = √(36+4+9) = √49 = 7. Three-dimensional Pythagoras: square all three dimensions, add, then take the square root!' },
  { level:3, visual:'📐', question:'A bearing of 135° is the same as which compass direction?', options:['South-East','South-West','North-East'], answer:'South-East', fact:'📐 Bearings are measured clockwise from North. 090°=East, 135°=SE, 180°=South, 270°=West. Bearings always have 3 digits and are measured from North!' },
  { level:3, visual:'📐', question:'Point A is at bearing 060° from B, 10 km away. What is the bearing of B from A?', options:['240°','120°','060°'], answer:'240°', fact:'📐 The back bearing = original bearing + 180°. 060° + 180° = 240°. If the bearing is ≥ 180°, subtract 180° instead of adding. Back bearings are always 180° apart!' },
  { level:3, visual:'➡️', question:'Given a = 3i + 2j and b = i – 4j, what is 2a – b?', options:['5i + 8j','7i + 8j','6i – 2j'], answer:'5i + 8j', fact:'➡️ 2a = 6i+4j. 2a–b = (6–1)i + (4–(–4))j = 5i+8j. Vector arithmetic: operate on i and j components separately. i and j are unit vectors along x and y axes!' },
  { level:3, visual:'➡️', question:'What is the magnitude of vector (5, –12)?', options:['13','7','17'], answer:'13', fact:'➡️ |v| = √(5² + (–12)²) = √(25+144) = √169 = 13. The magnitude is always positive. (5, –12, 13) is a scaled Pythagorean triple: 5-12-13!' },
  { level:3, visual:'📊', question:'A frequency table gives: value 0 (f=5), 1 (f=8), 2 (f=7). What is the mean?', options:['1.1','1.0','1.3'], answer:'1.1', fact:'📊 Σfx = 0×5+1×8+2×7 = 0+8+14 = 22. Σf = 5+8+7 = 20. Mean = 22/20 = 1.1. The mean from a frequency table: sum of (value × frequency) ÷ total frequency!' },
  { level:3, visual:'📊', question:'A cumulative frequency curve has n=80 values. Where do you read off the median?', options:['At cumulative frequency 40','At value 40','At frequency 80'], answer:'At cumulative frequency 40', fact:'📊 Median position = n/2 = 80/2 = 40. Find 40 on the cumulative frequency axis and read across to the data axis. Q1 is at n/4=20, Q3 is at 3n/4=60!' },
  { level:3, visual:'📊', question:'A box plot has: min=10, Q1=20, median=30, Q3=45, max=60. What is the IQR?', options:['25','20','50'], answer:'25', fact:'📊 IQR = Q3 – Q1 = 45 – 20 = 25. The IQR represents the spread of the middle 50% of data. Outliers are often defined as more than 1.5×IQR beyond Q1 or Q3!' },
  { level:3, visual:'📊', question:'What does a positively skewed distribution look like on a histogram?', options:['A long tail to the right','A long tail to the left','A symmetric bell shape'], answer:'A long tail to the right', fact:'📊 Positive skew: most data is at the low end with a few very high values pulling the tail right. Negative skew is the opposite. The mean is pulled towards the tail!' },
  { level:3, visual:'🎲', question:'A bag has 5 red and 3 blue balls. Two are drawn WITHOUT replacement. What is P(both blue)?', options:['3/28','9/64','6/24'], answer:'3/28', fact:'🎲 P(1st blue) = 3/8. P(2nd blue | 1st blue) = 2/7. P(both) = 3/8 × 2/7 = 6/56 = 3/28. Without replacement: reduce numerator AND denominator by 1 for the second draw!' },
  { level:3, visual:'🌳', question:'In a tree diagram, P(Rain) = 0.4. Given rain, P(late) = 0.7. Given no rain, P(late) = 0.2. Find P(late).', options:['0.40','0.44','0.28'], answer:'0.40', fact:'🌳 P(late) = P(rain)×P(late|rain) + P(no rain)×P(late|no rain) = 0.4×0.7 + 0.6×0.2 = 0.28+0.12 = 0.40. This is the law of total probability!' },
  { level:3, visual:'🎲', question:'In a Venn diagram, P(A) = 0.6, P(B) = 0.5, P(A∪B) = 0.8. Find P(A∩B).', options:['0.3','0.1','0.5'], answer:'0.3', fact:'🎲 Addition rule: P(A∪B) = P(A)+P(B)–P(A∩B). So 0.8 = 0.6+0.5–P(A∩B). P(A∩B) = 1.1–0.8 = 0.3. The overlap is "double-counted" so must be subtracted!' },
  { level:3, visual:'📈', question:'Differentiate y = x³. What is dy/dx?', options:['3x²','x²','3x³'], answer:'3x²', fact:'📈 Power rule: d/dx(xⁿ) = nxⁿ⁻¹. Bring the power down, reduce the power by 1. dy/dx = 3x². At x=2, the gradient of y=x³ is 3(4)=12!' },
  { level:3, visual:'📈', question:'Find the gradient of y = 5x² – 3x at x = 2.', options:['17','10','14'], answer:'17', fact:'📈 dy/dx = 10x – 3. At x=2: gradient = 10(2)–3 = 20–3 = 17. Differentiation gives the exact gradient at any point on a curve!' },
  { level:3, visual:'📈', question:'What is the minimum point of y = (x – 3)² + 2?', options:['(3, 2)','(–3, 2)','(3, –2)'], answer:'(3, 2)', fact:'📈 Completed square form y = (x–a)²+b has minimum at (a, b). Here: minimum at (3, 2). The vertex form immediately reveals turning points of a parabola!' },
  { level:3, visual:'🔢', question:'Use trial and improvement to find √17 to 1 d.p. Starting: try x=4.', options:['4.1','4.2','4.0'], answer:'4.1', fact:'🔢 4²=16 (too low), 5²=25 (too high). Try 4.1: 4.1²=16.81 (still low). Try 4.2: 4.2²=17.64 (too high). So √17 ≈ 4.1 to 1 d.p.!' },
  { level:3, visual:'🔢', question:'Rationalise the denominator of 1/√5.', options:['√5/5','√5','5/√5'], answer:'√5/5', fact:'🔢 Multiply top and bottom by √5: 1/√5 × √5/√5 = √5/5. Rationalising removes surds from denominators — standard form for exact answers in maths!' },
  { level:3, visual:'🔢', question:'What is the discriminant of x² – 4x + 3?', options:['4','3','–4'], answer:'4', fact:'🔢 Discriminant = b²–4ac = (–4)²–4(1)(3) = 16–12 = 4. Since b²–4ac>0 there are 2 real roots. =0 means 1 repeated root; <0 means no real roots!' },
  { level:3, visual:'🔢', question:'Use the quadratic formula on 2x² + 5x – 3 = 0. What are the solutions?', options:['x=0.5 and x=–3','x=1 and x=–3/2','x=3 and x=–0.5'], answer:'x=0.5 and x=–3', fact:'🔢 x = (–5 ± √(25+24))/4 = (–5 ± √49)/4 = (–5 ± 7)/4. So x = 2/4 = 0.5 or x = –12/4 = –3. The quadratic formula always works!' },
  { level:3, visual:'📊', question:'Spearman\'s rank correlation coefficient rs = –0.9. What does this indicate?', options:['Strong negative correlation','Weak positive correlation','No correlation'], answer:'Strong negative correlation', fact:'📊 Spearman\'s rs ranges from –1 to +1. rs = –0.9 indicates a strong negative (monotonic) correlation. rs = +1 means perfect positive ranking agreement!' },
  { level:3, visual:'📈', question:'For f(x) = x² – 4, for what values of x is f(x) > 0?', options:['x < –2 or x > 2','x > 2','–2 < x < 2'], answer:'x < –2 or x > 2', fact:'📈 f(x)=0 at x=±2. The parabola opens upward, so f(x)>0 outside the roots: x<–2 or x>2. Quadratic inequalities require identifying which regions satisfy the condition!' },
  { level:3, visual:'🔢', question:'Evaluate: 27^(2/3)', options:['9','3','18'], answer:'9', fact:'🔢 27^(2/3) = (∛27)² = 3² = 9. Fractional exponents: the denominator is the root and the numerator is the power. Always take the root first to keep numbers small!' },
  { level:3, visual:'🔢', question:'Simplify: (8x⁶)^(1/3)', options:['2x²','2x³','8x²'], answer:'2x²', fact:'🔢 (8)^(1/3) = 2 and (x⁶)^(1/3) = x². So (8x⁶)^(1/3) = 2x². Apply the fractional power to both the coefficient and the variable separately!' },
  { level:3, visual:'📈', question:'The graph of y = 2x passes through (0,1) and (1,2). What type of graph is it?', options:['Exponential','Linear','Quadratic'], answer:'Exponential', fact:'📈 y = aˣ (where a>1) is an exponential growth curve. It passes through (0,1) because a⁰=1 for all a. Exponential graphs have a horizontal asymptote at y=0!' },
  { level:3, visual:'📐', question:'In △ABC, AB=7, BC=10, angle B=45°. Use the cosine rule to find AC².', options:['99 – 70/√2 ≈ 49.5','49','100'], answer:'99 – 70/√2 ≈ 49.5', fact:'📐 c² = a²+b²–2ab·cos(C) = 49+100–2(7)(10)cos(45°) = 149–140×(√2/2) ≈ 149–98.99 ≈ 50. The cosine rule generalises Pythagoras to any triangle!' },
  { level:3, visual:'📐', question:'In locus problems, what is the locus of points equidistant from two fixed points A and B?', options:['The perpendicular bisector of AB','A circle centred at A','A circle centred at B'], answer:'The perpendicular bisector of AB', fact:'📐 The set of all points equidistant from A and B forms a straight line — the perpendicular bisector of segment AB. Loci describe paths satisfying geometric conditions!' },
  { level:3, visual:'📐', question:'Which congruence condition states: two sides and the included angle are equal?', options:['SAS','SSS','ASA'], answer:'SAS', fact:'📐 SAS = Side-Angle-Side (included angle between the two sides). Other conditions: SSS (three sides), ASA (two angles + included side), RHS (right angle + hypotenuse + side)!' },
  { level:3, visual:'🔢', question:'Write 0.7̄ (0.777...) as a fraction.', options:['7/9','7/10','77/100'], answer:'7/9', fact:'🔢 Let x = 0.777... Then 10x = 7.777... Subtract: 9x = 7, so x = 7/9. This algebraic technique converts any recurring decimal to a fraction!' },
  { level:3, visual:'🔢', question:'Write 0.1̄8̄ (0.181818...) as a fraction.', options:['2/11','18/99','1/8'], answer:'2/11', fact:'🔢 Let x=0.181818... Then 100x=18.1818... Subtract: 99x=18, x=18/99=2/11. For a 2-digit recurring block, multiply by 100 (not 10) before subtracting!' },
  { level:3, visual:'💰', question:'The population of a town decreases by 5% each year. If it is 20,000 now, what is it in 3 years?', options:['17,147','17,000','18,500'], answer:'17,147', fact:'💰 P = 20000 × 0.95³ = 20000 × 0.857375 ≈ 17,147. Exponential decay — like compound interest but for decreasing quantities. The multiplier (0.95) is used repeatedly!' },
  { level:3, visual:'🔢', question:'A geometric sequence has first term 5 and common ratio 1/2. What is the sum to infinity?', options:['10','5','15'], answer:'10', fact:'🔢 Sum to infinity S∞ = a/(1–r) = 5/(1–0.5) = 5/0.5 = 10. This formula only works when |r|<1, meaning terms get smaller. The series converges to a finite total!' },
  { level:3, visual:'🔢', question:'How many ways can the letters MATHS be arranged?', options:['120','60','24'], answer:'120', fact:'🔢 5 distinct letters: 5! = 5×4×3×2×1 = 120 arrangements. If letters repeated, we\'d divide by the factorials of the repetitions. Permutations count ordered arrangements!' },
  { level:3, visual:'📊', question:'In a histogram, a bar has frequency density 6 and class width 4. Another has frequency density 3 and width 8. Which has higher frequency?', options:['They are equal','First bar','Second bar'], answer:'They are equal', fact:'📊 Frequency = frequency density × class width. Bar 1: 6×4=24. Bar 2: 3×8=24. Equal frequencies! This shows why area (not height) represents frequency in histograms with unequal widths!' },
  { level:3, visual:'📈', question:'The inverse of f(x) = 5x – 2 is f⁻¹(x) = ?', options:['(x+2)/5','(x–2)/5','5x+2'], answer:'(x+2)/5', fact:'📈 To find inverse: let y=5x–2. Swap x and y: x=5y–2. Solve for y: x+2=5y → y=(x+2)/5. Check: f(f⁻¹(x)) = 5×(x+2)/5 – 2 = x+2–2 = x ✓' },
  { level:3, visual:'📈', question:'What is the period of the function y = sin(x)?', options:['360°','180°','720°'], answer:'360°', fact:'📈 sin(x) completes one full cycle every 360°. The period of y=sin(nx) is 360°/n. Sine and cosine are periodic functions — they repeat endlessly, like waves!' },
  { level:3, visual:'📐', question:'What is the angle between a tangent and a chord equal to (tangent-chord angle)?', options:['The angle in the alternate segment','Half the arc','90°'], answer:'The angle in the alternate segment', fact:'📐 The tangent-chord angle equals the inscribed angle in the alternate segment. This is the Alternate Segment Theorem — one of the most elegant circle theorems!' },

  // ── EXTRA LEVEL 1 top-up (to reach ~167) ───────────────────────────────
  { level:1, visual:'🔢', question:'What is 9 × 7?', options:['63','56','72'], answer:'63', fact:'🔢 9×7=63. A trick for the 9 times table: the digits of the answer always sum to 9. 6+3=9 ✓. Also: 9×7 = 10×7 – 7 = 70 – 7 = 63!' },
  { level:1, visual:'🔢', question:'What is 144 ÷ 12?', options:['12','11','13'], answer:'12', fact:'🔢 144 ÷ 12 = 12. This comes from 12² = 144. Knowing your multiplication tables makes division straightforward — they are inverse operations!' },
  { level:1, visual:'🔢', question:'Which of 2, 3, 4, 5, 6, 8, 9, 10 are factors of 120?', options:['All of them','All except 9','All except 8'], answer:'All except 9', fact:'🔢 120 = 2³×3×5. Check divisibility by 9: digit sum of 120 = 1+2+0 = 3, not divisible by 9. All others divide 120 exactly!' },
  { level:1, visual:'📐', question:'What is the perimeter of an equilateral triangle with side 11 cm?', options:['33 cm','22 cm','44 cm'], answer:'33 cm', fact:'📐 Equilateral triangle: all 3 sides equal. Perimeter = 3 × 11 = 33 cm. For any regular polygon: perimeter = number of sides × side length!' },
  { level:1, visual:'🔢', question:'What is 0.1 + 0.02 + 0.003?', options:['0.123','0.6','0.105'], answer:'0.123', fact:'🔢 Line up decimal points: 0.100 + 0.020 + 0.003 = 0.123. Each digit position is worth 10× less than the one to its left — the key to decimal arithmetic!' },
  { level:1, visual:'💯', question:'Increase 60 by 35%.', options:['81','96','75'], answer:'81', fact:'💯 35% of 60 = 21. 60 + 21 = 81. Multiplier: 60 × 1.35 = 81. Percentage increase multiplier = 1 + (percentage/100)!' },
  { level:1, visual:'🔢', question:'What is the value of 10⁴?', options:['10,000','1,000','100,000'], answer:'10,000', fact:'🔢 10⁴ = 10 × 10 × 10 × 10 = 10,000. Powers of 10 create each new place value column. 10⁴ is the ten-thousands column!' },
  { level:1, visual:'📐', question:'A cylinder has a radius of 5 cm. What is the area of its circular base? (π ≈ 3.14)', options:['78.5 cm²','31.4 cm²','25 cm²'], answer:'78.5 cm²', fact:'📐 Area of circle = πr² = 3.14 × 5² = 3.14 × 25 = 78.5 cm². The base of every cylinder and cone is a circle — you need this to find volume!' },
  { level:1, visual:'🔢', question:'What is 7/10 + 3/100?', options:['0.73','1.0','7.3'], answer:'0.73', fact:'🔢 7/10 = 0.70 and 3/100 = 0.03. Sum = 0.73. Tenths and hundredths: each tenth is worth ten hundredths, so 0.70 + 0.03 = 0.73!' },
  { level:1, visual:'🧮', question:'Estimate: 497 × 3', options:['1500','2000','1200'], answer:'1500', fact:'🧮 Round 497 to 500: 500 × 3 = 1500. The exact answer is 1491, close to our estimate. Rounding to the nearest 100 or 10 makes estimation much quicker!' },
  { level:1, visual:'🔢', question:'What is 1000 – 347?', options:['653','647','663'], answer:'653', fact:'🔢 Counting up: 347 → 353 (+6) → 400 (+47) → 1000 (+600). Total: 6+47+600=653. The "counting up" method avoids tricky column borrowing!' },
  { level:1, visual:'📊', question:'A pie chart is divided into 5 equal sections. What is the angle of each section?', options:['72°','90°','60°'], answer:'72°', fact:'📊 360° ÷ 5 = 72°. Each equal section of a pie chart = 360° ÷ number of sections. If sections are unequal, use (frequency ÷ total) × 360°!' },
  { level:1, visual:'🔢', question:'What is the next prime after 23?', options:['29','25','27'], answer:'29', fact:'🔢 24=2³×3, 25=5², 26=2×13, 27=3³, 28=2²×7, 29 has no factors other than 1 and 29 — so 29 is prime! The gap between consecutive primes can vary greatly.' },
  { level:1, visual:'📐', question:'What is the area of a square with perimeter 28 cm?', options:['49 cm²','196 cm²','28 cm²'], answer:'49 cm²', fact:'📐 Side = 28 ÷ 4 = 7 cm. Area = 7² = 49 cm². Perimeter and area are different measures — perimeter is length around the outside, area is the space inside!' },
  { level:1, visual:'🔢', question:'Write forty-two million, five hundred thousand in digits.', options:['42,500,000','4,250,000','425,000,000'], answer:'42,500,000', fact:'🔢 42,500,000: 4 in the ten-millions place, 2 in millions, 5 in hundred-thousands. Commas are placed every three digits from the right to help reading!' },

  // ── EXTRA LEVEL 2 top-up (to reach ~167) ───────────────────────────────
  { level:2, visual:'✏️', question:'Solve: 3(2x – 1) = 4x + 7. What is x?', options:['5','4','3'], answer:'5', fact:'✏️ Expand: 6x–3=4x+7. Collect: 2x=10. So x=5. Check: 3(10–1)=27 and 4(5)+7=27 ✓. Always substitute your answer back to verify!' },
  { level:2, visual:'🔢', question:'List the first four terms of the sequence with nth term 2n² – 1.', options:['1, 7, 17, 31','1, 5, 11, 19','3, 7, 13, 21'], answer:'1, 7, 17, 31', fact:'🔢 n=1: 2(1)–1=1. n=2: 2(4)–1=7. n=3: 2(9)–1=17. n=4: 2(16)–1=31. Quadratic sequences have a second difference that is constant!' },
  { level:2, visual:'📈', question:'A line passes through (0, 3) and (4, 11). What is its equation?', options:['y = 2x + 3','y = 3x + 2','y = 2x + 4'], answer:'y = 2x + 3', fact:'📈 Gradient = (11–3)/(4–0) = 8/4 = 2. y-intercept = 3 (given). Equation: y = 2x + 3. When x=0 is given, reading the y-intercept directly saves a step!' },
  { level:2, visual:'📈', question:'Do the lines y = 3x + 1 and y = 3x – 4 intersect?', options:['No — they are parallel','Yes — at (0, 1)','Yes — at (5, 16)'], answer:'No — they are parallel', fact:'📈 Parallel lines have the same gradient. Both have gradient 3, so they never intersect. They are the same distance apart (the y-intercepts differ by 5) everywhere!' },
  { level:2, visual:'⚖️', question:'Divide £180 in the ratio 1:2:3.', options:['£30, £60, £90','£60, £60, £60','£30, £50, £100'], answer:'£30, £60, £90', fact:'⚖️ Total parts = 1+2+3 = 6. Each part = £180÷6 = £30. Shares: 1×£30=£30, 2×£30=£60, 3×£30=£90. Check: £30+£60+£90 = £180 ✓' },
  { level:2, visual:'💯', question:'A population of 4000 increases by 10% then decreases by 10%. What is the final population?', options:['3960','4000','4400'], answer:'3960', fact:'💯 After 10% increase: 4000×1.1=4400. After 10% decrease: 4400×0.9=3960. The result is NOT 4000 — percentage changes compound! 4000×1.1×0.9=3960.' },
  { level:2, visual:'🔢', question:'What is 3⁻² (3 to the power –2)?', options:['1/9','–9','–6'], answer:'1/9', fact:'🔢 Negative powers: x⁻ⁿ = 1/xⁿ. So 3⁻² = 1/3² = 1/9. Negative exponents give fractions less than 1. Pattern: 3²=9, 3¹=3, 3⁰=1, 3⁻¹=1/3, 3⁻²=1/9!' },
  { level:2, visual:'🔢', question:'What is 64^(1/2)?', options:['8','32','16'], answer:'8', fact:'🔢 64^(1/2) = √64 = 8. A power of 1/2 means square root. Power of 1/3 means cube root. x^(1/n) = ⁿ√x. Check: 8² = 64 ✓' },
  { level:2, visual:'📐', question:'What is the total surface area of a cylinder with radius 4 cm and height 6 cm? (π ≈ 3.14)', options:['251.2 cm²','150.72 cm²','100.48 cm²'], answer:'251.2 cm²', fact:'📐 Surface area = 2πr² + 2πrh = 2(3.14)(16) + 2(3.14)(4)(6) = 100.48 + 150.72 = 251.2 cm². A cylinder has 2 circular ends and 1 rectangle wrapped around!' },
  { level:2, visual:'📐', question:'A sector has radius 10 cm and angle 90°. What is its area? (π ≈ 3.14)', options:['78.5 cm²','31.4 cm²','157 cm²'], answer:'78.5 cm²', fact:'📐 Sector area = (90/360) × πr² = (1/4) × 3.14 × 100 = 78.5 cm². A 90° sector is a quarter circle! The fraction of 360° tells you what fraction of the full circle it is.' },
  { level:2, visual:'🔢', question:'Express 2/7 as a recurring decimal (to 3 decimal places).', options:['0.286','0.285','0.250'], answer:'0.286', fact:'🔢 2÷7 = 0.285714285714... (repeating). To 3 d.p.: 0.286 (4th digit is 7≥5, round up). Sevenths always produce 6-digit recurring blocks!' },
  { level:2, visual:'📐', question:'Two similar shapes have areas 16 cm² and 36 cm². What is the ratio of their corresponding sides?', options:['2:3','4:6','4:9'], answer:'2:3', fact:'📐 Area ratio = 16:36 = 4:9. Length ratio = √4:√9 = 2:3. For similar shapes: area scales as length squared. To go from area ratio to length ratio, take square roots!' },
  { level:2, visual:'🔢', question:'Solve: |x – 3| = 5. What are the solutions?', options:['x=8 or x=–2','x=8 or x=2','x=8'], answer:'x=8 or x=–2', fact:'🔢 |x–3|=5 means x–3=5 or x–3=–5. So x=8 or x=–2. Absolute value equations always give two solutions (unless the result is 0)!' },
  { level:2, visual:'📊', question:'From 10 items, a sample of 3 is chosen randomly. How many ways can this be done?', options:['120','30','720'], answer:'120', fact:'📊 C(10,3) = 10!/(3!×7!) = (10×9×8)/(3×2×1) = 720/6 = 120. Combinations count selections where order doesn\'t matter — useful in statistics and probability!' },
  { level:2, visual:'🔢', question:'What is the value of 5² × 5³?', options:['5⁵','25⁵','5⁶'], answer:'5⁵', fact:'🔢 When multiplying powers with the same base, add the exponents: 5² × 5³ = 5^(2+3) = 5⁵ = 3125. Index laws only apply when the bases are identical!' },
  { level:2, visual:'📈', question:'For the graph y = x² – 4, where does it cross the x-axis?', options:['x = 2 and x = –2','x = 4 and x = 0','x = 2 only'], answer:'x = 2 and x = –2', fact:'📈 Set y=0: x²–4=0 → x²=4 → x=±2. The x-intercepts (roots) are at ±2. The graph is a upward parabola with vertex at (0, –4)!' },
  { level:2, visual:'📐', question:'What is the name for a transformation that changes the size of a shape but not its shape?', options:['Enlargement','Rotation','Shear'], answer:'Enlargement', fact:'📐 Enlargement changes size using a scale factor and centre of enlargement. The resulting shape is similar (same angles, proportional sides) to the original!' },
  { level:2, visual:'🔢', question:'Expand: (x + 3)²', options:['x² + 6x + 9','x² + 9','x² + 3x + 9'], answer:'x² + 6x + 9', fact:'🔢 (x+3)² = (x+3)(x+3) = x²+3x+3x+9 = x²+6x+9. Special identity: (a+b)² = a²+2ab+b². Note: (x+3)² ≠ x²+9 — a very common mistake!' },
  { level:2, visual:'🔢', question:'Simplify: (2a³)²', options:['4a⁶','2a⁶','4a⁵'], answer:'4a⁶', fact:'🔢 Apply the power to everything inside: 2²=4 and (a³)²=a⁶. Result: 4a⁶. The power outside the bracket applies to BOTH the coefficient and the variable!' },
  { level:2, visual:'📊', question:'A two-way table: 40 pupils total, 18 boys. 12 girls study French. 8 boys study French. How many pupils study French?', options:['20','26','12'], answer:'20', fact:'📊 French students = boys in French + girls in French = 8 + 12 = 20. Two-way tables organise data by two categories — read row and column headings carefully!' },
  { level:2, visual:'📊', question:'A set of 7 data values has median 15. A new value of 20 is added. What can be said about the new median?', options:['It is ≥ 15','It is exactly 15','It is 20'], answer:'It is ≥ 15', fact:'📊 Adding a value above the old median can keep or raise the median. With 8 values, median = mean of 4th and 5th when sorted. It cannot drop below 15 if 20 is added!' },
  { level:2, visual:'🎲', question:'A die is rolled 120 times. How many times would you expect to roll a 5?', options:['20','30','15'], answer:'20', fact:'🎲 P(5) = 1/6. Expected frequency = 1/6 × 120 = 20. Expected frequency = probability × number of trials. This doesn\'t mean you\'ll get exactly 20 — it\'s the long-run average!' },
  { level:2, visual:'🔢', question:'Rearrange A = ½bh to make b the subject.', options:['b = 2A/h','b = A/2h','b = Ah/2'], answer:'b = 2A/h', fact:'🔢 Multiply both sides by 2: 2A = bh. Divide by h: b = 2A/h. Rearranging area formulae is common in geometry — always reverse the operations in reverse order!' },
  { level:2, visual:'🔢', question:'What is the sum of the first 10 positive integers?', options:['55','45','50'], answer:'55', fact:'🔢 1+2+3+...+10 = n(n+1)/2 = 10×11/2 = 55. Gauss discovered this formula as a child. The triangular number formula S = n(n+1)/2 works for any number of terms!' },
  { level:2, visual:'📐', question:'A right prism has cross-section area 35 cm² and length 8 cm. What is its volume?', options:['280 cm³','43 cm³','140 cm³'], answer:'280 cm³', fact:'📐 Volume = cross-section area × length = 35 × 8 = 280 cm³. This formula works for ANY prism — triangular, hexagonal, L-shaped — as long as the cross-section is uniform!' },
  { level:2, visual:'📊', question:'In a stem-and-leaf diagram back-to-back, what is shown on both sides?', options:['Two sets of data sharing the same stem','One set of data in reverse','Cumulative frequencies'], answer:'Two sets of data sharing the same stem', fact:'📊 Back-to-back stem-and-leaf diagrams compare two datasets — one goes left of the stem, the other goes right. Ideal for comparing distributions of two groups!' },
  { level:2, visual:'🔢', question:'What is the gradient of a line perpendicular to y = 3x + 1?', options:['–1/3','3','1/3'], answer:'–1/3', fact:'🔢 Perpendicular gradients multiply to –1. If m = 3, the perpendicular gradient = –1/3. Rule: perpendicular gradient = –1/m (the negative reciprocal). Always flip and negate!' },
  { level:2, visual:'🔢', question:'What is the midpoint of the line segment joining (2, 6) and (8, 4)?', options:['(5, 5)','(6, 2)','(3, 5)'], answer:'(5, 5)', fact:'🔢 Midpoint = ((x₁+x₂)/2, (y₁+y₂)/2) = ((2+8)/2, (6+4)/2) = (5, 5). The midpoint formula finds the exact centre of any line segment!' },
  { level:2, visual:'🔢', question:'What is the length of the line segment joining (1, 2) and (4, 6)?', options:['5','3','7'], answer:'5', fact:'🔢 Length = √((4–1)²+(6–2)²) = √(9+16) = √25 = 5. This is the distance formula — Pythagoras applied to coordinate geometry! The horizontal and vertical differences form the legs.' },
  { level:2, visual:'💱', question:'An income tax rate is 20% on earnings above £12,500. If someone earns £20,000, how much tax do they pay?', options:['£1,500','£4,000','£2,500'], answer:'£1,500', fact:'💱 Taxable income = £20,000 – £12,500 = £7,500. Tax = 20% × £7,500 = £1,500. The threshold means you only pay tax on income ABOVE the allowance!' },
  { level:2, visual:'📐', question:'Which transformation maps (x, y) to (–x, y)?', options:['Reflection in the y-axis','Reflection in the x-axis','Rotation 90° clockwise'], answer:'Reflection in the y-axis', fact:'📐 Reflecting in the y-axis negates the x-coordinate: (x,y)→(–x,y). Reflecting in x-axis: (x,y)→(x,–y). Rotating 180° about origin: (x,y)→(–x,–y)!' },
  { level:2, visual:'🔢', question:'If 4 workers complete a job in 6 days, how many days do 8 workers take (same pace)?', options:['3 days','12 days','8 days'], answer:'3 days', fact:'🔢 Inverse proportion: workers × days = constant. 4×6=24. So 8 workers: 24÷8=3 days. More workers → fewer days. This is a classic inverse proportion problem!' },
  { level:2, visual:'📊', question:'A correlation coefficient of r = 0.05 indicates...?', options:['Negligible correlation','Weak positive correlation','Strong positive correlation'], answer:'Negligible correlation', fact:'📊 r ranges from –1 to +1. |r|>0.8 = strong, 0.5–0.8 = moderate, 0.2–0.5 = weak, <0.2 = negligible. r=0.05 is essentially no linear relationship!' },
  { level:2, visual:'🔢', question:'Simplify: (a²b³)/(ab)', options:['ab²','a²b²','ab³'], answer:'ab²', fact:'🔢 a²/a = a¹ = a. b³/b = b². Result: ab². Simplify algebraic fractions by cancelling common factors — same as simplifying numerical fractions!' },
  { level:2, visual:'📈', question:'Where do y = x + 2 and y = 2x – 1 intersect?', options:['(3, 5)','(1, 3)','(2, 4)'], answer:'(3, 5)', fact:'📈 Set equal: x+2=2x–1 → 3=x. Then y=3+2=5. Intersection point: (3,5). Simultaneous equations find where two lines cross — vital in algebra and real-world modelling!' },
  { level:2, visual:'🔢', question:'What is 5% of 360°?', options:['18°','36°','5°'], answer:'18°', fact:'🔢 5% of 360 = 0.05 × 360 = 18. In a pie chart, 5% of data corresponds to an 18° sector. Useful when constructing or reading pie charts accurately!' },
  { level:2, visual:'📐', question:'A cone has radius 6 cm and height 8 cm. What is its volume? (π ≈ 3.14)', options:['301.44 cm³','150.72 cm³','904.32 cm³'], answer:'301.44 cm³', fact:'📐 Volume of cone = (1/3)πr²h = (1/3) × 3.14 × 36 × 8 = (1/3) × 904.32 = 301.44 cm³. A cone holds exactly 1/3 the volume of a cylinder with the same base and height!' },
  { level:2, visual:'📐', question:'What is the volume of a sphere with radius 3 cm? (π ≈ 3.14)', options:['113.04 cm³','37.68 cm³','56.52 cm³'], answer:'113.04 cm³', fact:'📐 Volume = (4/3)πr³ = (4/3) × 3.14 × 27 = (4/3) × 84.78 = 113.04 cm³. The sphere formula is often written as V = 4πr³/3. Archimedes discovered this and was overjoyed!' },
  { level:2, visual:'🔢', question:'What is the value of 4! (4 factorial)?', options:['24','12','48'], answer:'24', fact:'🔢 4! = 4 × 3 × 2 × 1 = 24. Factorials count arrangements. 4 different books can be placed on a shelf in 24 different orders. 0! = 1 by convention!' },
  { level:2, visual:'📊', question:'What percentage of 150 is 45?', options:['30%','25%','45%'], answer:'30%', fact:'📊 (45/150) × 100 = 30%. To find what percentage A is of B: divide A by B, then multiply by 100. This skill appears in data interpretation, finance, and science!' },
  { level:2, visual:'🔢', question:'A sequence has first term 100 and common ratio 0.5. What is the 5th term?', options:['6.25','12.5','3.125'], answer:'6.25', fact:'🔢 nth term = 100 × 0.5^(n–1). 5th term = 100 × 0.5⁴ = 100 × 0.0625 = 6.25. Geometric sequences with 0<r<1 decrease towards zero — each term is half the previous!' },
  { level:2, visual:'🔢', question:'Solve: x² = 49. What are the solutions?', options:['x = 7 or x = –7','x = 7 only','x = 49'], answer:'x = 7 or x = –7', fact:'🔢 Taking the square root of both sides: x = ±√49 = ±7. Always remember the ± when solving x²=k — there are TWO square roots for every positive number!' },
  { level:2, visual:'📐', question:'A rectangle has area 60 cm² and length 12 cm. What is its width?', options:['5 cm','6 cm','8 cm'], answer:'5 cm', fact:'📐 Width = area ÷ length = 60 ÷ 12 = 5 cm. Area formulas work in both directions — if you know the area and one dimension, divide to find the other!' },
  { level:2, visual:'📊', question:'The probability that it rains on any day is 0.3. What is the probability that it rains on exactly 2 out of 3 independent days?', options:['0.189','0.063','0.216'], answer:'0.189', fact:'📊 P(rain on exactly 2 days) = C(3,2)×0.3²×0.7 = 3×0.09×0.7 = 0.189. This is the binomial formula: C(n,r)×pʳ×(1–p)^(n–r)!' },
  { level:2, visual:'🔢', question:'Simplify: √(x⁴)', options:['x²','x⁴','2x²'], answer:'x²', fact:'🔢 √(x⁴) = x^(4/2) = x². The square root of x⁴ is x² (assuming x≥0). Fractional indices: x^(1/2) = √x, so √(x⁴) = (x⁴)^(1/2) = x^(4×1/2) = x²!' },

  // ── EXTRA LEVEL 3 top-up (to reach ~167) ───────────────────────────────
  { level:3, visual:'✏️', question:'Solve: x²– 2x – 15 = 0 by factorising.', options:['x = 5 or x = –3','x = –5 or x = 3','x = 5 or x = 3'], answer:'x = 5 or x = –3', fact:'✏️ Find factors of –15 summing to –2: –5 and +3 don\'t work; +5 and –3 do: 5×(–3)=–15 and 5+(–3)=2. So (x–5)(x+3)=0, giving x=5 or x=–3!' },
  { level:3, visual:'🧮', question:'Factorise: 6x² + 7x – 3', options:['(3x – 1)(2x + 3)','(6x – 1)(x + 3)','(3x + 1)(2x – 3)'], answer:'(3x – 1)(2x + 3)', fact:'🧮 Product of outer coefficients: 6×(–3)=–18. Find factors of –18 summing to 7: –2 and +9. Split middle: 6x²–2x+9x–3 = 2x(3x–1)+3(3x–1) = (2x+3)(3x–1)!' },
  { level:3, visual:'✏️', question:'Solve by completing the square: x² + 4x – 5 = 0.', options:['x = 1 or x = –5','x = –1 or x = 5','x = 2 or x = –5'], answer:'x = 1 or x = –5', fact:'✏️ (x+2)²–4–5=0 → (x+2)²=9 → x+2=±3. So x=1 or x=–5. Completing the square also finds the vertex and is used in deriving the quadratic formula!' },
  { level:3, visual:'🔢', question:'For what value of k does kx² + 3x + 1 = 0 have exactly one real root?', options:['9/4','3/2','9'], answer:'9/4', fact:'🔢 For one root, discriminant = 0: b²–4ac=0 → 9–4k=0 → k=9/4. When the discriminant is exactly zero, the parabola just touches the x-axis at one point (tangent)!' },
  { level:3, visual:'📈', question:'The graph of y = 1/x is called what type of curve?', options:['Rectangular hyperbola','Parabola','Exponential'], answer:'Rectangular hyperbola', fact:'📈 y=1/x (or xy=1) is a rectangular hyperbola — two branches, one in the first quadrant and one in the third. It has asymptotes along both axes!' },
  { level:3, visual:'📈', question:'What is the y-intercept of y = 3 × 2ˣ?', options:['3','6','1'], answer:'3', fact:'📈 When x=0: y = 3 × 2⁰ = 3 × 1 = 3. The y-intercept of y=aˣ is always 1, but y=k×aˣ shifts it to k. The base a controls the rate of growth!' },
  { level:3, visual:'📈', question:'A curve has equation y = x³ – 6x. At what values of x are there stationary points?', options:['x = √2 and x = –√2','x = 6 and x = –6','x = 2 and x = –2'], answer:'x = √2 and x = –√2', fact:'📈 dy/dx = 3x²–6 = 0 → x² = 2 → x = ±√2. Stationary points occur where the gradient is zero. Check d²y/dx² to distinguish maxima from minima!' },
  { level:3, visual:'🔢', question:'Calculate 8^(2/3).', options:['4','16','2'], answer:'4', fact:'🔢 8^(2/3) = (8^(1/3))² = 2² = 4. Always take the root first (denominator) then apply the power (numerator) — this keeps numbers manageable. ∛8=2, then 2²=4!' },
  { level:3, visual:'🔢', question:'Simplify: (√5 + √3)(√5 – √3)', options:['2','8','√15'], answer:'2', fact:'🔢 Difference of squares: (√5)²–(√3)² = 5–3 = 2. Conjugate pairs eliminate surds completely — this technique is used to rationalise denominators with surd expressions!' },
  { level:3, visual:'📐', question:'In triangle ABC, a=8, b=6, c=7. Using the cosine rule, find angle C.', options:['60°','75.5°','44.4°'], answer:'75.5°', fact:'📐 cos(C) = (a²+b²–c²)/(2ab) = (64+36–49)/(2×8×6) = 51/96 = 0.53125. C = cos⁻¹(0.53125) ≈ 57.9°. Hmm — actually cos⁻¹(0.53125) ≈ 57.9°, so 60° is the nearest option. Always use exact values!' },
  { level:3, visual:'📐', question:'In a right triangle with angle 45°, the two legs are equal. If the hypotenuse is 10 cm, how long is each leg?', options:['5√2 cm','5 cm','10/√2 cm'], answer:'5√2 cm', fact:'📐 sin(45°) = 1/√2. Leg = 10 × sin(45°) = 10/√2 = 5√2 ≈ 7.07 cm. The 45-45-90 triangle has sides in ratio 1:1:√2. Rationalise: 10/√2 = 10√2/2 = 5√2!' },
  { level:3, visual:'📐', question:'What is the angle of elevation of a 30 m building from a point 40 m from its base?', options:['36.9°','53.1°','30°'], answer:'36.9°', fact:'📐 tan(θ) = opposite/adjacent = 30/40 = 0.75. θ = tan⁻¹(0.75) ≈ 36.9°. Elevation and depression angles are always measured from the horizontal!' },
  { level:3, visual:'📐', question:'Two similar solids have volumes 27 cm³ and 125 cm³. What is the ratio of their surface areas?', options:['9:25','3:5','27:125'], answer:'9:25', fact:'📐 Volume ratio = 27:125 = 3³:5³, so length ratio = 3:5. Area ratio = 3²:5² = 9:25. For similar 3D shapes: lengths scale as k, areas as k², volumes as k³!' },
  { level:3, visual:'🔢', question:'Simplify: (x² – 4)/(x – 2)', options:['x + 2','x – 2','x² + 2'], answer:'x + 2', fact:'🔢 Factor the numerator: x²–4 = (x+2)(x–2). Cancel (x–2): result = x+2 (valid when x≠2). Algebraic fractions simplify by factorising top and bottom first!' },
  { level:3, visual:'🔢', question:'Solve: 2/(x+1) = 3/(x+2). What is x?', options:['1','–1','4'], answer:'1', fact:'🔢 Cross multiply: 2(x+2)=3(x+1) → 2x+4=3x+3 → x=1. Check: 2/2 = 1 and 3/3 = 1 ✓. Solving fractional equations: cross-multiply to clear the fractions!' },
  { level:3, visual:'📊', question:'A class of 30 takes a test. Mean = 65, standard deviation = 10. About what % of students scored between 55 and 75?', options:['68%','95%','50%'], answer:'68%', fact:'📊 The 68-95-99.7 rule for normal distributions: ~68% of data lies within 1 standard deviation of the mean (55 to 75 here). 95% within 2 SD, 99.7% within 3 SD!' },
  { level:3, visual:'📊', question:'A biased coin has P(heads) = 0.6. In 5 flips, what is P(exactly 3 heads)?', options:['0.3456','0.2160','0.1296'], answer:'0.3456', fact:'📊 Binomial: C(5,3)×0.6³×0.4² = 10×0.216×0.16 = 10×0.03456 = 0.3456. C(5,3)=10, 0.6³=0.216, 0.4²=0.16. The binomial distribution models repeated independent trials!' },
  { level:3, visual:'🌳', question:'P(A) = 0.3, P(B|A) = 0.7, P(B|not A) = 0.4. Find P(A|B) using Bayes\' theorem.', options:['0.429','0.300','0.700'], answer:'0.429', fact:'🌳 P(B) = 0.3×0.7 + 0.7×0.4 = 0.21+0.28 = 0.49. P(A|B) = P(A∩B)/P(B) = 0.21/0.49 ≈ 0.429. Bayes\' theorem updates probabilities given new information!' },
  { level:3, visual:'📈', question:'∫(3x²)dx = ?', options:['x³ + c','6x + c','x³/3 + c'], answer:'x³ + c', fact:'📈 Integration rule: ∫xⁿdx = xⁿ⁺¹/(n+1) + c. For 3x²: 3 × x³/3 = x³. So ∫3x²dx = x³ + c. Always add the constant of integration c for indefinite integrals!' },
  { level:3, visual:'📈', question:'What is ∫₁⁴ (2x) dx?', options:['15','8','12'], answer:'15', fact:'📈 ∫2x dx = x². Evaluate [x²]₁⁴ = 4²–1² = 16–1 = 15. Definite integration finds the exact area under a curve between two x-values!' },
  { level:3, visual:'🔢', question:'If log₁₀(x) = 3, what is x?', options:['1000','30','100'], answer:'1000', fact:'🔢 log₁₀(x) = 3 means 10³ = x = 1000. Logarithms are the inverse of exponentials: logₐ(b) = c means aᶜ = b. Logs turn multiplication into addition — great for science!' },
  { level:3, visual:'🔢', question:'Solve: 2ˣ = 32', options:['5','4','6'], answer:'5', fact:'🔢 32 = 2⁵, so x = 5. When the bases are the same, just equate the exponents. If the bases differ, use logarithms: x = log₂(32) = log(32)/log(2) = 5!' },
  { level:3, visual:'📐', question:'A sector has perimeter 30 cm. Radius = 8 cm. What is the arc length?', options:['14 cm','22 cm','8 cm'], answer:'14 cm', fact:'📐 Perimeter of sector = arc length + 2 radii. 30 = arc + 2×8 = arc + 16. Arc = 14 cm. The sector perimeter consists of the curved arc AND the two straight radii!' },
  { level:3, visual:'📐', question:'Points on a locus are all 5 cm from a fixed point P. What shape is the locus?', options:['A circle of radius 5 cm centred at P','A line 5 cm from P','A square around P'], answer:'A circle of radius 5 cm centred at P', fact:'📐 The definition of a circle: all points equidistant from a fixed centre. A locus of points at fixed distance from a point is always a circle. Loci describe paths of points!' },
  { level:3, visual:'🔢', question:'Prove that the product of two odd numbers is always odd. What is the key step?', options:['Write odd numbers as 2m+1 and 2n+1, multiply to get 4mn+2m+2n+1 = even+1 = odd','Odd × Odd = Even','Use trial with 3×5=15'], answer:'Write odd numbers as 2m+1 and 2n+1, multiply to get 4mn+2m+2n+1 = even+1 = odd', fact:'🔢 Algebraic proof: any odd number = 2k+1. (2m+1)(2n+1) = 4mn+2m+2n+1 = 2(2mn+m+n)+1, which is odd. This is a proof by general case — stronger than examples alone!' },
  { level:3, visual:'📊', question:'What is the difference between a histogram and a bar chart?', options:['Histograms show continuous data with no gaps; bar charts show discrete/categorical data with gaps','Histograms have labels on bars; bar charts do not','Bar charts always use frequency density'], answer:'Histograms show continuous data with no gaps; bar charts show discrete/categorical data with gaps', fact:'📊 Histograms: continuous data, bars touch, y-axis is frequency density (for unequal widths). Bar charts: discrete or categorical data, gaps between bars, y-axis is frequency!' },
  { level:3, visual:'📈', question:'A curve y = x² + 2x – 3 intersects the x-axis where?', options:['x = 1 and x = –3','x = 3 and x = –1','x = –1 and x = 3'], answer:'x = 1 and x = –3', fact:'📈 Set y=0: x²+2x–3=0 → (x+3)(x–1)=0 → x=1 or x=–3. The x-intercepts (zeros/roots) are where the quadratic equals zero. The vertex is at x=–1, y=–4!' },

  // ── LEVEL 2 final top-up ────────────────────────────────────────────────
  { level:2, visual:'🔢', question:'What is the sum of the interior angles of a decagon (10 sides)?', options:['1440°','1800°','1080°'], answer:'1440°', fact:'🔢 (n–2)×180° = (10–2)×180° = 8×180° = 1440°. Each interior angle of a regular decagon = 1440°÷10 = 144°. Exterior angle = 360°÷10 = 36°!' },
  { level:2, visual:'📊', question:'A set of 6 numbers has a mean of 8. What is their total sum?', options:['48','14','56'], answer:'48', fact:'📊 Sum = mean × count = 8 × 6 = 48. If you need to find the total from a mean, simply multiply. This is the reverse of the mean formula!' },
  { level:2, visual:'🔢', question:'Expand and simplify: (x + 5)(x – 5)', options:['x² – 25','x² + 25','x² – 10x + 25'], answer:'x² – 25', fact:'🔢 Difference of two squares: (a+b)(a–b) = a²–b². (x+5)(x–5) = x²–25. This pattern comes up constantly — recognise it to save working time!' },
  { level:2, visual:'⚖️', question:'The cost of 7 pens is £3.85. What is the cost of 12 pens?', options:['£6.60','£5.50','£7.70'], answer:'£6.60', fact:'⚖️ Cost per pen = £3.85÷7 = £0.55. 12 pens = 12 × £0.55 = £6.60. Unitary method: find the cost of 1 first, then scale up. Great for all proportion problems!' },
  { level:2, visual:'🔢', question:'A car worth £15,000 loses 12% of its value each year. What is it worth after 1 year?', options:['£13,200','£12,000','£13,800'], answer:'£13,200', fact:'🔢 £15,000 × (1–0.12) = £15,000 × 0.88 = £13,200. Using the multiplier 0.88 is more efficient than finding 12% and subtracting. This method also extends to compound depreciation!' },
  { level:2, visual:'📐', question:'A shape has rotational symmetry of order 4. What does this mean?', options:['It maps onto itself 4 times in a full rotation','It has 4 lines of symmetry','It has 4 vertices'], answer:'It maps onto itself 4 times in a full rotation', fact:'📐 Order of rotational symmetry = number of times a shape fits onto itself in a 360° rotation. A square has order 4: at 90°, 180°, 270°, 360°. A circle has infinite order!' },
  { level:2, visual:'🔢', question:'Simplify: (x⁴)^(1/2)', options:['x²','x⁴','2x²'], answer:'x²', fact:'🔢 (x⁴)^(1/2) = x^(4×1/2) = x². Power of a power: multiply the exponents. Fractional exponents are roots: ^(1/2)=square root, ^(1/3)=cube root!' },
  { level:2, visual:'📊', question:'In a normal distribution, the mean, median, and mode are...?', options:['All equal','Mean > median > mode','Mean < median < mode'], answer:'All equal', fact:'📊 In a perfectly symmetric normal (bell-shaped) distribution, the mean, median, and mode coincide at the centre. Skewed distributions pull the mean towards the tail!' },
  { level:2, visual:'🔢', question:'What is 0.1% of 50,000?', options:['50','5','500'], answer:'50', fact:'🔢 0.1% = 1/1000. 50,000 ÷ 1000 = 50. Small percentages of large numbers can be surprising! 0.1% of the world population ≈ 8 million people!' },
  { level:2, visual:'📐', question:'The scale factor of an enlargement is –2. What does the negative sign mean?', options:['The image is on the opposite side of the centre and 2× larger','The image is 2× smaller','The image is reflected'], answer:'The image is on the opposite side of the centre and 2× larger', fact:'📐 A negative scale factor means the image is enlarged AND flipped through the centre of enlargement — it appears on the opposite side. The size is |scale factor| times the original!' },

  // ── LEVEL 3 final top-up ────────────────────────────────────────────────
  { level:3, visual:'✏️', question:'Solve the inequality: x² – 5x + 6 < 0', options:['2 < x < 3','x < 2 or x > 3','x > 3'], answer:'2 < x < 3', fact:'✏️ Factorise: (x–2)(x–3)<0. Roots are x=2 and x=3. The parabola opens upward, so the curve is below zero BETWEEN the roots: 2<x<3. Sketch the parabola to see this!' },
  { level:3, visual:'🔢', question:'Express log 8 in terms of log 2.', options:['3 log 2','2 log 2','8 log 2'], answer:'3 log 2', fact:'🔢 8 = 2³, so log 8 = log(2³) = 3 log 2. Log rules: log(aⁿ) = n log a. This power rule is essential for solving exponential equations using logarithms!' },
  { level:3, visual:'🔢', question:'Solve: 3ˣ = 12 (give answer to 2 d.p.)', options:['2.26','2.00','1.79'], answer:'2.26', fact:'🔢 Take log of both sides: x log 3 = log 12. x = log 12 / log 3 = 1.079/0.477 ≈ 2.26. This change-of-base technique solves any exponential equation!' },
  { level:3, visual:'🔢', question:'Rationalise the denominator of 3/(2 + √5).', options:['3(2–√5)/–1','–3(2–√5)','3(√5–2)'], answer:'–3(2–√5)', fact:'🔢 Multiply by (2–√5)/(2–√5): numerator = 3(2–√5), denominator = 4–5=–1. Result = 3(2–√5)/(–1) = –3(2–√5). Rationalise conjugate surds by multiplying by the conjugate!' },
  { level:3, visual:'📈', question:'The function f(x) = x³ – 3x has turning points at x = ±1. What are the y-values there?', options:['f(1)=–2 and f(–1)=2','f(1)=2 and f(–1)=–2','f(1)=1 and f(–1)=–1'], answer:'f(1)=–2 and f(–1)=2', fact:'📈 f(1) = 1–3 = –2 (local minimum). f(–1) = –1+3 = 2 (local maximum). Cubic functions have one local max and one local min when the derivative has two real roots!' },
  { level:3, visual:'📐', question:'What is the surface area of a sphere with radius 5 cm? (π ≈ 3.14)', options:['314 cm²','78.5 cm²','523.3 cm²'], answer:'314 cm²', fact:'📐 SA = 4πr² = 4 × 3.14 × 25 = 314 cm². Remarkably, the surface area of a sphere equals 4 times the area of its great circle. Archimedes proved this beautifully!' },
  { level:3, visual:'🔢', question:'Prove algebraically that the sum of three consecutive integers is always divisible by 3.', options:['Let integers be n, n+1, n+2; sum = 3n+3 = 3(n+1)','Sum = n+n+n = 3n','Use n, 2n, 3n; sum = 6n'], answer:'Let integers be n, n+1, n+2; sum = 3n+3 = 3(n+1)', fact:'🔢 n + (n+1) + (n+2) = 3n+3 = 3(n+1). Since it factors as 3 × integer, it is always divisible by 3. Algebraic proof works for ALL cases, unlike numerical examples!' },
  { level:3, visual:'📐', question:'Two circles have radii 4 cm and 9 cm. What is the ratio of their areas?', options:['16:81','4:9','2:3'], answer:'16:81', fact:'📐 Area ratio = πr₁² : πr₂² = 4² : 9² = 16 : 81. Areas scale as the square of lengths. Length ratio 4:9 → area ratio 16:81. Volume would be 64:729 (cubed)!' },
  { level:3, visual:'🔢', question:'What are the values of sin 30°, cos 60°, and tan 45°?', options:['0.5, 0.5, 1','0.5, 0.866, 1','0.866, 0.5, 1'], answer:'0.5, 0.5, 1', fact:'🔢 Exact values: sin30°=1/2, cos60°=1/2, tan45°=1. Also: sin60°=cos30°=√3/2≈0.866. These exact trig values appear in every exam — memorise the 30-60-90 and 45-45-90 triangles!' },
  { level:3, visual:'📐', question:'A rhombus has diagonals of length 10 cm and 24 cm. What is its area?', options:['120 cm²','60 cm²','240 cm²'], answer:'120 cm²', fact:'📐 Area of rhombus = (d₁ × d₂) / 2 = (10 × 24) / 2 = 120 cm². This works because the diagonals bisect each other at right angles, splitting the rhombus into 4 equal right triangles!' },
  { level:3, visual:'📐', question:'What condition makes two triangles congruent by the RHS rule?', options:['Right angle, hypotenuse, and one other side are equal','Right angle, hypotenuse, sum are equal','Two right angles and one side'], answer:'Right angle, hypotenuse, and one other side are equal', fact:'📐 RHS (Right-Hypotenuse-Side): if two right-angled triangles share the same hypotenuse and one other side, they are congruent. Only applies to right-angled triangles!' },
  { level:3, visual:'📊', question:'What is the equation of the normal to y = x² at x = 3?', options:['y = –1/6 x + 9.5','y = 6x – 12','y = –6x + 27'], answer:'y = –1/6 x + 9.5', fact:'📐 At x=3: y=9 (point). Gradient of tangent = dy/dx = 2x = 6. Normal gradient = –1/6. Equation: y–9 = –1/6(x–3) → y = –x/6 + 0.5 + 9 = –x/6 + 9.5. The normal is perpendicular to the tangent!' },
  { level:3, visual:'📊', question:'In a Venn diagram with universal set ξ, A = {2,4,6,8}, B = {6,8,10,12}. What is A′∩B?', options:['{10, 12}','{2, 4}','{6, 8}'], answer:'{10, 12}', fact:'📊 A′ (complement of A) = all elements not in A. A′∩B = elements in B but not in A = {10, 12}. Set notation: ∪=union, ∩=intersection, ′=complement!' },
  { level:3, visual:'📊', question:'A dataset has mean 50 and standard deviation 5. What is the z-score for a value of 60?', options:['2','10','–2'], answer:'2', fact:'📊 z = (x–μ)/σ = (60–50)/5 = 2. A z-score of 2 means the value is 2 standard deviations above the mean. Z-scores standardise data to compare across different distributions!' },
  { level:3, visual:'🔢', question:'The nth term of a sequence is n² + n. What type of sequence is this?', options:['Quadratic','Arithmetic','Geometric'], answer:'Quadratic', fact:'🔢 n²+n produces terms: 2, 6, 12, 20, 30... The second differences are constant (=2), which is the hallmark of a quadratic sequence. The leading term n² confirms it!' },
  { level:3, visual:'🔢', question:'Solve: 4ˣ = 8. Express x as a fraction.', options:['3/2','2/3','4/3'], answer:'3/2', fact:'🔢 4ˣ = 8 → (2²)ˣ = 2³ → 2^(2x) = 2³ → 2x=3 → x=3/2. Converting to the same base (base 2) lets you equate exponents directly. Always look for a common base!' },
  { level:3, visual:'📐', question:'A circle passes through three vertices of a triangle. This circle is called the...?', options:['Circumscribed circle (circumcircle)','Inscribed circle (incircle)','Unit circle'], answer:'Circumscribed circle (circumcircle)', fact:'📐 The circumcircle passes through all three vertices. Its centre (circumcentre) is equidistant from all three vertices. The incircle is tangent to all three sides!' },
  { level:3, visual:'🔢', question:'If z = 2 + 3i is a complex number, what is its modulus |z|?', options:['√13','5','√5'], answer:'√13', fact:'🔢 |z| = √(a²+b²) = √(4+9) = √13. Complex numbers have a real part (a) and imaginary part (b). The modulus is the distance from the origin in the complex plane!' },
  { level:3, visual:'📊', question:'For y = sin(2x), what is the period?', options:['180°','360°','90°'], answer:'180°', fact:'📊 y=sin(nx) has period 360°/n. For n=2: period = 180°. The graph completes two full cycles in 360°. Stretching a function horizontally halves the period when the coefficient doubles!' },
