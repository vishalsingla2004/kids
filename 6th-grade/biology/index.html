  { level:2, visual:'🔬', question:'What is a tissue type and name four in the human body?', options:['A group of cells with similar structure performing the same function — e.g. epithelial, connective, muscle and nervous tissue','Individual specialised cells like neurons and red blood cells','A group of different organs working together for a function'], answer:'A group of cells with similar structure performing the same function — e.g. epithelial, connective, muscle and nervous tissue', fact:'🔬 Epithelial tissue lines surfaces (intestine, lungs, skin). Connective tissue supports and connects (bone, cartilage, blood, fat). Muscle tissue contracts (skeletal, smooth, cardiac). Nervous tissue conducts impulses (neurons, glia)!' },
  { level:2, visual:'🧬', question:'What is gene expression and how can it be regulated?', options:['Gene expression is when a gene is transcribed into mRNA and translated into protein — regulated by transcription factors, promoters, epigenetic marks and mRNA stability','Gene expression occurs in all cells at all times — every gene is always active','Gene expression refers only to whether a mutation is dominant or recessive'], answer:'Gene expression is when a gene is transcribed into mRNA and translated into protein — regulated by transcription factors, promoters, epigenetic marks and mRNA stability', fact:'🧬 All your cells have the same DNA, but a liver cell expresses liver-specific genes while a neuron expresses neuron-specific genes. During development, differential gene expression creates the 200+ cell types in your body!' },
  { level:2, visual:'🌊', question:'What is the difference between the sympathetic "fight or flight" response and the normal resting state?', options:['Fight or flight: increased heart rate, dilated pupils, bronchodilation, reduced digestion, increased sweating; resting: decreased heart rate, constricted pupils, bronchoconstriction, active digestion','Fight or flight slows metabolism to conserve energy; resting state maximises metabolic rate','Both states maintain identical physiological parameters — only behaviour changes'], answer:'Fight or flight: increased heart rate, dilated pupils, bronchodilation, reduced digestion, increased sweating; resting: decreased heart rate, constricted pupils, bronchoconstriction, active digestion', fact:'🌊 The adrenal medulla releases adrenaline (epinephrine) to amplify the sympathetic response within seconds. Chronic stress keeps the sympathetic system active — causing health problems like high blood pressure and suppressed immune function!' },
  { level:2, visual:'🌿', question:'What are the main differences between plant hormones (auxin, gibberellin, abscisic acid)?', options:['Auxin: promotes shoot elongation, phototropism; gibberellin: promotes stem growth and seed germination; abscisic acid (ABA): closes stomata, causes dormancy in dry/cold conditions','All three promote growth; the differences are only which tissues they act on','Auxin is produced in roots; gibberellin in seeds; ABA only in leaves during drought'], answer:'Auxin: promotes shoot elongation, phototropism; gibberellin: promotes stem growth and seed germination; abscisic acid (ABA): closes stomata, causes dormancy in dry/cold conditions', fact:'🌿 ABA is the "stress hormone" of plants — it closes stomata during drought, preventing water loss. Gibberellins in commercial agriculture make celery grow taller (better yields) and wake dormant seeds before planting!' },
  { level:2, visual:'🔬', question:'What is gel electrophoresis and what biological information can it give?', options:['Separates molecules (DNA/proteins) by size through a gel using an electric current — smaller molecules travel further; used for DNA fingerprinting, disease diagnosis and evolutionary comparisons','Creates three-dimensional images of proteins to determine their shape and function','Sequences DNA by adding one base at a time and measuring light signals'], answer:'Separates molecules (DNA/proteins) by size through a gel using an electric current — smaller molecules travel further; used for DNA fingerprinting, disease diagnosis and evolutionary comparisons', fact:'🔬 Forensic DNA profiling from gel electrophoresis has overturned hundreds of wrongful convictions. The pattern of bands is unique to each individual (except identical twins). Even a few cells from a crime scene provide enough DNA!' },
  { level:2, visual:'💉', question:'What is the role of lymphocytes in the specific immune response?', options:['B lymphocytes produce antibodies targeting specific antigens; T lymphocytes directly kill infected cells (cytotoxic T cells) or coordinate the immune response (helper T cells)','Lymphocytes engulf and digest pathogens by phagocytosis','All lymphocytes produce non-specific proteins that kill any pathogen they encounter'], answer:'B lymphocytes produce antibodies targeting specific antigens; T lymphocytes directly kill infected cells (cytotoxic T cells) or coordinate the immune response (helper T cells)', fact:'💉 Helper T cells (CD4+) are the "generals" — they activate both B cells and cytotoxic T cells. HIV destroys these cells, collapsing the entire adaptive immune response and causing AIDS!' },
  { level:2, visual:'🧫', question:'What is the role of hormones in puberty?', options:['Testosterone (males) triggers voice deepening, body hair, muscle growth, sperm production; oestrogen and progesterone (females) trigger breast development, menstruation, and reproductive maturation','The same hormone triggers puberty in all sexes — only the target organs differ','Growth hormone triggers puberty in both sexes — sex hormones are only involved in reproduction'], answer:'Testosterone (males) triggers voice deepening, body hair, muscle growth, sperm production; oestrogen and progesterone (females) trigger breast development, menstruation, and reproductive maturation', fact:'🧫 Puberty is triggered by GnRH from the hypothalamus → LH and FSH from pituitary → sex hormone production from gonads. The entire hormonal cascade is the same in both sexes — only the target organs and hormones produced differ!' },
  { level:2, visual:'🌱', question:'What is the difference between a plant\'s response to a stimulus (tropism) vs an animal\'s?', options:['Plants respond slowly by differential growth (controlled by hormones like auxin); animals respond rapidly via the nervous system (nerve impulses and muscles)','Plants and animals both use nerve impulses — but plants have smaller, slower neurons','Plants can move faster than animals because they don\'t need to coordinate complex muscles'], answer:'Plants respond slowly by differential growth (controlled by hormones like auxin); animals respond rapidly via the nervous system (nerve impulses and muscles)', fact:'🌱 A plant response to light (phototropism) takes hours/days as cells on one side grow more. An animal reflex takes 0.1–0.2 seconds via nerve impulses. Speed vs. precision: animals need fast responses; plants need slow, sustained growth changes!' },
  { level:2, visual:'🦠', question:'What is horizontal gene transfer (HGT) and why is it significant for antibiotic resistance?', options:['Bacteria share genes between species directly (not via reproduction) using plasmids, transduction or conjugation — spreads antibiotic resistance genes across species rapidly','Genes passed between generations — from parent bacterium to daughter cells','The transfer of mitochondrial DNA between eukaryotic cells'], answer:'Bacteria share genes between species directly (not via reproduction) using plasmids, transduction or conjugation — spreads antibiotic resistance genes across species rapidly', fact:'🦠 HGT means a resistance gene can spread from harmless gut bacteria to a dangerous pathogen in hours! In a hospital, resistant E. coli can share plasmids with Klebsiella, creating multi-drug resistant strains. This is why antibiotic stewardship matters!' },
  { level:2, visual:'🌿', question:'What are biofuels and what are the pros and cons of using them?', options:['Fuels derived from recently living organisms (bioethanol from maize/sugarcane, biodiesel from rapeseed) — pros: carbon-neutral, renewable; cons: compete with food crops, require large land areas','Nuclear fuels derived from biological isotopes in living organisms — pros: high energy density','Fossil fuels formed over millions of years — classified as biological because they came from organisms'], answer:'Fuels derived from recently living organisms (bioethanol from maize/sugarcane, biodiesel from rapeseed) — pros: carbon-neutral, renewable; cons: compete with food crops, require large land areas', fact:'🌿 Bioethanol from sugarcane in Brazil replaced 40% of petrol use. However, converting rainforest to sugar cane plantations releases more CO₂ than the fuel saves! Algae biofuels could solve the land competition problem — algae grow in seawater!' },
  { level:2, visual:'🔬', question:'What is convergent evolution and give two examples?', options:['Independent evolution of similar features in unrelated species due to similar environmental pressures — e.g. streamlined bodies in dolphins and sharks, wings in bats and birds','The evolution of the same species in different directions due to geographic isolation','The inheritance of the same ancestral trait in two closely related species'], answer:'Independent evolution of similar features in unrelated species due to similar environmental pressures — e.g. streamlined bodies in dolphins and sharks, wings in bats and birds', fact:'🔬 Dolphins and sharks evolved similar body shapes independently for the same reason — hydrodynamic efficiency in water. Eyes evolved independently at least 50 times! This is analogous structures vs. homologous structures — same function, different origin!' },
  { level:2, visual:'🧫', question:'What is a climax community in ecological succession?', options:['The stable, self-sustaining community that develops at the end of succession — e.g. oak woodland in temperate Britain — when the ecosystem is in equilibrium','The first community to colonise a bare habitat (pioneer community)','A community that cycles between two stable states depending on weather patterns'], answer:'The stable, self-sustaining community that develops at the end of succession — e.g. oak woodland in temperate Britain — when the ecosystem is in equilibrium', fact:'🧫 Climax communities are stable but not static — trees fall and are replaced, populations fluctuate. Fire, disease or human activity can reset succession. Without disturbance, most temperate areas in Britain would eventually become oak woodland!' },
  { level:2, visual:'🌊', question:'What is the difference between a pyramid of numbers, biomass and energy?', options:['Numbers: organisms per trophic level (can invert); biomass: total mass per level (usually pyramidal); energy: total energy per level (always pyramid-shaped — energy ALWAYS decreases up the chain)','All three pyramids are always the same shape','Pyramids of energy can be inverted; pyramids of numbers are always pyramid-shaped'], answer:'Numbers: organisms per trophic level (can invert); biomass: total mass per level (usually pyramidal); energy: total energy per level (always pyramid-shaped — energy ALWAYS decreases up the chain)', fact:'🌊 An energy pyramid is ALWAYS the correct shape because of the second law of thermodynamics — energy is ALWAYS lost (as heat) at each trophic level. About 90% is lost, so only 10% passes to the next level!' },
  { level:2, visual:'🧬', question:'What is polymerase chain reaction (PCR) and what are its three key steps?', options:['PCR amplifies DNA: 1) Denaturation (94°C, separates strands); 2) Annealing (55°C, primers bind); 3) Extension (72°C, Taq polymerase extends new strand)','PCR sequences DNA: 1) Transcription into mRNA; 2) Translation into protein; 3) Protein sequencing','PCR edits DNA: 1) Guide RNA targets sequence; 2) Cas9 cuts; 3) New sequence inserted'], answer:'PCR amplifies DNA: 1) Denaturation (94°C, separates strands); 2) Annealing (55°C, primers bind); 3) Extension (72°C, Taq polymerase extends new strand)', fact:'🧬 Taq polymerase (from hot-spring bacterium Thermus aquaticus) can withstand the 94°C denaturation step — mesophilic enzymes would denature immediately. After 30 cycles, one DNA molecule becomes 1 billion copies!' },
  { level:2, visual:'🔬', question:'What is the difference between an endocrine gland and an exocrine gland?', options:['Endocrine glands secrete hormones directly into the blood (e.g. pancreas producing insulin); exocrine glands secrete via ducts to a surface (e.g. pancreas producing digestive enzymes via pancreatic duct)','Endocrine glands produce enzymes; exocrine glands produce hormones','Endocrine glands are only found in the reproductive system; exocrine glands are found throughout the digestive system'], answer:'Endocrine glands secrete hormones directly into the blood (e.g. pancreas producing insulin); exocrine glands secrete via ducts to a surface (e.g. pancreas producing digestive enzymes via pancreatic duct)', fact:'🔬 The pancreas is both an endocrine AND exocrine gland! Its Islets of Langerhans (endocrine) produce insulin/glucagon into blood; its acinar cells (exocrine) produce amylase, lipase and protease into the intestine via the pancreatic duct!' },
  { level:2, visual:'🌿', question:'What is the role of the liver in detoxification?', options:['Breaks down toxins (alcohol, drugs, ammonia from amino acid deamination) and converts them to less harmful substances for excretion by the kidneys','Produces antibodies to neutralise toxic substances in the bloodstream','Stores toxins permanently in fat tissue to prevent them from damaging organs'], answer:'Breaks down toxins (alcohol, drugs, ammonia from amino acid deamination) and converts them to less harmful substances for excretion by the kidneys', fact:'🌿 Alcohol is broken down by liver enzymes at a rate of ~1 unit per hour. Excess alcohol overwhelms the liver causing fatty liver, then hepatitis, then cirrhosis. The liver also converts toxic ammonia (from protein breakdown) to less toxic urea!' },
  { level:2, visual:'🧬', question:'What is the significance of the 3:1 ratio in Mendel\'s F2 generation?', options:['It shows that recessive alleles are NOT destroyed in the F1 generation — they are hidden and reappear in F2; proving inheritance of discrete "particles" (genes)','It proves that dominant alleles are always better for survival than recessive alleles','It shows that most traits are determined by three genes working together'], answer:'It shows that recessive alleles are NOT destroyed in the F1 generation — they are hidden and reappear in F2; proving inheritance of discrete "particles" (genes)', fact:'🧬 Before Mendel, people believed in "blending inheritance" — red and white would always produce pink. The 3:1 ratio proved inheritance worked via discrete particles (which we now call alleles on chromosomes)!' },
  { level:2, visual:'💧', question:'What is water potential and how does it relate to osmosis?', options:['Water potential (Ψ) is a measure of the tendency of water to move — water moves from high to low water potential across semi-permeable membranes; pure water has Ψ = 0, solutions have negative Ψ','Water potential is the pressure of water in the xylem pulling water up through the plant','Water potential only applies to solutions containing dissolved salts — pure water has no water potential'], answer:'Water potential (Ψ) is a measure of the tendency of water to move — water moves from high to low water potential across semi-permeable membranes; pure water has Ψ = 0, solutions have negative Ψ', fact:'💧 Adding solute lowers water potential (makes it more negative). Water always flows from less negative to more negative (= higher to lower Ψ). A plant cell in soil: soil Ψ > root cell Ψ > stem Ψ > leaf Ψ > atmosphere Ψ — water flows all the way up!' },
  { level:2, visual:'🔬', question:'How does the kidney respond when blood glucose rises after a meal?', options:['Glucose is filtered into the nephron tubule and fully reabsorbed back into blood — urine normally contains NO glucose','Excess glucose is excreted directly in urine to maintain blood glucose homeostasis','The kidney produces insulin to lower blood glucose levels before reabsorption occurs'], answer:'Glucose is filtered into the nephron tubule and fully reabsorbed back into blood — urine normally contains NO glucose', fact:'🔬 The kidney has a glucose transport maximum — if blood glucose exceeds ~180 mg/dL (as in uncontrolled diabetes), the transporters are saturated and glucose appears in urine (glycosuria). This is the basis of urine glucose testing for diabetes!' },
  { level:2, visual:'🦠', question:'What is a biofilm and why does it make infections harder to treat?', options:['A community of bacteria embedded in a self-produced matrix of proteins and polysaccharides attached to a surface — antibiotics and immune cells penetrate biofilm poorly','A thin layer of bacteria on the surface of a liquid culture medium in lab experiments','A specialized membrane produced by bacteria to absorb nutrients from their environment'], answer:'A community of bacteria embedded in a self-produced matrix of proteins and polysaccharides attached to a surface — antibiotics and immune cells penetrate biofilm poorly', fact:'🦠 Dental plaque is a biofilm! Biofilms on medical devices (catheters, implants) cause persistent infections very difficult to treat. Bacteria in biofilms may be 100–1000× more resistant to antibiotics than free-floating bacteria!' },

  // ── HARD ADDITIONAL (to reach ~167) ──────────────────────────────────────────
  { level:3, visual:'🧬', question:'What is the unfolded protein response (UPR) and when is it activated?', options:['A cellular stress response triggered when misfolded proteins accumulate in the ER — attempts to restore protein folding or triggers apoptosis if the stress is irreversible','A response to DNA damage that repairs mutations during replication','The cellular pathway that destroys old proteins via the proteasome in normal conditions'], answer:'A cellular stress response triggered when misfolded proteins accumulate in the ER — attempts to restore protein folding or triggers apoptosis if the stress is irreversible', fact:'🧬 The UPR upregulates chaperone proteins (heat shock proteins) that refold misfolded proteins. Neurodegenerative diseases (Alzheimer\'s, Parkinson\'s) involve protein misfolding — UPR failure allows toxic protein aggregates to accumulate!' },
  { level:3, visual:'🔬', question:'What is cladistics and how does it differ from classical taxonomy?', options:['Cladistics groups organisms based exclusively on shared derived characteristics and common ancestry (clades); classical taxonomy could group by overall similarity regardless of ancestry','Cladistics uses only DNA data; classical taxonomy uses only morphology','Cladistics always produces the same groupings as classical taxonomy — the methods differ but outcomes are identical'], answer:'Cladistics groups organisms based exclusively on shared derived characteristics and common ancestry (clades); classical taxonomy could group by overall similarity regardless of ancestry', fact:'🔬 Cladistics revealed that traditional "reptiles" are not a natural group — birds are more closely related to crocodilians than crocodilians are to lizards! This forced a complete reclassification of vertebrates in the 1980s-90s!' },
  { level:3, visual:'🌿', question:'What is the HIF-1α (Hypoxia-Inducible Factor) pathway?', options:['A transcription factor activated by low oxygen that upregulates genes for erythropoietin (more red blood cells), angiogenesis (new blood vessels) and anaerobic metabolism','A pathway that degrades haemoglobin when oxygen is too high','A signalling pathway in plants that closes stomata in response to low atmospheric oxygen'], answer:'A transcription factor activated by low oxygen that upregulates genes for erythropoietin (more red blood cells), angiogenesis (new blood vessels) and anaerobic metabolism', fact:'🌿 HIF-1α is normally destroyed rapidly by oxygen. In hypoxia it stabilises and activates survival genes. Tumours hijack HIF-1α to grow new blood vessels into the tumour (angiogenesis). The 2019 Nobel Prize in Medicine was awarded for this discovery!' },
  { level:3, visual:'🧫', question:'What is the difference between type I and type II restriction endonucleases and which is used in cloning?', options:['Type II cuts at specific palindromic recognition sequences and is used in cloning; Type I cuts at random distances from its recognition sequence and is not useful for precise cloning','Type I cuts single-stranded DNA; Type II cuts double-stranded DNA — both are used in cloning','Type II recognises methylated DNA only; Type I recognises unmethylated DNA'], answer:'Type II cuts at specific palindromic recognition sequences and is used in cloning; Type I cuts at random distances from its recognition sequence and is not useful for precise cloning', fact:'🧫 Type II enzymes like EcoRI recognise palindromic sequences (GAATTC reads the same on both strands 5\'→3\'). They cut within or near the sequence, producing predictable sticky ends that are essential for joining specific DNA fragments together!' },
  { level:3, visual:'💉', question:'What is antigen presentation and which cells do it?', options:['Antigen-presenting cells (APCs) — mainly macrophages and dendritic cells — engulf pathogens, digest them and display pathogen peptides on MHC class II molecules for recognition by CD4+ T helper cells','Only B lymphocytes present antigens — they display them on their surface after engulfing pathogens','Neutrophils present antigens to T cells after killing bacteria, triggering an adaptive immune response'], answer:'Antigen-presenting cells (APCs) — mainly macrophages and dendritic cells — engulf pathogens, digest them and display pathogen peptides on MHC class II molecules for recognition by CD4+ T helper cells', fact:'💉 Dendritic cells are the "bridge" between innate and adaptive immunity — they patrol tissues, detect pathogens, and migrate to lymph nodes to present antigens. A dendritic cell can activate up to 100–300 T cells simultaneously!' },
  { level:3, visual:'🔬', question:'What is the role of the proteasome in cellular protein quality control?', options:['A barrel-shaped protein complex that degrades damaged, misfolded or old proteins into peptides — uses ubiquitin tags to mark proteins for destruction','An organelle that packages proteins for secretion from the cell','A ribosome-associated complex that checks protein folding immediately after synthesis'], answer:'A barrel-shaped protein complex that degrades damaged, misfolded or old proteins into peptides — uses ubiquitin tags to mark proteins for destruction', fact:'🔬 The ubiquitin-proteasome system (UPS) degrades about 80% of cellular proteins. Aaron Ciechanover, Avram Hershko and Irwin Rose won the 2004 Nobel Prize for discovering ubiquitin-mediated degradation. Proteasome inhibitors (bortezomib) treat multiple myeloma!' },
  { level:3, visual:'🧬', question:'What is imprinting in genetics?', options:['A form of epigenetic silencing where specific genes are expressed only from the maternal or paternal copy — determined by which parent they came from, not which allele is dominant','When a newly hatched bird bonds with the first moving object it sees','Permanent DNA methylation of all genes in a cell during embryonic differentiation'], answer:'A form of epigenetic silencing where specific genes are expressed only from the maternal or paternal copy — determined by which parent they came from, not which allele is dominant', fact:'🧬 The IGF2 growth factor gene is imprinted — only the paternal copy is expressed. Prader-Willi syndrome results from missing the paternal copy of chromosome 15q11-13; Angelman syndrome from missing the maternal copy — completely different diseases from the same deletion!' },
  { level:3, visual:'🌱', question:'What is kin selection and Hamilton\'s rule?', options:['Natural selection favouring altruistic behaviour toward genetic relatives — Hamilton\'s rule: altruism evolves when rB > C (r = relatedness, B = benefit to recipient, C = cost to donor)','The selection of the fittest offspring within a family competing for parental resources','A rule stating that genes with higher relatedness to the organism are more strongly expressed'], answer:'Natural selection favouring altruistic behaviour toward genetic relatives — Hamilton\'s rule: altruism evolves when rB > C (r = relatedness, B = benefit to recipient, C = cost to donor)', fact:'🌱 J.B.S. Haldane quipped "I\'d lay down my life for two brothers or eight cousins" — siblings share 50% of genes (r=0.5), cousins 12.5% (r=0.125). Worker bees are 75% related to sisters (supersibling), explaining extreme eusocial altruism!' },
  { level:3, visual:'🔬', question:'What is sexual selection and how does it differ from natural selection?', options:['Sexual selection is driven by competition for mates and mate choice — favours traits that increase mating success even if they reduce survival; natural selection favours traits that increase survival/reproduction overall','They are identical processes — both ultimately increase reproductive success','Sexual selection only occurs in species with male competition; natural selection only occurs in species with female choice'], answer:'Sexual selection is driven by competition for mates and mate choice — favours traits that increase mating success even if they reduce survival; natural selection favours traits that increase survival/reproduction overall', fact:'🔬 The peacock\'s tail reduces survival (hard to flee predators, attracts attention) but increases mating success. Darwin noticed natural selection couldn\'t explain such traits and proposed sexual selection in 1871 as a separate but related force!' },
  { level:3, visual:'🧬', question:'What is the significance of non-coding RNA (ncRNA) in gene regulation?', options:['ncRNAs (miRNA, siRNA, lncRNA) regulate gene expression post-transcriptionally by degrading mRNA or blocking translation — far more prevalent and important than once thought','Non-coding RNA only serves structural roles in ribosomes (rRNA) and has no regulatory function','All RNA in the cell is eventually translated into protein — there is no truly "non-coding" RNA'], answer:'ncRNAs (miRNA, siRNA, lncRNA) regulate gene expression post-transcriptionally by degrading mRNA or blocking translation — far more prevalent and important than once thought', fact:'🧬 The human genome has ~20,000 protein-coding genes but transcribes vastly more non-coding RNA. miRNAs (~22 nucleotides) each regulate hundreds of target mRNAs. They control development, immunity, and metabolism — dysregulation drives cancer!' },
  { level:3, visual:'💉', question:'How do CAR-T cell therapies work?', options:['Patient T cells are extracted, genetically engineered to express chimeric antigen receptors (CARs) targeting cancer cells, expanded in culture and infused back — enabling precise cancer cell killing','A type of vaccine that trains T cells to recognise cancer antigens by injection','T cells are removed and replaced with donor T cells that naturally attack tumour antigens'], answer:'Patient T cells are extracted, genetically engineered to express chimeric antigen receptors (CARs) targeting cancer cells, expanded in culture and infused back — enabling precise cancer cell killing', fact:'💉 CAR-T therapy has produced complete remissions in patients with blood cancers that had failed all other treatments. The CAR protein combines an antibody\'s antigen recognition with a T cell\'s killing machinery. FDA-approved since 2017 (Kymriah for leukaemia)!' },
  { level:3, visual:'🌿', question:'What is the difference between r-selected and K-selected species?', options:['r-selected: small body, rapid reproduction, many offspring, low parental care, short lifespan, high mortality (e.g. insects, mice); K-selected: large body, slow reproduction, few offspring, high parental care, long lifespan (e.g. elephants, humans)','r-selected species are found only in unstable environments; K-selected only in stable climates','K-selected species have larger populations than r-selected; r-selected have smaller populations'], answer:'r-selected: small body, rapid reproduction, many offspring, low parental care, short lifespan, high mortality (e.g. insects, mice); K-selected: large body, slow reproduction, few offspring, high parental care, long lifespan (e.g. elephants, humans)', fact:'🌿 "r" refers to the intrinsic rate of growth; "K" refers to carrying capacity. r-selected species recover quickly after disasters; K-selected recover slowly — making large animals far more vulnerable to extinction from habitat loss!' },
  { level:3, visual:'🔬', question:'What is the signal transduction pathway and how do hormones that cannot enter cells work?', options:['Lipid-soluble hormones (e.g. steroids) cross cell membranes and bind intracellular receptors; water-soluble hormones (e.g. insulin) bind surface receptors and trigger intracellular signalling cascades (second messengers like cAMP)','All hormones enter cells directly — they are all small enough to cross the lipid bilayer','Water-soluble hormones enter cells via protein channels; lipid-soluble hormones use active transport'], answer:'Lipid-soluble hormones (e.g. steroids) cross cell membranes and bind intracellular receptors; water-soluble hormones (e.g. insulin) bind surface receptors and trigger intracellular signalling cascades (second messengers like cAMP)', fact:'🔬 Insulin binds its receptor → activates tyrosine kinase → triggers a phosphorylation cascade → GLUT4 glucose transporters move to cell membrane → glucose enters cell. One insulin molecule can trigger uptake of thousands of glucose molecules — enormous signal amplification!' },
  { level:3, visual:'🧫', question:'What is the role of the microbiome in human health?', options:['The trillions of microorganisms (mostly bacteria) in the gut digest fibre, produce vitamins (B12, K), train the immune system, and protect against pathogens — disruption (dysbiosis) linked to IBD, obesity, depression','The gut microbiome only digests food — it has no other functions','The microbiome consists only of harmful bacteria that the immune system must constantly suppress'], answer:'The trillions of microorganisms (mostly bacteria) in the gut digest fibre, produce vitamins (B12, K), train the immune system, and protect against pathogens — disruption (dysbiosis) linked to IBD, obesity, depression', fact:'🧫 You have ~38 trillion microbial cells vs. ~30 trillion human cells — you are slightly more microbe than human by cell count! The gut microbiome weighs ~1.5 kg. Faecal microbiota transplants (FMT) can cure recurrent C. difficile infections with >90% success!' },
  { level:3, visual:'🌊', question:'What is the founder effect and how does it lead to genetic diseases in isolated populations?', options:['A small founding population carries a non-representative sample of the original gene pool — chance allele frequencies in founders become fixed in descendants, sometimes causing high rates of genetic diseases','The tendency of founder organisms to be genetically superior and better adapted to new environments','The process by which new species form when a founder population becomes geographically isolated'], answer:'A small founding population carries a non-representative sample of the original gene pool — chance allele frequencies in founders become fixed in descendants, sometimes causing high rates of genetic diseases', fact:'🌊 The Amish community descended from ~200 Swiss-German founders — Ellis-van Creveld syndrome (extra fingers, dwarfism) is 1,000× more common among Amish than in the general population because one founder carried the allele. Ashkenazi Jews have elevated BRCA1/2 mutations for the same reason!' },
  { level:3, visual:'🧬', question:'What is the role of telomerase in cancer and ageing?', options:['Telomerase extends telomeres by adding TTAGGG repeats — inactive in most somatic cells (causing telomere shortening and ageing); reactivated in ~85% of cancers (enabling immortality)','Telomerase repairs double-strand DNA breaks caused by mutagens in normal somatic cells','Telomerase is only active in embryonic cells during development and has no role in adult cells'], answer:'Telomerase extends telomeres by adding TTAGGG repeats — inactive in most somatic cells (causing telomere shortening and ageing); reactivated in ~85% of cancers (enabling immortality)', fact:'🧬 HeLa cancer cells from Henrietta Lacks (1951) are still dividing in labs worldwide because telomerase keeps them immortal! Blocking telomerase is a cancer therapy target — but telomerase activators are explored as anti-ageing treatments (controversial risk of cancer)!' },
  { level:3, visual:'🔬', question:'What is the neurovascular coupling hypothesis and what does it explain?', options:['Neural activity increases local blood flow (hyperaemia) to supply extra oxygen/glucose — the basis of fMRI imaging which detects the blood oxygen level dependent (BOLD) signal','Neurons directly synthesise their own energy from glucose without needing blood supply','Blood vessels in the brain are wider than in other organs, allowing passive diffusion of oxygen to neurons'], answer:'Neural activity increases local blood flow (hyperaemia) to supply extra oxygen/glucose — the basis of fMRI imaging which detects the blood oxygen level dependent (BOLD) signal', fact:'🔬 fMRI detects oxyhaemoglobin (magnetic properties differ from deoxyhaemoglobin). Active brain regions have more blood flow → more oxyhaemoglobin → detectable signal. This allows mapping of brain function non-invasively — revolutionising neuroscience since 1990!' },
  { level:3, visual:'💉', question:'What is the mechanism of action of SSRI antidepressants and what does it reveal about serotonin neurotransmission?', options:['SSRIs block serotonin reuptake transporters in the presynaptic membrane — increasing serotonin concentration in the synapse and prolonging its effect on postsynaptic receptors','SSRIs increase serotonin synthesis in the presynaptic neuron by activating enzymes','SSRIs mimic serotonin by binding directly to serotonin receptors on postsynaptic neurons'], answer:'SSRIs block serotonin reuptake transporters in the presynaptic membrane — increasing serotonin concentration in the synapse and prolonging its effect on postsynaptic receptors', fact:'💉 After neurotransmitter release, reuptake "vacuums up" serotonin back into the presynaptic neuron — ending its signal. SSRIs (Prozac, Zoloft) block this, amplifying serotonin signalling. Cocaine works similarly on dopamine reuptake — explaining its stimulant effect!' },
  { level:3, visual:'🌱', question:'What is the difference between a GMO and a transgenic organism?', options:['All transgenic organisms are GMOs (genes from another species inserted), but not all GMOs are transgenic — some GMOs have their own genes modified without introducing foreign genes','They are identical terms for the same process','Transgenic organisms only have plant genes modified; GMOs can include animal gene modifications'], answer:'All transgenic organisms are GMOs (genes from another species inserted), but not all GMOs are transgenic — some GMOs have their own genes modified without introducing foreign genes', fact:'🌱 Arctic Apple is a GMO where the apple\'s own polyphenol oxidase gene is silenced (cisgenic) — it doesn\'t brown when cut. Golden Rice has foreign genes (transgenic). CRISPR-edited crops may not be classified as GMOs in some countries if no foreign DNA is inserted!' },
  { level:3, visual:'🔬', question:'What is molecular mimicry in autoimmune disease?', options:['Pathogen antigens resemble self-antigens so closely that the antibodies/T cells raised against the pathogen cross-react with normal body tissues — triggering autoimmunity','The immune system mistakes self-proteins for pathogens due to a genetic mutation in MHC molecules','Viruses hijack the immune response by producing proteins identical to human antibodies'], answer:'Pathogen antigens resemble self-antigens so closely that the antibodies/T cells raised against the pathogen cross-react with normal body tissues — triggering autoimmunity', fact:'🔬 Rheumatic fever: Streptococcus pyogenes antigens resemble heart valve proteins — antibodies attack the heart. Guillain-Barré syndrome: Campylobacter jejuni infection triggers antibodies that attack peripheral nerves. Molecular mimicry may trigger type 1 diabetes too!' },
  { level:3, visual:'🌿', question:'What is the difference between Batesian and Müllerian mimicry?', options:['Batesian: harmless species mimics a dangerous one (cheating); Müllerian: two genuinely harmful species resemble each other (mutual reinforcement of the warning)','Batesian: two harmful species resemble each other; Müllerian: a harmless species mimics a dangerous one','Both describe camouflage — they differ only in whether the animal hides or displays itself'], answer:'Batesian: harmless species mimics a dangerous one (cheating); Müllerian: two genuinely harmful species resemble each other (mutual reinforcement of the warning)', fact:'🌿 Coral snakes and harmless scarlet king snakes are Batesian mimicry — the king snake benefits without being poisonous. Many species of toxic South American poison dart frogs share similar colour patterns — Müllerian mimicry, reinforcing predator learning for all!' },
  { level:3, visual:'🧬', question:'What is gene drive technology and what are its potential applications and risks?', options:['A gene drive biases inheritance to spread a gene through a wild population far faster than normal (>99% inheritance vs. 50%) — potential uses: eradicating malaria mosquitoes; risks: unintended ecosystem collapse','Gene drives modify plants to grow faster — used only in agriculture to increase crop yield','A technique to drive specific genes out of a population by increasing recessive allele frequencies'], answer:'A gene drive biases inheritance to spread a gene through a wild population far faster than normal (>99% inheritance vs. 50%) — potential uses: eradicating malaria mosquitoes; risks: unintended ecosystem collapse', fact:'🧬 CRISPR-based gene drives could eliminate Anopheles mosquitoes (malaria vector) — potentially saving 600,000 lives per year. But release of a self-spreading genetic construct is essentially irreversible globally. Scientists debate containment and ethics extensively!' },
  { level:3, visual:'🔬', question:'What is the theory of endosymbiosis and what evidence supports it?', options:['Mitochondria and chloroplasts evolved from free-living prokaryotes engulfed by ancestral eukaryotic cells — evidence: own circular DNA, double membranes, size similar to bacteria, divide independently by binary fission','Mitochondria evolved from the nucleus splitting apart early in eukaryotic evolution','Chloroplasts were created by horizontal gene transfer from cyanobacteria into the nucleus of early plant cells'], answer:'Mitochondria and chloroplasts evolved from free-living prokaryotes engulfed by ancestral eukaryotic cells — evidence: own circular DNA, double membranes, size similar to bacteria, divide independently by binary fission', fact:'🔬 Lynn Margulis proposed endosymbiotic theory in 1967 — initially ridiculed, now universally accepted! Mitochondria resemble alpha-proteobacteria; chloroplasts resemble cyanobacteria. Their DNA is prokaryotic-style and most similar to their proposed ancestors!' },
  { level:3, visual:'🧫', question:'What is synthetic biology and give an example of its application?', options:['Designing and building novel biological parts, devices and systems not found in nature — e.g. engineering E. coli to produce artemisinin (malaria drug), or designing minimal synthetic genomes','Producing chemicals in the lab that mimic biological molecules in function','Using computer algorithms to predict how mutations will affect protein structure and function'], answer:'Designing and building novel biological parts, devices and systems not found in nature — e.g. engineering E. coli to produce artemisinin (malaria drug), or designing minimal synthetic genomes', fact:'🧫 Jay Keasling engineered yeast to produce artemisinin at 1/10 the cost of plant extraction — potentially saving millions of malaria lives. Craig Venter\'s team created the first synthetic bacterial genome (Mycoplasma mycoides JCVI-syn1.0) in 2010 — the first synthetic life form!' },
  { level:3, visual:'🌊', question:'What are the differences between primary, secondary and tertiary protein structure?', options:['Primary: amino acid sequence; secondary: local folding (alpha-helices, beta-sheets) held by H-bonds; tertiary: overall 3D shape from R-group interactions (ionic, disulfide, hydrophobic, H-bonds)','Primary: single protein chain; secondary: two chains bonded together; tertiary: complete folded protein with all subunits','Primary is in the nucleus; secondary in the cytoplasm; tertiary is the exported form'], answer:'Primary: amino acid sequence; secondary: local folding (alpha-helices, beta-sheets) held by H-bonds; tertiary: overall 3D shape from R-group interactions (ionic, disulfide, hydrophobic, H-bonds)', fact:'🌊 There is also quaternary structure — multiple polypeptide chains. Haemoglobin has four subunits (quaternary). The tertiary 3D structure determines enzyme specificity — even one amino acid change can destroy function (sickle cell disease changes one amino acid in haemoglobin!)' },
  { level:3, visual:'🌿', question:'What is the difference between constitutive and inducible gene expression?', options:['Constitutive genes are always "on" (housekeeping genes like those for glycolysis); inducible genes are switched on only when their product is needed (like the lac operon genes in E. coli)','Constitutive genes are switched on by temperature; inducible genes are switched on by chemicals','Constitutive genes code for transcription factors; inducible genes code for structural proteins'], answer:'Constitutive genes are always "on" (housekeeping genes like those for glycolysis); inducible genes are switched on only when their product is needed (like the lac operon genes in E. coli)', fact:'🌿 Cells save energy by not making proteins they don\'t need. The lac operon is induced when lactose is present — no point making lactose-digesting enzymes when there is no lactose! Constitutive genes (like those for ribosomes) are needed in all cells at all times!' },
  { level:3, visual:'🔬', question:'What is the role of Hox genes in animal body plan development?', options:['Hox genes are master regulatory genes that determine body segment identity (head, thorax, abdomen, tail) along the anterior-posterior axis — mutations cause dramatic transformations (e.g. leg growing where antenna should be)','Hox genes control organ development in adult organisms, not embryos','Hox genes determine left-right asymmetry — which side of the body organs develop on'], answer:'Hox genes are master regulatory genes that determine body segment identity (head, thorax, abdomen, tail) along the anterior-posterior axis — mutations cause dramatic transformations (e.g. leg growing where antenna should be)', fact:'🔬 The antennapedia mutation in Drosophila replaces antennae with legs — because one Hox gene switches identity of a body segment! Hox genes are remarkably conserved — the same genes control body plans in flies, mice and humans. Hox gene clusters are in the same order as the body regions they control!' },
  { level:3, visual:'💉', question:'What is the principle behind phage therapy and why is it regaining interest?', options:['Using bacteriophage viruses that specifically infect and kill target bacteria — interest revived due to antibiotic-resistant bacteria for which phages could provide targeted treatment','Using modified human viruses to carry cancer-killing genes into tumour cells','Using plant viruses engineered to deliver antigens for new vaccine formulations'], answer:'Using bacteriophage viruses that specifically infect and kill target bacteria — interest revived due to antibiotic-resistant bacteria for which phages could provide targeted treatment', fact:'💉 Phage therapy was used widely before antibiotics were discovered in the 1940s. Unlike antibiotics, phages are species-specific — targeting only one bacterial species without disrupting the microbiome. A 2019 case used phages to save a patient dying from a drug-resistant Mycobacterium infection!' },
  { level:3, visual:'🧬', question:'What is a retrotransposon and how does it relate to genome evolution?', options:['A "jumping gene" that copies itself via an RNA intermediate and reinserts elsewhere in the genome — about 40% of the human genome consists of transposable elements (mostly retrotransposons)','A virus that integrates permanently into the host genome and causes cancer','A DNA repair mechanism that copies damaged sequences and pastes them elsewhere'], answer:'A "jumping gene" that copies itself via an RNA intermediate and reinserts elsewhere in the genome — about 40% of the human genome consists of transposable elements (mostly retrotransposons)', fact:'🧬 Barbara McClintock discovered "jumping genes" in maize in the 1940s — won the Nobel Prize in 1983! LINEs and SINEs are the most common transposable elements in humans. Most are inactivated, but active ones can disrupt genes — causing disease or creating new functions!' },
  { level:3, visual:'🌱', question:'What is cryptic speciation and why does it matter for biodiversity?', options:['Species that are morphologically identical (look the same) but are genetically distinct and reproductively isolated — discovered using DNA analysis; means true biodiversity is vastly underestimated','Speciation that occurs underground or in the deep sea where it is not observable','Species that only become distinct during brief breeding seasons and merge back genetically at other times'], answer:'Species that are morphologically identical (look the same) but are genetically distinct and reproductively isolated — discovered using DNA analysis; means true biodiversity is vastly underestimated', fact:'🌱 The common leopard frog was thought to be one species — DNA revealed it is at least 8 distinct species! Some "bacteria" are actually dozens of cryptic species with different metabolisms. We may be underestimating total species number by 2-10×!' },
  { level:3, visual:'🔬', question:'What is a GWAS (Genome-Wide Association Study) and what has it revealed?', options:['A study comparing millions of genetic variants across thousands of individuals to find DNA regions statistically associated with a trait or disease — revealed that most complex diseases involve hundreds of genes each with tiny effects','A study sequencing complete genomes of all members of one family to trace disease inheritance','A technique mapping physical chromosome locations of genes using fluorescence markers'], answer:'A study comparing millions of genetic variants across thousands of individuals to find DNA regions statistically associated with a trait or disease — revealed that most complex diseases involve hundreds of genes each with tiny effects', fact:'🔬 GWAS for height found 700+ genetic variants — each explains <0.1% of height variation! Heart disease, schizophrenia and diabetes each involve hundreds of genes. This "missing heritability" puzzle shows that common diseases are far more genetically complex than Mendelian diseases!' },
  { level:3, visual:'🌊', question:'What is the holobiont concept and how does it challenge traditional views of the individual organism?', options:['An organism and all its associated microorganisms form a functional unit (holobiont) whose collective genome (hologenome) affects fitness — the "individual" is actually a community','A conservation unit based on the total biomass of organisms in an ecosystem rather than species diversity','The concept that all organisms are ultimately derived from a single common ancestor and share core metabolic pathways'], answer:'An organism and all its associated microorganisms form a functional unit (holobiont) whose collective genome (hologenome) affects fitness — the "individual" is actually a community', fact:'🌊 The Hawaiian bobtail squid cannot develop its light organ without Vibrio fischeri bacteria. Cordyceps fungi manipulate ant behaviour. Wolbachia bacteria control reproduction in 50-70% of insect species. The boundaries of "individual" are increasingly blurred!' },

  // ── MEDIUM FINAL BATCH (to reach ~167) ───────────────────────────────────────
  { level:2, visual:'🌿', question:'What is the difference between the rough and smooth endoplasmic reticulum?', options:['Rough ER has ribosomes on its surface and makes proteins for secretion; smooth ER lacks ribosomes and synthesises lipids and detoxifies drugs','Rough ER makes carbohydrates; smooth ER makes proteins','Rough ER is found only in plant cells; smooth ER is found only in animal cells'], answer:'Rough ER has ribosomes on its surface and makes proteins for secretion; smooth ER lacks ribosomes and synthesises lipids and detoxifies drugs', fact:'🌿 The rough ER gets its name from ribosome studding — it makes proteins like digestive enzymes and antibodies for export. Smooth ER is abundant in liver cells (detoxification) and steroid-hormone-producing cells (lipid synthesis)!' },
  { level:2, visual:'🧬', question:'What is the purpose of meiosis and when does it occur?', options:['Produce genetically diverse haploid gametes (eggs and sperm) — occurs in gonads (ovaries and testes) during gametogenesis','Produce identical body cells for growth — occurs in bone marrow and skin','Repair damaged DNA in somatic cells — occurs in all dividing cells throughout life'], answer:'Produce genetically diverse haploid gametes (eggs and sperm) — occurs in gonads (ovaries and testes) during gametogenesis', fact:'🧬 Meiosis halves the chromosome number (diploid → haploid). Crossing over in meiosis I and random assortment of chromosomes generates enormous variation — humans can theoretically produce 8 million different gametes just from chromosome assortment alone (ignoring crossing over)!' },
  { level:2, visual:'🔬', question:'How is the surface area to volume ratio relevant to cell size?', options:['As cells grow larger, surface area increases more slowly than volume — reducing exchange efficiency; this limits maximum cell size and drives the evolution of specialised exchange surfaces','Larger cells always have better SA:V ratios because they have more membrane','SA:V ratio is only relevant for single-celled organisms — multicellular organisms compensate with organs'], answer:'As cells grow larger, surface area increases more slowly than volume — reducing exchange efficiency; this limits maximum cell size and drives the evolution of specialised exchange surfaces', fact:'🔬 A cell that doubles in length increases SA by 4× but volume by 8× — the ratio halves! This is why large organisms need lungs (gas exchange), gills, villi (absorption) and circulatory systems — diffusion alone can\'t supply large volumes fast enough!' },
  { level:2, visual:'🌱', question:'What is the role of the liver in carbohydrate metabolism?', options:['Converts excess glucose to glycogen (glycogenesis) for storage; converts glycogen back to glucose (glycogenolysis) when blood glucose falls; can convert non-carbohydrates to glucose (gluconeogenesis)','Produces insulin and glucagon to regulate blood glucose directly','Absorbs glucose from the blood via active transport and converts it to fat for storage in adipose tissue'], answer:'Converts excess glucose to glycogen (glycogenesis) for storage; converts glycogen back to glucose (glycogenolysis) when blood glucose falls; can convert non-carbohydrates to glucose (gluconeogenesis)', fact:'🌱 The liver stores about 100g of glycogen — enough for ~12 hours of fasting. Muscles store another 400g but can only use it locally. During prolonged starvation, the liver makes glucose from amino acids and glycerol (gluconeogenesis) to fuel the brain!' },
  { level:2, visual:'🦋', question:'What is the difference between an allopatric and a sympatric population in terms of gene flow?', options:['Allopatric populations are geographically separated (no gene flow) — can diverge and speciate; sympatric populations overlap (gene flow present) — tend to remain one species unless reproductively isolated by other means','Allopatric populations always have higher genetic diversity than sympatric populations','Gene flow is only possible between sympatric populations — allopatric populations cannot exchange any genetic material'], answer:'Allopatric populations are geographically separated (no gene flow) — can diverge and speciate; sympatric populations overlap (gene flow present) — tend to remain one species unless reproductively isolated by other means', fact:'🦋 Gene flow homogenises populations — keeping them genetically similar. Geographic barriers (mountains, rivers, oceans) stop gene flow, allowing genetic drift and natural selection to drive populations apart until they cannot interbreed — new species!' },
  { level:2, visual:'🔬', question:'What is phenotypic plasticity?', options:['The ability of one genotype to produce different phenotypes in different environments — e.g. Himalayan rabbits have white fur in cold and dark fur in warm regions despite identical DNA','Random variation in phenotype between individuals due to spontaneous mutations','The process of natural selection changing the average phenotype of a population over generations'], answer:'The ability of one genotype to produce different phenotypes in different environments — e.g. Himalayan rabbits have white fur in cold and dark fur in warm regions despite identical DNA', fact:'🔬 Phenotypic plasticity allows organisms to respond to environmental change within a lifetime. Locusts can be solitary or gregarious (different body, behaviour, colour) with the same genome! This challenges the strict separation of genotype and phenotype!' },
  { level:2, visual:'🧫', question:'What is negative feedback and give a biological example?', options:['A regulatory mechanism where the output of a process inhibits the process itself, returning the system to the set point — e.g. high blood glucose triggers insulin release, which lowers blood glucose','A regulatory mechanism where the output amplifies the initial change — e.g. childbirth contractions increasing in frequency','Any chemical signal that causes a cell to slow down its metabolism'], answer:'A regulatory mechanism where the output of a process inhibits the process itself, returning the system to the set point — e.g. high blood glucose triggers insulin release, which lowers blood glucose', fact:'🧫 Negative feedback is the basis of all homeostasis! Other examples: rising body temperature triggers sweating and vasodilation → temperature falls → sweating stops. High thyroid hormone → pituitary reduces TSH → thyroid makes less hormone. The body is full of these regulatory loops!' },
  { level:2, visual:'🌊', question:'What is the complement system and how does it eliminate pathogens?', options:['A set of ~30 plasma proteins activated by antibodies or pathogen surfaces — they opsonise bacteria (flagging them for phagocytes), punch holes in membranes (MAC) and trigger inflammation','A back-up immune response that activates only when antibody levels are insufficient','The system of enzymes that neutralise toxins produced by bacteria in the bloodstream'], answer:'A set of ~30 plasma proteins activated by antibodies or pathogen surfaces — they opsonise bacteria (flagging them for phagocytes), punch holes in membranes (MAC) and trigger inflammation', fact:'🌊 "Complement" complements antibodies — they were discovered together. The membrane attack complex (MAC) literally drills a hole in gram-negative bacterial membranes. Complement deficiency (rare genetic) makes people vulnerable to specific bacteria like Neisseria meningitidis!' },
  { level:2, visual:'🌿', question:'What are GMO crops and give an example with its purpose?', options:['Genetically modified organisms where genes have been altered or added — e.g. Bt maize contains a bacterial gene producing Bt toxin that kills specific insect pests, reducing pesticide use','Crops crossbred using traditional hybridisation techniques to improve yield','Crops grown in greenhouses under controlled conditions to maximise photosynthesis rate'], answer:'Genetically modified organisms where genes have been altered or added — e.g. Bt maize contains a bacterial gene producing Bt toxin that kills specific insect pests, reducing pesticide use', fact:'🌿 The Bt toxin gene from Bacillus thuringiensis is harmless to humans and only toxic to specific insects. GM crops have reduced pesticide use significantly in adopting countries. Other examples: herbicide-tolerant soy (Roundup Ready) and virus-resistant papaya (saved Hawaii\'s papaya industry)!' },
  { level:2, visual:'🧬', question:'What is the difference between continuous and discontinuous variation in terms of the number of genes involved?', options:['Continuous variation is polygenic (many genes each with small effects, plus environmental influence) producing a range; discontinuous variation is usually controlled by one or few genes with distinct categories','Continuous variation involves only one gene with multiple alleles; discontinuous involves many genes','Continuous variation has no genetic basis — it is entirely environmental; discontinuous is entirely genetic'], answer:'Continuous variation is polygenic (many genes each with small effects, plus environmental influence) producing a range; discontinuous variation is usually controlled by one or few genes with distinct categories', fact:'🧬 Height involves 700+ genes — each contributing millimetres! The normal (bell curve) distribution of height is typical of polygenic traits. ABO blood group (discontinuous) is controlled by one gene locus with three alleles (I^A, I^B, i)!' },
  { level:2, visual:'🔬', question:'What is gene cloning and how is a gene inserted into a bacterial plasmid?', options:['Gene cloning isolates a gene, cuts it with the same restriction enzyme used to cut a plasmid, and uses DNA ligase to insert it — the recombinant plasmid is taken up by bacteria which produce the gene\'s protein product','Gene cloning makes identical organisms from a single parent using somatic cell nuclear transfer','Gene cloning uses PCR to amplify a gene and inject multiple copies directly into cells without using plasmids'], answer:'Gene cloning isolates a gene, cuts it with the same restriction enzyme used to cut a plasmid, and uses DNA ligase to insert it — the recombinant plasmid is taken up by bacteria which produce the gene\'s protein product', fact:'🔬 The same restriction enzyme is essential — it makes complementary "sticky ends" on both the gene and the plasmid, allowing them to join. Bacteria that take up the recombinant plasmid are identified by antibiotic resistance markers on the plasmid!' },
  { level:2, visual:'🌱', question:'What is the "lock and key" model of enzyme action and what replaced it?', options:['Lock and key: substrate fits rigidly into the pre-formed active site; replaced by the induced fit model where the active site flexibly adjusts shape to better grip the substrate when it binds','Lock and key was replaced by the collision theory, which explains how enzymes reduce activation energy','Lock and key is still the accepted model — the induced fit model was disproved experimentally'], answer:'Lock and key: substrate fits rigidly into the pre-formed active site; replaced by the induced fit model where the active site flexibly adjusts shape to better grip the substrate when it binds', fact:'🌱 The induced fit model better explains enzyme flexibility and why substrate binding is more complex than a rigid fit. When the substrate binds, the active site clamps down — creating strain on substrate bonds that lowers the activation energy needed to break them!' },
  { level:2, visual:'🧫', question:'What is the difference between a competitive and non-competitive enzyme inhibitor?', options:['Competitive: mimics the substrate and blocks the active site — effect reduced by more substrate; non-competitive: binds allosteric site and changes active site shape — effect NOT reduced by more substrate','Both types bind to the active site — they differ in how tightly they bind','Competitive inhibitors permanently destroy enzymes; non-competitive inhibitors temporarily slow them'], answer:'Competitive: mimics the substrate and blocks the active site — effect reduced by more substrate; non-competitive: binds allosteric site and changes active site shape — effect NOT reduced by more substrate', fact:'🧫 Many drugs are competitive inhibitors — statins compete with HMG-CoA reductase\'s substrate to reduce cholesterol synthesis. Lead and mercury are non-competitive inhibitors — they bind to enzyme cysteine residues, causing irreversible poisoning even at very low concentrations!' },
  { level:2, visual:'🔬', question:'What is the role of the placenta during pregnancy?', options:['Exchange of oxygen, nutrients and waste between mother and foetus via diffusion; produces hormones (hCG, progesterone) to maintain pregnancy; acts as immune barrier preventing maternal immune rejection of foetus','Directly connects maternal and foetal blood in a shared circulation to maximise nutrient delivery','Produces insulin for the developing foetus until its own pancreas develops at birth'], answer:'Exchange of oxygen, nutrients and waste between mother and foetus via diffusion; produces hormones (hCG, progesterone) to maintain pregnancy; acts as immune barrier preventing maternal immune rejection of foetus', fact:'🔬 The placenta has enormous surface area (villi) for diffusion — ~14 m²! Maternal and foetal blood NEVER directly mix — they are separated by just two cell layers. hCG (human chorionic gonadotropin) is the hormone detected by pregnancy tests!' },
  { level:2, visual:'🌿', question:'What is the hormonal control of the menstrual cycle — summarise the four-hormone sequence?', options:['FSH (grows follicle + oestrogen) → rising oestrogen (builds uterus lining + triggers LH surge) → LH surge (causes ovulation) → progesterone from corpus luteum (maintains lining; if no pregnancy, drops → menstruation)','Oestrogen → LH → FSH → progesterone in a simple sequence that repeats monthly','Progesterone maintains the entire cycle; FSH, LH and oestrogen only play a role during pregnancy'], answer:'FSH (grows follicle + oestrogen) → rising oestrogen (builds uterus lining + triggers LH surge) → LH surge (causes ovulation) → progesterone from corpus luteum (maintains lining; if no pregnancy, drops → menstruation)', fact:'🌿 The oral contraceptive pill works by maintaining high oestrogen/progesterone — preventing the FSH rise and LH surge needed for follicle development and ovulation. The "pill" has been called the most influential drug of the 20th century!' },
  { level:2, visual:'🧬', question:'What is the significance of the HLA (human leukocyte antigen) system?', options:['HLA genes encode MHC proteins — the most diverse gene region in humans, determining immune self-recognition; HLA matching is critical for organ transplant success; some HLA variants increase disease risk','HLA genes determine blood type — matching is essential for blood transfusions','HLA genes control the production of antibodies — different HLA types produce different antibody repertoires'], answer:'HLA genes encode MHC proteins — the most diverse gene region in humans, determining immune self-recognition; HLA matching is critical for organ transplant success; some HLA variants increase disease risk', fact:'🧬 The HLA region on chromosome 6 is the most genetically diverse region in the human genome — essential for recognising the huge variety of pathogens. HLA-B27 is strongly associated with ankylosing spondylitis. HLA typing is now routine before kidney transplants!' },
  { level:2, visual:'🔬', question:'What is C3, C4 and CAM photosynthesis and why do they exist?', options:['C3: standard photosynthesis (most plants); C4: concentrates CO₂ in bundle sheath cells to avoid photorespiration in hot environments (maize, sugarcane); CAM: stomata open at night to store CO₂ to avoid water loss (cacti, pineapple)','All plants use the same C3 pathway — C4 and CAM are only found in algae','C3 and C4 refer to the number of carbon atoms in glucose; CAM is an animal metabolic pathway'], answer:'C3: standard photosynthesis (most plants); C4: concentrates CO₂ in bundle sheath cells to avoid photorespiration in hot environments (maize, sugarcane); CAM: stomata open at night to store CO₂ to avoid water loss (cacti, pineapple)', fact:'🔬 C4 plants like maize and sugarcane are more efficient in hot, sunny conditions — explaining why they dominate tropical grasslands. CAM plants open stomata only at night when it\'s cool — minimising water loss. This is why cacti can survive desert drought!' },
  { level:2, visual:'🌱', question:'What is the difference between endocytosis and exocytosis?', options:['Endocytosis: cell engulfs material by membrane folding inward (phagocytosis, pinocytosis); exocytosis: vesicles fuse with cell membrane to release contents outside — both require energy (ATP)','Endocytosis releases molecules from the cell; exocytosis brings molecules in','Both processes use the same channels as active transport — they are not membrane-based processes'], answer:'Endocytosis: cell engulfs material by membrane folding inward (phagocytosis, pinocytosis); exocytosis: vesicles fuse with cell membrane to release contents outside — both require energy (ATP)', fact:'🌱 Phagocytes use endocytosis to engulf bacteria (phagocytosis). Neurons use exocytosis to release neurotransmitters. The Golgi apparatus packages proteins into vesicles for exocytosis. These processes allow cells to handle large molecules that can\'t pass through membrane channels!' },
  { level:2, visual:'🔬', question:'What is apoptosis and why is it important in development and disease?', options:['Programmed cell death that sculpts tissues during development (e.g. finger separation) and eliminates damaged/infected cells — failure causes cancer; excessive apoptosis causes neurodegeneration','Accidental cell death caused by physical damage or toxins that triggers inflammation','The process of immune cells self-destructing after they have killed a pathogen'], answer:'Programmed cell death that sculpts tissues during development (e.g. finger separation) and eliminates damaged/infected cells — failure causes cancer; excessive apoptosis causes neurodegeneration', fact:'🔬 During embryo development, your fingers were initially webbed — apoptosis removed the cells between them. About 50-70 billion cells undergo apoptosis daily in an adult human. Caspase proteins execute apoptosis by systematically dismantling the cell from inside!' },
  { level:2, visual:'🧫', question:'What is the role of the lymphatic system?', options:['Returns interstitial fluid to the blood, transports fats from the gut, and carries lymphocytes — lymph nodes filter lymph and contain immune cells that screen for pathogens','Produces red blood cells and platelets alongside bone marrow','Filters blood to remove waste products — a parallel filtration system to the kidneys'], answer:'Returns interstitial fluid to the blood, transports fats from the gut, and carries lymphocytes — lymph nodes filter lymph and contain immune cells that screen for pathogens', fact:'🧫 Every day about 2-4 litres of plasma leak from capillaries into tissue fluid — the lymphatic system returns this to blood. Swollen lymph nodes during infection are enlarged because immune cells inside are dividing rapidly to fight the pathogen!' },
  { level:2, visual:'🌊', question:'What is the difference between ventilation, gas exchange and respiration?', options:['Ventilation: mechanical breathing in/out; gas exchange: diffusion of O₂ and CO₂ across alveoli; respiration: cellular biochemical process releasing energy from glucose','All three terms describe the same process of breathing and energy release','Ventilation and gas exchange are the same; respiration refers only to breathing'], answer:'Ventilation: mechanical breathing in/out; gas exchange: diffusion of O₂ and CO₂ across alveoli; respiration: cellular biochemical process releasing energy from glucose', fact:'🌊 This distinction is crucial! Respiration happens in EVERY cell 24/7. Gas exchange happens in lungs (or gills/skin). Ventilation is just the mechanical movement of air. A snail "breathes" through its skin — gas exchange without ventilation!' },
  { level:2, visual:'🌿', question:'What is the role of lipids in cell membranes?', options:['Phospholipids form a bilayer — hydrophilic heads face outward (toward water), hydrophobic tails face inward — creating a selectively permeable barrier that controls what enters and leaves the cell','Lipids provide structural rigidity to cells — they are the main structural component of the cell wall','Lipids in membranes store energy — the bilayer is broken down during starvation to release fatty acids for ATP production'], answer:'Phospholipids form a bilayer — hydrophilic heads face outward (toward water), hydrophobic tails face inward — creating a selectively permeable barrier that controls what enters and leaves the cell', fact:'🌿 The fluid mosaic model (Singer & Nicolson, 1972) describes the membrane as a "sea" of phospholipids with proteins floating in it. Cholesterol between phospholipids controls membrane fluidity — too much or too little makes the membrane too rigid or too fluid!' },
  { level:2, visual:'🧬', question:'What is polyploidy and give an example in crop plants?', options:['Having more than two sets of chromosomes — bread wheat is hexaploid (6 sets, AABBDD genome, 2n=42) from three ancestral species hybridising and undergoing chromosome doubling','Having fewer chromosomes than the standard diploid number — common in domesticated crop plants','Having an extra single chromosome beyond the diploid number — like trisomy 21 in humans'], answer:'Having more than two sets of chromosomes — bread wheat is hexaploid (6 sets, AABBDD genome, 2n=42) from three ancestral species hybridising and undergoing chromosome doubling', fact:'🧬 Most flowering plants are polyploid — it drives plant evolution! Polyploidy creates instant reproductive isolation (new species in one generation) and can give advantages like larger fruits. Cotton (tetraploid), potato (tetraploid) and strawberry (octoploid) are all polyploid crop plants!' },
  { level:2, visual:'🔬', question:'What is the Bohr effect and why is it important for oxygen delivery?', options:['Haemoglobin releases more O₂ in tissues with high CO₂ and low pH (acidic) — where cells need it most; in lungs where CO₂ is low and pH is higher, haemoglobin loads O₂ more easily','Haemoglobin carries more O₂ at high temperatures — maximising delivery during exercise','Red blood cells swell in acidic conditions to carry more oxygen per cell'], answer:'Haemoglobin releases more O₂ in tissues with high CO₂ and low pH (acidic) — where cells need it most; in lungs where CO₂ is low and pH is higher, haemoglobin loads O₂ more easily', fact:'🔬 Actively respiring cells produce CO₂ → lowers pH → haemoglobin releases O₂ exactly where it is needed! The foetal haemoglobin (HbF) has a higher oxygen affinity than adult haemoglobin — allowing it to extract O₂ from the mother\'s blood across the placenta!' },
  { level:2, visual:'🦠', question:'What is quorum sensing in bacteria?', options:['Bacteria release and detect chemical signals to monitor population density — when enough signals accumulate (quorum), bacteria coordinate behaviour like forming biofilms, producing toxins or making bioluminescence','The process by which bacteria communicate with host immune cells to avoid destruction','A mechanism by which viruses assess the number of available host cells before beginning replication'], answer:'Bacteria release and detect chemical signals to monitor population density — when enough signals accumulate (quorum), bacteria coordinate behaviour like forming biofilms, producing toxins or making bioluminescence', fact:'🦠 Vibrio fischeri only bioluminesces when dense enough (inside a squid light organ) — no point wasting energy when sparse. Pathogenic bacteria use quorum sensing to coordinate infection — all releasing toxins simultaneously overwhelms the immune response. Quorum-quenching drugs are a novel antibiotic strategy!' },

  // ── HARD FINAL BATCH (to reach ~167) ─────────────────────────────────────────
  { level:3, visual:'🧬', question:'What is the difference between heterochromatin and euchromatin?', options:['Heterochromatin is densely packed, transcriptionally inactive DNA; euchromatin is loosely packed, actively transcribed — the ratio changes during development as genes are switched on/off','Heterochromatin contains repetitive sequences; euchromatin contains only protein-coding genes','Heterochromatin is found only at telomeres and centromeres; euchromatin is only in gene-poor regions'], answer:'Heterochromatin is densely packed, transcriptionally inactive DNA; euchromatin is loosely packed, actively transcribed — the ratio changes during development as genes are switched on/off', fact:'🧬 Constitutive heterochromatin (centromeres, telomeres) is permanently condensed. Facultative heterochromatin (inactivated X chromosome = Barr body) can be switched. Histone acetylation opens chromatin; methylation closes it — the epigenetic code controlling which genes are expressed!' },
  { level:3, visual:'🔬', question:'What is the mesolimbic dopamine pathway and why is it relevant to addiction?', options:['The "reward pathway" connecting the ventral tegmental area (VTA) to the nucleus accumbens — dopamine release signals reward, motivating behaviour; addictive drugs hijack this system by flooding it with dopamine','A pain-suppression pathway in the midbrain that uses dopamine to block nociceptive signals','The pathway controlling motor coordination — dopamine depletion here causes Parkinson\'s disease'], answer:'The "reward pathway" connecting the ventral tegmental area (VTA) to the nucleus accumbens — dopamine release signals reward, motivating behaviour; addictive drugs hijack this system by flooding it with dopamine', fact:'🔬 Natural rewards (food, sex) release 100-200% baseline dopamine. Cocaine causes 400%, heroin 200%, methamphetamine 1000% release — overwhelming the system. Repeated flooding down-regulates receptors, creating tolerance and withdrawal when the drug is absent!' },
  { level:3, visual:'🌿', question:'What is the principle of competitive exclusion (Gause\'s law) and when does it not apply?', options:['Two species competing for identical resources cannot coexist — one excludes the other; does not apply when species partition the niche (coexistence through resource partitioning or character displacement)','All competing species eventually reach stable coexistence through evolutionary adaptation','Competitive exclusion only applies between species at the same trophic level and never between predator and prey'], answer:'Two species competing for identical resources cannot coexist — one excludes the other; does not apply when species partition the niche (coexistence through resource partitioning or character displacement)', fact:'🌿 Gause showed this in 1934 using Paramecium: when grown together, one species always eliminated the other. In nature, apparent competitors coexist by subtle niche partitioning — different times active, different microhabitats, different food sizes. Character displacement makes co-existing species diverge over time!' },
  { level:3, visual:'🧫', question:'What is the difference between the lysogenic and lytic cycles in bacteriophages?', options:['Lysogenic: phage DNA integrates into host chromosome as a prophage, replicating silently with the host cell for many generations; lytic: phage hijacks host machinery, replicates rapidly and lyses the cell','Lysogenic produces new phages within 30 minutes; lytic cycle produces phages that stay dormant in the cell indefinitely','Both cycles always produce the same number of new phage particles — they differ only in how the phage enters the cell'], answer:'Lysogenic: phage DNA integrates into host chromosome as a prophage, replicating silently with the host cell for many generations; lytic: phage hijacks host machinery, replicates rapidly and lyses the cell', fact:'🧫 Prophages can be induced to enter the lytic cycle by stress signals like DNA damage. The HIV virus has an analogous lysogenic-like phase — latent HIV integrates into CD4+ T cell DNA, invisible to immune surveillance for years before reactivating!' },
  { level:3, visual:'🔬', question:'What is the role of the NF-κB signalling pathway in immunity and inflammation?', options:['NF-κB is a transcription factor activated by pathogen signals (e.g. LPS) or cytokines — it switches on genes for pro-inflammatory cytokines (TNF-α, IL-6), adhesion molecules and anti-apoptotic proteins','NF-κB directly kills bacteria by producing reactive oxygen species in phagocytes','NF-κB is an antibody class that targets gram-positive bacterial cell walls specifically'], answer:'NF-κB is a transcription factor activated by pathogen signals (e.g. LPS) or cytokines — it switches on genes for pro-inflammatory cytokines (TNF-α, IL-6), adhesion molecules and anti-apoptotic proteins', fact:'🔬 NF-κB is central to immune response and inflammation. Dysregulated NF-κB activity drives rheumatoid arthritis, IBD, cancer and septic shock. TNF-α blockers (like Humira/adalimumab) treat rheumatoid arthritis by reducing NF-κB-driven inflammation — the world\'s top-selling drug!' },
  { level:3, visual:'🌱', question:'What is the neutral theory of molecular evolution (Kimura)?', options:['Most molecular evolution is due to random fixation of neutral mutations by genetic drift, not natural selection — adaptive evolution explains morphological changes but most DNA changes are selectively neutral','All evolution is driven by natural selection — there is no neutral evolution','Genetic drift is more important than natural selection in LARGE populations where chance events dominate'], answer:'Most molecular evolution is due to random fixation of neutral mutations by genetic drift, not natural selection — adaptive evolution explains morphological changes but most DNA changes are selectively neutral', fact:'🌱 Kimura (1968) proposed that synonymous mutations (don\'t change amino acids) and mutations in non-coding DNA accumulate at a constant rate by drift — explaining the molecular clock. This was initially controversial but is now accepted alongside Darwinian selection. Neither is the "whole story"!' },
