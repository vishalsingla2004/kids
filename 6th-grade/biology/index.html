  { level:3, visual:'🧫', question:'What is clonal selection in adaptive immunity?', options:['When the B cell whose antibody specifically matches a pathogen\'s antigen is stimulated to multiply rapidly, producing a large clone of identical antibody-secreting cells','When T cells randomly multiply during infection until enough specific T cells are generated','When macrophages select and destroy pathogens by engulfing the most common type first'], answer:'When the B cell whose antibody specifically matches a pathogen\'s antigen is stimulated to multiply rapidly, producing a large clone of identical antibody-secreting cells', fact:'🧫 Clonal selection produces both plasma cells (antibody factories) and long-lived memory cells. This is why you are immune after recovering from a disease — memory B cells respond instantly to re-infection!' },
  { level:3, visual:'🔗', question:'What is the significance of the sugar-phosphate backbone in DNA structure?', options:['It forms the outer structural framework of the double helix — alternating deoxyribose sugars and phosphate groups — holding the base-pair rungs in place','It carries the genetic code directly and varies between different genes','It is the part of DNA that is read by RNA polymerase during transcription'], answer:'It forms the outer structural framework of the double helix — alternating deoxyribose sugars and phosphate groups — holding the base-pair rungs in place', fact:'🔗 The sugar-phosphate backbone is antiparallel — one strand runs 5\' to 3\', the other 3\' to 5\'. This antiparallel orientation is essential for DNA polymerase to work and for the double helix to be stable!' },

  // ── EASY EXTRA (questions 51–167) ───────────────────────────────────────────
  { level:1, visual:'🔬', question:'What do plant cells have that animal cells do NOT have?', options:['Cell wall, chloroplasts and large vacuole','Mitochondria and nucleus','Ribosomes and cell membrane'], answer:'Cell wall, chloroplasts and large vacuole', fact:'🔬 Plant cells have three things animal cells lack: a rigid cell wall for support, chloroplasts for photosynthesis, and a large central vacuole for storage and support!' },
  { level:1, visual:'🧬', question:'What is the control centre of the cell that contains DNA?', options:['Nucleus','Mitochondria','Ribosome'], answer:'Nucleus', fact:'🧬 The nucleus is the cell\'s headquarters — it stores DNA and directs all cell activities. It is surrounded by a double membrane called the nuclear envelope with pores!' },
  { level:1, visual:'🧫', question:'What is the jelly-like fluid inside a cell that holds the organelles?', options:['Cytoplasm','Plasma','Serum'], answer:'Cytoplasm', fact:'🧫 Cytoplasm is mostly water (about 70%) plus dissolved proteins, salts and sugars. It keeps organelles in place and allows diffusion of molecules throughout the cell!' },
  { level:1, visual:'🌿', question:'Why do plant cells have chloroplasts but animal cells do not?', options:['Plants make their own food by photosynthesis; animals get food by eating other organisms','Plants need more energy than animals','Chloroplasts produce oxygen that plants need for respiration'], answer:'Plants make their own food by photosynthesis; animals get food by eating other organisms', fact:'🌿 Chloroplasts are the photosynthesis factories — only organisms that make their own food from sunlight need them. Animals are heterotrophs and get energy from eating!' },
  { level:1, visual:'🦠', question:'What is a unicellular organism?', options:['An organism made of just one cell','An organism with fewer than 100 cells','An organism without a nucleus'], answer:'An organism made of just one cell', fact:'🦠 Bacteria, amoeba and yeast are unicellular — their entire life is contained in one cell. Humans are multicellular with about 37 trillion cells working together!' },
  { level:1, visual:'🔬', question:'What instrument do scientists use to see cells because they are too small for the naked eye?', options:['Microscope','Telescope','Stethoscope'], answer:'Microscope', fact:'🔬 Robert Hooke first saw cells in 1665 using a microscope he built himself! Cells are typically 10–100 micrometres — about 100× thinner than a human hair!' },
  { level:1, visual:'📏', question:'What unit is used to measure the size of most cells?', options:['Micrometres (μm)','Millimetres (mm)','Nanometres (nm)'], answer:'Micrometres (μm)', fact:'📏 One micrometre = one thousandth of a millimetre. A typical human cell is 10–20 μm across. Bacteria are even smaller at 1–10 μm!' },
  { level:1, visual:'🌱', question:'What are the five kingdoms of living organisms?', options:['Animals, Plants, Fungi, Bacteria, Protists','Animals, Plants, Fungi, Algae, Viruses','Animals, Plants, Bacteria, Insects, Fungi'], answer:'Animals, Plants, Fungi, Bacteria, Protists', fact:'🌱 The five-kingdom system classifies all life: Animalia (animals), Plantae (plants), Fungi (mushrooms/moulds), Prokaryotae/Monera (bacteria), Protoctista (amoeba, algae)!' },
  { level:1, visual:'🐠', question:'What is the difference between vertebrates and invertebrates?', options:['Vertebrates have a backbone; invertebrates do not','Vertebrates live on land; invertebrates live in water','Vertebrates are bigger than invertebrates'], answer:'Vertebrates have a backbone; invertebrates do not', fact:'🐠 Only about 3% of animal species are vertebrates (fish, amphibians, reptiles, birds, mammals). The other 97% are invertebrates including insects, worms and molluscs!' },
  { level:1, visual:'🐄', question:'What are the four key characteristics of mammals?', options:['Warm-blooded, hair/fur, feed young with milk, breathe air','Cold-blooded, scales, lay eggs, breathe through gills','Warm-blooded, feathers, lay eggs, breathe air'], answer:'Warm-blooded, hair/fur, feed young with milk, breathe air', fact:'🐄 All mammals — from mice to whales — share these traits. Even dolphins and whales have hair (a few whiskers) and breathe air, showing they evolved from land mammals!' },
  { level:1, visual:'🐦', question:'Which characteristic is UNIQUE to birds and not shared with any other animal group?', options:['Feathers','Being warm-blooded','Laying eggs'], answer:'Feathers', fact:'🐦 Feathers are found ONLY in birds — no other living animal has them. Being warm-blooded is shared with mammals; laying eggs is shared with reptiles and fish!' },
  { level:1, visual:'🐊', question:'What are three key features of reptiles?', options:['Dry scaly skin, ectothermic (cold-blooded), lay leathery eggs on land','Moist skin, endothermic (warm-blooded), lay eggs in water','Feathered skin, endothermic, lay hard-shelled eggs'], answer:'Dry scaly skin, ectothermic (cold-blooded), lay leathery eggs on land', fact:'🐊 Reptiles (snakes, lizards, crocodiles, turtles) rely on the sun to warm up. Their scaly waterproof skin and amniotic eggs freed them from needing water to reproduce!' },
  { level:1, visual:'🐸', question:'What is special about amphibians compared to other vertebrates?', options:['They must live near water and breathe through both gills (larvae) and lungs (adults)','They are the only vertebrates that can live both on land and in water permanently','They are ectothermic and lay hard-shelled eggs on land'], answer:'They must live near water and breathe through both gills (larvae) and lungs (adults)', fact:'🐸 Amphibians (frogs, newts, salamanders) have moist skin used for gas exchange. Their soft, unprotected eggs must be laid in water — unlike reptile eggs which are waterproof!' },
  { level:1, visual:'🐟', question:'What are three features of fish?', options:['Live in water, breathe through gills, have scales and fins','Live in water, breathe through lungs, have smooth skin','Live in water, are warm-blooded, have a backbone'], answer:'Live in water, breathe through gills, have scales and fins', fact:'🐟 Fish are the oldest vertebrate group — they first evolved about 500 million years ago! There are more species of fish than all other vertebrates combined!' },
  { level:1, visual:'🌸', question:'What is the difference between flowering and non-flowering plants?', options:['Flowering plants (angiosperms) produce flowers and seeds in fruit; non-flowering plants include ferns and mosses','Flowering plants live on land; non-flowering plants live in water','Non-flowering plants have leaves; flowering plants only have petals'], answer:'Flowering plants (angiosperms) produce flowers and seeds in fruit; non-flowering plants include ferns and mosses', fact:'🌸 Angiosperms are the most diverse plant group with 300,000+ species. Non-flowering plants like mosses and ferns reproduce by spores, not seeds — a much older strategy!' },
  { level:1, visual:'🔴', question:'In MRS GREN, what does the letter R stand for?', options:['Respiration','Reproduction','Response'], answer:'Respiration', fact:'🔴 MRS GREN = Movement, Respiration, Sensitivity, Growth, Reproduction, Excretion, Nutrition. Respiration is releasing energy from food — ALL living things do this, including plants!' },
  { level:1, visual:'🔴', question:'In MRS GREN, what does the letter N stand for?', options:['Nutrition','Neutralisation','Nitrogen'], answer:'Nutrition', fact:'🔴 Nutrition means getting food/energy. Autotrophs (like plants) make their own food via photosynthesis; heterotrophs (like animals) must eat other organisms to obtain nutrients!' },
  { level:1, visual:'🌿', question:'What gas do plants take IN during photosynthesis?', options:['Carbon dioxide','Oxygen','Nitrogen'], answer:'Carbon dioxide', fact:'🌿 Plants absorb CO₂ through tiny pores (stomata) on their leaves. Together with water absorbed by roots and sunlight energy, CO₂ is converted into glucose during photosynthesis!' },
  { level:1, visual:'🌿', question:'What gas is released by plants as a by-product of photosynthesis?', options:['Oxygen','Carbon dioxide','Nitrogen'], answer:'Oxygen', fact:'🌿 Every breath you take relies on photosynthesis! About 50% of Earth\'s oxygen comes from phytoplankton in the ocean and 50% from land plants — all via photosynthesis!' },
  { level:1, visual:'⚡', question:'What is the difference between aerobic and anaerobic respiration?', options:['Aerobic uses oxygen and releases more energy; anaerobic has no oxygen and releases less energy','Aerobic happens only in plants; anaerobic only in animals','Aerobic produces lactic acid; anaerobic produces carbon dioxide'], answer:'Aerobic uses oxygen and releases more energy; anaerobic has no oxygen and releases less energy', fact:'⚡ Aerobic respiration yields ~38 ATP per glucose; anaerobic only ~2 ATP. You switch to anaerobic respiration during intense exercise when oxygen can\'t be delivered fast enough!' },
  { level:1, visual:'🌱', question:'What is an autotroph?', options:['An organism that makes its own food using sunlight or chemicals','An organism that eats other organisms for food','An organism that breaks down dead material'], answer:'An organism that makes its own food using sunlight or chemicals', fact:'🌱 Autotrophs ("self-feeders") are the base of every food chain. Plants, algae and some bacteria use photosynthesis; some deep-sea bacteria use chemosynthesis (chemical energy)!' },
  { level:1, visual:'🐺', question:'What is a heterotroph?', options:['An organism that must eat other organisms to get energy','An organism that makes its own food','An organism that lives on dead organic matter only'], answer:'An organism that must eat other organisms to get energy', fact:'🐺 All animals are heterotrophs ("other-feeders"). Whether you\'re a cow eating grass or a lion eating a cow, you depend on autotrophs that captured energy from sunlight first!' },
  { level:1, visual:'🌸', question:'What is sexual reproduction?', options:['Reproduction involving two parents and the fusion of sex cells (gametes) to produce genetically unique offspring','Reproduction from one parent producing identical offspring','Reproduction by splitting in two'], answer:'Reproduction involving two parents and the fusion of sex cells (gametes) to produce genetically unique offspring', fact:'🌸 Sexual reproduction creates genetic variation through meiosis and fertilisation. This variation is the raw material for evolution by natural selection!' },
  { level:1, visual:'🌱', question:'What is asexual reproduction?', options:['Reproduction from one parent producing genetically identical offspring (clones)','Reproduction involving two parents and gametes','Reproduction that only occurs in plants'], answer:'Reproduction from one parent producing genetically identical offspring (clones)', fact:'🌱 Bacteria, hydra and strawberry plants reproduce asexually. It\'s fast and doesn\'t need a mate, but all offspring are identical clones — less adaptable to changing environments!' },
  { level:1, visual:'🫀', question:'What is the main function of the heart?', options:['Pump blood around the body','Filter waste from blood','Produce red blood cells'], answer:'Pump blood around the body', fact:'🫀 Your heart is a double pump — the right side pumps blood to the lungs; the left side pumps oxygenated blood to the body. It beats about 100,000 times every day!' },
  { level:1, visual:'🫁', question:'What is the main function of the lungs?', options:['Gas exchange — taking in oxygen and removing carbon dioxide','Pump blood to the body','Filter waste products from the blood'], answer:'Gas exchange — taking in oxygen and removing carbon dioxide', fact:'🫁 Your two lungs contain about 300 million alveoli. Spread flat, the total surface area of your lungs would cover a tennis court — maximising gas exchange efficiency!' },
  { level:1, visual:'🧠', question:'What is the main function of the brain?', options:['Control and coordinate all body functions and process information','Pump blood around the body','Produce hormones for growth'], answer:'Control and coordinate all body functions and process information', fact:'🧠 The human brain has about 86 billion neurons and can process information faster than any computer. It uses 20% of your body\'s energy despite being only 2% of your weight!' },
  { level:1, visual:'🧫', question:'What does the liver do?', options:['Produce bile, detoxify blood, regulate blood glucose, make proteins','Filter blood to make urine','Digest food by producing enzymes'], answer:'Produce bile, detoxify blood, regulate blood glucose, make proteins', fact:'🧫 The liver is your largest internal organ with over 500 functions! It breaks down toxins (including alcohol), recycles old red blood cells, and produces clotting proteins!' },
  { level:1, visual:'🫘', question:'What is the main function of the kidneys?', options:['Filter blood to remove urea and excess water, producing urine','Produce digestive enzymes','Pump blood to the lungs'], answer:'Filter blood to remove urea and excess water, producing urine', fact:'🫘 Each kidney contains about 1 million nephrons that filter your entire blood supply 40 times a day. Kidneys also regulate blood pressure and stimulate red blood cell production!' },
  { level:1, visual:'🍎', question:'What is the function of the stomach in digestion?', options:['Churn food and add acid and enzymes to begin protein digestion','Absorb nutrients into the blood','Store food until it can be digested by the liver'], answer:'Churn food and add acid and enzymes to begin protein digestion', fact:'🍎 Your stomach produces hydrochloric acid (pH 1–2) strong enough to dissolve metal! It kills bacteria in food and activates pepsin for protein digestion. The whole stomach lining replaces itself every 3 days!' },
  { level:1, visual:'🦴', question:'What is the function of the skeleton?', options:['Support the body, protect organs, allow movement, produce blood cells','Produce energy for muscles','Filter waste from the blood'], answer:'Support the body, protect organs, allow movement, produce blood cells', fact:'🦴 Your skeleton does more than hold you up — red blood cells are made in bone marrow, calcium and phosphorus are stored in bones, and the ribcage protects your heart and lungs!' },
  { level:1, visual:'💪', question:'How do antagonistic muscle pairs work?', options:['One muscle contracts while the other relaxes, allowing movement in opposite directions','Both muscles contract at the same time to create movement','One muscle pushes while the other pulls in the same direction'], answer:'One muscle contracts while the other relaxes, allowing movement in opposite directions', fact:'💪 The bicep and tricep are antagonistic — bicep contracts (arm bends), tricep relaxes; tricep contracts (arm straightens), bicep relaxes. Muscles can only PULL, never push!' },
  { level:1, visual:'🍽️', question:'What is the correct order of organs in the human digestive system?', options:['Mouth → oesophagus → stomach → small intestine → large intestine','Mouth → stomach → oesophagus → large intestine → small intestine','Mouth → oesophagus → large intestine → stomach → small intestine'], answer:'Mouth → oesophagus → stomach → small intestine → large intestine', fact:'🍽️ The whole digestive system is about 9 metres long! Food takes 24–72 hours to travel from mouth to exit. The small intestine (6–7m) does most of the nutrient absorption!' },
  { level:1, visual:'❤️', question:'What are the two circuits of the human circulatory system?', options:['Pulmonary circuit (heart to lungs) and systemic circuit (heart to body)','Arterial circuit (to body) and venous circuit (from body)','Upper circuit (heart to head) and lower circuit (heart to legs)'], answer:'Pulmonary circuit (heart to lungs) and systemic circuit (heart to body)', fact:'❤️ The pulmonary circuit collects oxygen from the lungs; the systemic circuit delivers it to the rest of the body. The left ventricle pumps at higher pressure because it must push blood much further!' },
  { level:1, visual:'🌬️', question:'What is the path of air into the lungs?', options:['Nose/mouth → trachea → bronchi → bronchioles → alveoli','Nose/mouth → oesophagus → bronchi → alveoli','Nose/mouth → trachea → alveoli → bronchi'], answer:'Nose/mouth → trachea → bronchi → bronchioles → alveoli', fact:'🌬️ The trachea (windpipe) splits into two bronchi (one per lung), which branch into bronchioles, ending in millions of alveoli where gas exchange actually happens!' },
  { level:1, visual:'💉', question:'What are the three types of blood cell in human blood?', options:['Red blood cells, white blood cells and platelets','Red blood cells, white blood cells and plasma cells','Red cells, lymphocytes and phagocytes'], answer:'Red blood cells, white blood cells and platelets', fact:'💉 Red cells carry oxygen, white cells fight infection, and platelets clot wounds. They all travel in plasma — the yellow liquid making up 55% of blood volume!' },
  { level:1, visual:'🦷', question:'What is the outer protective layer of a tooth called?', options:['Enamel','Dentine','Pulp'], answer:'Enamel', fact:'🦷 Tooth enamel is the hardest substance in the human body — harder than bone! It protects the softer dentine underneath. Sugar-loving bacteria produce acid that dissolves enamel, causing cavities!' },
  { level:1, visual:'🌾', question:'What is an ecosystem?', options:['All the living organisms and their non-living environment in an area, interacting together','All the plants in a particular area','The physical features of a habitat including temperature and rainfall'], answer:'All the living organisms and their non-living environment in an area, interacting together', fact:'🌾 Ecosystems include biotic factors (living things) and abiotic factors (temperature, light, pH, water). Coral reefs are among the most biodiverse ecosystems on Earth!' },
  { level:1, visual:'🐝', question:'What is pollination?', options:['The transfer of pollen from the male part (anther) to the female part (stigma) of a flower','The process of a seed developing into a plant','The release of seeds from a fruit'], answer:'The transfer of pollen from the male part (anther) to the female part (stigma) of a flower', fact:'🐝 Bees, butterflies and wind are key pollinators. About 75% of flowering plant species depend on animal pollinators. Without bees, many of our food crops would fail!' },
  { level:1, visual:'🌱', question:'What conditions does a seed need to germinate?', options:['Water, warmth and oxygen','Sunlight, water and warmth','Sunlight, soil and oxygen'], answer:'Water, warmth and oxygen', fact:'🌱 Seeds do NOT need light to germinate — just water to activate enzymes, warmth to speed up reactions, and oxygen for aerobic respiration to fuel early growth. Light comes later!' },
  { level:1, visual:'🦁', question:'In a food chain, what is a secondary consumer?', options:['An animal that eats primary consumers (herbivores)','An animal that eats only plants','An organism that breaks down dead material'], answer:'An animal that eats primary consumers (herbivores)', fact:'🦁 In grass → rabbit → fox: grass is producer, rabbit is primary consumer, fox is secondary consumer. Each level loses ~90% of energy as heat, so food chains are rarely more than 5 links long!' },
  { level:1, visual:'🌡️', question:'Why do humans need to maintain a constant body temperature?', options:['Enzymes work best at a specific temperature and denature if it changes too much','So that we can live in cold climates as well as hot ones','To stop muscles from freezing in cold weather'], answer:'Enzymes work best at a specific temperature and denature if it changes too much', fact:'🌡️ Human enzymes are optimised for 37°C. A fever of just 40°C slows many reactions; above 42°C, proteins begin to irreversibly denature — this is why very high fevers are life-threatening!' },
  { level:1, visual:'🧬', question:'What is a gene?', options:['A section of DNA that codes for a specific protein (or characteristic)','The entire DNA found in a cell\'s nucleus','A single base pair on a chromosome'], answer:'A section of DNA that codes for a specific protein (or characteristic)', fact:'🧬 Humans have about 20,000–25,000 genes on 46 chromosomes. Each gene is a set of instructions for making a specific protein, which then carries out a function in the body!' },
  { level:1, visual:'🐛', question:'What is a food chain and what do the arrows represent?', options:['A sequence showing what eats what — arrows show the direction of energy flow','A list of animals in an ecosystem in order of size','A diagram showing where animals live in a habitat'], answer:'A sequence showing what eats what — arrows show the direction of energy flow', fact:'🐛 Arrows in food chains show energy flow — NOT "is eaten by". So grass → rabbit → fox means energy passes from grass to rabbit to fox as each is consumed!' },
  { level:1, visual:'🌊', question:'What does photosynthesis produce that all animals depend on?', options:['Oxygen and glucose','Carbon dioxide and water','Nitrogen and minerals'], answer:'Oxygen and glucose', fact:'🌊 Photosynthesis produces oxygen (which animals breathe) AND glucose (the base of all food chains). Without photosynthesis, complex animal life as we know it could not exist!' },
  { level:1, visual:'🦠', question:'What are the four main types of pathogen that cause disease?', options:['Bacteria, viruses, fungi and protists','Bacteria, viruses, parasites and chemicals','Bacteria, viruses, allergens and toxins'], answer:'Bacteria, viruses, fungi and protists', fact:'🦠 Pathogens are disease-causing microorganisms. Bacteria cause food poisoning and TB; viruses cause flu and COVID; fungi cause athlete\'s foot; protists cause malaria!' },
  { level:1, visual:'💊', question:'How do antibiotics fight bacterial infections?', options:['They kill bacteria or stop them reproducing, without harming human cells','They destroy the viruses causing the infection','They boost the immune system to fight off any pathogen'], answer:'They kill bacteria or stop them reproducing, without harming human cells', fact:'💊 Antibiotics target structures unique to bacteria — like their cell walls. They do NOT work on viruses! Overuse has led to antibiotic-resistant "superbugs" like MRSA — a major global health threat!' },
  { level:1, visual:'💉', question:'How do vaccines protect us from disease?', options:['They introduce a harmless form of a pathogen so the immune system makes memory cells without us getting ill','They contain antibiotics that destroy the pathogen before it makes us ill','They strengthen all white blood cells so they can fight any pathogen'], answer:'They introduce a harmless form of a pathogen so the immune system makes memory cells without us getting ill', fact:'💉 Vaccines have eradicated smallpox and nearly eliminated polio worldwide. They work by "training" your immune system — when the real pathogen arrives, memory cells respond rapidly!' },
  { level:1, visual:'🌱', question:'What is natural selection?', options:['Individuals with better-suited traits survive and reproduce more, passing their traits to offspring','Humans choosing which animals to breed to get desired characteristics','The process by which organisms adapt their behaviour in response to the environment'], answer:'Individuals with better-suited traits survive and reproduce more, passing their traits to offspring', fact:'🌱 Charles Darwin developed natural selection after his voyage on HMS Beagle (1831–36). He observed that organisms produce more offspring than can survive — those best adapted win!' },
  { level:1, visual:'🐘', question:'What is biodiversity?', options:['The variety of different species and ecosystems in an area or on Earth','The total number of individual organisms in an ecosystem','The number of different habitats in a region'], answer:'The variety of different species and ecosystems in an area or on Earth', fact:'🐘 High biodiversity makes ecosystems more stable and resilient. Scientists have described about 8.7 million species, but estimate 80–90% of species on Earth are still undiscovered!' },
  { level:1, visual:'🌍', question:'What is the main human cause of habitat destruction and species extinction?', options:['Deforestation and land clearance for agriculture and development','Climate change caused by factory emissions only','Pollution of rivers and oceans'], answer:'Deforestation and land clearance for agriculture and development', fact:'🌍 About half of Earth\'s forests have been cleared — mostly for farming and cattle ranching. This is the number one driver of the current mass extinction event, the sixth in Earth\'s history!' },
  { level:1, visual:'🔬', question:'What does "specialised" mean when describing a cell?', options:['A cell adapted in structure and function to do a specific job','A cell that can turn into any type of cell','A cell that has divided to form a group of identical cells'], answer:'A cell adapted in structure and function to do a specific job', fact:'🔬 Specialised cells have unique features for their job. Red blood cells have no nucleus (more room for haemoglobin); root hair cells have a large surface area to absorb water; neurons have long axons!' },
  { level:1, visual:'🐋', question:'What is adaptation in biology?', options:['A feature that makes an organism better suited to survive in its environment','A change in behaviour that an organism learns during its lifetime','The process of moving to a new habitat when conditions change'], answer:'A feature that makes an organism better suited to survive in its environment', fact:'🐋 A polar bear\'s white fur (camouflage + insulation), hollow fur (traps air for warmth), and large feet (snowshoes) are all adaptations. Evolution shapes organisms to fit their environment!' },
  { level:1, visual:'🧪', question:'What are enzymes?', options:['Biological catalysts — proteins that speed up chemical reactions in living organisms','Chemicals produced by the liver to digest fats','Sugar molecules used for energy in cells'], answer:'Biological catalysts — proteins that speed up chemical reactions in living organisms', fact:'🧪 Enzymes control virtually every chemical reaction in your body — from DNA copying to digestion. They work by lowering the activation energy needed for a reaction to occur!' },
  { level:1, visual:'🌿', question:'What is the role of the root in a plant?', options:['Anchor the plant in soil and absorb water and minerals','Make food by photosynthesis','Carry water from leaves to the rest of the plant'], answer:'Anchor the plant in soil and absorb water and minerals', fact:'🌿 Root tips have tiny root hair cells that massively increase the surface area for water and mineral absorption. A single rye plant has 14 million root hairs with a total surface area of 400 m²!' },
  { level:1, visual:'🍄', question:'How do fungi feed?', options:['They release enzymes onto food outside their body and absorb the digested nutrients','They photosynthesise like plants using sunlight','They ingest food particles and digest them internally like animals'], answer:'They release enzymes onto food outside their body and absorb the digested nutrients', fact:'🍄 Fungi are saprotrophic — they digest dead material externally. A single teaspoon of forest soil can contain several kilometres of fungal threads (hyphae), breaking down leaves and wood!' },
  { level:1, visual:'🌾', question:'What is the difference between a producer, consumer and decomposer in an ecosystem?', options:['Producers make food from sunlight; consumers eat other organisms; decomposers break down dead matter','Producers eat plants; consumers eat animals; decomposers eat both','Producers are animals; consumers are plants; decomposers are bacteria only'], answer:'Producers make food from sunlight; consumers eat other organisms; decomposers break down dead matter', fact:'🌾 All three roles are essential — if decomposers disappeared, dead material would pile up and nutrients (nitrogen, carbon, phosphorus) would be locked away from producers forever!' },
  { level:1, visual:'🧠', question:'What is the nervous system\'s main job?', options:['Detect stimuli and coordinate fast responses throughout the body','Produce hormones that regulate body processes','Filter waste from the blood and control water balance'], answer:'Detect stimuli and coordinate fast responses throughout the body', fact:'🧠 The nervous system has two parts: the central nervous system (brain + spinal cord) and peripheral nervous system (all other nerves). Nerve impulses travel at up to 120 m/s — faster than a Formula 1 car!' },
  { level:1, visual:'🌡️', question:'What is a reflex action?', options:['A fast, automatic response to a stimulus that does NOT involve conscious thought in the brain','A learned response that the brain controls','A hormonal response to stress that takes several minutes'], answer:'A fast, automatic response to a stimulus that does NOT involve conscious thought in the brain', fact:'🌡️ Reflexes protect you before your brain can even register pain! Touching a hot object triggers a reflex arc: receptor → sensory neuron → relay neuron → motor neuron → muscle — in under 0.2 seconds!' },
  { level:1, visual:'💧', question:'What is the function of the large intestine in digestion?', options:['Absorb water from undigested food, forming solid faeces','Absorb nutrients from digested food into the blood','Produce enzymes to digest carbohydrates'], answer:'Absorb water from undigested food, forming solid faeces', fact:'💧 The large intestine reabsorbs about 1.5 litres of water per day! It also contains trillions of bacteria (the gut microbiome) that break down fibre and produce vitamins K and B12!' },
  { level:1, visual:'🌊', question:'What does the term "trophic level" mean in ecology?', options:['The feeding position of an organism in a food chain','The territory size of a predator in an ecosystem','The population size of a species in a community'], answer:'The feeding position of an organism in a food chain', fact:'🌊 Level 1 = producers, Level 2 = herbivores, Level 3 = carnivores, Level 4 = top predators. Energy is lost (~90%) at each level, which is why fewer organisms exist at higher trophic levels!' },
  { level:1, visual:'🌸', question:'What is the function of flowers in plants?', options:['Sexual reproduction — attracting pollinators and producing seeds after fertilisation','Photosynthesis — capturing sunlight to produce food','Absorbing water and minerals from the surrounding soil'], answer:'Sexual reproduction — attracting pollinators and producing seeds after fertilisation', fact:'🌸 Flowers evolved to attract specific pollinators — bees are attracted to blue/violet flowers with UV patterns; butterflies prefer red flowers. After pollination and fertilisation, the ovary becomes a fruit!' },
  { level:1, visual:'🔬', question:'What is the difference between an organ and an organ system?', options:['An organ is a group of tissues working together; an organ system is a group of organs working together for a broader function','An organ is larger than an organ system','An organ system is found only in animals; organs exist in plants too'], answer:'An organ is a group of tissues working together; an organ system is a group of organs working together for a broader function', fact:'🔬 The heart is an organ (cardiac muscle + connective tissue + nerve tissue). The circulatory system is the organ system containing the heart, blood vessels and blood all working together!' },
  { level:1, visual:'🦷', question:'What do teeth do that begins the process of digestion?', options:['Mechanically break down food into smaller pieces, increasing surface area for enzymes','Chemically digest carbohydrates using amylase enzyme','Kill bacteria in food using acid produced in the mouth'], answer:'Mechanically break down food into smaller pieces, increasing surface area for enzymes', fact:'🦷 Chewing is called mechanical digestion. Saliva also contains amylase, which begins chemical digestion of starch. Smaller food pieces have a larger surface area, so enzymes digest faster!' },
  { level:1, visual:'🌿', question:'What is transpiration?', options:['The evaporation of water from the leaves of a plant through tiny pores called stomata','The absorption of water by roots from the soil','The transport of glucose from leaves to the rest of a plant'], answer:'The evaporation of water from the leaves of a plant through tiny pores called stomata', fact:'🌿 Transpiration creates a "pull" that draws water up through the plant. A large tree can lose 400 litres per day! Plants close their stomata on hot dry days to prevent water loss!' },
  { level:1, visual:'🔋', question:'Why do all living things need energy?', options:['For movement, growth, reproduction, maintaining body temperature and all other life processes','Only for movement and reproduction','Only for maintaining body temperature in warm-blooded animals'], answer:'For movement, growth, reproduction, maintaining body temperature and all other life processes', fact:'🔋 Even when you are completely still, your body uses energy for heartbeat, breathing, brain activity and keeping you warm. Your basal metabolic rate (BMR) uses most of your daily energy!' },
  { level:1, visual:'🧬', question:'What are chromosomes made of?', options:['DNA tightly coiled around proteins called histones','Proteins alone with RNA attached','RNA copies of the cell\'s genetic instructions'], answer:'DNA tightly coiled around proteins called histones', fact:'🧬 If you uncoiled all the DNA from one human cell it would be about 2 metres long! It fits inside a nucleus just 6 micrometres across by wrapping around histone proteins to form chromosomes!' },
  { level:1, visual:'🐜', question:'Name three invertebrate phyla.', options:['Arthropoda (insects/spiders/crabs), Mollusca (snails/squid), Annelida (earthworms)','Arthropoda, Mammalia, Reptilia','Mollusca, Chordata, Amphibia'], answer:'Arthropoda (insects/spiders/crabs), Mollusca (snails/squid), Annelida (earthworms)', fact:'🐜 Arthropods are the most species-rich phylum (over 1 million species). Molluscs include giants like the colossal squid. Annelids (ringed worms) are vital to soil health — earthworms alone aerate millions of acres!' },
  { level:1, visual:'🌡️', question:'What is the difference between ectotherms and endotherms?', options:['Ectotherms (cold-blooded) rely on the environment for body heat; endotherms (warm-blooded) generate their own body heat internally','Ectotherms are always cold; endotherms are always warm regardless of habitat','Ectotherms only live in cold climates; endotherms in hot climates'], answer:'Ectotherms (cold-blooded) rely on the environment for body heat; endotherms (warm-blooded) generate their own body heat internally', fact:'🌡️ Snakes must bask in the sun to warm up; mammals burn food to stay warm. Endothermy requires much more food energy but allows activity in cold conditions and at night!' },
  { level:1, visual:'🔬', question:'What is the difference between a tissue and an organ?', options:['A tissue is a group of similar cells; an organ is made of several different tissues working together','A tissue is larger than an organ','Tissues only exist in animals; organs exist in plants too'], answer:'A tissue is a group of similar cells; an organ is made of several different tissues working together', fact:'🔬 Muscle tissue is a group of muscle cells. Your stomach is an organ built from muscle tissue (to churn food), epithelial tissue (lining) and nervous tissue (to coordinate movement)!' },

  // ── MEDIUM EXTRA (questions 51–167) ─────────────────────────────────────────
  { level:2, visual:'🔬', question:'What is the function of a specialised red blood cell and how is it adapted for this?', options:['Carry oxygen — no nucleus (more space for haemoglobin), biconcave disc (larger surface area), flexible to squeeze through capillaries','Carry oxygen — large nucleus for making haemoglobin, rigid shape to maintain structure','Fight infection — contains haemoglobin and can engulf pathogens'], answer:'Carry oxygen — no nucleus (more space for haemoglobin), biconcave disc (larger surface area), flexible to squeeze through capillaries', fact:'🔬 Red blood cells lose their nucleus as they mature, making them one of the few human cells without DNA. Their biconcave shape gives 30% more surface area than a flat disc — maximising oxygen loading!' },
  { level:2, visual:'🌱', question:'How is a root hair cell adapted for its function?', options:['Has a large surface area projection to absorb water and minerals by diffusion/active transport','Contains chloroplasts to make food close to the soil','Has a thick cell wall to withstand pressure from surrounding soil'], answer:'Has a large surface area projection to absorb water and minerals by diffusion/active transport', fact:'🌱 Root hair cells have a finger-like projection that massively increases surface area. They have many mitochondria for active transport of ions and a large vacuole to maintain water potential!' },
  { level:2, visual:'🧠', question:'How is a neuron (nerve cell) adapted for its function?', options:['Very long axon to carry signals over long distances, myelin sheath for insulation and speed, synaptic knobs to release neurotransmitters','Very short and round to fit signals within a small space','Contains many mitochondria but no nucleus to allow impulses to pass through it'], answer:'Very long axon to carry signals over long distances, myelin sheath for insulation and speed, synaptic knobs to release neurotransmitters', fact:'🧠 The sciatic nerve\'s motor neurons run from your spinal cord to your foot — almost a metre long in one cell! Myelin boosts conduction from 1 m/s to over 100 m/s!' },
  { level:2, visual:'🌿', question:'What are the limiting factors for the rate of photosynthesis?', options:['Light intensity, CO₂ concentration and temperature','Only light intensity and water availability','Temperature, oxygen concentration and glucose level'], answer:'Light intensity, CO₂ concentration and temperature', fact:'🌿 Any of these can be the bottleneck — like a production line. Greenhouses add CO₂ and heat to maximise photosynthesis. At very high light, CO₂ becomes limiting; at low temperatures, enzymes slow!' },
  { level:2, visual:'🧫', question:'What is the purpose of cell division (mitosis) in multicellular organisms?', options:['Growth of the organism and repair/replacement of damaged or worn-out cells','Production of sex cells (gametes) for reproduction','Creating genetic diversity in a population through recombination'], answer:'Growth of the organism and repair/replacement of damaged or worn-out cells', fact:'🧫 Your body replaces about 3.8 million cells every second through mitosis! Skin cells last 2–3 weeks, red blood cells 120 days, liver cells 12–18 months. Some neurons last a lifetime!' },
  { level:2, visual:'🔵', question:'If a plant cell is placed in a very concentrated salt solution, what happens?', options:['Water leaves the cell by osmosis, the vacuole shrinks and the cell becomes plasmolysed','Water enters the cell by osmosis and the cell swells and bursts','Nothing — the cell wall prevents any water movement'], answer:'Water leaves the cell by osmosis, the vacuole shrinks and the cell becomes plasmolysed', fact:'🔵 When the cytoplasm pulls away from the cell wall it\'s called plasmolysis. This is why slugs shrivel when sprinkled with salt! Animal cells in salt solution shrivel too (crenation) but without a wall to hold them!' },
  { level:2, visual:'💧', question:'What happens to a red blood cell placed in pure (distilled) water?', options:['Water enters by osmosis down a concentration gradient, the cell swells and bursts (lysis)','Water leaves the cell and it shrinks (crenation)','Nothing — red blood cells have a protective cell wall'], answer:'Water enters by osmosis down a concentration gradient, the cell swells and bursts (lysis)', fact:'💧 Red blood cells burst in pure water because the concentration of water is higher outside. This is why hospital IV fluids are carefully matched to blood osmolarity — pure water would be fatal!' },
  { level:2, visual:'⚡', question:'What is fermentation by yeast, and what products does it make?', options:['Anaerobic respiration by yeast: glucose → ethanol + carbon dioxide','Aerobic respiration by yeast: glucose + oxygen → CO₂ + water','Yeast breaking down proteins to release amino acids and energy'], answer:'Anaerobic respiration by yeast: glucose → ethanol + carbon dioxide', fact:'⚡ Fermentation has been used for at least 9,000 years for bread and alcohol. The CO₂ makes bread rise and creates bubbles in beer; the ethanol (alcohol) is the intoxicating product!' },
  { level:2, visual:'💪', question:'What is lactic acid fermentation and when does it occur in muscles?', options:['When muscles respire anaerobically during intense exercise: glucose → lactic acid + a little energy','When muscles break down protein for energy during starvation','When muscles convert lactic acid back to glucose in the liver using oxygen'], answer:'When muscles respire anaerobically during intense exercise: glucose → lactic acid + a little energy', fact:'💪 Lactic acid builds up during sprinting when you can\'t supply enough oxygen. The burning sensation IS the acid! After exercise, extra oxygen (the "oxygen debt") is used to convert lactic acid back to glucose in the liver!' },
  { level:2, visual:'🌿', question:'What are the leaf adaptations that maximise photosynthesis?', options:['Broad and flat (large surface area), thin (short diffusion path for CO₂), transparent epidermis (light transmission), many chloroplasts in palisade cells, stomata for gas exchange','Thick and waxy to protect from UV damage and prevent evaporation','Narrow and round to minimise water loss in all conditions'], answer:'Broad and flat (large surface area), thin (short diffusion path for CO₂), transparent epidermis (light transmission), many chloroplasts in palisade cells, stomata for gas exchange', fact:'🌿 Palisade mesophyll cells at the top of the leaf have the most chloroplasts because they receive the most light. Spongy mesophyll below has air spaces to allow rapid CO₂ diffusion!' },
  { level:2, visual:'🧬', question:'What is the difference between dominant and recessive alleles?', options:['Dominant alleles are expressed even when only one copy is present; recessive alleles only show when two copies are inherited','Dominant alleles are always beneficial; recessive alleles are always harmful','Dominant alleles come from fathers; recessive alleles come from mothers'], answer:'Dominant alleles are expressed even when only one copy is present; recessive alleles only show when two copies are inherited', fact:'🧬 Capital letters denote dominant alleles (T), lower case denote recessive (t). A person with Tt (heterozygous) expresses the dominant trait but carries and can pass on the recessive allele!' },
  { level:2, visual:'🧬', question:'What is the term for having two DIFFERENT alleles for a gene?', options:['Heterozygous','Homozygous','Codominant'], answer:'Heterozygous', fact:'🧬 Heterozygous individuals (e.g. Tt) carry both a dominant and recessive allele. They show the dominant phenotype but are "carriers" of the recessive allele — which can appear in their offspring!' },
  { level:2, visual:'🔬', question:'If a parent is Bb and the other is Bb, what fraction of their offspring will be bb (recessive)?', options:['1/4 (25%)','1/2 (50%)','3/4 (75%)'], answer:'1/4 (25%)', fact:'🔬 Punnett square for Bb × Bb gives BB (1), Bb (2), bb (1). So 1 in 4 = 25% chance of recessive homozygous offspring. Cystic fibrosis works exactly this way — two carrier parents have a 25% chance of an affected child!' },
  { level:2, visual:'🌍', question:'What is the carbon cycle?', options:['The continuous movement of carbon through living organisms, atmosphere, oceans and rocks via photosynthesis, respiration, combustion and decomposition','The process by which plants absorb CO₂ from the atmosphere only','The recycling of carbon between the atmosphere and oceans only'], answer:'The continuous movement of carbon through living organisms, atmosphere, oceans and rocks via photosynthesis, respiration, combustion and decomposition', fact:'🌍 Carbon is locked in coal and oil (fossilised organisms). Burning releases it as CO₂ — disrupting the natural cycle. The ocean absorbs ~30% of human CO₂ emissions but is becoming acidic as a result!' },
  { level:2, visual:'🌱', question:'What is the nitrogen cycle and why is it important?', options:['The cycling of nitrogen through the atmosphere, soil and living organisms — essential for making proteins and DNA in all life','The cycling of nitrogen between plants and animals only','The conversion of nitrogen gas into fertilisers by industrial processes only'], answer:'The cycling of nitrogen through the atmosphere, soil and living organisms — essential for making proteins and DNA in all life', fact:'🌱 Nitrogen-fixing bacteria in soil and root nodules (of legumes) convert N₂ to ammonia. Nitrifying bacteria convert this to nitrates that plants absorb. Without this cycle, life as we know it would be impossible!' },
  { level:2, visual:'💧', question:'Describe the water cycle in biology.', options:['Water evaporates from land/sea, condenses as clouds, falls as precipitation, is absorbed by organisms, and returns via transpiration and respiration','Water is produced only by respiration and photosynthesis in living organisms','Water only cycles between animals and plants through drinking and urination'], answer:'Water evaporates from land/sea, condenses as clouds, falls as precipitation, is absorbed by organisms, and returns via transpiration and respiration', fact:'💧 Plants are key players in the water cycle — a tropical forest returns up to 75% of rainfall back to the atmosphere via transpiration. Deforestation disrupts rainfall patterns across entire regions!' },
  { level:2, visual:'🐺', question:'What is a predator-prey relationship and how do populations fluctuate?', options:['When prey increases, predator numbers rise; when predators increase, prey decreases — creating a cyclical oscillating pattern','Predators always drive prey to extinction over time','Prey always outcompete predators because they reproduce faster'], answer:'When prey increases, predator numbers rise; when predators increase, prey decreases — creating a cyclical oscillating pattern', fact:'🐺 The classic example is Canadian lynx and snowshoe hare — their populations oscillate roughly every 10 years. The predator cycle LAGS behind the prey cycle because predators need time to reproduce!' },
  { level:2, visual:'🌿', question:'What is intraspecific competition?', options:['Competition between individuals of the SAME species for the same resources','Competition between individuals of DIFFERENT species for the same resources','Competition between a predator and its prey'], answer:'Competition between individuals of the SAME species for the same resources', fact:'🌿 Same-species competition is most intense because they have exactly the same needs. Male deer compete for females and territory; plants of the same species compete for light, water and nutrients!' },
  { level:2, visual:'🌾', question:'What is interspecific competition?', options:['Competition between individuals of DIFFERENT species for the same resources','Competition between individuals of the same species','Competition between predators only'], answer:'Competition between individuals of DIFFERENT species for the same resources', fact:'🌾 When grey squirrels were introduced to the UK, they outcompeted red squirrels for food and territory — interspecific competition. Grey squirrels also carry squirrelpox (harmless to them, lethal to reds)!' },
  { level:2, visual:'🏔️', question:'What is ecological succession?', options:['The gradual change in a community over time from bare ground to a climax community, as species modify the environment to make it suitable for new species','The sudden replacement of all species in an ecosystem after a catastrophic event','The seasonal migration of animals to different habitats throughout the year'], answer:'The gradual change in a community over time from bare ground to a climax community, as species modify the environment to make it suitable for new species', fact:'🏔️ Primary succession starts on bare rock — pioneer species (lichens, mosses) break down rock and add organic matter. Over hundreds of years this can become a forest! Secondary succession starts from soil after disturbance.' },
  { level:2, visual:'🧬', question:'What is a mutation?', options:['A random change in the DNA sequence of an organism','A deliberate change to an organism\'s DNA by scientists','An inherited disease passed from parent to offspring'], answer:'A random change in the DNA sequence of an organism', fact:'🧬 Most mutations are neutral or harmful, but a small number are beneficial — these are the raw material of evolution! UV radiation, X-rays and some chemicals increase mutation rate!' },
  { level:2, visual:'🌿', question:'What is selective breeding (artificial selection)?', options:['Humans choosing organisms with desirable traits to breed, repeating over generations to enhance desired characteristics','The natural process of organisms choosing the best mates','Genetic engineering by inserting genes from one species into another'], answer:'Humans choosing organisms with desirable traits to breed, repeating over generations to enhance desired characteristics', fact:'🌿 All dog breeds were created by selective breeding from wolves over 15,000 years. Modern crops produce 10–100× more yield than wild ancestors due to thousands of years of selective breeding!' },
  { level:2, visual:'🦋', question:'What are the three types of adaptation?', options:['Structural (body features), behavioural (actions) and physiological (internal processes)','Physical, chemical and genetic adaptations','Inherited, learned and environmental adaptations'], answer:'Structural (body features), behavioural (actions) and physiological (internal processes)', fact:'🦋 Polar bear: structural (white fur, thick fat layer), behavioural (hibernation in winter), physiological (reduced metabolism when food is scarce). All three work together!' },
  { level:2, visual:'🔬', question:'What is an ecological pyramid of numbers?', options:['A diagram showing the number of organisms at each trophic level — usually largest at the bottom (producers) and smallest at the top (top predators)','A diagram showing the total energy at each trophic level','A diagram showing the mass of organisms at each trophic level'], answer:'A diagram showing the number of organisms at each trophic level — usually largest at the bottom (producers) and smallest at the top (top predators)', fact:'🔬 A pyramid of numbers can be "inverted" — one oak tree supports thousands of caterpillars. A pyramid of biomass or energy is always conventionally pyramid-shaped because energy is lost at each level!' },
  { level:2, visual:'💧', question:'What is the process of osmosis and give a biological example.', options:['Movement of water from high water concentration to low water concentration through a semi-permeable membrane — e.g. water entering root hair cells from soil','Movement of dissolved solutes from high to low concentration — e.g. glucose entering cells','Movement of water using energy to cross a cell membrane against a gradient'], answer:'Movement of water from high water concentration to low water concentration through a semi-permeable membrane — e.g. water entering root hair cells from soil', fact:'💧 Osmosis is behind turgidity in plants — water inside vacuoles pushes outward, making cells firm. Without water, plants wilt. Dialysis machines use osmosis to clean blood in patients with kidney failure!' },
  { level:2, visual:'🔬', question:'What is the difference between aerobic and anaerobic respiration in terms of products and energy yield?', options:['Aerobic: glucose + O₂ → CO₂ + H₂O + ~38 ATP. Anaerobic: glucose → lactic acid (animals) or ethanol + CO₂ (yeast) + ~2 ATP','Aerobic produces lactic acid; anaerobic produces CO₂ and water','Aerobic occurs in mitochondria only; anaerobic occurs in the nucleus'], answer:'Aerobic: glucose + O₂ → CO₂ + H₂O + ~38 ATP. Anaerobic: glucose → lactic acid (animals) or ethanol + CO₂ (yeast) + ~2 ATP', fact:'🔬 Aerobic respiration is 19× more efficient! Anaerobic is a useful emergency measure but lactic acid builds up and must later be broken down using oxygen (the "oxygen debt" — why you breathe heavily after exercise)!' },
  { level:2, visual:'🧫', question:'What are stem cells and why are they medically important?', options:['Undifferentiated cells that can divide and differentiate into specialised cell types — potentially used to repair damaged tissues like heart muscle or spinal cord','Cells that have already differentiated and cannot change — used only for organ transplants','Plant cells found in root tips that can regenerate entire new plants'], answer:'Undifferentiated cells that can divide and differentiate into specialised cell types — potentially used to repair damaged tissues like heart muscle or spinal cord', fact:'🧫 Embryonic stem cells are pluripotent (can become any cell type). Induced pluripotent stem cells (iPSCs) from adult cells bypassed some ethical concerns. Stem cell therapies for Parkinson\'s and blindness are being trialled!' },
  { level:2, visual:'🔬', question:'What happens during the light-dependent reactions of photosynthesis?', options:['Light energy splits water molecules (photolysis), releasing oxygen as a by-product and producing ATP and NADPH','Light energy combines CO₂ and water to directly produce glucose','Chlorophyll converts CO₂ into glucose using the energy from ATP'], answer:'Light energy splits water molecules (photolysis), releasing oxygen as a by-product and producing ATP and NADPH', fact:'🔬 The light reactions happen in the thylakoid membranes of the chloroplast. Water splitting releases the oxygen we breathe. The ATP produced powers the Calvin cycle where CO₂ is fixed into glucose!' },
  { level:2, visual:'🌿', question:'In the carbon cycle, what processes RELEASE CO₂ back to the atmosphere?', options:['Respiration (all organisms), decomposition and combustion (burning)','Photosynthesis and transpiration','Nitrogen fixation and denitrification'], answer:'Respiration (all organisms), decomposition and combustion (burning)', fact:'🌿 Plants both absorb CO₂ (photosynthesis) AND release it (respiration) — but photosynthesis absorbs more in daylight. Decomposition and burning fossil fuels are massive additional CO₂ sources!' },
  { level:2, visual:'🧬', question:'What is the difference between inherited variation and environmental variation?', options:['Inherited variation is caused by genes (e.g. blood group, eye colour); environmental variation is caused by the environment (e.g. scars, language spoken)','Inherited variation is always visible; environmental variation is always invisible','Inherited variation changes with age; environmental variation is fixed at birth'], answer:'Inherited variation is caused by genes (e.g. blood group, eye colour); environmental variation is caused by the environment (e.g. scars, language spoken)', fact:'🧬 Many traits show BOTH! Height is influenced by genes AND nutrition. Identical twins have the same genes but can have very different heights if raised with different diets!' },
  { level:2, visual:'🌾', question:'What is a niche in ecology?', options:['The functional role of an organism in its ecosystem — including what it eats, when it is active and where it lives','The physical location where an organism lives','The total geographic range of a species'], answer:'The functional role of an organism in its ecosystem — including what it eats, when it is active and where it lives', fact:'🌾 No two species can occupy exactly the same niche in the same place for long — one will outcompete the other (competitive exclusion principle). Niche partitioning allows similar species to coexist!' },
  { level:2, visual:'🔬', question:'What is the difference between a food chain and a food web?', options:['A food chain shows one pathway of energy flow; a food web shows many interconnected food chains in an ecosystem','A food chain includes all organisms; a food web only includes vertebrates','A food web only shows producers and consumers; a food chain also includes decomposers'], answer:'A food chain shows one pathway of energy flow; a food web shows many interconnected food chains in an ecosystem', fact:'🔬 Food webs are more realistic — most organisms eat and are eaten by multiple species. Removing one species from a web can have cascading effects throughout the entire ecosystem!' },
  { level:2, visual:'🦠', question:'What is the lytic cycle of a virus?', options:['Virus injects DNA into host cell → uses host machinery to replicate → new viruses assembled → host cell bursts (lysis) releasing viruses','Virus integrates into host DNA and remains dormant for years before being activated','Virus is destroyed by the host immune system before it can replicate'], answer:'Virus injects DNA into host cell → uses host machinery to replicate → new viruses assembled → host cell bursts (lysis) releasing viruses', fact:'🦠 A single viral infection cycle can produce 200–1,000 new viruses in hours. The alternative (lysogenic cycle) sees viral DNA integrate silently into host DNA — this is how HIV can remain dormant!' },
  { level:2, visual:'🩸', question:'What is the role of platelets in the blood?', options:['Clot blood at wound sites by forming a plug and triggering clotting factor release','Fight infections by engulfing pathogens','Carry oxygen bound to haemoglobin throughout the body'], answer:'Clot blood at wound sites by forming a plug and triggering clotting factor release', fact:'🩸 Platelets (thrombocytes) are cell fragments without a nucleus. When a blood vessel is cut, they clump at the wound and trigger a cascade producing fibrin — a mesh that traps red cells to form a clot!' },
  { level:2, visual:'💉', question:'What is the difference between a B lymphocyte and a plasma cell?', options:['B lymphocytes are activated by antigens and then differentiate into plasma cells that actively secrete large amounts of antibodies','B lymphocytes secrete antibodies directly; plasma cells are memory cells','Plasma cells are a type of T lymphocyte that coordinates the immune response'], answer:'B lymphocytes are activated by antigens and then differentiate into plasma cells that actively secrete large amounts of antibodies', fact:'💉 A single plasma cell can secrete 2,000 antibodies per second! After the infection clears, most plasma cells die, but some B lymphocytes become long-lived memory cells — ready to respond in hours if re-infected!' },
  { level:2, visual:'🔬', question:'What is the difference between Type 1 and Type 2 diabetes?', options:['Type 1: immune system destroys insulin-producing beta cells (must inject insulin); Type 2: body cells become resistant to insulin (managed by diet/exercise/medication)','Type 1: caused by overeating sugar; Type 2: caused by genetic factors only','Type 1 is more common than Type 2 worldwide'], answer:'Type 1: immune system destroys insulin-producing beta cells (must inject insulin); Type 2: body cells become resistant to insulin (managed by diet/exercise/medication)', fact:'🔬 Type 2 diabetes affects 90% of all diabetes cases and is strongly linked to obesity and inactivity. The body produces insulin but cells stop responding. It can often be reversed by weight loss and diet change!' },
  { level:2, visual:'🌿', question:'What is the role of ADH (antidiuretic hormone) in the body?', options:['Regulates water reabsorption in the kidneys — high ADH = more water reabsorbed = less/more concentrated urine','Regulates blood glucose by triggering glycogen breakdown in the liver','Controls muscle contraction during exercise by acting on motor neurons'], answer:'Regulates water reabsorption in the kidneys — high ADH = more water reabsorbed = less/more concentrated urine', fact:'🌿 ADH is released by the pituitary gland when blood becomes too concentrated (e.g. after sweating). It causes kidney collecting ducts to reabsorb more water — producing small amounts of concentrated urine!' },
  { level:2, visual:'🧠', question:'What is the difference between the CNS and PNS?', options:['CNS = brain + spinal cord (processing centre); PNS = all nerves outside the CNS (carrying signals to/from the CNS)','CNS = all nerves in the body; PNS = brain only','CNS controls voluntary movement; PNS controls all involuntary actions'], answer:'CNS = brain + spinal cord (processing centre); PNS = all nerves outside the CNS (carrying signals to/from the CNS)', fact:'🧠 The PNS includes sensory nerves (carrying signals from receptors to CNS) and motor nerves (carrying commands from CNS to effectors like muscles and glands). The autonomic PNS controls breathing and heart rate!' },
  { level:2, visual:'🔬', question:'What is the reflex arc, and name all five components in order?', options:['Receptor → sensory neuron → relay neuron (in spinal cord) → motor neuron → effector (muscle/gland)','Stimulus → brain → motor neuron → muscle → response','Receptor → motor neuron → brain → sensory neuron → effector'], answer:'Receptor → sensory neuron → relay neuron (in spinal cord) → motor neuron → effector (muscle/gland)', fact:'🔬 The relay neuron in the spinal cord is key — it connects sensory and motor neurons WITHOUT involving the brain, making reflexes lightning fast (0.1–0.2 seconds). The brain is informed AFTER the response!' },
  { level:2, visual:'🌡️', question:'What is the role of the hypothalamus in thermoregulation?', options:['Acts as the body\'s thermostat — detects blood temperature and triggers vasodilation/sweating (too hot) or vasoconstriction/shivering (too cold)','Produces hormones including adrenaline and cortisol directly','Controls digestive enzyme production in response to food'], answer:'Acts as the body\'s thermostat — detects blood temperature and triggers vasodilation/sweating (too hot) or vasoconstriction/shivering (too cold)', fact:'🌡️ The hypothalamus monitors blood temperature directly and sends nerve impulses to effectors. Vasodilation (wider blood vessels near skin) increases heat loss. Shivering generates heat from rapid muscle contractions!' },
  { level:2, visual:'🧬', question:'What is the role of oestrogen in the female reproductive cycle?', options:['Causes thickening of the uterus lining and triggers the LH surge that causes ovulation','Maintains the corpus luteum and prevents menstruation','Stimulates egg development in the ovary and is produced by the testes'], answer:'Causes thickening of the uterus lining and triggers the LH surge that causes ovulation', fact:'🧬 Oestrogen levels peak just before ovulation — triggering the LH (luteinising hormone) surge from the pituitary that causes egg release. The contraceptive pill works by maintaining high oestrogen to prevent this LH surge!' },
  { level:2, visual:'🌊', question:'What is the role of FSH (follicle-stimulating hormone) in reproduction?', options:['Stimulates egg (follicle) development in the ovary and stimulates oestrogen production','Causes the uterus lining to thicken after ovulation','Directly triggers ovulation by acting on the mature follicle'], answer:'Stimulates egg (follicle) development in the ovary and stimulates oestrogen production', fact:'🌊 FSH is produced by the pituitary gland. In fertility treatment, FSH injections stimulate the ovaries to produce multiple eggs for IVF. In males, FSH stimulates sperm production in the testes!' },
  { level:2, visual:'🌿', question:'What is the role of progesterone in the menstrual cycle?', options:['Maintains the uterus lining after ovulation — if no pregnancy, progesterone drops and menstruation occurs','Causes ovulation by stimulating the release of a mature egg','Stimulates follicle development at the start of the cycle'], answer:'Maintains the uterus lining after ovulation — if no pregnancy, progesterone drops and menstruation occurs', fact:'🌿 Progesterone is produced by the corpus luteum (remnant of the follicle after ovulation). If pregnancy occurs, progesterone stays high to maintain the lining. Hormonal contraceptives often contain progestogen to prevent ovulation!' },
  { level:2, visual:'🔬', question:'How does the human immune system distinguish "self" from "non-self"?', options:['All body cells display unique MHC surface proteins that the immune system recognises as "self"; foreign antigens trigger an immune response','Antibodies scan all cells and destroy anything that is not blood type matched','The thymus gland produces a chemical that labels all body cells as safe'], answer:'All body cells display unique MHC surface proteins that the immune system recognises as "self"; foreign antigens trigger an immune response', fact:'🔬 MHC (major histocompatibility complex) proteins are like ID cards. T cells are trained in the thymus to ignore your own MHC. Transplanted organs have different MHC — causing rejection!' },
  { level:2, visual:'🧫', question:'What is the difference between active and passive immunity?', options:['Active immunity involves making your own antibodies (lasts years/lifelong); passive immunity involves receiving antibodies from another source (temporary)','Active immunity is faster but lasts only days; passive immunity lasts a lifetime','Active immunity requires vaccination; passive immunity requires infection'], answer:'Active immunity involves making your own antibodies (lasts years/lifelong); passive immunity involves receiving antibodies from another source (temporary)', fact:'🧫 Vaccination gives active immunity — your body makes memory cells. Passive immunity (e.g. antibodies from mother\'s milk, or therapeutic antibody injections) is fast but temporary — no memory cells are made!' },
  { level:2, visual:'🌱', question:'What is the difference between the sympatric and allopatric speciation?', options:['Allopatric = populations separated geographically and evolve apart; sympatric = new species form in the same area without geographic separation','Allopatric happens in animals only; sympatric only in plants','Both describe geographic separation — just at different scales'], answer:'Allopatric = populations separated geographically and evolve apart; sympatric = new species form in the same area without geographic separation', fact:'🌱 Allopatric speciation is most common — e.g. a river splitting a lizard population. Sympatric speciation often occurs via polyploidy in plants. The Galápagos finches are classic allopatric speciation!' },
  { level:2, visual:'🔬', question:'What evidence supports the theory of evolution?', options:['Fossil record, comparative anatomy (homologous structures), DNA sequence comparisons, biogeography and direct observation of evolution','Only the fossil record provides hard evidence','Only DNA comparisons are scientifically valid evidence'], answer:'Fossil record, comparative anatomy (homologous structures), DNA sequence comparisons, biogeography and direct observation of evolution', fact:'🔬 Antibiotic resistance evolving in bacteria is evolution we can see happening in real time! Whale fossils show legs; human embryos briefly have gill slits — all pointing to common ancestry!' },
  { level:2, visual:'🧬', question:'What is the difference between continuous and discontinuous variation?', options:['Continuous variation has a range of values with no distinct categories (e.g. height, mass); discontinuous has distinct categories with no intermediates (e.g. blood group, tongue-rolling)','Continuous variation is inherited only; discontinuous variation is environmental only','Continuous variation applies only to plants; discontinuous only to animals'], answer:'Continuous variation has a range of values with no distinct categories (e.g. height, mass); discontinuous has distinct categories with no intermediates (e.g. blood group, tongue-rolling)', fact:'🧬 Height is continuous — it forms a bell-shaped (normal distribution) curve in a population. Blood group is discontinuous — you are either A, B, AB or O with no "half-way" type!' },
  { level:2, visual:'🌿', question:'What is the difference between the light-dependent and light-independent reactions of photosynthesis?', options:['Light-dependent reactions need light to split water and produce ATP/NADPH in thylakoids; light-independent (Calvin cycle) uses that ATP to fix CO₂ into glucose in the stroma','Both reactions require light but occur in different parts of the leaf','Light-independent reactions only occur at night when light is unavailable'], answer:'Light-dependent reactions need light to split water and produce ATP/NADPH in thylakoids; light-independent (Calvin cycle) uses that ATP to fix CO₂ into glucose in the stroma', fact:'🌿 The light-independent reactions (Calvin cycle) use the ATP and NADPH from the light reactions. They can continue briefly in the dark using stored ATP, but stop when ATP runs out — not a "dark reaction" per se!' },
  { level:2, visual:'🌊', question:'What is bioaccumulation?', options:['The build-up of toxic substances (e.g. pesticides, mercury) in organisms at increasing concentrations at each trophic level','The accumulation of CO₂ in the atmosphere due to burning fossil fuels','The increase in a population when predators are removed'], answer:'The build-up of toxic substances (e.g. pesticides, mercury) in organisms at increasing concentrations at each trophic level', fact:'🌊 DDT accumulated to lethal levels in top predators like peregrine falcons and eagles — thinning eggshells and causing population crashes. PCBs in arctic orca whales are over 1 million times the ocean concentration!' },
  { level:2, visual:'🧫', question:'What is the role of the pancreas in blood glucose regulation?', options:['Produces insulin (from beta cells) when blood glucose is high and glucagon (from alpha cells) when it is low','Produces only insulin to lower blood glucose after meals','Absorbs excess glucose from the blood and converts it to glycogen for storage'], answer:'Produces insulin (from beta cells) when blood glucose is high and glucagon (from alpha cells) when it is low', fact:'🧫 The pancreas is both an endocrine gland (hormones into blood) and an exocrine gland (digestive enzymes via a duct). Insulin and glucagon are antagonistic — they oppose each other to maintain homeostasis!' },
  { level:2, visual:'🔬', question:'What is dialysis and how does it substitute for kidney function?', options:['Blood is passed over a partially permeable membrane separating it from dialysis fluid — waste (urea) diffuses out; the membrane prevents loss of useful molecules','Blood is filtered by an artificial kidney that chemically destroys urea','A machine injects enzymes into blood to break down waste products'], answer:'Blood is passed over a partially permeable membrane separating it from dialysis fluid — waste (urea) diffuses out; the membrane prevents loss of useful molecules', fact:'🔬 Dialysis works by the principle of diffusion — urea moves from high concentration (blood) to low (dialysis fluid). Patients need ~3 sessions per week, each 3–5 hours. A kidney transplant eliminates this completely!' },
  { level:2, visual:'🌱', question:'What is the role of gibberellins in plants?', options:['Promote stem elongation, seed germination and fruit development','Promote root growth towards gravity','Cause leaves to drop in autumn by weakening the leaf stalk'], answer:'Promote stem elongation, seed germination and fruit development', fact:'🌱 Gibberellins are used commercially to make grapes larger and seedless, to make beer barley germinate faster, and in plant research. They work by triggering growth-promoting gene expression!' },
  { level:2, visual:'🌿', question:'What is auxin and what does it do in plants?', options:['A plant hormone that promotes cell elongation — causes phototropism (growing toward light) and gravitropism (roots growing downward)','A plant hormone that promotes flowering in response to day length','A plant hormone that causes stomata to open during the day'], answer:'A plant hormone that promotes cell elongation — causes phototropism (growing toward light) and gravitropism (roots growing downward)', fact:'🌿 In phototropism, auxin concentrates on the shaded side of the shoot, making those cells elongate more — the shoot bends toward light. Weedkillers like 2,4-D are synthetic auxins that kill broadleaf weeds!' },
  { level:2, visual:'🧬', question:'What is a sex-linked trait?', options:['A trait controlled by a gene on a sex chromosome (usually the X chromosome) — males have only one X so they express recessive X-linked alleles more often','A trait that is only expressed in one sex due to hormonal differences','A trait that is influenced by the sex of the individual but controlled by an autosome'], answer:'A trait controlled by a gene on a sex chromosome (usually the X chromosome) — males have only one X so they express recessive X-linked alleles more often', fact:'🧬 Colour blindness and haemophilia are X-linked recessive. Males (XY) need only ONE copy of the recessive allele to be affected; females (XX) need TWO. This is why these conditions are far more common in males!' },
  { level:2, visual:'🔬', question:'What is the difference between the sympathetic and parasympathetic nervous systems?', options:['Sympathetic = "fight or flight" (increases heart rate, dilates pupils, reduces digestion); parasympathetic = "rest and digest" (slows heart rate, constricts pupils, promotes digestion)','Sympathetic controls voluntary movement; parasympathetic controls involuntary movement','Sympathetic is part of the CNS; parasympathetic is part of the PNS'], answer:'Sympathetic = "fight or flight" (increases heart rate, dilates pupils, reduces digestion); parasympathetic = "rest and digest" (slows heart rate, constricts pupils, promotes digestion)', fact:'🔬 These two systems are antagonistic — they oppose each other. Adrenaline (epinephrine) mimics sympathetic activation. Beta-blockers reduce sympathetic effects — used for anxiety and heart conditions!' },

  // ── HARD EXTRA (questions 51–167) ────────────────────────────────────────────
  { level:3, visual:'🧬', question:'What are the five conditions required for Hardy-Weinberg equilibrium (i.e. for a population NOT to evolve)?', options:['No mutation, no natural selection, random mating, no gene flow, large population size','Only no mutation and no natural selection are needed','Random mating, large population, and geographic isolation'], answer:'No mutation, no natural selection, random mating, no gene flow, large population size', fact:'🧬 Hardy-Weinberg equilibrium NEVER truly holds in nature — there is always some mutation, selection, non-random mating, migration or drift. Any deviation indicates evolution is occurring!' },
  { level:3, visual:'🔬', question:'What is genetic drift and how does it differ from natural selection?', options:['Genetic drift is random change in allele frequencies due to chance events (especially in small populations); natural selection is non-random change driven by fitness','Genetic drift only occurs in isolated island populations; natural selection occurs everywhere','Genetic drift increases genetic variation; natural selection decreases it'], answer:'Genetic drift is random change in allele frequencies due to chance events (especially in small populations); natural selection is non-random change driven by fitness', fact:'🔬 The bottleneck effect (disaster reduces population to a few individuals) and founder effect (small group colonises new area) are types of genetic drift. Cheetahs have almost no genetic diversity — result of a bottleneck ~10,000 years ago!' },
  { level:3, visual:'🌿', question:'What is the difference between Lamarck\'s and Darwin\'s theories of evolution?', options:['Lamarck: traits acquired during life are inherited (use/disuse); Darwin: inherited variation + natural selection acts on it — both explain adaptation but only Darwin\'s mechanism is correct','Lamarck believed in evolution; Darwin believed species were fixed','Darwin\'s theory predated Lamarck\'s by 50 years'], answer:'Lamarck: traits acquired during life are inherited (use/disuse); Darwin: inherited variation + natural selection acts on it — both explain adaptation but only Darwin\'s mechanism is correct', fact:'🌿 Lamarck\'s giraffe stretched its neck during life and passed the longer neck to offspring. Darwin\'s giraffe: giraffes with naturally longer necks survived better and passed on the GENE for longer necks. Lamarck was wrong about the mechanism!' },
  { level:3, visual:'🧬', question:'What are homologous structures and what do they indicate?', options:['Structures with the same evolutionary origin but different functions (e.g. human arm, whale flipper, bat wing) — indicating common ancestry','Structures that look identical and perform the same function in unrelated species — indicating convergent evolution','Organs that no longer serve a function but remain from ancestors — indicating past selection pressures'], answer:'Structures with the same evolutionary origin but different functions (e.g. human arm, whale flipper, bat wing) — indicating common ancestry', fact:'🧬 The human arm, cat foreleg, whale flipper and bat wing all contain the same bones (humerus, radius, ulna, carpals, metacarpals, phalanges) — modified for different uses. This is impossible to explain without common ancestry!' },
