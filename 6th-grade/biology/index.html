  { level:3, visual:'🧬', question:'What is the role of centromeres and centrosomes in cell division?', options:['Centromere: the constriction region of a chromosome where spindle fibres (kinetochore) attach during mitosis/meiosis; centrosome: organelle that organises the spindle fibres (microtubules) pulling chromosomes to poles','Centromere: produces spindle fibres; centrosome: is the constriction where chromatids are joined','Both are components of the kinetochore — the protein complex that attaches chromosomes to the cell membrane'], answer:'Centromere: the constriction region of a chromosome where spindle fibres (kinetochore) attach during mitosis/meiosis; centrosome: organelle that organises the spindle fibres (microtubules) pulling chromosomes to poles', fact:'🧬 Errors in centromere attachment lead to aneuploidy — cells with wrong chromosome numbers. Taxol (cancer drug) freezes spindle fibres, preventing chromosome separation and inducing apoptosis in rapidly dividing cancer cells. Plants lack centrosomes but still divide accurately!' },
  { level:3, visual:'🔬', question:'What is the inflammasome and when is it activated?', options:['A cytosolic protein complex (e.g. NLRP3) activated by danger signals (pathogens, damaged-self molecules) — cleaves and activates IL-1β and IL-18 and triggers pyroptosis (inflammatory cell death)','An organelle in macrophages that stores pro-inflammatory cytokines for rapid release','A membrane protein on T cells that detects inflammation signals and triggers clonal expansion'], answer:'A cytosolic protein complex (e.g. NLRP3) activated by danger signals (pathogens, damaged-self molecules) — cleaves and activates IL-1β and IL-18 and triggers pyroptosis (inflammatory cell death)', fact:'🔬 NLRP3 inflammasome activation is implicated in gout (uric acid crystals), Alzheimer\'s (amyloid-beta aggregates) and type 2 diabetes (fatty acid crystals in pancreas). Blocking NLRP3 is a promising treatment target for multiple inflammatory diseases!' },
  { level:3, visual:'🌿', question:'What is sexual conflict and intralocus sexual conflict in evolutionary biology?', options:['Sexual conflict: males and females have different optimal strategies for maximising fitness, leading to evolutionary "arms races" (e.g. toxins in seminal fluid vs. female resistance); intralocus: the same gene locus has different optimal expression in each sex','Sexual conflict describes competition between males for access to females only','Intralocus sexual conflict is the competition between different alleles at the same gene locus within one individual'], answer:'Sexual conflict: males and females have different optimal strategies for maximising fitness, leading to evolutionary "arms races" (e.g. toxins in seminal fluid vs. female resistance); intralocus: the same gene locus has different optimal expression in each sex', fact:'🌿 Male optimal height is ~180cm; female optimal ~165cm — but both sexes share largely the same height genes. This constrains evolution: you can\'t have two different height genes at the same locus. Intralocus sexual conflict may explain why both sexes are never perfectly optimised!' },
  { level:3, visual:'🧫', question:'What is the CRISPR interference (CRISPRi) system and how does it differ from CRISPR-Cas9?', options:['CRISPRi uses a catalytically dead Cas9 (dCas9) guided to a gene\'s promoter — blocking transcription without cutting DNA; allows reversible gene silencing unlike the permanent cuts of standard CRISPR-Cas9','CRISPRi makes smaller, more precise cuts in DNA than standard CRISPR — useful for point mutations','CRISPRi is a bacterial immune system variant that degrades RNA rather than DNA'], answer:'CRISPRi uses a catalytically dead Cas9 (dCas9) guided to a gene\'s promoter — blocking transcription without cutting DNA; allows reversible gene silencing unlike the permanent cuts of standard CRISPR-Cas9', fact:'🧫 CRISPRa (activation) uses dCas9 fused to transcriptional activators to upregulate genes. CRISPRi and CRISPRa are powerful research tools — allowing any gene to be turned up or down without permanently altering DNA. Used to systematically screen all ~20,000 human genes for function!' },
  { level:3, visual:'🔬', question:'What is the latent period of a virus and why does it matter clinically?', options:['The time from infection to when the host is infectious — during which the virus replicates silently and infected individuals can unknowingly spread disease before symptoms appear','The time from initial exposure to symptom onset in the infected individual','The period during which the immune system cannot detect a viral infection because the virus hides in antibodies'], answer:'The time from infection to when the host is infectious — during which the virus replicates silently and infected individuals can unknowingly spread disease before symptoms appear', fact:'🔬 SARS-CoV-2 had a ~2-3 day presymptomatic infectious period — meaning people spread it before knowing they were ill. HIV has a latent period of years. Understanding latent periods is critical for quarantine policies and contact tracing effectiveness!' },
  { level:3, visual:'🌊', question:'What is ecosystem services and give four categories?', options:['The benefits humans receive from ecosystems — provisioning (food, water, timber), regulating (climate, flood control, pollination), cultural (recreation, spiritual) and supporting (nutrient cycling, soil formation)','The economic value of species in ecosystems calculated purely by their market price','Services provided by conservation organisations to protect ecosystems from human damage'], answer:'The benefits humans receive from ecosystems — provisioning (food, water, timber), regulating (climate, flood control, pollination), cultural (recreation, spiritual) and supporting (nutrient cycling, soil formation)', fact:'🌊 Robert Costanza estimated Earth\'s ecosystem services are worth $125 trillion per year — nearly double global GDP! Bees pollinate $577 billion worth of crops annually. Wetlands provide flood protection worth billions. When ecosystems are destroyed, these "free" services must be replaced at enormous cost!' },
  { level:3, visual:'🧬', question:'What is the significance of the Cambrian Explosion (~541 million years ago)?', options:['Rapid diversification of complex animal body plans over ~20 million years — most major animal phyla appear in the fossil record; driven by rising oxygen, ecological innovation and possibly HOX gene evolution','A mass extinction event that wiped out most early animal life and allowed mammals to dominate','The period when photosynthesis evolved, transforming Earth\'s atmosphere and enabling complex animal life'], answer:'Rapid diversification of complex animal body plans over ~20 million years — most major animal phyla appear in the fossil record; driven by rising oxygen, ecological innovation and possibly HOX gene evolution', fact:'🧬 Before the Cambrian, life was mostly microbial and simple. In geological terms, the Cambrian Explosion was breathtakingly fast. The Burgess Shale (Canada) preserves extraordinary soft-bodied Cambrian organisms — Hallucigenia had spines on its back and tentacles walking on stilt-like legs!' },
  { level:3, visual:'🔬', question:'What is the difference between Type I and Type II errors in hypothesis testing (relevant to experimental biology)?', options:['Type I (false positive): concluding there IS an effect when there isn\'t — set by significance level (p<0.05); Type II (false negative): concluding there is NO effect when there is — reduced by larger sample size','Type I error is a mistake in the experimental method; Type II is a mistake in data analysis','Type I errors occur only in observational studies; Type II errors occur only in controlled experiments'], answer:'Type I (false positive): concluding there IS an effect when there isn\'t — set by significance level (p<0.05); Type II (false negative): concluding there is NO effect when there is — reduced by larger sample size', fact:'🔬 In drug testing, Type I error (false positive) could approve a useless drug; Type II error (false negative) could fail to approve a life-saving drug. p<0.05 means 5% chance of Type I error — but this still means 1 in 20 studies showing a real effect is actually random chance!' },
  { level:3, visual:'🌱', question:'What is the ENCODE project and what did it reveal about the human genome?', options:['Encyclopedia Of DNA Elements — mapped all functional elements in the human genome; revealed ~80% of the genome has biochemical activity (including regulatory regions), challenging the "junk DNA" concept','Complete DNA sequencing of 1,000 individual human genomes to map genetic variation in human populations','A project to encode digital data in synthetic DNA molecules for long-term archival storage'], answer:'Encyclopedia Of DNA Elements — mapped all functional elements in the human genome; revealed ~80% of the genome has biochemical activity (including regulatory regions), challenging the "junk DNA" concept', fact:'🌱 The Human Genome Project found we have ~20,000 protein-coding genes — only 2% of our genome! ENCODE showed vast amounts of the remaining 98% have regulatory roles: enhancers, silencers, insulators, and non-coding RNAs. "Junk DNA" now seems to be regulatory dark matter!' },
  { level:3, visual:'💉', question:'What is the mechanism of action of antibody-drug conjugates (ADCs) in cancer treatment?', options:['An antibody targeting a tumour-specific antigen is chemically linked to a cytotoxic drug — the antibody delivers the drug directly to cancer cells, minimising damage to normal cells compared to traditional chemotherapy','ADCs inject cancer-killing bacteria directly into tumours using antibodies as a delivery vehicle','Antibodies in ADCs cross the cancer cell membrane and directly interfere with DNA replication inside the nucleus'], answer:'An antibody targeting a tumour-specific antigen is chemically linked to a cytotoxic drug — the antibody delivers the drug directly to cancer cells, minimising damage to normal cells compared to traditional chemotherapy', fact:'💉 ADCs are sometimes called "smart bombs" for cancer. Kadcyla (trastuzumab emtansine) targets HER2-positive breast cancer — the antibody is Herceptin linked to a drug 200× more toxic than taxol. The linker is designed to release the drug only inside the cell after endocytosis!' },
  { level:3, visual:'🧫', question:'What is the concept of punctuated equilibrium vs. phyletic gradualism in evolutionary theory?', options:['Punctuated equilibrium (Gould & Eldredge): long periods of stasis punctuated by rapid speciation events; phyletic gradualism (Darwin): slow, continuous change throughout a lineage\'s history — both patterns exist','Punctuated equilibrium means evolution occurs in sudden jumps due to macromutations; gradualism means only very small mutations are possible','Both terms describe the same pattern — the names reflect different research traditions in palaeontology'], answer:'Punctuated equilibrium (Gould & Eldredge): long periods of stasis punctuated by rapid speciation events; phyletic gradualism (Darwin): slow, continuous change throughout a lineage\'s history — both patterns exist', fact:'🧫 The fossil record often shows long morphological stasis then rapid change — supporting punctuated equilibrium. "Rapid" is still geologically slow (~100,000 years). Both patterns occur in different lineages. The debate shaped how biologists interpret the fossil record!' },
  { level:3, visual:'🌊', question:'What is the role of reactive oxygen species (ROS) in cells and how do antioxidants protect against them?', options:['ROS (H₂O₂, superoxide, hydroxyl radical) are by-products of aerobic metabolism that damage DNA, proteins and lipids; antioxidants (glutathione, catalase, SOD, vitamins C/E) neutralise them by accepting the spare electrons','ROS are used by mitochondria to produce ATP — antioxidants inhibit ATP production if consumed in excess','ROS are produced only during inflammation — antioxidants are only needed by immune cells'], answer:'ROS (H₂O₂, superoxide, hydroxyl radical) are by-products of aerobic metabolism that damage DNA, proteins and lipids; antioxidants (glutathione, catalase, SOD, vitamins C/E) neutralise them by accepting the spare electrons', fact:'🌊 Mitochondria leak electrons onto O₂ producing superoxide — a highly reactive radical. Catalase in peroxisomes converts H₂O₂ to water and oxygen. Oxidative stress (ROS > antioxidants) contributes to ageing, cancer, neurodegeneration and cardiovascular disease!' },
  { level:3, visual:'🔬', question:'What is epigenetic reprogramming in early development and what is its significance?', options:['After fertilisation, most parental epigenetic marks (methylation) are erased and reset in the developing embryo — allowing totipotency; some imprinted genes escape this erasure','Epigenetic marks are faithfully copied during every cell division and never changed once established after fertilisation','Only maternal epigenetic marks are erased; paternal marks are maintained throughout development'], answer:'After fertilisation, most parental epigenetic marks (methylation) are erased and reset in the developing embryo — allowing totipotency; some imprinted genes escape this erasure', fact:'🔬 This erasure gives each new embryo a "clean epigenetic slate" — enabling all cells to have developmental potential before differentiation begins. Imprinted genes escape this (explaining why imprinting is maintained across generations). Incomplete reprogramming is a major challenge in cloning and IVF!' },

  // ── FINAL TOPPING-UP QUESTIONS ────────────────────────────────────────────────
  { level:2, visual:'🌿', question:'What is the difference between a hormone and a neurotransmitter?', options:['Hormones travel in blood to distant target organs (slow, long-lasting); neurotransmitters cross synapses to adjacent cells (fast, short-lived)','Hormones are proteins; neurotransmitters are always lipids','Hormones only act on muscles; neurotransmitters only act on glands'], answer:'Hormones travel in blood to distant target organs (slow, long-lasting); neurotransmitters cross synapses to adjacent cells (fast, short-lived)', fact:'🌿 Some molecules act as BOTH: noradrenaline is a neurotransmitter in the nervous system AND a hormone from the adrenal medulla. The key difference is speed and the distance over which they act, not the molecule itself!' },
  { level:2, visual:'🔬', question:'What is the role of FSH and LH in males?', options:['FSH stimulates sperm production in the testes; LH stimulates testosterone production by Leydig cells','FSH produces oestrogen; LH triggers ovulation — both are only active in females','FSH and LH are not produced in males — they are exclusively female reproductive hormones'], answer:'FSH stimulates sperm production in the testes; LH stimulates testosterone production by Leydig cells', fact:'🔬 The same hormones (FSH, LH) from the same gland (pituitary) control reproduction in BOTH sexes — just different target cells. In males, LH was originally called ICSH (interstitial cell stimulating hormone). Testosterone feeds back to reduce FSH and LH via negative feedback!' },
  { level:2, visual:'🌱', question:'What is translocation in plants and how does it differ from transpiration?', options:['Translocation: movement of dissolved sugars (sucrose) through phloem in both directions; transpiration: loss of water vapour through stomata drawing water up through xylem in one direction only','Translocation moves water; transpiration moves sugars','Both processes use xylem — translocation goes up, transpiration goes down'], answer:'Translocation: movement of dissolved sugars (sucrose) through phloem in both directions; transpiration: loss of water vapour through stomata drawing water up through xylem in one direction only', fact:'🌱 Translocation is an active process requiring ATP to load sucrose into phloem (source to sink). Transpiration is passive — driven by evaporation creating tension. At night, transpiration stops but translocation continues, delivering sugars to growing roots!' },
  { level:2, visual:'🧬', question:'What is mitochondrial DNA inheritance and why is it used to trace maternal ancestry?', options:['Mitochondrial DNA is inherited only from the mother (not recombined) and accumulates mutations at a known rate — creating a traceable maternal lineage','Mitochondrial DNA is inherited equally from both parents, like nuclear DNA','Mitochondrial DNA is replaced every generation during fertilisation and cannot be used for ancestry tracing'], answer:'Mitochondrial DNA is inherited only from the mother (not recombined) and accumulates mutations at a known rate — creating a traceable maternal lineage', fact:'🧬 All humans alive today share a "Mitochondrial Eve" — a woman who lived ~150,000 years ago in Africa. She wasn\'t the only woman alive, but every other maternal lineage has gone extinct. Y-chromosome analysis traces patrilineal ancestry the same way!' },
  { level:2, visual:'🔬', question:'What are the products of the complete digestion of the three main food groups?', options:['Carbohydrates → glucose; proteins → amino acids; fats → fatty acids + glycerol','Carbohydrates → amino acids; proteins → glucose; fats → glycerol only','All three food groups → glucose as the final digestion product'], answer:'Carbohydrates → glucose; proteins → amino acids; fats → fatty acids + glycerol', fact:'🔬 These monomers are then absorbed across the small intestine — glucose and amino acids into blood capillaries; fatty acids and glycerol into lymph vessels (lacteals). The monomers can then be reassembled or broken down for energy!' },
  { level:3, visual:'🧬', question:'What is alternative splicing and how does it increase proteome diversity?', options:['Different exons of the same pre-mRNA are included or excluded to produce multiple different proteins from one gene — the human proteome (~100,000 proteins) far exceeds the genome (~20,000 genes) because of this','Alternative splicing produces slightly longer or shorter versions of the same protein — minor variation only','Alternative splicing is an error in RNA processing that the cell corrects using surveillance mechanisms'], answer:'Different exons of the same pre-mRNA are included or excluded to produce multiple different proteins from one gene — the human proteome (~100,000 proteins) far exceeds the genome (~20,000 genes) because of this', fact:'🧬 The neurexin gene can produce >1,000 different protein isoforms via alternative splicing — potentially providing unique "ID tags" for individual synaptic connections in the brain. Misregulated splicing underlies diseases including spinal muscular atrophy and some cancers!' },
  { level:3, visual:'🌿', question:'What is the neutral lipid hypothesis (lipid droplet theory) and its relevance to metabolic disease?', options:['Excess caloric intake causes lipid spillover into non-adipose tissues (liver, muscle, pancreas) — ectopic fat deposits interfere with insulin signalling, causing insulin resistance and type 2 diabetes','Dietary fats are always stored directly in adipose tissue and never affect other organs','Lipid droplets only accumulate in fat cells — other cell types cannot store lipids'], answer:'Excess caloric intake causes lipid spillover into non-adipose tissues (liver, muscle, pancreas) — ectopic fat deposits interfere with insulin signalling, causing insulin resistance and type 2 diabetes', fact:'🌿 Non-alcoholic fatty liver disease (NAFLD) affects 25% of adults worldwide — excess liver fat impairs glucose metabolism. Intramyocellular lipid (fat in muscle cells) predicts insulin resistance better than body mass index. Weight loss reverses these deposits and can reverse type 2 diabetes!' },
  { level:3, visual:'🔬', question:'What is a chimeric antigen receptor (CAR) and how is it engineered?', options:['A synthetic receptor combining an antibody\'s antigen-binding domain with T cell signalling domains — T cells are extracted, transfected with a CAR gene (usually via viral vector), expanded and reinfused to specifically target cancer','A natural receptor on dendritic cells that recognises foreign antigens from multiple pathogens simultaneously','A modified version of the T cell receptor (TCR) that recognises MHC-presented antigens more strongly'], answer:'A synthetic receptor combining an antibody\'s antigen-binding domain with T cell signalling domains — T cells are extracted, transfected with a CAR gene (usually via viral vector), expanded and reinfused to specifically target cancer', fact:'🔬 CAR-T cell therapy has produced complete remissions in patients with terminal blood cancers. The CAR protein bypasses normal MHC-restricted antigen presentation — allowing direct tumour cell killing. Challenge: cytokine release syndrome ("cytokine storm") can be life-threatening after infusion!' },
  { level:3, visual:'🌱', question:'What is the Krebs cycle (citric acid cycle) and where does it occur?', options:['A cycle of reactions in the mitochondrial matrix where acetyl-CoA (from glucose, fats, amino acids) is oxidised, releasing CO₂ and producing NADH/FADH₂ to drive the electron transport chain','A cycle of reactions in the cytoplasm where glucose is broken down to pyruvate, producing a net of 2 ATP','A light-independent series of reactions in the chloroplast stroma using CO₂ to produce glucose'], answer:'A cycle of reactions in the mitochondrial matrix where acetyl-CoA (from glucose, fats, amino acids) is oxidised, releasing CO₂ and producing NADH/FADH₂ to drive the electron transport chain', fact:'🌱 The Krebs cycle was discovered by Hans Krebs in 1937 (Nobel Prize 1953). Each turn produces 3 NADH, 1 FADH₂, 1 GTP and releases 2 CO₂. The NADH and FADH₂ drive the electron transport chain (in the inner mitochondrial membrane) to produce ~34 ATP per glucose!' },
  { level:3, visual:'🧫', question:'What is the electron transport chain (ETC) and where is it located?', options:['A series of protein complexes in the inner mitochondrial membrane that transfer electrons from NADH/FADH₂ to O₂, pumping H⁺ ions to drive ATP synthase — producing ~34 ATP per glucose','A series of reactions in the cytoplasm that produce ATP from glucose without requiring oxygen','The pathway in chloroplasts that uses excited electrons from chlorophyll to produce ATP and NADPH'], answer:'A series of protein complexes in the inner mitochondrial membrane that transfer electrons from NADH/FADH₂ to O₂, pumping H⁺ ions to drive ATP synthase — producing ~34 ATP per glucose', fact:'🧫 The ETC generates a proton gradient (chemiosmosis) across the inner membrane. H⁺ ions flow back through ATP synthase — a nanoscale turbine rotating at 150 revolutions/second! Peter Mitchell won the 1978 Nobel Prize for discovering chemiosmotic theory!' },
  { level:3, visual:'🔬', question:'What is the difference between somatic and germline mutations?', options:['Somatic mutations affect body cells only (not inherited — cause cancer if in cancer-related genes); germline mutations are in sperm or eggs and ARE passed to offspring, potentially causing hereditary disease','Somatic mutations are always beneficial; germline mutations are always harmful','Somatic mutations cause immediate disease; germline mutations only affect future generations without affecting the individual who carries them'], answer:'Somatic mutations affect body cells only (not inherited — cause cancer if in cancer-related genes); germline mutations are in sperm or eggs and ARE passed to offspring, potentially causing hereditary disease', fact:'🔬 BRCA1/2 mutations are germline — inherited through families, dramatically increasing breast/ovarian cancer risk. Somatic mutations in KRAS drive ~30% of all cancers but are not inherited. Most spontaneous cancers result from accumulated somatic mutations in a single cell over a lifetime!' },
  { level:3, visual:'🌿', question:'What is the difference between stochastic (random) and deterministic development in cell fate specification?', options:['Deterministic: cell fate is rigidly programmed by position and lineage (e.g. nematode C. elegans); stochastic: random variation in gene expression creates probabilistic cell fate decisions — important in early mammalian embryos','Stochastic development is found only in organisms without a nervous system','Deterministic development produces more genetic diversity than stochastic development'], answer:'Deterministic: cell fate is rigidly programmed by position and lineage (e.g. nematode C. elegans); stochastic: random variation in gene expression creates probabilistic cell fate decisions — important in early mammalian embryos', fact:'🌿 C. elegans develops from 1 cell to 959 somatic cells with EXACTLY the same cells in the same positions every time — deterministic. Mouse inner cell mass cells make fate decisions stochastically — random gene expression fluctuations determine which become epiblast vs. hypoblast!' },
  { level:3, visual:'🧬', question:'What is the significance of the 2020 Nobel Prize in Chemistry (CRISPR)?', options:['Jennifer Doudna and Emmanuelle Charpentier won for developing CRISPR-Cas9 as a genome editing tool — the first Nobel awarded for a technology that allows precisely editing any DNA sequence in any organism','Francis Collins and Craig Venter won for completing the Human Genome Project and enabling CRISPR technology','Shinya Yamanaka and John Gurdon won for discovering induced pluripotent stem cells that enable CRISPR delivery'], answer:'Jennifer Doudna and Emmanuelle Charpentier won for developing CRISPR-Cas9 as a genome editing tool — the first Nobel awarded for a technology that allows precisely editing any DNA sequence in any organism', fact:'🧬 Doudna and Charpentier adapted a bacterial immune system into the most powerful biological tool ever created. CRISPR has halved the time and cost of genetic research, created new disease models, and is now in clinical trials for sickle cell disease, beta-thalassaemia and cancer. They are the first all-female Nobel Chemistry winners!' },
  { level:3, visual:'🔬', question:'What is convergent molecular evolution and give a striking example?', options:['Independent evolution of similar molecular sequences or structures in unrelated lineages — e.g. the camera eye lens protein (crystallin) evolved independently from different ancestral proteins in vertebrates and cephalopods using the same molecular strategies','The evolution of the same protein sequence in closely related species through shared ancestry','Parallel mutations in the same gene in different individuals within a population'], answer:'Independent evolution of similar molecular sequences or structures in unrelated lineages — e.g. the camera eye lens protein (crystallin) evolved independently from different ancestral proteins in vertebrates and cephalopods using the same molecular strategies', fact:'🔬 Echolocation proteins in bats and dolphins show convergent molecular evolution — the Prestin protein (hearing) has more similar sequences in these unrelated species than in their closest relatives. Same environmental pressure (sound navigation) drove molecular convergence — evolution finding the same solution twice!' },
  { level:3, visual:'🌱', question:'What is the "tree of life" and how has molecular data changed its shape?', options:['A phylogenetic tree representing evolutionary relationships of all life — molecular data revealed the three-domain system (Bacteria, Archaea, Eukarya), showed that fungi are more closely related to animals than plants, and that horizontal gene transfer makes it partly a "web of life" for prokaryotes','A classification system showing all species organised by their physical characteristics into a branching hierarchy','A diagram showing the origin of each of the 5 kingdoms from a common ancestor, based on the fossil record alone'], answer:'A phylogenetic tree representing evolutionary relationships of all life — molecular data revealed the three-domain system (Bacteria, Archaea, Eukarya), showed that fungi are more closely related to animals than plants, and that horizontal gene transfer makes it partly a "web of life" for prokaryotes', fact:'🌱 Darwin envisioned a tree; molecular phylogenetics has partially revealed it. But massive horizontal gene transfer in prokaryotes means their evolution is more like a web — genes passed between unrelated species. The Eukaryotes themselves may have arisen from an archaeal host engulfing a bacterium (endosymbiosis)!' },
  { level:3, visual:'💉', question:'What is the mechanism of antiretroviral therapy (ART) for HIV?', options:['Combinations of drugs blocking different HIV replication steps: reverse transcriptase inhibitors (prevent RNA→DNA), protease inhibitors (prevent viral protein processing), integrase inhibitors (prevent HIV DNA integration) — suppressing viral load to undetectable','A single drug that destroys the HIV envelope, preventing it from entering CD4+ cells','ART stimulates T cell production to replace those destroyed by HIV, restoring immune function'], answer:'Combinations of drugs blocking different HIV replication steps: reverse transcriptase inhibitors (prevent RNA→DNA), protease inhibitors (prevent viral protein processing), integrase inhibitors (prevent HIV DNA integration) — suppressing viral load to undetectable', fact:'💉 Modern ART suppresses HIV to undetectable levels — meaning treated individuals cannot transmit the virus (U=U: Undetectable=Untransmittable). A single daily pill (e.g. Biktarvy) combines three drugs. HIV cure remains elusive because latent HIV in resting T cells is invisible to both ART and the immune system!' },
  { level:3, visual:'🌊', question:'What is phenotypic heterogeneity in cancer and why does it complicate treatment?', options:['Cancer cells within one tumour are not genetically identical — different subclones have different mutations; targeted therapies that kill the dominant clone can allow resistant subclones to expand and dominate, causing relapse','All cancer cells in a tumour have exactly the same mutations — targeted therapies can completely eliminate the cancer by killing every cell','Cancer heterogeneity refers to different cancer types arising in different tissues, not variation within one tumour'], answer:'Cancer cells within one tumour are not genetically identical — different subclones have different mutations; targeted therapies that kill the dominant clone can allow resistant subclones to expand and dominate, causing relapse', fact:'🌊 Intratumour heterogeneity means cancer is more like an ecosystem than a single disease. Charles Swanton\'s research showed a kidney tumour can have 30+ distinct subclones. Liquid biopsy (ctDNA in blood) can track tumour evolution in real time, guiding treatment changes before clinical relapse!' },
  { level:3, visual:'🧫', question:'What is the unfolded protein response (UPR) and when is it clinically significant?', options:['A cellular stress response triggered when misfolded proteins accumulate in the endoplasmic reticulum — activates chaperones to restore proteostasis, or triggers apoptosis; clinically significant in neurodegenerative diseases and cancer drug resistance','A pathway that destroys misfolded proteins using proteasomes before they can cause damage','A stress response in mitochondria triggered by electron transport chain uncoupling agents'], answer:'A cellular stress response triggered when misfolded proteins accumulate in the endoplasmic reticulum — activates chaperones to restore proteostasis, or triggers apoptosis; clinically significant in neurodegenerative diseases and cancer drug resistance', fact:'🧫 Alzheimer\'s (amyloid-beta), Parkinson\'s (alpha-synuclein), and Huntington\'s (polyglutamine) all involve misfolded proteins overwhelming the UPR. Multiple myeloma cells produce massive antibody quantities — their extreme ER stress makes them uniquely vulnerable to proteasome inhibitors (bortezomib)!' },
  { level:3, visual:'🌿', question:'What is ecological stoichiometry and why does it matter?', options:['The study of the balance of chemical elements (C, N, P) in organisms and ecosystems — organisms have fixed elemental compositions; nutrient imbalances between food and consumer drive ecological dynamics','The study of chemical reactions in ecosystems that release energy for primary producers','The measurement of toxins accumulating through food chains in an ecosystem'], answer:'The study of the balance of chemical elements (C, N, P) in organisms and ecosystems — organisms have fixed elemental compositions; nutrient imbalances between food and consumer drive ecological dynamics', fact:'🌿 Zooplankton need P-rich ribosomes to grow rapidly — when algae have low P:C ratios (carbon-rich in high CO₂), zooplankton growth suffers. This connects global CO₂ rise to zooplankton nutrition to fish populations — demonstrating that ecology and chemistry are inseparable!' },
  { level:3, visual:'🔬', question:'What is the role of the nucleus accumbens and dopamine in reward-motivated behaviour?', options:['The nucleus accumbens is the key brain region for reward processing — dopamine release here reinforces behaviours that led to rewarding outcomes, creating motivation to repeat them; this circuit underlies both healthy motivation and addiction','The nucleus accumbens only functions during fear responses — dopamine signals danger rather than reward','The nucleus accumbens controls motor output — dopamine signals when to initiate voluntary movement'], answer:'The nucleus accumbens is the key brain region for reward processing — dopamine release here reinforces behaviours that led to rewarding outcomes, creating motivation to repeat them; this circuit underlies both healthy motivation and addiction', fact:'🔬 Wolfram Schultz\'s recordings from primate dopamine neurons revealed they respond to unexpected rewards — and over time shift to responding to reward-predicting cues instead. This "reward prediction error" signal is the neural basis of reinforcement learning — and explains why slot machines are so addictive!' },
];
const QUIZ_KEY = 'kids_q_biology';
const POINTS_KEY='kids_points';
function getPoints(){return parseInt(localStorage.getItem(POINTS_KEY)||'0');}
function addPoints(n){localStorage.setItem(POINTS_KEY,getPoints()+n);}
function updatePtsDisplay(){const el=document.getElementById('ptsDisplay');if(el)el.textContent='⭐ '+getPoints();}

let current=0,score=0,dotResults=[],sessionQ=[];
let sessionAnswers=[],sessionShuffled=[],viewingIdx=null;
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function note(ctx,type,freq,time,dur,vol){const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;gn.gain.setValueAtTime(0.001,time);gn.gain.linearRampToValueAtTime(vol,time+0.015);gn.gain.exponentialRampToValueAtTime(0.001,time+dur);osc.start(time);osc.stop(time+dur+0.06);}
function playCorrect(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[1047,1319,1568,2093,1568,1319].forEach((f,i)=>note(ctx,'triangle',f,t+i*0.07,0.14,0.5));[[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur])=>{note(ctx,'triangle',f,t+d,dur,0.55);note(ctx,'sine',f*2,t+d,dur*0.5,0.14);});});}
function playWrong(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay])=>{const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(f1,t+delay);osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);gn.gain.setValueAtTime(0.001,t+delay);gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02);gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);osc.start(t+delay);osc.stop(t+delay+0.3);});const osc=ctx.createOscillator(),gn=ctx.createGain();osc.connect(gn);gn.connect(ctx.destination);osc.type='sine';osc.frequency.setValueAtTime(380,t+0.92);osc.frequency.exponentialRampToValueAtTime(55,t+1.4);gn.gain.setValueAtTime(0.001,t+0.92);gn.gain.linearRampToValueAtTime(0.55,t+0.93);gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);osc.start(t+0.92);osc.stop(t+1.5);});}
function playLevelUp(){const ctx=getCtx();ctx.resume().then(()=>{const t=ctx.currentTime;[[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]].forEach(([f,d])=>note(ctx,'triangle',f,t+d,0.25,0.45));note(ctx,'sine',1047,t+0.84,0.8,0.3);note(ctx,'sine',1319,t+0.90,0.7,0.25);note(ctx,'sine',1568,t+0.96,0.6,0.2);});}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}
function updateNavArrows(){const p=document.getElementById('navPrev'),n=document.getElementById('navNext');if(!p)return;const idx=viewingIdx!==null?viewingIdx:current;p.style.display=idx>0?'flex':'none';n.style.display=(viewingIdx!==null&&viewingIdx<current)?'flex':'none';}
function navBack(){const idx=viewingIdx!==null?viewingIdx:current;if(idx>0)showPastQuestion(idx-1);}
function navForward(){if(viewingIdx===null)return;if(viewingIdx<current-1)showPastQuestion(viewingIdx+1);else{viewingIdx=null;showQuestion();}}
function showPastQuestion(idx){viewingIdx=idx;const q=sessionQ[idx];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='\u2b50 Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='\u2b50\u2b50 Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='\u2b50\u2b50\u2b50 Hard';}document.getElementById('visualCard').innerHTML='<span class="visual-emoji">'+q.visual+'</span>';document.getElementById('questionText').textContent=q.question;const shuffled=sessionShuffled[idx]||[...q.options];const chosen=sessionAnswers[idx];const correct=q.answer;const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const opt=shuffled[i];const btn=document.createElement('button');btn.className='choice-btn';btn.disabled=true;btn.style.cursor='default';if(opt===correct)btn.classList.add('correct');if(opt===chosen&&opt!==correct)btn.classList.add('wrong');btn.innerHTML='<span class="choice-letter">'+letter+'</span>'+opt;choicesEl.appendChild(btn);});const rb=document.getElementById('reviewBanner');if(rb){rb.style.display='';rb.textContent=dotResults[idx]==='correct'?'\u2705 Q'+(idx+1)+' \u00b7 Correct':'\u274c Q'+(idx+1)+' \u00b7 Incorrect';}document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();}
function init(){current=0;score=0;dotResults=Array(15).fill(null);sessionAnswers=Array(15).fill(null);sessionShuffled=Array(15).fill(null);viewingIdx=null;sessionQ=pickSession();if(!document.getElementById('visualCard')){document.getElementById('gameScreen').innerHTML=`<a class="back-btn" href="../../">← Home</a><div class="top"><div class="title">🔬 Biology Quiz</div><div class="top-row"><div class="level-badge easy" id="levelBadge">⭐ Easy</div><div class="score-pill">🎯 <strong id="score">0</strong> / 15</div><div class="pts-pill" id="ptsDisplay">⭐ 0</div></div><div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div></div><div class="middle" id="middle"><div class="visual-card" id="visualCard"></div><div class="question-text" id="questionText"></div></div><div class="bottom"><div class="choices" id="choices"></div><div class="progress-dots" id="progressDots"></div></div>`;}buildDots();showQuestion();updatePtsDisplay();}
function buildDots(){const c=document.getElementById('progressDots');c.innerHTML='';sessionQ.forEach((q,i)=>{const cls=q.level===1?'easy-dot':q.level===2?'medium-dot':'hard-dot';const d=document.createElement('div');d.className=`dot ${cls}`+(i===0?' current':'');d.id=`dot-${i}`;c.appendChild(d);});}
function updateDot(idx,result){const d=document.getElementById(`dot-${idx}`);if(!d)return;d.classList.remove('current');d.classList.add('answered',result==='correct'?'correct-dot':'wrong-dot');const next=document.getElementById(`dot-${idx+1}`);if(next)next.classList.add('current');}
function showQuestion(){viewingIdx=null;const rb=document.getElementById('reviewBanner');if(rb)rb.style.display='none';const q=sessionQ[current];const badge=document.getElementById('levelBadge');if(q.level===1){badge.className='level-badge easy';badge.textContent='⭐ Easy';}if(q.level===2){badge.className='level-badge medium';badge.textContent='⭐⭐ Medium';}if(q.level===3){badge.className='level-badge hard';badge.textContent='⭐⭐⭐ Hard';}document.getElementById('progressFill').style.width=(current/15*100)+'%';document.getElementById('score').textContent=score;document.getElementById('visualCard').innerHTML=`<span class="visual-emoji">${q.visual}</span>`;document.getElementById('questionText').textContent=q.question;const shuffled=shuffle([...q.options]);sessionShuffled[current]=shuffled;const choicesEl=document.getElementById('choices');choicesEl.innerHTML='';['A','B','C'].forEach((letter,i)=>{const btn=document.createElement('button');btn.className='choice-btn';btn.dataset.value=shuffled[i];btn.innerHTML=`<span class="choice-letter">${letter}</span>${shuffled[i]}`;btn.onclick=()=>handleAnswer(shuffled[i],q.answer,btn,q.fact,q._idx);choicesEl.appendChild(btn);});document.getElementById('gameScreen').classList.remove('shake');updateNavArrows();}
function handleAnswer(chosen,correct,btn,fact,qIdx){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);const isCorrect=chosen===correct;sessionAnswers[current]=chosen;if(isCorrect){score++;markMastered(qIdx);btn.classList.add('correct');dotResults[current]='correct';updateDot(current,'correct');document.getElementById('score').textContent=score;playCorrect();spawnConfetti(35);}else{btn.classList.add('wrong');dotResults[current]='wrong';updateDot(current,'wrong');document.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.value===correct)b.classList.add('correct');});document.getElementById('gameScreen').classList.add('shake');playWrong();}setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);}
let feedbackTimer=null,feedbackRafId=null;
function dismissFeedback(){cancelAnimationFrame(feedbackRafId);clearTimeout(feedbackTimer);const overlay=document.getElementById('feedbackOverlay');const b=document.getElementById('feedbackBox');b.style.animation='slideUp 0.35s ease forwards';overlay.classList.add('dismiss');overlay.classList.remove('clickable');setTimeout(()=>{overlay.classList.remove('show','dismiss');b.style.animation='';advanceQuestion();},370);}
function showFeedback(isCorrect,fact,chosen,correct){clearTimeout(feedbackTimer);cancelAnimationFrame(feedbackRafId);const overlay=document.getElementById('feedbackOverlay'),box=document.getElementById('feedbackBox');const arc=document.getElementById('timerArc'),ring=document.getElementById('timerRing');const tapHint=document.getElementById('tapHint');const wrongDetail=document.getElementById('wrongDetail');const CIRC=100.5;if(isCorrect){const msgs=[['🎉✨','CORRECT!'],['🌟💡','BRILLIANT!'],['🏆⭐','GENIUS!'],['🔥💫','AMAZING!'],['👑✅','PERFECT!']];const[em,title]=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('feedbackEmoji').textContent=em;document.getElementById('feedbackTitle').textContent=title;document.getElementById('feedbackTitle').className='feedback-title correct-text';box.className='feedback-box correct-box';ring.className='timer-ring correct-ring';ring.style.display='';tapHint.style.display='none';wrongDetail.style.display='none';}else{const msgs=[['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Keep going!']];const[em,title]=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('feedbackEmoji').textContent=em;document.getElementById('feedbackTitle').textContent=title;document.getElementById('feedbackTitle').className='feedback-title wrong-text';box.className='feedback-box wrong-box';ring.className='timer-ring wrong-ring';ring.style.display='none';tapHint.style.display='';document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;document.getElementById('wdChosen').textContent=chosen;document.getElementById('wdCorrect').textContent=correct;wrongDetail.style.display='';}document.getElementById('feedbackFact').textContent=fact;arc.style.strokeDashoffset='0';overlay.classList.remove('dismiss');overlay.classList.add('show');if(isCorrect){const duration=1200;const startTime=performance.now();function tickRing(now){const frac=Math.min((now-startTime)/duration,1);arc.style.strokeDashoffset=(CIRC*frac).toFixed(2);if(frac<1)feedbackRafId=requestAnimationFrame(tickRing);}feedbackRafId=requestAnimationFrame(tickRing);feedbackTimer=setTimeout(dismissFeedback,duration);}else{overlay.classList.add('clickable');overlay.addEventListener('click',dismissFeedback,{once:true});}}
function advanceQuestion(){const prev=current;current++;if(prev===4){showLevelUp('medium');return;}if(prev===9){showLevelUp('hard');return;}if(current>=15){showEndScreen();return;}showQuestion();}
function showLevelUp(level){const overlay=document.getElementById('levelupOverlay');if(level==='medium'){document.getElementById('levelupIcon').textContent='⭐⭐';document.getElementById('levelupTitle').textContent='LEVEL UP!';document.getElementById('levelupSub').textContent='🔥 Medium — getting trickier!';}else{document.getElementById('levelupIcon').textContent='⭐⭐⭐';document.getElementById('levelupTitle').textContent='EXPERT MODE!';document.getElementById('levelupSub').textContent='🧠 Hard — only the best know these!';}overlay.classList.add('show');playLevelUp();spawnConfetti(60);}
function dismissLevelUp(){document.getElementById('levelupOverlay').classList.remove('show');showQuestion();}
function showEndScreen(){const screen=document.getElementById('gameScreen');let rank,icon,msg,color;if(score>=13){rank='GENIUS';icon='🏆🧠⭐';msg='Outstanding! You\'re a true scholar!';color='#f1c40f';}else if(score>=10){rank='EXPERT';icon='🌟💡🎯';msg='Excellent knowledge!';color='#2ecc71';}else if(score>=7){rank='LEARNER';icon='👍📚😊';msg='Good effort! Keep studying!';color='#e67e22';}else{rank='BEGINNER';icon='💪📖🌱';msg='Great start! Practice makes perfect!';color='#e74c3c';}const e=dotResults.slice(0,5).filter(r=>r==='correct').length;const m=dotResults.slice(5,10).filter(r=>r==='correct').length;const h=dotResults.slice(10,15).filter(r=>r==='correct').length;
  let earned=0;
  if(e===5) earned+=1;
  if(m===5) earned+=3;
  if(h===5) earned+=6;
  if(earned>0) addPoints(earned);
  const tierRows=[
    e===5?'<span style="color:#4ade80">⭐ Easy +1✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐ Easy +1</span>',
    m===5?'<span style="color:#fbbf24">⭐⭐ Med +3✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐ Med +3</span>',
    h===5?'<span style="color:#f87171">⭐⭐⭐ Hard +6✓</span>':'<span style="color:rgba(255,255,255,0.3)">⭐⭐⭐ Hard +6</span>',
  ].join('');
  let pointsHtml='';
  if(earned>0){
    pointsHtml=`<div style="background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.2));border:2px solid rgba(255,215,0,0.45);border-radius:16px;padding:10px 18px;text-align:center;">
      <div style="font-size:0.9rem;margin-bottom:5px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">${tierRows}</div>
      <div style="color:#ffd700;font-size:1.15rem;font-weight:700;">+${earned} point${earned===1?'':'s'} earned!</div>
      <div style="color:rgba(255,255,255,0.7);font-size:0.9rem;margin-top:3px;">Total: ⭐ ${getPoints()} points</div>
    </div>`;
  } else {
    pointsHtml=`<div style="text-align:center;">
      <div style="font-size:0.85rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:3px;">${tierRows}</div>
      <div style="color:rgba(255,215,0,0.5);font-size:0.85rem;">⭐ ${getPoints()} pts · Complete a full level to earn points</div>
    </div>`;
  }
screen.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;"><div style="font-size:clamp(2.8rem,11vw,5.5rem);">${icon}</div><div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div><div style="font-size:clamp(0.95rem,3.5vw,1.3rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div><div style="font-size:clamp(1.4rem,5.5vw,2rem);color:var(--acc);">🎯 ${score} / 15</div>${pointsHtml}<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;"><div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div><div style="color:#fff;font-size:1.4rem;">${e}/5</div></div><div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;"><div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div><div style="color:#fff;font-size:1.4rem;">${m}/5</div></div><div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;"><div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div><div style="color:#fff;font-size:1.4rem;">${h}/5</div></div></div><div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}</div><button class="action-btn" onclick="init()">🔄 Play Again!</button><a href="../../" style="color:rgba(255,255,255,0.5);font-size:1rem;margin-top:4px;">← Back to Hub</a></div>`;}
const CONFETTI_COLORS=['#f1c40f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count=35){for(let i=0;i<count;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.top='-20px';el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];el.style.width=(6+Math.random()*10)+'px';el.style.height=(6+Math.random()*10)+'px';el.style.borderRadius=Math.random()>0.5?'50%':'2px';const dur=1.5+Math.random()*2;el.style.animationDuration=dur+'s';el.style.animationDelay=Math.random()*0.4+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+0.6)*1000);},i*20);}}
init();
</script>
</body>
</html>
