  { level:3, visual:'🦴', question:'What are vestigial structures and give two examples in humans?', options:['Structures that have lost most of their ancestral function — e.g. human coccyx (tailbone from tailed ancestors) and wisdom teeth (from ancestors with larger jaws)','Structures shared between all mammals that perform the same essential function','Structures present in embryos but absent in adults, indicating evolutionary history'], answer:'Structures that have lost most of their ancestral function — e.g. human coccyx (tailbone from tailed ancestors) and wisdom teeth (from ancestors with larger jaws)', fact:'🦴 The palmaris longus muscle in the forearm is absent in 15% of people and has no clear function — a remnant of a primate climbing ancestor. Whales have vestigial pelvic bones, remnants of their land-dwelling past!' },
  { level:3, visual:'🦠', question:'How does antibiotic resistance evolve in bacteria?', options:['Random mutation creates resistant bacteria; antibiotics kill susceptible bacteria; resistant bacteria survive and reproduce — passing resistance to offspring (natural selection)','Bacteria deliberately mutate in response to antibiotics to become resistant','Bacteria learn to resist antibiotics through repeated exposure, then teach resistance to other bacteria'], answer:'Random mutation creates resistant bacteria; antibiotics kill susceptible bacteria; resistant bacteria survive and reproduce — passing resistance to offspring (natural selection)', fact:'🦠 MRSA and TB resistance are textbook natural selection. Resistance genes can also spread between bacterial species via horizontal gene transfer (plasmids). This is why we must complete antibiotic courses — killing ALL bacteria!' },
  { level:3, visual:'🌱', question:'What is sympatric speciation by polyploidy and give a plant example?', options:['Accidental chromosome duplication produces an organism reproductively isolated from the parent species immediately — e.g. allotetraploid bread wheat (AABBDD, 6n=42)','Two populations of the same species evolving different mating seasons in the same location','A population gradually diverging in the same location due to disruptive selection over thousands of generations'], answer:'Accidental chromosome duplication produces an organism reproductively isolated from the parent species immediately — e.g. allotetraploid bread wheat (AABBDD, 6n=42)', fact:'🌱 Bread wheat formed by two separate hybridisation and polyploidy events involving three different ancestor species. It cannot breed with any of them — a new species in an evolutionary instant! Polyploidy drove plant evolution on Earth!' },
  { level:3, visual:'🔬', question:'What is the molecular clock hypothesis?', options:['DNA mutations accumulate at a roughly constant rate, so comparing DNA sequences between species can estimate when they diverged from a common ancestor','Genes always express at the same time of day regardless of environment','The rate of evolution always remains constant across all species and environments'], answer:'DNA mutations accumulate at a roughly constant rate, so comparing DNA sequences between species can estimate when they diverged from a common ancestor', fact:'🔬 The molecular clock uses neutral mutations (ones that don\'t affect fitness). By comparing cytochrome c (a protein in all eukaryotes), scientists estimated humans and chimps shared a common ancestor ~6 million years ago!' },
  { level:3, visual:'🧠', question:'What is the structure and function of the reflex arc, and what does the refractory period of neurons have to do with it?', options:['The arc ensures fast one-way signals via receptor → sensory → relay → motor → effector; the refractory period prevents backward signal propagation','The arc is controlled by the brain stem; the refractory period resets the brain after each reflex','Reflexes travel via myelinated nerves only; the refractory period is irrelevant in reflex arcs'], answer:'The arc ensures fast one-way signals via receptor → sensory → relay → motor → effector; the refractory period prevents backward signal propagation', fact:'🧠 The refractory period (~1–2 ms after an action potential) means sodium channels are inactivated — the signal can ONLY move forward down the axon. Synapses also enforce one-way transmission because vesicles are only on the pre-synaptic side!' },
  { level:3, visual:'💉', question:'How do monoclonal antibodies work and what are they used for?', options:['Identical antibodies cloned from a single B cell — used for targeted cancer therapy (e.g. Herceptin), pregnancy tests, and diagnosis of diseases','Antibodies produced by injecting a pathogen into mice — used only for passive immunisation','Antibodies artificially synthesised in a lab without any cell involvement — used exclusively for HIV treatment'], answer:'Identical antibodies cloned from a single B cell — used for targeted cancer therapy (e.g. Herceptin), pregnancy tests, and diagnosis of diseases', fact:'💉 Georges Köhler and César Milstein invented monoclonal antibodies in 1975 (Nobel Prize 1984). They fuse a B cell with a cancer cell to create a "hybridoma" that divides forever AND makes a specific antibody!' },
  { level:3, visual:'🧫', question:'What is somatic cell nuclear transfer (SCNT) and how was Dolly the sheep cloned using it?', options:['A nucleus from an adult body cell is inserted into an enucleated egg cell — the resulting embryo is implanted into a surrogate; Dolly was the first mammal cloned this way in 1996','Two embryos are fused together and implanted in a surrogate — Dolly was the result of fusing two lamb embryos','The egg cell\'s DNA is modified by inserting additional chromosomes from a donor cell'], answer:'A nucleus from an adult body cell is inserted into an enucleated egg cell — the resulting embryo is implanted into a surrogate; Dolly was the first mammal cloned this way in 1996', fact:'🧫 Dolly was cloned from a 6-year-old mammary cell — her telomeres were already shorter, and she died at 6 (half normal sheep lifespan). SCNT is the basis for both reproductive and therapeutic cloning!' },
  { level:3, visual:'🔬', question:'What is the role of restriction endonucleases in genetic engineering?', options:['They cut DNA at specific recognition sequences, producing "sticky ends" that can be joined to complementary sequences from another organism using DNA ligase','They copy a specific DNA sequence millions of times using PCR','They remove introns from pre-mRNA to produce mature mRNA for translation'], answer:'They cut DNA at specific recognition sequences, producing "sticky ends" that can be joined to complementary sequences from another organism using DNA ligase', fact:'🔬 Restriction enzymes are the scissors of genetic engineering. EcoRI (from E. coli) cuts at GAATTC — producing the sticky end AATT. The same enzyme cuts both the gene of interest and the plasmid, ensuring compatible ends!' },
  { level:3, visual:'🌿', question:'How is recombinant human insulin produced using bacteria?', options:['The human insulin gene is isolated → inserted into a bacterial plasmid using restriction enzymes + ligase → plasmid introduced into E. coli → bacteria cultured → insulin harvested and purified','The insulin gene is injected directly into bacterial cells which spontaneously produce human insulin','Transgenic cows are created that produce human insulin in their milk which is then extracted'], answer:'The human insulin gene is isolated → inserted into a bacterial plasmid using restriction enzymes + ligase → plasmid introduced into E. coli → bacteria cultured → insulin harvested and purified', fact:'🌿 Before 1982, diabetics used insulin extracted from pig/cow pancreases. Recombinant insulin (Humulin) is identical to human insulin — no risk of immune reactions. Bacteria can produce unlimited quantities in large fermenters!' },
  { level:3, visual:'🧬', question:'What is RNA splicing and what are introns and exons?', options:['Pre-mRNA contains non-coding introns (removed) and coding exons (kept) — RNA splicing removes introns and joins exons to produce mature mRNA','All sections of pre-mRNA code for protein — RNA splicing simply removes errors','Introns are translated into protein; exons are the non-coding regulatory regions'], answer:'Pre-mRNA contains non-coding introns (removed) and coding exons (kept) — RNA splicing removes introns and joins exons to produce mature mRNA', fact:'🧬 Alternative splicing of the same gene can produce multiple different proteins! The human genome has ~20,000 genes but can make ~100,000 different proteins through this mechanism. The DSCAM gene can produce >38,000 variants!' },
  { level:3, visual:'🔬', question:'What is the role of telomeres in cell ageing?', options:['Protective caps at chromosome ends that shorten with each cell division — when critically short, the cell stops dividing (senescence) or undergoes apoptosis','Non-coding regions of DNA that accumulate mutations over time and slow cell division','The part of chromosomes that binds to spindle fibres during mitosis'], answer:'Protective caps at chromosome ends that shorten with each cell division — when critically short, the cell stops dividing (senescence) or undergoes apoptosis', fact:'🔬 Telomeres are repeated sequences (TTAGGG in humans). Cancer cells activate telomerase — an enzyme that extends telomeres — making them immortal. Elizabeth Blackburn won the 2009 Nobel Prize for discovering telomere biology!' },
  { level:3, visual:'🧬', question:'What is X-inactivation (Lyon hypothesis) and what are Barr bodies?', options:['In female mammal cells, one X chromosome is randomly inactivated and condenses into a Barr body — ensuring equal X-gene expression between XX females and XY males','Both X chromosomes are active in female cells — Barr bodies are condensed inactive Y chromosomes','X-inactivation occurs only during embryonic development and is reversed in adult somatic cells'], answer:'In female mammal cells, one X chromosome is randomly inactivated and condenses into a Barr body — ensuring equal X-gene expression between XX females and XY males', fact:'🧬 Tortoiseshell cats are nearly always female — the orange/black coat colour gene is X-linked, and random X-inactivation in different skin cells creates the mosaic pattern. Male cats with XXY can occasionally be tortoiseshell!' },
  { level:3, visual:'🌱', question:'What is epigenetic inheritance and how can it be transmitted across generations?', options:['Heritable changes in gene expression via DNA methylation or histone modification that do not alter the DNA sequence — can be passed via eggs and sperm','Mutations in mitochondrial DNA that are always inherited from the mother','Changes to the DNA sequence in somatic cells that are passed on during mitotic division'], answer:'Heritable changes in gene expression via DNA methylation or histone modification that do not alter the DNA sequence — can be passed via eggs and sperm', fact:'🌱 Dutch Hunger Winter survivors\' grandchildren showed epigenetic changes in metabolism genes — meaning their grandparents\' starvation changed gene expression across two generations! This challenges the strict neo-Darwinian synthesis!' },
  { level:3, visual:'💉', question:'What is the difference between innate and adaptive immunity?', options:['Innate immunity is fast, non-specific and present from birth (physical barriers, phagocytes, inflammation); adaptive immunity is slow, specific and develops memory (B cells, T cells, antibodies)','Innate immunity produces antibodies; adaptive immunity produces phagocytes','Innate immunity is only effective against bacteria; adaptive immunity works against all pathogens'], answer:'Innate immunity is fast, non-specific and present from birth (physical barriers, phagocytes, inflammation); adaptive immunity is slow, specific and develops memory (B cells, T cells, antibodies)', fact:'💉 Innate immunity responds in minutes/hours; adaptive takes days but is specific and creates memory. Invertebrates (e.g. insects) only have innate immunity — adaptive immunity evolved with vertebrates!' },
  { level:3, visual:'🧫', question:'What is complement activation in the immune system?', options:['A cascade of ~30 plasma proteins that tag pathogens for phagocytosis (opsonisation), punch holes in bacterial membranes (membrane attack complex) and trigger inflammation','The process by which T cells activate B cells to begin antibody production','The system by which memory B cells are activated upon re-exposure to an antigen'], answer:'A cascade of ~30 plasma proteins that tag pathogens for phagocytosis (opsonisation), punch holes in bacterial membranes (membrane attack complex) and trigger inflammation', fact:'🧫 Complement is part of innate immunity but can be triggered by antibodies too (adaptive). The membrane attack complex (MAC) forms a pore in bacterial membranes — water rushes in and the bacterium lyses instantly!' },
  { level:3, visual:'🔬', question:'How does HIV evade the immune system?', options:['HIV targets and destroys CD4+ helper T cells — the very cells that coordinate immune responses; it also mutates rapidly to evade antibody recognition, and can lie dormant in cells for years','HIV produces a toxin that kills all white blood cells simultaneously','HIV covers itself in host cell membrane proteins, making it invisible to the immune system indefinitely'], answer:'HIV targets and destroys CD4+ helper T cells — the very cells that coordinate immune responses; it also mutates rapidly to evade antibody recognition, and can lie dormant in cells for years', fact:'🔬 Without CD4+ helper T cells, neither B cells nor cytotoxic T cells can function properly — the immune response collapses, causing AIDS. HIV\'s reverse transcriptase has high error rate → 10⁹ mutations/day → escape from antibodies!' },
  { level:3, visual:'🌊', question:'What is a metapopulation and why is it important for conservation?', options:['A network of spatially separated subpopulations that are linked by occasional migration — persistence depends on a balance of local extinctions and recolonisations','A single large population in a fragmented habitat that is managed as one unit','A group of species that all depend on the same keystone species for survival'], answer:'A network of spatially separated subpopulations that are linked by occasional migration — persistence depends on a balance of local extinctions and recolonisations', fact:'🌊 The European common frog persists as a metapopulation — individual ponds may dry up (local extinction) but frogs from other ponds recolonise. Wildlife corridors between habitat patches are essential for metapopulation survival!' },
  { level:3, visual:'🧬', question:'What are proto-oncogenes and oncogenes, and how do they relate to cancer?', options:['Proto-oncogenes normally promote cell division; mutations convert them to oncogenes that drive uncontrolled division — one type of mutation causing cancer','Oncogenes are tumour suppressor genes that prevent cancer; proto-oncogenes are their mutated, cancer-causing forms','Both are viruses that insert their genes into human chromosomes, triggering cancerous cell division'], answer:'Proto-oncogenes normally promote cell division; mutations convert them to oncogenes that drive uncontrolled division — one type of mutation causing cancer', fact:'🧬 Tumour suppressor genes (e.g. p53 — "guardian of the genome") are the opposite — they brake cell division. Cancer typically requires BOTH oncogene activation AND tumour suppressor inactivation — multiple mutations working together!' },
  { level:3, visual:'🔬', question:'What is apoptosis and why is it essential?', options:['Programmed cell death — cells self-destruct in a controlled way to eliminate damaged, unnecessary or infected cells without triggering inflammation','Uncontrolled cell death due to injury or disease that triggers inflammation','The process by which cells are engulfed and destroyed by macrophages'], answer:'Programmed cell death — cells self-destruct in a controlled way to eliminate damaged, unnecessary or infected cells without triggering inflammation', fact:'🔬 Apoptosis shapes your fingers — cells between digits die during embryo development! It eliminates potentially cancerous cells and immune cells after infection. About 50–70 billion cells undergo apoptosis in your body daily!' },
  { level:3, visual:'🌿', question:'What is the concept of a "selfish gene" (Dawkins) and how does it relate to natural selection?', options:['Natural selection acts on genes, not individuals or species — genes "use" organisms as vehicles for their own propagation; behaviours that spread copies of a gene (even altruistic ones) are selected for','Genes actively compete with each other within a cell, causing genetic conflict','Individual organisms are selfish in their behaviour because they are programmed by self-replicating DNA'], answer:'Natural selection acts on genes, not individuals or species — genes "use" organisms as vehicles for their own propagation; behaviours that spread copies of a gene (even altruistic ones) are selected for', fact:'🌿 Dawkins\' "The Selfish Gene" (1976) explained altruism through kin selection — sacrificing yourself for relatives who share your genes (Hamilton\'s rule). A worker bee dies defending the hive, but shares 75% of its genes with sisters!' },
  { level:3, visual:'🧬', question:'What is incomplete dominance and give an example?', options:['Neither allele fully dominates — heterozygotes show an intermediate phenotype (e.g. red × white snapdragon flowers = pink offspring)','Both alleles are fully expressed simultaneously in the heterozygote (e.g. AB blood group)','The dominant allele only partially masks the recessive allele depending on environmental conditions'], answer:'Neither allele fully dominates — heterozygotes show an intermediate phenotype (e.g. red × white snapdragon flowers = pink offspring)', fact:'🧬 Snapdragon flower colour shows incomplete dominance perfectly: RR = red, Ww = pink, WW = white. This disproved the early idea of "blending inheritance" — crossing pink × pink gives 1 red: 2 pink: 1 white, not all pink!' },
  { level:3, visual:'🔬', question:'What is the difference between meiosis I and meiosis II?', options:['Meiosis I separates homologous chromosome pairs (reducing chromosome number from diploid to haploid); meiosis II separates sister chromatids (like mitosis)','Meiosis I produces gametes; meiosis II is only used in plants for spore formation','Meiosis I produces haploid cells; meiosis II doubles the chromosome number back to diploid'], answer:'Meiosis I separates homologous chromosome pairs (reducing chromosome number from diploid to haploid); meiosis II separates sister chromatids (like mitosis)', fact:'🔬 After meiosis I, cells are haploid but chromosomes still have two chromatids. Meiosis II separates these — producing 4 genetically unique haploid cells. Crossing over in prophase I generates enormous genetic variation!' },
  { level:3, visual:'🌱', question:'What is the role of the corpus callosum in the brain?', options:['A bundle of nerve fibres connecting the left and right cerebral hemispheres, allowing them to communicate and coordinate activity','The brain region controlling balance and coordination, located at the back of the skull','The structure that regulates the secretion of pituitary hormones based on blood hormone levels'], answer:'A bundle of nerve fibres connecting the left and right cerebral hemispheres, allowing them to communicate and coordinate activity', fact:'🌱 Severing the corpus callosum (a historical epilepsy treatment) creates "split-brain" patients where the two hemispheres cannot communicate. Studies of these patients revealed that the left hemisphere processes language; right processes spatial information!' },
  { level:3, visual:'🧬', question:'What is a dihybrid cross and what ratio does it give in the F2 generation?', options:['A cross tracking two independently assorting genes simultaneously — F2 phenotype ratio is 9:3:3:1 (assuming both genes show dominance and assort independently)','A cross between two individuals differing in one gene — F2 ratio is 3:1','A cross tracking two genes on the same chromosome — always produces a 1:1 ratio'], answer:'A cross tracking two independently assorting genes simultaneously — F2 phenotype ratio is 9:3:3:1 (assuming both genes show dominance and assort independently)', fact:'🧬 The 9:3:3:1 ratio only holds for unlinked genes (on different chromosomes). Mendel was lucky — the 7 pea traits he chose happened to be on different chromosomes! Linked genes give different ratios unless crossing over separates them!' },
  { level:3, visual:'🔬', question:'What is gene linkage and how does it affect inheritance ratios?', options:['Genes on the same chromosome tend to be inherited together — they do NOT assort independently, producing ratios that deviate from the expected 9:3:3:1','Genes that are complementary must be inherited together to produce a phenotype','Linkage always produces a 1:1:1:1 ratio in all crosses regardless of distance between genes'], answer:'Genes on the same chromosome tend to be inherited together — they do NOT assort independently, producing ratios that deviate from the expected 9:3:3:1', fact:'🔬 The further apart genes are on a chromosome, the more likely crossing over will separate them. Morgan\'s fruit fly experiments revealed linkage groups (one per chromosome). Recombination frequency is used to make genetic maps!' },
  { level:3, visual:'💉', question:'What is immunological memory and why do second infections by the same pathogen cause milder symptoms?', options:['Memory B and T cells persist after the first infection — on second exposure they proliferate rapidly (within hours) producing antibodies before symptoms appear','The immune system produces permanently circulating antibodies after first infection that neutralise the pathogen immediately','The pathogen becomes weaker on second entry because the body\'s pH destroys it faster'], answer:'Memory B and T cells persist after the first infection — on second exposure they proliferate rapidly (within hours) producing antibodies before symptoms appear', fact:'💉 Memory cells can live for decades — some are thought to be permanent! The primary response takes 1–2 weeks to peak; the secondary response peaks in 1–3 days at 100× higher antibody titre. This is the entire basis of vaccination!' },
  { level:3, visual:'🌿', question:'What is the role of the SRY gene in sex determination?', options:['Located on the Y chromosome — its expression triggers development of testes, testosterone production and male anatomy; without it, the default developmental pathway produces female anatomy','Located on the X chromosome — its expression determines female characteristics','Controls all sex-linked traits by regulating X chromosome expression in both sexes'], answer:'Located on the Y chromosome — its expression triggers development of testes, testosterone production and male anatomy; without it, the default developmental pathway produces female anatomy', fact:'🌿 SRY (sex-determining region Y) is the "master switch" — discovered in 1990. Rare XX individuals with a translocated SRY gene develop as males; rare XY individuals with a mutated SRY develop as females. Biology is more complex than XY = male!' },
  { level:3, visual:'🔬', question:'What are the stages of the cell cycle and at which stage does DNA replicate?', options:['G1 (growth) → S phase (DNA synthesis/replication) → G2 (preparation for division) → M phase (mitosis) → cytokinesis','DNA replicates during prophase of mitosis, when chromosomes first become visible','The cell cycle has only two stages: interphase (all growth) and mitosis (division)'], answer:'G1 (growth) → S phase (DNA synthesis/replication) → G2 (preparation for division) → M phase (mitosis) → cytokinesis', fact:'🔬 The S phase (synthesis) is when all 6 billion base pairs of human DNA are copied in about 6–8 hours. Checkpoint proteins (like p53) check for errors at each stage boundary — mutations in checkpoints can lead to cancer!' },
  { level:3, visual:'🧬', question:'What is the significance of the 23rd pair of chromosomes?', options:['They are the sex chromosomes — XX in females, XY in males — determining biological sex and carrying sex-linked genes like colour blindness and haemophilia','They carry only non-coding DNA and have no known function in adults','They are the smallest chromosomes and contain the most genes due to efficient packaging'], answer:'They are the sex chromosomes — XX in females, XY in males — determining biological sex and carrying sex-linked genes like colour blindness and haemophilia', fact:'🧬 The X chromosome has ~800 genes; the Y chromosome has only ~70 functioning genes! The Y chromosome has been shrinking evolutionarily and may disappear in ~4.6 million years — though some species have already lost it!' },
  { level:3, visual:'🌿', question:'What is comparative genomics and what has it revealed about evolution?', options:['Comparing genome sequences between species to identify conserved genes, evolutionary relationships and genes responsible for species-specific traits','Comparing the physical appearance of genomes (chromosome number and size) between species','Analysing genome expression patterns in different tissues of a single organism'], answer:'Comparing genome sequences between species to identify conserved genes, evolutionary relationships and genes responsible for species-specific traits', fact:'🌿 Humans share 98.7% of DNA with chimpanzees, 85% with mice, 60% with fruit flies, and even 31% with yeast! Highly conserved genes (like HOX genes controlling body plans) are found in almost all animals, unchanged for 500 million years!' },
  { level:3, visual:'💉', question:'What is the mechanism of action of mRNA vaccines and how do they differ from traditional vaccines?', options:['mRNA vaccines deliver instruction molecules that cells use to produce a viral protein, triggering immunity without any viral material; traditional vaccines use killed/weakened pathogens or protein subunits','mRNA vaccines insert genes permanently into the nucleus; traditional vaccines use antibodies only','mRNA vaccines produce a lifetime of antibodies from one dose; traditional vaccines require annual boosters in all cases'], answer:'mRNA vaccines deliver instruction molecules that cells use to produce a viral protein, triggering immunity without any viral material; traditional vaccines use killed/weakened pathogens or protein subunits', fact:'💉 COVID-19 mRNA vaccines were developed in 11 months — previous vaccine speed record was 4 years (mumps, 1967). mRNA cannot enter the nucleus or integrate into DNA. The mRNA degrades within days, but immunity lasts months to years!' },
  { level:3, visual:'🧫', question:'What is transgenic technology and give an example of a transgenic organism?', options:['Introducing a gene from one species into the genome of another — e.g. transgenic rice (Golden Rice) containing daffodil genes to produce beta-carotene (provitamin A)','Producing offspring from two genetically distant species through hybridisation — e.g. mule (horse × donkey)','Using selective breeding over many generations to introduce desired traits — e.g. high-yield wheat'], answer:'Introducing a gene from one species into the genome of another — e.g. transgenic rice (Golden Rice) containing daffodil genes to produce beta-carotene (provitamin A)', fact:'🧫 Golden Rice was engineered to address vitamin A deficiency that causes 250,000–500,000 cases of child blindness per year in developing countries. Other examples: transgenic bacteria making insulin, GFP jellyfish genes in mice (they glow!)!' },
  { level:3, visual:'🌱', question:'What is the gene therapy approach for treating genetic disease?', options:['Delivering functional copies of a defective gene into the patient\'s cells using a viral vector or other delivery mechanism to restore normal protein production','Editing all cells in the body using CRISPR-Cas9 to correct the mutation in every chromosome','Replacing the patient\'s entire genome with a healthy genome from a matched donor'], answer:'Delivering functional copies of a defective gene into the patient\'s cells using a viral vector or other delivery mechanism to restore normal protein production', fact:'🌱 The first gene therapy clinical trial was in 1990 for ADA-SCID (bubble boy disease). In 2022, the FDA approved Hemgenix for haemophilia B — a single infusion costing $3.5 million, but potentially curing the disease permanently!' },
  { level:3, visual:'🔬', question:'What is the central dogma of molecular biology?', options:['DNA → RNA (transcription) → Protein (translation) — information flows from DNA to RNA to protein; reverse transcription (RNA→DNA) is a known exception in retroviruses','DNA → Protein directly; RNA is only a structural component of ribosomes','Information flows in both directions: DNA ↔ RNA ↔ Protein, with constant feedback loops controlling expression'], answer:'DNA → RNA (transcription) → Protein (translation) — information flows from DNA to RNA to protein; reverse transcription (RNA→DNA) is a known exception in retroviruses', fact:'🔬 Francis Crick proposed the central dogma in 1958. HIV and other retroviruses use reverse transcriptase (RNA→DNA) — the famous exception. This enzyme is the target of antiretroviral drugs like zidovudine (AZT)!' },
  { level:3, visual:'🧬', question:'What is the lac operon and what does it illustrate about gene regulation?', options:['A prokaryotic gene regulation system in E. coli where lactose metabolism genes are only expressed when lactose is present and glucose is absent — showing genes can be switched on/off by environmental conditions','A eukaryotic system where all metabolic genes are constitutively expressed','A model of how mutations in promoter regions always abolish gene expression'], answer:'A prokaryotic gene regulation system in E. coli where lactose metabolism genes are only expressed when lactose is present and glucose is absent — showing genes can be switched on/off by environmental conditions', fact:'🧬 Jacob and Monod discovered the lac operon in 1961 (Nobel Prize). When glucose is absent and lactose is present, the repressor protein is inactivated — allowing transcription. The concept of operons is foundational to understanding gene control!' },
  { level:3, visual:'🌿', question:'What is the greenhouse effect and how does it relate to biology?', options:['CO₂ and other gases trap heat in the atmosphere — photosynthesis removes CO₂ while respiration, decomposition and combustion add it; the balance maintains Earth\'s temperature','The greenhouse effect is entirely physical with no biological component','Only methane from industry creates the greenhouse effect — CO₂ has a minor role'], answer:'CO₂ and other gases trap heat in the atmosphere — photosynthesis removes CO₂ while respiration, decomposition and combustion add it; the balance maintains Earth\'s temperature', fact:'🌿 Phytoplankton in oceans absorb ~50% of global CO₂ via photosynthesis. Methane from cows and rice paddies is 80× more potent than CO₂ over 20 years. Ocean acidification from dissolved CO₂ threatens coral reefs and shellfish!' },
  { level:3, visual:'🔬', question:'What is the hypothalamic-pituitary axis (HPA) and how does it regulate hormones?', options:['The hypothalamus produces releasing hormones that stimulate the pituitary to release tropic hormones that target endocrine glands — regulated by negative feedback','The hypothalamus produces all hormones directly; the pituitary only stores them before release','The pituitary controls the hypothalamus through direct nerve connections; feedback loops are absent'], answer:'The hypothalamus produces releasing hormones that stimulate the pituitary to release tropic hormones that target endocrine glands — regulated by negative feedback', fact:'🔬 The HPA axis controls thyroid hormones, cortisol, sex hormones and growth hormone. Negative feedback: high cortisol → inhibits CRH release from hypothalamus → reduces ACTH from pituitary → adrenal glands produce less cortisol!' },
  { level:3, visual:'🧠', question:'What is the role of the cerebellum vs. the cerebrum in brain function?', options:['Cerebrum: conscious thought, language, sensory perception, voluntary movement (motor cortex), memory; cerebellum: balance, coordination, fine motor control and timing of movement','Cerebellum: all conscious functions; cerebrum: automatic body functions like breathing','Both regions perform identical functions; only their location in the skull differs'], answer:'Cerebrum: conscious thought, language, sensory perception, voluntary movement (motor cortex), memory; cerebellum: balance, coordination, fine motor control and timing of movement', fact:'🧠 The cerebellum contains 70 billion neurons (80% of the brain\'s total!) despite being only 10% of brain volume. It constantly corrects motor commands. Damage causes ataxia — staggering movement like intoxication!' },
  { level:3, visual:'💉', question:'What is Mendelian genetics and when does it NOT apply?', options:['Mendel\'s laws predict 3:1 and 1:1 ratios based on dominant/recessive alleles; it breaks down with codominance, incomplete dominance, polygenic traits, linked genes and epigenetic effects','Mendelian genetics applies to all traits in all organisms without exception','Mendelian genetics only applies to sexual reproduction in diploid organisms and correctly predicts all inheritance ratios'], answer:'Mendel\'s laws predict 3:1 and 1:1 ratios based on dominant/recessive alleles; it breaks down with codominance, incomplete dominance, polygenic traits, linked genes and epigenetic effects', fact:'💉 Height involves hundreds of genes (polygenic) — not Mendelian. ABO blood groups combine simple Mendelian genetics with codominance (I^A and I^B) and recessive (i). Mendel was extraordinarily lucky to choose 7 traits that all happened to be simple dominant/recessive!' },
  { level:3, visual:'🧬', question:'What is epistasis?', options:['When one gene masks or modifies the expression of another gene at a different locus — producing unexpected phenotypic ratios in crosses','When two genes interact additively to produce a phenotype — each contributing equally','When an allele at one locus inhibits the expression of the other allele at the same locus (like recessive)'], answer:'When one gene masks or modifies the expression of another gene at a different locus — producing unexpected phenotypic ratios in crosses', fact:'🧬 Labrador coat colour is an example: the E gene controls whether pigment is deposited (E_) or not (ee); the B gene controls pigment colour (B_ = black, bb = brown). ee dogs are always yellow regardless of their B genotype — classic epistasis!' },
  { level:3, visual:'🌊', question:'What is primary productivity in ecology and how is it measured?', options:['The rate at which producers (plants/algae) convert light energy to organic matter via photosynthesis — measured in g C/m²/year or kJ/m²/year; net PP = gross PP minus plant respiration','The total biomass of all organisms in an ecosystem at any given time','The rate of decomposition of organic matter by bacteria and fungi in the soil'], answer:'The rate at which producers (plants/algae) convert light energy to organic matter via photosynthesis — measured in g C/m²/year or kJ/m²/year; net PP = gross PP minus plant respiration', fact:'🌊 Tropical rainforests have the highest terrestrial NPP (~2,200 g C/m²/yr); deserts the lowest (~90). Open ocean is low per area but enormous in total area — making marine phytoplankton responsible for ~50% of Earth\'s total primary production!' },
  { level:3, visual:'🔬', question:'What is whole genome sequencing and what has it revealed?', options:['Determining the complete DNA sequence of an organism — revealed that humans have ~20,000 genes (far fewer than expected), ~98.5% non-coding DNA, and that humans share genes with virtually all life on Earth','Reading only the protein-coding genes of an organism\'s genome','Mapping the physical positions of all genes on chromosomes without determining their sequences'], answer:'Determining the complete DNA sequence of an organism — revealed that humans have ~20,000 genes (far fewer than expected), ~98.5% non-coding DNA, and that humans share genes with virtually all life on Earth', fact:'🔬 The Human Genome Project (completed 2003) cost $2.7 billion and took 13 years. Today a full genome sequence costs ~$200 and takes a day. The "junk DNA" turns out to include regulatory sequences, structural elements, and ancient viral sequences!' },
  { level:3, visual:'🧫', question:'What is CRISPR base editing and how does it differ from standard CRISPR-Cas9?', options:['Base editing directly converts one DNA base to another (e.g. C to T) without making a double-strand break — reducing off-target effects compared to standard Cas9 cutting','Base editing uses a different guide RNA but the same Cas9 nuclease to introduce larger deletions','Base editing only works in vitro for research purposes — standard CRISPR is used for all clinical applications'], answer:'Base editing directly converts one DNA base to another (e.g. C to T) without making a double-strand break — reducing off-target effects compared to standard Cas9 cutting', fact:'🧫 Many genetic diseases are caused by a single base change (point mutation). Base editing was used in 2021 to treat a child with T-cell leukaemia — the base-edited cells were engineered to attack the cancer. Prime editing can also correct insertions/deletions!' },
  { level:3, visual:'🌿', question:'What are the ecological consequences of removing a top predator from an ecosystem?', options:['Trophic cascade — prey populations explode, over-graze vegetation, leading to habitat degradation and collapse of biodiversity at all lower trophic levels','Only the immediate prey of the predator is affected — other species are not significantly impacted','The ecosystem rapidly rebalances itself through competition between herbivores'], answer:'Trophic cascade — prey populations explode, over-graze vegetation, leading to habitat degradation and collapse of biodiversity at all lower trophic levels', fact:'🌿 When wolves were exterminated from Yellowstone, elk grazed riverbanks bare — rivers eroded, willows disappeared, beavers vanished, songbirds declined. Wolves\' return in 1995 reversed all of this — literally changing the course of rivers!' },

  // ── EASY ADDITIONAL (to reach ~167) ─────────────────────────────────────────
  { level:1, visual:'💧', question:'What is the name for the process by which plants lose water vapour through their leaves?', options:['Transpiration','Respiration','Excretion'], answer:'Transpiration', fact:'💧 Plants cannot control transpiration as easily as animals — on hot windy days they lose water fast. Stomata can close to reduce water loss, but this also slows photosynthesis!' },
  { level:1, visual:'🌿', question:'Which part of the leaf captures sunlight for photosynthesis?', options:['Chloroplasts in palisade mesophyll cells','The waxy cuticle on the upper surface','The veins that transport water and sugar'], answer:'Chloroplasts in palisade mesophyll cells', fact:'🌿 Palisade cells are packed with chloroplasts and arranged in tall columns near the top surface of the leaf — perfectly positioned to absorb as much direct sunlight as possible!' },
  { level:1, visual:'🌱', question:'What is the role of xylem in a plant?', options:['Transport water and minerals from roots to leaves','Transport sugar from leaves to the rest of the plant','Store starch for energy reserves'], answer:'Transport water and minerals from roots to leaves', fact:'🌱 Xylem vessels are dead hollow tubes reinforced with lignin — they carry water upward in one direction only. The flow is driven by transpiration pull from the leaves and osmosis in the roots!' },
  { level:1, visual:'🌱', question:'What is the role of phloem in a plant?', options:['Transport dissolved sugars (sucrose) from leaves to all parts of the plant','Transport water and minerals from roots upward','Provide structural support like a plant\'s skeleton'], answer:'Transport dissolved sugars (sucrose) from leaves to all parts of the plant', fact:'🌱 Phloem transports sugar in both directions — up to growing shoot tips and down to roots. This process is called translocation. Phloem cells are living, unlike the dead hollow xylem cells!' },
  { level:1, visual:'🔴', question:'In MRS GREN, what does E stand for?', options:['Excretion','Evolution','Eating'], answer:'Excretion', fact:'🔴 Excretion is the removal of metabolic waste products from the body — like CO₂ from respiration (exhaled by lungs) and urea from protein breakdown (removed by kidneys). Do not confuse excretion with egestion (removing undigested food)!' },
  { level:1, visual:'🦴', question:'What type of tissue makes up cartilage and what does it do?', options:['Connective tissue that cushions joints and gives flexibility to structures like the nose and ears','Muscle tissue that surrounds joints to allow smooth movement','Bone tissue that provides rigid support at all joint surfaces'], answer:'Connective tissue that cushions joints and gives flexibility to structures like the nose and ears', fact:'🦴 Cartilage contains no blood vessels — nutrients diffuse in slowly, making it hard to repair when damaged. Athletes with torn knee cartilage often need surgery because it heals very poorly!' },
  { level:1, visual:'🐝', question:'What is the difference between a parasite and a mutualistic organism?', options:['A parasite harms the host while benefiting itself; a mutualistic organism benefits both itself and the other organism','A parasite is always microscopic; a mutualistic organism is always visible to the naked eye','Both parasites and mutualistic organisms harm the host organism'], answer:'A parasite harms the host while benefiting itself; a mutualistic organism benefits both itself and the other organism', fact:'🐝 Tapeworms are parasites; nitrogen-fixing bacteria in legume root nodules are mutualistic — the plant gets nitrates, the bacteria get sugars. Oxpecker birds removing ticks from buffalo is another classic mutualism!' },
  { level:1, visual:'🌍', question:'What is the difference between a community and a population in ecology?', options:['A population is all individuals of ONE species in an area; a community is ALL species living in the same area','A community is smaller than a population','A population includes the non-living environment; a community only includes living things'], answer:'A population is all individuals of ONE species in an area; a community is ALL species living in the same area', fact:'🌍 All the oak trees in a forest = a population. All the trees + animals + fungi + bacteria in that forest = a community. Add the non-living environment (soil, water, air) and you have an ecosystem!' },
  { level:1, visual:'🌿', question:'What is fertilisation in biology?', options:['The fusion of a male sex cell (sperm/pollen) with a female sex cell (egg/ovule) to form a zygote','The growth of a seed into a new plant','The transfer of pollen from one flower to another'], answer:'The fusion of a male sex cell (sperm/pollen) with a female sex cell (egg/ovule) to form a zygote', fact:'🌿 Fertilisation restores the full chromosome number — each gamete has half (haploid), so the zygote has the full number (diploid). The zygote then divides by mitosis to grow into a new organism!' },
  { level:1, visual:'🌸', question:'What is seed dispersal and why is it important?', options:['The spreading of seeds away from the parent plant to reduce competition and colonise new areas','The germination of seeds inside a fruit while still attached to the parent plant','The fertilisation of seeds by pollen from a different plant'], answer:'The spreading of seeds away from the parent plant to reduce competition and colonise new areas', fact:'🌸 Seeds are dispersed by wind (dandelion parachutes), animals eating fruit, hooks catching fur, water floating, and explosion. Plants that disperse seeds widely reduce competition among siblings and can colonise new habitats!' },
  { level:1, visual:'🦋', question:'What is mimicry as an adaptation?', options:['When a harmless species evolves to look like a dangerous or unpalatable species to avoid predation','When a predator disguises itself as prey to get closer before attacking','When two different species evolve to look identical due to living in the same environment'], answer:'When a harmless species evolves to look like a dangerous or unpalatable species to avoid predation', fact:'🦋 The hoverfly looks exactly like a wasp — black and yellow stripes — but is completely harmless. Predators have learned to avoid wasps, so they avoid hoverflies too! This is Batesian mimicry!' },
  { level:1, visual:'🌊', question:'What is eutrophication?', options:['When excess nitrates and phosphates (from fertilisers) enter water, causing algal blooms that deplete oxygen and kill aquatic life','When factories discharge hot water into rivers, reducing oxygen levels directly','When acid rain lowers the pH of lakes, killing fish and invertebrates'], answer:'When excess nitrates and phosphates (from fertilisers) enter water, causing algal blooms that deplete oxygen and kill aquatic life', fact:'🌊 Algal bloom → algae block light → water plants die → bacteria decompose dead plants using up all oxygen → fish and invertebrates suffocate. Agricultural run-off is the main cause worldwide!' },
  { level:1, visual:'🔬', question:'What is the function of a vacuole in a plant cell?', options:['Store water, sugars and waste products; maintain cell pressure (turgor) keeping the plant firm','Produce energy by respiration in the plant cell','Digest old organelles and foreign material inside the cell'], answer:'Store water, sugars and waste products; maintain cell pressure (turgor) keeping the plant firm', fact:'🔬 A fully inflated vacuole pushes the cytoplasm outward against the cell wall — creating turgor pressure that keeps stems upright. A plant wilts when its vacuoles lose water (become flaccid)!' },
  { level:1, visual:'🐠', question:'What are the five classes of vertebrate in order from first to evolve?', options:['Fish → Amphibians → Reptiles → Birds → Mammals','Mammals → Birds → Reptiles → Amphibians → Fish','Fish → Reptiles → Amphibians → Birds → Mammals'], answer:'Fish → Amphibians → Reptiles → Birds → Mammals', fact:'🐠 Fish appeared ~530 million years ago; amphibians ~375 Ma (first land vertebrates); reptiles ~310 Ma; birds ~150 Ma (from dinosaurs); mammals ~220 Ma — but dominated only after dinosaurs vanished 66 Ma!' },
  { level:1, visual:'🧪', question:'What is the role of bile in digestion?', options:['Emulsify fats into tiny droplets, increasing surface area for lipase enzymes to digest them','Break down proteins into amino acids using enzyme activity','Neutralise acid from the stomach and digest starch in the duodenum'], answer:'Emulsify fats into tiny droplets, increasing surface area for lipase enzymes to digest them', fact:'🧪 Bile is produced by the liver and stored in the gall bladder. It contains bile salts that act like detergent — breaking large fat globules into tiny droplets so lipase can attack them more efficiently!' },
  { level:1, visual:'🫀', question:'What is the difference between systole and diastole?', options:['Systole is when heart muscle contracts (pumping blood out); diastole is when it relaxes (filling with blood)','Systole is the relaxation phase; diastole is the contraction phase','Systole refers to the left side of the heart; diastole to the right side'], answer:'Systole is when heart muscle contracts (pumping blood out); diastole is when it relaxes (filling with blood)', fact:'🫀 Blood pressure is measured as systolic/diastolic (e.g. 120/80 mmHg). The "lub-dub" heartbeat sound is made by valves closing — preventing backflow. Heart valves are essential to maintain one-way blood flow!' },
  { level:1, visual:'🌿', question:'What do plants need minerals for, giving two examples?', options:['Nitrates for protein/DNA synthesis; magnesium for chlorophyll production','Iron for photosynthesis; calcium for cell division','Phosphorus for cell wall production; sodium for enzyme activation'], answer:'Nitrates for protein/DNA synthesis; magnesium for chlorophyll production', fact:'🌿 Nitrate deficiency causes yellow leaves (chlorosis) and stunted growth — plants can\'t make chlorophyll or amino acids. Farmers add nitrogen fertilisers to replace nitrates taken up by crops!' },
  { level:1, visual:'🧬', question:'What is the phenotype of a person with genotype Tt for height (T = tall is dominant)?', options:['Tall','Short','Medium height (intermediate)'], answer:'Tall', fact:'🧬 One dominant T allele is all you need to be tall! The recessive t allele is masked. This person is "heterozygous tall" — they look tall but can pass the t allele to their children!' },
  { level:1, visual:'🐾', question:'What is camouflage as an adaptation?', options:['Body colour or pattern that matches the surroundings, making an organism harder to see by predators or prey','A bright warning colour that signals to predators that an organism is toxic or dangerous','The ability to change colour rapidly in response to different backgrounds'], answer:'Body colour or pattern that matches the surroundings, making an organism harder to see by predators or prey', fact:'🐾 The Arctic hare turns white in winter to hide in snow and brown in summer to blend with tundra. Camouflage reduces predation (for prey) or increases hunting success (for predators like leopards and stick insects)!' },
  { level:1, visual:'🌿', question:'What is the difference between aerobic and anaerobic in simple terms?', options:['Aerobic means "with oxygen"; anaerobic means "without oxygen"','Aerobic happens in animals; anaerobic happens in plants','Aerobic is slow; anaerobic is fast but uses more energy'], answer:'Aerobic means "with oxygen"; anaerobic means "without oxygen"', fact:'🌿 The prefix "aero" means air. Aerobic exercise (jogging, cycling) uses oxygen to release energy from glucose. Sprinting pushes you into anaerobic respiration — your muscles can\'t get oxygen fast enough!' },
  { level:1, visual:'🔬', question:'What are the three domains of life according to the modern classification system?', options:['Bacteria, Archaea and Eukarya','Animals, Plants and Microorganisms','Prokaryotes, Eukaryotes and Viruses'], answer:'Bacteria, Archaea and Eukarya', fact:'🔬 The three-domain system (Woese, 1990) replaced the five-kingdom system. Archaea look like bacteria but are genetically more similar to eukaryotes. They thrive in extreme conditions — boiling springs, salt lakes, deep-sea vents!' },
  { level:1, visual:'🌱', question:'What is the difference between a monocot and a dicot plant?', options:['Monocots have one seed leaf and parallel leaf veins (e.g. grass, wheat); dicots have two seed leaves and branching leaf veins (e.g. oak, rose)','Monocots only grow in water; dicots only grow on land','Monocots reproduce by spores; dicots reproduce by seeds'], answer:'Monocots have one seed leaf and parallel leaf veins (e.g. grass, wheat); dicots have two seed leaves and branching leaf veins (e.g. oak, rose)', fact:'🌱 All cereals (wheat, rice, maize, oats) are monocots — making them responsible for ~60% of human caloric intake! Most flowering trees and many garden plants are dicots. The seed leaf (cotyledon) feeds the embryo during germination!' },
  { level:1, visual:'🦠', question:'What is the role of bacteria in the nitrogen cycle?', options:['Nitrogen-fixing bacteria convert N₂ to ammonia; nitrifying bacteria convert ammonia to nitrates; denitrifying bacteria convert nitrates back to N₂','Only decomposers — they break down dead organisms to release nitrogen','They only absorb nitrates from the soil for their own protein synthesis'], answer:'Nitrogen-fixing bacteria convert N₂ to ammonia; nitrifying bacteria convert ammonia to nitrates; denitrifying bacteria convert nitrates back to N₂', fact:'🦠 Without nitrogen-fixing bacteria, plants couldn\'t access atmospheric nitrogen. Rhizobium bacteria live in legume root nodules in a mutualistic relationship — the plant gets ammonia, the bacteria get glucose!' },
  { level:1, visual:'🌡️', question:'What is the role of sweat in thermoregulation?', options:['Sweat evaporates from the skin, removing heat energy and cooling the body','Sweat reacts with bacteria to produce warmth when it is cold','Sweat increases blood flow to the skin surface to warm the body'], answer:'Sweat evaporates from the skin, removing heat energy and cooling the body', fact:'🌡️ Evaporation is an endothermic process — it takes heat energy FROM your skin. You can sweat up to 10 litres per day during extreme exercise in heat. That\'s why staying hydrated during exercise is essential!' },
  { level:1, visual:'🧠', question:'What is the function of sensory neurons?', options:['Carry nerve impulses from receptors (sense organs) to the central nervous system','Carry nerve impulses from the brain to muscles and glands','Connect sensory and motor neurons within the spinal cord'], answer:'Carry nerve impulses from receptors (sense organs) to the central nervous system', fact:'🧠 Sensory neurons bring information IN — sight, sound, touch, pain, temperature — to the CNS for processing. The CNS then sends instructions via motor neurons OUT to muscles and glands!' },
  { level:1, visual:'💧', question:'What is the difference between diffusion and osmosis?', options:['Diffusion is the movement of ANY particles from high to low concentration; osmosis is specifically the movement of WATER through a semi-permeable membrane','They are the same process using different molecules','Osmosis requires energy; diffusion is passive'], answer:'Diffusion is the movement of ANY particles from high to low concentration; osmosis is specifically the movement of WATER through a semi-permeable membrane', fact:'💧 Diffusion moves any small molecule (glucose, oxygen, CO₂) from high to low concentration. Osmosis is a special case — ONLY water moves through the membrane. Both processes are passive (no energy needed)!' },
  { level:1, visual:'🦷', question:'What is the difference between incisors, canines and molars?', options:['Incisors cut food; canines tear food; molars grind food','Incisors grind food; canines cut food; molars tear food','All teeth perform the same function but vary in size only'], answer:'Incisors cut food; canines tear food; molars grind food', fact:'🦷 Herbivores have large flat molars for grinding tough plant material but no canines. Carnivores have large sharp canines for killing and tearing meat. Humans have all three types — a sign of our omnivorous evolution!' },
  { level:1, visual:'🔬', question:'What is the Linnaean classification system in order from largest to smallest group?', options:['Kingdom → Phylum → Class → Order → Family → Genus → Species','Species → Genus → Family → Order → Class → Phylum → Kingdom','Kingdom → Class → Phylum → Order → Genus → Family → Species'], answer:'Kingdom → Phylum → Class → Order → Family → Genus → Species', fact:'🔬 Remember: "King Philip Came Over For Good Soup"! Humans are: Kingdom Animalia, Phylum Chordata, Class Mammalia, Order Primates, Family Hominidae, Genus Homo, Species sapiens = Homo sapiens!' },
  { level:1, visual:'🌿', question:'What are the inputs and outputs of photosynthesis?', options:['Inputs: CO₂ and water (+ light energy); Outputs: glucose and oxygen','Inputs: oxygen and glucose; Outputs: CO₂ and water','Inputs: sunlight and glucose; Outputs: CO₂ and water vapour'], answer:'Inputs: CO₂ and water (+ light energy); Outputs: glucose and oxygen', fact:'🌿 The complete equation: 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂. Chlorophyll captures the light energy that powers this reaction. The glucose is used for energy and building materials; the oxygen is released as waste!' },
  { level:1, visual:'🐸', question:'What are the stages of the human life cycle in order?', options:['Fertilisation → embryo → foetus → baby → child → adolescent → adult → old age','Baby → child → adolescent → adult → embryo → foetus','Embryo → baby → adolescent → child → adult'], answer:'Fertilisation → embryo → foetus → baby → child → adolescent → adult → old age', fact:'🐸 After fertilisation, the zygote divides repeatedly for 8 weeks (embryo stage) then is called a foetus until birth at ~40 weeks. Human childhood is unusually long compared to other animals — our large brains need more development time!' },
  { level:1, visual:'🌿', question:'What is the role of chlorophyll in photosynthesis?', options:['Absorb light energy (mainly red and blue wavelengths) to power the photosynthesis reactions','Act as the raw material that is converted into glucose','Carry water from the roots to the sites of photosynthesis in the leaf'], answer:'Absorb light energy (mainly red and blue wavelengths) to power the photosynthesis reactions', fact:'🌿 Chlorophyll absorbs red (~660 nm) and blue (~430 nm) light but REFLECTS green — which is why plants appear green! There are multiple types of chlorophyll and carotenoids that absorb slightly different wavelengths!' },
  { level:1, visual:'🦠', question:'What is the difference between bacteria and viruses?', options:['Bacteria are living cells with their own metabolism that can reproduce independently; viruses are non-living particles that can only replicate inside a host cell','Bacteria are always harmful; viruses are always harmless','Bacteria are larger than human cells; viruses are the same size as bacteria'], answer:'Bacteria are living cells with their own metabolism that can reproduce independently; viruses are non-living particles that can only replicate inside a host cell', fact:'🦠 Bacteria are 1,000× larger than viruses! Antibiotics kill bacteria — they target bacterial structures. Viruses have no metabolism to target, making antiviral drugs harder to design without harming the host!' },
  { level:1, visual:'🌱', question:'Name the four main food groups (nutrients) and their primary roles.', options:['Carbohydrates (energy), proteins (growth/repair), fats (energy storage/insulation), vitamins and minerals (various body functions)','Carbohydrates, proteins, vitamins, water','Glucose, amino acids, fatty acids, minerals'], answer:'Carbohydrates (energy), proteins (growth/repair), fats (energy storage/insulation), vitamins and minerals (various body functions)', fact:'🌱 A balanced diet also needs fibre (gut health) and water (all reactions). Too much fat and sugar leads to obesity; too little protein causes kwashiorkor (protein deficiency disease seen in famine-affected areas)!' },
  { level:1, visual:'🧪', question:'What is an enzyme substrate?', options:['The specific molecule that an enzyme acts upon and fits into the active site','The product formed when an enzyme catalyses a reaction','The enzyme itself before it binds to the molecule'], answer:'The specific molecule that an enzyme acts upon and fits into the active site', fact:'🧪 Enzymes are specific — amylase only breaks down starch (its substrate), not protein or fat. The substrate fits the active site like a key in a lock, forming an enzyme-substrate complex. The product is then released!' },
  { level:1, visual:'🌍', question:'What is the greenhouse effect in simple terms?', options:['Greenhouse gases (CO₂, methane, water vapour) trap heat from the sun in Earth\'s atmosphere, warming the planet','The way glass traps heat in actual greenhouses during gardening','The process by which oxygen causes warming when released by photosynthesis'], answer:'Greenhouse gases (CO₂, methane, water vapour) trap heat from the sun in Earth\'s atmosphere, warming the planet', fact:'🌍 Without any greenhouse effect, Earth\'s average temperature would be -18°C — too cold for life as we know it! The problem is that human activities are INCREASING greenhouse gases, causing extra warming — climate change!' },
  { level:1, visual:'🔬', question:'What is active transport and how does it differ from diffusion?', options:['Active transport moves substances AGAINST the concentration gradient using energy (ATP); diffusion moves substances along the gradient using no energy','They are the same process — just the term used depends on which molecules move','Active transport only moves water; diffusion moves other dissolved substances'], answer:'Active transport moves substances AGAINST the concentration gradient using energy (ATP); diffusion moves substances along the gradient using no energy', fact:'🔬 Root hair cells absorb nitrate ions by active transport — even when concentration is higher inside than outside. This is why plants need to respire! If plants are given no oxygen, they can\'t do active transport and wilt!' },
  { level:1, visual:'🌿', question:'What is phototropism?', options:['The growth of a plant shoot TOWARDS a light source','The growth of plant roots DOWNWARDS towards gravity','The opening of flowers in response to sunlight'], answer:'The growth of a plant shoot TOWARDS a light source', fact:'🌿 Shoots are positively phototropic — auxin accumulates on the shaded side, making cells elongate more, bending the shoot toward light. Roots are negatively phototropic (grow away from light)!' },
  { level:1, visual:'🌍', question:'What is a food web?', options:['A diagram showing all the feeding relationships between organisms in an ecosystem — more realistic than a single food chain','A simple linear sequence showing one pathway of energy from producer to top predator','A map showing where food sources are located in a habitat'], answer:'A diagram showing all the feeding relationships between organisms in an ecosystem — more realistic than a single food chain', fact:'🌍 In a real ecosystem most animals eat several species and are eaten by several others — creating a complex web. Removing one species rarely causes total collapse because predators can switch to other prey!' },
  { level:1, visual:'🫁', question:'What is the role of the diaphragm in breathing?', options:['It contracts and flattens (inhaling) or relaxes and domes upward (exhaling), changing chest volume and pressure','It filters the air entering the lungs to remove dust and pathogens','It is a valve that prevents food from entering the lungs during swallowing'], answer:'It contracts and flattens (inhaling) or relaxes and domes upward (exhaling), changing chest volume and pressure', fact:'🫁 Breathing is mechanical — the diaphragm and intercostal muscles change lung volume. When volume increases, pressure drops below atmospheric pressure and air rushes in. When volume decreases, air is pushed out!' },
  { level:1, visual:'🐋', question:'What is the classification hierarchy for a domestic dog (Canis lupus familiaris)?', options:['Kingdom Animalia → Phylum Chordata → Class Mammalia → Order Carnivora → Family Canidae → Genus Canis → Species lupus familiaris','Kingdom Plantae → Phylum Chordata → Class Mammalia → Genus Canis','Kingdom Animalia → Phylum Arthropoda → Class Mammalia → Genus Canis'], answer:'Kingdom Animalia → Phylum Chordata → Class Mammalia → Order Carnivora → Family Canidae → Genus Canis → Species lupus familiaris', fact:'🐋 The domestic dog is technically a subspecies of the wolf (Canis lupus)! DNA analysis confirms dogs were domesticated from wolves 15,000–40,000 years ago. All 400+ dog breeds are the same species — they can all interbreed!' },
  { level:1, visual:'🌊', question:'What is the role of the ozone layer in protecting life on Earth?', options:['It absorbs harmful UV-B and UV-C radiation from the sun that would damage DNA and cause mutations/cancer','It traps heat to maintain Earth\'s temperature for life','It filters carbon dioxide from the atmosphere, preventing excess greenhouse warming'], answer:'It absorbs harmful UV-B and UV-C radiation from the sun that would damage DNA and cause mutations/cancer', fact:'🌊 The Antarctic ozone hole (caused by CFCs) let in more UV — increasing skin cancer rates. The Montreal Protocol (1987) banned CFCs and the hole is slowly recovering. Without the ozone layer, most life on land could not survive!' },
  { level:1, visual:'🧬', question:'What are the four bases in DNA?', options:['Adenine, Thymine, Cytosine, Guanine','Alanine, Threonine, Cysteine, Glycine','Adenosine, Thymidine, Cytidine, Guanosine'], answer:'Adenine, Thymine, Cytosine, Guanine', fact:'🧬 Remember AT-CG: A pairs with T (2 hydrogen bonds); C pairs with G (3 hydrogen bonds). These four bases encode ALL of life\'s genetic information! DNA uses Thymine; RNA uses Uracil instead of Thymine!' },
  { level:1, visual:'🌿', question:'Why do cells need to divide?', options:['For growth of the organism, repair of damaged tissue, and reproduction of unicellular organisms','Only for sexual reproduction in multicellular organisms','To replace DNA that wears out over time'], answer:'For growth of the organism, repair of damaged tissue, and reproduction of unicellular organisms', fact:'🌿 Mitosis allows growth from a single fertilised egg cell to trillions of cells. Skin cells divide every 2–3 weeks to replace worn-out surface cells. Bone marrow cells divide constantly to replace blood cells!' },
  { level:1, visual:'🦴', question:'What is the difference between tendons and ligaments?', options:['Tendons connect muscle to bone; ligaments connect bone to bone at joints','Tendons connect bone to bone; ligaments connect muscle to bone','Both connect bones to each other at different types of joints'], answer:'Tendons connect muscle to bone; ligaments connect bone to bone at joints', fact:'🦴 Tendons transmit the pulling force of muscles to bones — they are very strong but slightly elastic. Ligaments stabilise joints, preventing bones from moving too far in wrong directions. Spraining an ankle often tears ligaments!' },
  { level:1, visual:'🐛', question:'What is a decomposer, and give two examples?', options:['Organisms that break down dead organic matter, releasing nutrients back into the ecosystem — e.g. earthworms and bacteria','Organisms that eat dead animals only — e.g. vultures and hyenas','Organisms that convert plant material into animal proteins — e.g. herbivores'], answer:'Organisms that break down dead organic matter, releasing nutrients back into the ecosystem — e.g. earthworms and bacteria', fact:'🐛 Decomposers are nature\'s recyclers! Without them, all the carbon, nitrogen and phosphorus in dead organisms would be locked away permanently. Fungi and bacteria are the main biochemical decomposers; earthworms are physical decomposers!' },
  { level:1, visual:'🌡️', question:'What is vasoconstriction and when does it occur?', options:['Blood vessels near the skin surface narrow — reducing blood flow to the skin and conserving body heat when it is cold','Blood vessels near the skin surface widen — increasing blood flow to the skin to release heat when it is hot','Blood vessels in muscles widen during exercise to increase oxygen delivery'], answer:'Blood vessels near the skin surface narrow — reducing blood flow to the skin and conserving body heat when it is cold', fact:'🌡️ In the cold, vasoconstriction redirects blood away from the skin surface to vital organs. This is why hands turn white and numb in cold weather. Raynaud\'s disease causes extreme vasoconstriction even in mild cold!' },
  { level:1, visual:'💊', question:'What is the function of the immune system\'s memory cells?', options:['They remain in the body long after an infection and enable a faster, stronger response if the same pathogen is encountered again','They fight the current infection directly by producing antibodies','They signal the brain when the body is ill to trigger a fever response'], answer:'They remain in the body long after an infection and enable a faster, stronger response if the same pathogen is encountered again', fact:'💊 Memory cells can last decades — some are thought to be permanent. The secondary immune response (on second infection) is so fast that you often don\'t get symptoms. This is also why vaccines work — they create memory without illness!' },
  { level:1, visual:'🌱', question:'What is a hormone?', options:['A chemical messenger produced by a gland and transported in the blood to a target organ where it causes an effect','A type of nerve impulse that travels through neurons','An enzyme that controls chemical reactions in specific organs'], answer:'A chemical messenger produced by a gland and transported in the blood to a target organ where it causes an effect', fact:'🌱 Hormones travel in the blood — slower than nerve impulses but produce longer-lasting effects. Insulin, adrenaline, oestrogen and testosterone are all hormones. Endocrine glands (like the pancreas and ovaries) secrete them directly into blood!' },
  { level:1, visual:'🦋', question:'What is evolution?', options:['A change in the inherited characteristics of a population over successive generations','A change in an individual organism\'s body in response to its environment during its lifetime','The process of an organism growing from birth to adulthood'], answer:'A change in the inherited characteristics of a population over successive generations', fact:'🦋 Evolution acts on POPULATIONS over generations — not individual organisms. An individual cannot evolve. Populations evolve as natural selection favours individuals with beneficial traits that are then passed to offspring!' },
  { level:1, visual:'🔬', question:'What test is used to detect starch in a food sample?', options:['Iodine solution turns blue-black in the presence of starch','Benedict\'s solution turns brick-red in the presence of starch','Biuret reagent turns purple in the presence of starch'], answer:'Iodine solution turns blue-black in the presence of starch', fact:'🔬 Iodine is yellow-brown normally but turns deep blue-black with starch. This is because iodine molecules fit inside the coiled starch helix, changing how they absorb light. Used in lab practicals and starch-testing pH strips!' },
  { level:1, visual:'💧', question:'What is the role of water in living organisms?', options:['Solvent for chemical reactions, transport medium, reactant in photosynthesis and hydrolysis, temperature regulation','Only a structural component of cell membranes','Only needed for photosynthesis in plant cells'], answer:'Solvent for chemical reactions, transport medium, reactant in photosynthesis and hydrolysis, temperature regulation', fact:'💧 Water is the molecule of life! Its polarity makes it an excellent solvent for ions and polar molecules. Its high specific heat capacity resists temperature changes — vital for a stable internal environment. You are about 60% water!' },

  // ── MEDIUM ADDITIONAL (to reach ~167) ────────────────────────────────────────
  { level:2, visual:'🔬', question:'What is the structure of the nephron and how does it produce urine?', options:['Glomerulus filters blood (ultrafiltration); tubules selectively reabsorb useful molecules; remaining fluid is urine','The nephron filters air from the blood to produce urine in the renal pelvis','Blood flows through the nephron unchanged and urine is produced by special secretory cells'], answer:'Glomerulus filters blood (ultrafiltration); tubules selectively reabsorb useful molecules; remaining fluid is urine', fact:'🔬 The glomerulus forces small molecules (water, glucose, urea, salts) out of blood under high pressure. The proximal tubule reabsorbs all glucose and most water. The loop of Henle and collecting duct fine-tune water and salt balance!' },
  { level:2, visual:'🧬', question:'What is epigenetics and how can environment affect gene expression without changing DNA?', options:['DNA methylation silences genes; histone modification opens/closes chromatin — environmental factors (diet, stress, toxins) alter these marks without changing the DNA sequence','Mutations caused by environmental damage change specific genes permanently','Environmental effects on the proteome change which genes are transcribed in each cell'], answer:'DNA methylation silences genes; histone modification opens/closes chromatin — environmental factors (diet, stress, toxins) alter these marks without changing the DNA sequence', fact:'🧬 Bees provide a perfect example — all worker bees and the queen are genetically identical. The queen is created by feeding larvae royal jelly, which alters DNA methylation patterns and switches on queen-specific genes!' },
  { level:2, visual:'🌿', question:'What is the role of adrenaline in the body and what changes does it produce?', options:['Released by adrenal glands during stress/danger — increases heart rate, dilates airways, raises blood glucose (from glycogen), redirects blood to muscles','Produced by the pancreas — lowers blood glucose after a meal','Released by the thyroid — controls metabolic rate and growth'], answer:'Released by adrenal glands during stress/danger — increases heart rate, dilates airways, raises blood glucose (from glycogen), redirects blood to muscles', fact:'🌿 Adrenaline is the "fight or flight" hormone — it prepares the body for action in milliseconds. It causes visible signs: pale skin (vasoconstriction), dilated pupils, goosebumps, dry mouth, racing heart. Named after the adrenal glands above the kidneys!' },
  { level:2, visual:'🔬', question:'What is the difference between the somatic and autonomic nervous systems?', options:['Somatic controls voluntary skeletal muscle movement; autonomic controls involuntary internal organs (heart, lungs, gut, glands)','Somatic is part of the CNS; autonomic is a separate system from the PNS','Somatic controls emotions; autonomic controls sensory perception'], answer:'Somatic controls voluntary skeletal muscle movement; autonomic controls involuntary internal organs (heart, lungs, gut, glands)', fact:'🔬 The autonomic nervous system has two divisions: sympathetic (fight or flight) and parasympathetic (rest and digest) — they oppose each other. Heart rate, breathing, digestion and pupil size are all under autonomic control!' },
  { level:2, visual:'🧫', question:'What is the hepatic portal vein and what makes it unique?', options:['Carries nutrient-rich blood from the small intestine directly to the liver — unique because it connects two capillary beds (intestine and liver) rather than going to the heart first','The main artery supplying oxygenated blood to the liver','The vein that returns blood from the liver to the right atrium of the heart'], answer:'Carries nutrient-rich blood from the small intestine directly to the liver — unique because it connects two capillary beds (intestine and liver) rather than going to the heart first', fact:'🧫 After a meal, all absorbed nutrients pass through the liver first for processing — storing excess glucose as glycogen, deaminating excess amino acids, detoxifying drugs. The liver is the body\'s chemical factory!' },
  { level:2, visual:'🌊', question:'What is the difference between osmoregulation and thermoregulation?', options:['Osmoregulation maintains blood water/salt balance; thermoregulation maintains body temperature — both use negative feedback via the kidneys/hypothalamus respectively','Osmoregulation is controlled by the pancreas; thermoregulation by the adrenal glands','They are the same homeostatic system regulated by ADH in the hypothalamus'], answer:'Osmoregulation maintains blood water/salt balance; thermoregulation maintains body temperature — both use negative feedback via the kidneys/hypothalamus respectively', fact:'🌊 The kidneys are the effectors for osmoregulation (controlled by ADH); the skin and blood vessels are effectors for thermoregulation (controlled by the hypothalamus). Both demonstrate negative feedback homeostasis!' },
  { level:2, visual:'🧬', question:'What is a test cross and why is it used?', options:['Crossing an organism of unknown genotype with a homozygous recessive individual — offspring ratios reveal whether the unknown is homozygous or heterozygous dominant','Crossing two F1 individuals to produce F2 offspring showing Mendel\'s ratios','A cross between two heterozygous parents to produce 3:1 offspring ratios'], answer:'Crossing an organism of unknown genotype with a homozygous recessive individual — offspring ratios reveal whether the unknown is homozygous or heterozygous dominant', fact:'🧬 If ALL offspring show dominant phenotype, parent was homozygous dominant (TT). If HALF show recessive phenotype, parent was heterozygous (Tt). This is how breeders test whether show animals carry hidden recessive alleles!' },
  { level:2, visual:'🔬', question:'What is the difference between the light microscope and electron microscope in biology?', options:['Light microscope: uses light (max magnification ~1,500×, resolves 200 nm); electron microscope: uses electrons (max ~1,000,000×, resolves 0.1 nm) — reveals organelle ultrastructure','Electron microscope uses UV light; light microscope uses visible light','Light microscopes can only view dead stained specimens; electron microscopes can view living cells'], answer:'Light microscope: uses light (max magnification ~1,500×, resolves 200 nm); electron microscope: uses electrons (max ~1,000,000×, resolves 0.1 nm) — reveals organelle ultrastructure', fact:'🔬 The electron microscope revealed structures never seen before — endoplasmic reticulum, ribosomes, nuclear pores, mitochondrial cristae. It cannot be used on living cells because preparation requires fixing, staining and dehydrating!' },
  { level:2, visual:'🌿', question:'How does the immune system respond to a vaccine?', options:['Vaccination introduces weakened/killed pathogen or its antigens → phagocytes present antigens → T cells activate B cells → B cells produce antibodies → memory B and T cells persist','Vaccines inject antibodies directly into the bloodstream for immediate protection','Vaccines activate the innate immune system only — no memory cells are formed'], answer:'Vaccination introduces weakened/killed pathogen or its antigens → phagocytes present antigens → T cells activate B cells → B cells produce antibodies → memory B and T cells persist', fact:'🌿 The first vaccination was Edward Jenner\'s cowpox vaccine against smallpox in 1796 — 80 years before bacteria were proved to cause disease. Herd immunity (70–95% of population vaccinated) protects those who can\'t be vaccinated!' },
  { level:2, visual:'🧫', question:'What is the difference between innate immunity and adaptive immunity?', options:['Innate is immediate and non-specific (skin, phagocytes, inflammation); adaptive is slower but specific (T cells, B cells, antibodies, memory)','Innate involves antibodies; adaptive involves phagocytosis','Innate only fights bacteria; adaptive fights viruses'], answer:'Innate is immediate and non-specific (skin, phagocytes, inflammation); adaptive is slower but specific (T cells, B cells, antibodies, memory)', fact:'🧫 Innate immunity responds within minutes — but it can\'t distinguish one pathogen from another. Adaptive immunity takes 1–2 weeks initially but creates memory. Working together, they provide comprehensive protection!' },
