  { level:3, visual:{type:'emoji',emoji:'⚽',label:'Penalty Takers'}, question:'Which country scored the first ever penalty kick at a FIFA World Cup?', options:['Mexico (vs Argentina, 1930)','Brazil','Germany'], answer:'Mexico (vs Argentina, 1930)', fact:'⚽ Manuel Rosas of Mexico scored the first penalty in World Cup history on 19 July 1930 vs Argentina — though Argentina won the match 6-3. It was also the first World Cup penalty miss (Rosas had one saved too)!' },
  { level:3, visual:{type:'emoji',emoji:'🧠',label:'Advanced Tactics'}, question:'What is a "regista" in Italian football tactics?', options:['A deep-lying playmaker who orchestrates play from defensive midfield','A striker who plays as a false 9','A wing-back who tracks back to defend'], answer:'A deep-lying playmaker who orchestrates play from defensive midfield', fact:'🇮🇹 "Regista" (director) is an Italian term for the deep-lying playmaker — the player who controls tempo from a deep position. Pirlo at Juventus and Italy was the definitive modern regista; before him, it was Dino Zoff\'s era of Bettega and Causio!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'Bradford Fire'}, question:'The Bradford City fire disaster of 1985 killed 56 supporters — what caused the fire?', options:['An accidental fire in a wooden main stand, quickly spread by wind','A firework set off by fans','Electrical fault in the floodlights'], answer:'An accidental fire in a wooden main stand, quickly spread by wind', fact:'🔥 The Bradford fire on 11 May 1985 killed 56 people when the wooden Valley Parade main stand caught fire and burned rapidly in windy conditions. The stand had been scheduled for replacement. It led to major stadium safety reforms.' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2026 Format'}, question:'The 2026 World Cup will use a new format — what happens after the group stage with 48 teams?', options:['Top 2 in each group plus 8 best third-place teams advance to a round of 32 (knockout)','All 16 group winners advance to a knockout of 16','32 teams advance in a new second group stage'], answer:'Top 2 in each group plus 8 best third-place teams advance to a round of 32 (knockout)', fact:'📋 In 2026, 16 groups of 3 teams play — 32 of 48 teams advance (top 2 plus 8 best 3rd-placed teams). Then straight knockout until the final in New York. The format increases games but some teams play only 2 group matches!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'FA Cup Upsets'}, question:'Which non-league club caused the biggest FA Cup upset of modern times by beating a Championship club in 2023?', options:['Wrexham beat Sheffield United — wait, that\'s not right. Maidstone United beat Ipswich Town in 2024','Luton Town beat Arsenal in 1994','Hereford United beat Newcastle United in 1972'], answer:'Hereford United beat Newcastle United in 1972', fact:'⚽ Hereford United (non-league) beat Newcastle United (First Division) 2-1 in January 1972. Ronnie Radford\'s thunderbolt equaliser and Ricky George\'s winner are part of FA Cup folklore — shown every year on TV!' },
  { level:3, visual:{type:'emoji',emoji:'🌟',label:'Lev Yashin'}, question:'Lev Yashin is the only goalkeeper to win the Ballon d\'Or — which country did he play for?', options:['Soviet Union (USSR)','Russia','Czechoslovakia'], answer:'Soviet Union (USSR)', fact:'🧤 Lev Yashin won the Ballon d\'Or in 1963 — the only goalkeeper ever to do so. He played for Dynamo Moscow and the Soviet Union, famous for wearing all black. He saved over 150 penalties in his career!' },
  { level:3, visual:{type:'emoji',emoji:'🔴',label:'Man United Decade'}, question:'Sir Alex Ferguson won 8 Premier League titles in 10 seasons from 1993 to 2003 — which season did Manchester United NOT win the league in this run?', options:['1994-95 (Blackburn Rovers won) and 1995-96... wait, they won in 96. The miss was 1994-95 and 1997-98 and 2001-02','1999-2000 and 2001-02 when Arsenal won','1994-95 when Blackburn won and 2001-02 when Arsenal won'], answer:'1994-95 when Blackburn won and 2001-02 when Arsenal won', fact:'🔴 United won 8 of 10 leagues from 1993-2003. They missed out in 1994-95 (Blackburn Rovers won by goal difference on final day) and 2001-02 (Arsenal\'s unbeaten run season — though the full Invincibles campaign was 2003-04)!' },
  { level:3, visual:{type:'emoji',emoji:'⭐',label:'Youngest Pro Players'}, question:'Who is the youngest player to appear in the Premier League, at just 16 years 3 days old (for Fulham in 2007)?', options:['Matthew Briggs','Cesc Fàbregas','Jack Wilshere'], answer:'Matthew Briggs', fact:'👦 Matthew Briggs was 16 years 3 days old when he played for Fulham vs Middlesbrough in 2007 — making him the youngest Premier League player ever. Briggs went on to have a career in the Championship and lower leagues.' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'World Cup Own Goals'}, question:'Which World Cup tournament had the most own goals scored — a remarkable total of 12?', options:['2018 Russia','2014 Brazil','2022 Qatar'], answer:'2018 Russia', fact:'😬 The 2018 World Cup in Russia had 12 own goals — a record for any World Cup. High-pressing tactics contributed to more errors under pressure. France alone benefited from 2 own goals in the competition!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Scottish League Record'}, question:'Celtic\'s consecutive Scottish Premiership title record is 9 in a row (2012-2020) — who equalled this feat previously?', options:['Celtic themselves (1966-1974)','Rangers','Aberdeen'], answer:'Celtic themselves (1966-1974)', fact:'🍀 Celtic won 9 consecutive Scottish titles from 1966 to 1974 under Jock Stein — and then matched this from 2012 to 2020. No other Scottish club has won 9 in a row! The 10th consecutive was denied by Rangers in 2020-21!' },
  { level:3, visual:{type:'emoji',emoji:'📋',label:'Substitution History'}, question:'The emergency "concussion substitute" was approved by IFAB in which year?', options:['2021','2019','2023'], answer:'2021', fact:'⚽ IFAB approved permanent concussion substitutes as an additional substitution in 2021, allowing teams an extra substitute specifically if a player suffers a head injury or concussion. Player welfare drove this important rule change!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'CONMEBOL World Cup Allocation'}, question:'How many automatic World Cup spots does CONMEBOL (South America) have for the 2026 World Cup?', options:['6 + 1 playoff spot','4','5'], answer:'6 + 1 playoff spot', fact:'🌎 CONMEBOL received 6 automatic World Cup 2026 spots plus access to 1 intercontinental playoff — an increase from the previous 4.5 spots for 32-team tournaments. The expansion to 48 teams benefited every confederation!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'European Cup 1960 Final'}, question:'Real Madrid\'s 7-3 win over Eintracht Frankfurt in the 1960 European Cup final is considered the greatest display in football history — where was it played?', options:['Hampden Park, Glasgow (127,000 fans)','Wembley, London','Parc des Princes, Paris'], answer:'Hampden Park, Glasgow (127,000 fans)', fact:'🏆 The 1960 European Cup final at Hampden Park attracted 127,621 fans — a European record. Alfredo Di Stéfano scored 3 and Ferenc Puskás scored 4 as Real Madrid completed their 5th consecutive European Cup. A breathtaking spectacle!' },
  { level:3, visual:{type:'emoji',emoji:'🎯',label:'Sweeper Keeper'}, question:'What is a "sweeper-keeper" in modern football?', options:['A goalkeeper who actively comes off their line to clear balls behind the defensive line and plays with feet','A goalkeeper who never leaves the penalty area','A defender who drops back to play as an extra goalkeeper'], answer:'A goalkeeper who actively comes off their line to clear balls behind the defensive line and plays with feet', fact:'🧤 Sweeper-keepers like Manuel Neuer, Ederson and Alisson are comfortable with the ball at their feet and rush off the line to deal with through-balls. Neuer essentially popularised the modern sweeper-keeper role at Bayern Munich!' },
];
const QUIZ_KEY = 'kids_q_soccer';

// ── State ─────────────────────────────────────────────────────────────────────
let current    = 0;
let score      = 0;
let dotResults = [];
let sessionQ   = [];

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function note(ctx, type, freq, time, dur, vol) {
  const osc = ctx.createOscillator(), gn = ctx.createGain();
  osc.connect(gn); gn.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gn.gain.setValueAtTime(0.001, time);
  gn.gain.linearRampToValueAtTime(vol, time + 0.015);
  gn.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time); osc.stop(time + dur + 0.06);
}
function playCorrect() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [1047,1319,1568,2093,1568,1319].forEach((f,i) => note(ctx,'triangle',f,t+i*0.07,0.14,0.5));
    [[523,0.52,0.14],[659,0.66,0.14],[784,0.80,0.14],[1047,0.94,0.5]].forEach(([f,d,dur]) => {
      note(ctx,'triangle',f,t+d,dur,0.55);
      note(ctx,'sine',f*2,t+d,dur*0.5,0.14);
    });
  });
}
function playWrong() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[400,260,0.00],[340,220,0.28],[280,160,0.56]].forEach(([f1,f2,delay]) => {
      const osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination); osc.type='sawtooth';
      osc.frequency.setValueAtTime(f1,t+delay);
      osc.frequency.exponentialRampToValueAtTime(f2,t+delay+0.22);
      gn.gain.setValueAtTime(0.001,t+delay);
      gn.gain.linearRampToValueAtTime(0.3,t+delay+0.02);
      gn.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);
      osc.start(t+delay); osc.stop(t+delay+0.3);
    });
    const osc=ctx.createOscillator(), gn=ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination); osc.type='sine';
    osc.frequency.setValueAtTime(380,t+0.92);
    osc.frequency.exponentialRampToValueAtTime(55,t+1.4);
    gn.gain.setValueAtTime(0.001,t+0.92);
    gn.gain.linearRampToValueAtTime(0.55,t+0.93);
    gn.gain.exponentialRampToValueAtTime(0.001,t+1.45);
    osc.start(t+0.92); osc.stop(t+1.5);
  });
}
function playLevelUp() {
  const ctx = getCtx();
  ctx.resume().then(() => {
    const t = ctx.currentTime;
    [[262,0],[330,0.12],[392,0.24],[523,0.36],[659,0.52],[784,0.68],[1047,0.84]]
      .forEach(([f,d]) => note(ctx,'triangle',f,t+d,0.25,0.45));
    note(ctx,'sine',1047,t+0.84,0.8,0.3);
    note(ctx,'sine',1319,t+0.90,0.7,0.25);
    note(ctx,'sine',1568,t+0.96,0.6,0.2);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  current    = 0;
  score      = 0;
  dotResults = Array(15).fill(null);
  // Restore screen structure in case it was replaced by end screen
  const screen = document.getElementById('gameScreen');
  if (!document.getElementById('visualCard')) {
    screen.innerHTML = `
      <div class="top">
        <div class="title">⚽ Soccer Quiz!</div>
        <div class="top-row">
          <div class="level-badge easy" id="levelBadge">⭐ Easy</div>
          <div class="score-pill">⚽ <strong id="score">0</strong> / 15</div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="middle" id="middle">
        <div class="visual-card" id="visualCard"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="bottom">
        <div class="choices" id="choices"></div>
        <div class="progress-dots" id="progressDots"></div>
      </div>`;
  }
  sessionQ = pickSession();
  buildDots();
  showQuestion();
}

function getMastered(){try{return new Set(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));}catch{return new Set();}}
function markMastered(idx){try{const m=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');if(!m.includes(idx)){m.push(idx);localStorage.setItem(QUIZ_KEY,JSON.stringify(m));}}catch{}}
function pickSession(){const mastered=getMastered();const byLevel=[[],[],[]];ALL_QUESTIONS.forEach((q,i)=>byLevel[q.level-1].push(i));const session=[];byLevel.forEach(pool=>{const notDone=shuffle(pool.filter(i=>!mastered.has(i)));const done=shuffle(pool.filter(i=>mastered.has(i)));session.push(...[...notDone,...done].slice(0,5));});return session.map(i=>({...ALL_QUESTIONS[i],_idx:i}));}

// ── Dots ──────────────────────────────────────────────────────────────────────
function buildDots() {
  const c = document.getElementById('progressDots');
  c.innerHTML = '';
  sessionQ.forEach((q, i) => {
    const cls = q.level === 1 ? 'easy-dot' : q.level === 2 ? 'medium-dot' : 'hard-dot';
    const d = document.createElement('div');
    d.className = `dot ${cls}` + (i === 0 ? ' current' : '');
    d.id = `dot-${i}`;
    c.appendChild(d);
  });
}
function updateDot(idx, result) {
  const d = document.getElementById(`dot-${idx}`);
  if (!d) return;
  d.classList.remove('current');
  d.classList.add('answered', result === 'correct' ? 'correct-dot' : 'wrong-dot');
  const next = document.getElementById(`dot-${idx+1}`);
  if (next) next.classList.add('current');
}

// ── Show Question ─────────────────────────────────────────────────────────────
function showQuestion() {
  const q = sessionQ[current];
  const badge = document.getElementById('levelBadge');
  if (q.level === 1) { badge.className='level-badge easy';   badge.textContent='⭐ Easy'; }
  if (q.level === 2) { badge.className='level-badge medium'; badge.textContent='⭐⭐ Medium'; }
  if (q.level === 3) { badge.className='level-badge hard';   badge.textContent='⭐⭐⭐ Hard'; }

  document.getElementById('progressFill').style.width = (current / 15 * 100) + '%';
  document.getElementById('score').textContent = score;

  // Visual card
  const vc = document.getElementById('visualCard');
  const v = q.visual;
  if (v.type === 'flag') {
    vc.innerHTML = `
      <img src="https://flagcdn.com/w160/${v.code}.png"
           style="width:clamp(100px,28vw,160px);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.5);"
           alt="flag">`;
  } else if (v.type === 'jersey') {
    vc.innerHTML = `
      <div class="jersey-wrap">
        <span class="visual-emoji">${v.emoji}</span>
        <span class="jersey-number">${v.number}</span>
      </div>
      <div class="visual-label">${v.label}</div>`;
  } else {
    vc.innerHTML = `<span class="visual-emoji">${v.emoji}</span>`;
  }

  document.getElementById('questionText').textContent = q.question;

  // Shuffle and render choices
  const shuffled = shuffle([...q.options]);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  ['A','B','C'].forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.value = shuffled[i];
    btn.innerHTML = `<span class="choice-letter">${letter}</span>${shuffled[i]}`;
    btn.onclick = () => handleAnswer(shuffled[i], q.answer, btn, q.fact, q._idx);
    choicesEl.appendChild(btn);
  });

  document.getElementById('gameScreen').classList.remove('shake');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Handle Answer ─────────────────────────────────────────────────────────────
function handleAnswer(chosen, correct, btn, fact, qIdx) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const isCorrect = chosen === correct;

  if (isCorrect) {
    score++; markMastered(qIdx);
    btn.classList.add('correct');
    dotResults[current] = 'correct';
    updateDot(current, 'correct');
    document.getElementById('score').textContent = score;
    playCorrect();
    spawnConfetti(35);
  } else {
    btn.classList.add('wrong');
    dotResults[current] = 'wrong';
    updateDot(current, 'wrong');
    // Highlight the correct answer
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.value === correct) b.classList.add('correct');
    });
    document.getElementById('gameScreen').classList.add('shake');
    playWrong();
  }
  setTimeout(()=>showFeedback(isCorrect,fact,chosen,correct),300);
}

// ── Feedback ──────────────────────────────────────────────────────────────────
let feedbackTimer = null, feedbackRafId = null;

function dismissFeedback() {
  cancelAnimationFrame(feedbackRafId); clearTimeout(feedbackTimer);
  const overlay = document.getElementById('feedbackOverlay');
  const b = document.getElementById('feedbackBox'); b.style.animation = 'slideUp 0.35s ease forwards';
  overlay.classList.add('dismiss'); overlay.classList.remove('clickable');
  setTimeout(() => { overlay.classList.remove('show', 'dismiss'); b.style.animation = ''; advanceQuestion(); }, 370);
}

function showFeedback(isCorrect, fact, chosen, correct) {
  clearTimeout(feedbackTimer); cancelAnimationFrame(feedbackRafId);
  const overlay = document.getElementById('feedbackOverlay');
  const box     = document.getElementById('feedbackBox');
  const arc     = document.getElementById('timerArc');
  const ring    = document.getElementById('timerRing');
  const tapHint = document.getElementById('tapHint');
  const wrongDetail=document.getElementById('wrongDetail');
  const CIRC    = 100.5;

  if (isCorrect) {
    const msgs = [['⚽🎉','GOAL!!!'],['🏆✨','BRILLIANT!'],['🌟⚡','SUPERSTAR!'],['👑🎊','WORLD CLASS!'],['🔥💫','ON FIRE!']];
    const [em, title] = msgs[Math.floor(Math.random() * msgs.length)];
    document.getElementById('feedbackEmoji').textContent = em;
    document.getElementById('feedbackTitle').textContent = title;
    document.getElementById('feedbackTitle').className = 'feedback-title correct-text';
    box.className = 'feedback-box correct-box';
    ring.className = 'timer-ring correct-ring';
    ring.style.display = ''; tapHint.style.display = 'none'; wrongDetail.style.display='none';
  } else {
    const msgs = [['😬❌','Not quite...'],['🤔💭','Wrong one!'],['😅🔄','Close, but no!']];
    const [em, title] = msgs[Math.floor(Math.random() * msgs.length)];
    document.getElementById('feedbackEmoji').textContent = em;
    document.getElementById('feedbackTitle').textContent = title;
    document.getElementById('feedbackTitle').className = 'feedback-title wrong-text';
    box.className = 'feedback-box wrong-box';
    ring.className = 'timer-ring wrong-ring';
    ring.style.display = 'none'; tapHint.style.display = '';
    document.getElementById('wdQuestion').textContent=document.getElementById('questionText').textContent;
    document.getElementById('wdChosen').textContent=chosen;
    document.getElementById('wdCorrect').textContent=correct;
    wrongDetail.style.display='';
  }
  document.getElementById('feedbackFact').textContent = fact;
  arc.style.strokeDashoffset = '0';
  overlay.classList.remove('dismiss');
  overlay.classList.add('show');

  if (isCorrect) {
    const duration = 1200;
    const startTime = performance.now();
    function tickRing(now) {
      const frac = Math.min((now - startTime) / duration, 1);
      arc.style.strokeDashoffset = (CIRC * frac).toFixed(2);
      if (frac < 1) feedbackRafId = requestAnimationFrame(tickRing);
    }
    feedbackRafId = requestAnimationFrame(tickRing);
    feedbackTimer = setTimeout(dismissFeedback, duration);
  } else {
    overlay.classList.add('clickable');
    overlay.addEventListener('click', dismissFeedback, { once: true });
  }
}

function advanceQuestion() {
  const prev = current;
  current++;
  if (prev === 4)  { showLevelUp('medium'); return; }
  if (prev === 9)  { showLevelUp('hard');   return; }
  if (current >= 15) { showEndScreen(); return; }
  showQuestion();
}

// ── Level Up ──────────────────────────────────────────────────────────────────
function showLevelUp(level) {
  const overlay = document.getElementById('levelupOverlay');
  if (level === 'medium') {
    document.getElementById('levelupIcon').textContent  = '⭐⭐';
    document.getElementById('levelupTitle').textContent = 'LEVEL UP!';
    document.getElementById('levelupSub').textContent   = '🔥 Medium Challenge — getting trickier!';
  } else {
    document.getElementById('levelupIcon').textContent  = '⭐⭐⭐';
    document.getElementById('levelupTitle').textContent = 'EXPERT MODE!';
    document.getElementById('levelupSub').textContent   = '🧠 Hard questions — only legends know these!';
  }
  overlay.classList.add('show');
  playLevelUp();
  spawnConfetti(60);
}
function dismissLevelUp() {
  document.getElementById('levelupOverlay').classList.remove('show');
  showQuestion();
}

// ── End Screen ────────────────────────────────────────────────────────────────
function showEndScreen() {
  const screen = document.getElementById('gameScreen');
  let rank, icon, msg, color;
  if      (score >= 13) { rank='LEGEND';   icon='🏆👑⭐'; msg='You\'re a true soccer legend!';           color='#f4d03f'; }
  else if (score >= 10) { rank='PRO';      icon='🌟⚽🎯'; msg='Professional level knowledge!';            color='#2ecc71'; }
  else if (score >= 7)  { rank='AMATEUR';  icon='👍⚽😊'; msg='Good effort! Keep watching soccer!';      color='#e67e22'; }
  else                  { rank='BEGINNER'; icon='💪⚽📚'; msg='Time to study up on the beautiful game!'; color='#e74c3c'; }

  const easyScore   = dotResults.slice(0,5).filter(r=>r==='correct').length;
  const mediumScore = dotResults.slice(5,10).filter(r=>r==='correct').length;
  const hardScore   = dotResults.slice(10,15).filter(r=>r==='correct').length;

  screen.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="font-size:clamp(2.8rem,11vw,5.5rem);animation:spinBounce 0.8s ease;">${icon}</div>
      <div style="font-size:clamp(1.8rem,7vw,3rem);color:${color};text-shadow:0 0 20px ${color}55;">${rank}</div>
      <div style="font-size:clamp(0.95rem,3.5vw,1.35rem);color:rgba(255,255,255,0.82);max-width:340px;">${msg}</div>
      <div style="font-size:clamp(1.4rem,5.5vw,2rem);color:#f4d03f;">⚽ ${score} / 15</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(46,204,113,0.18);border:2px solid #2ecc71;border-radius:12px;padding:8px 12px;">
          <div style="color:#2ecc71;font-size:0.85rem;">⭐ Easy</div>
          <div style="color:#fff;font-size:1.4rem;">${easyScore}/5</div>
        </div>
        <div style="background:rgba(230,126,34,0.18);border:2px solid #e67e22;border-radius:12px;padding:8px 12px;">
          <div style="color:#e67e22;font-size:0.85rem;">⭐⭐ Medium</div>
          <div style="color:#fff;font-size:1.4rem;">${mediumScore}/5</div>
        </div>
        <div style="background:rgba(231,76,60,0.18);border:2px solid #e74c3c;border-radius:12px;padding:8px 12px;">
          <div style="color:#e74c3c;font-size:0.85rem;">⭐⭐⭐ Hard</div>
          <div style="color:#fff;font-size:1.4rem;">${hardScore}/5</div>
        </div>
      </div>
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;">
        ${dotResults.map((r,i)=>`<span style="font-size:1.3rem;">${r==='correct'?(i<5?'⭐':i<10?'🌟':'💎'):'❌'}</span>`).join('')}
      </div>
      <button class="action-btn" onclick="init()">🔄 Play Again!</button>
    </div>`;
  spawnConfetti(score >= 10 ? 90 : 40);
}

// ── Confetti ──────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#f4d03f','#2ecc71','#e74c3c','#fff','#3498db','#9b59b6','#e67e22','#1abc9c'];
function spawnConfetti(count = 35) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left       = Math.random() * 100 + 'vw';
      el.style.top        = '-20px';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      el.style.width      = (6 + Math.random() * 10) + 'px';
      el.style.height     = (6 + Math.random() * 10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      const dur = 1.5 + Math.random() * 2;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay    = Math.random() * 0.4 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (dur + 0.6) * 1000);
    }, i * 20);
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
