  { level:1, visual:{type:'flag',code:'nl',label:'Ajax'}, question:'Which Dutch club has a famous youth academy that produced many top players?', options:['Ajax','PSV Eindhoven','Feyenoord'], answer:'Ajax', fact:'🟥⬜ Ajax\'s De Toekomst academy is one of the best in world football. They produced Johan Cruyff, Marco van Basten, and more recently Matthijs de Ligt and Frenkie de Jong!' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Messi'}, question:'How many Ballon d\'Or (world player of the year) awards has Lionel Messi won?', options:['8','6','5'], answer:'8', fact:'🐐 Messi won the Ballon d\'Or in 2009, 2010, 2011, 2012, 2019, 2021, 2023 and a record 8th time. No other player in history has won more!' },
  { level:1, visual:{type:'flag',code:'gb',label:'Premier League'}, question:'Which English club is based in Liverpool and wears red shirts?', options:['Liverpool','Manchester United','Arsenal'], answer:'Liverpool', fact:'🔴 Liverpool FC was founded in 1892 and plays at Anfield. They have won the league 20 times and the Champions League 6 times — one of England\'s most successful clubs!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Kick Off'}, question:'Who takes the kick-off at the start of a football match?', options:['The team that won the coin toss chooses ends, the other team kicks off','The home team always kicks off','The team that won their last match kicks off'], answer:'The team that won the coin toss chooses ends, the other team kicks off', fact:'🪙 Before the match, a coin is tossed. The winning captain chooses which end to attack — the other team kicks off. At half-time, the teams swap ends and the other team kicks off!' },
  { level:1, visual:{type:'flag',code:'ar',label:'Argentina'}, question:'Which Argentine club is known as "Boca" and is one of the most famous clubs in South America?', options:['Boca Juniors','River Plate','Independiente'], answer:'Boca Juniors', fact:'🇦🇷 Boca Juniors play in the famous La Bombonera stadium in Buenos Aires. They have produced legends like Diego Maradona and are known for their fierce rivalry with River Plate!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'Africa Cup'}, question:'What is the Africa Cup of Nations (AFCON)?', options:['The biggest international football tournament for African nations','The top club tournament in Africa','A youth football tournament in Africa'], answer:'The biggest international football tournament for African nations', fact:'🌍 AFCON has been held since 1957 and is contested every 2 years. Egypt have won it the most times (7). Cameroon, Nigeria and Senegal are also past champions!' },
  { level:1, visual:{type:'flag',code:'pt',label:'Portugal'}, question:'Which Portuguese club has won the most domestic league titles?', options:['Benfica','Sporting CP','Porto'], answer:'Benfica', fact:'🦅 Benfica are Portugal\'s most successful club with over 37 league titles. They\'ve also reached the European Cup/Champions League final multiple times — including consecutive finals in 1961 and 1962!' },
  { level:1, visual:{type:'emoji',emoji:'🔵',label:'Manchester City'}, question:'Which English club plays at the Etihad Stadium in Manchester?', options:['Manchester City','Manchester United','Everton'], answer:'Manchester City', fact:'🔵 Manchester City play at the Etihad Stadium, which holds around 53,400 fans. Under Pep Guardiola, they became one of England\'s most dominant clubs!' },
  { level:1, visual:{type:'emoji',emoji:'🏆',label:'Treble'}, question:'What is a "treble" in club football?', options:['Winning the league, domestic cup and European cup in the same season','Scoring three goals in one match','Winning three consecutive league titles'], answer:'Winning the league, domestic cup and European cup in the same season', fact:'🏆 A treble is extremely rare and hard to achieve. Manchester United (1999), Barcelona (2009, 2015) and Manchester City (2023) are among the very few clubs to win the treble!' },
  { level:1, visual:{type:'flag',code:'gb',label:'Arsenal'}, question:'Arsenal FC is based in which city?', options:['London','Manchester','Birmingham'], answer:'London', fact:'🔴 Arsenal play at the Emirates Stadium in north London, which holds 60,704 fans. They moved there in 2006 from their historic Highbury ground, which they\'d called home since 1913!' },
  { level:1, visual:{type:'emoji',emoji:'🌐',label:'FIFA'}, question:'What does FIFA stand for?', options:['Fédération Internationale de Football Association','Football International Federation of Associations','Federation of International Football Associations'], answer:'Fédération Internationale de Football Association', fact:'🌐 FIFA is football\'s world governing body with 211 member associations — more than the United Nations! Its headquarters are in Zurich, Switzerland.' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Ronaldo'}, question:'Cristiano Ronaldo is known for his incredible free kicks and is often described as having which physical quality?', options:['Exceptional athleticism and jumping ability','Supernatural speed but poor heading','Only left-foot skills'], answer:'Exceptional athleticism and jumping ability', fact:'💪 Ronaldo is famous for his incredible physique, speed, and heading ability. His standing jump has been measured at 78cm — higher than the average NBA basketball player!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'World Cup Trophy'}, question:'What is the name of the original World Cup trophy that was retired in 1970?', options:['Jules Rimet Trophy','FIFA World Cup Trophy','Henri Delaunay Trophy'], answer:'Jules Rimet Trophy', fact:'🏅 The Jules Rimet Trophy (named after FIFA\'s first president) was awarded from 1930 to 1970. Brazil won it outright in 1970 after their third World Cup victory. It was later stolen and never recovered!' },
  { level:1, visual:{type:'flag',code:'fr',label:'PSG'}, question:'Which French club plays their home matches at the Parc des Princes stadium in Paris?', options:['Paris Saint-Germain (PSG)','Marseille','Lyon'], answer:'Paris Saint-Germain (PSG)', fact:'🗼 PSG (Paris Saint-Germain) was founded in 1970 and has become one of Europe\'s richest clubs since being bought by Qatar Sports Investments in 2011. They signed Messi, Neymar and Mbappé!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Dribbling'}, question:'What does it mean to "dribble" with the ball in football?', options:['To run with the ball while keeping it under close control','To kick the ball into the goal','To pass the ball to a teammate'], answer:'To run with the ball while keeping it under close control', fact:'⚽ Dribbling is a key skill in football — players like Messi and Ronaldinho were masters at it. The record for the longest dribble in a professional match was achieved by Dani Alves!' },
  { level:1, visual:{type:'flag',code:'de',label:'Borussia Dortmund'}, question:'What colour shirts does Borussia Dortmund wear?', options:['Yellow and black','Red and black','Blue and yellow'], answer:'Yellow and black', fact:'🟡⚫ Borussia Dortmund\'s iconic yellow and black kit earned them the nickname "Die Schwarzgelben" (The Black and Yellows). Their Signal Iduna Park is famous for the "Yellow Wall" — Europe\'s largest standing terrace!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Tactics'}, question:'In football, what is a "striker"?', options:['An attacking player whose main job is to score goals','A defensive player who stops opponents','A midfielder who controls the tempo'], answer:'An attacking player whose main job is to score goals', fact:'⚽ Strikers (also called centre-forwards) are the primary goal scorers. Famous strikers include Ronaldo (Brazil), Zlatan Ibrahimović, Harry Kane and Robert Lewandowski!' },
  { level:1, visual:{type:'flag',code:'es',label:'Barcelona'}, question:'FC Barcelona is based in which city?', options:['Barcelona','Madrid','Seville'], answer:'Barcelona', fact:'🔵🔴 FC Barcelona is based in Barcelona, the capital of Catalonia in northeast Spain. The club was founded in 1899 by a group of Swiss, English and Spanish footballers!' },
  { level:1, visual:{type:'emoji',emoji:'🇪🇺',label:'UEFA'}, question:'What does UEFA stand for?', options:['Union of European Football Associations','United European Football Alliance','Universal European Football Authority'], answer:'Union of European Football Associations', fact:'🇪🇺 UEFA is European football\'s governing body, overseeing competitions like the Champions League, Europa League and European Championship. It was founded in 1954 in Basel, Switzerland!' },
  { level:1, visual:{type:'flag',code:'gb',label:'Tottenham'}, question:'Which London club plays at the Tottenham Hotspur Stadium?', options:['Tottenham Hotspur','West Ham United','Crystal Palace'], answer:'Tottenham Hotspur', fact:'⚪ Tottenham Hotspur (Spurs) opened their state-of-the-art 62,850-seat stadium in 2019. The ground also hosts NFL matches and is one of the most modern stadiums in the world!' },
  { level:1, visual:{type:'flag',code:'it',label:'Juventus'}, question:'Juventus FC is based in which Italian city?', options:['Turin','Milan','Rome'], answer:'Turin', fact:'⚫⚪ Juventus (nicknamed "The Old Lady") is based in Turin and has won the Serie A title more than any other club. They also have a bitter rivalry with AC Milan and Inter Milan!' },
  { level:1, visual:{type:'flag',code:'it',label:'AC Milan'}, question:'What colour are AC Milan\'s home shirts?', options:['Red and black stripes','Blue and black stripes','Black and white stripes'], answer:'Red and black stripes', fact:'🔴⚫ AC Milan wear famous red and black vertical stripes. Founded in 1899, they are one of Italy\'s most successful clubs with 7 Champions League titles!' },
  { level:1, visual:{type:'flag',code:'it',label:'Inter Milan'}, question:'What colour are Inter Milan\'s home shirts?', options:['Blue and black stripes','Red and black stripes','Blue and white stripes'], answer:'Blue and black stripes', fact:'🔵⚫ Inter Milan (officially FC Internazionale Milano) wear blue and black stripes. Founded in 1908, they won the Champions League in 2010 under José Mourinho as part of a historic treble!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1994'}, question:'Which country hosted the 1994 FIFA World Cup?', options:['USA','Brazil','France'], answer:'USA', fact:'🇺🇸 The USA hosted the 1994 World Cup — at the time, the most attended World Cup ever with an average of 68,991 fans per match. Brazil won the tournament, beating Italy on penalties!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2010'}, question:'Which continent hosted the FIFA World Cup for the first time in 2010?', options:['Africa','Asia','North America'], answer:'Africa', fact:'🌍 South Africa became the first African nation to host the World Cup in 2010. The tournament was famous for the vuvuzelas blown by fans — a sound heard around the world!' },
  { level:1, visual:{type:'emoji',emoji:'📏',label:'Penalty Area'}, question:'What is the large rectangular box in front of each goal called?', options:['The penalty area (or box)','The goal area','The six-yard box'], answer:'The penalty area (or box)', fact:'📏 The penalty area extends 16.5 metres from each goalpost and 16.5 metres in front of the goal. Fouls inside this box by the defending team result in a penalty kick!' },
  { level:1, visual:{type:'emoji',emoji:'🟡',label:'Offside Flag'}, question:'Who signals for offside during a football match?', options:['The assistant referee (linesman)','The main referee','The fourth official'], answer:'The assistant referee (linesman)', fact:'🚩 Assistant referees (linesmen) run along the touchlines and raise their flags to signal offside, throw-ins and other decisions. The main referee makes the final call!' },
  { level:1, visual:{type:'flag',code:'es',label:'Atletico Madrid'}, question:'Which Madrid club is known for their defensive style and has won La Liga multiple times in recent years?', options:['Atletico Madrid','Real Madrid','Getafe'], answer:'Atletico Madrid', fact:'🔴⚪ Atletico Madrid won La Liga in 2014 and 2021 under Diego Simeone. Known for their intense, well-organised defending, they play at the Metropolitano Stadium!' },
  { level:1, visual:{type:'emoji',emoji:'🎪',label:'Skill Move'}, question:'What is an "elastico" (also called the "flip flap") in football?', options:['A trick where the player flicks the ball one way then quickly the other to beat a defender','A type of bicycle kick','A way of controlling a high ball'], answer:'A trick where the player flicks the ball one way then quickly the other to beat a defender', fact:'🎪 The elastico was perfected by Ronaldinho and Rivaldo from Brazil. It involves pushing the ball outward with the outside of the boot, then rapidly flicking it back the other way to fool defenders!' },
  { level:1, visual:{type:'flag',code:'de',label:'Germany'}, question:'Which German club plays in yellow and black shirts and is Bayern Munich\'s biggest rival?', options:['Borussia Dortmund','Bayer Leverkusen','Schalke 04'], answer:'Borussia Dortmund', fact:'🟡⚫ The rivalry between Bayern Munich and Borussia Dortmund is called "Der Klassiker" — Germany\'s most watched club match. Dortmund also produced some of the world\'s best young players!' },
  { level:1, visual:{type:'emoji',emoji:'🏆',label:'FA Cup'}, question:'What is the FA Cup?', options:['England\'s oldest knock-out cup competition, open to all English clubs','The English Premier League trophy','A European club tournament'], answer:'England\'s oldest knock-out cup competition, open to all English clubs', fact:'🏆 The FA Cup was first held in 1871-72 and is the oldest national football competition in the world. Even lower-league clubs get to face Premier League giants — famous upsets happen regularly!' },
  { level:1, visual:{type:'flag',code:'fr',label:'France'}, question:'Which French club is based in Marseille and is known for their passionate fans?', options:['Olympique de Marseille','Lyon','Saint-Étienne'], answer:'Olympique de Marseille', fact:'🇫🇷 Marseille (OM) are the only French club to have won the Champions League (1993). Their rivalry with PSG is one of France\'s most intense derbies!' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Pelé'}, question:'In which year did Pelé score over 1,000 career goals?', options:['1969','1975','1960'], answer:'1969', fact:'👑 Pelé scored his 1,000th career goal on 19 November 1969 with a penalty for Santos against Vasco da Gama at the Maracanã. A historic milestone celebrated across Brazil!' },
  { level:1, visual:{type:'emoji',emoji:'🔵🔴',label:'Barcelona'}, question:'Barcelona\'s squad colours are blue and red — what is the Catalan name for these colours?', options:['Blaugrana','Azulrojo','Blauroig'], answer:'Blaugrana', fact:'🔵🔴 "Blaugrana" is Catalan for blue and garnet (dark red). Barcelona\'s motto "Més que un club" (More than a club) reflects how the team represents Catalan culture and identity!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2002'}, question:'The 2002 FIFA World Cup was uniquely co-hosted by which two countries?', options:['South Korea and Japan','China and Japan','South Korea and China'], answer:'South Korea and Japan', fact:'🌏 The 2002 World Cup was the first ever to be co-hosted by two countries and the first held in Asia. Brazil won, and South Korea made an incredible run to the semi-finals!' },
  { level:1, visual:{type:'emoji',emoji:'📺',label:'Goal Technology'}, question:'What is goal-line technology in football?', options:['A system that tells referees when the ball has fully crossed the goal line','A camera system to catch offside decisions','A system to track player positions'], answer:'A system that tells referees when the ball has fully crossed the goal line', fact:'📡 Goal-line technology (introduced 2012) uses cameras or magnetic sensors to instantly tell the referee whether the ball crossed the line — ending controversial "ghost goal" debates!' },
  { level:1, visual:{type:'flag',code:'gb',label:'Manchester City'}, question:'Who is Manchester City\'s famous manager known for his "tiki-taka" and possession style of play?', options:['Pep Guardiola','Jürgen Klopp','José Mourinho'], answer:'Pep Guardiola', fact:'🧠 Pep Guardiola joined Manchester City in 2016 and became the most successful manager in the club\'s history. He also won multiple titles with Barcelona and Bayern Munich!' },
  { level:1, visual:{type:'emoji',emoji:'🤼',label:'Tackle'}, question:'What is a "sliding tackle" in football?', options:['When a player slides along the ground to win the ball from an opponent','When a player jumps to head the ball','When a goalkeeper dives to save a shot'], answer:'When a player slides along the ground to win the ball from an opponent', fact:'⚽ Sliding tackles are a key defensive technique. Players must time them carefully — a mistimed or dangerous sliding tackle can result in a yellow or red card!' },
  { level:1, visual:{type:'emoji',emoji:'📐',label:'Six Yard Box'}, question:'What is the "six-yard box" in football?', options:['The small rectangle in front of the goal where goal kicks are taken','The penalty area','The area where the referee stands'], answer:'The small rectangle in front of the goal where goal kicks are taken', fact:'📏 The six-yard box (goal area) extends 5.5 metres from each goalpost. Goal kicks must be taken from within this area, and opponents must stay outside until the ball is in play!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1966'}, question:'Which country hosted the 1966 FIFA World Cup, which was won by England?', options:['England','West Germany','France'], answer:'England', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 England hosted and won the 1966 World Cup — the only time they\'ve won the tournament. The final at Wembley against West Germany ended 4-2, with Geoff Hurst\'s hat-trick!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Passing'}, question:'What is a "through ball" in football?', options:['A pass played into space behind the opposition defence for a teammate to run onto','A ball passed backwards to the goalkeeper','A long aerial pass to a tall striker'], answer:'A pass played into space behind the opposition defence for a teammate to run onto', fact:'🎯 Through balls are one of football\'s most exciting plays — perfectly timed passes splitting the defence. Messi and Pirlo were masters of the through ball!' },
  { level:1, visual:{type:'emoji',emoji:'🔴',label:'Handball'}, question:'Can a goalkeeper use their hands outside the penalty area?', options:['No — they can only use hands inside their own penalty area','Yes — they can use hands anywhere on the pitch','Only in extra time'], answer:'No — they can only use hands inside their own penalty area', fact:'🧤 If a goalkeeper handles the ball outside their penalty area, it is treated the same as any outfield player handling — a direct free kick is awarded to the opposing team!' },
  { level:1, visual:{type:'flag',code:'br',label:'Brazil'}, question:'Brazil\'s national team is nicknamed "A Seleção" — what does this mean in English?', options:['The Selection','The Champions','The Yellow Ones'], answer:'The Selection', fact:'🇧🇷 "A Seleção" means "The Selection" — referring to how players are selected from across Brazil. They are also called "Canarinho" (Little Canary) after their yellow shirts!' },
  { level:1, visual:{type:'emoji',emoji:'⭐',label:'Stars on Shirt'}, question:'What do the stars on a national team\'s shirt represent?', options:['The number of World Cup titles won','The number of years the team has existed','The number of Olympic medals won'], answer:'The number of World Cup titles won', fact:'⭐ Each star on a team\'s shirt represents one World Cup victory. Brazil have 5 stars, Germany and Italy have 4 each, Argentina have 3. England have just 1 star!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Bicycle Kick'}, question:'What is a "bicycle kick" (or "overhead kick") in football?', options:['When a player kicks the ball backwards over their own head while in the air','When a player dribbles through the entire opposition team','A shot hit with the outside of the boot'], answer:'When a player kicks the ball backwards over their own head while in the air', fact:'🤸 The bicycle kick is one of football\'s most spectacular goals. Cristiano Ronaldo\'s bicycle kick for Real Madrid vs Juventus in 2018 is often called the greatest Champions League goal ever!' },
  { level:1, visual:{type:'flag',code:'gb',label:'England'}, question:'Which competition do the top English clubs compete in to qualify for the Champions League?', options:['The Premier League','The FA Cup','The League Cup (Carabao Cup)'], answer:'The Premier League', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 The top 4 teams in the Premier League at the end of each season qualify for the Champions League. This makes the top-4 race one of the most exciting battles in football!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1974'}, question:'Which country hosted the 1974 FIFA World Cup?', options:['West Germany','Netherlands','France'], answer:'West Germany', fact:'🇩🇪 West Germany hosted and won the 1974 World Cup, beating the Netherlands 2-1 in the final. It was a historic tournament famous for the Netherlands\'s "Total Football" style!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1998'}, question:'Which country hosted the 1998 FIFA World Cup?', options:['France','Italy','England'], answer:'France', fact:'🇫🇷 France hosted and won the 1998 World Cup — their first ever title. Zinedine Zidane scored twice in the final as they beat Brazil 3-0 in front of 80,000 fans in Paris!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1990'}, question:'Which country hosted the 1990 FIFA World Cup?', options:['Italy','Spain','Mexico'], answer:'Italy', fact:'🇮🇹 Italy hosted the 1990 World Cup. Germany beat Argentina 1-0 in the final. The tournament was often criticised for negative football but produced memorable moments like Roger Milla\'s dances!' },
  { level:1, visual:{type:'flag',code:'de',label:'Germany'}, question:'What is Germany\'s national football team nicknamed?', options:['Die Mannschaft (The Team)','Die Roten (The Reds)','Die Adler (The Eagles)'], answer:'Die Mannschaft (The Team)', fact:'🇩🇪 "Die Mannschaft" (The Team) is Germany\'s iconic nickname — representing their collective, team-first mentality. They\'re also sometimes called "Die Nationalelf" (The National XI)!' },
  { level:1, visual:{type:'flag',code:'es',label:'Spain'}, question:'Spain\'s national football team is nicknamed "La Roja" — what does this mean?', options:['The Red One','The Pride','The Beautiful'], answer:'The Red One', fact:'🇪🇸 "La Roja" (The Red One) refers to Spain\'s traditional red away shirts. Their home shirt is red too! Spain have won 3 Euros (1964, 2008, 2012) and the 2010 World Cup!' },
  { level:1, visual:{type:'flag',code:'ar',label:'Argentina'}, question:'What colour are Argentina\'s national team shirts?', options:['Light blue and white stripes','Dark blue and yellow','Red and white'], answer:'Light blue and white stripes', fact:'🇦🇷 Argentina\'s iconic light blue and white striped shirt is one of football\'s most recognised. The design was inspired by the Argentine flag. They\'ve won 3 World Cups wearing it!' },
  { level:1, visual:{type:'emoji',emoji:'🏆',label:'League Cup'}, question:'What is the League Cup in English football also known as?', options:['The Carabao Cup (currently sponsored by Carabao energy drink)','The Carling Cup only','The Coca-Cola Cup only'], answer:'The Carabao Cup (currently sponsored by Carabao energy drink)', fact:'🏆 The League Cup has had many sponsor names — Milk Cup, Rumbelows Cup, Coca-Cola Cup, Worthington Cup, Carling Cup and now Carabao Cup! It\'s a domestic knockout cup for English league clubs!' },
  { level:1, visual:{type:'flag',code:'nl',label:'Netherlands'}, question:'Which Dutch player is considered one of the greatest footballers ever and is known for the "Cruyff Turn"?', options:['Johan Cruyff','Marco van Basten','Ruud Gullit'], answer:'Johan Cruyff', fact:'🇳🇱 Johan Cruyff invented the "Cruyff Turn" — a trick to fool defenders by dragging the ball behind your standing leg. He also won 3 consecutive Ballon d\'Ors and revolutionised football tactics!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1986'}, question:'Which country hosted the 1986 FIFA World Cup, famous for Maradona\'s Hand of God?', options:['Mexico','Argentina','Spain'], answer:'Mexico', fact:'🇲🇽 Mexico hosted the 1986 World Cup — their second time hosting (also 1970). It\'s famous for Maradona\'s two legendary goals vs England and Argentina\'s triumph over West Germany in the final!' },
  { level:1, visual:{type:'flag',code:'it',label:'Italy'}, question:'Which Italian city is home to both Juventus and the famous Torino club?', options:['Turin','Milan','Rome'], answer:'Turin', fact:'🏙️ Turin (Torino) in northern Italy is home to two clubs — Juventus and Torino FC. The Turin derby (Derby della Mole) is one of Italy\'s oldest and most passionate local rivalries!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Pitch Markings'}, question:'What is the "centre circle" used for in football?', options:['Players must stay outside it during kick-offs','It marks the penalty area','It\'s where the referee always stands'], answer:'Players must stay outside it during kick-offs', fact:'📏 The centre circle has a radius of 9.15 metres. At kick-off, only the kicking team can be inside it. After the kick, anyone can enter — but the ball must move forward first!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'Golden Ball'}, question:'What is the Golden Ball award at the FIFA World Cup given for?', options:['The best player of the tournament','The top scorer of the tournament','The best goalkeeper of the tournament'], answer:'The best player of the tournament', fact:'🏅 The Golden Ball (Ballon d\'Or at the World Cup) is voted on by media and technical experts. Messi controversially won it at the 2014 World Cup despite Argentina losing the final!' },

  // ── ADDITIONAL EASY Level 1 (continued) ──────────────────────────────────
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1954'}, question:'Which country hosted the 1954 FIFA World Cup in Switzerland?', options:['Switzerland','Austria','France'], answer:'Switzerland', fact:'🇨🇭 Switzerland hosted the 1954 World Cup — the first tournament to be televised! West Germany beat Hungary 3-2 in the final — one of history\'s greatest upsets, as Hungary were unbeaten in 4 years!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1958'}, question:'Which country hosted the 1958 FIFA World Cup, won by Brazil?', options:['Sweden','Norway','Denmark'], answer:'Sweden', fact:'🇸🇪 Sweden hosted the 1958 World Cup and reached the final themselves, losing to Brazil 5-2. It was the tournament where a 17-year-old Pelé announced himself to the world!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1962'}, question:'Which country hosted the 1962 FIFA World Cup, won by Brazil?', options:['Chile','Argentina','Peru'], answer:'Chile', fact:'🇨🇱 Chile hosted the 1962 World Cup. Brazil won their second title without Pelé (injured). The "Battle of Santiago" (Chile vs Italy) was one of football\'s most violent matches!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1982'}, question:'Which country hosted the 1982 FIFA World Cup?', options:['Spain','Italy','France'], answer:'Spain', fact:'🇪🇸 Spain hosted the 1982 World Cup. Italy won, with Paolo Rossi scoring 6 goals including a hat-trick against Brazil. It was the first World Cup with 24 teams!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2014'}, question:'Which country hosted the 2014 FIFA World Cup?', options:['Brazil','Argentina','Colombia'], answer:'Brazil', fact:'🇧🇷 Brazil hosted the 2014 World Cup but suffered the "Mineirazo" — a 7-1 semi-final loss to Germany in Belo Horizonte. Germany then beat Argentina 1-0 in extra time in the Rio final!' },
  { level:1, visual:{type:'emoji',emoji:'🏟️',label:'Camp Nou'}, question:'Approximately how many fans can FC Barcelona\'s Camp Nou stadium hold?', options:['About 99,000','About 70,000','About 120,000'], answer:'About 99,000', fact:'🏟️ Camp Nou holds approximately 99,000 supporters — the largest capacity in Europe. The name means "New Field" in Catalan. It opened in 1957 and is currently undergoing a major renovation!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Defender'}, question:'What is the main job of a "central defender" in football?', options:['Stop the opposition from scoring by blocking shots and winning aerial duels','Score goals from midfield','Take all the free kicks and corners'], answer:'Stop the opposition from scoring by blocking shots and winning aerial duels', fact:'🛡️ Central defenders (centre-backs) are the backbone of the team. Great centre-backs include Paolo Maldini, Franz Beckenbauer, Rio Ferdinand, Virgil van Dijk and Sergio Ramos!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Midfielder'}, question:'What does a "holding midfielder" (or "defensive midfielder") primarily do?', options:['Shield the defence and break up opposition attacks','Score goals from midfield','Create chances for the forwards'], answer:'Shield the defence and break up opposition attacks', fact:'🛡️ Holding midfielders sit in front of the defence, winning the ball and distributing it. Legends include Claude Makelele, Sergio Busquets, N\'Golo Kanté and Casemiro!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'World Cup Host 1978'}, question:'Which country hosted the 1978 FIFA World Cup, which was won by the home nation?', options:['Argentina','Brazil','Chile'], answer:'Argentina', fact:'🇦🇷 Argentina hosted and won the 1978 World Cup. General Videla\'s military dictatorship used the tournament for propaganda. Argentina beat the Netherlands 3-1 in the final with Mario Kempes scoring twice!' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Maradona'}, question:'Diego Maradona was from which country?', options:['Argentina','Brazil','Uruguay'], answer:'Argentina', fact:'🇦🇷 Diego Maradona was born in Lanús, Buenos Aires, Argentina in 1960. He led Argentina to the 1986 World Cup and is considered one of the two greatest players in history alongside Lionel Messi!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup Asia'}, question:'Which was the first Asian country to host the FIFA World Cup (co-hosts with South Korea)?', options:['Japan','China','Australia'], answer:'Japan', fact:'🇯🇵 Japan co-hosted the 2002 World Cup alongside South Korea — making it the first time Asia hosted the tournament. Japan reached the Round of 16, losing narrowly to Turkey!' },
  { level:1, visual:{type:'emoji',emoji:'🔴',label:'Manchester United'}, question:'Manchester United\'s iconic home shirt colour is red — what is their home ground?', options:['Old Trafford','The Etihad','Anfield'], answer:'Old Trafford', fact:'🔴 Old Trafford is nicknamed the "Theatre of Dreams" by Sir Bobby Charlton. It opened in 1910 and has a capacity of over 74,000 — the largest club ground in England!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'World Record'}, question:'Which Brazilian superstar scored over 1,000 career goals and is called "O Rei" (The King)?', options:['Pelé','Ronaldo Nazário','Romário'], answer:'Pelé', fact:'👑 Pelé is called "O Rei" (The King) of football. He spent most of his career at Santos in Brazil, winning 3 World Cups. His goals total (including friendlies) exceeded 1,000!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'South America'}, question:'How many countries are there in South America — all of which have football as their national sport?', options:['10 (CONMEBOL members)','12','8'], answer:'10 (CONMEBOL members)', fact:'🌎 CONMEBOL (South American Football Confederation) has exactly 10 member nations: Argentina, Bolivia, Brazil, Chile, Colombia, Ecuador, Paraguay, Peru, Uruguay and Venezuela!' },
  { level:1, visual:{type:'flag',code:'es',label:'Spain'}, question:'Which famous player nicknamed "The Flea" plays for Inter Miami and previously dominated at Barcelona?', options:['Lionel Messi','Luis Suárez','Andrés Iniesta'], answer:'Lionel Messi', fact:'🐐 Messi is nicknamed "La Pulga" (The Flea) because of his small stature and quick, close-to-the-ground dribbling style. He left Barcelona for PSG in 2021 and now plays for Inter Miami in the USA!' },
  { level:1, visual:{type:'emoji',emoji:'🏟️',label:'Signal Iduna Park'}, question:'What is the famous "Yellow Wall" — Europe\'s largest standing terrace — located in which stadium?', options:['Signal Iduna Park (Borussia Dortmund)','Anfield (Liverpool)','Camp Nou (Barcelona)'], answer:'Signal Iduna Park (Borussia Dortmund)', fact:'🟡 The Südtribüne (South Stand) at Borussia Dortmund\'s Signal Iduna Park holds 25,000 standing fans — the largest stand in European football. The noise and colour when it\'s full is extraordinary!' },
  { level:1, visual:{type:'emoji',emoji:'🌐',label:'World Cup 1930'}, question:'How many teams participated in the very first FIFA World Cup in 1930?', options:['13','16','8'], answer:'13', fact:'🌍 The 1930 World Cup in Uruguay had just 13 teams — mainly from South America and Europe (who had to travel by ship for 3 weeks!). Several European nations declined to attend due to the long journey.' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Golden Goal'}, question:'What was the "golden goal" rule used in football in the 1990s and early 2000s?', options:['The first goal scored in extra time ended the match immediately','Any goal in the last minute counted double','The first goal in a penalty shootout wins the match'], answer:'The first goal scored in extra time ended the match immediately', fact:'⚽ The golden goal (sudden death) was introduced in 1993 and scrapped in 2004. It was used at Euro 96 (Germany vs Czech Republic) and at several World Cups. Most teams simply played cautiously in extra time to avoid conceding!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'World Cup Italy 1934'}, question:'Which country won the 1934 FIFA World Cup on home soil — the first to have it hosted in Europe?', options:['Italy','Spain','Germany'], answer:'Italy', fact:'🇮🇹 Italy hosted and won the 1934 World Cup under manager Vittorio Pozzo — the first held in Europe. They beat Czechoslovakia 2-1 after extra time. The tournament was used as propaganda by Mussolini\'s fascist regime!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'World Cup France 1938'}, question:'Which country won the 1938 FIFA World Cup in France?', options:['Italy','France','Hungary'], answer:'Italy', fact:'🇮🇹 Italy won back-to-back World Cups in 1934 and 1938 — the only nation to defend the title successfully until Brazil repeated the feat in 1958 and 1962! Vittorio Pozzo is the only manager to win it twice!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup Europe'}, question:'Which European country has hosted the FIFA World Cup the most times?', options:['Italy (1934, 1990)','France','Germany'], answer:'Italy (1934, 1990)', fact:'🇮🇹 Italy is one of the countries (tied with Mexico, Brazil and Germany) to have hosted the World Cup twice: in 1934 and 1990. Germany also hosted twice (1974 West Germany, 2006)!' },
  { level:1, visual:{type:'emoji',emoji:'🔵',label:'Everton'}, question:'Everton FC is based in which English city and shares it with Liverpool FC?', options:['Liverpool','Manchester','Birmingham'], answer:'Liverpool', fact:'🔵 The Merseyside derby between Everton and Liverpool is one of England\'s most passionate local rivalries. Everton play in blue and are moving from Goodison Park (their home since 1892) to a new stadium at Bramley-Moore Dock!' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Zlatan'}, question:'Swedish striker Zlatan Ibrahimović played for which country internationally?', options:['Sweden','Denmark','Norway'], answer:'Sweden', fact:'🦁 Zlatan Ibrahimović is Sweden\'s greatest ever footballer and all-time top scorer with 62 international goals. He played for Ajax, Juventus, Inter Milan, Barcelona, AC Milan, PSG, Manchester United and LA Galaxy!' },
  { level:1, visual:{type:'emoji',emoji:'🏆',label:'World Cup First Hat Trick'}, question:'In which year was the first ever hat-trick scored at a FIFA World Cup?', options:['1930','1938','1950'], answer:'1930', fact:'🎩 The first World Cup hat-trick was scored by Guillermo Stábile of Argentina against Mexico on 19 July 1930. He also finished as the tournament\'s top scorer with 8 goals!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Free Kick Technique'}, question:'What makes Cristiano Ronaldo\'s free kick technique unique compared to most players?', options:['He strikes the ball with minimal spin to create an unpredictable "knuckleball" effect','He always aims top-left corner','He always uses the inside of his foot'], answer:'He strikes the ball with minimal spin to create an unpredictable "knuckleball" effect', fact:'⚽ Ronaldo\'s "knuckleball" free kick wobbles unpredictably in the air, making it very hard for goalkeepers to judge. It\'s similar to a knuckleball pitch in baseball — unstable aerodynamics!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'Qualification'}, question:'How do countries qualify for the FIFA World Cup?', options:['Through continental qualification tournaments held over the years before the World Cup','By winning their national league','By being invited by FIFA'], answer:'Through continental qualification tournaments held over the years before the World Cup', fact:'🌍 Each of FIFA\'s 6 confederations (UEFA, CONMEBOL, CAF, AFC, CONCACAF, OFC) runs their own qualification process. Only the host nation and defending champion get automatic spots — all others must qualify!' },
  { level:1, visual:{type:'emoji',emoji:'🤝',label:'Handshake'}, question:'What is the traditional pre-match ceremony in major football matches?', options:['Players from both teams shake hands with each other before kick-off','The home team captain performs a coin toss','The managers introduce their players to the referee'], answer:'Players from both teams shake hands with each other before kick-off', fact:'🤝 The pre-match handshake has been a tradition in football for many years. It was introduced as a gesture of fair play — though it has occasionally caused controversy when players have refused to shake hands!' },
  { level:1, visual:{type:'flag',code:'gb',label:'West Ham'}, question:'Which English club\'s famous academy produced players like Bobby Moore, Geoff Hurst and Martin Peters — three of England\'s 1966 World Cup winning team?', options:['West Ham United','Arsenal','Tottenham Hotspur'], answer:'West Ham United', fact:'⚒️ West Ham United\'s academy (the "Academy of Football") produced three of England\'s 1966 World Cup winning squad: Bobby Moore (captain), Geoff Hurst (hat-trick scorer) and Martin Peters!' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Cafu'}, question:'Brazilian right-back Cafu won two World Cup titles — in which years?', options:['1994 and 2002','1994 and 1998','1998 and 2002'], answer:'1994 and 2002', fact:'🇧🇷 Cafu is one of the most decorated full-backs in football history. He captained Brazil in the 2002 final vs Germany and lifted the trophy. He also played in 3 consecutive World Cup finals (1994, 1998, 2002)!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'Paolo Maldini'}, question:'Italian defender Paolo Maldini is considered one of the greatest ever — which club did he spend his entire career at?', options:['AC Milan','Juventus','Inter Milan'], answer:'AC Milan', fact:'🔴⚫ Paolo Maldini played for AC Milan from 1985 to 2009 — 25 years! He won 5 Champions League titles and 7 Serie A titles. His father Cesare also played for AC Milan — a true football dynasty!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'CONCACAF'}, question:'CONCACAF governs football in which regions?', options:['North and Central America and the Caribbean','South America','Europe and North Africa'], answer:'North and Central America and the Caribbean', fact:'🌎 CONCACAF (Confederation of North, Central American and Caribbean Association Football) has 41 member associations. The USA and Mexico are its powerhouses, but Caribbean nations also participate!' },
  { level:1, visual:{type:'emoji',emoji:'🌟',label:'Klopp'}, question:'Jürgen Klopp is famous for managing which two clubs to great success before they achieved major trophies?', options:['Borussia Dortmund and Liverpool','Bayern Munich and Liverpool','Dortmund and Manchester City'], answer:'Borussia Dortmund and Liverpool', fact:'🎉 Klopp won 2 Bundesliga titles with Borussia Dortmund (2011, 2012) and transformed Liverpool — winning the Champions League (2019), Premier League (2020), FA Cup and League Cup (2022)!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Long Shot'}, question:'What is a "thunderbastard" (or "screamer") in football?', options:['A very powerful, unexpected long-range goal','A particularly aggressive tackle','A penalty kick taken at full pace'], answer:'A very powerful, unexpected long-range goal', fact:'💥 A thunderbastard (or screamer) is slang for a spectacular long-range goal — often unexpected, always spectacular! Players like Steven Gerrard, Roberto Carlos and David Beckham were famous for them!' },
  { level:1, visual:{type:'flag',code:'gb',label:'Newcastle'}, question:'Which English club is nicknamed the "Magpies" and plays in black and white stripes?', options:['Newcastle United','Notts County','Fulham'], answer:'Newcastle United', fact:'⚫⚪ Newcastle United play in black and white stripes and their supporters are some of England\'s most passionate. Their St James\' Park stadium holds over 52,000 fans. They were Premier League contenders in the mid-1990s!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'Oliver Kahn'}, question:'German goalkeeper Oliver Kahn won the Golden Ball as best player at the 2002 World Cup — what was unusual about this award?', options:['He was the first (and so far only) goalkeeper to win the Golden Ball at a World Cup','He was a substitute who only played 3 games','He scored a goal from his own half'], answer:'He was the first (and so far only) goalkeeper to win the Golden Ball at a World Cup', fact:'🧤 Oliver Kahn was extraordinary at the 2002 World Cup despite Germany losing the final to Brazil. His performances were so outstanding that FIFA gave him the Golden Ball — the only goalkeeper ever to receive this honour!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup Host 2034'}, question:'Which country is set to host the 2034 FIFA World Cup?', options:['Saudi Arabia','Australia','Egypt'], answer:'Saudi Arabia', fact:'🇸🇦 Saudi Arabia was awarded the 2034 World Cup. It will be only the second Middle Eastern country to host the tournament after Qatar (2022). There were some concerns raised about human rights and climate issues!' },
  { level:1, visual:{type:'emoji',emoji:'🏆',label:'World Cup 2030'}, question:'The 2030 FIFA World Cup celebrates 100 years of the tournament — which countries will host it?', options:['Spain, Portugal and Morocco (with games in Uruguay, Argentina and Paraguay for centenary)','England, France and Germany','Italy, Greece and Turkey'], answer:'Spain, Portugal and Morocco (with games in Uruguay, Argentina and Paraguay for centenary)', fact:'🌍 The 2030 World Cup will be spread across 6 countries on 3 continents — a first! Three centenary games will be played in South America to honour the 1930 Uruguay tournament, while the main event is in Europe and Africa!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Substitutes'}, question:'When were football substitutes first allowed in the FIFA World Cup?', options:['1970 (Mexico)','1958 (Sweden)','1966 (England)'], answer:'1970 (Mexico)', fact:'🔄 Substitutes were first used at the 1970 World Cup in Mexico — each team was allowed 2. The rule was introduced to help with injuries in the heat. The number has since risen to 5 substitutes in modern football!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'World Cup Winners Unique'}, question:'How many different countries have won the FIFA World Cup (men\'s) since it began in 1930?', options:['8 countries','10 countries','6 countries'], answer:'8 countries', fact:'🏆 Only 8 countries have ever won the Men\'s World Cup: Uruguay (2), Italy (4), Germany (4), Brazil (5), England (1), France (2), Argentina (3), Spain (1). No African or Asian country has won it yet!' },
  { level:1, visual:{type:'emoji',emoji:'🔴',label:'Red Card History'}, question:'When was the red/yellow card system introduced to the FIFA World Cup?', options:['1970 (after controversies at the 1966 World Cup)','1958','1982'], answer:'1970 (after controversies at the 1966 World Cup)', fact:'🟨🟥 Red and yellow cards were invented by English referee Ken Aston after the 1966 World Cup, when communication problems led to players not understanding they\'d been booked or sent off. The traffic light colour idea came to him at traffic lights!' },
  { level:1, visual:{type:'emoji',emoji:'🌍',label:'Oldest Competition'}, question:'Which club tournament — the African equivalent of the Champions League — is the oldest continental club competition outside Europe?', options:['CAF Champions League (formerly African Cup of Champions Clubs, 1964)','Copa Libertadores (1960)','AFC Champions League (1985)'], answer:'Copa Libertadores (1960)', fact:'🌎 The Copa Libertadores was first held in 1960 — before the African or Asian continental club competitions were established. It\'s South America\'s most prestigious club trophy, equivalent to the Champions League!' },
  { level:1, visual:{type:'emoji',emoji:'🎯',label:'Winger'}, question:'What is a "winger" in football?', options:['An attacking midfielder who plays wide on the left or right side','A defensive specialist','A second goalkeeper in training'], answer:'An attacking midfielder who plays wide on the left or right side', fact:'🏃 Wingers use their pace and skill to beat defenders on the outside or cut inside. Famous wingers include George Best, Ryan Giggs, Cristiano Ronaldo (early career), Arjen Robben and Mohamed Salah!' },
  { level:1, visual:{type:'emoji',emoji:'🏟️',label:'Maracana'}, question:'The Maracanã is one of football\'s most famous stadiums — in which city is it located?', options:['Rio de Janeiro, Brazil','São Paulo, Brazil','Buenos Aires, Argentina'], answer:'Rio de Janeiro, Brazil', fact:'🇧🇷 The Maracanã in Rio de Janeiro held nearly 200,000 fans at the 1950 World Cup — the record for any football match! Today it holds around 78,000. It hosted the 2014 World Cup and 2016 Olympics!' },
  { level:1, visual:{type:'emoji',emoji:'⚽',label:'Laws of Game'}, question:'How many Laws of the Game are there in official football?', options:['17','10','22'], answer:'17', fact:'📋 Football has exactly 17 Laws of the Game, maintained by IFAB (International Football Association Board). They cover everything from the size of the pitch to player equipment, offside, fouls and disciplinary procedures!' },

  // ── ADDITIONAL MEDIUM (Level 2) ───────────────────────────────────────────
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'World Cup 1950'}, question:'Which country won the 1950 FIFA World Cup, defeating Brazil at the Maracanã in the final game?', options:['Uruguay','Spain','Sweden'], answer:'Uruguay', fact:'🇺🇾 Uruguay\'s 2-1 win over Brazil at the 1950 World Cup — in front of 200,000 Brazilian fans — became known as the "Maracanazo." It remains one of sport\'s greatest shocks!' },
  { level:2, visual:{type:'emoji',emoji:'⭐',label:'World Cup Golden Boot'}, question:'Who won the Golden Boot at the 2014 FIFA World Cup with 6 goals?', options:['James Rodríguez','Thomas Müller','Neymar'], answer:'James Rodríguez', fact:'🇨🇴 James Rodríguez\'s 6-goal haul for Colombia in 2014 — including a stunning volley vs Uruguay — earned him the Golden Boot and made him one of the tournament\'s biggest stars!' },
  { level:2, visual:{type:'flag',code:'es',label:'Zidane Manager'}, question:'How many consecutive Champions League titles did Zinedine Zidane win as Real Madrid manager (2016-2018)?', options:['3','2','4'], answer:'3', fact:'🏆 Zidane won the Champions League in 2016, 2017 and 2018 — an unprecedented three consecutive titles. No other manager has ever won the competition three times in a row!' },
  { level:2, visual:{type:'emoji',emoji:'🏟️',label:'El Clasico'}, question:'How many times per season do Real Madrid and Barcelona typically meet in La Liga (El Clásico)?', options:['Twice (home and away)','Once','Three times'], answer:'Twice (home and away)', fact:'🔥 Real Madrid and Barcelona meet twice per La Liga season — once at the Bernabéu and once at Camp Nou. They can also meet in the Copa del Rey and Spanish Super Cup!' },
  { level:2, visual:{type:'emoji',emoji:'💰',label:'Transfer Records'}, question:'Which club paid a then-world record £89 million for Gareth Bale in 2013?', options:['Real Madrid','Manchester City','Chelsea'], answer:'Real Madrid', fact:'💰 Real Madrid paid a world-record £89 million for Gareth Bale from Tottenham Hotspur in 2013. He then scored a stunning solo goal in the 2014 Copa del Rey final against Barcelona!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'UCL Records'}, question:'Real Madrid have won the Champions League 15 times — who is their all-time top scorer in the competition?', options:['Cristiano Ronaldo','Raúl','Alfredo Di Stéfano'], answer:'Cristiano Ronaldo', fact:'⚡ Ronaldo scored over 105 Champions League goals for Real Madrid alone, out of his total record of 140+ UCL goals. He won it 4 times with Real Madrid (2014, 2016, 2017, 2018)!' },
  { level:2, visual:{type:'flag',code:'de',label:'Germany'}, question:'Which German player was known as "Der Kaiser" (The Emperor) and revolutionised the sweeper position?', options:['Franz Beckenbauer','Gerd Müller','Karl-Heinz Rummenigge'], answer:'Franz Beckenbauer', fact:'👑 Franz Beckenbauer won the World Cup as both player (1974) and manager (1990) — one of only three people ever to do so. He was famous for his elegant ball-playing from defence!' },
  { level:2, visual:{type:'flag',code:'pt',label:'Eusébio'}, question:'Which Portuguese striker known as the "Black Panther" was the top scorer at the 1966 World Cup with 9 goals?', options:['Eusébio','Fernando Peyroteo','Pauleta'], answer:'Eusébio', fact:'🐆 Eusébio was one of football\'s first global superstars. He scored 9 goals for Portugal at the 1966 World Cup, helping them finish third. He spent his career at Benfica, scoring 317 league goals!' },
  { level:2, visual:{type:'emoji',emoji:'📊',label:'Formation'}, question:'In a 4-3-3 formation, how many defenders, midfielders and forwards are there?', options:['4 defenders, 3 midfielders, 3 forwards','3 defenders, 4 midfielders, 3 forwards','4 defenders, 4 midfielders, 2 forwards'], answer:'4 defenders, 3 midfielders, 3 forwards', fact:'📋 4-3-3 is an attacking formation with 4 defenders (usually 2 centre-backs and 2 full-backs), 3 midfielders and 3 forwards. Barcelona and Liverpool have used it to great success!' },
  { level:2, visual:{type:'emoji',emoji:'📊',label:'Formation 442'}, question:'The 4-4-2 formation was hugely popular in the 1990s — how many players are in each line?', options:['4 defenders, 4 midfielders, 2 strikers','4 defenders, 2 midfielders, 4 strikers','2 defenders, 4 midfielders, 4 strikers'], answer:'4 defenders, 4 midfielders, 2 strikers', fact:'📋 4-4-2 dominated English football in the 1990s and early 2000s. Teams like Manchester United and Liverpool used it brilliantly. The twin striker partnership was central to this era!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Sir Alex Ferguson'}, question:'How many Premier League titles did Sir Alex Ferguson win as Manchester United manager?', options:['13','10','8'], answer:'13', fact:'🔴 Sir Alex Ferguson managed Manchester United from 1986 to 2013 — winning an incredible 13 Premier League titles, 5 FA Cups, and 2 Champions League titles. He is widely considered football\'s greatest ever manager!' },
  { level:2, visual:{type:'flag',code:'de',label:'Miroslav Klose'}, question:'Miroslav Klose scored 16 World Cup goals — how many World Cups did he play in?', options:['4 World Cups (2002, 2006, 2010, 2014)','3 World Cups','5 World Cups'], answer:'4 World Cups (2002, 2006, 2010, 2014)', fact:'⚽ Klose scored 16 World Cup goals across 4 tournaments from 2002 to 2014, his final goal coming in the 7-1 win over Brazil. He surpassed Ronaldo Nazário\'s record of 15!' },
  { level:2, visual:{type:'flag',code:'br',label:'Brazil'}, question:'Which Brazilian midfielder was known as the "complete player" and won multiple Ballon d\'Ors in the 1990s?', options:['Ronaldo Nazário','Rivaldo','Romário'], answer:'Rivaldo', fact:'🇧🇷 Rivaldo won the 1999 Ballon d\'Or and was part of Brazil\'s 2002 World Cup winning squad. His form for Barcelona in 1999-2000, including a bicycle kick in the final La Liga game, was extraordinary!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'UCL Final 2019'}, question:'Which club won the 2019 Champions League final, coming back from 3-0 down in the semi-final vs Barcelona?', options:['Liverpool','Tottenham','Manchester City'], answer:'Liverpool', fact:'🔴 Liverpool overturned a 3-0 deficit vs Barcelona (4-0 on the night!) then beat Tottenham 2-0 in the Madrid final. Divock Origi scored both goals — one of sport\'s greatest nights!' },
  { level:2, visual:{type:'flag',code:'nl',label:'Netherlands'}, question:'Marco van Basten scored one of football\'s greatest ever goals in the Euro 1988 final — which country did he beat?', options:['USSR','West Germany','France'], answer:'USSR', fact:'🇳🇱 Van Basten\'s volley from an almost impossible angle vs the USSR in the 1988 Euro final is considered one of the greatest goals ever scored. Netherlands won 2-0!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Copa America Records'}, question:'Which country has won the Copa América the most times?', options:['Uruguay and Argentina (15 times each)','Brazil','Chile'], answer:'Uruguay and Argentina (15 times each)', fact:'🌎 Uruguay and Argentina are joint record holders with 15 Copa América titles each (as of 2024). Brazil have won it 9 times. Argentina\'s 2021 win ended a 28-year wait!' },
  { level:2, visual:{type:'flag',code:'it',label:'Italy'}, question:'Which Italian club has won the most Serie A titles overall?', options:['Juventus','Internazionale','AC Milan'], answer:'Juventus', fact:'⚫⚪ Juventus have won Serie A more than 35 times — far more than any other Italian club. However, two titles (2005, 2006) were stripped due to the Calciopoli match-fixing scandal!' },
  { level:2, visual:{type:'emoji',emoji:'🔴',label:'Liverpool'}, question:'Who managed Liverpool when they won the Champions League in 2019 and the Premier League in 2020?', options:['Jürgen Klopp','Brendan Rodgers','Rafael Benítez'], answer:'Jürgen Klopp', fact:'🎉 Jürgen Klopp ended Liverpool\'s 30-year league title wait in 2020 and won their 6th Champions League in 2019. His gegenpressing style transformed the club into one of Europe\'s best!' },
  { level:2, visual:{type:'flag',code:'es',label:'Guardiola Barcelona'}, question:'In Pep Guardiola\'s first season at Barcelona (2008-09), they won a historic treble — which three trophies?', options:['La Liga, Copa del Rey and Champions League','La Liga, Super Cup and Champions League','La Liga, Copa del Rey and Europa League'], answer:'La Liga, Copa del Rey and Champions League', fact:'🏆🏆🏆 Barcelona\'s 2009 treble under Guardiola was the first in Spanish football history. Messi, Xavi and Iniesta were unstoppable. They also won the Spanish Super Cup, UEFA Super Cup and Club World Cup that year!' },
  { level:2, visual:{type:'emoji',emoji:'🏟️',label:'Santiago Bernabéu'}, question:'What is the capacity of Real Madrid\'s Santiago Bernabéu stadium?', options:['Approximately 80,000','About 60,000','About 100,000'], answer:'Approximately 80,000', fact:'🏟️ The Bernabéu holds around 80,000 fans after its recent renovation. It\'s one of Europe\'s most iconic stadiums, having hosted the 1982 World Cup final and multiple Champions League finals!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Manchester United'}, question:'Who scored for Manchester United in the 1999 Champions League final against Bayern Munich?', options:['Teddy Sheringham and Ole Gunnar Solskjær','Andy Cole and Dwight Yorke','David Beckham and Ryan Giggs'], answer:'Teddy Sheringham and Ole Gunnar Solskjær', fact:'🔴 Sheringham equalised in the 91st minute, then Solskjær poked in a winner in the 93rd! Bayern had been 1-0 up from the 6th minute. The most dramatic comeback in Champions League history!' },
  { level:2, visual:{type:'emoji',emoji:'📊',label:'xG'}, question:'What does "xG" stand for in modern football analysis?', options:['Expected Goals','Extra Goals','Exceptional Goalscoring'], answer:'Expected Goals', fact:'📊 Expected Goals (xG) is a statistical measure of how likely a shot is to result in a goal based on factors like distance, angle and the type of chance. It\'s now widely used by clubs and TV broadcasters!' },
  { level:2, visual:{type:'flag',code:'de',label:'Lewandowski'}, question:'Robert Lewandowski broke Gerd Müller\'s single-season Bundesliga goals record — how many did he score in 2020-21?', options:['41','40','38'], answer:'41', fact:'💥 Robert Lewandowski scored 41 goals in the 2020-21 Bundesliga season for Bayern Munich, breaking Gerd Müller\'s 49-year-old record of 40. He won the FIFA Best Player award that year!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Arsenal Invincibles'}, question:'In which Premier League season did Arsenal go the entire campaign unbeaten (49 games unbeaten overall)?', options:['2003-04','2001-02','2004-05'], answer:'2003-04', fact:'👑 Arsenal\'s "Invincibles" went 49 games unbeaten including the entire 2003-04 Premier League season — the only team to ever go unbeaten in a top-5 European league for a full season!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'UCL Most Goals'}, question:'What is the record for most goals scored in a single Champions League season by one player?', options:['17 goals (Cristiano Ronaldo, 2013-14)','14 goals','16 goals'], answer:'17 goals (Cristiano Ronaldo, 2013-14)', fact:'⚡ Ronaldo scored 17 goals in the 2013-14 Champions League for Real Madrid — helping them win the trophy (La Décima). He scored in every round including the final vs Atletico Madrid!' },
  { level:2, visual:{type:'flag',code:'ar',label:'Maradona 1986'}, question:'How many goals did Maradona score in the 1986 World Cup tournament?', options:['5 goals','4 goals','8 goals'], answer:'5 goals', fact:'⚽ Maradona scored 5 goals and made 5 assists in the 1986 World Cup — including the Hand of God and Goal of the Century. He also had 3 assists in the semi-final vs Belgium!' },
  { level:2, visual:{type:'emoji',emoji:'🎯',label:'Set Pieces'}, question:'What is a "corner kick" designed to create?', options:['A scoring opportunity from a cross into the penalty area','A way to restart play after a throw-in','A method to waste time'], answer:'A scoring opportunity from a cross into the penalty area', fact:'🎯 Corner kicks are awarded when defenders put the ball out behind their own goal line. About 3-4% of corners result in goals directly, but they create significant danger with aerial threats!' },
  { level:2, visual:{type:'flag',code:'hr',label:'Croatia'}, question:'Croatia reached the 2018 World Cup final — how many games did they play in 90 minutes without going to extra time or penalties?', options:['Just 1 (group stage)','All 7 games','4 games'], answer:'Just 1 (group stage)', fact:'💪 Croatia had to play extra time in every knockout game (against Denmark, Russia, England and France in the final). They were warriors of stamina and mental strength throughout!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'Highest Transfer'}, question:'Which player became the most expensive teenager ever when Manchester City paid around £100 million for him in 2023?', options:['Josko Gvardiol','Jude Bellingham','Moisés Caicedo'], answer:'Josko Gvardiol', fact:'💰 Manchester City paid £77.6 million (rising to £100m) for Croatian defender Josko Gvardiol from RB Leipzig in 2023 — making him the most expensive defender and teenager in history at the time!' },
  { level:2, visual:{type:'flag',code:'us',label:'MLS'}, question:'What is MLS, and which two clubs had the highest rivalry in its early years?', options:['Major League Soccer — LA Galaxy vs New England Revolution','Minor League Soccer — New York vs Chicago','Major League Soccer — New York vs LA'], answer:'Major League Soccer — LA Galaxy vs New England Revolution', fact:'🇺🇸 MLS (Major League Soccer) was founded in 1996. The early "Superclásico" between LA Galaxy and San Jose Earthquakes (and later NYRB) became iconic, but the Eastern Conference rivalry with NE Revolution was fierce!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Copa Libertadores'}, question:'Which Argentine club has won the Copa Libertadores the most times?', options:['Independiente','Boca Juniors','River Plate'], answer:'Independiente', fact:'🇦🇷 Independiente won the Copa Libertadores a record 7 times — earning them the nickname "King of Cups." Their dominance in the 1960s-70s is unmatched in South American club football!' },
  { level:2, visual:{type:'flag',code:'gb',label:'England'}, question:'England\'s national stadium Wembley holds approximately how many fans?', options:['90,000','80,000','100,000'], answer:'90,000', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 The current Wembley Stadium, opened in 2007, holds 90,000 fans — making it the largest stadium in England and the second largest in Europe. It cost £798 million to build!' },
  { level:2, visual:{type:'emoji',emoji:'📅',label:'Premier League Founded'}, question:'In which year was the English Premier League founded?', options:['1992','1985','2000'], answer:'1992', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 The Premier League was founded in 1992 when 22 top-flight clubs broke away from the Football League. The first title was won by Manchester United. It is now the world\'s most-watched football league!' },
  { level:2, visual:{type:'flag',code:'de',label:'Germany'}, question:'Which German club is known as "Die Roten" (The Reds) and has dominated the Bundesliga for decades?', options:['Bayern Munich','Bayer Leverkusen','RB Leipzig'], answer:'Bayern Munich', fact:'🔴 Bayern Munich (FC Bayern München) were founded in 1900 and dominate German football. They\'ve won the Bundesliga over 30 times and the Champions League 6 times!' },
  { level:2, visual:{type:'emoji',emoji:'🎯',label:'Pressing'}, question:'What is "pressing" in football tactics?', options:['Actively pressing opponents high up the pitch to win the ball back quickly','Defending deep in your own half','A method to preserve energy late in a match'], answer:'Actively pressing opponents high up the pitch to win the ball back quickly', fact:'🏃 High pressing has become central to modern football. Teams like Liverpool under Klopp and Man City under Guardiola use it to suffocate opponents and win the ball in dangerous areas!' },
  { level:2, visual:{type:'emoji',emoji:'🛡️',label:'Clean Sheet'}, question:'What does it mean for a goalkeeper to keep a "clean sheet"?', options:['Not conceding a single goal throughout the entire match','Saving at least 5 shots in a match','Playing the full 90 minutes without being substituted'], answer:'Not conceding a single goal throughout the entire match', fact:'🧤 A clean sheet means the goalkeeper (and defence) prevented any goals. Peter Schmeichel, Petr Čech and Gianluigi Buffon are among history\'s greatest clean-sheet keepers!' },
  { level:2, visual:{type:'flag',code:'fr',label:'France 1998'}, question:'France\'s Zinedine Zidane scored 2 headers in the 1998 World Cup final — which country were they playing?', options:['Brazil','Germany','Italy'], answer:'Brazil', fact:'🇫🇷 Zidane\'s two first-half headers gave France a 2-0 lead against Brazil in the 1998 Paris final. Emmanuel Petit completed the 3-0 win. A Brazilian team without a fit Ronaldo (who had a seizure the day before) never recovered!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'UCL Final 1994'}, question:'Which club won the 1994 Champions League final, beating Barcelona 4-0 in a shocking result?', options:['AC Milan','Ajax','Real Madrid'], answer:'AC Milan', fact:'🔴⚫ AC Milan humiliated Johan Cruyff\'s brilliant Barcelona 4-0 in the 1994 final — one of the most one-sided finals ever. Dejan Savićević scored a stunning chip for one of the goals!' },
  { level:2, visual:{type:'flag',code:'nl',label:'Ajax 1995'}, question:'Which Dutch club won the 1995 Champions League with a legendary young squad including Clarence Seedorf and Patrick Kluivert?', options:['Ajax','PSV Eindhoven','Feyenoord'], answer:'Ajax', fact:'🟥⬜ Ajax\'s 1995 Champions League win was achieved with an average squad age of just 23. The team included Clarence Seedorf, Edgar Davids, Marc Overmars and a teenage Patrick Kluivert — who scored the winner!' },
  { level:2, visual:{type:'emoji',emoji:'⚽',label:'Set Piece Goal'}, question:'Approximately what percentage of goals in top football leagues come from set pieces (free kicks, corners, penalties)?', options:['About 30-35%','About 10-15%','About 50-60%'], answer:'About 30-35%', fact:'📊 Research shows around 30-35% of all goals in top leagues come from set pieces. This is why clubs invest heavily in set-piece coaches — they can be the difference between winning and losing tight matches!' },
  { level:2, visual:{type:'flag',code:'es',label:'Real Madrid'}, question:'Who scored Real Madrid\'s winning goal in the 2014 Champions League final to win "La Décima" (their 10th title)?', options:['Sergio Ramos','Cristiano Ronaldo','Gareth Bale'], answer:'Sergio Ramos', fact:'🥅 Ramos headed home a 93rd-minute equaliser vs Atletico Madrid to force extra time. Real Madrid then won 4-1 in extra time. It was their first UCL in 12 years — "La Décima"!' },
  { level:2, visual:{type:'flag',code:'pt',label:'Portugal'}, question:'Cristiano Ronaldo won his first international trophy with Portugal at which tournament?', options:['Euro 2016','2019 UEFA Nations League','Copa América'], answer:'Euro 2016', fact:'🇵🇹 Ronaldo won Euro 2016 with Portugal — but he was injured early in the final! Portugal beat France 1-0 with an Éder goal. Ronaldo acted as an emotional sideline coach despite not playing!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'FA Cup History'}, question:'Which club has won the FA Cup the most times?', options:['Arsenal','Manchester United','Chelsea'], answer:'Arsenal', fact:'🔴 Arsenal have won the FA Cup a record 14 times — including in 2014, 2015 and 2020. Their Wembley record in FA Cup finals is outstanding, earning them the nickname "FA Cup Kings"!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'Africa Cup'}, question:'Which country has won the Africa Cup of Nations (AFCON) the most times?', options:['Egypt','Cameroon','Nigeria'], answer:'Egypt', fact:'🦅 Egypt have won AFCON a record 7 times, including three consecutive titles from 2006 to 2010. Their squad has included legends like Mohamed Aboutrika and Mohamed Salah!' },
  { level:2, visual:{type:'flag',code:'br',label:'Brazil'}, question:'Which Brazilian left-back is famous for his attacking style and powerful free kicks?', options:['Roberto Carlos','Cafu','Marcelo'], answer:'Roberto Carlos', fact:'🚀 Roberto Carlos scored one of football\'s most famous free kicks — a banana shot vs France in 1997 that curved around the wall. A defender by position, he scored 11 goals in World Cup qualifiers!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'Ronaldo Awards'}, question:'How many Ballon d\'Or awards has Cristiano Ronaldo won?', options:['5','6','4'], answer:'5', fact:'⭐ Cristiano Ronaldo has won 5 Ballon d\'Or awards (2008, 2013, 2014, 2016, 2017). He and Messi have won 13 of the last 15 awards between them — the greatest rivalry in football history!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'Asian Cup'}, question:'Which country has won the AFC Asian Cup (Asia\'s major international tournament) the most times?', options:['Japan','South Korea','Saudi Arabia'], answer:'Japan', fact:'🇯🇵 Japan have won the AFC Asian Cup 4 times (1992, 2000, 2004, 2011) — more than any other country. Their blue-collar qualifying record and technical football have made them Asia\'s most consistent team!' },
  { level:2, visual:{type:'flag',code:'fr',label:'PSG'}, question:'Which Qatari entity bought Paris Saint-Germain in 2011, transforming them into one of Europe\'s wealthiest clubs?', options:['Qatar Sports Investments (QSI)','Qatar National Bank','Qatar Airways'], answer:'Qatar Sports Investments (QSI)', fact:'💰 Qatar Sports Investments took over PSG in 2011, investing hundreds of millions in transfer fees. They signed Thiago Silva, Zlatan Ibrahimović, Neymar, Messi and Mbappé — completely transforming French football!' },
  { level:2, visual:{type:'emoji',emoji:'⚽',label:'Inverted Winger'}, question:'What is an "inverted winger" in modern football tactics?', options:['A winger on their "wrong" side who cuts inside onto their stronger foot','A winger who defends more than they attack','A winger who stays very wide at all times'], answer:'A winger on their "wrong" side who cuts inside onto their stronger foot', fact:'⚽ Inverted wingers (like Messi on the right at Barcelona, or Robben at Bayern/Madrid) play on their weaker side, cutting inside to shoot with their dominant foot — creating unpredictability!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Treble Teams'}, question:'Who managed Manchester City to their historic 2023 treble (Premier League, FA Cup and Champions League)?', options:['Pep Guardiola','José Mourinho','Jürgen Klopp'], answer:'Pep Guardiola', fact:'🩵 Pep Guardiola led City to the 2023 treble — their first ever Champions League title. Rodri scored the winner in the Istanbul final vs Inter Milan. It was Guardiola\'s 3rd UCL title as a manager!' },
  { level:2, visual:{type:'flag',code:'ng',label:'Nigeria'}, question:'Which Nigerian winger known as "Jay-Jay" is considered one of Africa\'s greatest ever players?', options:['Jay-Jay Okocha','Nwankwo Kanu','Rashidi Yekini'], answer:'Jay-Jay Okocha', fact:'🇳🇬 Austin "Jay-Jay" Okocha was famous for his extraordinary dribbling and tricks — once scoring a goal against Oliver Kahn while playing for Eintracht Frankfurt. "So good they named him twice!"' },
  { level:2, visual:{type:'flag',code:'cm',label:'Cameroon'}, question:'Roger Milla was a Cameroon striker known for dancing around the corner flag when he scored — at what age did he score at the 1994 World Cup?', options:['42','38','35'], answer:'42', fact:'🎉 Roger Milla was 42 years old when he scored at the 1994 World Cup — becoming the oldest World Cup goal scorer ever. His corner flag celebrations at the 1990 World Cup were one of its defining images!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Europa League Records'}, question:'Which club has won the UEFA Europa League / UEFA Cup the most times?', options:['Sevilla','Liverpool','Chelsea'], answer:'Sevilla', fact:'🟡🔴 Sevilla have won the Europa League a remarkable 7 times (2006, 2007, 2014, 2015, 2016, 2020, 2023) — the most of any club. They are so dominant in the competition they\'re known as "Kings of the Europa League"!' },
  { level:2, visual:{type:'flag',code:'de',label:'Germany'}, question:'Germany\'s record 7-1 win over Brazil at the 2014 World Cup is called the "Mineirazo" — in which city was the match played?', options:['Belo Horizonte','São Paulo','Rio de Janeiro'], answer:'Belo Horizonte', fact:'😱 The Mineirão stadium in Belo Horizonte (hence "Mineirazo") was the scene of Brazil\'s worst ever defeat. Germany scored 4 goals in 6 first-half minutes. Brazil\'s Neymar was injured and David Luiz wept!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'World Cup Hosts 1958'}, question:'Which country hosted the 1958 FIFA World Cup where 17-year-old Pelé became a global star?', options:['Sweden','Norway','Denmark'], answer:'Sweden', fact:'🇸🇪 Sweden hosted the 1958 World Cup and reached the final as hosts. They lost 5-2 to Brazil, who unveiled the teenage Pelé to the world. It remains Sweden\'s best ever World Cup result!' },
  { level:2, visual:{type:'emoji',emoji:'🔢',label:'League Formats'}, question:'What is "relegation" in football leagues?', options:['The bottom clubs are moved down to the division below at the end of the season','The penalty for a club that cheats in a match','An automatic ban from European competition'], answer:'The bottom clubs are moved down to the division below at the end of the season', fact:'⬇️ Relegation is one of football\'s unique features — unlike most US sports, poor-performing clubs can drop down a division. The threat of relegation makes every game matter!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Gordon Banks'}, question:'Gordon Banks made a save in 1970, often called "the greatest save ever" — against which player?', options:['Pelé','Johan Cruyff','Eusébio'], answer:'Pelé', fact:'🧤 Pelé headed the ball down and towards goal at full pace — then Gordon Banks somehow got down to scoop it over the bar. Pelé himself called it "the greatest save I have ever seen"!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Johan Cruyff'}, question:'Johan Cruyff famously refused to play at the 1978 World Cup — which country did he refuse to represent?', options:['Netherlands','Ajax','Barcelona'], answer:'Netherlands', fact:'🇳🇱 Cruyff refused to participate in the 1978 World Cup (which Netherlands reached the final of). He cited personal security concerns but many believe it was a political statement about Argentina\'s military dictatorship!' },

  // ── ADDITIONAL MEDIUM Level 2 (continued) ────────────────────────────────
  { level:2, visual:{type:'flag',code:'es',label:'Spain Euro 2008'}, question:'Who was the Spain manager when they won their first major tournament (Euro 2008)?', options:['Luis Aragonés','Vicente del Bosque','Julen Lopetegui'], answer:'Luis Aragonés', fact:'🇪🇸 Luis Aragonés built Spain\'s golden generation and led them to Euro 2008 — their first tournament win in 44 years. He retired and Vicente del Bosque took over, winning the World Cup (2010) and Euro (2012)!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Serie A Scandal'}, question:'In the Calciopoli scandal of 2006, Juventus were relegated to Serie B — which other clubs were punished?', options:['AC Milan, Fiorentina and Lazio (points deductions)','Inter Milan and Roma','Napoli and Sampdoria'], answer:'AC Milan, Fiorentina and Lazio (points deductions)', fact:'⚖️ The 2006 Calciopoli match-fixing scandal rocked Italian football. Juventus were stripped of 2 titles and relegated. AC Milan, Fiorentina and Lazio received points deductions. Inter Milan (also investigated) were cleared!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Ronaldinho Barcelona'}, question:'Ronaldinho won the Ballon d\'Or in 2005 while playing for which club?', options:['Barcelona','AC Milan','PSG'], answer:'Barcelona', fact:'🎪 Ronaldinho\'s 2005 Ballon d\'Or came during his stunning peak at Barcelona. His chemistry with Messi (then a teenager) was magical. In a 2005 Clásico he received a standing ovation from the Bernabéu crowd!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Champions League Group Stage'}, question:'How many teams are in the UEFA Champions League group stage (in the traditional pre-2024 format)?', options:['32','24','48'], answer:'32', fact:'🏆 The traditional Champions League group stage had 32 teams in 8 groups of 4. The format changed in 2024-25 to a league phase with 36 teams — a major overhaul of the competition structure!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'World Cup 2002 Top Scorer'}, question:'Who won the Golden Boot at the 2002 FIFA World Cup with 8 goals?', options:['Ronaldo Nazário','Miroslav Klose','Jon Dahl Tomasson'], answer:'Ronaldo Nazário', fact:'⚡ Ronaldo scored 8 goals at the 2002 World Cup — including 2 in the final against Germany — to win the Golden Boot. He had 15 World Cup goals overall, which stood as the record until Klose passed him!' },
  { level:2, visual:{type:'flag',code:'br',label:'Brazil 1970'}, question:'Brazil\'s 1970 World Cup squad is widely considered the greatest team ever — who scored their 4th goal in the final vs Italy?', options:['Carlos Alberto','Pelé','Jairzinho'], answer:'Carlos Alberto', fact:'🇧🇷 Carlos Alberto\'s thunderous finish to cap a flowing 4-1 win over Italy in the 1970 final — after a move involving most of the team — is considered the greatest team goal in World Cup history!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'Messi World Cup'}, question:'Messi captained Argentina at his first World Cup (2006) — what round did they reach?', options:['Quarter-finals (lost to Germany on penalties)','Semi-finals','Round of 16'], answer:'Quarter-finals (lost to Germany on penalties)', fact:'🇦🇷 In 2006, Messi was only 18. Argentina beat Serbia, Ivory Coast and the Netherlands before losing to Germany on penalties. Messi started the tournament as a super-sub, bursting onto the world stage!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Copa del Rey Final 2014'}, question:'Which famous Bale goal won Real Madrid the 2014 Copa del Rey against Barcelona?', options:['A solo run goal from inside his own half, outpacing Barcelońa\'s defence','A long-range free kick','A bicycle kick'], answer:'A solo run goal from inside his own half, outpacing Barcelońa\'s defence', fact:'⚡ Gareth Bale picked up the ball near halfway, outsprinted Marc Bartra and curled a finish past Valdés. The BBC (Bale, Benzema, Cristiano) era at Real Madrid was truly born that night!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Manchester City'}, question:'Manchester City\'s Sergio Agüero scored the most dramatic title-winning goal ever in the Premier League — in which minute?', options:['90+3 minutes','90 minutes','88 minutes'], answer:'90+3 minutes', fact:'🩵 "Agüerooooooo!" — Sergio Agüero\'s 93:20 minute goal vs QPR won Manchester City the 2012 Premier League title on goal difference from Manchester United. Martin Tyler\'s commentary became legendary!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Ronaldo Goals'}, question:'Cristiano Ronaldo became the first player to score 100 international goals — for which country?', options:['Portugal','Spain','Italy'], answer:'Portugal', fact:'🇵🇹 Ronaldo reached 100 international goals for Portugal — then kept going! He has over 130 goals internationally — a men\'s all-time record. He scored his 100th in a 2021 World Cup qualifier against Sweden!' },
  { level:2, visual:{type:'emoji',emoji:'🎯',label:'Pressing Record'}, question:'What is a "pressing trap" in modern football tactics?', options:['Deliberately showing the opponent a pass then aggressively pressing when they take it','A defensive foul to stop a counter-attack','When a goalkeeper presses high to intercept through balls'], answer:'Deliberately showing the opponent a pass then aggressively pressing when they take it', fact:'🧠 A pressing trap lures opponents into a position where they\'re vulnerable — showing them a pass option, then swarming them the moment they take it. Teams like RB Leipzig and Liverpool use it to devastating effect!' },
