  { level:2, visual:{type:'flag',code:'gb',label:'Chelsea'}, question:'Chelsea won back-to-back Champions League titles — in which years?', options:['They have NOT won back-to-back UCL titles — they won in 2012 and 2021','2012 and 2013','2019 and 2021'], answer:'They have NOT won back-to-back UCL titles — they won in 2012 and 2021', fact:'🔵 Chelsea won the Champions League in 2012 (beating Bayern Munich on penalties) and 2021 (beating Manchester City 1-0). Both times they had Thomas Tuchel (2021) and Roberto Di Matteo (2012) managing them!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Haaland Records'}, question:'Erling Haaland scored 36 Premier League goals in a single season (2022-23) — breaking whose record?', options:['Mohamed Salah\'s record of 32','Alan Shearer\'s record of 31','Thierry Henry\'s record of 30'], answer:'Mohamed Salah\'s record of 32', fact:'💥 Erling Haaland smashed Mohamed Salah\'s Premier League single-season record of 32 goals (set in 2017-18) by scoring an astonishing 36 in just 35 league games in 2022-23!' },
  { level:2, visual:{type:'flag',code:'es',label:'Guardiola'}, question:'Pep Guardiola\'s Barcelona won the Champions League twice — in 2009 the final was vs Manchester United. What was the score?', options:['2-0 (Barcelona beat Man United)','3-1 to Barcelona','1-0 to Barcelona'], answer:'2-0 (Barcelona beat Man United)', fact:'🔵🔴 Barcelona beat Manchester United 2-0 in Rome in the 2009 UCL final with goals from Eto\'o and Messi. United had beaten Barca in the 1999 semi-final — this was revenge for Xavi, Iniesta and company!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'AFCON 2022'}, question:'Which country unexpectedly won the 2021 Africa Cup of Nations (held in 2022), beating Egypt in the final?', options:['Senegal','Morocco','Cameroon'], answer:'Senegal', fact:'🇸🇳 Senegal won their first ever AFCON title in 2021 (held in January 2022), beating Egypt on penalties. Liverpool\'s Sadio Mané missed a penalty in normal time then scored the winning penalty in the shootout!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Leicester 2016'}, question:'Leicester City won the Premier League in 2015-16 at odds of 5000-1. Who was their manager?', options:['Claudio Ranieri','Nigel Pearson','Brendan Rodgers'], answer:'Claudio Ranieri', fact:'🦊 Italian manager Claudio Ranieri led Leicester City to the most unexpected title in Premier League history. Jamie Vardy broke the record for scoring in consecutive matches (11 games) that season!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Fernando Torres'}, question:'Fernando Torres scored the winning goal in the Euro 2008 final for Spain vs Germany — what was the final score?', options:['1-0','2-0','2-1'], answer:'1-0', fact:'🇪🇸 Torres chased down a Xavi through-ball and coolly slotted past Jens Lehmann to score the only goal. "El Niño" was the most feared striker in Europe in 2008 — before his form mysteriously declined at Chelsea!' },
  { level:2, visual:{type:'flag',code:'br',label:'Romário'}, question:'Brazilian striker Romário claimed to have scored 1000 career goals — how many official international goals did he score?', options:['55 goals','70 goals','46 goals'], answer:'55 goals', fact:'🇧🇷 Romário scored 55 official international goals for Brazil. He was the star of their 1994 World Cup winning team. His prolific partnership with Bebeto was iconic — including the famous "baby rocking" celebration!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Wenger Arsenal'}, question:'Arsène Wenger managed Arsenal for how many years?', options:['22 years (1996-2018)','15 years','18 years'], answer:'22 years (1996-2018)', fact:'🔴 Arsène Wenger managed Arsenal from October 1996 to May 2018 — 22 years. He won 3 Premier League titles, 7 FA Cups and revolutionised English football\'s approach to nutrition, training and international recruitment!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Messi Barcelona'}, question:'In which season did Messi score an unprecedented 50 La Liga goals?', options:['2011-12','2009-10','2014-15'], answer:'2011-12', fact:'🐐 Messi scored 50 La Liga goals in the 2011-12 season — a record that may never be broken. He also scored 73 goals in all competitions that season, and won his 4th consecutive Ballon d\'Or!' },
  { level:2, visual:{type:'emoji',emoji:'🔵',label:'Manchester City Treble'}, question:'Manchester City\'s historic 2022-23 treble — who scored the Champions League final winning goal?', options:['Rodri','Kevin De Bruyne','Erling Haaland'], answer:'Rodri', fact:'🩵 Rodri\'s volley beat Ederson (in the Inter Milan goal) to give City their first ever Champions League title. The match was tense — City had only one shot on target but it was the one that counted!' },
  { level:2, visual:{type:'flag',code:'de',label:'Joachim Löw'}, question:'Joachim Löw managed Germany for how many years, including the 2014 World Cup triumph?', options:['15 years (2006-2021)','10 years','12 years'], answer:'15 years (2006-2021)', fact:'🇩🇪 Löw was Germany\'s manager from 2006 to 2021 — 15 years. His most memorable achievement was the 2014 World Cup win, but he also led them to the 2010 World Cup semi-final and Euro 2008 and 2012 finals!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1962'}, question:'Brazil won the 1962 World Cup in Chile without Pelé for most of the tournament — which player stepped up to become the star?', options:['Garrincha','Vavá','Didi'], answer:'Garrincha', fact:'🇧🇷 Garrincha (Manuel Francisco dos Santos) was unstoppable after Pelé\'s early injury — he scored 4 goals and set up countless more. He never lost an international match — an extraordinary statistic!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'Messi Copa America'}, question:'In which year did Messi finally win the Copa América with Argentina, ending a long wait for international glory?', options:['2021','2019','2015'], answer:'2021', fact:'🇦🇷 Argentina beat Brazil 1-0 in the 2021 Copa América final at the Maracanã — of all places! Ángel Di María scored the only goal. It was Messi\'s first major international title after 3 Copa América final losses!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Liverpool'}, question:'Which Liverpool player won the Ballon d\'Or in 2019, finishing the year with the Champions League and World Cup titles?', options:['Luka Modrić won it in 2018, not a Liverpool player','Virgil van Dijk — he came 2nd to Luka Modrić','Mohamed Salah'], answer:'Virgil van Dijk — he came 2nd to Luka Modrić', fact:'🔴 Virgil van Dijk finished 2nd in the 2019 Ballon d\'Or (behind Messi). He came very close to winning it after Liverpool\'s Champions League triumph and his key role. His arrival transformed Liverpool\'s defence!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1978 Final'}, question:'Mario Kempes scored twice in the 1978 World Cup final to win for Argentina — against which country?', options:['Netherlands','West Germany','Brazil'], answer:'Netherlands', fact:'🇦🇷 Mario Kempes scored twice (including in extra time) as Argentina beat the Netherlands 3-1. Kempes was the tournament\'s top scorer with 6 goals. Argentina played in front of a sea of ticker tape at the Monumental stadium!' },
  { level:2, visual:{type:'emoji',emoji:'📊',label:'Tactical Formation'}, question:'What formation does the number "3-5-2" describe?', options:['3 defenders, 5 midfielders, 2 strikers','3 forwards, 5 midfielders, 2 defenders','5 defenders, 3 midfielders, 2 strikers'], answer:'3 defenders, 5 midfielders, 2 strikers', fact:'📋 3-5-2 uses 3 centre-backs and 2 wing-backs to give width. 5 players control the midfield and 2 strikers press and score. Italy used it brilliantly in the 1990s, and Chelsea won the 2016-17 Premier League with it!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Netherlands Euro 1988'}, question:'Which Dutch player won the Golden Boot at Euro 1988 with 5 goals?', options:['Marco van Basten','Ruud Gullit','Frank Rijkaard'], answer:'Marco van Basten', fact:'🇳🇱 Van Basten scored 5 goals including the stunning volley in the final — and also won the Ballon d\'Or in 1988, 1989 and 1992. He is widely regarded as one of the greatest strikers in football history!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2006 Golden Boot'}, question:'Who won the Golden Boot at the 2006 World Cup in Germany with 5 goals and 3 assists?', options:['Miroslav Klose','Ronaldo (Brazil)','Thierry Henry'], answer:'Miroslav Klose', fact:'⚽ Klose won the 2006 Golden Boot with 5 goals as Germany reached the semi-finals on home soil. He went on to become the World Cup\'s all-time top scorer with 16 goals across 4 tournaments!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Blackburn Rovers'}, question:'Which English club won the Premier League in 1994-95, ending Manchester United\'s dominance — funded by local businessman Jack Walker?', options:['Blackburn Rovers','Newcastle United','Leeds United'], answer:'Blackburn Rovers', fact:'🔵⚪ Jack Walker spent over £30 million on Blackburn Rovers, buying Alan Shearer and Chris Sutton (the "SAS"). They pipped Manchester United on the final day despite losing to Liverpool. A true fairytale!' },
  { level:2, visual:{type:'emoji',emoji:'🔴',label:'Liverpool 1984'}, question:'Liverpool won the European Cup (Champions League) in 1984 against Roma in Roma\'s own stadium — how did Liverpool win?', options:['On penalties after a 1-1 draw','2-1 after extra time','3-0 in regular time'], answer:'On penalties after a 1-1 draw', fact:'🔴 Liverpool won on penalties at the Stadio Olimpico in Rome against AS Roma. Phil Neal and Alan Kennedy converted the key penalties. It was Liverpool\'s 4th European Cup in 8 years — their golden era!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2010 Golden Boot'}, question:'Who won the Golden Boot at the 2010 World Cup with 5 goals?', options:['Thomas Müller','Wesley Sneijder','Miroslav Klose'], answer:'Thomas Müller', fact:'🇩🇪 Thomas Müller scored 5 goals and provided 3 assists at the 2010 World Cup — winning the Golden Boot and Best Young Player award. He repeated the Golden Boot feat in 2014, finishing as joint top scorer!' },
  { level:2, visual:{type:'flag',code:'it',label:'Italy'}, question:'Italy\'s Andrea Pirlo was famous for which specific skill that made him one of football\'s most elegant players?', options:['Exceptional deep-lying playmaking and passing vision','Spectacular long-range shooting','Speed and direct dribbling'], answer:'Exceptional deep-lying playmaking and passing vision', fact:'🇮🇹 Pirlo revolutionised the "regista" (deep-lying playmaker) role at both AC Milan and Juventus. His passing range, vision and set-piece delivery made him Italy\'s metronome — elegance personified!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Arsenal 1989'}, question:'Arsenal won the 1988-89 First Division title dramatically in the final seconds — against which team and what was the final score needed?', options:['Liverpool at Anfield, needing to win 2-0','Manchester United, needing a draw','Tottenham, winning 1-0'], answer:'Liverpool at Anfield, needing to win 2-0', fact:'🔴 Michael Thomas scored in injury time to give Arsenal a 2-0 win at Anfield — the exact scoreline they needed to take the title from Liverpool on goals scored. "It\'s up for grabs now!" — Brian Moore. One of football\'s greatest moments!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1982'}, question:'The 1982 World Cup introduced which stage to the tournament format for the first time?', options:['A second group stage (replacing knockout round of 16)','A third-place play-off','The penalty shootout for knockout matches'], answer:'A second group stage (replacing knockout round of 16)', fact:'📋 The 1982 World Cup in Spain expanded to 24 teams and used a second group stage (3 groups of 4, with top 2 advancing to semi-finals) instead of a round of 16. Italy\'s Paolo Rossi became the tournament hero!' },
  { level:2, visual:{type:'flag',code:'fr',label:'Thierry Henry'}, question:'How many Premier League goals did Thierry Henry score for Arsenal — making him their all-time top scorer?', options:['175','228','200'], answer:'175', fact:'🇫🇷 Thierry Henry scored 175 Premier League goals for Arsenal (out of 228 in all competitions). He was Premier League top scorer (Golden Boot) 4 times. Despite leaving for Barcelona in 2007, he returned for a short loan spell in 2012!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Ajax 1971-73'}, question:'Ajax won 3 consecutive European Cups from 1971 to 1973 — who was their manager?', options:['Rinus Michels then Stefan Kovács','Johan Cruyff as player-manager','Leo Beenhakker'], answer:'Rinus Michels then Stefan Kovács', fact:'🟥⬜ Rinus Michels won the 1971 European Cup with Ajax then left for Barcelona. Romanian Stefan Kovács took over and won the 1972 and 1973 titles — continuing the Total Football philosophy with Johan Cruyff leading the team!' },
  { level:2, visual:{type:'flag',code:'de',label:'Germany Euro 1996'}, question:'Oliver Bierhoff scored the first ever "golden goal" in a major tournament final at Euro 1996 — against which country?', options:['Czech Republic','France','England'], answer:'Czech Republic', fact:'🇩🇪 Germany beat the Czech Republic 2-1 in the Euro 1996 final. Bierhoff\'s golden goal in extra time was the first ever scored in a European Championship final. Germany\'s Matthias Sammer won the Golden Ball that tournament!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'UCL Format'}, question:'The Champions League moved to a new "league phase" format in 2024-25 — how many clubs now participate in the league phase?', options:['36','32','40'], answer:'36', fact:'🏆 The 2024-25 Champions League revamped its format to a 36-team league phase where every team plays 8 games against different opponents. It replaced the traditional 32-team group stage of 8 groups of 4!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2014 Final'}, question:'Who scored Germany\'s only goal in the 2014 World Cup final against Argentina?', options:['Mario Götze','Thomas Müller','Miroslav Klose'], answer:'Mario Götze', fact:'🇩🇪 Mario Götze, who came on as a substitute, controlled the ball on his chest and volleyed home in extra time to beat Sergio Romero. Klinsman\'s instruction to Götze was "Show the world you\'re better than Messi!"' },
  { level:2, visual:{type:'emoji',emoji:'📜',label:'Ronaldo Stats'}, question:'In which season did Cristiano Ronaldo score 60 goals in all competitions for Real Madrid — a then-record for a single club season?', options:['2011-12','2014-15','2009-10'], answer:'2011-12', fact:'⚽ Ronaldo scored 60 goals for Real Madrid in 2011-12 — the same season Messi scored 73 goals for Barcelona! The two greatest players in history pushed each other to extraordinary heights!' },
  { level:2, visual:{type:'flag',code:'de',label:'Germany'}, question:'Germany lost in the group stage of the 2018 World Cup as defending champions — which team eliminated them?', options:['South Korea','Mexico','Sweden'], answer:'South Korea', fact:'😱 South Korea beat Germany 2-0 in the final group game to eliminate the holders. Goalkeeper Neuer pushed forward in search of a goal and was caught out — Germany suffered one of football\'s greatest upsets!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'AC Milan Champions League'}, question:'AC Milan won the Champions League in 2007, beating Liverpool 2-1 — which player scored a stunning long-range volley?', options:['Filippo Inzaghi (no — he scored twice with scruffy goals)','Clarence Seedorf scored a wonder goal','Filippo Inzaghi scored both goals'], answer:'Filippo Inzaghi scored both goals', fact:'🔴⚫ "Lucky" Inzaghi scored twice with two scruffy goals — a hand deflection and a tap-in — to win 2-1. Dirk Kuyt pulled one back for Liverpool. Milan avenged their "Miracle of Istanbul" defeat 2 years earlier!' },
  { level:2, visual:{type:'flag',code:'ar',label:'Maradona Career'}, question:'At which English club did Diego Maradona have a brief spell before his legendary career at Napoli?', options:['He never played in England — he went from Boca Juniors to Barcelona to Napoli','Liverpool','Tottenham Hotspur'], answer:'He never played in England — he went from Boca Juniors to Barcelona to Napoli', fact:'🇦🇷 Maradona never played in England! His club career went: Argentinos Juniors → Boca Juniors → Barcelona → Napoli → Sevilla → Newell\'s Old Boys → Boca Juniors again. Barcelona paid a then-world record £5m for him in 1982!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Robben Career'}, question:'Dutch winger Arjen Robben won the Champions League with which club in 2013?', options:['Bayern Munich','Chelsea','Real Madrid'], answer:'Bayern Munich', fact:'🦁 Arjen Robben scored the winner vs Borussia Dortmund in the 2013 Champions League final — an all-German affair at Wembley. Robben had famously missed a penalty in the 2012 final vs Chelsea — redemption!' },
  { level:2, visual:{type:'emoji',emoji:'🏅',label:'Spain 2012 Euro'}, question:'Spain\'s Euro 2012 win was a record — they beat Italy 4-0 in the final. Which player won the Golden Boot?', options:['Fernando Torres','David Villa','Cesc Fàbregas'], answer:'Fernando Torres', fact:'🇪🇸 Fernando Torres won the Euro 2012 Golden Boot with 3 goals. His individual form had been poor at Chelsea but he rediscovered himself with Spain. Spain\'s 4-0 final win remains the biggest winning margin in a European final!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Ronaldo Juventus'}, question:'Cristiano Ronaldo joined Juventus from Real Madrid in 2018 for approximately how much?', options:['€100 million','€222 million','€65 million'], answer:'€100 million', fact:'💰 Real Madrid sold Ronaldo to Juventus for €100 million — a fee that surprised many since he was 33 at the time. He went on to score 101 goals in 134 games for Juventus, winning 2 Serie A titles!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'Copa America Records 2'}, question:'How many times has Argentina won the Copa América in total (as of 2024)?', options:['16 times','15 times','14 times'], answer:'16 times', fact:'🇦🇷 Argentina won their record 16th Copa América in 2024, making them the outright most successful nation in the tournament\'s history, edging ahead of Uruguay (15 titles). Messi captained them through 2021 and 2024!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Ibrahimovic Goals'}, question:'Zlatan Ibrahimović scored a stunning bicycle kick for Sweden vs England in 2012 — what was particularly remarkable about it?', options:['It was from 30 yards out in the 90th minute — a hat-trick goal to win 4-2','He scored it with his weaker foot','The goal stood despite the ball going out of play first'], answer:'It was from 30 yards out in the 90th minute — a hat-trick goal to win 4-2', fact:'🦁 Ibrahimović\'s overhead kick vs England in November 2012 from 25 yards is considered one of football\'s greatest ever goals. He scored all 4 in a 4-2 win at Friends Arena. He called it "a Zlatan goal" — only he could score it!' },
  { level:2, visual:{type:'flag',code:'de',label:'Bundesliga Record'}, question:'What is the record for most goals scored by an individual in a single Bundesliga match?', options:['5 goals (achieved by several players)','6 goals','7 goals'], answer:'5 goals (achieved by several players)', fact:'⚽ Five goals in a single Bundesliga match is the highest individual tally — achieved multiple times, including by Robert Lewandowski. The most famous was Lewandowski\'s 5 goals in 9 minutes as a substitute for Bayern vs Wolfsburg in 2015!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'Premier League 2020'}, question:'Liverpool\'s 2019-20 Premier League title ended a wait of how many years without winning the English top division?', options:['30 years','25 years','20 years'], answer:'30 years', fact:'🔴 Liverpool\'s 2020 Premier League title ended a 30-year wait — their last league title was in 1990 under Kenny Dalglish. Jürgen Klopp\'s team finished with 99 points. The title was clinched when Chelsea beat Manchester City!' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'AFCON 2019'}, question:'Which country won the 2019 Africa Cup of Nations, defeating Senegal in the final?', options:['Algeria','Morocco','Tunisia'], answer:'Algeria', fact:'🇩🇿 Algeria won AFCON 2019 in Egypt, beating Senegal 1-0 in the final thanks to an early goal from Baghdad Bounedjah. It was Algeria\'s second AFCON title after 1990. Manchester City\'s Riyad Mahrez was their standout player!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'UCL Final 2003'}, question:'The 2003 Champions League final was an all-Serie A affair — which two Italian clubs played and who won?', options:['AC Milan beat Juventus on penalties (0-0 after ET)','Inter Milan beat AC Milan','Juventus beat Roma'], answer:'AC Milan beat Juventus on penalties (0-0 after ET)', fact:'🔴⚫ The 2003 UCL final in Manchester was goalless after 120 minutes — then AC Milan beat Juventus on penalties. It remains the only all-Italian European Cup final. Milan\'s goalkeeper Dida was the hero!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Wayne Rooney'}, question:'Wayne Rooney was Manchester United and England\'s all-time top scorer — how many goals did he score for England?', options:['53 goals','68 goals','45 goals'], answer:'53 goals', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Wayne Rooney scored 53 goals for England — breaking Bobby Charlton\'s record. He became a United regular at 16 and scored for United 253 times — the club\'s all-time record. He made his England debut at just 17!' },
  { level:2, visual:{type:'flag',code:'fr',label:'Karim Benzema'}, question:'Karim Benzema won the 2022 Ballon d\'Or — how many Champions League titles did he win with Real Madrid?', options:['5 Champions League titles (2014, 2016, 2017, 2018, 2022)','4','3'], answer:'5 Champions League titles (2014, 2016, 2017, 2018, 2022)', fact:'⚽ Benzema won 5 Champions League titles with Real Madrid — more than any other outfield player (alongside Casemiro, Modric and Kroos). His 2021-22 campaign — 15 UCL goals — was one of the greatest individual European performances ever!' },
  { level:2, visual:{type:'emoji',emoji:'📊',label:'Goals Per Game Record'}, question:'Which English club set the Premier League record for most goals scored in a single season with 106 goals in 2017-18?', options:['Manchester City','Liverpool','Manchester United'], answer:'Manchester City', fact:'💥 Manchester City scored 106 goals in the 2017-18 Premier League season — breaking Chelsea\'s previous record of 103. They averaged nearly 3 goals per game. De Bruyne, Sane, Sterling and Agüero were irresistible!' },
  { level:2, visual:{type:'emoji',emoji:'🏆',label:'European Cup History'}, question:'The European Cup (now Champions League) was first held in 1955-56 — which club won the inaugural tournament?', options:['Real Madrid','Barcelona','Hibernian (Scotland)'], answer:'Real Madrid', fact:'🏆 Real Madrid won the inaugural European Cup in 1956, beating Stade de Reims 4-3 in the final in Paris. They then won it 4 more times in a row (1957, 1958, 1959, 1960) — 5 consecutive European Cups! Alfredo Di Stéfano was their star.' },
  { level:2, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1966 Format'}, question:'The 1966 World Cup is famous for England winning — but also for a controversial goal. What was the controversy?', options:['Geoff Hurst\'s second goal: did the ball fully cross the line? Russian linesman said yes','A player scored with his hand in extra time','The German team used illegal boots'], answer:'Geoff Hurst\'s second goal: did the ball fully cross the line? Russian linesman said yes', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Hurst\'s shot hit the crossbar and bounced down — the linesman Tofik Bakhramov ruled it had crossed the line. Germany still debate it today — modern analysis suggests it may not have fully crossed. England won 4-2!' },
  { level:2, visual:{type:'emoji',emoji:'🌟',label:'Messi PSG'}, question:'When Lionel Messi left Barcelona in 2021, which club had he scored the most goals against in his career?', options:['Sevilla','Real Madrid','Valencia'], answer:'Sevilla', fact:'🐐 Messi scored more goals against Sevilla than any other club during his Barcelona career — exploiting them regularly in La Liga. His record against Real Madrid in El Clásico (26 goals) is also extraordinary!' },
  { level:2, visual:{type:'flag',code:'gb',label:'Wembley 1923'}, question:'The first FA Cup final at the old Wembley in 1923 (the "White Horse Final") saw a famous incident — what happened?', options:['Hundreds of thousands of fans invaded the pitch and a white police horse cleared them','The goalposts collapsed mid-match','A horse-drawn carriage was used to escort the players onto the pitch'], answer:'Hundreds of thousands of fans invaded the pitch and a white police horse cleared them', fact:'🐎 An estimated 300,000 fans attended the 1923 FA Cup final (capacity was 127,000). Fans spilled onto the pitch and a white police horse named Billy helped clear the crowd. Bolton Wanderers beat West Ham 2-0!' },
  { level:2, visual:{type:'emoji',emoji:'🎖️',label:'Golden Glove'}, question:'What is the Golden Glove (Yashin Award) given for at the FIFA World Cup?', options:['The best goalkeeper of the tournament','The fewest goals conceded','The most saves made'], answer:'The best goalkeeper of the tournament', fact:'🧤 The Yashin Award (Golden Glove) is given to the best goalkeeper at the World Cup — named in honour of legendary Soviet goalkeeper Lev Yashin. Recent winners include Manuel Neuer (2014) and Emiliano Martínez (2022)!' },
  { level:1, visual:{type:'emoji',emoji:'🏅',label:'Best Young Player'}, question:'What is the FIFA Young Player Award at the World Cup called?', options:['The Best Young Player Award','The Golden Youth Award','The Silver Ball'], answer:'The Best Young Player Award', fact:'🌟 The Best Young Player Award is given to the outstanding young player (under 21) at the World Cup. Past winners include Thomas Müller (2010), Paul Pogba (2014), Kylian Mbappé (2018) and Enzo Fernández (2022)!' },
  { level:1, visual:{type:'emoji',emoji:'📺',label:'Most Watched Match'}, question:'The FIFA World Cup final is regularly considered which global sporting event?', options:['The most watched single sporting event in the world','The second most watched after the Olympics Opening Ceremony','The third most watched after the Super Bowl'], answer:'The most watched single sporting event in the world', fact:'📺 The FIFA World Cup final is watched by over 1 billion people worldwide — making it the most watched single sporting event on Earth. The 2022 Qatar World Cup final attracted record-breaking viewership!' },
  { level:3, visual:{type:'emoji',emoji:'📐',label:'ABCD Formation'}, question:'What is the key difference between a 4-2-3-1 and a 4-3-3 formation?', options:['In 4-2-3-1, two defensive midfielders sit deeper with one attacking midfielder behind the striker; 4-3-3 uses three balanced midfielders','4-2-3-1 uses 2 strikers while 4-3-3 uses 3 wingers','Both are essentially the same formation'], answer:'In 4-2-3-1, two defensive midfielders sit deeper with one attacking midfielder behind the striker; 4-3-3 uses three balanced midfielders', fact:'📋 4-2-3-1 has a double pivot (2 defensive midfielders) protecting the defence, with 1 attacking midfielder as a playmaker. 4-3-3 has 3 midfielders of more equal responsibility. Many teams switch between the two!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1970 Format'}, question:'The 1970 World Cup introduced which feature that became standard in tournament football?', options:['Red and yellow cards','Penalty shootouts in knockout rounds','Substitutes allowed (2 per team)'], answer:'Red and yellow cards', fact:'🟨🟥 While substitutes were actually introduced in 1970 too, the most iconic innovation of 1970 was the introduction of red and yellow cards — invented by Ken Aston after the 1966 World Cup\'s confusion over bookings!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Copa Libertadores 2018'}, question:'The 2018 Copa Libertadores final between Boca Juniors and River Plate had to be moved from Buenos Aires — why?', options:['Boca\'s bus was attacked by River fans with tear gas, so the final moved to Madrid','River Park stadium was too small','Boca Juniors withdrew in protest'], answer:'Boca\'s bus was attacked by River fans with tear gas, so the final moved to Madrid', fact:'😱 The first leg was played, but before the second leg River Plate fans attacked the Boca team bus with gas and broken glass — injuring players. CONMEBOL controversially moved the final to the Bernabéu in Madrid. River Plate won 3-1!' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'Azteca Stadium'}, question:'The Azteca Stadium in Mexico City has hosted two FIFA World Cup finals (1970 and 1986) and a legendary Maradona goal — what is its official capacity?', options:['Approximately 87,000','About 120,000','About 60,000'], answer:'Approximately 87,000', fact:'🏟️ The Azteca holds around 87,523 fans — making it one of the largest stadiums in the Americas. It hosted both the 1970 and 1986 World Cup finals — the only stadium to do so twice. It will also host 2026 World Cup matches!' },

  // ── ADDITIONAL HARD (Level 3) ─────────────────────────────────────────────
  { level:3, visual:{type:'emoji',emoji:'📜',label:'First Club'}, question:'Sheffield FC was founded in 1857 — what year was the English Football Association (FA) established?', options:['1863','1857','1871'], answer:'1863', fact:'📜 The FA was founded on 26 October 1863 at the Freemasons\' Tavern in London. It established the first set of standardised football rules — the "Laws of the Game" that FIFA would later adopt!' },
  { level:3, visual:{type:'emoji',emoji:'📅',label:'FIFA Founded Year'}, question:'FIFA was founded in 1904 — but when did they hold their first World Cup?', options:['1930','1920','1924'], answer:'1930', fact:'🌍 FIFA waited 26 years after its founding to hold the first World Cup in 1930 in Uruguay. The idea was first proposed in the 1920s by Jules Rimet and Henri Delaunay!' },
  { level:3, visual:{type:'emoji',emoji:'✈️',label:'Munich Air Disaster'}, question:'The Munich Air Disaster of February 1958 tragically killed 8 Manchester United players — what was the flight trying to do?', options:['Return from a European Cup match in Belgrade','Travel to a World Cup qualifier','Fly to a pre-season tour'], answer:'Return from a European Cup match in Belgrade', fact:'✈️ The plane carrying Manchester United crashed on its third take-off attempt at Munich airport. 8 players died including Duncan Edwards. Matt Busby survived but was critically injured, then rebuilt the club.' },
  { level:3, visual:{type:'emoji',emoji:'😢',label:'Hillsborough 1989'}, question:'The Hillsborough disaster of April 1989 killed 97 Liverpool supporters — what type of event was occurring when it happened?', options:['An FA Cup semi-final between Liverpool and Nottingham Forest','A First Division league match','An FA Cup final at Wembley'], answer:'An FA Cup semi-final between Liverpool and Nottingham Forest', fact:'😢 The Hillsborough disaster occurred on 15 April 1989 when a crush killed 97 Liverpool supporters. It led to major safety reforms — standing terraces were banned at top English grounds, leading to all-seater stadiums.' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'Heysel 1985'}, question:'The 1985 Heysel Stadium disaster (39 deaths) caused all English clubs to be banned from European competition for how long?', options:['5 years (Liverpool for 6)','3 years','10 years'], answer:'5 years (Liverpool for 6)', fact:'🚫 The Heysel disaster — where a wall collapsed as Liverpool and Juventus fans clashed before the 1985 European Cup final — led to a 5-year UEFA ban on English clubs. Liverpool received a 6-year ban.' },
  { level:3, visual:{type:'emoji',emoji:'⚖️',label:'Bosman Ruling'}, question:'The 1995 Bosman ruling by the European Court of Justice revolutionised football — what did it allow?', options:['Players to move on a free transfer at the end of their contract','Players to earn unlimited wages','Clubs to field unlimited foreign players'], answer:'Players to move on a free transfer at the end of their contract', fact:'⚖️ Before Bosman, clubs could demand transfer fees even for out-of-contract players. Belgian player Jean-Marc Bosman sued and won — transforming football economics and giving players far more freedom!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Champions League Format'}, question:'The UEFA Champions League replaced the European Cup in 1992-93 — what was the key format change?', options:['Introduction of a group stage allowing multiple clubs per country','The final moved to a neutral venue','Penalty shootouts in group stages'], answer:'Introduction of a group stage allowing multiple clubs per country', fact:'🏆 The European Cup (founded 1955) was a straight knockout for national champions. The Champions League introduced a group stage and allowed multiple clubs from strong leagues — transforming European club football!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'Early Football'}, question:'Which country is credited with codifying football rules in the Laws of the Game, adopted by FIFA in 1886?', options:['England','Scotland','France'], answer:'England', fact:'📜 England\'s four football associations formed IFAB in 1886 and wrote the Laws of the Game. FIFA joined IFAB in 1913 and these laws are still the basis of football rules worldwide today!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'All-Time Top Scorer La Liga'}, question:'Who is the all-time top scorer in La Liga history?', options:['Lionel Messi','Cristiano Ronaldo','Raúl'], answer:'Lionel Messi', fact:'🐐 Messi has scored over 470 La Liga goals for Barcelona — more than any other player in the competition\'s history. He also won 10 La Liga titles with Barcelona!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'All-Time Top Scorer Bundesliga'}, question:'Who is the all-time top scorer in Bundesliga history?', options:['Gerd Müller','Robert Lewandowski','Karl-Heinz Rummenigge'], answer:'Gerd Müller', fact:'💣 "Der Bomber" Gerd Müller scored 365 Bundesliga goals for Bayern Munich between 1965-1979. Robert Lewandowski (313 goals) is the closest to his record but fell far short of Müller\'s tally!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'All-Time Serie A Top Scorer'}, question:'Who is the all-time top scorer in Serie A history?', options:['Silvio Piola','Francesco Totti','Gunnar Nordahl'], answer:'Silvio Piola', fact:'⚽ Silvio Piola scored 274 Serie A goals between 1929 and 1954 — a record that has stood for over 70 years. He also won the 1938 World Cup with Italy, scoring twice in the final!' },
  { level:3, visual:{type:'emoji',emoji:'💰',label:'Most Expensive Transfers'}, question:'Neymar\'s €222 million move to PSG in 2017 is the most expensive transfer ever — what was the second most expensive?', options:['Kylian Mbappé to Real Madrid for €180 million','Florentino Pérez to Chelsea','Paul Pogba to Manchester United for €105 million'], answer:'Kylian Mbappé to Real Madrid for €180 million', fact:'💰 Kylian Mbappé joined Real Madrid for around €180 million in 2024 after leaving PSG on a free transfer. The move was one of the most anticipated in football history — he had reportedly turned Real down in 2022!' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'World Cup Attendance Record'}, question:'What is the largest crowd ever to watch a football match, at the 1950 World Cup in Brazil?', options:['Approximately 200,000 (Maracanã, Uruguay vs Brazil)','150,000','Exactly 100,000'], answer:'Approximately 200,000 (Maracanã, Uruguay vs Brazil)', fact:'🏟️ An estimated 199,854 people packed the Maracanã for the 1950 World Cup final match between Uruguay and Brazil. It remains the largest ever crowd at a football match!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'Consecutive Unbeaten'}, question:'Arsenal\'s "Invincibles" went unbeaten for 49 Premier League games — which team eventually ended the run?', options:['Manchester United','Chelsea','Bolton Wanderers'], answer:'Manchester United', fact:'🔴 Arsenal\'s 49-game unbeaten run ended with a 2-0 defeat to Manchester United at Old Trafford in October 2004. Wayne Rooney and Ruud van Nistelrooy scored. Arsenal protested strongly after the match!' },
  { level:3, visual:{type:'emoji',emoji:'👦',label:'Youngest Goal Scorer'}, question:'Who is the youngest goalscorer in FIFA World Cup history, at 17 years 239 days in 1958?', options:['Pelé','Norman Whiteside','Kylian Mbappé'], answer:'Pelé', fact:'⭐ Pelé scored his first World Cup goal against Wales at age 17 years 239 days in 1958 — making him the youngest goalscorer in World Cup history. He went on to become football\'s greatest ever player!' },
  { level:3, visual:{type:'emoji',emoji:'⚡',label:'Fastest Goal'}, question:'What is the fastest ever goal recorded in a professional football match (approximately 2 seconds after kick-off)?', options:['Marc Burrows scored 2 seconds into a non-league match','Hakan Şükür\'s 11-second World Cup goal is the fastest top-level record','Roger Poulain scored 3 seconds into a French league match'], answer:'Hakan Şükür\'s 11-second World Cup goal is the fastest top-level record', fact:'⚡ At elite level, Hakan Şükür\'s 11-second goal at the 2002 World Cup is the fastest on record. In lower leagues, goals have reportedly been scored within 2 seconds of kick-off!' },
  { level:3, visual:{type:'emoji',emoji:'🟥',label:'Most Red Cards'}, question:'Which player holds the record for most red cards received in La Liga history?', options:['Pablo Alfaro','Sergio Ramos','Santi Cazorla'], answer:'Pablo Alfaro', fact:'🟥 Pablo Alfaro received 21 red cards during his La Liga career — a record. Sergio Ramos (26 total career red cards) is the most sent-off player in international football history!' },
  { level:3, visual:{type:'emoji',emoji:'🎩',label:'Hat-trick Record'}, question:'Who scored a hat-trick in just 69 seconds — the fastest in professional football history?', options:['Tommy Ross (Ross County, 1964)','Robbie Fowler (Liverpool)','Sadio Mané'], answer:'Tommy Ross (Ross County, 1964)', fact:'🎩 Tommy Ross of Ross County (Scotland) scored 3 goals in 90 seconds in 1964 — but the record officially recognised by Guinness is 69 seconds scored by Tommy Ross! Sadio Mané holds the Premier League record at 2:56.' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Club World Cup'}, question:'The FIFA Club World Cup was expanded to 32 clubs in 2025 — which club won the inaugural expanded edition?', options:['Real Madrid','Manchester City','Chelsea'], answer:'Real Madrid', fact:'🏆 Real Madrid won the inaugural expanded 32-team FIFA Club World Cup in 2025, held in the USA. The new format replaced the old 7-team tournament with clubs from all confederations competing!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'UEFA Super Cup'}, question:'What is the UEFA Super Cup?', options:['An annual match between the Champions League and Europa League winners','A cup for the top clubs in Europe before the season starts','A European version of a domestic super cup'], answer:'An annual match between the Champions League and Europa League winners', fact:'🏆 The UEFA Super Cup is held every August and pits the Champions League winner against the Europa League winner. Real Madrid have won it the most times among all clubs!' },
  { level:3, visual:{type:'emoji',emoji:'🌐',label:'CONCACAF Gold Cup'}, question:'What is the CONCACAF Gold Cup?', options:['The major international tournament for North and Central American and Caribbean nations','The top club tournament in North America','A youth tournament in Central America'], answer:'The major international tournament for North and Central American and Caribbean nations', fact:'🌎 The CONCACAF Gold Cup has been held since 1991. The USA and Mexico have dominated it — the USA have won it the most times. It determines CONCACAF\'s top international teams!' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'Oldest Competition'}, question:'The FA Cup was first held in 1871-72 — which is the oldest domestic football competition in the world?', options:['The FA Cup (England)','The Copa del Rey (Spain)','The Scottish Cup'], answer:'The FA Cup (England)', fact:'🏆 The FA Cup first played in 1871-72 is the oldest domestic football competition in the world. The first final was won by Wanderers FC 1-0 against Royal Engineers at the Kennington Oval!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Copa del Rey'}, question:'Which Spanish club has won the Copa del Rey (Spain\'s main domestic cup) the most times?', options:['Athletic Club (Bilbao)','Real Madrid','Barcelona'], answer:'Athletic Club (Bilbao)', fact:'🏆 Athletic Club from Bilbao have won the Copa del Rey 24 times — more than any other club. Remarkably, they only sign players from the Basque Country, yet remain one of Spain\'s most successful cup teams!' },
  { level:3, visual:{type:'emoji',emoji:'🇩🇪',label:'DFB Pokal'}, question:'What is the DFB-Pokal?', options:['Germany\'s main domestic cup competition','Germany\'s equivalent of the Champions League','A youth cup in Germany'], answer:'Germany\'s main domestic cup competition', fact:'🇩🇪 The DFB-Pokal (German Cup) was first held in 1935. Bayern Munich have won it the most times. Winning the league and DFB-Pokal in the same season is called the "Doubles" in Germany!' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'Hillsborough Legacy'}, question:'The Taylor Report following Hillsborough 1989 recommended what major change to English football stadiums?', options:['All top-division grounds must become all-seater','All grounds must have CCTV','Terracing must be reduced by 50%'], answer:'All top-division grounds must become all-seater', fact:'🏟️ Lord Justice Taylor\'s report led to all Premier League and Championship grounds becoming all-seater by 1994. This fundamentally changed English football\'s atmosphere but saved many lives by preventing crushes!' },
  { level:3, visual:{type:'emoji',emoji:'📐',label:'Advanced Offside'}, question:'Under the modern offside law, which body part can cause a player to be ruled offside?', options:['Any part of the body that can legally score a goal (except arms/hands)','Only the head or torso','Only the feet'], answer:'Any part of the body that can legally score a goal (except arms/hands)', fact:'⚖️ A player is offside if any part of their body that can score a goal (head, torso, legs — but NOT arms or hands) is nearer to the goal than both the ball and the second-last defender!' },
  { level:3, visual:{type:'emoji',emoji:'🧠',label:'Low Block'}, question:'What is a "low block" defensive tactic in football?', options:['Defending with a compact, deep defensive shape to protect your goal','Pressing the opponent high up the pitch','Using a single centre-back with wing-backs'], answer:'Defending with a compact, deep defensive shape to protect your goal', fact:'🛡️ A low block means sitting deep in your own half with two banks of four (or five). Teams like Atletico Madrid and Leicester City (in 2015-16) used it brilliantly to absorb pressure and counter-attack!' },
  { level:3, visual:{type:'emoji',emoji:'📊',label:'xG Advanced'}, question:'In football analytics, what does a low xG (expected goals) per shot conceded indicate about a team?', options:['The team restricts opponents to low-quality shots','The team concedes very few goals','The team has a poor goalkeeper'], answer:'The team restricts opponents to low-quality shots', fact:'📊 Low xG against means opponents only get shots from poor positions/angles. Elite defensive teams like Liverpool under Klopp and Man City achieve this by controlling space and forcing opponents wide!' },
  { level:3, visual:{type:'emoji',emoji:'🔄',label:'VAR Introduction'}, question:'In which year was VAR (Video Assistant Referee) first used at a FIFA World Cup?', options:['2018','2022','2014'], answer:'2018', fact:'📺 VAR debuted at the 2018 Russia World Cup after being trialled in various domestic leagues. It reviewed key match-changing decisions — but also attracted controversy for slow, disruptive stoppages!' },
  { level:3, visual:{type:'emoji',emoji:'⭐',label:'Invincibles Record'}, question:'Arsenal\'s 49-game unbeaten Premier League run ended in October 2004 — what was their unbeaten home record at Highbury during this period?', options:['They went over 4 years unbeaten at home (2001-2004 ending)','They had never lost at home in Wenger\'s entire tenure','They had only lost once at home all season'], answer:'They went over 4 years unbeaten at home (2001-2004 ending)', fact:'🔴 Arsenal went 151 home Premier League games unbeaten from February 1999 to October 2003 — a period of over 4 years! Their invincible away form completed the historic unbeaten season.' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'World War II'}, question:'Why was the FIFA World Cup not held in 1942 or 1946?', options:['World War II (1939-1945) made it impossible','FIFA went bankrupt temporarily','The host countries both withdrew'], answer:'World War II (1939-1945) made it impossible', fact:'🌍 The 1942 and 1946 World Cups were cancelled because of World War II. The 1938 World Cup in France was the last before the war, and the 1950 tournament in Brazil resumed the series!' },
  { level:3, visual:{type:'emoji',emoji:'🎯',label:'High Press'}, question:'What is the key principle of "gegenpressing" that Klopp uses at Liverpool?', options:['Win the ball back within 5 seconds of losing it before the opposition can reorganise','Press only in the opponent\'s half','Use many short passes to retain the ball'], answer:'Win the ball back within 5 seconds of losing it before the opposition can reorganise', fact:'⚡ Klopp\'s gegenpressing aims to win possession back within seconds of losing it — before the opposition can establish their formation. He called it "the best playmaker" — turnovers in the final third lead directly to goals!' },
  { level:3, visual:{type:'emoji',emoji:'📐',label:'3-5-2 Formation'}, question:'In a 3-5-2 formation, what are the key responsibilities of the "wing-backs"?', options:['Both attack and defend along the flanks — effectively acting as full-backs and wingers','Only defend','Only attack like wingers'], answer:'Both attack and defend along the flanks — effectively acting as full-backs and wingers', fact:'📋 Wing-backs in a 3-5-2 must cover the entire flank — defensively they provide width like full-backs, and offensively they bomb forward like wingers. It requires exceptional fitness and tactical discipline!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Europa League History'}, question:'The Europa League was formerly known as the UEFA Cup — in which year was it rebranded as the Europa League?', options:['2009','2004','2015'], answer:'2009', fact:'🏆 The UEFA Cup was rebranded as the UEFA Europa League in 2009 when UEFA reformed its competition format. The new look included a group stage and higher prize money — making it more attractive to major clubs!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'CONMEBOL History'}, question:'CONMEBOL (South American Football Confederation) was founded in 1916 — making it the world\'s oldest football confederation. When was the Copa América first held?', options:['1916','1920','1930'], answer:'1916', fact:'🌎 The Copa América was first held in 1916 in Argentina — the same year CONMEBOL was founded. Uruguay won the inaugural edition, and the tournament has been held (mostly) every 4 years since!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Scottish Cup'}, question:'Which club has won the Scottish Cup the most times?', options:['Celtic','Rangers','Aberdeen'], answer:'Celtic', fact:'🍀 Celtic have won the Scottish Cup more times than any club. Their 1967 European Cup win (the first by a British club) was achieved with an all-local squad — all born within 30 miles of Celtic Park!' },
  { level:3, visual:{type:'emoji',emoji:'🌟',label:'Total Football Netherlands'}, question:'The Netherlands 1974 World Cup squad pioneered Total Football — who was the manager who developed this system?', options:['Rinus Michels','Johan Cruyff','Leo Beenhakker'], answer:'Rinus Michels', fact:'🇳🇱 Rinus Michels developed Total Football at Ajax and then with the Dutch national team. He was voted "Coach of the Century" by IFFHS in 1999. Johan Cruyff was his greatest player and later his disciple as manager!' },
  { level:3, visual:{type:'emoji',emoji:'🔄',label:'Back Pass History'}, question:'The back-pass rule changed football in 1992 — but which World Cup highlighted the problem that led to the rule change?', options:['Italia 90 (1990 World Cup in Italy)','Mexico 86','USA 94'], answer:'Italia 90 (1990 World Cup in Italy)', fact:'😴 The 1990 World Cup averaged just 2.21 goals per game — a record low. Teams repeatedly passed back to goalkeepers who wasted time. FIFA reacted with the back-pass rule to force more attacking play!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'UCL Comeback Records'}, question:'Liverpool\'s 2019 Champions League semi-final comeback vs Barcelona (4-0 after losing 3-0) — who scored twice from corner tricks?', options:['Divock Origi','Firmino','James Milner'], answer:'Divock Origi', fact:'🔴 Origi scored twice including after Trent Alexander-Arnold\'s quickly taken corner caught the Barcelona defence napping. It\'s known as "the Corner Kick Heard Round the World" — one of football\'s most iconic moments!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1930 Details'}, question:'The very first FIFA World Cup goal in history was scored in 1930 — which country scored it?', options:['France','Uruguay','USA'], answer:'France', fact:'🇫🇷 France\'s Lucien Laurent scored the very first ever World Cup goal on 13 July 1930 against Mexico. France won 4-1. Laurent lived to 97 and remained a beloved figure in French football history!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Club World Cup Records'}, question:'Which South American club has won the Copa Libertadores the most times?', options:['Independiente','Boca Juniors','Santos'], answer:'Independiente', fact:'🇦🇷 Independiente have won the Copa Libertadores a record 7 times — all between 1964 and 1984. Their dominance earned them the nickname "Rey de Copas" (King of Cups)!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'World Cup Expansions'}, question:'How many teams participated in the FIFA World Cup from 1930 until 1982 (when it was expanded to 24)?', options:['16','12','24'], answer:'16', fact:'📈 The World Cup had 16 teams from 1934 to 1978 (except 1930 with 13). It expanded to 24 teams in 1982, then 32 in 1998, and will reach 48 teams in 2026 — the biggest expansion in tournament history!' },
  { level:3, visual:{type:'emoji',emoji:'🌟',label:'Pep Guardiola Record'}, question:'Pep Guardiola won the Champions League how many times as a manager (as of 2025)?', options:['3 times (2009, 2011 with Barcelona, 2023 with Man City)','2 times','4 times'], answer:'3 times (2009, 2011 with Barcelona, 2023 with Man City)', fact:'🏆 Guardiola won the UCL in 2009 and 2011 with Barcelona (both with Messi) and in 2023 with Manchester City. Each time he changed football — from tiki-taka to gegenpressing-influenced possession play!' },
  { level:3, visual:{type:'emoji',emoji:'📊',label:'Press Stats'}, question:'Which Bundesliga club set the record for most Bundesliga titles in a row (11 consecutive from 2013 to 2023)?', options:['Bayern Munich','Borussia Dortmund','RB Leipzig'], answer:'Bayern Munich', fact:'🔴 Bayern Munich won 11 consecutive Bundesliga titles from 2013 to 2023 — an unprecedented run of domestic dominance. Their reign ended in 2023-24 when Bayer Leverkusen won the title unbeaten under Xabi Alonso!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Bayer Leverkusen'}, question:'Bayer Leverkusen won the Bundesliga unbeaten in 2023-24 — who was their manager?', options:['Xabi Alonso','Roger Schmidt','Hannes Wolf'], answer:'Xabi Alonso', fact:'⭐ Xabi Alonso led Bayer Leverkusen through their historic unbeaten Bundesliga season in 2023-24, also winning the DFB-Pokal. The Spanish midfielder-turned-manager is one of football\'s brightest managerial talents!' },
  { level:3, visual:{type:'emoji',emoji:'🔴',label:'Liverpool'}, question:'Liverpool\'s six Champions League titles — which was the most recent (as of 2025)?', options:['2019 (beat Tottenham 2-0 in Madrid)','2022','2018'], answer:'2019 (beat Tottenham 2-0 in Madrid)', fact:'🔴 Liverpool beat Tottenham 2-0 in the 2019 Champions League final in Madrid, with goals from Mohamed Salah (penalty, 2 mins) and Divock Origi (87 mins). Jordan Henderson lifted the trophy as captain!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'African Football'}, question:'Which is the most successful African club in continental competition, having won the CAF Champions League (formerly African Cup of Champions Clubs) the most times?', options:['Al Ahly (Egypt)','Zamalek (Egypt)','TP Mazembe (Congo)'], answer:'Al Ahly (Egypt)', fact:'🦅 Al Ahly from Egypt have won the CAF Champions League over 12 times — making them the most successful club in African football history. They are known as "The Club of the Century" in Africa!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'World Cup 2010 South Africa'}, question:'What unique instrument became the sound of the 2010 World Cup in South Africa?', options:['Vuvuzela (a plastic horn)','Djembe drum','Traditional nguni horn'], answer:'Vuvuzela (a plastic horn)', fact:'📯 The vuvuzela is a plastic horn that produces a loud buzzing sound. It became the defining sound of the 2010 World Cup — loved by some, hated by others. Television broadcasts had to develop audio filters to reduce the noise!' },
  { level:3, visual:{type:'emoji',emoji:'📊',label:'Goal Line Technology'}, question:'Which controversial incident at the 2010 World Cup (where a clear goal was not given) accelerated the adoption of goal-line technology?', options:['Frank Lampard\'s disallowed goal for England vs Germany','Geoff Hurst\'s 1966 goal vs West Germany','A disallowed goal in a 1998 World Cup match'], answer:'Frank Lampard\'s disallowed goal for England vs Germany', fact:'😤 Frank Lampard\'s shot vs Germany at the 2010 World Cup clearly crossed the line — TV replays showed it — but the referee didn\'t give the goal. Germany won 4-1 anyway, but the incident fast-tracked goal-line technology!' },
  { level:3, visual:{type:'emoji',emoji:'🌐',label:'AFC Cup'}, question:'The AFC Champions League is Asia\'s top club competition — which country\'s clubs have won it the most times?', options:['South Korea','Japan','Saudi Arabia'], answer:'South Korea', fact:'🇰🇷 South Korean clubs have won the AFC Champions League more times than any other country. Seongnam Ilhwa Chunma and Jeonbuk Hyundai Motors are among their multiple winners!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'AFCON History'}, question:'The Africa Cup of Nations (AFCON) was first held in 1957 — how many teams participated in the inaugural tournament?', options:['3','8','16'], answer:'3', fact:'🌍 The inaugural AFCON in 1957 had just 3 teams — Egypt, Sudan and Ethiopia. Egypt won, beating Ethiopia 4-0 in the final. South Africa were disqualified for refusing to send a non-segregated team!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Copa América 2024'}, question:'Which country won the Copa América 2024, defeating Colombia in the final?', options:['Argentina','Uruguay','Brazil'], answer:'Argentina', fact:'🇦🇷 Argentina beat Colombia 1-0 in the 2024 Copa América final with a goal from Lautaro Martínez in extra time. It was Argentina\'s record-extending 16th Copa América title — but Messi suffered an ankle injury!' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'Largest European Stadium'}, question:'What is the largest stadium in Europe by capacity?', options:['Camp Nou, Barcelona (approximately 99,000)','Wembley, London (90,000)','Signal Iduna Park, Dortmund (81,365)'], answer:'Camp Nou, Barcelona (approximately 99,000)', fact:'🏟️ Camp Nou is Europe\'s largest football stadium with a capacity around 99,000 (being renovated to become even larger). The Bernabéu (80,000) and Wembley (90,000) are next in line!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'First International'}, question:'The first ever international football match was played in 1872 — between which two countries?', options:['Scotland vs England','England vs Wales','Scotland vs Ireland'], answer:'Scotland vs England', fact:'⚽ The first ever international football match was played on 30 November 1872 in Glasgow between Scotland and England. It ended 0-0. Scottish fans consider it a moral victory — England had expected to win easily!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Scottish Premier League'}, question:'Celtic\'s "Invincible" season in 2016-17 saw them go the entire Scottish league campaign unbeaten. How many consecutive league games did they win at one point?', options:['Celtic went the entire season unbeaten — 38 league games without a loss','They won 30 in a row','They won 25 consecutive games'], answer:'Celtic went the entire season unbeaten — 38 league games without a loss', fact:'🍀 Celtic\'s 2016-17 treble-winning season under Brendan Rodgers was historic — they became the first Scottish club to go an entire domestic season unbeaten in the modern era. They won 106 goals in 47 competitive games!' },
  { level:3, visual:{type:'emoji',emoji:'🌐',label:'CONMEBOL Copa America'}, question:'How many national teams are members of CONMEBOL (South American Football Confederation)?', options:['10','12','8'], answer:'10', fact:'🌎 CONMEBOL has exactly 10 member nations: Argentina, Bolivia, Brazil, Chile, Colombia, Ecuador, Paraguay, Peru, Uruguay and Venezuela. Despite its small size, it produces the world\'s best talent!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Intercontinental Cup Records'}, question:'Which club won the Intercontinental Cup/Toyota Cup (predecessor to Club World Cup) the most times?', options:['Real Madrid','Nacional (Uruguay)','Peñarol (Uruguay)'], answer:'Real Madrid', fact:'🏆 Real Madrid won the Intercontinental Cup/Club World Cup the most times of any European club. Nacional and Peñarol of Uruguay are the most successful South American clubs in the competition!' },
  { level:3, visual:{type:'emoji',emoji:'📊',label:'Women\'s World Cup'}, question:'The USA won the FIFA Women\'s World Cup in 2019 — which country did they beat in the final?', options:['Netherlands','England','Germany'], answer:'Netherlands', fact:'🇺🇸 The USA beat the Netherlands 2-0 in the 2019 Women\'s World Cup final in Lyon. Megan Rapinoe scored and won the Golden Boot. The USA have won the Women\'s World Cup 4 times — more than any other nation!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'Premier League History'}, question:'Which club won the first ever Premier League title in 1992-93?', options:['Manchester United','Arsenal','Blackburn Rovers'], answer:'Manchester United', fact:'🔴 Manchester United won the inaugural Premier League title in 1992-93 under Sir Alex Ferguson. They finished 10 points clear of Aston Villa. It began a dynasty — Ferguson would win 12 more league titles!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Bundesliga Unbeaten'}, question:'Bayer Leverkusen\'s 2023-24 unbeaten Bundesliga season — how many matches did they go unbeaten including all competitions?', options:['51 matches unbeaten','38 league games only','45 matches unbeaten'], answer:'51 matches unbeaten', fact:'⚡ Bayer Leverkusen went 51 matches unbeaten across all competitions in 2023-24 before losing to Atalanta in the Europa League final. They won the Bundesliga unbeaten and the DFB-Pokal — a historic double!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'World Cup 1954'}, question:'The 1954 World Cup "Miracle of Bern" saw West Germany upset the favourites to win — which team were expected to win?', options:['Hungary (the "Magnificent Magyars" who were unbeaten in 4 years)','Brazil','England'], answer:'Hungary (the "Magnificent Magyars" who were unbeaten in 4 years)', fact:'🇩🇪 Hungary were unbeaten in 4 years and had thrashed England 6-3 at Wembley in 1953. They beat West Germany 8-3 in the group stage — but lost the final 3-2. It remains one of football\'s greatest upsets!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Hat Trick World Cup Final'}, question:'Besides Geoff Hurst in 1966, has any other player scored a hat-trick in a World Cup final?', options:['No — Hurst is the only player ever to score a hat-trick in a World Cup final','Yes — Kylian Mbappé in 2022','Yes — Pelé in 1958'], answer:'No — Hurst is the only player ever to score a hat-trick in a World Cup final', fact:'⭐ Geoff Hurst remains the ONLY player in history to score a hat-trick in a World Cup final. Mbappé scored 3 goals in the 2022 final but over 90 minutes plus extra time — not technically called a hat-trick in the traditional sense!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'World Cup Referees'}, question:'Which country produced referee Howard Webb who handled the 2010 World Cup final?', options:['England','Germany','France'], answer:'England', fact:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Howard Webb from Rotherham, England, refereed the 2010 World Cup final — having also refereed the 2010 Champions League final. He showed a record 14 yellow cards and 1 red card in the World Cup final vs Netherlands vs Spain!' },
  { level:3, visual:{type:'emoji',emoji:'📊',label:'Football Finance'}, question:'Which English club had the highest revenue in the world in 2022-23 according to the Deloitte Football Money League?', options:['Manchester City','Real Madrid','Manchester United'], answer:'Manchester City', fact:'💰 Manchester City topped the Deloitte Football Money League in 2022-23 with revenues of €826 million — surpassing Real Madrid for the first time. Their success on and off the pitch coincided with massive commercial growth!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Champions League 2024'}, question:'Who won the 2023-24 Champions League final and where was it played?', options:['Real Madrid beat Borussia Dortmund 2-0 (London, Wembley)','Manchester City beat Real Madrid','Bayern Munich beat PSG'], answer:'Real Madrid beat Borussia Dortmund 2-0 (London, Wembley)', fact:'🏆 Real Madrid won their 15th Champions League title in 2024, beating Borussia Dortmund 2-0 at Wembley. Vinícius Jr and Dani Carvajal scored as Real came from behind to win with two late goals!' },

  // ── ADDITIONAL HARD Level 3 (continued) ──────────────────────────────────
  { level:3, visual:{type:'emoji',emoji:'📜',label:'First World Cup 1930 Format'}, question:'The 1930 World Cup in Uruguay used which format — no qualifying matches were held?', options:['13 invited teams in 4 groups, then semi-finals and final','16 teams in knockout only from round 1','8 teams in 2 groups then a final'], answer:'13 invited teams in 4 groups, then semi-finals and final', fact:'🌍 The 1930 World Cup had 13 teams divided into 4 groups (3 with 3 teams, 1 with 4). Group winners went to the semi-finals. The USA surprisingly reached the semis where they lost 6-1 to Argentina!' },
  { level:3, visual:{type:'emoji',emoji:'🏅',label:'Garrincha'}, question:'Brazilian winger Garrincha had a physical condition affecting his legs — yet became one of football\'s greatest. What was his condition?', options:['Both legs curved inward from birth — one shorter than the other','He had no cartilage in one knee','He was missing a toe on one foot'], answer:'Both legs curved inward from birth — one shorter than the other', fact:'🇧🇷 Garrincha was born with both legs curved and one shorter than the other — doctors said he\'d never walk properly. Yet he became the greatest dribbler of his era and never lost an international match!' },
  { level:3, visual:{type:'emoji',emoji:'🌐',label:'FIFA Membership'}, question:'How many member associations does FIFA have — more than even the United Nations?', options:['211','193','250'], answer:'211', fact:'🌐 FIFA has 211 member associations — more than the United Nations (193 states). This is because FIFA includes territories like England, Scotland, Wales and Northern Ireland as separate members, unlike the UN!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Copa Libertadores 2019'}, question:'The 2019 Copa Libertadores final was the first all-Brazilian final — which two clubs played and who won?', options:['Flamengo beat River Plate — but wait, it was Flamengo vs Athletico Paranaense, with Flamengo winning','Flamengo beat Athletico Paranaense 2-1','Both finalists were from Rio de Janeiro'], answer:'Flamengo beat Athletico Paranaense 2-1', fact:'🇧🇷 The 2019 Copa Libertadores was uniquely an all-Brazilian final — the first in the competition\'s history! Flamengo beat Athletico Paranaense 2-1 in Lima. Flamengo also won in 2022!' },
  { level:3, visual:{type:'emoji',emoji:'📋',label:'IFAB Rules Update'}, question:'In 2019, IFAB changed the handball rule to allow goals if the scorer\'s hand accidentally touched the ball in the build-up — but then reversed this in 2021. What was the original rule change\'s controversy?', options:['Goals were being disallowed for accidental handball in the build-up, ruining matches','Players were deliberately handling more','VAR was overruling too many goals'], answer:'Goals were being disallowed for accidental handball in the build-up, ruining matches', fact:'📋 IFAB\'s 2019 handball rule changes led to chaos — legitimate goals being chalked off for accidental handball in the build-up. The backlash led to clarifications in 2020 and 2021 to make the rule more reasonable!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'Premier League Records'}, question:'Which Premier League club holds the record for the most consecutive wins in the competition (18 in a row, set in 2017)?', options:['Manchester City','Manchester United','Liverpool'], answer:'Manchester City', fact:'🩵 Manchester City won 18 consecutive Premier League matches from 26 August to 27 December 2017 under Pep Guardiola — a record that stood until Chelsea bettered it. City went on to set the record points total of 100 that season!' },
  { level:3, visual:{type:'emoji',emoji:'🏟️',label:'Stade de France'}, question:'The Stade de France, which hosted the 1998 World Cup final, is in which city?', options:['Saint-Denis (near Paris)','Paris itself','Lyon'], answer:'Saint-Denis (near Paris)', fact:'🇫🇷 The Stade de France is in Saint-Denis, just north of Paris. It holds 80,698 fans and was built specifically for the 1998 World Cup. France beat Brazil 3-0 there in the final!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'Football Banned'}, question:'In 1314, England\'s King Edward II tried to ban football in London — why?', options:['It caused riots, property damage and disturbances to the peace','It was seen as immoral by the church','It was too dangerous for soldiers\' health'], answer:'It caused riots, property damage and disturbances to the peace', fact:'📜 Medieval football was a chaotic mob game — hundreds of players from rival villages. King Edward II banned it in 1314 because it caused violence and property damage. Similar bans were issued by later monarchs, but none stuck!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Intercontinental Cup Japan'}, question:'The Toyota Cup (Intercontinental Cup, played in Japan 1980-2004) — which nation\'s clubs dominated this competition?', options:['European clubs (especially from Spain and Italy)','South American clubs dominated early, Europeans later','Brazilian clubs won the majority'], answer:'European clubs (especially from Spain and Italy)', fact:'🏆 Initially South American clubs dominated the Intercontinental Cup but from the 1990s European clubs (especially Real Madrid, AC Milan and Juventus) became dominant. The format changed to become the FIFA Club World Cup in 2000!' },
  { level:3, visual:{type:'emoji',emoji:'🧠',label:'Press Tactics'}, question:'What is "park the bus" in football tactics — a phrase associated with José Mourinho?', options:['Extreme defensive tactics with all players behind the ball, prioritising not conceding','A bus-themed formation named after José Mourinho\'s first team','Counter-attacking from a low block'], answer:'Extreme defensive tactics with all players behind the ball, prioritising not conceding', fact:'🚌 "Park the bus" means putting every player behind the ball in a hyper-defensive shape. Mourinho allegedly used it at Chelsea vs Tottenham in 2004. Spurs manager Martin Jol complained: "They parked a bus in front of the goal!"' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'Most Expensive League Season'}, question:'Manchester City set the Premier League record points total of 100 points in which season?', options:['2017-18','2018-19','2019-20'], answer:'2017-18', fact:'💯 Manchester City scored 100 points in the 2017-18 Premier League season — a record. They won 32 out of 38 games, scored 106 goals, and became the first team to hit the century mark in England\'s top division!' },
  { level:3, visual:{type:'emoji',emoji:'🌟',label:'Legends Who Never Won World Cup'}, question:'Which of these legendary players never won a FIFA World Cup despite playing at the tournament multiple times?', options:['Johan Cruyff','Pelé','Ronaldo Nazário'], answer:'Johan Cruyff', fact:'😢 Johan Cruyff reached 2 World Cup finals with the Netherlands (1974 — losing to West Germany) but never won. He also didn\'t participate in 1978. It\'s one of football\'s greatest tragedies that he never won the ultimate prize!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'UEFA Cup Winners Cup'}, question:'The UEFA Cup Winners\' Cup existed from 1960 to 1999 — which English club won it the most times?', options:['Chelsea and Aberdeen (2 each)','Tottenham Hotspur','Manchester City'], answer:'Chelsea and Aberdeen (2 each)', fact:'🏆 The Cup Winners\' Cup was contested by domestic cup winners from each country. It was abolished in 1999 when UEFA reorganised its competitions. Barcelona and Chelsea each won it twice, as did Aberdeen under Alex Ferguson!' },
  { level:3, visual:{type:'emoji',emoji:'📋',label:'Four Minute Rule'}, question:'In football, what is the "four-second rule" and where does it apply?', options:['Goalkeepers cannot hold the ball in their hands for more than 6 seconds (the actual rule)','Indirect free kicks must be taken within 4 seconds','A goal kick must be taken within 4 seconds'], answer:'Goalkeepers cannot hold the ball in their hands for more than 6 seconds (the actual rule)', fact:'🧤 The rule is actually 6 seconds (not 4) — goalkeepers cannot hold the ball for more than 6 seconds before distributing it. If they do, the referee awards an indirect free kick. It\'s rarely enforced strictly in practice!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'Highest Scoring World Cup'}, question:'Which World Cup tournament produced the most goals per game on average?', options:['1954 (Switzerland, 5.38 goals per game)','1930 (Uruguay)','1958 (Sweden)'], answer:'1954 (Switzerland, 5.38 goals per game)', fact:'⚽ The 1954 World Cup had an extraordinary average of 5.38 goals per game — far higher than any other tournament. Games included a 7-5 classic between Austria and Switzerland, and Hungary\'s 10-1 win over El Salvador!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'AFC Champions League Winners'}, question:'Which Japanese club became the first to win the AFC Champions League twice in a row?', options:['Gamba Osaka','Urawa Red Diamonds','Kashima Antlers'], answer:'Urawa Red Diamonds', fact:'🇯🇵 Urawa Red Diamonds won back-to-back AFC Champions League titles in 2007 and 2017. They have been Japan\'s most successful club in Asian competition, representing Japanese football at the Club World Cup multiple times!' },
  { level:3, visual:{type:'emoji',emoji:'🔵',label:'Chelsea Records'}, question:'Chelsea FC was bought by Roman Abramovich in 2003 — what was the impact on English football?', options:['They spent unprecedented sums on players, transforming the financial landscape of English football','They won the Champions League in their first season','They moved from Stamford Bridge to a new stadium'], answer:'They spent unprecedented sums on players, transforming the financial landscape of English football', fact:'💰 Abramovich\'s 2003 Chelsea takeover triggered the modern era of ultra-rich club ownership. They immediately spent £100m+ on players. Chelsea won 2 Champions Leagues (2012, 2021) and 5 Premier League titles under his ownership!' },
  { level:3, visual:{type:'emoji',emoji:'📐',label:'Tactical Deep Dive'}, question:'The "double pivot" in modern football refers to what midfield arrangement?', options:['Two defensive midfielders playing side by side in front of the defence','Two attacking midfielders playing either side of a centre-forward','A midfielder and a striker pressing together'], answer:'Two defensive midfielders playing side by side in front of the defence', fact:'🧠 A double pivot uses two holding midfielders (like Busquets + Xavi, or Kanté + Makelele) to provide defensive cover while allowing full-backs to push forward. Spain\'s 2010 World Cup winning team used it brilliantly!' },
  { level:3, visual:{type:'emoji',emoji:'🌐',label:'COSAFA'}, question:'What is COSAFA and which region does it represent?', options:['Council of Southern Africa Football Associations — 14 countries in southern Africa','The top club competition in Central Africa','A qualifying tournament for the World Cup from North Africa'], answer:'Council of Southern Africa Football Associations — 14 countries in southern Africa', fact:'🌍 COSAFA represents 14 nations in southern Africa including South Africa, Zimbabwe, Zambia, Mozambique and others. They run the COSAFA Cup — a regional championship that predates AFCON for these nations!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'DFB Pokal Records'}, question:'Which club has won the DFB-Pokal (German Cup) the most times?', options:['Bayern Munich','Borussia Dortmund','Werder Bremen'], answer:'Bayern Munich', fact:'🔴 Bayern Munich have won the DFB-Pokal more times than any other club — over 20 times. Winning the Bundesliga and DFB-Pokal in the same season is the German "double." Bayern have achieved this many times!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Copa del Rey Records'}, question:'Barcelona have won the Copa del Rey numerous times — which Barcelona manager won it most frequently?', options:['Johan Cruyff (4 times, 1990-1994)','Pep Guardiola','Luis Enrique (3 cups in 4 years)'], answer:'Johan Cruyff (4 times, 1990-1994)', fact:'🔵🔴 Johan Cruyff as Barcelona manager won 4 Copa del Rey titles in 5 years from 1990-1994, plus a league title and the European Cup. He revolutionised not just Barcelona but Spanish and world football!' },
  { level:3, visual:{type:'emoji',emoji:'📜',label:'Scotland Football History'}, question:'Scotland and England played the first international football match in 1872 — how often did Scotland and England meet in the early years?', options:['Annually in the "British Home Championship" from 1883 to 1984','Every 4 years','Monthly in a rotating series'], answer:'Annually in the "British Home Championship" from 1883 to 1984', fact:'🏴󠁧󠁢󠁳󠁣󠁴󠁿 The British Home Championship (involving England, Scotland, Wales and Northern Ireland) ran annually from 1883 to 1984 — over 100 years! England vs Scotland was its most celebrated fixture!' },
  { level:3, visual:{type:'emoji',emoji:'🌟',label:'Pirlo Free Kick'}, question:'Andrea Pirlo was famous for a free kick technique involving the ball going under and through a wall — what is this technique called?', options:['The "tunnel" or "under the wall" free kick','The banana kick','The knuckleball'], answer:'The "tunnel" or "under the wall" free kick', fact:'⚽ Pirlo perfected the technique of kicking the ball so it goes through a small gap under or through a defensive wall. His free kick for Italy vs England at Euro 2012 used this technique to perfection!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'World Cup Consecutive Appearances'}, question:'Which country has qualified for the most consecutive FIFA World Cups?', options:['Brazil (22 consecutive, every World Cup from 1930 to 2022)','Germany','Argentina'], answer:'Brazil (22 consecutive, every World Cup from 1930 to 2022)', fact:'🇧🇷 Brazil has qualified for EVERY FIFA World Cup since the first tournament in 1930 — 22 consecutive tournaments. No other nation has achieved this. Germany missed out in 2018 (group stage exit) but qualified in 2022!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'European Super Cup Records'}, question:'Which player has won the most UEFA Super Cup medals?', options:['Iker Casillas (with Real Madrid — 3 Super Cups)','Sergio Ramos','Cristiano Ronaldo'], answer:'Iker Casillas (with Real Madrid — 3 Super Cups)', fact:'🏆 Iker Casillas won the UEFA Super Cup 3 times with Real Madrid (2002, 2014, 2016). However, players like Francisco Gento played in an era before the Super Cup — the "most medals" distinction depends on era!' },
  { level:3, visual:{type:'emoji',emoji:'🌍',label:'OFC Confederation'}, question:'The OFC (Oceania Football Confederation) is the smallest FIFA confederation — which country dominates it?', options:['New Zealand','Australia (until 2006)','Fiji'], answer:'Australia (until 2006)', fact:'🇦🇺 Australia dominated the OFC until they moved to the AFC (Asian confederation) in 2006. New Zealand now leads OFC. Australia\'s switch was partly to face tougher opposition and improve their World Cup qualification chances!' },
  { level:3, visual:{type:'emoji',emoji:'⚽',label:'Historical Laws'}, question:'Until which year was it legal in football to charge the goalkeeper when they were holding the ball?', options:['Until 1959 (when the rule was changed to protect goalkeepers)','Until 1974','Until the 1990s'], answer:'Until 1959 (when the rule was changed to protect goalkeepers)', fact:'🧤 Until 1959, outfield players could shoulder-charge the goalkeeper even when they held the ball — a major tactical advantage for attackers. The rule change transformed goalkeeping and led to more attacking football!' },
  { level:3, visual:{type:'emoji',emoji:'🏆',label:'Women Champions League'}, question:'Which club has won the UEFA Women\'s Champions League the most times?', options:['Lyon (France) — 8 times','Barcelona (Spain)','Wolfsburg (Germany)'], answer:'Lyon (France) — 8 times', fact:'🔷 Olympique Lyonnais (Lyon) women\'s team have won the UEFA Women\'s Champions League 8 times — an unprecedented achievement. They have dominated European women\'s football since 2011!' },
  { level:3, visual:{type:'emoji',emoji:'🔢',label:'Referee Cards Statistics'}, question:'Which World Cup tournament holds the record for the most red cards issued?', options:['2006 (Germany — 28 red cards)','1990 Italy','2014 Brazil'], answer:'2006 (Germany — 28 red cards)', fact:'🟥 The 2006 World Cup saw 28 red cards and 345 yellow cards — records for both. Zidane\'s red card in the final was the most famous, but the tournament overall was heavily carded. Perhaps referees were overly strict!' },
