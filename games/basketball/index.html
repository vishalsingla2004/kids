      flex-wrap: wrap;
    }

    .back {
      color: #ffe3a4;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.08);
    }

    .title {
      text-align: center;
      font-size: clamp(1.05rem, 3.4vw, 1.55rem);
      font-weight: 900;
      margin: 8px 0 4px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.9;
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .card {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      padding: 16px;
      display: grid;
      gap: 10px;
      flex: 1;
      align-content: center;
    }

    .q-head {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .q-icon {
      font-size: clamp(2.4rem, 8vw, 3.4rem);
    }

    .q-text {
      text-align: center;
      font-size: clamp(2.1rem, 8.8vw, 4.6rem);
      line-height: 1.22;
      min-height: 38vh;
      font-weight: 900;
    }

    .hint {
      text-align: center;
      font-size: 0.74rem;
      opacity: 0.85;
    }

    .actions,
    .bottom-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(145deg, #f7ad35, #dc7f04);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .status {
      text-align: center;
      font-size: 0.95rem;
      min-height: 20px;
    }

    .fact {
      display: none;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.09);
      padding: 10px;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .fact.show {
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      padding: 14px;
      z-index: 50;
    }

    .overlay.show {
      display: flex;
    }

    .panel {
      width: min(560px, 96vw);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      padding: 18px;
      text-align: center;
    }

    .panel h2 {
      margin: 0 0 8px;
    }

    @media (max-width: 640px) {
      .screen {
        padding: 12px;
      }

      .card {
        padding: 12px;
      }

      .q-text {
        font-size: clamp(2.4rem, 10.5vw, 5.2rem);
        min-height: 44vh;
      }

    const RECORD_FACTS = [
      { icon: '🌟', level: 1, q: 'How many points did Kobe Bryant score in his famous 81-point game?', answer: 81, fact: 'Kobe scored 81 points in one game in 2006.' },
      { icon: '🌟', level: 1, q: 'How many points did Wilt Chamberlain score in his record game?', answer: 100, fact: 'Wilt scored 100 points in 1962.' },
      { icon: '🌟', level: 2, q: 'How many assists did Scott Skiles record in one game (NBA record)?', answer: 30, fact: 'Scott Skiles recorded 30 assists in one game.' },
      { icon: '🌟', level: 2, q: 'How many rebounds did Wilt Chamberlain grab in his best rebounding game?', answer: 55, fact: 'Wilt had 55 rebounds in one game.' },
      { icon: '🌟', level: 2, q: 'How many threes did Klay Thompson make in his single-game record?', answer: 14, fact: 'Klay hit 14 threes in one game.' },
      { icon: '🌟', level: 3, q: 'How many career regular-season points did Kareem Abdul-Jabbar finish with?', answer: 38387, fact: 'Kareem retired with 38,387 regular-season points.' },
      { icon: '🌟', level: 3, q: 'How many career assists does John Stockton have (NBA record)?', answer: 15806, fact: 'John Stockton is the all-time assists leader with 15,806.' },
      { icon: '🌟', level: 3, q: 'How many career steals does John Stockton have (NBA record)?', answer: 3265, fact: 'John Stockton is the all-time steals leader with 3,265.' }
    ];

    const TEAM_LOGO_QUESTIONS = [
      { icon: '🟢', level: 1, q: 'Which NBA team logo features a shamrock vibe and leprechaun identity?', answer: 'Boston Celtics', fact: 'The Celtics brand uses clover and leprechaun imagery.' },
      { icon: '💜', level: 1, q: 'Which NBA team logo prominently features a basketball and "Lakers" wordmark?', answer: 'Los Angeles Lakers', fact: 'The Lakers logo is a gold basketball with purple lettering.' },
      { icon: '💛', level: 1, q: 'Which team logo uses a bridge motif tied to the Bay Area?', answer: 'Golden State Warriors', fact: 'The Warriors logo references the Bay Bridge.' },
      { icon: '🦌', level: 1, q: 'Which NBA team logo includes a deer head?', answer: 'Milwaukee Bucks', fact: 'The Bucks identity centers around a deer logo.' },
      { icon: '🦖', level: 1, q: 'Which NBA team is represented by a dinosaur-style logo theme?', answer: 'Toronto Raptors', fact: 'Raptors branding is built around a dinosaur identity.' },
      { icon: '☀️', level: 1, q: 'Which team logo features a basketball sunburst?', answer: 'Phoenix Suns', fact: 'The Suns logo is known for its sunburst basketball design.' },
      { icon: '🔴', level: 1, q: 'Which NBA team logo prominently uses a red bull head?', answer: 'Chicago Bulls', fact: 'The Bulls logo is one of the most recognizable in sports.' },
      { icon: '🎷', level: 1, q: 'Which team logo name and branding connect to jazz music?', answer: 'Utah Jazz', fact: 'The Jazz name and branding come from musical roots.' }
    ];

    const JERSEY_SPOTLIGHT = [
      'Michael Jordan',
      'LeBron James',
      'Stephen Curry',
      'Kobe Bryant',
      'Kevin Durant',
      'Giannis Antetokounmpo',
      'Nikola Jokic',
      'Luka Doncic',
      'Jayson Tatum',

    ];

    function buildQuestionBank() {
      const questions = [];
      const seen = new Set();

      const addQ = (icon, level, q, answer, fact) => {
        const isNumberAnswer = typeof answer === 'number' && Number.isFinite(answer);
        const isStringAnswer = typeof answer === 'string' && answer.trim().length > 0;
        if (!isNumberAnswer && !isStringAnswer) return;
        if (seen.has(q)) return;
        seen.add(q);
        questions.push({ icon, level, q, answer, fact });
      };

      BASE_RULE_QUESTIONS.forEach((item) => addQ(item.icon, item.level, item.q, item.answer, item.fact));

      PLAYER_FACTS.forEach((p) => {
        if (JERSEY_SPOTLIGHT.includes(p.name)) {
          addQ('📛', 1, `What jersey number is most associated with ${p.name}?`, p.jersey, `${p.name} is most associated with jersey #${p.jersey}.`);
        }
        addQ('📆', 1, `In what year was ${p.name} drafted into the NBA?`, p.draft, `${p.name} was drafted in ${p.draft}.`);
        addQ('🏆', 2, `How many NBA championships has ${p.name} won?`, p.titles, `${p.name} has ${p.titles} NBA title${p.titles === 1 ? '' : 's'}.`);
        addQ('🏅', 2, `How many regular-season MVP awards does ${p.name} have?`, p.mvp, `${p.name} has ${p.mvp} MVP award${p.mvp === 1 ? '' : 's'}.`);
      });

      TEAM_TITLES.forEach((t) => {
        addQ('🏟️', 1, `How many NBA championships have the ${t.team} won?`, t.titles, `${t.team} have ${t.titles} title${t.titles === 1 ? '' : 's'}.`);
      });

      RECORD_FACTS.forEach((r) => {
        addQ(r.icon, r.level, r.q, r.answer, r.fact);
      });

      TEAM_LOGO_QUESTIONS.forEach((x) => {
        addQ(x.icon, x.level, x.q, x.answer, x.fact);
      });

      const finalsFacts = [
        { q: 'How many NBA titles did Michael Jordan win with the Bulls?', a: 6, f: 'Jordan won 6 titles with Chicago.' },
        { q: 'How many NBA titles did Tim Duncan win with the Spurs?', a: 5, f: 'Duncan won 5 titles with San Antonio.' },
        { q: 'How many NBA titles has Stephen Curry won with the Warriors?', a: 4, f: 'Curry has won 4 championships.' },
        { q: 'How many NBA titles did Kobe Bryant win with the Lakers?', a: 5, f: 'Kobe won 5 championships with the Lakers.' },
        { q: 'How many NBA titles did Magic Johnson win?', a: 5, f: 'Magic won 5 championships in his career.' },
        { q: 'How many NBA titles did Larry Bird win?', a: 3, f: 'Bird won 3 championships with Boston.' },
        { q: 'How many NBA titles did Shaquille O\'Neal win?', a: 4, f: 'Shaq won 4 championships.' },
        { q: 'How many NBA titles has LeBron James won?', a: 4, f: 'LeBron has 4 championships.' },
        { q: 'How many NBA titles has Giannis Antetokounmpo won?', a: 1, f: 'Giannis won his first title in 2021.' },
        { q: 'How many NBA titles has Nikola Jokic won?', a: 1, f: 'Jokic won his first title in 2023.' }
      ];

      finalsFacts.forEach((x) => addQ('🏁', 2, x.q, x.a, x.f));

      const tieredPool = questions.slice();
      while (tieredPool.length < TARGET_POOL_SIZE) {
        const seed = questions[tieredPool.length % questions.length];
        const altQ = `${seed.q} (NBA fact check)`;
        addQ(seed.icon, seed.level, altQ, seed.answer, seed.fact);
        tieredPool.push({ icon: seed.icon, level: seed.level, q: altQ, answer: seed.answer, fact: seed.fact });
      }

      return questions.slice(0, TARGET_POOL_SIZE);
    }

    const QUESTION_BANK = buildQuestionBank();

    function randomInt(maxExclusive) {
      if (maxExclusive <= 0) return 0;
      if (window.crypto && crypto.getRandomValues) {
        const buf = new Uint32Array(1);
        const maxUint = 0xFFFFFFFF;
        const cutoff = maxUint - (maxUint % maxExclusive);
        let n = 0;
        do {
          crypto.getRandomValues(buf);
          n = buf[0];
        } while (n >= cutoff);
        return n % maxExclusive;
      }
      return Math.floor(Math.random() * maxExclusive);
    }

    function shuffleSecure(arr) {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = randomInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickBalancedSession(pool) {
      const byLevel = { 1: [], 2: [], 3: [] };
      pool.forEach((q) => byLevel[q.level].push(q));

      shuffleSecure(byLevel[1]);
      shuffleSecure(byLevel[2]);
      shuffleSecure(byLevel[3]);

      const picked = [];
      const take = (level, count) => {
        const bucket = byLevel[level];
        for (let i = 0; i < count && bucket.length > 0; i += 1) {
          picked.push(bucket.pop());
        }
      };

      take(1, 4);
      take(2, 4);
      take(3, 4);

      if (picked.length < SESSION_SIZE) {
        const leftovers = shuffleSecure([...byLevel[1], ...byLevel[2], ...byLevel[3]]);
        while (picked.length < SESSION_SIZE && leftovers.length > 0) {
          picked.push(leftovers.pop());
        }
      }

      return shuffleSecure(picked);
    }

    let session = [];
    let roundIndex = 0;
    let score = 0;
    let streak = 0;
    let roundResolved = false;

    function setText(id, text) {
      const el = document.getElementById(id);

    function refreshGame() {
      const pool = shuffleSecure([...QUESTION_BANK]);
      session = pickBalancedSession(pool);
      roundIndex = 0;
      score = 0;
      streak = 0;
      document.getElementById('endOverlay').classList.remove('show');
      setText('pool', String(QUESTION_BANK.length));
      renderRound();
    }

    function renderRound() {
      const q = session[roundIndex];
      roundResolved = false;

      setText('round', `${roundIndex + 1} / ${SESSION_SIZE}`);
      setText('score', String(score));
      setText('streak', String(streak));
      setText('qIcon', q.icon);
      setText('qText', q.q);
      setText('status', '');

      document.getElementById('revealBtn').disabled = false;
      document.getElementById('nextBtn').style.display = 'none';

      const fact = document.getElementById('fact');
      fact.textContent = '';
      fact.classList.remove('show');
    }

    function revealAnswer() {
      if (roundResolved) return;
      roundResolved = true;

      const q = session[roundIndex];
      score += 1;
      streak += 1;

      setText('score', String(score));
      setText('streak', String(streak));
      setText('status', `Answer: ${q.answer}`);

      document.getElementById('revealBtn').disabled = true;

      const fact = document.getElementById('fact');
      fact.textContent = `Fact: ${q.fact}`;
      fact.classList.add('show');

      if (roundIndex < SESSION_SIZE - 1) {
        document.getElementById('nextBtn').style.display = 'inline-block';
      } else {
        setTimeout(showEnd, 260);
      }
    }

    function nextRound() {
      roundIndex += 1;
      renderRound();
    }

    function showEnd() {
      const pct = Math.round((score / SESSION_SIZE) * 100);
      setText('endTitle', pct >= 85 ? '🏀 Elite Run!' : (pct >= 60 ? '🔥 Nice Progress!' : '💪 Keep Going!'));
      setText('endBody', `You completed ${SESSION_SIZE} questions (${pct}% revealed). New games draw from ${TARGET_POOL_SIZE} factual basketball questions.`);
      document.getElementById('endOverlay').classList.add('show');
    }

    refreshGame();
  </script>
</body>
</html>
