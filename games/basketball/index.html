<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Basketball Wits & Wagers</title>
  <style>
    :root {
      --bg1: #2a1300;
      --bg2: #7a3200;
      --txt: #fff8ea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: var(--txt);
      background:
        radial-gradient(circle at 10% 15%, rgba(255, 183, 77, 0.28), transparent 40%),
        radial-gradient(circle at 88% 25%, rgba(255, 138, 0, 0.22), transparent 45%),
        radial-gradient(circle at 15% 88%, rgba(255, 111, 0, 0.22), transparent 45%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .screen {
      width: min(900px, 98vw);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(4px);
      padding: 16px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.35);
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back {
      color: #ffe3a4;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.08);
    }

    .title {
      text-align: center;
      font-size: clamp(1.2rem, 4.5vw, 2rem);
      font-weight: 900;
      margin: 8px 0 4px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.9;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .pill {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      padding: 7px 8px;
      text-align: center;
    }

    .k {
      font-size: 0.74rem;
      opacity: 0.85;
    }

    .v {
      font-size: 1.05rem;
      font-weight: 900;
    }

    .card {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .q-head {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .q-icon {
      font-size: clamp(1.8rem, 7vw, 2.7rem);
    }

    .level {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.08);
    }

    .level.easy { color: #8efcb2; }
    .level.medium { color: #ffe08a; }
    .level.hard { color: #ffad9a; }

    .q-text {
      text-align: center;
      font-size: clamp(1rem, 3.6vw, 1.3rem);
      line-height: 1.35;
      min-height: 68px;
    }

    .hint {
      text-align: center;
      font-size: 0.86rem;
      opacity: 0.85;
    }

    .actions,
    .bottom-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(145deg, #f7ad35, #dc7f04);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .status {
      text-align: center;
      font-size: 0.95rem;
      min-height: 20px;
    }

    .fact {
      display: none;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.09);
      padding: 10px;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .fact.show {
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      padding: 14px;
      z-index: 50;
    }

    .overlay.show {
      display: flex;
    }

    .panel {
      width: min(560px, 96vw);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      padding: 18px;
      text-align: center;
    }

    .panel h2 {
      margin: 0 0 8px;
    }

    @media (max-width: 640px) {
      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topline">
      <a class="back" href="../../">← Back</a>
      <div style="font-size:0.82rem;opacity:0.85;">Basketball Trivia</div>
    </div>

    <div class="title">🏀 Basketball Wits &amp; Wagers</div>
    <div class="subtitle">Balanced round: easy + medium + hard. Tap once to reveal answer.</div>

    <div class="hud">
      <div class="pill"><div class="k">Round</div><div class="v" id="round">1 / 12</div></div>
      <div class="pill"><div class="k">Score</div><div class="v" id="score">0</div></div>
      <div class="pill"><div class="k">Streak</div><div class="v" id="streak">0</div></div>
      <div class="pill"><div class="k">Pool</div><div class="v" id="pool">300</div></div>
      <div class="pill"><div class="k">Tier Mix</div><div class="v">4/4/4</div></div>
    </div>

    <div class="card">
      <div class="q-head">
        <div class="q-icon" id="qIcon">🏀</div>
        <div class="level easy" id="qLevel">Easy</div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="hint">No typing required. Reveal answer, read the fact, then go next.</div>

      <div class="actions">
        <button class="btn secondary" id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
      </div>

      <div class="status" id="status"></div>
      <div class="fact" id="fact"></div>
    </div>

    <div class="bottom-actions" style="margin-top:10px;">
      <button class="btn secondary" id="nextBtn" style="display:none" onclick="nextRound()">Next Question</button>
      <button class="btn secondary" onclick="refreshGame()">New Random Game</button>
    </div>
  </div>

  <div class="overlay" id="endOverlay">
    <div class="panel">
      <h2 id="endTitle">Game Over</h2>
      <p id="endBody"></p>
      <div class="bottom-actions" style="margin-top:10px;">
        <button class="btn" onclick="refreshGame()">Play Again</button>
        <a class="btn secondary" href="../../" style="text-decoration:none;display:inline-flex;align-items:center;">Back to Hub</a>
      </div>
    </div>
  </div>

  <script>
    const SESSION_SIZE = 12;
    const TARGET_POOL_SIZE = 300;
    const LEVELS = {
      1: 'Easy',
      2: 'Medium',
      3: 'Hard'
    };

    const BASE_RULE_QUESTIONS = [
      { icon: '🏀', level: 1, q: 'How many players from one team are on court at once in the NBA?', answer: 5, fact: 'Each team has 5 players on court.' },
      { icon: '⏱️', level: 1, q: 'How many minutes is NBA regulation time?', answer: 48, fact: 'NBA games are 4 quarters of 12 minutes.' },
      { icon: '🕒', level: 1, q: 'How many minutes is one NBA quarter?', answer: 12, fact: 'Each quarter is 12 minutes.' },
      { icon: '📉', level: 1, q: 'How many seconds are on the NBA shot clock?', answer: 24, fact: 'The shot clock is 24 seconds.' },
      { icon: '🎯', level: 1, q: 'How many points is a free throw?', answer: 1, fact: 'A made free throw is worth 1 point.' },
      { icon: '🎯', level: 1, q: 'How many points is a basket inside the arc?', answer: 2, fact: 'Inside the arc is worth 2 points.' },
      { icon: '🎯', level: 1, q: 'How many points is a shot behind the arc?', answer: 3, fact: 'A made three is worth 3 points.' },
      { icon: '🏁', level: 1, q: 'How many regular-season games does an NBA team play?', answer: 82, fact: 'Each team plays 82 regular-season games.' },
      { icon: '🏆', level: 1, q: 'How many teams are in the NBA?', answer: 30, fact: 'The NBA has 30 franchises.' },
      { icon: '📋', level: 1, q: 'How many personal fouls before fouling out in the NBA?', answer: 6, fact: 'Players foul out after 6 personals.' },
      { icon: '📏', level: 1, q: 'How high is the rim in feet?', answer: 10, fact: 'The rim is 10 feet high.' },
      { icon: '📏', level: 1, q: 'How long is an NBA court in feet?', answer: 94, fact: 'NBA courts are 94 feet long.' },
      { icon: '📏', level: 1, q: 'How wide is an NBA court in feet?', answer: 50, fact: 'NBA courts are 50 feet wide.' },
      { icon: '📚', level: 1, q: 'How many rounds are in the NBA Draft?', answer: 2, fact: 'The NBA Draft has two rounds.' },
      { icon: '📚', level: 1, q: 'How many total picks are in a normal NBA Draft?', answer: 60, fact: '30 teams x 2 rounds = 60 picks.' },
      { icon: '📣', level: 1, q: 'How many referees officiate most NBA games?', answer: 3, fact: 'A three-official crew handles NBA games.' },
      { icon: '📣', level: 1, q: 'How many seconds to cross half-court in the NBA?', answer: 8, fact: 'Teams must advance in 8 seconds.' },
      { icon: '🧠', level: 1, q: 'How many players are on the floor total during play?', answer: 10, fact: 'It is always 5-on-5 in live play.' }
    ];

    const PLAYER_FACTS = [
      { name: 'Michael Jordan', jersey: 23, draft: 1984, titles: 6, mvp: 5 },
      { name: 'LeBron James', jersey: 23, draft: 2003, titles: 4, mvp: 4 },
      { name: 'Kobe Bryant', jersey: 24, draft: 1996, titles: 5, mvp: 1 },
      { name: 'Stephen Curry', jersey: 30, draft: 2009, titles: 4, mvp: 2 },
      { name: 'Kevin Durant', jersey: 35, draft: 2007, titles: 2, mvp: 1 },
      { name: 'Tim Duncan', jersey: 21, draft: 1997, titles: 5, mvp: 2 },
      { name: 'Magic Johnson', jersey: 32, draft: 1979, titles: 5, mvp: 3 },
      { name: 'Larry Bird', jersey: 33, draft: 1978, titles: 3, mvp: 3 },
      { name: 'Shaquille O\'Neal', jersey: 34, draft: 1992, titles: 4, mvp: 1 },
      { name: 'Kareem Abdul-Jabbar', jersey: 33, draft: 1969, titles: 6, mvp: 6 },
      { name: 'Bill Russell', jersey: 6, draft: 1956, titles: 11, mvp: 5 },
      { name: 'Giannis Antetokounmpo', jersey: 34, draft: 2013, titles: 1, mvp: 2 },
      { name: 'Nikola Jokic', jersey: 15, draft: 2014, titles: 1, mvp: 3 },
      { name: 'Dirk Nowitzki', jersey: 41, draft: 1998, titles: 1, mvp: 1 },
      { name: 'Hakeem Olajuwon', jersey: 34, draft: 1984, titles: 2, mvp: 1 },
      { name: 'Kawhi Leonard', jersey: 2, draft: 2011, titles: 2, mvp: 0 },
      { name: 'Dwyane Wade', jersey: 3, draft: 2003, titles: 3, mvp: 0 },
      { name: 'James Harden', jersey: 13, draft: 2009, titles: 0, mvp: 1 },
      { name: 'Russell Westbrook', jersey: 0, draft: 2008, titles: 0, mvp: 1 },
      { name: 'Luka Doncic', jersey: 77, draft: 2018, titles: 0, mvp: 0 },
      { name: 'Joel Embiid', jersey: 21, draft: 2014, titles: 0, mvp: 1 },
      { name: 'Jayson Tatum', jersey: 0, draft: 2017, titles: 1, mvp: 0 },
      { name: 'Victor Wembanyama', jersey: 1, draft: 2023, titles: 0, mvp: 0 },
      { name: 'Kyrie Irving', jersey: 11, draft: 2011, titles: 1, mvp: 0 },
      { name: 'Damian Lillard', jersey: 0, draft: 2012, titles: 0, mvp: 0 },
      { name: 'Steve Nash', jersey: 13, draft: 1996, titles: 0, mvp: 2 }
    ];

    const TEAM_TITLES = [
      { team: 'Boston Celtics', titles: 18 },
      { team: 'Los Angeles Lakers', titles: 17 },
      { team: 'Golden State Warriors', titles: 7 },
      { team: 'Chicago Bulls', titles: 6 },
      { team: 'San Antonio Spurs', titles: 5 },
      { team: 'Miami Heat', titles: 3 },
      { team: 'Detroit Pistons', titles: 3 },
      { team: 'Philadelphia 76ers', titles: 3 },
      { team: 'New York Knicks', titles: 2 },
      { team: 'Milwaukee Bucks', titles: 2 },
      { team: 'Houston Rockets', titles: 2 },
      { team: 'Toronto Raptors', titles: 1 },
      { team: 'Dallas Mavericks', titles: 1 },
      { team: 'Denver Nuggets', titles: 1 },
      { team: 'Cleveland Cavaliers', titles: 1 }
    ];

    function buildQuestionBank() {
      const questions = [];
      const seen = new Set();

      const addQ = (icon, level, q, answer, fact) => {
        if (!Number.isFinite(answer)) return;
        if (seen.has(q)) return;
        seen.add(q);
        questions.push({ icon, level, q, answer, fact });
      };

      BASE_RULE_QUESTIONS.forEach((item) => addQ(item.icon, item.level, item.q, item.answer, item.fact));

      PLAYER_FACTS.forEach((p) => {
        addQ('📛', 1, `What jersey number is most associated with ${p.name}?`, p.jersey, `${p.name} is most associated with jersey #${p.jersey}.`);
        addQ('📆', 1, `In what year was ${p.name} drafted into the NBA?`, p.draft, `${p.name} was drafted in ${p.draft}.`);
        addQ('🏆', 2, `How many NBA championships has ${p.name} won?`, p.titles, `${p.name} has ${p.titles} NBA title${p.titles === 1 ? '' : 's'}.`);
        addQ('🏅', 2, `How many regular-season MVP awards does ${p.name} have?`, p.mvp, `${p.name} has ${p.mvp} MVP award${p.mvp === 1 ? '' : 's'}.`);

        addQ('🧩', 2, `Fun math: ${p.name}'s jersey (${p.jersey}) + MVPs (${p.mvp}) equals what?`, p.jersey + p.mvp, `Jersey + MVP helps remember ${p.name}.`);
        addQ('🎯', 2, `If ${p.name} made ${p.jersey} two-pointers, how many points is that?`, p.jersey * 2, `${p.jersey} two-pointers score ${p.jersey * 2} points.`);
        addQ('🔥', 3, `If ${p.name} hit ${p.mvp + 3} threes in a game, points from threes?`, (p.mvp + 3) * 3, `Three-point scoring is makes x 3.`);
        addQ('🧮', 3, `What is ${p.draft} minus ${p.jersey}?`, p.draft - p.jersey, `Arithmetic challenge tied to ${p.name}.`);
      });

      TEAM_TITLES.forEach((t) => {
        addQ('🏟️', 1, `How many NBA championships have the ${t.team} won?`, t.titles, `${t.team} have ${t.titles} title${t.titles === 1 ? '' : 's'}.`);
      });

      const duos = [
        ['Michael Jordan', 'Scottie Pippen', 6],
        ['Shaquille O\'Neal', 'Kobe Bryant', 8],
        ['Magic Johnson', 'Kareem Abdul-Jabbar', 11],
        ['LeBron James', 'Dwyane Wade', 7],
        ['Tim Duncan', 'Manu Ginobili', 9],
        ['Stephen Curry', 'Klay Thompson', 8],
        ['Larry Bird', 'Kevin McHale', 6],
        ['Giannis Antetokounmpo', 'Khris Middleton', 2],
        ['Nikola Jokic', 'Jamal Murray', 2],
        ['Kawhi Leonard', 'Tim Duncan', 7]
      ];

      duos.forEach((d) => {
        addQ('🤝', 2, `How many combined championships do ${d[0]} and ${d[1]} have?`, d[2], `${d[0]} + ${d[1]} combine for ${d[2]} title${d[2] === 1 ? '' : 's'}.`);
      });

      let i = 0;
      while (questions.length < TARGET_POOL_SIZE && i < 5000) {
        const p = PLAYER_FACTS[i % PLAYER_FACTS.length];
        const t = TEAM_TITLES[(i * 3 + 2) % TEAM_TITLES.length];
        const mode = i % 6;

        if (mode === 0) {
          const games = 5 + (i % 12);
          addQ('🎲', 2, `Sim challenge: ${p.name} wears #${p.jersey} for ${games} games. What is jersey x games?`, p.jersey * games, `${p.jersey} x ${games} = ${p.jersey * games}.`);
        } else if (mode === 1) {
          const twos = 3 + (i % 8);
          const threes = 2 + (i % 5);
          const fts = 2 + (i % 6);
          const total = (twos * 2) + (threes * 3) + fts;
          addQ('🧮', 3, `Box score puzzle: ${twos} two-pointers, ${threes} threes, ${fts} free throws. Total points?`, total, `Total = 2PT x2 + 3PT x3 + FT x1.`);
        } else if (mode === 2) {
          const wins = 44 + (i % 20);
          const losses = 82 - wins;
          addQ('📈', 1, `Season record math: team finishes ${wins}-${losses}. How many total games?`, wins + losses, `Regular season total is 82.`);
        } else if (mode === 3) {
          const rounds = 4;
          const sweeps = 4 * rounds;
          addQ('🏁', 2, `Playoff path: if a team sweeps all ${rounds} rounds, how many wins is that?`, sweeps, `A sweep means 4 wins per round.`);
        } else if (mode === 4) {
          const bonus = 2 + (i % 9);
          addQ('🏟️', 2, `Franchise fun: if the ${t.team} added ${bonus} future titles to ${t.titles}, new total?`, t.titles + bonus, `This uses the team's current title count as a math base.`);
        } else {
          const mins = 26 + (i % 14);
          const games = 3 + (i % 9);
          addQ('⏱️', 3, `Stamina math: ${p.name} plays ${mins} minutes for ${games} games. Total minutes?`, mins * games, `${mins} x ${games} = ${mins * games}.`);
        }

        i += 1;
      }

      return questions.slice(0, TARGET_POOL_SIZE);
    }

    const QUESTION_BANK = buildQuestionBank();

    function randomInt(maxExclusive) {
      if (maxExclusive <= 0) return 0;
      if (window.crypto && crypto.getRandomValues) {
        const buf = new Uint32Array(1);
        const maxUint = 0xFFFFFFFF;
        const cutoff = maxUint - (maxUint % maxExclusive);
        let n = 0;
        do {
          crypto.getRandomValues(buf);
          n = buf[0];
        } while (n >= cutoff);
        return n % maxExclusive;
      }
      return Math.floor(Math.random() * maxExclusive);
    }

    function shuffleSecure(arr) {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = randomInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickBalancedSession(pool) {
      const byLevel = { 1: [], 2: [], 3: [] };
      pool.forEach((q) => byLevel[q.level].push(q));

      shuffleSecure(byLevel[1]);
      shuffleSecure(byLevel[2]);
      shuffleSecure(byLevel[3]);

      const picked = [];
      const take = (level, count) => {
        const bucket = byLevel[level];
        for (let i = 0; i < count && bucket.length > 0; i += 1) {
          picked.push(bucket.pop());
        }
      };

      take(1, 4);
      take(2, 4);
      take(3, 4);

      if (picked.length < SESSION_SIZE) {
        const leftovers = shuffleSecure([...byLevel[1], ...byLevel[2], ...byLevel[3]]);
        while (picked.length < SESSION_SIZE && leftovers.length > 0) {
          picked.push(leftovers.pop());
        }
      }

      return shuffleSecure(picked);
    }

    let session = [];
    let roundIndex = 0;
    let score = 0;
    let streak = 0;
    let roundResolved = false;

    function setText(id, text) {
      document.getElementById(id).textContent = text;
    }

    function refreshGame() {
      const pool = shuffleSecure([...QUESTION_BANK]);
      session = pickBalancedSession(pool);
      roundIndex = 0;
      score = 0;
      streak = 0;
      document.getElementById('endOverlay').classList.remove('show');
      setText('pool', String(QUESTION_BANK.length));
      renderRound();
    }

    function renderRound() {
      const q = session[roundIndex];
      roundResolved = false;

      setText('round', `${roundIndex + 1} / ${SESSION_SIZE}`);
      setText('score', String(score));
      setText('streak', String(streak));
      setText('qIcon', q.icon);
      setText('qText', q.q);
      setText('status', '');

      const levelEl = document.getElementById('qLevel');
      levelEl.textContent = LEVELS[q.level] || 'Easy';
      levelEl.className = 'level ' + (q.level === 1 ? 'easy' : q.level === 2 ? 'medium' : 'hard');

      document.getElementById('revealBtn').disabled = false;
      document.getElementById('nextBtn').style.display = 'none';

      const fact = document.getElementById('fact');
      fact.textContent = '';
      fact.classList.remove('show');
    }

    function revealAnswer() {
      if (roundResolved) return;
      roundResolved = true;

      const q = session[roundIndex];
      score += 1;
      streak += 1;

      setText('score', String(score));
      setText('streak', String(streak));
      setText('status', `Answer: ${q.answer}`);

      document.getElementById('revealBtn').disabled = true;

      const fact = document.getElementById('fact');
      fact.textContent = `Fact: ${q.fact}`;
      fact.classList.add('show');

      if (roundIndex < SESSION_SIZE - 1) {
        document.getElementById('nextBtn').style.display = 'inline-block';
      } else {
        setTimeout(showEnd, 260);
      }
    }

    function nextRound() {
      roundIndex += 1;
      renderRound();
    }

    function showEnd() {
      const pct = Math.round((score / SESSION_SIZE) * 100);
      setText('endTitle', pct >= 85 ? '🏀 Elite Run!' : (pct >= 60 ? '🔥 Nice Progress!' : '💪 Keep Going!'));
      setText('endBody', `You completed ${SESSION_SIZE} balanced questions (${pct}% revealed). New games draw from 300 unique questions with easy/medium/hard tiers.`);
      document.getElementById('endOverlay').classList.add('show');
    }

    refreshGame();
  </script>
</body>
</html>
